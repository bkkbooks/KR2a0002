body:
  text: 史記集解卷二宋裴駰撰史記二夏本紀第二夏禹諡法曰受禪成功曰禹名曰文命禹之父曰鯀鯀之父曰帝顓頊顓頊之父曰昌意昌意之父曰黃帝禹者黃帝之𤣥孫而帝顓頊之孫也禹之曾大父昌意及父鯀皆不得在帝位為人臣當帝堯之時鴻水滔天浩浩懷山襄陵下民其憂堯求能治水者羣臣四嶽皆曰鯀可堯曰鯀為人負命毁族不可四嶽曰等之未有賢於鯀者願帝試之於是堯聽四嶽用鯀治水九年而水不息功用不成於是帝堯乃求人更得舜舜登用攝行天子之政巡狩行視鯀之治水無狀乃殛鯀於羽山以死天下皆以舜之誅為是於是舜舉鯀子禹而使續鯀之業堯崩帝舜問四嶽曰有能成美堯之事者使居官皆曰伯禹為司空可成美堯之功舜曰嗟然命禹女平水土維是勉之禹拜稽首讓於契后稷皋陶舜曰女其往視爾事矣禹為人敏給克勤其德不違其仁可親其言可信聲為律身為度王肅曰以身為法度稱以出徐廣曰一作士亹亹穆穆為綱為紀禹乃遂與益后稷奉帝命命諸侯百姓興人徒以傅土尚書傅作敷馬融曰敷分也行山表木定髙山大川馬融曰定其差秩祀禮所視也駰案尚書大傳曰髙山大川五嶽四瀆之屬禹傷先人父鯀功之不成受誅乃勞身焦思居外十三年過家門不敢入薄衣食致孝于鬼神馬融曰祭祀豐潔卑宫室致費於溝淢包氏曰方里為井井間冇溝溝廣深四尺十里為成成間有淢淢廣深八尺陸行乘車水行乘船泥行乘橇徐廣曰他書或作蕝駰案孟康曰橇形如箕擲行泥上如淳曰橇音茅蕝之蕝謂以板置其泥上以通行路也山行乘檋徐廣曰檋一作屩音丘遙反駰案如淳曰檋車謂以鐡如錐頭長半寸施之履下以上山不蹉跌也又音紀録反左準繩右規矩王肅曰左右言常用也載四時王肅曰所以行不違四時之宜也以開九州通九道陂九澤度九山令益豫衆庶稻可種卑溼命后稷豫衆庶難得之食食少調有餘相給以均諸侯禹乃行相地宜所有以貢及山川之便利禹行自冀州始冀州既載孔安國曰堯所都也先施貢賦役載於書也鄭𤣥曰兩河間曰冀州壺口治梁及岐鄭𤣥曰地理志壺口山在河東北屈縣之東南梁山在左馮翊夏陽岐山在右扶風美陽既修太原至於嶽陽孔安國曰太原今為郡名太嶽在太原西南山南曰陽覃懷致功孔安國曰覃懷近河地名鄭𤣥曰懷縣屬河內至於衡漳孔安國曰漳水橫流其土白壤孔安國曰土無塊曰壤賦上上錯孔安國曰上上第一錯雜也雜出第二之賦田中中孔安國曰九州之中為第五常衛既從大陸既為鄭𤣥曰地理志恆水出恆山衛水在靈夀大陸澤在巨鹿鳥夷皮服鄭𤣥曰鳥夷東北之民賦食鳥獸者孔安國曰服其皮明水除害夾右碣石孔安國曰碣石海畔之山也入于海徐廣曰海一作河濟河維沇州鄭𤣥曰言沇州之界在此兩水之間九河既道馬融曰九河名徒駭太史馬頰覆釡胡蘇簡潔鈎盤鬲津雷夏既澤雍沮會同鄭𤣥曰雍水沮水相觸而合入此澤中地理志曰雷澤在濟隂城陽桑土既蠶於是民得下丘居土孔安國曰大水去民下丘居平土就桑蠶其土黑墳孔安國曰色黑而墳起草繇木條孔安國曰繇茂條長也田中下孔安國曰第六賦貞作十有三年乃同鄭𤣥曰貞正也治此州正作不休十三年乃有賦與八州同言功難也其賦下下其貢漆絲其篚織文孔安國曰地宜漆林又宜蠶織文錦綺之類盛之筐篚而貢焉浮於濟漯通於河鄭𤣥曰地理志云漯水出東郡東武陽海岱維青州鄭𤣥曰東自海西至岱東嶽曰岱山嵎夷既略濰淄既道馬融曰嵎夷地名用功少曰略鄭𤣥曰地理志濰水出琅邪淄水出泰山萊蕪縣原山其土白墳海濱廣潟徐廣曰一作澤又作斥厥田斥鹵鄭𤣥曰斥謂地醎鹵田上下賦中上孔安國曰田第三賦第四厥貢鹽絺海物維錯孔安國曰絺細葛錯雜非一種鄭𤣥曰海物海魚也魚種類尤雜岱畎絲枲鉛松怪石孔安國曰畎谷也怪異好石似玉者岱山之谷出此五物皆貢之萊夷為牧孔安國曰萊夷地名可以牧放其篚酓絲孔安國曰酓桑蠶絲中為琴瑟絃浮於汶通於濟鄭𤣥曰地理志汶水出泰山萊蕪縣原山西南入濟海岱及淮惟徐州孔安國曰東至海北至岱南及淮淮沂其治蒙羽其藝鄭𤣥曰地理志沂水出泰山蓋縣䝉羽二山名孔安國曰二水已治二山可以種藝大野既都鄭𤣥曰大野在山陽巨野北名巨野澤孔安國曰水所停曰都東原底平鄭𤣥曰東原地名今東平郡即東原其土赤埴墳徐廣曰埴黏土也草木漸包孔安國曰漸長進包叢生也其田上中賦中中孔安國曰田第二賦第五貢維土五色鄭𤣥曰土五色者所以為大社之封羽畎夏狄孔安國曰夏狄雉名也羽中旌旄羽山之谷有之嶧陽孤桐孔安國曰嶧山之陽特生桐中琴瑟鄭𤣥曰地理志嶧山在下邳泗濱浮磬孔安國曰泗水涯水中見石可以為磬鄭𤣥曰泗水出濟隂乘氏也淮夷蠙珠臮魚孔安國曰淮夷二水名出蠙珠及美魚鄭𤣥曰淮夷淮水之上民也其篚𤣥纖縞鄭𤣥曰纖細也祭服之材尚細浮于淮泗通于河淮海維揚州孔安國曰北據淮南距海彭蠡既都陽鳥所居鄭𤣥曰地理志彭蠡澤在豫章彭澤西孔安國曰墮陽之鳥鴻雁之屬冬月居此澤也三江既入震澤致定孔安國曰震澤吳南太湖名言三江已入致定為震澤竹箭既布孔安國曰水去布生其草惟夭其木惟喬少長曰夭喬髙也其土塗泥馬融曰漸洳也田下下賦下上上雜孔安國曰田第九賦第七雜出第六貢金三品孔安國曰金銀銅鄭𤣥曰銅三色也瑶琨竹箭孔安國曰瑶琨皆美玉也齒革羽毛孔安國曰象齒犀皮鳥羽旄牛尾也島夷卉服孔安國曰南海島夷草服葛越其篚織貝孔安國曰織細繒也貝水物也鄭𤣥曰貝錦名也詩云成是貝錦凡織者先染其絲織之即成矣其包橘柚錫貢孔安國曰小曰橘大曰柚錫命乃貢言不常也鄭𤣥曰有錫則貢之或時乏則不貢錫所以柔金也均江海通淮泗鄭𤣥曰均讀曰沿沿順水行也荆及衡陽維荆州孔安國曰北據荆山南及衡山之陽江漢朝宗于海孔安國曰二水經此州而入海冇似于朝百川以海為宗宗尊也九江甚中孔安國曰江于此州界分為九道甚得地勢之中鄭𤣥曰地理志九江在尋陽南皆東合為大江沱涔已道孔安國曰沱江别名涔水名鄭𤣥曰水出江為沱漢為涔雲夢土為治孔安國曰雲夢之澤在江南其中有平土丘水去可為耕作畎畝之治其土塗泥田下中賦上下孔安國曰田第八賦第三貢羽旄齒革金三品杶幹栝柏鄭𤣥曰四木名孔安國曰幹柘也柏葉松身曰栝礪砥砮丹孔安國曰砥細於礪皆磨石也砮石中矢鏃丹朱類也維􅙪簬楛徐廣曰一作箭足杆杆即楛也音怙箭足者矢鏃也或以箭足訓釋􅙪簬乎駰案鄭𤣥曰􅙪簬聆風也三國致貢其名馬融曰言􅙪簬楛三國所致貢其名善也包匭菁茅鄭𤣥曰匭纒結也菁茅茅有毛刺者給宗廟縮酒重之故包裹又纒結也其篚𤣥纁璣組孔安國曰此州染𤣥纁色善故貢之璣珠類生於水中組綬類也九江入賜大龜孔安國曰尺二寸曰大龜出於九江水中龜不常用賜命而納之浮於江沱涔於漢踰于雒至於南河荆河惟豫州孔安國西南至荆山北距河水伊雒瀍澗既入於河孔安國曰伊出陸渾山洛出上洛山澗出澠池山瀍出河南北山四水合流而入河滎播既都孔安國曰滎澤名波水已成遏都道荷澤被明都孔安國曰荷澤在胡陵明都澤名在荷東北水流泆覆被之其土壤下土墳壚孔安國曰壚疏也馬融曰豫州地有三等下者墳壚也田中上賦雜上中孔安國曰田第四賦第二又雜出第一貢漆絲絺紵其篚纎絮孔安國曰細綿也錫貢磬錯孔安國曰治玉石曰錯治磬錯也浮於雒達於河華陽黑水惟梁州孔安國曰東據華山之南西距黑水汶嶓既藝鄭𤣥曰地理志岷山在蜀郡湔氐道嶓冢山在漢陽西沱涔既道孔安國曰沱潛發源此州入荆州蔡蒙旅平孔安國曰蔡蒙二山名祭山曰旅平言治功畢也鄭𤣥曰地理志蔡䝉在漢嘉縣和夷底績馬融曰和夷地名也其土青驪孔安國曰色青黑也田下上賦下中三錯孔安國曰田第七賦第八雜出弟七第九三等貢璆鐵銀鏤砮磬孔安國曰璆玉名鄭𤣥曰黃金之美者謂之鏐鏤剛鐵可以刻鏤也熊羆狐狸織皮孔安國曰貢四獸之皮也織皮今罽也西傾因桓是來馬融曰治西傾山因桓水是來言無餘道也鄭𤣥曰地理志西傾山在隴西臨洮浮于潛踰于沔孔安國曰漢上水為沔鄭𤣥曰或謂漢為沔入于渭亂于河孔安國曰正絶流曰亂黑水西河惟雍州孔安國曰西距黑水東據河龍門之河在冀州西弱水既西孔安國曰導之西流至于合黎鄭𤣥曰衆水皆東此獨西流也涇屬渭汭孔安國曰屬逮也水北曰汭言治涇水入於渭也鄭𤣥曰地理志涇水出安定涇陽漆沮既從灃音豐水所同孔安國曰漆沮之水已從入渭灃水所同同于渭也荆岐已旅孔安國曰荆在岐東非荆州之荆也終南敦物至于鳥鼠孔安國曰三山名言相望也鄭𤣥曰地理志終南敦物皆在右扶風武功也原隰底績至于都野鄭𤣥曰地理志都野在武威名曰休屠澤三危既度三苗大序孔安國曰西裔之山已可居三苗之族大有次序禹之功也其土黃壤田上上賦中下孔安國曰田第一賦第六人功少貢璆琳琅玕孔安國曰璆琳皆玉名琅玕石名而似珠者浮于積石至于龍門西河孔安國曰積石山在金城西南河所經也龍門山在河東之西界會于渭汭織皮昆侖析支渠搜西戎即序孔安國曰織皮毛布此四國在荒服之外流沙之內羌髳之屬皆就次序之美禹之功及戎狄也道九山汧及岐鄭𤣥曰地理志汧在右扶風也至于荆山踰于河壺口雷首至于太嶽孔安國曰三山在冀州太嶽在上黨西也砥柱析城至于王屋孔安國曰此三山在冀州之南河之北太行常山至于碣石入于海孔安國曰此二山連延東北接碣石而入于滄海西傾朱圉鳥鼠鄭𤣥曰地理志曰朱圉在漢陽南孔安國曰鳥鼠山渭水所出在隴西之西至于太華熊耳外方桐柏至于負尾鄭𤣥曰地理志太華山在宏農華隂南熊耳在盧氏東外方在潁川嵩髙山桐柏山在南陽平氏東南陪尾在江夏安陸東北若橫尾者道嶓冢至于荆山鄭𤣥曰地理志荆山在南郡臨沮內方至于大别鄭𤣥曰地理志內方在竟陵名立章山大别在廬江安豐縣汶山之陽至于衡山過九江至于敷淺原徐廣曰淺一作滅駰案國語曰敷淺原一名博陽山在豫章道九川弱水至於合黎鄭𤣥曰地理志弱水出張掖孔安國曰合黎水名在流沙東餘波入于流沙孔安國曰弱水餘波西溢入流沙鄭𤣥曰地理志流沙居延西北名居延澤地記曰弱水西流入合黎山腹餘波入于流沙通于南海馬融王肅皆云合黎流沙是地名道黑水至于三危入于南海鄭𤣥曰地理志益州滇池有黑水祠而不記此山水所在地記曰三危山在鳥鼠之西南孔安國曰黑水北北而南經三危過梁州入南海也道河積石至于龍門南至華隂孔安國曰至華隂山北而東行東至砥柱孔安國曰砥柱山名河水分流包山而過山見水中若柱然也在西虢之界又東至于盟津孔安國曰在洛北東過雒汭至于大邳孔安國曰洛汭洛入河處山再成曰邳北過降水至于大陸鄭𤣥曰地理志降水在信都南孔安國曰大陸澤名北播為九河同為逆河入于海鄭𤣥曰下尾合名曰逆河言相逆受也嶓冢道漾東流為漢鄭𤣥曰地理志漾水出隴西氐道至武都為漢至江夏謂之夏水又東為滄浪之水孔安國曰别流也在荆州過三澨入于大别孔安國曰三澨水名鄭𤣥曰在江夏竟陵之界南入于江東匯澤為彭蠡孔安國曰匯回也水東回為彭蠡大澤東為北江入于海孔安國曰自彭蠡江分為三道入震澤遂為北江而入海汶山道江東别為沱又東至于醴孔安國曰馬融王肅皆以醴為水名鄭𤣥曰醴陵名也大阜曰陵長沙冇醴陵縣過九江至于東陵孔安國曰東陵地名東迆北會于匯孔安國曰迆溢也東溢分流都共北會彭蠡東為中江入于海孔安國曰有北有中南可知也道沇水東為濟入于河泆為滎鄭𤣥曰地理志沇水出河東東垣王屋山東至河內武德入河泆為滎孔安國曰濟在溫西北滎澤在敖倉東南東出陶丘北孔安國曰陶丘丘再成者也鄭𤣥曰地理志陶丘在濟隂定陶西北又東至于荷孔安國曰荷澤之水又東北會于汶又北東入于海道淮自桐柏東會于泗沂東入于海孔安國曰與沂泗二水合入海也道渭自鳥鼠同穴孔安國曰鳥鼠共為雄雌同穴處此山遂名曰鳥鼠渭水出焉東會于灃又東北至于涇東過漆沮入于河孔安國曰漆沮二水名亦曰洛水出馮翊北道雒自熊耳孔安國曰在宜陽之西東北會于澗瀍孔安國曰會於河南城南又東會于伊孔安國曰會于雒陽之南東北入于河孔安國曰合于鞏之東也於是九州攸同四奧既居孔安國曰四方之邑已可居也九山刊旅孔安國曰九州名山已槎木通道而旅祭也九川滌原孔安國曰九州之川已滌除無壅塞也九澤既陂孔安國曰九州之澤皆已陂障無決溢也四海會同六府甚修孔安國曰六府金木水火土榖衆土交正致慎財賦鄭𤣥曰衆土美惡及髙下得其正矣亦致其貢篚慎奉其財物之稅皆法定制而入之也咸則三壤成賦鄭𤣥曰三壤上中下各三等也中國賜土姓祗台德先不距朕行鄭𤣥曰中即九州也天子建其國諸侯祚之土賜之姓命之氏其敬悅天子之德既先又不距違我天子政教所行令天子之國以外五百里甸服孔安國曰為天子之服治田去王城面五百里內百里賦納總孔安國曰甸內近王城者禾槀曰總供食國之馬也二百里納銍孔安國曰所銍刈謂禾穗三百里納秸服孔安國曰秸槀也服槀役四百里粟五百里米孔安國曰所納精者少粗者多甸服外五百里侯服孔安國曰侯候也斥候而服事也百里采馬融曰采事也各受王事者二百里任國孔安國曰任王事者三百里諸侯孔安國曰三百里同為王者斥候故合三為一名侯服外五百里綏服孔安國曰綏安也服王者政教三百里揆文教孔安國曰揆度也度王者文教而行之三百里皆同二百里奮武衛孔安國曰文教之外二百里奮武衛天子所以安之綏服外五百里要服孔安國曰要束以文教也三百里夷孔安國曰守平常之教事王者而已二百里蔡馬融曰蔡法也受王者刑法而已要服外五百里荒服馬融曰政教荒忽因其故俗而治之三百里蠻馬融曰蠻慢也禮簡怠慢來不距去不禁二百里流馬融曰流行無城郭常居東漸于海西被于流沙朔南暨鄭𤣥曰朔北方也聲教訖于四海於是帝錫禹𤣥圭以告成功于天下天下於是太平治皋陶作士以理民帝舜朝禹伯夷皋陶相與語帝前皋陶述其謀曰信其道德謀明輔和禹曰然如何皋陶曰於慎其身修思長孔安國曰慎修其身思為長久之道敦序九族衆明髙翼近可遠在已鄭𤣥曰次序九族而親之以衆明作羽翼之臣此政由近可以及遠也禹拜美言曰然皋陶曰於在知人在安民禹曰吁皆若是惟帝其難之孔安國曰言帝堯亦以為難知人則智能官人能安民則惠黎民懷之能知能惠何憂乎歡兜何遷乎有苗何畏乎巧言善色佞人鄭𤣥曰禹為父隱故言不及鯀皋陶曰然於亦行有九德亦言其有德乃言曰始事事孔安國曰言其人有德必言其所行事因事以為驗寬而栗孔安國曰性寬宏而能莊栗柔而立孔安國曰和柔而能立事願而共孔安國曰慤願而恭敬治而敬擾而毅徐廣曰擾一作柔駰案孔安國曰擾順也致果為毅直而溫簡而廉剛而實彊而義章其有常吉哉孔安國曰章明也吉善也日宣三德蚤夜翊明有家孔安國曰三德九德之中有其三也卿大夫稱家明行之可以為卿大夫日嚴振敬六德亮采有國孔安國曰嚴敬也行六德以信治政事可為諸侯也馬融曰亮信采事也翕受普施九德咸事俊乂在官孔安國曰翕合也能合受三六之德而用之以布施政教使九德之人皆用事謂天子也如此則俊德理能之士竝皆在官也百吏肅謹毋教邪淫奇謀非其人居其官是謂亂天事天討有罪五刑五用哉孔安國曰言用五刑必當吾言砥可行乎禹曰汝言致可績行皋陶曰余未有知思贊道哉帝舜謂禹曰汝亦昌言禹拜曰於豫何言豫思日孶孶皋陶難禹曰何謂孶孶禹曰鴻水滔天浩浩懷山襄陵下民皆服於水豫陸行乘車水行乘舟泥行乘橇山行乘檋行山刊木與益豫衆庶稻鮮食孔安國曰鳥獸新殺曰鮮以決九川致四海浚畎澮鄭𤣥曰畎澮田間溝也致之川與稷豫衆庶難得之食食少調有餘補不足徙居衆民乃定萬國為治皋陶曰然此而美也禹曰於帝慎乃在位安爾止鄭𤣥曰安汝之所止無妄動動則擾民輔德天下大應清意以昭待上帝命天其重命用休鄭𤣥曰天將重命汝以美應謂符瑞也帝曰吁臣哉臣哉臣作朕股肱耳目豫欲左右有民女輔之馬融曰我欲左右助民汝當翼成我也余欲觀古人之象日月星辰作文繡服色女明之余欲聞六律五聲八音來治滑以出入五言女聽尚書滑字作曶音忽鄭𤣥曰曶者臣見君所秉書思對命者也君亦有焉以出入政教於五官豫即辟女匡拂豫女無面諛退而謗豫敬四輔臣尚書大傳曰古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼諸衆讒嬖臣君徐廣曰一作吾德誠施皆清矣禹曰然帝即不時布同善惡則毋功孔安國曰帝用臣不是則賢愚竝立優劣共流故也帝曰毋若丹朱敖維慢游是好毋水舟行朋淫于家鄭𤣥曰朋淫淫門內用絶其世豫不能順是禹曰豫辛壬娶塗山癸甲生啓孔安國曰塗山國名辛日娶妻至于甲四日復往治水豫不子以故能成水土功輔成五服至于五千里州十二師外薄四海咸建五長孔安國曰薄迫言至海也諸侯五國立賢者一人為方伯謂之五長以相統治各道有功苗頑不即功孔安國曰三苗頑凶不得就官善惡分别帝其念哉帝曰道吾德乃女功序之也皋陶於是敬禹之德令民皆則禹不如言刑從之舜德大明於是䕫行樂祖考至羣后相讓鳥獸翔舞簫韶九成鳯皇來儀孔安國曰簫韶舞樂名備樂九奏而致鳯皇也百獸率舞百官信諧帝用此作歌曰陟天之命維時維幾孔安國曰奉正天命以臨民惟在順時惟在慎微乃歌曰股肱善哉元首起哉百工喜哉孔安國曰股肱之臣喜樂盡忠君之治功乃起百官之業乃廣皋陶拜手稽首揚言曰念哉鄭𤣥曰使羣臣念帝之戒率為興事慎乃憲敬哉孔安國曰率臣下為起治之事當慎汝法度敬其職乃更為歌曰元首明哉股肱良哉庶事康哉舜又歌曰元首叢脞哉股肱惰哉萬事墮哉孔安國曰叢脞細碎無大略也君如此則臣懈惰萬事墮廢也帝拜曰然往欽哉於是天下皆宗禹之明度數聲樂徐廣曰舜本記云禹乃興九韶之樂為山川神主帝舜薦禹於天為嗣十七年劉熙曰若此則舜格于文祖三年之後攝禹使得祭祀與而帝舜崩三年喪畢禹辭辟舜之子商均於陽城劉熙曰今潁川陽城是也天下諸侯皆去商均而朝禹禹於是遂即天子位皇甫謐曰都平陽或在安邑或在晉陽南面朝天下國號曰夏后姓姒氏禮緯曰祖以吞薏苡生帝禹立而舉皋陶薦之且授政焉而皋陶卒封皋陶之後於英六徐廣曰史記皆作英字而以英布是此苗裔或在許皇覽曰皋陶冢在廬江六縣而后舉益任之政十年帝禹東巡狩至于會稽而崩皇甫謐曰年百歲也以天下授益三年之喪畢益讓帝禹之子啓而辟居箕山之陽孟子曰陽字一作隂劉熙曰崇髙之北禹子啓賢天下屬意焉及禹崩雖授益益之佐禹日淺天下未洽故諸侯皆去益而朝啓曰吾君帝禹之子也於是啓遂即天子之位是為夏后帝啓夏后帝啓禹之子其母塗山氏之女也有扈氏不服地理志曰扶風鄠縣是扈國啓伐之大戰於甘馬融曰甘有扈氏南郊地名將戰作甘誓乃召六卿申之孔安國曰天子六軍其將皆命卿也啓曰嗟六事之人孔安國曰各有軍事故臼六事豫誓告女有扈氏威侮五行怠棄三正鄭𤣥曰五行四時盛德所行之政也威侮逆之三正天地人之正道暴天用勦絶其命孔安國曰勦絶也今豫維共行天之罰孔安國曰共奉也左不攻于左右不攻于右女不共命鄭𤣥曰左車左右車右御非其馬之政女不共命孔安國曰御以正馬為政也三者有失皆不奉我命也用命賞于祖孔安國曰天子親征必載遷廟之祖主行有功即賞祖主前示不専也不用命僇於社孔安國曰又載社主謂之社事奔北則僇之社主前社主隂隂主殺也豫則帑僇女孔安國曰非但止身辱及女子言恥纍之遂滅有扈氏天下咸朝夏后帝啓崩徐廣曰皇甫謐曰夏啓元年甲辰十年癸丑崩子帝太康立帝太康失國孔安國曰盤于遊田不恤民事為羿所逐不得反國昆弟五人須于洛汭作五子之歌孔安國曰太康五弟與其母待太康于洛水之北怨其不反故作歌太康崩弟中康立是為帝中康帝中康時羲和湎淫廢時亂日孔安國曰羲和氏掌天地四時之官太康之後沈湎於酒廢天時亂甲乙也𦙍往征之作𦙍征孔安國曰𦙍國之君受王命往征之鄭𤣥曰𦙍臣名中康崩子帝相立帝相崩子帝少康立帝少康崩子帝寧立帝寧崩子帝槐立帝槐崩子帝芒立帝芒崩子帝泄立帝泄崩子帝不降立帝不降崩弟帝扃立帝扃崩子帝廑立帝廑崩立帝不降之子孔甲是為帝孔甲帝孔甲立好方鬼神淫亂夏后氏德衰諸侯畔之天降龍二有雌雄孔甲不能食未得豢龍氏賈逵曰豢養也穀食曰豢陶唐既衰其后有劉纍服䖍曰后劉纍之為諸侯者夏后賜之姓學擾龍應劭曰擾音柔擾馴也能順飬得其嗜欲于豢龍氏以事孔甲孔甲賜之姓曰御龍氏服䖍曰御亦養受豕韋之後徐廣曰受一作更駰案賈逵曰劉纍之後至商不絶以代豕韋之後祝融之後封於豕韋殷武丁滅之以劉纍之後代之龍一雌死以食夏后夏后使求懼而遷去賈逵曰夏后既饗而又使求致龍劉纍不能得而懼也傳曰遷于魯縣孔甲崩子帝皋立帝皋崩左傳曰皋墓在殽南陵子帝發立帝發崩子履癸立是為桀帝桀之時謐法賊人多殺曰桀自孔甲以來而諸侯多畔夏桀不務德而武傷百姓百姓弗堪乃召湯而囚之夏臺已而釋之湯修德諸侯皆歸湯湯遂率兵以伐夏桀桀走鳴條孔安國地在安邑之西鄭𤣥曰南夷地名遂放而死徐廣曰從禹至桀十七君十四世駰案汲冢紀年曰有王與無王用歲四百七十一年矣桀謂人曰吾悔不遂殺湯於夏臺使至此湯乃踐天子位代夏朝天下湯封夏之後至周封於杞也太史公曰禹為姒姓其後分封用國為姓故有夏后氏有扈氏有男氏斟尋氏徐廣曰一云斟氏尋氏彤城氏褒氏費氏杞氏繒氏辛氏冥氏斟氏戈氏孔子正夏時學者多𫝊夏小正云禮運稱孔子曰我欲觀夏道是故之杞而不足徵也吾得夏時焉鄭𤣥曰得夏四時之書其存者冇小正自虞夏時貢賦備矣或言禹會諸侯江南計功而崩因葬焉命曰會稽會稽者會計也皇覽曰禹冢在山隂縣會稽山上會稽山本名苗山在縣南去縣七里越傳曰禹到大越上苗山大會計爵有德封有功因而更名苗山曰會稽因病死葬􅓗棺穿壙深二尺上無瀉泄下無邸水壇髙三尺土階三等周方一畝呂氏春秋曰禹葬會稽不煩人徒墨子曰禹葬會稽衣裘三領桐棺三寸地理志云山上有禹井禹祠相傳以為下有羣鳥耘田也史記集解卷二
