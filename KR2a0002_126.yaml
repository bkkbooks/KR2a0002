body:
  text: 史記集解卷一百二十八宋裴駰撰史記一百二十八龜策列傳第六十八太史公曰自古聖王將建國受命興動事業何嘗不寶卜筮以助善唐虞以上不可記已自三代之興各據禎祥塗山之兆從而夏啓世飛燕之卜順故殷興百穀之筮吉故周王王者決定諸疑參以卜筮斷以蓍龜不易之道也蠻夷氐羌雖無君臣之序亦以決疑之卜或以金石或以草木徐廣曰一作革國不同俗然皆可以戰伐攻擊推兵求勝各信其神以知來事略聞夏殷欲卜者乃取蓍龜已則棄去之以為龜藏則不靈蓍久則不神至周室之卜官嘗寶藏蓍龜又其大小先後各有所尚要其歸等耳或以為聖王遭事無不定決疑無不見其設稽神求問之道者以為後世衰微愚不師智人各自安化分為百室道散而無垠故推歸之至微要潔於精神也或以為昆蟲之所長聖人不能與爭其處吉凶别然否多中於人至髙祖時因秦太卜官天下始定兵革未息及孝惠享國日少吕后女主孝文孝景因襲掌故未遑講試雖父子疇官世世相傳其精微深妙多所遺失至今上即位博開藝能之路悉延百端之學通一伎之士咸得自效絶倫超竒者為右無所阿私數年之間太卜大集㑹上欲擊胸奴西攘大宛徐廣曰攘一作襄襄除也南收百越卜筮至預見表象先圖其利及猛將推鋒執節獲勝於彼而蓍龜時日亦有力于此上尤加意賞賜至或數千萬如丘子明之屬富溢貴寵傾于朝廷至以卜筮射蠱道巫蠱時或頗中素有睚眦不快因公行誅恣意所傷以破族滅門者不可勝數百僚蕩恐皆曰龜策能言後事覺姧窮亦誅三族夫摓策定數徐廣曰摓音逢一作違灼龜觀兆變化無窮是以擇賢而用占焉可謂聖人重事者乎周公卜三龜而武王有瘳紂為暴虐而元龜不占晉文將定襄王之位卜得黃帝之兆左傳曰遇黃帝戰于阪泉之兆卒受彤弓之命獻公貪驪姬之色卜而兆有口象其禍竟流五世楚靈將背周室卜而龜逆左傳曰靈王卜曰余尚得天下不吉投龜詬天而呼曰是區區者而不余畀余必自取之終被乾溪之敗兆應信誠於內而時人明察見之於外可不謂兩合者哉君子謂夫輕卜筮無神明者悖背人道信禎祥者鬼神不得其正故書建稽疑五謀而卜筮居其二五占從其多明有而不專之道也余至江南觀其行事問其長老云龜千嵗乃遊蓮葉之上徐廣曰蓮一作領領與蓮聲相近或假借字也蓍百莖共一根徐廣曰劉向云龜千嵗而靈蓍百年而一本生百莖又其所生獸無虎狼草無毒螫江傍家人常畜龜飲食之以為能導引致氣有益於助衰養老豈不信哉褚先生曰臣以通經術受業博士治春秋以髙第為郎幸得宿衛出入宫殿中十有餘年竊好太史公傳太史公之傳曰三王不同龜四夷各異卜然各以決吉凶略窺其要故作龜策列傳臣往來長安中求龜策列傳不能得故之大卜官問掌故文學長老習事者寫取龜策卜事編于下方聞古五帝三王發動舉事必先決蓍龜𫝊曰下有伏靈上有兔絲上有搗蓍下有神龜所謂伏靈者在兔絲之下狀似飛鳥之形新雨已天清靜無風以夜捎兔絲去之即以􅀢燭此地徐廣曰􅀢籠也蓋然火而籠罩其上也音溝陳涉世家曰夜􅀢火也燭之火滅即記其處以新布四丈環置之明即掘取之入四尺至七尺得矣過七尺不可得伏靈者千嵗松根也食之不死聞蓍生滿百莖者其下必有神龜守之其上常有青雲覆之傳曰天下和平王道得而蓍莖長丈其叢生滿百莖方今世取蓍者不能中古法度不能得滿百莖長丈者取八十莖已上蓍長八尺即難得也人民好用卦者取滿六十莖已上長滿六尺者即可用矣記曰能得名龜者財物歸之家必大富至千萬一曰北斗龜二曰南辰龜三曰五星龜四曰八風龜五曰二十八宿龜六曰日月龜七曰九州龜八曰玉龜凡八名龜龜圖各有文在腹下文云云者此某之龜也略記其大指不寫其圖取此龜不必滿尺二寸民人得長七八寸可寶矣今夫珠玉寶器雖有所深藏必見其光必出其神明其此之謂乎故玉處於山而木潤淵生珠而岸不枯者徐廣曰一無不字許氏說淮南以為滋潤鍾於明珠致令岸枯也潤澤之所加也明月之珠出於江海藏於蚌中蚗龍伏之徐廣曰許氏說淮南云蚗龍龍屬也音決王者得之長有天下四夷賓服能得百莖蓍并得其下龜以卜者百言百當足以決吉凶神龜出於江水中廬江郡常嵗時生龜長尺二寸者二十枚輸太卜官太卜官因以吉日剔取其腹下甲龜千嵗乃滿尺二寸王者發軍行將必鑽龜廟堂之上以決吉凶今髙廟中有龜室藏內以為神寶傳曰取前足臑骨穿佩之徐廣曰臑音乃毛反臑臂取龜置室西北隅懸之以入深山大林中不惑臣為郎時見萬畢石朱方傳曰有神龜在江南嘉林中嘉林者獸無虎狼鳥無鴟梟草無毒螫野火不及斧斤不至是為嘉林龜在其中常巢於芳運之上左脅書文曰甲子重光徐廣曰子一作于得我者匹夫為人君有土正徐廣曰正長也為有土之官長諸侯得我為帝王求之於白蛇蟠杅徐廣曰一孤反林中者齊戒以待譺然狀如有人來告之因以醮酒他髮徐廣曰他一作被求之三宿而得由是觀之豈不偉哉故龜可不敬與南方老人用龜支牀足行二十餘嵗老人死移牀龜尚生不死龜能行氣導引問者曰龜至神若此然太卜官得生龜何為輒殺取其甲乎近世江上人有得名龜畜置之家因大富與人議欲遣去人教殺之勿遣遣之破人家龜見夢曰送我水中無殺吾也其家終殺之殺之後身死家不利人民與君王者異道人民得名龜其狀類不宜殺也以往古故事言之古明王聖主皆殺而用之宋元王時得龜亦殺而用之謹連其事於左方令好事者觀擇其中焉宋元王二年江使神龜使於河至於泉陽漁者豫且舉網得而囚之置之籠中夜半龜來見夢於宋元王曰我為江使於河而幕網當吾路泉陽豫且得我我不能去身在患中莫可告語王有德義故來告訴元王惕然而悟乃召博士衛平而問之曰今寡人夢見一丈夫延頸而長頭衣𤣥繡之衣而乘輜車來見夢於寡人曰我為江使於河而幕網當吾路泉陽豫且得我我不能去身在患中莫可告語王有德義故來告訴是何物也衛平乃援式而起徐廣曰式音勑仰天而視月之光觀斗所指定日處鄉規矩為輔副以權衡四維已定八卦相望視其吉凶介蟲先見乃對元王曰今昔壬子宿在牽牛河水大㑹鬼神相謀漢正南北江河固期南風新至江使先來白雲壅漢萬物盡留斗柄指日使者當囚𤣥服而乘輜車其名為龜王急使人問而求之王曰善於是王乃使人馳而往問泉陽令曰漁者幾何家名誰為豫且豫且得龜見夢於王王故使我求之泉陽令乃使吏案籍視圖水上漁者五十五家上流之廬名為豫且泉陽令曰諾乃與使者馳而問豫且曰今昔汝漁何得豫且曰夜半時舉網得龜莊子曰得白龜圍五尺使者曰今龜安在曰在籠中使者曰王知子得龜故使我求之豫且曰諾即系龜而出之籠中獻使者使者載行出於泉陽之門正晝無見風雨晦冥雲蓋其上五采青黃雷雨竝起風將而行入於端門見於東箱身如流水潤澤有光望見元王延頸而前三步而止縮頸而卻復其故處元王見而怪之問衛平曰龜見寡人延頸而前以何望也縮頸而復是何當也衛平對曰龜在患中而終肯囚王有德義使人活之今延頸而前以當謝也縮頸而卻欲望亟去也元王曰善哉神至如此乎不可久留趣駕送龜勿令失期衛平對曰龜者是天下之寶也先得此龜者為天子且十言十當十戰十勝生於深淵長於黃土知天之道明於上古游三千嵗不出其域安平靜正動不用力夀蔽天地莫知其極與物變化四時變色居而自匿伏而不食春蒼夏黃秋白冬黑明於陰陽審於刑德先知利害察於禍福以言而當以戰而勝王能寶之諸侯盡服王勿遣也以安社稷元王曰龜甚神靈降于上天陷於深淵在患難中以我為賢德厚而忠信故求告寡人寡人若不遣也是漁者也漁者利其肉寡人貪其力下為不仁上為無德君臣無禮何從有福寡人不忍奈何勿遣衛平對曰不然臣聞盛德不報重寄不歸天與不受天奪之寶今龜周流天下還服其所上至蒼天下薄泥塗還遍九州未嘗愧辱無所稽留今至泉陽漁者辱而囚之王雖遣之江河必怒務求報仇自以為侵因神與謀淫雨不霽水不可治若為枯旱風而揚埃蝗蟲暴生百姓失時王行仁義其罰必來此無他故其祟在龜後雖悔之豈有及哉王勿遣也元王慨然而嘆曰夫逆人之使絶人之謀是不暴乎取人之有以自為寶是不强乎寡人聞之暴得者必暴亡强取者必後無功桀紂暴强身死國亡今我聽子是無仁義之名而有暴强之道江河為湯武我為桀紂未見其利恐離其咎寡人狐疑安事此寶趣駕送歸勿令久留衛平對曰不然王其無患天地之間纍石為山髙而不壞地得為安故云物或危而顧安或輕而不可遷人或忠信而不如誕謾徐廣曰誕一作訑音吐和反或醜惡而宜大官或美好佳麗而為衆人患非神聖人莫能盡言春秋冬夏或暑或寒寒暑不和賊氣相奸同嵗異節其時使然故令春生夏長秋收冬藏或為仁義或為暴强暴强有鄉仁義有時萬物盡然不可勝治大王聽臣臣請悉言之天出五色以辨白黑地生五穀以知善惡人民莫知辨也與禽獸相若谷居而穴處不知田作天下禍亂陰陽相錯匆匆疾疾徐廣曰一作病通而不相擇妖㜸數見傳為單薄聖人别其生使無相獲禽獸有牝牡置之山原鳥有雌雄布之林澤有介之蠱置之溪谷故牧人民為之城郭內經閭術外為阡陌夫妻男女賦之田宅列其室屋為之圖籍别其名族立官置吏勸以爵祿衣以桑麻養以五穀耕之耰之徐廣曰音憂鉏之耨之徐廣曰耨除草也口得所嗜目得所美身受其利以是觀之非强不至故曰田者不强囷倉不盈商賈不强不得其贏婦女不强布帛不精官御不强其勢不成大將不强卒不使令侯王不强沒世無名故云强者事之始也分之理也物之紀也所求於强無不有也王以為不然王獨不聞玉櫝隻雉徐廣曰隻一作雙出於昆山明月之珠出於四海鐫石拌蚌徐廣曰鐫音子旋反拌音判傳賣於市聖人得之以為大寶大寶所在乃為天子今王自以為暴不如拌蚌於海也自以為强不過鐫石於昆山也取者無咎寶者無患今龜使來抵網而遭漁者得之見夢自言是國之寶也王何憂焉元王曰不然寡人聞之諫者福也諛者賊也人主聽諛是愚惑也雖然禍不妄至福不徒來天地合氣以生百財陰陽有分不離四時十有二月日至為期聖人徹焉身乃無災明王用之人莫敢欺故云福之至也人自生之禍之至也人自成之禍與福同刑與德雙聖人察之以知吉凶桀紂之時與天爭功擁遏鬼神使不得通是固已無道矣諛臣有衆桀有諛臣名曰趙梁教為無道勸以貪狼繫湯夏臺殺關龍逢左右恐死偷諛於傍國危於纍卵皆曰無傷稱樂萬嵗或曰未央蔽其耳目與之詐狂湯卒伐桀身死國亡聽其諛臣身獨受殃春秋著之至今不忘紂有諛臣名為左强誇而目巧教為象郎禮記曰日巧之室鄭𤣥曰但用目巧善意作室不甲法度許愼曰象牙郎將至於天又有玉牀犀玉之器象箸而羮聖人剖其心壯士斬其胻胻音衡腳脛也箕子恐死被髮佯狂殺周太子歷囚文王昌投之石室將以昔至明陰兢活之徐廣曰兢一作􅔡與之俱亡入於周地得太公望興卒聚兵與紂相攻文王病死載尸以行太子發代將號為武王戰於牧野破之華山之陽紂不勝敗而還走圍之象郎自殺宣室徐廣曰天子之居名曰宣室身死不葬頭懸車軫四馬曳行寡人念其如此腸如涫湯徐廣曰涫音館一作沸是人皆富有天下而貴至天子然而大傲欲無厭時舉事而喜髙貪狼而驕不用忠信聽其諛臣而為天下笑今寡人之邦居諸侯之間曽不如秋毫舉事不當又安亡逃衛平對曰不然河雖神賢不如崑崙之山江之源理不如四海而人尚奪取其寶諸侯爭之兵革為起小國見亡大國危殆殺人父兄虜人妻子殘國滅廟以爭此寶戰攻分爭是暴强也故云取以暴强而治以文理無逆四時必親賢士與陰陽化鬼神為使通於天地與之為友諸侯兵服民衆殷喜邦家安寧與世更始湯武行之乃取天子春秋著之以為經紀王不自稱湯武而自比桀紂桀紂為暴强也固以為常桀為瓦室世本曰昆吾作陶張華博物記亦云桀作瓦蓋是昆吾為桀作也紂為象郎徵絲灼之務以費民賦斂無度殺戮無方殺人六畜以韋為囊囊盛其血與人縣而射之與天帝爭强逆亂四時先百鬼嘗諫者輒死諛者在傍聖人伏匿百姓莫行天數枯旱國多妖祥螟蟲嵗生五穀不成民不安其處鬼神不享飄風日起正晝晦冥日月竝蝕滅息無光列星奔亂皆絶紀綱以是觀之安得久長雖無湯武時固當亡故湯伐桀武王尅紂其時使然乃為天子子孫續世終身無咎後世稱之至今不已是皆當時而行見事而强乃能成其帝王今龜大寶也為聖人使傳之賢士不用手足雷電將之風雨送之流水行之侯王有德乃得當之今王有德而當此寶恐不敢受王若遣之宋必有咎後雖悔之亦無及己元王大悅而喜於是元王向日而謝再拜而受擇日齊戒甲乙最良乃刑白雉及與驪羊以血灌龜于壇中央以刀剝之身全不傷脯酒禮之橫其腹腸荆攴卜之必制其創理達於理文相錯迎使工占之所言盡當邦福重寶徐廣曰福音副藏也聞于傍鄉殺牛取革被鄭之桐徐廣曰牛革桐為鼓也草木畢分化為甲兵戰勝攻取莫如元王元王之時衛平相宋宋國最强龜之力也故云神至能見夢于元王而不能自出漁者之籠身能十言盡當不能通使於河還報於江賢能令人戰勝攻取不能自解於刀鋒免剝刺之患聖能先知亟見而不能令衛平無言言事百全至身而攣當時不利又焉事賢賢者有恆常士有適然是故明有所不見聽有所不聞人雖賢不能左畫方右畫圓日月之明而時蔽于浮雲羿名善射不如雄渠蜂門新序曰楚熊渠子夜行見伏石當道以為虎而射之應弦沒羽淮南子曰射者重以逢蒙門子之巧劉歆七略有蜂門射法也禹名為辨智而不能勝鬼神地柱折天故無椽又奈何責人於全孔子聞之曰神龜知吉凶面骨直空枯日為德而君於天下辱於三足之烏月為刑而相佐見食於蝦蟇蝟辱於鵲郭璞曰蝟能制虎見鵲仰地淮南萬畢曰鵲令蝟反腹者蝟憎其意心惡之也騰蛇之神而殆於即且郭璞曰騰蛇龍屬也蝍蛆似蝗大腹食蛇腦也竹外有節理中直空虛松柏為百木長而守門閭日辰不全故有孤虛甲乙謂之日子丑謂之辰六甲孤虛法甲子旬中無戌亥戌亥即為孤辰已即為虛甲戌旬中無申酉申酉為孤寅卯為虛甲申旬中無午未午未為孤子丑即為虛甲午旬中無辰巳辰巳為孤戌亥即為虛甲辰旬中無寅卯寅卯為孤申酉即為虛甲寅旬中無子丑子丑為孤午未即為虛劉歆七略有風后孤虛二十卷黃金有疵白玉有瑕事有所疾亦有所徐物有所拘亦有所據罔有所數亦有所疏人有所貴亦有所不如何可而適乎物安可全乎天尚不全故世為屋不成三瓦而陳之徐廣曰一云為屋成缺三瓦而陳之也以應之天天下有階物不全乃生也褚先生曰漁者舉網而得神龜龜自見夢宋元王元王召博士衛平告以夢龜狀平運式定日月分衡度視吉凶占龜與物色同平諫王留神龜以為國重寶美矣古者筮必稱龜者以其令名所從來久矣余述而為傳三月二月正月十二月十一月中關內髙外下四月首仰足開肣開首俯大五月橫吉首俯大六月七月八月九月十月卜禁曰子亥戌不可以卜及殺龜日中如食已卜暮昏龜之徼也不可以卜庚辛可以殺及以鑽之常以月旦祓龜先以清水澡之以卵祓之乃持龜而遂之若常以為祖徐廣曰一作視人若已卜不中皆祓之以卵東向立灼以荆若剛木土徐廣曰一作十一卵指之者三持龜以卵周環之祝曰今日吉謹以梁卵焍黃祓去玉靈之不祥玉靈必信以誠知萬事之情辨兆皆可占不信不誠則燒玉靈揚其灰以徵後龜其卜必北向龜甲必尺二寸卜先以造徐廣曰有竈也灼鑽鑽中已又灼龜首各三又復灼所鑽中曰正身灼首曰正足徐廣曰一作止各三即以造三周龜祝曰假之玉靈夫子夫子玉靈荆灼而心令而先知而上行於天下行於淵諸靈數朿徐廣曰音策莫如汝信今目良日行一良貞徐廣曰行一作身其欲卜某即得而喜不得而悔即得發鄉我身長大手足收人皆上偶不得發鄉我身挫折中外不相應手足滅去靈龜卜祝曰假之靈龜五筮五靈不知神龜之靈知人死知人生某身良貞某欲求某物即得也頭見足發內外相應即不得也頭仰足肣內外自隨可得占卜占病者祝曰今某病困死首上開內外交駭身節折不死首仰足肣卜病者崇曰今病有崇無呈無崇有呈兆有中崇有內外崇有外卜繫者出不出不出橫吉安若出足開首仰有外卜求財物其所當得得首仰足開內外相應即不得呈兆首仰足肣卜有賣若買臣妾馬牛得之首仰足開內外相應不得首仰足肣呈兆若橫吉安卜擊盜聚若干人在某所今某將卒若干人往擊之當勝首仰足開身正內自橋外下不勝足肣首仰身首徐廣曰一作簡內下外髙卜求當行不行行首足開不行足肣首仰若橫吉安安不行卜往擊盜當見不見見首仰足肣有外不見足開首仰卜往候盜見不見見首仰足肣肣勝有外不見足開首仰卜聞盜來不來來外髙內下足肣首仰不來足開首仰若橫吉安期之自次卜遷徙去官不去去足開有肣外首仰不去自去即足肣呈兆若橫吉安卜居官尚吉不吉呈兆身正若橫吉安不吉身節折首仰足開卜居室家吉不吉吉呈兆身正若橫吉安不吉身折節首仰足開卜嵗中禾稼孰不孰孰首仰足開內外自橋外自垂不孰足肣手仰有外卜嵗中民疫不疫疫首仰足肣身節有强外不疫身正首仰足開卜嵗中有兵無兵無兵呈兆若橫吉安有兵首仰足開身作外强情卜見貴人吉不吉吉足開首仰身正內自橋不吉首仰身節折足肣有外若無漁卜請謁於人得不得得首仰足開內自橋不得首仰足肣有外卜追亡人當得不得得首仰足肣內外相應不得首仰足開若橫吉安卜漁獵得不得得首仰足開內外相應不得足肣首仰若橫吉安卜行遇盜不遇遇首仰足開身節折外髙內下不遇呈兆卜天雨不雨雨首仰有外外髙內下不雨首仰足開若橫吉安卜天雨霽不霽霽呈兆足開首仰不霽橫吉命曰橫吉安以占病病甚者一日不死不甚者卜曰瘳不死繫者重罪不出輕罪環出過一日不出久毋傷也求財物買臣妾馬牛一日環得過一日不得不得行者不行來者環至過食時不至不來擊盜不行行不遇聞盜不來徙官不徙居官家室皆吉嵗稼不孰民疾疫無疾嵗中無兵見人行不行不喜請謁人不行不得追亡人漁獵不得行不遇盜雨不雨霽不霽命曰呈兆病者不死繫者出行者行來者來市買得追亡人得過一日不得問行者不到命曰柱徹卜病不死繫者出行者行來者來而市買不得憂者毋憂追亡人不得命曰首仰足肣有內無外占病病甚不死繫者解求財物買臣妾馬牛不得行者聞言不行來者不來聞盜不來聞言不至徙官聞言不徙居官有憂居家多災嵗稼中孰民疾疫多病嵗中有兵聞言不開見貴人吉請謁不行行不得善言追亡人不得漁獵不得行不遇盜雨不雨甚霽不霽故其莫字皆為首備問之曰備者仰也故定以為仰此私記也命曰首仰足肣有內無外占病病甚不死繫者不出求財買臣妾不得行者不行來者不來擊盜不見聞盜來內自驚不來徙官不徙居官家室吉嵗稼不孰民疾疫有病甚嵗中無兵見貴人吉請謁追亡人不得亡財物財物不出得漁獵不得行不遇盜雨不雨霽不霽凶命曰呈兆首仰足肣以占病不死繫者未出求財物買臣妾馬牛不得行不行來不來擊盜不相見聞盜來不來徙官不徙居官久多憂居家室不吉嵗稼不孰民病疫嵗中毋兵見貴人不吉請謁不得漁獵得少行不遇盜雨不雨霽不霽不吉命曰呈兆首仰足開以占病病篤死繫囚出求財物買臣妾馬牛不得行者行來者來擊盜不見盜聞盜來不來徙官徙居官不久居家室不吉嵗稼不孰民疾疫有而少嵗中無兵見貴人不見吉請謁追亡人漁獵不得行遇盜雨不雨霽小吉命曰首仰足肣以占病不死繫者久毋傷也求財物買臣妾馬牛不得行者不行擊盜不行來者來聞盜來徙官聞言不徙居家室不吉嵗稼不熟民疾疫少嵗中毋兵見貴人得見請謁追亡人漁獵不得行遇盜雨不雨霽不霽吉命曰首仰足開有內以占病者死繫者出求財物買臣妾馬牛不得行者行來者來擊盜行不見盜聞盜來不來徙官徙居官不久居家室不吉嵗孰民疾疫有而少嵗中毋兵見貴人不吉請謁追亡人漁獵不得行不遇盜雨霽霽小吉不霽吉命曰橫吉內外自橋以占病占曰毋瘳死繫者毋罪出求財物買臣妾馬牛得行者行來者來擊盜合交等聞盜來來徙官徙居家室吉嵗孰民疫無疾嵗中無兵見貴人請謁追亡人漁獵得行遇盜雨霽雨霽大吉命曰橫吉內外自吉以占病病者死繫不出求財物買臣妾馬牛追亡人漁獵不得行者不來擊盜不相見聞盜不來徙官徙居官有憂居家室見貴人請謁不吉嵗稼不孰民疾疫嵗中無兵行不遇盜雨不雨霽不霽不吉命曰漁人以占病者病者甚不死繫者出求財物買臣妾馬牛擊盜請謁追亡人漁獵得行者行來聞盜來不來徙官不徙居家室吉嵗稼不孰民疾疫嵗中毋兵見貴人吉行不遇盜雨不雨霽不霽吉命曰首仰足肣內髙外下以占病病者甚不死繫者不出求財物買臣妾馬牛追亡人漁獵得行不行來者來擊盜勝徙官不徙居官有憂無傷也居家室多憂病嵗大孰民疾疫嵗中有兵不至見貴人請謁不吉行遇盜雨不雨霽不霽吉命曰橫吉上有仰下有柱病久不死繫者不出求財物買臣妾馬牛追亡人漁獵不得行不行來不來擊盜不行行不見聞盜來不來徙官不徙居家室見貴人吉嵗大孰民疾疫嵗中毋兵行不遇盜雨不雨霽不霽大吉命曰橫吉榆仰以占病不死繫者不出求財物買臣妾馬牛至不得行不行來不來擊盜不行行不見聞盜來不來徙官不徙居官家室見貴人吉嵗孰嵗中有疾疫毋兵請謁追亡人不得漁獵至不得行不得行不遇盜雨霽不霽小吉命曰橫吉下有柱以占病病甚不環有瘳無死繫者出求財物買臣妾馬牛請謁追亡人漁獵不得行來不來擊盜不合聞盜來來徙官居官吉不久居家室不吉嵗不孰民毋疾疫嵗中毋兵見貴人吉行不遇盜雨不雨霽小吉命曰載所以占病環有瘳無死繫者出求財物買臣妾馬牛請謁追亡人漁獵得行者行來者來擊盜相見不相合聞盜來來徙官徙居家室憂見貴人吉嵗孰民毋疾疫嵗中毋兵行不遇盜雨不雨霽霽吉命曰根格以占病者不死繫久毋傷求財物買臣妾馬牛請謁追亡人漁獵不得行不行來不來擊盜盜行不合聞盜不來徙官不徙居家室吉嵗稼中民疾疫無死見貴人不得見行不遇盜雨不雨大吉命曰首仰足肣外髙內下卜有憂無傷也行者不來病久死求財物不得見貴人者吉命曰外髙內下卜病不死有祟而市買不得居官家室不吉行者不行來者不來繫者久毋傷吉命曰頭見足發有內外相應以占病者起繫者出行者行來者來求財物得吉命曰呈兆首仰足開以占病病甚死繫者出有憂求財物買臣妾馬牛請謁追亡人漁獵不得行不行來不來擊盜不合聞盜來來徙官居官家室不吉嵗惡民疾疫無死嵗中毋兵見貴人不吉行不遇盜雨不雨霽不吉命曰呈兆首仰足開外髙內下以占病不死有外祟繫者出有憂求財物買臣妾馬牛相見不會行行來聞言不來擊盜勝聞盜來不來徙官居官家室見貴人不吉嵗中民疾疫有兵請謁追亡人漁獵不得聞盜遇盜雨不雨霽凶命曰首仰足肣身折內外相應以占病病甚不死繫者久不出求財物買臣妾馬牛漁獵不得行不行來不來擊盜有用勝聞盜來來徙宫不徙居官家室不吉嵗不孰民疾疫嵗中有兵不至見貴人喜請謁追亡人不得遇盜凶命曰內格外垂行者不行來者不來病者死繫者不出求財物不得見人不見大吉命曰橫吉內外相自橋榆仰上柱上柱足足肣以占病病甚不死繫久不抵罪求財物買臣妾馬牛請謁追亡人漁獵不得行不行來不來居官家室見貴人吉徙官不徙嵗不大孰民疾疫有兵有兵不會行遇盜聞言不見雨不雨霽霽大吉命曰頭仰足肣內外自隨卜憂病者甚不死居官不得居行者行來者不來求財物不得求人不得吉命曰橫吉下有柱卜來者來卜曰即不至未來卜病者過一日毋瘳死行者不行求財物不得繫者出命曰橫吉內外自舉以占病者久不死繫者久不出求財物得而少行者不行來者不來見貴人見吉命曰內髙外下疾輕足發求財物不得行者行病者有瘳繫者不出來者來見貴人不見吉命曰外格求財物不得行者不行來者不來繫者不出不吉病者死求財物不得見貴人見吉命曰內自舉外來正足發者行來者來求財物得病者久不死繫者不出見貴人見吉此橫吉上柱外內內自舉足肣以卜有求得病不死繫者毋傷未出行不行來不來見人不見百事盡吉此橫吉上柱外內自舉柱足以作以卜有求得病死環起繫留毋傷環出行不行來不來見人不見百事吉可以舉兵此挺詐有外以卜有求不得病不死數起繫禍罪聞言毋傷行不行來不來此挺詐有內以卜有求不得病有死數起留禍罪無傷繫出行不行來者不來見人不見此挺詐內外自舉以卜有求得病不死繫毋罪行行來來田賈市漁獵盡喜此狐狢以有卜求不得病死難起繫留毋罪難出可居宅可娶婦嫁女行不行來不來見人不見有憂不憂此狐徹以卜有求不得病者死繫留有抵罪行不行來不來見人不見言語定百事盡不吉此首俯足肣身節折以卜有求不得病者死留繫有罪望行者不來行不行來不來見人不見此挺內外自垂以卜有求不晦病不死難起繫留毋罪難出行不行來不來見人不見不吉此橫吉榆仰首俯以卜有求難得病難起不死繫難出毋傷也可居家室以娶婦嫁女此橫吉上柱載正身節折內外自舉以卜病者卜日不死其一日乃死此橫吉上柱足肣內自舉外自垂以卜病卜日不死其一日乃死為人病首俯足詐有外無內病者占龜未己急死卜輕失大一日不死首仰足肣以卜有求不得以繫有罪人言語恐之毋傷行不行見人不見大論曰外者人也內者自我也外者女也內者男也首俯者憂大者身也小者枝也大法病者足肣者生足開者死行者足開至足肣者不至行者足肣不行足開行有求足開得足肣者不得繫者足肣不出開出其卜病也足開而死者內髙而外下也史記集解卷一百二十八
