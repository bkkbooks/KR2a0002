body:
  text: 史記集解卷四十六宋裴駰撰史記四十六田敬仲完世家第十六陳完者陳厲公他之子也完生周太史過陳陳厲公使卜完卦得觀之否是為觀國之光利用賔於王此其代陳有國乎不在此而在異國乎非此其身也在其子孫若在異國必姜姓姜姓四嶽之後物莫能兩大陳衰此其昌乎厲公者陳文公少子也其母蔡女文公卒厲公兄鮑立是為桓公桓公與他異母及桓公病蔡人為他殺桓公鮑及太子免而立他為厲公厲公既立娶蔡女淫於蔡人數歸厲公亦數如蔡桓公之少子林怨厲公殺其父與兄乃令蔡人誘厲公而殺之林自立是為莊公故陳完不得立為陳大夫厲公之殺以淫出國故春秋曰蔡人殺陳他罪之也莊公卒立弟杵臼是為宣公宣公十一年殺其太子禦寇禦寇與完相愛恐禍及已完故奔齊齊桓公欲使為卿辭曰羈旅之臣幸得免負擔君之惠也不敢當髙位桓公使為工正齊懿仲欲妻完卜之占曰是為鳯皇于飛和鳴鏘鏘有媯之後將育于姜五世其昌竝于正卿八世之後莫之與京卒妻完完之奔齊齊桓公立十四年矣完卒諡為敬仲仲生稚孟夷敬仲之如齊以陳字為田氏徐廣曰應劭云始食菜地由是改姓田氏田稚孟夷生湣孟莊徐廣曰一作芷田湣孟莊生文子須無田文子事齊莊公晉之大夫欒逞作亂於晉來奔齊齊莊公厚客之晏嬰與田文子諫莊公弗聽文子卒生桓子無宇田桓子無宇有力事齊莊甚有寵無宇卒生武子開與釐子乞田釐子乞事齊景公為大夫其收賦稅於民以小斗受之其粟豫民以大斗行隂德於民而景公弗禁由此田氏得齊衆心宗族益彊民思田氏晏子數諫景公景公弗聽已而使於晉與叔向私語曰齊國之政其卒歸於田氏矣晏嬰卒後范中行氏反晉晉攻之急范中行請粟於齊田乞欲為亂樹黨於諸侯乃說景公曰范中行數有德於齊齊不可不救齊使田乞救之而輸之粟景公太子死後有寵姬曰芮子生子荼徐廣曰一作粥子景公病命其相國惠子與髙昭子以子荼為太子景公卒兩相髙國立荼是為晏孺子而田乞不說欲立景公他子陽生陽生素與乞歡晏孺子之立也陽生奔魯田乞僞事髙昭子國惠子者每朝代參乘言曰始諸大夫不欲立孺子孺子既立君相之大夫皆自危謀作亂又紿大夫曰髙昭子可畏也及未發先之諸大夫從之田乞鮑牧與大夫以兵入公室攻髙昭子昭子聞之與國惠子救公公師敗田乞之衆追國惠子惠子奔莒遂反殺髙昭子晏孺子奔魯田乞使人之魯迎陽生陽生至齊匿田乞家請諸大夫曰常之母有魚菽之祭幸而來會飲會飲田氏田乞盛陽生橐中置坐中央發橐出陽生曰此乃齊君矣大夫皆伏謁將盟立之田乞誣曰吾與鮑牧謀共立陽生也鮑牧怒曰大夫忘景公之命乎諸大夫欲悔陽生乃頓首曰可則立之不可則已鮑牧恐禍及己乃復曰皆景公之子何為不可遂立陽生於田乞之家是為悼公乃使人遷晏孺子於駘而殺孺子荼悼公既立田乞為相專齊政四年田乞卒子常代立是為田成子鮑牧與齊悼公有郤弒悼公齊人共立其子壬是為簡公田常成子與監正監一作闞俱為左右相相簡公田常心害監止監止幸於簡公權弗能去於是田常復修釐子之政以大斗出貸以小斗收齊人歌之曰嫗采芑歸乎田成子齊大夫朝御鞅諫簡公曰田監不可竝也君其擇焉君弗聽子我者監止之宗人也常與田氏有卻田氏疏族田豹事子我有寵子我曰吾欲盡滅田氏適以豹代田氏宗豹曰臣於田氏疏矣不聽已而豹謂田氏曰子我將誅田氏田氏弗先禍及矣子我舍公宫田常兄弟四人乘如公宫欲殺子我子我閉門簡公與婦人飲檀臺將欲擊田常太史子餘曰田常非敢為亂將除害簡公乃止田常出聞簡公怒恐誅將出亡田子行曰需事之賊也田常於是擊子我子我率其徒攻田氏不勝出亡田氏之徒追殺子我及監止簡公出奔田氏之徒追執簡公於徐州簡公曰蚤從御鞅之言不及此難田氏之徒恐簡公復立而誅已遂殺簡公簡公立四年而殺於是田常立簡公弟驁是為平公平公即位田常為相田常既殺簡公懼諸侯共誅已乃盡歸魯衛侵地西約晉韓魏趙氏南通吳越之使修功行賞親於百姓以故齊復定田常言於齊平公曰德施人之所欲君其行之刑罰人之所惡臣請行之行之五年齊國之政皆歸田常田常於是盡誅鮑晏監止及公族之強者而割齊自安平以東徐廣曰安平在北海至琅邪自為封邑封邑大於平公之所食田常乃選齊國中女子長七尺以上為後宫後宫以百數而使賔客舍人出入後宫者不禁及田常卒有七十餘男田常卒子襄子盤徐廣曰一作塈代立相齊常諡為成子田襄子既相齊宣公三晉殺知伯徐廣曰宣公之三年時也分其地襄子使其兄弟宗人盡為齊都邑大夫與三晉通使且以有齊國襄子卒子莊子白立田莊子相齊宣公宣公四十三年伐晉毁黃城圍陽狐明年伐魯葛及安陵明年取魯之一城莊子卒子太公和立田太公相齊宣公宣公四十八年取魯之郕明年宣公與鄭人會西城伐衛取毌丘宣公五十一年卒田會自廩丘反宣公卒子康公貸立徐廣曰十一年伐魯取最貸立十四年淫於酒婦人不聽政太公乃遷康公於海上食一城以奉其先祀明年魯敗齊平陸徐廣曰東平平陸三年太公與魏文侯會濁澤徐廣曰康公之十六年求為諸侯魏文侯乃使使言周天子及諸侯請立齊相田和為諸侯周天子許之康公之十九年田和立為齊侯列於周室紀元年齊侯太公和立二年和卒徐廣曰伐魯破之子桓公午立桓公午五年秦魏攻韓韓求救於齊齊桓公召大臣而謀曰蚤救之孰與晚救之騶忌曰不若勿救段干朋曰不救則韓且折而入於魏不若救之田臣思曰過矣君之謀也秦魏攻韓楚趙必救之是天以燕豫齊也桓公曰善乃隂告韓使者而遣之韓自以為得齊之救因與秦魏戰楚趙聞之果起兵而救之齊因起兵襲燕國取桑丘六年救衛桓公卒子威王因齊立是歲故齊康公卒絶無後奉邑皆入田氏齊威王元年三晉因齊喪來伐我靈丘三年三晉滅晉後而分其地六年魯伐我入陽關徐廣曰在巨平晉伐我至博陵七年衛伐我取薛陵九年趙伐我取甄威王初即位以來不治委政卿大夫九年之間諸侯竝伐國人不治於是威王召即墨大夫而語之曰自子之居即墨也毁言日至然吾使人視即墨田野闢民人給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫語曰自子之守阿譽言日聞然使使視阿田野不闢民貧苦昔日趙攻甄子弗能救衛取薛陵子弗知是子以幣厚吾左右以求譽也是日烹阿大夫及左右嘗譽者皆并烹之遂起兵西擊趙衛敗魏於濁澤而圍惠王惠王請獻觀以和解趙人歸我長城於是齊國震懼人人不敢飾非務盡其誠齊國大治諸侯聞之莫敢致兵於齊二十餘年騶忌子以鼓琴見威王威王說而舍之右室須臾王鼓琴騶忌子推户入曰善哉鼓琴王勃然不說去琴按劍曰夫子見容未察何以知其善也騶忌子曰夫大弦濁以春溫者君也小弦廉折以清者相也琴操曰大弦者君也寬和而溫小弦者臣也清廉而不亂攫之深徐廣曰以爪持也攫音已足反醳之愈者徐廣曰一作舒政令也鈞諧以鳴大小相益回邪而不相害者四時也吾是以知其善也王曰善語音騶忌子曰何獨語音夫治國家而弭人民皆在其中王又勃然不說曰若夫語五音之紀信未有如夫夫子者也若夫治國家而弭人民又何為乎絲桐之間騶忌子曰夫大弦濁以春溫者君也小弦廉折以清者相也攫之深而舍之愈者政令也鈞諧以鳴大小相益回邪而不相害者四時也夫復而不亂者所以治昌也連而徑者所以存亡也故曰琴音調而天下治夫治國家而弭人民者無若乎五音者王曰善騶忌子見三月而受相卬淳于髠見之曰善說哉髠有愚志願陳諸前騶忌子曰謹受教淳于髠曰得全全昌失全全亡騶忌子曰謹受令請謹毋離前淳于髠曰狶膏棘軸所以為滑也然而不能運方穿騶忌子曰謹受令請謹事左右淳于髠曰弓膠昔幹徐廣曰一作乾所以為合也然而不能傅合疏罅騶忌子曰謹受令請謹自附於萬民淳于髠曰狐裘雖敝不可補以黃狗之皮騶忌子曰謹受令請謹擇君子毋雜小人其間淳于髠曰大車不較不能載其常任琴瑟不較不能成其五音騶忌子曰謹受令請謹修法律而督姦吏淳于髠說畢趨出至門而面其僕曰是人者吾語之微言五其應我若響之應聲是人必封不久矣新序曰齊稷下先生喜議政事騶忌既為齊相稷下先生淳于髠之屬七十二人皆輕騶忌以為設以微辭騶忌必不能及乃相與俱往見騶忌淳于髠之徒禮踞騶忌之禮卑淳于髠等稱辭騶忌知之如應響淳于髠等辭絀而去騶忌之禮踞淳于髠之禮卑故所以尚干將莫耶者貴其立斷也所以尚騏驥者為其立至也必且厯日曠久則系氂能挈右駑馬亦能致逺是以聰明捷敏人之美材也居朞年封以下邳號曰成侯威王二十三年與趙王會平陸二十四年與魏王會田於郊魏王問曰王亦有寶乎威王曰無有梁王曰若寡人國小也尚有徑寸之珠照車前後各十二乘者十枚奈何以萬乘之國而無寶乎威王曰寡人之所以為寶與王異吾臣有檀子者使守南城則楚人不敢為寇東取泗上十二諸侯皆來朝吾臣有肹子者使守髙唐則趙人不敢東漁於河吾吏有黔夫者使守徐州則燕人祭北門趙人祭西門賈逵曰齊之北門西門也言燕趙之人畏見侵伐故祭以求福徙而從者七千餘家吾臣有種首者使備盜賊則道不拾遺將以照千里豈特十二乘哉梁惠王慙不懌而去二十六年魏惠王圍邯鄲趙求救於齊齊威王召大臣而謀曰救趙孰與勿救騶忌子曰不如勿救段干朋曰不救則不義且不利威王曰何也對曰夫魏氏并邯鄲其於齊何利哉且夫救趙而軍其郊是趙不伐而魏全也故不如南攻襄陵以弊魏邯鄲拔而乘魏之弊威王從其計其後成侯騶忌與田忌不善公孫閲謂成侯忌曰公何不謀伐魏田忌必將戰勝有功則公之謀中也戰不勝非前死則後北而命在公矣於是成侯言威王使田忌南攻襄陵十月邯鄲拔齊因起兵擊魏大敗之桂陵於是齊最強於諸侯自稱為王以令天下三十三年殺其大夫牟辛徐廣曰一作夫人三十五年公孫閲又謂成侯忌曰公何不令人操十金卜於市曰我田忌之人也吾三戰而三勝聲威天下欲為大事亦吉乎不吉乎卜者出因令人捕為之卜者驗其辭於王之所田忌聞之因遂率其徒襲攻臨淄求成侯不勝而奔三十六年威王卒子宣王辟彊立宣王元年秦用商鞅周致伯於秦孝公二年魏伐趙趙與韓親共擊魏趙不利戰於南梁宣王召田忌復故位韓氏請救於齊宣王召大臣而謀曰蚤救孰與晚救騶忌子曰不如勿救田忌曰弗救則韓且折而入於魏不如蚤救之孫子曰夫韓魏之兵未弊而救之是吾代韓受魏之兵顧反聽命於韓也且魏有破國之志韓見亡必東面而訴於齊矣吾因深結韓之親而晚承魏之弊則可重利而得尊名也宣王曰善乃隂告韓之使者而遣之韓因恃齊五戰不勝而東委國於齊齊因起兵使田忌田嬰將徐廣曰嬰一作朌孫子為帥救韓趙臣擊魏大敗之馬陵殺其將龐涓虜魏太子申其後三晉之王皆因田嬰朝齊王於博望盟而去徐廣曰表曰三年與趙㑹博望伐魏七年與魏王會平阿南明年復會甄魏惠王卒明年與魏襄王會徐州諸侯相王也十年楚圍我徐州十一年與魏伐趙趙決河水灌齊魏兵罷十八年秦惠王稱王宣王喜文學游說之士自如騶衍淳于髠田駢接子慎到環淵之徒七十六人皆賜列第為上大夫不治而議論是以齊稷下學士復盛且數百千人劉向别録曰齊有稷門城門也談說之士期㑹於稷下也十九年宣王卒子湣王地立湣王元年秦使張儀與諸侯執政會於齧桑三年封田嬰於薛四年迎婦於秦七年與宋攻魏敗之觀澤十二年攻魏楚圍雍氏徐廣曰在陽翟屬韓秦敗屈丐蘇代謂田軫曰臣願有謁於公其為事甚完使楚利公成為福不成亦為福今者臣立於門客有言曰魏王謂韓馮張儀曰徐廣曰韓之公仲侈也煮棗將拔徐廣曰在濟陰寃胊齊兵又進子來救寡人則可矣不救寡人寡人弗能拔此特轉辭也秦韓之兵毋東旬餘則魏氏轉韓從秦秦逐張儀交臂而事齊楚此公之事成也田軫曰奈何使無東對曰韓馮之救魏之辭必不謂韓王曰馮以為魏必曰馮將以秦韓之兵東却齊宋馮因摶徐廣曰音專專猶并合制領之謂也三國之兵乘屈丐之弊南割於楚故地必盡得之矣張儀救魏之辭必不謂秦王曰儀以為魏必曰儀且以秦韓之兵東距齊宋儀將搏三國之兵乘屈丐之弊南割於楚名存亡國實伐三川而歸此王業也公令楚王與韓氏地使秦制和謂秦王曰請與韓地而王以施三川韓氏之兵不用而得地於楚韓馮之東兵之辭且謂秦何曰秦兵不用而得三川伐楚韓以窘魏魏氏不敢東是孤齊也張儀之東兵之辭且謂何曰秦韓欲地而兵有案聲威發於魏魏氏之欲不失齊楚者有資矣魏氏轉秦韓爭事齊楚楚王欲而無與地徐廣曰楚王欲得魏來事已而不欲與韓地也公令秦韓之兵不用而得地有一大德也秦韓之王劫於韓馮張儀而東兵以徇服魏公常執左券以責於秦韓此其善於公而惡張子多資矣十三年秦惠王卒二十三年與秦擊敗楚於重丘徐廣曰表曰與秦擊楚使公子將大有功二十四年秦使涇陽君質於齊二十五年歸涇陽君於秦孟嘗君薛文入秦即相秦文亡去二十六年徐廣曰孟嘗君為相齊與韓魏共攻秦至函谷軍焉二十八年秦與韓河外以和兵罷二十九年趙殺其主父齊佐趙滅中山徐廣曰三十年田甲劫王相薛文走三十六年王為東帝秦昭王為西帝蘇代自燕來入齊見於章華東門左思齊都賦注曰齊小城北門也而此言東門不知為是一門非耶齊王曰噫善子來秦使魏冉致帝子以為何如對曰王之問臣也卒而患之所從來微願王受之而勿備稱也秦稱之天下安之王乃稱之無後也且讓爭帝名無傷也秦稱之天下惡之王因勿稱以收天下此大資也且天下立兩帝王以天下為尊齊乎尊秦乎王曰尊秦曰釋帝天下愛齊乎愛秦乎王曰愛齊而憎秦曰兩帝立約伐趙孰與伐桀宋之利宋世家云宋王偃諸侯皆曰桀宋也王曰伐桀宋利對曰夫約鈞然而秦為帝而天下獨尊秦而輕齊釋帝則天下愛齊而憎秦伐趙不如伐桀宋之利故願王明釋帝以收天下倍約賔秦無爭重而王以其間舉宋夫有宋衛之陽地危陽地濮陽之地有濟西趙之阿東國危有淮北楚之東國危有陶平陸梁門不開釋帝而貸之以伐桀宋之事國重而名尊燕楚所以形服天下莫敢不聽此湯武之舉也敬秦以為名而後使天下憎之此所謂以卑為尊者也願王孰慮之於是齊去帝復為王秦亦去帝位三十八年伐宋秦昭王怒曰吾愛宋與愛新城陽晉同韓聶與吾友也而攻吾所愛何也蘇代為齊謂秦王曰韓聶之攻宋所以為王也齊彊輔之以宋楚魏必恐恐必西事秦是王不煩一兵不傷一士無事而割安邑也此韓聶之所禱於王也秦王曰吾患齊之難知一從一衡其說何也對曰天下國令齊可知乎齊以攻宋其知事秦以萬乘之國自輔不西事秦則治宋不安中國白頭游敖之士皆積智欲離齊秦之交伏式結軼西馳者未有一人言善齊者也伏式結軼東馳者未有一人言善秦者也何則皆不欲齊秦之合也何晉楚之智而齊秦之愚也晉楚合必議齊秦齊秦合必圖晉楚請以此決事秦王曰諾於是齊遂伐宋宋王出亡死於溫齊南割楚之淮北西侵三晉欲以并周室為天子泗上諸侯鄒魯之君皆稱臣諸侯恐懼三十九年秦來伐拔我列城九四十年燕秦楚三晉合謀各出鋭師以伐敗我濟西徐廣曰案其餘諸傳無楚伐齊事年表云楚取淮北王解而却燕將樂毅遂入臨淄盡取齊之寶藏器湣王出亡之衛衛君辟宫舍之稱臣而共具湣王不遜衛人侵之湣王去走鄒魯有驕色鄒魯君弗內遂走莒楚使淖齒將兵救齊因相齊湣王淖齒遂殺湣王而與燕共分齊之侵地鹵器湣王之遇殺其子法章變名姓為莒太史敫徐廣曰音躍一音皎家庸太史敫女竒法章狀貌以為非恆人憐而常竊衣食之而與私通焉淖齒既以去莒莒中人及齊亡臣相聚求湣王子欲立之法章懼其誅己也久之乃敢自言我湣王子也於是莒人共立法章是為襄王以保莒城而布告齊國中王已立在莒矣襄王既立立太史氏女為王后是為君王后生子建太史敫曰女不取媒因自嫁非吾種也汗吾世終身不覩君王后君王后賢不以不覩故失人子之禮襄王在莒五年田單以即墨攻破燕軍迎襄王於莒入臨淄齊故地盡復屬齊齊封田單為安平君十四年秦擊我剛夀十九年襄王卒子建立王建立六年秦攻趙齊楚救之秦計曰齊楚救趙親則退兵不親遂攻之趙無食請粟於齊齊不聽周子曰不如聽之以退秦兵不聽則秦兵不却是秦之計中而齊楚之計過也且趙之於齊楚扞蔽也猶齒之有唇也唇亡則齒寒今日亡趙明日患及齊楚且救趙之務宜若奉漏甕沃焦釡也夫救趙髙義也却秦兵顯名也義救亡國威却彊秦之兵不務為此而務愛粟為國計者過矣齊王弗聽秦破趙於長平四十餘萬遂圍邯鄲十六年秦滅周君王后卒二十三年秦置東郡二十八年王入朝秦秦王政置酒咸陽三十五年秦滅韓三十七年秦滅趙三十八年燕使荆軻刺秦王秦王覺殺軻明年秦破燕燕王亡走遼東明年秦滅魏秦兵次於厯下四十二年秦滅楚明年虜代王嘉滅燕王喜四十四年秦兵擊齊齊王聽相后勝計不戰以兵降秦秦虜王建遷之共地理志河內有共縣遂滅齊為郡天下一并於秦秦王政立號為皇帝始君王后賢事秦謹與諸侯信齊亦東邉海上秦日夜攻三晉燕楚五國各自救於秦以故王建立四十餘年不受兵君王后死后勝相齊多受秦間金多使賔客入秦秦又多豫金客皆為反間勸王去從朝秦不修攻戰之備不助五國攻秦秦以故得滅五國五國已亡秦兵卒入臨淄民莫敢格者王建遂降遷於共故齊人恐王建不蚤與諸侯合從攻秦聽姦臣賔客以亡其國歌之曰松耶柏耶住建共者客耶徐廣曰戰國策曰秦處建於共松柏間也疾建用客之不詳也太史公曰蓋孔子晚而喜易易之為術幽明逺矣非通人達才孰能注意焉故周太史之卦田敬仲完占至十世之後及完奔齊懿仲卜之亦云田乞及常所以比犯二君專齊國之政非必事勢之漸然也蓋若遵厭兆祥云史記集解卷四十六
