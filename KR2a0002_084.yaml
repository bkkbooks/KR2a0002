body:
  text: 史記集解卷八十六宋裴駰撰史記八十六刺客列傳第二十六曹沬者魯人也以勇力事魯莊公莊公好力曹沫為魯將與齊戰三敗北魯莊公懼乃獻遂邑之地以和猶復以為將齊桓公許與魯會于柯而盟桓公與莊公旣盟於壇上曹沫執匕首劫齊桓公桓公左右莫敢動而問曰子將何欲曹沫曰齊强魯弱而大國侵魯亦以甚矣今魯城壞即壓齊境君其圖之桓公乃許盡歸魯之侵地旣已言曹沫投其匕首下壇北靣就羣臣之位顔色不變辭令如故桓公怒欲倍其約管仲曰不可夫貪小利以自快棄信於諸侯失天下之援不如與之於是桓公乃遂割魯侵地曹沬三戰所亡地盡復予魯其後百六十有七年而呉有專諸之事專諸者呉堂邑人也伍子胥之亡楚而如呉也知專諸之能伍子胥旣見呉王僚説以伐楚之利呉公子光曰彼伍員父兄皆死於楚而員言伐楚欲自為報私讎也非能為呉呉王乃止伍子胥知公子光之欲殺呉王僚乃曰彼光將有内志未可説以外事乃進專諸於公子光光之父曰呉王諸樊諸樊弟三人次曰餘祭次曰夷昧次曰季子札諸樊知季子札賢而不立太子以次傳三弟欲卒致國于季子札諸樊旣死傳餘祭餘祭死傳夷昧夷昧死當傳季子札季子札逃不肯立呉人乃立夷昧之子僚為王公子光曰使以兄弟次邪季子當立必以子乎則光真適嗣當立故嘗隂飬謀臣以求立光旣得專諸善客待之九年而楚平王死春呉王僚欲因楚䘮使其二弟公子葢餘屬庸將兵圍楚之潛使延陵季子於晉以觀諸侯之變楚發兵絶呉將葢餘屬庸路呉兵不得還於是公子光謂専諸曰此時不可失不求何獲且光真王嗣當立季子雖來不吾廢也專諸曰王僚可殺也母老子弱而兩弟將兵伐楚楚絶其後方今呉外困於楚而内空無骨鯁之臣是無如我何公子光頓首曰光之身子之身也四月丙子光伏甲士於窟室中徐廣曰一作空而具酒請王僚王僚使兵陳自宮至光之家門戸階陛左右皆王僚之親戚也夾立侍皆持長鈹音披酒旣酣公子光詳為足疾入窟室中使專諸置匕首魚炙之腹中徐廣曰炙一作炮而進之旣至王前專諸擘魚因以匕首刺王僚王僚立死左右亦殺專諸王人擾亂公子光出其伏甲以攻王僚之徒盡滅之遂自立為王是為闔閭闔閭乃封專諸之子以為上卿其後七十餘年而晉有豫讓之事徐廣曰闔閭元年至三晉滅智伯六十二年豫讓一作襄豫讓者晉人也故嘗事范中行氏而無所知名去而事智伯智伯甚尊寵之及智伯伐趙襄子趙襄子與韓魏合謀滅智伯滅智伯之後而三分其地趙襄子最怨智伯漆其頭以為飲器豫讓遁逃山中曰嗟乎士為知己者死女為說己者容今智伯知我我必為報讎而死以報智伯則吾魂魄不愧矣乃變名姓為刑人入宮塗厠中挾匕首欲以刺襄子襄子如厠心動執問塗厠之刑人則豫讓内持刀兵曰欲為智伯報仇左右欲誅之襄子曰彼義人也吾謹避之耳且智伯亡無後而其臣欲為報仇此天下之賢人也卒釋去之居頃之豫讓又漆身為厲音賴吞炭為啞使形狀不可知行乞於市其妻不識也行見其友其友識之曰汝非豫讓邪曰我是也其友為泣曰以子之才委質而臣事襄子襄子必近幸子近幸子乃為所欲顧不易邪何乃殘身苦形欲以求報襄子不亦難乎豫讓曰旣已委質臣事人而求殺之是懷二心以事其君也且吾所為者極難耳然所以為此者將以愧天下後世之為人臣懷二心以事其君者也旣去頃之襄子當出豫讓伏於所當過之橋下襄子至橋馬驚襄子曰此必是豫讓也使人問之果豫讓也於是襄子乃數豫讓曰子不嘗事范中行氏乎智伯盡滅之而子不為報讎而反委質臣於智伯智伯亦已死矣而子獨何以為之報讎之深也豫讓曰臣事范中行氏范中行氏皆衆人遇我我故衆人報之至於智伯國士遇我我故國士報之襄子喟然歎息而泣曰嗟乎豫子子之為智伯名旣成矣而寡人赦子亦已足矣子其自為計寡人不復釋子使兵圍之豫讓曰臣聞明主不掩人之美而忠臣有死名之義前君已寛赦臣天下莫不稱君之賢今日之事臣固伏誅然願請君之衣而擊之焉以致報讎之意則雖死不恨非所敢望也敢布腹心於是襄子大義之乃使使持衣與豫讓豫讓抜劒三躍而擊之曰吾可以下報智伯矣遂伏劒自殺死之日趙國志士聞之皆為涕泣其後四十餘年而軹有聶政之事自三晉滅智伯至殺俠累五十七年聶政者軹深井里人也殺人避仇與母姊如齊以屠為事久之濮陽嚴仲子事韓哀侯與韓相俠累有卻嚴仲子恐誅亡去游求人可以報俠累者至齊齊人或言聶政勇敢士也避仇隱於屠者之間嚴仲子至門請數反然後具酒自暢徐廣曰一作觴聶政母前酒酣嚴仲子奉黃金百溢前為聶政母夀聶政驚怪其厚固謝嚴仲子嚴仲子固進而聶政謝曰臣幸有老母家貧客游以為狗屠可以旦夕得甘毳此芮反以飬親親供飬備不敢當仲子之賜嚴仲子辟人因為聶政言曰臣有仇而行游諸侯衆矣然至齊竊聞足下義甚高故進百金者將用為夫人麤糲之費得以交足下之驩豈敢以有求望邪聶政曰臣所以降志辱身居市井屠者徒幸以飬老母老母在政身未敢以許人也嚴仲子固讓聶政竟不肯受也然嚴仲子卒備賓主之禮而去久之聶政母死旣已葬除服聶政曰嗟乎政乃市井之人鼓刀以屠而嚴仲子乃諸侯之卿相也不逺千里枉車騎而交臣臣之所以待之至淺鮮矣未有大功可以稱者而嚴仲子奉百金為親夀我雖不受然是者徒深知政也夫賢者以感忿睚眦之意而親信窮僻之人而政獨安得嘿然而已乎且前日要政政徒以老母老母今以天年終政將為知己者用乃遂西至濮陽見嚴仲子曰前日所以不許仲子者徒以親在今不幸而母以天年終仲子所欲報讎者為誰請得從事焉嚴仲子具告曰臣之仇韓相俠累俠累又韓君之季父也宗族盛多居處兵衛甚設臣欲使人刺之衆終莫能就今足下幸而不棄請益其車騎壯士可為足下輔翼者聶政曰韓之與衛相去中間不甚逺今殺人之相相又國君之親此其勢不可以多人多人不能無生得失生得失則語泄語泄是韓舉國而與仲子為讎徐廣曰一作難豈不殆哉遂謝車騎人徒聶政乃辭獨行杖劒至韓韓相俠累方坐府上持兵㦸而衛侍者甚衆聶政直入上階刺殺俠累徐廣曰韓烈侯三年三月盜殺韓相俠累俠累名傀戰國策曰有東孟之會又云聶政刺韓傀兼中哀侯左右大亂聶政大呼所擊殺者數十人因自皮靣決眼自屠出腸遂以死韓取聶政屍㬥於市購問莫知誰子於是韓購縣之有能言殺相俠累者予千金久之莫知也政姊榮一作嫈聞人有刺殺韓相者賊不得國不知其名姓㬥其尸而縣之千金乃於邑曰其是吾弟與嗟乎嚴仲子知吾弟立起如韓之市而死者果政也伏尸哭極哀曰是軹深井里所謂聶政者也市行者諸衆人皆曰此人㬥虐吾國相王縣購其名姓千金夫人不聞與何敢來識之也榮應之曰聞之然政所以䝉汙辱自棄於市販之間者為老母幸無恙妾未嫁也親旣以天年下世妾已嫁夫嚴仲子乃察舉吾弟困汚之中而交之澤厚矣可奈何士固為知己者死今乃以妾尚在之故重自刑以絶從徐廣曰恐其姊從坐而死妾其奈何畏殁身之誅終滅賢弟之名大驚韓市人乃大呼天者三卒於邑悲哀而死政之旁晉楚齊衛聞之皆曰非獨政能也乃其姊亦烈女也鄉使政誠知其姊無濡忍之志不重㬥骸之難必絶險千里以列其名姊弟俱僇於韓市者亦未必敢以身許嚴仲子也嚴仲子亦可謂知人能得士矣其後二百二十餘年秦有荆軻之事徐廣曰聶政至荆軻百七十年爾荆軻者衛人也其先乃齊人徙於衛衛人謂之慶卿而之燕燕人謂之荆卿荆卿好讀書擊劒呂氏劒技曰持短入長倐忽從橫以術說衛元君衛元君不用其後秦伐魏置東郡徙衛元君之支屬於野王荆軻嘗游過榆次與葢聶論劒葢聶怒而目之荆軻出人或言復召荆卿葢聶曰曩者吾與論劒有不稱者吾目之試往是宜去不敢留使使往之主人荆卿則已駕而去榆次矣使者還報葢聶曰固去也吾曩者目攝之荆軻游於邯鄲魯句踐與荆軻博爭道魯句踐怒而叱之荆軻嘿而逃去遂不復會荆軻旣至燕愛燕之狗屠及善擊筑者高漸離荆軻嗜酒日與狗屠及髙漸離飲於燕市酒酣以往高漸離擊筑荆軻和而歌於市中相樂也已而相泣旁若無人者荆軻雖游於酒人乎徐廣曰飲酒之人然其為人沈深好書其所游諸侯盡與其賢豪長者相結其之燕燕之處士田光先生亦善待之知其非庸人也居頃之會燕太子丹質秦亡歸燕燕太子丹者故嘗質於趙而秦王政生於趙其少時與丹驩及政立為秦王而丹質於秦秦王之遇燕太子丹不善故丹怨而亡歸歸而求為報秦王者國小力不能其後秦日出兵山東以伐齊楚三晉稍蠶食諸侯且至於燕燕君臣皆恐禍之至太子丹患之問其傳鞠武武對曰秦地徧天下威脅韓魏趙氏北有甘泉谷口之固南有涇渭之沃擅巴漢之饒右隴蜀之山左關殽之險民衆而士厲兵革有餘意有所出則長城之南易水以北未有所定也奈何以見陵之怨欲批白結反其逆鱗哉丹曰然則何由對曰請入圖之居有間秦將樊於期得罪於秦王亡之燕太子受而舍之鞠武諫曰不可夫以秦王之㬥而積怒於燕足為寒心又况聞樊將軍之所在乎是謂委肉當餓虎之蹊也禍必不振矣雖有管晏不能為之謀也願太子疾遣樊將軍入匈奴以滅口請西約三晉南連齊楚北購於單于其後廼可圖也太子曰太傅之計曠日彌久心惽然恐不能須臾且非獨於此也夫樊將軍窮困於天下歸身於丹丹終不以廹於彊秦而棄所哀憐之交置之匈奴是固丹命卒之時也願太傅更慮之鞠武曰夫行危欲求安造禍而求福計淺而怨深連結一人之後交不顧國家之大害此謂資怨而助禍矣夫以鴻毛燎於爐炭之上必無事矣且以鵰鷙之秦行怨㬥之怒豈足道哉燕有田光先生其為人知深而勇沈可與謀太子曰願因太傅而得交於田先生可乎鞠武曰敬諾出見田先生道太子願圖國事於先生也田光曰敬奉教乃造焉太子逢迎却行為導跪而蔽席徐廣曰蔽一作撥一作拔田光坐定左右無人太子避席而請曰燕秦不兩立願先生留意也田光曰臣聞騏驥盛壯之時一日而馳千里至其衰老駑馬先之今太子聞光盛壯之時不知臣精已消亡矣雖然光不敢以圖國事所善荆卿可使也太子曰願因先生得結交於荆卿可乎田光曰敬諾即起趨出太子送至門戒曰丹所報先生所言者國之大事也願先生勿泄也田光俛而笑曰諾僂行見荆卿曰光與子相善燕國莫不知今太子聞光壯盛之時不知吾形已不逮也幸而教之曰燕秦不兩立願先生留意也光竊不自外言足下於太子也願足下過太子於宮荆軻曰謹奉教田光曰吾聞之長者為行不使人疑之今太子告光曰所言者國之大事也願先生勿泄是太子疑光也夫為行而使人疑之非節俠也欲自殺以激荆卿曰願足下急過太子言光已死明不言也因遂自刎而死荆軻遂見太子言田光已死致光之言太子再拜而跪膝行流涕有頃而后言曰丹所以誡田先生毋言者欲以成大事之謀也今田先生以死明不言豈丹之心哉荆軻坐定太子避席頓首曰田先生不知丹之不肖使得至前敢有所道此天之所以哀燕而不棄其孤也今秦有貪利之心而欲不可足也非盡天下之地臣海内之王者其意不厭今秦已虜韓王盡納其地又舉兵南伐楚北臨趙王翦將數十萬之衆距漳鄴而李信出太原雲中趙不能支秦必入臣入臣則禍至燕燕小弱數困於兵今計舉國不足以當秦諸侯服秦莫敢合從丹之私計愚以為誠得天下之勇士使於秦闚以重利秦王貪其勢必得所願矣誠得劫秦王使悉反諸侯侵地若曹沬之與齊桓公則大善矣則不可因而刺殺之彼秦大將擅兵於外而内有亂則君臣相疑以其間諸侯得合從其破秦必矣此丹之上願而不知所委命唯荆卿留意焉久之荆軻曰此國之大事也臣駑下恐不足任使太子前頓首固請毋讓然後許諾於是尊荆卿為上卿舍上舍太子日造門下供太牢具異物間進車騎羙女恣荆軻所欲以順適其意久之荆軻未冇行意秦將王翦破趙虜趙王盡收入其地進兵北略地至燕南界太子恐懼乃請荆軻曰秦兵旦暮渡易水則雖欲長侍足下豈可得哉荆軻曰微太子言臣願謁之今行而毋信則秦未可親也夫樊將軍秦王購之金千斤邑萬家誠得樊將軍首與燕督亢之地圖徐廣曰方城縣有督亢亭駰案劉向别錄曰督亢膏腴之地奉獻秦王秦王必説見臣臣乃得有以報太子曰樊將軍窮困來歸丹丹不忍以己之私而傷長者之意願足下更慮之荆軻知太子不忍乃遂私見樊於期曰秦之遇將軍可謂深矣父母宗族皆為戮没今聞購將軍首金千斤邑萬家將奈何於期仰天大息流涕曰於期每念之常痛於骨髓顧計不知所出耳荆軻曰今有一言可以解燕國之患報將軍之仇者何如於期乃前曰為之奈何荆軻曰願得將軍之首以獻秦王秦王必喜而見臣臣左手把其袖右手椹其匈徐廣曰椹音張鴆反一作抗然則將軍之仇報而燕見陵之愧除矣將軍豈有意乎樊於期偏袒搤捥徐廣曰一作捾而進曰此臣之日夜切齒腐心也乃今得聞教遂自勁太子聞之馳往伏屍而哭極哀旣已不可奈何乃遂盛樊於期首函封之於是太子豫求天下之利匕首得趙人徐夫人匕首徐廣曰徐一作陳取之百金使工以藥焠之以試人血濡縷人無不立死者言以匕首試人人血出足以沾濡絲縷便立死也乃裝為遣荆卿燕國有勇士秦舞陽年十三殺人人不敢忤視乃令秦舞陽為副荆軻有所待欲與俱其人居逺未來而為治行頃之未發太子遲之疑其改悔乃復請曰日已盡矣荆卿豈有意哉丹請得先遣秦舞陽荆軻怒叱太子曰何太子之遣往而不反者豎子也且提一匕首入不測之彊秦僕所以留者待吾客與俱今太子遲之請辭決矣遂發太子及賓客知其事者皆白衣冠以送之至易水之上旣祖取道高漸離擊筑荆軻和而歌為變徵之聲士皆垂淚涕泣又前而為歌曰風蕭蕭兮易水寒壯士一去兮不復還復為羽聲忼慨士皆瞋目髮盡上指冠於是荆軻就車而去終已不顧遂至秦持千金之資幣物厚遺秦王寵臣中庶子䝉嘉嘉為先言於秦王曰燕王誠振怖大王之威不敢舉兵以逆軍吏願舉國為内臣比諸侯之列給貢職如郡縣而得奉守先王之宗廟恐懼不敢自陳謹斬樊於期之頭及獻燕督亢之地圖函封燕王拜送于庭使使以聞大王唯大王命之秦王聞之大喜乃朝服設九賓見燕使者咸陽宮荆軻奉樊於期頭函而秦舞陽奉地圖匣以次進至陛秦舞陽色變振恐羣臣怪之荆軻顧笑舞陽前謝曰北蕃蠻夷之鄙人未嘗見天子故振慴願大王少假借之使得畢使於前秦王謂軻曰取舞陽所持地圖軻旣取圖奏之秦王發圖圖窮而匕首見因左手把秦王之袖而右手持匕首揕之未至身秦王驚自引而起袖絶拔劒劒長操其室時惶急劒堅故不可立拔荆軻逐秦王秦王環柱而走羣臣皆愕卒起不意盡失其度而秦法羣臣侍殿上者不得持尺寸之兵諸郎中執兵皆陳殿下非有詔召不得上方急時不及召下兵以故荆軻乃逐秦王而卒惶急無以擊軻而以手共摶之是時侍醫夏無且以其所奉藥囊提荆軻也秦王方環柱走卒惶急不知所為左右乃曰王負劒負劒遂拔以擊荆軻斷其左股荆軻廢乃引其匕首以擿秦王不中中銅柱秦王復擊軻被八創軻自知事不就倚柱而笑箕踞以罵曰事所以不成者以欲生劫之必得約契以報太子也漢鹽鐵論曰荆軻懷數年之謀而事不就者尺八匕首不足恃也秦王操於不意列斷賁育者介七尺之利也於是左右旣前殺軻秦王不怡者良久已而論功賞羣臣及當坐者各有差而賜夏無且黃金二百溢曰無且愛我乃以藥囊提荆軻也於是秦王大怒益發兵詣趙詔王翦軍以伐燕十月而拔薊城燕王喜太子丹等盡率其精兵東保於遼東秦將李信追擊燕王急代王嘉乃遺燕王喜書曰秦所以尤追燕急者以太子丹故也今王誠殺丹獻之秦王秦王必解而社稷幸得血食其後李信追丹丹匿衍水中燕王乃使使斬太子丹欲獻之秦秦復進兵攻之後五年秦卒滅燕虜燕王喜其明年秦并天下立號為皇帝於是秦逐太子丹荆軻之客皆亡高漸離變名姓為人庸保匿作於宋子徐廣曰縣名也今屬鉅鹿久之作苦聞其家堂上客擊筑傍偟不能去每出言曰彼有善有不善從者以告其主曰彼庸乃知音竊言是非家丈人召使前擊筑一坐稱善賜酒而高漸離念久隱畏約無窮時乃退出其裝匣中筑與其善衣更容貎而前舉坐客皆驚下與抗禮以為上客使擊筑而歌客無不流涕而去者宋子傳客之徐廣曰互以為客聞於秦始皇秦始皇召見人有識者乃曰高漸離也秦皇帝惜其善擊筑重赦之乃矐海吝反其目使擊筑未嘗不稱善稍益近之高漸離乃以鈆置筑中復進得近舉筑扑秦皇帝不中於是遂誅高漸離終身不復近諸侯之人魯勾踐已聞荆軻之刺秦王私曰嗟乎惜哉其不講於刺劒之術也甚矣吾不知人也曩者吾叱之彼乃以我為非人也太史公曰世言荆軻其稱太子丹之命天雨粟馬生角也大過又言荆軻傷秦王皆非也始公孫季功董生與夏無且游具知其事為余道之如是自曹沬至荆軻五人此其義或成或不成然其立意較然不欺其志名垂後世豈妄也哉史記集解卷八十六
