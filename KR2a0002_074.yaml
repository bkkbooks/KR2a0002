body:
  text: 史記集解卷七十六宋裴駰撰史記七十六平原君虞卿列傳第十六平原君趙勝者趙之諸公子也徐廣曰魏公子傳曰趙惠文王弟諸子中勝最賢喜賓客賓客蓋至者數千人平原君相趙惠文王及孝成王三去相三復位封于東武城徐廣曰屬清河平原君家樓臨民家民家有躄者槃散亦作跚行汲平原君美人居樓上臨見大笑之明日躄者至平原君門請曰臣聞君之喜士士不逺千里而至者以君能貴士而賤妾也臣不幸有罷癃之病徐廣曰癃音隆癃病也而君之後宫臨而笑臣臣願得笑臣者頭平原君笑應曰諾躄者去平原君笑曰觀此豎子乃欲以一笑之故殺吾美人不亦甚乎終不殺居歲餘賓客門下舍人稍稍引去者過半平原君怪之曰勝所以待諸君者未嘗敢失禮而去者何多也門下一人前對曰以君之不殺笑躄者以君為愛色而賤士士即去耳於是平原君乃斬笑躄者美人頭自造門進躄者因謝焉其後門下乃復稍稍來是時齊有孟嘗魏有信陵楚有春申故爭相傾以待士徐廣曰待一作得秦之圍邯鄲趙使平原君求救合從於楚約與食客門下有勇力文武備具者二十人偕平原君曰使文能取勝則善矣文不能取勝則歃血於華屋之下必得定從而還士不外索取於食客門下足矣得十九人餘無可取者無以滿二十人門下有毛遂者前自贊於平原君曰遂聞君將合從於楚約與食客門下二十人偕不外索今少一人願君即以遂備員而行矣平原君曰先生處勝之門下幾年於此矣毛遂曰三年於此矣平原君曰夫賢士之處世也譬若錐之處囊中其末立見今先生處勝之門下三年於此矣左右未有所稱誦勝未有所聞是先生無所有也先生不能先生留毛遂曰臣乃今日請處囊中耳使遂蚤得處囊中乃穎脫而出非特其末見而已平原君竟與毛遂偕十九人相與目笑之而未發也毛遂比至楚與十九人論議十九人皆服平原君與楚合從言其利害日出而言之日中不決十九人人謂毛遂曰先生上毛遂按劒厯階而上謂平原君曰從之利害兩言而決耳今日出而言從日中不決何也楚王謂平原君曰客何為者也平原君曰是勝之舍人也楚王叱曰胡不下吾乃與而君言汝何為者也毛遂按劒而前曰王之所以叱遂者以楚國之衆也今十步之內王不得恃楚國之衆也王之命縣于遂手吾君在前叱者何也且遂聞湯以七十里之地王天下文王以百里之壤而臣諸侯豈其士卒衆多哉誠能據其勢而奮其威今楚地方五千里持戟百萬此霸王之資也以楚之強天下弗能當白起小豎子耳率數萬之衆興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王弗知惡焉合從者為楚非為趙也吾君在前叱者何也楚王曰唯唯誠若先生之言謹奉社稷而以從毛遂曰從定乎楚王曰定矣毛遂謂楚王之左右曰取雞狗馬之血來毛遂奉銅盤而跪進之楚王曰王當歃血而定從次者吾君次者遂遂定從于殿上毛遂左手持盤血而右手招十九人曰公相與歃此血于堂下公等録録音祿所謂因人成事者也平原君已定從而歸歸至于趙曰勝不敢復相士勝相士多者千人寡者百數自以為不失天下之士今乃于毛先生而失之也毛先生一至楚而使趙重于九鼎大吕毛先生以三寸之舌強于百萬之師勝不敢復相士遂以為上客平原君既返趙楚使春申君將兵赴救趙魏信陵君亦矯奪晉鄙軍往救趙皆未至秦急圍邯鄲邯鄲急且降平原君甚患之邯鄲傳舍吏子李同説平原君曰君不憂趙亡邪平原君曰趙亡則勝為虜何為不憂乎李同曰邯鄲之民炊骨易子而食可謂急矣而君之後宫以百數婢妾被綺縠餘粱肉而民褐衣不完糟粳不厭民困兵盡或剡木為矛矢而君器物鍾磬自若使秦破趙君安得有此使趙得全君何患無有今君誠能令夫人以下編于士卒之間分功而作家之所有盡散以饗士士方其危苦之時易德耳于是平原君從之得敢死之士三千人李同遂與三千人赴秦軍秦軍為之却三十里亦會楚魏救至秦兵遂罷邯鄲復存李同戰死封其父為李侯徐廣曰河內城臯有李城虞卿欲以信陵君之存邯鄲為平原君請封公孫龍聞之夜駕見平原君曰龍聞虞卿欲以信陵君之存邯鄲為君請封有之乎平原君曰然龍曰此甚不可且王舉君而相趙者非以君之智能為趙國無憂也割東武城而封君者非以君為有功也而以國人無勳乃以君為親戚故也君受相印不辭無能割地不言無功者亦自以為親戚故也今信陵君存邯鄲而請封是親戚受城而國人計功也徐廣曰一本是親戚受城而以國許人此甚不可且虞卿操其兩權事成操右劵以責事不成以虛名德君君必勿聽也平原君遂不聽虞卿平原君以趙孝成王十五年卒子孫代後竟與趙俱亡平原君厚待公孫龍公孫龍善為堅白之辨及鄒衍過趙言至道乃絀公孫龍劉向别録曰齊使鄒衍過趙平原君見公孫龍及其徒綦母子之屬論白馬非馬之辨以問鄒子鄒子曰不可彼天下之辨有五勝三至而辭正為天下辨者别殊類使不相害序異端使不相亂抒意通指明其所謂使人與知焉不務相迷也故勝者不失其所守不勝得其所求若是故辨可為也及至煩文以相假飾辭以相惇巧譬以相移引人聲使不得及其意如此害大道夫繳紛爭言而競後息不能無害君子坐皆稱善虞卿者遊説之士也躡蹻擔簦徐廣曰蹻草履也簦長柄笠音登笠有柄者謂之簦説趙孝成王一見賜黃金百鎰白璧一雙再見為趙上卿故號為虞卿譙周曰食邑于虞秦趙戰于長平趙不勝亡一都尉趙王召樓昌與虞卿曰軍戰不勝尉復死徐廣曰復一作係寡人使束甲而趨之何如樓昌曰無益也不如發重使為媾古后反求和曰媾虞卿曰昌言媾者以為不媾軍必破也而制媾者在秦且王之論秦也欲破趙之軍乎不邪王曰秦不遺餘力矣必且欲破趙軍虞卿曰王聽臣發使出重寶以附楚魏楚魏欲得王之重寶必內吾使趙使入楚魏秦必疑天下之合從且必恐如此則媾乃可為也趙王不聽與平陽君為媾發鄭朱入秦秦內之趙王召虞卿曰寡人使平陽君為媾于秦秦已內鄭朱矣卿以為奚如虞卿對曰王不得媾軍必破矣天下賀戰勝者皆在秦矣鄭朱貴人也入秦秦王與應侯必顯重以示天下楚魏以趙為媾必不救王秦知天下不救王則媾不可得而成也應侯果顯鄭朱以示天下賀戰勝者終不肯媾長平大敗遂圍邯鄲為天下笑秦既解邯鄲圍而趙王入朝使趙郝音釋徐廣曰一作赦約事于秦割六縣而媾虞卿謂趙王曰秦之攻王也倦而歸乎王以其力尚能進愛王而弗攻乎王曰秦之攻我也不遺餘力矣必以倦而歸也虞卿曰秦以其力攻其所不能取倦而歸王又以其力之所不能取以送之是助秦自攻也來年秦復攻王王無救矣王以虞卿之言告趙郝趙郝曰虞卿誠能盡秦力之所至乎誠知秦力之所不能進此彈丸之地弗豫令秦來年復攻王王得無割其內而媾乎王曰請聽子割矣子能必使來年秦之不復攻我乎趙郝對曰此非臣之所敢任也他日三晉之交于秦相善也今秦善韓魏而攻王王之所以事秦必不如韓魏也今臣為足下解負親之攻開關通幣齊交韓魏至來年而王獨取攻于秦此王之所以事秦必在韓魏之後也此非臣之所敢任也王以告虞卿虞卿對曰郝言不媾來年秦復攻王王得無割其內而媾乎今媾郝又以不能必秦之不復攻也今雖割六城何益來年復攻又割其力之所不能取而媾此自盡之術也不如無媾秦雖善攻不能取六縣趙雖不能守終不失六城秦倦而歸兵必罷我以六城收天下以攻罷秦是我失之于天下而取償于秦也吾國尚利孰與坐而割地自弱以強秦哉今郝曰秦善韓魏而攻趙者必以為韓魏不救趙也而王之軍必孤有以王之事秦不如韓魏也是使王歲以六城事秦也即坐而城盡來年秦復求割地王將與之乎弗與是棄前功而挑秦禍也與之則無地而給之語曰強者善攻弱者不能守今坐而聽秦秦兵不弊而多得地是強秦而弱趙也以益強之秦而割愈弱之趙其計故不止矣且王之地有盡而秦之求無已以有盡之地而給無已之求其勢必無趙矣趙王計未定樓緩從秦來趙王與樓緩計之曰豫秦地何如毋豫孰吉緩辭讓曰此非臣之所能知也王曰雖然試言公之私樓緩對曰王亦聞夫公甫文伯母乎公甫文伯仕于魯病死女子為自殺于房中者二人其母聞之弗哭也其相室曰焉有子死而弗哭者乎其母曰孔子賢人也逐于魯而是人不隨也今死而婦人為之自殺者二人若是者必其于長者薄而于婦人厚也故從母言之是為賢毋從妻言之是必不免為妬妻故其言一也言者異則人心變矣今臣新從秦來而言勿豫則非計也言豫之恐王以臣為為秦也故不敢對使臣得為大王計不如豫之王曰諾虞卿聞之入見王曰此飾説也王眘徐廣曰音慎勿豫樓緩聞之往見王王又以虞卿之言告樓緩樓緩對曰不然虞卿得其一不得其二夫秦趙構難而天下皆説何也曰吾且因強而乘弱矣今趙兵困于秦天下之賀戰勝者則必盡在于秦矣故不如亟割地為和以疑天下而慰秦之心不然天下將因秦之強怒乘趙之弊瓜分之趙且亡何秦之圖乎故曰虞卿得其一不得其二願王以此決之勿復計也虞卿聞之往見王曰危哉樓子之所以為秦者是愈疑天下而何慰秦之心哉獨不言其示天下弱乎且臣言勿豫者非固勿豫而已也秦索六城于王而王以六城賂齊齊秦之深讐也得王之六城并力西擊秦齊之聽王不待辭之畢也則是王失之于齊而取償于秦也而齊趙之深讐可以報矣而示天下有能為也王以此發聲兵未窺于境臣見秦之重賂至趙而反媾于王也從秦為媾韓魏聞之必盡重王重王必出重寶以先于王則是王一舉而結三國之親而與秦易道也趙王曰善則使虞卿東見齊王與之謀秦虞卿未返秦使者已在趙矣樓緩聞之亡去趙于是封虞卿以一城居頃之而魏請為從趙孝成王召虞卿謀過平原君平原君曰願卿之論從也虞卿入見王王曰魏請為從對曰魏過光臥反王曰寡人固未之許對曰王過王曰魏請從卿曰魏過寡人未之許又曰寡人過然則從終不可乎對曰臣聞小國之與大國從事也有利則大國受其福有敗則小國受其禍今魏以小國請其禍而王以大國辭其福臣故曰王過魏亦過竊以為從便王曰善乃合魏為從虞卿既以魏齊之故不重萬户侯卿相之印與魏齊間行卒去趙困于梁魏齊已死不得意乃著書上採春秋下觀近世曰節義稱號揣摩政謀凡八篇以刺譏國家得失世傳之曰虞氏春秋太史公曰平原君翩翩濁世之佳公子也然未睹大體鄙語曰利令智昏平原君貪馮亭邪説使趙陷長平兵四十餘萬衆邯鄲幾亡譙周曰長平之陷乃趙王信間易將之咎何怨平原受馮亭哉虞卿料事揣情為趙畫策何其工也及不忍魏齊卒困于大梁庸夫且知其不可况賢人乎然虞卿非窮愁亦不能著書以自見于後世云史記集解卷七十六
