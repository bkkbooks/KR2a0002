body:
  text: 史記集解卷一百十宋裴駰撰史記一百十胸奴列傳第五十胸奴其先祖夏后氏之苗裔也曰淳維漢書音義曰胸奴始祖唐虞以上有山戎獫狁葷粥晉灼曰堯時曰葷粥周曰獫狁秦曰胸奴居于北蠻隨畜牧而轉移其畜之所多則馬牛羊其竒畜則槖駝驢騾駃騠徐廣曰北狄駿馬騊駼徐廣曰似馬而青驒騱徐廣曰音顛巨虛之屬逐水草遷徙母城郭常處耕田之業然亦各有分地毋文書以言語為約束兒能騎羊引弓射鳥鼠少長則射狐兔用為食士力能彎弓盡為甲騎其俗寬則隨畜因射獵禽獸為生業急則人習戰攻以侵伐其天性也其長兵則弓矢短兵則刀鋋韋昭曰鋋形似矛鐵柄音時年反利則進不利則退不羞遁走茍利所在不知禮義自君王以下咸食畜肉衣其皮革被旃裘壯者食肥美老者食其餘貴壯健賤老弱父死妻其後母兄弟死皆取其妻妻之其俗有名不諱而無姓字漢書曰單于姓攣鞮氏夏道衰而公劉失其稷官徐廣曰后稷之曽孫變于西戎邑于豳其後三百有餘嵗戎狄攻太王亶父徐廣曰公劉九世孫亶父亡走岐下而豳人悉從亶父而邑焉作周其後百有餘嵗周西伯昌伐畎夷氏後十有餘年武王伐紂而營雒邑復居于酆鄗放逐戎夷涇洛之北以時入貢命曰荒服其後二百有餘年周道衰而穆王伐大戎得四白狼四白鹿以歸自是之後荒服不至於是周遂作甫刑之辟穆王之後二百有餘年周幽王用寵姬褒姒之故與申后有郤申侯怒而與犬戎共攻殺周幽王于驪山之下韋昭曰戎後來居此山故號曰驪戎遂取周之焦穫而居于涇渭之間侵暴中國秦襄公救周於是周平王去酆鄗而東徙雒邑當是之時秦襄公伐戎至岐始列為諸侯是後六十有五年而山戎越燕而伐齊齊釐公與戰于齊郊其後四十四年而山戎伐燕燕告急于齊齊桓公北伐山戎山戎走其後二十有餘年而戎狄至洛邑伐周襄王襄王奔于鄭之汜邑初周襄王欲伐鄭故娶戎狄女為后與戎狄兵共伐鄭已而黜狄后狄后怨而襄王後母曰惠后有子子帶欲立之於是惠后與狄后子帶為內應開戎狄戎狄以故得入破逐周襄王而立子帶為天子於是戎狄或居于陸渾徐廣曰一為陸邑東至於衛侵盜暴虐中國中國疾之故詩人歌之曰戎狄是膺薄伐獫狁至於太原毛詩傳曰言逐出之而已出輿彭彭城彼朔方毛詩傳曰彭彭四馬貌朔方北方周襄王既居外四年乃使使告急于晉晉文公初立欲修霸業乃興師伐逐戎翟誅子帶迎內周襄王居于雒邑當是之時秦晉為強國晉文攘戎翟居于西河圁洛之間徐廣曰圁在西河音銀洛在上郡馮翊間號曰赤翟白翟秦穆公得由余西戎八國服于秦故自隴以西有綿諸緄戎翟獂徐廣曰在天水獂音丸之戎岐梁山涇漆之北有義渠大荔徐廣曰後更名臨晉在馮翊烏氏徐廣曰在安定朐衍徐廣曰在北地朐音項之戎而晉北有林胡樓煩之戎燕北有東胡山戎漢書音義曰烏丸或云鮮卑各分散居溪谷自有君長往往而聚者百有餘戎然莫能相一自是之後百有餘年晉悼公使魏絳和戎翟戎翟朝晉後百有餘年趙襄子踰句注音鈎山名在鴈門而破并代以臨胡貉其後既與韓魏共滅智伯分晉地而有之則趙有代句注之北魏有河西上郡以與戎界邉其後義渠之戎築城郭以自守而秦稍𧖟食至於惠王遂拔義渠二十五城惠王擊魏魏盡入西河及上郡於秦秦昭王時義渠戎王與宣太后服虔曰昭王母也亂有二子宣太后詐而殺義渠戎王於甘泉遂起兵伐滅義渠於是秦有隴西北地上郡築長城以拒胡而趙武靈王亦變俗胡服習騎射北破林胡樓煩築長城自代並音白浪反隂山下至髙闕為塞徐廣曰在朔方而置雲中鴈門代郡其後燕有賢將秦開為質於胡胡甚信之歸而襲破走東胡東胡郤千餘里與荆軻刺秦王秦舞陽者開之孫也燕亦築長城自造陽韋昭曰地名在上谷至襄平置上谷漁陽右北平遼西遼東郡以拒胡當是之時冠帶戰國七而三國邉於胸奴其後趙將李牧時胸奴不敢入趙邉後秦滅六國而始皇帝使蒙恬將十萬之衆北擊胡悉收河南地因河為塞築四十四縣城臨河徙適音丁革反戍以充之而通直道自九原至雲陽因邉山險塹溪谷可繕者治之起臨洮至遼東萬餘里又度河據陽山北假中北假北方田官主以田假與貧人故云北假當是之時東胡強而月氏盛胸奴單于漢書音義曰單于者廣大之貌言其象天單于然曰頭曼韋昭曰音瞞頭曼不勝秦北徙十餘年而蒙恬死諸侯畔秦中國擾亂諸秦所徙適戍邊者皆復去於是胸奴得寬復稍度河南與中國界於故塞單于有太子名冒頓後有所愛閼氏生少子而單于欲廢冒頓而立少子乃使冒頓質於月氏冒頓既質於月氏而頭曼急擊月氏月氏欲殺冒頓冒頓盜其善馬騎之亡歸頭曼以為壯令將萬騎冒頓乃作為鳴鏑漢書音義曰鏑箭也如今鳴箭也韋昭曰矢鏑飛則鳴習勒其騎射令曰鳴鏑所射而不悉射者斬之行獵鳥獸有不射鳴鏑所射者輒斬之已而冒頓以鳴鏑自射其善馬左右或不敢射者冒頓立斬不射善馬者居頃之復以鳴鏑自射其愛妻左右或頗恐不敢射冒頓又復斬之居頃之冒頓出獵以鳴鏑射單于善馬左右皆射之於是冒頓知其左右皆可用從其父單于頭曼獵以鳴鏑射頭曼其左右亦皆隨鳴鏑而射殺單于頭曼遂盡誅其後母與弟及大臣不聽從者冒頓自立為單于冒頓既立徐廣曰秦二世元年壬辰嵗立是時東胡強盛聞冒頓殺父自立乃使使謂冒頓欲得頭曼時有千里馬冒頓問羣臣羣臣皆曰千里馬胸奴寶馬也勿與冒頓曰奈何與人鄰國而愛一馬乎遂與之千里馬居頃之東胡以為冒頓畏之乃使使謂冒頓欲得單于一閼氏冒頓復問左右左右皆怒曰東胡無道乃求閼氏請擊之冒頓曰奈何與人鄰國愛一女子乎遂取所愛閼氏豫東胡東胡王愈益驕西侵與胸奴間中有棄地莫唐千餘里各居其邉為甌脫韋昭曰界上屯守處東胡使使謂冒頓曰胸奴所與我界甌脫外棄地胸奴非能至也吾欲有之冒頓問羣臣羣臣或曰此棄地與之亦可勿與亦可於是冒頓大怒曰地者國之本也奈何子之諸言豫之者皆斬之冒頓上馬令國中有後者斬遂東襲擊東胡東胡初輕冒頓不為備及冒頓以兵至擊大破滅東胡王而虜其民人及畜産既歸西擊走月氏南并樓煩白羊河南王侵燕代悉復收秦所使蒙恬所奪胸奴地者與漢關故河南塞至朝那膚施徐廣曰在上郡遂侵燕代是時漢兵與項羽相距中國罷於兵革以故冒頓得自強控弦之士三十餘萬自淳維以至頭曼千有餘嵗時大時小别散分離尚矣其世傳不可得而次云然至冒頓而胸奴最強大盡服從北夷而南與中國為敵國其世傳國官號乃可得而記云置左右賢王左右谷蠡王服虔云音鹿離左右大將左右大都尉左右大當戶左右骨都侯骨都異姓大臣胸奴謂賢曰屠耆徐廣曰屠一作諸故常以太子為左屠耆王自左右賢王以下至當戶大者萬騎小者數千凡二十四長立號曰萬騎諸大臣皆世官呼衍氏呼衍氏須卜氏常與單于婚姻蘭氏其後有須卜氏須卜氏主獄訟此三姓其貴種也諸左方王將居東方直上谷以往者東接穢貉朝鮮右方王將居西方直上郡以西接月氏氐羌而單于之庭直代雲中各有分地逐水草移徙而左右賢王左右谷蠡王最為大國左右骨都侯輔政諸二十四長亦各自置千長百長什長裨小王相封徐廣曰一作將都尉當戶且渠之屬嵗正月諸長小會單于庭祠五月大會籠城祭其先天地鬼神秋馬肥大會蹛林漢書音義曰胸奴秋社八月中皆會祭處蹛音帶課校人畜計其法拔刃尺者死坐盜者沒入其家有罪小者軋漢書音義曰刃刻其面大者死獄久者不過十日一國之凶不過數人而單于朝出營拜日之始生夕拜月其坐長左而北鄉日上戊巳其送死有棺槨金銀衣裘而無封樹喪服張華曰胸奴名冢曰逗落近幸臣妾從死者多至數十百人舉事而候星月月盛壯則攻戰月虧則退兵其攻戰斬首虜賜一巵酒而所得鹵獲因以豫之得人以為奴婢故其戰人人自為趣利善為誘兵以冒敵故其見敵則逐利如鳥之集其困敗則瓦解雲散矣戰而扶輿死者盡得死者家財後北服渾庾屈射丁靈鬲昆薪犂之國於是胸奴貴人大臣皆服以冒頓單于為賢是時漢初定中國徙韓王信於代都馬邑胸奴大攻圍馬邑韓王信降胸奴胸奴得信因引兵南踰句注攻太原至晉陽下髙帝自將兵往擊之會冬大寒雨雪卒之墮指者十二三於是冒頓佯敗走誘漢兵漢兵逐擊冒頓冒頓匿其精兵見其羸弱於是漢悉兵多步兵三十二萬北逐之髙帝先至平城徐廣曰在鴈門步兵未盡到冒頓縱精兵四十萬騎圍髙帝於白登七日漢兵中外不得相救餉胸奴騎其西方盡白馬東方盡青駹馬北方盡烏驪馬南方盡騂馬髙帝乃使使間厚遺閼氏閼氏乃謂冒頓曰兩主不相困今得漢地而單于終非能居之也且漢王亦有神單于察之冒頓與韓王信之將王黃趙利期而黃利兵又不來疑其與漢有謀亦取閼氏之言乃解圍之一角於是髙帝令士皆持滿傅矢外鄉從解角直出竟與大軍合而冒頓遂引兵而去漢亦引兵而罷使劉敬結和親之約是後韓王信為胸奴將及趙利王黃等數倍約侵盜代雲中居無幾何陳豨反又與韓信合謀擊代漢使樊噲往擊之復拔代鴈門雲中郡縣不出塞是時胸奴以漢將衆往降故冒頓常往來侵盜代地於是漢患之髙帝乃使劉敬奉宗室女公主為單于閼氏嵗奉胸奴絮繒酒米食物各有數約為昆弟以和親冒頓乃少止後燕王盧綰反率其黨數千人降胸奴往來苦上谷以東髙祖崩孝惠吕太后時漢初定故胸奴以驕冒頓乃為書遺髙后妄言髙后欲擊之諸將曰以髙帝賢武然尚困於平城於是髙后乃止復與胸奴和親至孝文帝初立復修和親之事其三年五月胸奴右賢王入居河南地侵盜上郡葆塞蠻夷殺略人民於是孝文帝詔丞相灌嬰發車騎八萬五千詣髙奴擊右賢王右賢王走出塞文帝幸太原是時濟北王反文帝歸罷丞相擊胡之兵其明年單于遺漢書曰天所立胸奴大單于敬問皇帝無恙前時皇帝言和親事稱書意合歡漢邉吏侵侮右賢王右賢王不請聽後義盧侯難氏等計與漢吏相距絶二主之約離兄弟之親皇帝讓書再至發使以書報不來漢使不至漢以其故不和鄰國不附今以小吏之敗約故罰右賢王使之西求月氏擊之以天之福吏卒良馬強力以夷滅月氏盡斬殺降下之定樓蘭徐廣曰一云樓湟烏孫呼揭音桀及其旁二十六國皆以為胸奴諸引弓之民并為一家北州已定願寢兵休士卒養馬除前事復故約以安邉民以應始古使少者得成其長老者安其處世世平樂未得皇帝之志也故使郎中係呼音大胡反淺奉書請獻槖他一匹騎馬二匹駕二駟皇帝即不欲胸奴近塞則且詔吏民遠舍使者至即遣之以六月中來薪望之地漢書音義曰塞下地名書至漢議擊與和親孰便公卿皆曰單于新破月氏乘勝不可擊且得胸奴地澤鹵非可居也和親甚便漢詐之孝文皇帝前六年漢遺胸奴書曰皇帝敬問胸奴大單于無恙使郎中係呼淺遺朕書曰右賢王不請聽後義盧侯難氏等計絶二主之約離兄弟之親漢以故不和鄰國不附今以小吏敗約故罰石賢王使西擊月氏盡定之願寢兵休士卒養馬除前事復故約以安邉民使少者得成其長老者安其處世世平樂朕甚嘉之此古聖主之意也漢與胸奴約為兄弟所以遺單于甚厚倍約離兄弟之親者常在胸奴然右賢王事已在赦前單于勿深誅單于若稱書意明告諸吏使無負約有信敬如單于書使者言單于自將伐國有功甚苦兵事服繡夾綺衣繡夾長襦徐廣曰一本無夾字錦夾袍各一比余一徐廣曰或作疏比也黃金飾具帶一漢書音義曰要巾大帶黃金胥紕一徐廣曰或作犀毗而無一字繡十匹錦三十匹赤綈緑繒各四十匹使中大夫意謁者令肩遺單于後頃之冒頓死子稽粥立號曰老上單于老上稽粥單于初立徐廣曰一云稽粥第二單于自後皆以第别之孝文皇帝復遣宗室女公主為單于閼氏使宦者燕人中行説傅公主説不欲行漢強使之説曰必我行也為漢患者中行説既至因降單于單于甚親幸之初胸奴好漢繒絮食物中行説曰胸奴人衆不能當漢之一郡然所以強者以衣食異無仰於漢也今單于變俗好漢物漢物不過什二則胸奴盡歸於漢矣韋昭曰言漢物什中之一入胸奴胸奴則動心歸漢矣其得漢繒絮以馳草棘中衣袴皆裂敝以示不如旃裘之完善也得漢食物皆去之以示不如湩酪湩乳汁也音都奉反之便美也於是説教單于左右疏記以計課其人衆畜物漢遺單于書牘以尺一寸辭曰皇帝敬問胸奴大單于無恙所遺物及言語云云中行説令單于遺漢書以尺二寸牘及印封皆令廣大長倨傲其辭曰天地所生日月所照胸奴大單于敬問漢皇帝無恙所以遺物言語亦云云漢使或言曰胸奴俗賤老中行説窮漢使曰而漢俗屯戌從軍當發者其老親豈有不自脫溫厚肥美以齎送飲食行戌乎漢使曰然中行説曰胸奴明以戰攻為事其老弱不能鬬故以其肥美飲食壯健者蓋以自為守衛如此父子各得久相保何以言胸奴輕老也漢使曰胸奴父子乃同穹廬而卧漢書音義曰穹廬旃帳父死妻其後母兄弟死盡取其妻妻之無冠帶之飾闕庭之禮中行説曰胸奴之俗人食畜肉飲其汁衣其皮畜食草飲水隨時轉移故其急則人習騎射寬則人樂無事其約束輕易行也君臣簡易一國之政猶一身也父子兄弟死取其妻妻之惡種姓之失也故胸奴雖亂必立宗種今中國雖詳不取其父兄之妻親屬益疏則相殺至乃易姓皆從此類且禮義之敝上下交怨望而室屋之極生力必屈夫力耕桑以求衣食築城郭以自備故其民急則不習戰攻緩則罷於作業嗟土室之人顧無多辭令喋喋喋音謀利口也而占占占音昌占反衣裳貌冠固何當言雖復著冠固何當所益自是之後漢使欲辨論者中行説輒曰漢使無多言顧漢所輸胸奴繒絮米蘖令其量中必善美而已矣何以為言乎且所給備善則已不備苦惡韋昭曰苦粗也音若靡盬之盬則候秋孰以騎馳蹂而稼穡耳徐廣曰蹂音而九反日夜教單于候利害處漢孝文皇帝十四年胸奴單十四萬騎入朝那蕭關殺北地都尉卬徐廣曰姓孫其子單封為瓶侯白丁反虜人民畜産甚多遂至彭陽徐廣曰柱安定使奇兵入燒回中宫候騎至雍甘泉於是文帝以中尉周召郎中令張武為將軍發車千乘騎十萬軍長安旁以備胡寇而拜昌侯盧卿為上郡將軍寧侯魏遫為北地將軍隆慮侯周竈為隴西將軍東陽侯張相如為大將軍成侯董赤為前將軍大發車騎往擊胡徐廣曰內史欒布亦為將軍單于留塞內月餘乃去漢逐出塞即還不能有所殺胸奴日已驕歲入邊殺略人民畜産甚多雲中遼東最甚至代郡萬餘人漢患之乃使使遺胸奴書單于亦使當户報謝復言和親事孝文帝後二年使使遺胸奴書曰皇帝敬問胸奴大單于無恙使當戶且居雕渠難郎中韓遼遺朕馬二匹已至敬受先帝制長城以北引弓之國受命單于長城以內冠帶之室朕亦制之使萬民耕織射獵衣食父子無離臣主相安俱無暴逆今聞泄惡民貪降其進取之利倍義絶約亡萬民之命離兩主之歡然其事已在前矣書曰二主已和親兩主歡説寢兵休卒養馬世世昌樂闟然更始徐廣曰闟音掄安定意也朕甚嘉之聖人者日新改作更始使老者得息幼者得長各保其首領而終其天年朕與單于俱由此道順天恤民世世相傳施之無窮天下莫不咸便漢與胸奴鄰敵之國胸奴處北地寒殺氣早降故詔吏遺單于􅐕蘖金帛絲絮他物嵗有數今天下大安萬民熙熙朕與單于為之父母朕追念前事薄物細故謀臣計失皆不足以離兄弟之歡朕聞天不頗覆地不偏載朕與單于皆捐往細故俱蹈大道墮壞前惡以圖長久使兩國之民若一家子元元萬民下及魚鱉上及飛鳥跂行喙息蠕動之類莫不就安利而辟危殆故來者不止天之道也俱去前事朕釋逃虜民單于無言章尼等朕聞古之帝王約分明而無食言單于留志天下大安和親之後漢過不先單于其察之單于既約和親於是制詔御史曰胸奴大單于遺朕書言和親已定亡人不足以益衆廣地胸奴無入塞漢無出塞犯今約者殺之可以久親後無咎俱便朕已許之其布告天下使明知之後四嵗老上稽粥單于死子軍臣立為單于既立徐廣曰後元二年立孝文皇帝復與胸奴和親而中行説復事之軍臣單于立四嵗徐廣曰孝文後元七年崩而二年答單于書其間五年而此云後四年又立四嵗數不云爾也孝文後六年冬胸奴入上郡雲中也胸奴復絶和親大入上郡雲中各三萬騎所殺略甚衆而去於是漢使三將軍軍屯北地代屯句注趙屯飛狐口緣邉亦各堅守以備胡寇又置三將軍軍長安西細栁渭北棘門霸上以備胡胡騎入代句注邉烽火通於甘泉長安數月漢兵至邉胸奴亦去逺塞漢兵亦罷後嵗餘孝文帝崩孝景帝立而趙王遂乃隂使人於胸奴吳楚反欲與趙合謀入邉漢圍破趙胸奴亦止自是之後孝景帝復與胸奴和親通關市給遺胸奴遣公主如故約終孝景帝時時小入盜邉無大寇今帝即位明和親約束厚遇通關市饒給之胸奴自單于以下皆親漢往來長城下漢使馬邑下人聶翕一姧音干蘭于蘭犯禁私出物也出物與胸奴交漢書音義曰私出塞與胸奴交市詳為賣馬邑城以誘單于單于信之而貪馬邑財物乃以十萬騎入武州塞漢伏兵三十餘萬馬邑旁御史大夫韓安國為護軍護四將軍以伏單于單于既入漢塞未至馬邑百餘里見畜布野而無人牧者怪之乃攻亭是時鴈門尉史行徼見寇葆此亭知漢兵謀單于得欲殺之徐廣曰一云乃下具告單于尉史乃告單于漢兵所居單于大驚曰吾固疑之乃引兵還出曰吾得尉史天也天使若言以尉史為天王漢兵約單于入馬邑而縱單于不至以故漢兵無所得漢將軍王恢部出代擊胡輜重聞單于還兵多不敢出漢以恢本造兵謀而不進斬恢韓長孺傳曰恢自殺自是之後胸奴絶和親攻當路塞往往入盜於漢邉不可勝數然胸奴貪尚樂關市嗜漢財物漢亦尚關市不絶以中之自馬邑軍後五年之秋漢使四將軍各萬騎擊胡關市下將軍衛青出上谷至龍城得胡首虜七百人公孫賀出雲中無所得公孫敖出代郡為胡所敗七千餘人李廣出鴈門為胡所敗而胸奴生得廣廣後得亡歸漢囚敖廣敖廣贖為庶人其冬胸奴數入盜邉漁陽尤甚漢使將軍韓安國屯漁陽備胡其明年秋胸奴二萬騎入漢殺遼西太守略二千餘人胡又入敗漁陽太守軍千餘人圍漢將軍安國安國時千餘騎亦且盡會燕救至胸奴乃去胸奴又入鴈門殺略千餘人於是漢使將軍衛青將三萬騎出鴈門李息出代郡擊胡得虜數千人其明年衛青復出雲中以西至隴西擊胡之樓煩白羊王於河南得胡首虜數千牛羊百餘萬於是漢遂取河南地築朔方復繕故秦時蒙恬所為塞因河為固漢亦棄上谷之什音斗辟縣漢書音義曰言縣斗辟西近胡造陽地以豫胡是嵗漢之元朔二年也其後冬胸奴軍臣單于死軍臣單于弟左谷蠡王伊稚斜自立為單于攻破軍臣單于太子於單於單亡降漢漢封於單為陟安侯數月而死伊稚斜單于既立其夏胸奴數萬騎入殺代郡太守恭友略千餘人其秋胸奴又入鴈門殺略千餘人其明年胸奴又復入代郡定襄上郡各三萬騎殺略數千人胸奴右賢王怨漢奪之河南地而築朔方數為寇盜邉及入河南侵擾朔方殺略吏民甚衆其明年春漢以衛青為大將軍將六將軍十餘萬人出朔方髙闕擊胡右賢王以為漢兵不能至飲酒醉漢兵出塞六七百里夜圍右賢王右賢王大驚脫身逃走諸精騎往往隨後去漢得右賢王衆男女萬五千人裨小王十餘人其秋胸奴萬騎入殺代郡都尉朱英略千餘人其明年春漢復遣大將軍衛青將六將軍兵十餘萬騎乃再出定襄數百里擊胸奴得首虜前後凡萬九千餘級而漢亦亡兩將軍軍三千餘騎徐廣曰合有三千耳右將軍建得以身脫而前將軍翕侯趙信兵不利降胸奴趙信者故胡小王降漢漢封為翕侯以前將軍與右將軍并軍分行獨遇單于兵故盡沒單于既得翕侯以為自次王用其姊妻之與謀漢信教單于益北絶幕應劭曰幕沙幕胸奴之南界瓚曰沙土曰幕直度曰絶以誘罷漢兵徼極而取之無近塞單于從其計其明年胡騎萬人入上谷殺數百人其明年春漢使驃騎將軍去病將萬騎出隴西過焉支山千餘里擊胸奴得胡首虜騎萬八千餘級破得休屠王祭天金人漢書音義曰胸奴祭天處本在雲陽甘泉山下秦奪其地後徙之休屠王右地故休屠有祭天金人象祭天人也其夏驃騎將軍復與合騎侯數萬騎出隴西北地二千里擊胸奴過居延攻祁連山得胡首虜三萬餘人裨小王以下七十餘人是時胸奴亦來入代郡鴈門殺略數百人漢使博望侯及李將軍廣出右北平擊胸奴左賢王左賢王圍李將軍卒可四千人且盡殺虜亦過當會博望侯軍救至李將軍得脫漢失亡數千人合騎侯後驃騎將軍期及與博望侯皆當死贖為庶人其秋單于怒渾邪王休屠王居西方為漢所殺虜數萬人欲召誅之渾邪王與休屠王恐謀降漢徐廣曰元狩二年也漢使驃騎將軍往迎之渾邪王殺休屠王并將其衆降漢凡四萬餘人號十萬於是漢已得渾邪王則隴西北地河西益少胡寇徙關東貧民處所奪胸奴河南新秦中以實之而減北地以西戍卒半其明年胸奴入右北平定襄各數萬騎殺略千餘人而去其明年春漢謀曰翕侯信為單于計居幕北以為漢兵不能至乃粟馬發十萬騎負私從馬凡十四萬匹糧重不與焉令大將軍青驃騎將軍去病中分軍大將軍出定襄驃騎將軍出代咸約絶幕擊胸奴胸奴單于聞之逺其輜重以精兵待於幕北與漢大將軍接戰一日會暮大風起漢兵縱左右翼圍單于單于自度戰不能如漢兵單于遂獨身與壯騎數百潰漢圍西北遁走漢兵夜追不得行斬捕胸奴首虜萬九千級北至闐顔山趙信城而還如淳曰信前降胸奴胸奴築城居之單于之遁走其兵往往與漢兵相亂而隨單于單于久不與其大衆相得其右谷蠡王以為單于死乃自立為單于真單于復得其衆而右谷蠡王乃去其單于號復為右谷蠡王漢驃騎將軍之出代二千餘里與左賢王接戰漢兵得胡首虜凡七萬餘級左賢王將皆遁走驃騎封於狼居胥山禪姑衍臨翰海而還如淳曰翰海北海名是後胸奴逺遁而幕南無王庭漢度河自朔方以西至令居徐廣曰在金城往往通渠置田官吏卒五六萬人稍蠶食地接胸奴以北初漢兩將軍大出圍單于所殺虜八九萬而漢士卒物故亦數萬漢馬死者十餘萬胸奴雖病逺去而漢亦馬少無以復往胸奴用趙信之計遣使於漢好辭請和親天子下其議或言和親或言遂臣之丞相長史任敞曰胸奴新破困宜可使為外臣朝請於邉漢使任敞於單于單于聞敞計大怒留之不遣先是漢亦有所降胸奴使者單于亦輒留漢使相當漢方復收士馬會驃騎將軍去病死於是漢久不北擊胡數嵗伊稚斜單于立十三年死子烏維立為單于是嵗漢元鼎三年也烏維單于立而漢天子始出巡郡縣其後漢方南誅兩越不擊胸奴胸奴亦不侵入邉烏維單于立三年漢已滅南越遣故大僕賀將萬五千騎出九原二千餘里至浮苴井而還不見胸奴一人漢又遣故從驃侯趙破奴萬餘騎出令居數千里至胸奴河水而還亦不見胸奴一人是時天子巡邉至朔方勒兵十八萬騎以見武節而使郭吉風告單于郭吉既至胸奴胸奴主客韋昭曰主使來主客也問所使郭吉禮卑言好曰吾見單于而口言單于見吉吉曰南越王頭已懸於漢北闕今單于能即前與漢戰天子自將兵待邉單于即不能即南面而臣於漢何但遠走亡匿於幕北苦寒無水草之地毋為也語卒而單于大怒立斬主客見者而留郭吉不歸遷之北海上而單于終不肯為寇於漢邉休養息士馬習射獵數使使於漢好辭甘言求請和親漢使王烏等窺胸奴胸奴法漢使非去節而以墨黥其面者不得入穹廬王烏北地人習胡俗去其節黥面得入穹廬單于愛之詳許甘言為遣其太子入漢為質以求和親漢使楊信於胸奴是時漢東拔穢貉朝鮮以為郡而西置酒泉郡以鬲絶胡與羌通之路漢又西通月氏大夏又以公主妻烏孫王以分胸奴西方之援國又北益廣田至胝靁為塞漢書音義曰胝靁地名在烏孫北而胸奴終不敢以為言是嵗翕侯信死漢用事者以胸奴為已弱可臣從也楊信為人剛直倔強素非貴臣單于不親單于欲召入不肯去節單于乃坐穹廬外見楊信楊信既見單于説曰即欲和親以單于太子為質於漢單于曰非故約故約漢常遣公主給繒絮食物有品以和親而胸奴亦不擾邉今乃欲反古令吾太子為質無幾矣胸奴俗見漢使非中貴人其儒先先先生也漢書作儒生也以為欲説折其辨其少年以為欲刺折其氣每漢使入胸奴胸奴輒報償漢留胸奴使胸奴亦留漢使必得當乃肯止楊信既歸漢使王烏而單于復讇以甘言欲多得漢財物紿謂王烏曰吾欲入見漢天子面相約為兄弟王烏歸報漢漢為單于築邸于長安胸奴曰非得漢貴人使吾不與誠語胸奴使其貴人至漢病漢與藥欲愈之不幸而死而漢使路充國佩二千石印綬往使因送其喪厚葬直數千金曰此漢貴人也單于以為漢殺吾貴使者留路充國不歸諸所言者單于特空紿王烏殊無意入漢及遣太子來質於是胸奴數使竒兵侵犯邉漢乃拜郭昌為拔胡將軍及浞野侯徐廣曰趙破奴屯朔方以東備胡路充國留胸奴三嵗單于死烏維單于立十嵗而死子烏師廬徐廣曰烏一作詹立為單于年少號為兒單于是嵗元封六年也自此之後單于益西北左方兵直雲中右方直酒泉燉煌郡兒單于立漢使兩使者一弔單于一弔右賢王欲以乖其國使者入胸奴胸奴悉將致單于單于怒而盡留漢使漢使留胸奴者前後十餘輩而胸奴使來漢亦輒留相當是嵗漢使二師將軍廣利西伐大宛而令因杆將軍􅨝築受降城其冬胸奴大雨雪畜多飢寒死兒單于年少好殺伐國人多不安左大都尉欲殺單于使人間告漢曰我欲殺單于降漢漢遠即兵來迎我我即發初漢聞此言故築受降城猶以為逺其明年春漢使浞野侯破奴將二萬餘騎出朔方西北二千餘里期至浚稽山而還浞野侯既至期而還左大都尉欲發而覺單于誅之發左方兵擊浞野浞野侯行捕首虜得數千人還未至受降城四百里胸奴兵八萬騎圍之浞野侯夜自出求水胸奴間捕生得浞野侯因急擊其軍軍中郭縱為護維王為渠相與謀曰及諸校尉畏亡將軍而誅之莫相勸歸軍遂沒於胸奴胸奴兒單于大喜遂遣奇兵攻受降城不能下乃寇入邉而去其明年單于欲自攻受降城未至病死兒單于立三嵗而死子年少胸奴乃立其季父烏維單于弟右賢王詬音鉤又音吁犁湖為單于是嵗太初三年也詬犁湖單于立漢使光祿徐自為出五原塞數百里逺者千餘里築城障列亭至廬昫音衢胸奴地名又山名而使遊擊將軍韓説長平侯衛伉屯其旁使強弩都尉路博德築居延澤上其秋胸奴大入定襄雲中殺略數千人敗數二千石而去行破壞光祿所築城列亭障又使右賢王入酒泉張掖略數千人會任文擊救漢書音義曰漢將也盡復失所得而去是嵗二師將軍破大宛斬其王而還胸奴欲遮之不能至其冬欲攻受降城會單于病死詬犁湖單于立一嵗死胸奴乃立其弟左大都尉且鞮侯為單于漢既誅大宛威震外國天子意欲遂困胡乃下詔曰髙皇帝遺朕平城之憂髙后時單于書絶悖逆昔齊襄公復百世之讎春秋大之春秋傳曰九世猶可復讎乎雖百世可也是嵗太初四年也且鞮侯單于既立盡歸漢使之不降者路充國等得歸單于初立恐漢襲之乃自謂我兒子安敢望漢天子漢天子我丈人行也漢遣中郎將蘇武厚幣賂遺單于單于益驕禮甚倨非漢所望也其明年浞野侯破奴得亡歸漢其明年漢使二師將軍廣利以三萬騎出酒泉擊右賢王於天山得胡首虜萬餘級而還胸奴大圍二師將軍幾不脫漢兵物故什六七漢復使因杵將軍􅨝出西河與強弩都尉會涿塗山徐廣曰塗音邪毋所得又使騎都尉李陵將步騎五千人出居延北千餘里與單于會合戰陵所殺傷萬餘人兵及食盡欲解歸胸奴圍陵陵降胸奴其兵遂沒得還者四百人單于乃貴陵以其女妻之後二嵗復使二師將軍將六萬騎步兵十萬出朔方強弩都尉路博德將萬餘人與二師會遊擊將軍説將步騎三萬人出五原因杆將軍􅨝將萬騎步兵三萬人出鴈門胸奴聞悉逺其纍重於余吾水北徐廣曰余一作斜音邪而單于以十萬騎待水南與二師將軍接戰二師乃解而引歸與單于連戰十餘日二師聞其家以巫蠱族滅因并衆降胸奴徐廣曰案史記將相年表乃漢書征和二年巫蠱始起三年廣利與商丘成出擊胡軍敗乃降得來還千人一兩人耳遊擊説無所得因杆􅨝與左賢王戰不利引歸是嵗徐廣曰天漢四年漢兵之出擊胸奴者不得言功多少功不得御有詔捕太醫令隨但言二師將軍家室族滅使廣利得降胸奴太史公曰孔氏著春秋隱桓之間則章至定哀之際則微為其切當世之文而罔褒忌諱之辭也世俗之言胸奴者患其徼一時權徐廣曰徼音校而務讇納其説以便偏指不參彼已詩云彼已之子將率席中國廣大氣奮人主因以決䇿是以建功不深堯雖賢興事業不成得禹而九州寧且欲興聖統唯在擇任將相哉唯在擇任將相哉史記集解卷一百十
