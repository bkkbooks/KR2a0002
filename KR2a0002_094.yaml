body:
  text: 史記集解卷九十六宋裴駰撰史記九十六張丞相列傳第三十六張丞相蒼者陽武人也好書律厯秦時為御史主柱下方書如淳曰方版也謂書事在版上者也秦以上置柱下史蒼為御史主其事或曰四方文書有罪亡歸及沛公略地過陽武蒼以客從攻南陽蒼坐法當斬解衣伏質身長大肥白如瓠時王陵見而怪其美士乃言沛公赦勿斬遂從西入武關至咸陽沛公立為漢王入漢中還定三秦陳餘擊走常山王張耳耳歸漢漢乃以張蒼為常山守從淮陰侯擊趙蒼得陳餘趙地已平漢王以蒼為代相備邊冦已而徙為趙相相趙王耳耳卒相趙王敖復徙相代王燕王臧荼反高祖往擊之蒼以代相從攻臧荼有功以六年中封為北平侯食邑千二百户遷為計相文潁曰能計故號曰計相一月更以列侯為主計四嵗張晏曰以列侯典校郡國簿書如淳曰以其所主因以為官號與計相同時所卒立非久施也是時蕭何為相國而張蒼乃自秦時為柱下史明習天下圖書計籍蒼又善用算律厯故令蒼以列侯居相府領主郡國上計者黔布反亾漢立皇子長為淮南王而張蒼相之十四年遷為御史大夫周昌者沛人也其從兄曰周苛秦時皆為泗水卒史及高祖起沛擊破泗水守監於是周昌周苛自卒史從沛公沛公以周昌為職志徐廣曰主旗幟之屬周苛為客張晏曰為帳下賓客不掌官從入關破秦沛公立為漢王以周苛為御史大夫周昌為中尉漢王四年楚圍漢王滎陽急漢王遁出去而使周苛守滎陽城楚破滎陽城欲令周苛将苛罵曰若趣降漢王不然今為虜矣項羽怒亨周苛徐廣曰四年三月也於是乃拜周昌為御史大夫常從擊破項籍以六年中與蕭曹等俱封封周昌為汾陰侯周苛子周成以父死事封為高景侯徐廣曰九年封封三十九年文帝後元四年謀反死國除昌為人彊力敢直言自蕭曹等皆卑下之昌嘗燕時入奏事漢書音義曰以上宴時入奏事高帝方擁戚姬昌還走高帝逐得騎周昌項問曰我何如主也昌仰曰陛下即桀紂之主也於是上笑之然尤憚周昌及帝欲廢太子而立戚姬子如意為太子大臣固爭之莫能得上以畱侯䇿即止而周昌廷爭之彊上問其説昌為人吃又盛怒曰臣口不能言然臣期期知其不可陛下雖欲廢太子臣期期不奉詔上欣然而笑既罷吕后側耳於東廂聽韋昭曰殿東堂也見周昌為跪謝曰微君太子幾廢是後戚姬子如意為趙王年十嵗高祖憂即萬嵗之後不全也趙堯年少為符璽御史趙人方與公孟康曰方與縣名公其號瓚曰方與縣令也謂御史大夫周昌曰君之史趙堯年雖少然竒才也君必異之是且代君之位周昌笑曰堯年少刀筆吏耳何能至是乎居頃之趙堯侍高祖高祖獨心不樂悲歌羣臣不知上之所以然趙堯進請問曰陛下所為不樂非為趙王年少而戚夫人與吕后有卻邪備萬嵗之後而趙王不能自全乎高祖曰然吾私憂之不知所出堯曰陛下獨宜為趙王置貴彊相及呂后太子羣臣素所敬憚乃可高祖曰然吾念之欲如是而羣臣誰可者堯曰御史大夫周昌其人有堅忍質直且自呂后太子及大臣皆素敬憚之獨昌可高祖曰善於是乃召周昌謂曰吾欲固煩公公彊為我相趙王周昌泣曰臣初起從陛下陛下獨奈何中道而棄之於諸侯乎高祖曰吾極知其左遷然吾私憂趙王念非公無可者公不得已彊行於是徙御史大夫周昌為趙相旣行久之高祖持御史大夫印弄之曰誰可以為御史大夫者孰視趙堯曰無以易堯遂拜趙堯為御史大夫徐廣曰十年也堯亦前有軍功食邑及以御史大夫從擊陳豨有功封為江邑侯徐廣曰十一年封高祖崩呂太后使使召趙王其相周昌令王稱疾不行使者三反周昌固為不遣趙王於是高后患之乃使使召周昌周昌至謁高后高后怒而罵周昌曰爾不知我之怨戚氏乎而不遣趙王何昌既徵高后使使召趙王趙王果來至長安月餘飲藥而死周昌因謝病不朝見三嵗而死徐廣曰諡悼也後五嵗高后聞御史大夫江邑侯趙堯高祖時定趙王如意之畫乃抵堯罪徐廣曰呂后元年國除以廣阿侯任敖為御史大夫任敖者故沛獄吏高祖嘗辟吏吏繫呂后遇之不謹任敖素善高祖怒擊傷主呂后吏及高祖初起敖以客從為御史守豐三嵗高祖立為漢王東擊項籍敖遷為上黨守陳豨反時敖堅守封為廣阿侯食千八百户高后時為御史大夫三嵗免徐廣曰文帝二年任敖卒諡懿侯曾孫越人元鼎二年為太常坐酒酸國除駰案漢書任敖孝文元年薨徐誤也以平陽侯曹窋為御史大夫高后崩不與大臣共誅呂禄等免以淮南相張蒼為御史大夫蒼與絳侯等尊立代王為孝文皇帝四年丞相灌嬰卒張蒼為丞相自漢興至孝文二十餘年㑹天下初定将相公卿皆軍吏張蒼為計相時緒正律厯文潁曰緒尋也或曰緒業也以高祖十月始至霸上因故秦時本以十月為嵗首弗革推五德之運以為漢當水德之時尚黑如故吹律調樂人之音聲及以比定律令如淳曰比謂五音清濁各有所比也以定十二月律之法令於樂官使長行之瓚曰謂以比故取類以定法律與條令也若百工天下作程品如淳曰若順也百工為器物皆有尺寸斤兩皆使得宜此之謂順晉灼曰若預及之辭至於為丞相卒就之故漢家言律厯者本之張蒼蒼本好書無所不觀無所不通而尤善律厯漢書曰著書十八篇言陰陽律厯事張蒼德王陵王陵者安國侯也及蒼貴常父事王陵陵死後蒼為丞相洗沐常先朝陵夫人上食然後敢歸家蒼為丞相十餘年魯人公孫臣上書言漢土德時其符有黄龍當見詔下其議張蒼張蒼以為非是罷之其後黄龍見成紀於是文帝召公孫臣以為博士草土德之厯制度更元年張丞相由此自絀謝病稱老蒼任人為中候張晏曰所選保任者也瓚曰中候官名大為姦利上以讓蒼蒼遂病免蒼為丞相十五嵗而免孝景前五年蒼卒諡為文侯子康代侯八年卒子類徐廣曰一作蒯音瞶代為侯八年坐臨諸侯喪後就位不敬國除初張蒼父長不滿五尺及生蒼蒼長八尺餘為侯丞相蒼子復長漢書云長八尺及孫類長六尺餘坐法失侯蒼之免相後老口中無齒食乳女子為乳母妻妾以百數嘗孕者不復幸蒼年百有餘嵗而卒申屠丞相嘉者梁人以材官蹶張徐廣曰勇徤材力開張駰案如淳曰材官之多力能腳蹋彊弩張之故曰蹶張律有蹶張士從高帝擊項籍遷為隊率從擊黥布軍為都尉孝惠時為淮陽守孝文帝元年舉故吏士二千石從高皇帝者悉以為關内侯食邑二十四人而申屠嘉食邑五百户張蒼已為丞相嘉遷為御史大夫張蒼免相徐廣曰後二年八月孝文帝欲用皇后弟竇廣國為丞相曰恐天下以吾私廣國廣國賢有行故欲相之念久之不可而高帝時大臣又皆多死餘見無可者乃以御史大夫嘉為丞相因故邑封為故安侯嘉為人亷直門不受私謁是時大中大夫鄧通方隆愛幸賞賜累巨萬文帝嘗燕飲通家其寵如是是時丞相入朝而通居上傍有怠慢之禮丞相奏事畢因言曰陛下愛幸臣則富貴之至於朝廷之禮不可以不肅上曰君勿言吾私之罷朝坐府中嘉為檄召鄧通詣丞相府不來且斬通通恐入言文帝文帝曰汝第往吾今使人召若通至丞相府免冠徒跣頓首謝嘉坐自如故不為禮責曰夫朝廷者高皇帝之朝廷也通小臣戲殿上大不敬當斬吏今行斬之如淳曰嘉語其吏曰今便行斬之通頓首首盡出血不解文帝度丞相已困通使使者持節召通而謝丞相曰此吾弄臣君釋之鄧通既至為文帝泣曰丞相幾殺臣嘉為丞相五嵗孝文帝崩孝景帝即位二年鼂錯為内史貴幸用事諸法令多所請變更議以謫罰侵削諸侯而丞相嘉自絀所言不用疾錯錯為内史門東出不便更穿一門南出南出者太上皇廟堧垣服䖍曰宮外垣也如淳曰堧音畏堧之愞嘉聞之欲因此以法錯擅穿宗廟垣為門奏請誅錯錯客有語錯錯恐夜入宮上謁自歸景帝至朝丞相奏請誅内史錯景帝曰錯所穿非真廟垣乃外堧垣故他官居其中且又我使為之錯無罪罷朝嘉謂長史曰吾悔不先斬錯乃先請之為錯所賣至舍因歐血而死諡為節侯子共侯蔑代三年卒子侯去病代三十一年卒徐廣曰一本無此去病而云共侯蔑三十三年子更改封靖安侯子侯臾代六嵗坐為九江太守受故官送有罪國除自申屠嘉死之後景帝時開封侯陶青桃侯劉舍為丞相徐廣曰陶青高祖功臣陶舎之子也諡夷劉舍本項氏親也賜姓劉氏父襄佐高祖有功舍諡哀侯及今上時柏至侯許昌徐廣曰高祖功臣許温之孫諡哀侯平棘侯辥澤徐廣曰高祖功臣廣平侯辥歐之孫平棘節侯嶭澤武彊侯莊青翟徐廣曰高祖功臣莊不識之孫商陵侯趙周徐廣曰周父夷吾為楚王戊大𫝊諫爭而死等為丞相皆以列侯繼嗣娖娖徐廣曰娖音七角反一作斷一作􅐅亷謹為丞相備員而已無所能發明功名有著於當世者太史公曰張蒼文學律厯為漢名相而絀賈生公孫臣等言正朔服色事而不遵明用秦之顓頊厯何哉張晏曰不考經典專用顓頊厯何哉周昌木彊人也任敖以舊德用張晏曰謂傷辱呂后吏申屠嘉可謂剛毅守節矣然無術學殆與蕭曹陳平異矣孝武時丞相多甚不記莫錄其行起居状略且紀征和以來有車丞相長陵人也名千秋卒而有韋丞相代韋丞相賢者魯人也以讀書術為吏至大鴻臚有相工相之當至丞相有男四人使相工相之至第二子其名𤣥成相工曰此子貴當封韋丞相言曰我即為丞相有長子是安從得之後竟為丞相病死而長子有罪論不得嗣而立𤣥成𤣥成時佯狂不肯立竟立之有讓國之名後坐騎至廟不敬有詔奪爵一級為關内侯失列侯得食其故國邑韋丞相卒有魏丞相代魏丞相相者濟陰人也以文吏至丞相其人好武皆令諸吏帶劒帶劒前奏事或有不帶劒者當入奏事至乃借劒而敢入奏事其時京兆尹趙君名廣漢丞相奏以免罪使人執魏丞相欲求脫罪而不聽復使人脅恐魏丞相以夫人賊殺侍婢事而私獨奏請驗之發吏卒至丞相舍捕奴婢笞擊問之實不以兵刃殺也而丞相司直繁君奏京兆尹趙君迫脅丞相誣以夫人賊殺婢發吏卒圍捕丞相舍不道又得擅屏騎士事趙京兆坐要斬又有使掾陳平等劾中尚書疑以獨擅劫事而坐之大不敬長史以下皆坐死或下蠶室而魏丞相竟以丞相病死子嗣後坐騎至廟不敬有詔奪爵一級為關内侯失列侯得食其故國邑魏丞相卒以御史大夫邴吉代邴丞相吉者魯國人也以讀書好法令至御史大夫孝宣帝時以有舊故封為列侯而因為丞相明於事有大智後世稱之以丞相病死子顯嗣後坐騎至廟不敬有詔奪爵一級失列侯得食故國邑顯為吏至太僕坐官耗亂身及子男有姦贓免為庶人邴丞相卒黄丞相代長安中有善相工田文者與韋丞相魏丞相邴丞相微賤時㑹於客家田文言曰今此三君者皆丞相也其後三人竟更相代為相是何見之明也黄丞相霸者淮陽人也以讀書為吏至潁川太守治潁川以禮義條教喻告化之犯法者風曉令自殺化大行名聲聞孝宣帝下制曰潁川太守霸以宣布詔令治民道不拾遺男女異路獄中無重囚賜爵闗内侯黄金百斤徵為京兆尹而至丞相復以禮義為治以丞相病死子嗣後為列侯黄丞相卒以御史大夫于定國代于丞相已有廷尉傳在張廷尉語中于丞相去御史大夫韋𤣥成代韋丞相𤣥成者即前韋丞相子也代父後失列侯其人少時好讀書明於詩論語為吏至衛尉徙為太子太傅御史大夫辥君免名廣德也為御史大夫于丞相乞骸骨免而為丞相因封故邑為扶陽侯數年病死孝元帝親臨喪賜賞甚厚子嗣後其治容容隨世俗浮沉而見謂諂巧而相工本謂之當為侯代父而後失之復自游宦而起至丞相父子俱為丞相世間美之豈不命哉相工其先知之韋丞相卒御史大夫匡衡代丞相匡衡者東海人也好讀書從愽士受詩家貧衡傭作以給食飲才下數射䇿不中至九乃中丙科其經以不中科故明習補平原文學卒史數年郡不尊敬御史徵之以補百石屬薦為郎而補愽士拜為太子少傅而事孝元帝孝元好詩而遷為光禄勲居殿中為師授教左右而縣官坐其傍聽甚善之日以尊貴御史大夫鄭𢎞坐事免而匡君為御史大夫嵗餘韋丞相死匡君代為丞相封樂安侯以十年之間不出長安城門而至丞相豈非遇時而命也哉深惟士之游宦所以至封侯者微甚徐廣曰微一作徵然多至御史大夫即去者諸為大夫而丞相次也其心冀幸丞相物故也高堂隆答魏朝訪曰物無也故事也言無復所能於事或乃陰私相毁害欲代之然守之日久不得或為之日少而得之至于封侯真命也夫御史大夫鄭君守之數年不得匡君居之未滿嵗而韋丞相死卽代之矣豈可以智巧得哉多有賢聖之才困戹不得者衆甚也史記集解卷九十六
