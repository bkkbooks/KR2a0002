body:
  text: 史記集解卷五十三宋裴駰撰史記五十三蕭相國世家第二十三蕭相國者沛豐人也以文無害為沛主吏掾漢書音義曰文無害有文無所枉害也律有無害都吏如今言公平吏一曰無害者如言無比陳留間語也高祖為布衣時何數以吏事護高祖高祖為亭長常左右之高祖以吏繇咸陽吏皆送奉錢三何獨以五李竒曰或三百或五百也秦御史監郡者與從事常辨之張晏曰何與共事修辨明何素有方略也蘇林曰辟何與從事也秦時無刺史以御史監郡何乃給泗水卒史徐廣曰沛縣有泗水亭又秦以沛為泗水郡駰案文潁曰何為泗水郡卒史事第一秦御史欲入言徵何何固請得毋行及高祖起為沛公何常為丞督事沛公至咸陽諸將皆爭走金帛財物之府分之何獨先入收秦丞相御史律令圖書藏之沛公為漢王以何為丞相項王與諸侯屠燒咸陽而去漢王所以具知天下厄塞户口多少彊弱之處民所疾苦者以何具得秦圖書也何進言韓信漢王以信為大將軍語在淮隂侯事中漢王引兵東定三秦何以丞相留收巴蜀填撫諭告使給軍食漢二年漢王與諸侯擊楚何守關中侍太子治櫟陽為法令約束立宗廟社稷宗室縣邑輒奏上可許以從事即不及奏上輒以便宜施行上來以聞應劭曰上來還乃以所為聞之關中事計戶口轉漕給軍漢王數失軍遁去何常興關中卒輒補缺上以此專屬任何關中事漢三年漢王與項羽相距京索之間上數使使勞苦丞相鮑生謂丞相曰王㬥衣露蓋數使使勞苦君者有疑君心也為君計莫若遣君子孫昆弟能勝兵者悉詣軍所上必益信君於是何從其計漢王大說漢五年既殺項羽定天下論功行封羣臣爭功歲餘功不決高祖以蕭何功最盛封為酇侯文潁曰音贊瓚曰今南陽酇縣也孫檢曰有二縣音字多亂其屬沛郡者音嵯屬南陽者音讚案茂陵書蕭何國在南陽宜呼讚今呼嵯嵯舊字作􅀈今皆作酇所由亂也所食邑多功臣皆曰臣等身被堅執鋭多者百餘戰少者數十合攻城略地大小各有差今蕭何未嘗有汗馬之勞徒持文墨議論不戰顧反居臣等上何也高帝曰諸君知獵乎曰知之知獵狗乎曰知之高帝曰夫獵追殺獸兔者狗也而發蹤指示獸處者人也今諸君徒能得走獸耳功狗也至如蕭何發蹤指示功人也且諸君獨以身隨我多者兩三人今蕭何舉宗數十人皆隨我功不可忘也羣臣皆莫敢言列侯畢已受封及奏位次皆曰平陽侯曹參身被七十創攻城略地功最多宜第一上已撓功臣多封蕭何應劭曰撓屈也至位次未有以復難之然心欲何第一關內侯鄂君進曰羣臣議皆誤夫曹參雖有野戰略地之功此特一時之事夫上與楚相距五歲常失軍亡衆逃身遁者數矣然蕭何常從關中遣軍補其處非上所詔令召而數萬衆㑹上之乏絶者數矣夫漢與楚相守滎陽數年軍無見糧蕭何轉漕關中給食不之陛下雖數亡山東蕭何常全關中以待陛下此萬世之功也今雖亡曹參等百數何缺於漢漢得之不必待以全奈何欲以一旦之功而加萬世之功哉蕭何第一曹參次之高祖曰善於是乃令蕭何賜帶劒履上殿入朝不趨上曰吾聞進賢受上賞蕭何功雖高得鄂君乃益明於是因鄂君故所食關內侯邑封為安平侯徐廣曰以謁者從定諸侯有功秩舉蕭何功故因侯二千戶封九年卒至𤣥孫但坐與淮南王安通棄市國除是日悉封何父子兄弟十餘人皆有食邑乃益封何二千戶以帝嘗繇咸陽時何送我獨贏奉錢二也漢十一年陳豨反高祖自將至邯鄲未罷淮隂侯謀反關中呂后用蕭何計誅淮隂侯語在淮隂事中上已聞淮隂侯誅使使拜丞相何為相國益封五千戶令卒五百人一都尉為相國衛諸君皆賀召平獨弔召平者故秦東陵侯秦破為布衣貧種瓜於長安城東瓜美故世俗謂之東陵瓜從召平以為名也召平謂相國曰禍自此始矣上㬥露於外而君守於中非被矢石之事而益君封置衛者以今者淮隂侯新反於中疑君心矣夫置衛衛君非以寵君也願君讓封勿受悉以家私財佐軍則上心說相國從其計高帝乃大喜漢十二年秋黥布反上自將擊之數使使問相國何為相國為上在軍乃拊循勉力百姓悉以所有佐軍如陳豨時客有說相國曰君滅族不久矣夫君位為相國功第一可復加哉然君初入關中得百姓心十餘年矣皆附君常復孳孳得民和上所為數問君者畏君傾動關中今君胡不多買田地賤貰貸以自汙上心乃安於是相國從其計上乃大說上罷布軍歸民道遮行上書言相國賤彊買民田宅數千萬上至相國謁上笑曰夫相國乃利民民所上書皆以與相國曰君自謝民相國因為民請曰長安地狹上林中多空地棄願令民得入田毋收稿為禽獸食上大怒曰相國多受賈人財物乃為請吾苑乃下相國廷尉械擊之數日王衛尉侍如淳曰百官公卿表衛尉王氏無名字前問曰相國何大罪陛下繫之㬥也上曰吾聞李斯相秦皇帝有善歸主有惡自與今相國多受賈豎金而為民請吾苑以自媚於民故繫治之王衛尉曰夫職事茍有便於民而請之真宰相事陛下奈何乃疑相國受賈人錢乎且陛下距楚數歲陳豨黥布反陛下自將而往當是時相國寄關中搖足則關以西非陛下有也相國不以此時為利今乃利賈人之金乎且秦以不聞其過亡天下李斯之分過又何足法哉陛下何疑宰相之淺也韋昭曰用意淺高帝不懌是日使使持節赦出相國相國年老素恭謹入徒跣謝高帝曰相國休矣相國為民請苑吾不許我不過為桀紂主而相國為賢相吾故繫相國欲令百姓聞吾過也何素不與曹參相能及何病孝惠自臨視相國病因問曰君即百歲後誰可代君者對曰知臣莫如主孝惠曰曹參何如何頓首曰帝得之矣臣死不恨矣何置田宅必居窮處為家不治垣屋曰後世賢師吾儉不賢毋為勢家所奪孝惠二年相國何卒東觀漢記云蕭何墓在長陵東司馬門道北百步諡為文終侯徐廣曰功臣表蕭何以客初起從也後嗣以罪失侯者四世絶天子輒復求何後封續酇侯功臣莫得比焉太史公曰蕭相國何於秦時為刀筆吏録録未有竒節及漢興依日月之末光何謹守管籥因民之疾奉法順流與之更始淮隂黥布等皆以誅滅而何之勳爛焉位冠羣臣聲施後世與閎夭散宜生等爭烈矣史記集解卷五十三
