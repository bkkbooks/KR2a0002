body:
  text: 史記集解卷九十八宋裴駰撰史記九十八傅靳蒯成列傳第三十八陽陵侯傅寬以魏五大夫騎將從為舍人起橫陽從攻安陽杠里擊趙賁軍於開封及擊楊熊曲遇陽武斬首十二級賜爵卿從至霸上沛公立為漢王漢王賜寬封號共德君從入漢中遷為右騎將從定三秦賜食邑雕邑徐廣曰屬上郡從擊項籍待懷服虔曰待高帝於懷賜爵通德侯從擊項冠周蘭龍且所將卒斬騎將一人敖下徐廣曰敖倉之下益食邑屬淮隂擊破齊厯下軍擊田解屬相國參殘博益食邑因定齊地剖符世世勿絶封為陽陵侯二千六百户除前所食為齊右丞相備齊張晏曰時田橫未降故設屯備五嵗為齊相國四月擊陳豨屬太尉勃以相國代丞相噲擊豨一月徙為代相國將屯如淳曰既為相國有警則將卒而屯守也案律謂勒兵而守曰屯二嵗為代丞相將屯孝惠五年卒諡為景侯子頃侯精立二十四年卒子共侯則立十二年卒子侯偃立三十一年坐與淮南王謀反死國除信武侯靳歙以中涓從起宛朐攻濟陽破李由軍擊秦軍亳南開封東北斬騎千人將一人徐廣曰將一作侯首五十七級捕虜七十三人賜爵封號臨平君又戰藍田北斬車司馬二人張晏曰主官車騎長一人張晏曰騎之長首二十八級捕虜五十七人至霸上沛公立為漢王賜歙爵建武侯遷為騎都尉從定三秦别西擊章平軍於隴西破之定隴西六縣所將卒斬車司馬候各四人騎長十二人從東擊楚至彭城漢軍敗還保雍丘去擊反者王武等略梁地别將擊邢説軍張晏曰特起兵者也説音稅災南徐廣曰今曰考城破之身得説都尉二人司馬候十二人降吏卒四千六百八十人破楚軍滎陽東三年賜食邑四千二百户别之河內擊趙將賁郝上音肥下音釋軍朝歌破之所將卒得騎將二人車馬二百五十匹從攻安陽以東至棘蒲下七縣别攻破趙軍得其將司馬二人侯四人降吏卒二千四百人從攻下邯鄲别下平陽徐廣曰鄴有平陽城身斬守相所將卒斬兵守郡守各一人孟康曰將兵郡守降鄴從攻朝歌邯鄲及别擊破趙軍降邯鄲郡六縣徐廣曰邯鄲高帝改曰趙國還軍敖倉破項籍軍成臯南擊絶楚餉道起滎陽至襄邑破項冠軍魯下略地東至繒郯下邳南至蘄竹邑擊項悍濟陽下還擊項籍陳下破之别定江陵降江陵柱國大司馬以下八人身得江陵王生致之雒陽因定南郡從至陳取楚王信剖符世世勿絶定食四千六百户號信武信以騎都尉從擊代攻韓信平城下還軍東垣有功遷為車騎將軍并將梁趙齊燕楚車騎别擊陳豨丞相敞破之因降曲逆從擊黥布有功益封定食五千三百户凡斬首九十級虜百三十二人别破軍十四降城五十九定郡國各一縣二十三得王柱國各一人二千石以下至五百石徐廣曰一本無此五字三十九人高后五年歙卒諡為肅侯子亭代侯二十一年坐事國人過律孝文後三年奪侯國除蒯成侯緤者服虔曰蒯音菅蒯之蒯沛人也姓周氏常為高祖參乘以舍人從起沛至霸上西入蜀漢還定三秦食邑池陽東絶甬道從出度平隂遇淮隂侯兵襄國軍乍利乍不利終無離上心徐廣曰蒯成侯表云遇淮隂侯軍襄國楚漢約分鴻溝以緤為信武侯戰不利不敢離上以緤為信武侯食邑三千三百户高祖十二年以緤為蒯成侯除前所食邑上欲自擊陳豨蒯成侯泣曰始秦攻破天下未嘗自行今上常自行是為無人可使者乎上以為愛我賜入殿門不趨殺人不死至孝文五年緤以壽終諡為貞侯子昌代侯有罪國除至孝景中二年封緤子居代侯徐廣曰表云孝景中元年封緤立子應為鄆侯諡康中二年侯居沛郡有鄆縣鄆一作鄲至元鼎三年居為太常有罪國除太史公曰陽陵侯傅寬信武侯靳歙皆高爵徐廣曰一無高字又一本皆從高祖從高祖起山東攻項籍誅殺名將破軍降城以十數未嘗困辱此亦天授也蒯成侯周緤操心堅正身不見疑上欲有所之未嘗不垂涕此有傷心者徐廣曰此一作比然可謂篤厚君子矣史記集解卷九十八
