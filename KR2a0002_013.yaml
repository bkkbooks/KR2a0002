body:
  text: 史記集解卷十三宋裴駰撰史記十三三代世表第一太史公曰五帝三代之記尚矣自殷以前諸侯不可得而譜周以來乃頗可著孔子因史文次春秋紀元年正時日月葢其詳哉至於序尚書則畧無年月或頗有然多闕不可録故疑則傳疑葢其慎也余讀諜記黃帝以來皆有年數稽其厯譜諜終始五徳之傳古文咸不同乖異夫子之弗論次其年月豈虚哉於是以五帝繫諜尚書世紀黃帝以來訖共和為世表帝泄帝不降帝扄不降弟帝厪帝孔甲不降子好鬼神淫亂不好徳二龍去帝皋帝發帝履癸是為桀從禹至桀十七世從黃帝至桀二十世殷湯代夏氏殷湯從黃帝至湯十七世帝外丙湯太子太丁早卒故立次弟外丙帝仲壬外丙弟帝太甲故太子太丁子淫伊尹放之桐宫三年悔過自責伊尹乃迎之復位帝沃丁伊尹卒帝太康沃丁弟帝小甲太康弟殷道衰諸侯或不至帝雍已小甲弟帝太戊雍已弟以桑榖生稱中宗帝中丁帝外壬中丁弟帝河亶甲外壬弟帝祖乙帝祖辛帝沃甲祖辛弟帝祖丁祖辛子帝南庚沃甲子帝陽甲祖丁子帝盤庚陽甲弟徙河南帝小辛盤庚弟帝小乙小辛弟帝武丁雉升鼎耳雊得傅説稱髙宗帝祖庚帝甲祖庚弟淫徐廣曰一云淫徳殷衰帝廪辛帝庚丁廩辛弟殷徙河北帝武乙慢神震死帝太丁帝乙殷益哀帝辛是為紂弑從湯至紂二十九世從黃帝至紂四十六世周武王伐殷從黃帝至武王十九世張夫子問褚先生曰詩言契后稷皆無父而生今案諸傳記咸言有父父皆黃帝子也得無與詩謬乎褚先生曰不然詩言契生於卵后稷人迹者欲見其有天命精誠之意耳鬼神不能自成須人而生奈何無父而生乎一言有父一言無父信以傳信疑以傳疑故兩言之堯知契稷皆賢人天之所生故封之契七十里後十餘世至湯王天下堯知后稷子孫之後王也故益封之百里其後世且千歳至文王而有天下詩傳曰湯之先為契無父而生契母與姊妹浴於𤣥丘水有燕銜卵墮之契母得故含之誤吞之即生契契生而賢堯立為司徒姓之曰子氏子者兹兹益大也詩人美而頌之曰殷社詩云土芒芒天命𤣥鳥降而生商商者質殷號也文王之先為后稷后稷亦無父而生后稷母為姜嫄出見大人蹟而履踐之知於身則生后稷姜嫄以為無父賤而棄之道中羊牛避不踐也抱普茅反之山中山者養之又捐之大澤鳥覆席食之姜嫄怪之於是知其天子乃取長之堯知其賢才立以為大農姓之曰姬氏姬者本也詩人美而頌之曰厥初生民深修益成而道后稷之始也孔子曰昔者堯命契為子氏為有湯也命后稷為姬氏為有文王也太王命季厯明天瑞也太伯之呉遂生源也天命難言非聖人莫能見舜禹契后稷皆黃帝子孫也黃帝䇿天命而治天下徳澤深後世故其子孫皆復立為天子是天之報有徳也人不知以為汜從布衣匹夫起耳夫布衣匹夫安能無故而起王天下乎其有天命然黃帝後世何王天下之久逺邪曰傳云天下之君王為萬夫之黔首請贖民之命者帝有福萬世黃帝是也五政明則修禮義因天時舉兵征伐而利者王有福千世蜀王黃帝後世也至今在漢西南五千里常來朝降輸獻於漢非以其先之有徳澤流後世邪行道徳豈可以忽乎哉人君王者舉而觀之漢大將軍霍子孟名光者亦黃帝後世也此可為博聞逺見者言固難為淺聞者説也何以言之古諸侯以國為姓霍者國名也武王封弟叔處於霍後世晉獻公滅霍公後世為庶民往來居平陽平陽在河東河東晉地分為魏國以詩言之亦可為周世周起后稷后稷無父而生以三代世𫝊言之后稷有父名髙辛髙辛黄帝曾孫黃帝終始𫝊曰漢興百有餘年有人不短不長出白燕之鄉持天下之政時有嬰兒主卻行車霍將軍者本居平陽自燕臣為郎時與方士考功㑹旗亭下西京賦曰旗亭五里薛綜曰旗亭市樓也立旗於上故取名焉為臣言豈不偉哉史記集解卷十三
