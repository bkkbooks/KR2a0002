body:
  text: 史記集解卷六十一宋裴駰撰史記六十一伯夷列傳第一夫學者載籍極博猶考信于六藝詩書雖缺然虞夏之文可知也堯將遜位讓于虞舜舜禹之間嶽牧咸薦乃試之于位典職數十年功用既興然後授政示天下重器王者大統傳天下若斯之難也而說者曰堯讓天下于許由許由不受恥之逃隱及夏之時有卞隨務光者此何以稱焉太史公曰余登箕山其上蓋有許由冢云孔子序列古之仁聖賢人如吳太伯伯夷之倫詳矣余以所聞由光義至髙其文辭不少概見何哉孔子曰伯夷叔齊不念舊惡怨是用希求仁得仁又何怨乎余悲伯夷之意睹軼詩可異焉其傳曰伯夷叔齊孤竹君之二子也父欲立叔齊及父卒叔齊讓伯夷伯夷曰父命也遂逃去叔齊亦不肯立而逃之國人立其中子于是伯夷叔齊聞西伯昌善養老盍往歸焉及至西伯卒武王載木主號為文王東伐紂伯夷叔齊叩馬而諫曰父死不葬爰及干戈可謂孝乎以臣弒君可謂仁乎左右欲兵之太公曰此義人也扶而去之武王已平殷亂天下宗周而伯夷叔齊恥之義不食周粟隱于首陽山采薇而食之及餓且死作歌其辭曰登彼西山兮采其薇矣以暴易暴兮不知其非矣神農虞夏忽焉沒兮我安適歸矣于嗟徂兮命之衰矣遂餓死于首陽山由此觀之怨耶非耶或曰天道無親常與善人若伯夷叔齊可謂善人者非耶積仁纍行如此而餓死且七十子之徒仲尼獨薦顔淵為好學然回也屢空糟糠不厭而卒蚤夭天之報施善人其何如哉盜跖日殺不辜肝人之肉暴戾恣雎聚黨數千人橫行天下竟以夀終是遵何德哉此其尤大彰明較著者也若至近世操行不軌専犯忌諱而終身逸樂富厚纍世不絶或擇地而蹈之時然後出言行不由徑非公正不發憤而遇禍災者不可稱數也余甚惑焉儻所謂天道是邪非邪子曰道不同不相為謀亦各從其志也故曰富貴如可求雖執鞭之士吾亦為之鄭𤣥曰富貴不可求而得之當修德以得之若于道可求而得之者雖執鞭賤職我亦為之如不可求從吾所好孔安國曰所好者古人之道歲寒然後知松柏之後凋何晏曰大寒之歲衆木皆死然後松柏少凋傷平歲衆木亦有不死者故須歲寒然後别之喻凡人處治世亦能自修整與君子同在濁世然後知君子之正不茍容也舉世混濁清士乃見豈以其重若彼其輕若此哉君子疾沒世而名不稱焉賈子曰貪夫徇財烈士徇名夸者死權衆庶馮生同明相照同類相求雲從龍風從虎王肅曰龍舉而景雲屬虎嘯而谷風興張蟠曰猶言雲從龍風從虎也聖人作而萬物覩馬融曰作起也伯夷叔齊雖賢得夫子而名益彰顔淵雖篤學附驥尾而行益顯巖穴之士趨舍有時若此類名堙滅而不稱悲夫閭巷之人欲砥行立名者非附青雲之士惡能施于後世哉史記集解卷六十一
