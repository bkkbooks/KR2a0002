body:
  text: 史記集解卷七十四宋裴駰撰史記七十四孟子荀卿列傳第十四太史公曰余讀孟子書至梁恵王問何以利吾國未嘗不廢書而歎也曰嗟乎利誠亂之始也夫子罕言利者常防其原也故曰放于利而行多怨自天子至于庶人好利之弊何以異哉孟軻騶人也受業子思之門人道既通游事齊宣王宣王不能用適梁梁恵王不果所言則見以為迂逺而濶于事情當是之時秦用商君富國彊兵楚魏用呉起戰勝弱敵齊威王宣王用孫子田忌之徒而諸侯東面朝齊天下方務于合從連衡以攻伐為賢而孟軻乃述唐虞三代之徳是以所如者不合退而與萬章之徒序詩書述仲尼之意作孟子七篇其後有騶子之屬齊有三騶子其前鄒忌以鼓琴干威王因及國政封為成侯而受相印先孟子其次騶衍後孟子騶衍睹有國者益淫侈不能尚徳若大雅整之于身施及黎庶矣乃深觀隂陽消息而作怪迂之變終始大聖之篇十餘萬言其語閎大不經必先驗小物推而大之至于無垠先序今以上至黄帝學者所共術大並世盛衰竝蒲浪反因載其禨祥度制推而逺之至天地未生窈㝠不可考而原也先列中國名山大川通谷禽獸水土所殖物類所珍因而推之及海外人之所不能睹稱引天地剖判以來五徳轉移治各有宜而符應若兹以為儒者所謂中國者于天下乃八十一分居其一分耳中國名曰赤縣神州赤縣神州内自有九州禹之序九州是也不得為州數中國外如赤縣神州者九乃所謂九州也于是有裨海環之人民禽獸莫能相通者如一區中者乃謂一州如此者九乃有大瀛海環其外天地之際焉其術皆此類也然要其歸必止乎仁義節儉君臣上下六親之施始也濫耳王公大人初見其術懼然顧化其後不能行之是以騶子重于齊適梁恵王郊迎執賓主之禮適趙平原君側行襒席如燕昭王擁彗先驅請列弟子之座而受業築碣石宫身親往師之作主運其游諸侯見尊禮如此豈與仲尼菜色陳蔡孟軻困于齊梁同乎哉故武王以仁義伐紂而王伯夷餓不食周粟衛靈公問陳而孔子不答梁恵王謀欲攻趙孟軻稱大王去邠此豈有意阿世俗茍合而已哉持方柄欲内圜鑿其能入乎或曰伊尹負鼎而勉湯以王百里奚飯牛車下而繆公用霸作先合然後引之大道騶衍其言雖不軌儻亦有牛鼎之意乎自騶衍與齊之稷下先生如淳于髠慎到環淵接子田駢騶奭之徒各著書言治亂之事以干世主豈可勝道哉淳于髠齊人也博聞彊記學無所主其陳説慕晏嬰之為人也然而承意觀色為務客有見髠于梁恵王恵王屏左右獨坐而再見之終無言也恵王怪之以譲客曰子之稱淳于先生管晏不及及見寡人寡人未有得也豈寡人不足為言邪何故哉客以謂髠髠曰固也吾前見王王志在驅逐後復見王王志在音聲吾是以黙然客具以報王王大駭曰嗟乎淳于先生誠聖人也前淳于先生之來人有獻善馬者寡人未及視會先生至後先生之來人有獻謳者未及試亦㑹先生來寡人雖屏人然私心在彼有之後淳于髠見一語連三日三夜無倦恵王欲以卿相位待之髠因謝去于是送以安車駕駟束帛加璧黄金百鎰終身不仕慎到趙人田駢接子齊人環淵楚人皆學黄老道徳之術因發明序其指意故慎到著十二論徐廣曰今慎子劉向所定有四十一篇環淵著上下篇而田駢接子皆有所論焉騶奭者齊諸騶子亦頗采騶衍之術以紀文于是齊王嘉之自如淳于髠以下皆命曰列大夫為開第康莊之衢爾雅曰四逹謂之衢五逹謂之康六逹謂之莊高門大屋尊寵之覧天下諸侯賓客言齊能致天下賢士也荀卿趙人年五十始來游學于齊騶衍之術迂大而閎辨奭也文具難施淳于髠久與處時有得善言故齊人頌曰談天衍雕龍奭炙轂徐廣曰一作亂諣過髠劉向别録曰騶衍之所言五徳終始天地廣大盡言天事故曰談天騶奭修衍之文餙若雕鏤龍文故曰雕龍别録曰過字作輠輠者車之盛膏器也炙之雖盡猶有餘流者言淳于髠智不盡如炙輠也左思齊都賦注曰言其多智難盡如炙膏過之有潤澤也田駢之屬皆已死齊襄王時而荀卿最為老師齊尚修列大夫之缺而荀卿三為祭酒焉齊人或讒荀卿荀卿乃適楚而春申君以為蘭陵令春申君死而荀卿廢因家蘭陵李斯嘗為弟子已而相秦荀卿嫉濁世之政亡國亂君相屬不遂大道而營于巫祝信禨祥鄙儒小拘如莊周等又滑稽亂俗于是推儒墨道徳之行事興壊序列著數萬言而卒因葬蘭陵而趙亦有公孫龍為堅白同異之辨晉太康地記云汝南西平縣有龍淵水可用淬刀劍持堅利故有堅白之論云黄所以為堅也白所以為利也或辨之曰白所以為不堅黄所以為不利劇子之言徐廣曰案應邵氏姓注直云處子也魏有李悝盡地力之教楚有尸子長廬劉向别録曰楚有尸子疑謂其在蜀今按尸子書晉人也名佼秦相衛鞅客也衛鞅商君謀事畫計立法理民未嘗不與佼規之也商君被刑狡恐并誅乃亡逃入蜀自為造此二十篇書凡六萬餘言卒因葬蜀阿之吁子焉徐廣曰阿者今之東阿自如孟子至于吁子世多有書故不論其傳云葢墨翟宋之大夫善守禦為節用墨子曰公輸般為雲梯之械成將以攻宋墨子聞之至于郢見公輸般墨子解帯為城以牒為械公輸般九設攻城之機變墨子九距之公輸般之攻械盡墨子之守固有餘公輸般詘而言曰吾知所以距子矣吾不言墨子亦曰吾知子之所以距我者吾不言楚王問其故墨子曰公輸子之意不過欲殺臣殺臣宋莫能守可攻也然臣之弟子禽滑釐等三百人已持臣守國之器在宋城上而待楚冦矣雖殺臣不能絶也楚王曰善哉吾請無攻宋城矣或曰竝孔子時或曰在其後史記集解卷七十四
