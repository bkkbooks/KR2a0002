body:
  text: 史記集解卷六十三宋裴駰撰史記六十三老子韓非列傳第三老子者楚苦縣厲鄉曲仁里人也地理志曰苦縣屬陳國姓李氏名耳字伯陽諡曰聃周守藏室之史也孔子適周將問禮于老子老子曰子所言者其人與骨皆已朽矣獨其言在耳且君子得其時則駕不得其時則蓬纍而行吾聞之良賈深藏若虛君子盛德容貌若愚去子之驕氣與多欲態色與淫志是皆無益于子之身吾所以告子若是而已孔子去謂弟子曰鳥吾知其能飛魚吾知其能遊獸吾知其能走走者可以為罔遊者可以為綸飛者可以為矰至于龍吾不能知其乘風雲而上天吾今日見老子其猶龍邪老子修道德其學以自隱無名為務居周久之見周之衰乃遂去至關關令尹喜曰子將隱矣強為我著書于是老子乃著書上下篇言道德之意五千餘言而去莫知其所終列仙傳曰關令尹喜者周大夫也善內學星宿服精華隱德行仁時人莫知老子西遊喜先見其氣知真人當過候物色而巨勝迹之果得老子老子亦知其竒為著書與老子俱之流沙之西服實莫知其所終亦著書九篇名關令子或曰老萊子亦楚人也著書十五篇言道家之用與孔子同時云蓋老子百有六十餘嵗或言二百餘嵗以其修道而養夀也自孔子死之後百二十有九年徐廣曰實年百一十九而史記周太史儋見秦獻公曰始秦與周合而離離五百嵗而復合合七十餘嵗而霸王者出焉或曰儋即老子或曰非也世莫知其然否老子隱君子也老子之子名宗宗為魏將封于段干此云封于段干段干應是魏邑名也而魏世家有段干木段干子田完世家有段干朋疑此三人是姓段干也本蓋因邑為姓左傳所謂邑亦如之是也風俗通氏姓注云姓段名干木恐或失之矣天下自别有段姓何必段干木邪宗子注注子宫宫玄孫假假仕于􅗛孝文帝而假之子解為膠西王卬太傅因家于齊焉世之學老子者則絀儒學儒學亦絀老子道不同不相為謀豈謂是邪李耳無為自化清靜自正莊子者蒙人也地理志曰蒙縣屬梁國名周周嘗為蒙漆園吏與梁惠王齊宣王同時其學無所不窺然其要本歸于老子之言故其著書十餘萬言大抵率寓言也作漁父盜跖胠篋以詆訿孔子之徒以明老子之術畏纍虛亢桑子之屬皆空語無事實然善屬書離辭指事類情用剽剝儒墨雖當世宿學不能自解免也其言洸洋自恣以適已故自王公大人不能器之楚威王聞莊周賢使使厚幣迎之許以為相莊周笑謂楚使者曰千金重利卿相尊位也子獨不見郊祭之犧牛乎養食之數歲衣以文繡以入太廟當是之時雖欲為孤豚豈可得乎子亟去無汚我我寧遊戲汚瀆之中自快無為有國者所羈終身不仕以快吾志焉申不害者京人也故鄭之賤臣學術以干韓昭侯昭侯用為相內修政教外應諸侯十五年終申子之身國治兵強無侵韓者申子之學本于黃老而主刑名著書二篇號曰申子劉向别録曰今民間所有上下二篇中書六篇皆合二篇已備過太史公所記韓非者韓之諸公子也喜刑名法術之學新序曰申子之書言人主當執術無刑因循以督責臣下其責深刻故號曰術商鞅所為書號曰法皆曰刑名故號曰刑名法術之書而其歸本于黃老非為人口吃不能道説而善著書與李斯俱事荀卿斯自以為不如非非見韓之削弱數以書諫韓王韓王不能用于是韓非疾治國不務修明其法制執勢以御其臣下富國強兵而以求人任賢反舉浮淫之蠧而加之于功實之上以為儒者用文亂法而俠者以武犯禁寬則寵名譽之人急則用介胄之士今者所養非所用所用非所養悲廉直不容于邪枉之臣觀往者得失之變故作孤憤五蠧內外儲説林説難十餘萬言然韓非知説之難為説難書甚具終死于秦不能自脫説難曰凡説之難非吾知之有以説之難也又非吾辨之難能明吾意之難也又非吾敢橫失能盡之難也凡説之難在知所説之心可以吾説當之所説出于為名髙者也而説之以厚利則見下節而遇卑賤必棄逺矣所説出于厚利者也而説之以名髙則見無心而逺事情必不收矣所説實為厚利而顯為名髙者也而説之以名髙則陽收其身而實疏之若説之以厚利則隂用其言而顯棄其身此之不可不知也夫事以密成而以泄敗未必其身泄之也而語及其所匿之事如是者身危貴人有過端而説者明言善議以推其惡者則身危周澤未渥也而語極知説行而有功則德亡説不行而有敗則見疑如是者身危夫貴人得計而欲自以為功説者與知焉則身危彼顯有所出事乃自以為也故説者與知焉則身危強之以其所必不為止之以其所不能已者身危故曰與之論大人則以為間已與之論細人則以為鬻權論其所愛則以為借資論其所憎則以為嘗已徑省其辭則不知而屈之泛濫博文則多而久之順事陳意則曰怯懦而不盡慮事廣肆則曰草野而倨侮此説之難不可不知也凡説之務在知飾所説之所敬而滅其所醜彼自知其計則無以其失窮之自勇其斷則無以其敵怒之自多其力則無以其難槩之規異事與同計譽異人與同行者則以節之無傷也有與同失者則明飾其無失也大忠無所拂辭悟言無所擊排乃後申其辨知焉此所以親近不疑知盡之難也徐廣曰知一作得難一作辭得曠日彌久而周澤既渥深計而不疑交爭而不罪乃明計利害以致其功直指是非以飾其身以此相持此説之成也伊尹為庖百里奚為虜皆所由干其上也故此二子者皆聖人也猶不能無役身而涉世如此其汙也則非能仕之所設也宋有富人天雨墻壞其子曰不築且有盜其鄰人之父亦云暮而果大亡其財其家甚知其子而疑鄰人之父昔者鄭武公欲伐胡乃以其子妻之因問羣臣曰吾欲用兵誰可伐者關其思曰胡可伐乃戮關其思曰胡兄弟之國也子言伐之何也胡君聞之以鄭為親已而不備鄭鄭人襲胡取之此二説者其知皆當矣然而甚者為戮薄者見疑非知之難也處知則難矣昔者彌子瑕見愛于衛君衛國之法竊駕君車者罪至刖既而彌子之母病人聞往夜告之彌子矯駕君車而出君聞之而賢之曰孝哉為母之故而犯刖罪與君遊果園彌子食桃而甘不盡而奉君君曰愛我哉忘其口而念我及彌子色衰而愛弛得罪于君君曰是嘗矯駕吾車又嘗食我以其餘桃故彌子之行未變于初也前見賢而後獲罪者愛憎之至變也故有愛于主則知當而加親見憎于主則罪當而加疏故諫説之士不可不察愛憎之主而後説之矣夫龍之為蟲也可擾狎而騎也然其喉下有逆鱗徑尺人有嬰之則必殺人人主亦有逆鱗説之者能無嬰人主之逆鱗則幾矣人或傳其書至秦秦王見孤憤五蠧之書曰嗟乎寡人得見此人與之遊死不恨矣李斯曰此韓非之所著書也秦因急攻韓韓王始不用非及急乃遣非使秦秦王悅之未信用李斯姚賈害之毁之曰韓非韓之諸公子也今王欲并諸侯非終為韓不為秦此人之情也今王不用久留而歸之此自遺患也不如以過法誅之秦王以為然下吏治非李斯使人遺非藥使自殺韓非欲自陳不得見秦王後悔之使人赦之非已死矣戰國策曰秦王封姚賈千户以為上卿韓非短之曰賈梁監門子盜于梁臣于趙而逐取世監門子梁大盜趙逐臣與同社稷之計非所以勵羣臣也王召賈問之賈答云云乃誅韓非也申子韓子皆著書傳于後世學者多有余獨悲韓子為説難而不能自脫耳太史公曰老子所貴道虛無因應變化于無為故著書辭稱微妙難識莊子散道德放論要亦歸之自然申子卑卑自勉勵之意也施之于名實韓子引繩墨切事情明是非其極慘礉胡革反用法慘急而鞠礉深刻少恩皆原于道德之意而老子深逺矣史記集解卷六十三
