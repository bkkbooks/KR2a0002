body:
  text: 史記集解卷九十一宋裴駰撰史記九十一黥布列傳第三十一黥布者六人也姓英氏秦時為布衣少年有客相之曰當刑而王及壯坐法黥布欣然笑曰人相我當刑而王㡬是乎徐廣曰㡬一作豈駰謂㡬近也人有聞者共俳笑之布已論輸麗山麗山之徒數十萬人布皆與其徒長豪桀交通廼率其曹偶亡之江中為羣盜陳勝之起也布廼見番君與其衆叛秦聚兵數千人番君以其女妻之章邯之滅陳勝破呂臣軍布乃引兵北擊秦左右校破之清波引兵而東聞項梁定江東會稽渉江而西陳嬰以項氏世為楚將廼以兵屬項梁渡淮南英布蒲將軍亦以兵屬項梁項梁渉淮而西擊景駒秦嘉等布常冠軍項梁至辥聞陳王定死廼立楚懷王項梁號為武信君英布為當陽君項梁敗死定陶懷王徙都彭城諸將英布亦皆保聚彭城當是時秦急圍趙趙數使人請救懷王使宋義為上將范増為末將項籍為次將英布蒲將軍皆為將軍悉屬宋義北救趙及項籍殺宋義於河上懷王因立籍為上將軍諸將皆屬項籍項籍使布先渡河擊秦布數有利籍廼悉引兵渉河從之遂破秦軍降章邯等楚兵常勝功冠諸侯諸侯兵皆以服屬楚者以布數以少敗衆也項籍之引兵西至新安又使布等夜擊坑章邯秦卒二十餘萬人至關不得入又使布等先從間道破關下軍遂得入至咸陽布常為軍鋒項王封諸將立布為九江王都六漢元年四月諸侯皆罷戲下各就國項氏立懷王為義帝徙都長沙廼隂令九江王布等行擊之其八月布使將擊義帝追殺之郴縣漢二年齊王田榮畔楚項王往擊齊徴兵九江九江王布稱病不往遣將將數千人行漢之敗楚彭城布又稱病不佐楚項王由此怨布數使使者誚讓漢書音義曰誚責也召布布愈恐不敢往項王方北憂齊趙西患漢所與者獨九江王又多布材欲親用之以故未擊漢三年漢王擊楚大戰彭城不利出梁地至虞謂左右曰如彼等者無足與計天下事謁者隨何進曰不審陛下所謂漢王曰孰能為我使淮南令之發兵倍楚留項王於齊數月我之取天下可以萬全一本作百全隨何曰臣請使之廼與二十人俱使淮南至因太宰主之漢書音義曰淮南太宰作内主也韋昭曰主舍也三日不得見隨何因説太宰曰王之不見何必以楚為彊以漢為弱此臣之所以為使使何得見言之而是邪是大王所欲聞也言之而非邪使何等二十人伏斧質淮南市以明王倍漢而與楚也太宰廼言之王王見之隨何曰漢王使臣敬進書大王御者竊怪大王與楚何親也淮南王曰寡人北鄉而臣事之隨何曰大王與項王俱列為諸侯北鄉而臣事之必以楚為强可以託國也項王伐齊身負板築李卒曰板牆板築杵也以為士卒先大王宜悉淮南之衆身自將之為楚君前鋒今廼發四千人以助楚夫北面而臣事人者固若是乎夫漢王戰於彭城項王未出齊也大王宜騷音掃淮南之兵渡淮日夜會戰彭城下大王撫萬人之衆無一人渡淮者垂拱而觀其孰勝夫託國於人者固若是乎大王提空名以鄉楚而欲厚自託臣竊為大王不取也然而大王不背楚者以漢為弱也夫楚兵雖彊天下負之以不義之名以其背盟約而殺義帝也然而楚王恃戰勝自彊漢王收諸侯還守成臯滎陽下蜀漢之粟深溝壁壘分卒守徼乗塞楚人還兵間以梁地深入敵國八九百里張晏曰羽從齊還當經梁地八九百里廼得羽地欲戰則不得攻城則力不能老弱轉糧千里之外楚兵至滎陽成臯漢堅守而不動進則不得攻退則不能解故曰楚兵不足恃也徐廣曰恃一作罷言其已困不足復苦也使楚勝漢則諸侯自危懼而相救夫楚之彊適足以致天下之兵耳故楚不如漢其勢易見也今大王不與萬全之漢而自託於危亡之楚臣竊為大王惑之臣非以淮南之兵足以亡楚也夫大王發兵而倍楚項王必留留數月漢之取天下可以萬全臣請與大王提劒而歸漢漢王必裂地而封大王又況淮南淮南必大王有也故漢王敬使使臣進愚計願大王之留意也淮南王曰請奉命隂許畔楚與漢未敢泄也楚使者在文頴曰在淮南王所方急責英布發兵舍傳舍隨何直入坐楚使者上坐曰九江王已歸漢楚何以得發兵布愕然楚使者起何因説布曰事以搆可遂殺楚使者無使歸而疾走漢并力布曰如使者教因起兵而擊之耳於是殺使者因起兵而攻楚楚使項聲龍且攻淮南項王留而攻下邑數月龍且擊淮南破布軍布欲引兵走漢恐楚王殺之故間行與何俱歸漢淮南王至徐廣曰三年十二月上方踞牀洗召布入見布甚大怒悔來欲自殺出就舍帳御飲食從官如漢王居布又大喜過望於是廼使人入九江楚已使項伯收九江兵盡殺布妻子布使者頗得故人幸臣將衆數千人歸漢漢益分布兵而與俱北收兵至成臯四年七月立布為淮南王與擊項籍漢五年布使人入九江得數縣六年布與劉賈入九江誘大司馬周殷周殷反楚遂舉九江兵與漢擊楚破之垓下項籍死天下定上置酒上折隨何之功謂何為腐儒為天下安用腐儒隨何跪曰夫陛下引兵攻彭城楚王未去齊也陛下發歩卒五萬人騎五千能以取淮南乎上曰不能隨何曰陛下使何與二十人使淮南至如陛下之意是何之功賢於歩卒五萬人騎五千也然而陛下謂何腐儒為天下安用腐儒何也上曰吾方圖子之功廼以隨何為䕶軍中尉布遂剖符為淮南王都六九江廬江衡山豫章郡皆屬布七年朝陳八年朝雒陽九年朝長安十一年高后誅淮隂侯布因心恐夏漢誅梁王彭越醢之盛其醢徧賜諸侯至淮南淮南王方獵見醢因大恐隂令人部聚兵候伺旁郡警急張晏曰欲有所會布所幸姬疾請就醫醫家與中大夫賁赫對門徐廣曰賁音肥姬數如醫家賁赫自以為侍中廼厚餽遺從姬飲醫家姬侍王從容語次譽赫長者也王怒曰汝安從知之具説狀王疑其與亂赫恐稱病王愈怒欲捕赫赫言變事乗傳詣長安布使人追不及赫至上變言布謀反有端可先未發誅也上讀其書語蕭相國相國曰布不宜有此恐仇怨妄誣之請繫赫使人微一作徴驗淮南王淮南王布見赫以罪亡上變固已疑其言國隂事漢使又來頗有所驗遂族赫家發兵反反書聞上廼赦賁赫以為將軍上召諸將問曰布反為之奈何皆曰發兵擊之坑豎子耳何能為乎汝隂侯滕公召故楚令尹問之令尹曰是故當反滕公曰上裂地而王之疏爵而貴之漢書音義曰疏分也禹決江疏河是也南靣而立萬乗之主其反何也令尹曰往年殺彭越前年擊韓信張晏曰往年前年同耳使文相避也言此三人者同功一體之人也自疑禍及身故反耳滕公言之上曰臣客故楚令尹辥公者其人有籌筴之計可問上廼召見問辥公辥公對曰布反不足怪也使布出於上計山東非漢之有也出於中計勝敗之數未可知也出於下計陛下安枕而卧矣上曰何謂上計令尹對曰東取呉西取楚并齊取魯傳檄燕趙固守其所山東非漢之有也何謂中計東取呉西取楚并韓取魏據敖倉之粟塞成臯之口勝敗之數未可知也何謂下計東取呉西取下蔡歸重於越身歸長沙陛下安枕而臥漢無事矣桓譚新論曰世有圍棊之戲或言是兵法之類也及為之上者逺棊疏張置以會圍因而成多得道之勝中者則務相絶遮要以爭便求利故勝負狐疑須計數而定下者則守邊隅趨作罫以自生於小地然亦必不如察辥公之言上計云取呉楚并齊魯反燕趙者此廣道地之謂中計云取呉楚并韓魏塞成臯據敖倉此趨遮要爭利者也下計云取呉下蔡據長沙以臨越此守邊隅趨作罫者也上曰是計將安出令尹對曰出下計上曰何謂廢上中計而出下計令尹曰布故麗山之徒也自致萬乗之主此皆為身不顧後為百姓萬世慮者也故曰出下計上曰善封嶭公千户廼立皇子長為淮南王上遂發兵自將東擊布布之初反謂其將曰上老矣厭兵必不能來使諸將諸將獨患淮隂彭越今皆已死餘不足畏也故遂反果如嶭公籌之東擊荆荆王劉賈走死富陵盡刦其兵渡淮擊楚楚發兵與戰徐僮間如淳曰地名也為三軍欲以相救為竒或説楚將曰布善用兵民素畏之且兵法諸侯戰其地為散地漢書音義曰謂散滅之地今别為三彼敗吾一軍餘皆走安能相救不聽布果破其一軍其二軍散走遂西與上兵遇蘄西會甀布兵精甚上廼壁庸地鄧展曰地名也望布軍置陳如項籍軍上惡之與布相望見遥謂布曰何苦而反布曰欲為帝耳上怒罵之遂大戰布軍敗走渡淮數止戰不利與百餘人走江南布故與番君婚以故長沙哀王徐廣曰表云成王臣呉芮之子也駰案晉灼曰芮之孫固或曰是成王非哀王也傳誤也使人紿布偽與亡誘走越故信而隨之番陽番陽人殺布兹鄉民田舍遂滅黥布立皇子長為淮南王封賁赫為期思侯諸將率多以功封者漢書曰將率封者六人太史公曰英布者其先豈春秋所見楚滅英六臯陶之後哉身被刑法何其拔興之暴也項氏之所坑殺人以千萬數而布常為首虐功冠諸侯用此得王亦不免於身為世大僇禍之興自愛姬殖妒媢音冒媢亦妒也生患竟以滅國史記集解卷九十一
