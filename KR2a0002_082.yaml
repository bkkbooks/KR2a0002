body:
  text: 史記集解卷八十四宋裴駰撰史記八十四屈原賈生列傳第二十四屈原者名平楚之同姓也為楚懷王左徒博聞強志明於治亂嫺史記音義曰音間於辭令入則與王圖議國事以出號令出則接遇賓客應對諸侯王甚任之上官大夫與之同列爭寵而心害其能懷王使屈原造為憲令屈平屬草藁未定上官大夫見而欲奪之屈平不與因讒之曰王使屈平為令衆莫不知每一令出平伐其功曰以為非我莫能為也王怒而疏屈平屈平疾王聽之不聰也讒諂之蔽明也邪曲之害公也方正之不容也故憂愁幽思而作離騷離騷者猶離憂也夫天者人之始也父母者人之本也人窮則反本故勞苦倦極未嘗不呼天也疾痛慘怛未嘗不呼父母也屈平正道直行竭忠盡智以事其君讒人間之可謂窮矣信而見疑忠而被謗能無怨乎屈平之作離騷蓋自怨生也國風好色而不淫小雅怨誹而不亂若離騷者可謂兼之矣上稱帝嚳下道齊桓中述湯武以刺世事明道德之廣崇治亂之條貫靡不畢見其文約其辭微其志潔其行廉其稱文小而其指極大舉類邇而見義逺其志潔故其稱物芳其行廉故死而不容自疏濯淖汙泥之中蟬蛻於濁穢以浮遊塵埃之外不獲世之滋垢皭然泥而不滓者也徐廣曰皭疏淨之貌推此志也雖與日月爭光可也屈平既絀其後秦欲伐齊齊與楚從親惠王患之乃令張儀詳去秦厚幣委質事楚曰秦甚憎齊齊與楚從親楚誠能絶齊秦願獻商於之地六百里楚懷王貪而信張儀遂絶齊使使如秦受地張儀詐之曰儀與王約六里不聞六百里楚使怒去歸告懷王懷王怒大興師伐秦秦發兵擊之大破楚師於丹浙斬首八萬虜楚將屈丐遂取楚之漢中地徐廣曰楚懷王十六年張儀來相十七年秦敗屈丐懷王乃悉發國中兵以深入擊秦戰於藍田魏聞之襲楚至鄧楚兵懼自秦歸而齊竟怒不救楚楚大困明年秦割漢中地與楚以和楚王曰不願得地願得張儀而甘心焉張儀聞乃曰以一儀而當漢中地臣請往如楚如楚又因厚幣用事者臣靳尚而設詭辨於懷王之寵姬鄭袖懷王竟聽鄭袖復釋去張儀是時屈平既疏不復在位使於齊顧反諫懷王曰何不殺張儀懷王悔追張儀不及其後諸侯共擊楚大破之殺其將唐昧徐廣曰二十八年敗唐昧也時秦昭王與楚婚欲與懷王會懷王欲行屈平曰秦虎狼之國不可信不如無行懷王稚子子蘭勸王行奈何絶秦歡懷王卒行入武關秦伏兵絶其後因留懷王徐廣曰三十年入秦以求割地懷王怒不聽亡走趙趙不內復之秦竟死於秦而歸葬長子頃襄王立以其弟子蘭為令尹楚人既咎子蘭以勸懷王入秦而不反也屈平既嫉之雖放流眷顧楚國繫心懷王不忘欲反冀幸君之一悟俗之一改也其存君興國而欲反覆之一篇之中三致志焉然終無可奈何故不可以反卒以此見懷王之終不悟也人君無愚智賢不肖莫不欲求忠以自為舉賢以自佐然亡國破家相隨屬而聖君治國纍世而不見者其所謂忠者不忠而所謂賢者不賢也懷王以不知忠臣之分故內惑於鄭袖外欺於張儀疏屈平而信上官大夫令尹子蘭兵挫地削亡其六郡身客死於秦為天下笑此不知人之禍也易曰井泄不食向秀曰泄者浚治去泥濁也為我心測張蟠曰可為惻然傷道未行也可以汲王明並受其福易象曰求王明受福也王之不明豈足福哉徐廣曰一云不足福令尹子蘭聞之大怒卒使上官大夫短屈原於頃襄王頃襄王怒而遷之離騷序曰遷於江南屈原至於江濱被髮行吟澤畔顔色憔悴形容枯稿漁父見而問之曰子非三閭大夫歟離騷序曰三閭之職掌王族三姓曰昭屈景序其譜屬率其賢良以厲國士也何故而至此屈原曰舉世混濁而我獨清衆人皆醉而我獨醒是以見放漁父曰夫聖人者不凝滯於物而能與世推移舉世混濁何不隨其流而揚其波衆人皆醉何不餔其糟而啜其醨何故懷瑾握瑜而自令見放為屈原曰吾聞之新沐者必彈冠新浴者必振衣人又誰能以身之察察王逸曰已靜潔受物之汶汶者乎王逸曰蒙垢敝寧赴常流而葬乎江魚腹中耳又安能以皓皓之白而蒙世之溫蠖乎乃作懷沙之賦其辭曰陶陶孟夏兮草木莽莽王逸曰陶陶盛陽貌莽莽盛茂貌傷懷永哀兮汨徂南土王逸曰汨行貌眴兮窈窈徐廣曰眴眩也孔靜幽墨王逸曰孔甚也墨無聲也寃結紆軫兮離愍之長鞠王逸曰鞠窮紆屈也軫痛也愍病也撫情效志兮俯詘以自抑刓方以為圜兮常度未替王逸曰刓削度法替廢也言人刓削方木欲以為圓其常法度尚未廢也易初本由兮君子所鄙王逸曰由道也章畫職墨兮前度未改王逸曰章明也度法也言工明於所畫念其繩墨修前人之法不易其道則曲木直而惡木好內直質重兮大人所盛王逸曰言人質性敦厚心志正直行無過失則大人君子所盛美也巧匠不斫兮孰察其揆正玄文幽處兮矇謂之不章王逸曰玄黑也矇盲者也詩云矇瞍奏功章明也離婁微睇兮瞽以為無明王逸曰離婁古明視者也瞽盲也變白而為黑兮倒上以為下鳳皇在笯兮雞雉翔舞徐廣曰笯一作郊駰案王逸曰笯籠落也同糅玉石兮一槩而相量王逸曰忠佞不異夫黨人之鄙妒兮羌不知吾所臧王逸曰莫昭我之善意任重載盛兮陷滯而不濟王逸曰言已才力盛壯可任用重載而身陷沒沈滯不得成其本志也懷瑾握瑜兮窮不得余所示王逸曰示語也邑犬羣吠兮吠所怪也誹駿疑桀兮固庸熊也王逸曰千人才為俊一國高為桀也庸厮賤之人也文質疏內兮衆不知吾之異采徐廣曰異一作奧駰案王逸曰采文采也材朴委積兮莫知余之所有重仁襲義兮謹厚以為豐王逸曰重纍也襲及也重華不可牾兮孰知余之從容王逸曰牾逢也古固有不並兮豈知其故也湯禹久逺兮邈不可慕也懲違改忿兮抑心而自強離湣而不遷兮願志之有象王逸曰象法也進路北次兮日昧昧其將暮含憂虞哀兮限之以大故王逸曰娛樂也大故謂死亡也亂曰浩浩沅湘兮分流汨兮王逸曰汨流也修路幽拂兮道逺忽兮曾吟恆悲兮永歎慨兮世既莫吾知兮人心不可謂兮王逸曰謂猶説也懷情抱質兮獨無匹兮伯樂既殁兮驥將焉程兮王逸曰程量也人生有命兮各有所錯兮王逸曰錯安也定心廣志余何畏懼兮曾傷爰哀永歎喟兮王逸曰喟息也世溷不吾知心不可謂兮知死不可讓兮願勿愛兮明以告君子兮吾將以為類兮王逸曰類法也於是懷石遂自投汨羅以死應劭曰汨水在羅故曰汨羅也屈原既死之後楚有宋玉唐勒景差徐廣曰或作慶之徒者皆好辭而以賦見稱然皆祖屈原之從容辭令終莫敢直諫其後楚日以削數十年竟為秦所滅自屈原沈汨羅後百有餘年漢有賈生為長沙王太傳過湘水投書以弔屈原賈生名誼雒陽人也年十八以能誦詩屬書聞於郡中吳廷尉為河南守聞其秀才召置門下甚幸愛孝文皇帝初立聞河南守吳公治平為天下第一故與李斯同邑而常學事焉乃徵為廷尉廷尉乃言賈生年少頗通諸子百家之書文帝召以為博士是時賈生年二十餘最為少每詔令議下諸老先生不能言賈生盡為之對人人各如其意所欲出諸生於是乃以為能不及也孝文帝説之超遷一歲中至太中大夫賈生以為漢興至孝文二十餘年天下和洽而固當改正朔易服色法制度定官名興禮樂乃悉草具其事儀法色尚黃數用五為官名悉更秦之法孝文帝初即位謙讓未遑也諸律令所更定及列侯悉就國其説皆自賈生發之於是天子議以為賈生任公卿之位絳灌東陽侯馮敬之屬盡害之乃短賈生曰雒陽之人年少初學專欲擅權紛亂諸事於是天子後亦疏之不用其議乃以賈生為長沙王太傳賈生既辭往行聞長沙卑溼自以夀不得長又以適去徐廣曰竹革反韋昭曰謫譴也意不自得及渡湘水為賦以弔屈原其辭曰共承嘉惠兮張晏曰恭敬也俟罪長沙側聞屈原兮自沈汨羅造託湘流兮敬弔先生遭世罔極兮乃隕厥身嗚呼哀哉逢時不祥鸞鳳伏竄兮鴟梟翺翔闒茸尊顯兮讒諛得志賢聖逆曳兮方正倒植世謂伯夷貪兮謂盜跖廉莫邪為頓兮應劭曰莫邪吳大夫也作寶劒因以冠名瓚曰許慎曰莫邪大戟也鉛刀為銛徐廣曰思廉反駰案漢書音義曰銛謂利于嗟嚜嚜兮生之無故應劭曰嚜嚜不自得意瓚曰生謂屈原也斡棄周鼎兮而寶康瓠如淳曰斡轉也爾雅曰康瓠謂之甈大瓠也應劭曰康容也斡音管管轉也康空也騰駕罷牛兮驂蹇驢驥垂兩耳兮服鹽車章甫薦屨兮應劭曰章甫殷冠也漸不可久劉向别録曰因以自論自恨也嗟苦先生兮獨離此咎應劭曰嗟咨嗟勞苦屈原遇此難也訊曰李竒曰訊告也張晏曰訊離騷下章亂辭也已矣國其莫我知獨堙鬱兮其誰語鳳漂漂其高遰兮夫固自縮而逺去襲九淵之神龍兮鄧辰曰襲重也或曰襲覆也猶言察也沕徐廣曰亡筆反深潛以自珍張晏曰沕潛藏也彌融爚徐廣曰一云􅀈蟂獺以隱處兮徐廣曰一本云彌蝎􅭃以隱處兮夫豈從蟻與蛭蚓漢書蟻字作蝦韋昭曰蝦蝦蟇也蛭水蟲蚓丘蚓也所貴聖人之神德兮逺濁世而自藏使騏驥可得係羈兮豈云異夫犬羊般紛紛其離此尤兮蘇林曰般音盤孟康曰盤音班或曰盤桓不去紛紛構讒意也亦夫子之辜也瞝九州而相君兮何必懷此都也鳳皇翔于千仞之上兮覽德輝焉下之見細德之險微兮搖增翮徐廣曰一云遙增擊也逝而去之彼尋常之汙瀆兮應劭曰八尺曰尋倍尋曰常豈能容吞舟之魚橫江湖之鱣鱏兮如淳曰大魚也瓚曰鱏魚無鱗口近腹下固將制於螻蟻賈生為長沙王太傳三年有梟飛入賈生舍止於坐隅楚人命梟曰服晉灼曰異物志有山梟體有文色土浴因形名之曰服不能逺飛行不出域賈生既以適居長沙長沙卑濕自以為夀不得長傷悼之乃為賦以自廣其辭曰單閼之歲兮徐廣曰歲在卯曰單閼文帝六年歲在丁卯四月孟夏庚子日施兮服集豫舍徐廣曰施一作斜止于坐隅貌甚間暇異物來集兮私怪其故發書占之兮策言其度曰野鳥入處兮主人將去請問于服兮豫去何之吉乎告我凶言其災淹數之度兮語豫其期徐廣曰數速也服乃歎息舉首奮翼口不能言請對以臆萬物變化兮固無休息斡流而遷兮或推而還形氣轉續兮變化而嬗服虔曰嬗音如蟬反變蛻也或曰蟬蔓相連也沕穆無窮兮胡可勝言禍兮福所倚福兮禍所伏憂喜聚門兮吉凶同域彼吳強大兮夫差以敗越棲會稽兮句踐霸世斯遊遂成兮卒被五刑韋昭曰斯李斯也傅説胥靡兮徐廣曰腐刑也乃相武丁夫禍之與福兮何異糾纆應劭曰禍福相為表裏如糾纆繩索相附會也瓚曰糾絞也纆索也命不可説兮孰知其極水激則旱兮矢激則逺萬物回薄兮振蕩相轉雲蒸雨降兮錯繆相紛大專槃物兮漢書専字作釣如淳曰陶者作器於鈞上此以造化為大鈞坱軋無垠應劭曰其氣央軋非有限齊也坱音若央軋音若乙天不可與慮兮道不可與謀遲數有命兮惡識其時且夫天地為爐兮造化為工隂陽為炭兮萬物為銅合散消息兮安有常則千變萬化兮未始有極忽然為人兮何足控摶如淳曰控引也控摶玩弄愛生之意也化為異物兮又何足患小知自私兮賤彼貴我通人大觀兮物無不可貪夫徇財兮列士殉名應劭曰徇營也瓚曰以身從物曰殉夸者死權兮應劭曰夸毗也好營死於權利瓚曰夸泰也莊子曰權勢不死則夸者不悲也品庶馮生孟康曰馮貪也怵迫之徒兮或趍西東孟康曰怵為利所誘怵也迫迫貧賤東西趍利也大人不曲兮億變齊同拘士繫俗兮攌如囚拘徐廣曰攌音華板反又音脘至人遺物兮獨與道俱衆人或或兮好惡積意李竒曰或或東西也所好所惡積之萬億也瓚曰言衆懷抱好惡積之心意真人淡漠兮獨與道息釋知遺形兮超然自喪服虔曰絶聖棄知而亡其身也寥廓忽荒兮與道翺翔乘流則逝兮得坻則止徐廣曰坻一作坎駰案張宴曰坻水中小洲也縱軀委命兮不私與己其生若浮兮其死若休淡乎若深淵之靜汜乎若不繫之舟不以生故自寶兮飬空而遊漢書音義曰如舟之空也德人無纍兮知命不憂細故慸葪兮何足以疑韋昭曰慸音土介反後歲餘賈生徵見孝文帝方受釐徐廣曰祭祀福胙也駰案如淳曰漢唯祭天地五畤皇帝不自行祠還致福釐音僖坐宣室蘇林曰未央前正室上因感鬼神事而問鬼神之本賈生因具道所以然之狀至夜半文帝前席既罷曰吾久不見賈生自以為過之今不及也居頃之拜賈生為梁懷王太傅梁懷王文帝之少子愛而好書故令賈生傅之文帝復封淮南厲王子四人皆為列侯賈生諫以為患之興自此起矣賈生數上疏言諸侯或連數郡非古之制可稍削之文帝不聽居數年懷王騎墮馬而死徐廣曰文帝十一年無後賈生自傷為傳無狀哭泣歲餘亦死賈生之死時年三十三矣及孝文崩孝武皇帝立舉賈生之孫二人至郡守而賈嘉最好學世世其家與余通書至孝昭時列為九卿太史公曰余讀離騷天問招魂哀郢悲其志適長沙觀屈原所自沈淵未嘗不垂涕想見其為人及見賈生弔之又怪屈原以彼其才遊諸侯使國不容而自令若是讀服鳥賦同死生輕去就又爽徐廣曰本作奭然自失矣史記集解卷八十四
