body:
  text: 史記集解卷六十宋裴駰撰史記六十三王世家第三十大司馬臣去病昧死再拜上疏皇帝陛下陛下過聽使臣去病待罪行間宜専邊塞之思慮暴骸中野無以報乃敢惟他議以干用事者誠見陛下憂勞天下哀憐百姓以自忘虧膳貶樂損郎員皇子賴天能勝衣趨拜至今無號位師傅官陛下恭讓不恤羣臣私望不敢越職而言臣竊不勝犬馬心昧死願陛下詔有司因盛夏吉時定皇子位唯陛下幸察臣去病昧死再拜以聞皇帝陛下三月乙亥御史臣光守尚書令奏未央宮制曰下御史六年三月戊申朔乙亥御史臣光守尚書令丞非下御史書到言丞相臣青翟御史大夫臣湯太常臣充大行令臣息太子少傅臣安行宗正事昧死上言大司馬去病上疏曰陛下過聽使臣去病待罪行間宜専邊塞之思慮暴骸中野無以報乃敢惟他議以干用事者誠見陛下憂勞天下哀憐百姓以自忘虧膳貶樂損郎員皇子賴天能勝衣趨拜至今無號位師傅官陛下恭讓不恤羣臣私望不敢越職而言臣竊不勝犬馬心昧死願陛下詔有司因盛夏吉時定皇子位唯願陛下幸察制曰下御史臣謹與中二千石二千石臣賀等議古者裂地立國竝建諸侯以承天子所以尊宗廟重社稷也今臣去病上疏不忘其職因以宣恩乃道天子卑讓自貶以勞天下慮皇子未有號位臣青翟臣湯等宜奉義遵職愚憧而不逮事方今盛夏吉時臣青翟臣湯等昧死請立皇子臣閎徐廣曰一作關臣旦臣胥為諸侯王昧死請所立國名制曰蓋聞周封八百姬姓竝列或子男附庸禮支子不祭云竝建諸侯所以重社稷朕無聞焉且天非為君生民也朕之不德海內未洽乃以未教成者强君連城即股肱何勸徐廣曰一作敦一作朂一作觀也其更議以列侯家之三月丙子奏未央宮丞相臣青翟御史大夫臣湯昧死言臣謹與列侯臣嬰齊中二千石二千石臣賀諫大夫博士臣安等議曰伏聞周封八百姬姓竝列奉承天子康叔以祖考顯而伯禽以周公立咸為建國諸侯以相傳為輔百官奉憲各遵其職而國統備矣竊以為竝建諸侯所以重社稷者四海諸侯各以其職奉貢祭支子不得奉祭宗祖禮也封建使守藩國帝王所以扶德施化陛下奉承天統明開聖緒尊賢顯功興滅繼絶續蕭文終之後于酇褒厲羣臣平津侯等昭六親之序明天施之屬使諸侯王封君得推私恩分子弟户邑錫號尊建百有餘國而家皇子為列侯則尊卑相踰列位失序不可以垂統於萬世臣請立臣閎臣旦臣胥為諸侯王三月丙子奏未央宮制曰康叔親屬有十而獨尊者褒有德也周公祭天命郊故魯有白牡騂剛之牲公羊傳曰魯祭周公牲用白牡魯公用騂剛何休曰白牲殷牲也騂剛赤脊周牲也羣公不毛何休曰不毛不純色也賢不肖差也高山仰止景行嚮之朕甚慕焉所以抑未成家以列侯可四月戊寅奏未央宮丞相臣青翟御史大夫臣湯昧死言臣青翟等與列侯吏二千石諫大夫博士臣慶等議昧死奏請立皇子為諸侯王制曰康叔親屬有十而獨尊者褒有德也周公祭天命郊故魯有白牡辭剛之牲羣公不毛賢不肖差也高山仰之景行嚮之朕甚慕焉所以抑未成家以列侯可臣青翟臣湯博士臣將行等伏聞康叔親屬有十武王繼體周公輔成王其八人皆以祖考之尊建為大國康叔之年幼周公在三公之位而伯禽據國於魯蓋爵命之時未至成人康叔後扞祿父之難伯禽殄淮夷之亂昔五帝異制周爵五等春秋三等鄭𤣥曰春秋變周之文從殷之質合伯子男以為一則殷爵三等者公侯伯也皆因時而序尊卑高皇帝撥亂世反諸正昭至德定海內封建諸侯爵位二等皇子或在繦褓而立為諸侯王奉承天子為萬世法則不可易陛下躬親仁義體行聖德表裏文武顯慈孝之行廣賢能之路內褒有德外討强暴極臨北海西湊月氏丐奴西域舉國奉師輿械之費不賦於民虛御府之藏以賞元戎詩云元戎十乘以先啓行韓嬰章句曰元戎大戎謂兵車也車有大戎十乘謂車縵輪馬被甲衡扼之上盡有劒㦸名曰陷軍之車所以冒突先啓敵家之行伍也毛傳曰夏后氏曰鉤車先正也殷曰寅車先疾也周曰元戎先良也開禁倉以賑貧窮減戍卒之半百蠻之君靡不鄉風承流稱意逺方殊俗重譯而朝澤及方外故珍獸至嘉榖興天應甚彰今諸侯支子封至諸侯王而家皇子為列侯臣青翟臣湯等竊伏熟計之皆以為尊卑失序使天下失望不可臣請立臣閎臣旦臣胥為諸侯王四月癸未奏未央宮留中不下丞相臣青翟太僕臣賀行御史大夫事太常臣充太子少傅臣安行宗正事昧死言臣青翟等前奏大司馬臣去病上疏言皇子未有號位臣謹與御史大夫臣湯中二千石二千石諫大夫博士臣慶等昧死請立皇子臣閎等為諸侯王陛下讓文武躬自切及皇子未教羣臣之議儒者稱其術或悖其心陛下固辭弗許家皇子為列侯臣青翟等竊與列侯臣夀成徐廣曰蕭何之𤣥孫酇侯夀成後為太常也等二十七人議皆曰以為尊卑失序髙皇帝建天下為漢太祖王子孫廣支輔先帝法則弗改所以宣至尊也臣請令史官擇吉日具禮儀上御史奏輿地圖他皆如前故事制曰可四月丙申奏未央宫太僕臣賀行御史大夫事昧死言太常臣充言卜入四月二十八日乙巳可立諸侯王臣昧死奏輿地圖請所立國名禮儀别奏臣昧死請制曰立皇子閎為齊王旦為燕王胥為廣陵王四月丁酉奏未央宫六年徐廣曰云元狩四月戊寅朔癸卯御史大夫湯下丞相丞相下中二千石二千石下郡太守諸侯相丞書從事下當用者如律令維六年四月乙巳皇帝使御史大夫湯廟立子閎為齊王曰於戲小子閎受兹青社張晏曰王者以五色土為太社封四方諸侯各以其方色土與之苴以白茅歸以立社朕承祖考維稽古建爾國家封于東土世為漢藩輔於戲念哉恭朕之詔惟命不于常人之好德克明顯光義之不圖禆君子怠悉爾心允執其中天祿永終厥有愆不臧乃凶于而國害于爾躬於戲保國艾民可不敬與王其戒之徐廣曰立八年無後絶右齊王策維六年四月乙巳皇帝使御史大夫湯廟立子旦為燕王曰於戲小子旦受兹𤣥社朕承祖考維稽古建爾國家封于北土世為漢藩輔於戲葷粥氏虐老獸心侵犯寇盜加以姦巧邉萌於戲朕命將率徂征厥罪萬夫長千夫長三十有二人皆來張晏曰時所獲三十二師也降旗奔師如淳曰偃其旗鼓而來降葷粥徙域張晏曰胸奴徙東也北州以綏臣瓚曰綏安也悉爾心毋作怨毋俷徐廣曰俷一作非毋乃廢備非教士士不得從徵張晏曰士不素習不應召於戲保國艾民可不敬與王其戒之徐廣曰立三十年自殺國除右燕王䇿維六年四月乙巳皇帝使御史大夫湯廟立子胥為廣陵王曰於戲小子胥受兹赤社朕承祖考維稽古建爾國家封于南土世為漢藩輔古人有言曰大江之南五湖之間其人輕心揚州保疆徐廣曰一作壃駰案李竒曰保恃也三代要服不及以政於戲悉爾心戰戰兢兢乃惠乃順毋侗好佚毋邇宵人應劭曰無好逸遊之事邇近小人張晏曰侗音同維法維則書云臣不作威不作福靡有後羞於戲保國艾民可不敬與王其戒之徐廣曰立六十四年自殺右廣陵王䇿太史公曰古人有言曰愛之欲其富親之欲其貴故王者疆土建國封立子弟所以褒親親序骨肉尊先祖貴支體廣同姓於天下也是以形勢强而王室安自古至今所由來久矣非有異也故弗論著也燕齊之事無足采者然封立三王天子恭讓羣臣守義文辭爛然甚可觀也是以附之世家褚先生曰臣幸得以文學為侍郎好覽觀太史公之列傳傳中稱三王世家文辭可觀求其世家終不能得竊從長老好故事者取其封䇿書編列其事而傳之令後世得觀賢主之指意蓋聞孝武帝之時同日而俱拜三子為王封一子於齊一子於廣陵一子於燕各因子才力智能及土地之剛柔人民之輕重為作策以申戒之謂王世為漢藩輔保國治民可不敬與王其戒之夫賢主所作固非淺聞者所能知非博聞强記君子者所不能究竟其意至其次序分絶文字之上下簡之參差長短皆有意人莫之能知謹論次其真草詔書編于左方令覽者自通其意而解說之王夫人者趙人也與衛夫人並幸武帝而生子閎閎且立為王時其母病武帝自臨問之曰子當為王欲安所置之王夫人曰陛下在妾又何等可言者帝曰雖然意所欲欲於何所王之王夫人曰願置之雒陽武帝曰雒陽有武庫敖倉天下衝厄漢國之大都也先帝以來無子王於雒陽者去雒陽餘盡可王夫人不應武帝曰關東之國無大於齊者齊東負海而城郭大古時獨臨菑中十萬户天下膏腴地莫盛於齊者矣王夫人以手擊頭謝曰幸甚王夫人死而帝痛之使使者拜之曰皇帝謹使使太中大夫明奉璧一賜夫人為齊王太后子閎王齊年少無有子立不幸早死國絶為郡天下稱齊不宜王云所謂受此土者諸侯王始封者必受土於天子之社歸立之以為國社以歲時祠之春秋大傳曰天子之國有泰社東方青南方赤西方白北方黑上方黃故將封於東方者取青土封於南方者取赤土封於西方者取白土封於北方者取黑土封於上方者取黃土各取其物色裹以白茅封以為社此始受封於天子者也此之為主土主土者立社而奉之也朕承祖考祖者先也考者父也維稽古維者度也念也稽者當也當順古之道也齊地多變詐不習於禮義故戒之曰恭朕之詔唯命不可為常人之好德能明顯光不圖於義使君子怠慢悉若心信執其中天祿長終有過不善乃凶于而國而害于若身齊王之國左右維持以禮義不幸中年早夭然全身無過如其策意傳曰青采出於藍而質青於藍者教使然也逺哉賢主昭然獨見誡齊王以慎內誡燕王以無作怨無俷德誡廣陵王以慎外無作威與福夫廣陵在吳越之地其民精而輕故誡之曰江湖之間其人輕心揚州葆疆三代之時迫要使從中國俗服不大及以政教以意御之而已無侗好逸無邇宵人維法是則無長好佚樂馳騁弋獵淫康而近小人常念法度則無羞辱矣三江五湖有魚鹽之利銅山之富天下所仰故誡之曰臣不作福者勿使行財幣厚賞賜以立聲譽為四方所歸也又曰臣不作威者勿使因輕以倍義也會孝武帝崩孝昭帝初立先朝廣陵王胥厚賞賜金錢財幣直三千餘萬益地百里邑萬户㑹昭帝崩宣帝初立緣恩行義以本始元年中裂漢地盡以封廣陵王胥四子一子為朝陽侯一子為平曲侯一子為南利侯最愛少子𢎞立以為高密王其後胥果作威福通楚王使者楚王宣言曰我先元王高帝少弟也封三十二城今地邑益少我欲與廣陵王共發兵云立廣陵王為上我復王楚三十二城如元王時事發覺公卿有司請行罰誅天子以骨肉之故不忍致法於胥下詔書無治廣陵王獨誅首惡楚王𫝊曰蓬生麻中不扶自直白沙在泥中與之皆黑者土地教化使之然也其後胥復祝詛謀反自殺國除燕土墝埆北迫胸奴其人民勇而少慮故誡之曰葷粥氏無有孝行而禽獸心以竊盜侵犯邊民朕詔將軍往征其罪萬夫長千夫長三十有二君皆來降旗奔師葷粥徙域逺處圵州以安矣悉若心無作怨者勿使從俗以怨望也無俷德者勿使上背德也無廢備者無乏武備常備胸奴也非教士不得從徵者言非習禮義不得在於側也㑹武帝年老長而太子不幸薨未有所立而旦使來上書請身入宿衛於長安孝武見其書擊地怒曰生子當置之齊魯禮義之鄉乃置之燕趙果有爭心不讓之端見矣於是使使即斬其使者於闕下㑹武帝崩昭帝初立旦果作怨而望大臣自以長子當立與齊王子劉澤等謀為叛逆出言曰我安得弟在者今立者乃大將軍子也欲發兵事發覺當誅昭帝緣恩寬忍抑案不揚公卿使大臣請遣宗正與大中大夫公户滿意御史二人偕往使燕風喻之到燕各異日更見責王宗正者主宗室諸劉屬籍先見王為列陳道昭帝實武帝子狀侍御史乃復見王責之以正法問王欲發兵罪名明白當坐之漢家有正法王犯纎介小罪過即行法直斷耳安能寬王驚動以文法王意益下心恐公户滿意習於經術最後見王稱引古今通義國家大禮文章爾雅謂王曰古者天子必內有異姓大夫所以正骨肉也外有同姓大夫所以正異姓也周公輔成王誅其兩弟故治武帝在時尚能寬王今昭帝始立年幼富於春秋未臨政委任大臣古者誅罰不阿親戚故天下冶方今大臣輔政奉法直行無敢所阿恐不能寬王王可自謹無自令身死國滅為天下笑於是燕王旦乃恐懼服罪叩頭謝過大臣欲和合骨肉難傷之以法其後旦復與左將軍上官桀等謀反宣言曰我次太子太子不在我當立大臣共抑我云云大將軍光輔政與公卿大臣議曰燕王旦不改過悔正行惡不變於是修法直斷行罰誅旦自殺國除如其䇿指有司請誅旦妻子孝昭以骨肉之親不忍致法寬赦旦妻子免為庶人𫝊曰蘭根與白芷漸之滫中君子不近庶人不服所以漸然也宣帝初立推恩宣德以本始元年中盡復封燕王旦兩子一子為安定侯立燕故太子建為廣陽王以奉燕王祭祀史記集解卷六十
