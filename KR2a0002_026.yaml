body:
  text: 史記集解卷二十八宋裴駰撰史記二十八封禪書第六自古受命帝王曷嘗不封禪蓋有無其應而用事者矣未有睹符瑞見而不臻乎泰山者也雖受命而功不至至梁父矣而德不洽洽矣而日有不暇給是以即事用希傳曰三年不為禮禮必廢三年不為樂樂必壞每世之隆則封禪答焉及衰而息厥曠逺者千有餘載近者數百載故其儀闕然煙滅其詳不可得而記聞云尚書曰舜在琁璣玉衡以齊七政遂類于上帝禋于六宗望山川遍羣神輯五瑞擇吉月日見四嶽諸牧還瑞徐廣曰還一作班歲二月東巡狩至于岱宗岱宗泰山也柴望秩于山川遂覲東后東后者諸侯也合時月正日同律度量衡修五禮五玉三帛二牲一死贄五月巡狩至南嶽南嶽衡山也八月巡狩至西嶽西嶽華山也十一月巡狩至北嶽北嶽恆山也皆如岱宗之禮中嶽嵩高也五載一巡狩禹遵之後十四世至帝孔甲淫德好神神瀆二龍去之其後二世湯伐桀欲遷夏社不可作夏社後八世至帝大戊有桑穀生於廷一暮大拱懼伊陟徐廣曰陟古作敇曰妖不勝德大戊修德桑榖死伊陟贊巫咸巫咸之興自此始後十四世帝武丁得傅説為相殷復興焉稱高宗有雉徐廣曰一作鷮音嬌登鼎耳雊武丁懼祖巳曰修德武丁從之位以永寧後五世帝武乙慢神而震死後三世帝紂淫亂武王伐之由此觀之始未嘗不肅祗後稍怠慢也周官曰冬日至祀天於南郊迎長日之至夏日至祭地祗皆用樂舞而神乃可得而禮也天子祭天下名山大川五嶽視三公四瀆視諸侯諸侯祭其疆內名山大川四瀆者江河淮濟也天子曰明堂辟雍韋昭曰水外四周員如辟雍以節觀諸侯曰泮宫張晏曰制度半於天子之辟雍周公既相成王郊祀后稷以配天王肅曰配天於南郊祀之宗祀文王於明堂以配上帝鄭玄曰上帝者天之别名也神無二主故異其處避后稷也自禹興而修社祀后稷稼穡故有稷祠郊社所從來尚矣自周克殷後十四世世益衰禮樂廢諸侯恣行而幽王為犬戎所害徐廣曰犬一作畎周東徙雒邑秦襄公攻戎救周始列為諸侯秦襄公既侯居西垂自以為主少皥之神作西畤祠白帝其牲用駵駒黃牛羝羊各一云其後十六年秦文公東獵汧渭之間卜居之而吉文公夢黃蛇自天下屬地其口止於鄜衍李奇曰鄜音孚山阪曰衍文公問史敦敦曰此上帝之徵君其祠之於是作鄜畤用三牲郊祭白帝焉自未作鄜畤也而雍旁故有吳陽武畤李奇曰於旁有吳陽地雍東有好畤皆廢無祠或曰自古以雍州積髙神明之隩故立畤郊上帝諸神祠皆聚云蓋黃帝時嘗用事雖晚周亦郊焉其語不經見搢紳者不道李奇曰搢插也插笏於紳紳大帶作鄜畤後九年文公獲若石云於陳倉北阪城祠之蘇林曰質如石也服虔曰在北或曰在陳倉北也其神或嵗不至或嵗數來來也常以夜光輝若流星從東南來集於祠城則若雄雞其聲殷云野雞夜雊如淳曰野雞雉也吕后名雉故曰野雞瓉曰殷聲也云足句之辭以一牢祠命曰陳寶瓉曰陳倉縣有寶夫人祠或一歲二歲與葉君合葉神來時天為之殷殷雷鳴雉為雊在長安正西五百里韋昭曰在陳倉縣寶而祠之故曰陳寶作鄜祠後七十八年秦德公既立卜居雍後子孫飲馬於河遂都雍雍之諸祠自此興用三百牢於鄜畤作伏祠磔狗邑四門以禦蠱災德公立二年卒其後六年秦宣公作密畤於渭南祭青帝其後十四年秦繆公立病臥五日不寤寤乃言夢見上帝上帝命繆公平晉亂史書而記藏之府而後世皆曰秦繆公上天秦繆公即位九年齊桓公既霸會諸侯於葵邱而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏服虔曰古之王者在伏羲前見莊子封泰山禪云云李奇曰云云山在梁父東虙羲封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云黃帝封泰山禪亭亭徐廣曰在巨平駰案服虔曰亭亭山在牟隂顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪會稽湯封泰山禪云云周成王封泰山禪社首應劭曰山名在博縣晉灼曰在巨平南十三里皆受命然後得封禪桓公曰寡人北伐山戎過孤竹西伐大夏涉流沙束馬懸車上卑耳之山韋昭曰將上山纒束其馬懸鉤其車也卑耳即齊語所謂辟耳南伐至召陵登熊耳山以望江漢兵車之會三而乘車之會六九合諸侯一匡天下諸侯莫違我昔三代受命亦何以異乎於是管仲睹桓公不可窮以辭因設之以事曰古之封禪鄗上之黍北里之禾應劭曰鄗上山也鄗音臛蘇林曰鄗上北里皆地名所以為盛江淮之間一茅三脊孟康曰所謂靈茅所以為藉也東海致比目之魚韋昭曰各有一目不比不行其名曰鰈西海致比翼之鳥韋昭曰各有一翼不比不飛其名曰鶼鶼然後物有不召而自至者十有五焉今鳳皇麒麟不來嘉穀不生而蓬蒿藜莠茂鴟梟數至而欲封禪毋乃不可乎於是桓公乃止是嵗秦繆公內晉君夷吾其後三置晉國之君平其亂繆公立三十九年而卒其後百有餘年而孔子論述六藝傳略言易姓而王封泰山禪乎梁父者七十餘王矣其俎豆之禮不章蓋難言之或問禘之説孔子曰不知知禘之説其於天下也視其掌孔安國曰為魯諱也包氏曰孔子謂或人言知禘之説者於天下之事如指視以掌中之物言其易了詩云紂在位文王受命政不及泰山武王克殷二年天下未寧而崩爰周德之洽維成王成王之封禪則近之矣及後陪臣執政季氏旅於泰山仲尼譏之焉融曰旅祭名禮諸侯祭山川在封內者今陪臣祭泰山非禮是時萇𢎞以方事周靈王諸侯莫朝周周力少萇𢎞乃明鬼神事設狸首狸首者諸侯之不來者徐廣曰狸一名不來依物怪欲以致諸侯諸侯不從而晉人執殺萇𢎞皇覽曰萇𢎞冢在河南洛陽東北山上也周人之言方怪者自萇𢎞其後百餘年秦靈公作吳陽上畤祭黃帝徐廣曰凡去作密畤二百五十年作下畤祭炎帝後四十八年周太史儋見秦獻公曰秦始與周合合而離五百嵗當復合合十七年而霸王出焉櫟陽雨金秦獻公自以為得金瑞故作畦畤櫟陽而祀白帝晉灼曰漢注在隴西西縣人先祠山下形如種韭畦畦各一土封其後百二十嵗而秦滅周徐廣曰去太史儋言時一百二十年周之九鼎入於秦或曰宋太丘社亡爾雅曰古陵太丘而鼎沒於泗水彭城下其後百一十五年而秦并天下秦始皇既并天下而帝或曰黃帝得土德黃龍地蚓見應劭曰蚓蚯蚓也黃帝土位故地見其神蚓大五六圍長十餘丈韋昭曰黃者地色蚓亦地物故以為瑞夏得木德青龍止於郊草木暢茂殷得金德銀自山溢蘇林曰流出也周得火德有赤烏之符今秦變周水德之時昔秦文公出獵獲黑龍此其水德之瑞於是秦更命河曰德水以冬十月為年首色上黑度以六為名音上大吕事統上法服虔曰政上法令也瓉曰水隂隂主刑殺故上法即帝位三年東巡郡縣祠騶嶧山頌秦功業於是徵從齊魯之儒生博士七十人至乎泰山下諸儒生或議曰古者封禪為蒲車惡傷山之土石草木掃地而祭席用葅秸應劭曰秸禾稿也去其皮以為席如淳曰葅讀曰祖秸讀曰戛晉灼曰葅藉也言其易遵也始皇聞此議各乖異難施用由此絀儒生而遂除車道上自太山陽至巔立石頌秦始皇帝德明其得封也從隂道下禪於梁父其禮頗采太祝之祀雍上帝所用而封藏皆祕之世不得而記也始皇之上太山中阪遇暴風雨休於大樹下諸儒生既絀不得與用於封事之禮聞始皇遇風雨則譏之於是始皇遂東遊海上行禮祠名山大川及八神求仙人羡門之屬八神將自古而有之或曰太公以來作之齊所以為齊以天齊也蘇林曰當天中中齊其祀絶莫知起時八神一曰天主祠天齊天齊淵水居臨災南郊山下者二曰地主祠太山梁父蓋天好隂祠之必於高山之下小山之上命曰畤徐廣曰一云之下上畤命曰畤地貴陽祭之必於澤中圓丘云三曰兵主祠蚩尤蚩尤在東平陸監鄉徐廣曰屬東平郡齊之西境也四曰隂主祠三山五曰陽主祠之罘六曰月主祠之萊山韋昭曰在東萊長廣縣皆在齊北並勃海七曰日主祠成山成山斗入海韋昭曰成山在東萊不夜斗入海不夜古縣名最居齊東北陽以迎日出云八曰四時主祠琅邪琅邪在齊東方蓋嵗之所始皆各用一牢具祠而巫祝所損益圭幣雜異焉自齊威宣之時騶子之徒韋昭曰名衍論著終始五德之運如淳曰今其書有五德始終五德各以所勝為行秦謂周為火德滅火者水故自謂之水德及秦帝而齊人奏之故始皇采用之而宋毋忌正伯僑充尚羡門韋昭曰皆慕古人名效神仙者子高最後皆燕人為方仙道形解銷化服虔曰尸解也張晏曰人老如解去故骨則變化也今山中有龍骨世人謂之龍解骨化之也依於鬼神之事騶衍以隂陽主運如淳曰今其書有主運五行相次轉用事隨方面為服顯於諸侯而燕齊海上之方士傳其術不能通然則怪迂阿諛茍合之徒自此興不可勝數也自威宣燕昭使人入海求蓬萊方丈瀛洲此三神山者其傳在渤海中服虔曰傳音附或曰其傳書云爾瓉云世人相傳之去人不逺患且至則船風引而去蓋嘗有至者諸仙人及不死之藥皆在焉其物禽獸盡白而黃金銀為宫闕未至望之如雲及到三神山反居水下臨之風輒引去終莫能至云世主莫不甘心焉及至秦始皇并天下至海上則方士言之不可勝數始皇自以為至海上而恐不及矣使人乃齎童男女入海求之船交海中皆以風為解曰未能至望見之焉其明年始皇復遊海上至琅邪過恆山從上黨歸後三年遊碣石考入海方士服虔曰疑詐故考之瓉曰考校其虛實從上郡歸後五年始皇南至湘山遂登會稽並海上冀遇海中三神山之奇藥不得還至沙丘崩二世元年東巡碣石並海南厯太山至會稽皆禮祠之而刻勒始皇所立石書旁以章始皇之功德其秋諸侯畔秦三年而二世弒死始皇封禪之後十二嵗秦亡諸儒生疾秦焚詩書誅僇文學百姓怨其法天下畔之皆訛曰始皇上太山為暴風雨所擊不得封禪此豈所謂無其德而用事者耶昔三代之君皆有河洛之間故嵩高為中嶽而四嶽各如其方四瀆咸在山東至秦稱帝都咸陽則五嶽四瀆皆并在東方自五帝以至秦軼興軼衰名山大川或在諸侯或在天子其禮損益世殊不可勝記及秦并天下令祠官所常奉天地名山大川鬼神可得而序也於是自殽以東名山五大川祠二曰太室太室嵩高也恆山太山會稽湘山水曰濟曰淮春以脯酒為嵗祠因冸凍服虔曰解凍秋涸凍冬賽禱祠其牲用牛犢各一牢具圭幣各異自華以西名山七名川四曰華山薄山薄山襄山也徐廣曰蒲阪縣有襄山或字誤也伯莊曰嶽山岐山徐廣曰武功縣有大壺山又有嶽山吳嶽徐廣曰在汧也鴻冢瀆山瀆山蜀之汶山水曰河祠臨晉沔祠漢中湫淵祠朝那蘇林曰湫淵在安定朝那縣方四十里停不流冬夏不增減不生草木音將蓼反江水祠蜀亦春秋冸涸禱賽如東方名山川而牲牛犢牢具圭幣異而四大冢鴻岐吳嶽皆有嘗禾孟康曰以新穀祭陳寶節來祠服虔曰陳寶神應節來其河加有嘗醪此皆在雍州之域近天子之都故加車一乘駵駒四霸産長水澧潦徐廣曰音勞駰案漢書音義曰水名在鄠縣界涇渭皆非大川以近咸陽盡得比山川祠而無諸加韋昭曰無車駵之屬汧洛二淵鳴澤蒲山嶽􅬂山徐廣曰音先許反之屬為小山川亦皆嵗禱賽冸涸祠禮不必同而雍有日月參辰南北斗熒惑太白嵗星填星二十八宿風伯雨師四海九臣晉灼曰自此以下至天淵玉女凡二十六小神不説十四臣諸布諸嚴諸逑之屬百有餘廟西亦有數十祠於湖有周天子祠於下邽有天神灃滈有昭明天子辟池于社亳有三杜主之祠韋昭曰亳音薄湯所都瓉曰濟隂薄縣是夀星祠而雍菅廟亦有杜主李奇曰菅茅也杜主故周之右將軍其在秦中最小鬼之神者各以嵗時奉祠唯雍四畤上帝為尊其光景動人民唯陳寶故雍四畤春以為嵗禱因冸凍秋涸凍冬賽祠五月嘗駒及四仲之月祠若月祠陳寶節來一祠春夏用騂秋冬用駵畤駒四匹木禺龍欒車一駟漢書音義曰禺寄也寄生龍形於木也木禺車馬一駟各如其帝色黃犢羔各四圭幣各有數皆生瘞埋無俎豆之具三年一郊秦以冬十月為嵗首故常以十月上宿郊見李奇曰宿猶齋戒也通權火張晏曰權火烽火也狀若井潔皋矣其法類稱故謂之權欲令光明逺照通祀所也漢祀五畤於雍五里一烽火如淳曰權舉也拜於咸陽之旁而衣上白其用如經祠云服虔曰經常也西畤畦畤祠如其故上不親往諸此祠皆太祝常主以嵗時奉祠之至如他名山川諸鬼及八神之屬上過則祠去則已郡縣逺方神祠者民各自奉祠不領於天子之祝官祝官有袐祝即有災祥輒祝祠移過於下漢興髙祖之微時嘗殺大蛇有物曰蛇白帝子也而殺者赤帝子高祖初起禱豐枌榆社張晏曰枌白榆也社在豐東北十五里或云枌榆鄉名高祖里社徇沛為沛公則祠蚩尤釁鼓旗遂以十月至灞上與諸侯平咸陽立為漢王因以十月為年首而色上赤二年東擊項籍而還入關問故秦時上帝祠何帝也對曰四帝有白青黃赤帝之祠高祖曰吾聞天有五帝而有四何也莫知其説於是高祖曰吾知之矣乃待我而具五也乃立黑帝祠命曰北畤有司進祠上不親往悉召故秦祝官復置太祝太宰如其故儀禮因令縣為公社李竒曰猶官社下詔曰吾甚重祠而敬祭今上帝之祭及山川諸神當祠者各以其時禮祠之如故徐廣曰高祖本紀曰二年六月令祠官祀天地四方上帝山川以時祀之後四嵗天下已定詔御史令豐謹治枌榆社常以四時春以羊彘祠之令祝官立蚩尢之祠於長安長安置祠祝官女巫其梁巫祠天地天社天水房中堂上之屬晉巫祠五帝東君雲中司命巫社巫族人先炊之屬秦巫祠社主巫保族纍之屬荆巫祠堂下巫先司命施糜之屬應劭曰先人所在之國及有靈施化民人又貴悉置祠巫祝博求神靈之意文穎曰巫掌神之位次者也范氏世仕於晉故祠祝有晉巫范會支庶留秦為劉氏故有秦巫劉氏隨魏都大梁故有梁巫後徙豐豐屬荆故有荆巫九天巫祠九天皆以嵗時祠宫中其河巫祠河於臨晉而南山巫祠南山秦中秦中者二世皇帝張晏曰子産云匹夫匹婦強死其魂魄能依人為厲各有時月其後二歲或曰周興而邑邰立后稷之祠至今血食天下於是高祖制詔御史其令郡國縣立靈星祠張晏曰龍星左角曰天田則農祥也農見而祭常以嵗時祠以牛高祖十年春有司請令縣常以春三月及時臘祠社稷以羊豕民里社各自財以祠制曰可其後十八年孝文帝即位即位十三年下詔曰今祕祝移過於下朕甚不取自今除之始名山大川在諸侯諸侯祝各自奉祠天子官不領及齊淮南國廢令太祝盡以嵗時致禮如故是嵗制曰朕即位十三年於今賴宗廟之靈社稷之福方內艾安民人靡疾間者比年登朕之不得何以饗此皆上帝諸神之賜也蓋聞古者饗其德必報其功欲有增諸神祠有司議增雍五畤路車各一乘駕被具西畤畦畤禺車各一乘禺馬四匹駕被具其河湫漢水加玉各二及諸祠各增廣壇場圭幣俎豆以差加之而祝釐者歸福於朕百姓不與焉自今祝致敬毋有所祈魯人公孫臣上書曰始秦得水德今漢受之推終始傳則漢當土德土德之應黃龍見宜改正朔易服色色上黃是時丞相張蒼好律厯以為漢乃水德之始故河決金堤漢書音義曰在東郡界其符也年始冬十月色外黑內赤服虔曰十月隂氣在外黑陽氣尚伏在地故內赤與德相應如公孫臣言非也罷之後三歲黃龍見成紀徐廣曰在文帝十五年春文帝乃召公孫臣拜為博士與諸生草改厯服色事其夏下詔曰異物之神見於成紀無害於民嵗以有年朕祈郊上帝諸神禮官議無諱以勞朕有司皆曰古者天子夏親郊祠上帝於郊故曰郊於是夏四月文帝始郊見雍五畤祠衣皆上赤其明年趙人新垣平以望氣見上言長安東北有神氣成五采若人冠絻焉或曰東北神明之舍西方神明之墓也張晏曰神明日也日出東北舍謂陽谷以日沒於西也墓北谷也天瑞下宜立祠上帝以合符應於是作渭陽五帝廟同字韋昭曰字謂上同下異禮所謂復廟重屋也瓉曰一營字之中立五廟帝一殿面各五門各如其帝色祠所用及儀亦如雍五畤夏四月文帝親拜霸渭之會如淳曰二水之會以郊見渭陽五帝五帝廟南臨渭北穿蒲池溝水權火舉而祠若光輝然屬天焉於是貴平上大夫賜纍千金而使博士諸生刺六經中作王制謀議巡狩封禪事文帝出長安門徐廣曰在霸陵駰案如淳曰亭名也若見五人於道北遂因其直北立五帝壇孟康曰直值也值其立處以作壇祠以五牢具其明年新垣平使人持玉杯上書闕下獻之平言上曰闕下有寶玉氣來者已視之果有獻玉杯者刻曰人主延壽平又言臣候日再中居頃之日卻復中於是始更以十七年為元年令天下大酺平言曰周鼎亡在泗水中今河溢通泗臣望東北汾隂直有金寶氣意周鼎其出乎兆見不迎則不至於是上使使治廟汾隂南臨河欲祠出周鼎徐廣曰是後三十七年鼎出汾隂人有上書告新垣平所言氣神事皆詐也下平吏治誅夷新垣平自是之後文帝怠於改正朔服色神明之事而渭陽長門五帝使祠官領以時致禮不往焉明年胸奴數入邊興兵守禦後嵗少不登數年而孝景即位十六年祠官各以歲時祠如故無有所興至今天子自此後武帝事褚先生取為武帝本紀注解已在第一帙今直載徐義今天子初即位尤敬鬼神之事元年漢興已六十餘嵗矣天下艾安縉紳之屬皆望天子封禪改正度也而上鄉儒術招賢良趙綰王臧等以文學為公卿欲議古立明堂城南以朝諸侯草巡狩封禪改厯服色事未就會竇太后治黃老言不好儒術使人微伺得趙綰等姦利事召案綰臧綰臧自殺諸所興為皆廢後六年竇太后崩其明年徵文學之士公孫𢎞等明年今上初至雍郊見五畤後常三嵗一郊是時上求神君舍之上林中蹄氏觀神君者長陵女子以子死見神於先後宛若宛若祠之其室民多往祠平原君往祠其後子孫以尊顯及今上即位則厚禮置祠之內中聞其言不見其人云是時李少君亦以祠竈穀道却老方見上上尊之少君者故深澤侯舍人主方匿其年及其生長常自謂七十能使物却老其遊以方遍諸侯無妻子人聞其能使物及不死更饋遺之常餘金錢衣食人皆以為不治生業而饒給又不知其何所人愈信爭事之少君資好方善為巧發奇中嘗從武安侯飲坐中有九十餘老人少君乃言與其大父遊射處老人為兒時從其大父識其處一坐盡驚少君見上上有古銅器問少君少君曰此器齊桓公十年陳於柏寢已而案其刻果齊桓公器一宫盡駭以為少君神數百歲人也少君言上曰祠竈則致物致物而丹砂可化為黃金黃金成以為飲食器則益夀益夀而海中蓬萊仙者乃可見見之以封禪則不死黃帝是也臣嘗遊海上見安期生安期生食巨棗大如瓜安期生仙者通蓬萊中合則見人不合則隱於是天子始親祠竈遣方士入海求蓬萊安期生之屬而事化丹砂諸藥齊為黃金矣居久之李少君病死天子以為化去不死而使黃錘徐廣曰音才恚反錘縣黃縣皆在東萊史寬舒受其方求蓬萊安期生莫能得而海上燕齊怪迂之方士多更來言神事矣亳人謬忌奏祠太一方曰天神貴者太一太一佐曰五帝古者天子以春秋祭太一東南郊用太牢七日為壇開八通之鬼道於是天子令太祝立其祠長安東南郊常奉祠如忌方其後人有上書言古者天子三年一用太牢祠神三一天一地一太一天子許之令太祝領祠之於忌太一壇上如其方後人復有上書言古者天子常以春解祠祠黃帝用一梟破鏡冥羊用羊祠馬行用一青牡馬太一澤徐廣曰澤一作皋山君地長用牛武夷君用乾魚隂陽使者以一牛令祠官領之如其方而祠於忌太一壇旁其後天子苑有白鹿以其皮為幣以發瑞應造白金焉其明年郊雍徐廣曰武帝立巳十九歲獲一角獸若麟然有司曰陛下肅祗郊祀上帝報享錫一角獸蓋麟云於是以薦五畤畤加一牛以燎錫諸侯白金風符應合於天也於是濟北王以為天子且封禪乃上書獻太山及其旁邑天子以他縣償之常山王有罪遷天子封其弟於真定以續先王祀徐廣曰元鼎四年時而以常山為郡然後五嶽皆在天子之邦其明年齊人少翁以鬼神方見上上有所幸王夫人徐廣曰外戚傳封禪書曰趙之王夫人幸有子封為齊王夫人卒少翁以方蓋夜致王夫人及竈鬼之貌云天子自帷中望見焉於是乃拜少翁為文成將軍賞賜甚多以客禮禮之文成言曰上即欲與神通宫室被服非象神神物不至乃作畫雲氣車及各以勝日駕車辟惡鬼又作甘泉宫中為臺室畫天地太一諸鬼神而置祭具以致天神居歲餘其方益衰神不至乃為帛書以飯牛詳不知言曰此牛腹中有奇殺視得書書言甚怪天子識其手書問其人果是偽書於是誅文成將軍隱之其後則又作柏梁銅柱徐廣曰元鼎二年時承露仙人掌之屬矣文成死明年天子病鼎湖甚巫醫無所不致不愈遊水發根言上郡有巫病而鬼神下之上召置祠之甘泉及病使人問神君神君言曰天子無憂病病少愈強與我會甘泉於是病愈遂起幸甘泉病良已大赦置酒夀宫神君夀宫神君最貴者大一其佐曰大禁司命之屬皆從之非可得見聞其言言與人音等時去時來來則風肅然居室帷中時晝言然常以夜天子祓然後入因巫為主人關飲食所以言行下又置夀宫北宫張羽旗設供具以禮神君神君所言上使人受書其言命之曰書法其所語世俗之所知也無絶殊者而天子心獨喜其事祕世莫知也其後三年有司言元宜以天瑞命不宜以一二數一元曰建二元以長星曰光三元以郊得一角獸曰狩云其明年冬天子郊雍議曰今上帝朕親郊而后土無祀則禮不答也有司與太史公祠官寬舒議天地牲角繭栗今陛下親祠后土后土宜於澤中圓丘為五壇壇一黃犢太牢具已祠盡瘞而從祠衣上黃於是天子遂東始立后土徐廣曰元鼎四年祠汾隂脽丘如寬舒等議上親望拜如上帝禮禮畢天子遂至滎陽而還過雒陽下詔曰三代邈絶逺矣難存其以三十里地封周後為周子南君以奉其先祀焉是歲天子始巡郡縣侵尋於泰山矣其春樂成侯上書言欒大欒大膠東宫人故嘗與文成將軍同師已而為膠東王尚方而樂成侯姊為康王后無子康王死他姬子立為王徐廣曰以元狩二年薨而康后有淫行與王不相中相危以法康后聞文成已死而欲自媚於上乃遣欒大因樂成侯求見言方天子既誅文成後悔其蚤死惜其方不盡及見欒大大説大為人長美言多方略而敢為大言處之不疑大言曰臣嘗往來海中見安期羡門之屬顧以臣為賤不信臣又以為康王諸侯耳不足與方臣數言康王康王又不用臣臣之師曰黃金可成而河決可塞不死之藥可得仙人可致也然臣恐效文成則方士皆奄口惡敢言方哉上曰文成食馬肝死耳子誠能修其方我何愛乎大曰臣師非有求人人者求之陛下必欲致之則貴其使者令有親屬以客禮待之勿卑使各佩其信印乃可使通言於神人神人尚肯邪不邪致尊其使然后可致也於是上使驗小方鬭棊棊自相觸擊是時上方憂河決而黃金不就乃拜大為五利將軍居月餘得四印佩天士將軍地士將軍大通將軍印制詔御史昔禹疏九江決四瀆間者河溢臯陸隄繇不思朕臨天下二十有八年徐廣曰元鼎四年也天若遺朕士而大通焉乾稱蜚龍鴻漸于般朕意庶幾與焉其以二千户封地士將軍大為樂通侯賜列侯甲第僮千人乘輿斥車馬帷帳器物以充其家又以衛長公主妻之齎金萬斤更命其邑曰當利公主天子親如五利之第使者存問供給相屬於道自大主徐廣曰武帝姑將相以下皆置酒其家獻遺之於是天子又刻玉印曰天道將軍使使衣羽衣夜立白茅上五利將軍亦衣羽衣夜立白茅上受印以示不臣也而佩天道者且為天子道天神也於是五利常夜祠其家欲以下神神未至而百鬼集矣然頗能使之其後裝治行東入海求其師云大見數月佩六印貴震天下而海上燕齊之間莫不扼捥而自言有禁方能神仙矣其夏六月中汾隂巫錦為民祠魏雎后土營旁見地如鈎狀掊視得鼎鼎大異於衆鼎文鏤無款識怪之言吏吏告河東太守勝勝以聞天子使使驗問巫得鼎無姦詐乃以禮祠迎鼎至甘泉從行上薦之至中山徐廣曰河渠書曰鑿涇水自中山西曣㬈有黃雲蓋焉有麃過上自射之因以祭云徐廣曰上言從行上薦之或者祭鼎也至長安公卿大夫皆議請尊寶鼎天子曰間者河溢嵗數不登故巡祭后土祈為百姓育穀今嵗豐廡未報鼎曷為出哉有司皆曰聞昔泰帝興神鼎一一者一統天地萬物所繫終也黃帝作寶鼎三象天地人禹收九牧之金鑄九鼎皆嘗亨鬺徐廣曰亨煮也音殤曰嘗以亨牲牢而祭祀上帝鬼神遭聖則興鼎遷於夏商周德衰宋之社亡鼎乃淪沒伏而不見頌云自堂徂基自羊徂牛鼐鼎及鼒不吳不驁胡考之休今鼎至甘泉光閏龍變承休無疆合兹中山徐廣曰關中亦復有中山也非魯中山有黃白雲降蓋若獸為符路弓乘矢集獲壇下報祠大享徐廣曰一云大報祠享唯受命而帝者心知其意而合德焉鼎宜見於祖禰藏於帝廷以合明應制曰可入海求蓬萊者言蓬萊不逺而不能至者殆不見其氣上乃遣望氣佐候其氣云其秋上幸雍且郊或曰五帝太一之佐也宜立太一而上親郊之上疑未定齊人公孫卿曰今年得寶鼎其冬辛巳朔旦冬至與黃帝時等卿有札書曰黃帝得寶鼎宛朐問於鬼臾區鬼臾區對曰黃帝得寶鼎神策是嵗己酉朔旦冬至得天之紀終而復始於是黃帝迎日推策後率二十嵗復朔旦冬至凡二十推三百八十年黃帝仙登於天卿因所忠欲奏之所忠視其書不經疑其妄書謝曰寶鼎事已決矣尚何以為卿因嬖人奏之上大説乃召問卿對曰受此書申公申公已死上曰申公何人也卿曰申公齊人與安期生通受黃帝言無書獨有此鼎書曰漢興復當黃帝之時曰漢之聖者在高祖之孫且曾孫也寶鼎出而與神通封禪封禪七十二王唯黃帝得上太山封申公曰漢主亦當上封上封則能仙登天矣黃帝時萬諸侯而神靈之封居七千天下名山八而三在蠻夷五在中國中國華山首山太室太山東萊此五山黃帝之所常遊與神會黃帝且戰且學仙患百姓非其道者乃斷斬非鬼神者百餘嵗然後得與神通黃帝郊雍上帝宿三月鬼臾區號大鴻死葬雍故鴻冢是也其後黃帝接萬靈明廷明廷者甘泉也所請寒徐廣曰一作塞門者谷口也黃帝采首山銅鑄鼎於荆山下鼎既成有龍垂胡髯下迎黃帝黃帝上騎羣臣後宫從上者七十餘人龍乃上去餘小臣不得上乃悉持龍髯龍髯拔墮墮黃帝之弓百姓仰望黃帝既上天乃抱其弓與胡髯號故後世因名其處曰鼎湖其弓曰烏號於是天子曰嗟乎吾誠得如黃帝吾視去妻子如脫屣耳乃拜卿為郎東使候神於太室上遂郊雍至隴西西登崆洞幸甘泉令祀官寬舒等具太一祠壇祠壇放薄忌太一壇壇三陔徐廣曰階次也五帝壇環居其下各如其方黃帝西南除八通鬼道太一其所用如雍一畤物而加醴棗酺之屬殺一狸牛以為俎豆牢具而五帝獨有俎豆醴進其下四方地為醊食羣神從者及北斗云已祠胙餘皆燎之其牛色白鹿居其中彘在鹿中水而洎之徐廣曰洎一作酒灌水於釡中曰洎音冀祭日以牛祭月以羊彘特太一祝宰則衣紫及繡五帝各如其色日赤月白十一月辛巳朔旦冬至昧爽天子始郊拜太一朝朝日夕夕月則揖而見太一如雍郊禮其贊饗曰天始以寶鼎神策授皇帝朔而又朔終而復始皇帝敬拜見焉而衣上黃其祠列火滿壇壇旁亨炊具有司云祠上有光焉公卿言黃帝始郊見太一雲陽有司奉瑄玉嘉牲薦饗是夜有美光及晝黃氣上屬天太史公祠官寬舒等曰神靈之休祐福兆祥宜因此地光域立太畤壇以明應令太祝領秋及臘間祠三歲天子一郊見其秋為伐南越告禱太一以牡荆畫幡日月北斗登龍以象太一三星為太一鋒徐廣曰天官書曰天極星明者太一常居也斗口三星曰太一命曰靈旗為兵禱則太史奉以指所伐國而五利將軍使不敢入海之太山祠上使人隨驗實毋所見五利妄言見其師其方盡多不讐上乃誅五利其冬公孫卿侯神河南言見仙人迹緱氏城上有物如雉往來城上天子親幸緱氏城視迹問卿得毋效文成五利乎卿曰仙者非有求人主人主者求之其道非少寬假神不來言神事事如迂誕積以歲乃可致也於是郡國各除道繕治宫觀名山神祠所以望幸也其春既滅南越上有嬖臣李延年以好音見上善之下公卿議曰民間祠尚有鼓舞樂今郊祀而無樂豈稱乎公卿曰古者祠天地皆有樂而神祗可得而禮或曰太帝使素女鼓五十絃瑟悲帝禁不止故破其瑟為二十五弦於是賽南越禱祠太一后土始用樂舞益召歌兒作二十五弦徐廣曰瑟及空候徐廣曰應劭云武帝令樂人侯調始造此器琴瑟自此起其來年冬上議曰古者先振兵釋旅徐廣曰古釋字作澤然後封禪乃遂北巡朔方勒兵十餘萬還祭黃帝冢橋山釋兵須如徐廣曰須一作涼上曰吾聞黃帝不死今有冢何也或對曰黃帝已仙上天羣臣葬其衣冠既至甘泉為且用事太山先類祠太一自得寶鼎上與公卿諸生議封禪封禪用希曠絶莫知其儀禮而羣儒采封禪尚書周官王制之望祀射牛事齊人丁公年九十餘曰封禪者合不死之名也秦皇帝不得上封陛下必欲上稍上即無風雨遂上封矣上於是乃令諸儒習射牛草封禪儀數年至且行天子既聞公孫卿及方士之言黃帝以上封禪皆致怪物與神通欲放黃帝以上接神仙人蓬萊士高世比德於九皇而頗採儒術以文之羣儒既已不能辨明封禪事又牽拘於詩書古文而不能騁上為封禪祠器示羣儒羣儒或曰不與古同徐偃又曰太常諸生行禮不如魯善周霸屬圖封禪事於是上絀偃霸而盡罷諸儒不用三月遂東幸緱氏禮登中嶽太室從官在山下聞若有言萬歲云問上上不言問下下不言於是以三百戶封太室奉祠命曰崇高邑東上太山太山之草木葉未生乃令人上石立之太山巔上遂東巡海上行禮祠八神齊人之上疏言神怪奇方者以萬數然無驗者乃益發船令言海中神山者數千人求蓬萊神人公孫卿持節常先行候名山至東萊言夜見大人長數丈就之則不見其迹甚大類禽獸云羣臣有言見一老父牽狗言吾欲見巨公已忽不見上即見大迹未信及羣臣有言老父則大以為仙人也宿留海上豫方士傳車及間使求仙人以千數四月還至奉高上念諸儒及方士言封禪人人殊不經難施行天子至梁父禮祠地主乙卯令侍中儒者皮辨薦紳射牛行事封太山下東方如郊祠太一之禮封廣丈二尺高九尺其下則有玉牒書書祕禮畢天子獨與侍中奉車子侯上太山亦有封其事皆禁明日下隂道丙辰禪太山下趾東北肅然山如祭后土禮天子皆親拜見衣上黃而盡用樂焉江淮間一茅三脊為神藉五色土益雜封縱逺方竒獸蜚禽及白雉諸物頗以加禮兕牛犀象之屬不用皆至太山祭后土封禪祠其夜若有光晝有白雲起封中天子從禪還坐明堂羣臣更上夀於是制詔御史朕以眇眇之身承至尊兢兢焉懼不任維德菲薄不明於禮樂修祠太一若有象景光屑如有望震於怪物欲止不敢遂登封太山至於梁父而后禪肅然自新嘉與士大夫更始賜民百户牛一酒十石加年八十孤寡布帛二匹復博奉高蛇邱厯城無出今年租稅其赦天下如乙卯赦令行所過毋有復作事在二年前皆勿聽治又下詔曰古者天子五載一巡狩用事太山諸侯有朝宿地其令諸侯各治邸太山下天子既已封太山無風雨災而方士更言蓬萊諸神若將可得於是上欣然庶幾遇之乃復東至海上望冀遇蓬萊焉奉車子侯暴病一日死上乃遂去並海上北至碣石巡自遼西厯北邊至九原五月反至甘泉有司言寶鼎出為元鼎以今年為元封元年其秋有星茀於東井後十餘日有星茀於三能望氣王朔言候獨見旗星出如瓜食頃復入焉有司皆曰陛下建漢家封禪天其報德星云其來年冬郊雍五帝還拜祝祠太一贊饗曰德星昭衍厥維休祥壽星仍出淵耀光明信星昭見皇帝敬拜太祝之享其春公孫卿言見神人東萊山若云欲見天子天子於是幸緱氏城拜卿為中大夫遂至東萊宿留之數日無所見見大人迹云復遣方士求神怪采芝藥以千數是歲旱於是天子既出無名乃禱萬里沙過祠太山還至瓠子自臨塞決河留二日沈祠而去使二卿將卒塞決河徙二渠復禹之故迹焉是時既滅兩越越人勇之乃言越人俗鬼而其祠皆見鬼數有效昔東甌王敬鬼壽百六十歲後人怠慢故衰耗乃令越巫立越祝祠安臺無壇亦祠天神上帝百鬼而以雞卜上信之越祠雞卜始用公孫卿曰仙人可見而上往常遽以故不見今陛下可為觀如緱城徐廣曰一云如緱氏城置脯棗神人宜可致也且仙人好樓居於是上令長安則作蜚亷桂觀甘泉則作益延夀觀使卿持節設具而候神人乃作通天莖臺徐廣曰在甘泉置祠具其下將招來仙神人之屬於是甘泉更置前殿始廣諸宫室夏有芝生殿房內中徐廣曰元封二年天子為塞河興通天臺若見有光云乃下詔甘泉房中生芝九莖赦天下毋有復作其明年伐朝鮮夏旱公孫卿曰黃帝時封則天旱乾封三年上乃下詔曰天旱意乾封乎其令天下尊祠靈星焉其明年上郊雍通回中道巡之春至鳴澤從西河歸其明年冬上巡南郡至江陵徐廣曰元封五年而東登禮灊之天柱山號曰南嶽浮江自尋陽出樅陽過彭蠡禮其名山川北至琅邪並海上四月中至奉高修封焉初天子封太山太山東北趾古時有明堂處處險不敞上欲治明堂奉高旁未曉其制度濟南人公玉帶上黃帝時明堂圖明堂圖中有一殿四面無壁以茅蓋通水圜宫垣為復道上有樓從西南入命曰昆侖天子從之入以拜祠上帝焉於是上令奉高作明堂汶上徐廣曰在元封二年秋如帶圖及五年修封則祠太一五帝於明堂上坐令高皇帝祠坐對之祠后土於下房以二十太牢天子從昆侖道入始拜明堂如郊禮禮畢燎堂下而上又上太山自有祕祠其巔而太山下祠五帝各如其方黃帝并赤帝而有司侍祠焉山上舉火下悉應之其後二歲十一月甲子朔旦冬至推厯者以本統天子親至太山以十一月甲子朔旦冬至日祠上帝明堂毋修封禪徐廣曰常五年一修耳今適二年故但祠於明堂其贊饗曰天增授皇帝太元神䇿周而復始皇帝敬拜太一東至海上考入海及方士求神者莫驗然益遣冀遇之十一月乙酉柏梁災十二月甲午朔上親禪高里祠后土臨勃海將以望祀蓬萊之屬冀至殊庭焉上還以柏梁災故朝受計甘泉公孫卿曰黃帝就青靈臺十二日燒黃帝乃治明廷明廷甘泉也方士多言古帝王有都甘泉者其後天子又朝諸侯甘泉甘泉作諸侯邸勇之乃曰越俗有火災復起屋必以大用勝服之於是作建章宫度為千門萬户前殿度高未央其東則鳳闕高二十餘丈其西則唐中數十里虎圈其北治大池漸臺高二十餘丈命曰太液池中有蓬萊方丈瀛洲壺梁象海中神山龜魚之屬其南有玉堂璧門大鳥之屬乃立神明臺井幹樓度五十丈輦道相屬焉夏漢改厯以正月為歲首而色上黃官名更印章以五字為太初元年是嵗西伐大宛蝗大起丁夫人雒陽虞初等以方祠詛胸奴大宛焉其明年有司上言雍五畤無牢熟具芬芳不備乃令祠官進畤犢牢具也食所勝而以木禺馬代駒焉獨五月嘗駒行親郊用駒及諸名山川用駒者悉以木禺馬代行過乃用駒他禮如故其明年東巡海上考神仙之屬未有驗者方士有言黃帝時為五城十二樓以候神人於執期命曰迎年上許作之如方命曰明年上親禮祠上帝焉公玉帶曰黃帝時雖封太山然風后封巨岐伯令黃帝封東太山禪凡徐廣曰一作九山合符然後不死焉天子既令設祠具至東太山太山卑小不稱其聲乃令祠官禮之而不封禪焉其後令帶奉祠候神物夏遂還太山修五年之禮如前而加以禪祠石閭石閭者在太山下址南方方士多言此仙人之閭也故上親禪焉其後五年復至太山修封徐廣曰天漢三年還過祭恆山今天子所興祠太一后土三年親郊祠建漢家封禪五年一修封薄忌太一及三一冥羊馬行赤星五寬舒之祠官以歲時致禮凡六祠皆太祝領之至如八神諸神明年凡由他名祠行過則祠行去則已方士所興祠各自主其人終則已祠官不主他祠皆如其故今上封禪其後十二歲而還遍於五嶽四瀆矣而方士之候伺神人入海求蓬萊終無有驗而公孫卿之候神者猶以大人之迹為解無其效天子益怠厭方士之怪迂語矣然羈縻不絶冀遇其真自此之後方士言神祠者彌衆然其效可睹矣太史公曰余從巡祭天地諸神名山川而封禪焉入夀宫侍祠神語究觀方士祠官之意於是退而論次自古以來用事於鬼神者具見其表裏後有君子得以覽焉若至俎豆圭幣之詳獻酬之禮則有司存史記集解卷二十八
