body:
  text: 史記集解卷三十八宋裴駰撰史記三十八宋微子世家第八微子開者孔安國曰微畿内國名子爵也為紂卿士殷帝乙之首子而紂之庶兄也紂既立不明滛亂於政微子數諫紂不聽及祖伊以周西伯昌之修德滅􅢿徐廣曰􅢿音耆􅢿國懼禍至以告紂紂曰我生不有命在天乎是何能為於是微子度紂終不可諫欲死之及去未能自決乃問於太師少師孔安國曰太師三公箕子也少師孤卿比干也曰紂不有治政不治四方孔安國曰言殷不有治政四方之事終必亡也我祖遂陳於上馬融曰我祖湯也孔安國曰言湯遂其功陳力於上世也紂沈湎於酒婦人是用亂敗湯德於下馬融曰下下世也殷既小大好草竊姦宄孔安國曰草野盜竊又為姦宄於外内卿士師師非度馬融曰非但小人學為姦宄卿士已下轉相師效為非法度皆有罪辜乃無維獲鄭𤣥曰獲得也羣臣皆有是罪其爵祿又無常得之者言屢相攻奪小民乃並興相為敵讎孔安國曰卿士既亂而小民各起共為敵讐言不和同今殷其典喪若涉水無津涯徐廣曰一作涉水無舟航言危也駰謂典國典也殷遂喪越至于今馬融曰越於也於是至矣於今到矣曰太師少師馬融曰重呼告之我其發出往鄭𤣥曰發起也紂禍敗如此我其起作出往也吾家保于喪徐廣曰一云於是家保駰案馬融曰卿大夫稱家今女無故告王肅曰無意告我也是微子求教誨也予顛躋如之何其馬融曰躋猶墜也恐顛墜於非義當如之何也鄭𤣥曰其語助也齊魯之間聲如姬禮記曰何居太師若曰王子天篤下菑亡殷國孔安國曰微子帝乙子故曰王子天生紂為亂是下菑也鄭𤣥曰少師不答志在必死乃母畏畏不用老長孔安國曰上不畏天菑下不畏賢人違戻耆老之長不用其教今殷民乃陋淫神祇之祀徐廣曰一云今殷民侵神犧又一云陋淫侵神祇駰案馬融曰天曰神地曰祇也令誠得治國國治身死不恨為死終不得治不如去遂亡箕子者馬融曰箕國名也子爵也紂親戚也紂始為象箸箕子歎曰彼為象箸必為玉桮為桮則必思逺方珍怪之物而御之矣輿馬宫室之漸自此始不可振也紂為淫泆箕子諫不聽人或曰可以去矣箕子曰為人臣諫不聽而去是彰君之惡而自說於民吾不忍為也乃被髮佯狂而為奴遂隱而鼓琴以自悲故𫝊之曰箕子操風俗通義曰其道閉塞憂愁而作者命其曲曰操操者言遇菑遭害困厄窮迫雖怨恨失意猶守禮義不懼不懾樂道而不改其操也王子比干者亦紂之親戚也見箕子諫不聽而為奴則曰君有過而不以死爭則百姓何辜乃直言諫紂紂怒曰吾聞聖人之心有七竅信有諸乎乃遂殺王子比干刳視其心微子曰父子有骨肉而臣主以義屬故父有過子三諫不聽則隨而號之人臣三諫不聽則其義可以去矣於是太師少師乃勸微子去遂行時比干已死而云少師者似誤周武王伐紂克殷微子乃持其祭器造於軍門肉袒面縳左牽羊右把茅膝行而前以告於是武王乃釋微子復其位如故武王封紂子武庚祿父以續殷祀使管叔蔡叔傅相之武王既克殷訪問箕子武王曰於乎維天隂定下民相和其居孔安國曰天不言而黙定下民助合其居使有常生之資也我不知其倫常所序孔安國曰言我不知天所以定民之常道理次序問何由箕子對曰在昔鯀陻鴻水汩陳其五行孔安國曰陻塞汨亂也治水失道是亂陳五行帝乃震怒不從鴻範九等常倫所斁徐廣曰一作釋駰案鄭𤣥曰帝天也天以鯀如是乃震動其威怒不與天道大法九類言王所問所由敗也鯀則極死禹乃嗣興鄭𤣥曰春秋傳曰舜之誅也殛鯀其舉也興禹天乃錫禹鴻範九等常倫所序孔安國曰天與禹洛出書也神龜負文而出列於背有數至于九禹遂因而第之以成九類初一曰五行二曰五事三曰八政四曰五紀五曰皇極六曰三德七曰稽疑八曰庶徵九曰嚮用五福畏用六極馬融曰言天所以畏懼人用六極五行一曰水二曰火三曰木四曰金五曰土鄭𤣥曰此數本諸隂陽所生之次也水曰潤下火曰炎上孔安國曰言其自然之常性也木曰曲直孔安國曰木可揉使曲直也金曰從革馬融曰金之性從人而更可銷鑠土曰稼穡王肅曰種之曰稼斂之曰檣潤下作鹹孔安國曰水鹵所生炎上作苦孔安國曰焦氣之味曲直作酸孔安國曰木實之性從革作辛孔安國曰金氣之味稼穡作甘孔安國曰甘味生於百穀五行以下箕子所陳五事一曰貎二曰言三曰視四曰聽五曰思貎曰恭言曰從馬融曰發言當使可從視曰明聽曰聰思曰睿馬融曰睿通也恭作肅從作治馬融曰出令而從所以為治也明作智聰作謀孔安國曰所謀必成審也馬融曰上聰則下進其謀睿作聖孔安國曰於亊無不通謂之聖八政一曰食二曰貨三曰祀四曰司空馬融曰司空掌營城郭主空土以居民五曰司徒孔安國曰主徒衆教以禮義六曰司冦馬融曰主誅㓂害七曰賔鄭𤣥曰掌諸侯朝覲之官八曰師鄭𤣥曰掌軍旅之官五紀一曰歲二曰月三曰日四曰星辰馬融曰星二十八宿辰日月之所㑹也鄭𤣥曰星五星也五曰歴數孔安國曰厯數節氣之度以為厯數敬授民時皇極皇建其有極孔安國曰大中之道大立其有中謂行九疇之義斂時五福用傅錫其庶民馬融曰當斂是五福之道用布與衆民維時其庶民于女極馬融曰以其能歛是五福故衆民於汝取中正以歸心也錫女保極鄭𤣥曰又賜女以守中之道凡厥庶民毋有淫朋人毋有比德維皇作極孔安國曰民有善則無淫過朋黨之惡此周之德惟天下皆大為中正也凡厥庶民有猷有為有守女則念之馬融曰凡其衆民有謀有為有所執守當思念其行有所趣舍也不協于極不離于咎皇則受之孔安國曰凡民之行雖不合於中而不離於咎惡皆可進用大法受之而安而色曰予所好徳女則錫之福孔安國曰女當安女顔色以謙下人人曰我所好者德也女則與之爵祿時人斯其維皇之極孔安國曰不合于中之人女與之福則是人比其惟大之中言不勉進也已毋侮鰥寡而畏髙明馬融曰髙明顯寵者不枉法畏之人之有能有為使羞其行而國其昌王肅曰使進其行任之以政則國為之昌凡厥正人既富方穀孔安國曰正直之人既當爵禄富之又當以善道接之女不能使有好于而家時人斯其辜孔安國曰不能使正人有好於國家則是人斯其詐取罪而去之也于其毋好女雖錫之福其作女用咎鄭𤣥曰無好于女家之人雖賜之以爵禄其動作為女用惡謂為天子結怨於民毋偏毋頗遵王之義孔安國曰偏不平頗不正言當修先王正義以治民毋有作好遵王之道馬融曰好私好也毋有作惡遵王之路毋偏毋黨王道蕩蕩孔安國曰言開辟也鄭𤣥曰黨朋黨毋黨毋偏王道平平孔安國曰一言辨治也毋反毋側王道正直馬融曰反反道也側傾側也㑹其有極鄭𤣥曰謂君也當㑹聚有中之人以為臣也歸其有極鄭𤣥曰謂臣也當就有中之君而亊之曰王極之傅言馬融曰王者當盡極行之使臣下布陳其言是帝是訓于帝其順馬融曰是大中而常行之用是教訓天下於天為順也凡厥庶民極之傅言馬融曰亦當極敷陳其言於上也是順是行王肅曰民納言於上而得中者則順而行之以近天子之光王肅曰近猶益也順行民言所以益天子之光曰天子作民父母以為天下王王肅曰政教務中民善是用所以為民父母而為天下所歸往三德一曰正直鄭𤣥曰中平之人二曰剛克三曰柔克鄭𤣥曰克能也剛而能柔柔而能剛寛猛相濟以成治立功平康正直孔安國曰世平康用正直治之彊不友剛克孔安國曰友順也世彊禦不順以剛能治之内友柔克孔安國曰世和順以柔能治之也沈漸剛克馬融曰沈隂也潛伏也隂伏之謀謂賊臣亂子非一朝一夕之漸君親無將將而誅高明柔克馬融曰髙明君子亦以徳懷也維辟作福維辟作威維辟玉食馬融曰辟君也玉食美食不言王者關諸侯也鄭𤣥曰作福専爵賞也作威専刑罰也玉食備珍美也臣無有作福作威玉食臣有作福作威玉食其害于而家凶于而國人用側頗辟民用僭忒孔安國曰在位不端平則下民僭差稽疑擇建立卜筮人孔安國曰龜曰卜蓍曰筮考正疑事當選擇知卜筮人而建立之乃命卜筮曰雨曰濟曰涕尚書作圛曰霧徐廣曰一曰洟曰被曰克曰貞曰悔凡七卜五占之用二衍貣鄭𤣥曰卜五占之用謂雨濟圛霧克也二衍貣謂貞悔也將立卜筮人乃先命名兆卦而分别之兆卦之名凡七龜用五易用二審此道者乃立之也雨者兆之體氣如雨然也濟者如雨止之雲氣在上者也圛者色澤而光明也霧者氣不釋鬰冥冥也克者如祲氣之色相犯也内卦曰貞貞正也外卦曰悔悔之言晦也晦猶終也卦象多變故言衍貣也立時人為卜筮鄭𤣥曰立是能分别兆卦之名者以為卜筮人三人占則從二人之言鄭𤣥曰從其多者蓍龜之道幽微難明慎之深女則有大疑謀及女心謀及卿士謀及庶人謀及卜筮孔安國曰先盡謀慮然後卜筮以決之女則從龜從筮從卿士從庶民從是之謂大同孔安國曰大同於吉而身其康强而子孫其逢吉孔安國曰動不違衆故後世遇吉也女則從龜從筮從卿士逆庶民逆吉卿士從龜從筮從女則逆庶民逆吉庶民從龜從筮從女則逆卿士逆吉鄭𤣥曰此三者皆從多故為吉女則從龜從筮逆卿士逆庶民逆作内吉作外凶鄭𤣥曰此逆者多以故舉事於境内則吉境外則凶龜筮共違于人用靜吉用作凶孔安國曰安以守常則吉動則凶鄭𤣥曰龜筮皆與人謀相違人雖三從猶不可以舉事庶徵曰雨曰暘曰奥曰寒曰風曰時孔安國曰雨以潤物陽以乾物煖以長物寒以成物風以動物五者各以時所以為衆驗五者來備各以其序庶草繁廡孔安國曰言五者備至各以次序則衆草木繁庶滋豐也一極備凶一極亡凶孔安國曰一者備極過甚則凶一者極無不至亦凶謂其不時失敘之謂也曰休徵孔安國曰叙美行之驗曰肅時雨若孔安國曰君行敬則時雨順之曰治時暘若孔安國曰君政治則時暘順之曰知時奥若孔安國曰君昭哲則時煖順之曰謀時寒若孔安國曰君能謀則時寒順之曰聖時風若孔安國曰君能通理則時風順之曰咎徵孔安國曰敘惡行之驗也曰狂常雨若孔安國曰君行狂曰妄則常雨順之僭常暘若孔安國曰君行僭差則常暘順之曰舒常奥若孔安國曰君行逸豫則常煖順之曰急常寒若孔安國曰君行急則常寒順之曰霧常風若孔安國曰君行霧䦚則常風順之王眚維歲馬融曰言王者所眚職如歲兼四時也卿士維月孔安國曰卿士各有所掌如月之有别師尹維日孔安國曰衆正官之吏分治其職如日之有嵗月也嵗月日時毋易孔安國曰各順常百榖用成治用明孔安國曰嵗月無易則百榖成君臣無易則政治明畯民用章家用平康孔安國曰賢臣顯用國家平寜日月歲時既易百穀用不成治用昏不明畯民用微家用不寧庶民維星孔安國曰星民象故衆民惟若星也星有好風星有好雨馬融曰箕星好風畢星好雨日月之行有冬有夏孔安國曰日月之行冬夏各有常度月之從星則以風雨孔安國曰月經于箕則多風離于畢則多雨政教失常以從民欲亦所以亂五福一曰夀二曰富三曰康寧鄭𤣥曰康寜平安四曰攸好德孔安國曰所好者德福之道五曰考終命孔安國曰各成其短長之命以自終不横夭六極一曰凶短折鄭𤣥曰未齓曰凶未冠曰短未㛰曰折二曰疾三曰憂四曰貧五曰惡孔安國曰惡醜陋也六曰弱鄭𤣥曰愚懦不壯毅曰弱於是武王乃封箕子於朝鮮而不臣也其後箕子朝周過故殷虚感宫室毁壞生禾黍箕子傷之欲哭則不可欲泣為其近婦人乃作麥秀之詩以歌詠之其詩曰麥秀漸漸兮禾黍油油彼狡僮兮不與我好兮所謂狡僮者紂也殷民聞之皆為流涕杜預曰梁國䝉縣有箕子冢武王崩成王少周公旦代行政當國管蔡疑之乃與武庚作亂欲襲成王周公徐廣曰一云欲襲成周周公既承成王命誅武庚殺管叔放蔡叔乃命微子開代殷後奉其先祀作微子之命以申之國于宋世本曰宋更曰雎陽微子故能仁賢乃代武庚故殷之餘民甚戴愛之微子開卒立其弟衍是為微仲禮記曰微子舍其孫腯而立衍也鄭𤣥曰微子適子死立其弟衍殷禮也微仲卒子宋公稽立宋公稽卒子丁公申立丁公申卒子湣公共立湣公共卒弟煬公熙立煬公即位湣公子鮒祀徐廣曰鮒一作魴殺煬公而自立曰我當立是為厲公厲公卒子釐公舉立釐公十七年周厲王出奔彘二十八年釐公卒子惠公覸立徐廣曰覸音古莧反惠公四年周宣王即位三十年惠公卒子哀公立哀公元年卒子戴公立戴公二十九年周幽王為犬戎所殺秦始列為諸矦三十四年戴公卒子武公司空立武公生女為魯惠公夫人生魯桓公十八年武公卒子宣公力立宣公有太子與夷十九年宣公病讓其弟和曰父死子繼兄死弟及天下通義也我其立和和亦三讓而受之宣公卒弟和立是為穆公穆公九年病召大司馬孔父謂曰先君宣公舍太子與夷而立我我不敢忘我死必立與夷也孔父曰羣臣皆願立公子馮穆公曰毋立馮吾不可以負宣公於是穆公使馮出居于鄭八月庚辰穆公卒兄宣公子與夷立是為殤公君子聞之曰宋宣公可謂知人矣立其弟以成義然卒其子復享之殤公元年衛公子州吁弑其君完自立欲得諸侯使告於宋曰馮在鄭必為亂可與我伐之宋許之與伐鄭至東門而還二年鄭伐宋以報東門之役其後諸侯數來侵伐九年大司馬孔父嘉妻好出道遇太宰華督服䖍曰戴公之子督說目而觀之服䖍曰目者極視精不轉也督利孔父妻乃使人宣言國中曰殤公即位十年耳而十一戰賈逵曰一戰伐鄭圍其東門二戰取其禾三戰取邾田四戰邾鄭伐宋入其郛五戰伐鄭圍長葛六戰鄭以王命伐宋七戰魯敗宋師于菅八戰宋衛入鄭九戰伐戴十戰鄭入宋十一戰鄭伯以虢師大敗宋民苦不堪皆孔父為之我且殺孔父以寧民是嵗魯弑其君隱公十年華督攻殺孔父取其妻殤公怒遂弑殤公而迎穆公子馮於鄭而立之是為莊公莊公元年華督為相九年執鄭之祭仲要以立突為鄭君祭仲許竟立突十九年莊公卒子湣公捷立湣公七年齊桓公即位九年宋水魯使藏文仲往弔水賈逵曰問凶曰弔湣公自罪曰寡人以不能事鬼神政不修故水臧文仲善此言此言乃公子子魚教湣公也十年夏宋伐魯戰于乘邱徐廣曰乗一作媵駰案社預曰乘邱魯地魯生虜宋南宫萬賈逵曰南宫氏萬名宋卿宋人請萬萬歸宋十一年秋湣公與南宫萬獵因博爭行湣公怒辱之曰始吾敬若今若魯虜也萬有力病此言遂以局殺湣公于䝉澤賈逵曰蒙澤宋澤名也杜預曰宋地梁國有蒙縣大夫仇牧聞之以兵造公門萬摶牧牧齒著門闔死何休曰闔門扇因殺太宰華督乃更立公子游為君諸公子犇蕭公子禦説犇亳服䖍曰蕭亳宋邑也杜預曰今沛國有蕭縣蒙縣西北有亳城也萬弟南宫牛將兵圍亳冬蕭及宋之諸公子共擊殺南宫牛弑宋新君游而立湣公弟禦說是為桓公宋萬犇陳宋人請以賂陳陳人使婦人飲之淳酒服䖍曰宋萬多力勇不可執故先使婦人誘而飲之酒醉而縳之以革裹之歸宋左傳曰以犀革裹之宋人醢萬也服䖍曰醢肉醬桓公二年諸侯伐宋至郊而去三年齊桓公始霸二十三年迎衞公子燬於齊立之是為衛文公文公女弟為桓公夫人秦穆公即位三十年桓公病太子兹甫讓其庶兄目夷為嗣桓公義太子意竟不聽三十一年春桓公卒太子兹甫立是為襄公以其庶兄目夷為相未葬而齊桓公會諸侯于葵邱襄公往會襄公五年宋地霣星如雨與雨偕下左傳曰隕石于宋五隕星也六鶂退蜚公羊傳曰視之則六察之則鷁徐察之則退飛風疾也賈逵曰風起於逺至宋都高而疾故鶂逢風却退八年齊桓公卒宋欲為盟會十二年春宋襄公為鹿上之盟杜預曰鹿上宋地汝陰有原鹿縣以求諸侯於楚楚人許之公子目夷諫曰小國爭盟禍也不聽秋諸侯會宋公盟于盂杜預曰盂宋地目夷曰禍其在此乎君欲已甚何以堪之於是楚執宋襄公以伐宋冬會于亳以釋宋公子魚曰禍猶未也十三年夏宋伐鄭子魚曰禍在此矣秋楚伐宋以救鄭襄公將戰子魚諫曰天之棄商久矣不可冬十一月襄公與楚成王戰于泓榖梁傳曰戰于泓水之上楚人未濟目夷曰彼衆我寡及其未濟擊之公不聽已濟未陳又曰可擊公曰待其已陳陳成宋人擊之宋師大敗襄公傷股國人皆怨公公曰君子不困人於阨不鼓不成列何休曰軍法以鼓戰以金止不鼓不戰也不成列未成陳子魚曰兵以勝為功何常言與徐廣曰一云尚何言與必如公言即奴事之耳又何戰為楚成王以救鄭鄭享之去而取鄭二姬以歸叔瞻曰成王無禮其不沒乎為禮卒於無别有以知其不遂霸也是年晉公子重耳過宋襄公以傷於楚欲得晉援厚禮重耳以馬二十乘服䖍曰八十匹十四年夏襄公病傷於泓而竟卒子成公王臣立成公元年晉文公即位三年倍楚盟親晉以有德於文公也四年楚成王伐宋宋告急於晉五年晉文公救宋楚兵去九年晉文公卒十一年楚太子商臣弑其父成王代立十六年秦穆公卒十七年成公卒成公弟禦殺太子及大司馬公孫固而自立為君宋人共殺君禦而立成公少子杵臼是為昭公昭公四年宋敗長翟緣斯於長邱魯世宋云宋武公之世獲緣斯於長邱今云此時未詳七年楚莊王即位九年昭公無道國人不附昭公弟鮑革徐廣曰一無革字賢而下士先襄公夫人欲通於公子鮑不可服䖍曰襄公夫人周襄王之姊王姬也不可鮑不肯也乃助之施於國因大夫華元為右師昭公出獵夫人王姬使衛伯攻殺昭公杵臼弟鮑革立是為文公文公元年晉率諸侯伐宋責以弑君聞文公定立乃去二年昭公子因文公母弟須與武穆戴莊桓之族為亂文公盡誅之出武繆之族賈逵曰出逐也四年春鄭命楚伐宋宋使華元將鄭敗宋囚華元華元之將戰殺羊以食士其御羊羮不及左傳曰御羊斟也故怨馳入鄭軍故宋師敗得囚華元宋以兵車百乘文馬四百匹賈逵曰文貍文也王肅曰文馬畫馬也贖華元未盡入華元亡歸十四年楚莊王圍鄭鄭伯降楚楚復釋之十六年楚使過宋宋有前仇執楚使九月楚莊王圍宋十七年楚以圍宋五月不解宋城中急無食華元乃夜私見楚將子反子反告莊王莊王問城何如曰析骨而炊何休曰析破人骨也易子而食莊王曰誠哉言我軍亦有三日糧以信故遂罷兵去二十二年文公卒子共公瑕立始厚葬君子譏華元不臣矣共公元年華元善楚將子重又善晉將欒書兩盟晉楚十三年共公卒華元為右師魚石為左司司馬唐山攻殺太子肥欲殺華元華元犇晉魚石止之至河乃還皇覽曰華元冡在陳留小黃縣城北誅唐山乃立共公少子成是為平公左傳曰魚石犇楚平公三年楚共王拔宋之彭城以封宋左師魚石四年諸侯共誅魚石而歸彭城於宋三十五年楚公子圍弑其君自立為靈王四十四年平公卒子元公佐立元公三年楚公子棄疾弑靈王自立為平王八年宋火十年元公母信詐殺諸公子大夫華向氏作亂楚平王太子建來犇見諸華氏相攻亂建去如鄭十五年元公為魯昭公避季氏居外為之求入魯行道卒子景公頭曼立景公十六年魯陽虎來犇已復去二十五年孔子過宋宋司馬桓魋惡之欲殺孔子孔子微服去三十年曹倍宋又倍晉宋伐曹晉不救遂滅曹有之三十六年齊田常弑簡公三十七年楚惠王滅陳熒惑守心心宋之分野也景公憂之司星子韋曰可移於相景公曰相吾之股肱曰可移於民景公曰君者待民曰可移於歲景公曰歲飢民困吾誰為君子韋曰天高聽卑君有君人之言三熒惑宜有動於是候之果徙三度六十四年景公卒宋公子特攻殺太子而自立是為昭公昭公者元公之曽庶孫也昭公父公孫糾糾父公子褍秦徐廣曰褍音端褍秦即元公少子也景公殺昭公父糾故昭公怨殺太子而自立昭公四十七年卒子悼公購由立年表云四十九年悼公八年卒子休公田立休公田二十三年卒子辟公辟兵立徐廣曰一云辟公兵辟公三年卒子剔成立年表云剔成君也剔成四十一年剔成弟偃攻襲剔成剔成敗犇齊偃自立為宋君君偃十一年自立為王東敗齊取五城南敗楚取地三百里西敗魏軍乃與齊魏為敵國盛血以韋囊縣而射之命曰射天淫於酒婦人羣臣諫者輒射之於是諸侯皆曰桀宋宋其復為紂所為不可不誅告齊伐宋王偃立四十七年齊湣王與魏楚伐宋殺王偃遂滅宋而三分其地年表云偃立四十三年太史公曰孔子稱微子去之箕子為之奴比干諫而死殷有三仁焉何晏曰仁者愛人三人行異而同稱仁者何也以其俱在憂亂寧民也夏侯𤣥曰微子仕之窮也箕子比干志之窮也故或盡材而止或盡心而留皆其極也致極斯君子之事矣是以三仁不同而歸其一揆也春秋譏宋之亂自宣公廢太子而立弟公羊傳曰君子大居正宋之禍宣公為之也國以不寧者十世襄公之時修仁行義欲為盟主其大夫正考父美之故追道契湯高宗殷所以興作商頌韓詩商頌章句亦美襄公襄公既敗於泓而君子或以為多公羊傳曰君子大其不鼔不成列臨大事而不忘大禮有君而無臣以為雖文王之戰亦不過此也傷中國闕禮義褒之也宋襄之有禮讓也史記集解卷三十八
