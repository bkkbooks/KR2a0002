body:
  text: 史記集解卷一百二十宋裴駰撰史記一百二十汲鄭列傳第六十汲黯字長孺濮陽人也其先有寵於古之衛君文穎曰六國時衛但稱君至黯七世世為卿大夫黯以父任孝景時為太子洗馬以莊見憚孝景帝崩太子即位黯為謁者東越相攻上使黯往視之不至至吳而還報曰越人相攻固其俗然不足以辱天子之使河內失火延燒千餘家上遣黯往視之還報曰家人失火屋比延燒不足憂也臣過河南河南貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河南倉粟以振貧民臣請歸節伏矯制之罪上賢而釋之遷為滎陽令黯耻為令病歸田里上聞乃召拜為中大夫以數切諌不得久留內遷為東海太守黯學黃老之言治官理民好清靜擇丞史而任之如淳曰律太守都尉諸侯內史史各一人卒史書佐各十人今總言丞史或以為擇郡丞及史使任之鄭當時為大農推官屬丞史亦是也其治責大指而已不苛小黯多病卧閨閣內不出歲餘東海大治稱之上聞召以為主爵都尉列於九卿治務在無為而已宏大體不拘文法黯為人性倨少禮面折不能容人之過合已者善待之不合已者不能忍見士亦以此不附焉然好學游狹任氣節內行修潔好直諌數犯主之顏色常慕傅伯袁盎之為人也應劭曰傅柏梁人為孝主將素伉直善灌夫鄭當時及宗正劉棄徐廣曰一云名棄疾亦以數直諌不得久居位當是時太后弟武安侯蚡為丞相中二千石來拜謁蚡不為禮然黯見蚡未嘗拜常損之天子方招文學儒者上曰吾欲云云張晏曰所言欲施仁義也黯對曰陛下內多欲而外施仁義奈何欲效唐虞之治乎上默然怒變色而罷朝公卿皆為黯懼上退謂左右曰甚矣汲黯之戅也羣臣或數黯黯曰天子置公卿輔弼之臣寧令從諛承意陷主於不義乎且已在其位縱愛身奈辱朝廷何黯多病病且滿三月上常賜告者數如淳曰杜欽所謂病滿賜告詔恩也數者非一也或曰賜告得去官歸家與告居官不視事終不愈最後病莊助為請告徐廣曰最一作明也上曰汲黯何如人哉助曰使黯任職居官無以踰人然至其輔少主守城深堅招之不來麾之不去雖自謂賁育亦不能奪之矣上曰然古有社稷之臣至如黯近之矣大將軍青侍中上踞厠而視之如淳曰厠音側謂牀邉踞牀視之一云溷厠也厠牀邉側丞相宏燕見上或時不冠至如黯見上不冠不見也上嘗坐武帳中應劭曰武帳織成為武士象也孟康曰今御武帳置兵蘭五兵於帳中韋昭曰以武名之示威黯前奏事上不冠望見黯避帳中使人可其奏其見敬禮如此張湯方以更定律令為廷尉黯數質責湯於上前曰公為正卿上不能裦先帝之功業下不能抑天下之邪心安國富民使囹圄空虛二者無一焉非苦就行放析就功何乃取髙皇帝約束紛更之為如淳曰紛亂也公以此無種矣黯時與湯論議湯辨常在文深小苛黯伉厲守髙不能屈忿發罵曰天下謂刀筆吏不可以為公卿果然必湯也令天下重足而立側目而視矣是時漢方征胸奴招懷四夷黯務少事承上間常言與胡和親無起兵上方向儒術尊公孫宏及事益多吏民巧弄上分别文法湯等數奏決讞以幸而黯常毁儒面觸宏等徒懷詐飾智以阿人主取容而刀筆吏專深文巧詆陷人於罪使不得反其真以勝為功上愈益貴宏湯宏湯深心疾黯唯天子亦不說也欲誅之以事宏為丞相乃言上曰右內史界部中多貴人宗室難治非素重臣不能任請徙黯為右內史為右內史數歲官事不廢大將軍青既益尊姊為皇后然黯與亢禮人或說黯曰自天子欲羣臣下大將軍大將軍尊重益貴君不可以不拜黯曰夫以大將軍有揖客反不重邪大將軍聞愈賢黯數請問國家朝廷所疑遇黯過於平生淮南王謀反憚黯曰好直諌守節死義難惑以非至如說丞相宏如發䝉振落耳天子既數征胸奴有功黯之言益不用始黯列為九卿而公孫宏張湯為小吏及宏湯稍益貴與黯同位黯乂非毁宏湯等已而宏至丞相封為侯湯至御史大夫故黯時丞相史皆與黯同列或尊用過之黯褊心不能無少望見上前言曰陛下用羣臣如積薪耳後來者居上上默然有間黯罷上曰人果不可以無學觀黯之言也日益甚居無何胸奴渾邪王率衆來降漢發車二萬乘縣官無錢從民貰馬民或匿馬馬不具上怒欲斬長安令黯曰長安令無罪獨斬黯民乃肯出馬且胸奴畔其主而降漢漢徐以縣次傳之何至今天下騷動罷弊中國而以事夷狄之人乎上默然及渾邪至賈人與市者坐當死者五百餘人黯請間見髙門如淳曰黃圗未央宫中有髙門殿曰夫胸奴攻當路塞絶和親中國興兵誅之死傷者不可勝計而費以巨萬百數臣愚以為陛下得胡人皆以為奴婢以賜從軍死事者家所鹵獲因豫之以謝天下之苦塞百姓之心今縱不能渾邪率數萬之衆來降虛府庫賞賜發良民侍飬譬若奉驕子愚民安知市買長安中物而文吏繩以為闌出財物于邉關乎應劭曰闌妄也律胡市吏民不得持兵器出開雖於京師市買其法一也瓚曰無符傳出入為闌陛下縱不能得胸奴之資以謝天下又以微文殺無知者五百餘人是所謂庇其葉而傷其枝者也臣竊為陛下不取也上默然不許曰吾久不聞汲黯之言今又復妄發矣後數月黯坐小法㑹赦免官於是黯𨼆於田園居數年會更五銖錢徐廣曰元狩五年行五銖錢民多盜鑄錢楚地尤甚上以為淮陽楚地之郊乃召拜黯為淮陽太守黯伏謝不受印詔數强豫然後奉詔詔召見黯黯為上泣曰臣自以為填溝壑不復見陛下不意陛下復收用之臣常有狗馬病力不能任郡事臣願為中郎出入禁闥補過拾遺臣之願也上曰君薄淮陽邪吾今召君矣顧淮陽吏民不相得吾徒得君之重卧而治之黯既辭行過大行李息曰黯棄居郡不得與朝廷議也然御史大夫張湯智足以拒諌詐足以飾非務巧佞之語辨數之辭非肯正為天下言專阿主意所不欲因而毁之主意所欲因而譽之好興事舞文法如淳曰舞猶弄也內懷詐以御主心外挾賊吏以為威重公列九卿不早言之公與之俱受其僇矣息畏湯終不敢言黯居郡如故治淮陽政清後張湯果敗上聞黯與息言抵息罪令黯以諸侯相秩居淮陽如淳曰諸侯王相在郡守上秩真二千石律真二千石奉月二萬二千石月萬六千七歲而卒徐廣曰元鼎五年卒後上以黯故官其弟汲仁至九卿子汲偃至諸侯相黯姑姊子司馬安亦少與黯為太子洗馬安文深巧善宦官四至九卿以河南太守卒昆弟以安故同時至二千石者十人濮陽段宏始事蓋侯信徐廣曰太后兄王信信任宏宏亦再至九卿然衛人仕者皆嚴憚汲黯出其下鄭當時者字莊陳人也其先鄭君漢書音義曰當時父嘗為項籍將籍死已而屬漢髙祖令諸故項籍臣名籍鄭君獨不奉詔詔盡拜名籍者為大夫而逐鄭君鄭君死孝文時鄭莊以任俠自喜脫張羽於厄服䖍曰梁孝王之將楚相之弟也聲聞梁楚之間孝景時為太子舍人每五日洗沐常置驛馬長安諸郊如淳曰郊道四通處也請賔客使瓚曰諸郊謂長安四面郊祀之處間靜可以請賔客存諸故人請謝賔客夜以繼日至其明旦常恐不遍莊好黃老之言其慕長者如恐不見年少官薄然其游知交皆其大父行天下有名之士也武帝立莊稍遷為魯中尉濟南太守江都相至九卿為右內史以武安侯魏其時議貶秩為詹事遷為大農令莊為太史誡門下客至無貴賤無留門者執賔主之禮以其貴下人莊廉又不治其産業仰奉賜以給諸公然其餽遺人不過算器食徐廣曰算音先管反竹器每朝候上之間說未嘗不言天下之長者其推轂士及官屬丞史誠有味其言之也常引以為賢於已未嘗名吏與官屬言若恐傷之聞人之善言進之上唯恐後山東士諸公以此翕然稱鄭莊鄭莊使視決河自請治行五日如淳曰治行謂莊嚴也上曰吾聞鄭莊行千里不齎糧請治行者何也然鄭莊在朝常趨和承意不敢甚引當否及晚節漢征胸奴招四夷天下費多財用益匱莊任人賓客為大農僦人徐廣曰一作入一云賓客為大農僦人僦人蓋興生財利如今方宜矣駰案晉灼曰當時為大農而任和其賓客辜較任僦也瓚曰任人為保任見舉者多逋負司馬安為淮陽太守發其事莊以此陷罪贖為庶人頃之守長史如淳曰丞相長史上以為老以莊為汝南太守數歲以官卒鄭莊汲黯始列為九卿廉內行修潔此兩人中廢家貧賓客益落及居郡卒後家無餘資財莊兄弟子孫以莊故至二千石六七人焉太史公曰夫以汲鄭之賢有藝則賔客十倍無藝則否况衆人乎下邽翟公有言徐廣曰邽作邳始翟公為廷尉賔客闐門及廢門外可設雀羅翟公復為廷尉賓客欲往翟公乃大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見汲鄭亦云悲夫史記集解卷一百二十
