body:
  text: 史記集解卷一百六宋裴駰撰史記一百六吳王濞列傳第四十六吳王濞者高帝兄劉仲之子也徐廣曰仲名喜高帝已定天下七年立劉仲為代王而胸奴攻代劉仲不能堅守棄國亡間行走雒陽自歸天子天子為骨肉故不忍致法廢以為郃陽侯高帝十一年秋淮南王英布反東并荆地劫其國兵西度淮擊楚高帝自將往誅之劉仲子沛侯濞年二十有氣力以騎將從破布軍蘄西㑹甀布走荆王劉賈為布所殺無後上患吳㑹稽輕悍無壯王以填之諸子少乃立濞於沛為吳王徐廣曰十二年十月辛丑王三郡五十三城已拜受印高帝召濞相之謂曰若狀有反相心獨悔業已拜因拊其背告曰漢後五十年東南有亂者豈若邪徐廣曰漢元年至景帝三年反五十冇三年駰案應邵曰克期五十占者所知若秦始皇東巡以厭氣後劉項起東南疑當如此耳如淳曰度其貯積足用為難又吳楚世不賔服然天下同姓為一家也慎無反濞頓首曰不敢會孝惠高后時天下初定郡國諸侯各務自拊循其民吳有豫章郡銅山韋昭曰今故章濞則招致天下亡命者益鑄錢煮海水為鹽以故無賦國用富饒如淳曰鑄錢煮鹽收其利以足國用故無賦於民孝文時吳太子入見得侍皇太子飲博吳太子師傅皆楚人輕悍又素驕博爭道不恭皇太子引博局提吳太子殺之於是遣其喪歸葬至吳吳王愠曰天下同宗死長安即葬長安何必來葬為復遣喪至長安葬吳王由此稍失藩臣之禮稱病不朝京師知其以子故稱病不朝驗問實不病諸吳使來輒繫責治之吳王恐為謀滋甚及後使人為秋請應邵曰冬當斷獄秋先請擇其輕重也孟康曰律春曰朝秋曰請如古諸侯朝聘也如淳曰濞不得行使人代己致請禮也上復責問吳使者使者對曰王實不病漢繫治使者數輩以故遂稱病且夫察見淵中魚不祥張晏曰喻人君不當見盡下之私今王始詐病及覺見責急愈益閉恐上誅之訃乃無聊唯上棄之而與更始於是天子乃赦吳使者歸之而賜吳王几杖老不朝吳得釋其罪謀亦益解然其居國以銅鹽故百姓無賦卒踐更輒與平賈漢書音義曰以當為更卒出錢三百文謂之過更自行為卒謂之踐更吳王欲得民心為卒雇者其庸隨時月與平賈如漢桓靈時有所興作以少府錢借民比也歲時存問茂材賞賜閭里他郡國吏欲來捕亡人者訟共禁弗豫徐廣曰訟音公駰案如淳曰訟公也如此者四十餘年以故能使其衆鼂錯為太子家令得幸太子數從容言吳過可削數上書說孝文帝文帝寬不忍罰以此吳日益橫及孝景帝即位錯為御史大夫說上曰昔高帝初定天下昆弟少諸子弱大封同姓故王孽子悼惠王王齊七十餘城庶弟元王王楚四十餘城兄子濞王吳五十餘城封三庶孽分天下半今吳王前有太子之㕁詐稱病不朝於古法當誅文帝弗忍因賜几杖德至厚當改過自新乃益驕溢即山鑄錢煮海水為鹽誘天下亡人謀作亂今削之亦反不削之亦反削之其反亟禍小不削反遲禍大三年冬楚王朝鼂錯因言楚王戊往年為薄太后服私姦服舍服䖍曰服舍在喪次而私姦宫中也請誅之詔赦罰削東海郡因削吳之豫章郡㑹稽郡及前二年趙王有罪削其河間郡膠西王卬以賣爵有姦削其六縣漢廷臣方議削吳吳王濞恐削地無已因以此發謀欲舉事念諸侯無足與計謀者聞膠西王勇好氣喜兵諸侯皆憚畏韋昭曰故為齊分為國名膠東濟北之屬於是乃使中大夫應高誂膠西王無文書口報曰吳王不肖有宿夕之憂不敢自外使喻其歡心王曰何以教之高曰今者主上興於姦飾於邪臣好小善聽讒賊擅變更律令侵奪諸侯之地徴求滋多誅罰良善日以益甚里語有之䑛糠及米吳與膠西知名諸侯也一時見察恐不得安肆矣吳王身有內病不能朝請二十餘年常患見疑無以自白今脅肩纍足猶懼不見釋竊聞大王以爵事有適所聞諸侯削地罪不至此此恐不得削地而已王曰然有之子將奈何高曰同惡相助同好相留同情相成同欲相趨同利相死今吳王自以為與大王同憂願因時循理棄軀以除害患於天下意亦可乎王瞿然駭曰寡人何敢如是今主上雖急固有死耳安得不戴高曰御史大夫鼂錯熒惑天子侵奪諸侯蔽忠塞賢朝廷疾怨諸侯皆有倍畔之意人事極矣彗星出蝗蟲數起此萬世一時而愁勞聖人之所以起也故吳王欲內以鼂錯為討外隨大王後車倣徉天下所鄉者降所指者下天下莫敢不服大王誠幸而許之一言則吳王率楚王略函谷關守滎陽敖倉之粟距漢兵治次舍須大王大王有幸而臨之則天下可并兩主分割不亦可乎王曰善高歸報吳王吳王猶恐其不與乃身自為使使於膠西面結之膠西羣臣或聞王謀諫曰承一帝至樂也今大王與吳西鄉第令事成兩主分爭患乃始結諸侯之地不足為漢郡什二而為畔逆以憂太后非長䇿也文穎曰王之太后也王弗聽遂發使約濟菑川膠東濟南濟北皆許諾而曰城陽景王有義攻諸吕勿與事定分之耳徐廣曰爾時城陽恭王喜景王之子諸侯既新削罰振恐多怨鼂錯及削吳㑹稽豫章郡書至則吳王先起兵膠西正月丙午誅漢吏二千石以下膠東菑川濟南楚趙亦然遂發兵西齊王後悔飲藥自殺畔約濟北王城壞未完其郎中令劫守其王不得發兵膠西為渠率膠東菑川濟南共攻圍臨菑趙王遂亦反陰使胸奴與連兵七國之發也吳王悉其士卒下令國中曰寡人年六十二徐廣曰吳王封吳四十二年矣身自將少子年十四亦為士卒先諸年上與寡人比下與少子等者皆發發二十餘萬人南使閩越東越東越亦發兵從孝景帝三年正月甲子初起兵於廣陵徐廣曰荆王劉賈都吳吳王移廣陵也西涉淮因并楚兵發使遺諸侯書曰吳王劉濞敬問膠西王膠東王菑川王濟南王趙王楚王淮南王衡山王廬江王故長沙王子徐廣曰吳芮之𤣥孫靖王著以文帝七年卒無嗣國除駰案如淳曰吳芮後四世無子國除庶子一人為列侯不得嗣王志將不滿故誘與之反也幸教寡人以漢有賊臣無功天下侵奪諸侯地使吏劾繫訊治以僇辱之為故漢書音義曰故事也不以諸侯人君禮遇劉氏骨肉絶先帝功臣進任姦宄詿亂天下欲危社禝陛下多病志失不能省察欲舉兵誅之謹聞教敝國雖狹地方三千里人雖少精兵可具五十萬寡人素事南越二十餘年其王君皆不辭分其卒以隨寡人又可得三十餘萬寡人雖不肖願以身從諸王越直音值長沙者因王子定長沙以北如淳曰南越直長沙者因王子定也西走蜀漢中告越如淳曰告東越使定之楚王淮南三王與寡人西面齊諸王與趙王定河間河內或入臨晉關或與寡人㑹雒陽燕王趙王固與胡王有約燕王北定代雲中搏胡衆入蕭關走長安匡正天子以安高廟願王勉之楚元王子淮南三王或不沐洗十餘年怨入骨髓欲一有所出之久矣寡人未得諸王之意未敢聽今諸王茍能存亡繼絶振弱伐暴以安劉氏社禝之所願也敝國雖貧寡人節衣食之用積金錢修兵革聚穀食夜以繼日三十餘年矣凡為此願諸王勉用之能斬捕大將者賜金五千斤封萬户列將三千斤封五千户裨將二千斤封二千户二千石千斤封千户千石五百金封五百户皆為列侯其以軍若城邑降者卒萬人邑萬戶如得大將人戶五千如得列將人户三千如得裨將人户千如得二千石其小吏皆以差次受爵金他封賜皆倍軍法服䖍曰封賜倍漢之常法其有故爵邑者更益勿因願諸王明以令士大夫弗敢欺也寡人金錢在天下者往往而有非必取於吳諸王日夜用之弗能盡有當賜者告寡人寡人且往遺之敬以聞七國反書聞天子天子乃遣太尉條侯周亞夫將三十六將軍往擊吳楚遣曲周侯酈寄擊趙將軍欒布擊齊大將軍竇嬰屯滎陽監齊趙兵吳楚反書聞兵未發竇嬰未行言故吳相袁盎盎時家居詔召入見上方與鼂錯調兵笇軍食上問袁盎曰君常為吳相知吳臣田祿伯為人乎今吳楚反於公何如對曰不足憂也今破矣上曰吳王即山鑄錢煮海水為鹽誘天下豪傑白頭舉事若此其計不百全豈發乎何以言其無能為也袁盎對曰吳有銅鹽利則有之安得豪傑而誘之誠令吳得豪傑亦且輔王為義不反矣吳所誘皆無賴子弟亡命鑄錢姦人故相率以反鼂錯曰袁盎䇿之善上問曰計安出盎對曰願屏左右上屏人獨錯在盎曰臣所言人臣不得知也乃屏錯錯趨避東廂恨甚上卒問盎盎對曰吳楚相遺書曰高帝王子弟各有分地今賊臣鼂錯擅適過諸侯削奪之地故以反為名西共誅鼂錯復故地而罷方今計獨斬鼂錯發使赦吳楚七國復其故削地則兵可無血刃而俱罷於是上默然良久曰顧誠何如吾不愛一人以謝天下盎曰臣愚計無出此願上孰計之乃拜盎為太常吳王弟子德侯為宗正徐廣曰名通其父名廣駰案漢書曰吳王弟子德侯廣為宗正也盎裝治行後十餘日上使中尉召錯紿載行東市錯衣朝衣斬東市則遣袁盎奉宗廟宗正輔親戚使告吳如盎䇿至吳吳楚兵已攻梁壁矣宗正以親故先入見諭吳王使拜受詔吳王聞袁盎來亦知其欲說已笑而應曰我已為東帝尚何誰拜不肯見盎而留之軍中欲劫使將盎不肯使人圍守且殺之盎得夜出步亡去走梁軍遂歸報條侯將乘六乘傳㑹兵滎陽至雒陽見劇孟喜曰七國反吾乘傳至此不自意全又以為諸侯已得劇孟劇孟今無動吾據滎陽以東無足憂者至淮陽問父絳侯故客鄧都尉曰䇿安出客曰吳兵鋭甚難與爭鋒楚兵輕不能久方今為將軍計莫若引兵東北壁昌邑以梁委吳吳必盡鋭攻之將軍深溝高壘使輕兵絶淮泗口塞吳餉道彼吳梁相敝而糧食竭乃以全强制其罷極破吳必矣條侯曰善從其䇿遂堅壁昌邑南輕兵絶吳餉道吳王之初發也吳臣田祿伯為大將軍田祿伯曰兵屯聚而西無他竒道難以就功臣願得五萬人别循江淮而上收淮南長沙入武關與大王㑹此亦一竒也吳王太子諫曰王以反為名此兵難以藉人藉人亦且反奈何且擅兵而别多他利害未可知也蘇林曰祿伯儻將兵降漢自為已利於吳為生患也徒自損耳吳王即不許田祿伯吳少將桓將軍說王曰吳多步兵步兵利險漢多車騎車騎利平地願大王所過城邑不下直棄去疾西據雒陽武庫食敖倉粟阻山河之險以令諸侯雖毋入關天下固已定矣即大王徐行留下城邑漢軍車騎至馳入梁楚之郊事敗矣吳王問諸老將老將曰此少年推鋒之計可耳安知大慮乎於是王不用桓將軍計吳王專并將其兵未渡淮諸賔客皆得為將校尉候司馬獨周丘不得用周邱者下邳人亡命吳酤酒無行吳王濞薄之弗任周邱上謁說王曰臣以無能不得待罪行間臣非敢求有所將願得王一漢節必有以報王王乃豫之周邱得節夜馳入下邳下邳時聞吳反皆城守至傳舍召令令入户使從者以罪斬令遂召昆弟所善豪吏告曰吳反兵且至至屠下邳不過食頃今先下家室必完能者封侯矣出乃告下邳皆下周邱一夜得三萬人使人報吳王遂將其兵北略城邑比至城陽兵十餘萬破城陽中尉軍聞吳王敗走自度無與共成功即引兵歸下邳未至疽發背死二月中吳王兵既破敗走於是天子制詔將軍曰蓋聞為善者天報之以福為非者天報之以殃高皇帝親表功德建立諸侯幽王悼惠王絶無後孝文皇帝哀憐加惠王幽王子遂悼惠王子卬等令奉其先王宗廟為漢藩國德配天地明並日月吳王濞倍德反義誘受天下亡命罪人亂天下幣如淳曰幣錢也以私錢淆亂天下錢也稱病不朝二十餘年有司數請濞罪孝文皇帝寬之欲其改行為善今乃與楚王戊趙王遂膠西王卬濟南王辟光菑川王賢膠東王雄渠約從反為逆無道起兵以危宗廟賊殺大臣及漢使者迫劫萬民夭殺無罪燒殘民家掘其邱冢甚為暴虐今卬等又重逆無道燒宗廟鹵御物如淳曰鹵抄掠也宗廟在郡縣之物皆為御物朕甚痛之朕素服避正殿將軍其勸士大夫擊反虜擊反虜者深入多殺為功斬首捕虜比三百石以上者皆殺之無有所置敢有議詔及不如詔者皆要斬初吳王之度淮與楚王遂西敗棘壁乘勝前鋭甚梁孝王恐遣六將軍擊吳又敗梁兩將士卒皆還走梁梁數使使報條侯求救條侯不許又使使惡條侯於上上使人告條侯救梁復守便宜不行梁使韓安國及楚死事相弟張羽為將軍徐廣曰楚相張尚諫王而死乃得頗敗吳兵吳兵欲西梁城守堅不敢西即走條侯軍㑹下邑徐廣曰屬梁國欲戰條侯壁不肯戰吳糧絶卒饑數挑戰遂夜奔條侯壁驚東南條侯使備西北果從西北入吳大敗士卒多饑死乃畔散於是吳王乃與其麾下壯士數千人夜亡去度江走丹徒保東越東越兵可萬餘人乃使人收聚亡卒漢使人以利啖東越韋昭曰啖音徒覽反東越即紿吳王吳王出勞軍即使人鏦殺吳王孟康曰方言㦸謂之鏦盛其頭馳傳以聞吳地記曰吳王濞葬武進縣南地名相唐吳王子子華子駒亡走閩越吳王之棄其軍亡也軍遂潰往往降太尉梁軍楚王戊軍敗自殺三王之圍齊臨菑也三月不能下漢兵至膠西膠東菑川王各引兵歸膠西王乃袒跣席槀飲水謝太后王太子德曰漢兵逺臣觀之已罷可襲願收大王餘兵擊之擊之不勝乃逃入海未晚也王曰吾士卒皆已壞不可發用弗聽漢將弓高侯頽當徐廣曰姓韓遺王書曰奉詔誅不義降者赦其罪復故不降者滅之王何處須以從事王肉袒叩頭漢軍壁謁曰臣卬奉法不謹驚駭百姓乃苦將軍逺道至於窮國敢請葅醢之罪弓高侯執金鼓見之曰王苦軍事願聞王發兵狀王頓首膝行對曰今者鼂錯天子用事臣變更高皇帝法令侵奪諸侯地卬等以為不義恐其敗亂天下七國發兵且以誅錯今聞錯已誅卬等謹以罷兵歸將軍曰王茍以錯不善何不以聞及未有詔虎符擅發兵擊義國以此觀之意非欲誅錯也乃出詔書為王讀之讀之訖曰王其自圖王曰如卬等死有餘罪遂自殺太后太子皆死膠東菑川濟南王皆死徐廣曰一云自殺國除納于漢酈將軍圍趙十月而下之趙王自殺濟北王以劫故得不誅徙王菑川初吳王首反并將楚兵連齊趙正月起兵三月皆破獨趙後下復置元王少子平陸侯禮為楚王續元王後徙汝南王非王吳故地為江都王太史公曰吳王之王由父省也言濞之王吳由父代王被省封郃陽侯省音所幸反能薄賦斂使其衆以擅山海利逆亂之萌自其子興爭技發難卒亡其本親越謀宗竟以夷隕鼂錯為國逺慮禍反近身袁盎權說初寵後辱故古者諸侯地不過百里山海不以封毋親夷狄以疏其屬蓋謂吳邪毋為權首反受其咎豈盎錯邪史記集解卷一百六
