body:
  text: 史記集解卷一百二十三宋裴駰撰史記一百二十三大宛列傳第六十三大宛之迹見自張騫張騫漢中人建元中為郎是時天子問胸奴降者皆言胸奴破月氏王以其頭為飲器韋昭曰飲器椑榼也單于以月氏王頭為飲器晉灼曰飲器虎子之屬也或曰飲酒器也月氏遁逃而常怨仇胸奴無與共擊之漢方欲事滅胡聞此言因欲通使道必更胸奴中乃募能使者騫以郎應募使月氏與堂邑氏故胡奴甘父漢書音義曰堂邑氏姓胡奴甘父字俱出隴西經胸奴胸奴得之傳詣單于單于留之曰月氏在吾北漢何以得往使吾欲使越漢肯聽我乎留騫十餘嵗與妻有子然騫持漢節不失居胸奴中益寬騫因與其屬亡鄉月氏西走數十日至大宛大宛聞漢之饒財欲通不得見騫喜問曰若欲何之騫曰為漢使月氏而為胸奴所閉道今亡唯王使人導送我誠得至反漢漢之賂遺王財物不可勝言大宛以為然遣騫為發導驛抵康居康居傳致大月氏大月氏王已為胡所殺立其太子為王徐廣曰一云夫人為王夷狄亦或女主既臣大夏而居之地肥饒少寇志安樂又自以逺漢殊無報胡之心騫從月氏至大夏竟不能得月氏要領漢書音義曰要領要契留嵗餘還並南山欲從羌中歸復為胸奴所得留嵗餘單于死徐廣曰元朔三年左谷蠡王攻其太子自立國內亂騫與胡妻及堂邑父俱亡歸漢漢拜騫為太中大夫堂邑父為奉使君騫為人強力寬大信人蠻夷愛之堂邑父故胡人善射窮急射禽獸給食初騫行時百餘人去十三嵗唯二人得還騫身所至者大宛大月氏大夏康居而傳聞其傍大國五六具為天子言之曰大宛在胸奴西南在漢正西去漢可萬里其俗土著耕田田稻麥有蒲陶酒多善馬馬汗血其先天馬子也漢書音義曰大宛國有髙山其上有馬不可得因取五色母馬置其下與交生駒汗血因號曰天馬子有城郭屋室其屬邑大小七十餘城衆可數十萬其兵弓矛騎射其北則康居西則大月氏西南則大夏東北則烏孫東則扞罙于置徐廣曰漢記曰拘彌國去于置三百里于置之西則水皆西流注西海其東水東流注鹽澤鹽澤潛行地下其南則河源出焉多玉石河注中國而樓蘭姑師邑有城郭臨鹽澤鹽澤去長安可五千里胸奴右方居鹽澤以東至隴西長城南接羌鬲漢道焉烏孫在大宛東北可二千里行國徐廣曰不土著隨畜與胸奴同俗控弦者數萬敢戰故服胸奴及盛取其羈屬不肯往朝會焉康居在大宛西北可二千里行國與月氏大同俗控弦者八九萬人與大宛鄰國國小南羈事月氏東羈事胸奴奄蔡在康居西北可二千里行國與康居大同俗控弦者十餘萬臨大澤無崖蓋乃北海云大月氏在大宛西可二三千里居媯水北其南則大夏西則安息北則康居行國也隨畜移徙與胸奴同俗控弦者可一二十萬故時強輕胸奴及冒頓立攻破月氏至胸奴老上單于殺月氏王以其頭為飲器始月氏居敦煌祁連間及為胸奴所敗乃逺去過宛西擊大夏而臣之遂都媯水北為王庭其餘小衆不能去者保南山羌號小月氏安息在大月氏西可數千里其俗土著耕田田稻麥蒲陶酒城邑如大宛其屬小大數百城地方數千里最為大國臨媯水有市民商賈用車及船行旁國或數千里以銀為錢錢如其王面王死輒更錢效王面焉畫革旁行以為書記漢書音義曰橫行為書記其西則條枝北有奄蔡黎軒條枝在安息西數千里臨西海暑溼耕田田稻有大鳥卯如甕人衆甚多往往有小君長而安息役屬之以為外國國善眩應昭曰眩相詐惑安息長老傳聞條枝有弱水西王母而未嘗見大夏在大宛西南二千餘里媯水南其俗土著有城屋與大宛同俗無大王長往往城邑置小長其兵弱畏戰善賈市及大月氏西徙攻敗之皆臣畜大夏大夏民多可百餘萬其都曰藍氏城有市販賈諸物其東南有身毒國徐廣曰身或作齕又作訖騫曰臣在大夏時見邛竹杖蜀布問曰安得此大夏國人曰吾賈人往市之身毒身毒在大夏東南可數千里其俗土著大與大夏同而卑溼暑熱云其人民乘象以戰其國臨大水焉以騫度之大夏去漢萬二千里居漢西南今身毒國又居大夏東南數千里有蜀物此其去蜀不逺矣今使大夏從羌中險羌人惡之少北則為胸奴所得從蜀宜徑如淳曰徑疾也或曰徑直又無寇天子既聞大宛及大夏安息之屬皆大國多竒物土著頗與中國同業而兵弱貴漢財物其北有大月氏康居之屬兵強可以賂遺設利朝也且誠得而以義屬之則廣地萬里重九譯致殊俗威德遍於四海天子欣然以騫言為然乃令騫因蜀犍為發間使四道並出出駹出冉出徙徐廣曰屬漢嘉出邛僰皆各行一二千里其北方閉氐筰服虔曰皆夷名漢使見閉於夷也南方閉嶲昆明昆明之屬無君長善寇盜輒殺略漢使終莫得通然聞其西可千餘里有乘象國名曰滇越徐廣曰一作絶而蜀賈姦出物者或至焉於是漢以求大夏道始通滇國初漢欲通西南夷費多道不通罷之及張騫言可以通大夏乃復事西南夷騫以校尉從大將軍擊胸奴知水草處軍得以不乏乃封騫為博望侯是嵗元朔六年也其明年騫為衛尉與李將軍俱出右北平擊胸奴胸奴圍李將軍軍失亡多而騫後期當斬贖為庶人是嵗漢遣驃騎破胸奴西城數萬人至祁連山其明年渾邪王率其民降漢而金城河西西並南山至鹽澤空無胸奴胸奴時有候者到而希矣其後二年漢擊走單于於幕北是後天子數問騫大夏之屬騫既失侯因言曰臣居胸奴中聞烏孫王號昆莫昆莫之父胸奴西邊小國也胸奴攻殺其父而昆莫生棄於野烏嗛肉蜚其上徐廣曰讀嗛與銜同酷吏傳義縱不治道上忿銜之史記亦作嗛字狼往乳之單于怪以為神而收長之及壯使將兵數有功單于復以其父之民豫昆莫令長守於西城昆莫收養其民攻旁小邑控弦數萬習攻戰單于死昆莫乃率其衆逺徙中立不肯朝會胸奴胸奴遣竒兵擊不勝以為神而逺之因羈屬之不大攻今單于新困于漢而故渾邪地空無人蠻夷俗貪漢財物今誠以此時而厚幣賂烏孫招以益東居故渾邪之地與漢結昆弟其勢宜聽聽則是斷胸奴右臂也既連烏孫自其西大夏之屬皆可招來而為外臣天子以為然拜騫為中郎將將三百人馬各二匹牛羊以萬數齎金幣帛直數千巨萬多持節副使道可使使遺之他旁國騫既至烏孫烏孫王昆莫見漢使如單于禮騫大慙知蠻夷貪乃曰天子致賜王不拜則還賜昆莫起拜賜其他如故騫諭使指曰烏孫能東居渾邪地則漢遣翁主為昆莫夫人烏孫國分王老而逺漢未知其大小素服屬胸奴日久矣且又近之其大臣皆畏胡不欲移徙王不能専制騫不得其要領昆莫有十餘子其中子曰太祿強善將衆將衆别居萬餘騎太祿兄為太子太子有子曰岑娶而太子蚤死臨死謂其父昆莫曰必以岑娶為太子無令他人代之昆莫哀而許之卒以岑娶為太子太祿怒其不得代太子也乃收其諸昆弟將其衆畔謀攻岑娶及昆莫昆莫老常恐大祿殺岑娶豫岑娶萬餘騎别居而昆莫有萬餘騎自備國衆分為三而其大總取羈屬昆莫昆莫亦以此不敢專約於騫騫因分遣副使使大宛康居大月氏大夏安息身毒于置扞罙及諸旁國烏孫發導譯送騫還騫與烏孫遣使數十人馬數十匹報謝因令窺漢知其廣大騫還到拜為大行列於九卿嵗餘卒烏孫使既見漢人衆富厚歸報其國其國乃益重漢其後嵗餘騫所遣使通大夏之屬者皆頗與其人俱來晉灼曰其國人於是西北國始通於漢矣然張騫鑿空蘇林曰鑿開空通也騫開通西域道其後使往者皆稱博望侯以為質於外國如淳曰質誠信也博望侯有誠信故後使稱其意以喻外國李竒曰質信也外國由此信之自博望侯騫死後胸奴聞漢通烏孫怒欲擊之及漢使烏孫若徐廣曰漢書作及若意義亦及也出其用抵大宛大月氏相屬烏孫乃恐使使獻馬願得尚漢女翁主為昆弟天子問羣臣議計皆曰必先納聘然後乃遣女初天子發書易漢書音義曰發易書以卜云神馬當從西北來得烏孫馬好名曰天馬及得大宛汗血馬益壯更名烏孫馬曰西極名大宛馬曰天馬云而漢始築令居以西徐廣曰屬金城初置酒泉郡以通西北國因益發使抵安息奄蔡黎軒條枝身毒國而天子好宛馬使者相望於道諸使外國一輩大者數百少者百餘人人所齎操大放博望侯時其後益習而衰少焉漢率一歲中使多者十餘少者五六輩逺者八九嵗近者數嵗而反是時漢既滅越而蜀西南夷皆震請吏入朝於是置益州越嶲牂牱沈黎汶山郡欲地接以前通大夏李竒曰欲地界相接至大夏乃遣使柏始昌吕越人等嵗十餘輩出此初郡抵大夏皆復閉昆明為所殺奪幣財終莫能通至大夏焉於是漢發三輔罪人因巴蜀士數萬人遣兩將軍郭昌衛廣等往擊昆明之遮漢使者徐廣曰元封二年斬首虜數萬人而去其後遣使昆明復為寇竟莫能得通而北道酒泉抵大夏使者既多而外國益厭漢幣不貴其物自博望侯開外國道以尊貴其後從吏卒皆爭上書言外國竒怪利害求使天子為其絶逺非人所樂往聽其言豫節募吏民毋問所從來為具備人衆遣之以廣其道來還不能毋侵盜幣物及使失指天子為其習之輒覆案致重罪以激怒令贖復求使使端無窮而輕犯法其吏卒亦輒復盛推外國所有言大者豫節言小者為副故妄言無行之徒皆爭效之其使皆貧人子私縣官齎物欲賤市以私其利外國外國亦厭漢使人人有言輕重服虔曰漢使言於外國人人輕重不實如淳曰外國人人自言數為漢使所侵易度漢兵逺不能至而禁其食物以苦漢使漢使乏絶積怨至相攻擊而樓蘭姑師小國耳徐廣曰即車師當空道攻劫漢使王恢等尤甚徐廣曰恢一作怪而胸奴竒兵時時遮擊使西國者使者爭遍言外國災害皆有城邑兵弱易擊於是天子以故遣從驃侯破奴將屬國騎及郡兵數萬至胸河水欲以擊胡胡皆去其明年擊姑師破奴與輕騎七百餘先至虜樓蘭王遂破姑師因舉兵威以困烏孫大宛之屬還封破奴為浞野侯徐廣曰元封三年王恢徐廣曰為中郎將數使為樓蘭所苦言天子天子發兵令恢佐破奴擊破之封恢為浩侯徐廣曰捕得車師王元封四年封浩侯於是酒泉列亭鄣至玉門矣韋昭曰玉門關在龍勒界烏孫以千匹馬聘漢女漢遣宗室女江都翁主漢書曰江都王建女往妻烏孫烏孫王昆莫以為右夫人胸奴亦遣女妻昆莫昆莫以為左夫人昆莫曰我老乃令其孫岑娶妻翁主烏孫多馬其富人至有四五千匹馬初漢使至安息安息王令將二萬騎迎於東界東界去王都數千里行比至過數十城人民相屬甚多漢使還而後發使隨漢使來觀漢廣大以大鳥卵及黎軒善眩人獻于漢及宛西小國歡潛大益宛東姑師扞罙蘇薤之屬皆隨漢使獻見天子天子大悅而漢使窮河源河源出于置其山多玉石采來瓚曰漢使采取將持來至漢天子案古圖書名河所出山曰崑崙云是時上方數巡狩海上乃悉從外國客大都多人則過之散財帛以賞賜厚具以饒給之以覽示漢富厚焉於是大觳抵出竒戲諸怪物多聚觀者行賞賜酒池肉林令外國客遍觀名倉庫府藏之積見漢之廣大傾駭之及加其眩者之工而觳抵竒戲嵗增變甚盛益興自此始西北外國使更來更去宛以西皆自以逺尚驕恣晏然未可詘以禮羈縻而使也自烏孫以西至安息以近胸奴胸奴困月氏也胸奴使持單于一信則國國傳送食不敢留苦及至漢使非出幣帛不得食不市畜不得騎用所以然者逺漢而漢多財物故必市乃得所欲然以畏胸奴於漢使焉宛左右以蒲陶為酒富人藏酒至萬餘石久者數十嵗不敗俗嗜酒馬嗜苜蓿漢使取其實來於是天子始種苜蓿蒲陶肥饒地及天馬多外國使來衆則離宫别觀旁盡種蒲陶苜蓿極望自大宛以西至安息國雖頗異言然大同俗相知言其人皆深眼多鬚􅏋善市賈爭分銖俗貴女子女子所言而丈夫乃決正其地皆無絲漆不知鑄錢器徐廣曰多作錢字又或作鐵字及漢使亡卒降教鑄作他兵器得漢黃白金輒以為器不用為幣而漢使者往既多其少從率多進熟於天子漢書音義曰少從不如計也或云徙行之微者也進熟美語如成熟者也言曰宛有善馬在二師城匿不肯與漢使天子既好宛馬聞之甘心使壯士車令等持千金及金馬以請宛王二師城善馬宛國饒漢物相與謀曰漢去我逺而鹽水中數敗服虔曰水名道從外水中如淳曰道絶逺無穀草出其北有胡寇出其南乏水草又且往往而絶邑乏食者多漢使數百人為輩來而常乏食死者過半是安能致大軍乎無奈我何且二師馬宛寶馬也遂不肯豫漢使漢使怒妄言如淳曰罵詈椎金馬而去宛貴人怒曰漢使至輕我遣漢使去令其東邊郁成遮攻殺漢使取其財物於是天子大怒諸嘗使宛姚定漢等言宛兵弱誠以漢兵不過三千人強弩射之即盡虜破宛矣天子以嘗使浞野侯攻樓蘭以七百騎先至虜其王以定漢等言為然而欲侯寵姬李氏拜李廣利為二師將軍發蜀國六千騎及郡國惡少年數萬人以往伐宛期至二師城取善馬故號二師將軍趙始成為軍正故浩侯王恢使導軍徐廣曰恢先受封一年坐使酒泉矯制國除而李哆為校尉制軍事是嵗太初元年也而關東蝗大起蜚至敦煌二師將軍軍既西過鹽水當道小國恐各堅城守不肯給食攻之不能下下者得食不下者數日則去比至郁成士至者不過數千皆飢罷攻郁成郁成大破之所殺傷甚衆二師將軍與哆始成等計至郁成尚不能舉况至其王都乎引兵而還往來二嵗還至燉煌士不過什一二使使上書言道逺多乏食且士卒不患戰患飢人少不足以拔宛願且罷兵益發而復往天子聞之大怒而使使遮玉門曰軍有敢入者輒斬之二師恐因留燉煌其夏漢亡浞野之兵二萬餘於胸奴徐廣曰太初二年趙破奴為浚稽將軍二萬騎擊胸奴不還也公卿及議者皆願罷擊宛軍專力攻胡天子已業誅宛宛小國而不能下則大夏之屬輕漢而宛善馬絶不來烏孫侖頭易苦漢使矣晉灼曰易輕也為外國笑乃案言伐宛尤不便者鄧光等赦囚徒材官益發惡少年及邊騎嵗餘而出燉煌者六萬人負私從者不與牛十萬馬三萬餘匹驢騾櫜他以萬數多齎糧兵弩甚設天下騷動傳相奉伐宛凡五十餘校尉宛王城中無井皆汲城外流水於是乃遣水工徙其城下水空以空其城徐廣曰空一作穴蓋以水蕩敗其城也言空者令城中渴乏益發戍甲卒十八萬酒泉張掖北置居延休屠以衛酒泉如淳曰立二縣以衛邊也或曰置二部都尉以衛酒泉而發天下七科適及載糒給二師轉車人徒相連屬至燉煌而拜習馬者二人為執驅校尉備破宛擇取其善馬云於是二師後復行兵多而所至小國莫不迎出食給軍至侖頭侖頭不下攻數日屠之自此而西平行至宛城漢兵到者三萬人宛兵迎擊漢兵漢兵射敗之宛走入葆乘其城二師兵欲行攻郁成恐留行而令宛益生詐乃先至宛決其水源移之則宛固已憂困圍其城攻之四十餘日其外城壞虜宛貴人勇將煎靡宛大恐走入中城宛貴人相與謀曰漢所為攻宛以王母寡匿善馬而殺漢使今殺王母寡而出善馬漢兵宜解即不解乃力戰而死未晚也宛貴人皆以為然共殺其王毋寡持其頭遣貴人使二師約曰漢毋攻我我盡出善馬恣所取而給漢軍食即不聽我盡殺善馬而康居之救且至至我居內康居居外與漢軍戰漢軍熟計之何從是時康居候視漢兵漢兵尚盛不敢進二師與趙始成李哆等計聞宛城中新得秦人知穿井而其內食尚多所為來誅首惡者毋寡毋寡頭已至如此而不許解兵則堅守而康居候漢罷而來救宛破漢軍必矣軍吏皆以為然許宛之約宛乃出其善馬令漢自擇之而多出食食給漢軍漢軍取其善馬數十匹中馬以下牡牝三千餘匹而立宛貴人之故待遇漢使善者名昧蔡以為宛王與盟而罷兵終不得入中城乃罷而引歸初二師起燉煌西以為人多道上國不能食乃分為數軍從南北道校尉王申生故鴻臚壺充國等千餘人别到郁成郁成城守不肯給食其軍王申生去大軍二百里偵而輕之責郁成郁成食不肯出窺知申生軍日少晨用三千人攻戮殺申生等軍破數人脫亡走二師二師令搜粟都尉上官桀往攻破郁成郁成王亡走康居桀追至康居康居聞漢已破宛乃出郁成王豫桀桀令四騎士縛守詣大將軍如淳曰時多别將故謂二師為大將軍四人相謂曰郁成王漢國所毒今生將去卒失大事欲殺莫敢先擊上邽騎士趙弟最少拔劒擊之斬郁成王齎頭弟桀等逐及大將軍初二師後行天子使使告烏孫大發兵並力擊宛烏孫發二千騎往持兩端不肯前二師將軍之東諸所過小國聞宛破皆使其子弟從軍入獻見天子因以為質焉二師之伐宛也而軍正趙始成力戰功最多及上官桀敢深入李哆為謀計軍入玉門者萬餘人軍馬千餘匹二師後行軍非乏食戰死不能多而將吏貪多不愛士卒侵牟之以此物故衆天子為萬里而伐宛不録過封廣利為海西侯又封身斬郁成王者騎士趙弟為新畤侯軍正趙始成為光祿大夫上官桀為少府李哆為上黨太守軍官吏為九卿者三人諸侯相郡守二千石者百餘人千石以下千餘人奮行者官過其望漢書音義曰奮迅自樂入行者以適過行者皆絀其勞徐廣曰奮行者及以適行者雖俱有功勞今行賞計其前有罪而減其賜故曰絀其勞也絀抑退也此本以適行故功勞不足重所以絀降之不得與奮行者齊賞之士卒賜直四萬金伐宛再反凡四嵗而得罷焉漢已伐宛立昧蔡為宛王而去嵗餘宛貴人以為昧蔡善諛使我國遇屠乃相與殺昧蔡立毋寡昆弟日蟬封為宛王而遣其子入質于漢漢因使使賂賜以鎮撫之而漢發使十餘輩至宛西諸外國求竒物因風覽以伐宛之威德而燉煌置徐廣曰一本無置字酒泉都尉徐廣曰一云置都尉又云燉煌有淵泉縣或者酒字當為淵字西至鹽水往往有亭而侖頭有田卒數百人因置使者護田積粟以給使外國者太史公曰禹本紀言河出崑崙崑崙其髙二千五百餘里日月所相避隱為光明也其上有醴泉瑤池今自張騫使大夏之後也窮河源惡睹本紀所謂崑崙者乎鄧展曰漢以窮河源於何見崑崙乎尚書曰導河積石是為河源出於積石積石在金城河關不言出於崑崙也故言九州山川尚書近之矣至禹本紀山海經所有怪物余不敢言之也史記集解卷一百二十三
