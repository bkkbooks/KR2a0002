body:
  text: 史記集解卷一百四宋裴駰撰史記一百四田叔列傳第四十四田叔者趙陘城人也其先齊田氏苗裔也叔喜劎學黃老術於樂巨公所叔為人刻廉自喜喜游諸公趙人舉之趙相趙午午言之趙王張敖所趙王以為郎中數嵗切直廉平趙王賢之未及遷會陳狶反代徐廣曰七年韓王信反髙帝征之十年代相陳狶反漢七年髙祖往誅之過趙趙王張敖自持案進食禮恭甚髙祖箕踞罵之是時趙相趙午等數十人皆怒謂張王曰王事上禮備矣今遇王如是臣等請為亂趙王齧指出血曰先人失國微陛下臣等當蟲出公等奈何言若是毋復出口矣於是貫髙等曰王長者不倍德卒私相與謀弒上會事發覺徐廣曰九年十二月捕貫髙等也漢下詔捕趙王及羣臣反者於是趙午等皆自殺唯貫髙就繫是時漢下詔書趙有敢隨王者􅓧三族唯孟舒田叔等十餘人赭衣自髠鉗稱王家奴隨趙王敖至長安貫髙事明白趙王敖得出廢為宣平矦乃進言田叔等十餘人上盡召見與語漢廷臣毋能出其右者上說盡拜為郡守諸矦相叔為漢中守十餘年㑹髙后崩諸吕作亂大臣誅之立孝文帝孝文帝既立召田叔問之曰公知天下長者乎對曰臣何足以知之上曰公長者也宜知之叔頓首曰故雲中守孟舒長者也是時孟舒坐虜大入塞盜劫雲中尤甚免上曰先帝置孟舒雲中十餘年矣虜曾一入孟舒不能堅守母故士卒戰死者數百人長者固殺人乎公何以言孟舒為長者也叔叩頭對曰是乃孟舒所以為長者也夫貫髙等謀反上下明詔趙有敢隨張王罪三族然孟舒自髠鉗隨張王敖之所在欲以身死之豈自知為雲中守哉漢與楚相距士卒罷敝胸奴冒頓新服北夷來為邉害孟舒知士卒罷敝不忍出言士爭臨城死敵如子為父弟為兄以故死者數百人孟舒豈故驅戰之哉是乃孟舒所以為長者也於是上曰賢哉孟舒復召孟舒以為雲中守後數嵗叔坐法失官梁孝王使人殺故吳相袁盎景帝召田叔案梁具得其事還報景帝曰梁有之乎叔對曰死罪有之上曰其事安在田叔曰上毋以梁事為也上曰何也曰今梁王不伏誅是漢法不行也如其伏法而太后食不甘味卧不安席此憂在陛下也景帝大賢之以為魯相魯相初到民自言相訟王取其錢物百餘人田叔取其渠率二十人各笞五十餘各搏二十怒之曰王非若主邪何自敢言若主魯王聞之大慙發中府錢使相償之相曰王自奪之使相償之是王為惡而相為善也相毋與償之於是王乃盡償之魯王好獵相常從入苑中王輒休相就館舍相出常暴坐待王苑外王數使人請相休終不休曰我王暴露苑中我獨何為就舍魯王以故不大出游數年叔以官卒魯以百金祠少子仁不受也曰不以百金傷先人名仁以壯健為衛將軍舍人張晏曰衛青也數從擊胸奴衛將軍進言仁仁為郎中數嵗為二千石丞相長史失官其後使刺舉三河上東巡仁奏事有辭上說拜為京輔都尉月餘上遷拜為司直數嵗坐太子事時左丞相自將兵徐廣曰劉屈氂時為丞相也令司直田仁主閉守城門漢書百官表曰武帝元狩五年初置司直秩比二千石掌佐丞相舉不法坐縱太子下吏誅死仁發兵長陵令車千秋上變仁仁族死陘城今在中山國徐廣曰陘城縣名也太史公曰孔子稱曰居是國必聞其政田叔之謂乎義不忘賢明主之美以救過仁與余善余故并論之褚先生曰臣為郎時聞之曰田仁故與任安相善任安滎陽人也少孤貧困為人將車之長安留求事為小吏未有因緣也因占著名數家於武功武功扶風西界小邑也谷口蜀剗道近山安以為武功小邑無豪易髙也安留代人為求盜亭父郭璞曰亭卒也後為亭長邑中人民俱出獵任安常為人分麋鹿雉部署老小當壯劇易處衆人皆喜曰無傷也任少卿分别平有智略明日復合㑹㑹者數百人任少卿曰某子甲何為不來乎諸人皆怪其見之疾也其後除為三老舉為親民出為三百石長治民坐上行出游共帳不辦斥免乃為衛將軍舍人與田仁㑹俱為舍人居門下同心相愛此二人家貧無錢用以事將軍家監家監使養惡齧馬兩人同牀臥仁竊言曰不知人哉家監也任安曰將軍尚不知人何乃家監也衛將軍從此兩人過平陽主主家令兩人與騎奴同席而食此二子拔刀列斷席别坐主家皆怪而惡之莫敢呵其後有詔募擇衛將軍舍人以為郎將軍取舍人中富給者令具鞍馬絳衣玉具劎欲入奏之㑹賢大夫少府趙禹來過衛將軍將軍呼所舉舍人以示趙禹趙禹以次問之十餘人無一人習事有智略者趙禹曰吾聞之將門之下必有將類傳曰不知其君視其所使不知其子視其所友今有詔舉將軍舍人者欲以觀將軍而能得賢者文武之士也今徒取富人子上之又無智略如木偶人衣之綺繡耳將奈之何於是趙禹悉召衛將軍舍人百餘人以次問之得田仁任安曰獨此兩人可耳餘無可用者衛將軍見此兩人貧意不平趙禹去謂兩人曰各自具鞍馬新絳衣兩人對曰家貧無用具也將軍怒曰今兩君家自為貧何為出此言鞅鞅如有移德於我者何也徐廣曰移猶施將軍不得巳上籍以聞有詔召見衛將軍舍人此二人前見詔問能略相推第也田仁對曰提桴鼓立軍門使士大夫樂死戰鬭仁不及任安任安對曰夫決嫌疑定是非辨治官使百姓無怨心安不及仁也武帝大笑曰善使任安護北軍使田仁護邉田榖於河上此兩人立名天下其後用任安為益州刺史以田仁為丞相長史田仁上書言天下郡太守多為姦利三河尤甚臣請先刺舉三河三河太守皆內倚中貴人與三公有親屬無所畏憚宜先正三河以警天下姦吏是時河南河內太守皆御史大夫杜父兄子弟也杜杜周也河東太守石丞相子孫也是時石氏九人為二千石方盛貴田仁數上書言之杜大夫及石氏使人謝謂田少卿曰吾非敢有語言也願少卿無相誣汙也仁已刺三河三河太守皆下吏誅死仁還奏事武帝說以仁為能不畏彊禦拜仁為丞相司直威振天下其後逢太子有兵事丞相自將兵使司直主城門司直以為太子骨肉之親父子之間不甚欲近去之諸陵過是時武帝在甘泉使御史大夫暴君徐廣曰暴勝之為御史大夫下責丞相何為縱太子丞相對言使司直部守城門而開太子上書以聞請捕繫司直司直下吏誅死是時任安為北軍使者護軍太子立車北軍南門外召任安與節令發兵安拜受節入閉門不出武帝聞之以為任安為佯邪徐廣曰佯或作詳也不傅事何也任安笞辱北軍錢官小吏小吏上書言之以為受太子節言幸與我其鮮好者書上聞武帝曰是老吏也見兵事起欲坐觀成敗見勝者欲合從之有兩心安有當死之罪甚衆吾常活之今懷詐有不忠之心下安吏誅宛夫月滿則虧物盛則衰天地之常也知進而不知退久乘富貴禍積為崇故范蠡之去越辭不受官位名傳後世萬嵗不忘豈可及哉後進者慎戒之史記集解卷一百四
