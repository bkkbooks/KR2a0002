body:
  text: 史記集解卷八宋裴駰撰史記八髙祖本紀第八髙祖漢書音義曰諱邦張晏曰禮諡法無髙以為功最髙而為漢帝之太祖故特起名焉沛豐邑中陽里人姓劉氏李斐曰沛小沛也劉氏隨魏徙大梁移在豐居中陽里孟康曰後沛為郡豐為縣字季父曰太公母曰劉媪文頴曰幽州及漢中皆謂老嫗為媼孟康曰長老尊稱也左師謂太后曰媼愛燕后賢長安君禮樂志地神曰媪媪母别名也音烏老反其先劉媪嘗息大澤之陂夢與神遇是時雷電晦㝠太公徃視則見蛟龍於其上己而有身遂産髙祖髙祖為人隆準而龍顔服䖍曰準音拙應劭曰隆髙也準頰權準也顔頟顙也齊人謂之顙汝南淮泗之間曰顔文穎曰準鼻也美須髯左股有七十二黑子仁而愛人喜施意豁如也服䖍曰豁達也常有大度不事家人生産作業及壯試為吏應劭曰試補吏為泗水亭長廷中吏無所不狎侮好酒及色常從王媪武負貰酒韋昭曰貰賖也醉臥武負王媪見其上常有龍怪之髙祖每酤留飲酒讎數倍如淳曰讎亦售及見怪歲竟此兩家常折劵棄責髙祖常繇咸陽應劭曰縣役也縱觀觀秦皇帝喟然太息曰嗟乎大丈夫當如此也單父人吕公漢書音義曰單音善父音斧善沛令避仇從之客因家沛焉沛中豪桀吏聞令有重客皆徃賀蕭何為主吏孟康曰主吏功曹也主進文穎曰主賦斂禮進為之帥令諸大夫曰進不滿千錢坐之堂下髙祖為亭長素易諸吏乃紿為謁曰應劭曰紿欺也音殆賀錢萬實不持一錢謁入吕公大驚起迎之門吕公者好相人見髙祖狀貌因重敬之引入坐蕭何曰劉季固多大言少成事髙祖因狎侮諸客遂坐上坐無所詘酒闌文穎曰闌言希也謂飲酒者半罷半在謂之闌吕公因目固留髙祖髙祖竟酒後吕公曰臣少好相人張晏曰古人相與語多自稱臣自卑下之道若今人相與語皆自稱僕相人多矣無如季相願季自愛臣有息女願為季箕帚妾酒罷吕媪怒吕公曰公始常欲竒此女與貴人沛令善公求之不與何自妄許與劉季吕公曰此非兒女子所知也卒與劉季吕公女乃吕后也生孝惠魯元公主服䖍曰元長也食邑於魯韋昭曰元謚也髙祖為亭長時常告歸之田服䖍曰告音如皥呼之皥李斐曰休謁之名也吉曰告凶曰寧孟康曰古者名吏休假曰告告又音嚳漢律吏二千石有予告賜告者予告在官有功最法所當得者也賜告者病滿三月當免天子優賜復其告使得帶卬紱將官屬歸家治病也吕后與兩子居田中耨有一老父過請飲吕后因餔之老父相吕后曰夫人天下貴人令相兩子見孝惠曰夫人所以貴者乃此男也相魯元亦皆貴老父已去髙祖適從旁舍來吕后具言客有過相我子母皆大貴髙祖問曰未逺乃追及問老父老父曰鄉者夫人嬰兒皆似君君相貴不可言髙祖乃謝曰誠如父言不敢忘徳及髙祖貴遂不知老父處髙祖為亭長乃以竹皮為冠令求盜之薛治之應劭曰以竹始生皮作冠今鵲尾冠是也求盜者舊時亭有兩卒其一為亭父掌開閉掃除一為求盜掌逐捕盜賊薛魯國縣也有作冠師故徃治之時時冠之及貴常冠所謂劉氏冠乃是也髙祖以亭長為縣送徒酈山徒多道亡自度比至皆亡之到豐西澤中止飲夜乃解縱所送徒曰公等皆去吾亦從此逝矣徒中壯士願從者十餘人髙祖被酒夜徑澤中令一人行前行前者還報曰前有大蛇當徑願還髙祖醉曰壯士行何畏乃前拔劒擊斬蛇蛇遂分為兩徑開行數里醉因臥後人來至蛇所有一老嫗夜哭人問何哭嫗曰人殺吾子故哭之人曰嫗子何為見殺嫗曰吾子白帝子也化為蛇當道今為赤帝子斬之應劭曰秦襄公自以居西戎主少昊之神作西時祠白帝至獻公時櫟陽雨金以為瑞又作畦畤祠白帝少昊金徳也赤帝堯後謂漢也殺之者明漢當滅秦也秦自謂水漢初自謂土皆失之至光武乃改定故哭人乃以嫗為不誠欲笞之徐廣曰一作苦嫗因忽不見後人至髙祖覺後人告髙祖髙祖乃心獨喜自負應劭曰負恃也諸從者日益畏之秦始皇帝常曰東南有天子氣於是因東游以厭之髙祖即自疑亡匿隱於芒碭山澤巖石之間徐廣曰芒今臨淮縣也碭縣在梁駰案應劭曰二縣之界有山澤之固故隱於其間吕后與人俱求常得之髙祖怪問之吕后曰季所居上常有雲氣故從徃常得季髙祖心喜沛中子弟或聞之多欲附者矣秦二世元年徐廣曰髙祖時年四十八秋陳勝等起蘄至陳而王號為張楚諸郡縣皆多殺其長吏以應陳涉沛令恐欲以沛應涉掾主吏蕭何曹參乃曰君為秦吏今欲背之率沛子弟恐不聽願君召諸亡在外者可得數百人因劫衆衆不敢不聽乃令樊噲召劉季劉季之衆已數十百人矣於是樊噲從劉季來沛令後悔恐其有變乃閉城城守欲誅蕭曹蕭曹恐踰城保劉季韋昭曰以為保障劉季乃書帛射城上謂沛父老曰天下苦秦乆矣今父老雖為沛令守諸侯竝起今屠沛沛今共誅令擇子弟可立者立之以應諸侯則家室完不然父子俱屠無為也父老乃率子弟共殺沛令開城門迎劉季欲以為沛令劉季曰天下方擾諸侯竝起今置將不善壹敗塗地吾非敢自愛恐能薄不能完父兄子弟此大事願更相推擇可者蕭曹等皆文吏自愛恐事不就後秦種族其家盡讓劉季諸父老皆曰平生所聞劉季諸珍怪當貴且卜筮之莫如劉季最吉於是劉季數讓衆莫敢為乃立季為沛公徐廣曰九月也駰案漢書音義曰舊楚僭稱王其縣宰為公陳涉為楚王沛公起應涉故從楚制稱曰公祠黃帝祭蚩尤於沛庭應劭曰左傳曰黄帝戰於阪泉以定天下蚩尤好五兵故祠祭之求福祥也瓚曰管仲云葛盧山交而出水金從之出蚩尤受之以作劍㦸而釁鼓應劭曰釁祭也殺牲以血塗鼓曰釁瓚曰案禮記及大戴禮有釁廟之禮皆無祭亊旗幟皆赤由所殺蛇白帝子殺者赤帝子故上赤於是少年豪吏如蕭曹樊噲等皆為收沛子弟二三千人攻胡陵方與鄭徳曰音房豫屬山陽郡還守豐秦二世二年陳涉之將周章軍西至戲而還燕趙齊魏皆自立為王項氏起吳秦泗川監平文穎曰泗川今沛郡也髙祖更名沛秦時御史監郡若今刺史平名也將兵圍豐二日出與戰破之命雍齒守豐引兵之薛泗川守壯如淳曰壯名也敗於薛走至戚如淳曰戚音將毒反沛公左司馬得泗川守壯殺之沛公還軍亢父鄭徳曰亢音人相亢荅父音甫屬任城郡至方與周市來攻方與未戰陳王使魏人周市略地周市使人謂雍齒曰豐故梁徙也文穎曰梁恵王孫假為秦所滅轉東徙於豐故曰豐梁徙今魏地已定者數十城齒今下魏魏以齒為侯守豐不下且屠豐雍齒雅不欲屬沛公服䖍曰雅故也蘇林曰雅素也及魏招之即反為魏守豐沛公引兵攻豐不能取沛公病還之沛沛公怨雍齒與豐子弟叛之聞東陽寗君秦嘉文頴曰秦嘉東陽郡人也為寗縣君瓚曰陳勝傳曰廣陵人秦嘉然則東陽人也秦嘉初起兵於郯號曰大司馬又不為寗縣君東陽寗君自一人秦嘉又自一人立景駒為假王在留乃徃從之欲請兵以攻豐是時秦將章邯從陳别將司馬尼如淳曰從陳涉將也涉在陳其將相别在他許皆稱陳尼章邯司馬將兵北定楚地屠相至碭東陽寗君沛公引兵西與戰蕭西不利還收兵聚留引兵攻碭三日乃取碭因收碭兵得五六千人攻下邑拔之還軍豐聞項梁在薛從騎百餘徃見之徐廣曰三月項梁益沛公卒五千人五大夫將十人蘇林曰五大夫第九爵也以五大夫為將凡十人也沛公還引兵攻豐徐廣曰表云拔之雍齒奔魏從項梁月餘項羽已拔襄城還項梁盡召别將居薛聞陳王定死因立楚後懷王孫心為楚王治盱台項梁號武信君居數月北攻亢父救東阿破秦軍齊軍歸楚獨追北服䖍曰師敗曰北使沛公項羽别攻城陽屠之軍濮陽之東與秦軍戰破之秦軍復振李竒曰振整也如淳曰振起也收敗卒自振迅而復起也守濮陽環水文穎曰決水以自環守為固也張晏曰依河水以自環繞作壘楚軍去而攻定陶定陶未下沛公與項羽西略地至雍丘之下與秦軍戰大破之斬李由還攻外黄外黄未下項梁再破秦軍有驕色宋義諫不聽秦益章邯兵夜銜枚擊項梁周禮有銜枚氏鄭𤣥曰銜枚止言語囂讙也銜狀如著横銜之繣結於項者繣音獲大破之定陶項梁死沛公與項羽方攻陳留聞項梁死引兵與吕將軍俱東吕臣軍彭城東項羽軍彭城西沛公軍碭章邯已破項梁軍則以為楚地兵不足憂乃渡河北擊趙大破之當是之時趙歇為王秦將王離圍之鉅鹿城此所謂河北之軍也秦二世三年楚懷王見項梁軍破恐徙盱台都彭城并吕臣項羽軍自將之以沛公為碭郡長封為武安侯將碭郡兵封項羽為長安侯號為魯公吕臣為司徒其父吕青為令尹趙數請救懷王乃以宋義為上將軍項羽為次將范增為末將北救趙令沛公西略地入闗與諸將約先入定闗中者王之當是時秦兵彊常乘勝逐北諸將莫利先入闗獨項羽怨秦破項梁軍奮願與沛公西入關懷王諸老將皆曰項羽為人僄悍猾賊項羽嘗攻襄城襄城無遺類徐廣曰遺一作噍噍食也音在妙反駰案如淳曰類無復有活而噍食者也青州俗言無孑遺為無噍類皆阬之諸所過無不殘滅且楚數進取如淳曰楚謂陳涉也數進取多所攻取前陳王漢書音義曰陳涉也項梁皆敗不如更遣長者扶義而西告諭秦父兄秦父兄苦其主乆矣今誠得長者徃毋侵暴宜可下今項羽僄悍今徐廣曰無此字不可遣獨沛公素寛大長者可遣卒不許項羽而遣沛公西略地收陳王項梁散卒乃道碭漢書音義曰道由碭也至成陽與杠里漢書音義曰二縣名秦軍夾壁破魏二軍楚軍出兵擊王離大破之徐廣曰表云三年十月攻破東郡尉及王離軍於成武南沛公引兵西遇彭越昌邑因與俱攻秦軍戰不利還至栗遇剛武侯應劭曰楚懷王將也漢書音義曰功臣表云棘蒲剛侯陳武武一姓柴剛武侯宜為剛侯武魏將也瓚曰功臣表柴武以將軍起薛别救東阿至霸上入漢中非懷王將也又非魏將也例未稱謚奪其軍可四千餘人并之與魏將皇欣魏申徒武蒲之軍并攻昌邑昌邑未拔西過髙陽文穎曰聚邑名也屬陳留圉縣瓚曰陳留傳曰在雍丘西南酈食其鄭徳曰音厯異基謂監門曰諸將過此者多吾視沛公大人長者乃求見説沛公沛公方踞牀使兩女子洗足酈生不拜長揖曰足下必欲誅無道秦不宜踞見長者於是沛公起攝衣謝之延上坐食其説沛公襲陳留漢書音義曰春秋傳曰輕行無鐘鼓曰襲得秦積粟乃以酈食其為廣野君酈商為將將陳留兵與偕攻開封開封未拔西與秦將楊熊戰白馬又戰曲遇東大破之楊熊走之滎陽二世使使者斬以徇徐廣曰四月南攻潁陽屠之因張良遂略韓地轘轅文穎曰河南新鄭南至穎川南北皆韓地也以良累世相韓故因之瓚曰轘轅險道名在緱氏東南當是時趙别將司馬卬方欲渡河入闗沛公乃北攻平隂地理志河南有平隂縣今河陰是也絶河津南戰雒陽東軍不利還至陽城收軍中馬騎與南陽守齮戰犨東地理志南陽有犨縣破之略南陽郡南陽守齮走保城守宛沛公引兵過而西張良諫曰沛公雖欲急入闗秦兵尚衆距險今不下宛宛從後擊彊秦在前此危道也於是沛公乃夜引兵從他道還更旗幟黎明圍宛城三匝南陽守欲自剄其舍人陳恢曰死未晩也乃踰城見沛公曰臣聞足下約先入咸陽者王之今足下留守宛宛大郡之都也連城數十人民衆積蓄多吏人自以為降必死故皆堅守乘城今足下盡日止攻士死傷者必多引兵去宛宛必隨足下後足下前則失咸陽之約後又有彊宛之患為足下計莫若約降封其守因使止守引其甲卒與之西諸城未下者聞聲争開門而待足下通行無所累沛公曰善徐廣曰七月也乃以宛守為殷侯封陳恢千户引兵西無不下者至丹水髙武侯鰓蘇林曰鰓音魚鰓之鰓晉灼曰功臣表戚鰓也襄侯王陵降西陵韋昭曰漢封王陵為安國侯初起兵時在南陽南陽有穰縣疑襄當為穰而無禾字省耳今邵公或作召字此類多矣瓚曰時韓成封穰侯江夏有襄是所封還攻胡陽一云陵遇畨君别將梅鋗與皆降析酈如淳曰持益反遣魏人寗昌使秦使者未來是時章邯已以軍降項羽於趙矣初項羽與宋義北救趙及項羽殺宋義代為上將軍諸將黥布皆屬破秦將王離軍降章邯諸侯皆附又趙髙已殺二世使人來欲約分王關中沛公以為詐乃用張良計使酈生陸賈徃説秦將啗以利因襲攻武闗破之又與秦軍戰於藍田南益張疑兵旗幟諸所過毋得掠鹵應劭曰鹵與虜同秦人憙秦軍解因大破之又戰其北大破之乘勝遂破之漢元年十月如淳曰張蒼傳云以髙祖十月至霸上故因秦以十月為歳首沛公兵遂先諸侯至霸上秦王子嬰素車白馬係頸以組封皇帝璽符節降軹道旁諸將或言誅秦王沛公曰始懷王遣我固以能寛容且人已服降又殺之不祥乃以秦王屬吏遂西入咸陽欲止宫休舍樊噲張良諫乃封秦重寶財物府庫還軍霸上召諸縣父老豪桀曰父老苦秦苛法乆矣誹謗者族偶語者棄市應劭曰秦禁民聚語偶對也瓚曰始皇本紀曰偶語經書者棄市吾與諸侯約先入關者王之吾當王闗中與父老約法三章耳殺人者死傷人及盜抵罪應劭曰抵至也又當也除秦酷政但至於罪也李斐曰傷人有曲直盗賊有多少罪名不可預定故凡言抵罪未知抵何罪也張晏曰秦法一人犯罪舉家及鄰伍坐之今但當其身坐合於康誥父子兄弟罪不相及也餘悉除去秦法諸吏人皆案堵如故應劭曰案次第堵墻堵也凡吾所以來為父老除害非有所侵暴無恐且吾所以還軍霸上待諸侯至而定約束耳乃使人與秦吏行縣鄉邑告諭之秦人大喜爭持牛羊酒食獻饗軍士沛公又讓不受曰倉粟多非乏不欲費人人又益喜惟恐沛公不為秦王或説沛公曰秦富十倍天下地形強今聞章邯降項羽項羽乃號為雍王王關中今則來沛公恐不得有此可急使兵守函谷關無内諸侯軍稍徵闗中兵以自益距之沛公然其計從之十一月中項羽果率諸侯兵西欲入關闗門閉聞沛公已定關中大怒使黥布等攻破函谷關十二月中遂至戲沛公左司馬曹無傷聞項王怒欲攻沛公使人言項羽曰沛公欲王關中令子嬰為相珍寶盡有之欲以求封亞父勸項羽擊沛公方饗士旦日合戰是時項羽兵四十萬號百萬沛公兵十萬號二十萬力不敵會項伯欲活張良夜見良因以文諭項羽項羽乃止沛公從百餘騎驅之鴻門見謝項羽項羽曰此沛公左司馬曹無傷言之不然籍何以至此沛公以樊噲張良故得解歸歸立誅曹無傷項羽遂西屠燒咸陽秦宫室所過無不殘破秦人大失望然恐不敢不服耳項羽使人還報懷王懷王曰如約項羽怨懷王不肯令與沛公俱西入關而北救趙後天下約乃曰懷王者吾家項梁所立耳非有功伐何以得主約本定天下諸將及籍也乃佯尊懷王為義帝實不用其命正月項羽自立為西楚霸王王梁楚地九郡都彭城負約更立沛公為漢王王巴蜀漢中徐廣曰三十二縣都南鄭三分關中立秦三將章邯為雍王都廢丘司馬欣為塞王都櫟陽董翳為翟王都髙奴楚將瑕丘申陽為河南王都洛陽趙將司馬卬為殷王都朝歌趙王歇徙王代趙相張耳為常山王都襄國當陽君黥布為九江王都六懷王柱國共敖為臨江王都江陵番君吳芮為衡山王都邾燕將臧荼為燕王都薊故燕王韓廣徙王遼東廣不聽臧荼攻殺之無終封成安君陳餘河間三縣居南皮封梅鋗十萬户四月兵罷戲下諸侯各就國漢王之國項王使卒三萬人從楚與諸侯之慕從者數萬人從杜南入蝕中李竒曰蝕音力在杜南如淳曰蝕入漢中道川谷名去輒燒絶棧道以備諸侯盜兵襲之亦示項羽無東意至南鄭諸將及士卒多道亡歸士卒皆歌思東歸韓信説漢王曰徐廣曰韓王信非淮陰侯信也項羽王諸將之有功者而王獨居南鄭是遷也韋昭曰若冇罪見遷徙軍吏士卒皆山東之人也日夜跂而望歸及其鋒而用之可以有大功天下已定人皆自寧不可復用不如決策東鄉爭權天下項羽出關使人徙義帝曰古之帝者地方千里必居上㳺乃使使徙義帝長沙郴縣趣義帝行羣臣稍倍叛之乃陰令衡山王臨江王擊之殺義帝江南項羽怨田榮立齊將田都為齊王田榮怒因自立為齊王殺田都而反楚予彭越將軍印令反梁地楚令蕭公角擊彭越彭越大破之陳餘怨項羽之弗王已也令夏説説田榮請兵擊張耳齊予陳餘兵擊破常山王張耳張耳亡歸漢迎趙王歇於代復立為趙王趙王因立陳餘為代王項羽大怒北擊齊八月漢王用韓信之計從故道地理志武都有故道縣還襲雍王章邯邯迎擊漢陳倉雍兵敗還走止戰好畤孟康曰畤音止神靈之所在也縣名屬右扶風又復敗走廢丘漢王遂定雍地東至咸陽引兵圍雍王廢丘而遣諸將略定隴西北地上郡令將軍薛歐音惡后反王吸出武關因王陵兵南陽如淳曰王陵亦聚黨數千人居南陽以迎太公吕后於沛楚聞之發兵距之陽夏不得前令故吳令鄭昌為韓王距漢兵二年漢王東略地塞王欣翟王翳河南王申陽皆降韓王昌不聽使韓信擊破之於是置隴西北地上郡渭南徐廣曰後曰京兆河上徐廣曰馮翊中地郡徐廣曰扶風關外置河南郡徐廣曰十月漢王至陜更立韓太尉信為韓王諸將以萬人若以一郡降者封萬户繕治河上塞晉灼曰鼂錯傳秦時北攻胡築河上塞諸故秦苑囿園池皆令人得田之正月虜雍王弟章平大赦罪人漢王之出闗至陜撫關外父老還張耳來見漢王厚遇之二月令除秦社稷更立漢社稷三月從臨晉渡魏王豹將兵從下河内虜殷王置河内郡南渡平陰津至雒陽新城三老董公遮説漢王以義帝死故漢王聞之祖而大哭如淳曰祖亦如禮袒踊遂為義帝發喪臨三日發使者告諸侯曰天下共立義帝北面亊之今項羽放殺義帝於江南大逆無道寡人親為發喪諸侯皆縞素悉發闗内兵收三河士韋昭曰河南河東河内南浮江漢以下願從諸侯王擊楚之殺義帝者是時項王北擊齊田榮與戰城陽田榮敗走平原平原民殺之齊皆降楚楚因焚燒其城郭係虜其子女齊人叛之田榮弟橫立榮子廣為齊王齊王反楚城陽項羽雖聞漢東既已連齊兵欲遂破之而擊漢漢王以故得劫五諸侯遂入彭城項羽聞之乃引兵去齊從魯出故胡陵至蕭與漢大戰彭城靈壁東雎水上大破漢軍多殺士卒雎水為之不流乃取漢王父母妻子於沛置之軍中以為質當是時諸侯見楚彊漢敗還皆去漢復為楚塞王欣亡入楚吕后兄周吕侯為漢將兵居下邑徐廣曰在梁漢王從之稍收士卒軍碭漢王乃西過梁地至虞徐廣曰在梁使謁者隨何之九江王布所曰公能令布舉兵叛楚項羽必留擊之得留數月吾取天下必矣隨何徃説九江王布布果背楚楚使龍且徃擊之漢王之敗彭城而西行使人求家室家室亦亡不相得敗後乃獨得孝惠六月立為太子大赦罪人令太子守櫟陽諸侯子在關中者皆集櫟陽為衛引水灌廢丘廢丘降章邯自殺更名廢丘為槐里於是令祠官祀天地四方上帝山川以時祀之興闗内卒乘塞李竒曰乘守也是時九江王布與龍且戰不勝與隨何間行歸漢漢王稍收士卒與諸將及關中卒益出是以兵大振滎陽破楚京索間三年魏王豹謁歸視親疾至即絶河津反為楚漢王使酈生説豹豹不聽漢王遣將軍韓信擊大破之虜豹遂定魏地置三郡曰河東太原上黨漢王乃令張耳與韓信遂東下井陘擊趙斬陳餘趙王歇其明年立張耳為趙王漢王軍滎陽南築甬道屬之河以取敖倉與項羽相距歳餘項羽數侵奪漢甬道漢軍之食遂圍漢王漢王請和割滎陽以西者為漢項王不聽漢王患之乃用陳平之計予陳平金四萬斤以間疏楚君臣於是項羽乃疑亞父亞父是時勸項羽遂下滎陽及其見疑乃怒辭老願賜骸骨歸卒伍未至彭城而死漢軍絶食乃夜出女子東門二千餘人被甲楚因四面擊之將軍紀信乃乘玉駕詐為漢王誑楚楚皆呼萬歳之城東觀以故漢王得與數十騎出西門遁令御史大夫周苛魏豹樅公守滎陽諸將卒不能從者盡在城中周苛樅公相謂曰反國之王難與守城因殺魏豹徐廣曰案月表三年七月王出滎陽八月殺魏豹而又云四年三月周苛死四月魏豹死二者不同項羽殺紀信周苛樅公皆是三年中漢王之出滎陽入闗收兵欲復東袁生説漢王曰漢與楚相距滎陽數歳常困願君王出武關項羽必引兵南走王深壁令滎陽成臯間且得休使韓信等輯河北趙地連燕齊君王乃復走滎陽未晚也如此則楚所備者多力分漢得休復與之戰破楚必矣漢王從其計出軍宛葉間與黥布行收兵項羽聞漢王在宛果引兵南漢堅壁不與戰是時彭越渡雎水與項聲薛公戰下邳彭越大破楚軍項羽乃引兵東擊彭越漢王亦引兵北軍成皋項羽已破走彭越間漢王復軍成皋乃復引兵西拔滎陽誅周苛樅公而虜韓王信遂圍成皋漢王跳徐廣曰音逃獨與滕公共車出成皋玉門徐廣曰項羽紀云北門名玉門北渡河馳宿修武自稱使者晨馳入張耳韓信壁而奪之軍乃使張耳北益收兵趙地使韓信東擊齊漢王得韓信軍則復振兵兵臨河南饗軍小修武南晉灼曰在大修武城東欲復戰郎中鄭忠乃説止漢王使髙壘深塹勿與戰漢王聽其計使盧綰蘇林曰綰音以繩綰結物之綰劉賈將卒二萬人騎數百渡白馬津入楚地與彭越復擊破楚軍燕郭西遂復下梁地十餘城淮陰已受命東未渡平原漢王使酈生徃説齊王田廣廣叛楚與漢和共擊項羽韓信用蒯通計遂襲破齊齊王烹酈生東走髙宻項羽聞韓信已舉河北兵破齊趙且欲擊楚則使龍且周蘭徐廣曰一作簡徃擊之韓信與戰騎將灌嬰擊大破楚軍殺龍且齊王廣犇彭越當此時彭越將兵居梁地徃來苦楚兵絶其糧食四年項羽乃謂海春侯大司馬曹咎曰謹守成皋若漢挑戰慎勿與戰無令得東而已我十五日必定梁地復從將軍乃行擊陳留外黃雎陽下之漢果數挑楚軍楚軍不出使人辱之五六日大司馬怒度兵汜水士卒半渡漢擊之大破楚軍盡得楚國金玉貨賂大司馬咎長史欣皆自剄汜水上項羽至雎陽聞海春侯破乃引兵還漢軍方圍鍾離昧於滎陽東項羽至盡走險阻韓信已破齊使人言曰齊邊楚文穎曰邊近也權輕不為假王恐不能安齊漢王欲攻之留侯曰不如因而立之使自為守乃遣張良操印綬立韓信為齊王徐廣曰三月項羽聞龍且軍破則恐使盱台人武涉徃説韓信韓信不聽漢楚乆相持未決丁壯苦軍旅老弱罷轉饟漢王項羽相與臨廣武之間而語項羽欲與漢王獨身挑戰漢王數項羽曰始與項羽俱受命懷王曰先入定關中者王之項羽負約王我於蜀漢罪一項羽矯殺卿子冠軍而自尊罪二徐廣曰卿一作慶項羽已救趙當還報而擅劫諸侯兵入關罪三懷王約入秦無暴掠項羽燒秦宫室掘始皇帝冢私收其財物罪四又彊殺秦降王子嬰罪五詐阬秦子弟新安二十萬王其將罪六項羽皆王諸將善地而徙逐故主令臣下爭叛逆罪七項羽出逐義帝彭城自都之奪韓王地并王梁楚多自予罪八項羽使人陰弑義帝江南罪九夫為人臣而弑其主殺已降為政不平主約不信天下所不容大逆無道罪十也吾以義兵從諸侯誅殘賊使刑餘罪人擊殺項羽何苦乃與公挑戰項羽大怒伏弩射中漢王漢王傷胸乃捫足曰虜中吾指漢王病創臥張良彊請漢王起行勞軍以安士卒毋令楚乘勝於漢漢王出行軍病甚因馳入成皋病愈西入闗至櫟陽存問父老置酒梟故塞王欣頭櫟陽市留四日復如軍軍廣武關中兵益出當此時彭越將兵居梁地徃來苦楚兵絶其糧食田橫徃從之項羽數擊彭越等齊信王又進擊楚項羽恐乃與漢王約中分天下割鴻溝而西者為漢鴻溝而東者為楚項王歸漢王父母妻子軍中皆呼萬歳乃歸而别去項羽解而東歸漢王欲引而西歸用留侯陳平計乃進兵追項羽至陽夏南止軍與齊王信建成侯彭越期會而擊楚軍至固陵不會楚擊漢軍大破之漢王復入壁深塹而守之用張良計於是韓信彭越皆徃及劉賈入楚地圍夀春漢王敗固陵晉灼曰即固始乃使使者召大司馬周殷舉九江兵而迎之徐廣曰周殷以兵隨劉賈武王行屠城父隨何劉賈齊梁諸侯皆大會垓下徐廣曰七月立武王布為淮南王五年髙祖與諸侯兵共擊楚軍與項羽決勝垓下淮陰侯將三十萬自當之孔將軍居左費將軍居右皇帝在後絳侯柴將軍在皇帝後項羽之卒可十萬淮陰先合不利却孔將軍費將軍縱楚兵不利淮陰侯復乘之大敗垓下項羽卒聞漢軍之楚歌以為漢盡得楚地項羽乃敗而走是以兵大敗使騎將灌嬰追殺項羽東城徐廣曰十二月斬首八萬遂略定楚地魯為楚堅守不下漢王引諸侯兵北示魯父老項羽頭魯乃降遂以魯公號葬項羽穀城還至定陶馳入齊王壁奪其軍正月諸侯及將相相與共請尊漢王為皇帝漢王曰吾聞帝賢者也空言虚語非所守也吾不敢當帝位羣臣皆曰大王起微細誅暴逆平定四海有功者輒裂地而封為王侯大王不尊號皆疑不信臣等以死守之漢王三讓不得已曰諸君必以為便便國家甲午徐廣曰二月甲午乃即皇帝位汜水之陽蔡邕曰上古天子稱皇其次稱帝其次稱王秦承三王之末為漢驅除自以德兼三皇五帝故并以為號漢髙祖受命功徳宜之因而不改皇帝曰義帝無後齊王韓信習楚風俗徙為楚王都下邳立建成侯彭越為梁王都定陶故韓王信為韓王都陽翟徙衡山王吳芮為長沙王都臨湘番君之將梅鋗有功從入武闗故徳番君淮南王布燕王臧荼趙王敖皆如故天下大定髙祖都雒陽諸侯皆臣屬故臨江王驩徐廣曰一作尉為項羽叛漢令盧綰劉賈圍之不下數月而降殺之雒陽五月兵皆罷歸家諸侯子在闗中者復之十二歳其歸者復之六歳食之一歲髙祖置酒雒陽南宫髙祖曰列侯諸將無敢隱朕皆言其情吾所以有天下者何項氏之所以失天下者何髙起王陵對曰孟康曰姓髙名起瓚曰漢帝年紀髙帝時有信平侯臣陵都武侯臣起魏相丙吉奏亊髙帝時奏事有將軍臣陵臣起陛下慢而侮人項王仁而愛人然陛下使人攻城略地所降下者因以予之與天下同利也項羽妬賢嫉能有功者害之賢者疑之戰勝而不予人功得地而不予人利此所以失天下也髙祖曰公知其一未知其二夫運籌策帷帳之中決勝於千里之外吾不如子房鎮國家撫百姓給餽饟不絶糧道吾不如蕭何連百萬之軍戰必勝攻必取吾不如韓信此三者皆人傑也吾能用之此吾所以取天下也項羽有一范增而不能用此其所以為我擒也髙祖欲長都雒陽齊人劉敬説及留侯勸上入都關中髙祖是日駕入都闗中六月大赦天下十月燕王臧荼反攻下代地髙祖自將擊之得燕王臧荼即立太尉盧綰為燕王使丞相噲將兵攻代其秋利幾反髙祖自將兵擊之利幾走利幾者項氏之將項氏敗利幾為陳公不隨項羽亡降髙祖髙祖侯之潁川髙祖至雒陽舉通侯籍召之如淳曰得在通侯之籍而利幾恐故反六年髙祖五日一朝太公如家人父子禮太公家令説太公曰天無二日土無二王今髙祖雖子人主也太公雖父人臣也奈何令人主拜人臣如此則威重不行後髙祖朝太公擁篲李竒曰為恭也如今卒持帚者也迎門却行髙祖大驚下扶太公太公曰帝人主也奈何以我亂天下法於是髙祖乃尊太公為太上皇蔡邕曰不言帝非天子也心善家令言賜金五百斤十二月人有上變事告楚王信謀反上問左右左右爭欲擊之用陳平計乃偽游雲夢韋昭曰在南郡華容縣會諸侯於陳楚王信迎即因執之是日大赦天下田肯賀因説髙祖曰陛下得韓信又治秦中如淳曰時山東人謂關中為秦中帶河山之險縣隔千里持㦸百萬秦得百二焉應劭曰山河之險與諸侯相縣隔地絶千里所以能禽諸侯者得天下之利百二也李斐曰河山之險内地勢髙順流而下易故天下於秦縣隔千里持㦸百萬秦得百二焉蘇林曰得百中之二焉秦地險固二萬人足當諸侯百萬人也地勢便利其以下兵於諸侯譬猶居髙屋之上建瓴水也如淳曰瓴盛水瓶也居髙屋之上而幡瓴水盖言其向下之勢易也建音蹇晉灼曰許慎曰瓴罋似瓶者夫齊東有琅邪即墨之饒南有太山之固西冇濁河之限晉灼曰齊西冇平原河水東北過髙唐髙唐即平原也孟津號黄河故曰濁河北有勃海之利地方二千里持㦸百萬縣隔千里之外齊得十二焉應劭曰齊得十之二故齊愍王稱東帝後復歸之卒為秦所滅者利鈍之勢異也李斐曰齊有山河之限地方二千里是為天下縣隔也設有持㦸百萬之衆齊得十中之二焉百萬十分之二亦二十萬也但文相避耳故言東西秦其勢亦敵也蘇林曰十二得十中之二二十萬人當百萬言齊雖固不如秦二萬乃當百萬故此東西秦也非親子弟莫可使王齊矣髙祖曰善賜黃金五百斤後十餘日封韓信為淮陰侯分其地為二國髙祖曰將軍劉賈數有功以為荆王王淮東弟交為楚王王淮西子肥為齊王王七十餘城民能齊言者皆屬齊漢書音義曰此言時民流移故使齊言者還齊也乃論功與諸列侯剖符行封徙韓王信太原七年匈奴攻韓王信馬邑信因與同謀反太原白土徐廣曰在上郡曼丘臣王黃立故趙將趙利為王以反髙祖自徃擊之㑹天寒士卒墮指者什二三遂至平城匈奴圍我平城七日而後罷去令樊噲止定代地立兄劉仲為代王二月髙祖自平城過趙雒陽至長安長樂宫成丞相已下徙治長安八年髙祖東擊韓王信餘反寇於東垣地理志云東垣髙帝更名曰真定蕭丞相營作未央宫立東闕北闕關中記曰東冇蒼龍闕北有𤣥武闕𤣥武所謂北闕前殿武庫太倉髙祖還見宫闕壯甚怒謂蕭何曰天下匈匈苦戰數歲成敗未可知是何治宫室過度也蕭何曰天下方未定故可因遂就宫室且夫天子以四海為家非壯麗無以重威且無令後世有以加也髙祖乃説髙祖之東垣過柏人趙相貫髙等謀弑髙祖髙祖心動因不留代王劉仲棄國亡自歸雒陽廢以為合陽侯九年趙相貫髙等事發覺夷三族廢趙王敖為宣平侯是歳徙貴族楚昭屈景懷齊田氏關中未央宫成髙祖大朝諸侯羣臣置酒未央前殿髙祖奉玉巵應劭曰鄉飲酒禮器也受四升起為太上皇夀曰始大人常以臣無賴晉灼曰許慎曰賴利也無利入於家也或曰江湖之間謂小兒多詐狡獪為無賴不能治産業不如仲力今某之業所就孰與仲多殿上羣臣皆呼萬歳大笑為樂十年十月淮南王黥布梁王彭越燕王盧綰荆王劉賈楚王劉交齊王劉肥長沙王吳芮皆來朝長樂宫春夏無事七月太上皇崩櫟陽宫楚王梁王皆來送葬漢書云葬萬年赦櫟陽囚更命酈邑曰新豐八月趙相國陳狶鄧展曰東海人名豬曰狶反代地上曰狶嘗為吾使甚有信代地吾所急也故封豨為列侯徐廣曰狶攻定臧荼有功封陽夏侯以相國守代今乃與王黃等劫掠代地代地吏民非有罪也其赦代吏民九月上自東徃擊之至邯鄲上喜曰豨不南據邯鄲而阻漳水吾知其無能為也聞豨將皆故賈人也上曰吾知所以與之乃多以金啗豨將豨將多降者十一年髙祖在邯鄲誅豨等未畢豨將侯敞將萬餘人游行王黃軍曲逆文穎曰今中山蒲陰是張春渡河擊聊城徐廣曰在平原漢使將軍郭䝉與齊將擊大破之太尉周勃漢書百官表曰太尉秦官應劭曰自上安下曰尉武官悉以為稱道太原入韋昭曰道猶從定代地至馬邑馬邑不下即攻殘之豨將趙利守東垣髙祖攻之不下月餘卒罵髙祖髙祖怒城降令出罵者斬之不罵者原之於是乃分趙山北立子恒以為代王都晉陽如淳曰文紀言都中都又文帝過太原復晉陽中都二歳似遷都於中都也春淮陰侯韓信謀反關中夷三族夏梁王彭越謀反廢遷蜀復欲反遂夷三族立子恢為梁王子友為淮陽王秋七月淮南王黥布反東并荆王劉賈地北渡淮楚王交走入薛髙祖自徃擊之立子長為淮南王十二年十月髙祖已擊布軍會甀徐廣曰在蘄縣西駰案漢書音義曰會音儈保邑名甀音直偽反布走令别將追之髙祖還歸過沛留置酒沛宫悉召故人父老子弟縱酒發沛中兒得百二十人教之歌酒酣應劭曰不醒不醉曰酣一曰酣洽也髙祖擊筑韋昭曰筑古樂有弦擊之不鼓自為歌詩曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方令兒皆和習之髙祖乃起舞慷慨傷懷泣數行下謂沛父兄曰游子悲故鄉吾雖都關中萬歳後吾魂魄猶樂思沛且朕自沛公以誅暴逆遂有天下其以沛風俗通義曰漢書注沛人語初發聲皆言其其者楚言也髙祖始登帝位教令言其後以為常耳為朕湯沐邑復其民世世無有所與沛父兄諸母故人日樂飲極驩道舊故為笑樂十餘日髙祖欲去沛父兄固請留髙祖髙祖曰吾人衆多父兄不能給乃去沛中空縣皆之邑西獻如淳曰獻牛酒髙祖復留止張張晏曰張帷張飲三日沛父兄皆頓首曰沛幸得復豐未復唯陛下哀憐之髙祖曰豐吾所生長極不忘耳吾特為其以雍齒故反我為魏沛父兄固請乃并復豐比沛於是拜沛侯劉濞服䖍曰濞音帔為吳王漢將别擊布軍洮水南北徐廣曰洮音道在江淮間皆大破之追得斬布鄱陽樊噲别將兵定代斬陳豨當城十一月髙祖自布軍至長安十二月髙祖曰秦始皇帝楚隱王陳涉魏安釐王齊湣王趙悼襄王皆絶無後予守冢各十家秦皇帝二十家魏公子無忌五家赦代地吏民為陳豨趙利所劫掠者皆赦之陳豨降將言豨反時燕王盧綰使人之豨所與陰謀上使辟陽侯迎綰綰稱病辟陽侯歸具言綰反有端矣二月使樊噲周勃將兵擊燕王綰赦燕吏民與反者立皇子建為燕王髙祖擊布時為流矢所中行道病病甚吕后迎良醫醫入見髙祖問醫醫曰病可治於是髙祖嫚罵之曰吾以布衣提三尺劍取天下此非天命乎命乃在天雖扁鵲何益遂不使治病賜金五十斤罷之已而吕后問陛下百歳後蕭相國即死令誰代之上曰曹參可問其次上曰王陵可然陵少戅陳平可以助之陳平智有餘然難以獨任周勃重厚少文然安劉氏者必勃也可令為太尉吕后復問其次上曰此後亦非而所知也盧綰與數千騎居塞下候伺幸上病愈自入謝四月甲辰髙祖崩長樂宫皇甫謐曰髙祖以秦昭王五十一年生至漢十二年年六十三四日不發喪吕后與審食其謀曰諸將與帝為編户民今北面為臣此常怏怏今乃事少主非盡族是天下不安人或聞之語酈將軍酈將軍漢書曰酈商徃見審食其曰吾聞帝已崩四日不發喪欲誅諸將誠如此天下危矣陳平灌嬰將十萬守滎陽樊噲周勃將二十萬定燕代此聞帝崩諸將皆誅必連兵還鄉以攻關中大臣内叛諸侯外反亡可翹足而待也審食其入言之乃以丁未發喪大赦天下盧綰聞髙帝崩遂亡入匈奴丙寅徐廣曰七月己巳立太子至太上皇廟羣臣皆曰髙祖起微細撥亂世反之正平定天下為漢太祖功最髙上尊號為髙皇帝太子襲號為皇帝孝惠帝也令郡國諸侯各立髙祖廟以歳時祠及孝惠五年思髙祖之悲樂沛以沛宫為髙祖原廟徐廣曰光武紀曰上幸豐祠髙祖於原廟駰案謂原者再也先既已立廟今又再立故謂之原廟髙祖所教歌兒百二十人皆令為吹樂後有缺輒補之髙帝八男長庶齊悼惠王肥次孝惠吕后子次戚夫人子趙隱王如意次代王恒已立為孝文帝薄太后子次梁王恢吕太后時徙為趙共王次淮陽王友吕太后時徙為趙幽王次淮南厲王長次燕王建太史公曰夏之政忠忠之敝小人以野鄭𤣥曰忠質厚也野少禮節也故殷人承之以敬敬之敝小人以鬼鄭𤣥曰多威儀如事鬼神故周人承之以文文之敝小人以僿徐廣曰一作薄駰案史記索隱曰僿音西志反鄭𤣥曰文尊卑之差也薄茍習文法無悃誠也故救僿莫若以忠鄭𤣥曰復反始三王之道若循環終而復始周秦之間可謂文敝矣秦政不改反酷刑法豈不謬乎故漢興承敝易變使人不倦得天統矣朝以十月車服黄屋左纛葬長陵皇甫謐曰長陵山東西廣百二十步髙十三文在渭水北去長安城三十五里史記集解卷八
