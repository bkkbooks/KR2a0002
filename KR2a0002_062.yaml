body:
  text: 史記集解卷六十四宋裴駰撰史記六十四司馬穰苴列傳第四司馬穰苴者田完之苗裔也齊景公時晉伐阿甄而燕侵河上齊師敗績景公患之晏嬰乃薦田穰苴曰穰苴雖田氏庶孽然其人文能附衆武能威敵願君試之景公召穰苴與語兵事大說之以為將軍將兵扞燕晉之師穰苴曰臣素卑賤君擢之閭伍之中加之大夫之上士卒未附百姓不信人微權輕願得君之寵臣國之所尊以監軍乃可于是景公許之使莊賈往穰苴既辭與莊賈約曰旦日日中㑹于軍門穰苴先馳至軍立表下漏待賈賈素驕貴以為將已之軍而已為監不甚急親戚左右送之留飲日中而賈不至穰苴則仆表决漏入行軍勒兵申明約束約束既定夕時莊賈乃至穰苴曰何後期為賈謝曰不佞大夫親戚送之故留穰苴曰將受命之日則忘其家臨軍約束則忘其親援枹鼓之急則忘其身今敵國深侵邦內騷動士卒暴露于境君寢不安席食不甘味百姓之命皆懸於君何謂相送乎召軍正問曰軍法期而後至者云何對曰當斬莊賈懼使人馳報景公請救既往未及反于是遂斬莊賈以徇三軍三軍之士皆振栗久之景公遣使者持節赦賈馳入軍中穰苴曰將在軍君令有所不受問軍正曰軍中不馳今使者馳云何軍正曰當斬使者大懼穰苴曰君之使不可殺之乃斬其僕車之左駙馬之左驂以徇三軍遣使者還報然後行士卒次舍井竈飲食問疾醫藥身自拊循之悉取將軍之資糧享士卒身與士卒平分糧食最比其羸弱者三日而後勒兵病者皆求行爭奮出為之赴戰晉師聞之為罷去燕師聞之度水而解于是追擊之遂取所亡封內故境而引兵歸未至國釋兵旅解約束誓盟而後入邑景公與諸大夫郊迎勞師成禮然後反歸寢既見穰苴尊為大司馬田氏日以益尊于齊已而大夫鮑氏髙國之屬害之譛于景公景公退穰苴苴發疾而死田乞田豹之徒由此怨髙國等其後及田常殺簡公盡滅髙子國子之族至常曾孫和因自立為齊威王用兵行威大放穰苴之法而諸侯朝齊齊威王使大夫追論古者司馬兵法而附穰苴于其中因號曰司馬穰苴兵法太史公曰余讀司馬兵法閎廓深逺雖三代征伐未能竟其義如其文也亦少裦矣若夫穰苴區區為小國行師何暇及司馬兵法之揖讓乎世既多司馬兵法以故不論著穰苴之列傳焉史記集解卷六十四
