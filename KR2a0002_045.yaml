body:
  text: 史記集解卷四十七宋裴駰撰史記四十七孔子世家第十七孔子生魯昌平鄉陬邑徐廣曰陬音騶孔安國曰陬孔子父叔梁紇所治邑其先宋人也曰孔防叔防叔生伯夏伯夏生叔梁紇紇與顔氏女野合而生孔子禱於尼丘得孔子魯襄公二十二年而孔子生生而首上墟頂故因名曰丘云字仲尼姓孔氏丘生而叔梁紇死葬於防山防山在魯東由是孔子疑其父墓處母諱之也孔子為兒嬉戲常陳俎豆設禮容孔子母死乃殯五父之衢蓋其慎也徐廣曰魯縣有闕里孔子所居也又有五父之衢也陬人挽父之母誨孔子父墓然後往合葬於防焉孔子要絰季氏饗士孔子與往陽虎絀曰季氏饗士非敢饗子也孔子由是退孔子年十七魯大夫孟釐子病且死誡其嗣懿子曰孔丘聖人之後服䖍曰聖人謂商湯滅於宋杜預曰孔子六世祖孔父嘉為宋華督所殺其子奔魯也其祖弗父何始有宋而嗣讓厲公杜預曰弗父何孔父嘉之髙祖宋愍公之長子厲公之兄也何嫡嗣當立以讓厲公也及正考父佐戴武宣公服䖍曰正考父弗父何之魯孫三命兹益恭故鼎銘云杜預曰三命上卿也考父廟之鼎一命而僂再命而傴三命而俯服䖍曰僂傴俯皆恭敬之說也循牆而走杜預曰言不敢安行亦莫敢余侮杜預曰其恭如是人亦不敢侮慢饘於是粥於是以糊余口杜預曰於是鼎中為饘粥饘粥糊屬言至儉也其恭如是吾聞聖人之後雖不當世必有達者王肅曰謂若弗父何殷湯之後而不繼世為宋君也杜預曰聖人之後有明德而不當大位謂正父考今孔丘年少好禮其達者歟吾即沒若必師之及釐子卒懿子與魯人南宫敬叔往學禮焉是歲季武子卒平子代立孔子貧且賤及長嘗為季氏史料量平嘗為司職吏而畜蕃息由是為司空已而去魯斥乎齊逐乎宋衛困於陳蔡之間於是反魯孔子長九尺有六寸人皆謂之長人而異之魯復善待由是反魯魯南宫敬叔言魯君曰請與孔子適周魯君豫之一乘車兩馬一豎子俱適周問禮蓋見老子云辭去而老子送之曰吾聞富貴者送人以財仁人者送人以言吾不能富貴竊仁人之號王肅曰謙言竊仁者之名送子以言曰聰明深察而近於死者好議人者也博辨廣大危其身者發人之惡者也為人子者毋以有已王肅曰身父母之有為人臣者毋以有己孔子自周反於魯弟子稍益進焉是時也晉平公淫六卿擅權東伐諸侯楚靈王兵彊陵轢中國齊大而近於魯魯小弱附於楚則晉怒附於晉則楚來伐不備於齊師侵魯魯昭公之二十年而孔子蓋年三十矣齊景公與晏嬰來適魯景公問孔子曰昔秦穆公國小處辟其霸何也對曰秦國雖小其志大處雖辟行中正身舉五羖爵之大夫起纍紲之中與語三日授之以政以此取之雖王可也其霸小矣景公說孔子年三十五而季平子與郈昭伯以鬭雞故得罪魯昭公昭公率師擊平子平子與孟氏叔孫氏三家共攻昭公昭公師敗奔於齊齊處昭公乾侯其後頃之魯亂孔子適齊為髙昭子家臣欲以通乎景公與齊太師語樂聞韶音學之三月不知肉味周氏曰孔子在齊聞習韶樂之盛美故忘於肉味也齊人稱之景公問政孔子孔子曰君君臣臣父父子子孔安國曰當此之時陳恆制齊君不君臣不臣故以此對也景公曰善哉信如君不君臣不臣父不父子不子雖有粟吾豈得而食諸孔安國曰言將危也陳氏果滅齊他日又復問政於孔子孔子曰政在節財景公說將欲以尼溪田封孔子晏嬰進曰夫儒者滑稽而不可軌法倨傲自順不可以為下崇喪遂哀破産厚葬不可以為俗游說乞貸不可以為國自大賢之息周室既衰禮樂缺有間今孔子盛容飾繁登降之禮趨詳之節纍世不能殫其學當年不能究其禮若欲用之以移齊俗非所以先細民也後景公敬見孔子不問其禮異日景公止孔子曰奉子以季氏吾不能以季孟之間待之孔安國曰魯三卿季氏為正卿最貴孟氏為下卿不用事言待之以二者之間也齊大夫欲害孔子孔子聞之景曰吾老矣弗能用也孔子遂行反乎魯孔子年四十二魯昭公卒於乾侯定公立定公立五年夏季平子卒桓子嗣立季桓子穿井得土缶中若羊韋昭曰羊生羊也故謂之怪也問仲尼云得狗韋昭曰獲羊而言狗者以孔子博物測之仲尼曰以丘所聞羊也丘聞之木石之怪䕫罔閬韋昭曰木石謂山也或云䕫一足越人謂之山繅也或言獨足魍魎山精好學人聲而迷惑人也水之怪龍罔象韋昭曰龍神獸也非常見故曰怪或云罔象食人一名沭腫土之怪墳羊唐固曰墳羊雌雄未成者也吳伐越墮會稽王肅曰墮毁也得骨節專車韋昭曰骨一節其長專車專擅也吳使使問仲尼骨何者最大仲尼曰禹致羣神於會稽山韋昭曰羣神謂主山川之君為羣神之主故謂之神也防風氏後至禹殺而戮之韋昭曰防風氏違命後至故禹殺之陳尸為戮其節專車此為大矣吳客曰誰為神仲尼曰山川之神足以綱紀天下其守為神王肅曰守山川之祀者為神謂諸侯也韋昭曰足以綱紀天下謂名山大川能興雲致雨以利天下也社稷為公侯王肅曰但守社稷無山川之祀者直為公侯而已皆屬於王者客曰防風何守仲尼曰汪罔氏之君守封禺之山韋昭曰封封山禺禺山在吳郡永安縣駰案晉太康元年改永安為武康縣今屬吳興郡為釐姓在虞夏商為汪罔於周為長翟今謂之大人王肅曰周之初及當孔子之時其名異也客曰人長幾何仲尼曰僬僥氏三尺短之至也韋昭曰僬僥西南蠻之别名也按括地志在大秦國北也長者不過十之數之極也王肅曰十之謂三丈也數極於此也於是吳客曰善哉聖人桓子嬖臣曰仲梁懷與陽虎有隙陽虎欲逐懷公山不狃止之孔安國曰不狃為季氏宰其秋懷益驕陽虎執懷桓子怒陽虎因囚桓子與盟而醳之陽虎由此益輕季氏季氏亦僭於公室陪臣執國政是以魯自大夫以下皆僭離於正道故孔子不仕退而修詩書禮樂弟子彌衆至自逺方莫不受業焉定公八年公山不狃不得意於季氏因陽虎為亂欲廢三桓之適更立其庶孽陽虎素所善者遂執季桓子桓子詐之得脫定公九年陽虎不勝奔於齊是時孔子年五十公山不狃以費畔季氏使人召孔子孔子循道彌久溫溫無所試莫能已用曰蓋周文武起豐鎬而王今費雖小儻庶幾乎欲往子路不說止孔子孔子曰夫召我者豈徒哉如用我其為東周乎何晏曰興周道於東方故曰東周也然亦卒不行其後定公以孔子為中都宰一年四方皆則之由中都宰為司空由司空為大司寇定公十年春及齊平夏齊大夫黎鉏言於景公曰魯用孔丘其勢危齊乃使使告魯為好會㑹於夾谷徐廣曰司馬彪曰今在祝其縣也魯定公且以乘車好往孔子攝相事曰臣聞有文事者必有武備有武事者必有文備古者諸侯出疆必具官以從請具左右司馬定公曰諾具左右司馬㑹齊侯夾谷為壇位土階三等以會遇之禮相見王肅曰㑹遇之禮禮之簡略也揖讓而登獻酬之禮畢齊有司趨而進曰請奏四方之樂景公曰諾於是旍旄羽祓矛㦸劍撥鼓噪而至孔子趨而進厯階而登不盡一等舉袂而言曰吾兩君為好會夷狄之樂何為於此請命有司有司却之不去則左右視晏子與景公景公心怍麾而去之有頃齊有司趨而進曰請奏宫中之樂景公曰諾優倡侏儒為戲而前孔子趨而進厯階而登不盡一等曰匹夫而熒惑諸侯者罪當誅請命有司有司加法焉手足異處景公懼而動知義不若歸而大恐告其羣臣曰魯以君子之道輔其君而子獨以夷狄之道教寡人使得罪於魯君為之奈何有司進對曰君子有過則謝以質小人有過則謝以文君若悼之則謝以實於是齊侯乃歸所侵魯之鄆汶陽龜隂之田以謝過服䖍曰三田汶陽田也龜山名陰之田得其田不得其山也杜預曰太山博縣北有龜山定公十三年夏孔子言於定公曰臣無藏甲大夫無百雉之城王肅曰髙丈長大曰堵三堵曰雉使仲由為季氏宰將墮三都服䖍曰三都三家之邑也於是叔孫氏先墮郈杜預曰東平無鹽縣東南郈鄉亭季氏將墮費公山不狃叔孫輒率費人襲魯公與三子入於季氏之宫服䖍曰三子季孫孟孫叔孫也登武子之臺費人攻之弗克入及公側服䖍曰人冇入及公之臺側孔子命申句須樂頎下伐之服䖍曰申句須樂頎魯大夫費人北國人追之敗諸姑蔑杜預曰魯國卞縣南有姑蔑城二子奔齊遂墮費將墮成杜預曰泰山巨平縣東南有成城也公斂處父服䖍曰成宰也謂孟孫曰墮成齊人必至於北門且成孟氏之保鄣無成是無孟氏也我將弗墮十二月公圍成弗克定公十四年孔子年五十六由大司寇行攝相事有喜色門人曰聞君子禍至不懼福至不喜孔子曰有是言也不曰樂其以貴下人乎於是誅魯大夫亂政者少正卯與聞國政三月粥羔羊者弗飾賈男女行者别於塗塗不拾遺四方之客至乎邑者不求有司王肅曰有司常供具職容求而有在也皆豫之以歸齊人聞而懼曰孔子為政必霸霸則吾地近焉我之為先并矣盍致地焉犁鉏曰請先嘗沮之沮之而不可則致地庸遲乎於是選齊國中女子好者八十人皆衣文衣而舞康樂文馬三十駟遺魯君陳女樂文馬於魯城南髙門外季桓子微服往觀再三將受乃語魯君為周道游往觀終日怠於政事子路曰夫子可以行矣孔子曰魯今且郊如致膰乎大夫王肅曰膰祭肉則吾猶可以止桓子卒受齊女樂三日不聽政郊又不致膰俎於大夫孔子遂行宿乎屯屯在魯之南也而師已送曰夫子則非罪孔子曰吾歌可夫歌曰彼婦之口可以出走彼婦之謁可以死敗王肅曰言婦人之口請謁足以憂使人死敗故可以出走也蓋優哉游哉維以卒歲王肅曰言仕不遇也故且優游以終歲師已反桓子曰孔子亦何言師已以實告桓子喟然嘆曰夫子罪我以羣婢故也夫孔子遂適衛主於子路妻兄顔濁鄒家衛靈公問孔子居魯得祿幾何對曰奉粟六萬衛人亦致粟六萬居頃之或譖孔子於衛靈公靈公使公孫余假一出一入孔子惡獲罪焉居十月去衛將適陳過匡顔刻為僕以其策指之曰昔吾入此由彼缺也匡人聞之以為魯之陽虎陽虎嘗暴匡人匡人於是遂止孔子孔子狀類陽虎拘焉五日顔淵後孔安國曰言與孔子相失在後也子曰吾以汝為死矣顏淵曰子在回何敢死包氏曰言夫子在已無所致死也匡人拘孔子益急弟子懼孔子曰文王既沒文不在兹乎孔安國曰兹此也言文王雖已沒其文見在此此自謂其身也天之將喪斯文也後死者不得與於斯文也孔安國曰文王既沒故孔子自謂後死也言天將喪此文者本不當使我知之今使我知之未欲喪之也天之未喪斯文也匡人其如豫何馬融曰如豫何猶言奈我何也天未喪此文則我當傳之匡人欲奈我何言不能違天以害已孔子使從者為寧武子臣於衛然後得去去過蒲徐廣曰長垣縣有匡城蒲鄉月餘反乎衛主蘧伯玉家靈公夫人有南子者使人謂孔子曰四方之君子不辱欲與寡君為兄弟者必見寡小君寡小君願見孔子辭謝不得已而見之夫人在絺帷中孔子入門北面稽首夫人自帷中再拜環珮玉聲璆然孔子曰吾鄉為弗見見之禮答焉子路不說孔子矢之曰豫所不者天厭之天厭之欒肇曰見南子者時不獲已猶文王之拘羑里也天厭之者言我之否屈乃天命所厭也蔡謨曰矢陳也夫子為子路陳天命也居衛月餘靈公與夫人同車宦者雍渠參乘出使孔子為次乘招搖市過之徐廣曰招搖翺翔也孔子曰吾未見好德如好色者也何晏曰疾時薄於德厚於色故發此言也李充曰使好德如好色則棄邪而反正矣於是醜之去衛過曹是歲魯定公卒孔子去曹適宋徐廣曰年表定公十三年孔子至衛十四年至陳哀公三年孔子過宋與弟子習禮大樹下宋司馬桓魋欲殺孔子拔其樹孔子去弟子曰可以速矣孔子曰天生德於豫桓魋其如豫何包氏曰天生德者謂授以聖性德合天地吉無不利故曰其如豫何孔子適鄭與弟子相失孔子獨立郭東門鄭人或謂子貢曰東門有人其顙似堯其頂類皋陶其肩類子産然自要以下不及禹三寸纍纍若喪家之狗王肅曰喪家之拘主人哀荒不見飲食故纍纍然而不得意孔子生於亂世道不得行故纍然不得志之貌也韓詩外傳曰喪家之狗既斂而槨冇席而祭顧望無人也子貢以實告孔子孔子欣然笑曰形狀末也而似喪家之狗然哉然哉孔子遂至陳主於司城貞子家歲餘吳王夫差伐陳取三邑而去趙鞅伐朝歌楚圍蔡蔡遷於吳吳敗越王句踐會稽有隼集於陳廷而死楛矢貫之石砮矢長尺有咫韋昭曰隼鷙鳥今之鶚也楛矢名砮鏃也以石為之八寸曰咫楛矢貫之墜而死陳湣公使使問仲尼仲尼曰隼來逺矣此肅慎之矢也昔武王克商通道九夷百蠻王肅曰九夷東方夷有九種也百蠻夷狄之百種使各以其方賄來貢王肅曰各以其方面所有之財賄而來貢使無忘職業於是肅慎貢楛矢石砮長尺有咫先生欲昭其令德以肅慎矢分大姬韋昭曰大姬武王元女也配虞胡公而封諸陳分同姓以珍玉展親韋昭曰展重也玉謂若夏后氏之璜分異姓以逺方職使無忘服王肅曰使無忘服從於王也故分陳以肅慎矢試求之故府果得之韋昭曰故府舊府也孔子居陳三歲會晉楚爭彊更伐陳及吳侵陳陳常被寇孔子曰歸與歸與吾黨之小子狂簡進取不忘其初於是孔子去陳過蒲會公叔氏以蒲畔蒲人止孔子弟子有公良孺者以私車五乘從孔子其為人長賢有勇力謂曰吾昔從夫子遇難於匡今又遇難於此命也已吾與夫子再罹難寧鬭而死鬬甚疾蒲人懼謂孔子曰茍毋適衛吾出子與之盟出孔子東門孔子遂適衛子貢曰盟可負耶孔子曰要盟也神不聽衛靈公聞孔子來喜郊迎問曰蒲可伐乎對曰可靈公曰吾大夫以為不可今蒲衛之所以待晉楚也以衛伐之無乃不可乎孔子曰其男子有死之志王肅曰公叔氏欲以蒲適他國而男子欲死之不樂適他婦人有保西河之志王肅曰婦人恐懼欲保西河無戰意也吾所伐者不過四五人王肅曰本與公叔同畔者靈公曰善然不伐蒲靈公老怠於政不用孔子孔子喟然歎曰茍有用我者朞月而已三年有成孔安國曰言誠有用我於政事者朞年而可以行其政教必三年乃冇成也孔子行佛肸為中牟宰孔安國曰晉大夫趙簡子之邑宰趙簡子攻范中行伐中牟佛肸畔使人召孔子孔子欲往子路曰由聞諸夫子其身親為不善者君子不入也孔安國曰不入其國今佛肸親以中牟畔子欲往如之何孔子曰有是言也不曰堅乎磨而不磷不曰白乎涅而不淄孔安國曰磷薄也涅可以染皂者也言至堅者磨之而不薄至白者染之於涅中而不黑君子雖在濁亂不能汙也我豈匏瓜也哉焉能繫而不食何晏曰言匏瓜得繫一處者不食故也吾自食物常東西南北不得如不食之物繫滯一處孔子擊磬有荷蕢而過門者曰有心哉擊磬乎何晏曰蕢草器也有心謂契契然也硜硜乎莫己知也夫而已矣何晏曰此硜硜信已而已言亦無益也孔子學鼓琴師襄子十日不進師襄子曰可以益矣孔子曰丘已習其曲矣未得其數也有間曰已習其數可以益矣孔子曰丘未得其志也有間曰已習其志可以益矣孔子曰丘未得其為人也有間曰有所穆然深思焉有所怡然髙望而逺志焉曰丘得其為人黯然而黑王肅曰黯黑貌幾然而長徐廣曰詩云頎而長兮眼如望羊王肅曰望羊望羊視也如王四國非文王其誰能為此也師襄子辟席再拜曰師蓋云文王操也孔子既不得用於衛將西見趙簡子至於河而聞竇鳴犢舜華之死也徐廣曰或作鳴鐸竇犨又作竇鳴犢舜華也臨河而嘆曰美哉水洋洋乎丘之不濟此命也夫子貢趨而進曰敢問何謂也孔子曰竇鳴犢舜華國之賢大夫也趙簡子未得志之時須此兩人而後從政及其已得志殺之乃從政丘聞之也刳胎殺夭則騏驎不至郊竭澤涸漁則蛟龍不合隂陽覆巢毁卵則鳯皇不翔何則君子諱傷其類也夫鳥獸之於不義也尚知辟之而況乎丘哉乃還息乎陬鄉作為陬操以哀之王肅曰陬操琴曲名也而反乎衛入主籧伯玉家他日靈公問兵陳孔安國曰軍陳行列之法孔子曰俎豆之事則嘗聞之軍旅之事未之學也鄭𤣥曰萬二千人為軍五百人為旅軍旅末事本未立不可教以末也明日與孔子語見蜚鴈仰視之色不在孔子孔子遂行復如陳夏衛靈公卒立孫輒是為衛出公六月趙鞅內太子蒯瞶于戚陽虎使太子絻八人衰絰僞自衛迎者哭而入遂居焉冬蔡遷於州來是歲魯哀公三年而孔子年六十矣齊助衛圍戚以太子蒯聵在故也夏魯桓釐廟燔南宫敬叔救火孔子在陳聞之曰災必於桓釐廟乎服䖍曰桓釐當毀而魯事非禮之廟故孔子聞冇火災知其加桓僖也已而果然秋季桓子病輦而見魯城喟然歎曰昔此國幾興矣以吾獲罪於孔子故不興也顧謂其嗣康子曰我即死若必相魯相魯必召仲尼後數日桓子卒康子代立已葬欲召仲尼公之魚曰昔吾先君用之不終終為諸侯笑今又用之不能終是再為諸侯笑康子曰則誰召而可曰必召冉求於是使使召冉求冉求將行孔子曰魯人召求非小用之將大用之也是日孔子曰歸乎歸乎吾黨之小子狂簡斐然成章吾不知所以裁之孔安團曰簡大也孔子在陳思歸欲去曰吾黨之小子狂者進取於大道妄穿鑿以成章不知所以裁制當歸以裁耳子贛知孔子思歸送冉求因誡曰即用以孔子為招云冉求既去明年孔子自陳遷於蔡蔡昭公將如吳吳召之也前昭公欺其臣遷州來後將往大夫懼復遷公孫翩射殺昭公徐廣曰哀公四年也楚侵蔡秋齊景公卒徐廣曰哀公五年也明年孔子自蔡如葉葉公問政孔子曰政在來遠附邇他日葉公問孔子於子路子路不對孔安國曰葉公名諸梁楚大夫食采於葉僭稱公不對未知所以對也孔子聞之曰由爾何不對曰其為人也學道不倦誨人不厭發憤忘食樂以忘憂不知老之將至云爾去葉反於蔡長沮桀溺耦而耕孔子以為隱者使子路問津焉鄭𤣥曰耜廣五寸二耜為耦津濟渡處也長沮曰彼執輿者為誰子路曰為孔丘曰是魯孔丘與曰然曰是知津矣馬融曰言數周流自知津處桀溺謂子路曰子為誰曰為仲由曰子孔丘之徒與曰然桀溺曰悠悠者天下皆是也而誰以易之孔安國曰悠悠者周流之貌也言當今天下治亂同空舍此適彼故曰誰以易之且與其從辟人之士豈若從辟世之士哉何晏曰士有辟人之法有辟世之法長沮桀溺謂孔子為士從辟人之法者也已之為士則從辟世之法也耰而不輟鄭𤣥曰耰覆種也輟止也覆種不止不以津告者子路以告孔子孔子憮然何晏曰為其不達已意而非已曰鳥獸不可與同羣孔安國曰隱於山林是同羣天下有道丘不與易也何晏曰凡天下有道者丘皆不與易也已大而人小故也他日子路行遇荷蓧丈人包氏曰丈人老者蓧草器曰子見夫子乎丈人曰四體不勤五榖不分孰為夫子包氏曰丈人曰不勤勞四體分植五穀誰為夫子而索也植其杖而藝孔安國植倚也除草曰藝子路以告孔子曰隱者也復往則亡孔安國曰子路反至其家丈人出行不在孔子遷於蔡三歲吳伐陳楚救陳徐廣曰哀公四年軍於城父聞孔子在陳蔡之間楚使人聘孔子孔子將往拜禮陳蔡大夫謀曰孔子賢者所刺譏皆中諸侯之疾今日久留陳蔡之間諸大夫所設行皆非仲尼之意今楚大國也來聘孔子孔子用於楚則陳蔡用事大夫危矣於是乃相與發徒役圍孔子於野不得行絶糧從者病莫能興孔安國曰興起也孔子講誦弦歌不衰子路愠見曰君子亦有窮乎孔子曰君子固窮小人窮斯濫矣何晏曰濫溢也君子固亦有窮時但不如小人窮則濫溢為非子貢色作孔子曰賜爾以豫為多學而識之者與曰然孔安國曰然謂多學而識之非與孔安國曰問今不然耶孔子曰非也豫一以貫之何晏曰善有元事有會天下殊塗而同歸百慮而一致知其元則衆善舉也故不待學以一知之孔子知弟子有愠心乃召子路而問曰詩云匪兕匪虎率彼曠野王肅曰率循也言非兕虎而循曠野也吾道非耶吾何為於此子路曰意者吾未仁耶人之不我信也王肅曰言人不信吾豈以未仁故乎意者吾未知耶人之不我行也王肅曰言人不使通行而困窮者豈以我未智乎孔子曰有是乎由譬使仁而必信安有伯夷叔齊使智者而必行安有王子比干子路出子貢入見孔子曰賜詩云匪兕匪虎率彼曠野吾道非耶吾何為於此子貢曰夫子之道至大也故天下莫能容夫子夫子蓋少貶焉孔子曰賜良農能稼而不能為穡王肅曰種之為稼斂之為穡言良農能善種之未必能斂穫之良工能巧而不能為順王肅曰言良工能巧而已不能每順人之意君子能修其道綱而紀之統而理之而不能為容今爾不修爾道而求為容賜而志不逺矣子貢出顏回入見孔子曰回詩云匪兕匪虎率彼曠野吾道非耶吾何為於此顔回曰夫子之道至大故天下莫能容雖然夫子推而行之不容何病不容然後見君子夫道之不修也是吾醜也夫道既已大修而不用是有國者之醜也不容何病不容然後見君子孔子欣然而笑曰有是哉顔氏之子使爾多財吾為爾宰王肅曰宰主財者也為汝主財言志之同也於是使子貢至楚楚昭王興師迎孔子然後得免昭王將以書社地七百里封孔子服䖍曰書籍也楚令尹子西曰王之使使諸侯有如子貢者乎曰無有王之輔相有如顔回者乎曰無有王之將率有如子路者乎曰無有王之官尹有如宰豫者乎曰無有且楚之祖封於周號為子男五十里今孔丘述三王之法明周召之業王若用之則楚安得世世堂堂方數千里乎夫文王在豐武王在鎬百里之君卒王天下今孔丘得據土壤賢弟子為佐非楚之福也昭王乃止其秋楚昭王卒於城父楚狂接輿歌而過孔子孔安國曰接輿楚人也佯狂而來歌欲以感切孔子也曰鳯兮鳯兮何德之衰孔安國曰比孔子於鳯鳥待聖君乃見非孔子周行求合故曰衰也往者不可諫兮孔安國曰已往所行不可復諫止也來者猶可追也孔安國曰自今已來可追自止避亂隱居已而已而今之從政者殆而孔安國曰言已而者言世亂已甚不可復治也再言之者傷之深也孔子下欲與之言包氏曰下下車也趨而去弗得與之言於是孔子自楚反乎衛是歲也孔子年六十三而魯哀公六年也其明年吳與魯會繒徴百牢太宰嚭召季康子季康子使子貢往然後得已孔子曰魯衛之政兄弟也包氏曰周公康叔既為兄弟康叔睦於周公其國之政亦如兄弟也是時衛君輒父不得立在外諸侯數以為讓而孔子弟子多仕於衛衛君欲得孔子為政子路曰衛君待子而為政子將奚先包氏曰問往將何所先行孔子曰必也正名乎馬融曰正百事之名也子路曰有是哉子之迂也何其正也包氏曰迂猶逺也言孔子之言逺於事也孔子曰野哉由也孔安國曰野不達也夫名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中孔安國曰禮以安上樂以移風二者不行則有淫刑濫罰也刑罰不中則民無所錯手足矣夫君子為之必可名言之必可行王肅曰所名之事必可得明言所言之事必可得遵行也君子於其言無所茍而已矣其明年冉有為季氏將師與齊戰於郎克之徐廣曰此哀公十一年也去吳會繒已四年矣年表哀公十年孔子自衛至陳也季康子曰子之於軍旅學之乎性之乎冉有曰學之於孔子季康子曰孔子何如人哉對曰用之有名播之百姓質諸鬼神而無憾求之至於此道雖纍千社夫子不利也康子曰我欲召之可乎對曰欲召之則毋以小人固之則可矣而衛孔文子服䖍曰文子衛卿也將攻太叔左傳曰太叔名疾問策於仲尼辭不知退而命載而行曰鳥能擇木木豈能擇鳥乎服䖍曰鳥喻己木以喻所之之國文子固止會季康子逐公華公賔公林以幣迎孔子孔子歸魯孔子之去魯凡十四歲而反乎魯魯哀公問政對曰政在選臣季康子問政曰舉直錯諸枉包氏曰錯置也舉正直之人用之廢置邪枉之人則枉者直康子患盜孔子曰茍子之不欲雖賞之不竊孔安國曰欲情欲也言民化於上不從其所令從其所好也然魯終不能用孔子孔子亦不求仕孔子之時周室微而禮樂廢詩書缺追迹三代之禮序書傳上紀唐虞之際下至秦繆編次其事曰夏禮吾能言之杞不足徵也殷禮吾能言之宋不足徵也包氏曰徵成也杞宋二國夏殷之後也夏殷之禮吾能說之杞宋之君不足以成也足則吾能徵之矣觀殷夏所損益曰後雖百世可知也何晏曰物類相召勢數相生其變有常故可預知者也以一文一質周監二代郁郁乎文哉吾從周孔安國曰監視也言周文章備於二代當從之周故書傳禮記自孔氏孔子語魯太師樂其可知也始作翕如何晏曰太師樂官名也五音始奏翕如盛也縱之純如何晏曰言五音既發放縱盡其聲純和諧也皎如何晏曰言其音節眀繹如也以成何晏曰縱之以純如皎如繹如言樂始於翕如而成於三者也吾自衛反魯然後樂正雅頌各得其所鄭𤣥曰反魯魯哀公十一年冬是時道衰樂廢孔子來還乃正之故雅頌各得其所古者詩三千餘篇及至孔子去其重取可施於禮義上采契后稷中述殷周之盛至幽厲之缺始於衽席故曰關睢之亂以為風始鹿鳴為小雅始文王為大雅始清廟為頌始三百五篇孔子皆弦歌之以求合韶武雅頌之音禮樂自此可得而述以備王道成六藝孔子晚而喜易序象繫象說卦文言讀易韋編三絶曰假我數年若是我於易則彬彬矣孔子以詩書禮樂教弟子蓋三千焉身通六藝者七十有二人如顔濁鄒之徒頗受業者甚衆孔子以四教文行忠信何晏曰四者有形質可舉以教絶四毋意何晏曰以道為度故不任意也毋必何晏曰用之則行舍之則藏故無專必毋固何晏曰無可無不可故無固行也毋我何晏曰述古而不自作處羣萃而不自異唯道是從故不有其身所慎齊戰疾何晏曰此三者人所不能慎而夫子慎也子罕言利與命與仁何晏曰罕者希也利者義之和也命者天之命也仁者行之盛也寡能及之故罕言之不憤不啓舉一隅不以三隅反則弗復也鄭𤣥曰孔子與人言必待其人心憤憤口悱悱乃後啓發為說之如此則識思之深也說則舉一端以語之其人不思其類則不重教也其於鄉黨恂恂似不能言者王肅曰恂恂溫恭貌也其於宗廟朝廷辨辨言唯謹爾鄭𤣥曰唯辨而謹敬也朝與上大夫言誾誾如也孔安國曰中正之貌也與下大夫言侃侃如也孔安國曰和樂貌入公門鞠躬如也趨進翼如也孔安國曰言端好也君召使儐鄭𤣥曰有賔客使迎之也色勃如也孔安國曰必變色君命召不俟駕行矣鄭𤣥曰急趨君命也既行出而車駕隨之魚餧肉敗割不正不食孔安國曰魚敗曰餧也席不正不坐食於有喪者之側未嘗飽也是日哭則不歌見齊衰瞽者雖童子必變包氏曰瞽盲三人行必得我師何晏曰言我三人行本無賢愚擇善而從之不善而改之無常師德之不修學之不講聞義不能徙不善不能改是吾憂也孔安國曰夫子常以此四者為憂也使人歌善則使復之然後和之何晏曰樂其善故使重歌而自和也子不語怪力亂神王肅曰怪怪異也力謂若奡濫舟烏獲舉千鈞之屬也亂謂臣弒君子弒父也神謂鬼神之事或無益於教化或所不忍言也李充曰力不由理斯怪力也神不由正斯亂神也怪力亂神有與於邪無益於教故不言也子貢曰夫子之文章可得而聞也何晏曰章明文彩形質著見可以耳目修也夫子言天道與性命弗可得聞也已何晏曰性者人之所受以生也天道者元亨日新之道深微故不可得而聞之顔淵喟然嘆曰仰之彌髙鑽之彌堅何晏曰言不可窮盡瞻之在前忽焉在後何晏曰言忽恍不可為形象夫子循循然善誘人何晏曰循循次序貌也誘進也言夫子正以此道進勸人學有次序也博我以文約我以禮欲罷不能既竭我才如有所立卓爾雖欲從之蔑由也已孔安國曰言夫子既以文章開博我又以禮節節約我使我欲罷不能已竭吾才矣其有所立則卓然不可及言已雖蒙夫子之善誘猶不能及夫子所立也達巷黨人童子曰大哉孔子博學而無所成名鄭𤣥曰達巷者黨名五百家為黨此黨之人美孔子博學道藝不成一名而已子聞之曰我何執執御乎執射乎我執御矣鄭𤣥曰聞人美之承以謙也吾執御者欲明六藝之卑牢曰子云不試故藝鄭𤣥曰牢者弟子子牢也試用也言孔子自云我不見用故多伎藝也魯哀公十四年春狩大野服䖍曰大野藪名魯田圃之常處蓋今巨野是也叔孫氏車子鉏商獲獸服䖍曰車子微者也鉏商名也以為不祥仲尼視之曰麟也取之服䖍曰麟非時所常見故怪之以為不祥也仲尼名之曰麟然後魯人乃取之也明麟為仲尼至也曰河不出圖雒不出書吾已矣夫孔安國曰聖人受命則河出圖今無此瑞吾已矣夫者不得見河圖八卦是也顔淵死孔子曰天喪豫何休曰豫我也天生顔淵為夫子輔佐死者是天將亡夫子之證者也及西狩見麟曰吾道窮矣何休曰麟者太平之獸聖人之類也時得而死此天亦告夫子將歿之證故云爾喟然歎曰莫知我夫子貢曰何為莫知子何晏曰子貢怪夫子言何為莫知已故問之子曰不怨天不尤人馬融曰孔子不用於世而不怨天不知已亦不尤人下學而上達孔安國曰下學人事上達天命知我者其天乎何晏曰聖人與天地合其德故曰唯天知已不降其志不辱其身伯夷叔齊乎鄭𤣥曰言其直已之心不入庸君之朝謂柳下惠少連降志辱身矣謂虞仲夷逸隱居放言包氏曰放置也置不復言世務也行中清廢中權馬融曰清純潔也遭世亂自廢棄以免患合於權也我則異於是無可無不可馬融曰亦不必進亦不必退唯義所在子曰弗乎弗乎君子疾沒世而名不稱焉吾道不行矣吾何以自見於後世哉乃因史記作春秋上至隱公下訖哀公十四年十二公據魯親周故殷運之三代約其文辭而指博故吳楚之君自稱王而春秋貶之曰子踐土之會實召周天子而春秋諱之曰天王狩於河陽推此類以繩當世貶損之義後有王者舉而開之春秋之義行則天下亂臣賊子懼焉孔子在位聽訟文辭有可與人共者弗獨有也至於為春秋筆則筆削則削子夏之徒不能贊一辭弟子受春秋孔子曰後世知丘者以春秋而罪丘者亦以春秋劉熙曰知者行堯舜之道者也罪者在王公之位見貶絶者明歲子路死於衛孔子病子貢請見孔子方負杖逍遙於門曰賜汝來何其晚也孔子因歎歌曰太山壞乎鄭𤣥曰太山衆山所仰梁柱摧乎哲人萎乎王肅曰萎頓也因以涕下謂子貢曰天下無道久矣莫能宗豫工肅曰傷道之不行也夏人殯於東階周人於西階殷人兩柱間昨暮豫夢坐奠兩柱之間豫殆殷人也後七日卒鄭𤣥曰謂聖人知命也孔子年七十三以魯哀公十六年四月己丑卒哀公誄之曰旻天不弔不憖遺一老王肅曰弔善也憖且也一老謂孔子也俾屏余一人以在位㷀㷀余在疚王肅曰疚病也鳴呼哀哉尼父毋自律王肅曰父丈夫之顯稱也律法也言毋以自為法也子貢曰君其不沒於魯乎夫子之言曰禮失則昏名失則愆失志為昏失所為愆生不能用死而誄之非禮也稱余一人非名也服䖍曰天子自謂一人非諸侯所當名也孔子葬魯城北泗上皇覽曰孔子冡去城一里冢塋百畝冢南北廣十步東西十三步髙一丈二尺冢前以瓴甓為祠壇方六尺與地平本無祠堂冢塋間樹以百數皆異種魯人世世無能名其樹者民傳言孔子弟子異國人各持其方樹來種之其樹柞枌雒離女貞五味毚檀之樹孔子塋中不生荆棘及刺人草弟子皆服三年三年心喪畢相訣而去則哭各復盡哀或復留唯子貢廬於冢上凡六年然後去弟子及魯人往從冢而家者百有餘室因命曰孔里魯世世相傳以歲時奉祠孔子冢而諸儒亦講禮鄉飲大射於孔子冢孔子冢大一頃故所居堂弟子內後世因廟藏孔子衣冠琴車書至於漢二百餘年不絶髙皇帝過魯以太牢祠焉諸侯卿相至常先謁然後從政孔子生鯉字伯魚伯魚年五十先孔子死皇覽曰伯魚冢在孔子冢東與孔子竝大小相望也伯魚生伋字子思年六十二嘗困於宋子思作中庸皇覽曰子思冢在孔子冢南大小相望子思生白字子上年四十七子上生求字子家年四十五子家生箕字子京年四十六子京生穿字子髙年五十一子髙生子慎年五十七嘗為魏相子慎生鮒年五十七為陳王涉博士死於陳下鮒弟子襄年五十七嘗為孝惠皇帝博士遷為長沙太守長九尺六寸子襄生忠年五十七忠生武武生延年及安國安國為今皇帝博士至臨淮太守蚤卒安國生卬卬生歡太史公曰詩有之髙山仰止景行行止雖不能至然心鄉往之余讀孔氏書想見其為人適魯觀仲尼廟堂車服禮器諸生以時習禮其家余低回留之不能去云天下君王至於賢人衆矣當時則榮汲則已焉孔子布衣傳十餘世學者宗之自天子王侯中國言六藝者折中於夫子可謂至聖矣史記集解卷四十七
