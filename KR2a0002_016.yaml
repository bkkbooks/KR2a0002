body:
  text: 史記集解卷十六宋裴駰撰史記十六秦楚之際月表第四太史公讀秦楚之際曰初作難發於陳渉虐戾滅秦自項氏撥亂誅暴平定海内卒踐帝阼成於漢家五年之間號令三嬗音善自生民以來未始有受命若斯之亟也昔虞夏之興積善累功數十年德洽百姓攝行政事考之于天韋昭曰謂舜受禪在璇璣玉衡以齊七政然後在位湯武之王乃由契后稷修仁行義十餘世不期而㑹孟津八百諸侯猶以為未可其後乃放弑秦起襄公章於文繆獻孝之後稍以蠶食六國百有餘載至始皇乃能并冠帶之倫以德若彼用力如此盖一統若斯之難也秦既稱帝患兵革不休以有諸侯也於是無尺土之封墮壊名城銷鋒鏑徐廣曰一作鍉鉏豪桀維萬世之安然王跡之興起於閭巷合從討伐軼於三代鄉秦之禁適足以資賢者為驅除難耳故憤發其所為天下雄安在無土不王白虎通曰聖人無土不王使舜不遭堯當如夫子老於闕里也此乃傳之所謂大聖乎豈非天哉豈非天哉非大聖孰能當此受命而帝者乎史記集解卷十六
  hash: sha256:4287b96c6bc3125f0e443bd025d264f7b78eab634703b3e347615e265ced68e6
