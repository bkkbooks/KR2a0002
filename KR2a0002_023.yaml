body:
  text: 史記集解卷二十五宋裴駰撰史記二十五律書第三王者制事立法物度軌則一稟於六律六律為萬事根本焉其於兵械尤所重故云望敵知吉凶聞聲效勝負百王不易之道也武王伐紂吹律聽聲推孟春以至於季冬殺氣相并而音尚宫同聲相從物之自然何足怪哉兵者聖人所以討彊暴平亂世夷險阻救危殆自含血戴角之獸見犯則校而況於人懷好惡喜怒之氣喜則愛心生怒則毒螫加情性之理也昔黃帝有涿鹿之戰以定火災文穎曰神農子孫暴虐黃帝伐之故以定火災顓頊有共工之陳以平水害文穎曰共工主水官也少昊氏衰秉政作虐故顓頊伐之本主水官因為水行也成湯有南巢之伐以殄夏亂遞興遞廢勝者用事所受於天也自是之後名士迭興晉用咎犯而齊用王子吳用孫武申明軍約賞罰必信卒伯諸侯兼列邦土雖不及三代之誥誓然身寵君尊當世顯揚可不謂榮焉豈與世儒暗於大較不權輕重猥云德化不當用兵大至窘辱失守小乃侵犯削弱遂執不移等哉故教笞不可廢於家刑罰不可捐於國誅伐不可偃於天下用之有巧拙行之有逆順耳夏桀殷紂手摶豺狼足追四馬勇非微也百戰克勝諸侯懾服權非輕也秦二世宿軍無用之地連兵於邊陲力非弱也結怨胸奴絓禍於越勢非寡也及其威盡勢極閭巷之人為敵國咎生窮武之不知足甘得之心不息也高祖有天下三邊外畔大國之王雖稱蕃輔臣節未盡㑹高祖厭苦軍事亦有蕭張之謀故偃武一休息羈縻不備厯至孝文即位將軍陳武等議曰南越朝鮮自全秦時內屬為臣子後且擁兵阻厄音厄賣反選音思兖反蠕音而兖反觀望高祖時天下新定人民小安未可復興兵今陛下仁惠撫百姓恩澤加海內宜及士民樂用征討逆黨以一封疆孝文曰朕能任衣冠念不到此㑹吕氏之亂功臣宗室共不羞耻誤居正位常戰戰栗栗恐事之不終且兵凶器雖克所願動亦耗病謂百姓逺方何又先帝知勞民不可煩故不以為意朕豈自謂能今胸奴內侵軍吏無功邊民父子荷兵日久朕常為動心傷痛無日忘之今未能消距願且堅邊設候結和通使休寧北陲為功多矣且無議軍故百姓無內外之繇得息肩於田畝天下殷富粟至十餘錢鳴雞吠狗煙火萬里可謂和樂者乎太史公曰文帝時㑹天下新去湯火人民樂業因其欲然能不擾亂故百姓遂安自年六七十翁亦未嘗至市井游敖嬉戲如小兒狀孔子所稱有德君子者邪書曰七正二十八舍律厯天所以通五行八正之氣天所以成孰萬物也舍者日月所舍舍者舒氣也不周風居西北主殺生東壁居不周風東主辟生氣而東之至於營室營室者主營胎徐廣曰一作含陽氣而産之東至於危危垝也言陽氣之危垝故曰危十月也律中應鍾應鍾者陽氣之應不用事也其於十二子為亥亥者該也言陽氣藏於下故該也廣莫風居北方廣莫者言陽氣在下隂莫陽廣大也故曰廣莫東至於虛虛者能實能虛言陽氣冬則宛藏於虛日冬至則一隂下藏一陽上舒故曰虛東至於須女言萬物變動其所隂陽氣未相離尚相如胥也故曰須女十一月也律中黃鍾黃鍾者言陽氣踵黃泉而出也其於十二子為子子者滋也滋者言萬物滋于下也其於十母為壬癸壬之為言任也言陽氣任養萬物於下也癸之為言揆也言萬物可揆度故曰癸東至牽牛牽牛者言陽氣牽引萬物出之也牛者冒也言地雖凍能冒而生也牛者耕殖種萬物也東至於建星建星者建諸生也十二月也律中大吕大吕者徐廣曰此中闕不說大吕其於十二子為丑丑者紐也言陽氣在上未條萬物厄紐未敢出條風居東北主出萬物條之言條治萬物而出之故曰條風南至於箕箕者言萬物根棋徐廣曰一作橫也故曰箕正月也律中泰簇泰簇者言萬物簇生也故曰泰簇其於十二子為寅寅言萬物始生蚓然也故曰寅南至於尾言萬物始生如尾也南至於心言萬物始生有華心也徐廣曰一作莖南至於房房者言萬物門户也至於門則出矣明庶風居東方明庶者明衆物盡出也二月也律中夾鍾夾鍾者言隂陽相夾廁也其於十二子為卯卯之為言茂也言萬物茂也其於十母為甲乙甲者言萬物剖符音孚甲而出也乙者言萬物生軋軋也南至於氐氐者言萬物皆至也南至於亢亢者言萬物亢見也南至於角角者言萬物皆有枝格如角也三月也律中姑洗姑洗者言萬物洗生其於十二子為辰辰者言萬物之蜄音之慎反也清明風居東南維主風吹萬物而西之軫軫者言萬物益大而軫軫然西至於翼翼者言萬物皆有羽翼也四月也律中仲吕仲吕者言萬物盡旅而西行也其於十二子為己巳者言陽氣之已盡也西至於七星七星者陽數成於七故曰七星西至於張張者言萬物皆張也西至於注注者言萬物之始衰陽氣下注故曰注五月也律中蕤賓蕤賓者言隂氣幼少故曰蕤痿陽不用事故曰賓景風居南方景者言陽氣道竟故曰景風其於十二子為午午者隂陽交故曰午其於十母為丙丁丙者言陽道著明故曰丙丁者言萬物之丁壯也故曰丁西至於弧弧者言萬物之吳落徐廣曰吳一作柔且就死也西至於狼狼者言萬物可度量斷萬物故曰狼涼風居西南維主地地者沈奪萬物氣也六月也律中林鍾林鍾者言萬物就死氣林林然其於十二子為未未者言萬物皆成有滋味也北至於罰罰者言萬物氣奪可伐也北至於參參者言萬物可參也故曰參七月也律中夷則夷則言隂徐廣曰一作陽氣之賊徐廣曰一作則萬物也其於十二子為申申者言隂用事申賊萬物徐廣曰一作則故曰申北至於濁濁者觸也言萬物皆觸死也故曰濁北至於留留者言陽氣之稽留也故曰留八月也律中南呂南吕者言陽氣之旅入藏也其於十二子為酉酉者萬物之老也故曰酉閶闔風居西方閶者倡也闔者藏也言陽氣道萬物闔黃泉也其於十母為庚辛庚者言隂氣庚萬物故曰庚辛者言萬物之辛生故曰辛北至於胃胃者言陽氣就藏皆胃胃也北至於婁婁者呼萬物且內之也北至於奎徐廣曰一作䖯奎者主毒螫殺萬物也奎而藏之九月也律中無射無射者隂氣盛用事陽氣無射也故曰無射其於十二子為戌戌者言萬物盡滅故曰戌律數九九八十一以為宫三分去一五十四以為徵三分益一七十二以為商三分去一四十八以為羽三分益一六十四以為角黃鍾長八寸七分一宫大吕長七寸五分三分一太蔟長七寸七分二角夾鍾長六寸一分三分一姑洗長六寸七分四羽仲吕長五寸九分三分二徵蕤賓長五寸六分三分一林鍾長五寸七分四角夷則長五寸四分三分二商南吕長四寸七分八徵無射長四寸四分三分二應鍾長四寸二分三分二羽生鍾分子一分丑三分二寅九分八卯二十七分十六辰八十一分六十四巳二百四十三分一百二十八午七百二十九分五百一十二未二千一百八十七分一千二十四申六千五百六十一分四千九十六酉一萬九千六百八十三分八千一百九十二戌五萬九千四十九分三萬二千七百六十八亥十七萬七千一百四十七分六萬五千五百三十六生黃鍾術曰以下生者倍其實三其法以上生者四其實三其法上九商八羽七角六宫五徵九置一而九三之以為法實如法得長一寸凡得九寸命曰黃鍾之宫故曰音始於宫窮於角數始於一終於十成於三氣始於冬至周而復生神生於無形成於有形然後數形而成聲故曰神使氣氣就形形理如類有可類或未形而未類或同形而同類類而可班類而可識聖人知天地識之别故從有以至未有以得細若氣微若聲然聖人因神而存之雖妙必效情核其華道者明矣非有聖心以乘聰明孰能存天地之神而成形之情哉神者物受之而不能知及其去來故聖人畏而欲存之唯欲存之神之亦存其欲存之者故莫貴焉太史公曰在旋璣玉衡以齊七政即天地二十八宿十母十二子鍾律調自上古建律運厯造日度可據而度也合符節通道德即從斯之謂也史記集解卷二十五
