body:
  text: 史記集解卷一宋裴駰撰史記一凡是徐氏義稱徐姓名以别之餘者悉是駰注解并集衆家義五帝本紀第一黃帝者徐廣曰號有熊少典之子姓公孫譙周曰有熊國君少典之子也皇甫謐曰有熊今河南新鄭是也名曰軒轅生而神靈弱而能言幼而徇齊徐廣曰墨子曰年踰十五則聰明心慮無不徇通矣駰案徇疾齊速也言聖德幼而疾速也長而敦敏成而聰明軒轅之時神農氏世衰皇甫謐曰易稱庖犧氏沒神農氏作是為炎帝班固曰教民耕農故號曰神農諸侯相侵伐暴虐百姓而神農弗能征於是軒轅乃習用干戈以征不享諸侯咸來賓從而蚩尤最為暴莫能伐應劭曰蚩尤古天子瓚曰孔子三朝記曰蚩尤庶人之貪者炎帝欲侵陵諸侯諸侯咸歸軒轅軒轅乃修德振兵治五氣王肅曰五行之氣藝五種藝樹也詩云藝之荏菽周禮曰穀宜五種鄭𤣥曰五種黍稷菽麥稻也撫萬民度四方王肅曰度四方而安撫之教熊羆貔貅貙虎以與炎帝戰於阪泉之野服䖍曰阪泉地名皇甫謐曰在上谷三戰然後得其志蚩尤作亂不用帝命於是黃帝乃徵師諸侯與蚩尤戰於涿鹿之野服䖍曰涿鹿山名在涿郡張晏曰涿鹿在上谷遂禽殺蚩尤皇覽曰蚩尤冢在東平郡夀張縣闞鄉城中髙七丈民常十月祀之有赤氣出如匹絳帛民名為蚩尤旗肩髀冢在山陽郡巨野縣重聚大小與闞冢等傳言黃帝與蚩尤戰於涿鹿之野黃帝殺之身體異處故别葬之而諸侯咸尊軒轅為天子代神農氏是為黃帝天下有不順者黃帝從而征之平者去之披山通道徐廣曰披他本亦作陂字蓋當為詖詖者旁其邊之謂也披語誠合今世然古今不必同也未嘗寧居東至于海登丸山徐廣曰丸一作凡駰案地理志曰丸山在郎邪朱虛縣及岱宗西至于空桐應劭曰山名韋昭曰在隴右登雞頭南至于江登熊湘封禪書曰南伐至于召陵登熊山地理志曰湘山在長沙益陽縣北逐葷粥胸奴傳曰唐虞以上有山戎獫狁葷粥居于北蠻合符釡山而邑于涿鹿之阿遷徙往來無常處以師兵為營衛官名皆以雲命為雲師應劭曰黃帝受命有雲瑞故以雲紀事也春官為青雲夏官為縉雲秋官為白雲冬官為黑雲中官為黃雲張晏曰黃帝有景雲之應因以名師與官置左右大監監于萬國萬國和而鬼神山川封禪與為多焉徐廣曰多一作朋獲寶鼎迎日推策晉灼曰策數也迎數之也瓚曰日月朔望未來而推之故曰迎日舉風后力牧常先大鴻鄭𤣥曰風后黃帝三公也班固曰力牧黃帝相也大鴻見封禪書以治民順天地之紀幽明之占死生之說徐廣曰一云幽明之數合死生之說存亡之難時播百穀王肅曰時是也草木淳化鳥獸蟲蛾旁羅日月星辰水波徐廣曰一作沃土石金玉勞勤心力耳目節用水火材物有土德之瑞故號黃帝黃帝二十五子其得姓者十四人黃帝居軒轅之丘皇甫謐曰受國於有熊居軒轅之丘故因以為名又以為號山海經曰在窮山之際西射之南張晏曰作軒冕之服故謂之軒轅而娶於西陵之女是為嫘祖徐廣曰祖一作俎嫘力追反嫘祖為黃帝正妃生二子其後皆有天下其一曰𤣥嚻是為青陽青陽降居江水其二曰昌意降居若水昌意娶蜀山氏女曰昌僕生髙陽髙陽有聖德焉黃帝崩皇甫謐曰在位百年而崩年百一十一歲葬橋山皇覽曰黃帝冢在上郡橋山其孫昌意之子髙陽立是為帝顓頊也帝顓頊髙陽者皇甫謐曰都帝丘今東郡濮陽是也黃帝之孫而昌意之子也靜淵以有謀疏通而知事養材以任地載時以象天依鬼神以制義治氣以教化潔誠以祭祀北至于幽陵南至于交址西至于流沙地理志曰流沙在張掖居延縣東至于蟠木海外經曰東海中有山焉名曰度索上有大桃樹屈蟠三千里動靜之物大小之神日月所照莫不砥屬王肅曰砥平也四逺皆平而來服屬帝顓頊生子曰窮蟬顓頊崩皇甫謐曰在位七十八年年九十八皇覽曰顓頊冢在東郡濮陽頓丘城門外廣陽里中頓丘者城門名頓丘道而𤣥嚻之孫髙辛立是為帝嚳帝嚳髙辛者張晏曰少昊之前天下之號象其德顓頊以來天下之號因其名髙陽髙辛皆所興之地名顓頊與嚳皆以字為號上古質故黃帝之曾孫也髙辛父曰蟜極蟜極父曰𤣥嚻𤣥嚻父曰黃帝自𤣥嚻與蟜極皆不得在位至髙辛即帝位皇甫謐曰都亳今河南偃師是髙辛於顓頊為族子髙辛生而神靈自言其名普施利物不於其身聰以知遠明以察微順天之義知民之急仁而威惠而信修身而天下服取地之材而節用之撫教萬民而利誨之厯日月而迎送之明鬼神而敬事之其色郁郁其德嶷嶷其動也時其服也士帝嚳溉執中而遍天下徐廣曰古既字作水旁遍字一作尹日月所照風雨所至莫不從服帝嚳娶陳鋒氏女生放勛娶娵訾氏女生摰帝嚳崩皇甫謐曰在位七十年年百五歲皇覽曰帝嚳冢在東郡濮陽頓丘城南臺隂野中而摯代立帝摯立不善崩而弟放勛立是為帝堯帝堯者諡法曰翼善傳聖曰堯放勛徐廣曰號陶唐皇甫謐曰堯以甲申歲生甲辰即帝位甲午徵舜甲寅舜代行天子事辛巳崩年百一十八在位九十八年其仁如天其知如神就之如日望之如雲富而不驕貴而不舒黃收純衣徐廣曰純一作絞駰案太古冠冕圖云夏名冕曰收禮記曰野夫黃冠鄭𤣥曰純衣士之祭服彤車乘白馬能明馴德徐廣曰馴古訓字以親九族九族既睦便章百姓徐廣曰下云便程東作然則訓平為便也駰案尚書並作平字孔安國曰百姓百官鄭𤣥曰百姓羣臣之父子兄弟百姓昭明合和萬國乃命羲和孔安國曰重黎之後羲氏和氏世掌天地之官敬順昊天數法日月星辰敬授民時分命羲仲居郁夷曰暘谷尚書作嵎夷孔安國曰東表之地稱嵎夷日出於暘谷羲仲治東方之官敬道日出便程東作孔安國曰敬道出日平均次序東作之事以務農也日中星鳥以殷中春孔安國曰日中謂春分之日也鳥南方朱鳥七宿也殷正也春分之昏鳥星畢見以正仲春之氣節轉以推孟季則可知也其民析鳥獸字微孔安國曰春事既起丁壯就功言其民老壯分析也乳化曰字尚書微作尾字說文云尾交接也申命羲叔居南交孔安國曰夏與春交此治南方之官也便程南訛敬致孔安國曰訛化也平序分南方化育之事敬行其教以致其功也日永星火以正中夏孔安國曰永長也謂夏至之日火蒼龍之中星舉中則七星見可知也以正中夏之節馬融王肅謂日長晝漏六十刻鄭𤣥曰五十五刻其民因鳥獸希革孔安國曰因謂老弱因就在田之丁壯以助農也夏時鳥獸毛羽希少改易也革改也申命和仲居西土徐廣曰一無土字以為西者今天水之西縣也駰案鄭𤣥曰西者隴西之西今人謂之兌山曰昧谷徐廣曰一作柳谷駰案孔安國曰日入于谷而天下冥故曰昧谷此居治西方之官掌秋天之政也敬道日入便程西成孔安國曰秋西方萬物成也夜中星虛以正中秋孔安國曰春言日秋言夜互相備也虛𤣥武之中星亦言七星皆以秋分日見以正三秋也其民夷鳥獸毛毨孔安國曰夷平也老壯者在田與夏平也毨理也毛更生曰整理申命和叔居北方曰幽都孔安國曰北稱幽都謂所聚也便在伏物日短星昴以正中冬孔安國曰日短冬至之日也昴白虎之中星亦以七星竝見以正冬節也馬融王肅謂日短晝漏四十刻鄭𤣥曰四十五刻其民燠鳥獸氄毛徐廣曰氄音茸駰案孔安國曰民入室處鳥獸皆生氄毳細毛以自溫也歲三百六十六日以閏月正四時信飭徐廣曰古勑字百官衆功皆興堯曰誰可順此事放齊曰嗣子丹朱開明孔安國曰放齊臣名堯曰吁頑凶不用孔安國曰吁疑怪之辭堯又曰誰可者歡兜曰共工旁聚布功可用孔安國曰歡兜臣名鄭𤣥曰共工水官名堯曰共工善言其用僻似恭漫天不可堯又曰嗟四嶽鄭𤣥曰四嶽四時官主方嶽之事湯湯洪水滔天浩浩懷山襄陵孔安國曰懷包襄上也下民其憂有能使治者皆曰鯀可馬融曰鯀臣名禹父堯曰鯀負命毁族不可嶽曰异哉試不可用而已堯於是聽嶽用鯀九歲功用不成堯曰嗟四嶽朕在位七十載汝能庸命踐朕位鄭𤣥曰言汝諸侯之中有能順事用天命者入處我位統治天子之事者乎嶽應曰鄙德忝帝位堯曰悉舉貴戚及疏遠隱匿者衆皆言於堯曰有矜在民間曰虞舜孔安國曰無妻曰矜堯曰然朕聞之其何如嶽曰曰盲者子父頑母嚚弟傲能和以孝蒸蒸治不至姦孔安曰不至於姦惡堯曰吾其試哉於是堯妻之二女觀其德於二女舜飭下二女於媯汭孔安國曰舜所居媯水之汭如婦禮堯善之乃使舜慎和五典鄭𤣥曰五典五教也蓋試以司徒之職五典能從乃遍入百官百官時序賓於四門四門穆穆諸侯遠方賓客皆敬馬融曰四門四方之門諸侯羣臣朝者舜賓迎之皆有美德也堯使舜入山林川澤暴風雷雨舜行不迷堯以為聖召舜曰女謀事至而言可績三年矣鄭𤣥曰三年者賔四門之後三年也女登帝位舜讓於德不懌徐廣曰音亦今文尚書作不怡怡懌也正月上日馬融曰上日朔日也舜受終於文祖文祖者堯太祖也鄭𤣥曰文祖者五府之大名猶周之眀堂於是帝堯老命舜攝行天子之政以觀天命舜乃在璿璣玉衡以齊七政鄭𤣥曰璿璣玉衡渾天儀也七政日月五星也遂類於上帝鄭𤣥曰禮祭上帝于圜丘禋于六宗鄭𤣥曰六宗星辰司中司命風師雨師也駰案六宗義衆矣愚謂鄭說為長望於山川辨於羣神徐廣曰辨音班駰案鄭𤣥曰羣神若丘陵墳衍揖五瑞擇吉月日見四嶽諸牧班瑞馬融曰揖斂也五瑞公侯伯子男所執以為瑞信也堯將禪舜使羣牧斂之使舜親往班之歲二月東巡狩至于岱宗祡馬融曰舜受終後五年之二月鄭𤣥曰建卯之月也祡祭東嶽者考績祡燎也望秩於山川遂見東方君長合時月正日鄭𤣥曰協正四時之月數及日名備有失誤同律度量衡鄭𤣥曰律音律度丈尺量斗斛衡斤兩也修五禮馬融曰吉凶賔軍嘉也五玉鄭𤣥曰即五瑞也執之曰瑞陳列曰玉三帛馬融曰三孤所執也鄭𤣥曰帛所以薦玉也必三者髙陽氏後用赤繒髙辛氏後用黑繒其餘諸侯皆用白繒二生一死為摯馬融曰摯二生羔雁卿大夫所執一死雉士所執如五器卒乃復馬融曰五器上五玉五玉禮終則還之三帛以下不還五月南巡狩八月西巡狩十一月北巡狩皆如初歸至于祖禰廟用特牛禮五歲一巡狩羣后四朝鄭𤣥曰巡狩之年諸侯見於方嶽之下其間四年四方諸侯分來朝于京師也遍告以言明試以功車服以庸肇十有二州決川馬融曰禹平水上置九州舜以冀州之北廣大分置并州燕齊遼逺分燕置幽州分齊為營州於是為十二州也鄭𤣥曰更為之定界濟水害也象以典刑馬融曰言咎繇制五常之刑無犯之者但有其象無其人也流宥五刑馬融曰流放宥寬也一曰幼少二曰老耄三曰蠢愚五刑墨劓剕宫大辟鞭作官刑馬融曰為辨治官事者為刑撲作教刑鄭𤣥曰撲價楚也撲為教官為刑者金作贖刑馬融曰金黃金也意善功惡使出金贖罪坐示戒慎者眚烖過赦鄭𤣥曰眚烖為人作患害者也過失雖有害則赦之怙終徐廣曰一作衆賊刑鄭𤣥曰怙其姦邪終身以為殘賊則用刑之欽哉欽哉惟刑之靜哉徐廣曰今文云惟刑之謐哉爾雅曰謐靜也歡兜進言共工堯曰不可而試之工師共工果淫辟四嶽舉鯀治鴻水堯以為不可嶽強請試之試之而無功故百姓不便三苗馬融曰國名也在江淮荆州數為亂於是舜歸而言於帝請流共工于幽陵馬融曰北裔也以變北狄徐廣曰變一作燮放歡兜于崇山馬融曰南裔也以變南蠻遷三苗于三危馬融曰西裔也以變西戎殛鯀于羽山馬融曰殛誅也羽山東裔也以變東夷四罪而天下咸服堯立七十年得舜二十年而老令舜攝行天子之政薦之於天堯辟位凡二十八年而崩徐廣曰堯在位凡九十八年駰案皇覽曰堯冢在濟隂城陽劉向曰堯葬濟隂丘隴山吕氏春秋曰堯葬穀林皇甫謐曰穀林即城陽堯都平陽於詩為唐國百姓悲哀如喪父母三年四方莫舉樂以思堯堯知子丹朱之不肖不足授天下於是乃權授舜授舜則天下得其利而丹朱病授丹朱則天下病而丹朱得其利堯曰終不以天下之病而利一人而卒授舜以天下堯崩三年之喪畢舜讓辟丹朱於南河之南劉熙曰南河九河之最在南者諸侯朝覲者不之丹朱而之舜獄訟者不之丹朱而之舜謳歌者不謳歌丹朱而謳歌舜舜曰天也夫而後之中國踐天子位焉劉熙曰天子之位不可曠年於是遂反格于文祖而當帝位帝王所都為中故曰中國是為帝舜虞舜者諡法曰仁聖盛明曰舜名曰重華徐廣曰皇甫謐曰舜以堯之二十一年甲子生三十一年甲午徵用七十九年壬午即真百歲癸卯崩重華父曰瞽叟瞽叟父曰橋牛橋牛父曰句望句望父曰敬康敬康父曰窮蟬窮蟬父曰帝顓頊顓頊父曰昌意以至舜七世矣自從窮蟬以至帝舜皆微為庶人舜父瞽叟盲而舜母死瞽叟更娶妻而生象象傲瞽叟愛後妻子常欲殺舜舜避逃及有小過則受罪順事父及後母與弟日以篤謹匪有解舜冀州之人也舜耕厯山鄭𤣥曰在河東漁雷澤鄭𤣥曰雷夏兖州澤今屬濟隂陶河濱皇甫謐曰濟隂定陶西南陶丘亭是也作什器於夀丘皇甫謐曰在魯東門之北就時於負夏鄭𤣥曰負夏衛地舜父瞽叟頑母嚚弟象傲皆欲殺舜舜順適不失子道兄弟孝慈欲殺不可得即求常在側舜年二十以孝聞三十而帝堯問可用者四嶽咸薦虞舜曰可於是堯乃以二女妻舜以觀其內使九男與處以觀其外舜居媯汭內行彌謹堯二女不敢以貴驕事舜親戚甚有婦道堯九男皆益篤舜耕厯山厯山之人皆讓畔漁雷澤雷澤上人皆讓居陶河濱河濱器皆不苦窳史記音義曰音遊甫反駰謂窳病也一年而所居成聚二年成邑三年成都堯乃賜舜絺衣與琴為築倉廩子牛羊瞽叟尚復欲殺之使舜上塗廩瞽叟從下縱火焚廩舜乃以兩笠自扞而下去得不死後瞽叟又使舜穿井舜穿井為匿空旁出舜既入深瞽叟與象共下土實井舜從匿空出去劉熙曰舜以權謀自免亦大聖冇神人之助也瞽叟象喜以舜為己死象曰本謀者象象與其父母分於是曰舜妻堯二女與琴象取之牛羊倉廩豫父母象乃止舜宫居鼓其琴舜往見之象鄂不懌曰我思舜正鬱陶舜曰然爾其庶矣舜復事瞽叟愛弟彌謹於是堯乃試舜五典百官皆治昔髙陽氏有才子八人名見左傳世得其利謂之八愷賈逵曰愷和也髙辛氏有才子八人名見左傳世謂之八元賈逵曰元善也此十六族者世濟其美不隕其名至於堯堯未能舉舜舉八愷使主后土王肅曰君治九土之宜杜預曰后土地也以揆百事莫不時序舉八元使布五教於四方父義母慈兄友弟恭子孝內平外成昔帝鴻氏有不才子賈逵曰帝鴻黃帝也不才子其苗裔歡兜也掩義隱賊好行凶慝天下謂之渾沌少皞氏服䖍曰金天氏帝號有不才子毁信惡忠崇飾惡言天下謂之窮竒服䖍曰謂共工氏也其行窮而好竒顓頊氏有不才子不可教訓不知話言天下謂之檮杌賈逵曰檮杌頑凶無疇匹之貌謂鯀也此三族世憂之至于堯堯未能去縉雲氏賈逵曰縉雲氏姜姓也炎帝之苗裔當黃帝時在縉雲之官也有不才子貪於飲食冒於貨賄天下謂之叨餮天下惡之比之三凶杜預曰非常子孫故别之以比三凶也舜賓于四門乃流四凶族遷于四裔賈逵曰四裔之地去王城四千里以御螭魅服䖍曰魑魅人面獸身四足好惑人山林異氣所生以為人害於是四門辟言毋凶人也舜入于大麓烈風雷雨不迷堯乃知舜之足授天下堯老使舜攝行天子政巡狩舜得舉用事二十年而堯使攝政攝政八年而堯崩三年喪畢讓丹朱天下歸舜而禹皋陶契后稷伯夷䕫龍垂益彭祖自堯時而皆舉用未有分職於是舜乃至於文祖謀于四嶽辟四門明通四方耳目命十二牧論帝德行厚德遠佞人則蠻夷率服舜謂四嶽曰有能奮庸馬融曰奮明庸功也美堯之事者使居官相事皆曰伯禹為司空可美帝功舜曰嗟然禹汝平水土維是勉哉禹拜稽首讓於稷契與皋陶舜曰然往矣鄭𤣥曰然其舉得其人汝往居此官不聽其所讓也舜曰棄黎民始飢徐廣曰今文尚書作祖飢祖始也汝后稷播時百穀鄭𤣥曰時讀曰蒔舜曰契百姓不親五品不馴鄭𤣥曰五品父母兄弟子也王肅曰五品五常也汝為司徒而敬敷五教在寬馬融曰五品之教舜曰皋陶蠻夷猾夏鄭𤣥曰猾夏侵亂中國也寇賊姦軌鄭𤣥曰由內為姦起外為軌汝作士馬融曰獄官之長五刑有服五服三就馬融曰五刑墨劓剕宫大辟三就謂大罪陳諸原野次罪於市朝同族適甸師氏既服五刑當就三處五流有度五度三居維明能信馬融曰謂在八議君不忍刑宥之以遠五等之差亦有三等之居大罪投四裔次九州之外次中國之外當明其罪能使信服之舜曰誰能馴豫工馬融曰謂主百工之官也皆曰垂可於是以垂為共工馬融曰為司空共理百工之事舜曰誰能馴豫上下馬融曰上謂原下謂隰草木鳥獸皆曰益可於是以益為朕虞馬融曰虞掌山澤之官名益拜稽首讓于諸臣朱虎熊羆舜曰往矣汝諧遂以朱虎熊羆為佐舜曰嗟四嶽有能典朕三禮馬融曰三禮天神地祗人鬼之禮也鄭𤣥曰天事地事人事之禮也皆曰伯夷可舜曰嗟伯夷以汝為秩宗鄭𤣥曰主次秩尊卑夙夜維敬直哉維靜潔伯夷讓䕫龍舜曰然以䕫為典樂教稚子鄭𤣥曰國子也案尚書作胄子孔安國曰稚胄聲相近直而溫馬融曰正直而色溫和寬而栗馬融曰寬大而敬謹戰栗也剛而毋虐簡而毋傲詩言意歌長言馬融曰歌所以長言詩之意也聲依詠律和聲鄭𤣥曰聲之曲折又依長言聲中律乃為和也八音能諧毋相奪倫神人以和鄭𤣥曰祖考來格羣后德讓其一隅也䕫曰於豫擊石拊石百獸率舞鄭𤣥曰百獸服不氏所養者也率舞言音和也舜曰龍朕畏忌讒說殄僞振驚朕衆徐廣曰一云齊說殄行振驚衆駰案鄭𤣥曰所謂色取仁而行違是驚動我之衆臣使之疑惑命汝為納言夙夜出入朕命惟信舜曰嗟女二十有二人馬融曰稷契皋陶皆居官久有成功但述而美之無所復勑禹及垂已下皆初命凡六人與上十二牧四嶽凡二十二人鄭𤣥曰皆格于文祖時所勑命也敬哉惟時相天事三歲一考功三考絀陟遠近衆功咸興分北三苗鄭𤣥曰所竄三苗為西裔諸侯者猶為惡乃復分析流之此二十二人咸成厥功皋陶為大理平民各伏得其實伯夷主禮上下咸讓垂主工師百工致功益主虞山澤辟棄主稷百穀時茂契主司徒百姓親和龍主賓客遠人至十二牧行而九州莫敢辟違唯禹之功為大披九山通九澤決九河定九州各以其職來貢不失厥宜方五千里至于荒服南撫交址北發西戎析枝渠廋氐羌北山戎發息愼鄭𤣥曰息慎或謂之肅慎東北夷東長鳥夷四海之內咸戴帝舜之功於是禹乃興九招之樂致異物鳯皇來翔天下明德皆自虞帝始舜年二十以孝聞年三十堯舉之年五十攝行天子事年五十八堯崩年六十一代堯踐帝位皇甫謐曰舜所都或言蒲坂或言平陽或言潘潘今上谷也踐帝位三十九年南巡狩崩於蒼梧之野葬於江南九疑是為零陵皇覽曰舜冢在零陵營浦縣其山九溪皆相似故曰九疑傳曰舜葬蒼梧象為之耕禮記曰舜葬蒼梧二妃不從山海經曰蒼梧山帝舜葬于陽丹朱葬于隂皇甫謐曰或曰二妃葬衡山舜之踐帝位載天子旗往朝父瞽叟䕫䕫唯謹徐廣曰和敬貌如子道封弟象為諸侯孟子曰封之有庳音鼻舜子商均亦不肖皇甫謐曰娥皇無子女英生商均舜乃豫薦禹於天十七年而崩三年喪畢禹亦乃讓舜子如舜讓堯子諸侯歸之然后禹踐天子位堯子丹朱舜子商均皆有疆土譙周曰以唐封堯之子以虞封舜之子以奉先祀服其服禮樂如之以客見天子天子弗臣示不敢專也自黃帝至舜禹皆同姓而異其國號以章明德徐廣曰外傳曰黃帝二十五子其得姓者十四人虞翻云以德為氏姓又虞說以凡有二十五人其二人同姓姬又十一人為十一姓酉祁已滕葴任荀釐姞嬛衣是也餘十二姓德薄不紀録故黃帝為有熊帝顓頊為髙陽帝嚳為髙辛帝堯為陶唐韋昭曰陶唐皆國名猶湯稱殷商矣張晏曰堯為唐侯國於中山唐縣是也帝舜為有虞皇甫謐曰舜嬪于虞因以為氏今河東大陽西山上虞城是也帝禹為夏后而别氏姓姒氏契為商姓子氏棄為周姓姬氏鄭𤣥曰駮許慎五經異義曰春秋左傳無駭卒羽父請諡與族公問族於衆仲衆仲對曰天子建德因生以賜姓胙之土而命之氏諸侯以字為氏因以為族官有世功則冇官族邑亦如之公命以字為展氏以此言之天子賜姓命氏諸侯命族族者氏之别名也姓者所以統繫百世使不别也氏者所以别子孫之所出故世本之篇言姓則在上言氏則在下也太史公曰學者多稱五帝尚矣然尚書獨載堯以來而百家言黃帝其文不雅馴薦紳先生難言之徐廣曰薦紳即搢紳也古字假借孔子所傳宰豫問五帝德及帝繫姓儒者或不傳余嘗西至空峒北過涿鹿東漸於海南浮江淮矣至長老皆各往往稱黃帝堯舜之處風教固殊焉總之不離古文者近是豫觀春秋國語其發明五帝德帝繫姓章矣顧弟弗深考徐廣曰弟但也史記漢書見此者非一又左思蜀都賦曰弟如滇池而不詳者多以為字誤學者安可不博觀乎其所表見皆不虛書缺有間矣其軼乃時時見於他說非好學深思心知其意固難為淺見寡聞道也余并論次擇其言尤雅者故著為本紀書首史記集解卷一
