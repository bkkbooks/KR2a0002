body:
  text: 史記集解卷八十五宋裴駰撰史記八十五呂不韋列傳第二十五呂不韋者陽翟大賈人也往來販賤賣貴徐廣曰一本云陽翟大賈也往來賤買貴賣也家纍千金秦昭王四十年太子死其四十二年以其次子安國君為太子安國君有子二十餘人安國君有所甚愛姬立以為正夫人號曰華陽夫人華陽夫人無子安國君中男名子楚子楚母曰夏姬母愛子楚為秦質子於趙秦數攻趙趙不甚禮子楚子楚秦諸庶孽孫質於諸侯車乘進用不饒居處困不得意呂不韋賈邯鄲見而憐之曰此竒貨可居以子楚方財貨也乃往見子楚説曰吾能大子之門子楚笑曰且自大君之門而乃大吾門呂不韋曰子不知也吾門待子門而大子楚心知所謂乃引與坐深語呂不韋曰秦王老矣安國君得為太子竊聞安國君愛幸華陽夫人華陽夫人無子能立適嗣者獨華陽夫人耳今子兄弟二十餘人子又居中不甚見幸久質諸侯即大王薨安國君立為王則子無幾得與長子及諸子旦暮在前者爭為太子矣子楚曰然為之奈何呂不韋曰子貧客於此非有以奉獻於親及結賓客也不韋雖貧請以千金為子西遊事安國君及華陽夫人立子為適嗣子楚乃頓首曰必如君策請得分秦國與君共之呂不韋乃以五百金與子楚為進用結賓客而復以五百金買竒物玩好自奉而西遊秦求見華陽夫人姊而皆以其物獻華陽夫人因言子楚賢智結諸侯賓客遍天下常曰楚也以夫人為天日夜泣思太子及夫人夫人大喜不韋因使其姊説夫人曰吾聞之以色事人者色衰而愛弛今夫人事太子甚愛而無子不以此時早自結於諸子中賢孝者舉立以為適而子之夫在則重尊夫百歲之後所子者為王終不失勢此所謂一言而萬世之利也不以繁華時樹本即色衰愛弛後雖欲開一語尚可得乎今子楚賢而自知中男也次不得為適其母又不得幸自附夫人夫人誠以此時拔以為適夫人則竟世有寵於秦矣華陽夫人以為然承太子間從容言子楚質於趙者絶賢來往者皆稱譽之乃因涕泣曰妾幸得充後宮不幸無子願得子楚立以為適嗣以託妾身安國君許之乃與夫人刻玉符約以為適嗣安國君及夫人因厚餽遺子楚而請呂不韋傅之子楚以此名譽益盛於諸侯呂不韋取邯鄲諸姬絶好善舞者與居知有身子楚從不韋飲見而説之因起為夀請之呂不韋怒念業已破家為子楚欲以釣竒乃遂獻其姬姬自匿有身至大期時徐廣曰期十二月也生子政子楚遂立姬為夫人秦昭王五十年使王齮圍邯鄲急趙欲殺子楚子楚與呂不韋謀行金六百斤豫守者吏得脫亡赴秦軍遂以得歸趙欲殺子楚妻子子楚夫人趙豪家女也得匿以故母子竟得活秦昭王五十六年薨太子安國君立為王華陽夫人為王后子楚為太子趙亦奉子楚夫人及子政歸秦秦王立一年薨諡為孝文王太子子楚代立是為莊襄王莊襄王所飬母華陽后為華陽太后真母夏姬尊以為夏太后莊襄王元年以呂不韋為丞相封為文信侯食河南雒陽十萬户莊襄王即位三年薨太子政立為王徐廣曰時年十三尊呂不韋為相國號稱仲父秦王年少太后時時竊私通呂不韋不韋家僮萬人當是時魏有信陵君楚有春申君趙有平原君齊有孟嘗君皆下士喜賓客以相傾呂不韋以秦之強羞不如亦招致士厚遇之至食客三千人是時諸侯多辨士如荀卿之徒著書布天下呂不韋乃使其客人人著所聞集論以為八覽六論十二紀二十餘萬言以為備天地萬物古今之事號曰呂氏春秋布咸陽市門懸千金其上延諸侯遊士賓客有能增損一字者豫千金始皇帝益壯太后淫不止呂不韋恐覺禍及己乃私求大隂人嫪毐以為舍人時縱倡樂使毐以其隂關桐輪而行令太后聞之以啖太后太后聞果欲私得之呂不韋乃進嫪毐詐令人以腐罪告之不韋又隂謂太后曰可事詐腐則得給事中太后乃隂厚賜主腐者吏詐論之拔其鬚眉為宦者遂得侍太后太后私與通絶愛之有身太后恐人知之詐卜當避時徙宮居雍嫪毐常從賞賜甚厚事皆決於嫪毐嫪毐家僮數千人諸客求宦為嫪毐舍人千餘人始皇七年莊襄王母夏太后薨孝文王后曰華陽太后與孝文王會葬夀陵夏太后子莊襄王葬芷陽故夏太后獨别葬杜東曰東望吾子西望吾夫後百年旁當有萬家邑始皇九年有告嫪毐實非宦者常與太后私亂生子二人皆匿之與太后謀曰王即薨以子為後説苑曰毐與侍中左右貴臣博飲酒醉爭言而鬭瞋目大叱曰吾乃皇帝假父也窶人子何敢乃與我亢所與鬭者走行白始皇於是秦王下吏治具得情實事連相國呂不韋九月夷嫪毐三族殺太后所生兩子而遂遷太后於雍諸嫪毐舍人皆沒其家而遷之蜀王欲誅相國為其奉先王功大及賓客辨士為遊説者衆王不忍致法秦王十年十月免相國呂不韋及齊人茅焦説秦王秦王乃迎太后於雍歸復咸陽徐廣曰入南宮而出文信侯就國河南歲餘諸侯賓客使者相望於道請文信侯秦王恐其為變乃賜文信侯書曰君何功於秦秦封君河南食十萬户君何親於秦號稱仲父其與家屬徙處蜀呂不韋自度稍侵恐誅乃飲鴆而死徐廣曰十二年駰案皇覽曰不韋家在河南洛陽北邙道西大冢是也民傳言呂母冢不韋妻先葬故其冢名呂母也秦王所加怒呂不韋嫪毐皆已死乃皆復歸嫪毐舍人遷蜀者始皇十九年太后薨諡為帝太后與莊襄王會葬茞陽徐廣曰作芷陽太史公曰不韋及嫪毐貴封號文信侯人之告嫪毐毐聞之秦王驗左右未發上之雍郊毐恐禍起乃與黨謀矯太后璽發卒以反蘄年宮發吏攻毐毐敗亡走追斬之好畤遂滅其宗而呂不韋由此絀矣孔子之所謂聞者其呂子乎論語曰夫聞也者色取仁而行違居之不疑在邦必聞在家必聞馬融曰此言佞人也史記集解卷八十五
