body:
  text: 史記集解卷九宋裴駰撰史記九吕后本紀第九吕太后者徐廣曰吕后父吕公漢元年為臨泗侯四年卒髙后元年追諡曰吕宣王髙祖微時妃也漢書音義曰諱雉生孝惠帝漢書音義曰諱盈女魯元太后及髙祖為漢王得定陶戚姬如淳曰姬音怡衆妾之總稱也漢官曰姬妾數百蘇林曰清河國有妃里而題門作姬瓚曰漢秋祿令及茂陵書姬內官也秩比二千石位次倢妤下在七子八子之上愛幸生趙隱王如意孝惠為人仁弱髙祖以為不類我常欲廢太子立戚姬子如意如意類我戚姬幸常從上之關東日夜啼泣欲立其子代太子吕后年長常留守希見上益疏如意立為趙王後幾代太子者數矣賴大臣爭之及留侯策太子得母廢吕后為人剛毅佐髙祖定天下所誅大臣多吕后力吕后兄二人皆為將長兄周吕侯徐廣曰名澤髙祖八年卒諡令武侯追諡曰悼武王死事封其子吕台為酈侯徐廣曰酈一作鄜子産為交侯徐廣曰台弟也次兄吕釋之為建成侯徐廣曰惠帝二年卒諡康王髙祖十二年四月甲辰崩長樂宫太子襲號為帝是時髙祖八子長男肥孝惠兄也異母肥為齊王餘皆孝惠弟戚姬子如意為趙王薄夫人子恆為代王諸姬子恢為梁王子友為淮陽王子長為淮南王子建為燕王髙祖弟交為楚王兄子濞為吳王非劉氏功臣番君吳芮子臣為長沙王吕后最怨戚夫人及其子趙王乃令永巷如淳曰列女傳曰周宣薑后脫簮珥待罪永巷後改為掖庭囚戚夫人而召趙王使者三反趙相建平侯周昌謂使者曰髙帝屬臣趙王趙王年少竊聞太后怨戚夫人欲召趙王并誅之臣不敢遣王王且亦病不能奉詔吕太后大怒乃使人召趙相趙相徵至長安乃使人復召趙王王來未到孝惠帝慈仁知太后怒自迎趙王霸上與入宫自挾與趙王起居飲食太后欲殺之不得間孝惠元年十二月帝晨出射趙王少不能早起太后聞其獨居使人持鴆飲之應劭曰鴆鳥食蝮以其羽畫酒中飲之立死犁明孝惠還徐廣曰犁猶比也諸言犁明者將明之時趙王已死於是乃徙淮陽王友為趙王夏詔賜酈侯父追諡為令武侯太后遂斷戚夫人手足去眼輝耳飲瘖藥使居廁中命曰人彘居數日乃召孝惠帝觀人彘孝惠見問知其戚夫人乃大哭因病歲餘不能起使人請太后曰此非人所為臣為太后子終不能治天下孝惠以此日飲為淫樂不聽政故有病也二年楚元王齊悼惠王皆來朝十月孝惠與齊王燕飲太后前孝惠以為齊王兄置上坐如家人之禮太后怒乃令酌兩巵鴆置前令齊王起為夀齊王起孝惠亦起取巵欲俱為夀太后乃恐自起泛孝惠巵齊王怪之因不敢飲詳醉去問知其鴆齊王恐自以為不得脫長安憂齊內史士徐廣曰一作出説王曰太后獨有孝惠與魯元公主如淳曰公羊傳曰天子嫁女於諸侯必使諸侯同姓者主之故謂之公主百官表列侯所食曰國皇后公主所食曰邑諸侯王女曰公主蘇林曰公五等尊爵也春秋聽臣子以稱君父婦人稱主有主孟啖我之比故云公主瓚曰天子之女雖食湯沐之邑不君其民今王冇七十餘城而公主乃食數城王誠以一郡上太后為公主湯沐邑太后必喜王必無憂於是齊王乃上城陽之郡尊公主為王太后如淳曰張敖子偃為魯王故公主得為太后吕后喜許之乃置酒齊邸樂飲罷歸齊王三年方築長安城四年就半五年六年城就諸侯來會十月朝賀七年秋八月戊寅孝惠帝崩皇甫謐曰帝以秦始皇三十七年生崩時年二十二發喪太后哭泣不下留侯子張辟強為侍中應劭曰入侍天子故曰侍中年十五謂丞相曰太后獨有孝惠今崩哭不悲君知其解乎丞相曰何解辟強曰帝母壯子太后畏君等君今請拜吕台吕産吕祿為將將兵居南北軍及諸吕皆入居宫中用事如此則太后心安君等幸得脫禍矣丞相乃如辟強計太后説其哭乃哀吕氏權由此起乃大赦天下九月辛丑葬漢書云葬安陵皇覽曰山髙三十二丈廣袤百二十步居地六十畝皇甫謐曰去長陵十里去長安北三十五里太子即位為帝謁髙廟元年號令一出太后太后稱制議欲立諸吕為王問右丞相王陵王陵曰髙帝刑白馬盟曰非劉氏而王天下共擊之今王吕氏非約也太后不説問左丞相陳平絳侯周勃勃等對曰髙帝定天下王子弟今太后稱制王昆弟諸吕無所不可太后喜罷朝王陵讓陳平絳侯曰始與髙帝喋血盟諸君不在邪今髙帝崩太后女主欲王吕氏諸君縱欲阿意背約何面目見髙帝地下陳平絳侯曰於今面折廷爭臣不如君夫全社稷定劉氏之後君亦不如臣王陵無以應之十一月太后欲廢王陵乃拜為帝太傅應劭曰古官傅者覆也瓚曰大戴禮曰傳之德義奪之相權王陵遂病免歸乃以左丞相平為右丞相以辟陽侯審食其為左丞相左丞相不治事令監宫中如郎中令食其故得幸太后常用事公卿皆因而決事乃追尊酈侯父為悼武王欲以王諸吕為漸四月太后欲侯諸吕乃先封髙祖之功臣郎中令無擇徐廣曰姓馮為博城侯魯元公主薨賜諡為魯元太后子偃為魯王魯王父宣平侯張敖也封齊悼惠王子章為朱虛侯以吕祿女妻之齊丞相夀為平定侯徐廣曰姓齊少府延為梧侯徐廣曰姓陽成也延以軍匠起作宫築城也乃封吕種為沛侯徐廣曰釋之之子也吕平為扶柳侯徐廣曰吕后姊子也母字長姁張買為南宫侯徐廣曰其父越人為髙祖騎將太后欲王吕氏先立孝惠後宫子強為淮陽王韋昭曰今陳留郡子不疑為常山王子山為襄成侯子朝為軹侯子武為壺關侯太后封大臣大臣請立酈侯吕台為吕王太后許之建成康侯釋之卒嗣子有罪廢立其弟吕祿徐廣曰釋之少子為胡陵侯續康侯後二年常山王薨以其弟襄成侯山為常山王更名義十一月吕王台薨諡為肅王太子嘉代立為王三年無事漢書云秋星晝見四年封吕􅎐為臨光侯吕他為俞侯吕更始為贅其侯徐廣曰表云吕后弟子淮陽丞相吕勝為贅其侯吕忿為吕成侯及諸侯丞相五人徐廣曰中邑侯朱通山都侯王恬開松兹侯徐厲滕侯吕更始醴陵侯越宣平侯女為孝惠皇后時無子詳為有身取美人子名之殺其母立所名子為太子孝惠崩太子立為帝帝壯或聞其母死非真皇后子乃出言曰后安能殺吾母而名我我未壯壯即為變太后聞而患之恐其為患乃幽之永巷中言帝病甚左右莫得見太后曰凡有天下治為萬民命徐廣曰一無此字者蓋之如天容之如地上有歡心以安百姓百姓欣然以事其上歡欣交通而天下治今皇帝病久不已乃失惑惛亂不能繼嗣奉宗廟祭祀不可屬天下其代之羣臣皆頓首言皇太后為天下齊民計所以安宗廟社稷甚深羣臣頓首奉詔帝廢位太后幽殺之五月丙辰立常山王義為帝更名曰宏不稱元年者以太后制天下事也以軹侯朝為常山王置太尉官絳侯勃為太尉五年八月淮陽王薨以弟壺關侯武為淮陽王六年十月太后曰吕王嘉居處驕恣廢之以肅王台弟吕産為吕王夏赦天下封齊悼惠王子興居為東牟侯七年正月太后召趙王友友以諸吕女為后弗愛愛他姬諸吕女妬怒去讒之於太后誣以罪過曰吕氏安得王太后百歲後吾必擊之太后怒以故召趙王趙王至置邸不見令衛圍守之弗與食其羣臣或竊饋輒捕論之趙王餓乃歌曰諸吕用事兮劉氏危迫脅王侯兮強授我妃我妃既妬兮誣我以惡讒女亂國兮上曾不寤我無忠臣兮何故棄國自決中野兮蒼天舉直徐廣曰舉一作與于嗟不可悔兮寧早自財為王而餓死兮誰者憐之吕氏絶理兮託天報讎丁丑趙王幽死以民禮葬之長安民冢次己丑日食晝晦太后惡之心不樂乃謂左右曰此為我也二月徙梁王恢為趙王吕王産徙為梁王梁王不之國為帝太傅立皇子平昌侯太為吕王更名梁曰吕吕曰濟川太后女弟吕􅎐有女為營陵侯劉澤妻澤為大將軍太后王諸吕恐即崩後劉將軍為害乃以劉澤為琅邪王以慰其心梁王恢之徙王趙心懷不樂太后以吕産女為趙王后王后從官皆諸吕擅權微伺趙王趙王不得自恣王有所愛姬王后使人鴆殺之王乃為歌詩四章令樂人歌之王悲六月即自殺太后聞之以為王用婦人棄宗廟禮廢其嗣宣平侯張敖卒以子偃為魯王敖賜諡為魯元王秋太后使使告代王欲徙王趙代王謝願守代邊太傅産丞相平等言武信侯吕祿徐廣曰吕后兄子也前封胡陵侯益號曰武信上侯位次第一如淳曰功大者位在上功臣侯表冇第一第二之次也請立為趙王太后許之追尊祿父康侯為趙昭王九月燕靈王建薨有美人子太后使人殺之無後國除八年十月立吕肅王子東平侯吕通為燕王封通弟吕莊為東平侯三月中吕后祓還過軹道見物如蒼犬據徐廣曰音戟髙后掖忽弗復見卜之云趙王如意為祟髙后遂病掖傷髙后為外孫魯元王偃年少蚤失父母孤弱乃封張敖前姬兩子侈為新都侯夀為樂昌侯徐廣曰今細陽之池陽鄉以輔魯元王偃及封中大謁者張釋為建陵侯徐廣曰一云張釋卿駰案如淳曰百官表謁者掌賔贊受事灌嬰為中謁者後常以奄人為之諸官加中者多奄人也吕榮為祝兹侯徐廣曰吕后昆弟子諸中宦者令丞皆為關內侯食邑五百户如淳曰列侯出關就國關內侯但爵其身有加異者與關內之邑食其租稅也風俗通義曰秦時六國未平將帥皆家關中故稱關內侯七月中髙后病甚乃令趙王吕祿為上將軍軍北軍吕王産居南軍吕太后誡産祿曰髙帝已定天下與大臣約曰非劉氏王者天下共擊之今吕氏王大臣弗平我即崩帝年少大臣恐為變必據兵衛宫慎毋送喪毋為人所制辛巳髙后崩遺詔賜諸侯王各千金蔡雍曰皇子封為王者其實古諸侯也加號稱王故謂之諸侯王王子封為侯者謂之諸侯將相列侯郎吏皆以秩賜金大赦天下以吕王産為相國以吕祿女為帝后髙后已葬皇甫謐曰合葬長陵皇覽曰髙帝吕后山各一所也以左丞相審食其為帝太傅朱虛侯劉章有氣力東牟侯興居其弟也皆齊哀王弟居長安當是時諸吕用事擅權欲為亂畏髙帝故大臣絳灌等未敢發朱虛侯婦吕祿女隂知其謀恐見誅乃隂令人告其兄齊王欲令發兵西誅諸吕而立朱虛侯欲從中與大臣為應齊王欲發兵其相弗聽八月丙午齊王欲使人誅相相召平乃反舉兵欲圍王王因殺其相遂發兵東詐奪琅邪王兵并將之而西語在齊王語中齊王乃遺諸侯王書曰髙帝平定天下王諸子弟悼惠王王齊悼惠王薨孝惠帝使留侯良立臣為齊王孝惠崩髙后用事春秋髙聽諸吕擅廢帝更立又比殺三趙王滅梁趙燕以王諸吕分齊為四忠臣進諫上惑亂弗聽今髙后崩而帝春秋富未能治天下固恃大臣諸侯而諸吕又擅自尊官聚兵嚴威劫列侯忠臣矯制以令天下宗廟所以危寡人率兵入誅不當為王者漢聞之相國吕産等乃遣潁陰侯灌嬰將兵擊之灌嬰至滎陽乃謀曰諸吕權兵關中欲危劉氏而自立今我破齊還報此益吕氏之資也乃留屯滎陽使使諭齊王及諸侯與連和以待吕氏變共誅之齊王聞之乃還兵西界待約吕祿吕産欲發亂關中內憚絳侯朱虛等外畏齊楚兵又恐灌嬰畔之欲待灌嬰兵與齊合而發猶豫未決當是時濟川王太淮陽王武常山王朝名為少帝弟及魯元王吕后外孫皆年少未之國居長安趙王祿梁王産各將兵居南北軍皆吕氏之人列侯羣臣莫自堅其命太尉絳侯勃不得入軍中主兵曲周侯酈商老病其子寄與吕祿善絳侯乃與丞相陳平謀使入劫酈商令其子寄往紿説吕祿曰髙帝與吕后共定天下劉氏所立九王吕氏立三王皆大臣之議事已布告諸侯諸侯皆以為宜今太后崩帝少而足下佩趙王印不急之國守藩乃為上將將兵留此為大臣諸侯所疑足下何不歸將印以兵屬太尉請梁王歸相國印與大臣盟而之國齊兵必罷大臣得安足下髙枕而王千里此萬世之利也吕祿信然其計欲歸將印以兵屬太尉使人報吕産及諸吕老人或以為便或曰不便計猶豫未有所決吕祿信酈寄時與出遊獵過其姑吕􅎐􅎐大怒曰若為將而棄軍吕氏今無處矣乃悉出珠玉寶器散堂下曰毋為他人守也左丞相食其免八月庚申旦平陽侯窋行御史大夫事見相國産計事郎中令賈夀使從齊來因數産曰王不蚤之國今雖欲行尚可得邪具以灌嬰與齊楚合從欲誅諸吕告産乃趣産急入宫平陽侯頗聞其語乃馳告丞相太尉太尉欲入北軍不得入襄平侯通尚符節徐廣曰姓紀張晏曰紀信子也尚主也今符節令乃令持節矯內太尉北軍太尉復令酈寄與典客劉揭駰案漢書百官表曰典客秦官也掌諸侯歸義蠻夷先説吕祿曰帝使太尉守北軍欲足下之國急歸將印辭去不然禍且起吕祿以為酈兄徐廣曰音況字也名寄不欺已遂解印屬典客而以兵授太尉大尉將之入軍門行令軍中曰為吕氏右袒為劉氏左袒軍中皆左袒為劉氏太尉行至將軍吕祿亦已解上將印去太尉遂將北軍然尚有南軍平陽侯聞之以吕産謀告丞相平丞相平乃召朱虛侯佐太尉太尉令朱虛侯監軍門令平陽侯告衛尉毋入相國産殿門吕産不知吕祿已去北軍乃入未央宫欲為亂殿門弗得入徘徊往來平陽侯恐弗勝馳語太尉太尉尚恐不勝諸吕未敢訟言誅之徐廣曰訟一作公駰案韋昭曰訟猶公也乃遣朱虛侯謂曰急入宫衛帝朱虛侯請卒太尉豫卒千餘人入未央宫門遂見産廷中日晡時遂擊産産走天風大起以故其從宫亂莫敢鬬逐産殺之郎中府吏廁中如淳曰百官表郎中令掌宫殿門户故其府在宫中後轉為光祿勳也朱虛侯已殺産帝命謁者持節勞朱虛侯朱虛侯欲奪節信謁者不肯朱虛侯則從與載因節信馳走斬長樂衛尉吕更始還馳入北軍報太尉太尉起拜賀朱虛侯曰所患獨吕産今已誅天下定矣遂遣人分部悉捕諸吕男女無少長皆斬之辛酉捕斬吕祿而笞殺吕􅎐使人誅燕王吕通而廢魯王偃壬戌以帝太傅食其復為左丞相戊辰徙濟川王王梁立趙幽王子遂為趙王遣朱虛侯章以誅諸吕氏事告齊王令罷兵灌嬰兵亦罷滎陽而歸諸大臣相與隂謀曰少帝及梁淮陽常山王皆非真孝惠子也吕后以計詐名他人子殺其母養後宫令孝惠子之立以為後及諸王以強吕氏今皆已夷滅諸吕而所置立即長用事吾屬無類矣不如視諸王最賢者立之或言齊悼惠王髙帝長子今其適子為齊王推本言之髙帝適長孫可立也大臣皆曰吕氏以外家惡而幾危宗廟亂功臣今齊王母家駟鈞駟鈞惡人也即立齊王則復為吕氏欲立淮南王以為少母家又惡乃曰代王方今髙帝見子最長仁孝寬厚太后家薄氏謹良且立長故順以仁孝聞於天下便乃相與共陰使人召代王代王使人辭謝再反然後乘六乘傳張晏曰備漢朝有變欲馳還也或曰傳車六乘後九月文穎曰即閏九月也時律厯廢不知閏謂之後九月也以十月為歲首至九月則歲終後九月則閏月晦日己酉至長安舍代邸人臣皆往謁奉天子璽上代王共尊立為天子代王數讓羣臣固請然後聽東牟侯興居曰誅吕氏吾無功請得除宫乃與大僕汝隂侯滕公入宫前謂少帝曰足下非劉氏不當立乃顧麾左右執戟者掊兵罷去徐廣曰掊音仆有數人不肯去兵宦者令張澤諭告亦去兵滕公乃召乘輿車載少帝出蔡雍曰敢盜乘輿服御物天子至尊不敢泄瀆言之故託於乘輿也乘猶載也輿猶車也天子以天下為家不以京師宫室為常處則當乘車輿以行天下故羣臣託乘輿以言之也故或謂之車駕少帝曰欲將我安之乎滕公曰出就舍舍少府乃奉天子法駕蔡雍曰天子有大駕小駕法駕上乘金根車駕六馬有五時副車駕四馬侍中參乘屬車三十六乘迎代王於邸報曰宫謹除代王即夕入未央宫有謁者十人持戟衛端門曰天子在也足下何為者而入代王乃謂太尉太尉往諭謁者十人皆掊兵而去代王遂入而聽政夜有司分部誅滅梁淮陽常山王及少帝於邸代王立為天子二十三年崩諡為孝文皇帝太史公曰孝惠皇帝髙后之時黎民得離戰國之苦君臣俱欲休息乎無為故惠帝垂拱髙后女主稱制政不出房户天下晏然刑罰罕用罪人是希民務稼穯衣食滋殖史記集解卷九
