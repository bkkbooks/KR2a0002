body:
  text: 史記集解卷十七宋裴駰撰史記十七漢興以來諸侯年表第五太史公曰殷以前尚矣周封五等公侯伯子男然封伯禽康叔於魯衛地各四百里親親之義褒有德也太公於齊兼五侯地尊勤勞也武王成康所封數百而同姓五十五地上不過百里下三十里以輔衛王室管蔡康叔曹鄭或過或損厲幽之後王室缺侯伯強國興焉天子微弗能正非德不純形勢弱也漢興序二等韋昭曰漢封功臣大者王小者侯也髙祖末年非劉氏而王者若無功上所不置徐廣曰一云非有功上所置而侯者天下共誅之髙祖子弟同姓為王者九國徐廣曰齊楚荆淮南燕趙梁代淮陽唯獨長沙異姓而功臣侯者百有餘人自鴈門太原以東至遼陽韋昭曰遼東陽縣為燕代國常山以南太行左轉度河濟阿甄以東薄海為齊趙國自陳以西南至九疑東帶江淮榖泗徐廣曰榖水在沛薄會稽為梁楚吳淮南長沙國皆外接於胡越而內地北距山以東盡諸侯地大者或五六郡連城數十置百官宫觀僭於天子漢獨有三河東郡潁川南陽自江陵以西至蜀北自雲中至隴西與內史凡十五郡而公主列侯頗食邑其中何者天下初定骨肉同姓少故廣強庶孽以鎮撫四海用承衛天子也漢定百年之間親屬益疏諸侯或驕奢􅏸邪臣計謀為淫亂大者叛逆小者不軌于法以危其命殞身亡國天子觀於上古然後加惠使諸侯得推恩分子弟國邑故齊分為七徐廣曰城陽濟北濟南災川膠西膠東是分為七趙分為六徐廣曰河間廣川中山常山清河梁分為五徐廣曰濟陽濟川濟東山陽也淮南分三徐廣曰廬江衡山及天子支庶子為王王子支庶為侯百有餘焉吳楚時前後諸侯或以適削地是以燕代無北邊郡吳淮南長沙無南邊郡如淳曰長沙之南更置郡燕代以北更置緣邊郡其所有饒利兵馬器械三國皆失之也齊趙梁楚支郡名山陂海咸納於漢諸侯稍微大國不過十餘城小侯不過數十里上足以奉貢職下足以供養祭祀以蕃輔京師而漢郡八九十形錯諸侯間犬牙相臨秉其厄塞地利疆本幹弱枝葉之勢也尊卑明而萬事各得其所矣臣遷謹記髙祖以來至太初諸侯譜其下益損之時令後世得覽形勢雖強要之以仁義為本徐廣曰孝武太始二年廣陵中山真定五來朝孝宣本始元年趙來朝二年廣川來朝四年清河來朝孝宣地節元年梁來朝二年河間來朝三年濟北來朝濟北分平原太山二郡史記集解卷十七
