body:
  text: 史記集解卷三十二宋裴駰撰史記三十二齊太公世家第二太公望吕尚者東海上人其先祖嘗為四嶽佐禹平水土甚有功虞夏之際封於吕或封於申姓薑氏夏商之時申吕或封枝庶子孫或為庶人尚其後苗裔也本姓薑氏從其封姓故曰吕尚吕尚蓋嘗窮困年老矣以漁釣姦周西伯西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲霸王之輔於是周西伯獵果遇太公於渭之陽與語大説曰自吾先君太公曰當有聖人適周周以興子真是邪吾太公望子久矣故號之曰太公望載與俱歸立為師或曰太公博聞嘗事紂紂無道去之遊説諸侯無所遇而卒西歸周西伯或曰吕尚處士隱海濵周西伯拘羑里散宜生閎夭素知而招吕尚吕尚亦曰吾聞西伯賢又善養老盍往焉三人者為西伯求美女竒物獻之於紂以贖西伯西伯得以出反國言吕尚所以事周雖異然要之為文武師周西伯昌之脫羑里歸與吕尚隂謀修德以傾商政其事多兵權與竒計故後世之言兵及周之隂權皆宗太公為本謀周西伯政平及斷虞芮之訟而詩人稱西伯受命曰文王伐崇密須犬夷大作豐邑天下三分其二歸周者太公之謀計居多文王崩武王即位九年欲修文王業東伐以觀諸侯集否師行師尚父左杖黃鉞右把白旄以誓曰蒼兕蒼兕總爾衆庶與爾舟楫後至者斬遂至盟津諸侯不期而會者八百諸侯諸侯皆曰紂可伐也武王曰未可還師與太公作此泰誓居二年紂殺王子比干囚箕子武王將伐紂卜龜兆不吉風雨暴至羣公盡懼唯太公強之勸武王武王於是遂行十一年正月甲子誓於牧野伐商紂紂師敗績紂反走登鹿臺遂追斬紂明日武王立于社羣公奉明水衛康叔封布采席師尚父牽牲史佚䇿祝以告神討紂之罪散鹿臺之錢發巨橋之粟以振貧民封比干墓釋箕子囚遷九鼎修周政與天下更始師尚父謀居多於是武王已平商而王天下封師尚父於齊營邱東就國道宿行遲逆旅之人曰吾聞時難得而易失客寢甚安殆非就國者也太公聞之夜衣而行犂明至國萊侯來伐與之爭營邱營邱邊萊萊人夷也會紂之亂而周初定未能集逺方是以與太公爭國太公至國修政因其俗簡其禮通商工之業便魚鹽之利而人民多歸齊齊為大國及周成王少時管蔡作亂淮夷畔周乃使召康公服虔曰召公奭命太公曰東至海西至河南至穆陵北至無棣服虔曰是皆太公始受封土疆境所至也五侯九伯實得征之杜預曰五等諸矦九州之伯皆得征討其罪齊由此得征伐為大國都營邱蓋太公之卒百有餘年禮記曰太公封於營丘比及五世皆反葬於周鄭玄曰太公受封留為太師死葬於周五世之後乃葬齊皇覽曰吕尚冢在臨災縣城南去縣十里子丁公吕伋徐廣曰一作及立丁公卒子乙公得立乙公卒子癸公慈母立癸公卒子哀公不辰立哀公時紀侯譖之周周烹哀公徐廣曰周夷王而立其弟靜是為胡公胡公徙都薄姑而當周夷王之時哀公之同母少弟山怨胡公乃與其黨率營邱人襲攻殺胡公而自立是為獻公獻公元年盡逐胡公子因徙薄姑都治臨災九年獻公卒子武公壽立武公九年周厲王出奔居彘十年王室亂大臣行政號曰共和二十四年周宣王初立二十六年武公卒子厲公無忌立厲公暴虐故胡公子復入齊齊人欲立之乃與攻殺厲公胡公子亦戰死齊人乃立厲公子赤為君是為文公而誅殺厲公者七十人文公十二年卒子成公説立成公九年卒子莊公購立莊公二十四年犬戎殺幽王周東徙雒秦始列為諸侯五十六年晉弒其君昭侯六十四年莊公卒子釐公祿甫立釐公九年魯隱公初立十九年魯桓公弒其兄隱公而自立為君二十五年北戎伐齊鄭使太子忽來救齊齊欲妻之忽曰鄭小齊大非我敵遂辭之三十二年釐公同母弟夷仲年死其子曰公孫無知釐公愛之令其秩服奉養比太子三十三年釐公卒太子諸兒立是為襄公襄公元年始為太子時嘗與無知鬭及立絀無知秩服無知怨四年魯桓公與夫人如齊齊襄公故嘗私通魯夫人魯夫人者襄公女弟也自釐公時嫁為魯桓公婦及桓公來而襄公復通焉魯桓公知之怒夫人夫人以告齊襄公齊襄公與魯君飲醉之使力士彭生抱上魯君車因拉殺魯桓公公羊傳曰搚幹而殺之何休曰搚折聲也桓公下車則死矣魯人以為讓而齊襄公殺彭生以謝魯八年伐紀紀遷去其邑徐廣曰年表云去其都邑十二年初襄公使連稱管至父戍葵邱賈逵曰連稱管至父皆齊大夫杜預曰臨災縣西有地名葵邱瓜時而往及瓜而代服虔曰瓜時七月及瓜謂後年瓜時往戍一歲卒瓜時而公弗為發代或為請代公弗許故此二人怒因公孫無知謀作亂連稱有從妹在公宫無寵服虔曰為妾在宮也使之間襄公王肅曰候公之間隙曰事成以女為無知夫人冬十二月襄公遊姑棼賈逵曰齊地也遂獵沛邱杜預曰安樂博昌縣南有地名貝邱見彘從者曰彭生服虔曰公見彘從者乃見彭生鬼改形為豕也公怒射之彘人立而啼公懼墜車傷足失屨反而鞭主屨者茀三百茀出宫而無知連稱管至父等聞公傷乃遂率其衆襲宫逢主屨茀茀曰且無入驚宫驚宫未易入也無知弗信茀示之創乃信之待宫外令茀先入茀先入即匿襄公户間良久無知等恐遂入宫茀反與宫中及公之幸臣攻無知等不勝皆死無知入宫求公不得或見人足於户間發視乃襄公遂殺之而無知自立為齊君桓公元年春齊君無知遊於雍林賈逵曰渠邱大夫也雍林人嘗有怨無知及其在遊雍林人襲殺無知告齊大夫曰無知弒襄公自立臣謹行誅唯大夫更立公子之當立者唯命是聽初襄公之醉殺魯桓公通其夫人殺誅數不當淫於婦人數欺大臣羣弟恐禍及故次弟糾奔魯其母魯女也管仲召忽傅之次弟小白奔莒鮑叔傅之小白母衛女也有寵於釐公小白自少好善大夫髙傒賈逵曰齊正卿髙敬仲也及雍林人殺無知議立君髙國先陰召小白於莒魯聞無知死亦發兵送公子糾而使管仲别將兵遮莒道射中小白帶鉤小白佯死管仲使人馳報魯魯送糾者行益遲六日至齊則小白已入髙傒立之是為桓公桓公之中鉤佯死以誤管仲已而載溫車中馳行亦有髙國內應故得先入立發兵距魯秋與魯戰于乾時杜預曰乾時齊地也時水在樂安界岐流旱則涸竭故曰乾時魯兵敗走齊兵掩絶魯歸道齊遺魯書曰子糾兄弟弗忍誅請魯自殺之召忽管仲讐也請得而甘心醢之不然將圍魯魯人患之遂殺子糾于笙瀆賈逵曰魯地句瀆也召忽自殺管仲請囚桓公之立發兵攻魯心欲殺管仲鮑叔牙曰臣幸得從君君竟以立君之尊臣無以增君君將治齊即髙傒與叔牙足也君且欲霸王非管夷吾不可夷吾所居國國重不可失也於是桓公從之乃詳為召管仲欲甘心實欲用之管仲知之故請往鮑叔牙迎受管仲及堂阜而脫桎梏賈逵曰堂阜魯北境杜預曰堂阜齊地東莞蒙陰縣西北有夷吾亭或曰鮑叔解夷吾縳於此因以為名也齊袚而見桓公桓公厚禮以為大夫任政桓公既得管仲與鮑叔隰朋徐廣曰或作崩也髙傒修齊國政連五家之兵國語曰管子制國五家為軌十軌為里四里為連十連為鄉以為軍令設輕重魚鹽之利以贍貧窮祿賢能齊人皆説二年伐滅郯徐廣曰一作談郯子奔莒初桓公亡時過郯郯無禮故伐之五年伐魯魯將師敗魯莊公請獻遂邑以平杜預曰遂在濟北蛇邱縣東北桓公許與魯會柯而盟杜預曰此柯今濟北東阿齊之阿邑猶祝柯今為祝阿魯將盟曹沫以匕首劫桓公於壇上何休曰上基三尺階三等曰壇會必有壇者為升降揖讓稱先君以相接也曰反魯之侵地桓公許之已而曹沫去匕首北面就臣位桓公後悔欲無與魯地而殺曹沫管仲曰夫劫許之而倍信殺之徐廣曰一云已許之而背信殺劫也愈一小快耳而棄信於諸侯失天下之援不可於是遂與曹沫三敗所亡地於魯諸侯聞之皆信齊而欲附焉七年諸侯會桓公於甄杜預曰甄衛地今東郡甄城也而桓公於是始霸焉十四年陳厲公子完號敬仲來奔齊齊桓公欲以為卿讓於是以為工正賈逵曰掌百工田成子常之祖也二十三年山戎伐燕服虔曰山戎北狄蓋今鮮卑也何休曰山戎者戎中之别名也燕告急於齊齊桓公救燕遂伐山戎至于孤竹而還燕莊公遂送桓公入齊境桓公曰非天子諸侯相送不出境吾不可以無禮於燕於是分溝割燕君所至與燕命燕君復修召公之政納貢于周如成康之時諸侯聞之皆從齊二十七年魯湣公母曰哀薑桓公女弟也哀薑淫於魯公子慶父慶父弒湣公哀薑欲立慶父魯人更立釐公徐廣曰史記僖宇皆作釐桓公召哀薑殺之二十八年衛文公有狄亂告急於齊齊率諸矦城楚邱賈逵曰衛地也而立衛君二十九年桓公與夫人蔡姬戲船中蔡姬習水蕩公賈逵曰蕩搖也公懼止之不止出船怒歸蔡姬弗絶蔡亦怒嫁其女桓公聞而怒興師往伐三十年春齊桓公率諸矦伐蔡蔡潰賈逵曰民逃其上曰潰也遂伐楚楚成王興師問曰何故涉吾地管仲對曰昔召康公命我先君太公曰五侯九伯若實征之以夾輔周室左傳曰周公太公股肱周室夾輔成王也賜我先君履杜預曰所踐履之界東至海西至河南至穆陵北至無棣楚貢包茅不入王祭不具賈逵曰包茅菁茅包匭之也以供祭祀杜預曰尚書包匭菁茅茅之為異未審是以來責昭王南征不復是以來問服虔曰周昭王南巡狩涉漢未濟船解而溺昭王王室諱之不以赴諸侯不知其故故桓公以為辭責問楚也楚王曰貢之不入有之寡人罪也敢不共乎昭王之出不復君其問之水濵杜預曰昭王時漢非楚境故不受罪齊師進次于陘杜預曰陘楚地潁川召陵縣南有陘亭左傳曰凡師一宿為舍再宿為信過信為次夏楚王使屈完將兵扞齊齊師退次召陵杜預曰召陵潁川縣桓公矜屈完以其衆屈完曰君以道則可若不則楚方城以為城服虔曰方城山在漢南韋昭曰方城楚北之厄塞杜預曰方城山在南陽華縣南是也江漢以為溝君安能進乎乃與屈完盟而去過陳陳袁濤塗詐齊令出東方覺秋齊伐陳左傳曰討不忠也是歲晉殺太子申生三十五年夏會諸矦于葵邱杜預曰陳留外黃縣東有葵邱也周襄王使宰孔賜桓公文武胙彤弓矢大路賈逵曰大路諸矦朝服之車謂之金路命無拜桓公欲許之管仲曰不可乃下拜受賜韋昭曰下堂拜賜也秋復會諸侯於葵邱益有驕色周使宰孔會諸侯頗有叛者公羊傳曰葵邱之會桓公震而矜之叛者九國晉侯病後遇宰孔孔曰齊侯驕矣第無行從之是歲晉獻公卒里克殺奚齊淖子徐廣曰史記卓多作淖秦穆公以夫人入公子夷吾為晉君桓公於是討晉亂至髙梁服虔曰晉地也杜預曰在平陽縣西南使隰朋立晉君還是時周室微唯齊楚秦晉為強晉初與會獻公死國內亂秦穆公辟逺不與中國會盟楚成王初收荆蠻有之夷狄自置唯獨齊為中國會盟而桓公能宣其德故諸侯賔會於是桓公稱曰寡人南伐至召陵望熊山北伐山戎離枝孤竹地里志曰令支縣有孤竹城疑離枝即令支也令離聲相近應劭曰令音鈴鈴離聲亦相近管子亦作離字西伐大夏涉流沙束馬懸車登太行至卑耳山而還諸侯莫違寡人寡人兵車之會三乘車之會六九合諸侯一匡天下昔三代受命有何以異於此乎吾欲封泰山禪梁父管仲固諫不聽乃説桓公以逺方珍怪物至乃得封桓公乃止三十八年周襄王弟帶與戎翟合謀伐周齊使管仲平戎於周周欲以上卿禮管仲管仲頓首曰臣陪臣安敢三讓乃受下卿禮以見三十九年周襄王弟帶來奔齊齊使仲孫請王為帶謝襄王怒弗聽四十一年秦穆公虜晉惠公復歸之是歲管仲隰朋皆卒管仲病桓公問曰羣臣誰可相者管仲曰知臣莫如君公曰易牙何如對曰殺子以適君非人情不可公曰開方何如對曰倍親以適君非人情難近管仲曰衛公子開方去其千乘之太子而臣事君也公曰豎刁如何對曰自宫以適君非人情難親管仲死而桓公不用管仲言卒近用三子三子專權四十二年戎伐周周告急齊齊令諸侯各發卒戍周是歲晉公子重耳來桓公妻之四十三年初齊桓公之夫人三曰王姬徐姬蔡姬皆無子桓公好內服虔曰內婦言也多內寵如夫人者六人長衛姬生無詭少衛姬生惠公元鄭姬生孝公昭葛嬴生昭公潘密姬生懿公商人宋華子賈逵曰宋華子之女子姓生公子雍桓公與管仲屬孝公於宋襄公以為太子雍巫有寵於衛共姬賈逵曰雍巫雍人名巫易牙也因宦者豎刁以厚獻於桓公亦有寵桓公許之立無詭杜預曰易牙既有寵於公為長衛姬請立管仲卒五公子皆求立冬十月乙亥齊桓公卒易牙入與豎刁因內寵殺羣吏服虔曰內寵如夫人者六人羣吏諸大夫也杜預曰內寵內宫人之有權寵者而立公子無詭為君太子昭奔宋桓公病五公子各樹黨爭立及桓公卒遂相攻以故宫中空莫敢棺桓公尸在牀上六十七日尸蟲出于户十二月乙亥無詭立乃棺赴辛巳夜斂殯徐廣曰斂一作臨也桓公十有餘子要其後立者五人無詭立三月死無諡次孝公次昭公次懿公次惠公孝公元年三月宋襄公率諸矦兵送齊太子昭而伐齊齊人恐殺其君無詭齊人將立太子昭四公子之徒攻太子太子走宋宋遂與齊人四公子戰五月宋敗齊四公子師而立太子昭是為齊孝公宋以桓公與管仲屬之太子故來征之以亂故八月乃葬齊桓公皇覽曰桓公冢在臨災南城十七里所災水南六年春齊伐宋以其不同盟于齊也服虔曰魯僖公十九年諸矦盟于齊以無忘桓公之德宋襄公欲行霸道不與盟故伐之夏宋襄公卒七年晉文公立十年孝公卒孝公弟潘因衛公子開方殺孝公子而立潘是為昭公昭公桓公子也其母曰葛嬴昭公元年晉文公敗楚於城濮而會諸侯踐土朝周天子使晉稱伯六年翟侵齊晉文公卒秦兵敗於殽十二年秦穆公卒十九年五月昭公卒子舍立為齊君舍之母無寵於昭公國人莫畏昭公之弟啇人以桓公死爭立而不得陰交賢士附愛百姓百姓説及昭公卒子舍立孤弱即與衆十月即墓上弒齊君舍而商人自立是為懿公懿公桓公子也其母曰密姬懿公四年春初懿公為公子時與丙戎之父獵爭獲不勝及即位斷丙戎父足而使丙戎僕賈逵曰僕御也庸職之妻好公內之宫使庸職驂乘五月懿公遊於申池杜預曰齊南城門名申門齊城無池唯此門左右有池疑此是也左思齊都賦注曰申池海濵齊藪也二人浴戲職曰斷足子戎曰奪妻者二人俱病此言乃怨謀與公遊竹中二人弒懿公車上棄竹中而亡去懿公之立驕民不附齊人廢其子而迎公子元於衛立之是為惠公惠公桓公子也其母衛女曰少衛姬避齊亂故在衛惠公二年長翟來穀梁傳曰身橫九畝斷其首而載之眉見於軾王子城父攻殺之賈逵曰王子城父齊大夫埋之於北門晉趙穿弒其君靈公十年惠公卒子頃公無野立初崔杼有寵於惠公惠公卒髙國畏其逼也逐之崔杼奔衛頃公元年楚莊王強伐陳二年圍鄭鄭伯降已復國鄭伯六年春晉使郤克於齊齊使夫人帷中而觀之郤克上夫人笑之郤克曰不是報不復涉河歸請伐齊晉侯弗許齊使至晉郤克執齊使者四人河內殺之八年晉伐齊齊以公子強質晉晉兵去十年春齊伐魯衛魯衛大夫如晉請師皆因郤克晉使郤克以車八百乘賈逵曰八百乘六萬人為中軍將士燮將上軍欒書將下軍以救魯衛伐齊六月壬申與齊侯兵合靡徐廣曰一作摩笄下賈逵曰靡笄山名也癸酉陳于鞍服虔曰鞍齊地名也逢丑父賈逵曰齊大夫為齊頃公右頃公曰馳之破晉軍會食射傷郤克流血至履克欲還入壁其御曰我始入再傷不敢言疾恐懼士卒願子忍之遂復戰齊急丑父恐齊侯得乃易處頃公為右車絓於木而止晉小將韓厥伏齊侯車前曰寡君使臣救魯衛戲之丑父使頃公下取飲因得亡脫去入其軍晉郤克欲殺丑父丑父曰代君死而見僇後人臣無忠其君者矣克舍之丑父遂得亡歸齊於是晉軍追齊至馬陵徐廣曰一作陘駰案賈逵曰馬陘齊地齊侯請以寶器謝左傳曰賂以紀甗玉磬也不聽必得笑克者蕭桐叔子杜預曰桐叔蕭君之字齊侯外祖父子女也難斥言其母故逺言之賈逵曰蕭附庸子姓令齊東畝服虔曰欲令齊隴畝東行對曰叔子齊君母齊君母亦猶晉君母子安置之且子以義伐而以暴為後其可乎於是乃許令反魯衛之侵地十一年晉初置六卿賞鞍之功齊頃公朝晉欲尊王晉景公晉景公不敢受乃歸歸而頃公弛苑囿薄賦斂振孤問疾虛積聚以救民民亦大説厚禮諸侯竟頃公卒百姓附諸侯不犯十七年頃公卒皇覽曰頃公冢近吕尚冢子靈公環立靈公九年晉欒書弒其君厲公十年晉悼公伐齊齊令公子光質晉十九年立子光為太子髙厚傅之令會諸侯盟於鍾離二十七年晉使中行獻子伐齊齊師敗靈公走入臨災晏嬰止靈公靈公弗從曰君亦無勇矣晉兵遂圍臨災城守不敢出晉焚郭中而去二十八年初靈公取魯女生子光以為太子仲姬戎姬嬖仲姬生子牙屬之戎姬戎姬請以為太子公許之仲姬曰不可光之立列於諸侯矣服虔曰數從諸侯征伐盟會今無故廢之君必悔之公曰在我耳遂東太子光賈逵曰徙之東垂也使髙厚傳牙為太子靈公疾崔杼迎故太子光而立之是為莊公莊公殺戎姬五月壬辰靈公卒莊公即位執太子牙於句竇之邱殺之八月崔杼殺髙厚晉聞齊亂伐齊至髙唐杜預曰髙唐在祝阿縣西北莊公三年晉大夫欒盈徐廣曰史記多作逞奔齊莊公厚客待之晏嬰田文子諫公弗聽四年齊莊公使欒盈門入晉曲沃賈逵曰欒盈之邑為內應以兵隨之上太行入孟門賈逵曰孟門太行皆晉山隘也欒盈敗齊兵還取朝歌賈逵曰晉邑六年初棠公妻好賈逵曰棠公齊棠邑大夫棠公死崔杼取之莊公通之數如崔氏以崔杼之冠賜人侍者曰不可崔杼怒因其伐晉欲與晉合謀襲齊而不得間莊公嘗笞宦者賈舉賈舉復侍為崔杼間公服虔曰伺公間隙以報怨五月莒子朝齊齊以甲戌饗之崔杼稱病不視事乙亥公問崔杼病遂從崔杼妻崔杼妻入室與崔杼自閉戶不出公擁柱而歌服虔曰公以為薑氏不知已在外故歌以命之也一曰公自知見欺恐不得出故歌以自悔宦者賈舉遮公從宫而入閉門崔杼之徒持兵從中起公登臺而請解不許請盟不許請自殺於廟不許皆曰君之臣杼疾病不能聽命服虔曰言不能親聽公命近於公宫服虔曰崔杼之宫近公宫淫者或詐稱公陪臣爭趣徐廣曰爭一作扞有淫者不知二命杜預曰言得淫人受崔子命討之不知他命也公踰牆射中公股公反墜遂弒之晏嬰立崔杼門外賈逵曰聞難而來曰君為社稷死則死之為社稷亡則亡之服虔曰謂以公義為社稷死亡也如是者臣亦隨之死亡若為己死己亡非其私昵誰敢任之服虔曰言君自以己之私欲取死亡之禍則私近之臣所當任也杜預曰私昵所親愛也非所親愛無為當其禍也門開而入枕公尸而哭三踊而出人謂崔杼必殺之崔杼曰民之望也舍之得民服虔曰置之所以得人心丁丑崔杼立莊公異母弟杵臼徐廣曰史記多作著臼是為景公景公母魯叔孫宣伯女也景公立以崔杼為右相慶封為左相二相恐亂起乃與國人盟曰不與崔慶者死晏子仰天曰嬰所不獲唯忠於君利社稷者是從不肯盟慶封欲殺晏子崔杼曰忠臣也舍之齊太史書曰崔杼弒莊公崔杼殺之其弟復書崔杼復殺之少弟復書崔杼乃舍之景公元年初崔杼生子成及強其母死取東郭女生明東郭女使其前夫子無咎與其弟偃相崔氏成有罪二相急治之立明為太子成請老於崔杼崔杼許之二相弗聽曰崔宗邑不可杜預曰濟陽東朝陽縣西北有崔氏城也成強怒告慶封慶封與崔杼有郤欲其敗也成強殺無咎偃於崔杼家家皆奔亡崔杼怒無人使一宦者御見慶封慶封曰請為子誅之使崔杼仇盧蒲嫳賈逵曰嫳齊大夫慶封之屬攻崔氏殺成強盡滅崔氏崔杼婦自殺崔杼歸亦自殺慶封為相國專權三年十月慶封出獵初慶封已殺崔杼益驕嗜酒好獵不聽政令慶舍用政服虔曰舍慶封之子也生傳其職政與子已有內郤田文子謂桓子曰亂將作田鮑髙欒氏相與謀慶氏慶舍發甲圍慶封宫四家徒共擊破之慶封還不得入奔魯齊人讓魯封奔吳吳與之朱方聚其族而居之富於在齊其秋齊人徙葬莊公僇崔杼尸於市以説衆九年景公使晏嬰之晉與叔向私語曰齊政卒歸田氏田氏雖無大德以公權私有德於民民愛之十二年景公如晉見平公欲與伐燕十八年公復如晉見昭公二十六年獵魯郊因入魯與晏嬰俱問魯禮三十一年魯昭公辟季氏難奔齊齊以千社封之賈逵曰二十五家為一社千社二萬五十家也子家止昭公昭公乃請齊伐魯取鄆以居昭公三十二年彗星見景公坐柏寢嘆曰堂堂誰有此乎服虔曰景公自恐德薄不能久享齊國故曰誰有此也羣臣皆泣晏子笑公怒晏子曰臣笑羣臣諛甚景公曰彗星出東北當齊分野寡人以為憂晏子曰君髙臺深池賦斂如弗得刑罰恐弗勝茀星將出彗星何懼乎公曰可禳否晏子曰使神可祝而來亦可禳而去也百姓苦怨以萬數而君令一人禳之安能勝衆口乎是時景公好治宫室聚狗馬奢侈厚賦重刑故晏子以此諫之四十二年吳王闔閭伐楚入郢四十七年魯陽虎攻其君不勝奔齊請齊伐魯鮑子諫景公乃囚陽虎陽虎得亡奔晉四十八年與魯定公好會夾谷服虔曰東海祝其縣是也犁鉏曰孔丘知禮而怯請令萊人為樂杜預曰萊人齊所滅萊夷也因執魯君可得志景公害孔丘相魯懼其霸故從犁鉏之計方會進萊樂孔子厯階上使有司執萊人斬之以禮讓景公景公慙乃歸魯侵地以謝而罷去是歲晏嬰卒五十五年范中行反其君於晉晉攻之急來請粟田乞欲為亂樹黨於逆臣説景公曰范中行數有德於齊不可不救乃使乞救而輸之粟五十八年夏景公夫人燕姬適子死景公寵妾芮姬生子荼荼少其母賤無行諸大夫恐其為嗣乃言願擇諸子長賢者為太子景公老惡言嗣事又愛荼母欲立之憚發之口乃謂諸大夫曰為樂耳國何患無君乎秋景公病命國惠子髙昭子杜預曰惠子國夏也昭子髙張也立少子荼為太子逐羣公子遷之萊服虔曰萊齊東鄙邑景公卒皇覽曰景公冢與桓公冢同處太子荼立是為晏孺子冬未葬而羣公子畏誅皆出亡荼諸異母兄公子壽駒黔奔衛徐廣曰一作壽黔奔衛公子鉏陽生奔魯萊人歌之曰景公死乎弗與埋三軍事乎弗與謀服虔曰萊人見五公子遠遷鄙邑不得而與景公葬埋之事及國三軍之謀故愍歌杜預曰稱諡蓋葬後而為此歌哀羣公子失所也師乎師乎胡黨之乎服虔曰師衆也黨所也言公子徒衆何所適也晏孺子元年春田乞偽事髙國者每朝乞驂乘言曰子得君大夫皆自危欲謀作亂又謂諸大夫曰髙昭子可畏及未發先之大夫從之六月田乞鮑牧乃與大夫以兵入公宫攻髙昭子昭子聞之與國惠子救公公師敗田乞之徒追之國惠子奔莒遂反殺髙昭子晏圉奔魯賈逵曰圉晏嬰之子八月齊秉意茲徐廣曰左傳八月齊邴意兹奔魯田乞敗二相乃使人之魯召公子陽生陽生至齊私匿田乞家十月戊子田乞請諸大夫曰常之母有魚菽之祭何休曰齊俗婦人首祭事言魚豆者示薄陋無所有也幸來會飲會飲田乞盛陽生槖中置坐中央發槖出陽生曰此乃齊君矣大夫皆伏謁將與大夫盟而立之鮑牧醉乞誣大夫曰吾與鮑牧謀共立陽生鮑牧怒曰子忘景公之命乎諸大夫相視欲悔陽生前頓首曰可則立之否則已鮑牧恐禍起乃復曰皆景公子也何為不可乃與盟立陽生是為悼公悼公入宫使人遷晏孺子於駘賈逵曰齊邑殺之幕下而逐孺子母芮子芮子故賤而孺子少故無權國人輕之悼公元年齊伐魯取歡闡杜預曰闡在東平剛縣北初陽生亡在魯季康子以其妹妻之及歸即位使迎之季姬與季魴侯通杜預曰魴矦康子叔父也言其情魯弗敢與故齊伐魯竟迎季姬季姬嬖齊復歸魯侵地鮑子與悼公有郤不善四年吳魯伐齊南方鮑子弒悼公赴于吳吳王夫差哭於軍門外三日將從海入討齊齊人敗之吳師乃去晉趙鞅伐齊至賴而去服虔曰賴齊邑齊人共立悼公子壬是為簡公徐廣曰年表曰簡公壬者景公之子也簡公四年春初簡公與父陽生俱在魯也闞止有寵焉賈逵曰闞止子我也及即位使為政田成子憚之驟顧於朝杜預曰心不安故數顧也御鞅言簡公賈逵曰鞅齊大夫也曰田闞不可並也君其擇焉杜預曰擇用一人也弗聽子我夕服虔曰夕省事田逆殺人逢之服虔曰子我將往夕省事於君而逢逆之殺人也杜預曰逆子行陳氏宗遂捕以入杜預曰執逆入至於朝也田氏方睦服虔曰陳常方欲謀有齊國故和其宗族使囚病而遺守囚者酒服虔曰使陳逆詐病而遺也醉而殺守者得亡子我盟諸田於陳宗服虔曰子我見陳逆得生出而恐為陳氏所怨故與盟而請和也陳宗宗長之家初田豹欲為子我臣賈逵曰豹陳氏族也使公孫言豹賈逵曰公孫齊大夫也杜預曰言介達之意豹有喪而止後卒以為臣杜預曰終喪也幸於子我子我謂曰吾盡逐田氏而立女可乎對曰我逺田氏矣服虔曰言我與陳氏宗疏逺也且其違者不過數人服虔曰違者不從子我者何盡逐焉遂告田氏子行曰彼得君弗先必禍子服虔曰彼謂闞止也子謂陳常也子行舍於公宫服虔曰止於公宫為陳氏作內間也夏五月壬申成子兄弟四乘如公服虔曰成子兄弟八人二人共一乘故曰四乘子我在幄杜預曰幄帳也聽政之處也出迎之遂入閉門服虔曰成子兄弟見子我出遂突入反閉門子我不得復入宦者禦之服虔曰閹豎以兵禦陳氏子行殺宦者服虔曰舍於公宫故得殺之公與婦人飲酒于檀臺服虔曰當陳氏入時飲酒於此臺成子遷諸寢服虔曰欲從公令居寢也公執戈將擊之杜預曰疑其作亂也太史子餘服虔曰齊大夫曰非不利也將除害也杜預曰言將為公除害也成子出舍于庫杜預曰以公怒故也聞公猶怒將出服虔曰出奔也曰何所無君子行拔劎曰需事之賊也杜預曰言需疑則害事誰非田宗杜預曰言陳氏宗族衆多所不殺子者有如田宗杜預曰言子若欲出我必殺子明如陳宗乃止子我歸屬徒服虔曰會徒衆攻闈與大門服虔曰宫中之門曰闈大門公門也皆弗勝乃出田氏追之豐邱人執子我以告賈逵曰豐丘陳氏邑也殺之郭關服虔曰齊關也成子將殺大陸子方服虔曰子方子我之黨大夫東郭賈也田逆請而免之以公命取車於道杜預曰子方取道中待人車出雍門杜預曰齊城門田豹與之車弗受曰逆為余請豹與余車余有私焉事子我而有私於其讐何以見魯衛之士服虔曰子方將欲奔魯衛也左傳曰東郭賈奔衛庚辰田常執簡公于徐州春秋作舒州賈逵曰陳氏邑也公曰余蚤從御鞅言不及此甲午田常弒簡公于徐州田常乃立簡公弟驁是為平公平公即位田常相之專齊之政割齊安平以東為田氏封邑徐廣曰年表曰平公之時抑自出稱田氏平公八年越滅吳二十五年卒子宣公積立宣公五十一年卒子康公貸立田會反廩邱康公二年韓魏趙始列為諸矦十九年田常曾孫田和始為諸侯遷康公海濵二十六年康公卒吕氏遂絶其祀田氏卒有齊國為齊威王強於天下太史公曰吾適齊自泰山屬之琅邪北被于海膏壤二千里其民闊逹多匿知其天性也以太公之聖建國本桓公之盛修善政以為諸侯會盟稱伯不亦宜乎洋洋哉固大國之風也史記集解卷三十二
