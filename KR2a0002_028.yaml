body:
  text: 史記集解巻三十宋裴駰撰史記三十平凖書第八漢書百官表曰大司農屬官有平凖令漢興接秦之弊丈夫從軍旅老弱轉糧饟作業劇而財匱自天子不能具鈞駟而将相或乘牛車齊民無葢藏如享曰齊等無有貴賤故謂之齊民若今言平民矣晉灼曰中國被敎之民也蘇林曰無物可葢藏于是為秦錢重難用更令民鑄錢漢書食貨志曰鑄榆莢錢一黄金一斤約法省禁而不軌逐利之民蓄積餘業以稽市物物踊騰糶李竒曰稽貯滯也如淳曰稽考也考校市物價貴賤有時晉灼曰踊甚也言計市物賤而豫益稸之也物貴而出賣故使物甚騰也漢書糶字作躍米至石萬錢馬一匹則百金瓉曰秦以一鎰為一金漢以一斤為一金天下已平高祖乃令賈人不得衣絲乘車重租税以困辱之孝恵高后時為天下初定復弛商賈之律然井市之子孫亦不得仕宦為吏量吏禄度官用以賦于民而山川園池市井租税之入自天子以至于封君湯沐邑皆各為私奉養焉不領于天下之經費漕轉山東粟以給中都官歳不過數十萬石至孝文帝時莢錢益多輕如淳曰如榆莢也乃更鑄四銖錢其文為半兩令民縱得自鑄錢故吳諸侯也以即山鑄錢富埒天子徐廣曰埒者際畔言鄰接相次也駰案孟康曰富與天子等而微減也或曰埒等也其後卒以叛逆鄧通大夫也以鑄錢財過王者故吳鄧氏錢布天下而鑄錢之禁生焉匈奴數侵盗北邊屯戍者多邊粟不足給食當食者于是募民能輸及轉粟于邊者拜爵爵得至大庶長孝景時上郡以西旱亦復修賣爵令而賤其價以招民及徒復作得輸粟縣官以除罪益造苑馬以廣用而宫室列觀輿馬益增修矣至今上即位數歳漢興七十餘年之間國家無事非遇水旱之災民則人給家足都鄙廩庾皆滿而府庫餘貨財京師之錢累巨萬韋昭曰巨萬今萬萬貫朽而不可校如淳曰校數也太倉之粟陳陳相因充溢露積于外至腐敗不可食衆庶街巷有馬阡陌之間成羣而乘字牝者儐而不得聚會漢書音義曰皆乘父馬有牝馬間其間則相踶齧故斥不得出會同守閭閻者食梁肉為吏者長子孫如淳曰時無事吏不數轉至于子孫長大而不轉職任居官者以為姓號如淳曰倉氏庾氏是也故人人自愛而重犯法先行義而後絀恥辱焉當此之時網疏而民富役財驕溢或至兼并豪黨之徒以武斷于鄉曲宗室有土公卿大夫以下争于奢侈室廬輿服僭于上無限度物盛而衰固其變也自是之後嚴助朱買臣等招來東甌事兩越江淮之間蕭然煩費矣唐蒙司馬相如開路西南夷鑿山通道千餘里以廣巴蜀巴蜀之民罷焉彭吳賈滅朝鮮置滄海之郡則燕齊之間靡然發動及王恢設謀馬邑匈奴絶和親侵擾北邊兵連而不解天下苦其勞而干戈日滋行者齎居者送中外騷擾而相奉百姓抏弊以巧法財賂衰耗而不贍入物者補官出貨者除罪選舉陵遲廉恥相冐武力進用法嚴令具興利之臣自此始也韋昭曰𢎞羊孔僅之屬其後漢将歲以數萬騎出擊胡及車騎将軍衛青取匈奴河南地築朔方當是時漢通西南夷道作者數萬人千里負擔饋糧率十餘鍾致一石漢書音義曰鍾六斗四升㪚幣于卭僰以集之數歲道不通蠻夷因以數攻吏發兵誅之悉巴蜀租賦不足以更之韋昭曰更續也或曰更償也乃募豪民田南夷入粟縣官而内受錢于都内服䖍曰入穀于外縣受錢于内府也東置滄海之郡人徒之費擬于南夷又興十餘萬人築衛朔方轉漕甚遼遠自山東咸被其勞費數十百巨萬府庫益虛乃募民能入奴婢得以終身復為郎增秩及入羊為郎始于此其後四年徐廣曰元朔五年而漢遣大将将六将軍軍十餘萬擊右賢王獲首虜萬五千級明年大将軍将六将軍仍再出擊胡得首虜萬九千級捕斬首虜之士受賜黃金二十餘萬斤虜數萬人皆得厚賞衣食仰給縣官而漢軍之士馬死者十餘萬兵甲之財轉漕之費不與焉于是大農陳藏錢韋昭曰陳乆也經耗賦税既竭猶不足以奉戰士有司言天子曰朕聞五帝之敎不相復而治禹湯之法不同道而王所由殊路而建徳一也北邊未安朕甚悼之日者大将軍攻匈奴斬首虜萬九千級留滯無所食議令民得買爵及贖禁固免減罪請置賞官命曰武功爵瓉曰茂陵中書有武功爵一級曰造士二級曰閑輿衛三級曰良士四級曰元戎士五級曰官首六級曰秉鐸七級曰千夫八級曰樂卿九級曰執戎十級曰左庶長十一級曰軍衛此武帝所制以寵軍功級十七萬凡直三十餘萬金諸買武功爵官首者試補吏先除千夫如五大夫其有罪又減二等爵得至樂卿徐廣曰爵名也駰案漢書音義日十爵左庶長以上至十八爵為大庶長也名樂卿樂卿者朝位從九卿加樂者别正卿又十九爵為樂公食公卿禄而無職以顯軍功軍功多用越等大者封侯卿大夫小者郎吏吏道雜而多端則官職耗廢自公孫𢎞以春秋之義繩臣下取漢相張湯用峻文決理為廷尉于是見知之法生張晏曰吏見知不舉劾為故縱而廢格沮誹窮治之獄用矣如淳曰廢格天子文法使不行也誹謂非上所行若顔異反脣之比也其明年淮南衡山江都王謀反迹見而公卿尋端治之竟其黨與而坐死者數萬人長吏益慘急而治令明察當是之時招尊方正賢良文學之士或至公卿大夫公孫𢎞以漢相布被食不重味為天下先然無益于俗稍騖于功利矣其明年驃騎仍再出擊胡獲首四萬其秋渾邪王率數萬之衆來降于是漢發車二萬乗迎之既至受賞賜及有功之士是歲費凡百餘巨萬初先是徃十餘歲河決觀徐廣曰觀縣名也屬東郡光武改曰衛公國梁楚之地固已數困而縁河之郡隄塞河輙決壞費不可勝計其後番係欲省底柱之漕穿汾河渠以為溉田作者數萬人鄭當時為渭漕渠回遠鑿直渠自長安至華陰作者數萬人朔方亦穿渠作者數萬人各歴二三期功未就費亦各巨萬十數天子為伐胡盛養馬馬之來食長安者數萬匹卒牽掌者闗中不足乃調旁近郡而胡降者皆衣食縣官縣官不給天子乃損膳解乗輿駟出御府禁藏以贍之其明年山東被水災民多飢之于是天子遣使者虚郡國倉廥徐廣曰音膾以振貧民猶不足又募豪富人相貸假尚不能相救乃徙貧民于闗以西及充朔方以南新秦中服䖍曰地名在北方千里如淳曰長安已北朔方已南瓉曰秦逐匈奴以收河南地徙民以實之謂之新秦今以地空故復徙民以實之七十餘萬口衣食皆仰給縣官數歲假予産業使者分部䕶之冠葢相望其費以億計不可勝數于是縣官大空而富商大賈或蹛財役貧漢書音義曰蹛停也一曰貯也轉轂百數李竒曰車也廢居居邑徐廣曰廢居者貯畜之名也有所廢有所畜言其乘時射利也駰案服䖍曰居轂于邑也如淳曰居賤物于邑中以待貴封君皆低首仰給晉灼曰低音抵距服䖍曰仰給于商賈冶鑄煮鹽財或累萬金而不佐國家之急黎民重困于是天子與公卿議更錢造幣以贍用而摧浮淫并兼之徒是時禁苑有白鹿而少府多銀錫自孝文更造四銖錢至是歲四十餘年從建元以來用少縣官徃徃即多銅山而鑄錢民亦間盗鑄錢不可勝數錢益多而輕如淳曰磨錢取鎔故也瓉曰鑄錢者多故錢輕輕亦賤也物益少而貴如淳曰但鑄作錢不作餘物有司言曰古者皮幣諸侯以聘享金有三等黃金為上白金為中赤金為下漢書音義曰白金銀也赤金丹陽銅今半兩錢法重四銖韋昭曰文為半兩實重四銖而姦或盜磨錢裏取鋊徐廣曰音容吕静曰冶器法謂之鎔錢益輕薄而物貴則遠方用幣煩費不省乃以白鹿皮方尺緣以藻繢徐廣曰藻一作紫也為皮幣直四十萬王侯宗室朝覲聘享必以皮幣薦璧然後得行又造銀錫為白金如淳曰雜鑄銀錫為白金也以為天用莫如龍地用莫如馬人用莫如龜故白金三品其一曰重八兩圜之其文龍名曰白選直三千二曰重差小方之其文馬直五百三曰復小撱之其文龜直三百令縣官銷半兩錢更鑄三銖錢文如其重盗鑄諸金錢罪皆死而吏民之盗鑄白金者不可勝數于是以東郭咸陽孔僅為大農丞領鹽鐡事桑𢎞羊以計算用事侍中咸陽齊之大煑鹽孔僅南陽大冶皆致生累千金故鄭當時進言之𢎞羊雒陽賈人子以心計年十三侍中故三人言利事析秋毫矣法既益嚴吏多廢免兵革數動民多買復及五大夫徵發之士益鮮于是除千夫五大夫為吏不欲者出馬故吏皆通適令伐棘上林韋昭曰欲令出馬無馬者令伐棘作昆明池其明年大将軍驃騎大出擊胡徐廣曰元狩四年得首虜八九萬級賞賜五千萬金漢軍馬死者十餘萬匹轉漕車甲之費不與焉是時財匱戰士頗不得禄矣有司言三銖錢輕易奸詐乃更請諸郡國鑄五銖錢周郭其下令不可磨取鋊焉大農上鹽鐡丞孔僅咸陽言山海天地之蔵也皆宜屬少府陛下不私以屬大農佐賦願募民自給費因官器作煮鹽官與牢盆如淳曰牢廩食也古者名廩為牢也盆者煮塩盆浮食竒民欲擅管山海之貨張晏曰若人執倉庫之管籥或曰管固以致富羡役利細民其沮事之議不可勝聴敢私鑄鐡器煑鹽者􅎂史記音義曰徒計反左趾韋昭曰􅎂以鐡為之著左趾以代刖也沒入其器物郡不出鐡者置小鐡官鄧展曰鑄故鐡便屬在所縣使孔僅東郭咸陽乘傳舉行天下鹽鐡作官府除故鹽鐡家富者為吏吏道益雜不選而多賈人矣商賈以幣之變多積貨逐利于是公卿言郡國頗被災害貧民無産業者募徙廣饒之地陛下損膳省用出禁錢以振元元寛貸賦而民不齊出于南畆李竒曰齊皆也商賈滋衆貧者蓄積無有皆仰縣官異時算軺車賈人緡錢皆有差請算如故李斐曰緡絲也以貫錢也一貫千緡出二十算也詩云維絲伊緡如淳曰胡公名錢為緡者詩云氓之蚩蚩抱布貿絲故謂之緡也諸賈人末作貰貸買居邑稽諸物及商以取利者雖無市籍各以其物自占率緡錢二千而一算瓉曰此緡錢為是儲緡錢也故隨其用所施施于利重者其算亦多諸作有租及鑄如淳曰以手力所作而賣之率緡錢四千一算非吏比者三老北邊騎士如淳曰非吏而得與吏比者官謂三老北邊騎士也樓船令邊郡選富者為車騎士軺車以一算商賈人軺車二算如淳曰商賈有軺車使出二算重其賦也船五丈以上一算匿不自占占不悉戍邊一歲沒入緡錢有能告者以其半畀之賈人有市籍者及其家屬皆無得籍名田以便農敢犯令沒入田僮天子乃思卜式之言召拜式為中郎爵左庶長賜田十頃布告天下使明知之初卜式者河南人也以田畜為事親死式有少弟弟壯式脱身出分獨取畜羊百餘田宅財物盡予弟式入山牧十餘歲羊致千餘頭買田宅而其弟盡破其業式輙復分予弟者數矣是使漢方數使将擊匈奴卜式上書願輸家之半縣官助邊天子使使問式欲官乎式曰臣少牧不習仕宦不願也使問曰家豈有寃欲言事乎式曰臣生與人無分争式邑人貧者貸之不善者敎順之所居人皆從式式何故見寃于人無所欲言也使者曰茍如此子何欲而然式曰天子誅匈奴愚以為賢者宜死節于邉有財者宜輸委如此而匈奴可滅也使者具其言入以聞天子以語丞相𢎞𢎞曰此非人情不軌之臣不可以為化而亂法願陛下勿許于是上乆不報式數歲乃罷式式歸復田牧歲餘會軍數出渾邪王等降縣官費衆倉府空其明年貧民大徙皆仰給縣官無以盡贍卜式持錢二十萬予河南守以給徙民河南上富人助貧人者籍天子見卜式名識之曰是固前而欲輸其家半助邉乃賜式外繇四百人漢書音義曰外繇謂戍邉也一人出三百錢謂之過更式歲得十二萬錢也一説在繇役之外得復除四百人式又盡復予縣官是時富豪皆争匿財惟式尤欲輸之助費天子于是以式終長者故尊顯以風百姓初式不願為郎上曰吾有羊上林中欲令子牧之式乃拜為郎布衣屩而牧羊韋昭曰屩草屝歳餘羊肥息上過見其羊善之式曰非獨羊也治民亦猶是也以時起居惡者輙斥去毋令敗羣上以式為竒拜為緱氏令試之緱氏便之遷為成臯令将漕上以為式朴忠拜為齊王太𫝊而孔僅之使天下鑄作器三年中拜為大農列于九卿徐廣曰元鼎二年時丙寅歳而桑𢎞羊為大農丞筦諸會計事稍稍置均輸以通貨物矣孟康曰謂諸當所輸于官者皆令輸其土地所饒平其所在時價官更于他處賣之輸者既便而官有利漢書百官表大司農屬官有均輸令始令吏得入穀補官郎至六百石自造白金五銖錢後五歲赦吏民之坐盜鑄金錢死者數十萬人其不發覺相殺者不可勝計赦自出者百餘萬人然不能半自出天下大抵無慮皆鑄金錢矣犯者衆吏不能盡誅取于是遣博士褚大徐偃等分曹循行郡國服䖍曰分曹職案行舉兼并之徒守相為吏者而御史大夫張湯方隆貴用事減宣杜周等為中丞義縱尹齊王温舒等用慘急刻深為九卿而直指夏蘭之屬始出矣而大農顔異誅徐廣曰元狩四年時壬戌歲也初異為濟南亭長以廉直稍遷至九卿上與張湯既造白虎皮幣問異異曰今王侯朝賀以蒼璧直數千而其皮薦反四十萬本末不相稱天子不説張湯又與異有郤及人有告異以它議事下張湯治異異與客語客語初令下有不便者李竒曰異與客語道詔令初下有不便處也異不應微反脣湯奏異當九卿見令不便不入言而腹誹論死自是之後有腹誹之法以此而公卿大夫多謟諛取容矣天子既下緡錢令而尊卜式百姓終莫分財佐縣官于是楊可告緡錢縱矣郡國多姦鑄錢錢多輕而公卿請令京師鑄鍾官赤側如淳曰以赤銅為其郭也今錢見有赤側者不知作法云何一當五賦官用非赤側不得行漢書音義曰俗所謂紫紺錢也白金稍賤民不寶用縣官以令禁之無益歲餘白金終廢不行是歲也張湯死徐廣曰元鼎三年而民不思其後二歲赤側錢賤民巧法用之不便又廢于是悉禁郡國無鑄錢専令上林三官漢書百官表水衡都尉武帝元鼎二年初置掌上林苑屬官有上林均輸鍾官辨銅令然則上林三官其是此三令乎鑄錢既多而令天下非三官錢不得行諸郡國所前鑄錢皆廢銷之輸其銅三官而民之鑄錢益少計其費不能相當唯真工大姦乃盜為之卜式相齊而楊可告緡瓉曰商賈居積及伎巧之家非桑農所生出謂之緡茂陵中書有緡田奴婢是也徧天下中家以上大抵皆遇告杜周治之獄少反者如淳曰治匿緡之罪其獄少有反者乃分遣御史廷尉正監分曹徃即治郡國緡錢得民財物以億計奴婢以千萬數田大縣數百頃小縣百餘頃宅亦如之于是商賈中家以上大率破民偷甘食好衣不事畜蔵之産業而縣官有鹽鐵緡錢之故用益饒矣益廣闗置左右輔徐廣曰元鼎三年丁夘嵗徙函谷闗于新安東界初大農筦鹽鐵官布多置水衡欲以主鹽鐵及楊可告緡錢上林財物衆乃令水衡主上林上林既充滿益廣是時越欲與漢用船戰逐韋昭曰戰鬪馳逐也乃大修昆明池列觀環之治樓船高十餘丈旗幟加其上甚壮于是天子惑之乃作栢梁臺高數十丈宫室之修由此日麗乃分緡錢諸官而水衡少府大農太僕各置農官徃徃即郡縣比沒入田田之其沒入奴婢分諸苑養狗馬禽獸及與諸官諸官益新置多如淳曰水衡少府大僕司農皆有農官是為多徒奴婢衆而下河漕度四百萬石及官自糴乃足所忠言世家子弟如淳曰世世有禄秩家富人或鬪雞走狗馬弋獵博戲亂齊民乃徵諸犯令相引數千人命曰株送徒入財者得補郎郎選衰矣應劭曰株根本也送引也如淳曰株根蔕也諸坐博戲事決為徒者能入錢得補郎也或曰先至者為根是時山東被河災及歲不登數年人或相食方一二千里天子憐之詔曰江南火耕水耨應劭曰燒草下水種稻草與稻並生高七八寸因悉芟去復下水灌之草死獨稻長所謂火耕水耨也令飢民得流就食江淮間欲留之處遣使冠葢相屬于道䕶之下巴蜀粟以振之其明年天子始巡郡國東度河河東守不意行至不辦自殺行西踰隴隴西守以行徃卒漢書音義曰輸度也卒倉卒天子從官不得食隴西守自殺于是上北出蕭闗從數萬騎獵新秦中以勒邊兵而歸新秦中或千里無亭徼如淳曰徼亦卒求盜之屬也晉灼曰徼塞也瓉曰既無亭候又不徼循無衛邉之備也于是誅北地太守以下而令民得畜牧邊縣漢書音義曰令民得畜牧于邊縣也瓉曰先是新秦中千里無民畏宼不敢畜牧令設亭徼故民得畜牧也官假馬母三歲而歸及息什一以除占緡用充仭新秦中李竒曰邉有官馬今令民能畜官母馬者三歳歸之也及有蕃息與當出緡筭者皆復令居新秦中又充仭之也謂與民母馬令得為馬種令十母馬還官一駒此為息什一也瓉曰前以邉用不足故設告緡之令設亭徼邊民無警皆得田牧新秦中已充故除告緡不復取于民既得寶鼎立后土太一祠徐廣曰元鼎四年立后土五年立太畤公卿議封禪事而天下郡國皆豫治道橋繕故宫及當馳道縣縣治官儲設供具而望以待幸其明年南越反西𦍑侵邊為桀于是天子為山東不贍赦天下因南方樓船卒二十餘萬人擊南越數萬人發三河以西騎擊西𦍑又數萬人度河築令居初置張掖酒泉郡徐廣曰元鼎六年而上郡朔方西河河西開田官斥塞卒如淳曰塞候斥卒六十萬人戍田之中國繕道餽糧遠者二千近者千餘里皆仰給大農邊兵不足乃發武庫工官兵器以贍之車騎馬之絶縣官錢少買馬難得乃著令令封君以下至三百石以上吏以差出牝馬天下亭亭有畜㹀馬歲課息齊相卜式上書曰臣聞主憂臣辱南越反臣願父子與齊習船者徃死之天子下詔曰卜式雖躬耕牧不以為利有餘輙助縣官之用今天下不幸有急而式奮願父子死之雖未戰可謂義形于内賜爵闗内侯金六十斤田十頃布告天下天下莫應列侯以百數皆莫求從軍擊𦍑越至酎少府省金如淳曰省視諸侯金有輕有重也或曰至嘗酎飲宗廟時少府視其金多少也而列侯坐酎金失侯者百餘人如淳曰漢儀注王子為侯侯歲以戸口酎黄金于漢廟皇帝臨受獻金以助祭大祀曰飲酎飲酎受金金少不如斤兩色惡王削縣侯免國乃拜式為御史大夫徐廣曰元鼎六年式既在位見郡國多不便縣官作鹽鐵鐵器苦惡瓉曰謂作鐵器民患苦其不好賈貴或彊令民賣買之而舩有算商者少物貴乃因孔僅言舩算事上由是不悦卜式漢連兵三歲誅𦍑滅南越番禺以西至蜀南者置初郡十七徐廣曰南越為九郡駰案晉灼曰元鼎六年定越地以為南海蒼梧鬱林合浦交趾九真日南珠崖儋耳郡定西南夷以為武都牂牁越嶲沈犁汶山郡及地理志西南夷𫝊所置犍為零陵益州郡凡十七也且以其故俗治毋賦税南陽漢中以徃郡各以地比給初郡吏卒奉食幣物𫝊車馬被具而初郡時時小反殺吏漢發南方吏卒徃誅之間歲萬餘人費皆仰給大農大農以均輸調鹽鐵助賦故能贍之然兵所過縣為以訾給毋之而已不敢言擅賦法矣徐廣曰擅一作經經常也唯取用足耳不暇顧經常法則矣其明年元封元年卜式貶秩為太子太傅而桑𢎞羊為治粟都尉領大農盡代僅筦天下鹽鐵𢎞羊以諸官各自市相與争物故騰躍而天下賦輸或不償其僦費乃請置大農部丞數十人分部主郡國各徃徃縣置均輸鹽鐵官令遠方各以其物貴時商賈所轉販者為賦而相灌輸置平凖于京師都受天下委輸召工官治車諸器皆仰給大農大農之諸官盡籠天下之貨物貴即賣之賤則買之如此富商大賈無所牟大利如淳曰牟取也則反本而萬物不得騰踊故抑天下物名曰平準天子以為然許之于是天子北至朔方東到泰山巡海上並北邊以歸所過賞賜用帛百餘萬匹錢金以巨萬計皆取足大農𢎞羊又請令吏得入粟補官及罪人贖罪令民能入粟甘泉各有差以復終身不告緡他郡國各輸急處而諸農各致粟山東漕益歲六百萬石一歲之中太倉甘泉倉滿邊餘穀諸物均輸帛五百萬匹民不益賦而天下用饒于是𢎞羊賜爵左庶長黄金再百斤焉是歲小旱上令官求雨卜式言曰縣官當食租衣税而已今𢎞羊令吏坐市列肆販物求利亨𢎞羊天乃雨太史公曰農工商交易之路通而龜貝金錢刀布之幣興焉所從來乆遠自高辛氏之前尚矣靡得而記云故書道唐虞之際詩述殷周之世安寧則長庠序先本絀末以禮義防于利事變多故而亦反是是以物盛則衰時極而轉徐廣曰時一作衰一質一文終始之變也禹貢九州各因其土地所宜人民所多少而納職焉湯武承弊易變使民不倦各兢兢所以為治而稍陵遲衰微齊桓公用管仲之謀通輕重之權管子有輕重之法徼山海之業以朝諸侯用區區之齊顯成覇名魏用李克盡地力為彊君自是之後天下争于戰國貴詐力而賤仁義先富有而後推讓故庶人之富者或累巨萬而貧者或不厭糟糠有國强者或并羣小以臣諸侯而弱國或絶祀而滅世以至于秦卒并海内虞夏之幣金為三品或黃或白或赤或錢或布如淳曰布于民間也或刀如淳曰名錢為刀者以其利于民或龜貝及至秦中一國之幣為二等黃金以鎰名孟康曰二十兩為鎰為上幣銅錢識曰半兩重如其文為下幣而珠玉龜貝銀錫之屬為器飾寶藏不為幣然各隨時而輕重無常于是外攘夷狄内興功業海内之士力耕不足糧饟女子紡績不足衣服古者常竭天下之資財以奉其上猶自以為不足也無異故云事勢之流相激使然曷足怪焉史記集解卷三十
