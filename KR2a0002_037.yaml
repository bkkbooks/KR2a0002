body:
  text: 史記集解卷三十九宋裴駰撰史記三十九晉世家第九唐叔虞者周武王子而成王弟初武王與叔虞母會時左傳曰邑姜云娠太叔服䖍曰邑姜武王后齊太公女夢天謂武王曰余命女生子名虞余與之唐及生子文在其手曰虞故遂因命之曰虞武王崩成王立唐有亂周公誅滅唐成王與叔虞戲削桐葉為珪以與叔虞曰以此封若史佚因請擇日立叔虞成王曰吾與之戲耳史佚曰天子無戲言言則史書之禮成之樂歌之於是遂封叔虞於唐唐在河汾之東方百里故曰唐叔虞世本曰居鄂宋忠曰鄂地今在大夏姓姬氏字子于唐叔子爕是為晉侯晉侯子寧族是為武侯武侯之子服人是為成侯成侯子福是為厲侯厲侯子宜臼是為靖侯靖侯以來年紀可推自唐叔至靖侯五世無其年數靖侯十七年周厲王迷惑暴虐國人作亂厲王出奔于彘大臣行政故曰共和十八年靖侯卒子釐侯司徒立釐侯十四年周宣王初立十八年釐侯卒子獻侯籍立獻侯十一年卒子穆侯費王立穆侯四年取齊女姜氏為夫人七年伐條生太子仇杜預曰條晉地十年伐千畆有功杜預曰西河界休縣南有地名千畆生少子名曰成師杜預曰意取能成其衆也晉人師服曰賈逵曰晉大夫異哉君之命子也太子曰仇仇者讎也少子曰成師成師大號成之者也名自命也物自定也今適庶名反逆此後晉其能毋亂乎二十七年穆侯卒弟殤叔自立太子仇出奔殤叔三年周宣王崩四年穆侯太子仇率其徒襲殤叔而立是為文侯文侯十年周幽王無道犬戎殺幽王周東徙而秦襄公始列為諸侯三十五年文侯仇卒子昭侯伯立昭侯元年封文侯弟成師于曲沃曲沃邑大於翼翼晉君都邑也成師封曲沃號為桓叔靖侯庶孫欒賓相桓叔桓叔是時年五十八矣好德晉國之衆皆附焉君子曰晉之亂其在曲沃矣末大於本而得民心不亂何待七年晉大臣潘父弑其君昭侯而迎曲沃桓叔桓叔欲入晉晉人發兵攻桓叔桓叔敗還歸曲沃晉人共立昭侯子平為君是為孝侯誅潘父孝侯八年曲沃桓叔卒子鱓代桓叔是為曲沃莊伯孝侯十五年曲沃莊伯弑其君晉孝侯于翼晉人攻曲沃莊伯莊伯復入曲沃晉人復立孝侯子郄為君是為鄂侯鄂侯二年魯隠公初立鄂侯六年卒曲沃莊伯聞晉鄂侯卒乃興兵伐晉周平王使虢公將兵伐曲沃莊伯莊伯走保曲沃晉人共立鄂侯子光是為哀侯哀侯二年曲沃莊伯卒子稱代莊伯立是為曲沃武公哀侯六年魯弑其君隱公哀侯八年晉侵陘廷賈逵曰翼南鄙邑名陘廷與曲沃武公謀九年伐晉于汾㫄虜哀侯晉人乃立哀侯子小子為君是為小子侯禮記曰天子未除喪曰余小子生名之死亦名之鄭𤣥曰晉有小子侯是取之天子也小子元年曲沃武公使韓萬殺所虜晉哀侯賈逵曰韓萬曲沃桓叔之子莊伯弟曲沃益彊晉無如之何晉小子之四年曲沃武公誘召晉小子殺之周桓王使虢仲伐曲沃武公武公入於曲沃乃立晉哀侯弟緡為晉侯晉侯緡四年宋執鄭祭仲而立突為鄭君晉侯十九年齊人管至父弑其君襄公晉侯二十八年齊桓公始霸曲沃武公伐晉侯緡滅之盡以其寶器賂獻于周釐王釐王命曲沃武公為晉君列為諸侯於是盡併晉地而有之曲沃武公已即位三十七年矣更號曰晉武公晉武公始都晉國前即位曲沃通年三十八年武公稱者先晉穆侯曾孫也曲沃桓叔孫也桓叔者始封曲沃武公莊伯子也自桓叔初封曲沃以至武公滅晉也凡六十七歲而卒代晉為諸侯武公代晉二歲卒與曲沃通年即位凡三十九年而卒子獻公詭諸立獻公元年周惠王弟穨攻惠王惠王出奔居鄭之櫟邑五年伐驪戎得驪姬韋昭曰西戎之别在驪山也驪姬弟俱愛幸之八年士蒍說公賈逵曰士蒍晉大夫曰故晉之羣公子多不誅亂且起乃使盡殺諸公子而城聚都之賈逵曰聚晉邑命曰絳始都絳九年晉羣公子既亡奔虢虢以其故再伐晉弗克十年晉欲伐虢士蒍曰且待其亂十二年驪姬生奚齊獻公有意廢太子乃曰曲沃吾先祖宗廟所在而蒲邊秦屈邊翟韋昭曰蒲今蒲坂屈北屈皆在河東杜預曰蒲今平陽蒲子縣是也不使諸子居之我懼焉於是使太子申生居曲沃公子重耳居蒲公子夷吾居屈獻公與驪姬子奚齊居絳晉國以此知太子不立也太子申生其母齊桓公女也曰齊姜早死申生同母女弟為秦穆公夫人重耳母翟之狐氏女也夷吾母重耳母女弟也獻公子八人而太子申生重耳夷吾皆有賢行及得驪姬乃逺此三子十六年晉獻公作二軍左𫝊曰王使虢公命曲沃伯以一軍為晉侯今始為一軍公將上軍太子申生將下軍趙夙御戎畢萬為右伐滅霍滅魏滅耿服䖍曰三國皆姬姓魏在晋之蒲坂河東也杜預曰平陽皮氏縣東南有耿鄉永安縣東北有霍太山也還為太子城曲沃賜趙夙耿賜畢萬魏以為大夫士蒍曰太子不得立矣分之都城服䖍曰臣有先君之主曰都而位以卿賈逵曰謂將下軍先為之極服䖍曰言其祿位極盡于此又安得立不如逃之無使罪至為吳太伯不亦可乎王肅曰太伯知天命在王季奔旲不反猶有令名王肅曰雖去猶可有令名何與其坐而及禍也太子不従卜偃曰畢萬之後必大賈逵曰卜偃晋掌卜大夫郭偃萬盈數也魏大名也服䖍曰數從一至萬為滿魏喻巍巍高大也以是始賞天開之矣服䖍曰以魏賞畢萬是為天開其福天子曰兆民諸侯曰萬民令名之大以從盈數其必有衆杜預曰以魏從萬有衆多之象初畢萬卜仕於晉國遇屯之比賈逵曰震下坎上屯坤下坎上比屯初九變之比辛廖占之曰吉賈逵曰辛廖晉大夫屯固比入吉孰大焉杜預曰屯險難也所以為堅固比親密所以得入其後必蕃昌十七年晉侯使太子申生伐東山賈逵曰東山赤狄别種里克諫獻公賈逵曰里克晉卿里季也曰太子奉冢祀社稷之粢盛以朝夕視君膳者也服䖍曰厨膳飲食故曰冢子君行則守有守則從服䖍曰有代太子守則従之從曰撫軍杜䖍曰助君撫循軍士守曰監國古之制也夫率師専行謀也杜預曰率師者必専謀軍亊誓軍旅杜預曰宣號令君與國政之所圖也賈逵曰國政正卿也非太子之事也師在制命而已杜預曰命將軍所制稟命則不威專命則不孝故君之嗣適不可以帥師君失其官杜預曰太子統師是失其官率師不威將安用之杜預曰専命則不孝是為師必不威也公曰寡人有子未知其太子誰立里克不對而退見太子太子曰吾其廢乎里克曰太子勉之教以軍旅賈逵曰將下軍不共是懼何故廢乎且子懼不孝毋懼不得立服䖍曰不得立已修已而不責人則免於難太子帥師公衣之偏衣服䖍曰偏裻之衣偏異色駮不純裻在中左右異故曰偏衣杜預曰偏衣左右異色其半似公服韋昭曰偏半也分身之半以授太子佩之金玦服䖍曰以金為玦也韋昭曰金玦兵要也里克謝病不從太子遂伐東山十九年獻公曰始吾先君莊伯武公之誅晉亂而虢常助晉伐我又匿晉亡公子果為亂弗誅後遺子孫憂乃使荀息以屈産之乗何休曰屈産出名馬之地乗備駟也假道於虞虞假道遂伐虢賈逵曰虞在晉南虢在虞南取其下陽以歸服䖍曰下夏陽虢邑在太陽東北三十里穀梁傳曰下陽虞虢之塞邑獻公私謂驪姬曰吾欲廢太子以奚齊代之驪姬泣曰太子之立諸侯皆已知之而數將兵百姓附之奈何以賤妾之故廢適立庶君必行之妾自殺也驪姬詳譽太子而陰令人譖惡太子而欲立其子二十一年驪姬謂太子曰君夢見齊姜太子速祭曲沃服䖍曰齊姜廟所在歸釐於君太子於是祭其母齊姜於曲沃上其薦胙於獻公獻公時出獵置胙於宫中驪姬使人置毒藥胙中居二日獻公從獵來還宰人上胙獻公獻公欲饗之驪姬從旁止之曰胙所従來逺宜試之祭地地墳韋昭曰將飲先祭示有先也墳起也與犬犬死與小臣小臣死韋昭曰小臣宦名掌陰事今閹士也驪姬泣曰太子何忍也其父而欲弑代之況他人乎且君老矣旦暮之人曾不能待而欲弑之謂獻公曰太子所以然者不過以妾及奚齊之故妾願子母辟之他國若早自殺毋徒使母子為太子所魚肉也始君欲廢之妾猶恨之至於今妾殊自失於此太子聞之奔新城韋昭曰新城曲沃也新為太子城獻公怒乃誅其傅杜原款或謂太子曰為此藥者乃驪姬也太子何不自辭明之太子曰吾君老矣非驪姬寢不安食不甘即辭之君且怒之不可或謂太子曰可奔他國太子曰被此惡名以出人誰内我我自殺耳十一月戊申申生自殺於新城此時重耳夷吾來朝人或告驪姬曰二公子怨驪姬譖殺太子驪姬恐因譖二公子申生之藥胙二公子知之二子聞之恐重耳走蒲夷吾走屈保其城自備守初獻公使士蒍為二公子築蒲屈城弗就夷吾以告公公怒士蒍士蒍謝曰邊城少冦安用之退而歌曰狐裘䝉茸一國三公吾誰適從服䖍曰䝉茸以言亂貎三公言君與二公子將敵故不知所從卒就城及申生死二子亦歸保其城二十二年獻公怒二子不辭而去果有謀矣乃使兵伐蒲蒲人之宦者勃鞮命重耳促自殺重耳踰垣宦者追斬其衣袪服䖍曰袪袂也重耳遂奔翟使人伐屈屈城守不可下是嵗也晉復假道於虞以伐虢虞之大夫宫之奇諫虞君曰晉不可假道也是且滅虞虞君曰晉我同姓不宜伐我宫之奇曰太伯虞仲太王之子也太伯亡去是以不嗣虢仲虢叔王季之子也為文王卿士其記勲在王室蔵於盟府杜預曰盟府司盟之官也將虢是滅何愛于虞且虞之親能親於桓莊之族乎桓莊之族何罪盡滅之虞之與虢脣之與齒脣亡則齒寒虞公不聽遂許晉宫之奇以其族去虞其冬晉滅虢虢公醜奔周皇覽曰虢公冢在河内温縣郭東濟水南大冢是也其城南有虢公臺還襲滅虞虜虞公并其大夫井伯百里奚以媵秦穆公杜預曰穆姬獻公女送女曰媵以屈辱之而修虞祀服䖍曰虞所祭祀命祀也荀息牽曩所遺虞屈産之乗馬奉之獻公獻公笑曰馬則吾馬齒亦老矣公羊傳曰盖戲之也何休曰以馬嵗戲喻荀息之年老也二十三年獻公遂發賈華等伐屈賈逵曰賈華晉右行大夫屈潰夷吾將奔翟冀芮曰不可韋昭曰冀芮晉大夫重耳已在矣今往晉必移兵伐翟翟畏晉禍且及不如走梁梁近於秦秦彊吾君百嵗後可以求入焉遂奔梁二十五年晉伐翟翟以重耳故亦擊晉於齧桑左傳作采桑服䖍曰翟地晉兵解而去當此時晉彊西有河西與秦接境北邊翟東至河内驪姬弟生悼子二十六年夏齊桓公大會諸侯於葵邱晉獻公病行後未至逢周之宰孔宰孔曰齊桓公益驕不務德而務逺略諸侯弗平君第毋會毋如晉何獻公亦病復還歸病甚乃謂荀息曰吾以奚齊為後年少諸大臣不服恐亂起子能立之乎荀息曰能獻公曰何以為驗對曰使死者復生生者不慙為之驗於是遂属奚齊於荀息荀息為相主國政秋九月獻公卒里克邳鄭欲内重耳以三公子之徒作亂賈逵曰邳鄭晉大夫三公子申生重耳夷吾謂荀息曰三怨將起秦晉輔之子將何如荀息曰吾不可負先君言十月里克殺奚齊于喪次獻公未葬也荀息將死之或曰不如立奚齊弟悼子而傅之荀息立悼子而葬獻公十一月里克弑悼子于朝列女傳曰鞭殺驪姬于市荀息死之君子曰詩所謂白珪之玷猶可磨也斯言之玷不可為也杜預曰詩大雅言此言之缺難治甚於白珪其荀息之謂乎不負其言初獻公將伐驪戎卜曰齒牙為禍韋昭曰齒牙謂兆端左右釁拆有似齒牙中有縦畫以象讒言之為害也及破驪戎獲驪姬愛之竟以亂晉里克等已殺奚齊悼子使人迎公子重耳於翟欲立之重耳謝曰負父之命出奔父死不得修人子之禮侍喪重耳何敢入大夫其更立他子還報里克里克使迎夷吾於梁夷吾欲往吕省郤芮曰内猶有公子可立者而外求難信計非之秦輔彊國之威以入恐危乃使郤芮賂秦約曰即得入請以晉河西之地與秦乃遺里克書曰誠得立請遂封子於汾陽之邑賈逵曰汾水名汾陽晉地也秦繆公乃發兵送夷吾于晉齊桓公聞晉内亂亦率諸候如晉秦兵與夷吾亦至晉齊乃使隰朋會秦俱入夷吾立為晉君是為惠公齊桓公至晉之髙梁而還歸惠公夷吾元年使邳鄭謝秦曰始夷吾以河西地許君今幸得入立大臣曰地者先君之地君亡在外何以得擅許秦者寡人爭之弗能得故謝秦亦不與里克汾陽邑而奪之權四月周襄王使周公忌父賈逵曰周卿士會齊秦大夫共禮晉惠公惠公以重耳在外畏里克為變賜里克死謂曰微里子寡人不得立雖然子亦殺二君一大夫服䖍曰奚齊悼子荀息也為子君者不亦難乎里克對曰不有所廢君何以興欲誅之其無辭乎乃言為此臣聞命矣遂伏劒而死於是邳鄭使謝秦未還故不及難晉君改葬恭太子申生韋昭曰獻公時申生葬不如禮故改葬之秋狐突之下國服䖍曰晋所滅國以為下邑一曰曲沃有宗廟故謂之下在絳下故曰下國也遇申生申生與載而告之杜預曰忽如夢而相見狐突本為申生御故復使登車曰夷吾無禮余得請於帝服䖍曰帝天帝請罰有罪將以晉與秦秦將祀余狐突對曰臣聞神不食非其宗君其祀毋乃絶乎君其圖之申生曰諾吾將復請帝後十日左傳曰七日新城西偏將有巫者見我焉杜預曰將因巫以見許之遂不見杜預曰狐突許其言申生之象亦沒及期而往復見申生告之曰帝許罰有罪矣弊於韓賈逵曰弊敗也韓晉韓原兒乃謡曰恭太子更葬矣後十四年晉亦不昌昌乃在兄邳鄭使秦聞里克誅乃說秦繆公曰吕省郤稱冀芮實為不從杜預曰三子晉大夫不從不與秦賂也若重賂與謀出晉君入重耳事必就秦繆公許之使人與歸報晉厚賂三子三子曰幣厚言甘此必邳鄭賣我於秦遂殺邳鄭及里克邳鄭之黨七輿大夫韋昭曰七輿申生下軍之衆大夫也杜預曰侯伯七命副車七乗邳鄭子豹奔秦言伐晉繆公弗聽惠公之立倍秦地及里克誅七輿大夫國人不附二年周使召公過韋昭曰召武公為王卿士禮晉惠公惠公禮倨召公譏之四年晉饑乞糴於秦繆公問百里奚服䖍曰秦大夫百里奚曰天菑流行國家代有救菑恤鄰國之道也與之邳鄭子豹曰伐之繆公曰其君是惡其民何罪卒與粟自雍屬絳五年秦饑請糴於晉晉君謀之慶鄭曰杜預曰慶鄭晉大夫以秦得立已而倍其地約晉饑而秦貸我今秦饑請糴與之何疑而謀之虢射曰服䖍曰虢射惠公舅往年天以晉賜秦秦弗知取而貸我今天以秦賜晉晉其可以逆天乎遂伐之惠公用虢射謀不與秦粟而發兵且伐秦秦大怒亦發兵伐晉六年春秦繆公將兵伐晉晉惠公謂慶鄭曰秦師深矣韋昭曰深入境一曰深尤重奈何鄭曰秦内君君倍其賂晉饑秦輸粟秦饑而晉倍之乃欲因其饑伐之其深不亦宜乎晉卜御右慶鄭皆吉公曰鄭不孫服䖍曰孫順乃更令步陽御戎家僕徒為右服虔曰二子晉大夫也進兵九月壬戌秦繆公晉惠公合戰韓原惠公馬鷙不行秦兵至公窘召慶鄭為御鄭曰不用卜敗不亦當乎遂去更令梁繇靡御虢射為右輅秦繆公服䖍曰輅迎也繆公壯士冒敗晉軍晉軍敗遂失秦繆公反獲晉公以歸秦將以祀上帝繆君姊為繆公夫人衰絰涕泣公曰得晉侯將以為樂今乃如此且吾聞箕子見唐叔之初封曰其後必當大矣晉庸可滅乎乃與晉侯盟王城杜預曰馮翊臨晉縣東有王城而許之歸晉侯亦使吕省等報國人曰孤雖得歸毋面目見社稷卜日立子圉晉人聞之皆哭秦繆公聞吕省晉國和乎對曰不和小人懼失君亡親不憚立子圉曰必報讐寧事戎狄其君子則愛君而知罪以待秦命曰必報德有此二故不和於是秦繆公更舍晉惠公餽之七牢十一月歸晉侯晉侯至國誅慶鄭修政教謀曰重耳在外諸侯多利内之欲使人殺重耳於狄重耳聞之如齊八年使太子圉質秦初惠公亡在梁梁伯以其女妻之生一男一女梁伯卜之男為人臣女為人妾故名男為圉女為妾服䖍曰圉人掌養馬臣之賤者不聘曰妾十年秦滅梁梁伯好土功治城溝賈逵曰溝塹也民力罷怨其衆數相驚曰秦㓂至民恐惑秦竟滅之十三年晉惠公病内有數子太子圉曰吾母家在梁梁今秦滅之我外輕於秦而内無援於國君即不起病大夫輕更立他公子乃謀與其妻俱亡歸秦女曰子一國太子辱在此秦使婢子侍服䖍曰曲禮曰世婦以下自稱婢子婢子婦人之卑稱以固子之心子亡矣我不從子亦不敢言子圉遂亡歸晉十四年九月惠公卒太子圉立是為懷公子圉之亡秦怨之乃求公子重耳欲内之子圉之立畏秦之伐也乃令國中諸從重耳亡者與期期盡不到者盡滅其家狐突之子毛及偃從重耳在秦弗肯召懷公怒囚狐突突曰臣子事重耳有年數矣今召之是教之反君也何以教之懷公卒殺狐突秦繆公乃發兵送内重耳使人告欒郤之黨為内應殺懐公於高梁入重耳重耳立是為文公晉文公重耳晉獻公之子也自少好士年十七有賢士五人曰趙衰狐偃咎犯文公舅也賈佗先軫魏武子自獻公為太子時重耳固已成人矣獻公即位重耳年二十一獻公十三年以驪姬故重耳備蒲城守秦獻公二十一年獻公殺太子申生驪姬讒之恐不辭獻公而守蒲城獻公二十二年獻公使宦者履鞮趣殺重耳重耳踰垣宦者遂斬其衣袪重耳遂奔狄狄其母國也是時重耳年四十三從此五士其餘不名者數十人至狄狄伐咎如賈逵曰赤狄之别隗姓得二女以長女妻重耳生伯儵叔劉以少女妻趙衰生盾居狄五歲而晉獻公卒里克己殺奚齊悼子乃使人迎欲立重耳重耳畏殺因固謝不敢入已而晉更迎其弟夷吾立之是為惠公惠公七年畏重耳乃使宦者履鞮與壯士欲殺重耳重耳聞之乃謀趙衰等曰始吾奔狄非以為可用興以近易通故且休足休足久矣固願徙之大國夫齊桓公好善志在霸王收恤諸侯今聞管仲隰朋死此亦得賢佐盍往乎於是遂行重耳謂其妻曰待我二十五年不來乃嫁其妻笑曰犂二十五年吾冡上柏大矣雖然妾待子重耳居狄凡十二年而去過衛衛文公不禮去過五鹿賈逵曰衛地杜預曰今衛縣西北有地名五鹿平陽元城縣東亦有五鹿飢而從野人乞食野人盛土器中進之重耳怒趙衰曰土者有上也君其拜受之至齊齊桓公厚禮而以宗女妻之有馬二十乘重耳安之重耳至齊二歲而桓公卒會豎刁等為内亂齊孝公之立諸侯兵數至留齊凡五歲重耳愛齊女毋去心趙衰咎犯乃於桑下謀行齊女侍者在桑上聞之以告其主其主乃殺侍者服䖍曰懼孝公怒故殺之以滅口勸重耳趣行重耳曰人生安樂孰知其他必死於此徐廣曰一云人生一世必死於此不能去齊女曰子一國公子窮而來此數士者以子為命子不疾反國報勞臣而懷女德竊為子羞之且不求何時得功乃與趙衰等謀醉重耳載以行行逺而覺重耳大怒引戈欲殺咎犯咎犯曰殺臣成子偃之願也重耳曰事不成我食舅氏之肉咎犯曰事不成犯肉腥臊何足食乃止遂行過曹曹共公不禮欲觀重耳駢脇曹大夫釐負羈曰晉公子賢又同姓窮來過我奈何不禮共公不從其謀負羈乃私遺重耳食置璧其下重耳受其食還其璧去過宋宋襄公新困兵於楚傷於泓聞重耳賢乃以國禮禮於重耳宋司馬公孫固善於咎犯曰宋小國新困不足以求入更之大國乃去過鄭鄭文公弗禮鄭叔詹諫其君曰晉公子賢而其從者皆國相且又同姓鄭之出自厲王而晉之出自武王鄭君曰諸侯亡公子過此者衆安可盡禮叔瞻曰君不禮不如殺之且後為國患鄭君不聽重耳去之楚楚成王以適諸侯禮待之重耳謝不敢當趙衰曰子亡在外十餘年小國輕子況大國乎今楚大國而固遇子子其毋讓此天開子也遂以客禮見之成王厚遇重耳重耳甚卑成王曰子即反國何以報寡人重耳曰羽毛齒角玉帛君王所餘未知所以報王曰雖然何以報不穀重耳曰即不得已與君王以兵車㑹平原廣澤請辟王三舍賈逵曰司馬法從遯不過三舍三舍九十里也楚將子玉怒曰王遇晉公子至厚今重耳言不孫請殺之武王曰晉公子賢而困於外久從者皆國器此天所置庸可殺乎且言何以易之居楚數月而晉太子圉亡秦秦怨之聞重耳在楚乃召之成王曰楚逺更數國乃至晉秦晉接境秦君賢子其勉行厚送重耳重耳至秦繆公以宗女五人妻重耳故子圉妻與往重耳不欲受司空季子服䖍曰胥臣臼季也曰其國且伐況其故妻乎且受以結秦親而求入子乃拘小禮忘大醜乎遂受繆公大歡與重耳飲趙衰歌黍苗詩韋昭曰詩云芃芃黍苗隂雨膏之繆公曰知子欲急反國矣趙衰與重耳下再拜曰孤臣之仰君如百穀之望時雨是時晉惠公十四年秋惠公以九月卒子圉立十一月葬惠公十二月晉國大夫欒郤等聞重耳在秦皆隂來勸重耳趙衰等反國為内應甚衆於是秦繆公乃發兵與重耳歸晉晉聞秦兵來亦發兵拒之然皆隂知公子重耳入也唯惠公之故貴臣吕郤之屬不欲立重耳重耳出亡凡十九歲而得入時年六十二矣晉人多附焉文公元年春秦送重耳至河咎犯曰臣從君周旋天下過亦多矣臣猶知之況於君乎請從此去矣重耳曰若反國所不與子犯共者河伯視之乃投璧河中以與子犯盟是時介子推從在船中乃笑曰天實開公子而子犯以為已功而要市於君固足羞也吾不忍與同位乃自隱渡河秦兵圍令狐晉軍于廬柳韋昭曰廬柳晉地也二月辛丑咎犯與秦晉大夫盟於郇杜預曰解縣西北有郇城壬寅重耳入於晉師丙午入於曲沃丁未朝于武宫賈逵曰文公之祖武公廟也即位為晉君是為文公羣臣皆往懷公圉奔高梁戊申使人殺懷公懷公故大臣吕省郤芮本不附文公文公立恐誅乃欲與其徒謀燒公宫殺文公文公不知始嘗欲殺文公宦者履鞮知其謀欲以告文公解前罪求見文公文公不見使人讓曰蒲城之事女斬予袪其後我從狄君獵女為惠公來求我我惠公與女期三日至而女一日至何速也女其念之宦者曰臣刀鋸之餘不敢以二心事君倍主故得罪於君君已反國其毋蒲翟乎且管仲射鉤桓公以霸今刑餘之人以事告而君不見禍又且及矣於是見之遂以吕郤等告文公文公欲召吕郤吕郤等黨多文公恐初入國國人賣已乃為微行會秦繆公於王城國人莫知三月己丑吕郤等果反焚公宫不得文公文公之衛徒與戰吕郤等引兵欲奔秦繆公誘吕郤等殺之河上晉國復而文公得歸夏迎夫人於秦秦所與文公妻者卒為夫人秦送三千人為衛以備晉亂文公修政施惠百姓賞從亡者及功臣大者封邑小者尊爵未盡行賞周襄王以弟帶難出居鄭地來告急晉晉初定欲發兵恐他亂起是以賞從亡未至隱者介子推推亦不言祿祿亦不及推曰獻公子九人唯君在矣惠懷無親外内棄之天未絶晉必將有主主晉祀者非君而誰天實開之二三子以為已力不亦誣乎竊人之財猶曰是盜況貪天之功以為已力乎下冒其罪上賞其姦上下相䝉服䖍曰蒙欺也難與處矣其母曰盍亦求之以死誰懟推曰尤而效之罪有甚焉且出怨言不食其祿母曰亦使知之若何對曰言身之文也身欲隱安用文之文之是求顯也其母曰能如此乎與女偕隱至死不復見介子推從者憐之乃懸書宫門曰龍欲上天五蛇為輔龍已升雲四蛇各入其宇一蛇獨怨終不見處所文公出見其書曰此介子推也吾方憂王室未圖其功使人召之則亡遂求所在聞其入綿上山中賈逵曰綿上晉地杜預曰西河介休縣南有地名綿上於是文公環綿上山中而封之以為介推田徐廣曰一作國號曰介山以記吾過且旌善人賈逵曰旌表也從亡賤臣壺叔曰君三行賞賞不及臣敢請罪文公報曰夫導我以仁義防我以德惠此受上賞輔我以行卒以成立此受次賞矢石之難汗馬之勞此復受次賞若以力事我而無補吾缺者此受次賞三賞之後故且及子晉人聞之皆說二年春秦軍河上將入王趙衰曰求霸莫如入王尊周周晉同姓晉不先入王後秦入之毋以令于天下方今尊王晉之資也三月甲辰晋乃發兵至陽樊服䖍曰陽樊周地陽邑名也樊仲山之所居故曰陽樊圍温入襄王於周四月殺王弟帶周襄王賜晉河内陽樊之地四年楚成王及諸侯圍宋宋公孫固如晉告急先軫曰報施定霸於今在矣杜預曰報宋贈馬之施狐偃曰楚新得曹而初㛰於衛若伐曹衛楚必救之則宋免矣於是晉作三軍王肅曰始復成國之禮半周軍也趙衰舉郤縠將中軍郤臻佐之使狐偃將上軍狐毛佐之命趙衰為卿欒枝將下軍賈逵曰欒枝欒賓之孫先軫佐之荀林父御戎魏犨為右往伐冬十二月晉兵先下山東而以原封趙衰杜預曰河内泌水縣西北有原城五年春晉文公欲伐曹假道於衛衛人弗許還自河南度侵曹伐衞正月取五鹿二月晉侯齊侯盟于斂盂杜預曰衛地也衛侯請盟晉晉人不許衛侯欲與楚國人不欲故出其君以說晉衛侯居襄牛服䖍曰衛地也公子買守衛楚救衛不卒徐廣曰一作勝晉侯圍曹三月丙午晉師入曹數之以其不用釐負羈言而用美女乗軒者三百人也令軍毋入僖負羈宗家以報德楚圍宋宋復告急晉文公欲救則攻楚為楚嘗有德不欲伐也欲釋宋宋又嘗有德於晉患之先軫曰執曹伯分曹衛地以與宋楚急曹衛其勢宜釋宋於是文公從之而楚成王乃引兵歸楚將子玉曰王遇晉至厚今知楚急曹衛而故伐之是輕王王曰晉侯在外十九年困日久矣果得反國險阨盡知之能用其民天之所開不可當子玉請曰非敢必有功願以間執讒慝之口也服䖍曰子玉非敢求有大功但欲執蒍賈讒慝之口謂子玉過三百乗不能入也杜預曰執猶塞也楚王怒少與之兵於是子玉使宛春告晉賈逵曰宛春楚大夫請復衛侯而封曹臣亦釋宋咎犯曰子玉無禮矣君取一臣取二勿許韋昭曰君文公也臣子玉也一謂釋宋圍二謂復曹衛先軫曰定人之謂禮楚一言定三國子一言而亡之我則毋禮不許楚是棄宋也不如私許曹衛以誘之執宛春以怒楚韋昭曰怒楚令必戰既戰而後圖之杜預曰須勝負決乃定許晉侯乃囚宛春於衛且私許復曹衛曹衛告絶於楚楚得臣怒得臣即子玉擊晉師晉師退軍吏曰為何退文公曰昔我楚約退三舍可倍乎楚師欲去得臣不肯四月戊辰宋公齊將秦將與晉侯次城濮賈逵曰衛地也己巳與楚兵合戰楚兵敗得臣收餘兵去甲午晉師還至衡雍杜預曰衡雍鄭地今滎陽卷縣也作王宫于踐土服䖍曰既敗楚師襄王自往臨踐土賜命晉侯晉侯聞而為之作宫初鄭助楚楚敗懼使人請盟晉侯晉侯與鄭伯盟五月丁未獻楚俘於周駟介百乘徒兵千服䖍曰駟介駟馬被甲也徒兵步卒也天子使王子虎命晉侯為伯賈逵曰王子虎周大夫賜大輅彤弓矢百玈弓矢千賈逵曰大輅金輅彤弓赤玈弓黑也諸侯賜弓矢然後征伐秬鬯一卣珪瓚賈逵曰秬黑黍鬯香酒也所以降神卣器名諸侯賜珪瓉然後為鬯虎賁三百人賈逵曰天子卒曰虎賁晉侯三辭然後稽首受之賈逵曰稽首首至地周作晉文侯命王若曰父義和孔安國曰同姓故稱曰父馬融曰王順曰父能以義和我諸侯丕顯文武能慎眀德孔安國曰文王武王能詳慎顯用明德昭登於上布聞在下馬融曰昭明也上謂天下謂地維時上帝集厥命於文武孔安國曰惟以是故集成其王命德流子孫恤朕身繼予一人永其在位孔安國曰當憂念我身則我一人長安在位於是晉文公稱伯癸亥王子虎盟諸侯於王庭服䖍曰王庭踐土也晉焚楚軍火數日不息文公歎左右曰勝楚而君猶憂文公曰吾聞能戰勝安者唯聖人是以懼且子玉猶在庸可喜乎子玉之敗而歸楚成王怒其不用其言貪與晉戰讓責子玉子玉自殺晉文公曰我擊其外楚誅其内内外相應於是乃喜六月晉人復入衛侯壬午晉侯渡河北歸國行賞狐偃為首或曰城濮之事先軫之謀文公曰城濮之事偃說我毋失信先軫曰軍事勝為右吾用之以勝然此一時之說偃言萬世之功奈何以一時之利而加萬世功乎是以先之冬晉侯會諸侯于温欲率之朝周力未能恐其有畔者乃使人言天王狩於河陽壬申遂率諸侯朝王於踐土孔子讀史記至文公曰諸侯無召王王狩河陽者春秋諱之也丁丑諸侯圍許曹伯臣或說晉侯曰齊桓公合諸侯而國異姓今君為會而滅同姓曹叔振鐸之後晉唐叔之後合諸侯而滅兄弟非禮晉侯說復曹伯於是晉始作三行服䖍曰辟天子六軍故謂之三行荀林父將中行先縠將右行先蔑將左行杜預曰三行無佐疑大夫帥也七年晉文公秦穆公共圍鄭以其無禮於文公亡過時及城濮時鄭助楚也圍鄭欲得叔瞻叔瞻聞之自殺鄭持叔瞻告晉晉曰必得鄭君而甘心焉鄭恐乃間令使謂秦穆公曰亡鄭厚晉於晉得矣而秦未為利君何不解鄭得為東道交秦伯說罷兵晉亦罷兵九年冬晉文公卒子襄公歡立是嵗鄭伯亦卒鄭人或賣其國於秦秦穆公發兵往襲鄭十二月秦兵過我郊襄公元年春秦師過周無禮王孫滿譏之兵至滑鄭賈人弦高將市于周遇之以十二牛勞秦師秦師驚而還滅滑而去晉先軫曰秦伯不用蹇叔反其衆心此可擊欒枝曰未報先君施於秦擊之不可先軫曰秦侮吾孤伐吾同姓何德之報遂擊之襄公墨衰絰賈逵曰墨變凶杜預曰以凶服從戎故墨之四月敗秦師于殽虜秦三將孟明視西乞秫白乙丙以歸遂墨以葬文公服䖍曰非禮也杜預曰記禮所由變也文公夫人秦女謂襄公曰秦欲得其三將戮之公許遣之先軫聞之謂襄公曰患生矣軫乃追秦將秦將渡河已在船中頓首謝卒不反後三年秦果使孟明伐晉報殽之敗取晉汪以歸四年秦繆公大興兵伐我渡河取王官封殽尸而去晉恐不敢出遂城守五年晉伐秦取新城服䖍曰秦邑新所作城也報王官役也六年趙衰成子欒貞子咎季子犯霍伯皆卒賈逵曰欒貞子欒枝也霍伯先且居也趙盾代趙衰執政七年八月襄公卒太子夷臯少晉人以難故服䖍曰晉國數有患難欲立長君趙盾曰立襄公弟雍好善而長先君愛之且近於秦秦故好也立善則固事長則順奉愛則孝結舊好則安賈季曰不如其弟樂辰嬴嬖於二君服䖍曰辰嬴懷嬴也二君懷公文公立其子民必安之趙盾曰長嬴賤班在九人下服䖍曰班次也其子何震之有賈逵曰震威也且為二君嬖淫也為先君子不能求大而出在小國僻也母淫子僻無威陳小而逺無援將何可乎使士會如秦迎公子雍賈季亦使人召公子樂於陳趙盾廢賈季以其殺陽處父案左傳曰此時賈他為太師陽處父為太傅十月葬襄公十一月賈季奔翟是嵗秦繆公亦卒靈公元年四月秦康公曰昔文公之入也無衛故有吕郤之患乃多與公子雍衛太子母繆嬴日夜抱太子以號泣於朝曰先君何罪其嗣亦何罪舍適而外求君將安置此服䖍曰此太子出朝則抱以適趙盾所頓首曰先君奉此子而属之子曰此子材吾受其賜不材吾怨子王肅曰怨其教導不至今君卒言猶在耳杜預曰在宣子之耳而棄之若何趙盾與諸大夫皆患穆嬴且畏誅乃背所迎而立太子夷臯是為靈公發兵以距秦送公子雍者趙盾為將往擊秦敗之令狐先蔑隨會亡奔秦秋齊宋衛鄭曹許君皆會趙盾盟于扈杜預曰鄭地滎陽卷縣西北有扈亭以靈公初立故也四年伐秦取少梁秦亦取晉之郩徐廣曰年表曰北徴也六年秦康公伐晉取羈馬晉侯怒使趙盾趙穿郤缺擊秦大戰河曲趙穿最有功七年晉六卿患隨會之在秦常為晉亂乃詳令魏夀餘反晉降秦秦使隨會之魏因執會以歸晉八年周頃王崩公卿爭權故不赴晉使趙盾以車八百乘平周亂而立匡王是年楚莊王初即位十二年齊人弑其君懿公十四年靈公壯侈厚斂以雕墻賈逵曰彫畫也從臺上彈人觀其避丸也宰夫胹熊蟠不熟服䖍曰蹯熊掌其肉難熟靈公怒殺宰夫使婦人持其屍出棄之過朝趙盾隨會前數諫不聽已又見死人手二人前諫隨會先諫不聽靈公患之使鉏麑刺趙盾賈逵曰鉏麑晉力士盾閨門開居處節鉏麑退歎曰殺忠臣棄君命罪一也遂觸樹而死杜預曰趙盾庭樹也初盾嘗田首山徐廣曰蒲坂縣有雷首山見桑下有餓人餓人示眯明也盾與之食食其半問其故曰宦三年服䖍曰宦官學仕也未知母之存不願遺母盾義之益與之飯肉已而為晉宰夫趙盾弗復知也九月晉靈公飲趙盾酒伏甲將攻盾公宰示眯明知之恐盾醉不能起而進曰君賜臣觴三行可以罷欲以去趙盾令先母及難盾既去靈公伏士未會先縱齧狗名敖何休曰犬四尺曰敖明為盾摶殺狗盾曰棄人用狗雖猛何為然不知明之為隂德也已而靈公縱伏士出逐趙盾示眯明反擊靈公之伏士伏士不能進而竟脫盾盾問其故曰我桑下餓人問其名弗告服䖍曰不望報明亦因亡去盾遂奔未出晉境乙丑盾昆弟將軍趙穿襲殺靈公於桃園虞翻曰園名也而迎趙盾趙盾素貴得民和靈公少侈民不附故為弑易盾復位晉太史董狐書曰趙盾弑其君以視於朝盾曰弑者趙穿我無罪太史曰子為正卿而亡不出境反不誅國亂非子而誰孔子聞之曰董狐古之良史也書法不隱杜預曰不隱盾之罪宣子良大夫也為法受惡服䖍曰聞義則服杜預曰善其為法受屈也惜也出疆乃免杜預曰越境則君臣之義絶可以不討賊也趙盾使趙穿迎襄公弟黑臀于周而立之是為成公成公者文公少子其母周女也壬申朝于武宫成公元年賜趙氏為公族服䖍曰公族大夫也伐鄭鄭倍晉故也三年鄭伯初立附晉而棄楚楚怒伐鄭晉往救之六年伐秦虜秦將赤七年成公與楚莊王爭彊會諸侯于扈陳畏楚不會晉使中行桓子伐陳因救鄭與楚戰敗楚師是年成公卒子景公據立景公元年春陳大夫夏徵舒弑其君靈公二年楚莊王伐陳誅徵舒三年楚莊王圍鄭鄭告急晉晉使荀林父將中軍隨會將上軍趙朔將下軍郤克欒書先縠韓厥鞏朔佐之六月至河聞楚已服鄭鄭伯肉袒與盟而去荀林父欲還先縠曰凡來救鄭不至不可將率離心卒度河楚已服鄭欲飲馬于河為名而去楚與晉軍大戰鄭新附楚畏之反助楚攻晉晉軍敗走河争度船中人指甚衆楚虜我將智罃歸而林父曰臣為督將軍敗當誅請死景公欲許之隨會曰昔文公之與楚戰城濮成王歸殺子玉而文公乃喜今楚已敗我師又誅其將是助楚殺仇也乃止四年先縠以首計而敗晉軍河上恐誅乃奔翟與翟謀伐晉晉覺乃族縠縠先軫子也五年伐鄭為助楚故也是時楚莊王彊以挫晉兵河上也六年楚伐宋宋來告急晉晉欲救之伯宗謀曰賈逵曰伯宗晉大夫楚天方開之不可當乃使解楊紿為救宋服䖍曰解楊晉大夫鄭人執與楚楚厚賜使反其言令宋急下解楊紿許之卒致晉君言楚欲殺之或諫乃歸解楊七年晉使隨會滅赤狄八年使郤克於齊齊景公母從樓上觀而笑之所以然者郤克僂而魯使蹇衛使眇故齊亦令人如之以導客郤克怒歸至河上曰不報齊者河伯視之至國請君欲伐齊景公問知其故曰子之怨安足以煩國弗聽魏文子請老休辟郤克克執政九年楚莊王卒晉伐齊齊使太子彊為質於晉晉兵罷十一年春齊伐魯取隆魯吿急衛衛與魯皆因郤克告急於晉晉乃使郤克欒書韓厥以兵車八百乘與魯衛共伐齊夏與頃公戰於鞌傷困頃公頃公乃與其右易位下取飲以得脫去齊師敗走晉追北至齊頃公獻寶器以求平不聽郤克曰必得蕭桐姪子為質齊使曰蕭桐姪子頃公母頃公母猶晉君母奈何必得之不義請復戰晉乃許與平而去楚申公巫臣盜夏姬以奔晉晉以巫臣為邢大夫賈逵曰邢晉邑十二年冬齊頃公如晉欲上尊晉景公為王景公讓不敢晉始作六卿賈逵曰初作六卿僭王也韓厥鞏朔趙穿荀騅趙括趙旃皆為卿智罃自楚歸十三年魯成公朝晉晉弗敬魯怒去倍晉晉伐鄭取汜十四年梁山崩公羊傳曰梁山河上山杜預曰在馮翊夏陽北也問伯宗伯宗以為不足怪也徐廣曰年表曰伯宗隠其人用其言十六年楚將子反怨巫臣滅其族巫臣怒遺子反書曰必令子罷於奔命乃請使吳令其子為吳行人教吳乘車用兵吳晉始通約伐楚十七年誅趙同趙括族滅之韓厥曰趙衰趙盾之功豈可忘乎奈何絶祀乃復令趙庶子武為趙後復與之邑十九年夏景公病立其太子壽曼為君是為厲公後月餘景公卒厲公元年初立欲和諸侯與秦桓公夾河而盟歸而秦倍盟與翟謀伐晉三年使吕相讓秦賈逵曰吕相晉大夫因與諸侯伐秦至涇敗秦於麻隧虜其將成差五年三郤讒伯宗殺之賈逵曰三郤郤錡郤犨郤至伯宗以好直諫得此禍國人以是不附厲公六年春鄭倍晉與楚盟晉怒欒書曰不可以當吾世而失諸侯乃發兵厲公自將五月渡河聞楚兵來救范文子請公欲還郤至曰發兵誅逆見彊辟之無以令諸侯遂與戰癸巳射中楚共王目楚兵敗於鄢徐廣曰一作焉陵服䖍曰鄢陵鄭之東南地也子反收餘兵拊循欲復戰晉患之共王召子反其侍者豎陽穀進酒子反醉不能見王怒讓子反子反死王遂引兵歸晉由此威諸侯欲以令天下求霸厲公多外嬖姬歸欲盡去羣大夫而立諸姬兄弟寵姬兄曰胥童嘗與郤至有怨及欒書又怨郤至不用其計而遂敗楚左傳曰欒書欲待楚師退而擊之郤至云楚有六間不可失也乃使人間謝楚楚來詐厲公曰鄢陵之戰實至召楚欲作亂内子周立之會與國不俱是以事不成厲公告欒書欒書曰其殆有矣願公試使人之周虞翻曰周京師微考之果使郤至於周欒書又使公子周見郤至郤至不知見賣也厲公驗之信然遂怨郤至欲殺之八年厲公獵與姬飲郤至殺豕奉進宦者奪之郤至射殺宦者公怒曰季子欺予杜預曰公反以為郤至奪豕也將誅三郤未發也郤錡欲攻公曰我雖死公亦病矣郤至曰信不反君智不害民勇不作亂失此三者誰與我我死耳十二月壬午公令胥童以兵八百人襲攻殺三郤胥童因以劫欒書中行偃于朝曰不殺二子患必及公公曰一旦殺三卿寡人不忍益也對曰人將忍君杜預曰人謂書偃公弗聽謝欒書等以誅郤氏罪大夫復位二子頓首曰幸甚幸甚公使胥童為卿閏月乙卯厲公游匠驪氏賈逵曰匠驪氏晉外嬖大夫在翼者欒書中行偃以其黨襲捕厲公囚之殺胥童而使人迎公子周徐廣曰一作糾于周而立之是為悼公悼公元年正月庚申欒書中行偃弑厲公葬之左傳曰葬之于翼東門之外以一乘車杜預曰言不以君禮葬也諸侯葬車七乘厲公囚六日死死十日庚午智罃迎公子周來至絳刑雞與大夫盟而立之是為悼公辛巳朝武宫二月乙酉即位悼公周者其大父捷晉襄公少子也不得立號為桓叔桓叔最愛桓叔生惠伯談談生悼公周周之立年十四矣悼公曰大父父皆不得立而辟難於周客死焉寡人自以疎逺毋幾為君今大夫不忘文襄之意而惠立桓叔之後賴宗廟大夫之靈得奉晉祀豈敢不戰戰乎大夫其亦助寡人於是逐不臣者七人修舊功施德惠收文公入時功臣後秋伐鄭鄭師敗遂至陳三年晉會諸侯悼公問羣臣可用者祁傒舉解狐解狐傒之仇復問舉其子祁午君子曰祁傒可謂不黨矣外舉不避仇内舉不隠子方會諸侯悼公弟楊干亂行賈逵曰行陳也魏絳戮其僕賈逵曰僕御也悼公怒或諫公公卒賢絳任之政使和戎戎大親附十一年悼公曰自吾用魏絳九合諸侯服䖍曰九合一謂會于戚二會城棣救陳三會于鄢四會于邢丘五同盟于戲六會于祖七戍鄭虎牢八同盟于亳城北九會于蕭魚和戎翟魏子之力也賜之樂三讓乃受之冬秦取我櫟十四年晉使六卿率諸侯伐秦度涇大敗秦軍至棫林而去十五年悼公問治國於師曠師曠曰唯仁義為本冬悼公卒子平公彪立平公元年伐齊齊靈公與戰靡下徐廣曰靡一作厯齊師敗走晏嬰曰君亦毋勇何不止戰遂去晉追遂圍臨菑盡燒屠其郭中東至膠南至沂齊皆城守晉乃引兵歸六年魯襄公朝晉晉欒逞有罪奔齊八年齊莊公微遣欒逞於曲沃以兵隨之齊兵上太行欒逞從曲沃中反襲入絳絳不戒平公欲自殺范獻子止公以其徒擊逞逞敗走曲沃曲沃攻逞逞死遂滅欒氏宗逞者欒書孫也左傳逞作盈其入絳與魏氏謀齊莊公聞逞敗乃還取晉之朝歌去以報臨菑之役也十年齊崔杼弑其君莊公晉因齊亂伐敗齊於高唐去報太行之役也十四年吳延陵季子來使與趙文子韓宣子魏獻子語曰晉國之政卒歸此三家矣十九年齊使晏嬰如晉與叔嚮語叔嚮曰晉季世也公厚賦為臺池而不恤政政在私門其可久乎晏子然之二十二年伐燕二十六年平公卒子昭公夷立昭公六年卒六卿强公室卑子頃公去疾立頃公六年周景王崩王子争立晉六卿平王室亂立敬王九年魯季氏逐其君昭公昭公居乾侯十一年衛宋使使請晉納魯君季平子私賂范獻子獻子受之乃謂晉君曰季氏無罪不果入魯君十二年晉之宗家祁傒孫叔嚮子相惡於君六卿欲弱公室乃遂以法盡滅其族而分其邑為十縣各令其子為大夫晉益弱六卿皆大十四年頃公卒子定公午立定公十一年魯陽虎奔晉趙鞅簡子舍之十二年孔子相魯十五年趙鞅使邯鄲大夫午不信欲殺午午與中行寅范吉射親攻趙鞅鞅走保晉陽定公圍晉陽荀櫟韓不信魏侈與范中行為仇乃移兵伐范中行范中行反晉君擊之敗范中行范中行走朝歌保之韓魏為趙鞅謝晉君乃赦趙鞅復位二十二年晉敗范中行氏二子奔齊三十年定公與吳王夫差會黃池爭長趙鞅時從卒長吳徐廣曰吳世家說黄池之盟云趙鞅怒將戰吳乃長晉定公左氏傳云乃先晋人外傳云吳公先歃晋公次之三十一年齊田常弑其君簡公而立簡公弟驁為平公三十三年孔子卒三十七年定公卒子出公鑿立出公十七年徐廣曰年表云出公立十八年或云二十年智伯與趙韓魏共分范中行地以為邑出公怒告齊魯欲以伐四卿四卿恐遂反攻出公出公奔齊道死故知伯乃立昭公曾孫驕為晉君是為哀公哀公大父雍晉昭公少子也號為戴子徐廣曰世本作桓子雍注云戴子戴子生忌忌善知伯早死故知伯欲盡并晉未敢乃立忌子驕為君當是時晉國政皆決智伯晉哀公不得有所制智伯遂有范中行地最彊哀公四年趙襄子韓康子魏桓子共殺知伯盡并其地十八年哀公卒子幽公柳立幽公之時晉畏反朝韓趙魏之君獨有絳曲沃餘皆入三晉十五年魏文侯初立十八年幽公淫婦人夜竊出邑中盜殺幽公魏文侯以兵誅晉亂立幽公子止是為烈公烈公十九年周威烈王賜趙韓魏皆命為諸侯二十七年烈公卒子孝公頎立孝公九年魏武侯初立襲邯鄲不勝而去十七年孝公卒子靜公俱酒立是嵗齊威王元年也靜公二年魏武侯韓哀侯趙敬侯滅晉後而三分其地靜公遷為家人晉絶不祀太史公曰晉文公古所謂明君也亡居外十九年至困約及即位而行賞尚忘介子推況驕主乎靈公既弑其後成景致嚴至厲太刻大夫懼誅禍作悼公以後日衰六卿專權故君道之御其臣下固不易哉史記集解卷三十九
