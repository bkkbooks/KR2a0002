body:
  text: 史記集解卷一百七宋裴駰撰史記一百七魏其武安侯列傳第四十七魏其侯竇嬰者孝文后從兄子也父世觀津人喜賔客孝文時嬰為吳相病免孝景初即位為詹事梁孝王者孝景弟也其母竇太后愛之梁孝王朝因昆弟燕飲是時上未立太子酒酣從容言曰千秋之後傳梁王太后歡竇嬰引巵酒進上曰天下者高祖天下父子相傳此漢之約也上何以得擅傳梁王太后由此憎竇嬰竇嬰亦薄其官因病免太后除竇嬰門籍不得入朝請律諸侯春朝天子曰朝秋曰請孝景三年吳楚反上察宗室諸竇毋如竇嬰賢乃召嬰嬰入見固辭謝病不足任太后亦慙於是上曰天下方有急王孫寧可以讓邪漢書曰竇嬰字王孫乃拜嬰為大將軍賜金千斤竇嬰乃言袁盎欒布諸名將賢士在家者進之所賜金陳之廊廡下軍吏過輒令財取為用蘇林曰自令裁度取為用也金無入家者竇嬰守滎陽監齊趙兵七國兵己盡破封嬰為魏其侯諸遊士賔客爭歸魏其侯孝景時每朝議大事條侯魏其侯諸列侯莫敢與亢禮孝景四年立栗太子使魏其侯為太子傅孝景七年栗太子廢魏其數爭不能得魏其謝病屏居藍田南山之下數月諸賔客辨士説之莫能來梁人高遂乃説魏其曰能富貴將軍者上也能親將軍者太后也今將軍傅太子太子廢而不能爭爭不能得又弗能死自引謝病擁趙女屏間處而不朝相提而論徐廣曰提音徒抵反是自明揚主上之過有如兩宫螫將軍張晏曰兩宫太后景帝也螫怒也毒蟲怒必螫人又火各反則妻子母類矣魏其侯然之乃遂起朝請如故桃侯免相服虔曰劉舍也竇太后數言魏其侯孝景帝曰太后豈以為臣有愛不相魏其魏其者沾沾徐廣曰一作恬又昌兼反又當牒反自喜耳多易張晏曰沾沾言自整頓也多易多輕易之行也或曰沾音憺也難以為相持重遂不用用建陵侯衛綰為丞相武安侯田蚡者孝景后同母弟也生長陵魏其已為大將軍方盛蚡為諸郎徐廣曰一云諸卿時人相號長今老者為諸公年少者為諸卿如人相號為士大夫未貴往來侍酒魏其跪起如子侄及孝景晚節蚡益貴幸為太中大夫蚡辨有口學盤盂諸書應邵曰黃帝使孔甲所作銘也凡二十六篇書槃盂中所為法戒諸書諸子文書也孟康曰孔甲槃盂二十六篇雜家書兼儒墨名法王太后賢之徐廣曰即蚡同母姊者孝景崩即日太子立稱制所鎮撫多有田蚡賔客計策蚡弟田勝皆以太后弟孝景後三年徐廣曰孝景後三年即是孝武初嗣位之年也封蚡為武安侯勝為周陽侯武安侯新欲用事為相卑下賔客進名士家居者貴之欲以傾魏其諸將相建元元年丞相綰病免上議置丞相太尉籍福説武安侯曰魏其貴久矣天下士素歸之今將軍初興未如魏其即上以將軍為丞相必讓魏其魏其為丞相將軍必為太尉太尉丞相尊等耳又有讓賢名武安侯乃微言太后風上於是乃以魏其侯為丞相武安侯為太尉籍福賀魏其侯因弔曰君侯資性喜善疾惡方今善人譽君侯故至丞相然君侯且疾惡惡人衆亦且毁君侯君侯能兼容則幸久不能今以毁去矣魏其不聼魏其武安俱好儒術推轂趙綰為御史大夫王臧為郎中令迎魯申公欲設明堂令列侯就國除關以禮為服制以興太平舉適諸竇宗室母節行者除其屬籍時諸外家為列侯列侯多尚公主皆不欲就國以故毁日至竇太后太后好黃老之言而魏其武安趙綰王臧等務隆推儒術貶道家言是以竇太后滋不説魏其等及建元二年御史大夫趙綰請無奏事東宫韋昭曰欲奪其政也竇太后大怒乃罷逐趙綰王臧等而免丞相太尉以柏至侯許昌為丞相武強侯莊青翟為御史大夫魏其武安由此以侯家居武安侯雖不任職以王太后故親幸數言事多效天下吏士趨勢利者皆去魏其歸武安武安日益橫建元六年竇太后崩丞相昌御史大夫青翟坐喪事不辦免以武安侯蚡為丞相以大司農韓安國為御史大夫天下士郡國諸侯愈益附武安武安者貌侵韋昭曰侵音寢短小也又云醜惡也刻確也音核生貴甚又以為諸侯王多長張晏曰多長年上初即位富於春秋蚡以肺腑為京師相非痛折節以禮詘之天下不肅當是時丞相入奏事坐語移日所言皆聽薦人或起家至二千石權移主上上乃曰君除吏已盡未吾亦欲除吏嘗請考工地益宅漢書百官表曰少府有考工室如淳曰官名也上怒曰君何不遂取武庫是後乃退嘗召客飲坐其兄蓋侯徐廣曰王后兄王信也太山有蓋縣樂安有益縣也南鄉自坐東鄉以為漢相尊不可以兄故私橈武安由此滋驕治宅甲諸第徐廣曰為諸第之上也田園極膏腴而市買郡縣器物相屬於道前堂羅鍾鼓立曲旃如淳曰旌旗之名通帛曰旃曲旃僣也蘇林曰禮大夫立曲旃曲柄上曲也後房婦女以百數諸侯奉金玉狗馬玩好不可勝數魏其失竇太后益疏不用無勢諸客稍稍自引而怠傲唯灌將軍獨不失故魏其日默默不得志而獨厚遇灌將軍灌將軍夫者潁陰人也夫父張孟嘗為潁陰侯嬰舍人得幸因進之至二千石故蒙灌氏姓為灌孟吳楚反時潁陰侯灌何為將軍屬太尉請灌孟為校尉夫以千人與父俱漢書音義曰官主千人如漢司馬灌孟年老潁陰侯強請之鬱鬱不得意故戰常陷堅遂死吳軍中軍法父子俱從軍有死事得與喪歸灌夫不肯隨喪歸奮曰張晏曰自奮厲也願取吳王若將軍頭以報父仇於是灌夫被甲持戟募軍中壯士所善願從者數十人及出壁門莫敢前獨二人及從奴十數騎馳入吳軍至吳將麾下所殺傷數十人不得前復馳還走入漢壁皆亡其奴獨與一騎歸夫身中大創十餘適有萬金良藥故得無死夫創少瘳又復請將軍曰吾益知吳壁中曲折請復往將軍壯義之恐亡夫乃言太尉太尉乃固止之吳已破灌夫以此名聞天下潁陰侯言之上上以夫為中郎將數月坐法去後家居長安長安中諸公莫弗稱之孝景時至代相孝景崩今上初即位以為淮陽天下交徑兵處故徙夫為淮陽太守建元元年入為太僕二年夫與長樂衛尉竇甫飲輕重不得晉灼曰飲酒輕重不得其平也夫醉搏甫甫竇太后昆弟也上恐太后誅夫徙為燕相數歲坐法去官家居長安灌夫為人剛直使酒不好面諛貴戚諸有勢在己之右不欲加禮必陵之諸士在己之左愈貧賤尤益敬與鈞稠人廣衆薦寵下輩士亦以此多之夫不喜文學好任俠已然諾諸所與交通無非豪傑大猾家纍數千萬食客日數千百人陂池田園宗族賔客為權利橫於潁川潁川兒乃歌之曰潁水清灌氏寧潁水濁灌氏族灌夫家居雖富然失勢卿相侍中賔客益衰及魏其侯尖勢亦欲倚灌夫引繩批根生平慕之後棄之者蘇林曰二人相倚引繩直之意批根賔客也去之者不與交通孟康曰根根括引繩以持彈灌夫亦倚魏其而通列侯宗室為名高兩人相為引重張晏曰相薦逹為聲勢其遊如父子然相得歡甚無厭恨相知晚也灌夫有服過丞相丞相從容曰吾欲與仲孺過魏其侯漢書曰灌夫字仲孺會仲孺有服灌夫曰將軍乃肯幸臨況魏其侯夫安敢以服為解請語魏其侯帳具將軍且日蚤臨武安許諾灌夫具語魏其侯如所謂武安侯魏其與其夫人益市牛酒夜灑掃早帳具至旦平明令門下候伺至日中丞相不來魏其謂灌夫曰丞相豈忘之哉灌夫不懌曰夫以服請宜往徐廣曰一云以服請不宜往乃駕自往迎丞相丞相特前戲許灌夫殊無意往及夫至門丞相尚卧於是夫入見曰將軍昨日幸許過魏其魏其夫妻治具自旦至今未敢嘗食武安鄂徐廣曰一作悟謝曰吾昨日醉忽忘與仲孺言乃駕往又徐行灌夫愈益怒及飲酒酣夫起舞屬丞相丞相不起夫從坐上語侵之魏其乃扶灌夫去謝丞相丞相卒飲至夜極歡而去丞相嘗使籍福請魏其城南田魏其大望曰老僕雖棄將軍雖貴寧可以勢奪乎不許灌夫聞怒罵籍福籍福惡兩人有郤乃謾自好謝丞相曰魏其老且死易忍且待之已而武安聞魏其灌夫實怒不與田亦怒曰魏其子嘗殺人蚡活之蚡事魏其無所不可何愛數頃田且灌夫何與也吾不敢復求田武安由此大怨灌夫魏其元光四年春徐廣曰疑此當是三年也其説在後丞相言灌夫家在潁川橫甚民苦之請案上曰此丞相事何請灌夫亦持丞相陰事為姦利受淮南王金與語言賔客居間遂止俱解夏丞相取燕王女為夫人有太后詔召列侯宗室皆往賀魏其侯過灌夫欲與俱夫謝曰夫數以酒失得過丞相丞相今者又與夫有郤魏其曰事已解強與俱飲酒酣武安起為壽如淳曰上酒為稱壽非大行酒坐皆避席伏已魏其侯為壽獨故人避席耳餘半膝席蘇林曰下席而膝半在席上如淳曰以膝跪席上也灌夫不悅起行酒至武安武安膝席曰不能滿觴夫怒因嘻笑曰將軍貴人也屬之徐廣曰屬一作畢時武安不肯行酒次至臨汝侯徐廣曰灌嬰孫名賢也臨汝侯方與程不識耳語又不避席夫無所發怒乃罵臨汝侯曰生平毁程不識不直一錢今日長者為壽乃效兒女呫囁耳語韋昭曰呫囁附耳小語聲武安謂灌夫曰程李俱東西宫衛尉漢書音義曰李廣為東宫程不識為西宫今衆辱程將軍仲孺獨不為李將軍地乎如淳曰李將軍李廣也猶今人言為除地也灌夫曰今日斬頭陷胸何知程李乎坐乃起更衣稍稍去魏其侯去麾灌夫出武安遂怒曰此吾驕灌夫罪乃令騎留灌夫灌夫欲出不得籍福起為謝案灌夫項令謝夫愈怒不肯謝武安乃麾騎縛夫置傳舍召長吏曰今日召宗室有詔劾灌夫罵坐不敬繫居室如淳曰百官表居室為保宫今守宫也遂案其前事遣吏分曹逐捕諸灌氏支屬皆得棄市罪魏其侯大愧為資使賔客請莫能解如淳曰為出資費使人為夫言武安吏皆為耳目諸灌氏皆亡匿夫繫遂不得告言武安陰事魏其鋭身為救灌夫夫人諫魏其曰灌將軍得罪丞相與太后家忤寧可救邪魏其侯曰侯自我得之自我捐之無所恨且終不令灌仲孺獨死嬰獨生乃匿其家晉灼曰恐其夫人復諫止也竊出上書立召入具言灌夫醉飽事不足誅上然之賜魏其食曰東朝廷辨之如淳曰東朝太后朝魏其之東朝盛推灌夫之善言其醉飽得過乃丞相以他事誣罪之武安又盛毁灌夫所有橫恣罪逆不道魏其度不可奈何因言丞相短武安曰天下幸而安樂無事蚡得為肺腑所好音樂狗馬田宅蚡所愛倡優巧匠之屬不如魏其灌夫日夜招聚天下豪傑壯士與議論腹誹而心謗仰視天而俯畫地張晏曰視天占三光也畫地知分野所在也畫地諭欲作反事辟倪兩宫間徐廣曰辟音芳細反倪音詣張晏曰占太后與帝吉凶之期幸天下有變而欲有大功張晏曰幸為反者當得為大將立功也瓉曰天下有變謂天子崩因變難之際得立大功臣乃不如魏其等所為於是上問朝臣兩人孰是御史大夫韓安國曰魏其言灌夫父死事身荷戟馳入不測之吳軍身被數十創名冠三軍此天下壯士非有大惡爭杯酒不足引他過以誅也魏其言是也丞相亦言灌夫通姦猾侵細民家纍巨萬橫恣潁川凌轢宗室侵犯骨肉此所謂枝大於本脛大於股不折必披丞相言亦是唯明主裁之主爵都尉汲黯是魏其內史鄭當時是魏其後不敢堅對餘皆莫敢對上怒內史曰公平生數言魏其武安長短今日廷論局趣效轅下駒張晏曰挽頭於車轅下隨母而已瓉曰小馬在轅下吾并斬若屬矣即罷起入上食太后太后亦已使人候伺具以告太后太后怒不食曰今我在也而人皆籍吾弟令我百歲後皆魚肉之矣且帝寧能為石人邪此特帝在即録録設百歲後是屬寧有可信者乎上謝曰俱宗室外家故廷辨之不然此一獄吏所決耳是時郎中令石建為上分别言兩人事武安已罷朝出止車門召韓御史大夫載怒曰與長孺共一老禿翁何為首鼠兩端漢書音義曰禿老翁言嬰無官位扳援也首鼠一前一却也韓御史良久謂丞相曰君何不自喜蘇林曰何不自解釋為喜樂邪夫魏其毁君君當免冠解印綬歸曰臣以肺腑幸得待罪固非其任魏其言皆是如此上必多君有讓不廢君魏其必內愧杜門齚舌自殺今人毁君君亦毁之譬如賈豎女子爭言何其無大體也武安謝罪曰爭時急不知出此於是上使御史薄責魏其所言灌夫頗不讐欺謾劾繫都司空孝景時魏其常受遺詔曰事有不便以便宜論上及繫灌夫罪至族事日急諸公莫敢復明言於上魏其乃使昆弟子上書言之幸得復召見書奏上而案尚書大行如淳曰大行主諸侯官也無遺詔詔書獨藏魏其家家丞封漢書音義曰以家臣印封遺詔乃劾魏其矯先帝詔罪當棄市五年十月徐廣曰疑非五年亦非十月悉論灌夫及家屬魏其良久乃聞聞即恚病痱不食欲死或聞上無意殺魏其魏其復食治病議定不死矣乃有蜚語為惡言聞上張晏曰蚡偽作飛揚誹謗之語故以十二月晦徐廣曰凝非十二月也駰案張晏曰月晦者春垂至也論棄市渭城其春武安侯病専呼服謝罪漢書音義曰言蚡號呼謝服罪也使巫視鬼者視之見魏其灌夫共守欲殺之竟死子恬嗣徐廣曰蚡疾見魏其灌夫鬼殺之則其春共在一春內邪武帝本紀四年三月乙卯田蚡薨嬰死在蚡薨之前何復云五年十二月邪疑十二月當為二月也案侯表蚡事武帝九年而卒元光四年侯恬之元年建元元年訖元光三年而九年大臣表蚡以元光四年辛亦云嬰四年棄市未詳此正安在然蚡薨在嬰死後分明元朔三年武安侯坐衣襜褕入宫不敬徐廣曰表云坐衣不敬國除淮南王安謀反覺治王前朝徐廣曰建元二年武安侯為太尉時迎王至霸上謂王曰上未有太子大王最賢高祖孫即宫車晏駕非大王立當誰哉淮南王大喜厚遺金財物上自魏其時不直武安特為太后故耳及聞淮南王金事上曰使武安侯在者族矣太史分曰魏其武安皆以外戚重灌夫用一時決策而名顯魏其之舉以吳楚武安之貴在日月之際然魏其誠不知時變灌夫無術而不遜兩人相翼乃成禍亂武安負貴而好權杯酒責望陷彼兩賢鳴呼哀哉遷怒及人命亦不延衆庶不載竟被惡言鳴呼哀哉禍所從來矣史記集解卷一百七
