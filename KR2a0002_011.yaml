body:
  text: 史記集解卷十一宋裴駰撰史記十一孝景本紀第十一孝景皇帝者漢書音義曰諱啓孝文之中子也母竇太后孝文在代時前后有三男及竇太后得幸前后死及三子更死故孝景得立元年四月乙卯赦天下乙巳賜民爵一級五月除田半租為孝文立太宗廟令羣臣無朝賀胸奴入代與約和親二年春封故相國蕭何孫係為武陵侯徐廣曰漢書亦作係鄒誕生本作傒音奚又案漢書功臣表及蕭何傳皆云孫嘉疑其人有二名男子二十而得傅四月壬午孝文太后崩廣川長沙王皆之國丞相申屠嘉卒八月以御史大夫開封侯陶青為丞相彗星出東北秋衡山雨雹大者五寸深者二尺熒惑逆行守北辰月出北辰間歲星逆行天廷中置南陵及內史祋祤為縣徐廣曰地理志云文帝七年置駰案地理志百官表南陵縣文帝置也分內史為左右及祋祤為縣皆景帝二年不得皆如徐所云三年正月乙巳赦天下長星出西方天火徐廣曰漢志無燔雒陽東宫大殿城室徐廣曰雒一作淮吳王濞楚王戊趙王遂膠西王卬濟南王辟光災川王賢膠東王雄渠反發兵西鄉天子為誅鼂錯遣袁盎諭告不止遂西圍梁上乃遣大將竇嬰太尉周亞夫將兵誅之六月乙亥赦亡軍及楚元王子藝等與謀反者封大將軍竇嬰為魏其侯立楚元王子平陸侯劉禮為楚王立皇子端為膠西王子勝為中山王徙濟北王志為災川王淮陽王餘為魯王汝南王非為江都王齊王將廬燕王嘉皆薨徐廣曰表云五年薨四年夏立太子立皇子轍為膠東王六月甲戌赦天下後九月更以弋陽為陽陵復置津關用傳出入應劭曰文帝十二年除關無用傳至此復置傳以七國新反備非常也張晏曰傳信也若今過所也如淳曰傳音檄傳之傳兩行書繒帛分持其一出入關合之乃得過謂之傳冬以趙國為邯鄲郡地理志趙國景帝以為邯鄲郡五年三月作陽陵渭橋五月募徙陽陵豫錢二十萬江都大暴風從西方來壞城十二丈丁卯封長公子蟜為隆慮侯徙廣川王為趙王六年春封中尉趙綰為建陵侯江都丞相嘉徐廣曰姓程為建平侯隴西太守渾邪為平曲侯趙丞相嘉徐廣曰姓蘇為江陵侯故將軍布為鄃侯梁楚二王皆薨後九月伐馳道樹殖蘭池徐廣曰殖一作填七年冬廢栗太子為臨江王十二月晦日有食之春免徒𨽻作陽陵者丞相青免二月乙巳以太尉條侯周亞夫為丞相四月乙巳立膠東王太后為皇后丁巳立膠東王為太子名徹中元年封故御史大夫周苛孫平徐廣曰一作應為繩侯故御史大夫周昌子左車為安陽侯四月乙巳赦天下賜爵一級除禁錮地動衡山原都雨雹大者尺八寸中二年二月胸奴入燕遂不和親三月召臨江王來即死中尉府中夏立皇子越為廣川王子寄為膠東王封四侯文穎曰楚相張尚太傳趙夷吾趙相建德內史王悍此四人各諫其王無使反不聽皆殺之故封其子九月甲戌日食中三年冬罷諸侯御史中丞春胸奴王二人率其徒來降皆封為列侯立皇子方乘為清河王三月彗星出西北丞相周亞夫死以御史大夫桃侯劉舍為丞相四月地動九月戊戌晦日食軍東都門外案三輔黃圖東出北第一門曰宣平門外曰東都門中四年三月置德陽宫瓚曰是景帝廟也帝自作之諱不言廟故言宫西京故事云景帝廟為德陽官大蝗秋赦徒作陽陵者中五年夏立皇子舜為常山王封十侯六月丁巳赦天下賜爵一級天下大潦更命諸侯丞相曰相秋地動中六年二月己卯行幸雍郊見五帝三月雨雹四月梁孝王城陽共王汝南王皆薨立梁孝王子明為濟川王子彭離為濟東王子定為山陽王子不識為濟陰王梁分為五封四侯更命廷尉為大理將作少府為將作大匠主爵中尉為都尉漢書百官表曰主爵中尉秦官掌列侯長信詹事漢書百官表曰詹事秦官掌皇后太子家應劭曰詹省也給也瓚曰茂陵書詹事秩二千石為長信少府張晏曰以太后所居宫為名長信宫則曰長信少府長樂宫則曰長樂少府將行為大長秋漢書百官表曰將行秦官應劭曰長秋皇后卿大行為行人服虔曰天子死未有諡稱大行晉灼曰禮有大行小行主諡官故以此名之如淳曰不反之辭也瓚曰大行是官名掌九儀之制以賔諸侯奉常為太常漢書百官表曰奉常秦官掌宗廟禮儀典客為大行治粟內史為大農漢書百官表曰治粟內史秦官掌穀貨也以大內為二千石韋昭曰大內京師府藏置左右內官屬大內七月辛亥日食八月胸奴入上郡後元年冬更命中大夫為衛尉三月丁酉赦天下賜爵一級中二千石諸侯相爵右庶長四月大酺五月丙戌徐廣曰丙一作甲地動其蚤食時復動上庸地動二十二日壞城垣七月乙巳日食丞相劉舍免八月壬辰以御史大夫綰為丞相封為建陵侯後二年正月地一日三動郅將軍擊胸奴酺五日令內史郡不得食馬粟沒入縣官令徒隸衣七緵布正馬春為歲不登禁天下食不造歲省列侯遣之國晉灼曰文紀遣列侯之國今又省之三月胸奴入鴈門十月租長陵田大早衡山國河東雲中郡民疫後三年十月日月皆食赤五日十二月晦雷徐廣曰一作雷字又作圖字實所未詳日如紫五星逆行守太微月貫天庭中正月甲寅皇太子冠甲子孝景皇帝崩皇甫謐曰帝以孝惠七年生年四十八遺詔賜諸侯王以下至民為父後爵一級天下户百錢出宫人歸其家復無所與太子即位是為孝武皇帝漢書云二月癸酉帝葬陽陵皇甫謐曰陽陵山方百二十步髙十四丈去長安四十五里三月封皇太后弟蚡蘇林曰蚡音蚡為武安侯弟勝為周陽侯置陽陵太史公曰漢興孝文施大德天下懷安至孝景不復憂異姓而鼂錯刻削諸侯遂使七國俱起合從而西鄉以諸侯大盛而錯為之不以漸也及主父偃言之而諸侯以弱卒以安安危之機豈不以謀哉史記集解卷十一
