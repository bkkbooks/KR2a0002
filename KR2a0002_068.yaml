body:
  text: 史記集解卷七十宋裴駰撰史記七十張儀列傳第十張儀者魏人也始嘗與蘇秦俱事鬼谷先生學術蘇秦自以不及張儀張儀已學而游說諸侯嘗從楚相飲已而楚相亡璧門下意張儀曰儀貧無行必此盜相君之璧共執張儀掠笞數百不服醳之其妻曰嘻子母讀書游說安得此辱乎張儀謂其妻曰視吾舌尚在不其妻笑曰舌在也儀曰足矣蘇秦已說趙王而得相約從親然恐秦之攻諸侯敗約後負念莫可使用於秦者乃使人微感張儀曰子始與蘇秦善今秦已當路子何不往游以求通子之願張儀于是之趙上謁求見蘇秦蘇秦乃誡門下人不為通又使不得去者數日已而見之坐之堂下賜僕妾之食因而數讓之曰以子之材能乃自令困辱至此吾寧不能言而富貴子子不足收也謝去之張儀之來也自以為故人求益反見辱怒念諸侯莫可事獨秦能苦趙乃遂入秦蘇秦已而告其舍人曰張儀天下賢士吾弗如也今吾幸先用而能用秦柄者獨張儀可耳然貧無因以進吾恐其樂小利而不遂故召辱之以激其意子為我隂奉之乃言趙王發金幣車馬使人微隨張儀與同宿舍稍稍近就之奉以車馬金錢所欲用為取給而弗告張儀遂得以見秦惠王惠王以為客卿與謀代諸侯蘇秦之舍人乃辭去張儀曰賴子得顯方且報德何故去也舍人曰臣非知君知君乃蘇君蘇君憂秦代趙敗從約以為非君莫能得秦柄故感怒君使臣隂奉給君資盡蘇君之計謀今君已用請歸報張儀曰嗟乎此在吾術中而不悟吾不及蘇君明矣吾又新用安能謀趙乎為吾謝蘇君蘇君之時儀何敢言且蘇君在儀寧渠能乎張儀既相秦為文檄告楚相曰始吾從若飲我不盜而璧若笞我若善守汝國我顧且盜而城苴蜀相攻擊各來告急于秦秦惠王欲發兵以伐蜀以為道險狹難至而韓又來侵秦秦惠王欲先伐韓後伐蜀恐不利欲先伐蜀恐韓襲秦之敝猶豫未能決司馬錯與張儀爭論于惠王之前司馬錯欲伐蜀張儀曰不如伐韓王曰請聞其說儀曰親魏善楚下兵三川塞什谷之口徐廣曰一作尋成皋鞏縣有尋口當屯留之道魏絶南陽楚臨南鄭秦攻新城宜陽以臨二周之郊誅周王之罪侵楚魏之地周自知不能救九鼎寶器必出據九鼎案圖籍挾天子以令于天下天下莫敢不聽此王業也今夫蜀西僻之國而戎翟之倫也敝兵勞衆不足以成名得其地不足以為利臣聞爭名者于朝爭利者於市今三川周室天下之朝市也而王不爭焉顧爭于戎翟去王業逺矣司馬錯曰不然臣聞之欲富國者務廣其地欲彊兵者務富其民欲王者務博其德三資者備而王隨之矣今王地小民貧故臣願先從事于易夫蜀西僻之國也而戎翟之長也有桀紂之亂以秦攻之譬如使豺狼逐羣羊得其地足以廣國取其財足以富民繕兵不傷衆而彼已服焉拔一國而天下不以為㬥利盡西海而天下不以為貪是我一舉而名實附也而又有禁㬥止亂之名今攻韓劫天子惡名也而未必利也又有不義之名而攻天下所不欲危矣臣請論其故周天下之宗室也齊韓之與國也周自知失九鼎韓自知亡三川將二國并力合謀以因乎齊趙而求解乎楚魏以鼎與楚以地與魏王弗能止也此臣之所謂危也不如伐蜀完惠王曰善寡人請聽子卒起兵伐蜀十月取之遂定蜀貶蜀王更號為侯而使陳莊相蜀蜀既屬秦秦以益强富厚輕諸侯秦惠王十年使公子華徐廣曰一作莗與張儀圍蒲陽降之儀因言秦復與魏而使公子繇質于魏儀因說魏王曰秦王之遇魏甚厚魏不可以無禮魏因入上郡少梁謝秦惠王惠王乃以張儀為相更名少梁曰夏陽徐廣曰夏陽在梁山龍門儀相秦四歲立惠王為王居一歲為秦將取陕築上郡塞其後二年使與齊楚之相㑹齧桑東還而免相相魏以為秦欲令魏先事秦而諸侯效之魏王不肯聽儀秦王怒伐取魏之曲沃平周復隂厚張儀益甚張儀慙無以歸報留魏四歲而魏襄王卒哀王立張儀復說哀王哀王不聽于是張儀隂令秦伐魏魏與秦戰敗明年齊又來敗魏于觀音貫津秦復欲攻魏先敗韓申差軍斬首八萬諸侯震恐而張儀復說魏王曰魏地方不至千里卒不過三十萬地四平諸侯四通輻湊無名山大川之限從鄭至梁二百餘里車馳人走不待力而至梁南與楚境西與韓境北與趙境東與齊境卒戌四方守亭鄣者不下十萬梁之地勢固戰場也梁南與楚而不與齊則齊攻其東東與齊不與趙則趙攻其北不合于韓則韓攻其西不親于楚則楚攻其南此所謂四分五裂之道也且夫諸侯之為從者將以安社稷尊主彊兵顯名也今從者一天下約為昆弟刑白馬以盟洹音桓水之上以相堅也而親昆弟同父母尚有爭錢財而欲恃詐僞反覆蘇秦之餘謀其不可成亦明矣大王不事秦秦下兵攻河外據卷邱權反衍以善反酸棗劫衛取陽晉則趙不南趙不南而梁不北梁不北則從道絶從道絶則大王之國欲毋危不可得也秦折韓而攻梁韓怯于秦秦韓為一梁之亡可立而須也此臣之所為大王患也為大王計莫如事秦事秦則楚韓必不敢動無楚韓之患則大王髙枕而臥國必無憂矣且夫秦之所欲弱者莫如楚而能弱楚者莫如梁楚雖有富大之名而實空虛其卒雖多然而輕走易北不能堅戰悉梁之兵南面而伐楚勝之必矣割楚而益梁虧楚而適秦嫁禍安國此善事也大王不聽臣秦下甲士而東伐雖欲事秦不可得矣且夫從人多奮辭而少可信說一諸侯而成封侯是故天下之游談士莫不日夜扼腕瞋目切齒以言從之便以說人主人主賢其辨而牽其說豈得無眩哉臣聞之積羽沈舟羣輕折軸衆口鑠金積毁銷骨故願大王審定計議且賜骸骨辟魏哀王于是乃倍從約而因儀請成于秦張儀歸復相秦三歲而魏復背秦為從秦攻魏取曲沃明年魏復事秦秦欲伐齊齊楚從親于是張儀往相楚楚懷王聞張儀來虛上舍而自館之曰此僻陋之國子何以教之儀說楚王曰大王誠能聽臣閉關絶約于齊臣請獻商於之地六百里使秦女得為大王箕帚之妾秦楚娶婦嫁女長為兄弟之國此北弱齊而西益秦也計無便此者楚王大悅而許之羣臣皆賀陳軫獨弔之楚王怒曰寡人不興師發兵得六百里地羣臣皆賀子獨弔何也陳軫對曰不然以臣觀之商於之地不可得而齊秦合齊秦合則患必至矣楚王曰有說乎陳軫對曰夫秦之所以重楚者以其有齊也今閉關絶約于齊則楚孤秦奚貪夫孤國而與之商於之地六百里張儀至秦必負王是北絶齊交西生患于秦也而兩國之兵必俱至善為王計者不若陰合而陽絶于齊使人隨張儀茍與吾地絶齊未晚也不與吾地隂合謀計也楚王曰願陳子閉口毋復言以待寡人得地乃以相印授張儀厚賂之于是遂閉關絶約于齊使一將軍隨張儀張儀至秦詳失綏墮車不朝三月楚王聞之曰儀以寡人絶齊未甚邪乃使勇士至宋借宋之符北罵齊王齊王大怒折節而下秦秦齊之交合張儀乃朝謂楚使者曰臣有奉邑六里願以獻大王左右楚使者曰臣受令于王以商於之地六百里不聞六里還報楚王楚王大怒發兵而攻秦陳軫曰軫可發口言乎攻之不如割地反以賂秦與之并兵而攻齊是我出地于秦取償于齊也王國尚可存楚王不聽卒發兵而使將軍屈丐擊秦秦齊共攻楚斬首八萬殺屈丐遂取丹陽徐廣曰在枝江漢中之地楚又復益發兵而襲秦至藍田大戰楚大敗於是楚割兩城以與秦平秦要楚欲得黔中地欲以武關外易之楚王曰不願易地願得張儀而獻黔中地秦王欲遣之口弗忍言張儀乃請行惠王曰彼楚王怒子之負以商於之地是且甘心于子張儀曰秦强楚弱臣善靳尚尚得事楚夫人鄭袖袖所言皆從且臣奉王之節使楚楚何敢加誅假令誅臣而為秦得黔中之地臣之上願遂使楚楚懷王至則囚張儀將殺之靳尚謂鄭袖曰子亦知子之賤于王乎鄭袖曰何也靳尚曰秦王甚愛張儀而不欲出之今將以上庸之地六縣賂楚以美人聘楚以宫中善歌謳者為媵楚王重地尊秦秦女必貴而夫人斥矣不若為言而出之于是鄭袖日夜言懷王曰人臣各為其主用今地未入秦秦使張儀來至重王王未有禮而殺張儀秦必大怒攻楚妾請子母俱遷江南母為秦所魚肉也懷王後悔赦張儀厚禮之如故張儀既出未去聞蘇秦死乃說楚王曰秦地半天下兵敵四國被險𢃄河四塞以為固虎賁之士百餘萬車千乘騎萬匹積粟如丘山法令既明士卒安難樂死主明以嚴將智以武雖無出甲席卷常山之險必折天下之脊天下有後服者先亡且夫為從者無以異于驅羣羊而攻猛虎虎之與羊不格明矣今王不與猛虎而與羣羊臣竊以為大王之計過也凡天下彊國非秦而楚非楚而秦兩國交爭其勢不兩立大王不與秦秦下甲據宜陽韓之上地不通下河東取成臯韓必入臣梁則從風而動秦攻楚之西韓梁攻其北社稷安得毋危且夫從者聚羣弱而攻至彊不料敵而輕戰國貧而數舉兵危亡之術也臣聞之兵不如者勿與挑戰粟不如者勿與持久夫從人飾辨虛辭高主之節言其利不言其害卒有秦禍無及為已是故願大王之孰計之秦西有巴蜀大船積粟起于汶山浮江以下至楚三千餘里舫船載卒一舫載五十人與三月之食下水而浮一日行三百餘里里數雖多然而不費牛馬之力不至十日而距扞關徐廣曰巴郡魚復有扞水扞關扞關驚則從境以東盡城守矣黔中巫郡非王之有秦舉甲出武關南面而伐則北地絶秦兵之攻楚也危難在三月之內而楚待諸侯之救在半歲之外此其勢不相及也夫待弱國之救忘彊秦之禍此臣所為大王患也大王嘗與吳人戰五戰而三勝陳卒盡矣偏守新城存民苦矣臣聞功大者易危而民敝者怨上夫守易危之功而逆彊秦之心臣竊為大王危之且夫秦之所以不出兵函谷十五年以攻齊趙者隂謀有合徐廣曰一作吞天下之心楚嘗與秦搆難戰于漢中楚人不勝列侯執圭死者七十餘人遂亡漢中楚王大怒興兵襲秦戰于藍田此所謂兩虎相摶徐廣曰或音㦸者也夫秦楚相敝而韓魏以全制其後計無危于此者矣願大王孰計之秦下甲攻衛陽晉必大關天下之胸徐廣曰關一作開大王悉起兵以攻宋不至數月而宋可舉舉宋而東指則泗上十二諸侯盡王之有也凡天下而以信約從親相堅者蘇秦封武安君相燕即隂與燕王謀伐破齊而分其地乃詳有罪出走入齊齊王因受而相之居二年而覺齊王大怒車裂蘇秦于市夫以一詐僞之蘇秦而欲經營天下混一諸侯其不可成亦明矣今秦與楚接境壤界固形親之國也大王誠能聽臣臣請使秦太子入質于楚楚太子入質於秦請以秦女為大王箕帚之妾效萬室之都以為湯沐之邑長為昆弟之國終身無相攻伐臣以為計無便於此者于是楚王已得張儀而重出黔中地與秦欲許之屈原曰前大王見欺于張儀張儀至臣以為大王烹之今縱弗忍殺之又聽其邪說不可懷王曰許儀而得黔中美利也後而倍之不可故卒許張儀與秦親張儀去楚因遂之韓說韓王曰韓地險惡山居五穀所生非菽而麥民之食大抵飯菽藿羮一歲不收民不饜糟糠地不過九百里無二歲之食料大王之卒悉之不過三十萬而厮徒負養在其中矣除守徼亭鄣塞見卒不過二十萬而己矣秦帶甲百餘萬車千乘騎萬匹虎賁之士跿跔上徒下俱跳躍也又云偏舉一足曰跿跔科頭謂不著兜鍪入敵貫頤奮㦸者至不可勝計言執㦸奮怒而入陳也秦馬之良戎兵之衆探前趹後蹄間三尋騰者不可勝數山東之士被甲䝉胄以會戰秦人捐甲徒裼以趨敵左挈人頭右挾生盧夫秦卒與山東之卒猶孟賁之與怯夫以重力相壓猶烏獲之與嬰兒夫戰孟賁烏獲之士以攻不服之弱國無異垂千鈞之重于鳥卵之上必無幸矣夫羣臣諸侯不料地之寡而聽從人之甘言好辭比周以相飾也皆奮曰聽吾計可以彊霸天下夫不顧社稷之長利而聽須臾之說詿誤人主無過此者大王不事秦秦下甲據宜陽斷韓之上地東取成臯滎陽則鴻臺之宫桑林之苑徐廣曰桑一作粟非王之有也夫塞成臯絶上地則王之國分矣先事秦則安不事秦則危夫造禍而求其福報計淺而怨深逆秦而順楚雖欲毋亡不可得也故為大王計莫如為于僞切秦秦之所欲莫如弱楚而能弱楚者莫如韓非以韓能彊于楚也其地勢然也今王西面而事秦以攻楚秦王必喜夫攻楚以利其地轉禍而說秦計無便于此者韓王聽儀計張儀歸報秦惠王封儀五邑號曰武信君使張儀東說齊湣王曰天下强國無過齊者大臣父兄殷衆富樂然而為大王計者皆為一時之說不顧百世之利從人說大王者必曰齊西有彊趙南有韓與梁齊負海之國也地廣民衆兵彊士勇雖有百秦將無奈齊何大王賢其說而不計其實夫從人朋黨比周莫不以從為可臣聞之齊與魯三戰而魯三勝國以危亡隨其後雖有戰勝之名而有亡國之實是何也齊大而魯小也今秦之與齊也猶齊之與魯也秦趙戰于河漳之上再戰而趙再勝秦戰于畨吾之下再戰又勝秦四戰之後趙之亡卒數十萬邯鄲僅存雖有戰勝之名而國已破矣是何也秦彊而趙弱今秦楚嫁女娶婦為昆弟之國韓獻宜陽梁效河外趙入朝澠綿善切池割河間以事秦大王不事秦秦驅韓梁攻齊之南地悉趙兵渡清河指博關臨菑即墨非王之有也國一日見攻雖欲事秦不可得也是故願大王孰計之也齊王曰齊僻陋隱居東海之上未嘗聞社稷之長利也乃許張儀張儀去西說趙王曰敝邑秦王使使臣效愚計於大王大王收率天下以賔秦秦兵不敢出函谷關十五年大王之威行于山東敝邑恐懼懾伏繕甲厲兵飾車騎習馳射力田積粟守四封之內愁居懾處不敢動搖惟大王有意督過之也今以大王之力舉巴蜀并漢中包兩周遷九鼎守白馬之津秦雖僻逺然而心忿含怒之日久矣今秦有敝甲凋兵軍於澠綿善切池願渡河踰漳據畨吾㑹邯鄲之下願以甲子㑹戰以正殷紂之事敬使使臣先聞左右凡大王之所信為從者恃蘇秦蘇秦熒惑諸侯以是為非以非為是欲反齊國而自令車裂于市夫天下之不可一亦明矣今楚與秦為昆弟之國而韓梁稱為東藩之臣齊獻魚鹽之地此斷趙之右臂也夫斷右臂而與人鬭失其黨而孤居求欲毋危豈可得乎今秦發三將軍其一軍塞午道告齊使興師渡清河軍于邯鄲之東一軍軍成皋驅韓梁軍于河外一軍軍於澠池約四國為一以攻趙趙服必四分其地是故不敢匿意隱情先以聞于左右臣竊為大王計莫如與秦王遇于澠池面相見而口相結請案兵無攻願大王之定計趙王曰先王之時奉陽君專權擅勢蔽欺先王獨擅綰事寡人居屬師傅不與國謀計先王棄羣臣寡人年幼奉祭祀之日新心固竊疑焉以為一從不事秦非國之長利也乃且願變心易慮割地謝前過以事秦方將約車趨行適聞使者之明詔趙王許張儀張儀乃去北之燕說燕昭王曰大王之所親莫如趙昔趙襄子嘗以其姊為代王妻欲并代約與代王遇于句注之塞乃令工人作為金斗長其尾令可以擊人與代王飲隂告厨人曰即酒酣樂進熱啜反斗以擊之于是酒酣樂進熱啜厨人進斟因反斗以擊代王殺之王腦塗地其姊聞之因摩笄以自刺故至今有摩笄之山笄婦人之首飾如今象牙擲代王之亡天下莫不聞夫趙王之狼戾無親大王之所明見且以趙王為可親乎趙興兵攻燕再圍燕都而劫大王大王割十城以謝今趙王已入朝澠池效河間以事秦今大王不事秦秦下甲雲中九原驅趙而攻燕則易水長城非大王之有也且今時趙之于秦猶郡縣也不敢妄舉師以攻伐今王事秦秦王必喜趙不敢妄動是西有彊秦之援而南無齊趙之患是故願大王孰計之燕王曰寡人蠻夷僻處雖大男子裁音在如嬰兒言不足以采正計今上客幸教之請西面而事秦獻恆山之尾五城燕王聽儀儀歸報未至咸陽而秦惠王卒武王立武王自為太子時不說張儀及即位羣臣多讒張儀曰無信左右賣國以取容秦必復用之恐為天下笑諸侯聞張儀有郤武王皆畔衡復合從秦武王元年羣臣日夜惡張儀未已而齊讓又至張儀懼誅乃因謂秦武王曰儀有愚計願效之王曰奈何對曰為秦社稷計者東方有大變然後王可以多割得地也今聞齊王甚憎儀儀之所在必興師伐之故儀願乞其不肖之身之梁齊必興師而伐梁梁齊之兵連于城下而不能相去王以其間伐韓入三川出兵函谷而毋伐以臨周祭器必出挾天子案圖籍此王業也秦王以為然乃具革車三十乘入儀之梁齊果興師伐之梁哀王恐張儀曰王勿患也請令罷齊兵乃使其舍人馮喜之楚借使之齊謂齊王曰王甚憎張儀雖然亦厚矣王之託儀于秦也齊王曰寡人憎儀儀之所在必興師伐之何以託儀對曰是乃王之託儀也夫儀之出也固與秦王約曰為王計者東方有大變然後王可以多割得地今齊王甚憎儀儀之所在必興師伐之故儀願乞其不肖之身之梁齊必興師伐之齊梁之兵連于城下而不能相去王以其間伐韓入三川出兵函谷而無伐以臨周祭器必出挾天子案圖籍此王業也秦王以為然故具革車三十乘而入之梁也今儀入梁王果伐之是王內罷國而外伐與國廣鄰敵以內自臨而信儀于秦王也此臣之所謂託儀也齊王曰善乃使解兵張儀相魏一歲卒于魏也陳軫者游說之士與張儀俱事秦惠王皆貴重尊寵張儀惡陳軫于秦王曰軫重幣輕使秦楚之間將為國交也今楚不加善于秦而善軫者軫自為厚而為王薄也且軫欲去秦而之楚王胡不聽乎王謂陳軫曰吾聞子欲去秦之楚有之乎軫曰然王曰儀之言果信矣軫曰非獨儀知之也行道之士盡知之矣昔子胥忠于其君而天下爭以為臣曾參孝于其親而天下願以為子故賣僕妾不出閭巷而售者良僕妾也出婦嫁于鄉曲者良婦也今軫不忠其君楚亦何以軫為忠乎忠且見棄軫不之楚何歸乎王以其言為然遂善待之居秦期年秦惠王終相張儀而陳軫奔楚楚未之重也而使陳軫使于秦過梁欲見犀首犀首謝弗見軫曰吾為事來公不見軫軫將行不得待異日犀首見之陳軫曰公何好飲也犀首曰無事也曰吾請令公饜事可乎曰奈何曰田需約諸侯從親楚王疑之未信也公謂于王曰臣與燕趙之王有故數使人來曰無事何不相見願謁行于王王雖許公公請毋多車以車三十乘可陳之于庭明言之燕趙燕趙客聞之馳車告其王使人迎犀首楚王聞之大怒曰田需與寡人約而犀首之燕趙是欺我也怒而不聽其事齊聞犀首之北使人以事委焉犀首遂行三國相事皆斷于犀首軫遂至秦韓魏相攻朞年不解秦惠王欲救之問于左右左右或曰救之便或曰勿救便惠王未能為之決陳軫適至秦惠王曰子去寡人之楚亦思寡人不陳軫對曰王聞夫越人莊舄乎王曰不聞曰越人莊舄仕楚執圭有頃而病楚王曰舄故越之鄙細人也今仕楚執圭貴富矣亦思越不中謝對曰凡人之思故在其病也彼思越則越聲不思越則楚聲使人往聽之猶尚越聲也今臣雖棄逐之楚豈能無秦聲哉惠王曰善今韓魏相攻期年不解或謂寡人救之便或曰勿救便寡人不能決願子為子主計之餘為寡人計之陳軫對曰亦嘗有以夫卞莊子刺虎聞于王者乎莊子欲刺虎館豎子止之曰兩虎方且食牛食甘必爭爭則必鬭鬭則大者傷小者死從傷而刺之一舉必有雙虎之名卞莊子以為然立須之有頃兩虎果鬭大者傷小者死莊子從傷者而刺之一舉果有雙虎之功今韓魏相攻朞年不解是必大國傷小國亡從傷而伐之一舉必有兩實此猶莊子刺虎之類也臣主與王何異也惠王曰善卒弗救大國果傷小國亡秦興兵而伐大尅之此陳軫之計也犀首者魏之隂晉人也司馬彪曰犀首魏官名若今虎牙將軍名衍姓公孫氏與張儀不善張儀為秦之魏魏王相張儀犀首弗利故令人謂韓公叔曰張儀已合秦魏矣其言曰魏攻南陽秦攻三川魏王所以貴張子者欲得韓地也且韓之南陽已舉矣子何不少委焉以為衍功則秦魏之交可錯矣然則魏必圖秦而棄儀收韓而相衍公叔以為便因委之犀首以為功果相魏張儀去徐廣曰復相秦義渠君朝於魏犀首聞張儀復相秦害之犀首乃謂義渠君曰道逺不得復過請謁事情曰中國無事秦得燒掇焚杆徐廣曰一孤切君之國有事秦將輕使重幣事君之國其後五國伐秦㑹陳軫謂秦王曰義渠君者蠻夷之賢君也不如賂之以撫其志秦王曰善乃以文繡千純婦女百人遺義渠君義渠君致羣臣而謀曰此公孫衍所謂邪乃起兵襲秦大敗秦人李伯之下張儀已卒之後犀首入相秦嘗佩五國之相印為約長太史公曰三晉多權變之士夫言從衡彊秦者大抵皆三晉之人也夫張儀之行事甚于蘇秦然世惡蘇秦者以其先死而儀振暴其短以扶其說成其衡道要之此兩人真傾危之士哉史記集解卷七十
