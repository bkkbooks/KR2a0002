body:
  text: 史記集解卷一百二十九宋裴駰撰史記一百二十九貨殖列傳第六十九老子曰至治之極鄰國相望雞狗之聲相聞民各甘其食美其服安其俗樂其業至老死不相往來必用此為務挽近世塗民耳目則幾無行矣太史公曰夫神農以前吾不知已至若詩書所述虞夏以來耳目欲極聲色之好口欲窮芻豢之味身安逸樂而心誇矜勢能之榮使俗之漸民久矣雖戶説以眇論終不能化故善者因之其次利道之其次教誨之其次整齊之最下者與之爭夫山西饒材竹榖纑徐廣曰紵屬可以為布旄玉石山東多魚鹽漆絲聲色江南出柟梓薑桂金錫連徐廣曰音蓮鉛之未鍊者丹沙犀玳瑁珠璣齒革龍門碣石北多馬牛羊旃裘筋角銅鐵則千里往往山出棊置此其大較也皆中國人民所喜好謠俗被服飲食奉生送死之具也故待農而食之虞而出之工而成之商而通之此寧有政教發徵期會哉人各任其能竭其力以得所欲故物賤之徵貴貴之徵賤各勸其業樂其事若水之趨下日夜無休時不召而自來不求而民出之豈非道之所符而自然之驗邪周書曰農不出則乏其食工不出則乏其事商不出則三寶絶虞不出則財匱少財匱少而山澤不辟矣此四者民所衣食之原也原大則饒原小則鮮上則富國下則富家貧富之道莫之奪豫而巧者有餘拙者不足故太公望封於營丘地潟鹵徐廣曰潟音昔潟鹵鹹地也人民寡於是太公勸其女功極技巧通魚鹽則人物歸之繦至而輻湊故齊冠帶衣履天下海岱之間斂袂而往朝焉其後齊中衰管子修之設輕重九府則桓公以霸九合諸侯一匡天下而管氏亦有三歸位在陪臣富於列國之君是以齊富強至於威宣也故曰倉廩實而知禮節衣食足而知榮辱禮生於有而廢於無故君子富好行其德小人富以適其力淵深而魚生之山深而獸往之人富而仁義附焉富者得勢益彰失勢則客無所之以而不樂夷狄益甚諺曰千金之子不死於市此非空言也故曰天下熙熙皆為利來天下壤壤皆為利往夫千乘之王萬家之侯百室之君尚猶患貧而况匹夫編户之民乎昔者越王句踐困於會稽之上乃用范蠡計然徐廣曰計然者范蠡之師也名研故諺曰研桑心算駰案范子曰計然者葵丘濮上人姓辛氏字文子其先晉國亡公子也嘗南遊于越范蠡師事之計然曰知鬬則修備時用則知物二者形萬貨之情可得而觀已故歲在金穰水毁木飢火旱旱則資舟水則資車物之理也六歲穰六歲旱十二歲一大飢夫糶二十病農九十病末末病則財不出農病則草不辟矣上不過八十下不減三十則農末俱利平糶齊物關市不乏治國之道也積著之理務完物無息幣以物相貿易腐敗而食之貨勿留無敢居貴論其有餘不足則知貴賤貴上極則反賤賤下極則反貴貴出如糞土賤取如珠玉財幣欲其行如流水修之十年國富厚賂戰士士赴矢石如渴得飲遂報強吳觀兵中國稱號五霸范蠡既雪會稽之恥乃喟然而嘆曰計然之策七越用其五而得意既已施於國吾欲用之家乃乘扁舟漢書音義曰特舟也浮於江湖變名易姓適齊為鴟夷子皮之陶為朱公朱公以為陶天下之中諸侯四通貨物所交易也乃治産積居與時逐漢書音義曰逐時而居貨而不責於人故善治生者能擇人而任時十九年之中三致千金再分散與貧交疏昆弟此所謂富好行其德者也後年衰老而聽子孫子孫修業而息之遂至巨萬徐廣曰萬萬也故言富者皆稱陶朱公子贛既學於仲尼退而仕於衛廢著鬻財於曹魯之間徐廣曰子贛傳云廢居著猶居也著讀音如貯七十子之徒賜最為饒益原憲不厭糟粳匿於窮巷子貢結駟連騎束帛之幣以聘享諸侯所至國君無不分庭與之抗禮夫使孔子名布揚於天下者子貢先後之也此所謂得勢而益彰者乎白圭周人也當魏文侯時李克務盡地力而白圭樂觀時變故人棄我取人取我與夫歲孰取榖豫之絲漆繭出取帛絮與之食太隂在卯穰明歲衰惡至午旱明歲美至酉穰明歲衰惡至子大旱明歲美有水至卯積著率歲倍欲長錢取下榖長石斗取上種能薄飲食忍嗜欲節衣服與用事僮僕同苦樂趨時若猛獸摰鳥之發故曰吾治生産猶伊尹呂尚之謀孫吳用兵商鞅行法是也是故其智不足與權變勇不足以決斷仁不能以取豫強不能有所守雖欲學吾術終不告之矣蓋天下言治生祖白圭白圭其有所試矣能試有所長非茍而已也猗頓用盬鹽起孔叢曰猗頓魯之窮士也耕則常飢桑則常寒聞朱公富往而問術焉朱公告之曰子欲速富當畜五牸於是乃適西河大畜牛羊于猗氏之南十年之間其息不可計資擬王公馳名天下以興富於猗氏故曰猗頓而邯鄲郭縱以鐵冶成業與王者埓富烏氏倮韋昭曰烏氏縣名屬安定倮名也畜牧及衆斥賣求竒繒物間獻遺戎王徐廣曰間一作姦不以公正謂之姦也戎王什倍其償與之畜畜至用谷量馬牛韋昭曰滿谷則具不復數秦始皇帝令倮比封君以時與列臣朝請而巴蜀寡婦清其先得丹穴徐廣曰涪陵出丹而擅其利數世家亦不訾清寡婦也能守其業用財自衛不見侵犯秦皇帝以為貞婦而客之為築女懷清臺夫倮鄙人牧長清窮鄉寡婦禮抗萬乘名顯天下豈非以富邪漢興海內為一開關梁弛山澤之禁是以富商大賈周流天下交易之物莫不通得其所欲而徙豪傑諸侯強族於京師關中自汧雍以東至河華膏壤沃野千里自虞夏之貢以為上田而公劉適邠太王王季在岐文王作豐武王治鎬故其民猶有先王之遺風好稼穡殖五榖地重重為邪及秦文孝繆居雍隙徐廣曰隙者間孔也地居隴蜀之間要路故曰隙隴蜀之貨物而多賈獻孝公徙櫟邑徐廣曰在馮翊櫟邑北卻伐翟東通三晉亦多大賈武昭治咸陽因以漢都長安諸陵四方輻湊並至而會地小人衆故其民益玩巧而事末也南則巴蜀巴蜀亦沃野地饒巵徐廣曰音支煙支也紫赤色也薑丹沙石銅鐵徐廣曰邛都出銅臨邛出鐵竹木之器南御滇僰僰僮西近邛笮笮馬旄牛然四塞棧道千里無所不通唯裦斜綰轂其口徐廣曰在漢中以所多易所鮮天水隴西北地上郡與關中同俗然西有羌中之利北有戎翟之畜畜牧為天下饒然地亦窮險唯京師要其道故關中之地於天下三分之一而人衆不過什三然量其富什居其六昔咸人都河東徐廣曰堯都晉陽也殷人都河內周人都河南夫三河在天下之中若鼎足王者所更居也建國各數百千歲土地小狹民人衆都國諸侯所聚會故其俗纖儉習事楊平陽陳西賈秦翟北賈種代種代石北也徐廣曰石邑縣也在常山地邊胡數被冦人民矜懻忮晉灼曰懻音慨忮音堅瓚曰懻音慨今以土名強直為懻中也好氣任俠為姦不事農商然迫近北夷師旅亟往中國委輸時有竒羡其民羯羠不均徐廣曰羠音兕一音囚几反皆健羊名自全晉之時固已患其慓悍而武靈王益厲之其謠俗猶有趙之風也故楊平陽陳掾其間得所欲溫軹西賈上黨北賈趙中山中山地薄人衆猶有沙丘紂淫地餘民晉灼曰言地薄人衆猶復有沙丘紂淫地餘民通係之於淫風而言也民俗悁急徐廣曰悁急也音絹一作悁一作惠也音翾也仰機利而食丈夫相聚遊戲悲歌慷慨起則相隨椎剽休則掘冡作巧姦冶徐廣曰一作蠱多美物徐廣曰美一作弄一作椎為倡優女子則鼓鳴瑟跕屣徐廣曰跕音怗張晏曰跕屣也瓉曰躡跟為跕也遊媚貴富入後宫遍諸侯然邯鄲亦漳河之間一都會也北通燕涿南有鄭衛鄭衛俗與趙相類然近梁魯微重而矜節徐廣曰矜一作務濮上之邑徙野王徐廣曰衛君角徙野王野王好氣任俠衛之風也夫燕亦勃碣之間一都會也南通齊趙東北邊胡上谷至遼東地踔逺人民希數被冦大與趙代俗相類而民雕捍少慮有魚鹽棗栗之饒北鄰烏桓夫餘東綰穢貉朝鮮真畨之利洛陽東賈齊魯南賈梁楚故泰山之陽則魯其隂則齊齊帶山海徐廣曰齊世家曰齊自泰山屬之琅琊北被于海膏壤二千里其民闊達多匿智膏壤千里宜桑麻人民多文綵布帛魚鹽臨災亦海岱之間一都會也其俗寬緩闊達而足智好議論地重難動搖怯於衆鬬勇於持刺故多劫人者大國之風也其中具五民服虔曰士農工商賈也如淳曰遊子樂其俗不復歸故有五方之民而鄒魯濱洙泗猶有周公遺風俗好儒備於禮故其民齪齪頗有桑麻之業無林澤之饒地小人衆儉嗇畏罪逺邪及其衰好賈趨利甚於周人夫自鴻溝以東徐廣曰在滎陽芒碭以北徐廣曰今為臨淮屬巨野此梁宋也徐廣曰今陶之浚儀陶雎陽亦一都會也徐廣曰今之定陶昔堯作遊成陽如淳曰作起也成陽在定陶舜漁於雷澤徐廣曰在成陽湯止於亳徐廣曰今梁國薄縣其俗猶有先王遺風重厚多君子好稼穡雖無山川之饒能惡衣食致其蓄藏越楚則有三俗夫自淮北沛陳汝南南郡此西楚也其俗剽輕易發怒地薄寡於積聚江陵故郢都西通巫巴東有雲夢之饒徐廣曰在華容陳在楚夏之交通魚鹽之貨其民多賈徐僮取慮徐廣曰皆在下邳則清刻矜已諾彭城以東東海吳廣陵此東楚也其俗類徐僮胊繒以北俗則齊浙江南則越夫吳自闔廬春申王濞三人招致天下之喜遊子弟東有海鹽之饒章山之銅三江五河之利亦江東一都會也衡山徐廣曰都邾邾縣屬江夏九江江南徐廣曰髙帝所制江南者丹陽也秦置為鄣郡武帝改名丹陽豫章長沙是南楚也其俗大類西楚郢之後徙壽春亦一都會也而合肥受南北潮皮革鮑木輸會也與閩中於越雜俗徐廣曰在臨淮故南楚好辭巧説少信江南卑濕丈夫早夭多竹木豫章出黃金徐廣曰鄱陽有之長沙出連錫然堇堇物之所有取之不足以更費應劭曰堇少也更償也言金少少耳取之不足用故貴用也九疑徐廣曰山在營道縣南蒼梧以南至儋耳者與江南大同俗而揚越多焉番禺亦其一都會也珠璣犀玳瑁果布之湊韋昭曰果為龍眼離攴之屬布葛布潁川南陽夏人之居也徐廣曰禹居陽翟夏人政尚忠朴猶有先王之遺風潁川敦願秦末世遷不軌之民於南陽南陽西通武關鄖關徐廣曰按漢中一作鄖字東南受漢江淮宛亦一都會也俗雜好事業多賈其任俠交通潁川故至今謂之夏人夫天下物所鮮所多人民謠俗山東食海鹽山西食鹽鹵領南沙北固往往出鹽大體如此矣總之楚越之地地廣人希飯稻羮魚或火耕而水耨徐廣曰乃遘反除草也果隋徐廣曰地理志作蓏螺蛤不待賈而足地藝饒食無飢饉之患以故呰窳徐廣曰音紫呰窳茍且墮懶之謂也駰案應劭曰呰弱也晉灼曰窳病也偷生無積聚而多貧是故江淮以南無凍餓之人亦無千金之家沂泗水以北宜五榖桑麻六畜地小人衆數被水旱之害民好畜藏故秦夏梁魯好農而重民三河宛陳亦然加以商賈齊趙設智巧仰機利燕代田畜而事蠶由此觀之賢人深謀於廊廟論議朝廷守信死節隱居岩冗之士設為名高者安歸乎歸於富厚也是以亷吏久久更富亷賈歸富駰案歸者取利而不停貨也富者人之情性所不學而俱欲者也故壯士在軍攻城先登陷陳却敵斬將搴旗前蒙矢石不避湯火之難者為重賞使也其在閭巷少年攻剽椎埋劫人作姦掘冡鑄幣任俠并兼借交報仇篡逐幽隱不避法禁走死地如騖者徐廣曰騖作流其實皆為財用耳今夫趙女鄭姬設形容揳鳴琴揄長袂躡利屣徐廣曰揄音臾躡一作跕跕音吐協反屣音山耳反舞屣也目挑心招出不逺千里不擇老少者奔富厚也遊間公子飾冠劍連車騎亦為富厚容也弋射漁獵犯晨夜冒霜雪馳坑谷不避猛獸之害為得味也博戲馳逐鬬雞走狗作色相矜必爭勝者重失負也醫方諸食技術之人焦神極能為重糈也吏士舞文弄法刻章偽書不避刀鋸之誅者沒於賂遺也農工商賈畜長固求富益貨也此有知盡能索耳終不餘力而讓財矣諺曰百里不販樵千里不販糴居之一歲種之以榖十歲樹之以木百歲來之以德德者人物之謂也今有無秩祿之奉爵邑之入而樂與之比者命曰素封封者食租稅歲率户二百千戶之君則二十萬朝覲聘享出其中庶民農工商賈率亦歲萬息二千户百萬之家則二十萬而更徭租賦出其中衣食之欲恣所好美矣故曰陸地牧馬二百蹄駟案漢書音義曰五十匹牛蹄角千駰案漢書音義曰百六十七頭也馬貴而牛賤以此為率千足羊澤中千足彘韋昭曰二百五十頭水居千石魚陂徐廣曰魚以斤兩為計也山居千章之材徐廣曰一作楸駰案韋昭曰楸木所以為轅音秋安邑千樹棗燕秦千樹栗蜀漢江陵千樹橘淮北常山已南河濟之間千樹萩陳夏千畝漆齊魯千畝桑麻渭川千畝竹及名國萬家之城帶郭千畝畝鍾之田徐廣曰六斛四斗也若千畝巵茜徐廣曰巵音支鮮支也茜音倩一名紅藍其花染繒赤黃也千畦薑韭徐廣曰千畦二十五畝駰案韋昭曰畦猶壠此其人皆與千戶侯等然是富給之資也不窺市井不行異邑坐而待取身有處士之義而取給焉若至家貧親老妻子軟弱歲時無以祭祀進醵飲食徐廣曰會聚食被服不足以自通如此不慙恥則無所比矣是以無財作力少有鬬智既饒爭時此其大經也今治生不待危身取給則賢人勉焉是故本富為上末富次之姦富最下無巖處奇士之行而長貧賤好語仁義亦足羞也凡編户之民富相什則卑下之伯則畏憚之千則役萬則僕物之理也夫用貧求富農不如工工不如商刺繡文不如倚市門此言末業貧者之資也通邑大都酤一歲千釀醯醬千瓨徐廣曰長頸罌漿千甔徐廣曰大罌缶屠牛羊彘千皮販榖糶千鍾徐廣曰出榖也糶音掉也薪稿千車船長千丈木千章漢書音義曰洪洞方稿章材也舊將作大匠掌材曰章曹椽竹竿萬個徐廣曰古賀反其軺車百乘徐廣曰馬車也牛車千兩木器髤者千枚徐廣曰髤音休漆也銅器千鈞徐廣曰三十斤素木鐵器若巵茜千石徐廣曰百二十斤為石案漢書音義曰素木素器也馬蹄躈千徐廣曰躈苦弔反馬八髎也音料牛千足羊彘千雙僮手指千漢書音義曰僮奴婢也古者無空手遊日皆有作務作務須手指故曰手指以别馬牛蹄角也筋角丹沙千斤其帛絮細布千鈞文采千匹拓布皮革千石徐廣曰拓音吐合反駰案漢書音義曰拓布白疊也漆千斗糵麴鹽豉千瓵徐廣曰或作合器名有瓵孫叔敖云瓵瓦器受斗六升合為瓵音貽鮐鮆千斤漢書音義曰音如楚人言薺鮆魚與鮐魚也鯫千石鮑千鈞徐廣曰鯫音鄒鯫魚也棗栗千石者三之狐鼦裘千皮羔羊裘千石旃席千具他果菜千鍾子貸金千貫節駔會徐廣曰駔音祖朗反馬儈也駰案漢書音義曰會亦是儈也節物貴賤也謂估儈其餘利比千乘之家貪賈三之亷賈五之漢書音義曰貪賈未當賣而賣未可買而買故得利少而十得三亷賈貴而賣賤乃買故十得五此亦比千乘之家其大率也他雜業不中什二則非吾財也請略道當世千里之中賢人所以富者令後世得以觀擇焉蜀卓氏之先徐廣曰卓一作淖趙人也用鐵冶富秦破趙遷卓氏卓氏見虜略獨夫妻推輦行詣遷處諸遷虜少有餘財爭與吏求近處處葭萌徐廣曰屬廣漢唯卓氏曰此地狹薄吾聞汶山之下沃野下有蹲鴟徐廣曰古蹲字作踆駰案漢書音義曰水鄉多鴟其山下有沃野灌溉一曰大芋至死不飢民工於市易賈乃求逺遷致之臨卭大喜即鐵山鼓鑄運籌策傾滇蜀之民富至僮千人田池射獵之樂擬於人君程鄭山東遷虜也亦冶鑄賈椎髻之民富埓卓氏俱居臨卭宛孔氏之先梁人也用鐵冶為業秦伐魏遷孔氏南陽大鼓鑄規陂池連車騎遊諸侯因通商賈之利有遊間公子之賜與名韋昭曰優遊間暇也然其贏得過當愈於纖嗇家致富數千金故南陽行賈盡法孔氏之雍容魯人俗儉嗇而曹邴氏尤甚以鐵冶徐廣曰魯縣出鐵起富至巨萬然家自父兄子孫約俯有拾仰有取貫貸行賈偏郡國鄒魯以其故多去文學而趨利者以曹邴氏也齊俗賤奴虜而刁間獨愛貴之桀黠奴人之所患也唯刁間收取使之逐魚鹽商賈之利或連車騎交守相然愈益任之終得其力起富數千萬故曰寧爵毋刁漢書音義曰奴自相謂曰寧欲免去作民有爵邪將止為刁氏作奴乎無發聲語助言其能使豪奴自饒而盡其力周人既纖漢書音義曰儉嗇也而師史尤甚轉轂以百數賈郡國無所不至洛陽街居在齊秦楚趙之中貧人學事富家相矜以久賈漢書音義曰謂街巷居民無田地皆相矜久賈在此諸國也數過邑不入門設任此等故師史能致七千萬宣曲任氏之先徐廣曰高祖功臣有宣曲侯為督道倉吏漢書音義曰若今吏督租榖使上道輸在所也韋昭曰督道秦邊縣名秦之敗也豪傑皆爭取金玉而任氏獨窖倉粟徐廣曰窖音校穿地以藏也楚漢相距滎陽也民不得耕種米石至萬而豪傑金玉盡歸任氏任氏以此起富富人爭奢侈而任氏折節為儉力田畜田畜人爭取賤賈任氏獨取貴善富者數世然任公家約非田畜所出弗衣食公事不畢則身不得飲酒食肉以此為閭里率故富而主上重之塞之斥也唯橋姚已致馬千匹牛倍之羊萬頭粟以萬鍾計漢書音義曰邊塞主斥侯卒也唯此人能致富至此吳楚七國兵起時長安中列侯封君行從軍旅齎貸子錢子錢家以為侯邑國在關東關東成敗未決莫肯與唯無鹽氏出捐千金貸其息什之三月吳楚平一歲之中則無鹽氏之息什倍用此富埓關中關中富商大賈大抵盡諸田田嗇田蘭韋家栗氏安陵杜杜氏徐廣曰安陵及杜二縣名各有杜姓也宣帝以杜為杜陵亦巨萬此其章章尤異者也徐廣曰異一作淑又作較皆非有爵邑奉祿弄法犯姦而富盡椎埋去就與時俯仰獲其贏利以末致財用本守之以武一切用文持之變化有概故足術也若至力農畜工虞商賈為權利以成富大者傾郡中者傾縣下者傾鄉里者不可勝數夫纖嗇筋力治生之正道也而富者必用竒勝田農拙業徐廣曰古拙字亦作掘也而秦陽以蓋一州掘冡姦事也而田叔以起博戲惡業也而桓發用之富行賈丈夫賤行也而雍樂成以饒販脂辱處也而雍伯千金徐廣曰雍一作翁賣漿小業也而張氏千萬灑削薄技也徐廣曰灑或作細駰案漢書音義曰治刀劒者而郅氏鼎食冒脯簡微耳濁氏連騎馬醫淺方張里擊鐘此皆誠一之所致由是觀之富無經業則貨無常主能者輻湊不肖者瓦解千金之家比一都之君巨萬者乃與王者同樂豈所謂素封者邪非也史記集解卷一百二十九
