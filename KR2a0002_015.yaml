body:
  text: 史記集解卷十五宋裴駰撰史記十五六國表第三太史公讀秦記至西戎敗幽王周東徙洛邑秦襄公始封為諸侯作西畤用事上帝僣端見矣禮曰天子祭天地諸侯祭其域內名山大川今秦雜戎翟之俗先暴戾後仁義位在藩臣而臚於郊祀君子懼焉及文公踰隴攘夷狄尊陳寶營岐雍之間而穆公修政東竟至河則與齊桓晉文中國侯伯侔矣是後陪臣執政大夫世祿六卿擅晉權征伐㑹盟威重於諸侯及田常殺簡公而相齊國諸侯晏然弗討海內爭於戰攻矣三國終之卒分晉田和亦滅齊而有之六國之盛自此始務在彊兵并敵謀詐用而從衡短長之說起矯稱蜂出誓盟不信雖置質剖符猶不能約束也秦始小國僻逺諸夏賔之比於戎翟至獻公之後常雄諸侯論秦之德義不如魯衛之暴戾者量秦之兵不如三晉之彊也然卒并天下非必險固便形勢利也蓋若天所助焉或曰東方物所始生西方物之成孰夫作事者必於東南收功實者常於西北故禹興於西羌皇甫諡曰孟子稱禹生石紐西夷人也傳曰禹生自西羌是也湯起于亳徐廣曰京兆杜縣有亳亭周之王也以豐鎬伐殷秦之帝用雍州興漢之興自蜀漢秦既得意燒天下詩書諸侯史記尤甚為其有所刺譏也詩書所以復見者多藏人家而史記獨藏周室以故滅惜哉惜哉獨有秦記又不載日月其文略不具然戰國之權變亦有可頗采者何必上古秦取天下多暴然世異變成功大𫝊曰法後王何也以其近已而俗變相類議卑而易行也學者牽於所聞見秦在帝位日淺不察其終始因舉而笑之不敢道此與以耳食無異悲夫余於是因秦記踵春秋之後起周元王表六國時事訖二世凡二百七十年著諸所聞興壞之端後有君子以覽觀焉二十八為河旁宫之衡山治馳道帝之琅邪南道郡入為太極廟賜户三十爵一級二十九郡縣大索十日帝之琅邪道上黨入三十三十一更命臘月嘉平賜黔首里六石米二羊以嘉平大索二十日三十二帝之碣石道上郡入三十三遣諸逋亡及賈人贅壻略取陸梁為桂林南海象郡以適戍西北取戎為三十四縣徐廣曰一云四十四縣是也又云二十四縣築長城河上䝉恬將三十萬三十四適治獄吏不直者築長城及南方越地覆獄故失三十五為直道道九原通甘泉三十六徙民於北河榆中耐徙三處徐廣曰一作家拜爵一級石晝隕東郡有文言地分三十七十月帝之㑹稽琅邪還至沙丘崩子胡亥立為二世皇帝殺蒙恬道九原入復行錢三十八十月戊寅大赦罪人十一月為兔園十二月就阿房宫其九月郡縣皆及楚兵至戲章邯擊郤之出衛君角為庶人二將軍章邯長史司馬欣都尉董翳追楚兵至河誅丞相斯去疾將軍馮劫三趙髙反二世自殺髙立二世兄子嬰子嬰立刺殺髙夷三族諸侯入秦嬰降為項羽所殺尋誅羽天下屬漢史記集解卷十五
