body:
  text: 史記集解卷九十七宋裴駰撰史記九十七酈生陸賈列傳第三十七酈生食其者陳留高陽人也徐廣曰今在圉縣好讀書家貧落魄無以為衣食業應劭曰落魄志行衰惡之貌晉灼曰落薄落託義同為里監門吏然縣中賢豪不敢役縣中皆謂之狂生及陳勝項梁等起諸將徇地過高陽者數十人酈生問其將皆握齱應劭曰握齱急促之貌好苛禮自用不能聽大度之言酈生乃深自藏匿後聞沛公將兵略地陳留郊沛公麾下騎士適酈生里中子也服䖍曰食其里中子適作沛公騎士沛公時時問邑中賢士豪俊騎士歸酈生見謂之曰吾聞沛公慢而易人多大略此真吾所願從遊莫為我先若見沛公謂曰臣里中有酈生年六十餘長八尺人皆謂之狂生生自謂我非狂生騎士曰沛公不好儒諸客冠儒冠來者沛公輒解其冠溲溺其中與人言常大罵未可以儒生說也酈生曰第言之騎士從容言如酈生所誡者沛公至高陽傳舍徐廣曰二世三年二月使人召酈生酈生至入謁沛公方倨牀使兩女子洗足而見酈生酈生入則長揖不拜曰足下欲助秦攻諸侯乎且欲率諸侯破秦也沛公罵曰豎儒夫天下同苦秦久矣故諸侯相率而攻秦何謂助秦攻諸侯乎酈生曰必聚徒合義兵誅無道秦不宜倨見長者於是沛公輟洗起攝衣延酈生上坐謝之酈生因言六國從橫時沛公喜賜酈生食問曰計將安出酈生曰足下起糾合之衆一作烏合一作瓦合收散亂之兵不滿萬人欲以徑入彊秦此所謂探虎口者也夫陳留天下之衝四通五達之郊也如淳曰四靣中央凡五達也瓉曰四通五逹言無險阻今其城又多積粟臣善其令請得使之今下足下即不聽足下舉兵攻之臣為內應於是遣酈生行沛公引兵隨之遂下陳留號酈食其為廣野君酈生言其弟酈商使將數千人從沛公西南略地酈生常為說客馳使諸侯漢三年秋項羽擊漢拔滎陽漢兵遁保鞏洛楚人聞淮隂侯破趙彭越數反梁地則分兵救之淮隂方東擊齊漢王數困滎陽成臯計欲捐成臯以東屯鞏洛以拒楚酈生因曰臣聞知天之天者王事可成不知天之天者王事不可成王者以民人為天而民人以食為天夫敖倉天天下轉輸久矣臣聞其下乃有藏粟甚多楚人拔滎陽不堅守敖倉乃引而東令適卒分守成臯此乃天所以資漢也方今楚易取而漢反却自奪其便臣竊以為過矣且兩雄不俱立楚漢久相持不決百姓騷動海內搖蕩農夫釋耒工女下機天下之心未有所定也願足下急復進兵收取滎陽據敖倉之粟塞成臯之險杜大行之道韋昭曰在河內野王北距蜚狐之口如淳曰上黨壺關也案蜚狐在代郡西南守白馬之津以示諸侯劾實形制之勢則天下知所歸矣方今燕趙已定唯齊未下今田廣據千里之齊田間將二十萬之衆軍於厯下諸田宗彊負海阻河濟南近楚人多變詐足下雖遣數十萬師未可以嵗月破也臣請得奉明詔說齊王使為漢而稱東藩上曰善乃從其畫復守敖倉而使酈生說齊王曰王知天下之所歸乎王曰不知也曰王知天下之所歸則齊國可得而有也若不知天下之所歸即齊國未可得保也齊王曰天下何所歸曰歸漢曰先生何以言之曰漢王與項王戮力西面擊秦約先入咸陽者王之漢王先入咸陽項王負約不與而王之漢中項王遷殺義帝漢王聞之起蜀漢之兵擊三秦出關而責義帝之處收天下之兵立諸侯之後降城即以侯其將得賂即以分其士與天下同其利豪英賢才皆樂為之用諸侯之兵四靣而至蜀漢之粟方船而下項王有倍約之名殺義帝之負於人之功無所記於人之罪無所忘戰勝而不得其賞拔城而不得其封非項氏莫得用事為人刻印刓而不能授孟康曰刓斷無復廉鍔也瓉曰項羽吝於爵賞刓惜侯印不能以封其人也攻城得賂積而不能賞天下畔之賢才怨之而莫為之用故天下之士歸於漢王可坐而策也夫漢王發蜀漢定三秦涉西河之外援上黨之兵下井陘誅成安君破北魏舉三十二城此蚩尤之兵也非人之力也天之福也今已據敖倉之粟塞成臯之險守白馬之津杜大行之阪距蜚狐之口天下後服者先亡矣王疾先下漢王齊國社稷可得而保也不下漢王危亡可立而待也田廣以為然乃聽酈生罷厯下兵守戰備與酈生日縱酒淮隂侯聞酈生伏軾下齊七十餘城乃夜度兵平原襲齊齊王田廣聞漢兵至以為酈生賣已乃曰汝能止漢軍我活汝不然我將亨汝酈生曰舉大事不細謹盛德不辭讓而公不為若更齊王遂亨酈生引兵東走漢十二年曲周侯酈商以丞相將兵擊黥布有功高祖舉列侯功臣思酈食其酈食其子酈疥數將兵功未當侯上以其父故封疥為高梁侯後更食武遂嗣三世元狩元年中武遂侯平坐詐詔衡山王取百斤金當棄市病死國除也陸賈者楚人也以客從高祖定天下名為有口辨士居左右常使諸侯及高祖時中國初定尉他平南越因王之高祖使陸賈賜尉他印為南越王陸生至尉他魋結服䖍曰魋音椎今兵士椎頭結箕倨見陸生陸生因進說他曰足下中國人親戚昆弟墳墓在真定今足下反天性棄冠帶欲以區區之越與天子抗衡為敵國禍且及身矣且夫秦失其政諸侯豪傑竝起唯漢王先入關據咸陽項羽倍約自立為西楚霸王諸侯皆屬可謂至彊然漢王起巴蜀鞭笞天下劫略諸侯遂誅項羽滅之五年之間海內平定此非人力天之所建也天子聞君王王南越不助天下誅暴逆將相欲移兵而誅王天子憐百姓新勞苦故且休之遣臣授君王印剖符通使君王宜郊迎北靣稱臣乃欲以新造未集之越屈彊於此漢誠聞之掘燒王先人家夷滅宗族使一偏將將十萬衆臨越則越殺王降漢如反覆手耳於是尉他乃蹶然起坐謝陸生曰居蠻夷中久殊失禮義因問陸生曰我孰與蕭何曹參韓信賢陸生曰王似賢復曰我孰與皇帝賢陸生曰皇帝起豐沛討暴秦誅彊楚為天下興利除害繼五帝三皇之業統理中國中國之人以億計地方萬里居天下之膏腴人衆車輿萬物殷富政由一家自天地剖泮未始有也今王衆不過數十萬皆蠻夷崎嶇山海間譬若漢一郡王何乃比於漢尉他大笑曰吾不起中國故王此使我居中國何渠音詎不若漢乃大說陸生留與飲數月曰越中無足與語至生來令我日聞所不聞賜陸生橐中裝直千金張晏曰珠玉之寶也裝裹也他送亦千金蘇林曰非橐中物故曰他送也陸生卒拜尉他為南越王令稱臣奉漢約歸報高祖大悅拜賈為太中大夫陸生時時前說稱詩書高帝罵之曰乃公居馬上而得之安事詩書陸生曰居馬上得之寧可以馬上治之乎且湯武逆取而以順守之文武竝用長久之術也昔者吳王夫差智伯極武而亡秦任刑法不變卒滅趙氏趙氏秦姓也鄉使秦已并天下行仁義法先聖陛下安得而有之高帝不懌而有慙色乃謂陸生曰試為我著秦所以失天下吾所以得之者何及古成敗之國陸生乃粗述存亡之徴凡著十二篇每奏一篇高帝未嘗不稱善左右呼萬嵗號其書曰新語孝惠帝時吕太后用事欲王諸吕畏大臣有口者陸生自度不能爭之乃病免家居以好畤田地善可以家焉有五男乃出所使越得槖中裝賣千金分其子子二百金令為生産陸生常安車駟馬從歌舞鼓琴瑟侍者十人寶劍直百金謂其子曰與汝約徐廣曰汝一作公過汝汝給吾人馬酒食極欲十日而更所死家得寶劍車騎侍從者一嵗中往來過他客率不過再三過數見不鮮無久慁公為也韋昭曰慁汚辱吕太后時王諸吕諸吕擅權欲劫少主危劉氏右丞相陳平患之力不能爭恐禍及已常燕居深念陸生往請漢書音義曰請若問起居直入坐而陳丞相方深念不時見陸生陸生曰何念之深也陳平曰生揣我何念孟康曰揣量也韋昭曰揣音初委反陸生曰足下位為上相食三萬户侯可謂極富貴無欲矣然有憂念不過患諸吕少主耳陳平曰然為之奈何陸生曰天下安注意相天下危注意將將相和調則士務附務一作豫士務附天下雖有變即權不分權不分為社稷計在兩君掌握耳臣常欲謂太尉絳侯絳侯與我戲易吾言君何不交歡太尉深相結為陳平畫吕氏數事陳平用其計乃以五百金為絳侯夀厚具樂飲太尉亦報如之此兩人深相結則呂氏謀益衰陳平乃以奴婢百人車馬五十乘錢五百萬遺陸生為飲食費陸生以此游漢廷公卿間名聲藉甚漢書音義曰言狼藉甚盛及誅諸吕立孝文帝陸生頗有力焉孝文帝即位欲使人之南越陳丞相等乃言陸生為太中大夫往使尉他今尉他去黃屋稱制令比諸侯皆如意㫖語在南越語中陸生竟以壽終平原君朱建者楚人也故嘗為淮南王黥布相有罪去後復事黥布布欲反時問平原君止之布不聽而聽梁侯遂反漢已誅布聞平原君諌不與謀得不誅語在黥布語中駰案黥布列傳無此語平原君為人辨有口刻廉剛直家於長安行不茍合義不取容辟陽侯行不正得幸吕太后時辟陽侯欲知平原君平原君不肯見及平原君母死陸生素與平原君善過之平原君家貧未有以發喪方假貸服具陸生今平原君發喪陸生往見辟陽侯賀曰平原君母死辟陽侯曰平原君母死何乃賀我乎陸賈曰前日君侯欲知平原君平原君義不知君以其母故張晏曰相知當同恤危母在故義不知君今其母死君誠厚送喪則彼為君死矣辟陽侯乃奉百金往稅韋昭曰衣服曰稅稅當為襚列侯貴人以辟陽侯故往稅凡五百金辟陽侯幸吕太后人或毁辟陽侯於孝惠帝孝惠帝大怒下吏欲誅之吕太后慙不可以言大臣多害辟陽侯行欲遂誅之辟陽侯急因使人欲見平原君平原君辭曰獄急不敢見君乃求見孝惠幸臣閎籍孺說之曰君所以得幸帝天下莫不聞今辟陽侯幸太后而下吏道路皆言君讒欲殺之今日辟陽侯誅旦日太后含怒亦誅君何不肉袒為辟陽侯言於帝帝聽君出辟陽侯太后大歡兩主共幸君君貴富益倍矣於是籍孺大恐從其計言帝果出辟陽侯辟陽侯之囚欲見平原君平原君不見辟陽侯辟陽侯以為倍已大怒及其成功出之乃大驚吕太后崩大臣誅諸吕辟陽侯於諸吕至深如淳曰辟陽侯與諸吕相親信也為罪宜誅者至深而卒不誅計畫所以全者皆陸生平原君之力也孝文帝時淮南厲王殺辟陽侯以諸吕故文帝聞其客平原君為計䇿使吏捕欲治聞吏至門平原君欲自殺諸子及吏皆曰事未可知何早自殺為平原君曰我死禍絶不及而身矣遂自剄孝文帝聞而惜之曰吾無意殺之乃召其子拜為中大夫使丐奴單于無禮乃罵單于遂死丐奴中初沛公引兵過陳留酈生踵軍門上謁曰高陽賤民酈食其竊聞沛公暴露將兵助楚誅不義敬勞從者願得望見口畫天下便事使者入通沛公方洗問使者曰何如人也使者對曰狀貌類大儒衣儒衣冠側注徐廣曰側注冠一名高山冠齊王所服以賜謁者沛公曰為我謝之言我方以天下為事未暇見儒人也使者出謝曰沛公敬謝先生方以天下為事未暇見儒人也酈生瞋目按劍叱使者曰走復入言沛公吾高陽酒徒也徐廣曰一本言而公高陽酒徒非儒人也使者懼而失謁跪拾謁還走復入報曰客天下壯士也叱臣臣恐至失謁曰走復入言而公高陽酒徒也沛公遽雪足杖矛曰延客入酈生入揖沛公曰足下甚苦暴衣露冠將兵助楚討不義足下何不自喜也臣願以事見而曰吾方以天下為事未暇見儒人也夫足下欲興天下之大事而成天下之大功而以目皮相恐失天下之能士且吾度足下之智不如吾勇又不如吾若欲就天下而不相見竊為足下失之沛公謝曰鄉者聞先生之容今見先生之意矣乃延而坐之問所以取天下者酈生曰夫足下欲成大功不如止陳留陳留者天下之據衝也兵之會地也積粟數千萬石城守甚堅臣素善其令願為足下說之不聽臣臣請為足下殺之而下陳留足下將陳留之衆據陳留之城而食其積粟招天下之從兵從兵已成足下橫行天下莫能有害足下者矣沛公曰敬聞命矣於是酈生乃夜見陳留令說之曰夫秦為無道而天下畔之今足下與天下從則可以成大功今獨為亡秦嬰城而堅守臣竊為足下危之陳留令曰秦法至重也不可以妄言妄言者無類吾不可以應先生所以教臣者非臣之意也願勿復道酈生留宿卧夜半時斬陳留令首踰城而下報沛公沛公引兵攻城縣令首於長竿以示城上人曰趣下而令頭已斷矣今後下者必先斬之於是陳留人見令已死遂相率而下沛公沛公舍陳留南城門上因其庫兵食積粟留出入三月從兵以萬數遂入破秦太史公曰世之傳酈生書多曰漢王已拔三秦東擊項籍而引軍於鞏洛之間酈生被儒衣往說漢王乃非也自沛公未入關與項羽别而至高陽得酈生兄弟余讀陸生新語書十二篇因當世之辨士至平原君子與余善是以得具論之史記集解卷九十七
