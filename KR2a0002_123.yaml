body:
  text: 史記集解卷一百二十五宋裴駰撰史記一百二十五佞幸列傳第六十五諺曰力田不如逢年善仕不如遇合徐廣曰遇固一作偶無虛言非獨女以色媚而仕宦亦有之昔以色幸者多矣至漢興髙祖至暴抗也然籍孺以佞幸孝惠時有閎孺此兩人非有才能徒以婉佞貴幸與上卧起公卿皆因關説故孝惠時郎侍中皆冠鵕鸃貝帶漢書音義曰鵕鸃鳥名以毛羽飾冠以貝飾帶傳脂粉化閎籍之屬也兩人徙家安陵孝文時中寵臣士人則鄧通患者則趙同北宫伯子北宫伯子以愛人長者而趙同以星氣幸常為文帝參乘鄧通無伎能鄧通蜀郡南安人也徐廣曰後屬揵為以濯船為黃頭郎徐廣曰著黃帽也駰案漢書音義曰善濯船池中也一説能持擢行船也土水之母故施黃旄於船頭因以名其郎曰黃頭郎孝文帝夢欲上天不能有一黃頭郎從後推之上天顧見其衣裻徐廣曰一無此字帶後穿覺而之漸臺以夢中陰目求推者郎即見鄧通其衣後穿夢中所見也召問其名姓姓鄧氏名通文帝説焉尊幸之日異通亦願謹不好外交雖賜洗沐不欲出於是文帝賞賜通巨萬以十數官至上大夫文帝時時如鄧通家遊戲然鄧通無他能不能有所薦士獨自謹其身以媚上而已上使善相者相通曰當貧餓死文帝曰能富通者在我也何謂貧乎於是賜鄧通蜀嚴道銅山得自鑄錢鄧氏錢布天下其富如此文帝嘗病癰鄧通常為帝唶吮之文帝不樂從容問通曰天下誰最愛我者乎通曰宜莫如太子太子入問病文帝使唶癰唶癰而色難之已而聞鄧通常為帝唶吮之心慙由此怨通矣及文帝崩景帝立鄧通免家居居無何人有告鄧通盜出徼外鑄錢下吏驗問頗有之遂竟案盡沒入鄧通家尚負責數巨萬長公主賜鄧通韋昭曰景帝姊也吏輒隨沒入之一簪不得著身於是長公主乃令假衣食竟不得名一錢寄死人家孝景帝時中無寵臣然獨郎中令周文仁仁寵最過庸乃不甚篤今天子中寵臣士人則韓王孫嫣宦者則李延年嫣者弓髙侯孽孫也徐廣曰韓王信之子頽當也今上為膠東王時嫣與上學書相愛及上為太子愈益親嫣嫣善騎射善佞上即位欲事伐胸奴而嫣先習胡兵以故益尊貴官至上大夫賞賜擬於鄧通時嫣常與上卧起江都王入朝有詔得從入獵上林中天子車駕蹕道未行而先使嫣乘副車從數十百騎騖馳視獸江都王望見以為天子辟從者伏謁道傍嫣驅不見既過江都王怒為皇太后泣曰請得歸國入宿衛比韓嫣太后由此嗛嫣徐廣曰嗛讀與銜同漢書作銜字嫣侍上出入永巷不禁以姦聞皇太后皇太后怒使使賜嫣死上為謝終不能得嫣遂死而案道侯韓説其弟也亦佞幸李延年中山人也父母及身兄弟及女皆故倡也延年坐法腐給事狗中徐廣曰主獵犬也而平陽公主言延年女弟善舞上見心説之及入永巷而召貴延年延年善歌為變新聲而上方興天地祠欲造樂詩歌弦之延年善承意弦次初詩其女弟亦幸有子男延年佩二千石印號協聲律與上卧起甚貴幸埓如韓嫣也徐廣曰埓等也蜀都賦曰卓鄭埓名又云埓者疇等之名久之寖與中人亂徐廣曰一云坐弟季與中人亂出入驕恣及其女弟李夫人卒後愛弛則禽誅延年昆弟也自是之後內寵嬖臣大底外戚之家然不足數也衛青霍去病亦以外戚貴幸然頗用材能自進太史公曰甚哉愛憎之時彌子瑕之行足以觀後人佞幸矣雖百世可知也史記集解卷一百二十五
