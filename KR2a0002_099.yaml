body:
  text: 史記集解卷一百一宋裴駰撰史記一百一袁盎鼂錯列傳第四十一袁盎者楚人也字絲父故為羣盜徙處安陵髙后時盎嘗為吕祿舍人及孝文帝即位盎兄噲任盎為中郎如淳曰盎為兄所保任故得為中郎絳侯為丞相朝罷趨出意得甚上禮之恭常自送之徐廣曰自一作目袁盎進曰陛下以丞相何如人上曰社稷臣盎曰絳侯所謂功臣非社稷臣社稷臣主在與在如淳曰人主在時與共治在時之事主亡與亡如淳曰不以主亡而不行其政令方呂后時諸呂用事擅相王劉氏不絶如帶是時絳侯為太尉主兵柄弗能正呂后崩大臣相與共畔諸呂太尉主兵適㑹其成功所謂功臣非社稷臣丞相如有驕主色陛下謙讓臣主失禮竊為陛下不取也後朝上益莊丞相益畏已而絳侯望袁盎曰吾與而兄善今兒廷毁我盎遂不謝及絳侯免相之國國人上書告以為反徵繫清室漢書作請室應劭曰請室請罪之室若今鍾下也如淳曰請室獄也若古刑於甸師氏也宗室諸公莫敢為言唯袁盎明絳侯無罪絳侯得釋盎頗有力絳侯乃大與盎結交淮南厲王朝殺辟陽侯居處驕甚袁盎諌曰諸侯大驕必生患可適削地上弗用淮南王益横及棘蒲侯柴武太子謀反事覺治連淮南王淮南王徴上因遷之蜀轞車傳送袁盎時為中郎将乃諌曰陛下素驕淮南王弗稍禁以至此今又暴摧折之淮南王為人剛如有遇霧露行道死陛下竟為以天下之大弗能容有殺弟之名奈何上弗聽遂行之淮南王至雍病死聞上輟食哭甚哀盎入頓首請罪上曰以不用公言至此盎曰上自寛此往事豈可悔哉且陛下有髙世之行者三此不足以毁名上曰吾髙世行三者何事盎曰陛下居代時太后嘗病三年陛下不交睫不解衣湯藥非陛下口所嘗弗進夫曾參以布衣猶難之今陛下親以王者修之過曾參孝遠矣夫諸呂用事大臣専制然陛下從代乘六乘傳馳不測之淵瓚曰大臣共誅諸吕禍福尚未可知故曰不測也雖賁育之勇不及陛下孟康曰孟賁夏育皆古勇者也陛下至代邸西向讓天子位者再南面讓天子位者三夫許由一讓而陛下五以天下讓過許由四矣且陛下遷淮南王欲以苦其志使改過有司衛不謹故病死於是上乃解曰将奈何盎曰淮南王有三子唯在陛下耳於是文帝立其三子皆為王盎由此名重朝廷袁盎常引大體忼慨宦者趙同徐廣曰漢書作談字以數幸嘗害袁盎袁盎患之盎兄子種為常侍騎持節夾乘説盎曰徐廣曰説一作謀君與鬬廷辱之使其毁不用孝文帝出趙同參乘袁盎伏車前曰臣聞天子所與共六尺輿者皆天下豪英今漢雖乏人陛下獨奈何與刀鋸餘人載於是上笑下趙同趙同泣下車文帝從霸陵上欲西馳下峻阪袁盎騎竝車擥轡上曰将軍怯邪盎曰臣聞千金之子坐不垂堂百金之子不騎衡徐廣曰一作行駰案服䖍曰自惜身不騎衡如淳曰騎倚也衡樓殿邉欗楯也韋昭曰衡車衡聖主不乘危而徼幸今陛下騁六騑如淳曰六馬之疾若飛馳下峻山如有馬驚車敗陛下縱自輕奈髙廟太后何上乃止上幸上林皇后慎夫人從其在禁中常同席坐及坐郎署長布席袁盎引郤慎夫人坐如淳曰盎時為中郎将天子幸署豫設供帳待之故得郤慎夫人坐慎夫人怒不肯坐上亦怒起入禁中盎因前説曰臣聞尊卑有序則上下和今陛下既已立后慎夫人乃妾妾主豈可與同坐哉且陛下幸之即厚賜之陛下所以為慎夫人適所以禍之陛下獨不見人彘乎張晏曰戚夫人於是上乃説召語慎夫人慎夫人賜盎金五十斤然袁盎亦以數直諫不得乆居中調為隴西都尉如淳曰調選仁愛士卒士卒皆爭為死遷為齊相徙為呉相辭行種謂盎曰呉王驕日乆國多姦今茍欲劾治彼不上書告君即利劒刺君矣南方卑溼君能日飲母苛時説王曰母反而已如此幸得脱盎用種之計呉王厚遇盎盎告歸道逢丞相申屠嘉下車拜謁丞相從車上謝袁盎袁盎還愧其吏乃之丞相舍上謁求見丞相丞相良乆而見之盎因跪曰願請間丞相曰使君所言公事之曹與長史掾議吾且奏之即私邪吾不受私語袁盎即跪説曰君為丞相自度孰與陳平絳侯丞相曰吾不如袁盎曰善君即自謂不如夫陳平絳侯輔翼髙帝定天下為将相而誅諸呂存劉氏君乃為材官蹶張遷為隊率積功至淮陽守非有竒計攻城野戰之功且陛下從代來每朝郎官上書疏未嘗不止輦受其言言不可用置之言可受採之未嘗不稱善何也則欲以致天下賢士大夫上日聞所不聞明所不知日益聖智君今自閉鉗天下之口而日益愚夫以聖主責愚相君受禍不乆矣丞相乃再拜曰嘉鄙野人乃不知将軍幸教引入與坐為上客盎素不好鼂錯鼂錯所居坐盎去盎坐錯亦去兩人未嘗同堂語及孝文帝崩孝景帝即位鼂錯為御史大夫使吏案袁盎受呉王財物抵罪詔赦以為庶人呉楚反聞鼂錯謂丞史曰如淳曰百官表御史大夫有兩丞丞史丞相史夫袁盎多受呉王金錢專為蔽匿言不反今果反欲請治盎宜知計謀丞史曰事未發治之有絶如淳曰事未發之時治之乃有所絶今兵西鄉治之何益且袁盎不宜有謀如淳曰盎大臣不宜有姦謀鼂錯猶與未决人有告袁盎者袁盎恐夜見竇嬰為言呉所以反者願至上前口對状竇嬰入言上上乃召袁盎入見鼂錯在前及盎請辟人賜間錯去固恨甚袁盎具言呉所以反状以錯故獨急斬錯以謝呉呉兵乃可罷其語具在呉事中使袁盎為太常竇嬰為大将軍兩人素相與善逮呉反諸陵長者長安中賢大夫爭附兩人車隨者日數百乘及鼂錯已誅袁盎以太常使呉呉王欲使将不肯欲殺之使一都尉以五百人圍守盎軍中袁盎自其為呉相時嘗有從史從史嘗盜愛盎侍兒文穎曰婢也盎知之弗泄遇之如故人有告從史言君知爾與侍者通乃亡歸袁盎驅自追之遂以侍者賜之復為從史及袁盎使呉見守從史適為守盎校尉司馬乃悉以其裝齎置二石淳醪會天寒士卒飢渇飲酒醉西南陬卒皆卧司馬夜引袁盎起曰君可以去矣呉王期旦日斬君盎弗信曰公何為者司馬曰臣故為從史盜君侍兒者盎乃驚謝曰公幸有親文穎曰言汝有親老吾不足以累公司馬曰君第去臣亦且亡避吾親如淳曰藏匿吾親不使遇害也君何患乃以刀決張音帳道如淳曰決開當所從亡者之道從醉卒直隧出司馬與分背袁盎解節毛懷之如淳曰不欲令人見也杖歩行七八里明見梁騎騎馳去文頴曰梁騎擊呉楚者也或曰得梁馬馳去也遂歸報呉楚已破上更以元王子平陸侯禮為楚王袁盎為楚相嘗上書有所言不用袁盎病免居家與閭里浮沈相隨行鬬雞走狗雒陽劇孟嘗過袁盎盎善待之安陵富人有謂盎曰吾聞劇孟博徒如淳曰博盪之徒或曰博戲之徒将軍何自通之盎曰劇孟雖博徒然母死客送𦵏車千餘乘此亦有過人者且緩急人所有夫一旦有急叩門不以親為解張晏曰不語云親不聽也瓚曰凡人之於赴難濟危多以有父母為解而孟兼行之不以存亡為辭天下所望者獨季心劇孟耳今公常從數騎徐廣曰常一作詳一旦有緩急寧足恃乎罵富人弗與通諸公聞之皆多袁盎袁盎雖家居景帝時時使人問籌策梁王欲求為嗣袁盎進説其後語塞梁王以此怨盎曾使人刺盎刺者至關中問袁盎諸君譽之皆不容口乃見袁盎曰臣受梁王金來刺君君長者不忍刺君然後刺君者十餘曹如淳曰曹輩備之袁盎心不樂家又多怪乃之棓生所問占徐廣曰棓一作服駰案文穎曰棓音陪秦賢士善術者還梁刺客後曹輩果遮刺殺盎安陵郭門外鼂錯者潁川人也學申商刑名於軹張恢先所徐廣曰先即先生與雒陽宋孟及劉禮同師以文學為太常掌故應劭曰掌故百石吏主故事錯為人陗直刻深韋昭曰術岸髙曰峭瓚曰陗峻孝文帝時天下無治尚書者獨聞濟南伏生故秦博士治尚書年九十餘老不可徴乃詔太常使人往受之太常遣錯受尚書伏生所還因上便冝事以書稱説詔以為太子舍人門大夫家令服䖍曰太子稱家瓚曰茂陵書太子家令秩八百石以其辯得幸太子太子家號曰智囊數上書孝文時言削諸侯事及法令可更定者書數十上孝文不聽然奇其材遷為中大夫當是時太子善錯計䇿袁盎諸大功臣多不好錯景帝即位以錯為内史錯常數請間言事輒聽寵幸傾九卿徐廣曰九一作公法令多所更定丞相申屠嘉心弗便力未有以傷内史府居太上廟壖中門東出不便錯乃穿兩門南出鑿廟壖垣丞相嘉聞大怒欲因此過為奏請誅錯錯聞之即夜請間具為上言之丞相奏事因言錯擅鑿廟垣為門請下廷尉誅上曰此非廟垣乃壖中垣不致於法丞相謝罷朝怒謂長史曰吾當先斬以聞乃先請為兒所賣固誤丞相遂發病死錯以此愈貴遷為御史大夫請諸侯之罪過削其地徐廣曰一云言景帝曰諸侯或連數郡非古之制非乆長策不便請削之上令公卿云云收其枝郡奏上上令公卿列侯宗室集議莫敢難獨竇嬰爭之由此與錯有㕁錯所更令三十章諸侯皆諠譁疾鼂錯錯父聞之從潁川來謂錯曰上初即位公為政用事侵削諸侯别疏人骨肉人口議徐廣曰一作讙多怨公者何也鼂錯曰固也不如此天子不尊宗廟不安錯父曰劉氏安矣而鼂氏危矣吾去公歸矣遂飲藥死曰吾不忍見禍及吾身死十餘日呉楚七國果反以誅錯為名及竇嬰袁盎進説上令鼂錯衣朝衣斬東市鼂錯已死謁者僕射鄧公為校尉擊呉楚軍為将還上書言軍事謁見上上問曰道軍所來如淳曰道路從呉軍所來也瓚曰道由也聞鼂錯死呉楚罷不鄧公曰呉王為反數十年矣發怒削地以誅錯為名其意不在錯也且臣恐天下之士噤口不敢復言也上曰何哉鄧公曰夫鼂錯患諸侯强大不可制故請削地以尊京師萬世之利也計畫始行卒受大戮内杜忠臣之口外為諸侯報仇臣竊為陛下不取也於是景帝黙然良乆曰公言善吾亦恨之乃拜鄧公為城陽中尉鄧公成固人也多竒計建元中上招賢良公卿言鄧公時鄧公免起家為九卿一年復謝病免歸其子章以修黄老言顯於諸公間太史公曰袁盎雖不好學亦善傅會仁心為質引義慷慨遭孝文初立資適逢世張晏曰資才也適值其世得騁其才時以變易張晏曰謂景帝立及呉楚一説説雖行哉然復不遂好聲矜賢竟以名敗鼂錯為家令時數言事不用後擅權多所變更諸侯發難不急匡救欲報私讐反以亡軀語曰變古亂常不死則亡豈錯等謂邪史記集解卷一百一
