body:
  text: 史記集解卷二十七宋裴駰撰史記二十七天官書第五中宫天極星其一明者太一常居也旁三星三公或曰子屬後句四星末大星正妃餘三星後宫之屬也環之匡衛十二星藩臣皆曰紫宫前列直斗口三星隨北端兌若見若不曰隂德或曰天一紫宫左三星曰天槍右四星曰天棓蘇林曰音􅀈朾之􅀈後六星絶漢抵營室曰閣道北斗七星所謂琁璣玉衡以齊七政杓攜龍角孟康曰杓北斗杓也龍角東方宿也攜連也衡殷北斗魁枕參首晉灼曰衡斗之中央殷中也用昏建者杓杓自華以西南孟康曰傳曰斗第七星法太白主杓斗之尾也尾為隂又其用昏昏隂位在西方故主西南夜半建者衡徐廣曰第五星衡殷中州河濟之間孟康曰假令杓昏建寅衡夜半亦建寅平旦建者魁魁海岱以東北也孟康曰𫝊曰斗第一星法於日主齊也魁斗之首首陽也又其用在明陽與明德在東方故主東北齊分斗為帝車運於中央臨制四鄉分隂陽建四時均五行移節度定諸紀皆繫於斗斗魁戴匡六星晉灼曰似戴故曰戴匡也曰文昌宫一曰上將二曰次將三曰貴相四曰司命五曰司中六曰司祿在斗魁中貴人之牢孟康曰𫝊曰天理四星在斗魁中貴人牢名曰天理魁下六星兩兩相比者名曰三能蘇林曰音三台三能色齊君臣和不齊為乖戾輔星孟康曰在北斗第六星旁明近輔臣親强厈小疏弱蘇林曰厈逺也杓端有兩星一內為矛招搖孟康曰近北斗者招搖招搖為天矛晉灼曰更河三星天矛鋒招搖一星耳一外為盾天鋒晋灼曰外逺北斗也在招搖南一名𤣥戈有句圜十五星屬杓曰賤人之牢其牢中星實則囚多虛則開出天一槍棓矛盾動搖角大兵起李奇曰角芒角東宫蒼龍房心心為明堂大星天王前後星子屬不欲直直則天王失計房為府曰天駟其隂右驂旁有兩星曰襟北一星曰舝徐廣曰音轄東北曲十二星曰旗旗中四星曰天市中六星曰市樓市中星衆者實其虛則耗房南衆星曰騎官左角李右角將大角者天王帝廷其兩旁各有三星鼎足句之曰攝提晉灼曰如鼎之句曲攝提者直斗杓所指以建時節故曰攝提格亢為疏廟主疾其南北兩星星曰南門氐為天根主疫尾為九子曰君臣斥絶不和箕為敖客曰口舌火犯守角則有戰房心王者惡之也南宫朱鳥權衡孟康曰軒轅為權太微為衡衡太微三光之廷匡衛十二星藩臣西將東相南四星執法中端門門左右掖門門內六星諸侯其內五星五帝坐後聚一十五星蔚然徐廣曰一云哀烏曰郎位傍一大星將位也月五星順入軌道司其出所守天子所誅也其逆入若不軌道以所犯命之中坐成形晉灼曰中坐犯帝座也成形禍福之形見也皆羣下從謀也金火尤甚廷藩西有隋音他果反星五曰少微士大夫權軒轅軒轅黃龍體孟康曰形如騰龍前大星女主象旁小星御者後宫屬月五星守犯者如衡占東井為水事其西曲星曰鉞鉞北北河南南河兩河天闕間為關梁輿鬼鬼祠事中白者為質晉灼曰輿鬼五星其中白者為質火守南北河兵起穀不登故德成衡觀成潢晉灼曰日月五星不軌道也衡太微廷也觀占也潢五帝車舍傷成鉞晉灼曰賊傷之占先成形於鉞禍成井晉灼曰東井主水事火入一星居其旁天子且以火敗故曰禍也誅成質晉灼曰營惑入輿鬼天質占曰大臣有誅柳為鳥注主木草七星頸為員官主急事張素為厨主觴客翼為羽翮主逺客軫為車主風其旁有一小星曰長沙星星不欲明明與四星等若五星入軫星中兵大起軫南衆星曰天庫樓庫有五車車星角若益衆及不具無處車馬西宫咸池曰天五橫五潢五帝車舍火入旱旱金兵水水中有三柱柱不具兵起奎曰封豕為溝瀆婁為聚衆胃為天倉其南衆星曰廥積如淳曰芻藳積為廥也昴曰旌頭胡星也為白衣㑹畢曰罕軍為邊兵主弋獵其大星旁小星為附耳附耳動搖有讒亂臣在側昴畢間為天街其隂隂國陽陽國孟康曰隂西南坤維河山已北國陽河山已南國參為白虎三星直者是為衡石孟康曰參三星者白虎宿中西直似稱衡下有三星兌曰罰孟康曰在參間上小下大故曰鋭晋灼曰三星少斜列無鋭形為斬艾事其外四星左右肩股也小三星隅置曰觜觹為虎首主葆旅事如淳曰關中俗謂桑榆孽生為葆晋灼曰菜也野生曰旅今之飢民采旅生也其南有四星曰天廁廁下一星曰天矢矢黃則吉青白黑凶其西有句曲九星三處羅一曰天旗二曰天苑三曰九斿徐廣曰音流其東有大星曰狼狼角變色多盜賊下有四星曰狐直狼狼比地有大星晉灼曰比地近地也曰南極老人老人見治安不見兵起常以秋分時候之於南郊附耳入畢中兵起北宫𤣥武虛危危為蓋屋虛為哭泣之事其南有衆星曰羽林天軍軍西為壘或曰鉞旁有一大星為北落北落若微亡軍星動角益希及五星犯北落入軍軍起火金水尤甚火軍憂水患木土軍吉漢書音義曰木星土星入北落則吉也危東六星兩兩相比曰司空營室為清廟曰離宫閣道漢中四星曰天駟旁一星曰王良王良策馬車騎滿野旁有八星絶漢曰天潢天潢旁江星江星動人涉水杵臼四星在危南匏瓜有青黑星守之魚鹽貴南斗為廟其北建星建星者旗也牽牛為犧牲其北河鼓河鼓大星上將左右左右將婺女其北織女織女天女孫也徐廣曰孫一作名察日月之行以揆嵗星順逆曰東方木主春曰甲乙義失者罰出歲星歲星贏縮以其舍命國所在國不可伐可以罰人其趨舍而前曰贏退舍曰縮贏其國有兵不復縮其國有憂將亡國傾敗其所在五星皆從而聚於一舍其下之國可以義致天下以攝提格歲歲隂左行在寅嵗星右轉居丑正月與斗牽牛晨出東方名曰監德色蒼蒼有光其失次有應見柳嵗旱水晚旱嵗星出東行十二度百日而止反逆行逆行八度百日復東行嵗行三十度十六分度之七率日行十二分度之一十二嵗而周天出常東方以晨入於西方用昏單閼嵗嵗隂在卯星居子以二月與婺女虛危晨出曰降入大有光其失次有應見張名曰降入其歲大水執徐歲歲隂在辰星居亥以三月居與營室東壁晨出曰青章青青甚章其失次有應見軫曰青章嵗早旱晚水大荒駱嵗嵗隂在巳星居戌以四月與奎婁胃昴晨出曰跰踵徐廣曰一曰路嶂熊熊赤色有光其失次有應見亢敦牂嵗嵗隂在午星居酉以五月與胃昴畢晨出曰開明徐廣曰一曰天津炎炎有光偃兵唯利公王不利治兵其失次有應見房嵗早旱晚水叶洽嵗嵗隂在未星居申以六月與觜觹參晨出曰長列昭昭有光利行兵其失次有應見箕涒灘嵗嵗隂在申星居未以七月與東井輿鬼晨出曰大音昭昭白其失次有應見牽牛作鄂嵗嵗隂在酉星居午以八月與柳七星張晨出曰為長王作作有芒國其昌熟穀其失次有應見危曰大章有旱而昌有女喪民疾閹茂歲歲隂在戌星居巳以九月與翼軫晨出曰天雎白色大明其失次有應見東壁嵗水女喪大淵獻嵗嵗隂在亥星居辰以十月與角亢晨出曰大章徐廣曰一曰大星蒼蒼然星若躍而隂出旦是謂正平起師旅其率必武其國有德將有四海其失次有應見婁困敦嵗嵗隂在子星居卯以十一月與氐房心晨出曰天泉𤣥色甚明江池其昌不利起兵其失次有應在昴赤奮若嵗嵗隂在丑星居寅以十二月與尾箕晨出曰天皓黫然黑色甚明其失次有應見參當居不居居之又左右搖未當去去之與他星會其國凶所居久國有德厚其角動乍小乍大若色數變人主有憂其失次舍以下進而東北三月生天棓長四尺末兌進而東南三月生彗星長二丈類彗星退而西北三月生天攙韋昭曰攙音參差之參長四丈末兊退而西南三月生天槍長數丈兩頭兌謹視其所見之國不可舉事用兵其出如浮如沉其國有土功如沉如浮其野亡色赤而有角其所居國昌迎徐廣曰一作御角而戰者不勝星色赤黃而沉所居野大穰色青白而赤灰所居野有憂嵗星入月其野有逐相與太白鬭韋昭曰星相擊為鬬其野有破軍嵗星一曰攝提曰重華曰應星曰紀星營室為清廟嵗星廟也察剛徐廣曰一作罰氣以處熒惑曰南方火主夏曰丙丁禮失罰出熒惑熒惑失行是也出則有兵入則兵散以其舍命國熒惑熒惑為勃亂殘賊疾喪饑兵徐廣曰以下云熒惑為理外則理兵內則理政反道二舍以上居之三月有殃五月受兵七月半亡地九月太半亡地因與俱出入國絶祀居之殃還至雖大當小久而至當小反大其南為丈夫北為女子喪若角動繞環之及乍前乍後左右殃益大與他星鬭光相逮為害不相逮不害五星皆從而聚於一舍其下國可以禮致天下法出東行十六舍而止逆行二舍六旬復東行自所止數十舍十月而入西方伏晋灼曰伏不見行五月出東方其出西方曰反明主命者惡之東行急一日行一度半其行東西南北疾也兵各聚其下用戰順之勝逆之敗熒惑從太白軍憂離之軍却出太白隂有分軍行其陽有偏將戰當其行太白逮之破軍殺將其入守犯太微孟康曰犯七星已內光芒相及也韋昭曰自下觸之曰犯居其宿曰守軒轅營室主命惡之心為明堂營惑廟也謹候此厯斗之會以定填星之位曰中央土主季夏日戊巳黃帝主德女主象也嵗填一宿其所居國吉未當居而居若已去而復還還居之其國得土不乃得女若當居而不居既已居之又西東去其國失土不乃失女不可舉事用兵其居久其國福厚易福薄徐廣曰易猶輕速也其一名曰地侯主嵗嵗行十二度百十二分度之五日行二十八分度之一二十八嵗周天其所居五星皆從而聚於一舍其下之國可重致天下禮德義殺刑盡失而填星乃為之動搖贏為王不寧其縮有軍不復填星其色黃光芒音曰黃鍾宫其失次上二三宿將贏有主命不成不乃大水失次下二三宿曰縮有后戚其嵗不復不及天裂若地動斗為文太室填星廟天子之星也木星與土合為內亂饑主勿用戰敗水則變謀而更事火為旱金為白衣會若水金在南曰牝牡年穀熟金在北嵗偏無火與水合為焠晉灼曰火入水故曰焠與金合為鑠為喪皆不可舉事用兵大敗土為憂主孽卿大饑戰敗為北軍軍困舉事大敗土與水合穰而擁閼有覆軍徐廣曰或云木火土三星若合之謂驚位絶行其國不可舉事出亡地入得地金為疾為內兵亡地三星若合其宿地國外內有兵與喪改立公王四星合兵喪並起君子憂小人流五星合是謂易行有德受慶改立大人奄有四方子孫蕃昌無德受殃若亡五星皆大其事亦大皆小事亦小早出者為贏贏者為客晚出者為縮縮者為主人必有天應見於杓星同舍為合相凌為鬭孟康曰凌相冒占過也韋昭曰突掩為凌七寸以內必之矣五星色白圜為喪旱赤圜則中不平為兵青圜為憂水黑圜為疾多死黃圜則吉赤角犯我城黃角地之爭白角哭泣之聲青角有兵憂黑角則水意徐廣曰一作志行窮兵之所終五星同色天下偃兵百姓寧昌春風秋雨冬寒夏暑動搖常以此填星出百二十日而逆西行西行百二十日反東行見三百三十日而入入三十日復出東方太嵗在甲寅鎮星在東壁故在營室察日行以處位太白曰西方秋司兵月行及天矢日庚辛主殺殺失者罰出太白太白失行以其舍命國其出行十八舍二百四十日而入入東方伏行十一舍百三十日其入西方伏行三舍十六日而出當出不出當入不入是謂失舍不有破軍必有國君之篡其紀上元以攝提格之嵗與營室晨出東方至角而入與營室夕出西方至角而入與角晨出入畢與角夕出入畢與畢晨出入箕與畢夕出入箕與箕晨出入柳與箕夕出入柳與柳晨出入營室與桞夕出入營室凡出入東西各五為八嵗二百二十日徐廣曰一云三十二日復與營室晨出東方其大率歲一周天其始出東方行遲率日半度一百二十日必逆行一二舍上極而反東行行日一度半一百二十日入其庳近日曰明星柔高逺日曰大囂徐廣曰一作變剛其始出西行疾率日一度半百二十日上極而行遲日半度百二十日旦入必逆行一二舍而入其庫近日曰太白柔高逺日曰太相剛出以辰戌入以丑未當出不出未當入而入天下偃兵兵在外入未當出而出當入而不入下起兵有破國其當期出也其國昌其出東為東入東為北方出西為西入西為南方所居久其鄉利疾蘇林曰疾過其鄉凶出西逆行至東正西國吉出東至西正東國吉其出不經天經天天下革政小以角動兵起始出大後小兵弱出小後大兵强出髙用兵深吉淺凶庳淺吉深凶日方南金居其南日方北金居其北曰贏侯王不寧用兵進吉退凶日方南金居其北日方北金居其南曰縮侯王有憂用兵退吉進凶用兵象太白太白行疾疾行遲遲行角敢戰動搖躁躁圜以靜靜順角所指吉反之皆凶出則出兵入則入兵赤角有戰白角有喪黑圜角憂有水事青圜小角憂有木事黃圜和角有土事有年其已出三日而復有微入入三日乃復盛出是謂耎晉灼曰耎退之不進其下國有軍敗將北其已入三日又復微出出三日而復盛入其下國有憂師有糧食兵革遺人用之卒雖衆將為人虜其出西失行外國敗其出東失行中國敗其色大圜黃􅗍音澤可為好事其圜大赤兵盛不戰太白白比狼赤比心黃比參左肩蒼比參右肩黑比奎大星五星皆從太白而聚乎一舍其下之國可以兵從天下居實有得也居虛無得也行勝色晉灼曰太白行得度勝者色也色勝位有位勝無位有色勝無色行得盡勝之晉灼曰行應天度唯有色得位行盡勝之行重而色位輕星經得字作德出而留桑榆間晉灼曰行遲而下也正出舉目平正出桑榆而上者餘二千里疾其下國上而疾未盡其曰過參矣晉灼曰三分天過之其一此在戌酉之間疾其對國孟康曰謂出東入西出西入東上復下下復上有反將其入月將僇金木星合光其下戰不合兵雖起而不鬭合相毁野有破軍出西方昏而出隂隂兵强暮食出小弱夜半出中弱雞鳴出大弱是謂隂陷於陽其在東方乘明而出陽陽兵之强雞鳴出小弱夜半出中弱昏出大弱是謂陽陷于隂太白伏也以出兵兵有殃其出卯南南勝北方出卯北北勝南方正在卯東國利出酉北北勝南方出酉南南勝北方正在酉西國勝其與列星相犯小戰五星大戰其相犯太白出其南南國敗出其北北國敗行疾武不行文色白五芒出早為月蝕晚為天矢及彗星將發其國出東為德舉事左之迎之吉出西為刑舉事右之背之吉反之皆凶太白光見景戰勝晝見而經天是謂爭明强國弱小國强女主昌亢為疏廟太白廟也太白大臣也其號上公其他名殷星太正營星觀星宫星明星大衰大澤終星大相天浩序星月緯大司馬位謹候此察日辰之㑹以治辰星之位曰北方水太隂之精主冬曰壬癸刑失者罰出辰星以其宿命國是正四時仲春春分夕出郊奎婁胃東五舍為齊仲夏夏至夕出郊東井輿鬼柳東七舍為楚仲秋秋分夕出郊角亢氐房東四舍為漢仲冬冬至晨出郊東方與尾箕斗牽牛俱西為中國其出入常以辰戌丑未其蚤為月蝕孟康曰辰星月相凌不見者則所蝕也晚為彗星張晏曰彗所以除舊布新及天矢其時宜效不效為失追兵在外不戰一時不出其時不和四時不出天下大飢其當效而出也色白為旱黃為五穀熟赤為兵黑為水出東方大而白有兵于外解常在東方其赤中國勝其西而赤外國利無兵於外而赤兵起其與太白俱出東方皆赤而角外國大敗中國勝其與太白俱出西方皆赤而角外國利五星分天之中積於東方中國利積於西方外國用者利五星皆從辰星而聚於一舍其所舍之國可以法致天下辰星不出太白為客其出太白為主出而與太白不相從野雖有軍不戰出東方太白出西方若出西方太白出東方為格野雖有兵不戰失其時而出為當寒反溫當溫反寒當出不出是謂繫卒兵大起其入太白中而上出破軍殺將客軍勝下出客亡地辰星來抵太白太白不去將死正旗上出破軍殺將客勝下出客亡地視旗所指以命破軍其繞環太白若與鬭大戰客勝免過太白間可㨔劒蘇林曰㨔音函函容也其間可容一劒小戰客勝免居太白前軍罷出太白左小戰摩太白右數萬人戰主人吏死出太白右去三尺軍急約戰青角兵憂黑角水赤行窮兵之所終免七命曰小正辰星天欃安周星細爽能星鈎星其色黃而小出而易處天下之文變而不善矣免五色青圜憂白圜喪赤圜中不平黑圜吉赤角犯我城黃角地之爭白角號泣之聲其出東方行四舍四十八日其數二十日而反入於東方其出西方行四舍四十八日其數二十日而反入於西方其一候之營室角畢箕柳出房心間地動辰星之色春青黃夏赤白秋青白而歲熟冬黃而不明即變其色其時不昌春不見大風秋則不實夏不見有六十日之旱月蝕秋不見有兵春則不生冬不見隂雨六十日有流邑夏則不長角亢氐兗州房心豫州尾箕幽州斗江湖牽牛婺女揚州虛危青州營室至東壁并州奎婁胃徐州昴畢冀州觜觹參益州東井輿鬼雍州柳七星張三河翼軫荆州七星為員官辰星廟蠻夷星也兩軍相當曰暈如淳曰暈讀曰運暈等力鈞厚長大有勝薄短小無勝重抱大破無抱為和背不和為分離相去直為自立立侯王指暈若曰殺將負且戴有喜圍在中中勝在外外勝青外赤中以和相去赤外青中以惡相去氣暈先至而後去居軍勝先至先去前利後病後至後去前病後利後至先去前後皆病居暈不勝見而去其發疾雖勝無功見半日以上功太白虹屈短李奇曰屈或為尾也韋昭曰短而直上下兌有者下大流血日暈制勝近期三十日逺期六十日其食食所不利復生生所利而食益盡為主位以其直及日所宿加以日時用命其國也月行中道安寧和平隂閒多水隂事外北三尺隂星北三尺太隂大水兵陽間驕恣陽星多暴獄太陽太旱星也角天門十月為四月十一月為五月十二月為六月水發近三尺逺五尺犯四輔輔臣誅行南北河以隂陽言旱水兵喪月蝕嵗星其宿地饑若亡熒惑也亂填星也下犯上太白也强國以戰敗辰星也女亂食大角徐廣曰一云食於大角主命者惡之心則為內賊亂也列星其宿地憂月食始日五月者六六月者五五月復六六月者一而五月者凡五百一十三月而復始故月蝕常也日蝕為不臧也甲乙四海之外日月不占晉灼曰海外逺甲乙日時不以占候丙丁江淮海岱也戊巳中州河濟也庚辛華山以西壬癸恆山以北日蝕國君月蝕將相當之國皇星犬而赤孟康曰嵗星之精散所為也五星之精散為六十四變記不盡狀類南極徐廣曰老人星也所出其下起兵嶽强其衝不利昭明星大而白無角乍上乍下孟康曰形如三足機機上有九彗上向熒惑之精所出國起兵多變五殘星出正東東方之野其星狀類辰星去地可六丈大徐廣曰一作六賊星孟康曰形如彗九尺太白之精出正南南方之野星去地可六丈大而赤數動有光司危星孟康曰星大而有尾兩角熒惑之精也出正西西方之野星去地可六丈大而白類太白獄漢星孟康曰青中赤表下有二彗縱橫亦填星之精漢書天文志獄漢一名咸漢出正北北方之野星去地可六丈大而赤數動察之中青此四野星所出出非其方其下有兵衝不利四填星所出四隅去地可四丈地維咸光亦出四隅去地可三丈若月始出所見下有亂亂者亡有德者昌燭星狀如太白孟康曰星上有三彗上出亦填星之精其出也不行見則滅所燭者城邑亂如星非星如雲非雲命曰歸邪李奇曰邪音蛇孟康曰星有兩赤彗上向上有蓋狀如氣下連星歸邪出必有歸國者星者金之散氣本曰火孟康曰星名星衆國吉少則凶漢者亦金之精氣其本曰水漢星多多水少則旱孟康曰漢河漢也水生於金多少謂漢中星其大經也天鼓有音如雷非雷音在地而下及地其所往者兵發其下天狗狀如大奔星孟康曰星有尾旁有短彗下有如狗形者亦太白之精有聲其下止地類狗所墮及望之如火光炎炎衝天其下圜如數頃田處上兌者則有黃色千里破軍殺將格澤星者如炎火之狀黃白起地而上下大上兌其見也不種而獲不有土功必有大害蚩尤之旗孟康曰熒惑之精也晉灼曰吕氏春秋曰其色黃上白下類彗而後曲象旗見則王者征伐四方旬始出於北斗旁徐廣曰蚩尤也旬一作營狀如雄雞其怒青黑象伏鱉李奇曰怒當作帑晉灼曰帑雌也或曰怒則色青枉矢類大流星蛇行而蒼黑望之如有毛羽然長庚如一匹布著天此星見兵起星墜至地則石也河濟之閒時有墜星天精而見景星孟康曰精明也有赤方氣與青方氣相連赤方中有兩黃星青方中一黃星凡三星合為景星景星者德星也其狀無常常出於有道之國凡望雲氣仰而望之三四百里平望在桑榆上千餘二千里登高而望之下屬地者三千里雲氣有獸居上者勝自華以南氣下黑上赤嵩高三河之郊氣正赤恆山之北氣下黑上青勃碣海岱之閒氣皆黑江淮之間氣皆白徒氣白土功氣黃車氣乍髙乍下往往而聚騎氣卑而布卒氣摶如淳曰摶専也或曰摶徒端反前卑而後高者疾前方而後高兌而卑者郤其氣平者其行徐前高而後卑者不止而反氣相遇者卑勝高兌勝方氣來卑而循車通者車通車轍也避漢武諱故曰通不過三四日去之五六里見氣來高七八尺者不過五六日去之十餘里見氣來高丈餘二丈者不過三四十日去之五六十里見稍雲精白者其將悍其士怯其大根而前絶逺者當戰青白其前低者戰勝其前赤而仰者戰不勝陳雲如立垣杼雲類杼軸雲摶兩端兌杓雲如繩者居前亘天其半半天其蛪者類闕旗故鉤雲句曲諸此雲見以五色合占而澤摶密其見動人及有占兵必起合鬭其直王朔所侯決於日旁日旁雲氣人主象皆如其形以占故北夷之氣如羣畜穹閭南夷之氣類舟船幡旗大水處敗軍場破國之虛下有積錢徐廣曰古作泉字金寶之上皆有氣不可不察海旁蜃氣象樓臺廣野氣成宫闕然雲氣各象其山川人民所積聚故侯息耗者入國邑視封疆田疇之正治如淳曰蔡雍云麻田曰疇城郭室屋門户之潤澤次至車服畜産精華實息者吉虛耗者凶若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂卿雲卿雲見喜氣也若霧非霧衣冠而不濡見則其域被甲而趨天雷電蝦虹辟靂夜明者陽氣之動者也春夏則發秋冬則藏故侯者無不司之天開縣物孟康曰謂天裂而見物象天開示縣象地動坼絶山崩及徙川塞溪垘徐廣曰土雍曰垘音服駰案孟康曰溪谷也垘崩也蘇林曰垘流也水淡澤竭地長見象城郭門閭閨臬枯槀宫廟邸第人民所次謡俗車服觀民飲食五穀草木觀其所屬倉府廄庫四通之路六畜禽獸所産去就魚鱉鳥鼠觀其所處鬼哭若呼其人逢俉俉迎也伯莊曰音五故反化言誠然凡候嵗美惡謹候嵗始嵗始或冬至日産氣始萌臘明日人衆卒嵗一會飲食發陽氣故曰初嵗正月旦王者嵗首立春日四時之卒始也四始者候之日而漢魏鮮孟康曰人姓名作占候者集臘明正月旦決八風風從南方來大旱西南小旱西方有兵西北戎菽為孟康曰戎菽胡豆也為成也小雨徐廣曰一無此上兩字趣兵北方為中歲東北為上嵗韋昭曰嵗大穰東方大水東南民有疾疫嵗惡故八風各與其衝對課多者為勝多勝少久勝亟疾勝徐旦至食為麥食至日昳為稷昳至餔為黍餔至下餔為菽下餔至日入為麻欲終日有雨有雲有風有日日當其時者深而多實無雲有風日當其時淺而多實有雲風無日當其時深而少實有日無雲不風當其時者稼有敗如食頃小敗熟五斗米頃大敗則風復起有雲其稼復起各以其時用雲色占種其所宜其雨雪若寒嵗惡是日光明聽都邑人民之聲聲宫則歲善吉商則有兵徵旱羽水角歲惡或從正月旦比數雨率日食一升至七升而極孟康曰月一日雨民有一升之食二日雨民有二升之食如此至七日過之不占數至十二日日直其月占水旱孟康曰月一日兩正月水為其環城千里內占則其為天下候竟正月孟康曰月三十日周天厯二十八宿然後可占天下月所離列宿日風雲占其國然必察太嵗所在在金穰水毁木饑火旱此其大經也正月上甲風從東方宜蠶風從西方若旦黃雲惡冬至短極縣土炭孟康曰冬至先三日縣土炭於衡兩端輕重適均冬至日陽氣至則炭重夏至日隂氣至則土重晉灼曰蔡雍律厯記候鍾律權土炭冬至陽氣應黃鍾通土炭輕而衡仰夏至隂氣應蕤賔通土炭重而衡低進退先後五日之中炭動鹿角解蘭根出泉水躍略以知日至要決晷景嵗星所在五穀逢昌其對為衝嵗乃有殃太史公曰自初生民以來世主曷嘗不厯日月星辰及至五家三代紹而明之內冠帶外夷狄分中國為十有二州仰則觀象於天俯則法類於地天則有日月地則有隂陽天有五星地有五行天則有列宿地則有州域三光者隂陽之精氣本在地而聖人統理之幽厲以往尚矣所見天變皆國殊窟穴家占物怪以合時應其文圖籍禨祥不法是以孔子論六經記異而說不書至天道命不𫝊𫝊其人不待告告非其人雖言不著昔之𫝊天數者高辛之前重黎於唐虞羲和有夏昆吾殷商巫咸周室史佚萇𢎞於宋子韋鄭則裨竈在齊甘公徐廣曰或曰甘公名德也本是魯人楚唐昧趙尹皋魏石申夫天運三十嵗一小變百年中變五百載大變三大變一紀三紀而大備此其大數也為國者必貴三五上下各千嵗然後天人之際續備太史公推古天變未有可考於今者蓋略以春秋二百四十二年之閒日蝕三十六彗星三變宋襄公時星隕如雨天子微諸侯力政徐廣曰一作征五伯代興更為主命自是之後衆暴寡大并小秦楚吳越夷狄也為彊伯田氏篡齊三家分晉竝為戰國爭於攻取兵革更起城邑數屠因以饑饉疾疫焦苦臣主共憂患其察禨祥候星氣尤急近世十二諸侯七國相王言從衡者繼踵而臯唐甘石因時務論其書傳故其占驗凌雜米鹽二十八舍主十二州斗秉兼之所從來久矣秦之彊也候在太白占於狼弧吳楚之疆候在熒惑占於鳥衡燕齊之疆候在辰星占於虛危宋鄭之疆候在歲星占於房心晉之疆亦候在辰星占於參罰及秦并吞三晉燕代自河山以南者中國中國於四海內則在東南為陽陽則日嵗星熒惑填星占於街南畢主之其西北則胡狢月氏諸衣旃裘引弓之民為隂隂則月太白辰星占於街北昴主之故中國山川東北流其維首在隴蜀尾沒於勃碣是以秦晉好用兵韋昭曰秦晉西南維之北為隂猶與胡狢引弓之民同故好用兵復占太白太白主中國而胡狢數侵掠獨占辰星辰星出入躁疾常主夷狄其大經也此更為客主人熒惑為勃外則理兵內則理政故曰雖有明天子必視熒惑所在諸侯更强時菑異記無可録者秦始皇之時十五年彗星四見久者八十日長或竟天其後秦遂以兵滅六王并中國外攘四夷死人亂如麻因以張楚並起三十年之間兵相駘藉蘇林曰駘音臺登躡也不可勝數自蚩尤以來未嘗若斯也羽羽救巨鹿枉矢西流山東遂合從諸侯西坑秦人誅屠咸陽漢之興五星聚於東井平城之圍月暈參畢七重諸吕作亂日蝕晝晦吳楚七國叛逆彗星數丈天狗過梁野及兵起遂伏尸流血其下元光元狩蚩尤之旗再見長則半天其後京師師四出誅夷狄者數十年而伐胡尤甚越之亡熒惑守斗朝鮮之拔星茀於河戒兵征大宛星茀招搖此其犖犖大者若至委曲小變不可勝道由是觀之未有不先形見而應隨之者也夫自漢之為天數者星則唐都氣則王朔占嵗則魏鮮故甘石厯五星法唯獨熒惑有反逆行逆行所守及他星逆行日月薄蝕孟康曰日月無光曰薄京房易傳曰日赤黃為薄或曰不交而蝕曰薄韋昭曰氣往迫之為薄虧損為蝕皆以為占余觀史記考行事百行之中五星無出而不反逆行反逆行嘗盛大而變色日月薄蝕行南北有時此其大度也故紫宫房心權衡咸池虛危列宿部星此天之五官坐位也為經不移徙大小有差濶狹有常孟康曰濶狹若三台星相去逺近水火金木填星徐廣曰木火土三星若合是謂驚立絶行此五星者天之五佐為經緯見伏有時所過行贏縮有度日變修德月變省刑星變結和凡天變過度乃占國君彊大有德者昌弱小飾詐者亡大上修德其次修政其次修救次修穰正下無之夫常星之變希見而三光之占亟用日月暈適徐廣曰適者災變咎徵也李斐曰適見災於天劉向以為日月食及星逆行非太平之常自周衰以來人事亂故天文應之遂變耳駰案孟康曰暈日旁氣也適日之將食先有黑氣之變雲風此天之客氣其變見亦有大運然其與政事俯仰最近大人之符此五者天之感動為天數者必通三五終始古今深觀時變察其精粗則天官備矣蒼帝行德天門為之開赤帝行德天牢為之空黃帝行德天夭為之起風從西北來必以庚辛一秋中五至大赦三至小赦白帝行德以正月二十日二十一日月暈圍常大赦載謂有太陽也一曰白帝行德畢昴為之圍圍三暮德乃成不三暮及圍不合德不成二曰以辰圍不出其旬黑帝行德天關為之動天行德天子更立年不德風雨破石三能三衡者天廷也客星出天廷有奇令史記集解卷二十七
