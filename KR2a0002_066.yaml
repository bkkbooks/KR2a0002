body:
  text: 史記集解卷六十八宋裴駰撰史記六十八商君列傳第八商君者衛之諸庶孽公子也名鞅姓公孫氏其祖本姬姓也鞅少好刑名之學事魏相公叔痤為中庶子公叔痤知其賢未及進㑹痤病魏惠王親往問病曰公叔病有如不可諱將奈社稷何公叔曰痤之中庶子公孫鞅年雖少有竒才願王舉國而聽之王默然王且去痤屏人言曰王即不聽用鞅必殺之無令出境王許諾而去公叔痤召鞅謝曰今者王問可以為相者我言若王色不許我我方先君後臣因謂王即弗用鞅當殺之王許我汝可疾去矣且見禽鞅曰彼王不能用君之言任臣又安能用君之言殺臣乎卒不去惠王既去而謂左右曰公叔病甚悲乎欲令寡人以國聽公孫鞅也豈不悖哉公叔既死公孫鞅聞秦孝公下令國中求賢者將修繆公之業東復侵地乃遂西入秦因孝公寵臣景監以求見孝公孝公既見衛鞅語事良久孝公時時睡弗聽罷而孝公怒景監曰子之客妄人耳安足用邪景監以讓衛鞅衛鞅曰吾說公以帝道其志不開悟矣後五日復求見鞅鞅復見孝公益愈然而未中旨罷而孝公復讓景監景監亦讓鞅鞅曰吾說公以王道而未入也請復見鞅鞅復見孝公孝公善之而未用也罷而去孝公謂景監曰汝客善可與語矣鞅曰吾說公以霸道其意欲用之矣誠復見我我知之矣衛鞅復見孝公公與語不自知䣛之前于席也語數日不厭景監曰子何以中吾君吾君之歡甚也鞅曰吾說君以帝王之道比三代而君曰久逺吾不能待且賢君者各及其身顯名天下安能邑邑待數十百年以成帝王乎故吾以強國之術說君君大說之耳然亦難以比德于殷周矣孝公既用衛鞅鞅欲變法恐天子議已衛鞅曰疑行無名疑事無功且夫有髙人之行者固見非于世有獨知之慮者必見敖于民愚者暗干成事知者見于未萌民不可與慮始而可與樂成論至德者不和于俗成大功者不謀于衆是以聖人茍可以强國不法其故茍可以利民不循其禮孝公曰善甘龍曰不然聖人不易民而教知者不變法而治因民而教不勞而成功緣法而治者吏習而民安之衛鞅曰龍之所言世俗之言也常人安于故俗學者溺于所聞以此兩者居官守法可也非所與論于法之外也三代不同禮而王五霸不同法而霸智者作法愚者制焉賢者更禮不肖者拘焉杜摰曰利不百不變法功不十不易器法古無過循禮無邪衛鞅曰治世不一道便國不法古故湯武不循古而王夏殷不易禮而亡反古者不可非而循禮者不足多孝公曰善以衛鞅為左庶長卒定變法之令令民為什伍而相收司連坐不告姦者腰斬告姦者與斬敵首同賞匿姦者與降敵同罰民有二男以上不分異者倍其賦有軍功者各以率音律受上爵為私鬭者各以輕重被刑大小僇力本業耕織致粟帛多者復其身事末利及怠而貧者舉以為收孥宗室非有軍功論不得為屬籍明尊卑爵秩等級各以差次名田宅臣妾衣服以家次有功者顯榮無功者雖富無所芬華令既具未布恐民之不信已乃立三丈之木于國都市南門募民有能徙置北門者豫十金民怪之莫敢徙復曰能徙者豫五十金有一人徙之輒豫五十金以明不欺卒下令令行于民朞年秦民之國都言初令之不便者以千數于是太子犯法衛鞅曰法之不行自上犯之將法太子太子君嗣也不可施刑刑其傳公子虔黥其師公孫賈明日秦人皆趨令行之十年秦民大說道不拾遺山無盜賊家給人足民勇于公戰怯于私鬭鄉邑大治秦民初言令不便者有來言令便者衛鞅曰此皆亂化之民也盡遷之于邊城其後民莫敢議令于是以鞅為大良造將兵圍魏安邑降之居三年作為築冀闕宫庭于咸陽秦自雍徙都之而令民父子兄弟同室內息者為禁而集小都鄉邑聚為縣置令丞凡三十一縣為田開阡陌封疆而賦稅平平斗桶鄭𤣥曰音勇今之斛也權衡丈行之四年公子虔復犯約劓之居五年秦人富彊天子致胙于孝公諸侯畢賀其明年齊敗魏兵于馬陵虜其太子申殺將軍龎涓其明年衛鞅說孝公曰秦之與魏譬若人之有腹心疾非魏并秦秦即并魏何者魏居嶺厄之西都安邑與秦界河而獨擅山東之利利則西侵秦病則東收地今以君之賢聖國賴以盛而魏往年大破于齊諸侯畔之可因此時伐魏魏不支秦必東徙東徙秦據河山之固東鄉以制諸侯此帝王之業也孝公以為然使衛鞅將而伐魏魏使公子卬將而擊之軍既相距衛鞅遺魏將公子卬書曰吾始與公子歡今俱為兩國將不忍相攻可與公子面相見盟樂飲而罷兵以安秦魏魏公子卬以為然㑹盟已飲而衛鞅伏甲士而襲虜魏公子卬因攻其軍盡破之以歸秦魏惠王兵數破于齊秦國內空日以削恐乃使使割河西之地獻于秦以和而魏遂去安邑徙都大梁梁惠王曰寡人恨不用公叔痤之言也衛鞅既破魏還秦封之于商徐廣曰𢎞農商縣也十五邑號為商君商君相秦十年宗室貴戚多怨望者趙良見商君商君曰鞅之得見也從孟蘭皋今鞅請得交可乎趙良曰僕弗敢願也孔丘有言曰推賢而戴者進聚不肖而王者退僕不肖故不敢受命僕聞之曰非其位而居之曰貪位非其名而有之曰貪名僕聽君之義則恐僕貪位貪名也故不敢聞命商君曰子不說吾治秦與趙良曰反聽之謂聰內視之謂明自勝之謂彊虞舜有言曰自卑也尚矣君不若道虞舜之道無為問僕矣商君曰始秦戎翟之教父子無别同室而居今我更制其教而為其男女之别大築冀闕營如魯衛矣子觀我治秦也孰與五羖大夫賢趙良曰千羊之皮不如一狐之掖千人之諾諾不如一士之諤諤武王諤諤以昌殷紂墨墨以亡君若不非武王乎則僕請終日正言而無誅可乎商君曰語有之矣貌言華也至言實也苦言藥也甘言疾也夫子果肯終日正言鞅之藥也鞅將事子子又何辭焉趙良曰夫五羖大夫荆之鄙人也聞秦繆公之賢而願望見行而無資自粥于秦客被褐食牛期年繆公知之舉之牛口之下而加之百姓之上秦國莫敢望焉相秦六七年而東伐鄭三置晉國之君一救荆國之禍發教封內而巴人致貢施德諸侯而八戎來服由余聞之欵關請見韋昭曰欵叩也五羖大夫之相秦也勞不坐乘暑不張蓋行于國中不從車乘不操干戈功名藏于府庫德行施于後世五羖大夫死秦國男女流涕童子不歌謡舂者不相杵鄭𤣥曰相謂送杵聲以聲音自勸也此五羖大夫之德也今君之見秦王也因嬖人景監以為主非所以為名也相秦不以百姓為事而大築冀闕非所以為功也刑黥太子之師傳殘傷民以駿刑是積怨畜禍也教之化民也深于命民之效上也捷于令今君又左建外易非所以為教也君又南面也而稱寡人日繩秦之貴公子詩曰相鼠有體人而無禮人而無禮何不遄死以詩觀之非所以為夀也公子虔杜門不出已八年矣君又殺祝歡而黥公孫賈詩曰得人者興失人者崩此數事者非所以得人也君之出也後車十數從車載甲多力而駢脅者為驂乘持矛而操闟所及反㦸者徐廣曰一作尞屈盧之徑矛干將之雄㦸旁車而趨此一物不具君固不出書曰恃德者昌恃力者亡君之危若朝露尚將欲延年益夀乎則何不歸十五都灌園于鄙勸秦王顯巖穴之士養老存孤敬父兄序有功尊有德可以少安君尚將貪商于之富寵秦國之教畜百姓之怨秦王一旦捐賔客而不立朝秦國之所以收君者豈其微哉亡可翹足而待商君弗從後五月而秦孝公卒太子立公子虔之徒告商君欲反發吏捕商君商君亡至關下欲舍客舍客人不知其是商君也曰商君之法舍人無驗者坐之商君喟然歎曰嗟乎為法之敝一至此哉去之魏魏人怨其欺公子卬而破魏師弗受商君欲之他國魏人曰商君秦之賊秦彊而賊入魏弗歸不可遂內秦商君既復入秦走商邑與其徒屬發邑兵出擊鄭徐廣曰京兆鄭縣也秦發兵攻商君殺之于鄭黽池徐廣曰黽或作彭秦惠王裂商君以狥曰莫如商鞅反者遂滅商君之家太史公曰商君其天資刻薄人也跡其欲干孝公以帝王術挾持浮說非其質矣且所因由嬖臣及得用刑公子虔欺魏將卬不師趙良之言亦足發明商君之少恩矣余嘗讀商君開塞耕戰書與其人行事相類卒受惡名于秦有以也夫新序論曰秦孝公保崤函之固以廣雍州之地東并河西北收上郡國富兵强長雄諸侯周室歸籍四方來賀為戰國霸君秦遂以强六世而并諸侯亦皆商君之謀也夫商君極身無二慮盡公不顧私使民內急耕織之業以富國外重戰伐之賞以勸戎士發令必行內不阿貴寵外不偏疏逺是以令行而禁止法出而姦息故雖書云無偏無黨詩云周道如砥其直如矢司馬法之勵戎士周后稷之勸農業無以易此此所以并諸侯也故孫卿曰四世有勝非幸也數也然無信諸侯畏而不親夫霸君若齊桓晉文者桓不倍柯之盟文不負原之期而諸侯畏其强而親信之存亡繼絶四方歸之此管仲舅犯之謀也今商君倍公子卬之舊恩棄交魏之明信詐取三軍之衆故諸侯畏其强而不親信也籍使孝公遇齊桓晉文得諸侯之統將合諸侯之君驅天下之兵以伐秦秦則亡矣天下無桓文之君故秦得以兼諸侯衛鞅始自以為知霸王之德原其事不喻也昔周召施善政及其死也後世思之蔽芾甘棠之詩是也嘗舍于樹下後世思其德不忍伐其樹况害其身乎管仲奪伯氏邑三百戶無怨言今衛鞅內刻刀鋸之刑外深鈇鉞之誅步過六尺者有罰棄灰于道者被刑一日臨渭而論囚七百餘人渭水盡赤號哭之聲動于天地畜怨積仇比于邱山所逃莫之隱所歸莫之容身死車裂滅族無姓其去霸王之佐亦逺矣然惠王殺之亦非也可輔而用也使衛鞅施寬平之法加之以恩申之以信庶幾霸者之佐哉史記集解卷六十八
