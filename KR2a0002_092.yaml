body:
  text: 史記集解卷九十四宋裴駰撰史記九十四田儋列傳第三十四田儋者狄人也徐廣曰今樂安臨濟縣也故齊王田氏族也儋從弟田榮榮弟田横皆豪宗彊能得人陳涉之初起王楚也使周市略定魏地北至狄狄城守田儋詳為縛其奴從少年之廷欲謁殺奴服䖍曰古殺奴婢皆當告官儋欲殺令故詐縛奴而以謁也見狄令因擊殺令而召豪吏子弟曰諸侯皆反秦自立齊古之建國儋田氏當王遂自立為齊王徐廣曰二世元年九月也發兵以擊周市周市軍還去田儋因率兵東略定齊地秦將章邯圍魏王咎於臨濟急魏王請救於齊齊王田儋將兵救魏徐廣曰二年六月章邯夜銜枚擊大破齊楚軍殺田儋於臨濟下儋弟田榮收儋餘兵東走東阿齊人聞王田儋死迺立故齊王建之弟田假為齊王田角為相田間為將以距諸侯田榮之走東阿章邯追圍之項梁聞田榮之急迺引兵擊破章邯軍東阿下章邯走而西項梁因追之而田榮怒齊之立假迺引兵歸擊逐齊王假假亡走楚齊相角亡走趙角弟田間前求救趙因留不敢歸田榮迺立田儋子市為齊王徐廣曰二年八月榮相之田横為將平齊地項梁旣追章邯章邯兵益盛項梁使使告趙齊發兵共擊章邯田榮曰使楚殺田假趙殺田角田間迺肯出兵楚懷王曰田假與國之王窮而歸我殺之不義趙亦不殺田角田間以市於齊齊曰蝮螫手則斬手螫足則斬足何者為害於身也應劭曰蝮一名虺螫人手足則割去其肉不然則致死今田假田角田間於楚趙非直手足戚也文潁曰言將亡身非手足憂也瓉曰於楚趙非手足之親何故不殺且秦復得志於天下則齮齕用事者墳墓矣如淳曰齮齕猶齚齧楚趙不聽齊亦怒終不肯出兵章邯果敗殺項梁破楚兵楚兵東走而章邯渡河圍趙於鉅鹿項羽徃救趙由此怨田榮項羽旣存趙降章邯等西屠咸陽滅秦而立侯王也迺徙齊王田市更王膠東治即墨齊將田都從共救趙因入闗故立都為齊王治臨淄故齊王建孫田安項羽方渡河救趙田安下濟北數城引兵降項羽項羽立田安為濟北王治博陽田榮以負項梁不肯出兵助楚趙攻秦故不得王趙將陳餘亦失職不得王二人俱怨項王項王旣歸諸侯各就國田榮使人將兵助陳餘令反趙地而榮亦發兵以距擊田都田都亡走楚田榮留齊王市無令之膠東市之左右曰項王彊㬥而王當之膠東不就國必危市懼迺亡就國田榮怒追擊殺齊王市於卽墨還攻殺濟北王安於是田榮迺自立為齊王盡并三齊之地項王聞之大怒迺北伐齊齊王田榮兵敗走平原徐廣曰三年正月平原人殺榮項王遂燒夷齊城郭所過者盡屠之徐廣曰立故王田假也齊人相聚畔之榮弟横收齊散兵得數萬人反擊項羽於城陽徐廣曰假走楚楚殺之而漢王率諸侯敗楚入彭城項羽聞之迺釋齊而歸擊漢於彭城因連與漢戰相距滎陽以故田横復得收齊城邑徐廣曰四月立田榮子廣為齊王而横相之專國政政無巨細皆斷於相横定齊三年漢王使酈生往說下齊王廣及其相國横横以為然解其歴下軍漢將韓信引兵且東擊齊齊初使華無傷田解軍於歴下以距漢漢使至迺罷守戰備縱酒且遣使與漢平漢將韓信已平趙燕用蒯通計度平原襲破齊歴下軍因入臨淄齊王廣相横怒以酈生賣已而烹酈生齊王廣東走高密徐廣曰高一作假相横走博陽守相田光走城陽將軍田旣軍於膠東楚使龍且救齊齊王與合軍高密漢將韓信與曹參破殺龍且徐廣曰四年十一月虜齊王廣漢將灌嬰追得齊守相田光至博陽而横聞齊王死自立為齊王還擊嬰嬰敗横之軍於嬴下晉灼曰泰山嬴縣也田横亡走梁歸彭越彭越是時居梁地中立且為漢且為楚韓信已殺龍且因令曹參進兵破殺田旣於膠東使灌嬰破殺齊將田吸於千乗韓信遂平齊乞自立為齊假王徐廣曰二月也漢因而立之後嵗餘漢滅項籍漢王立為皇帝以彭越為梁王田横懼誅而與其徒屬五百餘人入海居島中韋昭曰海中山曰島高帝聞之以為田横兄弟本定齊齊人賢者多附焉今在海中不收後恐為亂迺使使赦田横罪而召之田横因謝曰臣亨陛下之使酈生今聞其弟酈商為漢將而賢臣恐懼不敢奉詔請為庻人守海島中使還報高皇帝迺詔衛尉酈商曰齊王田横即至人馬從者敢動搖者致族夷迺復使使持節具告以詔商状曰田横來大者王小者迺侯耳不來且舉兵加誅焉田横迺與其客二人乘傳詣雒陽如淳曰四馬下足為乘傳未至三十里至尸鄉廏置應劭曰尸鄉在偃師瓉曰廏置置馬以傳驛也横謝使者曰人臣見天子當洗沐止畱謂其客曰横始與漢王俱南面稱孤今漢王為天子而横迺為亡虜而北面事之其恥固已甚矣且吾亨人之兄與其弟併肩而事其主縱彼畏天子之詔不敢動我我獨不媿於心乎且陛下所以欲見我者不過欲一見我面貌耳今陛下在洛陽今斬吾頭馳三十里間形容尚未能敗猶可觀也遂自剄令客奉其頭從使者馳奏之高帝高帝曰嗟乎有以也夫起自布衣兄弟三人更王豈不賢乎哉為之流涕而拜其二客為都尉發卒二千人以王者禮塟田横旣塟二客穿其冢旁孔皆自剄下從之高帝聞之迺大驚以田横之客皆賢吾聞其餘尚五百人在海中使使召之至則聞田横死亦皆自殺於是乃知田横兄弟能得士也太史公曰甚矣蒯通之謀亂齊驕淮隂其卒亡此兩人韓信田横蒯通者善為長短説論戰國之權變為八十一首漢書曰號為雋永永一作求通善齊人安期生安期生嘗干項羽項羽不能用其筴已而項羽欲封此兩人兩人終不肯受亡去田横之高節賓客慕義而從横死豈非至賢余因而列焉無不善畫者莫能圖何哉史記集解卷九十四
