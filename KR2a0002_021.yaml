body:
  text: 史記集解卷二十三宋裴駰撰史記二十三禮書第一太史公曰洋洋美德乎宰制萬物役使羣衆豈人力也哉余至大行禮官觀三代損益乃知緣人情而制禮依人性而作儀其所由來尚矣人道經緯萬端規矩無所不貫誘進以仁義束縛以刑罰故德厚者位尊祿重者寵榮所以總一海內而整齊萬民也人體安駕乘為之金輿錯衡以繁其飾周禮王之五路有金路鄭𤣥曰以金飾諸木目好五色為之黼黻文章以表其能耳樂鐘磬為之調諧八音以蕩其心口甘五味為之庶羞酸醎以致其美周禮曰羞用百有二十品鄭𤣥曰羞出于牲及禽獸以備其滋味謂之庶羞鄭衆曰羞者進也情好珍善為之琢磨圭璧以通其意故大路越席服䖍曰大路祀天車也越席結括草以為席也王肅曰不緣也皮辨布裳周禮曰王視朝則皮辨之服鄭𤣥曰皮辨之服十五升白布衣積素為裳也朱絃洞越鄭𤣥曰朱絃練朱絲絃也越瑟底孔大羮𤣥酒鄭𤣥曰大羮肉湆不調以鹽菜也𤣥酒水也所以防其淫侈救其雕敝是以君臣朝廷尊卑貴賤之序下及黎庶車輿衣服宫室飲食嫁娶喪祭之分事有宜適物有節文仲尼曰禘自既灌而往者吾不欲觀之矣孔安國曰禘祫之禮為序昭穆也故毁廟之主及羣廟之主皆合食於太祖灌者酌鬱鬯灌於太祖以降神也既灌之後列尊卑序昭穆而魯逆祀躋僖公亂昭穆故不欲觀之周衰禮廢樂壞大小相踰管仲之家兼備三歸包氏曰三歸娶三姓女也婦人謂嫁曰歸循法守正者見侮於世奢溢僭差者謂之顯榮自子夏門人之髙弟也猶云出見紛華盛麗而說入聞夫子之道而樂二者心戰未能自決而况中庸以下漸漬於失教被服於成俗乎孔子曰必也正名於衛所居不合論語曰子路曰衛君待子而為政子將奚先子曰必也正名乎馬融曰正百事之名仲尼沒後受業之徒沉湮而不舉或適齊楚或入河海豈不痛哉至秦有天下悉內六國禮儀采擇其善雖不合聖制其尊君抑臣朝廷濟濟依古以來至於髙祖光有四海叔孫通頗有所增益減損大抵皆襲秦故應劭曰抵至也瓚曰抵歸也自天子稱號下至佐僚及宫室官名少所變改孝文即位有司議欲定儀禮孝文好道家之學以為繁禮飾貌無益於治躬化謂何耳故罷去之孝景時御史大夫鼂錯明於世務刑名數干諌孝景曰諸侯藩輔臣子一例古今之制也今大國専治異政不稟京師恐不可傳後孝景用其計而六國畔逆以錯首名天子誅錯以解難事在袁盎語中是後官者養交安祿而已莫敢復議今上即位招致儒術之士令共定儀十餘年不就或言古者太平萬民和喜瑞應辨至乃采風俗定制作上聞之制詔御史曰蓋受命而王各有所由興殊路而同歸謂因民而作追俗為制也議者咸稱太古百姓何望漢亦一家之事典法不傳謂子孫何化隆者閎博治淺者褊狹可不勉與乃以太初之元改正朔應劭曰初用夏正以正月為嵗首改年為太初易服色封太山定宗廟百官之儀以為典常垂之於後云禮由人起人生有欲欲而不得則不能無忿忿而無度量則爭爭則亂先王惡其亂故制禮義以分之養人之欲給人之求使欲不窮於物物不屈於欲二者相待而長是禮之所起也故禮者養也稻粱五味所以養口也椒蘭芬茝所以養鼻也鐘鼓管弦所以養耳也刻鏤文章所以養目也疏房牀笫几席所以養體也服䖍曰簀謂之笫故禮者養也君子既得其養又好其辨也所謂辨者貴賤有等長少有差貧富輕重皆有稱也故天子大路越席所以養體也側載臭茝所以養鼻也前有錯衡所以養目也詩云約軧錯衡毛傳云錯衡文衡也和鸞之聲鄭𤣥云和鸞皆鈴也所以為車行節也韓詩內傳曰鸞在衡和在軾前升車則馬動馬動則鸞鳴鸞鳴則和應服䖍曰鸞在鑣和在衡續漢書輿服志曰鸞雀立衡也步中武象驟中韶濩所以養耳也鄭𤣥曰武武王樂也象武舞也韶舜樂也濩湯樂也龍旗九斿所以養信也周禮曰交龍為旗寢兕持虎鮫韅徐廣曰鮫魚皮可以飾服器音交韅者當馬腋之革音呼見反彌龍徐廣曰乘輿車金薄璆龍為輿倚較文虎伏軾龍首衡軛所以養威也故大路之馬必信至教順然後乘之所以養安也孰知夫士出死要節之所以養生也孰知夫輕費用之所以養財也孰知夫恭敬辭讓之所以養安也孰知夫禮義文理之所以養情也人苟生之為見若者必死苟利之為見若者必害怠惰之為安若者必危情勝之為安若者必滅故聖人一之於禮義則兩得之矣一之於性情則兩失之矣故儒者將使人兩得之者也墨者將使人兩失之者也是儒墨之分治辨之極也彊國之本也威行之道也功名之總也王公由之所以一天下臣諸侯也弗由之所以捐社稷也故堅革利兵不足以為勝高城深池不足以為固嚴令繁刑不足以為威由其道則行不由其道則廢楚人鮫革犀兕所以為甲堅如金石宛之巨鐵徐廣曰大剛曰巨施鑽如蜂蠆輕利剽遫卒如熛風然而兵殆於垂涉唐昧死焉許慎曰垂涉地名也莊蹻起楚分而為四參是豈無堅革利兵哉其所以統之者非其道故也汝潁以為險江漢以為池阻之以鄧林緣之以方城山海經曰夸父與日逐走日入渴欲得飲飲於渭河不足北飲大澤未至道渴而死棄其杖化為鄧林駰謂鄧林後遂為林名然而秦師至鄢郢舉若振槁是豈無固塞險阻哉其所以統之者非其道故也紂剖比干囚箕子為炮烙刑殺無辜時臣下懍然莫必其命然而周師至而令不行乎下不能用其民是豈令不嚴刑不峻哉其所以統之者非其道故也古者之兵戈矛弓矢而已然而敵國不待試而詘徐廣曰試一作誡也城郭不集溝池不掘固塞不𣗳機變不張然而國晏然不畏外而固者無他故焉明道而均分之時使而誠愛之則下應之如景響有不由命者然後俟之以刑則民知罪矣故刑一人而天下服罪人不尤其上知􅓧之在已也是故刑罰省而威行如流無他故焉由其道故也故由其道則行不由其道則廢古者帝堯之治天下也蓋殺一人刑二人而天下治傳曰威厲而不試刑錯而不用天地者生之本也先祖者類之本也君師者治之本也無天地惡生無先祖惡出無君師惡治三者偏亡則無安人故禮上事天下事地尊先祖而隆君師是禮之三本也故王者天太祖毛詩叙曰文武之功起於后稷故推以配天焉諸侯不敢懷大夫士有常宗禮記曰别子為祖繼别為宗百世不遷者謂别子之後也所以辨貴賤貴賤治得之本也郊疇乎天子社至乎諸侯函音含及士大夫所以辨尊者事尊卑者宜卑宜巨者巨宜小者小故有天下者事七世有一國者事五世有五乘之地者事三世鄭𤣥曰古者方十里其中六十四井出兵車一乘此兵法之賦有三乘之地者事二世榖梁傳曰天子至於士皆有廟天子七諸侯五大夫三士二始封之者必為其太祖有特牲而食者不得立宗廟禮記曰庶人祭於寢所以辨積厚者流澤廣積薄者流澤狹也大饗上𤣥尊俎上腥魚鄭𤣥曰大饗祫祭先王以腥魚為俎實不臑孰之也先大羮貴食飲之本也大饗上𤣥尊而用薄酒食先黍稷而飯稻粱祭嚌先大羮鄭𤣥曰嚌至齒而飽庶羞貴本而親用也貴本之謂文親用之謂理兩者合而成文以歸太一是謂大隆故尊之上𤣥尊也俎之上腥魚也豆之上大羮一也利爵弗啐也鄭𤣥曰啐入口也成事俎弗嘗也三宥之弗食也大昏之未廢齊也大廟之未內尸也始絶之未小斂一也大路之素幬也禮記曰乘素車貴其質也鄭𤣥曰素車殷輅也郊之麻冕周禮曰王祀昊天上帝服大裘而冕論語曰麻冕禮也孔安國曰冕緇布冠古者積麻三十升布以為之喪服之先散麻一也儀禮士喪禮曰始死主人散帶垂之三尺禮記曰大功以上散帶也三年哭之不反也禮記曰斬衰之哭若往而不反清廟之歌鄭𤣥曰清廟謂作樂歌清廟一倡而三歎鄭𤣥曰倡發歌句者三歎三人從歎縣一鐘尚拊膈徐廣曰一作摶膈朱絃而通越一也凡禮始乎脫成乎文終乎稅徐廣曰一作悅故至備情文俱盡徐廣曰古情字或假借作請諸子中多有此比其次情文代勝其下復情以歸太一天地以合日月以明四時以序星辰以行江河以流萬物以昌好惡以節喜怒以當以為下則順以為上則明太史公曰至矣哉立隆以為極而天下莫之能益損也本末相順終始相應至文有以辨至察有以說天下從之者治不從者亂從之者安不從者危小人不能則也禮之貌誠深矣堅白同異之察入焉而弱其貌誠大矣擅作典制褊陋之說入焉而嗛其貌誠高矣暴慢恣雎輕俗以為高之屬入焉而墜故繩誠陳鄭𤣥曰誠猶審也陳設也謂彈畫也則不可欺以曲直衡誠縣鄭𤣥曰衡稱也縣謂錘也則不可欺以輕重規矩誠錯則不可欺以方員君子審禮則不可欺以詐僞故繩者直之至也衡者平之至也規矩者方員之至也禮者人道之極也然而不法禮者不足禮謂之無方之民鄭𤣥曰方猶道也法禮足禮謂之有方之士禮之中能思索謂之能慮能慮勿易謂之能固能慮能固加好之焉聖矣天者高之極也地者下之極也日月者明之極也無窮者廣大之極也聖人者道之極也以財物為用以貴賤為文以多少為異以隆殺為要文貌繁情欲省禮之隆也文貌省情欲繁禮之殺也文貌情欲相為內外表裏並行而雜禮之中流也君子上致其隆下盡其殺而中處其中步驟馳騁廣騖不外是以君子之性守宫庭也人域是域士君子也外是民也於是中焉房皇周浹曲直得其次序聖人也故厚者禮之積也大者禮之廣也高者禮之隆也明者禮之盡也史記集解卷二十三
