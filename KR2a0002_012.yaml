body:
  text: 史記集解卷十二宋裴駰撰史記十二孝武本紀第十二太史公自序曰作今上本紀又其述事皆云今上今天子或有言孝武帝者悉後人所定也張晏曰武紀褚先生補作也褚先生名少孫漢博士也孝武皇帝者漢書音義曰諱徹孝景中子也母曰王太后孝景四年以皇子為膠東王孝景七年栗太子廢為臨江王以膠東王為太子孝景十六年崩太子即位為孝武皇帝張晏曰武帝以景帝元年生七歲為太子為太子十歲而景帝崩時年十六矣孝武皇帝初即位尤敬鬼神之祀元年漢興已六十餘歲矣徐廣曰六十七年歲在辛丑天下乂安薦紳之屬皆望天子封禪改正度也而上鄉儒術招賢良趙綰王臧等以文學為公卿欲議古立明堂城南以朝諸侯草巡狩封禪改厯服色事未就會竇太后治黃老言不好儒術使人微得趙綰等姦利事徐廣曰纎微伺察之召案綰臧綰臧自殺諸所興為者皆廢後六年竇太后崩其明年上徵文學之士公孫宏等明年上初至雍郊見五畤後常三歲一郊是時上求神君舍之上林中蹄氏觀徐廣曰蹄音啼神君者長陵女子以子死悲哀故見神於先後宛若孟康曰産乳而死兄弟妻相謂先後宛若字宛若祠之其室民多往祠平原君往祠徐廣曰武帝外祖母也駰案蔡雍曰異姓婦人以恩澤封者為君儀比長公主其後子孫以尊顯及武帝即位則厚禮置祠之內中聞其言不見其人云是時而李少君亦以祠竈穀道卻老方見上李竒曰食穀道引或曰辟穀不食之道上尊之少君者故深澤侯徐廣曰姓趙景帝時絶封入以主方徐廣曰進納於天子而主方一云侯人主方駰案如淳曰侯家人主方藥者也匿其年及所生長常自謂七十能使物卻老如淳曰物鬼物也瓚曰物藥物也其遊以方遍諸侯無妻子人聞其能使物及不死更饋遺之常餘金錢帛衣食人皆以為不治産業而饒給又不知其何所人愈信爭事之少君資好方善為巧發竒中如淳曰時時發言冇所中也嘗從武安侯飲坐中有年九十餘老人少君乃言與其大父遊射處老人為兒時從其大父行識其處一坐盡驚少君見上上有故銅器問少君少君曰此器齊桓公十年陳於柏寢服虔曰地名有臺也瓚曰晏子書柏寢臺名也已而案其刻果齊桓公器一宫盡駭以少君為神數百歲人也數君言於上曰祠竈則致物而丹砂可化為黃金黃金成以為飲食器則益夀益夀而海中蓬萊仙者可見見之以封禪則不死黃帝是也臣嘗遊海上見安期生食巨棗大如瓜安期生仙者通蓬萊中合則見人不合則隱於是天子始親祠竈而遣方士入海求蓬萊安期生之屬而事化丹砂諸藥齊為黃金矣居久之李少君病死天子以為化去不死也而使黃錘韋昭曰人姓名史寬舒受其方漢書音義曰二人皆方士求蓬萊安期生莫能得而海上燕齊怪迂之方士多相效更言神事矣亳人薄誘忌徐廣曰一云亳人謬忌也奏祠泰一方曰天神貴者泰一泰一佐曰五帝古者天子以春秋祭泰一東南郊用太牢具七日徐廣曰一云日一太牢具十日為壇開八通之鬼道於是天子令太祝立其祠長安東南郊常奉祠如忌方其後人有上書言古者天子三年一用太牢具祠神三一天一地一泰一天子許之令太祝領祠之於忌泰一壇上如其方後人復有上書言古者天子常以春秋解祠祠黃帝用一梟破鏡孟康曰梟鳥名食母破鏡獸名食父黃帝欲絶其類使百物祠皆用之破鏡如貙而虎眼或云直用破鏡如淳曰漢使東郡送梟五月五日為梟羮以賜百官以惡鳥故食之𡨕羊用羊祠服虔曰神名也馬行用一青牡馬泰一皋山山君地長用牛武夷君用乾魚陰陽使者以一牛漢書音義曰陰陽之神也令祠官領之如其方而祠於忌泰一壇旁其後天子苑有白鹿以其皮為幣以發瑞應造白金焉其明年郊雍獲一角獸若麃然韋昭曰楚人謂麋為麃有司曰陛下肅祇郊祀上帝報享錫一角獸蓋麟云於是以薦五畤畤加一牛以燎賜諸侯白金以風符應合於天地晉灼曰符瑞也瓚曰風示諸侯以此符瑞之應於是濟北王以為天子且封禪乃上書獻泰山及其旁邑天子受之更以他縣償之常山王有罪遷天子封其弟於真定以續先王祀而以常山為郡然後五嶽皆在天子之郡其明年齊人少翁以鬼神方見上上有所幸王夫人徐廣曰齊懷王閎之母也駰案桓談新論云武帝有所愛幸姬王夫人窈窕好容質性嬛佞夫人卒少翁以方術蓋夜致王夫人及竈鬼之貌云天子自帷中望見焉於是乃拜少翁為文成將軍賞賜甚多以客禮禮之文成言曰上即欲與神通宫室被服不象神神物不至乃作畫雲氣車及各以勝日漢書音義曰如火勝金用丙與丁日不用庚辛駕車辟惡鬼又作甘泉宫中為臺室畫天地泰一諸神而置祭具以致天神居歲餘其方益衰神不至乃為帛書以飯牛詳弗知也言此牛腹中有竒殺而視之得書書言甚怪天子疑之有識其手書問之人果偽書於是誅文成將軍而隱之其後則又作柏梁銅柱承露仙人掌之屬矣蘇林曰仙人以手掌擎盤承甘露也文成死明年天子病鼎湖甚晉灼曰在湖縣韋昭曰地名近宜春巫醫無所不致至不愈遊水發根服虔曰遊水縣名發根人名姓晉灼曰地理志遊水水名在臨淮浦也乃言曰上郡有巫病而鬼下之上召置祠之甘泉及病使人問神君韋昭曰即病巫之神神君言曰天子母憂病病少愈強與我會甘泉於是病愈遂幸甘泉病良已孟康曰良已蓋已愈也大赦天下置夀宫神君服虔曰立此便宫也瓚曰宫奉神之宮也楚辭曰蹇將淡兮夀宫神君最貴者大夫其佐曰大禁司命之屬皆從之非可得見聞其音與人言等時去時來來則風肅然也居室帷中時晝言然常以夜天子祓然後入漢書音義曰崇潔自祓除然後入因巫為主人關飲食所欲者言行下李竒曰神所欲言上輒為下之又置夀宫北宫張羽旗設供具以禮神君神君所言上使人受書其言命之曰書法漢書音義曰或云䇿書之法也其所語世俗之所知也毋絶殊者而天子獨喜其事祕世莫知也其後三年有司言元宜以天瑞命不宜以一二數蘇林曰得諸瑞以名年一元曰建元二元以長星曰元光三元以郊得一角獸曰元狩云徐廣曰案諸紀元光後有元朔元朔後得元狩其明年冬天子郊雍議曰今上帝朕親郊而后土毋祀則禮不答也有司與太史公韋昭曰説者以談為太史公失之矣史記稱遷為太史公者是外孫楊輝所稱祠官寬舒等議天地牲角繭栗今陛下親祀后土后土宜於澤中圜丘為五壇壇一黃犢太牢具已祠盡瘞而從祠衣上黃於是天子遂東始立后土祠汾陰脽上徐廣曰元鼎四年時也駰案蘇林曰脽音誰如淳曰河之東岸特堆堀長四五里廣二里餘髙十餘丈汾隂縣在脽之上后土祠在縣西汾在脽之北西流與河合也如寬舒等議上親望拜如上帝禮禮畢天子遂至滎陽而還過雒陽下詔曰三代邈絶逺矣難存其以三十里地封周後為周子南君以奉先王祀焉是歲天子始巡郡縣侵尋於泰山矣晉灼曰遂往之意也其春樂成侯徐廣曰姓丁名義後與欒大俱誅也上書言欒大欒大膠東宫人服虔曰王家人故嘗與文成將軍同師已而為膠東王尚方而樂成侯姊為康王后孟康曰膠東王后也毋子康王死他姬子立為王而康后有淫行與王不相中得相危以法康后聞文成已死而欲自媚於上乃遣欒大因樂成侯求見言方天子既誅文成後悔恨其早死惜其方不盡及見欒大大悅大為人長美言多方略而敢為大言處之不疑大言曰臣嘗往來海中安期羡門之屬顧以為臣賤不信臣又以為康王諸侯耳不足豫方臣數言康王康王又不用臣臣之師曰黃金可成而河決可塞不死之藥可得仙人可致也臣恐效文成則方士皆掩口惡敢言方哉上曰文成食馬肝死耳子誠能修其方我何愛乎大曰臣師非有求人人主求之陛下必欲致之則貴其使者令有親屬以客禮待之勿卑使各佩其信印乃可使通言於神人神人尚肯邪不邪致尊其使然後可致也於是上使先驗小方鬬旗旗自相觸擊是時上方憂河決而黃金不就乃拜大為五利將軍居月餘得四金印佩天士將軍地士將軍大通將軍天道將軍印制詔御史昔禹疏九江決四瀆問者河溢皋陸隄繇不息朕臨天下二十有八年天若遺朕士而大通焉韋昭曰言欒大能通天意故封樂通乾稱蜚龍鴻漸于般漢書音義曰般水涯堆也漸進也武帝云得欒大如鴻進于般一舉千里得道若飛龍在天意庶幾與焉其以二千户封地士將軍大為樂通侯韋昭曰樂通臨淮髙平也賜列侯甲第漢書音義曰有甲乙第次故曰第僮千人乘輿斥車馬漢書音義曰或云斥不用也韋昭曰嘗在服御帷帳器物以充其家又以衛長公主妻之孟康曰衛太子妹如淳曰衛太子姊也蔡雍曰帝女曰公主公主儀比諸侯姊妹曰長公主儀比諸侯王駰案此帝女也而云長公主未詳齎金萬斤更名其邑曰當利公主地理志云東萊冇當利縣天子親如五利之第使者存問所給連屬於道自大主徐廣曰武帝姑也駰案韋昭曰竇太后之女也將相以下皆置酒其家獻遺之於是天子又刻玉印曰天道將軍使使衣羽衣夜立白茅上五利將軍亦衣羽衣立白茅上受印以示弗臣也而佩天道者且為天子道天神也於是五利常夜祠其家欲以下神神未至而百鬼集矣然頗能使之其後治裝行東入海求其師云大見數月佩六印貴振天下而海上燕齊之間莫不扼腕服虔曰滿手曰扼瓚曰扼執持也而自言有禁方能神仙矣其夏六月中汾陰巫錦應劭曰錦巫名為民祠魏脽后土營旁應劭曰魏故魏國也脽若丘之類見地如鉤狀掊視得鼎鼎大異於衆鼎文鏤無欵識韋昭曰欵刻也怪之言吏吏告河東太守勝勝以聞天子使使驗問巫錦得鼎無姦詐乃以禮祠迎鼎至甘泉從行上薦之如淳曰以鼎從行上至甘泉將薦之於天也至中山徐廣曰河渠書鑿涇水自中山西晏溫如淳曰三輔謂日出清濟晏晏而溫也有黃雲蓋焉有麃過上自射之因以祭云至長安徐廣曰上言從行薦之或曰祭鼎也公卿大夫皆議請尊寶鼎天子曰間者河溢歲數不登故巡祭后土祈為百姓育穀今年豐廡未有報鼎曷為出哉有司皆曰聞昔太帝興神鼎一一者統天地萬物所繫終也黃帝作寶鼎三象天地人也禹收九牧之金鑄九鼎皆嘗鬺烹徐廣曰烹煮也鬺音觴皆嘗以烹牲牢而祭祀也上帝鬼神服虔曰以祭祀上帝或曰嘗烹酌也遭聖則興遷於夏商周德衰宋之社亡鼎乃淪伏而不見頌云自堂徂基自羊徂牛鼐鼎及鼒韋昭曰爾雅曰鼎絶大謂之鼐圜奄上謂之鼒不虞不驁胡考之休今鼎至甘泉光潤龍變承休無疆合兹中山有黃白雲降韋昭日與中山所見黃雲之氣合也蓋若獸為符服虔曰雲若獸在車蓋也晉灼曰蓋辭也或云符謂瑞應也路弓乘矢韋昭曰路大也四矢為乘集獲壇下報祠大饗徐廣曰一云大報饗祠也惟受命而帝者心知其意服虔曰髙祖受命知之也宜見鼎於其廟而合德焉鼎宜見於祖禰藏於帝廷以合明應制曰可入海求蓬萊者言蓬萊不遠而不能至者殆不見其氣上乃遣望氣佐侯其氣云其秋上幸雍且郊或曰五帝泰一之佐也宜立泰一而上親郊之上疑未定齊人公孫卿曰今年得寶鼎其冬辛巳朔旦冬至與黃帝時等卿冇札書曰黃帝得寶鼎宛侯問於鬼臾區漢書音義曰區黃帝時人區對曰黃帝得寶鼎神策是歲己酉朔旦冬至得天之紀終而復始於是黃帝迎日推策後率二十歲得朔旦冬至凡二十推三百八十年黃帝仙登於天卿因所忠欲奏之所忠視其書不經疑其妄書謝曰寶鼎事已決矣尚何以為卿因嬖人奏之上大説召問卿對曰受此書申功封禪書功字作公申功已死上曰申功何人也卿曰申功齊人也與安期生通受黃帝言無書獨有此鼎書曰漢興復當黃帝之時漢之聖者在髙祖之孫且曾孫也寶鼎出而與神通封禪封禪七十二王唯黃帝得上泰山封申功曰漢主亦當上封上封則能仙登天矣黃帝時萬諸侯而神靈之封居七千應劭曰黃帝時諸侯會封禪者七千人李竒曰説仙道得封者七千國張晏曰神靈之封謂山川之守天下名山八而三在蠻夷五在中國中國華山首山太室泰山東萊此五山黃帝之所常遊與神會黃帝且戰且學仙患百姓非其道乃斷斬非鬼神者百餘歲然後得與神通黃帝郊雍上帝宿三月鬼臾區號大鴻死葬雍故鴻冢是也蘇林曰今雍有鴻冢其後黃帝接萬靈明廷明廷者甘泉也所謂寒徐廣曰一作塞門者谷口也漢書音義曰黃帝仙於寒門也黃帝采首山銅鑄鼎於荆山下晉灼曰地理志首山屬河東蒲阪荆山在馮翊懷德縣鼎既成有龍垂胡􅐖下迎黃帝黃帝上騎羣臣後宫從上龍七十餘人龍乃上去餘小臣不得上乃悉持龍􅐖拔墮黃帝之弓百姓仰望黃帝既上天乃抱其弓與龍胡髯號故後世因名其處曰鼎湖其弓曰烏號於是天子曰嗟乎吾誠得如黃帝吾視去妻子如脫屣耳乃拜卿為郎東使候神於太室上遂郊雍至隴西西登空桐幸甘泉令祠官寬舒等具泰一祠壇壇放薄忌泰一壇壇三垓徐廣曰垓次也駰案李竒曰垓重也三重壇也五帝壇環居其下各如其方黃帝西南除八通鬼道服虔曰坤位在未黃帝從土位泰一所用如雍一畤物而加醴棗酺之屬殺一犛牛以為俎豆牢具而五帝獨有俎豆韋昭曰無犛牛醴之屬醴進其下四方地為餟食羣神從者及北斗云已祠胙餘皆燎之其牛色白鹿居其中彘在鹿中水而洎之徐廣曰洎音居器反肉汁也駰案晉灼曰此説合牲物燎之也祭日以牛祭月以羊彘特泰一祝宰則衣紫及繡五帝各如其色日赤月白十一月辛巳朔旦冬至昧爽天子始郊拜泰一朝朝日夕夕月應劭曰天子春朝日秋夕月拜日東門之外朝日以朝夕月以夕瓚曰漢儀郊泰一時皇帝平旦出行宮東向揖日其夕西向揖月便用郊日不用春秋也則揖而見泰一如雍禮其贊饗曰天始以寶鼎神策授皇帝朔而又朔終而復始皇帝敬拜見焉而衣上黃其祠列火滿壇旁壇旁烹炊具有司云祠上有光焉公卿言皇帝始郊見泰一雲陽有司奉瑄玉孟康曰璧大六寸謂之瑄嘉牲薦饗是夜有美光及晝黃氣上屬天太史公祠官寬舒等曰神靈之休祐福兆祥宜因此地光域徐廣曰地一作夜立泰畤壇以明應令太祝領祀及臘間祠三歲天子一郊見其秋為伐南越告禱泰一以牡徐廣曰一作牝荆畫幡如淳曰荆之無子者皆以潔齋之道也晉灼曰牡荆節間不相當者韋昭曰以牡荆為柄者也日月北斗登龍以象天一三星為泰一鋒徐廣曰天官書曰天極星明者泰一常居也斗口三星曰天一駰案晉灼曰晝一星在後三星在前為太一鋒也名曰靈旗為兵禱則太史奉以指所伐國而五利將軍使不敢入海之泰山祠上使人微隨驗實無所見五利妄言見其師其方盡多不讎上乃誅五利其冬公孫卿候神河南見仙人迹緱氏城上有物若雉往來城上天子親幸緱氏城視迹問卿得毋效文成五利乎卿曰仙者非有求人主人主求之其道非少寬假神不來言神事事如迂誕積以歲乃可致於是郡國各除道繕治宫觀名山神祠所以望幸矣其年既滅南越上有嬖臣李延年以好音見上善之下公卿議曰民間祠尚有鼓舞之樂今郊祀而無樂豈稱乎公卿曰古者祀天地皆有樂而神祗可得而禮或曰泰帝使素女鼓五十弦瑟悲帝禁不止故破其瑟為二十五弦於是塞南越禱祠泰一后土始用樂舞益召歌兒作二十五弦徐廣曰瑟也及箜篌瑟自此起徐廣曰應劭云武帝令樂人侯調始造箜篌其來年冬上議曰古者先振兵澤旅徐廣曰古釋字作澤然後封禪乃遂北巡朔方勒兵十餘萬還祭黃帝冢橋山澤兵須如李竒口地名也上曰吾聞黃帝不死今有冢何也或對曰黃帝已仙上天羣臣葬其衣冠既至甘泉為且用事泰山先類祠泰一自得寶鼎上與公卿諸生議封禪封禪用希曠絶莫知其儀禮而羣臣采封禪尚書周官王制之望祀射牛事蘇林曰當祭廟射其牲以除不祥瓚曰射牛示親殺也齊人丁公年九十餘曰封者合不死之名也秦皇帝不得上封陛下必欲上稍上即無風雨遂上封矣上於是乃令諸儒習射牛草封禪儀數年至且行天子既聞公孫卿及方士之言黃帝以上封禪皆致怪物與神通欲放黃帝以嘗接神仙人蓬萊士髙世此德於九皇張晏曰三皇之前有人皇九首韋昭曰上古人皇者九人也而頗采儒術以文之羣儒既以不能辨明封禪事又牽拘於詩書古文而不敢騁上為封祠器示羣儒羣儒或曰不與古同徐偃又曰太常諸生行禮不如魯善周霸屬圖封事服虔曰屬會也會諸儒圖封事於是上絀偃霸盡罷諸儒弗用三月遂東幸緱氏禮登中嶽文頴曰嵩髙山也在潁川陽城縣太室韋昭曰嵩髙山有太室少室之山山有石室故以名之從官在山下聞若有言萬歲云問上上不言問下下不言於是以三百户封太室奉祠命曰崇髙邑東上泰山山之草木葉未生乃令人上石立之泰山巔上遂東巡海上行禮祠八神文穎曰武帝登奉山祭太一并祭名山於泰壇西南開除八通鬼道故言八神也一曰八方之神齊人之上疏言神怪竒方者以萬數然無驗者乃益發船令言海中神山者數千人求蓬萊神人公孫卿持節常先行候名山至東萊言夜見一人長數丈就之則不見見其迹甚大類禽獸云羣臣有言見一老父牽狗言吾欲見巨公漢書音義曰巨公謂武帝已忽不見上既見大迹未信及羣臣有言老父則大以為仙人也宿留海上與方士傳車及間使求仙人以千數四月還至奉髙上念諸儒及方士言封禪人人殊不經難施行天子至梁父禮祠地主乙卯令侍中儒者皮辨薦紳射牛行事封泰山下東方如郊祠泰一之禮封廣丈二尺髙九尺其下則有玉牒書書祕禮畢天子獨與侍中奉車子侯漢書百官表曰奉車都尉掌乘輿車武帝初置韋昭曰子侯霍去病之子也上泰山亦有封其事皆禁明日下陰道丙辰禪泰山下址東北肅然山如祭后土禮天子皆親拜見衣上黃而盡用樂焉江淮間一茅三脊孟康曰所謂靈茅也為神籍五色土益雜封縱逺方竒獸蜚禽及白雉諸物頗以加祠兕旄牛犀象之屬弗用皆至泰山然後去封禪祠其夜若有光晝有白雲起封中天子從封禪還坐明堂漢書音義曰天子初封泰山山東北址古時有明堂處則此所坐者明年秋乃作明堂羣臣更上夀於是制詔御史朕以眇眇之身承至尊競競焉懼弗任維德菲薄不明於禮樂修祀太一若有象景光屑如有望瓚曰聞呼萬歲者三依依震於怪物欲止不敢遂登封泰山至於梁父而后禪肅然服虔曰肅然山名在梁父自新嘉與士大夫更始賜民百户牛一酒十石加年八十孤寡布帛二匹復博奉髙蛇丘鄭玄曰蛇音移厯城毋出今年租稅大赦天下如乙卯赦令行所過毋有復作事在二年前皆勿聽治又下詔曰古者天子五載一巡狩用事泰山諸侯有朝宿地其令諸侯各治邸泰山下天子既已封禪泰山既無風雨葘而方士更言蓬萊諸神山若將可得於是上欣然庶幾遇之乃復東至海上望冀遇蓬萊焉奉車子侯暴病一日死上乃遂去並海上北至碣石巡自遼西厯北邊至九原五月返至甘泉漢書音義曰周萬八千里也有司言寶鼎出為元鼎以今年為元封元年其秋有星茀於東井韋昭曰秦分野也後衛太子兵亂後十餘日有星茀於三能韋昭曰三能三公後連坐誅之望氣王朔言候獨見其星出如瓠食頃復入焉有司言曰陛下建漢家封禪天其報德星云其來年冬郊雍五帝還拜祝祠泰一贊饗曰德星昭衍厥維休祥夀星仍出淵耀光明信星昭見皇帝敬拜泰徐廣曰一無此字祝之饗其春公孫卿言見神人東萊山若云見天子天子於是幸緱氏城拜卿為中大夫遂至東萊宿留之數日毋所見見大人迹復遣方士求神怪采芝藥以千數是歲旱於是天子既出毋名乃禱萬里沙應劭曰萬里沙神祠也在東萊曲城孟康曰沙徑三百餘里過祠泰山鄧展曰泰山自東復有小泰山瓚曰即今之泰山還至瓠子服虔曰瓠子隄名蘇林曰在甄城以南濮陽以北廣百步深五丈許瓚曰所決河名自臨塞決河留二日沈祠而去使二卿將卒塞決河河徙二渠復禹之故迹焉是時既滅南越越人勇之韋昭曰越地人名也乃言越人俗信鬼而其祠皆見鬼數有效昔東甌王敬鬼夀至百六十歲後世謾怠故衰耗乃令越巫立越祝祠安臺無壇亦祠天神上帝百鬼而以雞卜漢書音義曰持雞用卜如鼠卜上信之越祠雞卜始用焉公孫卿曰仙人可見而上往常遽以故不見今陛下可為觀如緱氏城韋昭曰如猶比也置脯棗神人宜可致且仙人好樓居於是上令長安則作飛廉桂觀應劭曰飛廉神禽能致風氣晉灼曰身如鹿頭如雀冇角而蛇尾文如豹文也甘泉則作益延夀觀使卿持節設具而候神人乃作通天臺徐廣曰在甘泉置祠具其下將招來神仙之屬於是甘泉更置前殿始廣諸宫室夏有芝生殿防內中徐廣曰元封二年也天子為塞河興通天臺若有光云李竒曰為此作事而有光應瓚曰作通天臺也乃下詔曰甘泉防生芝九莖應劭曰芝芝草也其葉相連如淳曰瑞應圖云王者敬事耆老不失故舊則芝草生赦天下毋有復作其明年伐朝鮮夏旱公孫卿曰黃帝時封則天旱乾封三年上乃下詔曰天旱意乾封乎蘇林曰天旱欲使封土乾燥如淳曰但祭不立尸為乾封其令天下尊祠靈星焉其明年上郊雍通回中道巡之徐廣曰在扶風汧縣春至鳴澤服虔曰鳴澤澤名也在涿郡道縣北界從西河歸其明年冬上巡南郡徐廣曰元封五年至江陵而東登禮潛之天柱山號曰南嶽應劭曰潛縣屬廬江南嶽霍山也文穎曰天柱山在潛縣南有祠浮江自尋陽出樅陽地理志廬江有樅陽縣過彭蠡祀其名山川北至琅邪並海上四月中至奉髙修封焉初天子封泰山泰山東北址古時有明堂處處險不敞上欲治明堂奉髙旁未曉其制度濟南人公玉帶上黃帝時明堂圖明堂圖中有一殿四面無壁以茅蓋通水圜宫垣為復道上有樓從西南入命曰昆侖天子從之入以拜祠上帝焉於是上令奉髙作明堂汶上徐廣曰在元封二年秋如帶圖及五年修封則祠泰一五帝於明堂上坐令髙皇帝祠坐對之祠后土於下房以二十太牢天子從崑崙道入始拜明堂如郊禮禮畢燎堂下而上又上泰山有祕祠其顛而泰山下祠五帝各如其方黃帝并赤帝而有司侍祠焉泰山上舉火下悉應之其後二歲十一月甲子朔旦冬至推厯者以本統天子親至泰山以十一月甲子朔旦冬至日祠上帝明堂徐廣曰常五年一修耳今適二年故但祀明堂每修封禪其贊饗曰天增授皇帝泰元神策周而復始皇帝敬拜泰一東至海上考入海及方士求神者莫驗然益遣冀遇之十一月乙酉徐廣曰二十二日也柏梁災十二月甲午朔上親禪髙里伏儼曰山名在泰山下祠后土臨渤海將以望祠蓬萊之屬冀至殊庭焉漢書音義曰蓬萊庭上還以柏梁災故朝受計甘泉公孫卿曰黃帝就青靈臺十二日燒徐廣曰日一作月黃帝乃治明庭明庭甘泉也方士多言古帝王有都甘泉者其後天子又朝諸侯甘泉甘泉作諸侯邸勇之乃曰越俗有火災復起屋必以大用勝服之於是作建章宫度為千門萬户前殿度髙未央其東則鳯闕髙二十餘丈其西則唐中數十里虎圈其北治大池漸臺髙二十餘丈名曰泰液池中有蓬萊方丈瀛洲壺梁象海中神山龜魚之屬其南有玉堂璧門大鳥之屬乃立神明臺井幹樓度五十餘丈輦道相屬焉夏漢改厯以正月為歲首而色尚黃官名徐廣曰一無名字更印章以五字張晏曰漢據土德土數五故用五為印文也若丞相曰丞相之印章諸卿及守相印文不足五字者以之足也因為太初元年是歲西伐大宛蝗大起丁夫人韋昭曰丁姓夫人名也雒陽虞初等以方祠詛胸奴大宛焉其明年有司言雍五畤無牢熟具芬芳不備乃命祠官進畤犢牢具五色食所勝孟康曰若火勝金則祠赤帝以白牡而以木耦馬代駒焉獨五帝用駒行親郊用駒及諸名山川用駒者悉以木耦馬代行過乃用駒他禮如故其明年東巡海上考神仙之屬未有驗者方士有言黃帝時為五城十二樓應劭曰崑崙縣圃五城十二樓仙人之所常居也以候神人於執期漢書音義曰執期地名也命曰迎年上許作之如方明年上親禮祠上帝衣上黃焉公玉帶曰黃帝時雖封泰山然風后封巨應劭曰封巨黃帝師岐伯令黃帝封東泰山禪凡山合符然後不死焉徐廣曰在琅邪朱虛縣汶水所出凡山亦在朱虛天子既令設祠具至東泰山東泰山卑小不稱其聲乃令祠官禮之而不封禪焉其後令帶奉祠候神物夏遂還泰山修五年之禮如前而加禪祠石閭石閭者在泰山下址南方方士多言此仙人之閭也故上親禪焉其後五年復至泰山修封徐廣曰天漢三年李陵以天漢二年敗也還過祭常山今天子所興祠泰一后土三年親郊祠建漢家封禪五年一修封薄忌泰一及三一冥羊馬行赤星五寬舒之祠官李竒曰祀名也以歲時致禮凡六祠皆太祝領之至如八神諸神明年凡山他名祠行過則祀去則已方士所興祠各自主其人終則已祠官弗主他祠皆如其故今上封禪其後十二歲而還遍於五嶽四瀆矣而方士之候祠神人入海求蓬萊終無有驗而公孫卿之候神者猶以大人迹為解無其效天子益怠厭方士之怪迂語矣然終羈縻弗絶冀過其真自此之後方士言祠神者彌衆然其效可睹矣徐廣曰猶今人云其事已可知矣皆不信之耳又數本皆無可字太史公曰余從巡祭天地諸神名山川而封禪焉入夀官侍祠神語究觀方士祠官之言於是退而論次自古以來用事於鬼神者具見其表裏後有君子得以覽焉至若俎豆圭幣之詳獻酬之禮則有司存焉史記集解卷十二
