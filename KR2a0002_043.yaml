body:
  text: 史記集解卷四十五宋裴駰撰史記四十五韓世家第十五韓之先與周同姓姓姬氏其後苗裔事晉得封於韓原曰韓武子武子後三世有韓厥從封姓為韓氏韓厥晉景公之三年晉司寇屠岸賈將作亂誅靈公之賊趙盾趙盾已死矣欲誅其子趙朔韓厥止賈賈不聽厥告趙朔令亡朔曰子必能不絶趙祀死不恨矣韓厥許之及賈誅趙氏厥稱疾不出程嬰公孫杵臼之藏趙孤趙武也厥知之景公十一年厥與卻克將兵八百乘伐齊敗齊頃公於鞍獲逢丑父於是晉作六卿而韓厥在一卿之位號為獻子晉景公十七年病卜大業之不遂者為祟韓厥稱趙成季之功今後無祀以感景公景公問曰尚有世乎厥於是言趙武而復與故趙氏田邑續趙氏祀晉悼公之十年韓獻子老獻子卒子宣子代宣子徙居州晉平公十四年吳季札使晉曰晉國之政卒歸於韓魏趙矣晉頃公十二年韓宣子與趙魏共分祁氏羊舌氏十縣晉定公十五年宣子與趙簡子侵伐范中行氏宣子卒子貞子代立貞子徙居平陽貞子卒子簡子代徐廣曰史記多無簡子莊子而云貞子生康子班氏亦同簡子卒子莊子代莊子卒子康子代康子與趙襄子魏桓子共敗知伯分其地地益大大於諸侯康子卒子武子代武子二年伐鄭殺其君幽公十六年武子卒子景侯立景侯虔元年取雍丘二年鄭敗我貞黍六年與趙魏俱得列為諸侯九年鄭圍我陽翟景侯卒子列侯取立列侯三年聶政殺韓相俠纍徐廣曰六年救魯也九年秦伐我宜陽取六邑十三年列侯卒子文侯立是歲魏文侯卒文侯二年伐鄭取陽城伐宋到彭城執宋君七年伐齊至桑丘鄭反晉九年伐齊至靈丘十年文侯卒子哀侯立哀侯元年與趙魏分晉國二年滅鄭因徙都鄭六年韓嚴弒其君哀侯而子懿侯立懿侯二年魏敗我馬陵五年與魏惠王會宅陽九年魏敗我澮徐廣曰大雨三月也十二年懿侯卒子昭侯立昭侯元年秦敗我西山二年宋取我黃池徐廣曰在平丘魏取朱六年伐東周取陵觀邢丘八年申不害相韓修術行道國內以治諸侯不來侵伐十年韓姬弒其君悼公十一年昭侯如秦二十二年申不害死二十四年秦來拔我宜陽二十五年旱作髙門屈宜臼許慎曰屈宜臼楚大夫在魏也曰昭侯不出此門何也不時吾所謂時者非時日也人固有利不利時昭侯嘗利矣不作髙門往年秦拔宜陽今年旱昭侯不以此時恤民之急而顧益奢此謂時絀舉嬴徐廣曰時襄耗而作奢侈二十六年髙門成昭侯卒果不出此門子宣惠王立宣惠王五年張儀相秦八年魏敗我將韓舉十一年君號為王與趙會區鼠十四年秦伐敗我鄢徐廣曰潁川鄢陵縣音於乾反十六年秦敗我修魚虜得韓將䱸申差於濁澤徐廣曰一云鯁申差長杜有濁澤韓氏急公仲謂韓王曰與國非可恃也今秦之欲伐楚久矣王不如因張儀為和於秦賂以一名郡具甲與之南伐楚此以一易二之計也韓王曰善乃警公仲之行將西購於秦楚王聞之大恐召陳軫告之陳軫曰秦之欲伐楚久矣今又得韓之名都一而具甲秦韓并兵而伐楚此秦所禱祀而求也今已得之矣楚國必伐矣王聽臣為之警四境之內起師言救韓命戰車滿道路發信臣多其車重其幣使信王之救己也縱韓不能聽我韓必德王也必不為鴈行以來是秦韓不和也兵雖至楚不大病也為能聽我絶和於秦秦必大怒以厚怨韓韓之南交楚必輕秦輕秦其應秦必不敬是因秦韓之兵而免楚國之患也楚王曰善乃警四境之內興師言救韓命戰車滿道路發信臣多其車重其幣謂韓王曰不穀國雖小已悉發之矣願大國遂肆志於秦不穀將以楚徇韓韓王聞之大説乃止公仲之行公仲曰不可夫以實伐我者秦也以虛名救我者楚也王恃楚之虛名而輕絶強秦之敵王必為天下大笑且楚韓非兄弟之國也又非素約而謀伐秦也已有伐因發兵言救韓此必陳軫之謀也且王已使人報於秦矣今不行是欺秦也夫輕欺強秦而信楚之謀臣恐王必悔之韓王不聽遂絶於秦秦因大怒益甲伐韓大戰楚救不至韓十九年大破我岸門徐廣曰潁隂有岸亭太子倉質於秦以和二十一年徐廣曰周王赧之三年也與秦共攻楚徐廣曰圍景痤也敗楚將屈丐斬首八萬於丹陽是歲宣惠王卒太子倉立是為襄王徐廣曰一曰周赧王六年韓襄哀王三年張儀死赧王九年襄哀王六年秦昭王立襄王四年與秦武王會臨晉其秋秦使甘茂攻我宜陽五年秦拔我宜陽斬首六萬秦武王卒六年秦復與我武遂九年秦復取我武遂十年太子嬰朝秦而歸徐廣曰與秦會臨晉因至咸陽而還十一年秦伐我取穰與秦伐楚敗楚將唐昧十二年太子嬰死公子咎公子蟣蝨爭為太子時蟣蝨質於楚蘇代謂韓咎曰蟣蝨亡在楚楚王欲內之甚今楚兵十餘萬在方城之外公何不令楚王築萬室之都雍氏之旁徐廣曰在陽翟韓必起兵以救之公必將矣公因以韓楚之兵奉蟣蝨而內之其聽公必矣必以楚韓封公也韓咎從其計楚圍雍氏徐廣曰秦本紀惠王後元十三年周赧王三年楚懷王十七年齊湣王十二年皆云楚圍雍氏紀年於此亦説楚景翠圍雍氏韓宣王卒秦助韓共敗楚屈丐又云齊宋圍煮棗皆與史記年表及田完世家符同然則此卷所云襄王十二年韓咎從其計以上是楚後圍雍氏赧王之十五年事也又説楚圍雍氏以下是楚前圍雍氏赧王之三年事韓求救於秦秦未為發使公孫昧入韓公仲曰子以秦為且救韓乎對曰秦王之言曰請道南鄭藍田出兵於楚以待公殆不合矣公仲曰子以為果乎對曰秦王必祖張儀之故智徐廣曰祖者宗之習之謂也故智猶前時謀計也楚威王攻梁也張儀謂秦王曰與楚攻魏魏折而入於楚韓固其與國也是秦孤也不如出兵以到之魏楚大戰秦取西河之外以歸今其狀陽言與韓其實隂善楚公待秦而到必輕與楚戰楚隂得秦之不用也必易與公相支也公戰而勝楚遂與公乘楚弛三川而歸公戰不勝楚楚塞三川守之公不能救也竊為公患之司馬庚徐廣曰一作唐三反於郢甘茂與昭魚徐廣曰楚相國遇於商於其言收璽實類有約也公仲恐曰然則奈何曰公必先韓而後秦先身而後張儀公不如亟以國合於齊楚齊楚必委國於公公之所惡者張儀也其實猶不無秦也於是楚解雍氏圍徐廣曰甘茂傳曰楚懷王以兵圍韓雍氏韓使公仲告急於秦秦昭王新立不肯救甘茂為韓言之乃下師於殽以救韓也又云周赧王十五年韓襄王十二年秦擊楚斬首二萬敗楚襄城殺景缺周本紀赧王八年之後云楚圍雍氏此當韓襄王十二年魏哀王十九年紀年於此亦説楚入雍氏楚人敗然爾時張儀已死十年矣蘇代又謂秦太后弟芊戎徐廣曰號新城君曰公叔伯嬰恐秦楚之內蟣蝨也公何不為韓求質於楚楚王聽入質子於韓則公叔伯嬰知秦楚之不以蟣蝨為事必以韓合於秦楚秦楚挾韓以窘魏魏氏不敢合於齊是齊孤也公公又為秦求質子於楚楚不聽怨結於韓韓挾齊魏以圍楚楚必重公公挾秦楚之重以積德於韓公叔伯嬰必以國待公於是蟣蝨竟不得歸韓韓立咎為太子齊魏王來十四年與齊魏王共擊秦至函谷而軍焉十六年秦與我河外及武遂襄王卒太子咎立是為釐王釐王三年使公孫喜率周魏攻秦秦敗我二十四萬虜喜伊闕五年秦拔我宛六年與秦武遂地二百里十年秦敗我師於夏山十二年與秦昭王會西周而佐秦攻齊齊敗湣王出亡十四年與秦會兩周間二十一年使暴鳶救魏為秦所敗鳶走開封二十三年趙魏攻我華陽韓告急於秦秦不救韓相國謂陳筮徐廣曰一作筌曰事急願公雖病為一宿之行陳筮見穰侯穰侯曰事急乎故使公來陳筮曰未急也穰侯怒曰是可以為公之主使乎夫冠蓋相望告敝邑甚急公來言未急何也陳筮曰彼韓急則將變而他從以未急故復來耳穰侯曰公無見王請今發兵救韓八日而至敗趙魏於華陽之下是歲釐王卒子桓惠王立桓惠王元年伐燕九年秦拔我陘城汾旁十年秦擊我於太行我上黨郡守以上黨郡降趙十四年秦拔趙上黨殺馬服子卒四十餘萬於長平十七年秦拔我陽城負黍徐廣曰負黍在陽城二十二年秦昭王卒二十四年秦拔我城皋滎陽二十六年秦悉拔我上黨二十九年秦拔我十三城三十四年桓惠王卒子王安立王安五年秦攻韓韓急使韓非使秦秦留非因殺之九年秦虜王安盡入其地為潁川郡韓遂亡太史公曰韓厥之感晉景公紹趙孤之子武以成程嬰公孫杵臼之義此天下之隂德也韓氏之功於晉未覩其大者也然與趙魏終為諸侯十餘世宜乎哉史記集解卷四十五
