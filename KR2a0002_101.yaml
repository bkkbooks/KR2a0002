body:
  text: 史記集解卷一百三宋裴駰撰史記一百三萬石張叔列傳第四十三萬石君名奮其父趙人也姓石氏趙亡徙居溫髙祖東擊項籍過河內時奮年十五為小吏侍髙祖髙祖與語愛其恭敬問曰若何有對曰奮獨有母不幸失明家貧有姊能鼓琴髙祖曰若能從我乎曰願盡力於是髙祖召其姊為美人以奮為中涓受書謁徙其家長安中戚里以姊為美人故也其官至孝文時積功勞至大中大夫無文學恭謹無與比文帝時東陽矦張相如為太子太傅免選可為傅者皆推奮奮為太子太傅及孝景即位以為九卿迫近憚之張晏曰以其恭敬履度故難之徙奮為諸矦相奮長子建次子甲次子乙徐廣曰一作仁次子慶皆以馴行孝謹徐廣曰馴一作訓官皆至二千石於是景帝曰石君及四子皆二千石人臣尊寵乃集其門號奮為萬石君孝景帝季年萬石君以上大夫祿歸老于家以嵗時為朝臣過宫門闕萬石君必下車趨見路馬必式焉子孫為小吏來歸謁萬石君必朝服見之不名子孫有過失不譙讓為便坐對案不食然后諸子相責因長老肉袒固謝罪改之乃許子孫勝冠者在側雖燕居必冠申申如也僮僕欣欣如也晉灼曰欣許慎曰古欣字韋昭曰聲和貌唯謹上時賜食於家必稽首俯伏而食之如在上前其執喪哀戚甚悼子孫遵教亦如之萬石君家以孝謹聞乎郡國雖齊魯諸儒質行皆自以為不及也建元二年郎中令王臧以文學獲罪皇太后以為儒者文多質少今萬石君家不言而躬行乃以長子建為郎中令少子慶為內史建老白首萬石君尚無恙建為郎中令每五日洗沐歸謁親文頴曰郎五日一下入子舍竊問侍者取親中裙厠牏身自浣滌徐廣曰牏築垣短板也音注厠牏謂厠溷垣墻建隱於其厠洗滌也一讀牏為竇竇音豆言建又自洗蕩厠竇厠竇瀉除穢惡之穴也呂靜曰楲窬褻器也音威豆駰案蘇林曰牏音投賈逵解周官楲虎子也窬行清也孟康曰厠行清窬行中受糞者也東南人謂鑿木空中如曹謂之窬晋灼曰今世謂反閉小袖衫為侯窬厠此最厠近身之衣也復與侍者不敢令萬石君知以為常建為郎中令事有可言屏人恣言極切至庭見如不能言者是以上乃親尊禮之萬石君徙居陵里徐廣曰陵一作鄰內史慶醉歸入外門不下車萬石君聞之不食慶恐肉袒請罪不許舉宗及兄建肉袒萬石君讓曰內史貴人入閭里里中長老皆走匿而內史坐車中自如固當乃謝罷慶慶及諸子弟入里門趨至家萬石君以元朔五年中卒長子郎中令建哭泣哀思扶杖乃能行嵗餘建亦死諸子孫咸孝然建最甚甚於萬石君建為郎中令書奏事事下建讀之曰誤書馬者與尾當五今乃四不足一服䖍曰作馬字下曲而五建時上事書誤作四上譴死矣甚惶恐其為謹慎雖他皆如是萬石君少子慶為太僕御出上問車中幾馬慶以策數馬畢舉手曰六馬慶於諸子中最為簡易矣猶然如此為齊相舉齊國皆慕其家行不言而齊國大治為立石相祠元狩元年上立太子選羣臣可為傅者慶自沛守為太子太傅七嵗遷為御史大夫元鼎五年秋丞相有罪罷趙周坐酎金免制詔御史萬石君先帝尊之子孫孝其以御史大夫慶為丞相封為牧丘矦是時漢方南誅兩越東擊朝鮮北逐胸奴西伐大宛中國多事天子巡狩海內修上古神祠封禪興禮樂公家用少桑𢎞羊等致利王溫舒之屬峻法兒寬等推文學至九卿更進用事事不關決於丞相丞相醇謹而已在位九嵗無能有所匡言嘗欲請治上近臣所忠九卿減宣罪服䖍曰音減損之減不能服反受其過贖罪元封四年中關東流民二百萬口無名數者四十萬公卿議欲請徙流民於邉以適之上以為丞相老謹不能與其議乃賜丞相告歸而案御史大夫以下議為請者丞相慙不任職乃上書曰慶幸得待罪丞相罷駑無以輔治城郭倉庫空虛民多流亡罪當伏斧質上不忍致法願歸丞相侯印乞骸骨歸避賢者路天子曰倉廪既空民貧流亡而君欲請徙之搖蕩不安動危之而辭位君欲安歸難乎以書讓慶慶甚慙遂復視事慶文深審謹然無他大略為百姓言後三嵗餘太初二年中丞相慶卒諡為恬侯慶中子德慶愛用之上以德為嗣代侯後為太常坐法當死贖免為庶人慶方為丞相諸子孫為吏更至二千石者十三人及慶死後稍以罪去孝謹益衰矣建陵侯衛綰者代大陵人也綰以戲車為郎應劭曰能左右超乘也如淳曰櫟機轊之類事文帝功次遷為中郎將醇謹無他孝景為太子時召上左右飲而綰稱病不行張晏曰恐文帝謂豫有二心以事太子文帝且崩時屬孝景曰綰長者善遇之及文帝崩景帝立嵗餘不譙呵綰綰日以謹力景帝幸上林詔中郎將參乘還而問曰君知所以得參乘乎綰曰臣從車士幸得以功次遷為中郎將不自知也上問曰吾為太子時召君君不肻來何也對曰死罪實病上賜之劒綰曰先帝賜臣劒凡六劒不敢奉詔上曰劒人之所施易獨至今乎如淳曰施讀曰移言劒者人之所好故多數移易貿換之也綰曰具在上使取六劒劒尚盛未嘗服也郎官有譴常䝉其罪不與他將爭有功常讓他將上以為廉忠實無他腸乃拜綰為河間王太傅吳楚反詔綰為將將河間兵擊吳楚有功拜為中尉三嵗以軍功孝景前六年中封綰為建陵侯其明年上廢太子誅栗卿之屬蘇林曰栗太子舅也如淳曰栗氏親屬也卿其名也上以為綰長者不忍乃賜綰告歸而使郅都治捕栗氏既已上立膠東王為太子召綰拜為太子太傅久之遷為御史大夫五嵗代桃侯舍為丞相朝奏事如職所奏然自初官以至丞相終無可言天子以為敦厚可相少主尊寵之賞賜甚多為丞相三嵗景帝崩武帝立建元年中丞相以景帝疾時諸官囚多坐不辜者而君不任職免之其後綰卒子信代坐酎金失侯塞侯直不疑者南陽人也為郎事文帝其同舍有告歸誤持同舍郎金去已而金主覺妄意不疑不疑謝有之買金償而告歸者來而歸金而前郎亡金者大慙以此稱為長者文帝稱舉稍遷至大中大夫徐廣曰漢書云稱為長者稍遷至大中大夫無文帝稱舉四字也朝廷見人或毁曰不疑狀貌甚美然獨無奈其善盜嫂何也不疑聞曰我乃無兄然終不自明也吳楚反時不疑以二千石將兵擊之景帝後元年拜為御史大夫天子修吳楚時功乃封不疑為塞侯武帝建元年中與丞相綰俱以過免不疑學老子言其所臨為官如故唯恐人知其為吏跡也不好立名稱稱為長者不疑卒子相如代孫望坐酎金失侯郎中令周文者名仁其先故任城人也以醫見景帝為太子時拜為舍人積功稍遷孝文帝時至太中大夫景帝初即位拜仁為郎中令仁為人隂重不泄常衣敝補衣溺袴服䖍曰質重不泄人之隂謀也張晏曰隂重不泄下溼故溺袴是以得比宦者出入後宫仁有子孫先未得此病時所生韋昭曰隂重如今帶下病泄利期為不潔清以是得幸景帝入卧內於後宫祕戲仁常在旁至景帝崩仁尚為郎中令終無所言上時問人仁曰上自察之然亦無所毁以此景帝再自幸其家家徙陽陵上所賜甚多然常讓不敢受也諸侯羣臣賂遺終無所受武帝立以為先帝臣重之仁乃病免以二千石祿歸老子孫咸至大官矣御史大夫張叔者名歐史記音隱曰音於友反安丘侯說之庶子也徐廣曰張說起於方與縣從髙祖以入漢也孝文時以治刑名言韋昭曰有刑名之書欲令名實相副也事太子然歐雖治刑名家其人長者景帝時尊重常為九卿至武帝元朔四年韓安國免詔拜歐為御史大夫自歐為吏未嘗言案人專以誠長者處官官屬以為長者亦不敢大欺上具獄事有可郤郤之不可者不得已為涕泣面對而封之其愛人如此老病篤請免於是天子亦䇿罷以上大夫祿歸老于家家於陽陵子孫咸至大官矣太史公曰仲尼有言曰君子欲訥於言徐廣曰訥字多作詘音同耳古字假借而敏於行其萬石建陵張叔之謂邪是以其教不肅而成不嚴而治塞侯微巧而周文處讇君子譏之為其近於佞也然斯可謂篤行君子矣史記集解卷一百三
