body:
  text: 史記集解卷三十七宋裴駰撰史記三十七衛康叔世家第七衛康叔名封周武王同母少弟也其次尚有冉季冉季最少武王已克殷紂復以殷餘民封紂子武庚祿父比諸侯以奉其先祀勿絶為武庚未集恐其有賊心武王乃令其弟管叔蔡叔傅相武庚祿父以和其民武王既崩成王少周公旦代成王治當國管叔蔡叔疑周公乃與武庚祿父作亂欲攻成周周公旦以成王命興師伐殷殺武庚祿父管叔放蔡叔以武庚殷餘民封康叔為衛君居河淇間故商墟周公旦懼康叔齒少乃申告康叔曰必求殷之賢人君子長者問其先殷所以興所以亡而務愛民告以紂所以亡者以淫於酒酒之失婦人是用故紂之亂自此始為梓材示君子可法則故謂之康誥酒誥梓材以命之康叔之國既以此命能和集其民民大説成王長用事舉康叔為周司冦賜衛寶祭器左傳曰分康叔以大路大旗少帛綪茷旃旌大吕賈逵曰大路金路也少帛雜帛也綪茷大赤也通帛為旃析羽為旌大吕鐘名鄭衆曰綪茷斾名也以章有德康叔卒子康伯代立康伯卒子考伯立考伯卒子嗣伯立嗣伯卒子康史記索隱曰音捷伯立康伯卒子靖伯立靖伯卒子貞伯立貞伯卒子頃侯立頃侯厚賂周夷王夷王命衛為侯頃侯立十二年卒子釐侯立釐侯十三年周厲王出奔于彘共和行政焉二十八年周宣王立四十二年釐侯卒太子共伯餘立為君共伯弟和有寵於釐侯多豫之賂和以其賂賂士以襲攻共伯於墓上共伯入釐侯羡自殺衛人因葬之釐侯旁諡曰共伯而立和為衛侯是為武公武公即位修康叔之政百姓和集四十二年犬戎殺周幽王武公將兵往佐周平戎甚有功周平王命武公為公五十五年卒子莊公揚立莊公五年取齊女為夫人好而無子又取陳女為夫人生子蚤死陳女女弟亦幸於莊公而生子完完母死莊公令夫人齊女子之立為太子莊公有寵妾生子州吁十八年州吁長好兵莊公使將石碏諫莊公賈逵曰石碏為上卿曰庶子好兵使將亂自此起不聽二十三年莊公卒太子完立是為桓公桓公二年弟州吁驕奢桓公絀之州吁出奔十三年鄭伯弟段攻其兄不勝亡而州吁求與之友十六年州吁收聚衛亡人以襲殺桓公州吁自立為衛君為鄭伯弟段欲伐鄭請宋陳蔡與俱三國皆許州吁州吁新立好兵弒桓公衛人皆不愛石碏乃因桓公母家於陳詳為善州吁至鄭郊石碏與陳侯共謀使右宰醜進食因殺州吁于濮服虔曰右宰醜衛大夫濮陳地而迎桓公弟晉於邢而立之賈逵曰邢周公之胤姬姓國是為宣公宣公七年魯弒其君隱公九年宋督弒其君殤公及孔父十年晉曲沃莊伯弒其君哀侯十八年初宣公愛夫人夷薑夷薑生子伋以為太子而令右公子傅之右公子為太子取齊女未入室而宣公見所欲為太子婦者好説而自取之更為太子取他女宣公得齊女生子壽子朔令左公子傅之杜預曰左右媵之子因以為號太子伋母死宣公正夫人與朔共讒惡太子伋宣公自以其奪太子妻也心惡太子欲廢之及聞其惡大怒乃使太子伋於齊而令盜遮界上殺之與太子白旄而告界盜見持白旄者殺之且行子朔之兄壽太子異母弟也知朔之惡太子而君欲殺之乃謂太子曰界盜見太子白旄即殺太子太子可毋行太子曰逆父命求生不可遂行壽見太子不止乃盜其白旄而先馳至界界盜見其驗即殺之壽已死而太子伋又至謂盜曰所當殺乃我也盜并殺太子伋以報宣公宣公乃以子朔為太子十九年宣公卒太子朔立是為惠公左右公子不平朔之立也惠公四年左右公子怨惠公之讒殺前太子伋而代立乃作亂攻惠公立太子伋之弟黔牟為君惠公奔齊衛君黔牟立八年齊襄公率諸侯奉王命共伐衛納衛惠公誅左右公子衛君黔牟奔于周惠公復立惠公立三年出亡亡八年復入與前通年凡十三年矣二十五年惠公怨周之容舍黔牟與燕伐周周惠王奔溫衛燕立惠王弟頽為王二十九年鄭復納惠王三十一年惠公卒子懿公赤立懿公即位好鶴淫樂奢侈九年翟伐衛衛懿公欲發兵兵或畔大臣言曰君好鶴鶴可令擊翟於是遂入殺懿公懿公之立也百姓大臣皆不服自懿公父惠公朔之讒殺太子伋代立至於懿公常欲敗之卒滅惠公之後而更立黔牟之弟昭伯頑之子申為君是為戴公戴公申元年卒齊桓以衛數亂乃率諸侯代翟為衛築楚丘立戴公弟燬為衛君賈誼書曰衛侯朝於周周行人問其名答曰衛侯辟疆周行人還之曰啓疆辟疆天子之號諸侯弗得用衛侯更其名曰燬然後受之是為文公文公以亂故奔齊齊人入之初翟殺懿公也衛人憐之思復立宣公前死太子伋之後伋子又死而代伋死者子壽又無子太子伋同母弟二人其一曰黔牟黔牟嘗代惠公為君八年復去其二曰昭伯昭伯黔牟皆已前死故立昭伯子申為戴公戴公卒復立其弟燬為文公文公初立輕賦平罪身自勞與百姓同苦以收衛民十六年晉公子重耳過無禮十七年齊桓公卒二十五年文公卒子成公鄭立成公三年晉欲假道於衛救宋成公不許晉更從南河度服虔曰南河濟南之東南流河也杜預曰從汲郡南度出衛南救宋徵師於衛衛大夫欲許成公不肯大夫元咺攻成公成公出奔晉文公重耳伐衛分其地豫宋討前過無禮及不救宋患也衛成公遂出奔陳二歲如周求入與晉文公會晉使人鴆衛成公成公私於周主鴆令薄得不死已而周為請晉文公卒入之衛而誅元喧衛君瑕出奔七年晉文公卒十二年成公朝晉襄公十四年秦穆公卒二十六年齊邴歜弒其君懿公三十五年成公卒世本曰成公徙濮陽宋忠曰濮陽帝邱地名子穆公遫立穆公二年楚莊公伐陳殺夏徵舒三年楚莊王圍鄭鄭降復釋之十一年孫良夫救魯伐齊復得侵地穆公卒子定公臧立定公十二年卒子獻公衎立獻公十三年公令師曹教宫妾鼓琴賈逵曰師曹樂人妾不善曹笞之妾以幸惡曹於公公亦笞曹三百十八年獻公戒孫文子寧惠子食皆往曰旰不召服虔曰孫文子林父也寧惠子寧殖也欶戒二子欲共晏食皆服朝衣待命旰宴也而去射鴻於囿二子從之服虔曰從公於囿公不釋射服與之言左傳曰不釋皮冠二子怒如宿服虔曰孫文子邑也孫文子子數侍公飲左傳曰文子子即孫蒯也使師曹歌巧言之卒章杜預曰巧言詩小雅也其卒章曰彼何人斯居河之麋無拳無勇職為亂階公欲以譬文子居河上而為亂師曹又怒公之嘗笞三百乃歌之欲以怒孫文子報衛獻公文子語蘧伯玉伯玉曰臣不知也賈逵曰伯玉衛大夫遂攻出獻公獻公奔齊齊置衛獻公於聚邑孫文子寧惠子共立定公弟秋為衛君是為殤公徐廣曰班氏云獻公弟焱殤公秋立封孫文子林父於宿十二年寧喜與孫林父爭寵相惡殤公使寧喜攻孫林父林父奔晉復求入故衛獻公獻公在齊齊景公聞之與衛獻公如晉求入晉為伐衛誘與盟衛殤公會晉平公平公執殤公與寧喜而復入衛獻公獻公亡在外十二年而入獻公後元年誅寧喜三年吳延陵季子使過衛見蘧伯玉史鰌曰衛多君子其國無故過宿孫林父為擊磬曰不樂音大悲使衛亂乃此矣是年獻公卒子襄公惡立襄公六年楚靈王會諸侯襄公稱病不往九年襄公卒初襄公有賤妾幸之有身夢有人謂曰我康叔也令若子必有衛名而子曰元妾怪之問孔成子服虔曰衛卿孔蒸鉏成子曰康叔者衛祖也及生子男也以告襄公襄公曰天所置也名之曰元襄公夫人無子於是乃立元為嗣是為靈公靈公五年朝晉昭公六年楚公子棄疾弒靈王自立為平王十一年火三十八年孔子來祿之如魯後有隙孔子去後復來三十九年太子蒯瞶與靈公夫人南子有惡賈逵曰南子宋女欲殺南子蒯瞶與其徒戲陽遬謀朝使殺夫人賈逵曰戲陽遬太子家臣戲陽後悔不果蒯瞶數目之夫人覺之懼呼曰太子欲殺我靈公怒太子蒯瞶奔宋已而之晉趙氏四十二年春靈公遊于郊令子郢僕賈逵曰僕御也郢靈公少子也字子南靈公怨太子出奔謂郢曰我將立若為後郢對曰郢不足以辱社稷君更圖之服虔曰郢自謂已無德不足立以沔辱社稷夏靈公卒夫人命子郢為太子曰此靈公命也郢曰亡人太子蒯瞶之子輒在也不敢當於是衛乃以輒為君是為出公六月乙酉趙簡子欲入蒯瞶乃令陽虎詐命衛十餘人衰絰歸服虔曰衰絰為若從衛來迎太子也簡子送蒯瞶衛人聞之發兵擊蒯瞶蒯瞶不得入入宿而保衛人亦罷兵出公輒四年齊田乞弒其君孺子八年齊鮑子弒其君悼公孔子自陳入衛九年孔文子問兵於仲尼仲尼不對其後魯迎仲尼仲尼反魯十二年初孔圉文子取太子蒯聵之姊生悝孔氏之豎渾良夫美好孔文子卒良夫通於悝母太子在宿悝母使良夫於太子太子與良夫言曰茍能入我國報子以乘軒免子三死毋所與杜預曰軒大夫車也三死死罪三與之盟許以悝母為妻閏月良夫與太子入舍孔氏之外圃服虔曰圃園昏二人蒙衣而乘服虔曰二人謂良夫太子蒙衣為婦人之服巾蒙其頭而共乘也宦者羅御如孔氏孔氏之老欒寧問之服虔曰家臣稱老問其姓名稱姻妾以告賈逵曰婚姻家妾也遂入適伯姬氏服虔曰入孔氏家適伯姬所居既食悝母杖戈而先服虔曰先至孔悝所太子與五人介輿猳從之賈逵曰介被甲也輿假豚欲以盟伯姬劫悝於厠強盟之遂劫以登臺服虔曰於衛臺上召衛羣臣欒寧將飲酒炙未熟聞亂使告仲由服虔曰季路為孔氏邑宰故告之召護駕乘車服虔曰召護衛大犬駕乘車不駕兵車也言無距父之慮也行爵食炙服虔曰欒寧使召季路乃行爵食炙奉出公輒奔魯服虔曰召護奉衛侯仲由將入遇子羔將出賈逵曰子羔衛大夫高柴孔子弟子也將出奔曰門已閉矣子路曰吾姑至矣杜預曰且欲至門子羔曰不及莫踐其難賈逵曰言家臣憂不及國不得踐履其難鄭衆曰是時輒以出不及事不當踐其難子羔言不及以為季路欲死國也子路曰食焉不辟其難服虔曰言食悝之祿欲救悝之難此明其不死國也子羔遂出子路入及門公孫敢闔門曰毋入為也服虔曰公孫敢衛大夫言輒已出無為復入子路曰是公孫也求利而逃其難由不然利其祿必救其患有使者出子路乃得入曰太子焉用孔悝雖殺之必或繼之王肅曰必有繼續其後攻太子且曰太子無勇若燔臺必舍孔叔太子聞之懼下石乞孟黶敵子路服虔曰二子蒯瞶之臣敵當也以戈擊之割纓子路曰君子死冠不免服虔曰不使冠在地結纓而死孔子聞衛亂曰嗟乎柴也其來乎由也其死矣孔悝竟立太子蒯瞶是為莊公莊公蒯瞶者出公父也居外怨大夫莫迎立元年即位欲盡誅大臣曰寡人居外久矣子亦嘗聞之乎羣臣欲作亂乃止二年魯孔丘卒三年莊公上城見戎州賈逵曰戎州戎人之邑曰戎虜何為是戎州病之十月戎州告趙簡子簡子圍衛十一月莊公出奔衛人立公子斑師為衛君左傳曰斑師襄公之孫齊伐衛虜斑師更立公子起為衛君服虔曰起靈公子衛君起元年衛石曼專逐其君起起奔齊衛出公輒自齊復歸立初出公立十二年亡亡在外四年復入出公後元年賞從亡者立二十一年卒出公季父黔攻出公子而自立是為悼公悼公五年卒子敬公弗立世本云敬公費也敬公十九年卒子昭公糾立是時三晉強衛如小侯屬之昭公六年公子亹弒之代立是為懷公懷公十一年公子頽弒懷公而代立是為慎公慎公父公子適適父敬公也慎公四十二年卒子聲公訓立聲公十一年卒子成侯速立成侯十一年公孫鞅入秦十六年衛更貶號曰侯二十九年成侯卒子平侯立平侯八年卒子嗣君立嗣君五年更貶號曰君獨有濮陽四十二年卒子懷君立懷君三十一年朝魏魏囚殺懷君魏更立嗣君弟是為元君元君為魏壻故魏立之徐廣曰班氏云元君者懷君之弟元君十四年秦拔魏東地秦初置東郡更徙衛野王縣而并濮陽為東郡二十五年元君卒子君角立年表云元君十一年秦置東郡十二年徙野王二十三年卒君角九年秦并天下立為始皇帝二十一年二世廢君角為庶人衛絶祀太史公曰余讀世家言至於宣公之太子以婦見誅弟壽爭死以相讓此與晉太子申生不敢明驪姬之過同俱惡傷父之志然卒死亡何其悲也或父子相殺兄弟相滅亦獨何哉史記集解卷三十七
