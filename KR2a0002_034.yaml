body:
  text: 史記集解巻三十六宋裴駰撰史記三十六陳杞世家第六陳胡公滿者虞帝舜之後也昔舜為庶人時堯妻之二女居于媯汭其後因為氏姓姓媯氏舜已崩傳禹天下而舜子商均為封國夏后之時或失或續至于周武王克殷紂乃復求舜後得媯滿封之於陳以奉帝舜祀是為胡公胡公卒子申公犀侯立申公卒弟相公舉羊立相公卒立申公子突是為孝公孝公卒子慎公圉戎立慎公立當周厲王時慎公卒子幽公寜立幽公十二年周厲王奔于彘二十三年幽公卒子釐公孝立釐公六年周宣王即位三十六年釐公卒子武公靈立武公十五年卒子夷公説立是嵗周幽王即位夷公三年卒弟平公燮立平公七年周幽王為犬戎所殺周東徙秦始列為諸侯二十三年平公卒子文公圉立文公元年取蔡女生子佗十年文公卒長子桓公鮑立桓公二十三年魯隠公初立二十六年衞殺其君州吁三十三年魯弑其君隠公三十八年正月甲戌己丑陳桓公鮑卒桓公弟佗其母蔡女故蔡人為佗殺五父及桓公太子免而立佗譙周曰春秋傳謂佗即五父世家與傳違是為厲公桓公病而亂作國人分散故再赴徐廣曰班氏云厲公躍者桓公之弟也厲公二年生子敬仲完周太史過陳陳厲公使以周易筮之卦得觀之否是為觀國之光利用賔于王此其代陳有國乎不在此其在異國非此其身在其子孫若在異國必姜姓姜姓太嶽之後杜預曰姜姓之先為堯四嶽物莫能兩大陳衰此其昌乎厲公取蔡女蔡女與蔡人亂厲公數如蔡滛七年厲公所殺桓公太子免之三弟長曰躍中曰林少曰杵臼共令蔡人誘厲公以好女與蔡人共殺厲公公羊傳曰滛于蔡蔡人殺人而立躍是為利公利公者桓公子也利公立五月卒立中弟林是為莊公莊公七年卒少弟杵臼立是為宣公宣公三年楚武王卒楚始彊十七年周惠王娶陳女為后二十一年宣公後有嬖姬生子款欲立之乃殺其太子禦冦禦冦素愛厲公子完完懼禍及己乃奔齊齊桓公欲使陳完為卿完曰羈旅之臣賈逵曰羈寄旅客也幸得免負擔君之惠也不敢當髙位桓公使為工正齊懿仲欲妻陳敬仲卜之占曰是謂鳯皇于飛和鳴鏘鏘杜預曰雄曰鳯雌曰皇雄雌俱飛相和而鳴鏘鏘然也猶敬仲夫妻有聲譽有媯之後將育于姜杜預曰媯陳姓姜齊姓五世其昌並于正卿服䖍曰言完後五世與卿並列八世之後莫之與京賈逵曰京大也三十七年齊桓公伐蔡蔡敗南侵楚至召陵還過陳陳大夫轅濤塗惡其過陳詐齊令出東道東道惡桓公怒執陳轅濤塗是歲晉獻公殺其太子申生四十五年宣公卒子款立是為穆公穆公五年齊桓公卒十六年晉文公敗楚師于城濮是歲穆公卒子共公朔立共公六年楚太子商臣弑其父成王代立是為穆王十一年秦穆公卒十八年共公卒子靈公平國立靈公元年楚莊王即位六年楚伐陳十年陳及楚平十四年靈公與其大夫孔寧儀行父皆通於夏姬衷其衣以戲於朝左傳曰衷其衵服穀梁傳曰或衣其衣或中其襦泄冶諫曰君臣淫亂民何效焉靈公以告二子二子請殺泄冶公弗禁遂殺泄冶春秋曰陳殺其大夫泄冶十五年靈公與二子飲於夏氏公戲二子曰徵舒似汝二子曰亦似公杜預曰靈公即位十五年徵舒已為卿年大無嫌是公子也葢以夏姬滛放故謂其子多似以為戲也徵舒怒靈公罷酒出徵舒伏弩廏門射殺靈公左傳曰公出自其廏孔寧儀行父皆奔楚靈公太子午奔晉徵舒自立為陳侯徵舒故陳大夫也夏姬御叔之妻舒之母也成公元年冬楚莊王為夏徵舒殺靈公率諸侯伐陳謂陳曰無驚吾誅徵舒而已已誅徵舒因縣陳而有之羣臣畢賀申叔時使於齊來還獨不賀賈逵曰叔時楚大夫莊王問其故對曰鄙語有之牽牛徑人田田主奪之牛徑則有罪矣奪之牛不亦甚乎今王以徵舒為賊弑君故徵兵諸侯以義伐之已而取之以利其地則後何以令於天下是以不賀莊王曰善乃迎陳靈公太子午於晉而立之復君陳如故是為成公孔子讀史記至楚復陳曰賢哉楚莊王輕千乗之國而重一言二十八年楚莊王卒二十九年陳倍楚盟三十年楚共王伐陳是歲陳公卒子哀公弱立楚以陳喪罷兵去哀公三年楚圍陳復釋之二十八年楚公子圍弑其君郟敖自立為靈王三十四年初哀公娶鄭長姬生悼太子師少姬生偃二嬖妾長妾生留少妾生勝留有寵哀公哀公屬之其弟司徒招哀公病三月招殺悼太子立留為太子哀公怒欲誅招招發兵圍守哀公哀公自經殺徐廣曰三十三年時招卒立留為陳君四月陳使使赴楚楚靈王聞陳亂乃殺陳使者使公子棄疾發兵伐陳陳君留奔鄭九月楚圍陳十一月滅陳使棄疾為陳公招之殺悼太子也太子之子名吳出奔晉晉平公問太史趙曰陳遂亡乎對曰陳顓頊之族服䖍曰陳祖虞舜舜出顓頊故為顓頊之族陳氏得政於齊乃卒亡賈逵曰物莫能雨盛自幕至于瞽叟無違命賈逵曰幕舜後虞思也至于瞽叟無聞違天命以廢絶者鄭衆曰幕舜之先也駰案國語賈義為長舜重之以明徳至於遂杜預曰遂舜後葢殷之興存舜之後而封遂言舜徳乃至於遂也世世守之及胡公周賜之姓杜預曰胡公滿遂之後也事周武王賜姓曰媯封之陳使祀虞帝且盛徳之後必百世祀虞之世未也其在齊乎楚靈王滅陳五歲楚公子棄疾弑靈王代立是為平王平王初立欲得和諸侯乃求故陳悼太子師之子吳立為陳侯是為惠公惠公立探續哀公卒時年而為元空籍五歲矣七年陳火十五年吳王僚使公子光伐陳取胡沈而去二十八年吳王闔閭與子胥敗楚入郢是年惠公卒子懷公栁立懷公元年吳破楚在郢召陳侯陳侯欲往大夫曰吳新得意楚王雖亡與陳有故不可倍懐公乃以疾謝吳四年吳復召懷公懷公恐如吳吳怒其前不往留之因卒吳陳乃立懷公之子越是為湣公湣公六年孔子適陳吳王夫差伐陳取三邑而去十三年吳復來伐陳陳告急楚楚昭王來救軍於城父吳師去是年楚昭王卒於城父時孔子在陳十五年宋滅曹十六年吳王夫差伐齊敗之艾陵使人召陳侯陳侯恐如吳楚伐陳二十一年齊田常弑其君簡公二十三年楚之白公勝殺令尹子西子綦襲惠王葉公攻敗白公白公自殺二十四年楚惠王復國以兵北伐殺陳湣公遂滅陳而有之是歲孔子卒杞東樓公者夏后禹之後苗裔也殷時或封或絶周武王克殷紂求禹之後得東樓公封之於杞宋公曰杞今陳留雍丘縣也以奉夏后氏祀東樓公生西樓公西樓公生題公題公生謀娶公徐廣曰謀一作謨謀娶公當周厲王時謀娶公生武公武公立四十七年卒子靖公立靖公二十三年卒子共公立共公八年卒子徳公立徐廣曰世本曰惠公徳公十八年卒弟桓公姑容立徐廣曰世本曰惠公立十八年生成公及桓公成公立十八年桓公立十七年桓公十七年卒子孝公匄立孝公十七年弟文公益姑立文公十四年卒弟平公鬱立平公十八年卒子悼公成立悼公十二年卒子隱公乞立七月隱公弟遂弑隱公自立是為釐公釐公十九年卒子湣公維立湣公十五年楚惠王滅陳十六年湣公弟閼路弑湣公代立是為哀公哀公立十年卒湣公子欶立徐廣曰欶一作遫是為出公出公十二年卒子簡公春立立一年楚惠王之四十四年滅杞杞後陳亡三十四年杞小微其事不足稱述舜之後周武王封之陳至楚惠王滅之有世家言禹之後周武王封之杞楚惠王滅之有世家言契之後為殷殷有本紀言殷破周封其後於宋齊湣公滅之有世家言后稷之後為周秦昭王滅之有本紀言皋陶之後或封英六楚穆王滅之無譜伯夷之後至周武王復封於齊曰太公望陳氏滅之有世家言伯翳之後至周平王時封為秦項羽滅之有本紀言垂益䕫龍其後不知所封不見也右十一人者皆唐虞之際名有功徳臣也其五人之後皆至帝王餘乃為顯諸侯滕薛騶夏殷周之間封也小不足齒列弗論也周武王時侯伯尚千餘人及幽厲之後諸侯力攻相并江黄胡沈之屬不可勝數故弗采著于傳上太史公曰舜之徳可謂至矣禪位於夏而後世血食者厯三代及楚滅陳而田常得政於齊卒為建國百世不絶苗裔兹兹有土者不乏焉至禹於周則杞微甚不足數也楚惠王滅杞其後越王句踐興史記集解卷三十六
