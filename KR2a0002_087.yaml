body:
  text: 史記集解卷八十九宋裴駰撰史記八十九張耳陳餘列傳第二十九張耳者大梁人也其少時及魏公子毋忌為客張耳嘗亡命遊外黃外黃富人女甚美嫁庸奴亡其夫徐廣曰一云其夫亡也去抵父客如淳曰父時故賓客父客素知張耳乃謂女曰必欲求賢夫從張耳女聽乃卒為請決嫁之張耳張耳是時脫身遊女家厚奉給張耳張耳以故致千里客乃宦魏為外黃令名由此益賢陳餘者亦大梁人也好儒術數遊趙苦陘張晏曰苦陘漢章帝改曰漢昌富人公乘氏以其女妻之亦知陳餘非庸人也餘年少父事張耳兩人相與為刎頸交秦之滅大梁也張耳家外黃高祖為布衣時嘗數從張耳遊客數月秦滅魏數歲已聞此兩人魏之名士也購求有得張耳千金陳餘五百金張耳陳餘乃變名姓俱之陳為里監門張晏曰監門里正衛也以自食兩人相對里吏嘗有過笞陳餘陳餘欲起張耳躡之徐廣曰一作攝使受笞吏去張耳乃引陳餘之桑下而數之曰始吾與公言何如今見小辱而欲死一吏乎陳餘然之秦詔書購求兩人兩人亦反用門者以令里中陳涉起蘄至入陳兵數萬張耳陳餘上謁陳涉涉及左右生平數聞張耳陳餘賢未嘗見見即大喜陳中豪傑父老乃説陳涉曰將軍身被堅執鋭率士卒以誅暴秦復立楚社稷存亡繼絶功德宜為王且夫監臨天下諸將不為王不可願將軍立為楚王也陳涉問此兩人兩人對曰夫秦為無道破人國家滅人社稷絶人後世罷百姓之力盡百姓之財將軍瞋目張膽出萬死不顧一生之計為天下除殘也今始至陳而王之示天下私願將軍毋王急引兵而西遣人立六國後自為樹黨為秦益敵也敵多則力分與衆則兵強如此野無交兵縣無守城誅暴秦據咸陽以令諸侯諸侯亡而得立以德服之如此則帝業成矣今獨王陳恐天下解也陳涉不聽遂立為王陳餘乃復説陳王曰大王舉梁楚而西務在入關未及收河北也臣嘗遊趙知其豪桀及地形願請竒兵北略趙地於是陳王以故所善陳人武臣為將軍邵騷為護軍以張耳陳餘為左右校尉豫卒三千人北略趙地武臣等從白馬渡河至諸縣説其豪桀曰鄧展曰至何北縣説之秦為亂政虐刑以殘賊天下數十年矣北有長城之役南有五嶺之戍漢書音義曰嶺有五因以為名在交址界中也外內騷動百姓罷敝頭會箕斂漢書音義曰家家人頭數出穀以箕斂之以供軍費財匱力盡民不聊生重之以苛法峻刑使天下父子不相安陳王奮臂為天下倡始王楚之地方二千里莫不響應家自為怒人自為鬭各報其怨而攻其讐縣殺其令丞郡殺其守尉今已張大楚王陳使吳廣周文將卒百萬西擊秦於此時而不成封侯之業者非人豪也諸君試相與計之夫天下同心而苦秦久矣因天下之力而攻無道之君報父兄之怨而成割地有土之業此士之一時也豪桀皆然其言乃行收兵得數萬人號武臣為武信君下趙十城餘皆城守莫肯下乃引兵東北擊范陽范陽人蒯通説范陽令曰漢書曰范陽令徐公竊聞公之將死故弔雖然賀公得通而生范陽令曰何以弔之對曰秦法重足下為范陽令十年矣殺人之父孤人之子斷人之足黥人之首不可勝數然而慈父孝子莫敢倳刃徐廣曰倳音胾公之腹中者李竒曰東方人以物插地皆為倳畏秦法耳今天下大亂秦法不施然則慈父孝子且倳刃公之腹中以成其名此臣之所以弔公也今諸侯畔秦矣武信君兵且至而君堅守范陽少年皆爭殺君下武信君君急遣臣見武信君可轉禍為福在今矣范陽令乃使蒯通見武信君曰足下必將戰勝然后略地攻得然後下城臣竊以為過矣誠聽臣之計可不攻而降城不戰而略地傳檄而千里定可乎武信君曰何謂也蒯通曰令范陽令宜整頓其士卒以守戰者也怯而畏死貪而重富貴故欲先天下降畏君以為秦所置吏誅殺如前十城也然今范陽少年亦方殺其令自以城距君君何不齎臣侯印拜范陽令范陽令則以城下君少年亦不敢殺其令令范陽令乘朱輪華轂使馳驅燕趙郊燕趙郊見之皆曰此范陽令先下者也即喜矣燕趙城可毋戰而降也此臣之所謂傳檄而千里定者也武信君從其計因使蒯通賜范陽令侯印趙地聞之不戰以城下者三十餘城至邯鄲張耳陳餘聞周章軍入關至戲却蘇林曰戲地名却兵退也又聞諸將為陳王徇地多以讒毁得罪誅怨陳王不用其策不以為將而以為校尉乃説武臣曰陳王起蘄至陳而王非必立六國後將軍今以三千人下趙數十城獨介居河北晉灼曰介音戞讚曰方言云介持也不王無以填之且陳王聽讒還報恐不脫於禍又不如立其兄弟不即立趙後將軍毋失時時間不容息武臣乃聽之遂立為趙王以陳餘為大將軍張耳為右丞相邵騷為左丞相使人報陳王陳王大怒欲盡族武臣等家而發兵擊趙陳王相國房君諫曰秦未亡而誅武臣等家此又生一秦也不如因而賀之使急引兵西擊秦陳王然之從其計徙繫武臣等家宮中封張耳子敖為成都君陳王使使者賀趙令趣發兵西入關張耳陳餘説武臣曰王王趙非楚意特以計賀王楚已滅秦必加兵於趙願王毋西兵北徇燕代南收河內以自廣趙南據大河北有燕代楚雖勝秦必不敢制趙趙王以為然因不西兵而使韓廣略燕李良略常山張黶略上黨韓廣至燕燕人因立廣為燕王徐廣曰九月也趙王乃與張耳陳餘北略地燕界趙王間出為燕軍所得燕將囚之欲與分趙地半乃歸王使者往燕輒殺之以求地張耳陳餘患之有厮養卒謝其舍中曰如淳曰厮賤者也公羊傳曰厮役扈養韋昭曰析薪為厮炊烹為養晉灼曰以辭相告曰謝也吾為公説燕與趙王載歸舍中皆笑曰使者往十餘輩輒死若何以能得王乃走燕壁燕將見之問燕將曰知臣何欲燕將曰若欲得趙王耳曰君知張耳陳餘何如人也燕將曰賢人也曰知其志何欲曰欲得其王耳趙養卒乃笑曰君未知此兩人所欲也夫武臣張耳陳餘杖馬箠下趙數十城張晏曰言其不用兵革驅策而已也此亦各欲南靣而王豈欲為卿相終已邪夫臣與主豈可同日而道哉顧其勢初定未敢參分而王且以少長先立武臣為王以持趙心今趙地已服此兩人亦欲分趙而王時未可耳今君乃囚趙王此兩人名為求趙王實欲燕殺之此兩人分趙自立夫以一趙尚易燕況以兩賢王右提左挈而責殺王之罪徐廣曰平原君傳曰事成執右劵以責也劵契義同耳滅燕易矣燕將以為然乃歸趙王養卒為御而歸李良已定常山還報趙王復使良略太原至石邑秦兵塞井陘未能前秦將詐稱二世使人遺李良書不封張晏曰欲其漏泄君臣相疑曰良嘗事我得顯幸良誠能反趙為秦赦良罪貴良良得書疑不信乃還之邯鄲益請兵未至道逢趙王姊出飲從百飲騎李良望見以為王伏謁道旁王姊醉不知其將使騎謝李良李良素貴起慙其從官從官有一人曰天下畔秦能者先立且趙王素出將軍下今女兒乃不為將軍下車請追殺之李良已得秦書固欲反趙未決因此怒遣人追殺王姊道中乃遂將其兵襲邯鄲邯鄲不知竟殺武臣邵騷趙人多為張耳陳餘耳目者以故得脫出收其兵得數萬人客有説張耳曰兩君羈旅而欲附趙難獨立立趙後扶以義可就功乃求得趙歇徐廣曰正月也音烏轄反駰案張晏曰趙之苗裔立為趙王居信都徐廣曰後項羽改曰襄國李良進兵擊陳餘陳餘敗李良李良走歸章邯章邯引兵至邯鄲皆徙其民河內夷其城郭張耳與趙王歇走入巨鹿城王離圍之陳餘北收常山兵得數萬人軍巨鹿北章邯軍巨鹿南棘原築甬道屬河餉王離王離兵食多急攻巨鹿巨鹿城中食進兵少張耳數使人召前陳餘陳餘自度兵少不敵秦不敢前數月張耳大怒怨陳餘使張黶陳澤往讓陳餘曰始吾與公為刎頸交今王與耳旦暮且死而公擁兵數萬不肯相救安在其相為死茍必信胡不赴秦軍俱死且有十一二相全陳餘曰吾度前終不能救趙徒盡亡軍且餘所以不俱死欲為趙王張君報秦今必俱死如以肉委餓虎何益張黶陳澤曰事已急要俱死立信安知後慮陳餘曰吾死顧以為無益必如公言乃使五千人令張黶陳澤先嘗秦軍至皆沒當是時燕齊楚聞趙急皆來救張敖亦北收代兵得萬餘人來皆壁餘旁未敢擊秦項羽兵數絶章邯甬道王離軍之食項羽悉引兵渡河遂破章邯徐廣曰三年十二月章邯引兵解諸侯軍乃敢擊圍巨鹿秦軍遂虜王離涉間自殺卒存巨鹿者楚力也於是趙王歇張耳乃得出巨鹿謝諸侯張耳與陳餘相見責讓陳餘以不肯救趙及問張黶陳澤所在陳餘怒曰張黶陳澤以必死責臣臣使將五千人先嘗秦軍皆沒不出張耳不信以為殺之數問陳餘陳餘怒曰不意君之望臣深也豈以臣為重去將哉乃脫解印綬推豫張耳張耳亦愕不受陳餘起如厠客有説張耳曰臣聞天與不取反受其咎今陳將軍豫君印君不受反天不祥急取之張耳乃佩其印收其麾下而陳餘還亦望張耳不讓遂趨出張耳遂收其兵陳餘獨與麾下所善數百人之河上澤中漁獵由此陳餘張耳遂有卻趙王歇復居信都張耳從項羽諸侯入關漢元年十二月項羽立諸侯王張耳雅遊韋昭曰雅素也人多為之言項羽亦素數問張耳賢乃分趙立張耳為常山王治信都信都更名襄國陳餘客多説項羽曰陳餘張耳一體有功於趙項羽以陳餘不從入關聞其在南皮即以南皮旁三縣以封之而徙趙王歇王代徐廣曰都代縣張耳之國陳餘愈益怒曰張耳與餘功等也今張耳王餘獨侯此項羽不平及齊王田榮畔楚陳餘乃使夏説説田榮曰項羽為天下宰不平盡王諸將善地徙故王王惡地今趙王乃居代願王假臣兵請以南皮為扞蔽田榮欲樹黨於趙以反楚乃遣兵從陳餘陳餘因悉三縣兵襲常山王張耳張耳敗走念諸侯無可歸者漢王與我有舊故張晏曰漢王為布衣時嘗從張耳遊而項羽又強立我我欲之楚張晏曰羽既強盛又為所立是以狐疑莫知所往也甘公曰文頴曰善説星者甘氏也漢王之入關五星聚東井東井者秦分也先至必霸楚雖強後必屬漢故耳走漢徐廣曰二年十月也漢王亦還定三秦方圍章邯廢丘張耳謁漢王漢王厚遇之陳餘已敗張耳皆復收趙地迎趙王於代復為趙王趙王德陳餘立以為代王陳餘為趙王弱國初定不之國留傅趙王而使夏説以相國守代漢二年東擊楚使使告趙欲與俱陳餘曰漢殺張耳乃從於是漢王求人類張耳者斬之持其頭遺陳餘陳餘乃遣兵助漢漢之敗於彭城西陳餘亦復覺張耳不死即背漢漢三年韓信已定魏地遣張耳與韓信擊破趙井陘徐廣曰三年十月斬陳餘泜水上徐廣曰在常山音遲一音丁禮反追殺趙王歇襄國漢立張耳為趙王徐廣曰四年十一月駰案漢書四年夏漢五年張耳薨諡為景王子敖嗣立為趙王高祖長女魯元公主為趙王敖后漢七年高祖從平城過趙趙王朝夕袒韝蔽徐廣曰韝者臂捍也自上食禮甚卑有子壻禮高祖箕倨詈甚漫易之趙相貫高趙午等年六十餘徐廣曰田叔傳云趙相趙午等數十人皆怒然則或宜言六十餘人故張耳客也生平為氣乃怒曰吾王孱王也孟康曰音如潺湲之潺冀州人謂懦弱為孱韋昭曰仁謹貌説王曰夫天下豪桀並起能者先立今王事高祖甚恭而高祖無禮請為王殺之張敖齧其指出血曰君何言之誤且先人亡國賴高祖得復國德流子孫秋豪皆高祖力也願君無復出口貫高趙午等十餘人皆相謂曰乃吾等非也吾王長者不倍德且吾等義不辱今怨高祖辱吾王故欲殺之何乃汙王為乎令事成歸王事敗獨身坐耳漢八年上從東垣還過趙貫高等乃壁人柏人要之置厠韋昭曰為供置也上過欲宿心動問曰縣名為何曰柏人柏人者迫於人也不宿而去漢九年貫高怨家知其謀乃上變告之於是上皆并逮捕趙王貫高等十餘人皆爭自剄貫高獨怒罵曰誰令公為之今王實無謀而并捕王公等皆死誰白王不反者乃轞車膠致與王詣長安治張敖之罪上乃詔趙羣臣賓客有敢從王皆族貫高與客孟舒等十餘人皆自髠鉗為王家奴從來貫高至對獄曰獨吾屬為之王實不知吏治榜笞數千刺剟徐廣曰丁劣反身無可擊者終不復言呂后數言張王以魯元公主故不宜有此上怒曰使張敖據天下豈少而女乎不聽廷尉以貫高事辭聞上曰壯士誰知者以私問之瓚曰以私情相問中大夫泄公曰臣之邑子素知之此固趙國立名義不侵為然諾者也上使泄公持節問之箯輿前徐廣曰箯音鞭駰案韋昭曰輿如今輿牀人輿以行仰視曰泄公邪泄公勞苦如生平歡與語問張王果有計謀不高曰人情寧不各愛其父母妻子乎今吾三族皆以論死豈以王易吾親哉顧為王實不反獨吾等為之其道本指所以為者王不知狀於是泄公入具以報上乃赦趙王上賢貫高為人能立然諾使泄公具告之曰張王已出因赦貫高貫高喜曰吾王審出乎泄公曰然泄公曰上多足下故赦足下貫高曰所以不死一身無餘者白張王不反也今王已出吾責已塞死不恨矣且人臣有篡殺之名何靣目復事上哉縱上不殺我我不愧於心乎乃仰絶骯遂死韋昭曰骯咽也當此之時名聞天下張敖已出以尚魯元故封為宣平侯於是上賢張王諸客客以鉗奴從張王入關無不為諸侯相郡守者及孝惠高后文帝孝景時張王客子孫皆得為二千石張敖高后六年薨關中記曰張敖家在安陵東子偃為魯元王以母呂后女故呂后封為魯元王元王弱兄弟少及封張敖他姬子二人為樂昌侯徐廣曰漢紀張酺傳曰張敖之子夀封樂昌侯食細陽之池陽鄉也侈為信都侯高后崩諸呂無道大臣誅之而廢魯元王及樂昌侯信都侯孝文帝即位復封故魯元王偃為南宮侯續張氏張敖諡武侯張偃之孫有罪絶信都侯名侈樂昌侯名夀太史公曰張耳陳餘世傳所稱賢者其賓客厮役莫非天下俊桀所居國無不取卿相者然張耳陳餘始居約時漢書音義曰在貧賤時也相然信以死豈顧問哉及據國爭權卒相滅亡何鄉者相慕用之誠後相倍之戾也豈非以利哉名譽雖高賓客雖盛所由殆與太伯延陵季子異矣史記集解卷八十九
