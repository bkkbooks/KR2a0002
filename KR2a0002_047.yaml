body:
  text: 史記集解卷四十九宋裴駰撰史記四十九外戚世家第十九自古受命帝王及繼體守文之君非獨內德茂也蓋亦有外戚之助焉夏之興也以塗山而桀之放也以末喜殷之興也以有娀紂之殺也嬖妲己周之興也以薑原及大任而幽王之禽也淫於褒姒故易基乾坤詩始關雎書美釐降春秋譏不親迎夫婦之際人道之大倫也禮之用唯婚姻為兢兢夫樂調而四時和隂陽之變萬物之統也可不慎與人能𢎞道無如命何甚哉妃匹之愛君不能得之於臣父不能得之於子況卑下乎既歡合矣或不能成子姓能成子姓矣或不能要其終豈非命也哉孔子罕稱命蓋難言之也非通幽明之變惡能識乎性命哉太史公曰秦以前尚略矣其詳靡得而記焉漢興吕娥姁徐廣曰姁音況羽反吕后姊字長姁也為髙祖正后男為太子及晚節色衰愛弛而戚夫人有寵其子如意幾代太子者數矣及髙祖崩吕后夷戚氏誅趙王而髙祖後宫唯獨無寵疏逺者得無恙吕后長女為宣平侯張敖妻敖女為孝惠皇后呂太后以重親故欲其生子萬方終無子詐取後宫人子為子及孝惠帝崩天下初定未久繼嗣不明於是貴外家王諸吕以為輔而以吕祿女為少帝后欲連固根本牢甚然無益也髙后崩合葬長陵關中記曰髙祖陵在西吕后陵在東漢帝后同塋則為合葬不合陵諸陵皆如此祿産等懼誅謀作亂大臣征之天誘其統徐廣曰一作衷卒滅吕氏唯獨置孝惠皇后居北宫迎立代王是為孝文帝奉漢宗廟此豈非天邪非天命孰能當之薄太后父吳人姓薄氏秦時與故魏王宗家女魏媪通生薄姬而薄父死山隂因葬焉及諸侯畔秦魏豹立為魏王而魏媪內其女於魏宫媪之許負所相相薄姬云當生天子是時項羽方與漢王相距滎陽天下未有所定豹初與漢擊楚及聞許負言心獨喜因背漢而畔中立更與楚連和漢使曹參等擊虜魏王豹以其國為郡而薄姬輸織室豹已死漢王入織室見薄姬有色詔內後宫歲餘不得幸始姬少時與管夫人趙子兒相愛約曰先貴無相忘已而管夫人趙子兒先幸漢王漢王坐河南宫成臯臺此兩美人相與笑薄姬初時約漢王聞之問其故兩人具以實告漢王漢王心慘然憐薄姬是日召而幸之薄姬曰昨暮夜妾夢蒼龍據吾腹髙帝曰此貴徴也吾為女遂成之一幸生男是為代王其後薄姬希見髙祖髙祖崩諸御幸姬戚夫人之屬呂太后怒皆幽之不得出宫而薄姬以希見故得出從子之代為代王太后太后弟薄昭從如代代王立十七年髙后崩大臣議立後疾外家吕氏強皆稱薄氏仁善故迎代王立為孝文皇帝而太后改號曰皇太后弟薄昭封為軹侯薄太后母亦前死葬櫟陽北於是乃追尊薄父為靈文侯會稽郡置園邑三百家長丞已下吏奉守冢寢廟上食祠如法而櫟陽北亦置靈文侯夫人園如靈文侯園儀薄太后以為母家魏王後早失父母其奉薄太后諸魏有力者於是召復魏氏及尊賞賜各以親疏受之薄氏侯者凡一人薄太后後文帝二年以孝景帝前二年崩葬南陵以吕后會葬長陵故特自起陵近孝文皇帝霸陵徐廣曰霸陵縣冇軹道亭竇太后趙之清河觀津人也吕太后時竇姬以良家子入宫侍太后太后出宫人以賜諸王各五人竇姬與在行中竇姬家在清河欲如趙近家請其主遣宦者吏必置我籍趙之伍中宦者忘之誤置其籍代伍中籍奏詔可當行竇姬涕泣怨其宦者不欲往相強乃肯行至代代王獨幸竇姬主女嫖後生兩男而代王王后生四男先代王未入立為帝而王后卒及代王立為帝而王后所生四男更病死孝文帝立數月公卿請立太子而竇姬長男最長立為太子立竇姬為皇后女嫖為長公主其明年立少子武為代王已而又徙梁是為梁孝王竇皇后親早卒葬觀津於是薄太后乃詔有司追尊竇后父為安成侯母曰安成夫人令清河置園邑二百家長丞奉守比靈文園法竇皇后兄竇長君弟曰竇廣國字少君少君年四五歲時家貧為人所略賣其家不知其處傳十餘家至宜陽為其主入山作炭寒卧岸下百餘人岸崩盡厭殺卧者少君獨得脫不死自卜數日當為侯徙其家之長安聞竇皇后新立家在觀津姓竇氏廣國去時雖小識其縣名及姓又常與其姊採桑墮用為符信上書自陳竇皇后言之於文帝召見問之具言其故果是又復問他何以為驗對曰姊去我西時與我決於傳舍中丐沐沐我請食飯我乃去於是竇后持之而泣泣涕交橫下侍御左右皆伏地泣助皇后悲哀乃厚賜田宅金錢封公昆弟家於長安絳侯灌將軍等曰吾屬不死命乃且縣此兩人兩人所出微不可不為擇師傅賔客又復效吕氏大事也於是乃選長者士之有節行者與居竇長君少君由此為退讓君子不敢以尊貴驕人竇皇后病失明文帝幸邯鄲慎夫人尹姬皆毋子孝文帝崩孝景帝立乃封廣國為章武侯長君前死封其子彭祖為南皮侯吳楚反時竇太后從昆弟子竇嬰任俠自喜將兵以軍功為魏其侯竇氏凡三人為侯竇太后好黃帝老子言帝及太子諸竇不得不讀黃帝老子尊其術竇太后後孝景帝六歲建元六年崩合葬霸陵遺詔盡以東宫金錢財物賜長公主嫖王太后槐里人母曰臧兒臧兒者故燕王臧荼孫也臧兒嫁為槐里王仲妻生男曰信與兩女而仲死臧兒更嫁長陵田氏生男蚡勝臧兒長女嫁為金王孫婦生一女矣而臧兒卜筮之曰兩女皆當貴因欲竒兩女乃奪金氏金氏怒不肯豫決乃內之太子宫太子幸愛之生三女一男男方在身時王美人夢日入其懷以告太子太子曰此貴徵也未生而孝文帝崩孝景帝即位王夫人生男先是臧兒又入其少女兒姁兒姁生四男景帝為太子時薄太后以薄氏女為妃及景帝立立妃曰薄皇后皇后母子毋寵薄太后崩廢薄皇后景帝長男榮其母栗姬栗姬齊人也立榮為太子長公主嫖有女欲豫為妃栗姬妬而景帝諸美人皆因長公主見景帝得貴幸皆過栗姬栗姬日怨怒謝長公主不許長公主欲豫王夫人王夫人許之長公主怒而日讒栗姬短於景帝曰栗姬與諸貴夫人幸姬會常使侍者祝唾其背挾邪媚道景帝以故望之景帝嘗體不安心不樂屬諸子為王者於栗姬曰百歲後善視之粟姬怒不肯應言不遜景帝恚心嗛之而未發也長公主日譽王夫人男之美景帝亦賢之又有曩者所夢日符計未有所定王夫人知帝望栗姬因怒未解隂使人趣大臣立栗姬為皇后大行奏事畢曰子以母貴母以子貴今太子母無號宜立為皇后景帝怒曰是而所宜言邪遂按誅大行而廢太子為臨江王栗姬恚恨不得見以憂死卒立王夫人為皇后其男為太子封皇后兄信為蓋侯景帝崩太子襲號為皇帝尊皇太后母臧兒為平原君封田蚡為武安侯勝為周陽侯景帝十三男一男為帝十二男皆為王而兒姁早卒其四子皆為王王太后長女號曰平陽公主次為南宫公主次為林慮公主蓋侯信好酒田蚡勝貪巧於文辭王仲早死葬槐里追尊為共侯置園邑二百家及平原君卒從田氏葬長陵置園比共侯園而王太后後孝景帝十六歲以元朔四年崩合葬陽陵王太后家凡三人為侯衛皇后字子夫生微矣蓋共家號曰衛氏出平陽侯邑徐廣曰平陽侯曹夀尚平陽公主子夫為平陽主謳者武帝初即位數歲無子平陽主求諸良家子女十餘人飾置家武帝祓徐廣曰三月上巳臨水祓謂之禊吕后本紀亦云三月祓還過軹道蓋與遊字相似故或定之也霸上還因過平陽主主見所侍美人上弗説既飲謳者進上望見獨説衛子夫是日武帝起更衣子夫待尚衣軒中得幸上還坐歡甚賜平陽主金千斤主因奏子夫奉送入宫子夫上車平陽主拊其背曰行矣強飯勉之即貴無相忘入宫歲餘竟不復幸武帝擇宫人不中用者斥出歸之衛子夫得見涕泣請出上憐之復幸遂冇身尊寵日隆召其兄衛長君弟青為侍中而子夫後大幸有寵凡生三女一男男名據初上為太子時娶長公主女為妃立為帝妃立為皇后姓陳氏無子上之得為嗣大長公主有力焉徐廣曰即景帝姊嫖也以故陳皇后驕貴聞衛子夫大幸恚幾死者數矣上愈怒陳皇后挾婦人媚道其事頗覺於是廢陳皇后而立衛子夫為皇后陳皇后母大長公主景帝姊也數讓武帝姊平陽公主曰帝非我不得立已而棄捐吾女一何不自喜而倍本乎平陽公主曰用無子故廢耳陳皇后求子與醫錢凡九千萬然竟無子衛子夫已立為皇后先是衛長君死乃以衛青為將軍擊胡有功封為長平侯青三子在襁褓中皆封為列侯及衛皇后所謂姊衛少兒少兒生子霍去病以軍功為冠軍侯號驃騎將軍青號大將軍立衛皇后子據為太子衛氏枝屬以軍功起家五人為侯及衛后色衰趙之王夫人幸有子為齊王王夫人早卒而中山李夫人有寵有男一人為昌邑王李夫人早卒其兄李延年以音幸號協律協律者故倡也兄弟皆坐姦族是時其長兄廣利為二師將軍伐大宛不及誅還而上既夷李氏後憐其家乃封為海西侯他姬子二人為燕王廣陵王其母無寵以憂死及李夫人卒則有尹婕妤之屬更有寵然皆以倡見非王侯有土之士女不可以配人主也褚先生曰臣為郎時問習漢家故事者鍾離生曰王太后在民間時所生子女者徐廣曰名俗父為金王孫王孫死已景帝崩後武帝已立王太后獨在而韓王孫名嫣素得幸武帝承間白言太后有女在長陵也武帝曰何不早言乃使使往先視之在其家武帝乃自往迎取之蹕道先驅旄騎出橫城門如淳曰橫音光三輔黃圖云北面西頭門乘輿馳至長陵當小市西入里里門閉暴開乘輿直入此里通至金氏門外止使武騎圍其宅為其亡走身自往取不得也即使左右羣臣入呼求之家人驚恐女亡匿內中牀下扶持出門令拜謁武帝下車泣曰嚄大姊何藏之深也詔副車載之回車馳還而直入長樂宫行詔門著引籍通到謁太后太后曰帝倦矣何從來帝曰今者至長陵得臣姊與俱來顧曰謁太后太后曰女某邪曰是也太后為下泣女亦伏地泣武帝奉酒前為夀奉錢千萬奴婢三百人公田百頃甲第以賜姊太后謝曰為帝費焉於是召平陽主南宫主林慮主三人俱來謁見姊因號曰修成君有子男一人女一人男號為修成子仲女為諸侯王王后徐廣曰嫁為淮南王安太子妃也此二子非劉氏以故太后憐之修成子仲驕恣陵折吏民皆患苦之衛子夫立為皇后后弟衛青字仲卿以大將軍封為長平侯四子長子伉為侯世子侯世子常侍中貴幸其三弟皆封為侯各千三百户一曰隂安侯二曰發干侯三曰宜春侯貴震天下天下歌之曰生男無喜生女無怒獨不見衛子夫霸天下是時平陽主寡居嘗用列侯尚主主與左右議長安中列侯可為夫者皆言大將軍可主笑曰此出吾家常使令騎從我出入耳奈何用為夫乎左右侍御者曰今大將軍姊為皇后三子為侯富貴振動天下主何以易之乎於是主乃許之言之皇后令白之武帝乃詔衛將軍尚平陽公主焉褚先生曰丈夫龍變傳曰蛇化為龍不變其文家化為國不變其姓丈夫當時富貴百惡滅除光耀榮華貧賤之時何足纍之哉武帝時幸夫人尹婕妤邢夫人號娙娥衆人謂之娙何娙何秩比中二千石容華秩比二千石婕妤比列侯常從婕妤遷為皇后尹夫人與邢夫人同時並幸有詔不得相見尹夫人自請武帝願望見邢夫人帝許之即令他夫人飾從御者數十人為邢夫人來前尹夫人前見之曰此非邢夫人身也帝曰何以言之對曰視其身貌形狀不足以當人主矣於是帝乃詔使邢夫人衣故衣獨身來前尹夫人望見之曰此真是也於是乃低頭俯而泣自痛其不如也諺曰美女入室惡女之仇褚先生曰浴不必江海要之去垢馬不必騏驥要之善走士不必賢世要之知道女不必貴種要之貞好傳曰女無美惡入室見妒士無賢不肖入朝見嫉美女者惡女之仇豈不然哉鉤弋夫人姓趙氏河間人也得幸武帝生子一人昭帝是也武帝年七十乃生昭帝昭帝立時年五歲耳徐廣曰武帝崩年正七十昭帝年八歲耳衛太子廢後未復立太子而燕王旦上書願歸國入宿衛武帝怒立斬其使者於北闕上居甘泉宫召畫工圖畫周公負成王也於是左右羣臣知武帝意欲立少子也後數日帝譴責鉤弋夫人夫人脫簪珥叩頭帝曰引持去送掖庭獄夫人還顧帝曰趣行女不得活夫人死雲陽宫時暴風揚塵百姓感傷使者夜持棺往葬之封識其處其後帝間居問左右曰人言云何左右對曰人言且立其子何棄其母乎帝曰然是非兒曹愚人所知也往古國家所以亂也由主少母壯也女主獨居驕蹇淫亂自恣莫能禁也女不聞吕后邪故諸為武帝生子者無男女其母無不譴死豈可謂非賢聖哉昭然逺見為後世計慮固非淺聞愚儒之所及也諡為武豈虛哉史記集解卷四十九
