body:
  text: 史記集解卷六十二宋裴駰撰史記六十二管晏列傳第二管仲夷吾者潁上人也少時常與鮑叔牙游鮑叔知其賢管仲貧困常欺鮑叔鮑叔終善遇之不以為言已而鮑叔事齊公子小白管仲事公子糾及小白立為桓公公子糾死管仲囚焉鮑叔遂進管仲管仲既用任政于齊齊桓公以霸九合諸侯一匡天下管仲之謀也管仲曰吾始困時嘗與鮑叔賈分財利多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知時有利不利也吾嘗三仕三見逐于君鮑叔不以我為不肖知我不遭時也吾嘗三戰三走鮑叔不以我為怯知我有老母也公子糾敗召忽死之吾幽囚受辱鮑叔不以我為無恥知我不羞小節而恥功名不顯于天下也生我者父母知我者鮑子也鮑叔既進管仲以身下之子孫世祿于齊有封邑者十餘世常為名大夫天下不多管仲之賢而多鮑叔能知人也管仲既任政相齊以區區之齊在海濵通貨積財富國強兵與俗同好惡故其稱曰倉廪實而知禮節衣食足而知榮辱上服度則六親固四維不張國乃滅亡下令如流水之原令順民心故論卑而易行俗之所欲因而豫之俗之所否因而去之其為政也善因禍而為福轉敗而為功貴輕重慎權衡桓公實怒少姬南襲蔡管仲因而伐楚責包茅不入貢于周室桓公實北征山戎管仲因而令燕修召公之政于柯之㑹桓公欲背曹沫之約管仲因而信之諸侯由是歸齊故曰知與之為取政之寶也管仲富擬于公室有三歸反坫齊人不以為侈管仲卒齊國遵其政常彊于諸侯後百餘年而有晏子焉晏平仲嬰者萊之夷維人也劉向别録曰萊者今東萊地也事齊靈公莊公景公以節儉力行重于齊既相齊食不重肉妾不衣帛其在朝君語及之即危言語不及之即危行國有道即順命無道即衡命以此三世顯名于諸侯越石父賢在縲紲中晏子出遭之塗解左驂贖之載歸弗謝入閨久之越石父請絶晏子戄然攝衣冠謝曰嬰雖不仁免子于厄何子求絶之速也石父曰不然吾聞君子詘于不知己而信于知己者方吾在縲紲中彼不知我也夫子既已感寤而贖我是知己知己而無禮固不如在縲紲之中晏子于是延入為上客晏子為齊相出其御之妻從門間而窺其夫其夫為相御擁大蓋策駟馬意氣揚揚甚自得也既而歸其妻請去夫問其故妻曰晏子長不滿六尺身相齊國名顯諸侯今者妾觀其出志念深矣常有以自下者今子長八尺乃為人僕御然子之意自以為足妾是以求去也皇覽曰晏子冢在臨菑城南淄水南桓公冢西北其後夫自抑損晏子怪而問之御以實對晏子薦以為大夫太史公曰吾讀管氏牧民山髙乘馬輕重九府劉向别録曰九府書民間無有山髙一名形勢及晏子春秋詳哉其言之也既見其著書欲觀其行事故次其傳至其書世多有之是以不論論其軼事管仲世所謂賢臣然孔子小之豈以為周道衰微桓公既賢而不勉之至王乃稱霸哉語曰將順其美匡救其惡故上下能相親也豈管仲之謂乎方晏子伏莊公尸哭之成禮然後去豈所謂見義不為無勇者邪至其諫說犯君之顔此所謂進思盡忠退思補過者哉假令晏子而在余雖為之執鞭所欣慕焉史記集解卷六十二
