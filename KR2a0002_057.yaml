body:
  text: 史記集解卷五十九宋裴駰撰史記五十九五宗世家第二十九孝景皇帝子凡十三人為王而母五人同母者為宗親栗姬子曰榮德閼于程姬子曰餘非端賈夫人子曰彭祖勝唐姬子曰發王夫人兒姁子曰越寄乗舜河間獻王德以孝景帝前二年用皇子為河間王好儒學被服造次必於儒者山東諸儒多從之游二十六年卒漢名臣奏杜業奏曰河間獻王經術通明積德累行天下雄俊衆儒皆歸之孝武帝時獻王朝被服造次必於仁義間以五策獻王輒對無窮孝武帝艴然難之謂獻王曰湯以七十里文王百里王其勉之王知其意歸即縱酒聽樂因以終子共王不害立四年卒子剛王基代立十二年卒子頃王授代立臨江哀王閼于以孝景帝前二年用皇子為臨江王三年卒無後國除為郡臨江閔王榮以孝景前四年為皇太子四歲廢用故太子為臨江王四年坐侵廟壖垣為宫上徵榮榮行祖於江陵北門既已上車軸折車廢江陵父老流涕竊言曰吾王不反矣榮至詣中尉府簿中尉郅都責訊王王恐自殺葬藍田燕數萬銜土置冢上百姓憐之榮最長死無後國除地入于漢為南郡右三國本王皆栗姬之子也魯共王餘以孝景前二年用皇子為淮陽王二年吳楚反破後以孝景前三年徙為魯王好治宫室苑囿狗馬季年好音不喜辭辯為人吃二十六年卒子光代為王初好音輿馬晩節嗇惟恐不足於財江都易王非以孝景前二年用皇子為汝南王吳楚反時非年十五有材力上書願擊吳景帝賜非將軍印擊吳吳已破二歲徙為江都王治吳故國以軍功賜天子旌旗元光五年匈奴大入漢為賊非上書願擊匈奴上不許非好氣力治宫觀招四方豪桀驕奢甚立二十六年卒子建立為王七年自殺淮南衡山謀反時建頗聞其謀自以為國近淮南恐一日發為所并即隂作兵器而時佩其父所賜將軍印載天子旗以出易王死未葬建有所說易王寵美人淖姬蘇林曰淖音泥淖夜使人迎與姧服舎中及淮南事發治黨與頗及江都王建建恐因使人多持金錢事絶其獄而又信巫祝使人禱祠妄言建又盡與其娣弟姦事既聞漢公卿請捕治建天子不忍使大臣即訊王王服所犯遂自殺國除地入于漢為廣陵郡膠西于王端以孝景前三年吳楚七國反破後端用皇子為膠西王端為人賊戾又隂痿一近婦人病之數月而有愛幸少年為郎為郎者頃之與後宫亂端禽滅之及殺其子母數犯上法漢公卿數請誅端天子為兄弟之故不忍而端所為滋甚有司再請削其國去太半端心愠遂為無訾省蘇林曰為無所訾錄無所省録府庫壞漏盡腐財物以巨萬計終不得收徙令吏毋得收租賦端皆去衛封其宫門從一門出游數變名姓為布衣之他郡國相二千石往者奉漢法以治端輒求其罪告之無罪者詐藥殺之所以設詐究變彊足以距諫智足以飾非相二千石從王治則漢繩以法故膠西小國而所殺傷二千石甚衆立四十七年卒竟無男代後國除地入于漢為膠西郡右三國本王皆程姬之子也趙王彭祖以孝景前二年用皇子為廣川王趙王遂反破後彭祖王廣川四年徙為趙王十五年孝景帝崩彭祖為人巧佞卑諂足㳟而心刻深好法律持詭辯以中人彭祖多内寵姬及子孫相二千石欲奉漢法以治則害於王家是以每相二千石至彭祖衣皁布衣自行迎除二千石舎多設疑事以作動之得二千石失言中忌諱輒書之二千石欲治者則以此迫劫不聽乃上書告及汙以姦利事彭祖立五十餘年相二千石無能滿二嵗輒以罪去大者死小者刑以故二千莫敢治而趙王擅權使使即縣為賈人𣙜會韋昭曰平會兩家買賣之賈也𣙜者禁他家獨王家得為之入多於國經租稅以是趙王家多金錢然所賜姬諸子亦盡之矣彭祖取故江都易王寵姬王建所盗與姦淖姬者為姬甚愛之彭祖不好治宫室禨祥服䖍曰求福也好為吏事上書願督國中盗賊常夜從走卒行徼邯鄲中諸使過客以彭祖險陂莫敢留邯鄲其太子丹與其女及同産姊姦與客江充有卻充告丹丹以故廢趙更立太子中山靖王勝以孝景前三年用皇子為中山王十四年孝景帝崩勝為人樂酒好内有子枝屬百二十餘人常與兄趙王相非曰兄為王専代吏治事王者當日聽音樂聲色趙王亦非之曰中山王徒日淫不佐天子拊循百姓何以稱為藩臣立四十二年卒子哀王昌立一年卒子昆侈代為中山王右二國本王皆賈夫人之子也長沙定王𤼵𤼵之母唐姬故程姬侍者景帝召程姬程姬有所辟不願進而飾侍者唐兒使夜進上醉不知以為程姬而幸之遂有身已乃覺非程姬也及生子因命曰發以孝景前二年用皇子為長沙王以其母微無寵故王卑溼貧國應劭曰景帝後二年諸王來朝有詔更前稱夀歌舞定王但張袖小舉手左右笑其拙上怪問之對曰臣國小地狹不足廻旋帝以武陵零陵桂陽屬焉立二十七年卒子康王庸立二十八年卒子鮒鮈立服䖍曰鮈音拘為長沙王右一國本王唐姬之子也廣川恵王越以孝景中二年用皇子為廣川王十二年卒子齊立為王齊有幸臣桑距已而有罪欲誅距距亡王因禽其宗族距怨王乃上書告王齊與同産姦自是之後王齊數上書告言漢公卿及幸臣所忠等膠東康王寄以孝景中二年用皇子為膠東王二十八年卒淮南王謀反時寄微聞其事私作樓車鏃矢應劭曰樓車所以窺看敵國營壘之虚實也戰守備候淮南之起及吏治淮南之事辭出之如淳曰窮治其辭出此事寄於上最親徐廣曰其母武帝母妹意傷之發病而死不敢置後於是上問寄有長子者名賢母無寵少子名慶母愛幸寄常欲立之為不次因有過遂無言上憐之乃以賢為膠東王奉康王嗣而封慶於故衡山地為六安王膠東王賢立十四年卒諡為哀王子慶為王徐廣曰他本亦作慶字惟一本作建不宜得與叔父同名相承之誤六安王慶以元狩二年用膠東康王子為六安王清河哀王乘以孝景中三年用皇子為清河王十二年卒無後國除地入于漢為清河郡常山憲王舜以孝景中五年用皇子為常山王舜最親景帝少子驕怠多淫數犯禁上常寛釋之立三十二年卒太子勃代立為王初憲王舜有所不愛姬生長男梲蘇林曰音奪梲以母無寵故亦不得幸於王王后修生太子勃王内多所幸姬生子平子商王王后希得幸及憲王病甚諸幸姫常侍病故王后亦以妒媢不常侍病輒歸舎醫進藥太子勃不自嘗藥又不宿留侍病及王薨王后太子乃至憲王雅不以長子梲為人數及薨又不分與財物郎或說太子王后令諸子興長子梲共分財物太子王后不聽太子代立又不收恤梲梲怨王后太子漢使者視憲王喪梲自言憲王病時王后太子不侍及薨六日出舎如淳曰服舎也太子勃私姦飲酒博戲擊筑與女子載馳環城過市入牢視囚天子遣大行騫驗王后及問王勃請逮勃所與姦諸證左王又匿之吏求捕勃大急使人致撃笞掠擅出漢所疑囚者有司請誅憲王后修及王勃上以修素無行使梲陷之罪勃無良師𫝊不忍誅有司請廢王后修徙王勃以家屬處房陵上許之勃王數月遷于房陵國絶月餘天子為最親乃詔有司曰常山憲王蚤夭后妾不和適孽誣爭䧟于不義以滅國朕甚閔焉其封憲王子平三萬尸為真定王封子商三萬户為泗水王真定王平元鼎四年用常山憲王子為真定王泗水思王商以元鼎四年用常山憲王子為泗水王十一年卒子哀王安世立十一年卒無子於是上憐泗水王絶乃立安世弟賀為泗水王右四國本王皆王夫人兒姁子也其後漢益封其支子為六安王泗水王二國凡兒姁子孫於今為六王太史公曰髙祖時諸侯皆賦徐廣曰國所出有背入於王也得自除内史以下漢獨為置丞相黄金印諸侯自除御史廷尉正博士擬於天子自吳楚反後五宗王世漢為置二千石去丞相曰相銀印諸侯獨得食租稅奪之權其後諸侯貧者或乘牛車也史記集解卷五十九
