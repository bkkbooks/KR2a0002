body:
  text: 史記集解卷四十四宋裴駰撰史記四十四魏世家第十四魏之先畢公髙之後也畢公髙與周同姓武王之伐紂而髙封於畢杜預曰畢在長安縣西北於是為畢姓其後絶封為庶人或在中國或在夷狄其苗裔曰畢萬事晉獻公獻公之十六年趙夙為御畢萬為右以伐霍耿魏滅之以耿封趙夙以魏封畢萬為大夫卜偃曰畢萬之後必大矣萬滿數也魏大名也以是始賞天開之矣天子曰兆民諸侯曰萬民今命之大以從滿數其必有衆初畢萬卜事晉遇屯之比辛廖占之曰吉屯固比入吉孰大焉其必蕃昌畢萬封十一年晉獻公卒四子爭更立晉亂而畢萬之世彌大從其國名為魏氏生武子魏武子以魏諸子事晉公子重耳晉獻公之二十一年武子從重耳出亡十九年反重耳立為晉文公而令魏武子襲魏氏之後封列為大夫治於魏生悼子魏悼子徙治霍生魏絳魏絳事晉悼公悼公三年會諸侯悼公弟楊干亂行魏僇辱楊干悼公怒曰合諸侯以為榮今辱吾弟將誅魏絳或説悼公悼公止卒任魏絳政使和戎翟戎翟親附悼公之十一年曰自吾用魏絳八年之中九合諸侯戎翟和子之力也賜之樂三讓然後受之徙治安邑魏絳卒諡為昭子徐廣曰世本曰莊子生魏嬴嬴生魏獻子獻子事晉昭公昭公卒而六卿強公室卑晉頃公之十二年韓宣子老魏獻子為國政晉宗室祁氏羊舌氏相惡六卿誅之盡取其邑為十縣六卿各令其子為之大夫獻子與趙簡子中行文子范獻子竝為晉卿其後十四歳而孔子相魯後四歳趙簡子以晉陽之亂也而與韓魏共攻范中行氏魏獻子生魏侈魏侈與趙鞅共攻范中行氏魏侈之孫曰魏桓子與韓康子趙襄子共伐滅知伯分其地桓子之孫曰文侯都徐廣曰世本曰斯也魏文侯元年秦靈公之元年也與韓武子趙桓子周威王同時六年城少梁十三年使子擊圍繁龐出其民十六年伐秦築臨晉元里十七年伐中山使子擊守之趙倉唐𫝊之子擊逢文侯之問田子方於朝歌引車避下謁田子方不為禮子擊因問曰富貴者驕人乎且貧賤者驕人乎子方曰亦貧賤者驕人耳夫諸侯而驕人則失其國大夫而驕人則失其家貧賤者行不合言不用則去之楚越若脱躧然奈何其同之哉子擊不懌而去西攻秦至鄭而還築雒隂合陽二十一年魏趙韓列為諸侯二十四年秦伐我至陽狐二十五年子擊生子罃文侯受子夏經藝客段干木過其閭未嘗不軾也秦嘗欲伐魏或曰魏君賢人是禮國人稱仁上下和合未可圖也文侯由此得譽於諸侯任西門豹守鄴而河内稱治魏文侯謂李克曰先生嘗教寡人曰家貧則思良妻國亂則思良相今所置非成則璜徐廣曰文侯弟名成二子何如李克對曰臣聞之卑不謀尊䟱不謀戚臣在闕門之外不敢當命文侯曰先生臨事勿讓李克曰君不察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉文侯曰先生就舍寡人之相定矣李克趨而出過翟璜之家翟璜曰今者聞君召先生而卜相果誰為之李克曰魏成子為相矣翟璜忿然作色曰以耳目之所覩記臣何負於魏成子西河之守臣之所進也君内以鄴為憂臣進西門豹君謀欲伐中山臣進樂羊中山已拔無使守之臣進先生君之子無傅臣進屈侯鮒臣何以負於魏成子李克曰且子之言克於子之君者豈將比周以求大官哉君問而置相非成則璜二子何如克對曰君不察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉是以知魏成子之為相也且子安得與魏成子比乎魏成子以食禄千鍾什九在外什一在内是以東得卜子夏田子方段干木此三人者君皆師之子之所進五人者君皆臣之子惡得與魏成子比也翟璜逡巡再拜曰璜鄙人也失對願卒為弟子二十六年虢山崩壅河徐廣曰在陜駰案地理志曰𢎞農陜縣故虢國北虢在太陽東虢在滎陽三十二年伐鄭城酸棗敗秦於注司馬彪曰河南梁縣有注城也三十五年齊伐取我襄陵徐廣曰今在南平陽縣也三十六年秦侵我隂晉徐廣曰今之華隂三十八年伐秦敗我武下得其將識是歲文侯卒子擊立是為武侯魏武侯元年趙敬侯初立公子朔為亂不勝奔魏與魏襲邯鄲魏敗而去二年城安邑王垣徐廣曰垣縣有王屋山也七年伐齊至桑丘九年翟敗我於澮使吳起伐齊至靈丘齊威王初立十一年與韓趙三分晉地滅其後十三年秦獻公縣櫟陽十五年敗趙北藺十六年伐楚取魯陽武侯卒子罃立是為惠王惠王元年初武侯卒也子罃與公中緩爭為太子公孫頎自宋入趙自趙入韓謂韓懿侯曰魏罃與公中緩爭為太子君亦聞之乎今魏罃得王錯徐廣曰汲冢紀年惠王二年魏大夫王錯出奔韓也挾上黨固半國也因而除之徐廣曰除一作倍破魏必矣不可失也懿侯説乃與趙成侯合軍并兵以伐魏戰於濁澤徐廣曰長社有濁澤魏氏大敗魏君為趙謂韓曰除魏君立公中緩割地而退我且利韓曰不可殺魏君人必曰暴割地而退人必曰貪不如兩分之魏分為兩不強於宋衛則我終無魏之患矣趙不聽韓不説以其少卒夜去惠王之所以身不死國不分者二家謀不和也若從一家之謀則魏必分矣故曰君終無適子其國可破也二年魏敗韓於馬陵敗趙於懷三年齊敗我觀徐廣曰齊世家云獻觀以和齊年表曰伐魏取觀今之衛縣也五年與韓會宅陽城武堵為秦所敗徐廣曰秦年表曰敗韓魏洛陰六年我取宋儀臺徐廣曰一作義臺九年伐敗韓於澮與秦戰少梁虜我將公孫痤徐廣曰年表云虜我太子也取龐秦獻公卒子孝公立十年伐取趙皮牢彗星見十二年星晝墜有聲十四年與趙會鄗十五年魯衛宋鄭君來朝十六年與秦孝公會社平侵宋黄池宋復取之十七年與秦戰元里秦取我少梁圍趙邯鄲十八年拔邯鄲趙請救於齊齊使田忌孫臏救趙敗魏桂陵十九年諸侯圍我襄陵築長城塞固陽二十年歸趙邯鄲與盟漳水上二十一年與秦會彤趙成侯卒徐廣曰年表云二十七年丹封名會丹魏大臣也二十八年齊威王卒中山君相魏三十年魏伐趙趙告急齊齊宣王用孫子計救趙撃魏魏遂大興師使龐涓將而令太子申為上將軍過外黄外黃徐子劉向别録曰徐子外黃人也外黄時屬宋謂太子曰臣有百戰百勝之術太子曰可得聞乎客曰固願効之曰太子自將攻齊大勝并莒則富不過有魏貴不益為王若戰不勝齊則萬世無魏矣此臣之百戰百勝之術也太子曰諾請必從公之言而還矣客曰太子雖欲還不得矣彼勸太子戰攻欲啜汁者衆太子雖欲還恐不得矣太子因欲還其御曰將出而還與北同太子果與齊人戰敗於馬陵徐廣曰在元城齊虜太子申殺將軍涓軍遂大破三十一年秦趙齊共伐我秦將商君詐我將軍公子卬而襲奪其軍破之秦用商君東地至河而齊趙數破我安邑近秦於是徙治大梁徐廣曰今浚儀駰案汲冢紀年曰梁惠成王九年四月甲寅徙都大梁也以公子赫為太子三十三年秦孝公卒商君亡秦歸魏魏怒不入三十五年與齊宣王會平阿南地理志沛郡有平阿縣也惠王數敗於軍旅卑禮厚幣以招賢者鄒衍淳于髠孟軻皆至梁梁惠王曰寡人不佞兵三折於外太子虜上將死國以空虚以羞先君宗廟社稷寡人甚醜之叟不逺千里劉熙曰叟長老之稱依皓首之言辱幸至敝邑之廷將何以利吾國孟軻曰君不可以言利若是夫君欲利則大夫欲利大夫欲利則庶人欲利上下爭利國則危矣為人君仁義而已矣何以利為三十六年復與齊王會甄是歳惠王卒子襄王立襄王元王與諸侯會徐州徐廣曰今薛縣相王也追尊父惠王為王徐廣曰二年伐趙五年秦敗我龍賈軍四萬五千於彫隂徐廣曰在上郡圍我焦曲沃予秦河西之地六年與秦會應徐廣曰潁川父城有應鄉也秦取我汾隂皮氏焦魏伐楚敗之陘山徐廣曰在密縣七年魏盡入上郡於秦秦降我蒲陽八年秦歸我焦曲沃十二年楚敗我襄陵諸侯執政與秦相張儀會齧桑徐廣曰在梁與彭城之間十三年張儀相魏魏有女子化為丈夫秦取我曲沃平周十六年襄王卒子哀王立張儀復歸秦荀朂曰和嶠云紀年起自黄帝終於魏之今王今王者魏惠成王子案太史公書惠成王但言惠王惠王子曰襄王襄王子曰哀王惠王三十六年卒襄王立十六年卒并惠襄為五十二年今案古文惠成王立三十六年改元稱一年改元後十七年卒太史公書為誤分惠成之世以為二王之年數也世本惠王生襄王而無哀王然則今王者魏襄王也哀王元年五國共攻秦不勝而去二年齊敗我觀津五年秦使樗里子伐取我曲沃走犀首岸門徐廣曰潁隂有岸亭六年秦求立公子政為太子與秦會臨晉七年攻齊徐廣曰年表云擊齊虜贅子於濮也與秦伐燕八年伐衛拔列城二衛君患之如耳見衛君曰請罷魏兵免成陵君可乎衛君曰先生果能孤請世世以衛事先生如耳見成陵君曰昔者魏伐趙斷羊腸抜閼與徐廣曰在上黨約斬趙趙分而為二所以不亡者魏無從主也今衛已迫亡將西請事於秦與其以秦醳衛不如以魏醳衛衛之徳魏必終無窮成陵君曰諾如耳見魏王曰臣有謁於衛衛故周室之别也其稱小國多寶器今國迫於難而寶器不出者其心以為攻衛醳衛不以王為主故寶雖出必不入於王也臣竊料之先言醳衛者必受衛者也如耳出成陵君入以其言見魏王魏王聽其説罷其兵免成陵君終身不見九年與秦王會臨晉張儀魏章皆歸於魏魏相田需死楚害張儀犀首薛公楚相昭魚謂蘇代曰田需死吾恐張儀犀首薛公有一人相魏者也代曰然相者欲誰而君便之昭魚曰吾欲太子之自相也代曰請為君北必相之昭魚曰奈何對曰君其為梁王代請説君昭魚曰奈何對曰代也從楚來昭魚甚憂曰田需死吾恐張儀犀首薛公有一人相魏者也代曰梁王長主也必不相張儀張儀相必右秦而左魏犀首相必右韓而左魏薛公相必右齊而左魏梁王長主也必不便也王曰然則寡人孰相代曰莫若太子之自相太子之自相是三人者皆以太子為非常相也皆將務以其國事魏欲得丞相璽也以魏之強而三萬乘之國輔之魏必安矣故曰莫若太子之自相也遂北見梁王以此告之太子果相魏十年張儀死十一年與秦武王會應十二年太子朝於秦秦來伐我皮氏未拔而解十四年秦來歸武王后十六年秦拔我蒲反陽晉封陵十七年與晉會臨晉秦予我蒲反十八年與秦伐楚徐廣曰二十年與齊王會於韓二十一年與齊韓共敗秦軍函谷徐廣曰河渭絶一日二十三年秦復予我河外及封陵為和哀王卒子昭王立昭王元年秦拔我襄城二年與秦戰我不利三年佐韓攻秦秦將白起敗我軍伊闕二十四萬六年予秦河東地方四百里芒卯以詐重七年秦拔我城大小六十一八年秦昭王為西帝齊湣王為東帝月餘皆復稱王歸帝九年秦拔我新垣曲陽之城十年齊滅宋宋王死我温十二年與秦趙韓燕共伐齊敗之濟西湣王出亡燕獨入臨菑與秦王會西周十三年秦拔我安城兵到大梁去徐廣曰十四年大水十八年秦拔郢楚王徙陳十九年昭王卒子安釐王立安釐王元年秦拔我兩城二年又拔我二城軍大梁下韓來救予秦温以和三年秦拔我四城斬首四萬四年秦破我及韓趙殺十五萬人走我將芒卯魏將段干木請予秦南陽徐廣曰在修武以和蘇代謂魏王曰欲璽者段干子也欲地者秦也今王使欲地者制璽使欲璽者制地魏氏地不盡則不知己且夫以地亊秦譬猶抱薪救火薪不盡火不滅王曰是則然也雖然事始已行不可更矣對曰王獨不見夫博之所以貴梟者便則食不便則止矣今王曰事始已行不可更是何王之用智不如用梟也九年秦拔我懷十年秦太子外質於魏死十一年秦拔我郪丘徐廣曰郪丘一作廩丘又作邢丘郪丘今為宋公孫秦昭王謂左右今時韓魏與始孰強對曰不如始強王曰今時如耳魏齊與孟嘗芒卯孰賢對曰不如王曰以孟嘗芒卯之賢率強韓魏以攻秦猶無奈寡人何也今以無能之如耳魏齊而率弱韓魏以伐秦其無奈寡人何亦明矣左右皆曰甚然中旗馮琴對曰王之料天下過矣當晉六卿之時知氏最強滅范中行又率韓魏之兵以圍趙襄子於晉陽決晉水以灌晉陽之城不湛者三版知伯行水魏桓子御韓康子為參乘知伯曰吾始不知水之可以亡人之國也乃今知之汾水可以灌安邑絳水可以灌平陽魏桓子肘韓康子韓康子履魏桓子肘足接於車上而知氏地分身死國亡為天下笑今秦兵雖強不能過知氏韓魏雖弱尚賢其在晉陽之下也此方其用肘足之時也願王之必勿易也於是秦王恐齊楚相約而攻魏魏使人求救於秦冠葢相望也而秦救不至魏人有唐雎者年九十餘矣謂魏王曰老臣請西説秦王令兵先臣出魏王再拜遂約車而遣之唐雎到入見秦王秦王曰丈人芒然乃逺至此甚苦矣夫魏之來求救數矣寡人知魏之急已唐雎對曰大王已知魏之急而救不發者臣竊以為用策之臣無任矣夫魏一萬乘之國也然所以西面而事秦稱東藩受冠帶祠春秋者以秦之彊足以為與也今齊楚之兵已合於魏郊矣而秦救不發亦將賴其未急也使之大急使且割地而約從王尚何救焉必待其急而救之是失一東藩之魏而彊二敵之齊楚則王何利焉於是秦昭王遽為發兵救魏魏氏復定趙使人謂魏王曰為我殺范痤吾請獻七十里之地魏王曰諾使吏捕之圍而未殺痤因上屋騎危危棟上也謂使者曰與其以死痤市不如以生痤市有如痤死趙不與王地則王將奈何故不若與先定割地然後殺痤魏王曰善痤因上書信陵君曰痤故魏之免相也趙以地殺痤而魏王聽之有如彊秦亦將襲趙之欲則君且奈何信陵君言於王而出之魏王以秦救之故欲親秦而伐韓以求故地無忌謂魏王曰秦與戎翟同俗有虎狼之心貪戻好利無信不識禮義徳行茍有利焉不顧親戚兄弟若禽獸耳此天下之所識也非有所施厚積徳也故太后母也而以憂死穰侯舅也功莫大焉而竟逐之兩地無罪而再奪之國此於親戚若此而況於仇讎之國乎今王與秦共伐韓而益近秦患臣甚惑之而王不識則不明羣臣莫以聞則不忠今韓氏以一女子奉一弱主内有大亂外交彊秦魏之兵王以為不亡乎韓亡秦有鄭地與大梁鄰王以爲安乎王欲得故地今負彊秦之親王以為利乎秦非無事之國也韓亡之後必將更事更事必就易與利就易與利必不伐楚與趙矣是何也夫越山踰河絶韓上黨而攻彊趙是復閼與之事秦必不為也若道河内倍鄴朝歌絶漳滏水與趙兵決於邯鄲之郊是知伯之禍也秦又不敢伐楚道涉山谷行三千里而攻冥阨之塞孫檢曰楚之險塞也徐廣曰或以為今江夏鄳縣所行甚逺所攻甚難秦又不為也若道河外倍大梁右蔡左徐廣曰一無此字召陵與楚兵決於陳郊秦又不敢故曰秦必不伐楚與趙矣又不攻衛與齊矣夫韓亡之後兵出之日非魏無攻已秦固有懐茅徐廣曰在脩武軹縣有茅亭邢邱城垝津以臨河内河内共汲必危徐廣曰汲縣屬河内有鄭地徐廣曰成皋滎陽亦屬鄭得垣雍徐廣曰垣雍城在卷縣卷縣屬魏也卷縣又有長城經陽武到密者也決滎澤水灌大梁大梁必亡王之使者出過而惡安陵氏於秦徐廣曰召陵有安陵鄉征羌有安陵亭也秦之欲誅之乆矣秦葉陽昆陽與舞陽鄰聽使者之惡之隨安陵氏而亡之繞舞陽之北以東臨許南國必危國無害己夫憎韓不愛安陵氏可也夫不患秦之不愛南國非也異日者秦在河西晉國去梁千里徐廣曰魏國之界千里又云河南梁縣有注城有河山以闌之有周韓以間之從林鄉軍徐廣曰林鄉在宛縣以至於今秦七攻魏五入囿中徐廣曰一作城也邊城盡拔文臺墮垂都焚徐廣曰一云魏山都焚句陽有垂亭林木伐麋鹿盡而國繼以圍又長驅梁北東至陶衛之郊北至平監徐廣曰平縣屬河南平或作乎字史記齊闞止作監字闞在東平須昌縣所亡於秦者山南山北河外河内大縣數十徐廣曰一作百名郡數百徐廣曰一作十秦乃在河西晉去梁千里而禍若是矣又況於使秦無韓有鄭地無河山而闌之無周韓而間之去大梁百里禍必由此矣異日者從之不成也楚魏疑而韓不可得也今韓受兵三年秦橈之以講識亡不聽投質於趙請為天下鴈行頓刃楚趙必集兵皆識秦之欲無窮也非盡亡天下之國而臣海内必不休矣是故臣願以從事王王速受楚趙之約趙挾韓之質以存韓而求故地韓必効之此士民不勞而故地得其功多於與秦共伐韓而又與彊秦鄰之禍也夫存韓安魏而利天下此亦王之天時已通韓上黨於共寗徐廣曰朝歌有寗鄉使道安成出入賦之是魏重質韓以其上黨也今有其賦足以富國韓必徳魏愛魏重魏畏魏韓必不敢反魏是韓則魏之縣也魏得韓以為縣衛大梁河外必安矣今不存韓二周安陵必危楚趙大破衛甚畏天下西鄉而馳秦入朝而為臣不乆矣二十年秦圍邯鄲信陵君無忌矯奪將軍晉鄙兵以救趙趙得全無忌因留趙二十六年秦昭王卒三十年無忌歸魏率五國兵攻秦敗之河内走䝉驁魏太子增質於秦秦怒欲囚魏太子增或為增謂秦王曰公孫喜固謂魏相曰請以魏疾擊秦秦王怒必囚增魏王又怒擊秦秦必傷今王囚增是喜之計中也故不若貴增而合魏以疑之於齊韓秦乃止增三十一年秦王政初立三十四年安釐王卒太子増立是為景湣王信陵君無忌卒景湣王元年秦拔我二十城以為秦東郡二年秦拔我朝歌衛徙野王徐廣曰衛徙漢陽徙野王三年秦拔我汲五年秦拔我垣蒲陽衍徐廣曰十二年獻城秦十五年景湣王子王假立王假元年燕太子丹使荆軻刺秦王秦王覺之徐廣曰二年新鄭反三年秦灌大梁虜王假列女傳曰秦殺假遂滅魏以為郡縣太史公曰吾適故大梁之墟墟中人曰秦之破梁引河溝而灌大梁三月城壞王請降遂滅魏説者皆曰魏以不用信陵君故國削弱至於亡余以為不然天方令秦平海内其業未成魏雖得阿衡之佐曷益乎史記集解卷四十四
