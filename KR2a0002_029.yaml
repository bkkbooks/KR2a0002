body:
  text: 史記集解卷三十一宋裴駰撰史記三十一吳太伯世家第一吳太伯太伯弟仲雍皆周太王之子而王季歷之兄也季歷賢而有聖子昌太王欲立季歷以及昌於是太伯仲雍二人乃奔荆蠻文身斷髮示不可用以避季歷季歷果立是為王季而昌為文王太伯之奔荆蠻自號句吳荆蠻義之從而歸之千餘家立為吳太伯太伯卒無子弟仲雍立是為吳仲雍仲雍卒子季簡立季簡卒子叔達立叔達卒子周章立是時周武王克殷求太伯仲雍之後得周章周章已君吳因而封之乃封周章弟虞仲於周之北故夏虛是為虞仲列為諸侯周章卒子熊遂立熊遂卒子柯相立柯相卒子強鳩夷立強鳩夷卒子餘橋疑吾立餘橋疑吾卒子柯盧立柯盧卒子周繇立周繇卒子屈羽立屈羽卒子夷吾立夷吾卒子禽處立禽處卒子轉立轉卒子頗髙立頗髙卒子句卑立是時晉獻公滅周北虞公以開晉伐虢也句卑卒子去齊立去齊卒子夀夢立夀夢立而吳始益大稱王自太伯作吳五世而武王克殷封其後為二其一虞在中國其一吳在夷蠻十二世而晉滅中國之虞中國之虞滅二世而夷蠻之吳興太凡從太伯至夀夢十九世王夀夢二年楚之亡大夫申公巫臣怨楚將子反而奔晉自晉使吳教吳用兵乘車令其子為吳行人服虔曰行人掌國賔客之禮籍以待四方之使賔大客受小客之幣辭吳於是始通於中國吳伐楚十六年楚共王伐吳至衡山杜預曰吳興烏程縣南也二十五年王夀夢卒夀夢有子四人長曰諸樊次曰餘祭次曰餘昧次曰季札季札賢而夀夢欲立之季札讓不可於是乃立長子諸樊攝行事當國王諸樊元年世本曰諸樊徙吳也諸樊已除喪讓位季札季札謝曰曹宣公之卒也諸侯與曹人不義曹君服虔曰宣公曹伯盧也以魯成公十三年會晉侯伐秦卒于師曹君公子負芻也負芻在國聞宣公卒殺太子而自立故曰不義之也將立子臧子臧去之以成曹君服虔曰子臧負芻庶兄君子曰能守節矣君義嗣王肅曰義宜也嫡子嗣國得禮之宜杜預曰諸樊嫡子故曰義嗣誰敢干君有國非吾節也札雖不材願附於子臧之義吳人固立季札季札棄其室而耕乃舍之秋吳伐楚楚敗我師四年晉平公初立十三年王諸樊卒有命授弟餘祭欲傳以次必致國於季札而止以稱先王夀夢之意且嘉季札之義兄弟皆欲致國令以漸至焉季札封於延陵故號曰延陵季子王餘祭三年齊相慶封有罪自齊來奔吳吳豫慶封朱方之縣吳地記曰朱方秦改曰丹徒以為奉邑以女妻之富於在齊四年吳使季札聘於魯在春秋魯襄公二十九年請觀周樂服虔曰周樂魯所受四代之樂也杜預曰魯以周公故有天子禮樂為歌周南召南杜預曰此皆各依其本國歌所常用聲曲曰美哉始基之矣王肅曰言始造王基也猶未也賈逵曰言未有雅頌之成功也杜預曰猶有商紂未盡善也然勤而不怨杜預曰未能安樂然其音不怨怒歌邶鄘衛杜預曰武王伐紂分其地為三監三監叛周公滅之并三監之地更封康叔故三國盡被康叔之化曰美哉淵乎憂而不困者也賈逵曰淵深也杜預曰亡國之音哀以思其民困衛康叔武公德化深逺雖遭宣公淫亂懿公滅亡民猶秉義不至於困也吾聞衛康叔武公之德如是是其衛風乎賈逵曰康叔遭管叔蔡叔之難武公罹幽王褒姒之憂故曰康叔武公之德如是杜預曰康叔武公皆衛之令德君也聽聲以為别故有疑言歌王服虔曰王室當在雅衰微而列在風故國人猶尊之故稱王猶春秋之王人也杜預曰王黍離也曰美哉思而不懼其周之東乎服虔曰平王東遷雒邑杜預曰宗周殞滅憂思猶有先王之遺風故不懼也歌鄭賈逵曰鄭風東鄭是曰其細已甚民不堪也是其先亡乎服虔曰其風細弱已甚攝於大國之間亡逺慮持久之風故曰民不堪將先亡也歌齊曰美哉泱泱乎大風也哉服虔曰泱泱舒緩深逺有大和之意其詩風刺辭約而義微體疏而不切故曰大風表東海者其太公乎王肅曰言為東海之表式國未可量也服虔曰國之興衰世數長短未可量也杜預曰言其或將復興歌豳曰美哉蕩蕩乎樂而不淫賈逵曰蕩然無憂自樂而不荒淫也其周公之東乎杜預曰周公遭管蔡之變東征為成王陳后稷先公不敢荒淫以成王業故言其周公東乎歌秦曰此之謂夏聲夫能夏則大大之至也其周之東乎杜預曰秦仲始有車馬禮樂去戎狄之音而有諸夏之聲故謂之夏聲及襄公佐周平王東遷而受其故地故曰周之舊也歌魏曰美哉渢渢乎大而婉儉而易行以德輔此則盟主也徐廣曰盟一作明駰案賈逵曰其志大直而有曲體歸中和中庸之德難成而實易行故曰以德輔此則盟主也杜預曰惜其國小而無明君歌唐曰思深哉其有陶唐氏之遺風乎不然何憂之逺也杜預曰晉本唐國故有堯之遺風憂深思逺情發於聲也非令德之後誰能若是歌陳曰國無主其能久乎杜預曰淫聲放蕩無所畏忌故曰國無主自鄶以下無譏焉服虔曰鄶以下及曹風也其國小無所刺譏歌小雅杜預曰小雅小正亦樂歌之章曰美哉思而不二杜預曰思文武之德無二叛之心也怨而不言王肅曰非不能言畏罪咎也其周德之衰乎杜預曰衰小也猶有先王之遺民也杜預曰謂有殷王餘俗故未大歌大雅杜預曰大雅陳文王之德以正天下曰廣哉熙熙乎杜預曰熙熙和樂聲曲而有直體杜預曰論其聲其文王之德乎歌頌杜預曰頌者以其成功告於神明曰至矣哉賈逵曰言道備至也直而不倨杜預曰倨傲也曲而不詘杜預曰詘撓也近而不逼杜預曰謙退也逺而不攜杜預曰攜二也遷而不淫服虔曰遷徙也文王徙酆武王居鄗杜預曰淫過蕩也復而不厭杜預曰常日新也哀而不愁杜預曰知命也樂而不荒杜預曰節之以禮也用而不匱杜預曰德𢎞大廣而不宣杜預曰不自顯也施而不費杜預曰因民所利而利之取而不貪杜預曰義然後取處而不底杜預曰守之以道行而不流杜預曰制之以義五聲和八風平杜預曰宮商角徵羽謂之五聲八方之氣謂之八風節有度守有序杜預曰八音克諧節有度也無相奪倫守有序也盛德之所同也杜預曰頌有殷魯故曰盛德之所同見舞象簫南籥者賈逵曰象文王之樂武象也也簫舞曲也南籥以籥舞曰美哉猶有憾服虔曰憾恨也恨不及已以伐紂而致太平也見舞大武賈逵曰大武周公所作武王樂也曰美哉周之盛也其若此乎見舞韶護者賈逵曰韶護殷成湯樂大護也曰聖人之𢎞也賈逵曰𢎞大也猶有慙德聖人之難也服虔曰慙於始伐而無聖佐故曰聖人之難也見舞大夏賈逵曰夏禹之樂大夏也曰美哉勤而不德服虔曰禹勤其身以治水土也非禹其誰能及之見舞招簫服虔曰有虞氏之樂大韶也曰德至矣哉大矣服虔曰至帝王之道極於韶也盡美盡善也如天之無不燾也賈逵曰燾覆也如地之無不載也雖甚盛德無以加矣觀止矣若有他樂吾不敢觀服虔曰周用六代之樂堯曰咸池黃帝曰雲門魯受四代下周二等故不舞其二季札知之故曰有他樂吾不敢請去魯遂使齊説晏平仲曰子速納邑與政服虔曰入邑與政職於公不與國家之事無邑無政乃免於難齊國之政將有所歸未得所歸難未息也故晏子因陳桓子以納政與邑是以免於欒髙之難難在魯昭公八年去齊使於鄭見子産如舊交謂子産曰鄭之執政侈難將至矣政必及子子為政慎以禮服虔曰禮所以經國家利社稷也不然鄭國將敗去鄭適衛説蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子未有患也自衛如晉將舍於宿左傳曰將宿於戚聞鐘聲服虔曰孫文子鼓鐘作樂也曰異哉吾聞之辨而不德必加於戮服虔曰辨若鬬辨也夫以辨爭不以德居之必加於刑戮也夫子獲罪於君以在此賈逵曰夫子孫文子也獲罪出獻公以戚畔也懼猶不足而又可以畔乎夫子之在此猶燕之巢于幕也王肅曰言至危也君在殯而可以樂乎賈逵曰衛君獻公棺在殯未葬遂去之文子聞之終身不聽琴瑟服虔曰聞義而改也琴瑟不聽况於鐘鼓乎適晉説趙文子韓宣子魏獻子曰晉國其萃於三家乎服虔曰言晉國之祚將集於三家將去謂叔向曰吾子勉之君侈而多良大夫皆富政將在三家杜預曰富必厚施故政在三家也吾子直服虔曰直不能曲撓以從衆必思自免於難季札之初使北過徐君徐君好季札劎口弗敢言季札心知之為使上國未獻還至徐徐君已死於是乃解其寶劒繫之徐君冢樹而去從者曰徐君已死尚誰豫乎季子曰不然始吾心已許之豈以死倍吾心哉七年楚公子圍弒其王夾敖而代立是為靈王十年楚靈王會諸矦而以伐吳之朱方以誅齊慶封吳亦攻楚取三邑而去左傳曰吳伐楚入棘櫟麻以報朱方之役十一年楚伐吳至􅟔婁服虔曰􅟔婁楚之東邑十二年楚復來伐次於乾溪杜預曰乾溪在譙國城父縣南楚東境楚師敗走十七年王餘祭卒弟餘昧立王餘昧二年楚公子棄疾弒其君靈王代立焉四年王餘昧卒欲授弟季札季札讓逃去於是吳人曰先王有命兄卒弟代立必致季子季子今逃位則王餘昧後立今卒其子當代乃立王餘昧之子僚為王王僚二年公子光伐楚徐廣曰世本曰夷昧生光吳越春秋曰王僚夷昧子與史記同敗而亡王舟光懼襲楚復得王舟而還左傳曰舟名餘皇五年楚之亡臣伍子胥來奔公子光客之公子光者王諸樊之子也常以為吾父兄弟四人當傳至季子季子即不受國光父先立即不傳季子光當立陰納賢士欲以襲王僚八年吳使公子光伐楚敗楚師迎楚故太子建毋於居巢以歸因北伐敗陳蔡之師九年公子光伐楚拔居巢鍾離服虔曰鍾離州來西邑也初楚邊邑卑梁氏之處女與吳邊邑之女爭桑二女怒相滅兩國邊邑長聞之怒而相攻滅吳之邊邑吳王怒故遂伐楚取兩都而去伍子胥之初奔吳説吳王僚以伐楚之利公子光曰胥之父兄為僇於楚欲自報其仇耳未見其利於是伍貟知光有他志服虔曰欲取國乃求勇士專諸賈逵曰吳勇士見之光光喜乃客伍子胥子胥退而耕於野以待專諸之事十二年冬楚平王卒十三年春吳欲因楚喪而伐之使公子蓋餘燭庸賈逵曰二公子皆吳王僚之弟以兵圍楚之六灊杜預曰灊在廬江六縣西南使季札於晉以觀諸侯之變服虔曰察強弱楚發兵絶吳兵後吳兵不得還於是吳公子光曰此時不可失也服虔曰時言可殺王時也告專諸曰不索何獲服虔曰不索當何時得也我真王嗣當立吾欲求之季子雖至不吾廢也王肅曰聘晉還至也專諸曰王僚可殺也母老子弱服虔曰母老子弱専諸託其母子於光也王肅曰専諸言王母老子弱也而兩公子將兵攻楚楚絶其路方今吳外困於楚而內空無骨鯁之臣是無奈我何光曰我身子之身也服虔曰言我身猶爾身也四月丙子光伏甲士於窟室杜預曰掘地為室也而謁王僚飲王僚使兵陳於道自王宫至光之家門階户席皆王僚之親也人夾持鈹音披公子光詳為足疾入于窟室杜預曰恐難作王黨殺已素避之也使專諸置匕首於炙魚之中服虔曰全魚炙也以進食手匕首刺王僚鈹交於胸賈逵曰交専諸胸也遂弒王僚公子光竟代立為王是為吳王闔廬闔廬乃以專諸子為卿季子至曰苟先君無廢祀民人無廢主社稷有奉乃吾君也吾敢誰怨乎哀死事生以待天命服虔曰待其天命之終也非我生亂立者從之先人之道也杜預曰吳自諸樊已下兄弟相傳而不立適是亂由先人起也季子自知力不能討光故云復命哭僚墓服虔曰復命於僚哭其墓也復位而待杜預曰復本位待光命吳公子燭庸蓋餘二人將兵遇圍於楚者聞公子光弒王僚自立乃以其兵降楚楚封之於舒王闔廬元年舉伍子胥為行人而與謀國事楚誅伯州犂其孫伯嚭披美反亡奔吳徐廣曰伯嚭州犂孫也史記與吳越春秋同吳以為大夫三年吳王闔廬與子胥伯嚭將兵伐楚拔舒殺吳亡將二公子光謀欲入郢將軍孫武曰民勞未可待之四年伐楚取六與灊五年伐越敗之六年楚使子常囊瓦伐吳迎而擊之大敗楚軍於豫章取楚之居巢而還九年吳王闔廬謂伍子胥孫武曰始子之言郢未可入今果如何二子對曰楚將子常貪而唐蔡皆怨之王必欲大伐必得唐蔡乃可闔廬從之悉興師與唐蔡西伐楚至於漢水楚亦發兵拒吳夾水陳吳王闔廬弟夫槩欲戰闔廬弗許夫槩曰王已屬臣兵兵以利為上尚何待焉遂以其部五千人襲冒楚楚兵大敗走於是吳王遂縱兵追之北至郢五戰楚五敗楚昭王亡出郢奔鄖服虔曰鄖楚縣鄖公弟欲弒昭王昭王與鄖公奔隨服虔曰隨楚與國也而吳兵遂入郢子胥伯嚭鞭平王之尸以報父讐十年春越聞吳王之在郢國空乃伐吳吳使别兵擊越楚告急秦秦遣兵救楚擊吳吳師敗闔廬弟夫槩見秦越交敗吳吳王留楚不去夫槩亡歸吳而自立為吳王闔廬聞之乃引兵歸攻夫槩夫槩敗奔楚楚昭王乃得以九月復入郢而封夫槩於堂溪為堂溪氏司馬彪曰汝南吳房有堂溪亭十一年吳王使太子夫差伐楚取番楚恐而去郢徙鄀服虔曰鄀楚邑十五年孔子相魯十九年夏吳伐越越王勾踐迎擊之檇音醉李賈逵曰檇李越地杜預曰吳郡嘉興縣南有醉李城也越使死士挑戰徐廣曰一作亶越世家亦然或者以為人名氏乎駰案賈逵曰死士死罪人也鄭衆曰死士欲以死報恩者也杜預曰敢死之士也三行造吳師呼自剄左傳曰使罪人三行屬劎於頸吳師觀之越因伐吳敗之姑蘇越絶書曰闔廬起姑蘇臺三年聚材五年乃成髙見三百里傷吳王闔廬指軍却七里吳王病傷而死闔廬使立太子夫差謂曰爾而忘勾踐殺汝父乎對曰不敢三年乃報越越絶書曰闔廬冢在吳縣閶門外名曰虎丘下池廣六十步水深一丈五尺銅棺三重澒地六尺玉鳬之流扁諸之劎三千方員之口三千槃郢魚腸之劎在焉卒十餘萬人治之取土臨湖葬之三日白虎居其上故號曰虎丘王夫差越絶書曰太伯到夫差二十六代且千歲元年以大夫伯嚭為太宰習戰射常以報越為志二年吳王悉精兵以伐越敗之夫椒賈逵曰夫椒越地杜預曰太湖中椒山也報姑蘇也越王勾踐乃以甲兵五千人棲於會稽賈逵曰會稽山名使大夫種因吳太宰嚭而行成服虔曰行成求成也請委國為臣妾吳王將許之伍子胥諫曰昔有過氏殺斟灌以伐斟尋賈逵曰過國名也斟灌斟尋夏同姓也夏后相依斟灌而國故曰殺夏后相也滅夏后帝相服虔曰夏后相啓之孫帝相之妃后緡方娠賈逵曰緡有仍之姓也杜預曰娠懷身也逃於有仍賈逵曰有仍國名后緡之家而生少康服虔曰后緡遺腹子少康為有仍牧正王肅曰牧正牧官之長也有過又欲殺少康少康奔有虞賈逵曰有虞帝舜之後杜預曰梁國虞縣有虞思夏德於是妻之以二女而邑之於綸賈逵曰綸虞邑有田一成有衆一旅賈逵曰方十里為成五百人為旅後遂收夏衆撫其官職服虔曰因此基業稍收取夏遺民餘衆撫修夏之故官憲典使人誘之遂滅有過氏復禹之績祀夏配天服虔曰以鮌配天也不失舊物賈逵曰物職也杜預曰物事也今吳不如有過之強而勾踐大於少康今不因此而滅之又將寬之不亦難乎且勾踐為人能辛苦今不滅後必悔之吳王不聽聽太宰嚭卒許越平與盟而罷兵去七年吳王夫差聞齊景公死而大臣爭寵新君弱乃興師北伐齊子胥諫曰越王勾踐食不重味衣不重采弔死問疾且欲有所用其衆此人不死必為吳患今越在腹心疾而王不先而務齊不亦謬乎吳王不聽遂北伐齊敗齊師於艾陵杜預曰艾陵齊地至繒杜預曰琅邪繒縣召魯哀公而徵百牢季康子使子貢以周禮説太宰嚭乃得止賈逵曰周禮王合諸矦享禮十有二牢上公九牢矦伯七牢子男五牢因留略地於齊魯之南九年為騶伐魯至與魯盟乃去十年因伐齊而歸十一年復北伐齊越王勾踐率其衆以朝吳厚獻遺之吳王喜唯子胥懼曰是棄吳也諫曰越在腹心今得志於齊猶石田無所用王肅曰石田不可耕且盤庚之誥有顛越勿遺服虔曰顛殞也越墜也顛越無道則割絶無遺也商之以興徐廣曰一本作盤庚之誥有顛之越之商之以興子胥傳誥曰有顛越商之興吳王不聽使子胥於齊子胥屬其子於齊鮑氏服虔曰鮑氏齊大夫還執吳王吳王聞之大怒賜子胥屬鏤之劒以死服虔曰屬鏤劎名賜使自刎將死曰樹吾墓上以梓令可為器抉吾眼置之吳東門以觀越之滅吳也齊鮑氏殺齊悼公吳王聞之哭於軍門外三日服虔曰諸矦相臨之禮乃從海上徐廣曰一作中攻齊齊人敗吳吳王乃引兵歸十三年吳召魯衛之君會於橐皋服虔曰橐皋地名也杜預曰在淮南逡遒縣東南十四年春吳王北會諸侯於黃池杜預曰陳留封丘縣南有黃亭近濟水欲霸中國以全周室六月戊子越王勾踐伐吳乙酉越五千人與吳戰丙戌虜吳太子友丁亥入吳吳人告敗於王夫差夫差惡其聞也賈逵曰惡其聞諸侯或泄其語吳王怒斬七人於幕下服虔曰以絶口七月辛丑吳王與晉定公爭長吳王曰於周室為我長杜預曰吳為太伯後故為長晉定公曰於姬姓我為伯杜預曰為侯伯趙鞅怒將伐吳乃長晉定公徐廣曰黃池之盟吳先歃晉次之與外傳同駰案賈逵曰外傳曰吳先歃晉亞之先敘晉晉有信又所以外吳吳王已盟與晉别欲伐宋太宰嚭曰可勝而不能居也乃引兵歸國國亡太子內空王居外久士皆罷敝於是乃使厚幣以與越平十五年齊田常殺簡公十八年越益強越王勾踐率兵使伐敗吳師於笠澤楚滅陳二十年越王勾踐復伐吳二十一年遂圍吳二十三年十一月丁卯越敗吳越王勾踐欲遷吳王夫差於甬東賈逵曰甬東越東鄙甬江東也韋昭曰句章東海口外州也豫百家居之吳王曰孤老矣不能事君王也吾悔不用子胥之言自令陷此遂自剄死越絶書曰夫差冢在猶亭西卑猶位越王使干戈人一􅀈土以葬之近太湖去縣五十七里越王滅吳誅太宰嚭以為不忠而歸太史公曰孔子言太伯可謂至德矣三以天下讓民無得而稱焉王肅曰太伯弟季厯賢又生聖子昌昌必有天下故太伯以天下三讓於王季其讓隱故無得而稱言之者所以為至德也余讀春秋古文乃知中國之虞與荆蠻句吳兄弟也延陵季子之仁心慕義無窮見微而知清濁嗚呼又何其閎覽博物君子也皇覽曰延陵季子冢在毗陵縣暨陽鄉至今吏民皆祀事史記集解卷三十一
