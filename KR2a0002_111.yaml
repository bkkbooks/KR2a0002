body:
  text: 史記集解卷一百十三宋裴駰撰史記一百十三南越尉陀列傳第五十三南越王尉陀者真定人也姓趙氏秦時已并天下略定揚越張晏曰揚州之南越也置桂林南海象郡以謫徙民與越雜處十三嵗徐廣曰秦并天下至二世元年十三年并天下八嵗乃平越地至二世元年六年也陀秦時用為南海龍川令至二世時南海尉任囂病且死徐廣曰爾時未言都尉也召龍川令趙陀語曰聞陳勝等作亂秦為無道天下苦之項羽劉季陳勝吳廣等州郡各共興軍聚衆虎爭天下中國擾亂未知所安豪傑畔秦相立南海僻逺吾恐盜兵侵地至此吾欲興兵絶新道自備待諸侯變㑹病甚且番禺負山險阻南海東西數千里頗有中國人相輔此亦一州之主也可以立國郡中長吏無足與言者故召公告之即被他書韋昭曰被之以書音光被之被行南海尉事囂死他即移檄告橫浦陽山湟溪關曰徐廣曰在桂陽通四㑹也盜兵且至急絶道聚兵自守因稍以法誅秦所置長吏以其黨為假守秦已破滅他即擊并桂林象郡自立為南越武王韋昭曰生以武為號不稽於古也髙帝已定天下為中國勞苦故釋他弗誅漢十一年遣陸賈因立他為南越王與剖符通使和集百越毋為南邉患害與長沙接境髙后時有司請禁南越關市鐵器他曰髙帝立我通使物今髙后聽讒臣别異蠻夷隔絶器物此必長沙王計也欲倚中國擊滅南越而并王之自為功也於是他乃自尊號為南越武帝發兵攻長沙邉邑敗數縣而去焉髙后遣將軍隆慮侯竈往擊之㑹暑溼士卒大疫兵不能踰嶺嵗餘髙后崩即罷兵他因此以兵威邉財物賂遺閩越西甌駱役屬馬漢書音義曰駱越也東西萬餘里乃乘黃屋左纛稱制與中國侔及孝文帝元年初鎮撫天下使告諸侯四夷從代來即位意喻盛德焉乃為他親冢在真定置守邑嵗時奉祀召其從昆弟尊官厚賜寵之詔丞相陳平等舉可使南越者平言好畤陸賈先帝時習使南越乃召賈以為大中大夫往使因讓他自立為帝曽無一介之使報者陸賈至南越王甚恐為書謝稱曰蠻夷大長老夫臣陀前日髙后隔異南越竊疑長沙王讒臣又遙聞髙后盡誅陀宗族掘燒先人冡以故自棄犯長沙邉境且南方早溼蠻夷中間其東閩越千人衆號稱王其西甌駱裸國亦稱王老臣妄竊帝號聊以自娛豈敢以聞天王哉乃頓首謝願長為藩臣奉貢職於是乃下令國中曰吾聞兩雄不俱立兩賢不竝世皇帝賢天子也自今已後去帝制黃屋左纛陸賈還報孝文帝大說遂至孝景時稱臣使人朝請然南越其居國竊如故號名其使天子稱王朝命如諸侯至建元四年卒陀孫胡為南越王徐廣曰皇甫謐曰越王趙陀以建元四年卒爾時漢興七十年陀蓋百嵗矣此時閩越王郢興兵擊南越邉邑粵使人上書曰兩越俱為藩臣毋得擅興兵相攻擊今閩越興兵侵臣臣不敢興兵唯天子詔之於是天子多南越義守職約為興師遣兩將軍往討閩越兵未踰嶺閩越王弟餘善殺郢以降於是罷兵天子使莊助往諭意南越王胡頓首曰天子乃為臣興兵討閩越死無以報德遣太子嬰齊入宿衛謂助曰國新被寇使者行矣胡方日夜裝入見天子助去後其大臣諌胡曰漢興兵誅郢亦行以驚動南越且先王昔言事天子期無失禮要之不可以說好語入見入見則不得復歸亡國之勢也於是胡稱病竟不入見後十餘嵗胡實病甚太子嬰齊請歸胡薨諡為文王嬰齊代立即藏其先武帝璽嬰齊其入宿衛在長安時取邯鄲樛氏女生子興徐廣曰一作典及即位上書請立樛氏女為后興為嗣漢數使使者風諭嬰齊嬰齊尚樂擅殺生自恣懼入見要用漢法比內諸侯固稱病遂不見遣子次公入宿衛嬰齊薨諡為明王太子興代立其母為太后太后自未為嬰齊姬時嘗與霸陵人安國少季通及嬰齊薨後元鼎四年漢使安國少季往諭王王太后以入朝比內諸侯令辨士諌大夫終軍等宣其辭勇士魏臣等輔其缺徐廣曰一作決衛尉路博德將兵屯桂陽待使者王年少太后中國人也嘗與安國少季通其使復私焉國人頗知之多不附太后太后恐亂起亦欲倚漢威數勸王及羣臣求內屬即因使者上書請比內諸侯三嵗一朝除邉關於是天子許之賜其丞相吕嘉銀印及內史中尉太傅印餘得自置除其故黥劓刑用漢法比內諸侯使者皆留填撫之王王太后飭治行裝重齎為入朝具其相吕嘉年長矣相三王宗族官仕為長吏者七十餘人男盡尚王女女盡嫁王子兄弟宗室及蒼梧秦王有連漢書音義曰蒼梧越中王自名為秦王連親婚也其居國中甚重越人信之多為耳目者得衆心愈於王王之上書數諌止王王弗聽有畔心數稱病不見漢使者使者皆注意嘉勢未能誅王王太后亦恐嘉等先事發乃置酒介漢使者權韋昭曰恃使者為介胄也謀誅嘉等使者皆東鄉太后南鄉王北鄉相嘉大臣皆西鄉侍坐飲嘉弟為將將卒居宫外酒行太后謂嘉曰南越內屬國之利也而相君苦不便者何也以激怒使者使者狐疑相杖遂莫敢發嘉見耳目非是即起而出太后怒欲鏦嘉以矛韋昭曰鏦撞也王止太后嘉遂出分其弟兵就舍稱病不肯見王及使者乃隂與大臣作亂王素無意誅嘉嘉知之以故數月不發太后有淫行國人不附欲獨誅嘉等力又不能天子聞嘉不聽王王太后弱孤不能制使者怯無決又以為王王太后已附漢獨吕嘉為亂不足以興兵欲使莊參以二千人往使參曰以好往數人足矣以武往二千人無足以為也辭不可天子罷參也郟壯士徐廣曰縣屬頴川音古治反故濟北相韓千秋奮曰以區區之越又有王太后應獨相吕嘉為害願得勇士三百人必斬嘉以報於是天子遣千秋徐廣曰為校尉與王太后弟樛樂將二千人往入越境吕嘉等乃遂反下令國中曰王年少太后中國人也又與使者亂専欲內屬盡持先王寶器入獻天子以自媚多從人行至長安虜賣以為僮僕取自脫一時之利無顧趙氏社稷為萬世慮計之意乃與其弟將卒攻殺王太后及漢使者遣人告蒼梧秦王及其諸郡縣立明王長男越妻子術陽侯建德為王徐廣曰元鼎四年以南越王兄越封髙昌侯而韓千秋兵入破數小邑其後越直開道給食未至番禺四十里越以兵擊千秋等遂滅之使人函封漢使者節置塞上好為謾辭謝罪發兵守要害處於是天子曰韓千秋雖無成功亦軍鋒之冠封其子延年為成安侯樛樂其姊為王太后首願屬漢封其子廣德為龍亢侯乃下赦曰天子微諸侯力政譏臣不討賊今吕嘉建德等反自立晏如令罪人及江淮以南徐廣曰淮一作滙也樓船十萬師應劭曰時欲擊越非水不至故作大船船上施樓故號曰樓船也往討之元鼎五年秋衛尉路博德為伏波將軍出桂陽下匯水徐廣曰一作湟案地理志曰桂陽有匯水通四㑹或作淮字主爵都尉楊僕為樓船將軍出豫章下橫浦故歸義越侯二人張晏曰故越人降為侯為戈船下厲將軍徐廣曰厲一作瀨駰案張晏曰越人於水中負人船又有蛟龍之害故置戈於船下因以為名也應劭曰瀨水流涉上也瓚曰伍子胥書有戈船以載干戈因謂之戈船也出零陵或下離水徐廣曰在零陵通廣信或扺蒼梧使馳義侯徐廣曰越人也名遺因巴蜀罪人發夜郎兵下牂牱江咸㑹番禺元鼎六年冬樓船將軍將精卒先陷尋陜破石門得越船粟因推而前挫越鋒以數萬人待伏波伏波將軍將罪人道逺㑹期後與樓船㑹乃有千餘人遂俱進樓船居前至番禺建德嘉皆城守樓船自擇便處居東南面伏波居西北面㑹暮樓船攻敗越人縱火燒城越素聞伏波名日草不知其兵多少伏波乃為營遣使者招降者賜印復縱令相招樓船力攻燒敵反驅而入伏波營中犂旦城中皆降伏波徐廣曰吕靜曰犂結也音力奚反結猶連及逮至也漢書犂旦為遲旦謂待明也吕嘉建德已夜與其屬數百人亡入海以船西去伏波又因問所得降者貴人以知吕嘉所之遣人追之以其故校尉司馬蘇宏得建德封為海常侯徐廣曰在東萊越郎徐廣曰南越之郎官都稽徐廣曰表曰孫都得嘉封為臨蔡侯曰蒼梧王趙光者越王同姓聞漢兵至及越揭陽令定韋昭曰揭音其逝反自定屬漢越桂林監居翁漢書音義曰桂林郡中監姓居名翁也諭甌駱屬漢皆得為侯戈船下厲將軍兵及馳義侯所發夜郎兵未下南越已平矣遂為九郡徐廣曰儋耳珠崖南海蒼梧九真鬱林日南合浦交趾伏波將軍益封樓船將軍以陷堅為將梁侯自尉陀初王後五世九十三嵗而國亡焉太史公曰尉陀之王本由任囂遭漢初定列為諸侯隆慮離溼疫他得以益驕甌駱相攻南越動搖漢兵臨境嬰齊入朝其後亡國徴自樛女吕嘉小忠令陀無後樓船從欲怠傲失惑伏波困窮智慮愈殖因禍為福成敗之轉譬若糾墨史記集解卷一百十三
