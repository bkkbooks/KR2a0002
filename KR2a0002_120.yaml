body:
  text: 史記集解卷一百二十二宋裴駰撰史記一百二十二酷吏列傳第六十二孔子曰導之以政齊之以刑民免而無恥孔安國曰免茍免也導之以德齊之以禮有恥且格何晏曰格正也老氏稱上德不德是以有德下德不失德是以無德法令滋章盜賊多有太史公曰信哉是言也法令者治之具而非制治清濁之源也昔天下之網嘗密矣然姦僞萌起其極也上下相遁至於不振當是之時吏治若救火揚沸非武健嚴酷惡能勝其任而愈快乎言道德者溺其職矣故曰聽訟吾猶人也必也使無訟乎下士聞道大笑之非虛言也漢興破觚而為圜漢書音義曰觚方斫雕而為朴網漏於吞舟之魚而吏治蒸蒸不至於姦黎民乂安由是觀之在彼不在此韋昭曰在道德不在嚴酷髙后時酷吏獨有侯封刻轢宗室侵辱功臣吕氏已敗遂禽侯封之家孝景時鼂錯以刻深頗用術輔其資而七國之亂發怒於錯錯卒以被戮其後有郅都寧成之屬郅都者楊人也徐廣曰屬河東以郎事孝文帝孝景時都為中郎將敢直諫面折大臣於朝嘗從入上林賈姬如厠野彘卒來入厠上目都都不行上欲自持兵救賈姬都伏上前曰亡一姬復一姬進天下所少寧賈姬等乎陛下縱自輕奈宗廟太后何上還彘亦去太后聞之賜都金百斤由此重郅都濟南瞷氏漢書音義曰音小兒癇病也宗人三百餘家豪猾二千石莫能制於是景帝乃拜都為濟南太守至則族滅瞷氏首惡餘皆股栗徐廣曰髀腳戰搖也居嵗餘郡中不拾遺旁十餘郡守畏都如大府都為人勇有氣力公廉不發私書問遺無所受請寄無所聽常自稱曰已倍親而仕身固當奉職死節官下終不顧妻子矣郅都遷為中尉丞相條侯至貴倨也而都揖丞相是時民朴畏罪自重而都獨先嚴酷致行法不避貴戚列侯宗室見都側目而視號曰蒼鷹臨江王徴詣中尉府對簿臨江王欲得刀筆為書謝上而都禁吏不子魏其侯使人以間與臨江王臨江王既為書謝上因自殺竇太后聞之怒以危法中都都免歸家孝景帝乃使使持節拜都為雁門太守而便道之官得以便宜從事胸奴素聞郅都節居邊為引兵去竟郅都死不近雁門胸奴至為偶人象郅都令騎馳射莫能中見憚如此胸奴患之竇太后乃竟中都以漢法景帝曰都忠臣欲釋之竇太后曰臨江王獨非忠臣邪於是遂斬郅都寧成者徐廣曰寧一作寧穰人也徐廣曰屬南陽以郎謁者事景帝好氣為人小吏必陵其長吏為人上操下如束溼薪徐廣曰一無此字駰案韋昭曰言急也滑賊任威稍遷至濟南都尉而郅都為守始前數都尉皆步入府因吏謁守如縣令其畏郅都如此及成往直陵都出其上都素聞其聲於是善遇與結歡久之郅都死後長安左右宗室多暴犯法於是上召寧成為中尉其治效郅都其廉弗如然宗室豪桀皆人人惴恐武帝即位徙為內史外戚多毁成之短扺罪髠鉗是時九卿罪死即死少被刑而成極刑自以為不復收於是解脫詐刻傳出關歸家稱曰仕不至二千石賈不至千萬安可比人乎乃貰貸買陂田千餘頃假貧民役使數千家數年㑹赦致産數千金為任俠持吏長短出從數千騎其使民威重於郡守周陽由者其父趙兼以淮南王舅父侯周陽故因姓周陽氏徐廣曰侯五年孝文六年除國由以宗家任為郎事孝文及景帝景帝時由為郡守武帝即位吏治尚循謹甚然由居二千石中最為暴酷驕恣所愛者撓法活之所憎者曲法誅滅之所居郡必夷其豪為守視都尉如令為都尉必陵太守奪之治與汲黯俱為忮漢書音義曰堅忮也司馬安之文惡漢書音義曰以文法傷害人俱在二千石列同車未嘗敢均茵伏徐廣曰漢書作馮伏者軾由後為河東都尉時與其守勝屠公爭權相告言罪勝屠公當抵罪義不受刑自殺而由棄市自寧成周陽由之後事益多民巧法大抵吏之治類多成由等矣趙禹者斄人徐廣曰屬扶風音台以佐史補中都官用廉為令史事太尉亞夫亞夫為丞相禹為丞相史府中皆稱其廉平然亞夫弗任曰極知禹無害然文深漢書音義曰禹持文法深刻不可以居大府今上時禹以刀筆吏積勞稍遷為御史上以為能至大中大夫與張湯論定諸律令徐廣曰論一作編作見知吏傳得相監司用法益刻蓋自此始張湯者杜人也徐廣曰爾時未為陵其父為長安丞出湯為兒守舍還而鼠盜肉其父怒笞湯湯掘窟得盜鼠及餘肉劾鼠掠治傳爰書訊鞫論報蘇林曰謂傳囚也爰易也以此書易其辭處鞫窮也張晏曰傳考證驗也爰書自證不如此言反受其罪訊考三日復問之知與前辭同不也鞫一吏為讀狀論其報行也并取鼠與肉具獄磔堂下鄧展曰罪備具其父見之視其文辭如老獄吏大驚遂使書獄如淳曰決獄之書謂律令也父死後湯為長安吏久之周陽侯始為諸卿時徐廣曰田勝也武帝母王太后之同母弟也武帝始立而封為周陽侯嘗繫長安湯傾身為之韋昭曰為之先後及出為侯大與湯交遍見湯貴人湯給事內史為寧成掾以湯為無害言太府調為茂陵尉治方中漢書音義曰方中陵上土作方也湯主治之蘇林曰天子即位豫作陵諱之故言方中如淳曰太府幕府也茂陵尉主作陵之尉也韋昭曰太府公府武安侯為丞相徵湯為史時薦言之天子補御史使按事治陳皇后蠱獄深竟黨與於是上以為能稍遷至大中大夫與趙禹共定諸律令務在深文拘守職之吏蘇林曰拘刻於守職之吏已而趙禹遷為中尉徙為少府而張湯為廷尉兩人交歡而兄事禹禹為人廉倨為吏以來舍毋食客公卿相造請禹禹終不報謝務在絶知友賓客之請孤立行一意而已見文法輒取亦不覆按求官屬陰罪湯為人多詐舞智以御人韋昭曰制御人始為小吏乾沒徐廣曰隨世沈浮也駰案服䖍曰射成敗也如淳曰得利為乾失利為沒與長安富賈田甲魚翁叔之屬交私徐廣曰姓魚也及列九卿收接天下名士大夫已心內雖不合然陽浮慕之是時上方鄉文學湯決大獄欲傅古義乃請博士弟子治尚書春秋補廷尉史亭疑法李竒曰亭平也奏讞疑事必豫先為上分别其原上所是受而著讞決法廷尉潔令韋昭曰在板潔揚主之明奏事即譴湯應謝徐廣曰應一作權鄉上意所便必引正監掾史賢者曰固為臣議如上責臣臣弗用愚抵於此蘇林曰主坐不用諸掾語故至于此罪常釋聞徐廣曰詔答聞也如今制曰聞矣駰案瓚曰謂常見原即奏事上善之曰臣非知為此奏乃正監掾史某為之其欲薦吏揚人之善蔽人之過如此所治即上意所欲罪豫監史深禍者即上意所欲釋與監史輕平者所治即豪必舞文巧詆即下戶羸弱時口言雖文致法上財察李竒曰先見上口言之欲與輕平也於是往往釋湯所言李竒曰湯口所先言皆見原釋湯至於大吏內行修也通賓客飲食於故人子弟為吏及貧昆弟調護之尤厚其造請諸公不避寒暑是以湯雖文深意忌不專平然得此聲譽而刻深吏多為爪牙用者依於文學之士丞相𢎞數稱其美及治淮南衡山江都反獄皆窮根本嚴助及伍被上欲釋之湯爭曰伍被本畫反謀而助親幸出入禁闥爪牙臣乃交私諸侯如此弗誅後不可治於是上可論之其治獄所排大臣自為功多此類是湯益尊任遷為御史大夫徐廣曰元狩二年㑹渾邪等降漢大興兵伐胸奴山東水旱貧民流徙皆仰給縣官縣官空虛於是丞上指請造白金及五銖錢籠天下鹽鐵排富商大賈出告緡令鉏豪彊并兼之家舞文巧詆以輔法湯每朝奏事語國家用日晏天子忘食丞相取充位徐廣曰時李蔡莊青翟為丞相天下事皆決於湯百姓不安其生騷動縣官所興未獲其利姦吏竝侵漁於是痛繩以罪則自公卿以下至於庶人咸指湯湯嘗病天子至自視病其隆貴如此胸奴來請和親羣臣議上前博士狄山曰和親便上問其便山曰兵者凶器未易數動髙帝欲伐胸奴大困平城乃遂結和親孝惠髙后時天下安樂及孝文帝欲事胸奴北邊蕭然苦兵矣孝景時吳楚七國反景帝往來兩宫間寒心者數月吳楚已破竟景帝不言兵天下富實今自陛下舉兵擊胸奴中國以空虛邊民大困貧由此觀之不如和親上問湯湯曰此愚儒無知狄山曰臣固愚忠若御史大夫湯乃詐忠若湯之治淮南江都以深文痛詆諸侯别疏骨肉使蕃臣不自安臣固知湯之為詐忠於是上作色曰吾使生居一郡能無使虜入盜乎曰不能曰居一縣對曰不能復曰居一障間山自度辨窮且下吏曰能於是上遣山乘鄣至月餘胸奴斬山頭而去自是以後羣臣震懾湯之客田甲雖賈人有賢操始湯為小吏時與錢通徐廣曰以利交及湯為大吏甲所以責湯行義過失亦有烈士風湯為御史大夫七嵗敗河東人李文嘗與湯有郤已而為御史中丞恚數從中文書事有可以傷湯者不能為地湯有所愛史魯謁居知湯不平使人上蜚變告文姦事事下湯湯治論殺文而湯心知謁居為之上問曰言變事蹤跡安起湯詳驚曰此殆文故人怨之謁居病卧閭里主人湯自往視疾為謁居摩足趙國以冶鑄為業王數訟鐵官事湯常排趙王趙王求湯陰事謁居嘗按趙王趙王怨之并上書告湯大臣也史謁居有病湯至為摩足疑與為大姦事下廷尉謁居病死事連其弟弟繫導官如淳曰太官之别也主酒湯亦治他囚導官見謁居弟欲陰為之而詳不省謁居弟弗知怨湯使人上書告湯與謁居謀共變告李文事下減宣宣嘗與湯有郤及得此事窮竟其事未奏也㑹人有盜發孝文園瘞錢如淳曰瘞埋錢於園陵以送死丞相青翟朝與湯約俱謝至前湯念獨丞相以四時行園當謝湯弗與也不謝丞相謝上使御史按其事湯欲致其文丞相見知張晏曰見知故縱以其罪罪之丞相患之三長史皆害湯欲陷之始長史朱買臣㑹稽人也讀春秋莊助使人言買臣買臣以楚辭與助俱幸侍中為大中大夫用事而湯乃為小吏跪伏使買臣等前已而湯為廷尉治淮南獄排擠莊助買臣固心望及湯為御史大夫買臣以㑹稽守為主爵都尉列於九卿數年坐法廢守長史見湯湯坐牀上丞史遇買臣弗為禮買臣楚士深怨常欲死之王朝齊人也以術至右內史邊通學長短漢書音義曰長短術興於六國時行長入短其語隱謬用相激怒剛暴彊人也官再至濟南相故皆居湯右已而失官守長史詘體於湯湯數行丞相事知此三長史素貴常凌折之以故三長史合謀曰始湯約與君謝已而賣君今欲劾君以宗廟事此欲代君耳吾知湯陰事使吏捕按湯左田信等漢書音義曰左證左也曰湯且欲奏請信輒先知之居物致富與湯分之及他姦事事辭頗聞上問湯曰吾所為賈人輒先知之益居其物是類有以吾謀告之者湯不謝湯又詳驚曰固宜有減宣亦奏謁居等事天子果以湯懷詐面欺使使八輩簿責湯蘇林曰簿音主簿之簿悉責也湯具自道無此不服於是上使趙禹責湯禹至讓湯曰君何不知分也君所治夷滅者幾何人矣今人言君皆有狀天子重致君獄欲令君自為計何多以對簿為湯乃為書謝曰湯無尺寸功起刀筆吏陛下幸致為三公無以塞責然謀陷湯罪者三長史也遂自殺湯死家産直不過五百金皆所得奉賜無他業昆弟諸子欲厚葬湯湯母曰湯為天子大臣被汙惡言而死何厚葬乎載以牛車有棺無椁天子聞之曰非此母不能生此子乃盡案誅三長史丞相青翟自殺出田信上惜湯稍遷其子安世趙禹中廢已而為廷尉始條侯以為禹賊深弗任及禹為少府比九卿禹酷急至晚節事益多吏務為嚴峻而禹治加緩而名為平王溫舒等後起治酷於禹禹以老徙為燕相數嵗亂悖有罪免歸後湯十餘年以夀卒於家義縱者河東人也為少年時嘗與張次公俱攻剽為羣盜徐廣曰剽音扶召反縱有姊姁以醫幸王太后王太后問有子兄弟為官者乎姊曰有弟無行不可太后乃告上拜義姁弟縱為中郎漢書音義曰姁音煦縱姊名也補上黨郡中令治敢行少藴藉漢書音義曰敢行暴政而少蘊藉也縣無逋事舉為第一遷為長安及長安令直法行治不避貴戚以捕案太后外孫修成君子仲上以為能遷為河內都尉至則族滅其豪穰氏之屬河內道不拾遺而張次公亦為郎以勇悍從軍敢深入有功為岸頭侯徐廣曰受封五年與淮南王女凌姦及受財物國除寧成家居上欲以為郡守御史大夫𢎞曰臣居山東為小吏時寧成為濟南都尉其治如狼牧羊成不可使治民上乃拜成為關都尉嵗餘關東吏隸郡國出入關者漢書音義曰隸閲也號曰寧見乳虎無值寧成之怒義縱自河內遷為南陽太守聞寧成家居南陽及縱至關寧成側行送迎然縱氣盛弗為禮至郡遂案寧氏盡破碎其家成坐有罪及孔暴之屬皆奔亡徐廣曰孔暴三姓大族南陽吏民重足一迹而平氏朱彊杜衍杜周為縱爪牙之吏任用遷為廷史軍數出定襄定襄吏民亂敗於是徙縱為定襄太守縱至掩定襄獄中重罪輕繫二百餘人及賓客昆弟私入相視亦二百餘人縱一捕鞫曰為死罪解脫漢書音義曰一切皆捕之也律諸囚徒私解脫桎梏鉗赭加罪一等為人解脫與同罪縱鞫相贍餉者二百人為解脫死罪盡殺也是日皆報殺四百餘人其後郡中不寒而栗猾民佐吏為治是時趙禹張湯以深刻為九卿矣然其治尚寬輔法而行而縱以鷹擊毛摯為治徐廣曰摰烏將擊必張羽毛也後㑹五銖錢白金起民為姦京師尤甚乃以縱為右內史王溫舒為中尉溫舒至惡其所為不先言縱縱必以氣凌之敗壞其功其治所誅殺甚多然取為小治姦益不勝直指始出矣吏之治以斬殺縛束為務閻奉以惡用矣縱廉其治放郅都上幸鼎湖病久已而卒起幸甘泉道多不治上怒曰縱以我為不復行此道乎嗛之徐廣曰嗛音銜至冬楊可方受告緡韋昭曰人有告言不出緡者可方受之縱以為此亂民部吏捕其為可使者天子聞使杜式治以為廢格沮事漢書音義曰武帝使楊可主告緡沒入其財物縱捕為可使者此為廢格詔書沮已成之事棄縱市後一嵗張湯亦死王溫舒者陽陵人也徐廣曰屬馮詡少時椎埋為姦徐廣曰椎殺人而埋之或謂發冢已而試補縣亭長數廢為吏以治獄至廷史事張湯遷為御史督盜賊殺傷甚多稍遷至廣平都尉擇郡中豪敢任吏十餘人以為爪牙皆把其陰重罪而縱使督盜賊快其意所欲得此人雖有百罪弗法即有避因其事夷之亦滅宗以其故齊趙之郊盜賊不敢近廣平廣平聲為道不拾遺上聞遷為河內太守素居廣平時皆知河內豪姦之家及往九月而至令郡具私馬五十匹為驛自河內至長安部吏如居廣平時方略捕郡中豪猾郡中豪猾相連坐千餘家上書請大者至族小者乃死家盡沒入償臧奏行不過二三日得可事論報至流血十餘里河內皆怪其奏以為神速盡十二月郡中毋聲毋敢夜行野無犬吠之盜其頗不得失之旁郡國梨求會春溫舒頓足歎曰嗟乎令冬月益展一月足吾事矣其好殺伐行威不愛人如此天子聞之以為能遷為中尉其治復放河內徙諸名禍猾吏徐廣曰有殘刻之名與從事河內則楊皆麻戊徐廣曰一云麻成關中楊贛成信等義縱為內史憚未敢恣治及縱死張湯敗後徙為廷尉而尹齊為中尉尹齊者東郡茌平人以刀筆稍遷至御史事張湯張湯數稱以為廉武使督盜賊所斬伐不避貴戚遷為關內都尉聲甚於寧成上以為能遷為中尉吏民益凋敝尹齊木强少文豪惡吏伏匿而善吏不能為治以故事多廢抵罪上復徙溫舒為中尉而楊僕以嚴酷為主爵都尉楊僕者宜陽人也以千夫為吏漢書音義曰千夫若五大夫武帝軍用不足令民出錢穀為之河內守案舉以為能遷為御史使督盜賊關中治放尹齊以為敢摯行稍遷至主爵都尉列九卿天子以為能南越反拜為樓船將軍有功封將梁侯為荀彘所縛徐廣曰受封四年征朝鮮還贖為庶人居久之病死而溫舒復為中尉為人少文居廷惛惛不辨至於中尉則心開督盜賊素習關中俗知豪惡吏豪惡吏盡復為用為方略吏苛察盜賊惡少年投缿徐廣曰音項器名也如今之投書函中購告言姦置伯格長徐廣曰一作落古村落字亦作格街陌屯落皆設督長也以牧司姦盜賊溫舒為人讇善事有勢者即無勢者視之如奴有勢家雖有姦如山弗犯無勢者貴戚必侵辱舞文巧詆下戶之猾以焄音熏大豪其治中尉如此姦猾窮治大抵盡靡爛獄中行論無出者其爪牙吏虎而冠於是中尉部中中猾以下皆伏有藝者為游聲譽稱治治數嵗其吏多以權富溫舒擊東越還徐廣曰元鼎六年出㑹稽破東越議有不中意者坐小法抵罪免是時天子方欲作通天臺而未有人溫舒請覆中尉脫卒得數萬人作上說拜為少府徙為右內史治如其故姦邪少禁坐法失官復為右輔行中尉事如故操嵗餘㑹宛軍發漢書音義曰發兵代大宛詔徵豪吏溫舒匿其吏華成及人有變告溫舒受員騎錢他姦利事罪至族自殺其時兩弟及兩㛰家亦各自坐他罪而族光祿徐自為曰悲夫夫古有三族而王溫舒罪至同時而五族乎溫舒死家直纍千金後數嵗尹齊亦以淮陽都尉病死家直不滿五十金所誅滅淮陽甚多及死仇家欲燒其尸尸亡去歸葬徐廣曰尹齊死未及斂恐怨家欲燒之尸亦飛去自溫舒等以惡為治而郡守都尉諸侯二千石欲為治者其治大抵盡放溫舒而吏民益輕犯法盜賊滋起南陽有梅免白政楚有殷中徐廣曰殷一作假人亦有姓假者也杜少齊有徐勃燕趙之間有堅盧范生之屬大羣至數千人擅自號攻城邑取庫兵釋死罪縛辱郡太守都尉殺二千石為檄告縣趣具食小羣盜以百數掠鹵鄉里者不可勝數也於是天子始使御史中丞丞相長史督之猶弗能禁也乃使光祿大夫范昆諸輔都尉及故九卿張德等衣繡衣持節虎符發兵以興擊斬首大部或至萬餘級及以法誅通飲食坐連諸郡甚者數千人數嵗乃頗得其渠率散卒失亡復聚黨阻山川者往往而羣居無可奈何於是作沈命法漢書音義曰沈藏匿也命亡逃也曰羣盜起不發覺發覺而捕弗滿品者二千石以下至小吏主者皆死其後小吏畏誅雖有盜不敢發恐不能得坐課纍府府亦使其不言故盜賊寖多上下相為匿以文辭避法焉徐廣曰詐為虛文言無盜賊也減宣者楊人也以佐史無害給事河東守府衛將軍青使買馬河東見宣無害言上徵為大廏丞官事辦稍遷至御史及中丞使治主父偃及治淮南反獄所以微文深詆殺者甚衆稱為敢決疑數廢數起為御史及中丞者幾二十嵗王溫舒免中尉而宣為左內史其治米鹽事大小皆關其手自部署縣名曹實物官吏令丞不得擅搖痛以重法繩之居官數年一切郡中為小治辦然獨宣以小致大能因力行之難以為經中廢為右扶風坐怨成信漢書曰成信宣吏信亡藏上林中宣使郿令格殺信吏卒格信時射中上林苑門宣下吏詆罪以為大逆當族自殺而杜周任用杜周者南陽杜衍人義縱為南陽守以為爪牙舉為廷尉史事張湯湯數言其無害至御史使按邊失亡文穎曰邊卒多亡也或曰郡縣主守有所亡失也所論殺甚衆奏事中上意任用與減宣相編更為中丞十餘嵗其治與宣相放然重遲外寬內深次骨李竒曰其用罪深刻至骨宣為左內史周為廷尉其治大放張湯而善候伺上所欲擠者因而陷之上所欲釋者久繫待問而微見其寃狀客有讓周曰君為天子決平不循三尺法漢書音義曰以三尺竹簡書法律也專以人主意指為獄獄者固如是乎周曰三尺安出哉前主所是著為律後主所是疏為令當時為是何古之法乎至周為廷尉詔獄亦益多矣二千石繫者新故相因不減百餘人郡吏大府舉之廷尉如淳曰郡吏郡太守也孟康曰舉之廷尉以章劾付廷尉治之一嵗至千餘章章大者連逮證案數百小者數十人逺者數千近者數百里㑹獄吏因責如章告劾不服以笞掠定之於是聞有逮皆亡匿獄久者至更數赦張晏曰詔書赦或有不從此令十有餘嵗而相告言大抵盡詆以不道以上廷尉及中都官詔獄逮至六七萬人吏所增加十萬餘人周中廢後為執金吾逐盜捕治桑𢎞羊衛皇后昆弟子刻深天子以為盡力無私遷為御史大夫徐廣曰天漢三年為御史大夫四嵗泰始三年卒家兩子夾河為守其治暴酷皆甚於王溫舒等矣杜周初徵為廷史有一馬且不全及身久任事至三公列子孫尊官家訾纍數巨萬矣太史公曰自郅都杜周十人者此皆以酷烈為聲然郅都伉直引是非爭天下大體張湯以知陰陽人主與俱上下時數辨當否國家賴其便趙禹時據法守正杜周從諛以少言為重自張湯死後網密多詆嚴官事寖以耗廢九卿碌碌奉其官救過不贍何暇論繩墨之外乎然此十人中其廉者足以為儀表其汚者足以為戒徐廣曰一本無此四字方略教導禁姦止邪一切亦皆彬彬質有其文武焉雖慘酷斯稱其位矣至若蜀守馮當暴挫廣漢李貞擅磔人東郡彌僕鋸項天水駱璧推減徐廣曰一作成河東禇廣妄殺京兆無忌馮翊殷周蝮鷙水衡閻奉抃擊賣請何足數哉何足數哉史記集解卷一百二十二
