body:
  text: 史記集解卷六十七宋裴駰撰史記六十七仲尼弟子列傳第七孔子曰受業身通者七十有七人皆異能之士也徳行顔淵閔子騫冉伯牛仲弓政事冉有季路言語宰我子貢文學子游子夏師也僻參也魯柴也愚由也喭回也屢空賜不受命而貨殖焉億則屢中何晏曰言回庶幾于聖道雖數空匱而樂在其中賜不受教命惟財貨是殖億度是非盖美回所以勵賜也一曰屢猶每也空猶虛中也以聖人之善道教數子之庶幾猶不至于知道者各内有此害也其于庶幾每能虛中者惟回懐道深逺不虚心不能知道子貢無數子之病然亦不知道者雖不窮理而幸中雖非天命而偶當亦所以不虛心也孔子之所嚴事于周則老子于衛蘧伯玉大戴禮外寛而内直自設于隠括之中直已而不直人汲汲于仁以善自終盖蘧伯玉之行于齊晏平仲于楚老萊子于鄭子産大戴禮君擇臣而使之臣擇君而事之有道順命無道衡命盖晏平仲之行也于魯孟公綽數臧文仲栁下惠大戴禮孝恭慈仁允徳圗義約貨去怨盖栁下惠之行銅鞮伯華介山子然孔子皆後之不並世大戴禮曰孔子云國家有道其言足以興國家無道其黙足以容盖銅鞮伯華之所行觀于四方不忘其親茍思其親不盡其樂盖介山子然行也說苑曰孔子歎曰銅鞮伯華無死天下冇定矣晉太康地記云銅鞮晉大夫羊舌赤之邑世號赤曰銅鞮伯華顔回者魯人也字子淵少孔子三十歳顔淵問仁孔子曰克己復禮天下歸仁焉馬融曰克己約身也孔安國曰復反也身能反禮則為仁矣孔子曰賢哉回也一簟食一瓢飲在陋巷人不堪其憂回也不改其樂孔安國曰顔回樂道雖簟食在陋巷不改其所樂也回也如愚退而省其私亦足以發回也不愚孔安國曰察其退還與二三子說釋道義發明大體知其不愚用之則行捨之則藏惟我與爾有是夫孔安國曰言可行則行可止則止惟我與顔回同也樂肇曰用已而後行不假隠以自髙不屈道以要名時人無知其實者惟我與爾有是行回年二十九髮盡白蚤死孔子哭之慟曰自吾有回門人益親王肅曰顔回為孔子胥附之反能使門人日親孔子魯哀公問弟子孰為好學孔子對曰有顔回者好學不遷怒不貳過不幸短命死矣今也則亡何晏曰凡人任情喜怒違理顔回任道怒不過分遷者移也怒當其理不移易也不貳過者有不善未嘗復行閔損字子騫鄭𤣥曰孔子弟子目録云魯人少孔子十五歳孔子曰孝哉閔子騫人不間于其父母昆弟之言陳羣曰言子騫上事父母下順兄弟動静盡善故人不得有非間之言不仕大夫不食汙君之禄如有復我者孔安國曰復我者重來召我必在汶上矣孔安國曰去之汶水上欲北如齊冉耕字伯牛鄭𤣥曰魯人孔子以為有徳行伯牛有惡疾孔子往問之自牖執其手包氏曰牛有惡疾不欲見人孔子從牖執其手曰命也夫斯人也而有斯疾命也夫包曰再言之者痛之甚也冉雍字仲弓鄭𤣥曰魯人仲弓問政孔子曰出門如見大賔使民如承大祭孔安國曰莫尚乎敬在邦無怨在家無怨包氏曰在邦為諸候在家為卿大夫孔子以仲弓為有徳行曰雍也可使南面包曰可使南面言任諸侯之治仲弓父賤人孔子曰犁牛之子騂且角雖欲勿用山川其舍諸何晏曰犁雜文騂赤色也角者角周正巾犧牲雖欲以其所生犁而不用山川寧肯舍之乎言父雖不善不害于子之美冉求字子有鄭𤣥曰魯人少孔子二十九歲為季氏宰季康子問孔子曰冉求仁乎曰千室之邑百乗之家孔安國曰千室卿大夫之邑卿大夫稱家諸侯千乗大夫故曰百乗求也可使治其賦仁則吾不知也孔安國曰賦兵賦也仁道至大不可全名也復問子路仁乎孔子對曰如求求問曰聞斯行諸包氏曰賑窮救乏之事也子曰行之子路問聞斯行諸子曰有父兄在如之何其聞斯行之孔安國曰當白父兄不可自専子華怪之敢問問同而答異孔子曰求也退故進之由也兼人故退之鄭𤣥曰言冉有性謙退子路務在勝尚人各因其人之失而正之仲由字子路卞人也徐廣曰尸子曰子路卞之野人少孔子九歲子路性鄙好勇力志阬直冠雄雞佩猳豚冠以雄雞佩猳豚二物皆勇子路好勇故冠帯之陵暴孔子孔子設禮稍誘子路子路後儒服委質因門人請為弟子子路問政孔子曰先之勞之孔安國曰先道之以徳使民信之然後勞之易曰悦以使民民忘其勞請益曰無倦孔安國曰子路嫌其少故請益曰無倦者行此上事無倦則可子路問君子尚勇乎孔子曰義之為上君子好勇而無義則亂李充曰既稱君子不職為亂階也若君親失道國家昏亂其于赴患致命而不知正顧義者則亦䧟乎為亂而受不義之責也小人好勇而無義則盗子路有聞未之能行唯恐有聞孔安國曰前所聞未及行故恐復冇聞不得並行孔子曰片言可以折獄者其由也與孔安國曰片猶偏也聴訟必須兩辭以定是非偏信一言折獄者惟子路可也由也好勇過我無所取材欒肇曰適用曰材好勇過我用故云無所取若由也不得其死然孔安國曰不得以夀終也衣敝緼袍孔安國曰緼枲著也與衣狐狢者立而不恥者其由也歟由也升堂矣未入于室也馬融曰升我堂矣未入於室耳季康子問仲由仁乎孔子曰千乗之國可使治其賦不知其仁子路喜從游遇長沮桀溺荷蓧丈人子路為季氏宰季孫問曰子路可謂大臣與孔子曰可謂具臣矣孔安國曰言備臣數而已子路為蒲大夫辭孔子孔子曰蒲多壯士又難治然吾語汝恭以敬可以執勇言恭謹謙敬勇猛不能害故曰執也寛以正可以比衆音鼻言寛大清正衆必歸近之恭正以静可以報上初衛靈公有寵姬曰南子靈公太子蕢瞶得過南子懼誅出奔及靈公卒而夫人欲立公子郢郢不肯曰亡人太子之輒在於是衛立輒為君是為出公出公立十二年其父蕢瞶居外不得入子路為衛大夫孔悝之邑宰蕢瞶乃與孔悝作亂謀入孔悝家遂與其徒襲攻出公出公奔魯而蕢瞶入立是為莊公方孔悝作亂子路在外聞之而馳往遇子羔出衛城門謂子路曰出公去矣而門已閉子可還矣毋空受其禍子路曰食其食者不避其難子羔卒去有使者入城城門開子路隨而入造蕢瞶蕢瞶與孔悝登臺子路曰君焉用孔悝請得而殺之蕢瞶弗聴於是子路欲燔臺蕢瞶懼乃下石乞壺黶攻子路擊㫁子路之纓子路曰君子死而冠不免遂結纓而死孔子聞衛亂曰嗟乎由死矣已而果死故孔子曰自吾得由惡言不聞於耳王肅曰子路為孔侍衞故侮慢之人不敢有惡言是以惡言不聞于孔子耳是時子貢為魯使于齊宰予字子我鄭𤣥曰魯人利口辯辭既受業問三年之喪不已久乎君子三年不為禮禮必壊三年不為樂樂必崩舊糓既沒新糓既升鑽燧改火期可已矣馬融曰周書月令有更火之文春取榆栁之火夏取棗杏之火季夏取桑柘之火秋取柞楢之火冬取槐檀之火一年之中鑚火各異木故曰改火子曰於女安乎曰安汝安則為之君子居喪食㫖不甘聞樂不樂故弗為也孔安國曰㫖美也責其無仁于親故言汝安則為之宰我出子曰予之不仁也子生三年然後免於父母之懐馬融曰生未三嵗為父母所懐抱也夫三年之喪天下之通義也孔安國曰自天子達于庶人宰我晝寢子曰朽木不可雕也包氏曰朽腐也雕雕琢刻畫糞土之牆不可圬也王肅曰圬墁也二者喻雖施功猶不成也宰我問五帝之徳子曰予非其人也王肅曰言不足以明五帝之徳也宰我為臨菑大夫與田常作亂以夷其族孔子恥之端木賜衛人字子貢少孔子三十一歲子貢利口巧辭孔子常黜其辯問曰汝與回也孰愈孔安國曰愈猶勝也對曰賜也何敢望回回也聞一以知十賜也聞一以知二子貢既已受業問曰賜何人也孔子曰汝器也孔安國曰言汝器用之人曰何器也曰瑚璉也包曰瑚璉黍稷器夏曰瑚殷曰璉周曰簠簋宗廟之貴噐陳子禽問子貢曰仲尼焉學子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道夫子焉不學孔安國曰文武之道未墜落于地賢與不賢各有所識夫子無所不從學而亦何常師之有孔安國曰無所不從學故無常師又問曰孔子適是國必聞其攻求之與抑與之與鄭𤣥曰怪孔子所至之邦必與聞國政求而得之邪抑人君自願與之為治子貢曰夫子溫良恭儉讓以得之夫子之求之也其諸異乎人之求之也鄭𤣥曰言夫子行此五徳而得之與人求之異明人君自與之子貢問曰富而無驕貧而無謟何如孔子曰可也孔安國曰未足多也不如貧而樂道富而好禮鄭𤣥曰樂謂志于道不以貧為憂苦也田常欲作亂於齊憚髙國鮑晏故移其兵欲以伐魯孔子聞之謂門弟子曰夫魯墳墓所處父母之國國危如此二三子何為莫出子路請出孔子止之子張子石請行孔子弗許子貢請行孔子許之遂行至齊説田常曰君之伐魯過矣夫魯難伐之國其城薄以卑其地狹以泄其君愚而不仁大臣偽而無用其士民又惡甲兵之事此不可與戰君不如伐吳夫吳城髙以厚地廣以深甲堅以新士選以飽重器精兵盡在其中又使明大夫守之此易伐也田常忿然作色曰子之所難人之所易子之所易人之所難而以教常何也子貢曰臣聞之憂在内者攻强憂在外者攻弱今君憂在内吾聞君三封而三不成者大臣有不聴者也今君破魯以廣齊戰勝以驕主破國以尊臣王肅曰鮑晏等帥師若破國則臣尊矣而君之功不與焉則交日疎于主是君上驕主心下恣羣臣求以成大事難矣夫上驕則恣臣驕則爭是君上與主有卻下與大臣交争也如此則君之立于齊危矣故曰不如伐吳伐吳不勝民人外死大臣内空是君上無彊臣之敵下無民人之過孤主制齊者惟君也田常曰善雖然吾兵業已加魯矣去而之吳大臣疑我奈何子貢曰君案兵無伐臣請往使吳王令之救魯而伐齊君因以兵迎之田常許之使子貢南見吳王説曰臣聞之王者不絶世霸者無彊敵千鈞之重加銖兩而移今以萬乗之齊而私千乗之魯與吳争彊竊為王危之且夫救魯顯名也伐齊大利也以撫泗上諸侯誅暴齊以服彊晉利莫大焉名存亡魯實困彊齊智者不疑也吳王曰善雖然吾嘗與越戰棲之㑹稽越王苦身養士有報我心子待我伐越而聴子子貢曰越之勁不過魯吳之彊不過齊王置齊而伐越則齊已平魯矣且王方以存亡繼絶為名夫伐小越而畏彊齊非勇也夫勇者不避難仁者不窮約智者不失時王者不絶世以立其義今存越示諸侯以仁救魯伐齊威加晉國諸侯必相率而朝吳霸業成矣且王必惡越臣請東見越王令出兵以從此實空越名從諸侯以伐也吳王大説乃使子貢之越越王除道郊迎身御至舍而問曰此蠻夷之國大夫何以儼然辱而臨之子貢曰今者吾説吳王以救魯伐齊其志欲之而畏越曰待我伐越乃可如此破越必矣且夫無報人之志而令人疑之拙也有報人之意使人知之殆也事未發而先聞危也三者舉事之大患句踐頓首再拜曰孤嘗不料力乃與吳戰困于㑹稽痛入于骨髓日夜焦脣乾舌徒欲與吳王接踵而死孤之願也遂問子貢子貢曰吳王為人猛暴羣臣不堪國家敝于數戰士卒弗忍百姓怨上大臣内變子胥以諫死太宰嚭用事順君之過以安其私是殘國之治也今王誠發士卒佐之以徼結堯其志王肅曰激射其志重寶以説其心卑辭以尊其禮其伐齊必也彼戰不勝王之福矣戰勝必以兵臨晉臣請北見晉君令共攻之弱吳必矣其鋭兵盡于齊重甲困于晉而王制其敝此滅吳必矣越王大説許諾送子貢金百鎰劒一良矛二子貢不受遂行報吳王曰臣敬以大王之言告越王越王大恐曰孤不幸少失先人内不自量抵罪于吳軍敗身辱棲于會稽國為虚音墟莽莫朗反賴大王之賜使得奉俎豆而修祭祀死不敢忘何謀之敢慮後五日越使大夫種頓首言于吳王曰東海役臣孤句踐使者臣種敢修下吏問于左右今竊聞大王將興大義誅彊救弱困暴齊而撫周室請悉起境内士卒三千人孤請自被堅執鋭以先受矢石因越賤臣種奉先人藏器甲二十領鈇屈盧之矛步光之劍以賀軍吏吳王大説以告子貢曰越王欲身從寡人伐齊可乎子貢曰不可夫空人之國悉人之衆又從其君不義君受其幣許其師而辭其君吳王許諾乃謝越王于是吳王乃遂發九郡兵伐齊子貢因去之晉謂晉君曰臣聞之慮不先定不可以應卒兵不先辯不可以勝敵今夫齊與吳將戰彼戰而不勝越亂之必矣與齊戰而勝必以其兵臨晉晉君大恐曰為之奈何子貢曰修兵休卒以待之晉君許諾子貢去而之魯吳王果與齊人戰于艾陵大破齊師獲七將軍之兵而不歸果以兵臨晉與晉人相遇黄池之上吳晉争强晉人擊之大敗吳師越王聞之涉江襲吳去城七里而軍吳王聞之去晉而歸與越戰于五湖三戰不勝城門不守越遂圍王宫殺夫差而戮其相破吳三年東向而霸故子貢一出存魯亂齊破吳彊晉而霸越子貢一使使勢相破十年之中五國各有變子貢好廢舉與時轉貨貲廢舉謂停貯也與時謂逐時也夫物賤則買而停貯值貴即逐時轉易貨賣取資利也喜揚人之美不能匿人之過常相魯衞家累千金卒終于齊言偃吳人字子游少孔子四十五歲子游既已受業為武城宰孔子過聞弦歌之聲孔子莞爾而笑何晏曰莞爾小笑貌曰割雞焉用牛刀孔安國曰言治小何須用大道子游曰昔者偃聞諸夫子曰君子學道則愛人小人學道則易使孔安國曰道謂禮樂也樂以和人人和則易使孔子曰二三子孔安國曰従行者偃之言是也前言戲之耳孔安國曰戲以治小而用大孔子以為子游習于文學卜商字子夏家語云衞人鄭𤣥曰溫國卜商少孔子四十四歲子夏問巧笑倩兮美目盼兮素以為絢兮何謂也馬融曰倩笑貌盼動目貌絢文貌此上二句在衞風碩人之二章其下一句逸詩子曰繪事後素鄭𤣥曰繪畫文也凡畫繢先布衆色然後以素分布其間以成其文喻美女雖有倩盼美質亦須禮以成也曰禮後乎何晏曰孔言繪事後素子夏聞而解知以素喻禮故曰禮後乎孔子曰商始可與言詩已矣包曰能發明我意可與言詩矣子貢問師與商孰賢子曰師也過商也不及孔安國曰言俱不得中然則師愈與曰過猶不及子謂子夏曰汝為君子儒無為小人儒何晏曰君子之儒將以明道小人為儒則矜其名孔子既沒子夏居西河教授為魏文侯師其子死哭之失明顓孫師陳人字子張少孔子四十八歲子張問干禄鄭𤣥曰干求也禄禄位也孔子曰多聞闕疑慎言其餘則寡尤包氏曰尤過也疑則闕之其餘不疑猶慎言之則少過多見闕殆慎行其餘則寡悔包氏曰殆危也所見危者闕而不行則少悔言寡尤行寡悔禄在其中矣鄭𤣥曰言行如此雖不得禄得禄之道他日從在陳蔡間困問行孔子曰言忠信行篤敬雖蠻貊之國行也言不忠信行不篤敬雖州里行乎哉鄭𤣥曰二千五百家為州五家為隣五隣為里行乎哉言不可行立則見其參于前也在輿則見其倚于衡夫然後行包氏曰衡軛也言思念忠信立則常相見參然在前在輿則若倚于車軛子張書諸紳孔安國曰紳大帯也子張問士何如斯可謂之達矣孔子曰何哉爾所謂達者子張對曰在國必聞在家必聞鄭𤣥曰言士之所在皆能有名譽孔子曰是聞也非達也夫達者質直而好義察言而觀色慮以下人馬融曰常有謙退之志察言語觀顔色知其所欲其念慮常欲下于人在國及家必達馬融曰謙尊而光卑而不可踰夫聞也者色取仁而行違居之不疑馬融曰此言佞人也佞人假仁者之色行之則違安居其偽而不自疑在國及家必聞馬融曰佞人黨多曾參南武城人字子輿少孔子四十六歳孔子以為能通孝道故授之業作孝經死于魯澹臺滅明包氏曰澹臺姓滅明名武城人字子羽少孔子三十九歳狀貌甚惡欲事孔子孔子以為材薄既已受業退而修行行不由徑非公事不見卿大夫包氏曰言其公且方南游至江從弟子三百人設取予去就名施乎諸侯孔子聞之曰吾以言取人失之宰予以貌取人失之子羽宓不齊字子賤孔安國曰魯人少孔子四十九歳孔子謂子賤君子哉魯無君子斯焉取斯包氏曰如魯無君子子賤安得此行而學子賤為單父宰反命于孔子曰此國有賢不齊者五人教不齊所以治者孔子曰惜哉不齊所治者小所治者大則庶幾矣原憲字子思鄭𤣥曰魯人子思問恥孔子曰國有道糓孔安國曰糓禄也邦有道當食禄國無道糓恥也孔安國曰君無道而在其朝食其禄是恥辱也子思曰克伐怨欲不行焉可以為仁乎馬融曰克好勝人也伐自伐其功怨忌也欲貪欲也孔子曰可以為難矣仁則吾弗知也鄭𤣥曰四者行之難未足以為仁孔子卒原憲亡在草澤中子貢相衞而結駟連騎排藜藿入窮閻過謝原憲憲攝敝衣冠見子貢子貢恥之曰夫子豈病乎原憲曰吾聞之無財者謂之貧學道而不能行者謂之病若憲貧也非病也子貢慙不懌而去終身恥其言之過也公冶長齊人字子長孔子曰長可妻也雖在累紲之中孔安國曰累黒索也紲攣也所以拘罪人非其罪也以其子妻之張華曰公冶長墓在城陽姑幕城東南五里所墓極髙南宫括字子容孔安國曰容魯人問孔子曰羿善射奡盪舟孔安國曰羿有窮之君篡夏后位其徒寒捉殺之因其室而生奡奡多力能陸地行舟為夏后少康所殺俱不得其死然禹稷躬稼而有天下孔子弗答馬融曰禹盡力于溝洫稷播百糓故曰躬稼也禹及其身稷及後世皆王括意欲以禹稷比孔子孔子謙故不答容出孔子曰君子哉若人上徳哉若人孔安國曰賤不義而貴徳故曰君子國有道不廢孔安國曰不廢言見用國無道免於刑戮三復白珪之玷孔安國曰詩云白珪之玷尚可磨也斯言之玷不可為也南容讀詩至此三反之是其心敬慎于言以其兄之子妻之公晳哀字季次孔子家語云齊人孔子曰天下無行多為家臣仕於都唯季次未嘗仕曾蒧音㸃字晢孔安國曰晢曾參父侍孔子孔子曰言爾志蒧曰春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸徐廣曰一作饋駰案包氏曰暮春者季春三月也春服既成衣單袷之時我欲得冠者五六人童子六七人浴于沂水之上風涼於舞雩之下歌詠先王之道歸于夫子之門孔子喟爾嘆曰吾與蒧也周氏曰善蒧之獨知時也顔無繇音遥字路路者顔回父父子嘗各異時事孔子顔囘死顔路貧請孔子車以葬孔安國曰賣以作椁孔子曰材不材亦各言其子也鯉也死有棺而無椁吾不徒行以為之椁以吾從大夫之後不可以徒行孔安國曰鯉孔子子伯魚孔子時為大夫言從大夫之後不可徒行謙辭也商瞿魯人字子木少孔子二十九歲孔子傳易於瞿瞿傳楚人馯徐廣曰音寒臂子𢎞𢎞傳江東人矯矯又音橋子庸疵自移反疵傳燕人周子家豎豎傳淳于人光子乗羽羽傳齊人田子莊何何傳東武人徐廣曰屬琅邪王子中同同傳菑川人楊何何元朔中以治易為漢中大夫髙柴字子羔鄭𤣥曰衞人少孔子三十歲子羔長不盈五尺受業孔子孔子以為愚子路使子羔為費郈宰孔子曰賊夫人之子包氏曰子羔學未孰習而使為政所以賊害人子路曰有民人焉有社稷焉何必讀書然後為學孔安國曰言治人事神于是而習亦學也孔子曰是故惡夫佞者孔安國曰疾其以給應遂已非而不知窮也漆雕開字子開鄭𤣥曰魯人也孔子使開仕對曰吾斯之未能信孔安國曰仕進之道未能信者未能究習孔子説鄭𤣥曰善其志道深公伯僚字子周馬融曰魯人周愬子路於季孫子服景伯以告孔子曰夫子固有惑志孔安國曰季孫信譖恚子路也僚也吾力猶能肆諸市朝鄭𤣥曰吾勢猶能辯子路之無罪於季孫使人誅僚而肆之也有罪既刑陳其尸曰肆孔子曰道之將行命也道之將廢命也公伯僚其如命何司馬耕字子牛孔安國曰宋人牛多言而躁問仁於孔子孔子曰仁者其言也訒孔安國曰訒難也曰其言也訒斯可謂之仁乎子曰為之難言之得無訒乎孔安國曰行仁難言仁亦不得不難也問君子子曰君子不憂不懼孔安國曰牛兄桓魋將為亂牛自宋来學常憂懼故孔子解之也曰不憂不懼斯可謂之君子乎子曰内省不疚夫何憂何懼包氏曰疚病自省無罪惡無可憂懼樊須字子遲鄭𤣥曰齊人少孔子三十六歲樊遲請學稼孔子曰吾不如老農請學圃曰吾不如老圃馬融曰樹五穀曰稼樹菜蔬曰圃樊遲出孔子曰小人哉樊須也上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情孔安國曰情實也言民化上各以實應夫如是則四方之民襁負其子而至矣焉用稼包氏曰禮義與信足以成徳何用學稼以教民乎負子之器曰襁樊遲問仁子曰愛人問智曰知人有若鄭𤣥曰魯人少孔子四十三歲有若曰禮之用和為貴先王之道斯為美小大由之有所不行知和而和不以禮節之亦不可行也馬融曰人知禮貴和而每事従和不以禮為莭亦不可以行之信近於義言可復也何晏曰復猶覆也義不必信信非義也以其言可覆故曰近義恭近於禮逺恥辱也何晏曰恭不合禮非禮也以其能逺恥辱故曰近禮因不失其親亦可宗也孔安國曰因親也言所親不失其親亦可宗敬孔子既沒弟子思慕有若狀似孔子弟子相與共立為師師之如夫子時也他日弟子進問曰昔夫子當行使弟子持雨具已而果雨弟子問曰夫子何以知之夫子曰詩不云乎月離于畢俾滂沱矣毛傳曰畢噣也月離隂星則雨昨暮月不宿畢乎他日月宿畢竟不雨商瞿年長無子其母為取室孔子使之齊瞿母請之孔子曰無憂瞿年四十後當有五丈夫子五男也已而果然敢問夫子何以知此有若黙然無以應弟子起曰有子避之此非子之座也公西赤字子華鄭𤣥曰魯人少孔子四十二歳子華使於齊冉有為其母請粟孔子曰與之釡馬融曰六斗四升曰釡請益曰與之庾包氏曰十六斗曰庾冉子與之粟五秉馬融曰十六斛曰秉五秉合八十斛孔子曰赤之適齊也乗肥馬衣輕裘吾聞君子周急不繼富鄭𤣥曰非冉有與之太多巫馬施字子旗鄭𤣥曰魯人少孔子三十歳陳司敗孔安國曰司敗官名陳大夫也問孔子曰魯昭公知禮乎孔子曰知禮退而揖巫馬旗曰吾聞君子不黨君子亦黨乎魯君娶吳女為夫人命之為孟子孟子姓姬諱稱同姓故謂之孟子魯君而知禮孰不知禮孔安國曰相助匿非曰黨禮同姓不㛰而君娶之當稱吳姬諱曰孟子施以告孔子孔子曰丘也幸茍有過人必知之臣不可言君親之惡為諱者禮也孔安國曰以司敗之言告也諱國惡禮也聖人之道𢎞故受之為過也梁鱣一作鯉字叔魚少孔子二十九歲孔子家語曰齊人顔幸字子栁少孔子四十六歲鄭𤣥曰魯人也冉孺字子魯一作曾少孔子五十歲家語曰魯人曹䘏字子循少孔子五十歲伯䖍字子析少孔子五十歲公孫龍字子石少孔子五十三歲鄭𤣥曰楚人自子石已右三十五人頗有年名及受業聞見于書傳其四十有二人無年及不見書傳者紀于左冉季字子産鄭𤣥曰魯人公祖句兹字子之秦祖字子南鄭𤣥曰秦人漆雕哆赤者反字子斂鄭𤣥曰魯人顔高字子驕漆雕徒父壤駟赤字子徒鄭𤣥曰秦人商澤家語曰字子秀石作蜀字子明任不齊字選鄭𤣥曰楚人公良孺字子正鄭𤣥曰陳人賢而有勇后處字子里鄭𤣥曰齊人秦冉字開公夏首字乗鄭𤣥曰魯人奚容箴字子晢公肩定字子中鄭𤣥曰魯人或曰晉人顔祖字襄鄡苦堯單善字子家徐廣曰一云鄡單鉅鹿有鄡縣太原有鄡縣句井疆鄭𤣥曰衞人罕父黑字子索家語曰罕父黑字索秦商字子丕鄭𤣥曰楚人申黨字周顔之僕字叔鄭𤣥曰魯人榮旂字子褀縣成字子褀鄭𤣥曰魯人左人郢字行鄭𤣥曰魯人燕伋字思鄭國字子徒秦非字子之鄭𤣥曰魯人施之常字子恒顔噲字子聲鄭𤣥曰魯人步叔乗字子車鄭𤣥曰齊人原亢籍家語曰名忼字籍樂欬字子聲亷絜字庸鄭𤣥曰衞人叔仲㑹字子期鄭𤣥曰魯人顔何字冉鄭𤣥曰魯人狄黒字晢邽巽字子斂鄭𤣥曰魯人孔忠家語曰忠字子蔑孔子兄之子公西輿如字子上公西蒧字子上鄭𤣥曰魯人太史公曰學者多稱七十子之徒譽者或過其實毁者或損其真鈞之未覩厥容貌則論言弟子籍出孔氏古文近是余以弟子名姓文字悉取論語弟子問并次為篇疑者闕焉史記集解卷六十七
