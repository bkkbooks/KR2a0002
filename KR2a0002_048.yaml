body:
  text: 史記集解卷五十宋裴駰撰史記五十楚元王世家第二十楚元王劉交者髙祖之同母徐廣曰一作父少弟也字遊髙祖兄弟四人長兄伯伯蚤卒始髙祖微時嘗辟事時時與賔客過巨嫂食徐廣曰漢書云丘嫂也嫂厭叔叔與客來嫂詳為羮盡櫟釡賔客以故去已而視釡中尚有羮髙祖由此怨其嫂及髙祖為帝封昆弟而伯子獨不得封太上皇以為言髙祖曰某非忘封之也為其母不長者耳於是乃封其子信為羮頡侯徐廣曰羮頡侯以髙祖七年封封十三年髙后元年有罪削爵一級為關內侯而王次兄仲於代徐廣曰次兄名喜字仲以六年立為代王其年罷卒諡項王有子曰濞髙祖六年已禽楚王韓信於陳乃以弟交為楚王都彭城即位二十三年卒子夷王郢立夷王四年卒子王戊立王戊立二十年冬坐為薄太后服私姦削東海郡春戊與吳王合謀反其相張尚太傳趙夷吾諫不聽戊則殺尚夷吾起兵與吳西攻梁破棘壁至昌邑南與漢將周亞夫戰漢絶吳楚糧道士卒飢吳王走楚王戊自殺軍遂降漢漢已平吳楚孝景帝欲以德侯子續吳徐廣曰德侯名廣吳王濞之弟也其父曰仲以元王子禮續楚竇太后曰吳王老人也宜為宗室順善今乃首率七國紛亂天下奈何續其後不許吳許立楚後是時禮為漢宗正乃拜禮為楚王奉元王宗廟是為楚文王文王立三年卒子安王道立安王二十二年卒子襄王注立襄王立十四年卒子王純代立王純立地節二年中人上書告楚王王謀反王自殺國除入漢為彭城郡徐廣曰純立十七年卒諡節王子延夀立十九年死趙王劉遂者其父髙祖中子名友諡曰幽幽王以憂死故為幽髙后王呂祿於趙一歲而髙后崩大臣誅諸吕吕祿等乃立幽王子遂為趙王孝文帝即位二年立遂辟強取趙之河間郡為河間王以為文王立十三年卒子哀王福立一年卒無子絶後國除入於漢遂既王趙二十六年孝景帝時坐鼂錯以適削趙王常山之郡吳楚反趙王遂與合謀起兵其相建德內史王悍諫不聽遂燒殺建德王悍發兵屯其西界欲待吳與俱西北使胸奴與連和攻漢漢使曲周侯酈寄擊之趙王遂還城守邯鄲相距七月吳楚敗於梁不能西胸奴聞之亦止不肯入漢邊欒布自破齊還乃并兵引水灌趙城趙城壞趙王自殺邯鄲遂降趙幽王絶後太史公曰國之將興必有禎祥君子用而小人退國之將亡賢人隱亂臣貴使楚王戊毋刑申公遵其言趙任防與先生趙堯傳曰趙人防與公也豈有篡殺之謀為天下僇哉賢人乎賢人乎非質有其內惡能用之哉甚矣安危在出令存亡在所任誠哉是言也史記集解卷五十
