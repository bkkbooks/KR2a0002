body:
  text: 史記集解卷一百十二宋裴駰撰史記一百十二平津侯主父列傳第五十二丞相公孫𢎞者菑川薛縣人也字季少時為薛獄吏有辠免家貧牧豕海上年四十餘乃學春秋雜説養後母孝謹建元元年天子初即位招賢良文學之士是時𢎞年六十徴以賢良為博士使匈奴還報不合上意上怒以為不能𢎞乃病免歸元光五年有詔徴文學菑川國復推上公孫𢎞𢎞讓謝國人曰臣以甞西應命以不能罷歸願更推選國人固推𢎞𢎞至太常太常令所徴儒士各對䇿百餘人𢎞第居下䇿奏天子擢𢎞䇿為第一召入見狀貎甚麗拜為博士是時通西南夷道置郡巴蜀民苦之詔使𢎞視之還奏事盛毁西南夷無所用上不聴𢎞為人恢竒多聞常稱以為人主病不廣大人臣病不節儉𢎞為布被食不重肉後母死服䘮三年毎朝㑹議開陳其端令人主自擇不肯面折庭爭於是天子察其行敦厚辯論有餘習文法吏事而又縁飾以儒術上大説之二嵗中徐廣曰云一嵗至左内史𢎞奏事有不可不庭辯之常與主爵都尉汲黯請間汲黯先發之𢎞推其後天子常説所言皆聴以此日益親貴甞與公卿約議至上前皆倍其約以順上㫖汲黯庭詰𢎞曰齊人多詐而無情實始與臣等建此議今皆倍之不忠上問𢎞𢎞謝曰夫知臣者以臣為忠不知臣者以臣為不忠上然𢎞言左右幸臣每毁𢎞上益厚遇之元朔三年張歐免以𢎞為御史大夫是時通西南夷東置滄海北築朔方之郡𢎞數諌以為罷敝中國以奉無用之地願罷之於是天子乃使朱買臣等難𢎞置朔方之便發十䇿𢎞不得一韋昭曰以𢎞之才非不能得一也以為不可不敢逆上耳𢎞迺謝曰山東鄙人不知其便若是願罷西南夷滄海而専奉朔方上乃許之汲黯曰𢎞位在三公奉禄甚多然為布被此詐也上問𢎞𢎞謝曰有之夫九卿與臣善者無過黯然今日庭詰𢎞誠中𢎞之病夫以三公為布被誠飾詐欲以釣名且臣聞管仲相齊有三歸侈擬於君桓公以霸亦上僣於君晏嬰相景公食不重肉妾不衣絲齊國亦治此下比於民今臣𢎞位為御史大夫而為布被自九卿以下至於小吏無差誠如汲黯言且無汲黯忠陛下安得聞此言天子以為謙讓愈益厚之卒以𢎞為丞相封平津侯徐廣曰大臣表曰元朔五年十一月乙丑公孫𢎞為丞相功臣表曰元朔三年十一月乙丑封平津侯駰案漢書髙成之平津侯也𢎞為人意忌外寛内深諸甞與𢎞有郤者雖佯與善隂報其禍殺主父偃徙董仲舒於膠西皆𢎞之力也食一肉脫粟之飯故人所善賔客仰衣食𢎞奉禄皆以給之家無所餘士亦以此賢之淮南衡山謀反治黨與方急𢎞病甚自以為無功而封位至丞相宜佐明主鎮撫國家使人由臣子之道今諸侯有畔逆之計此皆宰相奉職不稱恐竊病死無以塞責乃上書曰臣聞天下之通道五所以行之者三曰君臣父子兄弟夫婦長幼之序此五者天下之通道也知仁勇此三者天下之通徳所以行之者也故曰力行近乎仁好問近乎知知恥近乎勇知斯三者則知所以自治知所以自治然後知所以治人天下未有不能自治而能治人者也此百世不易之道也今陛下躬行大孝鑒三王建周道兼文武厲賢予禄徐廣曰厲一作廣也量能授官今臣𢎞罷駑之質無汗馬之勞陛下過意擢臣𢎞卒伍之中封為列侯致位三公臣𢎞行能不足以稱素有負薪之疾恐先狗馬填溝壑終無以報徳塞責願歸侯印乞骸骨避賢者路天子報曰古者賞有功襃有徳守成尚文遭遇右武未有易此者也朕宿昔庶㡬獲承尊位懼不能寧惟所與共為治者君宜知之葢君子善善惡惡君宜知之君若謹行常在朕躬君不幸罹霜露之病何恙不已漢書音義曰何恙喻小疾不以時愈乃上書歸侯乞骸骨是章朕之不徳也今事少間君其省思慮一精神輔以醫藥因賜告牛酒雜帛居數月病有瘳視事元狩二年𢎞病竟以丞相終漢書曰年八十子度嗣為平津侯度為山陽太守十餘嵗坐法失侯主父偃者齊臨菑人也學長短縱横之術晚乃學易春秋百家言游齊諸生間莫能厚遇也齊諸儒生相與排擯不容於齊家貧假貸無所得乃北游燕趙中山皆莫能厚遇為客甚困孝武元光元年中以為諸侯莫足游者乃西入闗見衛将軍衛将軍數言上上不召資用之留乆諸公賔客多厭之乃上書闕下朝奏暮召入見所言九事其八事為律令一事諌伐匈奴其辭曰臣聞明主不惡切諌以博觀忠臣不敢避重誅以直諌是故事無遺䇿而功流萬世今臣不敢隠忠避死以效愚計願陛下幸赦而少察之司馬法曰國雖大好戰必亡天下雖平忘戰必危天下既平天子大凱應劭曰大凱周禮還師振旅之樂春蒐秋獮諸侯春振旅秋治兵所以不忘戰也宋均曰春秋少陽少隂氣弱未全須人功而後用士庶法之教而後成宗仁本義天子諸侯必春秋講武簡閲車徒以順時氣不忘戰也且夫怒者逆徳也兵者凶器也爭者末節也古之人君一怒必伏尸流血故聖王重行之夫務戰勝窮武事者未有不悔者也昔秦皇帝任戰勝之威蠶食天下并吞戰國海内為一功齊三代務勝不休欲攻匈奴李斯諫曰不可夫匈奴無城郭之居委積之守遷徙鳥舉難得而制也輕兵深入糧食必絶踵糧以行重不及事得其地不足以為利也遇其民不可役而守也勝必殺之非民父母也靡敝中國快心匈奴非長䇿也秦皇帝不聽遂使䝉恬將兵攻胡辟地千里以河為境地固澤徐廣曰一作斥鹹鹵瓚曰其地多水澤又有鹵不生五榖然後發天下丁男以守北河暴兵露師十有餘年死者不可勝數終不能踰河而北是豈人衆不足兵革不備哉其勢不可也又使天下蜚芻輓粟文穎曰轉芻穀就戰是也起於東腄徐廣曰腄在東萊音縋琅邪負海之郡轉輸北河率三十鍾而致一石男子疾耕不足於糧饟女子紡績不足於帷幕百姓靡敝孤寡老弱不能相養道路死者相望葢天下始畔秦也及至髙皇帝定天下略地於邉聞匈奴聚於代谷之外而欲擊之御史成進諌曰不可夫匈奴之性獸聚而鳥散從之如摶影今以陛下盛徳攻匈奴臣竊危之髙帝不聴遂北至於代谷果有平城之圍髙皇帝葢悔之甚乃使劉敬往結和親之約然後天下㤀干戈之事故兵法曰興師十萬日費千金夫秦常積衆暴兵數十萬人雖有覆車殺将係虜單于之功亦適足以結怨深讎不足以償天下之費夫上虚府庫下敝百姓甘心於外國非完事也夫匈奴難得而制非一世也行盜侵驅所以為業也天性固然上及虞夏殷周固弗程督禽獸畜之不屬為人夫上不觀虞夏殷周之統而下修近世之失此臣之所大憂百姓之所疾苦也且夫兵乆則變生事苦則虞易乃使邉境之民靡敝愁苦而有離心将吏相疑而外市張晏曰與外國交求利己若章邯之比故尉佗章邯得以成其私也夫秦政之所以不行者權分乎二子此得失之效也故周書曰安危在出令存亡在所用願陛下詳察之少加意而熟慮焉是時趙人徐樂齊人嚴安俱上書言世務各一事徐樂曰臣聞天下之患在於土崩不在於瓦觧古今一也何謂土崩秦之末世是也陳涉無千乘之尊尺土之地身非王公大人名族之後無鄉曲之譽非有孔墨曽子之賢陶朱猗頓之富也然起窮巷奮棘矜矜音勤偏袒大呼而天下從風此其故何也由民困而主不恤下怨而上不知也俗已亂而政不修此三者陳涉之所以為資也是之謂土崩故曰天下之患在於土崩何謂瓦解吴楚齊趙之兵是也七國謀為大逆號皆稱萬乗之君帶甲數十萬威足以嚴其境内財足以勸其士民然不能西攘尺寸之地而身為禽於中原者此其故何也非權輕於匹夫而兵弱於陳涉也當是之時先帝之徳澤未衰而安土樂俗之民衆故諸侯無境外之助此之謂瓦解故曰天下之患不在瓦解由是觀之天下誠有土崩之勢雖布衣窮處之士或首惡而危海内陳涉是也况三晉之君或存乎天下雖未有大治也誠能無土崩之勢雖有彊國勁兵不得旋踵而身為禽矣吴楚齊趙是也况羣臣百姓能為亂乎哉此二體者安危之明要也賢主所留意而深察也間者闗東五榖不登年嵗未復民多窮困重之以邉境之事推數循理而觀之則民且有不安其處者矣不安故易動易動者土崩之勢也故賢主獨觀萬化之原明於安危之機修之廟堂之上而銷未形之患其要期使天下無土崩之勢而已矣故雖有彊國勁兵陛下逐走獸射蜚鳥𢎞游燕之囿淫縱恣之觀極馳騁之樂自若也金石絲竹之聲不絶於耳帷帳之私俳優侏儒之笑不乏於前而天下無宿憂名何必湯武俗何必成康雖然臣竊以為陛下天然之聖寛仁之資而誠以天下為務則湯武之名不難侔而成康之俗可復興也此二體者立然後處尊安之實揚名廣譽於當世親天下而服四夷餘恩遺徳為數世隆南面負扆攝袂而揖王公此陛下之所服也臣聞圖王不成其敝足以安安則陛下何求而不得何為而不成何征而不服乎哉嚴安上書曰臣聞周有天下其治三百餘嵗成康其隆也刑錯四十餘年而不用及其衰也亦三百餘嵗故五伯更起五伯者常佐天子興利除害誅暴禁邪匡正海内以尊天子五伯既沒賢聖莫續天子孤弱號令不行諸侯恣行強陵弱衆暴寡田常簒齊六卿分晉竝為戰國此民之始苦也於是强國務攻弱國備守合從連横馳車擊轂介胄生蟣蝨民無所告愬及至秦王蠶食天下并吞戰國稱號曰皇帝一海内之政壞諸侯之城銷其兵鑄以為鐘虡示不復用元元黎民得免於戰國逢明天子人人自以為更生嚮使秦緩其刑罰薄賦斂省繇役貴仁義賤權利上篤厚下智巧變風易俗化於海内則世世必安矣秦不行是風而修其故俗為智巧權利者進篤厚忠信者退法嚴政峻謟諛者衆日聞其美意廣心軼欲肆威海外乃使䝉恬將兵以北攻胡辟地進境戍於北河蜚芻輓粟以隨其後又使尉佗屠雎将樓船之士南攻百越使監禄韋昭曰監御史名禄也鑿渠運糧深入越越人遁逃曠日持乆糧食絶乏越人擊之秦兵大敗秦乃使尉佗将卒以戍越當是時秦禍北搆於胡南挂於越宿兵無用之地進而不得退行十餘年丁男被甲丁女轉輸苦不聊生自經於道樹死者相望及秦皇帝崩天下大叛陳勝吴廣舉陳武臣張耳舉趙項渠舉吴田儋舉齊景駒舉郢周市舉魏韓廣舉燕窮山通谷豪士竝起不可勝載也然皆非公侯之後非長官之吏也無尺寸之勢起閭巷杖棘矜應時而皆動不謀而俱起不約而同㑹壤長地進張晏曰壤進益也至於霸主時教使然也秦貴為天子富有天下滅世絶祀者窮兵之禍也故周失之弱秦失之強不變之患也今欲招南夷朝夜郎降羌僰略濊州如淳曰東夷也建城邑深入匈奴燔其蘢城議者美之此人臣之利也非天下之長䇿也今中國無狗吠之驚而外累於逺方之備靡敝國家非所以子民也行無窮之欲甘心快意結怨於匈奴非所以安邉也禍結而不解兵休而復起近者愁苦逺者驚駭非所以持乆也今天下鍜甲砥劒橋箭累弦轉輸運糧未見休時此天下之所共憂也夫兵乆而變起事煩而慮生今外郡之地或㡬千里列城數十形束壤制服䖍曰言所束在郡守土壤足以専民制蘇林曰言其土地形勢足以束制其民也㫄脅諸侯非公室之利也上觀齊晉之所以亡者公室卑削六卿大盛也下觀秦之所以滅者嚴法刻深欲大無窮也今郡守之權非特六卿之重也地㡬千里非特閭巷之資也甲兵器械非特棘矜之用也以遭萬世之變則不可稱諱也書奏天子天子召見三人謂曰公等皆安在何相見之晚也徐廣曰它史記本皆不見嚴安此旁所纂者皆取漢書耳然漢書不冝乃容大異或寫史記相承闕脫也於是上乃拜主父偃徐樂嚴安為郎中數見上疏言事詔拜偃為謁者遷樂為中大夫一嵗中四遷偃偃説止曰古者諸侯不過百里彊弱之形易制今諸侯或連城數十地方千里緩則驕奢易為淫亂急則阻其彊而合從以逆京師今以法割削之則逆節萌起前日鼂錯是也今諸侯子弟或十數而適嗣代立餘雖骨肉無尺寸地封則仁孝之道不宣願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願上以徳施實分其國不削而稍弱矣於是上從其計徐廣曰元朔二年始令諸侯王分封子弟也又説上曰茂陵初立天下豪桀并兼之家亂衆之民皆可徙茂陵内實京師外銷姦猾此所謂不誅而害除上又從其計尊立衛皇后及發燕王定國隂事偃有功焉大臣皆畏其口賂遺累千金人或説偃曰太横矣主父曰臣結髪游學四十餘年身不得遂親不以為子昆弟不收賔客棄我我阨日乆矣且丈夫生不五鼎食死即五鼎烹耳吾日暮途逺故倒行暴施之偃盛言朔方地肥饒外阻河䝉恬城之以逐匈奴内省轉輸戍漕廣中國滅胡之本也上覽其説下公卿議皆言不便公孫𢎞曰秦時常發三十萬衆築北河終不可就已而棄之主父偃盛言其便上竟用主父計立朔方郡元朔二年主父言齊王内淫佚行僻上拜主父為齊相至齊徧召昆弟賔客散五百金與之數之曰始吾貧時昆弟不我衣食賔客不我内門今吾相齊諸君迎我或千里吾與諸君絶矣毋復入偃之門乃使人以王與姊姧事動王王以為終不能脫罪恐效燕王論死乃自殺有司以聞主父始為布衣時嘗游燕趙及其貴發燕事趙王恐其為國患欲上書言其隂事為偃居中不敢發及為齊相出闕即使人上書告言主父偃受諸侯金以故諸侯子弟多以得封者及齊王自殺上聞大怒以為主父刼其王令自殺乃徴下吏治主父服受諸侯金實不劫王令自殺上欲勿誅是時公孫𢎞為御史大夫乃言曰齊王自殺無後國除為郡入漢主父偃本首惡陛下不誅主父偃無以謝天下乃遂族主父偃主父方貴幸時賔客以千數及其族死無一人收者唯獨洨孔車徐廣曰孔車洨人也沛有洨縣收𦵏之天子後聞之以為孔車長者也太史公曰公孫𢎞行義雖修然亦遇時漢興八十餘年矣徐廣曰漢初至元朔二年八十年也上方鄉文學招俊乂以廣儒墨𢎞為舉首主父偃當路諸公皆譽之及名敗身誅士爭言其惡悲夫太皇太后詔大司徒大司空徐廣曰此詔是平帝元始中王元后詔後人寫此及班固所稱以續卷后葢聞治國之道富民為始富民之要在於節儉孝經曰安上治民莫善於禮禮與奢也寧儉昔者管仲相齊桓霸諸侯有九合一匡之功而仲尼謂之不知禮以其奢泰侈擬於君故也夏禹卑宫室惡衣服後聖不循由此言之治之盛也徳優矣莫髙於儉儉化俗民則尊卑之序得而骨肉之恩親爭訟之原息斯乃家給人足刑錯之本也歟可不務哉夫三公者百寮之率萬民之表也未有樹直表而得曲影者也孔子不云乎子率而正孰敢不正舉善而教不能則勸維漢興以來股肱宰臣身行儉約輕財重義較然著明未有若故丞相平津侯公孫𢎞者也位在丞相而為布被脫粟之飯不過一肉故人所善賔客皆分奉禄以給之無有所餘誠内自克約而外從制汲黯詰之乃聞于朝此可謂減於制度應劭曰禮貴有常尊衣服有常品而可施行者也徳優則行否則止與内奢泰而外為詭服以釣虚譽者殊科以病乞骸骨孝武皇帝即制曰賞有功襃有徳善善惡惡君宜知之其省思慮存精神補以醫藥賜告治病牛酒雜帛居數月有瘳視事至元狩二年竟以善終于相位夫知臣莫若君此其效也𢎞子度嗣爵後為山陽太守坐法失侯夫表徳章義所以率俗厲化聖王之制不易之道也其賜𢎞後子孫之次當為後者爵闗内侯食邑三百户徴詣公車上名尚書朕親臨拜焉班固稱曰公孫𢎞卜式兒寛皆以鴻漸之翼困於燕雀李奇曰漸進也鴻一舉而進千里者羽翼之材也𢎞等皆以大材初為俗所薄若燕雀不知鴻鵠之志也逺迹羊豕之間韋昭曰逺跡謂耕牧在於逺方非遇其特焉能致此位乎是時漢興六十餘載海内乂安府庫充實而四夷未賔制度多闕上方欲用文武求之如弗及始以蒲輪迎枚生見主父而歎息羣臣慕嚮異人竝出卜式試於芻牧𢎞羊擢於賈䜿衛青奮於奴僕日磾出於降虜斯亦曩時版築飯牛之明矣漢之得人於兹為盛儒雅則公孫𢎞董仲舒兒寛篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚臯應對則嚴助朱買臣厯數則唐都落下閎恊律則李延年運籌則桑𢎞羊奉使則張騫蘇武将帥則衛青霍去病受遺則霍光金日磾其餘不可勝紀是以興造功業制度遺文後世莫及孝宣承統纂修洪業亦講論六藝招選茂異而蕭望之梁邱賀夏侯勝韋𤣥成嚴彭祖尹更始以儒術進劉向王褒以文章顯将相則張安世趙充國魏相邴吉于定國杜延年治民則黃霸王成龔遂鄭宏邵信臣韓延壽尹翁歸趙廣漢之屬皆有功迹見述於後累其名臣亦其次也史記集解卷一百十二
