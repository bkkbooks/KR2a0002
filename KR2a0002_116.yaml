body:
  text: 史記集解卷一百十八宋裴駰撰史記一百十八淮南衡王列傳第五十八淮南厲王長者髙祖少子也其母故趙王張敖美人髙祖八年從東垣過趙趙王獻之美人厲王母得幸焉有身趙王敖弗敢內宫為築外宫而舍之及貫髙等謀反柏人事發覺并逮治王盡收捕王母兄弟美人繫之河內厲王母亦繫告吏曰得幸上有身吏以聞上上方怒趙王未理厲王母厲王母弟趙兼因辟陽侯言呂后呂后妒弗肯白辟陽侯不強爭及厲王母已生厲王恚即自殺吏奉厲王詣上上悔令呂后母之而葬厲王母真定真定厲王母之家在焉父世縣也髙祖十一年十月淮南王黥布反立子長為淮南王王黥布故地凡四郡徐廣曰九江盧江衡山豫章也上自將兵擊滅布厲王遂即位厲王蚤失母常附呂后孝惠呂后時以故得幸無患害而常心怨辟陽侯弗敢發及孝文帝初即位淮南王自以為最親驕蹇數不奉法上以親故常寬赦之三年入朝甚橫從上入苑囿獵與上同車常謂上大兄厲王有材力力能扛鼎乃往請辟陽侯辟陽侯出見之即自袖鐵椎椎辟陽侯令從者魏敬剄之厲王乃馳走闕下肉袒謝曰臣母不當坐趙事其時辟陽侯力能得之呂后弗爭罪一也趙王如意子母無罪呂后殺之辟陽侯弗爭罪二也呂后王諸呂欲以危劉氏辟陽侯弗爭罪三也臣謹為天下誅賊臣辟陽侯報母之仇謹伏闕下請罪孝文傷其志為親故弗治赦厲王當是時薄太后及太子諸大臣皆憚厲王厲王以此歸國益驕恣不用漢法出入稱警蹕稱制自為法令擬於天子六年令男子但等七十人與棘蒲侯柴武太子竒謀以輂車四十乘徐廣曰大車駕馬曰輂音已足反反谷口漢書音義曰谷口在長安北故縣也處多險阻令人使閩越胸奴事覺治之使使召淮南王淮南王至長安丞相臣張蒼典客臣馮敬行御史大夫事宗正臣逸廷尉臣賀備盜賊中尉臣福昧死言淮南王長廢先帝法不聽天子詔居處無度為黃屋蓋乘輿出入擬於天子擅為法令不用漢法及所置吏以其郎中春為丞相聚收漢諸侯人及有罪亡者匿與居為治家室賜其財物爵祿田宅爵或至關內侯奉以二千石所不當得欲以有為如淳曰賜亡畔來者如賜其國二千石也瓚曰奉以二千石之秩祿大夫但張晏曰大夫姓也上云男子但明其姓大夫也瓚曰官為大夫名但者也士伍開章等七十人如淳曰律有罪失官爵稱士伍者也開章名與棘蒲侯太子竒謀反徐廣曰棘蒲侯柴武以文帝後元年卒諡剛嗣子謀反不得置後國除欲以危宗廟社稷使開章隂告長與謀使閩越及胸奴發其兵開章之淮南見長長數與坐語飲食為家室娶婦以二千石俸奉之開章使人告但已言之王春使使報但等吏覺知使長安尉竒等往捕開章長匿不豫與故中尉簡忌謀殺以閉口為棺椁衣衾葬之肥陵邑謾吏曰不知安在又佯聚土樹表其上曰開章死埋此下及長身自賊殺無罪者一人令吏論殺無罪者六人為亡命棄市罪詐捕命者以除罪晉灼曰亡命者當棄市而王藏之詐捕不命者而言命以脫命者之罪擅罪人罪人無告劾繫治城旦舂以上十四人赦免罪人死罪十八人城旦舂以下五十八人賜人爵關內侯以下九十四人前日長病陛下憂苦之使使者賜書棗脯長不欲受賜不肯見拜使者南海民處廬江界中者反淮南吏卒擊之陛下以淮南民貧苦遣使者賜長帛五千匹以賜吏卒勞苦者長不欲受賜謾言曰無勞苦者南海民王織上書獻璧皇帝忌擅燔其書不以聞文穎曰忌簡忌吏請召治忌長不遣謾言曰忌病舂又請長願入見長怒曰女欲離我自附漢長當棄市臣請論如法制曰朕不忍致法於王其與列侯二千石議臣蒼臣敬臣逸臣福臣賀昧死言臣謹與列侯吏二千石臣嬰等四十三人議皆曰長不奉法度不聽天子詔乃隂聚徒黨及謀反者厚飬亡命欲以有為臣等議論如法制曰朕不忍致法於王具赦長死罪廢勿王臣蒼等昧死言長有大死罪陛下不忍致法幸赦廢勿王臣請處蜀郡嚴道邛郵徐廣曰嚴道有卭僰九折阪又冇郵置駰案張晏曰嚴道蜀郡縣遣其子母從居縣為築蓋家室皆廩食給薪菜鹽豉炊食器席蓐臣等昧死請請布告天下制曰計食長給肉日五斤酒二斗令故美人才人得幸者十人從居他可盡誅所與謀者於是乃遣淮南王載以輜車令縣以次傳是時袁盎諌上曰上素驕淮南王弗為置嚴傅相以故至此且淮南王為人剛今暴摧折之臣恐卒逢霧露病死陛下為有殺弟之名奈何上曰吾特苦之耳令復之縣傳淮南王者皆不敢發車封漢書音義曰檻車有檻封也淮南王乃謂侍者曰誰謂乃公勇者吾安能勇吾以驕故不聞吾過至此人生一世間安能邑邑如此乃不食死至雍雍令發封以死聞上哭甚悲謂袁盎曰吾不聽公言卒亡淮南王盎曰不可奈何願陛下自寬上曰為之奈何盎曰獨斬丞相御史以謝天下乃可上即令丞相御史逮考諸縣傳送淮南王不發封餽侍者皆棄市乃以列侯葬淮南王於雍守冡三十戶孝文八年上憐淮南王淮南王有子四人皆七八歲乃封子安為阜陵侯子勃為安陽侯子賜為周陽侯子良為東城侯孝文十二年民有作歌歌淮南厲王曰一尺布尚可縫一斗粟尚可舂兄弟二人不能相容漢書音義曰尺布斗粟猶尚不棄況兄弟而相更逐乎瓚曰一尺布尚可縫而共衣一斗粟尚可舂而共食也況以天下之廣而不能相容上聞之乃歎曰堯舜放逐骨肉周公殺管蔡天下稱聖何者不以私害公天下豈以我為貪淮南王地耶乃徙城陽王王淮南故地徐廣曰景王章之子而追尊諡淮南王為厲王置園復如諸侯儀孝文十六年徙淮南王喜復故城陽上憐淮南厲王廢法不軌自使失國蚤死乃立其三子阜陵侯安為淮南王安陽侯勃為衡山王周陽侯賜為廬江王皆復得厲王時地參分之東城侯良前薨無後也孝景三年吳楚七國反吳使者至淮南淮南王欲發兵應之其相曰大王必欲發兵應吳臣願為將王乃屬相兵淮南相已將兵因城守不聽王而為漢漢亦使曲城侯徐廣曰曲城侯姓蟲名捷其父名逢髙祖功臣將兵救淮南淮南以故得完吳使者至廬江廬江王弗應而往來使越吳使者至衡山衡山王堅守無二心孝景四年吳楚已破衡山王朝上以為貞信乃勞苦之曰南方卑溼徙衡山王王濟北所以褒之及薨遂賜諡為貞王廬江王邉越數使使相交故徙為衡山王王江北淮南王如故淮南王安為人好讀書鼓琴不喜弋獵狗馬馳騁亦欲以行隂德拊循百姓流譽天下時時怨望厲王死時欲畔逆未有因也及建元二年淮南王入朝素善武安侯武安侯時為太尉乃逆王霸上與王語曰方今上無太子大王親髙皇帝孫行仁義天下莫不聞即宫車一日晏駕非大王當誰立者淮南王大喜厚遺武安侯金財物隂結賔客拊循百姓為畔逆事建元六年彗星見淮南王心怪之或説王曰先吳軍起時彗星出長數尺然尚流血千里今彗星長竟天天下兵當大起王心以為上無太子天下有變諸侯並爭愈益治器械攻戰具積金錢賂遺郡國諸侯遊士竒材諸辨士為方略者妄作妖言諂諛王王喜多賜金錢而謀反滋甚淮南王有女陵慧有口辨王愛陵常多豫金錢為中詗長安徐廣曰詗伺候採察之名也音空政反安平侯鄂千秋玄孫伯與淮南王女陵通而中絶又遺淮南王書稱臣盡力故棄市約結上左右元朔三年上賜淮南王几杖不朝淮南王王后荼王愛幸之王后生太子遷遷取王皇太后外孫修成君女為妃應劭曰王太后先適金氏女也王謀為反具畏太子妃知而內泄事乃與太子謀令詐弗愛三月不同席王乃詳為怒太子閉太子使與妃同內三月太子終不近妃妃求去王乃上書謝歸去之王后荼太子遷及女陵得愛幸王擅國權侵奪民田宅妄致繫人徐廣曰一云歐擊元朔五年太子學用劒自以為人莫及聞郎中靁被巧乃召與戲被一再辭讓誤中太子太子怒被恐此時有欲從軍者輒詣京師被即願奮擊胸奴太子遷數惡被於王王使郎中令斥免欲以禁後被遂亡至長安上書自明詔下其事廷尉河南河南治逮淮南太子王王后計欲無遣太子遂發兵反計猶豫十餘日未定會有詔即訊太子當是時淮南相怒壽春丞留太子逮不遣如淳曰丞主刑獄囚徒丞順王意不遣太子應逮書劾不敬王以請相相弗聽王使人上書告相事下廷尉治蹤迹連王王使人候伺漢公卿公卿請逮捕治王王恐事發太子遷謀曰漢使即逮王王令人衣衛士衣持戟居庭中王旁有非是則刺殺之臣亦使人刺殺淮南中尉乃舉兵未晚是時上不許公卿請而遣漢中尉宏即訊驗王王聞漢使來即如太子謀計漢中尉至王視其顔色和訊王以斤靁被事耳王自度無何如淳曰無何罪不發中尉還以聞公卿治者曰淮南王安擁閼奮擊胸奴者靁被等廢格明詔當棄市詔弗許公卿請廢勿王詔弗許公卿請削五縣詔削二縣使中尉宏赦淮南王罪罰以削地中尉入淮南界宣言赦王王初聞漢公卿請誅之未知得削地聞漢使來恐其捕之乃與太子謀刺之如前計及中尉至即賀王王以故不發其後自傷曰吾行仁義見削甚恥之然淮南王削地之後其為反謀益甚諸使道從長安來為妄妖言言上無男漢不治即喜即言漢廷治有男王怒以為妄言非也王日夜與伍被漢書曰伍被楚人或言其先伍子胥後左吳等按輿地圖蘇林曰輿猶盡載之意部署兵所從入王曰上無太子宫車即晏駕廷臣必徴膠東王不即常山王徐廣曰皆景帝子也諸侯並爭吾可以無備乎且吾髙祖孫親行仁義陛下遇我厚吾能忍之萬世之後吾寧能北面臣事豎子乎王坐東宫召伍被與謀曰將軍上被悵然曰上寬赦大王王復安得此亡國之語乎臣聞子胥諫吳王吳王不用乃曰臣今見麋鹿遊姑蘇之臺也今臣亦見宫中生荆棘露霑衣也王怒繫伍被父母囚之三月復召曰將軍許寡人乎被曰不直來為大王畫耳臣聞聰者聽於無聲明者見於未形故聖人萬舉萬全昔文王一動而功顯於千世列為三代此所謂因天心以動作者也故海內不期而隨此千嵗之可見者夫百年之秦近世之吳楚亦足以喻國家之存亡矣臣不敢避子胥之誅願大王毋為吳王之聽昔秦絶聖人之道殺術士燔詩書棄禮義尚詐力任刑罰轉負海之粟致之西河當是之時男子疾耕不足於糟粳女子紡績不足於蓋形遣蒙恬築長城東西數千里暴兵露師常數十萬死者不可勝數僵尸千里流血頃畝百姓力竭欲為亂者十家而五又使徐福入海求神異物還為偽辭曰臣見海中大神言曰汝西皇之使耶臣答曰然汝何求曰願請延年益壽藥神曰汝秦王之禮薄得觀而不得取即從臣東南至蓬萊山見芝成宫闕有使者銅色而龍形光上照天於是臣再拜問曰宜何資以獻海神曰以令名男子若振女徐廣曰西京賦曰振子萬童駰案薛綜曰振子童男女與百工之事即得之矣秦皇帝大説遣振男女三千人資之五榖種種百工而行徐福得平原廣澤止王不來於是百姓悲痛相思欲為亂者十家而六又使尉他踰五嶺攻百越尉他知中國勞極止王不來使人上書求女無夫家者三萬人以為士卒衣補秦皇帝可其萬五千人於是百姓離心瓦解欲為亂者十家而七客謂髙皇帝曰時可矣髙皇帝曰待之聖人當起東南間不一年陳勝吳廣發矣髙皇始於豐沛一倡天下不期而響應者不可勝數也此所謂蹈瑕候間因秦之亡而動者也百姓怨之若旱之望雨故起於行陳之中而立為天子功髙三王德傳無窮今大王見髙皇帝得天下之易也獨不觀近世之吳楚乎夫吳王賜號為劉氏祭酒應劭曰禮飲酒必祭示有先也故稱祭酒尊也復不朝王四郡之衆地方數千里內鑄消銅以為錢東煮海水以為鹽上取江陵木以為船一船之載當中國數十兩車國富民衆行珠玉金帛賂諸侯宗室大臣獨竇氏不與計定謀成舉兵而西破於大梁敗於狐父徐廣曰在梁碭之間奔走而東至於丹徒越人禽之身死絶祀為天下笑夫以吳越之衆不能成功者何誠逆天道而不知時也方今大王之兵衆不能十分吳楚之一天下安寧有萬倍吳楚之時願大王從臣之計大王不從臣之計今見大王事必不成而語先泄也臣聞微子過故國而悲於是作麥秀之歌是痛紂之不用王子比干也故孟子曰紂貴為天子死曾不若匹夫是紂先自絶於天下久矣非死之日而天下去之今臣亦竊悲大王棄千乘之君必且賜絶命之書為羣臣先死於東宫也如淳曰王時所居也於是王氣怨結而不揚涕滿匡而橫流即起歷階而去王有孽子不害最長王弗愛王王后太子皆不以為子兄數如淳曰不以為子兄秩數不害有子建材髙有氣常怨望太子不省其父服虔曰不省録著兄弟數中又怨時諸侯皆得分子弟為侯而淮南獨二子一為太子建父獨不得為侯建隂結交欲告敗太子以其父代之太子知之數捕繫而榜笞建建具知太子之謀欲殺漢中尉即使所善壽春莊芷以元朔六年上書於天子曰毒藥苦於口利於病忠言逆於耳利於行今淮南王孫建材能髙淮南王王后荼荼子太子遷常疾害建建父不害無罪擅數捕繫欲殺之今建在可徴問具知淮南隂事書聞上以其事下廷尉廷尉下河南治是時故辟陽侯孫審卿善丞相公孫宏怨淮南厲王殺其大父乃深構淮南事於宏宏乃疑淮南有畔逆計謀深窮治其獄河南治建辭引淮南太子及黨與淮南王患之欲發問伍被曰漢廷治亂伍被曰天下治王意不説謂伍被曰公何以言天下治也被曰被竊觀朝廷之政君臣之義父子之親夫婦之别長幼之序皆得其理上之舉錯遵古之道風俗紀綱未有所缺也重裝富賈周流天下道無不通故交易之道行南越賔服羌僰入獻東甌入降廣長榆如淳曰廣謂拓大之也長榆塞名王恢所謂樹榆為塞開朔方胸奴折翅傷翼失援不振雖未及古太平之時然猶為治也王怒被謝死罪王又謂被曰山東即有兵漢必使大將軍將而制山東公以為大將軍何如人也被曰被所善者黃義從大將軍擊胸奴還告被曰大將軍遇士大夫有禮於士卒有恩衆皆樂為之用騎上下山若蜚材幹絶人被以為材能如此數將習兵未易當也及謁者曹梁使長安來言大將軍號令明當敵勇敢常為士卒先休舍穿井未通須士卒盡得水乃敢飲軍罷卒盡已度河乃度皇太后所賜金帛盡以賜軍吏雖古名將弗過也王默然淮南王見建已徴治恐國隂事且覺欲發被又以為難乃復問被曰公以為吳興兵是耶非也被曰以為非也吳王至富貴也舉事不當身死丹徒頭足異處子孫無遺類徐廣曰一作唯音寂笑反臣聞吳王悔之甚願王孰慮之無為吳王之所悔王曰男子之所死者一言耳徐廣曰一本無此言字駰案張晏曰不成則死一計耳瓚曰或有一言之交以死報之矣且吳何知反瓚曰言吳王不知舉兵反漢將一日過成臯者四十餘人如淳曰言吳不塞成臯口而令漢將得出之今我令樓緩漢書直云緩無樓字樓緩乃六國時人疑此後人所益也李竒曰緩似人姓名韋昭曰淮南臣名先要成臯之口周被下潁川兵塞轅伊闕之道陳定發南陽兵守武關河南太守獨有洛陽耳何足憂然此北尚有臨晉關河東上黨與河內趙國人言曰絶成臯之口天下不通據三川之險招山東之兵舉事如此公以為何如被曰臣見其禍未見其福也王曰左吳趙賢朱驕如皆以為有福什事九成公獨以為有禍無福何也被曰大王之羣臣近幸素能使衆者皆前繫詔獄餘無可用者王曰陳勝吳廣無立錐之地千人之聚起於大澤奮臂大呼而天下響應西至於戲而兵百二十萬今吾國雖小然而勝兵者可得十餘萬非直適戍之衆鐖鑿棘矜也徐廣曰大鐮謂之剴音五哀反或是鐖乎公何以言有禍無福被曰往者秦為無道殘賊天下興萬乘之駕作阿房之宫收太平之賦發閭左之戍父不寧子兄不便弟政苛刑峻天下熬然若焦民皆引領而望傾耳而聽悲號仰天叩心而怨上故陳勝大呼天下響應當今陛下臨制天下一齊海內泛愛蒸庶布德施惠口雖未言聲疾雷霆今雖未出化馳如神心有所懷威動萬里下之應上猶影響也而大將軍材能不特章邯楊熊也大王以陳勝吳廣喻之被以為過矣王曰茍如公言不可徼幸耶被曰被有愚計王曰奈何被曰當今諸侯無異心百姓無怨氣朔方之郡田地廣水草美民徙者不足以實其地臣之愚計可偽為丞相御史請書徙郡國豪傑任俠及有耐罪以上應劭曰輕罪不至于髠完其耐鬢故曰耐古耐字與彡髮膚之意蘇林以為法度之字皆從寸後改如是耐音若能如淳曰律耐為司冠耐為鬼薪白粲耐猶任也蘇林曰一嵗為罰作二歲刑已上為耐耐能任其罪赦令除其罪家産五十萬以上者皆徙其家屬朔方之郡益發甲卒急其會日又偽為左右都司空上林中都官詔獄逮書諸侯太子幸臣晉灼曰百官表宗正有左右都司空上林有水司空皆主囚徒官也如此則民怨諸侯懼即使辨武徐廣曰淮南人名士曰武隨而説之儻可徼幸什得一乎王曰此可也雖然吾以為不至若此於是王乃令官奴入宫作皇帝璽丞相御史大將軍軍吏中二千石都官令丞印及旁近郡太守都尉印漢使節法冠蔡雍曰法冠楚王冠也秦滅楚以其君冠賜御史欲如伍被計使人偽得罪而西蘇林曰詐作罪人而西也事大將軍丞相一日發兵如淳曰發淮南兵也使人即刺殺大將軍青而説丞相下之如發蒙耳如淳曰以物蒙覆其頭而為發去其人欲之耳韋昭曰如蒙巾發之甚易王欲發國中兵恐其相二千石不聽王乃與伍被謀先殺相二千石偽失火宫中相二千石救火至即殺之計未決又欲令人衣求盜衣漢書音義曰卒衣也持羽檄從東方來呼曰南越兵入界欲因以發兵乃使人至廬江會稽為求盜未發王問伍被曰吾舉兵西鄉諸侯必有應我者即無應奈何被曰南收衡山以擊廬江有尋陽之船守下雉之城徐廣曰在江夏駰案蘇林曰下雉縣名結九江之浦絶豫章之口強弩臨江而守以禁南郡之下東收江都會稽南通徑越屈強淮南間猶可得延嵗月之壽王曰善無以易此急則走越耳於是廷尉以王孫建辭連淮南王太子遷聞上遣廷尉監因拜淮南中尉逮捕太子至淮南淮南王聞與太子謀召相二千石欲殺而發兵召相相至內史以出為解中尉曰臣受詔使不得見王王念獨殺相而內史中尉不來無益也即罷相王猶豫計未決太子念所坐者謀刺漢中尉所與謀者已死以為口絶乃謂王曰羣臣可用者皆前繫今無足與舉事者王以非時發恐無功臣願會逮王亦偷欲休徐廣曰偷茍且也即許太子太子即自剄不殊晉灼曰不殊不死伍被自詣吏因告與淮南王謀反反蹤迹具如此吏因捕太子王后圍王宫盡求捕王所與謀反賔客在國中者索得反具以聞上下公卿治所連引與淮南王謀反列侯二千石豪傑數千人皆以罪輕重受誅衡山王賜淮南王弟也當坐收有司請逮捕衡山王天子曰諸侯各以其國為本不當相坐與諸侯王列侯會肄丞相諸侯議徐廣曰詣都座就丞相共議也趙王彭祖列侯臣讓等四十三人議皆曰淮南王安甚大逆無道謀反明白當伏誅膠西王臣端議曰淮南王安廢法行邪懷詐偽心以亂天下熒惑百姓倍畔宗廟妄作妖言春秋曰臣無將將而誅安罪重於將謀反形已定臣端所見其書節印圖及他逆無道事驗明白甚大逆無道當伏其法而論國吏二百石以上及比者徐廣曰比吏而非真宗室近幸臣不在法中者不能相教當皆免削削爵為士伍毋得宦為吏其非吏他贖死金二斤八兩蘇林曰非吏故曰他以章臣安之罪使天下明知臣子之道毋敢復有邪僻倍畔之意丞相宏廷尉湯等以聞天子使宗正以符節治王未至淮南王安自剄殺徐廣曰即位凡四十二年元符元年十月死王后荼太子遷諸所與謀反者皆族天子以伍被雅辭多引漢之美欲勿誅廷尉湯曰被首為王畫反計被罪無赦遂誅被國除為九江郡徐廣曰又為六安國以陳縣為都衡山王賜王后乘舒生子三人長男爽為太子次男孝次女無采又姬徐來生子男女四人美人厥姬生子二人衡山王淮南王兄弟相責望禮節間不相能衡山王聞淮南王作為畔逆反具亦心結賔客以應之恐為所并元光六年衡山王入朝其謁者衛慶有方術欲上書事天子王怒故劾慶死罪強榜服之衡山內史以為非是郤其獄王使人上書告內史內史治言王不直王又數侵人田壞人冢以為田有司請逮治衡山王天子不許為置吏二百石以上如淳曰漢儀注吏四百石以下自調除國中今王惡天子皆為置之衡山王以此恚與奚慈張廣昌謀求能為兵法候星氣者日夜從容王密謀反事徐廣曰密預作計校王后乘舒死立徐來為王后厥姬俱幸兩人相妒厥姬乃惡王后徐來於太子曰徐來使婢蠱道殺太子母太子心怨徐來徐來兄至衡山太子與飲以刃刺傷王后兄王后怨怒數毁惡太子於王太子女弟無采嫁棄歸與奴姧又與客姧太子數讓無采無采怒不與太子通王后聞之即善遇無采無采及中兄孝少失母附王后王后以計愛之與共毁太子王以故數擊笞太子元朔四年中人有賊傷王后假母者漢書音義曰傳母屬王疑太子使人傷之笞太子後主病太子時稱病不侍孝王后無采惡太子太子實不病自言病有喜色王大怒欲廢太子立其弟孝王后知王決廢太子又欲并廢孝王后有侍者善舞王幸之王后欲令侍者與孝亂以汙之欲並廢兄弟而立其子廣代太子太子爽知之念后數惡已無已時欲與亂以止其口王后飲太子前為壽因據王后股求與王后卧王后怒以告王王乃召欲縛而笞之太子知王常欲廢已立其弟孝乃謂王曰孝與王御者姧無采與奴姧王強食請上書即倍王去王使人止之莫能禁乃自駕追捕太子太子妄惡言王械繫太子宫中孝日益親幸王竒孝材能乃佩之王印號曰將軍令居外宅多給金錢招致賔客賔客來者微知淮南衡山有逆計日夜從容勸之王乃使孝客江都人枚赫陳喜作輣車鏃矢徐廣曰輣車戰車也音扶萌反刻天子璽將相軍吏印王日夜求壯士如周邱等數引吳楚反時計畫以約束衡山王非敢效淮南王求即天子位畏淮南起并其國以為淮南已西發兵定江淮之間而有之望如是元朔五年秋衡山王當朝六年過淮南淮南王乃昆弟語除前郤約束反具衡山王即上書謝病上賜書不朝元朔六年中衡山王使人上書請廢太子爽立孝為太子爽聞即使所善白嬴之長安上書言孝作輣車鏃矢與王御者姧欲以敗孝白嬴至長安未及上書吏捕嬴以淮南事繫王聞爽使白嬴上書恐言國隂事即上書反告太子爽所為不道棄市罪事事下沛郡治元朔七年冬有司公卿下沛郡求捕所與淮南謀反者未得得陳喜於衡山王子孝家吏劾孝首匿喜孝以為陳喜雅數與王計謀反恐其發之聞律先自告除其罪又疑太子使白嬴上書發其事即先自告告所與謀反者枚赫陳喜等廷尉治驗公卿請逮捕衡山王治之天子曰勿捕遣中尉安大行息即問王王具以情實對吏皆圍王宫而守之中尉大行還以聞公卿請遣宗正大行與沛郡雜治王王聞即自剄殺孝先自告反除其罪坐與王御婢姧棄市王后徐來亦坐蠱殺前王后乘舒及太子爽王后不孝皆棄市諸與衡山王謀反者皆族國除為衡山郡太史公曰詩之所謂戎狄是膺荆舒是懲信哉是言也淮南衡山親為骨肉疆土千里列為諸侯不務遵蕃臣職以承輔天子而専挾邪僻之計謀為畔逆仍父子再亡國各不終其身為天下笑此非獨王過也亦其俗薄臣下漸靡使然也夫荆楚僄勇輕悍好作亂乃自古記之矣史記集解卷一百十八
