body:
  text: 史記集解卷七十二宋裴駰撰史記七十二穰侯列傳第十二穰侯魏冉者秦昭王母宣太后弟也其先楚人姓芈氏秦武王卒無子立其弟為昭王昭王母故號為芊八子及昭王即位芈八子號為宣太后宣太后非武王母武王母號曰惠文后先武王死宣太后二弟其異父長弟曰穰侯姓魏氏名冉同父弟曰芊戌為華陽君而昭王同母弟曰髙陵君涇陽君而魏冉最賢自惠王武王時任職用事武王卒諸弟爭立惟魏冉力為能立昭王昭王即位以冉為將軍衛咸陽誅季君之亂而逐武王后出之魏昭王諸兄弟不善者皆滅之威振秦國昭王少宣太后自治任魏冉為政昭王七年樗里子死而使涇陽君質于齊趙人樓緩來相秦趙不利乃使仇液之秦請以魏冉為秦相仇液將行其客宋公謂液曰秦不聽公樓緩必怨公公不若謂緩曰請為公毋急秦秦王見趙請相魏冉之不急且不聽公公言而事不成以德樓子事成魏冉故德公矣于是仇液從之而秦果免樓緩而魏冉相秦欲誅吕禮禮出奔齊昭王十四年魏冉舉白起使代向夀將而攻韓魏敗之伊闕斬首二十四萬虜魏將公孫喜明年又取楚之宛葉魏冉謝病免相以客卿夀燭為相其明年燭免復相冉乃封魏冉于穰復益封陶號曰穰侯穰侯封四歲為秦將攻魏魏獻河東方四百里拔魏之河內取城大小六十餘昭王十九年秦稱西帝齊稱東帝月餘吕禮來而齊秦各復歸帝為王魏冉復相秦六歲而免免二歲復相秦四歲而使白起拔楚之郢秦置南郡乃封白起為武安君白起者穰侯之所任舉也相善于是穰侯之富富于王室昭王三十二年穰侯為相國將兵攻魏走芒卯入北宅遂圍大梁梁大夫須賈說穰侯曰臣聞魏之長吏謂魏王曰昔梁惠王伐趙戰勝三梁徐廣曰田宅世家云魏伐趙趙不利戰于南梁拔邯鄲趙氏不割而邯鄲復歸齊人攻衛拔故國殺子良衛人不割而故地復反衛趙之所以國全兵徑而地不并于諸侯者以其能忍難而重出地也宋中山數伐割地而國隨以亡臣以為衛趙可法而宋中山可為戒也秦貪戾之國也而毋親蠶食魏氏又盡晉國戰勝㬥子徐廣曰韓將㬥鳶割八縣地未畢入兵復出矣夫秦何厭之有哉今又走芒卯入北宅此非敢攻梁也且劫王以求多割地王必勿聽也今王背楚趙而講秦楚趙怒而去王與王爭事秦秦必受之秦挾楚趙之兵以復攻梁則國求無亡不可得也願王之必無講也王若欲講少割而有質不然必見欺此臣之所聞于魏也願君王之以是慮事也周書曰惟命不于常此言幸之不可數也夫戰勝㬥子割八縣此非兵力之精也又非計之上也天幸為多矣今又走芒卯入北宅以攻大梁是以天幸自為常也智者不然臣聞魏氏悉其百縣勝甲以上戍大梁臣以為不下三十萬以三十萬之衆守梁七仞之城爾雅曰四尺謂之仞倍仞謂之尋臣以為湯武復生不易攻也夫輕背楚趙之兵陵七仞之城戰三十萬之衆而志必舉之臣以為自天地始分以至于今未嘗有者也攻而不拔秦兵必罷陶邑必亡則前功必棄矣今魏氏方疑可以少割收也願君逮楚趙之兵未至于梁亟以少割收魏魏方疑而得以少割為利必欲之則君得所欲矣楚趙怒于魏之先已也必爭事秦從以此散而君後擇焉且君之得地豈必以兵哉割晉國秦兵不攻而魏必效絳安邑又為陶開兩道幾盡故宋衛必效單父秦兵可全而君制之何索而不得何為而不成願君熟慮之而無行危穰侯曰善乃罷梁圍明年魏背秦與齊從親秦使穰侯伐魏斬首四萬走魏將㬥鳶得魏二縣穰侯益封明年穰侯與白起客卿胡陽復攻趙韓魏破芒卯于華陽下斬首十萬取魏之卷音丘權反蔡陽長社趙氏觀津且與趙觀津益趙以兵伐齊齊襄王懼使蘇代為齊隂遺穰侯書曰臣聞往來者言曰秦兵益趙甲四萬以伐齊臣竊必之弊邑之王曰秦王明而熟于計穰侯智而習於事必不益趙甲四萬以伐齊是何也夫三晉之相與也秦之深讐也百相背也百相欺也不為不信不為無行今破齊以肥趙趙秦之深讐不利于秦此一也秦之謀者必曰破齊弊晉楚而後制晉楚之勝夫齊罷國也以天下攻齊如以千鈞之弩決潰癕也必死安能弊晉楚此二也秦少出兵則晉楚不信也多出兵則晉楚為制于秦齊恐不走秦必走晉楚此三也秦割齊以啖晉楚晉楚案之以兵秦反受敵此四也是晉楚以秦謀齊以齊謀秦也何晉楚之智而秦齊之愚此五也故得安邑以善事之亦必無患矣秦有安邑韓氏必無上黨矣取天下之腸胃與出兵而懼其不反也孰利臣故曰秦王明而熟于計穰侯智而習于事必不益趙甲四萬以伐齊矣於是穰侯不行引兵而歸昭王三十六年相國穰侯言客卿竈欲伐齊取剛夀徐廣曰濟北有剛縣以廣其陶邑于是魏人范雎自謂張祿先生譏穰侯之伐齊乃越三晉以攻齊也以此時奸說秦昭王昭王于是用范雎范雎言宣太后專制穰侯擅權于諸侯涇陽君髙陵君之屬太侈富于王室于是秦昭王悟乃免相國令涇陽之屬皆出關就封邑穰侯出關輜車千乘有餘穰侯卒于陶而因葬焉秦復收陶為郡太史公曰穰侯昭王親舅也而秦所以東益地弱諸侯嘗稱帝於天下天下皆西鄉稽首者穰侯之功也及其貴極富溢一夫開說身折勢奪而以憂死况于羇旅之臣乎史記集解卷七十二
