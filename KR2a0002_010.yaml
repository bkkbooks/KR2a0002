body:
  text: 史記集解卷十宋裴駰撰史記十孝文本紀第十孝文皇帝漢書音義曰諱恆髙祖中子也髙祖十一年春已破陳豨軍定代地立為代王都中都太后薄氏子即位十七年髙后八年七月髙后崩九月諸吕吕産等欲為亂以危劉氏大臣共誅之謀召立代王事在吕后語中丞相陳平太尉周勃等使人迎代王代王問左右郎中令張武等張武等議曰漢大臣皆故髙帝時大將習兵多謀詐此其屬意非止此也特畏髙帝吕太后威耳今已誅諸吕新喋血京師公羊傳曰京大師衆也天子之居必以衆大之辭言也此以迎大王為名實不可信願大王稱疾毋往以觀其變中尉宋昌進曰羣臣之議皆非也夫秦失其政諸侯豪傑並起人人自以為得之者以萬數然卒踐天子之位者劉氏也天下絶望一矣髙帝封王子弟地犬牙相制此所謂盤石之宗也天下服其強二矣漢興除秦苛政約法令施德惠人人自安難搖動三矣夫以吕太后之嚴立諸吕為三王擅權專制然而太尉以一節入北軍一呼士皆左袒為劉氏叛諸吕卒以滅之此乃天授非人力也今大臣雖欲為變百姓弗為使其黨寧能專一邪方今內有朱虛東牟之親外畏吳楚淮南琅邪齊代之強方今髙帝子獨淮南王與大王大王又長賢聖仁孝聞於天下故大臣因天下之心而欲迎立大王大王勿疑也代王報太后計之猶與未定卜之龜卦兆得大橫應劭曰以荆灼龜文正橫占曰大橫庚庚余為天王夏啓以光服虔曰庚橫貌也李竒曰庚其繇文也張晏曰橫行無思不服庚更也言去諸侯而即帝位也先是五帝官天下老則禪賢王啓始傳父爵乃能光治先君之基業文帝亦襲父迹言似夏啓者也代王曰寡人固已為王矣又何王卜人曰所謂天王者乃天子於是代王乃遣太后弟薄昭往見絳侯絳侯等具為昭言所以迎立意薄昭還報曰信矣毋可疑者代王乃笑謂宋昌曰果如公言乃命宋昌參乘張武等六人乘傳詣長安至髙陵休止而使宋昌先馳之長安觀變昌至渭橋蘇林曰在長安北三里丞相以下皆迎宋昌還報代王馳至渭橋羣臣拜謁稱臣代王下車拜太尉勃進曰願請間言宋昌曰所言公公言之所言私王者不受私太尉乃跪上天子璽符代王謝曰至代邸而議之遂馳入代邸羣臣從至丞相陳平太尉周勃大將軍陳武御史大夫張蒼宗正劉郢漢書百官表曰宗正秦官應劭曰周成王時彤伯入為宗正朱虛侯劉章東牟侯劉興居典客劉揭皆再拜言曰子宏等皆非孝惠帝子不當奉宗廟臣謹請與陰安侯蘇林曰髙帝兄伯妻羮頡侯終母丘嫂也列侯頃王后徐廣曰代頃王劉仲之妻駰案蘇林曰仲子濞為吳王故追諡為頃王也如淳曰頃王后封隂安侯時吕􅎐為林光侯蕭何夫人亦為鄼侯又宗室表此時無隂安知其為頃王后也與琅邪王宗室大臣列侯吏二千石議曰大王髙帝長子宜為髙帝嗣願大王即天子位代王曰奉髙帝宗廟重事也寡人不佞不足以稱宗廟願請楚王計宜者蘇林曰楚王名交髙帝弟寡人不敢當羣臣皆伏固請代王西鄉讓者三南鄉讓者再如淳曰讓羣臣也或曰賔主位東西面君臣位南北面故西鄉坐三讓不受羣臣猶稱宜乃更回坐示變即君位之漸也丞相平等皆曰臣伏計之大王奉髙帝宗廟最宜稱雖天下諸侯萬民以為宜臣等為宗廟社稷計不敢忽願大王幸聽臣等臣謹奉天子璽符再拜上代王曰宗室將相王列侯以為莫宜寡人寡人不敢辭遂即天子位羣臣以禮次侍乃使太僕嬰與東牟侯興居清宫應劭曰舊典天子行幸所至必遣靜宮令先案行清靜殿中以虞非常奉天子法駕迎於代邸皇帝即日夕入未央宫乃夜拜宋昌為衛將軍鎮撫南北軍以張武為郎中令行殿中還坐殿前於是夜下詔書曰間者諸呂用事擅權謀為大逆欲以危劉氏宗廟賴將相列侯宗室大臣誅之皆伏其辜朕初即位其赦天下賜民爵一級女子百户牛酒蘇林曰男賜爵女子賜牛酒酺五日文穎曰漢律三人已上無故羣飲罰金四兩今詔橫賜得令聚會飲食五日孝文皇帝元年十月庚戌徙立故琅邪王澤為燕王辛亥皇帝即阼謁髙廟右丞相平徙為左丞相太尉勃為右丞相大將軍灌嬰為太尉諸吕所奪齊楚故地皆復與之壬子遣車騎將軍薄昭迎皇太后於代皇帝曰吕産自置為相國吕祿為上將軍擅矯遣灌將軍嬰將兵擊齊欲代劉氏嬰留滎陽弗擊與諸侯合謀以誅吕氏吕産欲為不善丞相陳平與太尉周勃謀奪吕産等軍朱虛侯劉章首先捕吕産等太尉身率襄平侯通持節承詔入北軍典客劉揭身奪趙王吕祿印益封太尉勃萬户賜金五千斤丞相陳平灌將軍嬰邑各三千户金二千斤朱虛侯劉章襄平侯通東牟侯劉興居邑各二千户金千斤徐廣曰十一月辛丑封典客揭為陽信侯賜金千斤十二月上曰法者治之正也所以禁暴而率善人也今犯法已論而使毋罪之父母妻子同産坐之及為收帑朕甚不取其議之有司皆曰民不能自治故為法以禁之相坐坐收所以纍其心使重犯法所從來遠矣如故便上曰朕聞法正則民慤罪當則民從且夫牧民而導之善者吏也其既不能導又以不正之法罪之是反害於民為暴者也何以禁之朕未見其便其熟計之有司皆曰陛下加大惠德甚盛非臣等所及也請奉詔書除收孥諸相坐律令應劭曰帑子也秦法一人冇罪并坐其家室今除此律正月有司言曰蚤建太子所以尊宗廟請立太子上曰朕既不德上帝神明未歆享天下人民未有嗛志今縱不能博求天下賢聖冇德之人而禪天下焉而曰豫建太子是重吾不德也謂天下何其安之有司曰豫建太子所以重宗廟社稷不忘天下也上曰楚王季父也春秋髙閲天下之義理多矣如淳曰閲猶言多所更厯也明於國家之大體吳王於朕兄也惠仁以好德淮南王弟也秉德以陪朕文穎曰陪輔也豈為不豫哉諸侯王宗室昆弟有功臣多賢及有德義者若舉有德以陪朕之不能終是社稷之靈天下之福也今不選舉焉而曰必子人其以朕為忘賢有德者而專於子非所以憂天下也朕甚不取也有司皆固請曰古者殷周有國治安皆千餘歲古之有天下者莫不長焉用此道也立嗣必子所從來遠矣髙帝親率士大夫始平天下建諸侯為帝者太祖諸侯王及列侯始受國者皆亦為其國祖子孫繼嗣世世弗絶天下之大義也故髙帝設之以撫海內今釋宜建而更選於諸侯及宗室非髙帝之志也更議不宜子某最長純厚慈仁請建以為太子上乃許之因賜天下民當代父後者爵各一級韋昭曰文帝以立子為後不欲獨饗其福故賜天下為父後者爵封將軍薄昭為軹侯徐廣曰正月乙巳也三月有司請立皇后薄太后曰諸侯皆同姓立太子母為皇后皇后姓竇氏上為立后故賜天下鰥寡孤獨窮困及年八十已上孤兒九歲已下布帛米肉各有數上從代來初即位施德惠天下填撫諸侯四夷皆洽歡乃循從代來功臣上曰方大臣之誅諸吕迎朕朕狐疑皆止朕唯中尉宋昌勸朕朕以得保奉宗廟已尊昌為衛將軍其封昌為壯武侯徐廣曰四月辛亥封封三十四年景帝中四年奪侯國除諸從朕六人官皆至九卿上曰列侯從髙帝入蜀漢中者六十八人皆益封各三百户故吏二千石以上從髙帝潁川守尊等十人食邑六百户淮陽守申徒嘉等十人五百户衛尉定等十人四百户封淮南王舅父趙兼為周陽侯齊王舅父駟鈞為清郭侯如淳曰邑名六國時齊有清郭君清音靜秋封故常山丞相蔡兼為樊侯人或説右丞相曰君本誅諸吕迎代王今又矜其功受上賞處尊位禍且及身右丞相勃乃謝病免罷左丞相平專為丞相徐廣曰八月中二年十月丞相平卒復以絳侯勃為丞相上曰朕聞古者諸侯建國千餘歲各守其地以時入貢民不勞苦上下歡欣靡有遺德今列侯多居長安邑遠吏卒給輸費苦而列侯亦無由教馴其民其令列侯之國為吏及詔所止者遣太子張晏曰為史謂以卿大夫為兼官者詔所止特以恩愛見留者十一月晦日有食之十二月望日又食徐廣曰此云望日又食案漢書及五行志無此日食文也一本作月食然史書不紀月食上曰朕聞之天生蒸民為之置君以養治之人主不德布政不均則天示之以葘以誡不治乃十一月晦日有食之適見於天葘孰大焉朕獲保宗廟以微眇之身託於兆民君王之上天下治亂在朕一人唯二三執政猶吾股肱也朕下不能理育羣生上以纍三光之明其不德大矣令至其悉思朕之過失及知見思之所不及白以告朕及舉賢良方正能直言極諫者以匡朕之不逮因各飭其任職務省繇費以便民朕既不能逺德故􅍀然念外人之有非漢書音義曰􅍀然猶介然也非姦非也是以設備未息今縱不能罷邊屯戍而又飭兵厚衛其罷衛將軍軍太僕見馬遺財足餘皆以給置傳正月上曰農天下之本其閛籍田應劭曰古者天子耕籍田千畝為天下先藉者帝王典籍之常韋昭曰籍借也借民力以治之以奉宗廟且以勸率天下使務農也瓚曰景帝詔曰朕親耕后親桑為天下先本以躬親為義不得以假借為稱也籍蹈籍也朕親率耕以給宗廟粢盛應劭曰黍稷曰粢在器中曰盛三月有司請立皇子為諸侯王上曰趙幽王幽死朕甚憐之已立其長子遂為趙王遂弟辟強及齊悼惠王子朱虛侯章東牟侯興居有功可王乃立趙幽王少子辟強為河間王以齊劇郡立朱虛侯為城陽王立東牟侯為濟北王皇子武為代王子參為太原王子揖為梁王上曰古之治天下朝有進善之旌應劭曰旌幡也堯設之五達之道令民進善也如淳曰欲有進善者立於旌下言之誹謗之木服虔曰堯作之橋梁交午柱頭應劭曰橋梁邊板所以書政治之愆失也至秦去之今乃復施也所以通治道而來諫者今法有誹謗妖言之罪是使衆臣不敢盡情而上無由聞過失也將何以來遠方之賢良其除之或祝詛上以相約結而後相謾漢書音義曰民相結共祝詛上也謾者而後謾而止之不畢祝詛也吏以為大逆其有他言而吏又以為誹謗此細民之愚無知抵死朕甚不取自今以來有犯此者勿聽治九月初與郡國守相為銅虎符竹使符應劭曰銅虎符第一至第五國家當發兵遣使者至郡合符符合乃聽受之竹使符皆以竹箭五枚長五寸鎬刻篆書第一至第五張晏曰符以代古之圭璋從簡易也三年十月丁酉晦日有食之十一月上曰前日計遣列侯之國或辭未行丞相朕之所重其為朕率列侯之國絳侯勃免丞相就國以太尉潁隂侯嬰為丞相罷太尉官屬丞相四月城陽王章薨淮南王長與從者魏敬殺辟陽侯審食其五月胸奴入北地居河南為寇帝初幸甘泉蔡雍曰天子車駕所至民臣以為僥幸故曰幸至見令長三老官屬親臨軒樂賜食帛越巾刀佩帶民爵冇級數或賜田租之半故因是謂之幸六月帝曰漢與胸奴約為昆弟毋使害邊境所以輸遺胸奴甚厚今右賢王離其國將衆居河南降地非常故往來近塞捕殺吏卒驅保塞蠻夷令不得居其故陵轢邊吏入盜甚敖無道非約也其發邉吏騎八萬五千詣髙奴遣丞相潁陰侯灌嬰擊胸奴胸奴去發中尉漢書百官表曰中尉秦官材官屬衛將軍軍長安辛卯帝自甘泉之髙奴因幸太原見故羣臣皆賜之舉功行賞諸民里賜牛酒復晉陽中都民三歲留遊太原十餘日濟北王興居聞帝之代欲往擊胡乃反發兵欲襲滎陽於是詔罷丞相兵遣棘蒲侯陳武為大將軍將十萬往擊之祁侯賀徐廣曰姓繒以文帝十一年卒諡曰敬為將軍軍滎陽七月卒亥帝自太原至長安乃詔有司曰濟北王背德反上詿誤吏民為大逆濟北吏民兵未至先自定及以軍地邑降者皆赦之復官爵與王興居去來亦赦之徐廣曰乍去乍來也駰案張晏曰雖始與興居反今降赦之八月破濟北軍虜其王赦濟北諸吏民與王反者六年有司言淮南長廢先帝法不聽天子詔居處毋度出入擬於天子擅為法令與棘蒲侯太子竒謀反遣人使閩越及胸奴發其兵欲以危宗廟社稷羣臣議皆曰長當棄市帝不忍致法於王赦其罪廢勿王羣臣請處王蜀嚴道卭都徐廣曰漢書本或作却字或直云卭僰卬都乃本是西南夷爾時未通嚴道有卬僰山帝許之長未到處所行病死上憐之後十六年追尊淮南王長諡為厲王立其子三人為淮南王衡山王廬江王十三年夏上曰蓋聞天道禍自怨起而福繇德興百官之非宜由朕躬今祕祝之官移過於下應劭曰祕祝之官移過於下國家諱之故曰袐以彰吾之不德朕甚不取其除之五月齊太倉令淳于公有罪當刑詔獄逮徙繫長安太倉公無男有女五人太倉公將行會逮罵其女曰生子不生男有緩急非有益也其少女緹縈自傷泣乃隨其父至長安上書曰妾父為吏齊中皆稱其廉平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖復欲改過自新其道無由也妾願沒入為官婢贖父刑罪使得自新書奏天子天子憐悲其意乃下詔曰蓋聞有虞氏之時畫衣冠異章服以為僇而民不犯何則至治也今法有肉刑三李竒曰約法三章無肉刑文帝則有肉刑孟康曰黥劓二左右趾合一凡三而姦不止其咎安在非乃朕德薄而教不明歟吾甚自愧故夫馴道不純而愚民陷焉詩曰愷悌君子民之父母今人有過教未施而刑加焉或欲改行為善而道毋由也朕甚憐之夫刑至斷支體刻肌膚終身不息何其楚痛而不德也豈稱為民父母之意哉其除肉刑上曰農者天下之本務莫大焉今勤身從事而有租稅之賦是為本末者無以異李竒曰本農也末賈也言農與賈俱出租無異也故除田租其於勸農之道未備其除田之租稅十四年冬胸奴謀入邊為寇攻朝那塞殺北地都尉卭徐廣曰姓孫封其子單為瓶侯胸奴所殺上乃遣三將軍軍隴西北地上郡中尉周舍為衛將軍郎中令張武為車騎將軍軍渭北車千乘騎卒十萬帝親自勞軍勒兵申教令賜軍吏卒帝欲自將擊胸奴羣臣諫皆不聽皇太后固要帝如淳曰必不得自征也帝乃止於是以東陽侯張相如為大將軍成侯赤徐廣曰姓董也為內史欒布為將軍擊胸奴胸奴遁走春上曰朕獲執犧牲圭幣以事上帝宗廟十四年於今厯日縣長以不敏不明而久撫臨天下朕甚自愧其廣增諸祀壇場圭幣昔先王遠施不求其報望祀不祈其福右賢左戚韋昭曰右猶髙左猶下也先民後已至明之極也今吾聞祀官祝釐如淳曰釐福也賈誼傳受釐坐宣室皆歸福朕躬不為百姓朕甚愧之夫以朕不德而躬享獨美其福百姓不與焉是重吾不德其令祠官致敬毋有所祈是時北平侯張蒼為丞相方明律厯魯人公孫臣上書陳終始傳五德事言方今土德時土德應黃龍見當改正朔服色制度天子下其事與丞相議丞相推以為今水德始明正十月上黑事以為其言非是請罷之十五年黃龍見成紀韋昭曰成紀縣屬天水天子乃復召魯公孫臣以為博士申明土德事於是上乃下詔曰有異物之神見於成紀無害於民歲以有年朕親郊祀上帝諸神禮官議毋諱以勞朕漢書音義曰言無所諱勿以朕為勞有司禮官皆曰古者天子夏躬親禮祀上帝於郊故曰郊於是天子始幸雍郊見五帝以孟夏四月答禮焉趙人新垣平以望氣見因説上設立渭陽五廟韋昭曰在渭城欲出周鼎當有玉英見瑞應圖云玉英五帝並修則見十六年上親郊見渭陽五帝廟亦以夏答禮而尚赤十七年得玉柸應劭垣曰新平詐令人獻之刻曰人主延夀於是天子始更為元年令天下大酺其歲新垣平事覺夷三族後二年上曰朕既不明不能逺德是以使方外之國或不寧息夫四荒之外不安其生封畿之內勤勞不處二者之咎皆自於朕之德薄而不能逺達也間者纍年胸奴並暴邊境多殺吏民邉臣兵吏又不能諭吾內志以重吾不德也夫久結難連兵中外之國將何以自寧今朕夙興夜寐勤勞天下憂苦萬民為之怛惕不安未嘗一日忘於心故遣使者冠蓋相望結軼於道韋昭曰使車往還故轍如結也相如曰結軌還轍以諭朕意於單于今單于反古之道計社稷之安便萬民之利親與朕俱棄細過偕之大道結兄弟之義以全天下元元之民和親已定始於今年後六年冬胸奴三萬人入上郡三萬人入雲中以中大夫令勉徐廣曰衛尉改名也駰案漢書百官表景帝初改衛尉為中大夫令非此年也為車騎將軍軍飛狐如淳曰在代郡蘇林曰在上黨故楚相蘇意為將軍軍句注應劭曰山險名也鴈門陰館將軍張武屯北地河內守周亞夫為將軍居細栁徐廣曰在長安西駰案如淳曰長安圖細栁倉在渭北近右徼張揖曰在昆明池南今冇栁市是也宗正劉禮為將軍居霸上祝兹侯徐廣曰表作松兹侯姓徐名悍軍棘門徐廣曰在渭北駰案孟康曰在長安北秦時宫門也如淳曰三輔黃圖棘門在橫門外以備胡數月胡人去亦罷天下旱蝗帝加惠令諸侯毋入貢弛山澤韋昭曰弛廢廢其常禁以利民減諸服御狗馬損郎吏員發倉庾應劭曰水漕倉曰庾胡公曰在邑曰倉在野曰庾以振貧民民得賣爵孝文帝從代來即位二十三年宫室苑囿狗馬服御無所增益有不便輒弛以利民嘗欲作露臺徐廣曰露一作靈召匠計之直百金上曰百金中民十家之産吾奉先帝宫室常恐羞之何以臺為上常衣綈衣如淳曰賈誼云身衣皂綈所幸慎夫人令衣不得曳地幃帳不得文繡以示敦朴為天下先治霸陵皆以瓦器不得以金銀銅錫為飾不治墳欲為省毋煩民南越王尉他自立為武帝然上召貴尉他兄弟以德報之他遂去帝稱臣與胸奴和親胸奴背約入盜然令邊備守不發兵深入惡煩苦百姓吳王詐病不朝就賜几杖羣臣如袁盎等稱説雖切常假借用之蘇林曰假音休假借者以物借人羣臣如張武等受賂遺金錢覺上乃發御府金錢賜之以愧其心弗下吏專務以德化民是以海內殷富興於禮義後七年六月己亥帝崩於未央宫徐廣曰年四十七遺詔曰朕聞蓋天下萬物之萌生靡不有死死者天地之理物之自然者奚可甚哀當今之時世咸嘉生而惡死厚葬以破業重服以傷生吾甚不取且朕既不德無以佐百姓今崩又使重服久臨以離寒暑之數哀人之父子傷長幼之志損其飲食絶鬼神之祭祀以重吾不德也謂天下何朕獲保宗廟以眇眇之身託於天下君王之上二十有餘年矣賴天地之靈社稷之福方內安寧瓚曰方四方也內中也猶云中外也靡有兵革徐廣曰一云方內安兵革息朕既不敏常畏過行以羞先帝之遺德維年之久長懼於不終今乃幸以天年得復供養於髙廟朕之不明與嘉之如淳曰與發聲也得卒天年已善矣其奚哀悲之有其令天下吏民令出臨三日皆釋服毋禁取婦嫁女祠祀飲酒食肉者自當給喪事服臨者皆無踐服虔曰踐翦也謂無斬衰也孟康曰踐跣也晉灼曰漢語作跣跣徒跣也絰帶無過三寸毋布車及兵器應劭曰無以布衣車及兵器也不施輕車介士也毋發人男女哭臨宫殿宫殿中當臨者皆以旦夕各十五舉聲禮畢罷非旦夕臨時禁毋得擅哭已下服大紅十五日小紅十四日纎七日釋服服虔曰當言大功小功布也織細布衣也應劭曰紅者中祥大祥以紅為領緣也纎者禫也凡三十六日而釋服他不在令中者皆以此令比率從事布告天下使明知朕意霸陵山川因其故應劭曰因山為藏不復起墳山下川流不遏絶也就其水名以為陵號毋有所改歸夫人以下至少使應劭曰夫人以下冇美人良人八子七子長使少使凡七輩皆遣歸家重絶人類者也令中尉亞夫為車騎將軍屬國悍徐廣曰姓徐駰案漢書百官表典屬國秦官掌蠻夷降者為將屯將軍李竒曰馮奉世為右將軍以將屯將軍為名此監主諸屯也郎中令武為復土將軍如淳曰主穿壙填瘞事者發近縣見卒萬六千人發內史卒萬五千人藏郭穿復土屬將軍武乙巳漢書云乙巳葬皇甫謐曰霸陵去長安七十里羣臣皆頓首上尊號曰孝文皇帝太子即位於髙廟丁未襲號曰皇帝孝景皇帝元年十月制詔御史蓋聞古者祖有功而宗有德應劭曰始取天下者為祖髙帝稱髙祖是也始治天下者為宗文帝稱太宗是也制禮樂各有由聞歌者所以發德也舞者所以明功也髙廟酎張晏曰正月旦作酒八月成名曰酎酎之言純也至武帝時因八月嘗酎會諸侯廟中出金助祭所謂酎金也奏武德文始五行之舞孟康曰武德高祖所作也文始舜舞也五行周舞也武德者其舞人執干戚文始舞執羽籥五行舞冠冕衣服法五行色見禮樂志孝惠廟酎奏文始五行之舞孝文皇帝臨天下通關梁不異逺方張晏曰孝文十二年除關不用傳令逺近若一除誹謗去肉刑賞賜長老收恤孤獨以育羣生減嗜欲不受獻徐廣曰減一作滅不私其利也罪人不孥蘇林曰刑不及妻子不誅無罪除肉刑出美人重絶人之世朕既不敏不能識此皆上古之所不及而孝文皇帝親行之德厚侔天地李竒曰侔齊等利澤施四海靡不獲福焉明象乎日月而廟樂不稱朕甚懼焉其為孝文皇帝廟為昭德之舞文穎曰景帝采髙祖武德舞作昭德舞舞之於文帝廟見禮樂志以明休德然後祖宗之功德著於竹帛施於萬世永永無窮朕甚嘉之其與丞相列侯中二千石禮官具為禮儀奏丞相臣嘉等言陛下永思孝道立昭德之舞以明孝文皇帝之盛德皆臣嘉等愚所不及臣謹議曰功莫大於髙皇帝德莫盛於孝文皇帝髙皇廟宜為帝者太祖之廟孝文皇帝廟宜為帝者太宗之廟天子宜世世獻祖宗之廟郡國諸侯宜各為孝文皇帝立太宗之廟諸侯王列侯使者侍祠天子歲獻祖宗之廟張晏曰王及列侯歲時遣使詣京師侍祠助祭也如淳曰若光武廟在章陵南陽太守稱使者往祭是也不使侯王祭者諸侯不得祖天子也凡臨祭祀宗廟皆為侍祭請著之竹帛宣布天下制曰可太史公曰孔子言必世而後仁孔安國曰三十年曰世如有受命王者必三十年仁政乃成善人之治國百年亦可以勝殘去殺王肅曰勝殘暴之人使不為惡去殺不用殺也誠哉是言漢興至孝文四十有餘載德至盛也廩廪鄉改正服封禪矣謙讓未成於今嗚呼豈不仁哉史記集解卷十
