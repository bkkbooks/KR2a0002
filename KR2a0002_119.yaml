body:
  text: 史記集解卷一百二十一宋裴駰撰史記一百二十一儒林列傳第六十一太史公曰余讀功令至於廣厲學官之路未嘗不廢書而歎也曰嗟乎夫周室衰而關雎作幽厲微而禮樂壞諸侯恣行政由强國故孔子閔王路廢而邪道興於是論次詩書修起禮樂適齊聞韶三月不知肉味自衛返魯然後樂正雅頌各得其所世以混濁莫能用是以仲尼干七十餘君無所遇曰茍有用我者期月而已矣西狩獲麟曰吾道窮矣故因史記作春秋以當王法其辭微而指博後世學者多錄焉徐廣曰錄一作繆自孔子卒後七十子之徒散遊諸侯大者為師傅卿相小者友教士大夫或隱而不見故子路居衛按仲尼弟子列傳子路死於衛時孔子尚存子張居陳澹臺子羽居楚子夏居西河子貢終於齊如田子方段干木吳起禽滑釐之屬皆受業於子夏之倫為王者師是時獨魏文侯好學後陵遲以至於始皇天下竝爭於戰國儒術既絀焉然齊魯之間學者獨不廢也於威宣之際孟子荀卿之列咸遵夫子之業而潤色之以學顯於當世及至秦之季世焚詩書坑術士六蓺從此缺焉陳涉之王也而魯諸儒持孔氏之禮器往歸陳王於是孔甲為陳涉博士徐廣曰孔子八世孫名鮒字甲也卒與涉俱死陳涉起匹夫驅瓦合適戍旬月以王楚不滿半嵗竟滅亡其事至微淺然而縉紳先生之徒負孔子禮器往委質為臣者何也以秦焚其業積怨而發憤於陳王也及髙皇帝誅項籍舉兵圍魯魯中諸儒尚講誦習禮樂絃歌之音不絶豈非聖人之遺化好禮樂之國哉故孔子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之夫齊魯之間於文學自古以來其天性也故漢興然後諸儒始得修其經蓺講習大射鄉飲之禮叔孫通作漢禮儀因為太常諸生弟子共定者咸為選首於是喟然歎興於學然尚有干戈平定四海亦未暇遑庠序之事也孝惠吕后時公卿皆武力有功之臣孝文時頗徵用然孝文帝本好刑名之言及至孝景不任儒者而竇太后又好黄老之術故諸博士具官待問未有進者及今上即位趙綰王臧之屬明儒學而上亦鄉之於是招方正賢良文學之士自是之後言詩於魯則申培公徐廣曰一作掊韋昭曰培申公名音扶尤切於齊則轅固生於燕則韓太傅言尚書自濟南伏生言禮自魯髙堂生言易自菑川田生言春秋於齊魯自胡毋生於趙自董仲舒及竇太后崩武安侯田蚡為丞相絀黄老刑名百家之言延文學儒者數百人而公孫𢎞以春秋白衣為天子三公徐廣曰一云自齊為天子三公封以平津侯天下之學士靡然鄉風矣公孫𢎞為學官悼道之鬱滯乃請曰丞相御史言制曰蓋聞導民以禮風之以樂婚姻者居室之大倫也今禮廢樂崩朕甚愍焉故詳延天下方正博聞之士咸登諸朝其令禮官勸學講議洽聞興禮以為天下先太常議與博士弟子崇鄉里之化以廣賢材焉謹與太常臧漢書百官表孔臧也博士平等議曰聞三代之道鄉里有教夏曰挍殷曰序周曰庠其勸善也顯之朝廷其懲惡也加之刑罰故教化之行也建首善自京師始由内及外今陛下昭至徳開大明配天地本人倫勸學修禮崇化厲賢以風四方太平之原也古者政教未洽不備其禮請因舊官而興焉為博士官置弟子五十人復其身太常擇民年十八已上儀狀端正者補博士弟子郡國縣道邑有好文學敬長上肅政教順鄉里出入不悖所聞者令相長丞上屬所二千石二千石謹察可者當與計偕詣太常得受業如弟子一嵗皆輒試能通一蓺以上補文學掌故缺其髙弟可以為郎中者太常籍奏即有秀才異等輒以名聞其不事學若下材及不能通一蓺輒罷之而請諸不稱者罰臣謹按詔書律令下者明天人分際通古今之義文章爾雅訓辭深厚恩施甚美小吏淺聞不能究宣無以明布諭下治禮次治掌故徐廣曰一云次治禮學掌故以文學禮義為官遷留滯請選擇其秩比二百石以上及吏百石通一蓺以上補左右内史大行卒史比百石已下補郡太守卒史皆各二人邊郡一人先用誦多者若不足乃擇掌故補中二千石屬文學掌故補郡屬備員請著功令他如律令制曰可自此以來則公卿大夫士吏斌斌多文學之士矣申公者魯人也髙祖過魯申公以弟子從師入見髙祖于魯南宫吕太后時申公游學長安與劉郢同師已而郢為楚王令申公傅其大子戊徐廣曰楚元王劉交以文帝元年薨子夷王郢立四嵗薨子王戊立郢以吕后三年封上邽侯文帝元年立為楚王戊不好學疾申公及王郢卒戊立為楚王胥靡申公徐廣曰腐刑申公恥之歸魯退居家教終身不出門復謝絶賓客獨王命召之乃往徐廣曰魯恭王也弟子自遠方至受業者百餘人申公獨以詩經為訓以教無傳疑者則闕不傳蘭陵王臧既受詩以事孝景帝為太子少傅免去今上初即位臧迺上書宿衛上累遷一嵗中為郎中令及代趙綰亦嘗受詩申公綰為御史大夫綰臧請天子欲立明堂以朝諸侯不能就其事乃言師申公於是天子使使束帛加璧安車駟馬迎申公弟子二人乗軺傳從徐廣曰車馬至見天子天子問治亂之事申公時已八十餘老對曰為治者不在多言顧力行何如耳是時天子方好文詞見申公對黙然然已招致則以為太中大夫舍魯邸議明堂事太皇竇太后好老子言不説儒術得趙綰王臧之過以讓上上因廢明堂事盡下趙綰王臧吏後皆自殺申公亦疾免以歸數年卒弟子為博士者十餘人孔安國至臨淮太守徐廣曰孔鮒之弟子襄為惠帝博士遷為長沙大𫝊生忠忠生武及安國安國為博士臨淮太守周霸至膠西内史夏寛至城陽内史碭魯賜至東海太守蘭陵繆生至長沙内史徐偃為膠西中尉鄒人闕門慶忌漢書音義曰姓闕門名慶忌為膠東内史其治官民皆有廉節稱其好學學官弟子行雖不備而至於大夫郎中掌故以百數言詩雖殊多本於申公清河王太傅轅固生者齊人也以治詩孝景時為博士與黄生爭論景帝前黄生曰湯武非受命乃弑也轅固生曰不然夫桀紂虐亂天下之心皆歸湯武湯武與天下之心而誅桀紂桀紂之民不為之使而歸湯武湯武不得已而立非受命為何黄生曰冠雖敝必加於首履雖新必關於足何者上下之分也今桀紂雖失道然君上也湯武雖聖臣下也夫主有失行臣下不能正言匡過以尊天子反因過而誅之代立踐南面非弑而何也轅固生曰必若所云是髙帝代秦即天子之位非邪於是景帝曰食肉不食馬肝不為不知味言學者無言湯武受命不為愚遂罷是後學者莫敢明受命放殺者竇太后好老子書召轅固生問老子書固曰此是家人言耳太后怒曰安得司空城旦書乎徐廣曰司空主刑徒之官也駰案漢書音義曰道家以儒法為急比之於律令乃使固入圈刺豕景帝知太后怒而固直言無罪乃假固利兵下圈刺豕正中其心一刺豕應手而倒太后黙然無以復罪罷之居頃之景帝以固為廉直拜為清河王太傅徐廣曰哀王乗也久之病免今上初即位復以賢良徵固諸䛕儒多疾毁固曰固老罷歸之時固已九十餘矣固之徵也嶭人公孫𢎞亦徵徐廣曰辥縣在菑川側目而視固固曰公孫子務正學以言無曲學以阿世自是之後齊言詩皆本轅固生也諸齊人以詩顯貴皆固之弟子也韓生者漢書曰名嬰燕人也孝文帝時為博士景帝時為常山王太傅徐廣曰憲王舜也韓生推詩之意而為内外傳數萬言其語頗與齊魯間殊然其歸一也淮南賁生受之自是之後而燕趙間言詩者由韓生韓生孫商為今上博士伏生者張晏曰伏生名勝伏氏碑云濟南人也故為秦博士孝文帝時欲求能治尚書者天下無有乃聞伏生能治欲召之是時伏生年九十餘老不能行於是乃詔太常使掌故朝錯往受之秦時焚書伏生壁藏之其後兵大起流亡漢定伏生求其書亡數十篇獨得二十九篇即以教於齊魯之間學者由是頗能言尚書諸山東大師無不涉尚書以教矣伏生教濟南張生及歐陽生漢書曰字和伯千乗人歐陽生教千乗兒寛兒寛既通尚書以文學應郡舉詣博士受業受業孔安國兒寛貧無資用常為弟子都養及時時間行傭賃以給衣食行常帶經止息則誦習之以試第次補廷尉史是時張湯方鄉學以為奏讞掾以古法議決疑大獄而愛幸寛寛為人温良有廉智自持而善著書書奏敏於文口不能發明也湯以為長者數稱譽之及湯為御史大夫以兒寛為掾薦之天子天子見問説之張湯死後六年兒寛位至御史大夫徐廣曰元狩元年九年而以官卒寛在三公位以和良承意從容得久然無有所匡諫於官官屬易之不為盡力張生亦為博士而伏生孫以治尚書徵不能明也自此之後魯周霸孔安國雒陽賈嘉頗能言尚書事孔氏有古文尚書而安國以今文讀之因以起其家逸書得十餘篇蓋尚書滋多於是矣諸學者多言禮而魯髙堂生最本禮固自孔子時而其經不具及至秦焚書書散亡益多於今獨有士禮髙堂生能言之而魯徐生善為容孝文帝時徐生以容為禮官大夫傳子至孫徐延徐襄襄其天姿善為容不能通禮經延頗能未善也襄以容為漢禮官大夫至廣陵内史延及徐氏弟子公戸滿意桓生單次皆嘗為漢禮官大夫而段丘蕭奮徐廣曰屬山陽也以禮為淮陽太守是後能言禮為容者由徐氏焉自魯商瞿受易孔子孔子卒商瞿傳易六世至齊人田何字子莊而漢興田何傳東武人王同子仲子仲傳菑川人楊何何以易元光元年徵官至中大夫齊人即墨成以易至城陽相廣川人孟但以易為太子門大夫魯人周霸莒人衡胡徐廣曰莒一作吕臨菑人主父偃皆以易至二千石然要言易者本於楊何之家董仲舒廣川人也以治春秋孝景時為博士下帷講誦弟子傳以久次相受業或莫見其面蓋三年董仲舒不觀於舍園其精如此進退容止非禮不行學士皆師尊之今上即位為江都相以春秋災異之變推陰陽所以錯行故求雨閉諸陽縱諸陰其止雨反是行之一國未常不得所欲中廢為中大夫居舍著災異之記是時遼東髙廟災主父偃疾之取其書奏之天子徐廣曰建元六年天子召諸生示其書有刺譏董仲舒弟子吕步舒徐廣曰一作荼亦音舒不知其師書以為下愚於是下董仲舒吏當死詔赦之於是董仲舒竟不敢復言災異董仲舒為人廉直是時方外攘四夷公孫𢎞治春秋不如董仲舒而𢎞希世用事位至公卿董仲舒以𢎞為從諛𢎞疾之乃言上曰獨董仲舒可使相膠西王膠西王素聞董仲舒有行亦善待之董仲舒恐久獲罪疾免居家至卒終不治産業以修學著書為事故漢興至于五世之間唯董仲舒名為明於春秋其傳公羊氏也胡毋生漢書曰字子都齊人也孝景時為博士以老歸教授齊之言春秋者多受胡毋生公孫𢎞亦頗受焉瑕丘江生為穀梁春秋自公孫𢎞得用嘗集比其義卒用董仲舒仲舒弟子通者蘭陵楮大廣川殷忠徐廣曰殷一作段又作瑕也温吕步舒楮大至梁相步舒至長史持節使決淮南獄於諸侯擅專斷不報以春秋之義正之天子皆以為是弟子通者至於命大夫為郎謁者掌故者以百數而董仲舒子及孫皆以學至大官史記集解卷一百二十一
