body:
  text: 史記集解卷十四宋裴駰撰史記十四十二諸侯年表第二太史公讀春秋厯譜諜至周厲王未嘗不廢書而歎也曰嗚呼師摰見之矣鄭𤣥曰師摰太師之名周道衰微鄭衛之音作正樂廢而失節魯太師摰識關雎之聲首理其亂也紂為象箸而箕子唏周道缺詩人本之袵席關雎作仁義陵遲鹿鳴刺焉及至厲王以惡聞其過公卿懼誅而禍作厲王遂奔于彘亂自京師始而共和行政焉是後或力政彊乘弱興師不請天子然挾王室之義以討伐為㑹盟主政由五伯諸侯恣行淫侈不軌賊臣篡子滋起矣齊晉秦楚其在成周微甚封或百里或五十里晉阻三河齊負東海楚介江淮秦因雍州之固四國迭興更為伯主文武所裦大封皆威而服焉是以孔子明王道于七十餘君莫能用故西觀周室論史記舊聞興於魯而次春秋上記隱下至哀之獲麟約其辭文去其煩重以制義法王道備人事浹七十子之徒口受其𫝊指為有所刺譏褒諱挹損之文辭不可以書見也魯君子左丘明懼弟子人人異端各安其意失其真故因孔子史記具論其語成左氏春秋鐸椒為楚威王傅為王不能盡觀春秋采取成敗卒四十章為鐸氏微趙孝成王時其相虞卿上采春秋下觀近勢亦著八篇為虞氏春秋吕不韋者秦莊襄王相亦上觀尚古刪拾春秋集六國時事以為八覽六論十二紀為吕氏春秋及如荀卿孟子公孫固韓非之徒各往往捃托春秋之文以著書不可勝紀漢相張蒼厯譜五德上大夫董仲舒推春秋義頗著文焉太史公曰儒者斷其義馳說者騁其辭不務綜其終始厯人取其年月數家隆於神運徐廣曰一作通也譜諜獨記世諡其辭略欲一觀諸要難於是譜十二諸侯自共和訖孔子表見春秋國語學者所譏盛衰大指著于篇為成學治古文者徐廣曰一云治國聞者也要刪焉史記集解卷十四
