body:
  text: 史記集解卷三十三宋裴駰撰史記三十三魯周公世家第三周公旦者周武王弟也自文王在時旦為子孝篤仁異於羣子及武王即位旦常輔翼武王用事居多武王九年東伐至盟津周公輔行十一年伐紂至牧野周公佐武王作牧誓破殷入商宫已殺紂周公把大鉞召公把小鉞以夾武王釁社告紂之罪于天及殷民釋箕子之囚封紂子武庚祿父使管叔蔡叔傳之以續殷祀遍封功臣同姓戚者封周公旦於少昊之墟曲阜為為魯公周公不就封留佐武王武王克殷二年天下未集武王有疾不豫羣臣懼太公召公乃繆卜周公曰未可以戚我先王孔安國曰戚近也未可以死近先王也鄭𤣥曰二公欲就文王廟卜戚憂也未可憂怖我先王也周公於是乃自以為質設三壇周公北面立戴璧秉圭孔安國曰璧以禮神圭以為贄告于大王王季文王孔安國曰告謂祝辭史䇿祝孔安國曰史為䇿書祝祠也鄭𤣥曰䇿周公所作謂簡書也祝者讀此簡書以告三王曰惟爾元孫王發勤勞阻疾徐廣曰阻一作淹若爾三王是有負子之責於天以旦代王發之身旦巧能多材多藝能事鬼神乃王發不如旦多材多藝不能事鬼神乃命於帝庭敷佑四方馬融曰武王受命於天帝之庭布其道以佑助四方用能定汝子孫于下地四方之民罔不敬畏孔安國曰言武王用受命帝庭之故能定先人子孫於天下四方之民無不敬畏也無墜天之降葆命我先王亦永有所依歸孔安國曰言不救則墜天寶命也救之則先王長有所依歸矣鄭𤣥曰降下也寶猶主也有所依歸為宗廟之主也今我其即命於元龜孔安國曰就受三王之命於元龜卜知吉凶者也馬融曰元龜大龜也爾之許我我其以璧與圭歸以俟爾命孔安國曰許謂疾瘳待命當以事神也馬融曰待汝命武王當愈我當死也爾不許我我乃屏璧與圭孔安國曰不許不愈也屏藏言不得事神周公已令史䇿告大王王季文王欲代武王發於是乃即三王而卜卜人皆曰吉發書視之信吉孔安國曰占兆書也周公喜開籥乃見書遇吉王肅曰籥藏占兆書管也周公入賀武王曰王其無害旦新受命三王維長終是圗孔安國曰我新受三王命武王惟長終是謀周之道兹道能念子一人馬融曰一人天子也鄭𤣥曰茲此也周公藏其䇿金縢匱中孔安國曰藏之於匱緘之以金不欲人開也誡守者勿敢言明日武王有瘳其後武王既崩成王少在強褓之中周公恐天下聞武王崩而畔周公乃踐阼代成王攝行政當國管叔及其羣弟流言於國曰周公將不利於成王孔安國曰放言於國以誣周公以惑成王也周公乃告太公召公奭曰我之所以弗辟而攝行政者恐天下畔周無以告我先王大王王季文王三王之憂勞天下久矣於今而后成武王蚤終成王少將以成周我所以為之若此於是卒相成王而使其子伯禽代就封於魯周公戒伯禽曰我文王之子武王之弟成王之叔父我於天下亦不賤矣然我一沐三握髮一飯三吐哺起以待士猶恐失天下之賢人子之魯慎無以國驕人管蔡武庚等果率淮夷而反周公乃奉成王命興師東伐作大誥遂誅管叔殺武庚放蔡叔收殷餘民以封康叔於衛封微子於宋以奉殷祀寧淮夷東土二年而畢定諸侯咸服宗周天降祉福唐叔得禾異母同穎徐廣曰一作穗穎即穗也獻之成王成王命唐叔以餽周公於東土作餽禾周公既受命禾嘉天子命徐廣曰嘉一作魯今書序作旅也作嘉禾東土以集周公歸報成王乃為詩貽王命之曰鴟梟毛詩序曰成王未知周公之志公乃為詩以遺王名之曰鴟梟毛𫝊曰鴟梟鸋鴂也王亦未敢訓周公徐廣曰訓一作誚成王七年二月乙未王朝步自周至豐馬融曰周鎬京也豐文王廟所在朝者舉事上朝將即土中易都大事故告文王武王廟鄭𤣥曰步行也堂下謂之步豐鎬異邑而言步者告武王廟即行出廟入廟不以逺為父恭也使太保召公先之雒相土鄭𤣥曰相視也其三月周公往營成周雒邑公羊傳曰成周者何東周也何休曰名為成周者周道始成王所都也卜居焉曰告遂國之成王長能聽政於是周公乃還政於成王成王臨朝周公之代成王治南面倍依以朝諸侯禮記曰周公朝諸侯于明堂之位天子負斧依南向而立鄭𤣥曰周公攝王位以明堂之禮儀朝諸侯也不於宗廟避王也天子周公也負之言倍也斧依為斧文屏風於戶牖之間周公於前立也及七年後還政成王北面就臣位匔匔如畏然徐廣曰匔匔謹敬貌也見三蒼音窮窮一本作䕫䕫也初成王少時病周公乃自揃其蚤沈之河以祝於神曰王少未有識奸神命者乃旦也亦藏其䇿於府成王病有瘳及成王用事人或譖周公周公奔楚成王發府見周公禱書乃泣反周公周公歸恐成王壯治有所淫佚乃作多士作毋逸毋逸稱為人父母為業至長久子孫驕奢忘之以亡其家為人子可不慎乎故昔在殷王中宗嚴恭敬畏天命自度孔安國曰用法度也治民震懼不敢荒寧馬融曰知民之勞苦不敢荒廢自安也故中宗饗國七十五年其在髙宗久勞于外為與小人孔安國曰父小乙使之久居人間勞是稼穡與小人出入同事也馬融曰武丁為太子時其父小乙使行役有所勞役於外與小人從事知小人艱難勞苦也鄭𤣥曰為父小乙將師役於外也作其即位乃有亮暗三年不言孔安國曰武丁起其即王位則小乙死乃有信默三年不言言孝行著也鄭𤣥曰楣謂之梁閽謂廬也言乃歡鄭𤣥曰歡喜恱也言乃喜恱則民臣望其言久矣不敢荒寧密靖殷國馬融曰寧安也至于小大無怨孔安國曰小大之政民無怨者言無非也故髙宗饗國五十五年尚書云五十九年其在祖甲孔安國曰王肅曰祖甲湯孫太甲也馬融曰鄭𤣥曰祖甲武丁子帝甲也不義惟王久為小人孔安國曰為王不義久為小人之行伊尹放之桐宫馬融曰祖甲有兄祖庚而祖甲賢武丁欲立之祖甲以王廢長立少不義逃亡民間故曰不義惟王久為小人也武丁死祖庚立祖庚死祖甲立于外知小人之依能保施小民不侮鰥寡孔安國曰小人之所依依仁政也故能安順於衆民不敢侮慢惸獨也故祖甲饗國三十三年王肅曰先中宗後祖甲先盛德後有過也多士稱曰自湯至于帝乙無不率祀明德帝無不配天者孔安國曰無敢失天道者故無不配天也在今後嗣王紂誕淫佚不顧天及民之從也徐廣曰一作敬之也駰案馬融曰紂大淫樂其逸無所能顧念於天施顯道於民而敬之也其民皆可誅周多士文王日中昃不暇食饗國五十年作此以誡成王成王在豐天下已安周之官政未次序於是周公作周官官别其宜作立政孔安國曰周公既致政成王恐其怠忽故以君臣立政為戒也以便百姓百姓說周公在豐病將沒曰必葬我成周徐廣曰衛世家云管叔欲襲成周然則或說尚書者不以成周為洛陽乎諸侯年表敘曰齊晉楚秦其在成周徵之甚也以明吾不敢離成王周公既卒成王亦讓葬周公於畢從文王以明豫小子不敢臣周公也周公卒後秋未穫暴風雷雨禾盡偃大木盡拔周國大恐成王與大夫朝服以開金縢書王乃得周公所自以為功代武王之說徐廣曰一作簡駰案孔安國曰所藏請命策書本也二公及王乃問史百執事孔安國曰二公倡王啓之故先見書也史百執事皆從周公請命者鄭𤣥曰問者問審然否也史百執事曰信有昔周公命我勿敢言成王執書以泣鄭𤣥曰泣者傷周公忠孝如是而無知之者曰自今後其無繆卜乎孔安國曰本欲敬卜吉凶今天意可知故止昔周公勤勞王家惟豫幼人弗及知今天動威以彰周公之德惟朕小子其迎我國家禮亦宜之王肅曰亦宜褒有德也王出郊天乃雨反風禾盡起孔安國曰郊以玉幣謝天也天即反風起禾明郊之是也馬融曰反風風還反也二公命國人凡大木所偃盡起而築之徐廣曰築拾也駰案馬融曰禾為木所偃者起其木拾其下禾乃無所失亡也歲則大孰於是成王乃命魯得郊禮記曰魯君祀帝于郊配以后稷天子之禮祭文王禮記曰諸侯不得祖天子鄭𤣥曰魯以周公之故立文王之廟也魯有天子禮樂者以褒周公之德也周公卒子伯禽固已前受封是為魯公魯公伯禽之初受封之魯三年而後報政周公周公曰何遲也伯禽曰變其俗草其禮喪三年然後除之故遲太公亦封於齊五月而報政周公周公曰何疾也曰吾簡其君臣禮從其俗為也及後聞伯禽報政遲乃數曰嗚呼魯後世其北面事齊矣夫政不簡不易民不有近平易近民民必歸之徐廣曰一本云政不簡不行不行不樂不樂則不平易平易近民民必歸之又一本云夫民不簡不易有近乎簡易民必歸之伯禽即位之後有管蔡等反也淮夷徐戎亦並興反孔安國曰淮浦之夷徐州之戎並起為寇於是伯禽率師伐之於肸徐廣曰一作鮮一作獮駰案尚書作粊孔安國曰魯東郊之地名也作肸誓曰陳爾甲胄無敢不善無敢傷牾馬牛其風臣妾逋逃鄭𤣥曰風走逸臣妾厮役之屬也勿敢越逐敬徐廣曰一作振復之孔安國曰勿敢棄越壘伍而求逐也衆人有得佚馬牛逃臣妾皆敬還無敢寇攘踰牆垣鄭𤣥曰冦劫取也因其失亡曰攘魯人三郊三隧王肅曰邑外曰郊郊外曰隧不言四者東郊留守故言三也峙爾芻茭糗糧楨幹孔安國曰皆當儲峙汝糧使足食多積芻茭供軍牛馬馬融曰楨幹皆築具楨在前幹在兩旁無敢不逮我甲戌築而征徐戎孔安國曰甲戌日當築攻敵壘距堙之屬無敢不及有大刑馬融曰大刑死刑作此肸誓遂平徐戎定魯魯公伯禽卒徐廣曰皇甫謐云伯禽以成王元年封四十六年康王十六年卒子考公酋立考公四年卒立弟熙是謂焬公煬公築茅徐廣曰一作第又作夷闕門世本曰楊公徙魯宋忠曰今魯國六年卒子幽公宰立幽公十四年幽公弟沸殺幽公而自立是為魏公徐廣曰世本作徵公魏公五十年卒子厲公擢立厲公三十七年卒魯人立其弟具是為獻公獻公三十二年卒徐廣曰劉歆云五十年皇甫謐云三十六年子真公濞立真公十四年周厲王無道出奔彘共和行政二十九年周宣王即位三十年真公卒弟敖立是為武公武公九年春武公與長子括少子戲西朝周宣王宣王愛戲欲立戲為魯太子周之樊仲山父諫宣王曰廢長立少不順不順必犯王命必誅之故出令不可不順也令之不行政之不立韋昭曰令不行則政不立行而不順民將棄上韋昭曰使長事少故民將棄上夫下事上少事長所以為順今天子建諸矦立其少是教民逆也唐固曰言不教之順而教之逆若魯從之諸矦效之王命將有所壅韋昭曰言先王立長之命將壅塞不行也若弗從而誅之是自誅王命也韋昭曰先王之命立長今魯亦立長若誅之是自誅王命誅之亦失不誅亦失韋昭曰誅之誅王命不誅則王命廢王其圗之宣王弗聽卒立戲為魯太子夏武公歸而卒徐廣曰劉歆云立二年戲立是為懿公懿公九年懿公兄括之子伯御與魯人攻弒懿公而立伯御為君伯御即位十一年周宣王伐魯殺其君伯御而問魯公子能道順徐廣曰一作訓諸侯者以為魯後樊穆仲曰韋昭曰穆仲仲山父之諡也猶魯叔孫穆子謂之穆叔也魯懿公弟稱肅恭明神敬事耆老賦事行刑必問於遺訓而咨於固實徐廣曰固一作故韋昭曰故實故事之是者不干所問不犯所知宣王曰然能訓治其民矣乃立稱於夷宫韋昭曰夷宮者宣王祖父夷王之廟古者爵命必於祖廟是為孝公自是後諸侯多畔王命孝公二十五年諸侯畔周犬戎殺幽王秦始列為諸侯二十七年孝公卒子弗湟徐廣曰表云弗生也立是為惠公惠公三十年晉人弒其君昭侯四十五年晉人又弒其君孝侯四十六年惠公卒長庶子息攝當國行君事是為隱公初惠公適夫人無子公賤妾聲子生子息息長為娶於宋宋女至而好惠公奪而自妻之生子允徐廣曰一作軌登宋女為夫人以允為太子及惠公卒為允少故魯人共令息攝政不言即位隱公五年觀漁於棠賈逵曰棠魯地陳漁而觀之杜預曰髙平方與縣北有武棠亭魯侯觀漁臺也八年與鄭易天子之太山之邑祊及許田君子譏之穀梁傳曰祊者鄭伯之所受命於天子而祭太山之邑也許田乃魯之朝宿之邑天子在上諸矦不得以地相與也十一年冬公子揮諂謂隱公曰百姓便君君其遂立吾請為君殺子允君以我為相左傳曰羽父請殺桓公將以求太宰也隱公曰有先君命吾為允少故攝代今允長矣吾方營莵裘之地而老焉服䖍曰莵裘魯邑也營菟裘以作宫室欲居之以終老也杜預曰菟裘在泰山梁父縣南以授子允政揮懼子允聞而反誅之乃反譖隱公於子允曰隱公欲遂立去子子其圗之請為子殺隱公子允許諾十一月𨼆公祭鍾巫賈逵曰鍾巫祭名也齊于社圃杜預曰社圃園名館于蒍氏服䖍曰館舍也蒍氏魯大夫揮使人弒隱公于蒍氏而立子允為君是為桓公桓公元年鄭以璧易天子之許田麋信曰鄭以祊不足當許田故復加璧二年以宋之賂鼎入於太廟君子譏之穀梁傳曰桓公內殺其君外成人之亂受賂而退以事其祖非禮也公羊傳曰周公廟曰太廟三年使揮迎婦于齊為夫人六年夫人生子與桓公同日故名曰同同長為太子十六年會于曹伐鄭鄭厲公十八年春公將有行杜預曰始議行事也遂與夫人如齊申繻諫止賈逵曰申繻魯大夫公不聽遂如齊齊襄公通桓公夫人公怒夫人夫人以告齊侯夏四月丙子齊襄公饗公服䖍曰為公設享宴之禮公醉使公子彭生抱魯桓公因命彭生摺其脅公死于車魯人告于齊曰寡君畏君之威不敢寧居來修好禮禮成而不反無所歸咎請得彭生以除醜於諸侯齊人殺彭生以說魯立太子同是為莊公莊公母夫人因留齊不敢歸魯莊公五年冬伐衛內衛惠公八年齊公子糾來奔九年魯欲內子糾於齊後桓公桓公發兵擊魯魯急殺子糾召忽死齊告魯生致管仲魯人施伯曰齊欲得管仲非殺之也將用之用之則為魯患不如殺以其尸與之莊公不聽遂囚管仲與齊齊人相管仲十三年魯莊公與曹沫會齊桓公於柯曹沫劫齊桓公求魯侵地已盟而釋桓公桓公欲背約管仲諫卒歸魯侵地十五年齊桓公始霸二十三年莊公如齊觀社韋昭曰齊因祀社搜軍實以示軍容公往觀之三十二年初莊公築臺臨黨氏賈逵曰黨氏魯大夫任姓見孟女賈逵曰黨氏之女說而愛之許立為夫人割臂以盟服䖍曰割其臂以與公盟孟女生子斑斑長說梁氏女杜預曰梁氏魯大夫也往觀圉人犖自牆外與梁氏女戲服䖍曰圉人掌養馬者犖其名也斑怒鞭犖莊公聞之曰犖有力焉遂殺之是未可鞭而置也斑未得殺會莊公有疾莊公有三弟長曰慶父次曰叔牙次曰季友莊公取齊女為夫人曰哀姜哀姜無子哀姜娣曰叔姜生子開莊公無適嗣愛孟女欲立其子斑莊公病而問嗣於弟叔牙叔牙曰一繼一及魯之常也何休曰父死子繼兄死弟及慶父在可為嗣君何憂莊公患叔牙欲立慶父退而問季友季友曰請以死立斑也莊公曰曩者叔牙欲立慶父奈何季友以莊公命命牙待於針巫氏杜預曰針巫氏魯大夫也使針季劫飲叔牙以鴆服䖍曰鴆鳥一曰運日鳥曰飲此則有後奉祀不然死且無後牙遂飲鴆而死魯立其子為叔孫氏杜預曰不以罪誅故得立後世繼其祿也八月癸亥莊公卒季友竟立子斑為君莊公命侍喪舍于黨氏先時慶父與哀姜私通欲立哀姜娣子開及莊公卒而季友立斑十月已未慶父使圉人犖殺魯公子斑於黨氏季友奔陳服䖍曰季友內知慶父之情力不能誅故避其難出奔慶父竟立莊公子開是為湣公湣公二年慶父與哀姜通益甚哀姜與慶父謀殺湣公而立慶父慶父使卜齮襲殺湣公於武闈賈逵曰卜齮魯大夫也宮中之門謂之闈季友聞之自陳與湣公弟申如邾請魯求內之魯人欲誅慶父慶父恐奔莒於是季友奉子申入立之是為釐公釐公亦莊公少子哀姜恐奔邾季友以賂如莒求慶父慶父歸使人殺慶父慶父請奔弗聽乃使大夫奚斯行哭而往慶父聞奚斯音乃自殺齊桓公聞哀姜與慶父亂以危魯乃召之邾而殺之以其尸歸戮之魯魯釐公請而葬之季友母陳女故亡在陳陳故佐送季友及子申季友之將生也父魯桓公使人卜之曰男也其名曰友間于兩社為公室輔賈逵曰兩社周社亳社也兩社之間朝廷執政之臣所在季友亡則魯不昌及生有文在掌曰友遂以名之號為成季其後為季氏慶父後為孟氏也釐公元年以汶陽鄪封季友賈逵曰汶陽鄪魯二邑杜預曰汶陽汶水北地也汶水出泰山萊蕪縣季友為相九年晉里克殺其君奚齊卓子徐廣曰卓一作悼齊桓公率釐公討晉亂至髙梁而還立晉惠公十七年齊桓公卒二十四年晉文公即位三十三年釐公卒子興立是為文公文公元年楚太子商臣弒其父成王代立三年文公朝晉襄公十一年十月甲午魯敗翟于鹹服䖍曰魯地也獲長翟喬如富父終甥春其喉以戈殺之服䖍曰富父終甥魯大夫也舂猶衝埋其首於子駒之門賈逵曰子駒魯郭門名以命宣伯服䖍曰宣伯叔孫得臣子喬如也得臣獲喬如以名其豫使後世旌識其功初宋武公之世鄋瞞伐宋服䖍曰武公周平王時在春秋前二十五年鄋滿長翟國名司徒皇父帥師禦之以敗翟于長邱杜預曰宋地名獲長翟緣斯賈逵曰喬如之祖晉之滅路在魯宣公十五年獲喬如弟棼如齊惠公二年鄋瞞伐齊齊王子城父獲其弟榮如埋其首於北門案年表齊惠公二年魯宣公之二年衛人獲其季弟簡如服䖍曰獲與喬如同時鄋瞞由是遂亡杜預曰長翟之種絶十五年季文子使於晉十八年二月文公卒文公有二妃長妃齊女哀姜生子惡及視次妃敬嬴嬖愛生子俀徐廣曰一作倭俀私事襄仲服䖍曰襄仲公子遂襄仲欲立之叔仲曰不可服䖍曰叔仲惠伯襄仲請齊惠公惠公新立欲親魯許之冬十月襄仲殺子惡及視而立俀是為宣公哀姜歸齊哭而過市曰天乎襄仲為不道殺適立庶市人皆哭魯人謂之哀姜魯由此公室卑三桓彊服䖍曰三桓魯桓公之族仲孫叔孫季孫宣公俀十二年楚莊王彊圍鄭鄭伯降復國之十八年宣公卒子成公黑肱徐廣曰肱一作股立是為成公季文子曰使我殺適立庶失大援者襄仲服䖍曰援助也仲殺適立庶國政無常鄰國非之是失大援助也杜預曰襄仲立宣公南通於楚既不固又不能堅事齊晉故云失大援襄仲立宣公公孫歸父有寵服䖍曰歸父襄仲之子宣公欲去三桓與晉謀伐三桓會宣公卒季文子怨之歸父奔齊成公二年春齊伐取我隆左傳作龍杜預曰魯邑在泰山博縣西南夏公與晉郤克敗齊頃公於鞍齊復歸我侵地四年成公如晉晉景公不敬魯魯欲背晉合於楚或諫乃不十年成公如晉晉景公卒因留成公送葬魯諱之十五年始與吳王壽夢會鍾離十六年宣伯告晉欲誅季文子服䖍曰宣伯叔孫喬如文子有義晉人弗許十八年成公卒子午立是為襄公是時襄公三歲也襄公元年晉立悼公往年冬晉欒書弒其君厲公四年襄公朝晉五年季文子卒家無衣帛之妾廄無食粟之馬府無金玉以相三君君子曰季文子廉忠矣九年與晉伐鄭晉悼公冠襄公於衛左傳曰冠于成公之廟假鐘磬焉禮也季武子從相行禮十一年三桓氏分為三軍韋昭曰周禮天子六軍諸矦大國三軍魯伯禽之封舊有三軍其後削弱二軍而已季武子欲專公室故益中軍以為三軍三家各征其一十二年朝晉十六年晉平公即位二十一年朝晉平公二十二年孔丘生二十五年齊崔杼弒其君莊公立其弟景公二十九年吳延陵季子使魯問周樂盡知其意魯人敬焉三十一年六月襄公卒其九月太子卒左傳曰毁也魯人立齊歸之子裯徐廣曰一作祒為君服䖍曰胡歸姓之國也齊諡也是為昭公昭公年十九猶有童心服䖍曰言無成人之志而有童子之心穆叔不欲立曰太子死有母弟可立不即立長服䖍曰無母弟則立庶子之長年鈞擇賢義鈞則卜之杜預曰先人事後卜筮義鈞謂賢等今裯非適嗣且又居喪意不在戚而有喜色若果立必為季氏憂季武子弗聽卒立之比及葬三易衰杜預曰言其嬉戲無度君子曰是不終也昭公三年朝晉至河晉平公謝還之魯恥焉四年楚靈王會諸侯於申昭公稱病不往七年季武子卒八年楚靈王就章華臺召昭公昭公往賀春秋云七年三月公如楚賜昭公寶器已而悔復詐取之左傳曰好以大屈服䖍曰大屈寶金可以為劎一曰大屈弓名魯連書曰楚子享魯侯于章華與之大曲之弓既而悔之大屈殆所謂大曲之弓十二年朝晉至河晉平公謝還之十三年楚公子棄疾弒其君靈王代立十五年朝晉晉留之葬晉昭公魯恥之二十年齊景公與晏子狩竟因入魯問禮二十一年朝晉至河晉謝還之二十五年春鸜鵒來巢周禮曰鸜鵒不踰濟公羊傳曰非中國之禽也宜穴而巢穀梁傳曰來者來中國也師已曰文成之世童謠曰賈逵曰師已魯大夫也文成魯文公成公鸜鵒來巢公在乾矦鸜鵒入處公在外野季氏與郈氏徐廣曰一本作厚世本亦然鬬雞杜預曰季平子郈昭伯二家相近故鬬雞季氏芥雞羽服䖍曰搗芥子播其雞羽可以坌郈氏雞目杜預曰或云以膠沙播之為介雞郈氏金距服䖍曰以金錔距季平子怒而侵郈氏服䖍曰怒其不下已也侵郈氏之宫地以自益郈昭伯亦怒平子臧昭伯之弟會賈逵曰昭伯臧孫賜也僞讒臧氏匿季氏臧昭伯囚季氏人季平子怒囚臧氏老服䖍曰老臧氏象之太臣臧郈氏以難告昭公昭公九月戊戌伐季氏遂入平子登臺請曰君以讒不察臣罪誅之請遷沂上弗許杜預曰魯城南自有沂水平子欲出城待罪也大沂水出蓋縣南入泗水請囚於鄪弗許服䖍曰鄪季氏邑請以五乘亡弗許服䖍曰言五乘自省約以出子家駒曰君其許之政自季氏久矣為徒者衆衆將合謀弗聽郈氏曰必殺之叔孫氏之臣戾左傳曰鬷戾謂其衆曰無季氏與有孰利皆曰無季氏是無叔孫氏戾曰然救季氏遂敗公師孟懿子賈逵曰懿子仲孫何忌聞叔孫勝亦殺郈昭伯郈昭伯為公使故孟氏得之三家共伐公公遂奔己亥公至于齊齊景公曰請致千社待君子家曰棄周公之業而臣於齊可乎乃止子家曰齊景公無信不如早之晉弗從叔孫見公還見平子平子頓首初欲迎昭公孟孫季孫後悔乃止二十六年春齊伐魯取鄆賈逵曰魯邑而居昭公焉夏齊景公將內公令無受魯賂申豐汝賈賈逵曰申豐汝賈魯大夫許齊臣髙齕子將粟五千庾賈逵曰十六斗為庾五千庾八萬斗子將言於齊侯曰羣臣不能事魯君有異焉服䖍曰異猶怪也宋元公為魯如晉求內之道卒春秋曰宋公佐卒于曲棘叔孫昭子求內其君無病而死不知天棄魯乎抑魯君有罪于鬼神也願君且待齊景公從之二十八年昭公如晉求入季平子私於晉六卿六卿受季氏賂諫晉君晉君乃止居昭公乾侯杜預曰乾侯在魏郡斥丘縣晉竟內邑二十九年昭公如鄆齊景公使人賜昭公書自謂主君服䖍曰大夫稱主比公於大夫故稱主君昭公恥之怒而去乾侯三十一年晉欲內昭公召季平子平子布衣跣行王肅曰示憂戚因六卿謝罪六卿為言曰晉欲內昭公衆不從晉人止三十二年昭公卒於乾侯魯人共立昭公弟宋為君是為定公定公立趙簡子問史墨服䖍曰史墨晉史蔡墨曰季氏亡乎史墨對曰不亡季友有大功於魯受鄪為上卿至於文子武子世增其業魯文公卒東門遂服䖍曰東門遂襄仲也居東門故稱東門遂殺適立庶魯君於是失國政在季氏於今四君矣民不知君何以得國是以為君慎器與名不可以假人杜預曰器車服名爵號定公五年季平子卒陽虎私怒囚季桓子與盟乃捨之七年齊伐我取鄆以為魯陽虎邑以從政八年陽虎欲盡殺三桓適而更立其所善庶子以代之載季桓子將殺之桓子詐而得脫三桓共攻陽虎陽虎居陽關服䖍曰陽關魯邑九年魯伐陽虎陽虎奔齊已而奔晉趙氏十年定公與齊景公會於夾谷孔子行相事齊欲襲魯君孔子以禮厯階誅齊淫樂齊侯懼乃止歸魯侵地而謝過十二年使仲由毁三桓城服䖍曰仲由子路收其甲兵孟氏不肯墮城杜預曰墮毁伐之不克而止季桓子受齊女樂孔子去孔安國曰桓子使定公受齊女樂君臣相與觀之廢朝禮三日十五年定公卒子將立是為哀公哀公五年齊景公卒六年齊田乞弒其君孺子七年吳王夫差彊伐齊至繒徵百牢於魯季康子使子貢說吳王及太宰嚭以禮詘之吳王曰我文身不足責禮乃止八年吳為鄒伐魯至城下盟而去齊伐我取三邑十年伐齊南邊十一年齊伐魯季氏用冉有有功思孔子孔子自衛歸魯十四年齊田常弒其君簡公於徐州孔子請伐之哀公不聽十五年使子服景伯子貢為介適齊齊歸我侵地田常初相欲親諸侯十六年孔子卒二十二年越王句踐滅吳王夫差二十七年春季康子卒夏哀公患三桓將欲因諸侯以劫之三桓亦患公之作難故君臣多間賈逵曰間隙也公游于陵阪服䖍曰陵阪地名遇孟武伯於衢曰請問余及死乎杜預曰問已可得以夀死不對曰不知也公欲以越伐三桓八月哀公如陘氏杜預曰陘氏即有山氏三桓攻公公奔于衛去如鄒遂如越國人迎哀公復歸卒于有山氏徐廣曰皇甫謐云哀公元甲辰終庚午子寧立是為悼公悼公之時三桓勝魯如小侯卑於三桓之家十三年三晉滅智伯分其地有之三十七年悼公卒徐廣曰一本云悼公即位三十年乃於秦惠王卒楚懷王死年合又自悼公以下盡與劉歆厯譜合而反違年表未詳何故皇甫謐云悼公四十年元辛未終庚戌子嘉立是為元公元公二十一年卒徐廣曰皇甫謐云元辛亥終辛未子顯立是為穆公穆公三十三年卒徐廣曰皇甫謐云元壬申終甲辰子奮立是為共公共公二十二年卒徐廣曰皇甫謐云元乙巳終丙寅子屯立是為康公康公九年卒徐廣曰皇甫謐云元丁卯終乙亥子匽立是為景公景公二十九年卒徐廣曰皇甫謐云元丙子終甲辰子叔立是為平公是時六國皆稱王平公十二年秦惠王卒二十二年平公卒徐廣曰皇甫謐云元乙巳終甲子子賈立是為文公文公七年楚懷王死于秦二十三年文公卒徐廣曰皇甫謐云元乙丑終丁亥子讐立是為傾公傾公二年秦拔楚之郢徐廣曰年表云文公十八年秦拔郢楚走陳楚傾王東徙于陳十九年楚伐我取徐州徐廣曰徐州在魯東今薛縣二十四年楚考烈王伐滅魯傾公亡遷於卞邑徐廣曰卞一作下為家人魯絶祀傾公卒于柯徐廣曰皇甫謐云元戊子終辛亥魯起周公至傾公兄三十四世太史公曰余聞孔子稱曰甚矣魯道之衰也洙泗之間齗齗如也徐廣曰漢書地理志云魯濵洙泗之間其民涉渡幼者扶老者而代其任俗既薄長者不自安與幼者相讓故曰齗齗如也齗魚斤反東州語也蓋幼者患苦長者長者忿愧自守故齗斷爭辭所以為道衰也觀慶父及叔牙閔公之際何其亂也隱桓之事襄仲殺適立庶三家北面為臣親攻昭公昭公以奔至其楫讓之禮則從矣而行事何其戾也史記集解卷三十三
