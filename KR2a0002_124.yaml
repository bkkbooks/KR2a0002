body:
  text: 史記集解卷一百二十六宋裴駰撰史記一百二十六滑稽列傳第六十六孔子曰六藝於治一也禮以節人樂以發和書以道事詩以達意易以神化春秋以義太史公曰天道恢恢豈不大哉談言㣲中亦可以解紛淳于髠者齊之贅壻也長不滿七尺滑稽多辯數使諸侯未嘗屈辱齊威玉之時喜隱好為淫樂長夜之飲沈湎不治委政卿大夫百官荒亂諸侯竝侵國且危亡在於旦暮左右莫敢諫淳于髠説之以隱曰國中有大鳥止王之庭三年不蜚又不鳴王知此鳥何也王曰此鳥不飛則已一飛沖天不鳴則已一鳴鷩人於是乃朝諸縣令長七十二人賞一人誅一人奮兵而出諸侯振鷩皆還齊侵地威行三十六年語在田完世家中威王八年楚大發兵加齊齊王使淳于髠之趙請救兵齎金百斤車馬十駟淳于髠仰天大笑冠纓索絶王曰先生少之乎髠曰何敢王曰笑豈有説乎髠曰今者臣從東方來見道傍有禳田者操一豚蹄酒一盂祝曰甌窶滿篝徐廣曰篝籠也汙邪滿車司馬彪曰汙邪下地田也五穀蕃熟穰穰滿家臣見其所持者狹而所欲者奢故笑之於是齊威王乃益齎黄金千溢白璧十雙車馬百駟髠辭而行至趙趙王與之精兵十萬革車千乗楚聞之夜引兵而去威王大説置酒後宮召髠賜之酒問曰先生能飲幾何而醉髠對曰臣飲一斗亦醉一石亦醉威王曰先生飲一斗而醉惡能飲一石哉其説可得聞乎髠曰賜酒大王之前執法在傍御史在後髠恐懼俯伏而飲不過一斗徑醉矣若親有嚴客髠帣韝鞠􅎽徐廣曰帣収衣裒也裒衿也鞲臂捍也音溝鞠曲也􅎽音其紀反又與跽同謂小跪也侍酒於前時賜餘瀝奉觴上夀數起飲不過二斗徑醉矣若朋友交游久不相見卒然相覯歡然道故私情相語飲可五六斗徑醉矣若乃州閭之㑹男女雜坐行酒稽留六博投壺相引為曹握手無罰目眙不禁徐廣曰眙吐甑反直視貌前有墯珥後有遺簪髠竊樂此飲可八斗而醉二參日暮酒䦨合尊促坐男女同席履舄交錯杯盤狼籍堂上燭滅主人留髠而送客徐廣曰一本云留髠坐起送客羅襦襟解㣲聞薌澤當此之時髠心最歡能飲一石故曰酒極則亂樂極則悲萬事盡然言不可極極之而衰以諷詠焉齊王曰善乃罷長夜之飲以髠為諸侯主客宗室置酒髠常在側其後百餘年楚有優孟優孟者故楚之樂人也長八尺多辯常以談笑諷諫楚莊王之時有所愛馬衣以文繡置之華屋之下席以露牀啗以棗脯馬病肥死使羣臣喪之欲以棺槨大夫禮葬之左右爭之以為不可王下令曰有敢以馬諌者罪至死優孟聞之入殿門仰天大哭王驚而問其故優孟曰馬者王之所愛也以楚國堂堂之大何求不得而以大夫禮葬之薄請以人君禮葬之王曰何如對曰臣請以彫玉為棺文梓為椁楩楓豫章為題湊蘇林曰以木累棺外木頭皆内向故曰題湊發甲卒為穿壙老弱負土齊趙陪位於前韓魏翼衛其後楚莊王時未有韓趙魏三國廟食太牢奉以萬户之邑諸侯聞之皆知大王賤人而貴馬也王曰寡人之過一至此乎為之奈何優孟曰請為大王六畜葬之以壠竈為槨銅歴為棺齎以薑棗薦以木蘭祭以粳稻衣以火光葬之於人腹賜於是王乃使以馬屬太官無令天下久聞也楚相孫叔敖知其賢人也善待之病且死屬其子曰我死汝必貧困若往見優孟言我孫叔敖之子也居數年其子窮困負薪逢優孟與言曰我孫叔敖子也父且死時屬我貧困往見優孟優孟曰若無逺冇所之即為孫叔敖衣冠抵掌談語戰國䇿曰蘇秦説趙王華屋之下扺掌而言張載曰談説之容貯也嵗餘像孫叔敖楚王及左右不能别也莊王置酒優孟前為夀莊王大驚以為孫叔敖復生也欲以為相優孟曰請歸與婦計之三日而為相莊王許之三日後優孟復來王曰婦言謂何孟曰婦言愼無為楚相不足為也如孫叔敖之為楚相盡忠為廉以治楚楚王得以霸今死其子無立錐之地貧困負薪以自飲食必如孫叔敖不如自殺因歌曰山居耕田苦難以得食起而為吏身貪鄙者餘財不顧恥辱身死家室富又恐受賕枉法為姦觸大罪身死而家滅貪吏安可為也念為廉吏奉法守職竟死不敢為非廉吏安可為也楚相孫叔敖持廉至死方今妻子窮困負薪而食不足為也於是莊王謝優孟乃召孫叔敖子封之寢丘徐廣曰在固始四百户以奉其祀後十世不絶此知可以言時矣其後二百餘年秦有優旃優旃者秦倡朱儒也善為笑言然合於大道秦始皇時置酒而天雨陛楯者皆沾寒優旃見而哀之謂之曰汝欲休乎陛楯者皆曰幸甚優旃曰我即呼汝汝疾應曰諾居有頃殿上上夀呼萬嵗優旃臨檻大呼曰陛楯郎郎曰諾優旃曰汝雖長何益幸雨立我雖短也幸休居於是始皇使陛楯者得半相代始皇嘗議欲大苑囿東至函谷闗西至雍陳倉優旃曰善多縱禽獸於其中寇從東方來令麋鹿觸之足矣始皇以故輟止二世立又欲漆其城優旃曰善王上雖無言臣固將請之漆城雖於百姓愁費然佳哉漆城蕩蕩寇來不能上即欲就之易為漆耳顧難為蔭室於是二世笑之以其故止居無何二世殺死優旃歸漢數年而卒太史公曰淳于髠仰天大笑齊威王横行優孟揺頭而歌負薪者以封優旃臨檻疾呼陛楯得以半更豈不亦偉哉褚先生曰臣幸得以經術為郎而好讀外家傳語竊不遜讓復作故事滑稽之語六章編之於左可以覽觀揚意以示後世好事者讀之以游心駭耳以附益上方太史公之三章武帝時有所幸倡郭舍人者發言陳辭雖不合大道然令人主和説武帝少時東武侯母常養帝帝壯時號之曰大乳母率一月再朝朝奏入有詔使幸臣馬游卿以帛五十匹賜乳母又奉飲糒飱養乳母乳母上書曰某所有公田願得假倩之帝曰乳母欲得之乎以賜乳母乳母所言未嘗不聽有詔得令乳母乗車行馳道中當此之時公卿大臣皆敬重乳母乳母家子孫奴從者横暴長安中當道掣頓人車馬奪人衣服聞於中不忍致之法有司請徙乳母家室處之於邊奏可乳母當入至前面見辭乳母先見郭舎人為下泣舍人曰即入見辭去疾步數還顧乳母如其言謝去疾步數還顧郭舍人疾言罵之曰咄老女子何不疾行陛下已壯矣寧尚須汝乳而活耶尚何還顧於是人主憐焉悲之乃下詔止無徙乳母罰謫譖之者武帝時齊人有東方生名朔以好古傳書愛經術多所博觀外家之語朔初入長安至公車上書凡用三千奏牘公車令兩人共持舉其書僅然能勝之人主從上方讀之止輒乙其處讀之二月乃盡詔拜以為郎常在側侍中數召至前談語人主未嘗不説也時詔賜之食於前飲已盡懷其餘肉持去衣盡汚數賜縑帛檐掲而去徒用所賜錢帛取少婦於長安中好女率取婦一嵗所者即棄去更取婦所賜錢財盡索之於女子人主左右諸郎半呼之狂人人主聞之曰令朔在事無為是行者若等安能及之哉朔任其子為郎又為侍謁者常持節出使朔行殿中郎謂之曰人皆以先生為狂朔曰如朔等所謂避世於朝廷間者也古之人乃避世於深山中時坐席中酒酣據其地歌曰陸沈於俗避世金馬門宫殿中可以避世全身何必深山之中蒿廬之下金馬門者宫署門也門傍有銅馬故謂之曰金馬門時㑹聚宫下博士諸先生與論議共難之曰蘇秦張儀一當萬乗之主而都卿相之位澤及後世今子大夫修先王之術慕聖人之義諷誦詩書百家之言不可勝數著於竹帛自以為海内無雙即可謂博聞辯智矣然悉力盡忠以事聖帝曠日持久積數十年官不過侍郎位不過執㦸意者尚有遺行邪其故何也東方生曰是固非子之所能備也彼一時也此一時也豈可同哉夫張儀蘇秦之時周室大壞諸侯不朝力政爭權相禽以兵并為十二國未有雌雄得士者强失士者亡故説聴行通身處尊位澤及後世子孫長榮今非然也聖帝在上徳流天下諸侯賓服威振四夷連四海之外以為席安於覆盂天下均平合為一家動發舉事猶如運之掌中賢與不肖何以異哉方今以天下之大士民之衆竭精馳説竝進輻湊者不可勝數悉力慕義困於衣食或失門户使張儀蘇秦與僕竝生於今之世曽不能得掌故安敢望常侍侍郎乎傳曰天下無害葘雖有聖人無所施其才上下和同雖有賢者無所立功故曰時異則事異雖然安可以不務修身乎詩曰鼓鍾于宫聲聞于外鶴鳴九皋聲聞于天茍能修身何患不榮太公躬行仁義七十二年逢文王得行其説封於齊七百嵗而不絶此士之所以日夜孜孜修學行道不敢止也今世之處士時雖不用崛然獨立塊然獨處上觀許由下察接輿策同范蠡忠合子胥天下和平與義相扶寡偶少徒固其常也子何疑於余哉於是諸先生黙然無以應也建章宫後閤重櫟中有物出焉其狀似麋以聞武帝往臨視之問左右羣臣習事通經術者莫能知詔東方朔視之朔曰臣知之願賜美酒粱飯大飱臣臣乃言詔曰可已飱又曰某所有公田魚池蒲葦數頃陛下以賜臣臣朔乃言詔曰可於是朔乃肯言曰所謂騶牙者也逺方當來歸義而騶牙先見其齒前後若一齊等無牙故謂之騶牙其後一嵗所匈奴混邪王果將十萬衆來降漢乃復賜東方生錢財甚多至老朔且死時諫曰詩云營營青蠅止于蕃愷悌君子無信讒言讒言罔極交亂四國願陛下逺巧佞退讒言帝曰今顧東方朔多善言怪之居無幾何朔果病死傳曰鳥之將死其鳴也哀人之將死其言也善此之謂也武帝時大將軍衛青者衛后兄也徐廣曰衛青傳曰子夫之弟也封為長平侯從軍擊匈奴至余吾水上而還斬首捕虜有功來歸詔賜金千斤將軍出宫門齊人東郭先生以方士待詔公車當道遮衞將軍車拜謁曰願白事徐廣曰衞青傳云甯乗説青而拜為東海都尉將軍止車前東郭先生旁車言曰王夫人新得幸於上家貧今將軍得金千斤誠以其半賜王夫人之親人主聞之必喜此所謂竒策便計也衛將軍謝之曰先生幸告之以便計請奉教於是衛將軍乃以五百金為王夫人之親夀王夫人以聞武帝帝曰大將軍不知為此問之安所受計策對曰受之待詔者東郭先生詔召東郭先生拜以為郡都尉東郭先生久待詔公車貧困飢寒衣敝履不完行雪中履有上無下足盡踐地道中人笑之東郭先生應之曰誰能履行雪中令人視之其上履也其履下處乃似人足者乎及其拜為二千石佩青緺徐廣曰音𤓰一音螺青綬出宫門行謝主人故所以同官待詔者等比祖道於都門外榮華道路立名當世徐廣曰東郭先生也此所謂衣褐懷寶者也當其貧困時人莫省視至其貴也乃爭附之諺曰相馬失之痩相士失之貧其此之謂邪王夫人病甚人主至自往問之曰子當為王欲安所置之對曰願居洛陽人主曰不可洛陽有武庫敖倉當闗口天下咽喉自先帝以來傳不為置王然闗東國莫大於齊可以為齊王王夫人以手擊頭呼幸甚王夫人死號曰齊王太后薨昔者齊王使淳于髠獻鵠於楚出邑門道飛其鵠徒掲空籠造詐成辭往見楚王曰齊王使臣來獻鵠過于水上不忍鵠之渇出而飲之去我飛亡吾欲刺腹絞頸而死恐人之議吾王以鳥獸之故令士自傷殺也鵠毛物多相類者吾欲買而代之是不信而欺吾王也欲赴他國奔亡痛吾兩主使不通故來服過叩頭受罪大王楚王曰善齊王有信士若此哉厚賜之財倍鵠在也武帝時徵北海太守詣行在所有文學卒史王先生者自請與太守俱吾有益於君君許之諸府掾功曹白云王先生嗜酒多言少實恐不可與俱太守曰先生意欲行不可逆遂與俱行至宫下待詔宫府門王先生徒懷錢沽酒與衛卒僕射飲日醉不視其太守太守入跪拜王先生謂戸郎曰幸為我呼吾君至門内遙語户郎為呼太守太守來望見王先生先生曰天子即問君何以治北海令無盜賊君對曰何哉對曰選擇賢材各任之以其能賞異等罰不肖王先生曰對如是是自譽自伐功不可也願君對言非臣之力盡陛下神靈威武所變化也太守曰諾召入至于殿下有詔問之曰何以治北海令盜賊不起叩頭對言非臣之力盡陛下神靈威武之所變化也武帝大笑曰於呼安得長者之語而稱之安所受之對曰受之文學卒史帝曰今安在對曰在宫府門外有詔召拜王先生為水衡丞以北海太守為水衡都尉傳曰美言可以市尊行可以加人君子相送以言小人相送以財魏文侯時西門豹為鄴令豹往到鄴㑹長老問之民所疾苦長老曰苦為河伯娶婦以故貧豹問其故對曰鄴三老廷掾常嵗賦斂百姓收取其錢得數百萬用其二三十萬為河伯娶婦與祝巫共分其餘錢持歸當其時巫行視小家女好者云是當為河伯婦即聘取洗沐之為治新繒綺縠衣間居齊戒為治齋宫河上張緹絳帷女居其中為具牛酒飯食行十餘日共粉飾之如嫁女床席令女居其上浮之河中始浮行數十里乃沒其人家有好女者恐大巫祝為河伯取之以故多持女逺逃亡以故城中益空無人又困貧所從來久逺矣民人俗語曰即不為河伯娶婦水來漂沒溺其人民云西門豹曰至為河伯娶婦時願三老巫祝父老送女河上幸來告語之吾亦往送女皆曰諾至其時西門豹往㑹之河上三老官屬豪長者異父老皆㑹以人民往觀之者三二千人其巫老女子也已年七十從弟子女十人所皆衣繪單衣立大巫後西門豹曰呼河伯婦來視其好醜即將女出帷中來至前豹視之顧謂三老巫祝父老曰是女子不好煩大巫嫗為入報河伯得更求好女後日送之即使吏卒共抱大巫嫗投之河中有頃曰巫嫗何久也弟子趣之復以弟子一人投河中有頃曰弟子何久也復使一人趣之復投一弟子河中凡投三弟子西門豹曰巫嫗弟子是女子也不能白事煩三老為入白之復投三老河中西門豹簪筆罄折嚮河立待良久長老吏傍觀者皆驚恐西門豹顧曰巫嫗三老不來還奈之何欲復使廷掾與豪長者一人入趣之皆叩頭叩頭且破額血流地色如死灰西門豹曰諾且留待之須臾須臾豹曰廷掾起矣狀河伯留客之久若皆罷去歸矣鄴吏民大驚恐從是以後不敢復言為河伯娶婦西門豹即發民鑿十二渠引河水灌民田田皆溉當其時民治渠少煩苦不欲也豹曰民可以樂成不可與慮始今父老子弟雖患苦我然百嵗後期令父老子孫思我言至今皆得水利民人以給足富十二渠經絶馳道到漢之立而長吏以為十二渠橋絶馳道相比近不可欲合渠水且至馳道合三渠為一橋鄴民人父老不肯聽長吏以為西門君所為也賢君之法式不可更也長吏終聴置之故西門豹為鄴令名聞天下澤流後世無絶已時幾可謂非賢大夫哉傳曰子産治鄭民不能欺子賤治單父民不忍欺西門豹治鄴民不敢欺三子之才能誰最賢哉辯治者當能别之魏文帝問羣臣三不欺於君徳孰優太尉鍾絲司徒華歆司空王朗對曰臣以為君任徳則臣感義而不忍欺君任察則臣畏覺而不能欺君任刑則臣畏罪而不敢欺任徳感義與夫導徳齊禮有恥且格等超者也任察畏罪與夫導政齊刑免而無恥同歸者也孔子曰為政以徳譬如北辰居其所而衆星共之考以斯言論以斯義臣等以為不忍欺不能欺優劣之縣在於權衡非徒抵卬之差乃鈞銖之覺也且前志稱仁者安仁智者利仁畏罪者强仁挍其仁者功則無以殊核其為仁者則不得不異安仁者性善者也利仁者力行者也强仁者不得已者也三仁相比則安仁優矣易稱神而化之使民宜之若君化使民然也然則安仁之化與夫强仁之化優劣亦不得不相縣絶也然則三臣之不欺雖同所以不欺異矣則純以恩義崇不欺與以威察成不欺既不可同概而比量又不得錯綜而易處史記集解卷一百二十六
