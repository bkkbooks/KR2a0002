body:
  text: 史記集解卷三宋裴駰撰史記三殷本紀第三殷契母曰簡狄有娀氏之女淮南子曰有娀在不周之北為帝嚳次妃三人行浴見玄鳥墯其卵簡狄取吞之因孕生契契長而佐禹治水有功帝舜乃命契曰百姓不親五品不訓汝為司徒而敬敷五教五教在寬封於商鄭玄曰商國在太華之陽皇甫謐曰今上洛商是也賜姓子氏禮緯曰祖以玄鳥生子也契興於唐虞大禹之際功業著於百姓百姓以平契卒子昭明立昭明卒子相土立宋忠曰相土就契於封商春秋左氏傳曰閼伯居商丘相土因之相土卒子昌若立昌若卒子曹圉立曹圉卒子冥立宋忠曰冥為司空勤其官事死於水中殷人郊之冥卒子振立振卒子微立微卒子報丁立報丁卒子報乙立報乙卒子報丙立報丙卒子主壬立主壬卒子主癸立主癸卒子天乙立是為成湯成湯張晏曰禹湯皆字也二王去唐虞之文從髙陽之質故夏殷之王皆以名為號諡法曰除虐去殘曰湯自契至湯八遷孔安國曰十四世凡八徙國都湯始居亳皇甫謐曰梁國穀熟為南亳即湯都也從先王居孔安國契父帝嚳都亳湯自商丘遷焉故曰從先王居作帝誥湯征諸侯孔安國曰為夏方伯得專征伐葛伯不祀湯始伐之孟子曰湯居亳與葛伯為鄰地理志曰葛今梁國寧陵之葛鄉湯曰豫有言人視水見形視民知治不伊尹曰明哉言能聽道乃進君國子民為善者皆在王官勉哉勉哉湯曰女不能敬命豫大罰殛之無有攸赦作湯征伊尹名阿衡阿衡欲干湯而無由乃為有莘氏媵臣列女傳曰湯妃有莘氏之女負鼎俎以滋味説湯致於王道或曰伊尹處士湯使人聘迎之五反然後肯往從湯言素王及九主之事劉向别録曰九主者有法君專君授君勞君等君寄君破君國君三歲社君凡九品圖畫其形湯舉任以國政伊尹去湯適夏既醜有夏復歸于亳入自北門遇女鳩女房作女鳩女房孔安國曰鳩房二人湯之賢臣也二篇皆所以醜夏而還之意也湯出見野張網四面祝曰自天下四方皆入吾網湯曰嘻盡之矣乃去其三面祝曰欲左左欲右右不用命乃入吾網諸侯聞之曰湯德至矣及禽獸當是時夏桀為虐政淫荒而諸侯昆吾氏為亂湯乃興師率諸侯伊尹從湯湯自把鉞以伐昆吾遂伐桀湯曰格汝衆庶來女悉聽朕言匪台小子馬融曰台我也敢行舉亂有夏多罪豫維聞女衆言夏氏有罪豫畏上帝不敢不正孔安國曰不敢不正桀之罪而誅之今夏多罪天命殛之今女有衆女曰我君不恤我衆舍我嗇事而割政孔安國曰奪民農功而為割剝之政女其曰有罪其奈何夏王率止衆力率奪夏國孔安國曰桀之君臣相率遏止衆力使不得事農相率割剝夏之邑居有衆率怠不和馬融曰衆民相率怠墯不和同曰是日何時喪豫與女皆亡尚書大傳曰桀云天之有日猶吾之有民日有亡哉日亡吾亦亡矣夏德若兹今朕必往爾尚及豫一人致天之罰豫其大理女尚書理字作賚鄭玄曰賚賜也女毋不信朕不食言女不從誓言豫則帑僇女無有攸赦以告令師作湯誓於是湯曰吾甚武號曰武王詩云武王載斾有虔秉鉞毛傳曰武王湯也桀敗於有娀之墟桀奔於鳴條夏師敗績湯遂伐三㚇俘厥寶玉孔安國曰三㚇國名桀走保之今定陶也俘取也義伯仲伯作典寶孔安國曰二臣作典寶一篇言國之常寶也湯既勝夏欲遷其社不可孔安國曰欲變置社稷而後世無及句龍者故不可而止作夏社孔安國曰言夏社不可遷之義伊尹報徐廣曰一云伊尹報政於是諸侯心服湯乃踐天子位平定海內湯歸至于泰卷陶徐廣曰一無此陶字孔安國曰地名湯自三㚇而還中􅣂作誥孔安國曰仲虺湯左相奚仲之後既絀夏命孔安國曰絀其王命還亳作湯誥維三月王自至於東郊告諸侯羣后毋不有功於民勤力乃事豫乃大罰殛女毋豫怨曰古禹皋陶久勞於外其有功乎民民乃有安東為江北為濟西為河南為淮四瀆已修萬民乃有居后稷降播農殖百穀三公咸有功于民故后有立徐廣曰一作土昔蚩尤與其大夫作亂百姓帝乃弗豫音與有狀先王言不可不勉曰不道毋之徐廣曰一作政在國女毋我怨以令諸侯伊尹作咸有一德王肅曰言君臣皆有一德咎單作明居馬融曰咎單湯司空也明居民之法也湯乃改正朔易服色上白朝會以晝湯崩皇覽曰湯冢在濟隂亳縣北東郭去縣三里冢四方方各十步髙七尺上平處平地漢哀帝建平元年大司空御史長卿案行水災因行湯冢劉向曰殷湯無葬處皇甫謐曰即位十七年而踐天子位為天子十三年年百歲而崩太子太丁未立而卒於是乃立太丁之弟外丙是為帝外丙帝外丙即位三年崩立外丙之弟中壬是為帝中壬帝中壬即位四年崩伊尹乃立太丁之子太甲太甲成湯適長孫也是為帝太甲帝太甲元年伊尹作伊訓作肆命作徂后鄭玄曰肆命者陳政教所當為也徂后者言湯之法度也帝太甲既立三年不明暴虐不遵湯法亂德於是伊尹放之於桐宫孔安國曰湯葬地鄭玄曰地名也有王離宫焉三年伊尹攝行政當國以朝諸侯帝太甲居桐宫三年悔過自責反善於是伊尹乃迎帝太甲而授之政帝太甲修德諸侯咸歸殷百姓以寧伊尹嘉之乃作太甲訓三篇褒帝太甲稱太宗太宗崩子沃丁立帝沃丁之時伊尹卒既葬伊尹於亳皇覽曰伊尹冢在濟陰己氏平利鄉亳近己氏咎單遂訓伊尹事作沃丁沃丁崩弟太庚立是為帝太庚帝太庚崩子帝小甲立徐廣曰世表云帝小甲太庚弟也帝小甲崩弟雍已立是為帝雍已殷道衰諸侯或不至帝雍已崩弟太戊立是為帝太戊帝太戊立伊陟為相孔安國曰伊陟伊尹之子亳有祥桑穀共生于朝一暮大拱孔安國曰祥妖怪也二木合生不恭之罰鄭玄曰兩手扼之曰拱帝太戊懼問伊陟伊陟曰臣聞妖不勝德帝之政其有闕與帝其修德太戊從之而祥桑枯死而去伊陟贊言于巫咸孔安國曰贊告也巫咸臣名也巫咸治王家有成作咸艾馬融曰艾治也作太戊帝太戊贊伊陟于廟言弗臣伊陟讓作原命馬融曰原臣名也命原以禹湯之道我所修也殷復興諸侯歸之故稱中宗中宗崩子帝仲丁立帝仲丁遷于隞孔安國曰地名皇甫謐曰或云河南敖倉是河亶甲居相孔安國曰地名在河北祖乙遷于邢帝仲丁崩弟外壬立是為帝外壬中丁書闕不具帝外壬崩弟河亶甲立是為帝河亶甲河亶甲時殷復衰河亶甲崩子帝祖乙立帝祖乙立殷復興巫賢任職祖乙崩子帝祖辛立帝祖辛崩弟沃甲立是為帝沃甲帝沃甲崩立沃甲兄祖辛之子祖丁是為帝祖丁帝祖丁崩立弟沃甲之子南庚是為帝南庚帝南庚崩立帝祖丁之子陽甲是為帝陽甲帝陽甲之時殷衰自中丁以來廢適而更立諸弟子弟子或爭相代立比九世亂次是諸侯莫朝帝陽甲崩弟盤庚立是為帝盤庚帝盤庚之時殷已都河北盤庚渡河南復居成湯之故居乃五遷無定處孔安國曰自湯至盤庚凡五遷都殷民咨胥相怨不欲徙孔安國曰胥相也民不欲徙皆咨嗟憂愁相與怨其上也盤庚乃告諭諸侯大臣曰昔髙后成湯與爾之先祖俱定天下法則可修舍而弗勉何以成德乃遂涉河南治亳鄭玄曰治於亳之殷地商家自此徙而改號曰殷亳皇甫謐曰今偃師是也行湯之政然後百姓由寧殷道復興諸侯來朝以其遵成湯之德也帝盤庚崩弟小辛立是為帝小辛帝小辛立殷復衰百姓思盤庚乃作盤庚三篇帝小辛崩弟小乙立是為為帝小乙帝小乙崩子帝武丁立帝武丁即位思復興殷而未得其佐三年不言政事決定於冢宰鄭玄曰冢宰天官卿二王事者以觀國風武丁夜夢得聖人名曰説以夢所見視羣臣百吏皆非也於是乃使百工營求之野得説於傅險中徐廣曰尸子云傅巖在北海之州是時説為胥靡築於傅險孔安國曰傅氏之岩在虞虢之界通道所經有澗水壞道常使胥靡刑人築護此道説賢而隱代胥靡築之以供食也見於武丁武丁曰是也得而與之語果聖人舉以為相殷國大治故遂以傅險姓之號曰傅説帝武丁祭成湯明日有飛雉登鼎耳而詬武丁懼祖已曰孔安國曰賢臣名王勿憂先修政事祖已乃訓王曰唯天監下典厥義孔安國曰言天視下民以義為常也降年有永有不永非天夭民中絶其命民有不若德不聽罪天既附命正厥德孔安國曰不順德言無義也不服罪不改修也天以信命正其德謂其有永有不永乃曰其奈何鳴呼王嗣敬民罔非天繼常祀毋禮于棄道孔安國曰王者主民當敬民事無非天時天時所常祀也祭祀有常不當特豐於近也武丁修政行德天下咸歡殷道復興帝武丁崩子帝祖庚立祖已嘉武丁之以祥雉為德立其廟為髙宗遂作髙宗彤日及訓孔安國曰祭之明日又祭殷曰肜周曰繹帝祖庚崩弟祖甲立是為帝甲帝甲淫亂殷復衰帝甲崩子帝廪辛立帝廩辛崩弟庚丁立是為帝庚丁帝庚丁崩子帝武乙立殷復去亳徙河北帝武乙無道為偶人謂之天神與之博令人為行天神不勝乃僇辱之為革囊盛血仰而射之命曰射天武乙獵於河渭之濵暴雷武乙震死子帝太丁立帝太丁崩子帝乙立帝乙立殷益衰帝乙長子曰微子啓啓母賤不得嗣少子辛辛母正后辛為嗣帝乙崩子辛立是為帝辛天下謂之紂諡法曰殘義損善曰紂帝紂資辨捷疾聞見甚敏材力過人手格猛獸知足以距諫言足以飾非矜人臣以能髙天下以聲以為皆出己之下好酒淫樂嬖於婦人愛妲己皇甫謐曰有蘇氏美女妲己之言是從於是使師涓作新淫聲北里之舞靡靡之樂厚賦稅以實鹿臺之錢如淳曰新序曰鹿臺其大三里髙千尺瓚曰鹿臺名今朝歌城中而盈巨橋之粟服虔曰巨橋倉名許慎曰巨鹿水之大橋也有漕粟也益收狗馬竒物充仞宫室益廣沙丘苑臺爾雅曰迆邐沙丘也地理志曰在巨鹿東北七十里多取野獸蜚鳥置其中慢於鬼神大最樂戲於沙丘徐廣曰最一作聚以酒為池縣肉為林使男女倮相逐其間為長夜之飲百姓怨望而諸侯有畔者於是紂乃重刑辟有炮烙之法列女傳曰膏銅柱下加之炭令有罪者行焉輒墮炭中妲己笑名曰炮烙之刑以西伯昌九侯徐廣曰一作鬼侯鄴縣有九侯城鄂侯徐廣曰一作𨝍音干野王縣有𨝍城為三公九侯有好女入之紂九侯女不喜淫徐廣曰一云無不喜淫紂怒殺之而醢九侯鄂侯爭之強辨之疾并脯鄂侯西伯昌聞之竊嘆崇侯虎知之以告紂紂囚西伯羑里地理志曰河內湯陰有羑里城西伯所拘處韋昭曰音酉西伯之臣閎夭之徒求美女竒物善馬獻紂紂乃赦西伯西伯出而獻洛西之地以請除炮烙之刑紂乃許之賜弓矢斧鉞使得征伐為西伯而用費中為政費中善諛好利殷人弗親紂又用惡來惡來善毁讒諸侯以此益疏西伯歸乃隂修德行善諸侯多畔紂而往歸西伯滋大紂由是稍失權重王子比干諫弗聽商容賢者百姓愛之紂廢之及西伯伐飢國滅之徐廣曰飢一作􅀈又作耆紂之臣祖伊孔安國曰祖已後賢臣也聞之而咎周孔安國曰咎惡也恐奔告紂曰天既訖我殷命假人元龜徐廣曰元一作卜無敢知吉馬融曰元龜大龜也長尺二寸孔安國曰至人以人事觀殷大龜以神靈考之皆無知吉者非先王不相我後人孔安國曰相助也維王淫虐用自絶故天棄我不有安食不虞知天性不迪率典鄭玄曰王暴虐於民使不得安食逆亂隂陽不度天性傲很明德不修教法者今我民罔不欲喪曰天曷不降威大命胡不至今王其奈何紂曰我生不有命在天乎祖伊反曰紂不可諫矣西伯既卒周武王之東伐至盟津諸侯叛殷會周者八百諸侯皆曰紂可伐矣武王曰爾未知天命乃復歸紂愈淫亂不止微子數諫不聽乃與太師少師謀遂去比干曰為人臣者不得不以死爭乃強諫紂紂怒曰吾聞聖人心有七竅剖比干觀其心箕子懼乃詳狂為奴紂又囚之殷之太師少師乃持其祭樂器奔周周武王於是遂率諸侯伐紂紂亦發兵距之牧野鄭玄曰牧野紂南郊地名也甲子日紂兵敗紂走入登鹿臺徐廣曰鹿一作廩衣其寶玉衣赴火而死周武王遂斬紂頭縣之白旗殺妲己釋箕子之囚封比干之墓表商容之閭封紂子武庚祿父以續殷祀譙周曰殷凡三十一世六百餘年汲冢紀年曰湯滅夏以至于受二十九王用歲四百九十六年也令修行盤庚之政殷民大説於是周武王為天子其後世貶帝號號為王而封殷後為諸侯屬周周武王崩武庚與管叔蔡叔作亂成王命周公誅之而立微子於宋以續殷後焉太史公曰余以頌次契之事自成湯以來采於詩書契為子姓其後分封以國為姓有殷氏來氏宋氏空桐氏稚氏北殷氏目夷氏孔子曰殷路車為善而色尚白史記集解卷三
