body:
  text: 史記集解卷二十宋裴駰撰史記二十建元以來侯者年表第八太史公曰胸奴絶和親攻當路塞閩越擅伐東甌請降二夷交侵當盛漢之隆以此知功臣受封侔於祖考矣何者自詩書稱三代戎狄是應荆荼是徵毛詩傳曰應當也鄭𤣥曰徵艾齊桓越燕伐山戎武靈王以區區趙服單于秦繆用百里霸西戎吳楚之君以諸侯役百越況乃以中國一統明天子在上兼文武席卷四海內輯億萬之衆豈以晏然不為邊境征伐哉自是後遂出師北討强胡南誅徑越將卒以次封矣右太史公本表當塗魏不害以圉守尉捕淮陽反者公孫勇等侯蒲蘇昌以圉尉史捕淮陽反者公孫勇等侯潦陽江德以圉廄嗇夫共捕淮陽反者公孫勇等侯富民田千秋家在長陵以故髙廟寢郎上書諫孝武曰子弄父兵罪當笞父子之怒自古有之蚩尤畔父黃帝涉江上書至意拜為大鴻臚征和四年為丞相封三千户至昭帝時病死子順代立為虎牙將軍擊胸奴不至質誅死國除漢書音義曰質所期處也右孝武封國名後進好事儒者褚先生曰太史公記事盡於孝武之事故復修記孝昭以來功臣侯者編于左方令後好事者得覽觀成敗長短絶世之適得以自戒焉當世之君子行權合變度時施宜希世用事以建功有土封侯立名當世豈不盛哉觀其持滿守成之道皆不謙讓驕蹇爭權喜揚聲譽知進不知退終以殺身滅國以三得之以三得之者即上所謂行權合變度時施宜希世用事也及身失之不能傳功於後世令恩德流子孫豈不悲哉夫龍額侯曽為前將軍世俗順善厚重謹信不與政事退讓愛人其先起于晉六卿之世有土君國以來為王侯子孫相承不絶厯年經世以至于今凡八百餘嵗豈可與功臣及身失之者同日而語之哉悲夫後世其誡之博陸霍光家在平陽以兄驃騎將軍故貴前事武帝覺捕得侍中謀反者馬何羅等功侯三千户文潁曰博廣陸平取其嘉名無此縣也食邑北海河東瓚曰漁陽有博陸城也中輔幼主昭帝為大將軍謹信用事擅治尊為大司馬益封邑萬户後事宣帝厯事三主天下信鄉之益封二萬户子禹代立謀反族滅國除秺漢書音義曰音妒在濟陰成武今有亭矣金翁叔名日磾以胸奴休屠王太子從渾邪王將衆五萬降漢歸義侍中事武帝覺捕侍中謀反者馬何羅等功侯三千戶中事昭帝謹厚益封三千户子𢎞代立為奉車騎都尉事宣帝安陽上官桀家在隴西以善騎射從軍稍貴事武帝為左將軍覺捕斬侍中謀反者馬何羅弟重合侯通功侯三千户中事昭帝與大將軍霍光爭權因以謀反族滅國除桑樂上官安以父桀為將軍故貴侍中事昭帝安女為昭帝夫人立為皇后故侯三千户驕蹇與大將軍霍光爭權因以父子謀反族滅國除富平張安世家在杜陵以故御史大夫張湯子武帝時給事尚書為尚書令事昭帝謹厚習事為光祿勳右將軍輔政十三年無適過侯三千户及事宣帝代霍光為大司馬用事益封萬六千户子延壽代立為太僕侍中義陽傅介子家在北地以從軍為郎為平樂監昭帝時刺殺外國王天子下詔書曰平樂監傅介子使外國殺樓蘭王以直報怨不煩師有功其以邑千三百户封介子為義陽侯子厲代立爭財相告有罪國除商利王山齊人也故為丞相使㑹騎將軍上官安謀反山說安與俱入丞相斬安山以軍功為侯三千戶上書願治民為代太守為人所上書言繫獄當死㑹赦出為庶人國除建平杜延年以故御史大夫杜周子給事大將軍幕府發覺謀反者騎將軍上官安等罪封為侯邑二千七百户拜為太僕元年出為西河太守五鳳三年入為御史大夫弋陽任宫以故上林尉捕格謀反者左將軍上官桀殺之便門封為侯二千户後為太常及行衛尉事節儉謹信以壽終傳於子孫宜城燕蒼以故大將軍幕府軍吏發謀反者騎將軍上官安罪有功封侯邑二千戶為汝南太守有能名宜春王欣家在齊本小吏佐史稍遷至右輔都尉武帝數幸扶風郡欣共置辦拜為右扶風至孝昭時代桑𢎞羊為御史大夫元鳳三年代田千秋為丞相封二千户立二年為人所上書言暴自殺不殊子代立為屬國都尉安平楊敞家在華陰故給事大將軍幕府稍遷至大司農為御史大夫元鳳六年代王欣為丞相封二千户立二年病死子賁代立十三年病死子翁君代立為典屬國三嵗以季父惲故出惡言繫獄當死得免為庶人國除右孝昭時所封國名陽平蔡義家在溫故師受韓詩為博士給事大將軍幕府為杜城門候入侍中授昭帝韓詩為御史大夫是時年八十衰老常兩人扶持乃能行然公卿大臣議以為為人主師當以為相以元平元年代楊敞為丞相封二千户病死絶無後國除扶陽韋賢家在魯通詩禮尚書為博士授魯大儒入侍中為昭帝師遷為光祿大夫大鴻臚長信少府以為人主師本始三年代蔡義為丞相封扶陽侯千八百户為丞相五嵗多恩不習吏事免相就第病死子𤣥成代立為太常坐祠廟騎奪爵為關內侯平陵范明友家在隴西以家世習外國事使護西羌事昭帝拜為度遼將軍擊烏桓功侯二千户取霍光女為妻地節四年與諸霍子禹等謀反族滅國除營平趙充國以隴西騎士從軍得官侍中事武帝數將兵擊胸奴有功為護軍都尉中事昭帝昭帝崩議立宣帝決疑定策以安宗廟功侯封二千五百户陽成田延年以軍吏事昭帝發覺上官桀謀反事後留遲不得封為大司農本造廢昌邑王議立宣帝決疑定策以安宗廟功侯二千七百户逢昭帝崩方上事並急因以盜都內錢三千萬漢書百官表曰司農屬官有都內發覺自殺國除平丘王遷家在衛為尚書郎習刀筆之文侍中事昭帝帝崩立宣帝決疑定策以安宗廟功侯二千户為光祿大夫秩中二千石坐受諸侯王金錢財漏泄中事誅死國除樂成霍山山者大將軍光兄子也光未死時上書曰臣兄驃騎將軍去病從軍有功病死賜諡景桓侯絶蕪後臣光願以所封東武陽邑三千五百户分與山天子許之拜山為侯後坐謀反族滅國除冠軍霍雲以大將軍兄驃騎將軍適孫為侯地節三年天子下詔書曰驃騎將軍去病擊胸奴有功封為冠軍侯薨卒子侯代立病死無後春秋之義善善及子孫以其邑三千户封雲為冠軍侯後生謀反族滅國除平恩許廣漢家昌邑坐事下蠶室獨有一女嫁之宣帝未立時素與廣漢出入相通下相者言當大貴以故廣漢施恩甚厚地節三年封為侯邑三千户病死無後國除昌水田廣明故郎為司馬稍遷至南郡都尉淮陽太守鴻臚左馮翊昭帝崩議廢昌邑王立宣帝決疑定策以安宗廟本始二年封為侯邑二千三百户為御史大夫後為祁連將軍擊胸奴軍不至質當死自殺國除髙平魏相家在濟陰少學易為府卒史以賢良舉為茂陵令遷河南太守坐賊殺不辜繫獄當死㑹赦免為庶人有詔守茂陵令為揚州刺史入為諫議大夫復為河南太守遷為大司農御史大夫地節三年譛毁韋賢代為丞相封千五百户病死長子賔代立坐祠廟失侯博望許中翁名舜以平恩侯許廣漢弟封為侯邑二千户亦故有私恩為長樂衛尉死子延年代立樂平許翁孫以平恩侯許廣漢少弟故為侯封二千户拜為强弩將軍擊破西羌還更拜為大司馬光祿勳亦故有私恩故得封嗜酒好色以早病死子湯代立將陵史子回名曽以宣帝大母家封為侯二千六百户與平臺侯昆第行也子回妻宜君故成王孫嫉妒絞殺侍婢四十餘人盜斷婦人初産子臂膝以為媚道為人所上書言論棄市子回以外家故不失侯平臺史子叔名𤣥以宣帝大母家封為侯二千五百户衛太子時史氏內一女於太子嫁一女魯王今見魯王亦史氏外孫也外家有親以故貴數得賞賜樂陵史子長名髙以宣帝大母家貴侍中重厚忠信以發覺霍氏謀反事封二千五百户博成張章父故潁川人為長安亭長失官之北闕上書寄宿霍氏第舍臥馬櫪間夜聞養馬奴相與語言諸霍氏子孫欲謀反狀因上書告反為侯封三千户都成金安上先故胸奴以發覺故大將軍霍光子禹等謀反事有功侯二千八百户安上者奉車都尉秺侯從羣子行謹善退讓以自持欲傳功德於子孫平通楊惲家在華陽故丞相楊敞少子任為郎好士自喜知人居衆人中常與人顔色以故髙昌侯董忠引與屏語言霍氏謀反狀共發覺告反侯二千户為光祿勳到五鳳四年作為妖言大逆罪腰斬國除髙昌董忠父故潁川陽翟人以習書詣長安忠有材力能騎射用短兵給事黃門漢書東方朔傳曰武帝微行出與侍中常侍武騎及待詔隴西北地良家子能騎射者期諸殿門故有期門之號與張章相習知章告語忠霍禹謀反狀忠以語常侍騎郎楊惲共發覺告反侯二千户今為梟騎都尉侍中坐祠宗廟乘小車奪百户爰戚趙成用發覺楚國事侯二千三百户地節元年楚王與廣陵王謀反成發覺反狀天子推恩廣德義下詔書曰無治廣陵王廣陵王不變更後復坐祝詛滅國自殺國除今帝復立子為廣陵王鄼地節三年天子下詔書曰朕聞漢之興相國蕭何功第一今絶亡後朕甚憐之其以邑三千户封蕭何𤣥孫建世為鄼侯平昌王長君名無故家在趙國常山廣望邑人也衛太子時嫁太子家為太子男史皇孫為配生子男絶不聞聲問行且四十餘嵗至今元康元年中詔徵立以為侯封五千户宣帝舅父也樂昌王稚君名武家在趙國常山廣望邑人也以宣帝舅父外家封為侯邑五千户平昌侯王長君弟也卭城王奉光家在房陵以女立為宣帝皇后故封千五百户言奉光初生時夜見光其上傳聞者以為當貴云後果以女故為侯安逺鄭吉家在㑹稽以卒伍起從軍為郎使護將弛刑士田渠黎㑹胸奴單于死國亂相攻日逐王將衆來降漢先使語吉吉將吏卒數百人往迎之衆頗有欲還者因斬殺其渠率遂與俱入漢以軍功侯二千户博陽邴吉家在魯本以治獄為御史屬給事大將軍幕府常施舊恩宣帝遷為御史大夫封侯二千户神爵二年代魏相為丞相立五嵗病死子翁孟代立為將軍侍中甘露元年坐祠宗廟不乘大車而騎至廟門有罪奪爵為關內侯建成黃霸家在陽夏以役使徙雲陽以亷吏為河內守丞遷為廷尉監行丞相長史事坐見知夏侯勝非詔書大不敬罪久繫獄三嵗從勝學尚書㑹赦以賢良舉為揚州刺史潁川太守善化男女異路耕者讓畔賜黃金百斤秩中二千石居潁川入為太子太傅遷御史大夫五鳳三年代邴吉為丞相封千八百户西平于定國家在東海本以治獄給事為廷尉史稍遷御史中丞上書諫昌邑王遷為光祿大夫為廷尉乃師受春秋變道行化謹厚愛人遷為御史大夫代黃霸為丞相右孝宣時所封陽平王稚君名桀家在魏郡故丞相史女為太子妃太子立為帝女為皇后故侯千二百户初元以來方盛貴用事游宦求官於京師者多得其力未聞其有知略廣宣於國家也史記集解卷二十
