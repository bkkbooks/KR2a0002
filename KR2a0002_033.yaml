body:
  text: 史記集解卷三十五宋裴駰撰史記三十五管蔡世家第五管叔鮮蔡叔度者周文王子而武王弟也武王同母兄弟十人母曰太姒文王正妃也其長子曰伯邑考次曰武王發次曰管叔鮮次曰周公旦次曰蔡叔度次曰曹叔振鐸次曰成叔武次曰霍叔處次曰康叔封次曰冉季載冉季載最少同母兄弟十人唯發旦賢左右輔文王故文王舍伯邑考而以發為太子及文王崩而發立是為武王伯邑考既已前卒矣武王已克殷紂平天下封功臣昆弟於是封叔鮮於管封叔度於蔡二人相紂子武庚禄父治殷遺民封叔旦於魯而相周為周公封叔振鐸於曹封叔武於成封叔處於霍康叔封冉季載皆少未得封武王既崩成王少周公旦專王室管叔蔡叔疑周公之為不利於成王乃挾武庚以作亂周公旦承成王命伐誅武庚殺管叔而放蔡叔遷之與車十乗徒七十人從而分殷餘民為二其一封微子啟於宋以續殷祀其一封康叔為衛君是為衛康叔封季載於冉冉季康叔皆有馴行於是周公舉康叔為周司冦冉季為周司空以佐成王治皆有令名於天下蔡叔度既遷而死其子曰胡胡乃改行率徳馴善周公聞之而舉胡以為魯卿士魯國治於是周公言於成王復封胡於蔡以奉蔡叔之祀是為蔡仲餘五叔皆就國無為天子吏者蔡仲卒子蔡伯荒立蔡伯荒卒子宫侯立宫侯卒子厲侯立厲侯卒子武侯立武侯之時周厲王失國奔彘共和行政諸侯多叛周武侯卒子夷侯立夷侯十一年周宣王即位二十八年夷侯卒子釐侯所事立釐侯三十九年周幽王為犬戎所殺周室卑而東徙秦始得列為諸侯四十八年釐侯卒子共侯興立共侯二年卒子戴侯立戴侯十年卒子宣侯措父立宣侯二十八年魯𨼆公初立三十五年宣侯卒子桓侯封人立桓侯三年魯弑其君隱公二十年桓侯卒弟哀侯獻舞立哀侯十一年初哀侯娶陳息侯亦娶陳杜預曰息國汝南新息縣息夫人將歸過蔡蔡侯不敬息侯怒請楚文王來伐我我求救於蔡蔡必來楚因擊之可以有功楚文王從之虜蔡哀侯以歸哀侯留九歲死於楚凡立二十年卒蔡人立其子肸是為繆侯繆侯以其女弟為齊桓公夫人十八年齊桓公與蔡女戲船中夫人蕩舟桓公止之不止公怒歸蔡女而不絶也蔡侯怒嫁其妹齊桓公怒伐蔡蔡潰遂虜繆侯南至楚邵陵已而諸侯為蔡謝齊齊侯歸蔡侯二十九年繆侯卒子莊侯甲午立莊侯三年齊桓公卒十四年晉文公敗楚於城濮二十年楚太子商臣弑其父成王代立二十五年秦穆公卒三十三年楚莊王即位三十四年莊侯卒子文侯申立文侯十四年楚莊王伐陳殺夏徵舒十五年楚圍鄭鄭降楚楚復醳之二十年文侯卒子景侯同立景侯元年楚莊王卒二十九年景侯為太子般娶婦於楚而景侯通焉太子弑景侯而自立是為靈侯靈侯二年楚公子圍弑其王郟敖而自立為靈王九年陳司徒招弑其君哀公楚使公子棄疾滅陳而有之十二年楚靈王以靈侯弑其父誘蔡靈侯于申伏甲飲之醉而殺之刑其士卒七十人令公子棄疾圍蔡十一月滅蔡使棄疾為蔡公楚滅蔡三歲楚公子棄疾弑其君靈王代立為平王平王乃求蔡景侯少子廬立之是為平侯宋忠曰平侯徙下蔡是年楚亦復立陳楚平王初立欲親諸侯故復立陳蔡後世本曰平侯者靈侯般之孫太子友之子平侯九年卒靈侯般之孫東國攻平侯子而自立是為悼侯悼侯父曰隱太子友隱太子友者靈侯之太子平侯立而殺隱太子故平侯卒而隱太子之子東國攻平侯子而代立是為悼侯悼侯三年卒弟昭侯申立昭侯十年朝楚昭王持美裘二獻其一於昭王而自衣其一楚相子常欲之不與子常讒蔡侯留之楚三年蔡侯知之乃獻其裘於子常子常受之乃言歸蔡侯蔡侯歸而之晉請與晉伐楚十三年春與衛靈公會邵陵蔡侯私於周萇𢎞以求長於衛服䖍曰載書使蔡在衛上衛使史鰌言康叔之功徳乃長衛夏為晉滅沈杜預曰汝南平輿縣有邥亭楚怒攻蔡蔡昭侯使其子為質於吳以共伐楚冬與吳王闔閭遂破楚入郢蔡怨子常子常恐奔鄭十四年吳去而楚昭王復國十六年楚令尹為其民泣以謀蔡蔡昭侯懼二十六年孔子如蔡楚昭王伐蔡蔡恐告急於吳吳為蔡逺約遷以自近易以相救昭侯私許不與大夫計吳人來救蔡因遷蔡于州來二十八年昭侯將朝于吳大夫恐其復遷乃令賊利殺昭侯已而誅賊利以解過而立昭侯子朔是為成侯徐廣曰或作景成侯四年宋滅曹十年齊田常弑其君簡公十三年楚滅陳十九年成侯卒子聲侯産立聲侯十五年卒子元侯立元侯六年卒子侯齊立侯齊四年楚惠王滅蔡蔡侯齊亡蔡遂絶祀後陳滅三十三年伯邑考其後不知所封武王發其後為周有本紀言管叔鮮作亂誅死無後周公旦其後為魯有世家言蔡叔度其後為蔡有世家言曹叔振鐸其後為曹有世家言成叔武其後世無所見霍叔處其後晉獻公時滅霍康叔封其後為衛有世家言冉季載其後世無所見太史公曰管蔡作亂無足載者然周武王崩成王少天下既疑賴同母之弟成叔冉季之屬十人為輔拂是以諸侯卒宗周故附之世家言曹叔世家曹叔振鐸者周武王弟也武王已克殷紂封叔振鐸於曹宋忠曰濟陽定陶縣叔振鐸卒子太伯脾立太伯卒子仲君平立仲君平卒子宫伯侯立宫伯侯卒子孝伯雲立孝伯雲卒子夷伯喜立夷伯二十三年周厲王奔于彘三十年卒弟幽伯强立幽伯九年弟蘓殺幽伯代立是為戴伯戴伯元年周宣王已立三歲三十年戴伯卒子惠伯兕立孫檢曰兕音徐子反曹惠伯或名雉或名弟或復名弟兕也惠伯二十五年周幽王為犬戎所殺因東徙益卑諸侯畔之秦始列為諸侯三十六年惠伯卒子石甫立其弟武殺之代立是為繆公繆公三年卒子桓公終生立孫檢云一作終湦湦音生桓公三十五年魯隱公立四十五年魯弑其君隱公四十六年宋華父督弑其君殤公及孔父五十五年桓公卒子莊公夕姑立莊公二十三年晉桓公始霸三十一年莊公卒子釐公夷立釐公九年卒子昭公斑立昭公六年齊桓公敗蔡遂至楚召陵九年昭公卒子共公襄立共公十六年初晉公子重耳其亡過曹曹君無禮欲觀其騈脅韋昭曰駢者并幹也釐負羇諫不聽私善於重耳二十一年晉文公重耳伐曹虜共公以歸令軍毋入釐負羈之宗族閭或説晉文公曰昔齊桓公會諸侯復異姓今君囚曹君滅同姓何以令於諸侯晉乃復歸共公二十五年晉文公卒三十五年共公卒子文公壽立文公二十三年卒子宣公彊立宣公十七年卒弟成公負芻立成公三年晉厲公伐曹虜成公以歸己復釋之五年晉欒書中行偃使程滑弑其君厲公二十三年成公卒子武公勝立武公二十六年楚公子棄疾弑其君靈王代立二十七年武公卒子平公頃立平公四年卒子悼公年立是歲宋衛陳鄭皆火悼公八年宋景公立九年悼公朝於宋宋囚之曹立其弟野是為聲公悼公死於宋歸葬聲公五年平公弟通弑聲公代立是為隱公隱公四年聲公弟露弑隱公代立是為靖公靖公四年卒子伯陽立伯陽三年國人有夢衆君子立于社宫賈逵曰社宫社也鄭衆曰社宫中有室屋者謀欲亡曹曹叔振鐸止之請待公孫彊許之旦求之曹無此人夢者戒其子曰我亡爾聞公孫彊為政必去曹無罹曹禍及伯陽即位好田弋之事六年曹野人公孫彊亦好田弋獲白雁而獻之且言田弋之説因訪政事伯陽大説之有寵使為司城以聽政夢者之子乃亡去公孫彊言霸説於曹伯十四年曹伯從之乃背晉于宋賈逵曰以小加大宋景公伐之晉人不救十五年宋滅曹執曹伯陽及公孫彊以歸而弑之曹遂絶其祀太史公曰余尋曹共公之不用僖負羈乃乗軒者三百人知唯徳之不建及振鐸之夢豈不欲引曹之祀者哉如公孫彊不修厥政叔鐸之祀忽諸史記集解卷三十五
