body:
  text: 史記集解四十八宋裴駰撰史記四十八陳涉世家第十八陳勝者陽城人也字涉呉廣者陽夏人也字叔陳涉少時嘗與人庸耕輟耕之壟上悵恨乆之曰茍富貴無相忘庸者笑而應曰若為庸耕何富貴也陳涉太息曰嗟乎燕雀安知鴻鵠之志哉二世元年七月發閭左適戍漁陽九百人屯大澤鄉徐廣曰在沛郡蘄縣陳勝吳廣皆次當行為屯長會天大雨道不通度已失期失期法皆斬陳勝吳廣乃謀曰今亡亦死舉大計亦死等死死國可乎陳勝曰天下苦秦乆矣吾聞二世少子也不當立當立者乃公子扶蘇扶蘇以數諫故上使外將兵今或聞無罪二世殺之百姓多聞其賢未知其死也項燕為楚將數有功愛士卒楚人憐之或以為死或以為亡今誠以吾衆詐自稱公子扶蘇項燕為天下唱宜多應者吳廣以為然乃行卜卜者知其指意曰足下事皆成有功然足下卜之鬼乎蘇林曰狐鳴祠中則是也瓚曰假託鬼神以威衆也故勝廣曰此教我威衆也陳勝吳廣喜念鬼曰此教我先威衆耳乃丹書帛曰陳勝王置人所罾魚腹中漢書音義曰罾音曾文頴曰罾魚網也卒買魚烹食得魚腹中書固以怪之矣又間令吳廣之次近所旁叢祠中張晏曰戍人所止處也叢鬼所慿焉夜篝火徐廣曰或作帶也篝者龍也音溝狐鳴呼曰大楚興陳勝王卒皆夜驚恐旦日卒中徃徃語皆指目陳勝吳廣素愛人士卒多為用者將尉醉廣故數言欲亡忿恚尉令辱之以激怒其衆尉果笞廣尉劍挺徐廣曰挺猶脱也廣起奪而殺尉陳勝佐之并殺兩尉召令徒屬曰公等遇雨皆已失期失期當斬籍第令毋斬服處曰藉假也第次第也應劭曰籍吏士名籍也今失期當斬就使籍第幸得不斬戍死者固十六七此激怒其衆也蘇林曰第且也而戍死者固十六七且壯士不死即已死即舉大名耳王侯將相寧有種乎徒屬皆曰敬受命乃詐稱公子扶蘇項燕從民欲也袒右稱大楚為壇而盟祭以尉首陳勝自立為將軍吳廣為郡尉攻大澤鄉收而攻蘄蘄下乃令符離人葛嬰將兵徇蘄以東攻銍酇苦柘譙皆下之徐廣曰苦柘屬東餘皆在沛也行收兵北至陳車六七百乘騎千餘卒數萬人攻陳陳守令皆不在獨守丞與戰譙門中弗勝守丞死乃入據陳數日號令召三老豪傑與皆來會計事三老豪傑皆曰將軍身被堅執鋭伐無道誅暴秦復立楚國之社稷功宜為王陳涉乃立為王號為張楚當此時諸郡縣苦秦吏者皆刑其長吏殺之以應陳涉乃以吳叔為假王監諸將以西擊滎陽令陳人武臣張耳陳餘徇趙地令汝隂人鄧宗徇九江郡當此時楚兵數千人為聚者不可勝數葛嬰至東城立襄彊為楚王嬰後聞陳王已立因殺襄彊還報至陳陳王誅殺葛嬰陳王令魏人周市北徇魏地吳廣圍滎陽李由為三川守守滎陽吳叔弗能下陳王徵國之豪傑與計以上蔡人房君蔡賜漢書音義曰房君官號也姓蔡名賜瓚曰房邑君也為上柱國周文陳之賢人也文頴曰即周章嘗為項燕軍視日如淳曰視日時吉凶舉動之占也司馬季主為日者事春申君自言習兵陳王與之將軍印西擊秦行收兵至闗車千乘卒數十萬至戲軍焉秦令少府章邯免驪山徒人奴産子服䖍曰家人之産奴也悉發以擊楚大軍盡敗之周文敗走出闗止次曹陽二三月章邯追敗之復走次澠池十餘日章邯擊大破之周文自剄軍遂不戰徐廣曰十一月也武臣到邯鄲自立為趙王陳餘為大將軍張耳召騷為左右丞相陳王怒捕繫武臣等家室欲誅之柱國曰秦未亡而誅趙王將相家屬此生一秦也不如因而立之陳王乃遣使者賀趙而徙繫武臣等家屬宫中而封其子張敖為成都君趣趙兵亟入闗趙王將相相與謀曰王王趙非楚意也楚已誅秦必加兵於趙計莫如毋西兵使使北徇燕地以自廣也趙南據大河北有燕代楚雖勝秦不敢制趙若楚不勝秦必重趙趙乘秦之弊可以得志於天下趙王以為然因不西兵而遣故上谷卒史韓廣將兵北徇燕地燕故貴人豪傑謂韓廣曰楚已立王趙又已立王燕雖小亦萬乘之國也願將軍立為燕王韓廣曰廣母在趙不可燕人曰趙方西憂秦南憂楚其力不能禁我且以楚之彊不敢害趙王將相之家趙獨安敢害將軍之家韓廣以為然乃自立為燕王居數月趙奉燕王母及家屬歸之燕當此之時諸將之徇地者不可勝數周市北徇地至狄徐廣曰今之臨濟狄人田儋殺狄令自立為齊王以齊反擊周市市軍散還至魏地欲立魏後故寗陵君咎為魏王應劭曰魏諸公子名咎欲立六國後以樹黨時咎在陳王所不得之魏魏地已定欲相與立周市為魏王周市不肯使者五反陳王乃立甯陵君咎為魏王遣之國周市卒為相將軍田臧等相與謀曰周章軍已破矣秦兵旦暮至我圍滎陽城弗能下秦軍至必大敗不如少遣兵足以守滎陽悉精兵迎秦軍今假王驕不知兵權不可與計非誅之事恐敗因相與矯王令以誅吳叔獻其首於陳王使使賜田臧楚令尹印使為上將田臧乃使諸將李歸等守滎陽城自以精兵西迎秦軍於敖倉與戰田臧死軍破章邯進兵擊李歸等滎陽下破之李歸等死陽城人鄧説將兵居郯章邯别將擊破之鄧説軍散走陳銍人伍徐徐廣曰一作逢將兵居許章邯擊破之伍徐軍皆散走陳陳王誅鄧説陳王初立時陵人秦嘉地理志泗水有陵縣也銍人董緤符離人朱雞石取慮人鄭布徐人丁疾等皆特起將兵圍東海守慶於郯陳王聞乃使武平君畔為將軍張晏曰畔名也監郯下軍秦嘉不受命嘉自立為大司馬惡屬武平君告軍吏曰武平君年少不知兵事勿聽因矯以王命殺武平君畔章邯已破伍徐擊陳柱國房君死章邯又進兵擊陳西張賀軍陳王出監戰軍破張賀死臘月張晏曰秦之臘月夏之九月瓚曰建丑之月也陳王之汝隂還至下城父其御莊賈殺以降秦陳勝葬碭諡曰隱王陳王故涓人將軍吕臣應劭曰涓人知謁者將軍姓吕名臣也晉灼曰吕氏春秋荆柱國莊伯令謁者駕令涓人取冦為蒼頭軍起新陽徐廣曰在汝南也攻陳下之殺莊賈復以陳為楚初陳王至陳令銍人宋留將兵定南陽入武闗留已徇南陽聞陳王死南陽復為秦宋留不能入武闗乃東至新蔡遇秦軍宋留以軍降秦秦傳留至咸陽車裂留以徇秦嘉等聞陳王軍破出走乃立景駒為楚王徐廣曰正月嘉為上將軍引兵之方與欲擊秦軍定陶下使公孫慶使齊王欲與併力俱進齊王曰聞陳王戰敗不知其死生楚安得不請而立王公孫慶曰齊不請楚而立王楚何故請齊而立王且楚首事當令於天下田儋誅殺公孫慶秦左右校復攻陳下之吕將軍走收兵復聚鄱盜鄱音婆英布居江中爲羣盜陳勝之起布歸番君吴芮故謂之鄱盜者也當陽君黥布之兵相收復擊秦左右校破之青波漢書音義曰地名也復以陳為楚會項梁立懷王孫心為楚王陳勝王凡六月已為王王陳其故人嘗與庸耕者聞之之陳扣宫門曰吾欲見渉宫門令欲縳之自辨數乃置晉灼曰數音朋友數斯疏矣不肯為通陳王出遮道而呼涉陳王聞之乃召見載與俱歸入宫見殿屋帷帳客曰夥頤涉之為王沈沈者應劭曰沈沈宫室深邃之貎也沈音長含反含一作金楚人謂多為夥故天下傳之夥涉為王由陳涉始客出入愈益發舒言陳王故情或説陳王曰客愚無知顓妄言輕威陳王斬之諸陳王故人皆引去由是無親陳王者陳王以朱房為中正胡武為司過主司羣臣諸將徇地至令之不是者擊而罪之以苛察為忠其所不善者弗下吏輒自治之陳王信用之諸將以其故不親附此其所以敗也陳勝雖已死其所置遣侯王將相竟亡秦由涉首事也髙祖時為陳涉置守冢三十家碭至今血食褚先生曰徐廣曰一作太史公駰按班固奏亊云太史遷取賈誼過秦上下篇以為秦始皇本紀陳涉世家下贊文然則言褚先生者非也地形險阻所以為固也兵革刑法所以為治也猶未足恃也夫先王以仁義為本而以固塞文法為枝葉豈不然哉吾聞賈生之稱曰秦孝公據殽函之固韋昭曰殽謂二殽函函谷闗也擁雍州之地君臣固守以窺周室有席卷天下包舉宇内囊括四海之意并吞八荒之心當是時也商君佐之内立法度務耕織修守戰之備外連衡而鬬諸侯於是秦人拱守而取西河之外孝公既沒惠文王武王昭王䝉故業因遺策南取漢中西舉巴蜀東割膏腴之地收要害之郡諸侯恐懼會盟而謀弱秦不愛珍器重寶肥饒之地以致天下之士合縱締交相與為一當此之時齊有孟嘗趙有平原楚有春申魏有信陵此四君者皆明知而忠信寛厚而愛人尊賢而重士約從連衡兼韓魏趙燕宋衛中山之衆於是六國之士有甯越徐尚蘇秦杜赫之屬為之謀齊明周最陳軫邵滑樓緩翟景蘇厲樂毅之徒通其意吳起孫臏帶他兒良玉廖田忌㢘頗趙奢之倫制其兵嘗以什倍之地百萬之師仰闗而攻秦秦人開闗而延敵九國之師遁逃而不敢進秦無亡矢遺鏃之費而天下固已困矣於是從散約敗爭割地而賂秦秦有餘力而制其弊追亡逐北伏尸百萬流血漂櫓因利乘便宰割天下分裂山河彊國請服弱國入朝施及孝文王莊襄王享國之日淺國家無事及至始皇奮六世之餘烈振長策而御宇内吞二周而亡諸侯履至尊而制六合執敲扑以鞭笞天下威振四海南取百越之地以為桂林象郡百越之君俛首係頸委命下吏乃使蒙恬北築長城而守藩籬却匈奴七百餘里胡人不敢南下而牧馬士亦不敢貫弓而報怨於是廢先王之道燔百家之言以愚黔首墮名城殺豪俊收天下之兵聚之咸陽銷鋒鍉徐廣曰一作鏑鑄以為金人十二以弱天下之民然後踐華為城因河為池據億丈之城臨不測之谿以為固良弓勁弩守要害之處信臣精卒陳利兵而誰何天下已定始皇之心自以為闗中之固金城千里子孫帝王萬世之業也始皇既沒餘威振於殊俗然而陳涉甕牖繩樞之子甿𨽻之人徐廣曰田民曰甿音亡更反而遷徙之徒也材能不及中人非有仲尼墨翟之賢陶朱猗頓之富也躡足行伍之問俛仰阡陌之中率罷散之卒將數百之衆而轉攻秦斬木為兵掲竿為旗天下雲會響應贏糧而景從山東豪俊遂竝起而亡秦族矣且夫天下非小弱也雍州之地殽函之固自若也陳涉之位非尊於齊楚燕趙韓魏宋衛中山之君也鉏耰棘矜非銛於句㦸長鎩也適戍之衆非儔於九國之師也深謀遠慮行軍用兵之道非及鄉時之士也然而成敗異變功業相反也嘗試使山東之國與陳涉度長絜大比權量力則不可同年而語矣然而秦以區區之地致萬乘之權抑八州而朝同列百有餘年矣然後以六合為家殺函為宫一夫作難而七廟墮身死人手為天下笑者何也仁義不施而攻守之勢異也史記集解卷四十八
