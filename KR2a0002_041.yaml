body:
  text: 史記集解卷四十三宋裴駰撰史記四十三趙世家第十三趙氏之先與秦共祖至中衍為帝大戊御其後世蜚廉有子二人而命其一子曰惡來事紂為周所殺其後為秦惡來弟曰季勝其後為趙季勝生孟增孟增幸於周成王是為宅皋狼徐廣曰或云皋狼地名在西河皋狼生衡父衡父生造父造父幸於周繆王造父取驥之乘匹與桃林盜驪驊騮緑耳獻之繆王繆王使造父御西巡狩見西王母樂之忘歸而徐偃王反繆王日馳千里馬攻徐偃王大破之乃賜造父以趙城由此為趙氏自造父已下六世至奄父曰公仲周宣王時伐戎為御及千畝戰奄父脫宣王奄父生叔帶叔帶之時周幽王無道去周如晉事晉文侯始建趙氏於晉國自叔帶以下趙宗益興五世而生趙夙晉獻公之十六年伐霍魏耿而趙夙為將伐霍霍公求奔齊徐廣曰求一作來晉大旱卜之曰霍太山為祟使趙夙召霍君於齊復之以奉霍太山之祀晉復穰晉獻公賜趙夙耿夙生共孟當魯閔公之元年也共孟生趙衰字子餘趙衰卜事晉獻公及諸公子莫吉卜事公子重耳吉即事重耳重耳以驪姬之亂亡奔翟趙衰從翟伐牆咎如得二女翟以其少女妻重耳長女妻趙衰而生盾初重耳在晉時趙衰妻亦生趙同趙括趙嬰齊趙衰從重耳出亡凡十九年得反國重耳為晉文公趙衰為原大夫居原任國政文公所以反國及霸多趙衰計策語在晉事中趙衰既反晉晉之妻固要迎翟妻而以其子盾為適嗣晉妻三子皆下事之晉襄公之六年而趙衰卒諡為成季趙盾代成季任國政二年而晉襄公卒太子夷皋年少盾為國多難欲立襄公弟雍雍時在秦使使迎之太子母日夜啼泣頓首謂趙盾曰先君何罪釋其適子而更求君趙盾患之恐其宗與大夫襲誅之乃遂立太子是為靈公發兵距所迎襄公弟於秦者靈公既立趙盾益專國政靈公立十四年益驕趙盾驟諫靈公弗聽及食熊蹯胹不熟殺宰人持其尸出趙盾見之靈公由此懼欲殺盾盾素仁愛人嘗所食桑下餓人反扞救盾盾得以亡未出境而趙穿弒靈公而立襄公弟黑臀是為成公趙盾復反任國政君子譏盾為正卿亡不出境反不討賊故太史書曰趙盾弒其君晉景公時而趙盾卒諡為宣孟子朔嗣趙朔晉景公之三年朔為晉將下軍救鄭與楚莊王戰河上朔娶晉成公姊夫人晉景公之三年大夫屠岸賈欲誅趙氏徐廣曰按年表救鄭及誅滅皆景公三年初趙盾在時夢見叔帶持要而哭甚悲已而笑拊手且歌盾卜之兆絶而後好趙史援占之曰此夢甚惡非君之身乃君之子然亦君之咎至孫趙將世益衰屠岸賈者始有寵於靈公及至於景公而賈為司寇將作難乃治靈公之賊以致趙盾遍告諸將曰盾雖不知猶為賊首以臣弒君子孫在朝何以懲􅖄請誅之韓厥曰靈公遇賊趙盾在外吾先君以為無罪故不誅今諸君將誅其後是非先君之意而今妄誅妄誅謂之亂臣有大事而君不聞是無君也屠岸賈不聽韓厥告趙朔趣亡朔不肯曰子必不絶趙祀朔死不恨韓厥許諾稱疾不出賈不請而擅與諸將攻趙氏於下宫殺趙朔趙同趙括趙嬰齊皆滅其族趙朔妻成公姊有遺腹走公宫匿趙朔客曰公孫杵臼杵臼謂朔友人程嬰曰胡不死程嬰曰朔之婦有遺腹若幸而男吾奉之即女也吾徐死耳居無何而朔婦免身生男屠岸賈聞之索於宫中夫人置兒褲中祝曰趙宗滅乎若號即不滅若無聲及索兒竟無聲已脫程嬰謂公孫杵臼曰今一索不得後必且復索之奈何公孫杵臼曰立孤與死熟難程嬰曰死易立孤難耳公孫杵臼曰趙氏先君遇子厚子強為其難者吾為其易者請先死乃二人謀取他人嬰兒負之衣以文葆徐廣曰小兒被曰葆匿山中程嬰出謬謂諸將軍曰嬰不肖不能立趙孤誰能與我千金吾告趙氏孤處諸將皆喜許之發師隨程嬰攻公孫杵臼杵臼謬曰小人哉程嬰昔下宫之難不能死與我謀立趙氏孤兒今又賣我縱不能立而忍賣之乎抱兒呼曰天乎天乎趙氏孤兒何罪請活之獨殺杵臼可也諸將不許遂殺杵臼與孤兒諸將以為趙氏孤兒良已死皆喜然趙氏真孤乃反在程嬰卒與俱匿山中居十五年晉景公疾卜之大業之後不遂者為祟景公問韓厥厥知趙孤在乃曰大業之後在晉絶祀者其趙氏乎夫自中衍者皆嬴姓也中衍人面鳥噣降佐殷帝大戊及周天子皆有明德下及幽厲無道而叔帶去周適晉事先君文侯至於成公世有立功未嘗絶祀今吾君獨滅趙宗國人哀之故見龜䇿唯君圖之景公問趙尚有後子孫乎韓厥具以實告於是景公乃與韓厥謀立趙孤兒召而匿之宫中諸將入問疾景公因韓厥之衆以脅諸侯而見趙孤趙孤名曰武諸將不得已乃曰昔下宫之難屠岸賈為之矯以君命并命羣臣非然孰敢作難微君之疾羣臣固且請立趙後今君有命羣臣之願也於是召趙武程嬰遍拜諸將遂反與程嬰趙武攻屠岸賈滅其族復與趙武田邑如故徐廣曰推次晉復與趙武田邑是景公之十七年也而乃是春秋成公八年經書晉殺其大夫趙同趙括左傳於此説立趙武事者注云終説之耳非此年也及趙武冠為成人程嬰乃辭諸大夫謂趙武曰昔下宫之難皆能死我非不能死我思立趙氏之後今趙武既立為成人復故位我將下報趙宣孟與公孫杵臼趙武啼泣頓首固請曰武願苦筋骨以報子至死而子忍去我死乎程嬰曰不可彼以我為能成事故先我死今我不報是以我事為不成遂自殺趙武服齊衰三年為之祭邑春秋祠之世世勿絶新序曰程嬰公孫杵臼可謂信友厚士矣嬰之自殺下報亦過矣趙氏復位十一年而晉厲公殺其大夫三卻欒書畏及乃遂弒其君厲公更立襄公曾孫周徐廣曰年表云襄公孫也是為悼公晉由此大夫稍強趙武續趙宗二十七年晉平公立平公十二年而趙武為正卿十三年吳延陵季子使於晉曰晉國之政卒歸於趙武子韓宣子魏獻子之後矣趙武死諡為文子文子生景叔景叔之時齊景公使晏嬰於晉徐廣曰平公之十九年晏嬰與晉叔向語嬰曰齊之政後卒歸田氏叔向亦曰晉國之政將歸六卿六卿侈矣而吾君不能恤也趙景叔卒生趙鞅是為簡子趙簡子在位晉頃公之九年簡子將合諸侯戍於周其明年入周敬王於周辟弟子朝之故也晉頃公之十二年六卿以法誅公族祁氏羊舌氏分其邑為十縣六卿各令其族為之大夫晉公室由此益弱後十三年魯賊臣陽虎來奔趙簡子受賂厚遇之趙簡子疾五日不知人大夫皆懼醫扁鵲視之出董安于問韋昭曰安于簡子家臣扁鵲曰血脈治也而何怪在昔秦繆公嘗如此七日而寤寤之日告公孫支與子輿曰我之帝所甚樂吾所以久者適有學也帝告我晉國將大亂五世不安其後將霸未老而死霸者之子且令而國男女無别公孫支書而藏之秦讖於是出矣獻公之亂文公之霸而襄公敗秦師於殽而歸縱淫此子之所聞今主君之疾與之同不出三日疾必間間必有言也居二日半簡子寤語大夫曰我之帝所甚樂與百神遊於鈞天廣樂九奏萬舞不類三代之樂其聲動人心有一熊欲來援我帝命我射之中熊熊死又有一羆來我又射之中羆羆死帝甚喜賜我二笥皆有副我見兒在帝側帝屬我一翟犬曰及而子之壯也以賜之帝告我晉國且世衰七世而亡嬴姓將大敗周人於范魁之西而亦不能有也今余思虞舜之勳適余將以其胄女孟姚配而七世之孫董安于受言而書藏之以扁鵲言告簡子簡子賜扁鵲田四萬畝他日簡子出有人當道辟之不去從者怒將刃之當道者曰吾欲有謁於主君從者以聞簡子召之曰嘻吾有所見子晰也當道者曰屏左右願有謁簡子屏人當道者曰主君之疾臣在帝側簡子曰然有之子之見我我何為當道者曰帝令主君射熊與羆皆死簡子曰是且何也當道者曰晉國且有大難主君首之帝令主君滅二卿夫熊與羆皆其祖也簡子曰帝賜我二笥皆有副何也當道者曰主君之子將克二國於翟皆子姓也簡子曰吾見兒在帝側帝屬我一翟犬曰及而子之長以賜之夫兒何謂以賜翟犬當道者曰兒主君之子也翟犬者代之先也主君之子且必有代及主君之後嗣且有革政而胡服并二國於翟簡子問其姓而延之以官當道者曰臣野人致帝命耳遂不見簡子書藏之府異日姑布子卿見簡子司馬彪曰姑布姓子卿字簡子遍召諸子相之子卿曰無為將軍者簡子曰趙氏其滅乎子卿曰吾嘗見一子於路殆君之子也簡子召子毋恤毋恤至則子卿起曰此真將軍矣簡子曰此其母賤翟婢也奚道貴哉子卿曰天所授雖賤必貴自是之後簡子盡召諸子與語毋恤最賢簡子乃告諸子曰吾藏寶符於常山上先得者賞諸子馳之常山上求無所得毋恤還曰已得符矣簡子曰奏之毋恤曰從常山上臨代代可取也簡子於是知毋恤果賢乃廢太子伯魯而以毋恤為太子後二年晉定公之十四年范中行作亂明年春簡子謂邯鄲大夫午曰歸我衛士五百家吾將置之晉陽服虔曰往年趙鞅圍衛衛人恐懼故貢五百家鞅置之邯鄲又欲更徙於晉陽午許諾歸而其父兄不聽服虔曰午之諸父兄及邯鄲中長老倍言趙鞅捕午囚之晉陽乃告邯鄲人曰我私有誅午也諸君欲誰立杜預曰午趙鞅同族别封邯鄲故使邯鄲人更立午宗親也遂殺午趙稷涉賔以邯鄲反服虔曰稷午子晉君使籍秦圍邯鄲左傳曰籍秦此時為上軍司馬荀寅范吉射與午善左傳曰午荀寅之甥荀寅范吉射之姻不肯助秦而謀作亂董安于知之十月范中行氏伐趙鞅鞅奔晉陽晉人圍之范吉射荀寅仇人魏襄等謀逐荀寅以梁嬰父代之賈逵曰梁嬰父晉大夫也逐吉射以范皋繹代之服虔曰范氏之側室子荀躒言於晉侯曰服虔曰荀躒智文子君命大臣始亂者死今三臣始亂賈逵曰范中行趙也而獨逐鞅用刑不均請皆逐之十一月荀躒韓不佞魏哆奉公命以伐范中行氏不克范中行氏反伐公公擊之范中行敗走丁未二子奔朝歌韓魏以趙氏為請服虔曰以其罪輕於茍范也十二月辛未趙鞅入絳盟於公宫其明年知伯文子謂趙鞅曰范中行雖信為亂安于發之是安于與謀也晉國有法始亂者死夫二子已伏罪而安于獨在趙鞅患之安于曰臣死趙氏定晉國寧吾死晚矣遂自殺趙氏以告知伯然後趙氏寧孔子聞趙簡子不請晉君而執邯鄲午保晉陽故書春秋曰趙鞅以晉陽畔趙簡子有臣曰周舍好直諫周舍死簡子每聽朝常不悅大夫請罪簡子曰大夫無罪吾聞千羊之皮不如一狐之腋諸大夫朝徒聞唯唯不聞周舍之鄂鄂是以憂也韓詩外傳曰周舍立於門下三日三夜簡子使問之曰子欲見寡人何事對曰願為鄂鄂之臣墨筆操牘從君之過而日有記月有成歲有效也簡子由此能附趙邑而懷晉人晉定公十八年趙簡子圍范中行于朝歌中行文子奔邯鄲明年衛靈公卒簡子與陽虎送衛太子蒯聵於衛衛不內居戚晉定公二十一年簡子拔邯鄲中行文子奔柏人簡子又圍柏人中行文子范昭子遂奔齊趙竟有邯鄲柏人范中行餘邑入於晉趙名晉卿實專晉權奉邑侔於諸侯晉定公三十年定公與吳王夫差爭長於黃池趙簡子從晉定公卒長吳定公三十七年卒而簡子除三年之喪期而已是歲越王句踐滅吳晉出公十一年知伯伐鄭趙簡子疾使太子毋恤將而圍鄭知伯醉以酒灌擊毋恤毋恤羣臣請死之毋恤曰君所以置毋恤為能忍詬然亦愠知伯知伯歸因謂簡子使廢毋恤簡子不聽毋恤由此怨知伯晉出公十七年簡子卒張華曰趙簡子冢在臨水界二冢併上氣成樓閣太子毋恤代立是為襄子趙襄子元年越圍吳襄子降喪食使楚隆問吳王襄子姊前為代王夫人簡子既葬未除服北登夏屋徐廣曰山在廣武請代王使廚人操銅枓以食代王及從者行斟隂令宰人各徐廣曰一作雒以枓擊殺代王及從官遂興兵平代地其姊聞之泣而呼天摩笄自殺代人憐之所死地名之為摩笄之山遂以代封伯魯子周為代成君伯魯者襄子兄故太子太子蚤死故封其子襄子立四年知伯與趙韓魏盡分其范中行故地晉出公怒告齊魯欲以伐四卿四卿恐遂共攻出公出公奔齊道死知伯乃立昭公魯孫驕是為晉懿公知伯益驕請地韓魏韓魏與之請地趙趙不與以其圍鄭之辱知伯怒遂率韓魏攻趙趙襄子懼乃奔保晉陽原過從後至於王澤見三人自帶以上可見自帶以下不可見與原過竹二節莫通曰為我以是遺趙毋恤原過既至以告襄子襄子齊三日親自剖竹有朱書曰趙毋恤余霍泰山徐廣曰在河東永安縣山陽侯天使也三月丙戌余將使女反滅知氏女亦立我百邑余將賜女林胡之地至於後世且有伉王赤黑龍面而鳥噣鬢麋髭􅏋大膺大胸修下而馮左衽界乘徐廣曰修或作隨界一作介奄有河宗至於休溷諸貉南伐晉别北滅黑姑襄子再拜受三神之令三國攻晉陽歲餘引汾水灌其城城不浸者三版城中懸釡而炊易子而食羣臣皆冇外心禮益慢唯髙共徐廣曰一作赫不敢失禮襄子懼乃夜使相張孟同私於韓魏韓魏與合謀以三月丙戌三國反滅知氏共分其地於是襄子行賞髙共為上張孟同曰晉陽之難唯共無功襄子曰方晉陽急羣臣皆懈唯共不敢失人臣禮是以先之於是趙北有代南并知氏強於韓魏遂祠三神於百邑使原過主霍泰山祠祀其後娶空同氏生子子襄子為伯魯之不立也不肯立子且必欲傳位與伯魯子代成君成君先死乃取代成君子浣立為太子襄子立三十三年卒浣立是為獻侯獻侯少即位治中牟地理志曰河南中牟縣趙獻侯自耿徙此瓚曰中牟在春秋之時是鄭之疆內也及三卿分晉則在魏之邦土也趙界自漳水以北不及此春秋傳曰衛侯如晉過中牟按中牟非衛適晉之次也汲郡古文曰齊師伐趙東鄙圍中牟此中牟不在趙之東也按中牟當漯水之北襄子弟桓子逐獻侯自立於代一年卒國人曰桓子立非襄子意乃共殺其子而復迎立獻侯十年中山武公初立徐廣曰西周桓公之子桓公者孝王弟而定王子十三年城平邑地理志曰代郡有平邑縣十五年獻侯卒子烈侯籍立烈侯元年魏文侯伐中山使太子擊守之六年魏韓趙相立為諸侯追尊獻子為獻侯烈侯好音謂相國公仲連曰寡人有愛可以貴之乎公仲曰富之可貴之則否烈侯曰然夫鄭歌者槍石二人吾賜之田人萬畝公仲曰諾不與居一月烈侯從代來問歌者田公仲曰求未有可者有頃烈侯復問公仲終不與乃稱疾不朝番吾君徐廣曰番音盤常山有番吾縣自代來謂公仲曰君實好善而未知所持今公仲相趙於今四年亦有進士乎公仲曰未也番吾君曰牛畜荀欣徐越皆可公仲乃進三人及朝烈侯復問歌者田何如公仲曰方使擇其善者牛畜侍烈侯以仁義約以王道烈侯逌然明日荀欣侍以選練舉賢任官使能明日徐越侍以節財儉用察度功德所與無不充君説烈侯使使謂相國曰歌者之田且止官畜牛為師荀欣為中尉徐越為內史賜相國衣二襲單復具為一襲九年烈侯卒弟武公立武公十三年卒趙復立烈侯太子章是為敬侯是歲魏文侯卒敬侯元年武公子朝作亂不克出奔魏趙始都邯鄲二年敗齊於靈丘地理志曰代郡有靈丘縣三年救魏於廪丘大敗齊人四年魏敗我兔臺築剛平以侵衛五年齊魏為衛攻趙取我剛平六年借兵於楚伐魏取棘蒲八年拔魏黃城杜預曰陳留外黃縣東有黃城九年伐齊齊伐燕趙救燕十年與中山戰於房子十一年魏韓趙共滅晉分其地伐中山又戰於中人徐廣曰中山唐縣有中人亭十二年敬侯卒子成侯種立成侯元年公子勝與成侯爭立為亂二年六月雨雪三年太戊午為相徐廣曰戊一作成伐衛取鄉邑七十三魏敗我藺四年與秦戰髙安敗之五年伐齊於鄄魏敗我懷攻鄭敗之以與韓韓與我長子地里志曰上黨有長子縣六年中山築長城伐魏敗湪澤圍魏惠王七年侵齊至長城與韓攻周八年與韓分周以為兩徐廣曰顯王二年周紀無此九年與齊戰阿下徐廣曰戰一作會也十年攻衛取甄十一年秦攻魏救之石阿十二年秦攻魏少梁趙救之十三年秦獻公使庶長國伐魏少梁虜其太子痤魏敗我澮取皮牢徐廣曰魏年表曰取趙皮牢成侯與韓昭侯遇上黨十四年與韓攻秦十五年助魏攻齊十六年與韓魏分晉封晉君以端氏徐廣曰在平陽十七年成侯與魏惠王遇葛孽徐廣曰在馬丘年表曰十八年趙孟如齊十九年與齊宋會平陸與燕會阿二十年魏獻榮椽因以為檀臺徐廣曰襄國縣有檀臺二十一年魏圍我邯鄲二十二年魏惠王拔邯鄲齊亦敗魏於桂陵二十四年魏歸我邯鄲與魏盟漳水上秦攻我藺二十五年成侯卒公子緤與太子肅侯爭立緤敗亡奔韓肅侯元年奪晉君端氏徙處屯留二年與魏惠王遇於隂晉三年公子范襲邯鄲不勝而死四年朝天子六年攻齊拔髙唐七年公子刻攻魏首垣十一年秦孝公使商君伐魏虜其將公子卬趙伐魏十二年秦孝公卒商君死十五年起夀陵魏惠王卒十六年肅侯遊大陵徐廣曰太原有大陵縣亦曰陸出於鹿門大戊午扣馬吕忱曰扣牽馬曰耕事方急一日不作百日不食肅侯下車謝十七年圍魏黃不克地理志曰山陽有黃縣築長城十八年齊魏伐我我決河水灌之兵去二十二年張儀相秦趙疵與秦戰敗秦殺疵河西取我藺離石二十三年韓舉徐廣曰韓將與齊魏戰死於桑丘地理志曰泰山有桑丘縣二十四年肅侯卒秦楚燕齊魏出鋭師各萬人來會葬子武靈王立武靈王元年徐廣曰年表云魏敗我趙護陽文君趙豹相梁襄王與太子嗣韓宣王與太子倉來朝信宫武靈王少未能聽政博聞師三人左右司過三人及聽政先問先王貴臣肥義加其秩國三老年八十月致其禮三年城鄗四年與韓會於區鼠五年娶韓女為夫人八年韓擊秦不勝而去五國相王趙獨否曰無其實敢處其名乎令國人謂己曰君九年與韓魏共擊秦秦敗我斬首八萬級齊敗我觀澤十年秦取我西都及中陽徐廣曰年表云秦取中都西陽安邑十一年秦敗我將軍英太原有中都縣西河有中陽縣齊破燕燕相子之為君君反為臣十一年王召公子職於韓立以為燕王徐廣曰紀年亦云爾使樂池送之按燕世家子之死後燕人共立太子平是為燕昭王無趙送公子職為燕王之事當是趙聞燕亂遙立職為燕王雖使樂池送之竟不能就十三年秦拔我藺虜將軍趙莊楚魏王來過邯鄲十四年趙何攻魏十六年秦惠王卒王遊大陵他日王夢見處女鼓琴而歌詩曰美人熒熒兮顔若苕之榮綦毋邃曰陵苕之草其葉紫命乎命乎曾無我嬴綦毋邃曰言有命祿生遇其時人莫知已貴盛盈端也異日王飲酒樂數言所夢想見其狀吳廣聞之因夫人而內其女娃嬴方言曰娃美也吳有館娃之宫孟姚也徐廣曰古史考云內其女曰娃孟姚甚有寵於王是為惠后十七年王出九門徐廣曰在常山為野臺徐廣曰野一作望以望齊中山之境十八年秦武王與孟説舉龍文赤鼎絶臏而死徐廣曰一作絶瞑音亡丁反趙王使代相趙固迎公子稷於燕送歸立為秦王是為昭王十九年春正月大朝信宫召肥義與議天下五日而畢王北略中山之地至於房子遂之代北至無窮西至河登黃華之上召樓緩謀曰我先王因世之變以長南藩之地屬阻漳滏之險立長城又取藺郭狼敗林人於荏而功未遂今中山在我腹心北有燕東有胡西有林胡樓煩秦韓之邊而無強兵之救是亡社稷奈何夫有髙世之名必有遺俗之纍吾欲胡服樓緩曰善羣臣皆不欲於是肥義侍王曰簡襄主之烈計胡翟之利為人臣者寵有孝悌長幼順明之節通有補民益主之業此兩者臣之分也今吾欲繼襄主之迹開於胡翟之鄉而卒世不見也為敵弱用力少而功多可以毋盡百姓之勞而序往古之勳夫有髙世之功者負遺俗之纍有獨智之慮者任驁民之怨今吾將胡服騎射以教百姓而世必議寡人奈何肥義曰臣聞疑事無功疑行無名王既定負遺俗之慮殆無顧天下之議矣夫論至德者不和於俗成大功者不謀於衆昔者舜舞有苗禹袒裸國非以養欲而樂志也務以論德而約功也愚者暗成事智者覩未形則王何疑焉王曰吾不疑胡服也吾恐天下笑我也狂夫之樂智者哀焉愚者所笑賢者察焉世有順我者胡服之功未可知也雖驅世以笑我胡地中山吾必有之於是遂胡服矣使王緤告公子成曰寡人胡服將以朝也亦欲叔服之家聽於親而國聽於君古今之公行也子不反親臣不逆君兄弟之通義也徐廣曰兄弟一作元夷元始也夷平也今寡人作教易服而叔不服吾恐天下議之也制國有常利民為本從政有經令行為上明德先論於賤而行政先信於貴今胡服之意非以養欲而樂志也事有所止而功有所出事成功立然後善也今寡人恐叔之逆從政之經以輔叔之議且寡人聞之事利國者行無邪因貴戚者名不纍故願慕公叔之議以成胡服之功使緤謁之叔請服焉公子成再拜稽首曰臣固聞王之胡服也臣不佞寢疾未能趨走以滋進也王命之臣敢對因竭其愚忠曰臣聞中國者蓋聰明徇智之所居也徐廣曰五帝本紀云幼而徇齊萬物財用之所聚也賢聖之所教也仁義之所施也詩書禮樂之所用也異敏技能之所試也逺方之所觀赴也蠻夷之所義行也今王舍此而襲逺方之服變古之教易古之道逆人之心而怫學者離中國故臣願王圖之也使者以報王曰吾固聞叔之疾也我將自往請之王遂往之公子成家因自請之曰夫服者所以便用也禮者所以便事也聖人觀鄉而順宜因事而制禮所以利其民而厚其國也夫剪髮文身錯臂左衽甌越之民也黑齒雕題劉逵曰以草染齒用白作黑鄭玄曰雕文謂刻其肌以青丹涅之却冠秫絀徐廣曰戰國策作秫縫絀亦縫紩之别名也鉥者綦針也古字多假借故作秫絀耳此蓋言其女工針縷之粗拙也又一本作鮭冠黎緤也大吳之國也故禮服莫同其便一也鄉異而用變事異而禮易是以聖人果可以利其國不一其用果可以便其事不同其禮儒者一師而俗異中國同禮而教離況於山谷之便乎故去就之變智者不能一逺近之服賢聖不能同窮鄉多異曲學多辨不知而不疑異於已而不非者公焉而衆求盡善也今叔之所言者俗也吾所言者所以制俗也吾國東有河薄洛之水徐廣曰安平經縣西有漳水津名薄洛津與齊中山同之無舟楫之用自常山以至代上黨徐廣曰一云自常山以下代上黨以東東有燕東胡之境而西有樓煩秦韓之邉今無騎射之備故寡人無舟楫之用夾水居之民將何以守河薄洛之水變服騎射以備燕三胡秦韓之邊且昔者簡王不塞晉陽以及上黨而襄主并戎取代以攘諸胡此愚智所明也先時中山負齊之強兵侵暴吾地係纍吾民引水圍鄗微社稷之神靈則鄗幾於不守也先王醜之而怨未能報也今騎射之備近可以便上黨之形而逺可以報中山之怨而叔順中國之俗以逆簡襄之意惡變服之名以忘鄗事之醜非寡人之所望也公子成再拜稽首曰臣愚不達於王之義敢道世俗之聞臣之罪也今王將繼簡襄之意以順先王之志臣敢不聽命乎再拜稽首乃賜胡服明日服而朝於是始出胡服令也趙文趙造周袑徐廣曰戰國策作紹袑音紹趙俊皆諫止王毋胡服如故法便王曰先王不同俗何古之法帝王不相襲何禮之循虙戲神農教而不誅黃帝堯舜誅而不怒及至三王隨時制法因事制禮法度制令各順其宜衣服器械各便其用故禮也不必一道而便國不必古聖人之興也不相襲而王夏殷之衰也不易禮而滅然則反古未可非而循禮未足多也且服奇者志淫則是鄒魯無竒行也俗辟者民易則是吳越無秀士也且聖人利身謂之服便事謂之禮夫進退之節衣服之制者所以齊常民也非所以論賢者也故齊民與俗流賢者與變俱故諺曰以書御者不盡馬之情以古制今者不達事之變循法之功不足以髙世法古之學不足以制今子不及也遂胡服招騎射二十年王略中山地至寧葭西略胡地至榆中林胡王獻馬歸使樓緩之秦仇液之韓王賁之楚富丁之魏趙爵之齊代相趙固主胡致其兵二十一年攻中山趙袑為右軍許鈞為左軍公子章為中軍王并將之牛翦將車騎趙希并將胡代趙與之陘徐廣曰一作陸又作陘或宜言趙與之陘陘者山絶之名常山有井陘中山有苦陘上黨有閼與合軍曲陽徐廣曰上曲陽在常山下曲陽在巨鹿攻取丹丘華陽鴟之塞徐廣曰華一作爽鴟一作鴻王軍取鄗石邑徐廣曰在常山封龍東垣中山獻四邑請和王許之罷兵二十三年攻中山二十五年惠后卒使周袑胡服傳王子何二十六年復攻中山攘地北至燕代西至雲中九原二十七年五月戊申大朝於東宫傳國立王子何以為王王廟見禮畢出臨朝大夫悉為臣肥義為相國并傳王是為惠文王惠文王惠后吳娃子也武靈王自號為主父主父欲令子主治國而身胡服將士大夫西北略胡地而欲從雲中九原直南襲秦於是詐自為使者入秦秦昭王不知已而怪其狀甚偉非人臣之度使人逐之而主父馳已脫關矣審問之乃主父也秦人大驚主父所以入秦者欲自略地形因觀秦王之為人也惠文王徐廣曰元年以公子勝為相封平原二年主父行新地遂出代西遇樓煩王於西河而致其兵三年滅中山遷其王於膚施徐廣曰在上郡起靈夀徐廣曰在常山北地方從代道大通還歸行賞大赦置酒酺五日封長子章為代安陽君章素侈心不服其弟所立主父又使田不禮相章也李兌謂肥義曰公子章強壯而志驕黨衆而欲大殆有私乎田不禮之為人也忍殺而驕二人相得必有謀陰賊起一出身徼幸夫小人有欲輕慮淺謀徒見其利而不顧其害同類相推俱入禍門以吾觀之必不久矣子任重而勢大亂之所始禍之所集也子必先患仁者愛萬物而智者備禍於未形不仁不智何以為國子奚不稱疾毋出傳政於公子成毋為怨府毋為禍梯肥義曰不可昔者主父以王屬義也曰毋變而度毋異而慮堅守一心以歿而世義再拜受命而籍之今畏不禮之難而忘吾籍變孰大焉進受嚴命退而不全負孰甚焉變負之臣不容於刑諺曰死者復生生者不愧吾言已在前矣吾欲全吾言安得全吾身且夫貞臣也難至而節見忠臣也纍至而行明子則有賜而忠我矣雖然吾有語在前者也終不敢失李兑曰諾子勉之矣吾見子已今年耳涕泣而出李兑數見公子成以備田不禮之事異日肥義謂信期曰公子與田不禮甚可憂也其於義也聲善而實惡此為人也不子不臣吾聞之也姦臣在朝國之殘也讒臣在中主之蠧也此人貪而欲大內得主而外為暴矯令為慢以擅一旦之命不難為也禍且逮國今吾憂之夜而忘寐飢而忘食盜賊出入不可不備自今以來若有召王者必見吾面我將先以身當之無故而王乃入信期曰善哉吾得聞此也四年朝羣臣安陽君亦來朝主父令王聽朝而自從旁觀窺羣臣宗室之禮見其長子章傫然也反北面為臣詘於其弟心憐之於是乃欲分趙而王章於代計未決而輟主父及王遊沙丘異宫公子章即以其徒與田不禮作亂詐以主父令召王肥義先入殺之髙信即與王戰公子成與李兑自國至乃起四邑之兵入距難殺公子章及田不禮滅其黨賊而定王室公子成為相號安平君李兌為司寇公子章之敗往走主父主父開之成兌因圍主父宫公子章死公子成李兌謀曰以章故圍主父即解兵吾屬夷矣乃遂圍主父令宫中人後出者夷宫中人悉出主父欲出不得又不得食探爵鷇而食之綦毋邃曰鷇爵子也三月餘而餓死沙丘應劭曰武靈王葬代郡靈丘縣主父定死乃發喪赴諸侯是時王少成兌專政畏誅故圍主父主父初以長子章為太子後得吳娃愛之為不出者數歲生子何乃廢太子章而立何為王吳娃死愛弛憐故太子欲兩王之猶豫未決故亂起以至父子俱死為天下笑豈不痛乎徐廣曰或無此十四字主父死惠文王立立五年與燕鄚易徐廣曰皆屬涿郡鄚音莫八年城南行唐徐廣曰在常山九年趙梁將與齊合軍攻韓至魯關下及十年秦自置為西帝十一年董叔與魏氏伐宋得河陽於魏秦取梗陽杜預曰太原晉陽縣南梗陽城也十二年趙梁將攻齊十三年韓徐為將攻齊公主死十四年相國樂毅將趙秦韓魏燕攻齊取靈丘與秦會中陽十五年燕昭王來見趙與韓魏秦共擊齊齊王敗走燕獨深入取臨葘十六年秦復與趙數擊齊齊人患之蘇厲為齊遺趙王書曰臣聞古之賢君其德行非布於海內也教順非洽於民人也祭祀時享非數常於鬼神也甘露降時雨至年穀豐熟民不疾疫衆人善之然而賢主圖之今足下之賢行功力非數加於秦也怨毒積怒非素深於齊也秦趙與國以強徵兵於韓秦誠愛趙乎其實憎齊乎物之甚者賢主察之秦非愛趙而憎齊也欲亡韓而吞二周故以齊餤天下恐事之不合故出兵以劫魏趙恐天下畏己也故出質以為信恐天下亟反也故徵兵於韓以威之聲以德與國實而伐空韓臣以秦計為必出於此夫物固有勢異而患同者楚久伐而中山亡今齊久伐而韓必亡破齊王與六國分其利也亡韓秦獨擅之收二周西取祭器秦獨私之賦田計功王之獲利孰與秦多説士之計曰韓亡三川魏亡晉國市朝未變而禍已及矣燕盡齊之北地去沙丘巨鹿斂三百里韓之上黨去邯鄲百里燕秦謀王之河山間三百里而通矣秦之上郡近挺關至於榆中者千五百里秦以三郡攻王之上黨羊腸之西句注之南非王有已踰句注斬常山而守之三百里而通於燕代馬胡犬不東下昆山之玉不出此三寶者亦非王有已王久伐齊從強秦攻韓其禍必至於此願王孰慮之且齊之所以伐者以事王也天下屬行以謀王也燕秦之約成而兵出有日矣五國三分王之地齊倍五國之約而殉王之患西兵以禁強秦秦廢帝請服反髙平根柔於魏徐廣曰紀年云魏襄王四年改河陽曰河雍向曰髙平也根柔一作㮰柔一作平柔反巠分徐廣曰一作王公巠音胡鼎反先俞於趙徐廣曰爾雅曰西俞鴈門是齊之事王宜為上佼而今乃抵罪臣恐天下後事王者之不敢自必也願王孰計之也今王毋與天下攻齊天下必以王為義齊抱社稷而厚事王天下必盡重王義王以天下善秦秦暴王以天下禁之是一世之名寵制於王也於是趙乃輟謝秦不擊齊王與燕王遇廉頗將攻齊昔陽取之杜預曰樂平治縣有昔陽城十七年樂毅將趙師攻魏伯陽而秦怨趙不與己擊齊伐趙拔我兩城十八年秦拔我石城地理志云右北平有石城縣王再之衛東陽決河水伐魏氏大潦漳水出魏冉來相趙十九年秦敗我二城趙與魏伯陽趙奢將攻齊麥丘取之二十年廉頗將攻齊王與秦昭王遇西河外徐廣曰年表云與秦會澠池二十一年趙徙漳水武平西二十二年大疫置公子丹為太子二十三年樓昌將攻魏幾不能取十二月廉頗將攻幾取之二十四年廉頗將攻魏房子徐廣曰屬常山拔之因城而還又攻安陽取之二十五年燕周將攻昌徐廣曰屬齊郡城髙唐取之與魏共擊秦秦將白起破我華陽得一將軍二十六年取東胡歐代地二十七年徙漳水武平南封趙豹為平陽君戰國䇿曰趙豹平陽君惠文王母弟河水出大潦二十八年藺相如伐齊至平邑罷城北九門大城燕將成安君公孫操弒其王徐廣曰年表云是燕武成王元年二十九年秦韓相攻而圍閼與趙使趙奢將擊秦大破秦軍閼與下賜號為馬服君三十三年惠文王卒太子丹立是為孝成王孝成王元年徐廣曰平原君相也秦伐我拔三城趙王新立太后用事秦急攻之趙氏求救於齊齊曰必以長安君為質兵乃出太后不肯大臣強諫太后明謂左右曰復言長安君為質者老婦必唾其面左師觸龍言願見太后太后盛氣而胥之入胥猶須也穀梁傳曰胥其出也徐趍而坐自謝曰老臣病足曾不能疾走不得見久矣竊自恕而恐太后體之有所苦也故願望見太后太后曰老婦恃輦而行曰食得母衰乎曰恃粥耳曰老臣間者殊不欲食乃強步日三四里少益嗜食和於身也太后曰老婦不能太后不和之色少解左師公曰老臣賤息舒祺最少不肖而臣衰竊憐愛之願得補黑衣之缺以衛王宫昧死以聞太后曰敬諾年幾何矣對曰十五歲矣雖少願及未填溝壑而託之太后曰丈夫亦愛憐少子乎對曰甚於婦人太后笑曰婦人異甚對曰老臣竊以為媪之愛燕后賢於長安君太后曰君過矣不若長安君之甚左師公曰父母愛子則為之計深逺媼之送燕后也持其踵為之泣念其逺也亦哀之矣已行非不思也祭祀則祝之曰必勿使反豈非計長久為子孫相繼為王也哉太后曰然左師公曰今三世以前至於趙主之子孫為侯者其繼有在者乎曰無有曰微獨趙諸侯有在者乎曰老婦不聞也曰此其近者禍及其身逺者及其子孫豈人主之子侯則不善哉位尊而無功奉厚而無勞而挾重器多也今媼尊長安君之位而封之以膏腴之地多與之重器而不及今令有功於國一旦山陵崩長安君何以自託於趙老臣以媼為長安君之計短也故以為愛之不若燕后太后曰諾恣君之所使之於是為長安君約車百乘質於齊齊兵乃出子義聞之曰人主之子骨肉之親也猶不能持無功之尊無勞之奉而守金玉之重也而況於豫乎齊安平君田單將趙師而攻燕中陽徐廣曰一作人拔之又攻韓注人拔之二年惠文后卒田單為相四年王夢衣偏裻之衣乘飛龍上天不至而墜見金玉之積如山明日王召筮史敢占之曰夢衣偏裻之衣者殘也乘飛龍上天不至而墜者有氣而無實也見金玉之積如山者憂也後三日韓氏上黨守馮亭使者至曰韓不能守上黨入之於秦其吏民皆安為趙不欲為秦有城市邑十七願再拜入之趙聽王所以賜吏民王大喜召平陽君豹告之曰馮亭入城市邑十七受之何如對曰聖人甚禍無故之利王曰人懷吾德何謂無故乎對曰夫秦蠶食韓氏地中絶不令相通固自以為坐而受上黨之地也韓氏所以不入於秦者欲嫁其禍於趙也秦服其勞而趙受其利雖強大不能得之於小弱小弱顧能得之於強大乎豈可謂非無故之利哉且夫秦以牛田之徐廣曰一無此字水通糧蠶食上乘倍戰者裂上國之地其政行不可與為難必勿受也王曰今發百萬之軍而攻踰年厯歲未得一城也今以城市邑十七幣吾國此大利也趙豹出王召平原君與趙禹而告之對曰廢百萬之軍而攻踰歲未得一城今坐受城市邑十七此大利不可失也王曰善乃令趙勝受地告馮亭曰敝國使者臣勝敝國君使勝致命以萬户都三封太守千户都三封縣令皆世世為侯吏民皆益爵三級吏民能相安皆賜之六金馮亭垂涕不見使者曰吾不處三不義也為主守地不能死固不義一矣入之秦不聽主令不義二矣賣主地而食之不義三矣趙遂發兵取上黨漢書馮奉世傳曰趙封馮亭為華陵君與趙將括距秦戰死於長平宗族由是分散或在趙在趙者為官師將官師將子為代相及秦滅六國而馮亭之後馮無擇馮去疾馮劫皆為秦將相焉漢興馮唐即代相之子也上黨記云馮亭冢在壺關城西五里廉頗將軍軍長平七年廉頗免而趙括代將秦人圍趙括趙括以軍降卒四十餘萬皆坑之王悔不聽趙豹之計故有長平之禍焉王還不聽秦秦圍邯鄲徐廣曰在九年武垣令徐廣曰河間有武垣縣本屬涿郡傳豹王容蘇射率燕衆反燕地趙以靈丘封楚相春申君八年平原君如楚請救還楚來救及魏公子無忌亦來救秦圍邯鄲乃解十年燕攻昌壯徐廣曰一作社五月拔之趙將樂乘慶舍攻秦信梁軍破之徐廣曰年表云新中軍也太子死徐廣曰是年周赧王卒或者太子云天子乎而秦攻西周拔之徒父祺出十一年城元氏地理志常山有元氏縣縣上原武陽君鄭安平死徐廣曰故秦將降趙也收其地十二年邯鄲廥燒徐廣曰庫廏之名音膾也十四年平原君趙勝死十五年以尉文封相國廉頗為信平君燕王令丞相栗腹約歡以五百金為趙王酒還歸報燕王曰趙氏壯者皆死長平其孤未壯可伐也王召昌國君樂間而問之對曰趙四戰之國也其民習兵伐之不可王曰吾以衆伐寡二而伐一可乎對曰不可王曰吾即以五而伐一可乎對曰不可燕王大怒羣臣皆以為可燕卒起二軍車二千乘栗腹將而攻鄗卿秦將而攻代廉頗為趙將破殺栗腹虜卿秦樂間十六年廉頗圍燕以樂乘為武襄君十七年假相大將武襄君攻燕圍其國十八年延陵鈞徐廣曰代郡有延陵縣率師從相國信平君助魏攻燕秦拔我榆次徐廣曰在太原三十七城十九年趙與燕易土以龍兌汾門徐廣曰在北新城臨樂徐廣曰方城有臨鄉與燕燕以葛武陽徐廣曰葛城在髙陽平舒徐廣曰在代郡與趙二十年秦王政初立秦拔我晉陽二十一年孝成王卒廉頗將攻繁陽徐廣曰在頓丘取之使樂乘代之廉頗攻樂乘樂乘走廉頗亡入魏子偃立是為悼襄王悼襄王元年大備徐廣曰一作修魏欲通平邑中牟之道不成二年李牧將攻燕拔武遂方城徐廣曰武遂屬安平秦召春平君因而留之泄鈞為之謂文信侯曰春平君者趙王甚愛之而郎中妬之故相與謀曰春平君入秦秦必留之故相與謀而內之秦也今君留之是絶趙而郎中之計中也君不如遣春平君而留平都春平君者言行信於王王必厚割趙而贖平都文信侯曰善因遣之徐廣曰年表云太子從質秦歸城韓皋三年龎暖將攻燕禽其將劇辛四年龎暖將趙楚魏燕之鋭師攻秦蕞徐廣曰在新豐不拔移攻齊取饒安徐廣曰在勃海又云饒屬北海安屬平原五年傳抵將居平邑慶舍將東陽河外師守河梁六年封長安君以饒魏與趙鄴九年趙攻燕取貍陽城兵未罷秦攻鄴拔之徐廣曰今饒陽在河間又年表曰拔閼與鄴九城悼襄王卒子幽繆王遷立幽繆王遷元年徐廣曰又云湣王世本云孝成王丹生悼襄王偃偃生今王遷年表及史考趙遷皆無諡城柏人二年秦攻武城徐廣曰年表云秦拔我平陽扈輒率師救之軍敗死焉三年秦攻赤麗宜安李牧率師與戰肥下却之封牧為武安君四年秦攻番吾李牧與之戰却之五年代地大動自樂徐以西徐廣曰一作除北至平隂臺屋墻垣大半壞地坼東西百三十步六年大飢民訛言曰趙為號秦為笑以為不信視地之生毛七年秦人攻趙趙大將李牧將軍司馬尚將擊之李牧誅司馬尚勉趙忽及齊將顔聚代之趙忽軍破顔聚亡去以王遷降八年十月邯鄲為秦淮南子曰趙王遷流於房陵思故鄉作為山木之謳聞之者莫不流涕太史公曰吾聞馮王孫曰趙王遷其母倡也徐廣曰列女傳曰邯鄲之倡嬖於悼襄王悼襄王廢適子嘉而立遷遷素無行信讒故誅其良將李牧用郭開豈不謬哉秦既虜遷趙之亡大夫共立嘉為王王代六歲秦進兵破嘉遂滅趙以為郡史記集解卷四十三
