body:
  text: 史記集解卷五十五宋裴駰撰史記五十五留侯世家第二十五留侯張良者其先韓人也大父開地應劭曰大父祖父開地名相韓昭侯宣惠王襄哀王父平相釐王悼惠王悼惠王二十三年平卒卒二十歲秦滅韓良年少未宦事韓韓破良家僮三百人弟死不葬悉以家財求客刺秦王為韓報仇以大父父五世相韓故良嘗學禮淮陽東見倉海君如淳曰秦郡縣無倉海或曰東夷君長得力士為鐵椎重百二十斤秦皇帝東游良與客狙服䖍曰狙伺候也狙七預反伺也徐廣曰伺候也音千恕反擊秦皇帝博浪沙中誤中副車秦皇帝大怒大索天下求賊甚急為張良故也良乃更名姓亡匿下邳良嘗閒從容步游下邳圯上徐廣曰圯橋也東楚謂之圯音怡有一老父衣褐至良所直墮其履圯下顧謂良曰孺子下取履良鄂然欲毆之徐廣曰一曰良怒欲罵之為其老彊忍下取履父曰履我良業為取履因長跪履之父以足受笑而去良殊大驚隨目之父去里所復還徐廣曰一曰為其老强忍下取履因進之父以足受笑而去良殊大驚父去里所復還曰孺子可教矣後五日平明與我㑹此良因怪之跪曰諾五日平明良往父已先在怒曰與老人期後何也去曰後五日早會五日雞鳴良往父又先在復怒曰後何也去曰後五日復早來五日良夜未半往有頃父亦來喜曰當如是出一編書徐廣曰編一作篇曰讀此則為王者師矣後十年興十三年孺子見我濟北榖城山下黃石即我矣遂去無他言不復見旦日視其書乃太公兵法也良因異之常習誦讀之居下邳為任俠項伯嘗殺人從良匿後十年陳涉等起兵良亦聚少年百餘人景駒自立為楚假王在留良欲往從之道遇沛公沛公將數千人略地下邳西遂屬焉沛公拜良為廏將漢書音義曰官名良數以太公兵法說沛公沛公善之常用其䇿良為他人言皆不省良曰沛公殆天授故遂從之不去見景駒及沛公之薛見項梁項梁立楚懷王良乃說項梁曰君已立楚後而韓諸公子橫陽君成賢可立為王益樹黨項梁使良求韓成立以為韓王以良為韓申徒徐廣曰即司徒耳但語音訛轉故字亦隨改與韓王將千餘人西略韓地得數城秦輒復取之往來為游兵潁川沛公之從雒陽南出轘轅良引兵從沛公下韓十餘城擊破楊熊軍沛公乃令韓王成留守陽翟與良俱南攻下宛西入武關沛公欲以兵二萬人擊秦嶢下軍徐廣曰嶢音堯良說曰秦兵尚彊未可輕臣聞其將屠者子賈豎易動以利願沛公且留壁使人先行為五萬人具食徐廣曰五一作百益為張旗幟諸山上為疑兵令酈食其持重寶啖秦將秦將果畔欲連和俱西襲咸陽沛公欲聼之良曰此獨其將欲畔耳恐士卒不從不從必危不如因其解擊之沛公乃引兵擊秦軍大破之遂北至藍田再戰秦兵竟敗遂至咸陽秦王子嬰降沛公沛公入秦宮宮室帷帳狗馬重寶婦女以千數意欲留居之樊噲諫沛公出舍沛公不聽徐廣曰一本噲諫曰沛公欲有天下耶將欲為富家翁耶沛公曰吾欲有天下噲曰今臣從入秦宫所觀宫室帷帳珠玉重寶鐘鼓之飾竒物不可勝極入其後宫美人婦女以千數此皆秦所以亡天下也願沛公急還霸上無留宫中沛公不聼良曰夫秦為無道故沛公得至此夫為天下除殘賊宜縞素為資晉灼曰資藉也欲沛公及秦奢秦服儉素以為籍也今始入秦即安其樂此所謂助桀為虐且忠言逆耳利於行毒藥苦口利於病願沛公聽樊噲言沛公乃還軍霸上項羽至鴻門下欲擊沛公項伯乃夜馳入沛公軍私見張良欲與俱去良曰臣為韓王送沛公今事有急亡去不義乃具以語沛公沛公大驚曰為將奈何良曰沛公誠欲倍項羽邪沛公曰鯫生徐廣曰呂靜曰鯫魚也音比垢反教我距關無內諸侯秦地可盡王故聽之良曰沛公自度能却項羽乎沛公默然良久曰固不能也今為奈何良乃固要項伯項伯見沛公沛公與飲為壽結賓婚令項伯具言沛公不敢倍項羽所以距關者備他盜也及見項羽後解語在項羽事中漢元年正月沛公為漢王王巴蜀漢王賜良金百鎰珠二斗良具以獻項伯漢王亦因令良厚遺項伯使請漢中地如淳曰本但與巴蜀故請漢中地項王乃許之遂得漢中地漢王之國良送至褒中遣良歸韓良因說漢王曰王何不燒絶所過棧道示天下無還心以固項王意乃使良還行燒絶棧道良至韓韓王成以良從漢王故項王不遣成之國從與俱東良說項王曰漢王燒絶棧道無還心矣乃以齊王田榮反書告項王項王以此無西憂漢心而發兵北擊齊項王竟不肯遣韓王乃以為侯又殺之彭城良亡間行歸漢王漢王亦已還定三秦矣復以良為成信侯從東擊楚至彭城漢敗而還至下邑漢王下馬踞鞍而問曰吾欲捐關以東等棄之誰可與共功者良進曰九江王黥布楚梟將與項王有郤彭越與齊王田榮反梁地此兩人可急使而漢王之將獨韓信可屬大事當一面即欲捐之捐之此三人則楚可破也漢王乃遣隨何說九江王布而使人連彭越及魏王豹反使韓信將兵擊之因舉燕代齊趙然卒破楚者此三人力也張良多病未嘗特將也常為畫䇿臣時時從漢王漢三年項羽急圍漢王滎陽漢王恐憂與酈食其謀撓楚權食其曰昔湯伐桀封其後於杞武王伐紂封其後於宋今秦失德棄義侵伐諸侯社稷滅六國之後使無立錐之地陛下誠能復立六國後世畢已受印此其君臣百姓必皆戴陛下之德莫不鄉風慕義願為臣妾德義已行陛下南鄉稱霸楚必斂衽而朝漢王曰善趣刻印先生因行佩之矣食其未行張良從外來謁漢王方食曰子房前客有為我計撓楚權者具以酈生語告於子房曰如何良曰誰為陛下畫此計者陛下事去矣漢王曰何哉張良對曰臣請藉前箸為大王籌之張晏曰求借所食之箸用指畫也或曰前世湯武著明之事以籌度今時之不若也曰昔者湯伐桀而封其後於杞者度能制桀之死命也今陛下能制項籍之死命乎曰未能也其不可一也武王伐紂封其後於宋者度能得紂之頭也今陛下能得項籍之頭乎曰未能也其不可二也武王入殷表商容之閭釋箕子之拘徐廣曰釋一作式拘一作囚封比干之墓今陛下能封聖人之墓表賢者之閭式智者之門乎曰未能也其不可三也發巨橋之粟散鹿臺之錢以賜貧窮今陛下能散府庫以賜貧窮乎曰未能也其不可四矣殷事已畢偃革為軒如淳曰革者革車也軒者赤黻乘軒也偃武備而治禮樂也倒置干戈覆以虎皮以示天下不復用兵今陛下能偃武行文不復用兵乎曰未能也其不可五矣休馬華山之陽示以無所為今陛下能休馬無所用乎曰未能也其不可六也放牛桃林之隂以示不復輸積今陛下能放牛不復輸積乎曰未能也其不可七矣且天下游士離其親戚棄墳墓去故舊從陛下游者徒欲日夜望咫尺之地今復六國立韓魏燕趙齊楚之後天下游士各歸事其主從其親戚反其故舊墳墓陛下與誰取天下乎其不可八矣且夫楚唯無彊六國立者復撓而從之漢書音義曰唯當使楚無彊彊則六國弱從之陛下焉得而臣之誠用客之謀陛下事去矣漢王輟食吐哺罵曰豎儒幾敗而公事令趣銷印漢四年韓信破齊而欲自立為齊王漢王怒張良說漢王漢王使良授齊王信印語在淮隂事中其秋漢王追楚至陽夏南戰不利而壁固陵諸侯期不至良說漢王漢王用其計諸侯皆至語在項籍事中漢六年正月封功臣良未嘗有戰鬭功高帝曰運籌䇿帷幄中決勝千里外子房功也自擇齊三萬户良曰臣始起下邳與上㑹留此天以臣授陛下陛下用臣計幸而時中臣願封留足矣不敢當三萬户乃封張良為留侯與蕭何等俱封六年上已封大功臣二十餘人其餘日夜爭功不決未得行封上在雒陽南宫從復道如淳曰復音復上下有道故謂之復道韋昭曰閣道望見諸將往往相與坐沙中語上曰此何語留侯曰陛下不知乎此謀反耳上曰天下屬安定何故反乎留侯曰陛下起布衣以此屬取天下今陛下為天子而所封皆蕭曹故人所親愛而所誅者皆生平所仇怨今軍吏計功以天下不足遍封此屬畏陛下不能盡封恐又見疑平生徐廣曰多作生平過失及誅故即相聚謀反耳上乃憂曰為之奈何留侯曰上平生所憎羣臣所共知誰最甚者上曰雍齒與我故漢書音義曰未起時有故怨數嘗窘辱我我欲殺之為其功多故不忍留侯曰今急先封雍齒以示羣臣羣臣見雍齒封則人人自堅矣於是上乃置酒封雍齒為什方侯而急趣丞相御史定功行封羣臣罷酒皆喜曰雍齒尚為侯我屬無患矣劉敬說高帝曰都關中上疑之左右大臣皆山東人多勸上都雒陽雒陽東有成臯西有殽黽倍河向伊雒其固亦足恃留侯曰雒陽雖有此固其中小不過數百里田地薄四面受敵此非用武之國也夫關中左殽函右隴蜀沃野千里南有巴蜀之饒北有胡宛之利阻三面而守獨以一面東制諸侯諸侯安定河渭漕挽天下西給京師諸侯有變順流而下足以委輸此所謂金城千里天府之國也劉敬說是也於是高帝即日駕西都關中留侯從入關留侯性多病即道引不食榖漢書音義曰服辟穀之藥而靜居行氣杜門不出歲餘上欲廢太子立戚夫人子趙王如意大臣多諫爭未能得堅決者也吕后恐不知所為人或謂吕后曰留侯善畫計䇿上信用之吕后乃使建成侯吕澤劫留侯曰君常為上謀臣今上欲易太子君安得髙枕而卧乎留侯曰始上數在困急之中幸用臣策今天下安定以愛欲易太子骨肉之間雖臣等百餘人何益吕澤強要曰為我畫計留侯曰此難以口舌爭也顧上有不能致者天下有四人四人者年老矣皆以為上慢侮人故逃匿山中義不為漢臣然上髙此四人今公誠能無愛金玉璧帛令太子為書卑辭安車因使辨士固請宜來來以為客時時從入朝令上見之則必異而問之問之上知此四人賢則一助也於是吕后令吕澤使人奉太子書卑辭厚禮迎此四人四人至客建成侯所漢十一年黥布反上病欲使太子將往擊之四人相謂曰凡來者將以存太子太子將兵事危矣乃說建成侯曰太子將兵有功則位不益太子無功還則從此受禍矣且太子所與俱諸將皆嘗與上定天下梟將也今使太子將之此無異使羊將狼也皆不肯為盡力其無功必矣臣聞母愛者子抱今戚夫人日夜侍御趙王如意常抱居前上曰終不使不肖子居愛子之上明乎其代太子位必矣君何不急請吕后承間為上泣言黥布天下猛將也善用兵今諸將皆陛下故等夷徐廣曰夷猶儕也乃令太子將此屬無異使羊將狼莫肯為用且使布聞之則鼓行而西耳晋灼曰鼓行而西言無所畏也上雖病强載輜車臥而護之諸將不敢不盡力上雖苦為妻子自彊於是吕澤立夜見吕后吕后承間為上泣涕而言如四人意上曰吾惟豎子固不足遣而公自行耳於是上自將兵而東羣臣居守皆送至灞上留侯病自彊起至曲郵司馬彪曰長安縣東有曲郵聚見上曰臣宜從病甚楚人剽疾願上無與楚人爭鋒因說上曰令太子為將軍監關中兵上曰子房雖病彊臥而傅太子是時叔孫通為太傅留侯行少傅事漢十二年上從擊破布軍歸疾益甚愈欲易太子留侯諫不聼因疾不視事叔孫太傅稱說引古今以死爭太子上詳許之猶欲易之及燕置酒太子侍四人從太子年皆八十有餘鬚眉皓白衣冠甚偉上怪之問曰彼何為者四人前對各言名姓曰東園公甪里先生綺里季夏黃公上乃大驚曰吾求公數歲公辟逃我今公何自從吾兒游乎四人皆曰陛下輕士善罵臣等義不受辱故恐而亡匿竊聞太子為人仁孝恭敬愛士天下莫不延頸欲為太子死者故臣等來耳上曰煩公幸卒調護太子如淳曰調護猶營護也四人為壽已畢趨去上目送之召戚夫人指示四人者曰我欲易之彼四人輔之羽翼已成難動矣吕后真而主矣戚夫人泣上曰為我楚舞吾為若楚歌歌曰鴻鵠高飛一舉千里羽翮已就橫絶四海橫絶四海當可奈何雖有矰繳韋昭曰繳弋射也其矢曰矰尚安所施歌數闋戚夫人噓唏流涕上起去罷酒竟不易太子者留侯本招此四人之力也留侯從上擊代出竒計馬邑下徐廣曰一云出竒計下馬邑及立蕭何相國漢書音義曰何時未為相國高祖立之所與上從容言天下事甚衆非天下所以存亡故不著留侯乃稱曰家世相韓及韓滅不愛萬金之資為韓報讎彊秦天下振動今以三寸舌為帝者師封萬戶位列侯此布衣之極於良足矣願棄人間事欲從赤松子游耳乃學辟榖道引輕身徐廣曰一云乃學道引欲輕舉也㑹高帝崩吕后德留侯乃强食之曰人生一世間白駒過隙何至自苦如此乎留侯不得已彊聽而食後八年卒諡為文成侯子不疑代侯徐廣曰文成侯十六年卒子不疑代立十年坐與門大夫吉謀殺故楚內史當死贖為城旦國除子房始所見下邳圯上老父與太公書者後十三年從高祖過濟北果見榖城山下黃石取而葆祠之徐廣曰史記珍寶字皆作葆留侯死并葬黃石冢每上冢伏臘祠黃石留侯不疑孝文帝五年坐不敬國除太史公曰學者多言無鬼神然言有物至如留侯所見老父豫書亦可怪矣高祖離困者數矣而留侯常有功力焉豈可謂非天乎上曰夫運籌策帷帳之中決勝千里之外吾不如子房余以為其人計魁梧竒偉應劭曰魁梧丘虛壯大之意至見其圖狀貌如婦人好女蓋孔子曰以貌取人失之子羽留侯亦云史記集解卷五十五
