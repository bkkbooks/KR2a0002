body:
  text: 史記集解卷一百十五宋裴駰撰史記一百十五朝鮮列傳第五十五張晏曰朝鮮有濕水洌水汕水三水合為洌水疑樂浪朝鮮取名於此也朝鮮王滿者故燕人也自始全燕時嘗略屬真番徐廣曰一作莫遼東有番汙縣番音普塞反朝鮮為置吏築鄣塞秦滅燕屬遼東外徼漢興為其逺難守復修遼東故塞至浿水為界漢書音義口浿音滂沛反屬燕燕王盧綰反入匈奴滿亡命聚黨千餘人魋結蠻夷服而東走出塞度浿水居秦故空地上下鄣稍役屬真番朝鮮蠻夷及故燕齊亡命者王之都王險徐廣曰昌黎有險瀆縣也㑹孝惠高后時天下初定遼東太守即約滿為外臣保塞外蠻夷無使盜邉諸蠻夷君長欲入見天子勿得禁止以聞上許之以故滿得兵威財物侵降其旁小邑真番臨屯皆來服屬方數千里傳子至孫右渠所誘漢亡人滋多又未嘗入見真番旁衆國欲上書見天子又擁閼不通元封二年漢使渉何誘諭右渠終不肯奉詔何去至界上臨浿水使御刺殺送何者朝鮮禆王長即度馳入塞遂歸報天子曰殺朝鮮将上為其名美即不詰拜何為遼東東部都尉朝鮮怨何發兵襲攻殺何天子募罪人撃朝鮮其秋遣樓船将軍楊僕從齊浮渤海兵五萬人左将軍荀彘出遼東討右渠右渠發兵距險左将軍卒正多率遼東兵先縱敗散多還走坐法斬樓船将軍将齊兵七千人先至王險右渠城守窺知樓船軍少即出城撃樓船樓船軍敗散走将軍楊僕失其衆遁山中十餘日稍求收散卒復聚左将軍撃朝鮮浿水西軍未能破自前天子為兩将未有利乃使衛山因兵威往諭右渠右渠見使者頓首謝願降恐兩将詐殺臣今見信節請服降遣太子入謝獻馬五千匹及饋軍糧人衆萬餘持兵方渡浿水使者及左将軍疑其為變謂太子已服降宜命人毋持兵太子亦疑使者左将軍詐殺之遂不渡浿水復引歸山還報天子天子誅山左将軍破浿水上軍乃前至城下圍其西北樓船亦住㑹居城南右渠遂堅守城數月未能下左将軍素侍中幸将燕代卒悍乘勝軍多驕樓船将齊卒入海固已多敗亡其先與右渠戰困辱亡卒卒皆恐将心慙其圍右渠常持和節左将軍急擊之朝鮮大臣乃隂間使人私約降樓船往來言尚未肯決左将軍數與樓船期戰樓船欲急就其約不㑹左将軍亦使人求間郤降下朝鮮朝鮮不肯心附樓船以故兩将不相能左将軍心意樓船前有失軍罪今與朝鮮私善而又不降疑其有反計未敢發天子曰将率不能前及使衛山諭降右渠右渠遣太子山使不能剸決與左将軍計相誤卒沮約今兩将圍城又乖異以故乆不決使濟南太守公孫遂往征之有便宜得以從事遂至左将軍曰朝鮮當下乆矣不下者有狀言樓船數期不㑹具以素所意告遂曰今如此不取恐為大害非獨樓船又且與朝鮮共滅吾軍遂亦以為然而以節召樓船将軍入左将軍營計事即命左将軍麾下執捕樓船将軍并其軍以報天子天子誅遂左将軍已并兩軍即急擊朝鮮朝鮮相路人相韓隂尼谿相參将軍王唊漢書音義曰凡五人也戎狄不知官紀故皆稱相唊音頰相與謀曰始欲降樓船樓船今執獨左将軍并将戰益急恐不能與戰王又不肯降隂唊路人皆亡降漢路人道死元封三年夏尼谿相參乃使人殺朝鮮王右渠來降王險城未下故右渠之大臣成已又反復攻吏左将軍使右渠子長徐廣曰表云長路漢書表云長路音各降相路人之子最告諭其民誅成已以故遂定朝鮮為四郡真番臨屯樂浪𤣥菟也封參為澅清侯韋昭曰屬齊隂為荻苴侯韋昭曰屬勃海唊為平州侯韋昭曰屬梁父長為㡬侯韋昭曰屬河東最以父死頗有功為温陽侯韋昭曰屬齊左将軍徴至坐爭功相嫉乖計棄市樓船将軍亦坐兵至列口當待左将軍擅先縱失亡多當誅贖為庶人太史公曰右渠負固國以絶祀涉何誣功為兵發首樓船将狹徐廣曰言其所将卒狹少及難離咎悔失番禺乃反見疑荀彘爭勞與遂皆誅兩軍俱辱将率莫侯矣史記集解卷一百十五
