body:
  text: 史記集解巻二十九宋裴駰撰史記二十九河渠第七夏書曰禹抑鴻水十三年過家不入門陸行載車水行載舟泥行蹈毳山行即橋徐廣曰橋近遥反一作􅞬􅞬直轅車也音已足反尸子曰山行乗樏音力追反尸子又曰行塗以楯行險以撮行沙以軌又曰乗風車音去喬反以别九州隨山浚川任土作貢通九道陂九澤度九山然河菑衍溢害中國也尤甚唯是為務故道河自積石厯龍門南到華隂東下砥柱及孟津雒汭至於大邳於是禹以為河所從來者高水湍悍韋昭曰湍疾悍强也難以行平地數為敗乃厠二渠以引其河漢書音義曰廁分也二渠其一出貝丘西南二折者也其一則漯川北載之高地過降水至于大陸播為九河同為逆河入于勃海瓉曰禹貢曰夾右碣石入于海然則河口之入海乃在碣石也武帝元光二年河徙東郡更注勃海禹時不注勃海也九川既疏九澤既灑諸夏艾安功施於三代自是之後滎陽下引河東南為鴻溝以通宋鄭陳蔡曹衛與濟汝淮泗會於楚西方則通渠漢水雲夢之野東方則通鴻溝江淮之間於吳則通渠三江五湖韋昭曰五湖湖名耳實一湖今太湖是也在吳西南於齊則通菑濟之間於蜀蜀守冰漢書曰冰姓李鑿離碓晉灼曰古堆字辟沬水之害穿二江成都之中此渠皆可舟行有餘則用溉浸百姓饗其利至於所過往往引其水益用溉田疇之渠以萬億計然莫足數也西門豹引漳水溉鄴以富魏之河内而韓聞秦之好興事欲罷之毋令東伐如淳曰欲罷勞之息秦伐韓之計乃使水工鄭國韋昭曰鄭國能治水故曰水工閒說秦令鑿涇水自中山西邸瓠口為渠竝北山東注洛徐廣曰出馮翊懷徳縣三百餘里欲以溉田中作而覺秦欲殺鄭國鄭國曰始臣為閒然渠成亦秦之利也秦以為然卒使就渠渠就用注填閼之水溉澤鹵之地四萬餘頃收皆畆一鍾於是闗中為沃野無凶年秦以富疆卒并諸侯因命曰鄭國渠漢興三十九年孝文時河決酸棗東潰金隄於是東郡大興卒塞之其後四十有餘年今天子元光之中而河決扵瓠子東南注鉅野通於淮泗於是天子使汲黯鄭當時興人徒塞之輒復壞是時武安侯田蚡為丞相其奉邑食鄃鄃居河北河決而南則鄃無水菑邑收多蚡言於上曰江河之決皆天事未易以人力為彊塞塞之未必應天而望氣用數者亦以為然於是天子久之不事復塞也是時鄭當時為大農言曰異時闗東漕粟從渭中上度六月而罷而漕水道九百餘里時有難處引渭穿渠起長安竝南山下至河三百餘里徑易漕度可令三月罷而渠下民田萬餘頃又可得以溉田此損漕省卒而益肥闗中之地得穀天子以為然令齊人水工徐伯表悉發卒徐廣曰一云悉衆數萬人穿漕渠三嵗而通通以漕大便利其後漕稍多而渠下之民頗得以溉田矣其後河東守番係言漕從山東西嵗百餘萬石更砥柱之限敗亡甚多而亦頗費穿渠引汾溉皮氏汾隂下引河溉汾隂蒲阪下度可得五千頃五千頃故盡河壖韋昭曰音而緣反謂緣河邉地棄地民茭牧其中耳今溉田之度可得穀二百萬石以上穀從渭上與闗中無異而砥柱之東可無復漕天子以為然發卒數萬人作渠田數嵗河移徙渠不利則田者不能償種久之河東渠田廢予越人令少府以為稍入如淳曰時越人有徙者以田與之其租稅入少府其後人有上書欲通裦斜道韋昭曰裦中縣也斜谷名名音邪瓉曰裦斜二水及漕事下御史大夫張湯湯問其事因言抵蜀從故道故道多阪回逺今穿裦斜道少阪近四百里而裦水通沔斜水通渭皆可以行舩漕漕從南湯上沔入裦裦之絶水至斜間百餘里以車轉從斜下下渭如此漢中之穀可致山東從沔無限便於砥柱之漕且襃斜材木竹箭之饒擬於巴蜀天子以為然拜湯子卭為漢中守發數十萬人作裦斜道五百餘里道果便近而水湍石徐廣曰湍一作溲不可漕其後莊熊羆言臨晉民願穿洛以溉重泉以東萬餘頃故鹵地誠得水可令畆十石於是為發兵萬餘人穿渠自徵引洛水至商顔下服䖍曰顔音崖應劭曰名徵在馮翊或曰商顏山岸善崩如淳曰洛水岸乃鑿井深者四十餘丈往往為井井下相通行水水頽以絶商顔瓉曰下流曰頽東至山嶺十餘里間井渠之生自此始穿渠得龍骨故名曰龍首渠作之十餘嵗渠頗通猶未得其饒自河決瓠子後二十餘嵗嵗因以數不登而梁楚之地尤甚天子既封禪巡祭山川其明年旱乾封少雨天子乃使汲仁郭昌發卒數葛人塞瓠子決於是天子已用事萬里沙則還自臨決河沈白馬玉璧於河令羣臣從官自將軍已下皆負薪寘決河是時東流郡燒草以故薪柴少而下淇園之竹晉灼曰衛之苑也多竹篠以為揵如淳曰樹竹塞水決之口稍稍布插接樹之水稍弱補令密謂之揵以草塞其裏乃以土填之有石以石為之天子乃臨河決悼功之不成乃作歌曰瓠子決兮將奈何皓皓旴旴兮閭殫為河如淳曰殫盡也駰謂州閭盡為河殫為河兮地不得寧功無已時兮吾山平徐廣曰東郡東阿有魚山或者是乎駰案如淳曰恐水漸山使平也韋昭曰鑿山以填河也吾山平兮鉅野溢如淳曰瓠子決灌鉅野澤使溢也魚沸鬱兮柏冬日徐廣曰柏猶迫也冬日行天邊若與水相連矣駰案漢書音義曰鉅野滿溢則衆魚沸鬱而滋長也迫冬日乃止延道弛兮離常流徐廣曰延一作正駰案晉灼曰言河道皆弛壊蛟龍騁兮方逺遊歸舊川兮神哉沛瓉曰水還舊道則羣害消除神祐滂沛不封禪兮安知外為我謂河伯兮何不仁泛濫不止兮愁吾人齧桑浮兮淮泗滿張晏曰齧桑地名也如淳曰邑名為水所浮漂久不反兮水維緩一曰河湯湯兮激潺湲北渡迃兮浚流難搴長茭兮沈美玉如淳曰搴取也茭草也音郊一曰茭竿也取長竿樹之用著石間以塞決河瓉曰竹葦絙謂之茭下所以引致土石者也河伯許兮薪不屬如淳曰旱燒故薪不足薪不屬兮衛人罪燒蕭條兮噫乎何以禦水頽林竹兮楗石菑如淳曰河決楗不能禁故言菑韋昭曰楗柱也木立死曰菑宣房塞兮萬福來於是卒塞瓠子築宫其上名曰宣房宫而道河北行二渠復禹舊迹而梁楚之地復寧無水災自是之後用事者爭言水利朔水西河河西酒泉皆引河及川谷以溉田而闗中輔渠靈軹如淳曰地理志􅉦厔有靈軹渠引堵水徐廣曰一作諸川汝南九江引淮東海引鉅定瓉曰鉅定澤名太山下引汶水皆穿渠為溉田各萬餘頃佗小渠披山通道者不可勝言然其著者在宣房太史公曰余南登廬山觀禹疏九江遂至於會稽太湟徐廣曰一作溼上姑蘇望五湖東闚洛汭大邳迎河行淮泗濟漯洛渠西瞻蜀之岷山及離碓北自龍門至于朔方曰甚哉水之為利害也余從負薪塞宣房悲瓠子之詩而作河渠書徐廣曰溝洫志行田二百畆分賦田與一夫二百畆以田惡故更嵗耕之史記集解卷二十九
