body:
  text: 史記集解卷八十宋裴駰撰史記八十樂毅列傳第二十樂毅者其先祖曰樂羊樂羊為魏文侯將伐取中山魏文侯封樂羊以靈夀徐廣曰屬常山樂羊死葬於靈夀其後子孫因家焉中山復國至趙武靈王時復滅中山而樂氏後有樂毅樂毅賢好兵趙人舉之及武靈王有沙丘之亂徐廣曰趙有沙丘宮近鉅鹿乃去趙適魏聞燕昭王以子之之亂而齊大敗燕燕昭王怨齊未嘗一日而忘報齊也燕國小辟逺力不能制於是屈身下士先禮郭隗以招賢者樂毅於是為魏昭王使於燕燕王以客禮待之樂毅辭讓遂委質為臣燕昭王以為亞卿久之當是時齊湣王彊南敗楚相唐昧於重丘西摧三晉於觀津遂與三晉擊秦助趙滅中山破宋廣地千餘里與秦昭王爭重為帝已而復歸之諸侯皆欲背秦而服於齊湣王自矜百姓弗堪於是燕昭王問伐齊之事樂毅對曰齊霸國之餘業也地大人衆未易獨攻也王必欲伐之莫如與趙及楚魏於是使樂毅約趙惠文王别使連楚魏令趙嚪秦徐廣曰嚪進説之意以伐齊之利諸侯害齊湣王之驕㬥皆爭合從與燕伐齊樂毅還報燕昭王悉起兵使樂毅為上將軍趙惠文王以相國印授樂毅樂毅於是并䕶趙楚韓魏燕之兵以伐齊破之濟西諸侯兵罷歸而燕軍樂毅獨追至于臨菑齊湣王之敗濟西亡走保於莒樂毅獨留徇齊齊皆城守樂毅攻入臨菑盡取齊寶財物祭器輸之燕燕昭王大說親至濟上勞軍行賞饗士封樂毅於昌國徐廣曰屬齊號為昌國君於是燕昭王收齊鹵獲以歸而使樂毅復以兵平齊城之不下者樂毅留徇齊五歲下齊七十餘城皆為郡縣以屬燕唯獨莒即墨未服會燕昭王死子立為燕惠王惠王自為太子時嘗不快於樂毅及即位齊之田單聞之乃縱反間於燕曰齊城不下者兩城耳然所以不早拔者聞樂毅與燕新王有隙欲連兵且留齊南靣而王齊齊之所患唯恐他將之來於是燕惠王固已疑樂毅得齊反間乃使騎劫代將而召樂毅樂毅知燕惠王之不善代之畏誅遂西降趙趙封樂毅於觀津號曰望諸君尊寵樂毅以警動於燕齊齊田單後與騎劫戰果設詐誑燕軍遂破騎劫於即墨下而轉戰逐燕北至河上盡復得齊城而迎襄王於莒入于臨菑燕惠王後悔使騎劫代樂毅以故破軍亡將失齊又怨樂毅之降趙恐趙用樂毅而乗燕之弊以伐燕燕惠王乃使人讓樂毅且謝之曰先王舉國而委將軍將軍為燕破齊報先王之讎天下莫不震動寡人豈敢一日而忘將軍之功哉會先王棄羣臣寡人新即位左右誤寡人寡人之使騎劫代將軍為將軍久㬥露於外故召將軍且休計事將軍過聽以與寡人有隙遂捐燕歸趙將軍自為計則可矣而亦何以報先王之所以遇將軍之意乎樂毅報遺燕惠王書曰臣不佞不能奉承王命以順左右之心恐傷先王之明有害足下之義故遁逃走趙今足下使人數之以罪臣恐侍御者不察先王之所以畜幸臣之理又不白臣之所以事先王之心故敢以書對臣聞賢聖之君不以禄私親其功多者賞之其能當者處之故察能而授官者成功之君也論行而結交者立名之士也臣竊觀先王之舉也見有高世主之心故假節於魏以身得察於燕先王過舉厠之賓客之中立之羣臣之上不謀父兄以為亞卿臣竊不自知自以為奉令承教可幸無罪故受令而不辭先王命之曰我有積怨深怒於齊不量輕弱而欲以齊為事臣曰夫齊霸國之餘業而最勝之遺事也練於兵甲習於戰攻王若欲伐之必與天下圖之與天下圖之莫若結於趙且又淮北宋地楚魏之所欲也趙若許而約四國攻之齊可大破也先王以為然具符節南使臣於趙顧反命起兵擊齊以天之道先王之靈河北之地隨先王而舉之濟上濟上之軍受命擊齊大敗齊人輕卒鋭兵長驅至國齊王遁而走莒僅以身免珠玉財寶車甲珍器盡收入于燕齊器設於寧臺大呂陳於元英故鼎反乎磨室徐廣曰磨厯也薊丘之植植於汶篁徐廣曰竹田曰篁謂燕之疆界移於齊之汶水自五伯已來功未有及先王者也先王以為慊於志故裂地而封之使得比小國諸侯臣竊不自知自以為奉命承教可幸無罪是以受命不辭臣聞賢聖之君功立而不廢故著於春秋蚤知之士名成而不毁故稱於後世若先王之報怨雪恥夷萬乗之彊國收八百歲之蓄積及至棄羣臣之日餘教未衰執政任事之臣修法令慎庶孽施及乎萌𨽻皆可以教後世臣聞之善作者不必善成善始者不必善終昔伍子胥說聽於闔閭而呉王逺迹至郢夫差弗是也賜之鴟夷而浮之江呉王不寤先論之可以立功故沈子胥而不悔子胥不早見主之不同量是以至於入江而不化夫免身立功以明先王之迹臣之上計也離毁辱之誹謗墮先王之名臣之所大恐也臨不測之罪以幸為利義之所不敢出也臣聞古之君子交絶不出惡聲忠臣去國不絜其名臣雖不佞數奉教於君子矣恐侍御者之親左右之説不察疏逺之行故敢獻書以聞唯君王之留意焉夏侯𤣥曰觀樂生遺燕惠王書其殆庶乎知機合道以禮始終者與又其喻昭王曰伊尹放太甲而不疑太甲受放而不怨是存大業於至公而以天下為心者也夫欲極道德之量務以天下為心者必致其主於盛隆合其趣於先王茍君臣同符則大業定矣于斯時也樂生之志千載一遇夫千載一遇之世亦將行千載一隆之道豈其局迹當時止於兼并而已哉夫兼并者非樂生之所屑彊燕而廢道又非樂生之所求不屑茍利心無近事不求小成斯意兼天下者也則舉齊之事所以運其機而動四海也夫討齊以明燕王之義此兵不興於為利矣圍城而害不加於百姓此仁心著於遐邇矣舉國不謀其功除㬥不以威力此至徳全於天下矣邁全徳以率列國則㡬於湯武之事矣樂生方拻大綱以縱二城收民明信以待其弊將使即墨莒人顧仇其上願釋干戈賴我猶親善守之智無所施之然則求仁得仁即墨大夫之義仕窮則從微子適周之道間彌廣之路以待田單之徒長容善之風以申齊士之志使夫忠者遂節勇者義著昭之東海屬之華裔我澤如春民應如草道光宇宙賢智託心鄰國傾慕四海延頸思戴燕主仰望風聲二城必從則王業隆矣雖淹留於两邑乃致速於天下也不幸之變世所不圖敗於垂成時運固然若乃逼之以威劫之以兵攻取之事求欲速之功使燕齊之士流血於二城之下奓殺傷之殘以示四海之人是縱㬥易亂以成其私鄰國望之其猶豺虎旣大墮稱兵之義而䘮濟溺之仁且虧齊士之節廢㢘善之風掩宏通之度棄王德之隆雖二城㡬於可拔霸王之事逝其逺矣然則燕雖兼齊其與世主何以殊哉其與鄰國何以相傾樂生豈不知拔二城之速了哉顧城拔而業乖也豈不慮不速之致變哉顧業乖與變同繇是觀之樂生之不屠二城未可量也於是燕王復以樂毅子樂間為昌國君而樂毅徃來復通燕趙以為客卿樂毅卒於趙張華曰望諸君冢在邯鄲西數里樂閒居燕三十餘年燕王喜用其相栗腹之計欲攻趙而問昌國君樂間樂間曰趙四戰之國也其民習兵伐之不可燕王不聽遂伐趙趙使㢘頗擊之大破栗腹之軍於鄗擒栗腹樂乗樂乗者樂間之宗也於是樂間奔趙趙遂圍燕燕重割地以與趙和趙乃解而去燕王恨不用樂間樂間旣在趙乃遺樂間書曰紂之時箕子不用犯諌不怠以冀其聽商容不達身祗辱焉以冀其變及民志不入獄囚自出然後二子退隱故紂負桀㬥之累二子不失忠聖之名何者其憂患之盡矣今寡人雖愚不若紂之㬥也燕民雖亂不若殷民之甚也室有語不相盡以告鄰里二者寡人不為君取也樂間樂乗怨燕不聽其計二人卒留趙趙封樂乗為武襄君其明年樂乗㢘頗為趙圍燕燕重禮以和乃解後五歲趙孝成王卒襄王使樂乗代㢘頗㢘頗攻樂乗樂乗走㢘頗亡入魏其後十六年而秦滅趙其後二十餘年高帝過趙問樂毅有後世乎對曰有樂叔高帝封之樂鄉徐廣曰在北新城號曰華城君華城君樂毅之孫也而樂氏之族有樂瑕公樂臣公一作巨公趙且為秦所滅亡之齊高密樂臣公善修黃帝老子之言顯聞於齊稱賢師太史公曰始齊之蒯通及主父偃讀樂毅之報燕王書未嘗不廢書而泣也樂臣公學黃帝老子其本師號曰河上丈人不知其所出河上丈人教安期生安期生教毛翕公毛翕公教樂瑕公樂瑕公教樂臣公樂臣公教葢公葢公教於齊高密膠西為曹相國師史記集解卷八十
