body:
  text: 史記集解正史類提要臣等謹案史記集解一百三十卷宋裴駰撰駰字龍駒河東聞喜人官至中郎外兵曹參軍事迹附見宋書裴松之傳駰以徐廣音義麤有發明殊恨省畧乃采九經諸史并漢書音義及衆書之目别撰此書其所引證多先儒舊説張守節正義嘗備述所引書目次然如國語多引虞翻注孟子多引劉熙注韓詩多引薛君注而守節未著於目知當日援据浩博守節不能遍數也原本八十卷隋唐志著録並同此本為毛氏汲古閣所刋析為一百三十卷原第遂不可考然注文猶仍舊本自明代監本以索隱正義附入其後又妄加刪削訛舛遂多如五帝本紀昔高陽氏有才子八人句下髙辛氏有才子八人句下均脱名見左傳四字秦始皇本紀輕車重馬東就食句下脱徐廣曰一無此重字八字項羽本紀其九月會稽守句下脱徐廣曰爾時未言太守九字武席紀祠上帝明堂句下脱徐廣曰常五年一修耳今適二年故但祀明堂十八字然其效可覩矣句下脱又數本皆無可字七字河渠書岸善崩句下脱如淳曰河水岸六字司馬相如傳傍徨乎海外句下此引郭璞云青邱山名上有田亦有國出九尾狐在海外太史公自序易大𫝊句下此引張晏曰謂易繫辭監本均誤作正義至於字句異同前後互見如夏本紀九江入賜大龜句下孔安國曰出於九江水中監本作山中孝文本紀昌至渭橋句下引蘇林曰在長安北三里監本多渭橋二字祁侯賀為將軍句下引徐廣曰姓繒監本多一賀字當有玉英見句下引瑞應圖云玉英五帝並修則見監本作五常案此似以監本為是屬國悍為將屯將軍句下引徐廣曰姓徐監本多一賀字孝景本紀封故御史大夫周苛孫平為繩侯句下引徐廣曰一作應監本多一平字武帝紀自太主句下引徐廣曰武帝姑也監本多太主二字龜䇿列傳蝟辱於􅍎句下引郭璞曰蝟憎其意心惡之也監本作而心惡之凡此之類當由古注簡質後人以意為增益己失其舊至坊本流傳脱誤尤甚如夏本紀澧水所同句下引孔安國曰澧水所同同於渭也坊本缺一同字項羽本紀乃封項伯為射陽侯句下脱徐廣曰項伯名纒字伯九字是又出監本下矣惟貨殖傳蘖麴鹽豉千瓵句下監本引孫叔敖云瓵器受斗六升合為瓵音貽當是孫叔然之訛此本亦復相同是校讐亦不免有疎然終勝元豐合併之本也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀史記集解序班固有言曰司馬遷據左氏國語采世本戰國策述楚漢春秋接其後事訖於天漢其言秦漢詳矣至於采經摭傳分散數家之事甚多疏略或有抵捂亦其所涉獵者廣博貫穿經傳馳騁古今上下數千載間斯已勤矣又其是非頗謬於聖人論大道則先黄老而後六經序游俠則退處士而進姦雄述貨殖則崇勢利而羞貧賤此其所蔽也然自劉向揚雄博極羣書皆稱遷有良史之才服其善序事理辯而不華質而不俚其文直其事核不虚美不隱惡故謂之實録駰以為固之所言世稱其當雖時有紕繆實勒成一家總其大較信命世之宏才也考挍此書文句不同有多有少莫辯其實而世之惑者定彼從此是非相􅐙真偽舛雜故中散大夫東莞徐廣研核衆本為作音義具列異同兼述訓解麄有所發明而殊恨省略聊以愚管增演徐氏采經傳百家并先儒之説豫是有益悉皆抄内刪其㳺辭取其要實或義在可疑則數家兼列漢書音義稱臣瓚者莫知氏姓今直云瓚曰又都無姓名者但云漢書音義時見㣲意有所裨補譬嘒星之繼朝陽飛塵之集華嶽以徐為本號曰集解未詳則闕弗敢臆説人心不同聞見異辭班氏所謂疏略抵捂者依違不悉辯也愧非胥臣之多聞子産之博物妄言末學蕪穢舊史豈足以關諸蓄德庶賢無所用心而已
