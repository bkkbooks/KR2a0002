body:
  text: 史記集解卷二十四宋裴駰撰史記二十四樂書第二太史公曰余每讀虞書至於君臣相敇維是幾安而股肱不良萬事墮壞未嘗不流涕也成王作頌推已懲艾悲彼家難可不謂戰戰恐懼善守善終哉君子不為約則修德滿則棄禮佚能思初安能維始沐浴膏澤而歌詠勤苦非大德誰能如斯傳曰治定功成禮樂乃興海内人道益深其德益至所樂者益異滿而不損則溢盈而不持則傾凡作樂者所以節樂君子以謙退為禮以損減為樂樂其如此也以為州異國殊情習不同故博采風俗協比聲律以補短移化助流政教天子躬於明堂臨觀而萬民咸蕩滌邪穢斟酌飽滿以飾厥性故云雅頌之音理而民正嘄噭之聲興而士奮鄭衞之曲動而心淫及其調和諧合鳥獸盡感而況懷五常含好惡自然之勢也治道虧缺而鄭音興起封君世辟名顯鄰州爭以相高自仲尼不能與齊優遂容於魯雖退正樂以誘世作五章以刺時猶莫之化陵遲以至六國流沔沈佚遂往不返卒於喪身滅宗并國於秦秦二世尤以為娛丞相李斯進諫曰放棄詩書極意聲色祖伊所以懼也輕積細過恣心長夜紂所以亡也趙高曰五帝三王樂各殊名示不相襲朝廷下至人民得以接歡喜合殷勤非此和說不通解澤不流亦各一世之化度時之樂何必華山之騄耳而後行逺乎二世然之高祖過沛詩三侯之章令小兒歌之高祖崩令沛得以四時歌儛宗廟孝惠孝文孝景無所增更於樂府習常𨽻舊而已至今上即位作十九章令侍中李延年次序其聲拜為協律都尉通一經之士不能獨知其辭皆集會五經家相與共講習讀之乃能通知其意多爾雅之文漢家常以正月上辛祠太一甘泉以昏時夜祠到明而終常有流星經於祠壇上使僮男僮女七十人俱歌春歌青陽夏歌朱明瓉曰爾雅云春曰青陽夏曰朱明秋歌西皥韋昭曰西方少皥也冬歌𤣥冥世多有故不論又嘗得神馬渥洼水中李斐曰南陽新野有暴利長當武帝時遭刑屯田墩煌界人數於此水旁見羣野馬中有奇異者與凡馬異來飲此水傍利長先為土人持勒靽於水傍後馬玩習久之代土人持勒靽収得其馬獻之欲神異此馬云從水中出蘇林曰洼音窪曲之窐也復次以為太一之歌歌曲曰太一貢兮天馬下霑赤汗兮沫流赭應劭曰大宛馬汗血霑濡也流沫如赭騁容與兮跇萬里孟康曰跇音逝如淳曰跇謂超踰也今安匹兮龍為友後伐大宛得千里馬馬名蒲梢應劭曰大宛舊有天馬種蹋石汗血汗從前肩膊出如血號一日千里次作以為歌歌詩曰天馬來兮從西極經萬里兮歸有德承靈威兮降外國涉流沙兮四夷服中尉汲黯進曰凡王者作樂上以承祖宗下以化兆民今陛下得馬詩以為歌協於宗廟先帝百姓豈能知其音邪上黙然不說丞相公孫𢎞曰黯誹謗聖制當族凡音之起由人心生也人心之動物使之然也感於物而動故形於聲鄭𤣥曰宫商角徵羽雜比曰音單出曰聲形猶見也王肅曰物事也謂哀樂喜怒和敬之事感人而動見於聲聲相應故生變鄭𤣥曰樂之器彈其宫則衆宫應然而不足樂是以變之使雜也變成方謂之音鄭𤣥曰方猶文章比音而樂之及干戚羽旄謂之樂也鄭𤣥曰干楯也戚斧也武舞所執也羽翟羽也旄旄牛尾文舞所執也樂者音之所由生也其本在人心感於物也是故其哀心感者其聲噍以殺鄭𤣥曰噍踧也其樂心感者其聲嘽以緩鄭𤣥曰嘽寛綽之貎其喜心感者其聲發以㪚鄭𤣥曰發揚也其怒心感者其聲麤以厲其敬心感者其聲直以亷其愛心感者其聲和以柔六者非性也感於物而后動鄭𤣥曰言人聲在所見非有常是故先王慎所以感之故禮以導其志樂以和其聲政以壹其行刑以防其姦禮樂刑政其極一也鄭𤣥曰極至也所以同民心而出治道也鄭𤣥曰此其所謂至也凡音者生人心者也情動於中故形於聲聲成文謂之音是故治世之音安以樂其政和亂世之音怨以怒其政乖徐廣曰一作煩亡國之音哀以思其民困聲音之道與政通矣鄭𤣥曰言以八音和否隨政也宫為君王肅曰居中總四方商為臣王肅曰秋義斷角為民王肅曰春物並生各以區别民之象也徵為事王肅曰夏物盛故事多羽為物王肅曰冬物聚五者不亂則無惉懘之音矣鄭𤣥曰沾懘弊敗不和之貎也宫亂則荒鄭𤣥曰荒猶㪚其君驕商亂則搥徐廣曰搥今禮作陂也其臣壞角亂則憂其民怨徵亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢如此則國之滅亡無日矣鄭𤣥曰君臣民事物也其道亂則其音應而亂也鄭衞之音亂世之音也比於慢矣鄭𤣥曰比猶同桑間濮上之音鄭𤣥曰濮水之上地有桑間在濮陽南亡國之音也其政㪚其民流誣上行私而不可止凡音者生於人心者也樂者通於倫理者也鄭𤣥曰倫猶類也理分也是故知聲而不知音者禽獸是也知音而不知樂者衆庶是也唯君子為能知樂鄭𤣥曰禽獸知此為聲耳不知其宫商之變八音並作克諧曰樂是故審聲以知音審音以知樂審樂以知政而治道備矣是故不知聲者不可與言音不知音者不可與言樂知樂則幾於禮矣鄭𤣥曰幾近也禮樂皆得謂之有德徳者得也鄭𤣥曰聽樂而知政之得失則能正君臣民事物之禮是故樂之隆非極音也鄭𤣥曰隆猶盛也極猶窮也食饗之禮非極味也清廟之瑟鄭𤣥曰清廟謂作樂歌清廟王肅曰於清廟中所鼓之瑟一倡而三歎有遺音者矣鄭𤣥曰遺猶餘也王肅曰未盡音之極大饗之禮尙𤣥酒而俎腥魚大羮不和有遺味者矣是故先王之制禮樂也非以極口腹耳目之欲也將以教民平好惡而反人道之正也鄭𤣥曰教之使知好惡人生而靜天之性也感於物而動性之頌也徐廣曰頌音容今禮作欲物至知知然後好惡形焉王肅曰事至能以智知之然後情之好惡見好惡無節於内知誘於外不能反己天理滅矣王肅曰内無定節智為物所誘於外情從之動而失其天性夫物之感人無窮而人之好惡無節則是物至而人化物也鄭𤣥曰隨物變化人化物也者滅天理而窮人欲者也鄭𤣥曰言無所不為於是有悖逆詐偽之心有淫佚作亂之事是故彊者脅弱衆者暴寡知者詐愚勇者苦怯疾病不養老幼孤寡不得其所此大亂之道也是故先王制禮樂人為之節鄭𤣥曰為作法度以遏其欲也王肅曰以人為之節言得其中也衰麻哭泣所以節喪紀也鐘鼓干戚所以和安樂也婚姻冠䈂所以别男女也鄭𤣥曰男二十而冠女許嫁而䈂射鄉食饗所以正交接也鄭𤣥曰射郷大射鄉飲禮禮節民心樂和民聲政以行之刑以防之禮樂刑政四達而不悖則王道備矣樂者為同禮者為異鄭𤣥曰同謂協好惡也異謂别貴賤同則相親異則相敬樂勝則流王肅曰流遁不能自還禮勝則離鄭𤣥曰離析而不親合情飾貎者禮樂之事也鄭𤣥曰欲其並行彬彬然禮義立則貴賤等矣鄭𤣥曰等階級樂文同則上下和矣好惡著則賢不肖别矣刑禁暴爵舉賢則政均矣仁以愛之義以正之如此則民治行矣樂由中出鄭𤣥曰和在心禮自外作鄭𤣥曰敬在貎樂由中出故靜禮自外作故文鄭𤣥曰文猶動大樂必易大禮必簡鄭𤣥曰易簡若於清廟大饗然樂至則無怨禮至則不爭鄭𤣥曰至猶達也行也揖讓而治天下者禮樂之謂也暴民不作諸侯賓服兵革不試鄭𤣥曰賓協也試用也五刑不用百姓無患天子不怒如此則樂達矣合父子之親明長幼之序以敬四海之内天子如此則禮行矣大樂與天地同和大禮與天地同節鄭𤣥曰言順天地之氣與其數也和故百物不失鄭𤣥曰不失其性節故祀天祭地鄭𤣥曰成物有功報焉明則有禮樂鄭𤣥曰教人者也幽則有鬼神鄭𤣥曰助天地成物者也易曰知鬼神之情狀然則聖人精氣謂之神賢智之精氣謂之鬼也如此則四海之内合敬同愛矣禮者殊事合敬者也樂者異文合愛者也禮樂之情同故明王以相沿也鄭𤣥曰沿猶因述也殷因於夏周因於殷故事與時並鄭𤣥曰舉事在其時也王肅曰有其時然後得立其事名與功偕鄭𤣥曰為名在於其功也偕猶俱也王肅曰有功然後得受其名故鐘鼓管磬羽籥干戚樂之器也詘信俯仰級兆舒疾徐廣曰級今禮作綴駰案鄭𤣥曰兆其外營域樂之文也簠簋爼豆制度文章禮之器也升降上下周旋裼襲禮之文也故知禮樂之情者能作識禮樂之文者能述鄭𤣥曰述謂訓其義作者之謂聖述者之謂明明聖者述作之謂也樂者天地之和也禮者天地之序也和故百物皆化序故羣物皆别鄭𤣥曰化猶生也别謂形體異樂由天作禮以地制鄭𤣥曰言法天地過制則亂過作則暴鄭𤣥曰過猶誤也暴失文武意也明於天地然後能興禮樂也論倫無患樂之情也王肅曰王能合道論中倫理而無患也欣喜驩愛樂之容也中正無邪禮之質也鄭𤣥曰質猶本莊敬㳟順禮之制也若夫禮樂之施於金石越於聲音用於宗廟社稷事於山川鬼神則此所以與民同也王肅曰自天子至民人皆貴禮之敬樂之和以事鬼神先祖也王者功成作樂治定制禮鄭𤣥曰功成治定同時耳功主於王業治主於教民其功大者其樂備其治辨者其禮具徐廣曰辨一作别駰案鄭𤣥曰辨偏也干戚之儛非備樂也鄭𤣥曰樂以文徳為備若咸池也亨孰而祀非達禮也鄭𤣥曰逹猶具也至敬不饗味而貴氣臭五帝殊時不相沿樂三王異世不相襲禮鄭𤣥曰言其有損益樂極則憂禮粗則偏矣鄭𤣥曰樂人之所好也害在淫夸禮人之所勤害在倦畧及夫敦樂而無憂鄭𤣥曰敦厚也禮備而不偏者其唯大聖乎天高地下萬物㪚殊而禮制行也鄭𤣥曰禮為異流而不息合同而化而樂興也鄭𤣥曰樂為同春作夏長仁也秋斂冬藏義也仁近於樂義近於禮鄭𤣥曰言樂法陽而生禮法隂而成樂者敦和率神而從天鄭𤣥曰敦和樂貴同禮者辨宜居鬼而從地鄭𤣥曰别宜禮尚異也孫炎曰居鬼品處人鬼之志故聖人作樂以應天作禮以配地禮樂明備天地官矣鄭𤣥曰各得其亊也王肅曰各得其位也天尊地卑君臣定矣高卑已陳貴賤位矣鄭𤣥曰髙卑謂山澤也位矣尊卑之位象山澤動靜有常小大殊矣鄭𤣥曰動静隂陽用事也小大萬物也大者常存小者隨隂陽出入方以類聚物以羣分則性命不同矣鄭𤣥曰方謂行蟲物謂殖生者性之言生也命生之長短在天成象在地成形鄭𤣥曰象光耀形體貎如此則禮者天地之别也地氣上隮鄭𤣥曰隮升也天氣下降隂陽相摩天地相蕩鄭𤣥曰蕩動也鼔之以䨓霆奮之以風雨鄭𤣥曰奮迅也動之以四時煖之以日月而百物化興焉鄭玄曰百物化生如此則樂者天地之和也化不時則不生男女無别則亂登鄭𤣥曰登成也樂失則害物禮失則亂人此天地之情也及夫禮樂之極乎天而蟠乎地鄭𤣥曰極至也蟠猶委也行乎隂陽而通乎鬼神窮高極逺而測深厚鄭𤣥曰高逺三辰也深厚山川也言禮樂之道上至於天下委於地則其間無所不之樂著太始而禮居成物王肅曰著明也明太始則法天也成物謂地也居亦謂法也著不息者天也著不動者地也鄭𤣥曰著猶明白也息謂休止也一動一靜者天地之間也鄭𤣥曰間謂百物也故聖人曰禮云樂云鄭𤣥曰言禮樂之法天地也昔者舜作五弦之琴以歌南風鄭𤣥曰南風長養之風也言父母之養長己也其辭未聞也王肅曰南風育養民之詩其辭曰南風之薫兮可以解吾民之愠兮䕫始作樂以賞諸侯鄭𤣥曰䕫欲舜與天下之君共此樂故天子之為樂也以賞諸侯之有德者也德盛而教尊五穀時熟然後賞之以樂故其治民勞者其舞行級逺其治民佚者其舞行級短王肅曰逺以象民行之勞近以象民行之逸故觀其舞而知其德聞其諡而知其行鄭𤣥曰謚者行之迹泰章章之也鄭𤣥曰堯樂名言堯徳章明咸池備也鄭𤣥曰黄帝所作樂名堯増修而用之咸皆也池之言施也言德之無不施也王肅曰包容浸潤行化皆然故曰備也韶繼也鄭𤣥曰舜樂名言能繼堯之德夏大也鄭𤣥曰禹樂名言禹能大堯舜之德殷周之樂盡也鄭𤣥曰言盡人事也周禮曰殷曰大䕶周曰大武天地之道寒暑不時則疾風雨不節則饑敎者民之寒暑也鄭𤣥曰教謂樂也教不時則傷世事者民之風雨也事不節則無功然則先王之為樂也以法治也王肅曰作樂所以法其治行也善則行象徳矣王肅曰君行善即臣下之行以象君之徳夫豢豕為酒鄭𤣥曰以穀食犬豕曰豢為作也非以為禍也而獄訟益煩則酒之流生禍也鄭𤣥曰小人飲之善酗以致獄訟是故先王因為酒禮一獻之禮賓主百拜鄭𤣥曰一獻士飲酒之禮百拜以喻多也終日飲酒而不得醉焉此先王之所以備酒禍也故酒食者所以合歡也樂者所以象德也禮者所以閉淫也是故先王有大事必有禮以哀之鄭𤣥曰大事謂死喪有大福必有禮以樂之哀樂之分皆以禮終樂也者施也禮也者報也鄭𤣥曰言樂出而不反而禮者往來樂樂其所自生鄭𤣥曰自由也而禮反其所自始樂章德禮報情反始也孫炎曰作樂者緣民所樂於已之德若舜之民樂其紹堯也周之民樂其伐紂而作韶武也制禮者本已所由得民心殷尚質周尚文是也所謂大路者天子之輿也龍旂九旒天子之旌也青黑緣者天子之葆龜也公羊傳曰龜青緣何休曰緣甲􅏋也千嵗之龜青􅏋明乎吉凶也從之以牛羊之羣則所以贈諸侯也鄭𤣥曰贈諸侯謂來朝將去送之以禮也樂也者情之不可變者也禮也者理之不可易者也鄭𤣥曰理猶事也樂統同禮别異鄭𤣥曰統同和合也辨異異尊卑之位禮樂之說貫乎人情矣窮本知變樂之情也著誠去偽禮之經也禮樂見天地之情達神明之德降興上下之神鄭𤣥曰降下也興猶出也而凝是精粗之體領父子君臣之節鄭𤣥曰凝猶成也精粗謂萬物大小也領猶理治也是故大人舉禮樂則天地將為昭焉天地欣合隂陽相得煦嫗覆育萬物鄭𤣥曰氣曰煦體曰嫗然後草木茂區萌達鄭𤣥曰屈生曰區羽翮奮角觡生鄭𤣥曰無䚡曰觡蟄蟲昭蘇鄭𤣥曰昭曉也凡蟄蟲以發出為曉更息曰蘇羽者嫗伏毛者孕鬻鄭𤣥曰孕任也鬻生也胎生者不殰而卵生者不殈鄭𤣥曰肉敗曰殰殈猶裂也則樂之道歸焉耳鄭𤣥曰樂和隂陽故歸此也樂者非謂黃鐘大吕弦歌干揚也鄭𤣥曰揚越也樂之末節也故童者舞之布筵席陳樽俎列籩豆以升降為禮者禮之末節也故有司掌之鄭𤣥曰言禮樂之本由人君也禮本著誠去偽樂本窮本知變樂師辨乎聲詩故北面而弦王肅曰但能别聲詩不知其義故北面而弦鄭𤣥曰弦謂鼓琴瑟宗祝辨乎宗廟之禮故後尸商祝辨乎喪禮鄭𤣥曰商祝祝習商禮者商人教以敬於接神故後主人鄭𤣥曰後尸居後贊禮儀也此言知本者尊知末者卑是故德成而上蓺成而下行成而先事成而後鄭𤣥曰德三德也行三行也蓺才技也先謂位在上也後謂位在下也是故先王有上有下有先有後然後可以有制於天下也鄭𤣥曰言尊卑備乃可制作以為治樂者聖人之所樂也而可以善民心其感人深其風移俗易故先王著其教焉鄭𤣥曰謂立司樂以下使教國子也夫人有血氣心知之性而無哀樂喜怒之常應感起物而動然後心術形焉鄭𤣥曰言在所以感之也術所由也形猶見也是故志微焦殺之音作鄭𤣥曰志微意細也吳公子札曰其細已甚而民思憂嘽緩慢易繁文簡節之音作鄭𤣥曰簡節少易也而民康樂粗厲猛起奮末廣賁之音作王肅曰粗厲亢厲猛起發揚奮末浸疾廣賁廣大之也而民剛毅亷直經正孫炎曰經法也莊誠之音作而民肅敬寛裕肉好王肅曰肉好言音之洪美順成和動之音作而民慈愛流辟邪㪚狄成滌濫之音作王肅曰狄成言成而似夷狄之音也滌放盪濫僭差也而民淫亂是故先王本之情性稽之度數制之禮義合生氣之和道五常之行鄭𤣥曰生氣隂陽也五常五行也使之陽而不㪚隂而不密鄭𤣥曰密之言閉也剛氣不怒柔氣不懾鄭𤣥曰懾猶恐懼也四暢交於中而發作於外皆安其位而不相奪也然後立之學等鄭𤣥曰等差也各用其材差學之也廣其節奏省其文采鄭𤣥曰廣増習之也省猶審習之也文采謂節奏合也以繩德厚也鄭𤣥曰繩猶度也王肅曰繩法也法其德厚薄也類小大之稱孫炎曰作樂器大小稱十二律比終始之序鄭𤣥曰始於宫終於羽以象事行鄭𤣥曰宫為君商為臣使親疎貴賤長幼男女之理皆形見於樂故曰樂觀其深矣土敝則草木不長水煩則魚鼈不大氣衰則生物不育世亂則禮廢而樂滛是故其聲哀而不莊樂而不安慢易以犯節流沔以忘本廣則容姦狹則思欲王肅曰其音廣大則容姦偽其狹者則使人思利欲也感滌蕩之氣而滅平和之德是以君子賤之也凡姦聲感人而逆氣應之逆氣成象鄭𤣥曰成象謂人樂習之也而淫樂興焉正聲感人而順氣應之順氣成象而和樂興焉倡和有應囘邪曲直各歸其分而萬物之理以類相動也是故君子反情以和其志鄭𤣥曰反猶本也比類以成其行姦聲亂色不流於聰明淫樂廢禮不接於心術惰慢邪辟之氣不設於身體使耳目鼻口心知百體皆由順正以行其義然後發以聲音文以琴瑟動以干戚飾以羽旄從以簫管奮至德之光動四氣之和以著萬物之理孫炎曰奮發也至徳之光天地之道也四氣之和四時之化也著猶誠也是故清明象天廣大象地終始象四時周旋象風雨王肅曰清明廣大終始周旋皆樂之節奏容儀發動也五色成文而不亂八風從律而不姦百度得數而有常鄭𤣥曰五色五行也八風從律應節至也百度百刻也言日月晝夜不失正也王肅曰至樂之極能使然耳小大相成終始相生倡和清濁代相為經鄭𤣥曰清為蕤賓至應鍾也濁謂黄鍾至仲吕也故樂行而倫清鄭𤣥曰倫謂人道也耳目聰明血氣和平移風易俗天下皆寧故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂鄭𤣥曰道謂仁義也欲謂邪淫也是故君子反情以和其志廣樂以成其教樂行而民鄉方可以觀德矣鄭𤣥曰方猶道也德者性之端也樂者德之華也金石絲竹樂之器也詩言其志也歌詠其聲也舞動其容也三者本乎心然後樂氣從之是故情深而文明氣盛而化神和順積中而英華發外唯樂不可以為偽鄭𤣥曰三者本志也聲也容也言無此本於内則不能為樂耳樂者心之動也聲者樂之象也文采節奏聲之飾也君子動其本樂其象然後治其飾是故先鼓以警戒鄭𤣥曰將奏樂先擊鼓以警戒衆也三步以見方鄭𤣥曰將舞必先三舉足以見其舞之漸也王肅曰舞武樂三步為一節者以見伐道也再始以著往鄭𤣥曰武舞再更始以明代紂時再往之復亂以飭歸鄭𤣥曰謂鳴鐃而退明以整歸德也奮疾而不拔也王肅曰舞雖奮疾而不失節若樹木得疾風而不拔極幽而不隱鄭𤣥曰極幽謂歌也獨樂其志不厭其道王肅曰樂能使仁人獨樂其志不厭倦其道也備舉其道不私其欲是以情見而義立樂終而德尊君子以好善小人以息過故曰生民之道樂為大焉君子曰禮樂不可以斯須去身致樂以治心鄭𤣥曰致猶深審也樂由中出故治心也則易直子諒之心油然生矣王肅曰易平易直正直子諒愛信也鄭𤣥曰油新生好貎易直子諒之心生則樂樂則安安則久久則天天則神天則不言而信神則不怒而威鄭𤣥曰若善心生則寡於利欲寡於利欲則樂矣志明行成不言而見信如天也不怒而見畏如神也致樂以治心者也致禮以治躬者也治躬則莊敬莊敬則嚴威鄭𤣥曰禮自外作故治身也心中斯須不和不樂而鄙詐之心入之矣鄭𤣥曰謂利欲生也外貎斯須不莊不敬而慢易之心入之矣鄭𤣥曰易輕易也故樂也者動於内者也禮也者動於外者也樂極和禮極順内和而外順則民瞻其顔色而弗與爭也望其容貎而民不生易慢焉德煇動乎内而民莫不承聽理發乎外而民莫不承順鄭𤣥曰徳煇顔色潤澤也理容貎進止也孫炎曰德煇明惠也理言行也故曰知禮樂之道舉而錯之天下無難矣樂也者動於内者也禮也者動於外者也故禮主其謙鄭𤣥曰人所倦也王肅曰自謙損也樂主其盈鄭𤣥曰人所懽也王肅曰充氣志也禮謙而進以進為文鄭𤣥曰進者謂自勉强也文猶美也善也王肅曰禮自減損所以進德修業也樂盈而反以反為文鄭𤣥曰反謂自抑止也王肅曰樂充氣至而反本也禮謙而不進則銷樂盈而不反則放鄭𤣥曰放淫於聲樂不能止也故禮有報孫炎曰報謂禮尚往來以勸進之王肅公禮自減損而以進為報也而樂有反孫炎曰反謂曲終還更始禮得其報則樂樂得其反則安禮之報樂之反其義一也鄭𤣥曰俱起立於中不銷不放夫樂者樂也人情之所不能免也樂必發諸聲音形於動靜人道也鄭𤣥曰人道人之所為也聲音動靜性術之變盡於此矣鄭𤣥曰不可過故人不能無樂樂不能無形鄭𤣥曰形聲音動静也形而不為道不能無亂先王惡其亂故制雅頌之聲以道之使其聲足以樂而不流使其文足以綸而不息鄭𤣥曰文篇辭也息銷也使其曲直繁省亷肉節奏鄭𤣥曰曲直歌之曲折繁省亷肉聲之洪殺也足以感動人之善心而已矣不使放心邪氣得接焉是先王立樂之方也鄭𤣥曰方道也是故樂在宗廟之中君臣上下同聽之則莫不和敬在族長鄉里之中長幼同聽之則莫不和順在閨門之内父子兄弟同聽之則莫不和親故樂者審一以定和比物以飾節節奏合以成文鄭𤣥曰審一審其人聲也比物謂雜金革土匏之属以成文五聲八音克諧相應和也所以合和父子君臣附親萬民也是先王立樂之方也故聽其雅頌之聲志意得廣焉執其干戚習其俯仰詘信容貎得莊焉行其綴兆鄭𤣥曰綴表也所以表行列要其節奏鄭𤣥曰要猶㑹也行列得正焉進退得齊焉故樂者天地之齊中和之紀鄭𤣥曰紀總要之名人情之所不能免也夫樂者先王之所以飾喜也軍旅鈇鉞者先王之所以飾怒也故先王之喜怒皆得其齊矣喜則天下和之怒則暴亂者畏之先王之道禮樂可謂盛矣魏文侯問於子夏曰吾端冕而聽古樂鄭𤣥曰端𤣥衣也古樂先王之正樂則唯恐臥聽鄭衞之音則不知倦敢問古樂之如彼何也新樂之如此何也子夏答曰今夫古樂進旅而退旅鄭𤣥曰旅猶俱也俱進俱退言其齊一也和正以廣鄭𤣥曰無姦聲也弦匏笙簧合守拊鼓鄭𤣥曰合皆也言衆皆待擊鼓乃作也拊者以韋為表裝之以糠也始奏以文止亂以武鄭𤣥曰文謂鼓武謂金也治亂以相訊疾以雅孫炎曰整其亂行節之以相赴敵迅疾趨之以雅鄭𤣥曰相即拊也亦以節樂雅亦樂器名狀如漆筩中有椎君子於是語於是道古修身及家平均天下此古樂之發也今夫新樂進俯退俯鄭𤣥曰俯猶曲也言不齊一也姦聲以淫溺而不止王肅曰姦聲滛使人溺而不能自止及優侏儒王肅曰俳優短人也獶雜子女不知父子鄭𤣥曰獶獮猴也言舞者如獮猴戲亂男女尊卑也樂終不可以語不可以道古此新樂之發也今君之所問者樂也所好者音也夫樂之與音相近而不同鄭𤣥曰鏗鎗之類皆為音應律乃為樂文侯曰敢問何如鄭𤣥曰欲知音樂異意子夏答曰夫古者天地順而四時當民有德而五穀昌疾疢不作而無妖祥此之謂大當鄭𤣥曰當謂不失其所也然後聖人作為父子君臣以為之紀綱紀綱既正天下大定天下大定然後正六律和五聲弦歌詩頌此之謂德音德音之謂樂詩曰莫其德音其德克明克明克類克長克君王此大邦克順克俾鄭𤣥曰德正應和曰莫照臨四方曰明勤施無私曰類教誨不倦曰長慶賞刑威曰君慈和徧服曰順俾當為比擇善而從之曰比俾於文王其德靡悔既受帝祉施於孫子此之謂也鄭𤣥曰施延也言文王之德皆能如此故受天福延及後世今君之所好者其溺音與鄭𤣥曰言無文王之德則所好非樂文侯曰敢問溺音者何從出也子夏答曰鄭音好濫淫志鄭𤣥曰濫濫竊姦聲也宋音燕女溺志王肅曰燕歡恱衞音趣數煩志孫炎曰趣數音促速而數變也鄭𤣥曰煩勞也齊音驁辟驕志四者皆淫於色而害於德是以祭祀不用也鄭𤣥曰言四國出此溺音詩曰肅雍和鳴先祖是聽夫肅肅敬也雍雍和也夫敬以和何事不行鄭𤣥曰古者樂敬且和故無事而不用溺音無所施為人君者謹其所好惡而已矣君好之則臣為之上行之則民從之詩曰誘民孔易此之謂也鄭𤣥曰誘進也孔甚也言民從君之所好惡進之於善無難也然後聖人作為鞉鼓椌楬壎箎鄭𤣥曰椌楬謂柷敔此六者德音之音也鄭𤣥曰六者為本以其聲質然後鐘磬竽瑟以和之干戚旄狄以舞之此所以祭先王之廟也所以獻醻酳酢也所以官序貴賤各得其宜也鄭𤣥曰官序貴賤謂尊卑樂器列數有差此所以示後世有尊卑長㓜序也鐘聲鏗鏗以立號鄭𤣥曰號令所以警衆也王肅曰鐘聲髙故以之立號也號以立横鄭𤣥曰横充也謂氣作充滿横以立武君子聽鐘聲則思武臣石聲硜王肅曰聲果勁硜以立别鄭𤣥曰謂分明於節義别以致死君子聽磬聲則思死封疆之臣絲聲哀哀以立亷鄭𤣥曰亷亷隅亷以立志君子聽琴瑟之聲則思志義之臣竹聲濫王肅曰濫㑹諸音濫以立會會以聚衆君子聽竽笙簫管之聲則思畜聚之臣鼓鼙之聲讙讙以立動動以進衆君子聽鼓鼙之聲則思將帥之臣鄭𤣥曰聞讙囂則人意動作也君子之聽音非聽其鏗鎗而已也彼亦有所合之也鄭𤣥曰以聲合已志賓牟賈侍坐於孔子孔子與之言及樂曰夫武之備戒之已久何也鄭𤣥曰武謂周武也備戒擊鼔警衆也答曰病不得其衆也鄭𤣥曰病猶憂也以不得衆心為憂憂其難永歎之淫液之何也鄭𤣥曰永歎淫液歌遲之也答曰恐不逮事也鄭𤣥曰逮及也亊戎亊也發揚蹈厲之已蚤何也王肅曰厲疾也備戒雖久至其發作又疾也答曰及時事也鄭𤣥曰時至武亊當施也王肅曰欲令之亊各及時武坐致右憲左何也王肅曰右膝至地左膝去地也答曰非武坐也鄭𤣥曰言武之事無坐也聲淫及商何也王肅曰聲深淫貪商答曰非武音也王肅曰言武王不獲已為天下除殘非貪商子曰若非武音則何音也答曰有司失其傳也鄭𤣥曰有司典樂者傳猶說也如非有司失其傳則武王之志荒矣鄭𤣥曰荒老耄也言典樂者失其說時人妄說也子曰唯丘之聞諸萇𢎞亦若吾子之言是也鄭𤣥曰萇𢎞周大夫賓牟賈起免席而請曰夫武之備戒之已久則既聞命矣孫炎曰聞命謂言是敢問遲之遲而又久何也鄭𤣥曰遲之遲謂久立於綴子曰居吾語汝鄭𤣥曰居猶安坐也夫樂者象成者也王肅曰象成功而為樂總干而山立王肅曰總持干楯山立不動武王之事也發揚蹈厲太公之志也王肅曰志在鷹揚也武亂皆坐周召之治也王肅曰武亂武之治也皆坐以象安民無事也且夫武始而北出鄭𤣥曰始奏象觀兵盟津時也再成而滅商鄭𤣥曰成猶奏也再奏象克殷時三成而南王肅曰誅紂已而南四成而南國是疆王肅曰有南國以為疆界五成而分陜周公左召公右王肅曰分陜東西而治六成復綴以崇天子鄭𤣥曰六奏象兵還振旅也復綴反位止也王肅曰以象尊崇天子夾振之而四伐盛振威於中國也王肅曰振威武也四伐者伐四方與紂同惡者一擊一刺為一伐也分夾而進徐廣曰一作遲事蚤濟也王肅曰分部而並進者欲事早成久立於綴以待諸侯之至也鄭𤣥曰象武王伐紂待諸侯也且夫女獨未聞牧野之語乎鄭𤣥曰欲語以作武樂之意武王克殷反商鄭𤣥曰反當為及謂至紂都也未及下車而封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於杞封殷之後於宋封王子比干之墓鄭𤣥曰積土為封封比干之墓崇賢也釋箕子之囚使之行商容而復其位徐廣曰周本紀曰命召公釋箕子之囚又曰表商容之閭庶民弛政庶士倍祿鄭𤣥曰弛政去紂時苛役倍祿復其紂時薄者濟河而西馬㪚華山之陽鄭𤣥曰㪚猶放而弗復乗牛㪚桃林之野徐廣曰在𢎞農縣今曰桃丘而不復服車甲弢徐廣曰音韜而藏之府庫而弗復用倒載干戈苞之以虎皮鄭𤣥曰苞干戈以虎皮明能以武服兵也將率之士使為諸侯名之曰建櫜王肅曰所以能櫜弓矢而不用者將率之士力也故建以為諸侯謂之建櫜也然後天下知武王之不復用兵也㪚軍而郊射鄭𤣥曰郊射為射宫於郊也王肅曰郊有學宫可以習禮也左射貍首右射騶虞鄭𤣥曰左東學右西學也貍首騶虞所歌為節也而貫革之射息也鄭𤣥曰貫革射穿甲革也禆冕搢笏鄭𤣥曰裨冕衣禆衣而冠冕也裨衣衮之屬也搢插也而虎賁之士稅劒也祀乎明堂鄭𤣥曰文王之廟為明堂而民知孝朝覲然後諸侯知所以臣耕藉鄭𤣥曰耕藉藉田也然後諸侯知所以敬五者天下之大教也食三老五更於太學鄭𤣥曰老更互言之耳皆老人更知三德五事者也周名太學曰東膠天子袒而割牲執醬而饋執爵而酳冕而總干鄭𤣥曰冕而總干在舞位所以教諸侯之悌也若此則周道四達禮樂交通則夫武之遲久不亦宜乎鄭𤣥曰言武遲久為重禮樂也子貢見師乙而問焉鄭𤣥曰師樂官也乙名也曰賜聞聲歌各有宜也鄭𤣥曰氣順性如賜者宜何歌也師乙曰乙賤工也鄭𤣥曰樂人稱工也何足以問所宜請誦其所聞而吾子自執焉鄭𤣥曰執猶處也寛而靜柔而正者宜歌頌廣大而靜疏達而信者宜歌大雅恭儉而好禮者宜歌小雅正直清亷而謙者宜歌風肆直而慈愛者鄭𤣥曰肆正也宜歌商温良而能斷者宜歌齊夫歌者直已而陳德鄭𤣥曰各因其德歌所宜動已而天地應焉四時和焉星辰理焉萬物育焉鄭𤣥曰育生也故商者五帝之遺聲也商人志之故謂之商齊者三代之遺聲也齊人志之故謂之齊明乎商之詩者臨事而屢斷鄭𤣥曰以其肆直明乎齊之詩者見利而讓也鄭𤣥曰以其温良而能斷也臨事而屢斷勇也見利而讓義也有勇有義非歌孰能保此故歌者上如抗下如隊曲如折止如槀木居中矩句中鉤累累乎殷如貫珠鄭𤣥曰言歌聲之著動人心之審而有此事故歌之為言也長言之也鄭𤣥曰長言引其聲說之故言之言之不足故長言之長言之不足故嗟歎之嗟歎之不足故不知手之舞之足之蹈之鄭𤣥曰手舞足蹈歡之至子貢問樂凡音由於人心天之與人有以相通如景之象形響之應聲故為善者天報之以福為惡者天與之以殃其自然者也故舜彈五弦之琴歌南風之詩而天下治紂為朝歌北鄙之音身死國亡舜之道何𢎞也紂之道何隘也夫南風之詩者生長之音也舜樂好之樂與天地同意得萬國之驩心故天下治也夫朝歌者不時也北者敗也鄙者陋也紂樂好之與萬國殊心諸侯不附百姓不親天下畔之故身死國亡而衛靈公之時將之晉至於濮水之上舍夜半時聞鼓琴聲問左右皆對曰不聞乃召師涓曰吾聞鼓琴音問左右皆不聞其狀似鬼神為我聽而冩之師涓曰諾因端坐援琴聽而寫之明日曰臣得之矣然未習也請宿習之靈公曰可因復宿明日報曰習矣即去之晉見晉平公平公置酒於施惠之臺酒酣靈公曰今者來聞新聲請奏之平公曰可即令師涓坐師曠旁援琴鼓之未終師曠撫而止之曰此亡國之聲也不可聽平公曰何道出師曠曰師延所作也與紂為靡靡之樂武王伐紂師延東走自投濮水之中故聞此聲必於濮水之上先聞此聲者國削平公曰寡人所好者音也願遂聞之師涓鼓而終之平公曰音無此最悲乎師曠曰有平公曰可得聞乎師曠曰君德義薄不可以聽之平公曰寡人所好者音也願聞之師曠不得已援琴而鼓之一奏之有𤣥鶴二八集乎廊門再奏之延頸而鳴舒翼而舞平公大喜起而為師曠夀反坐問曰音無此最悲乎師曠曰有昔者黃帝以大合鬼神今君德義薄不足以聽之聽之將敗平公曰寡人老矣所好者音也願遂聞之師曠不得已援琴而鼓之一奏之有白雲從西北起再奏之大風至而雨隨之飛廊瓦左右皆奔走平公恐懼伏於廊屋之間晉國大旱赤地三年聽者或吉或凶夫樂不可妄興也太史公曰夫上古明王舉樂者非以娛心自樂快意恣欲將欲為治也正教者皆始於音音正而行正故音樂者所以動盪血脉通流精神而和正心也故宫動脾而和正聖商動肺而和正義角動肝而和正仁徵動心而和正禮羽動腎而和正智故樂所以内輔正心而外異貴賤也上以事宗廟下以變化黎庶也琴長八尺一寸正度也弦大者為宫而居中央君也商張右傍其餘大小相次不失其次序則君臣之位正矣故聞宫音使人温舒而廣大聞商音使人方正而好義聞角音使人惻隱而愛人聞徵音使人樂善而好施聞羽音使人整齊而好禮夫禮由外入樂自内出故君子不可須臾離禮須臾離禮則暴慢之行窮外不可須臾離樂須㬰離樂則姦邪之行窮内故樂音者君子之所養義也夫古者天子諸侯聽鐘磬未嘗離於庭􅀸大夫聽琴琴之音未嘗離於前所以養行義而防淫佚也夫淫佚生於無禮故聖人使人耳聞雅頌之音目視威儀之禮足行恭敬之容口言仁義之道故君子終日言而邪辟無由入也史記集解卷二十四
