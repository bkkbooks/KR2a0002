body:
  text: 史記集解卷五宋裴駰撰史記五秦本紀第五秦之先帝顓頊之苗裔孫曰女修女修織𤣥鳥隕卵女修吞之生子大業大業取少典之子曰女華女華生大費與禹平水土已成帝錫𤣥圭禹受曰非予能成亦大費為輔帝舜曰咨爾費贊禹功其賜爾皁游爾後嗣將大出乃妻之姚姓之玉女徐廣曰皇甫謐云賜之𤣥玉妻以姚姓之女也大費拜受佐舜調馴鳥獸鳥獸多馴服是為柏翳舜賜姓嬴氏大費生子二人一曰大亷實鳥俗氏二曰若木實費氏其𤣥孫曰費昌子孫或在中國或在夷狄費昌當夏桀之時去夏歸商為湯御以敗桀於鳴條大亷𤣥孫曰孟戲中衍鳥身人言帝太戊聞而卜之使御吉遂致使御而妻之自太戊以下中衍之後遂世有功以佐殷國故嬴姓多顯遂為諸侯其𤣥孫曰中潏徐廣曰一作滑在西戎保西垂生蜚亷蜚亷生惡來惡來有力晏子春秋曰手裂虎兕蜚廉善走父子俱以材力事殷紂周武王之伐紂并殺惡來是時蜚亷為紂石北方徐廣曰皇甫謐云作石槨於北方還無所報為壇霍太山地理志霍太山在河東彘縣而報得石棺銘曰帝令處父不與殷亂賜爾石棺以華氏死遂葬於霍太山皇甫謐云去彘縣十五里有冢常嗣之蜚亷復有子曰季勝季勝生孟增孟增幸於周成王是為宅臯狼臯狼生衡父衡父生造父造父以善御幸於周繆王得驥温驪徐廣曰温一作盜駰按郭璞云為馬細頸驪黑色驊駵郭璞云色如華而赤今名馬驃赤者為棗駵駵馬赤色騄耳之駟郭璞曰紀年云北唐之君來見以一驪馬是生綠耳八駿皆因其毛色以為名號駰按穆天子傳穆王有八駿之乗此紀不具者也西巡狩樂而忘歸郭璞曰紀年云穆王十七年西征於崑崙丘見西王母徐偃王作亂地理志臨淮有徐縣云故徐國尸子曰徐偃王有筋而無骨駰謂號偃由此造父為繆王御長驅歸周一日千里以救亂繆王以趙城封造父徐廣曰趙城在河東永安縣造父族由此為趙氏自蜚亷生季勝已下五世至造父别居趙趙衰其後也惡來革者蜚亷子也早死有子曰女防女防生旁臯旁臯生太几太几生大駱大駱生非子以造父之寵皆蒙趙城姓趙氏非子居犬丘徐廣曰今槐里也好馬及畜善養息之犬丘人言之周孝王孝王召使主馬于汧渭之間馬大蕃息孝王欲以為大駱適嗣申侯之女為大駱妻生子成為適申侯乃言孝王曰昔我先酈山之女為戎胥軒妻生中潏以親故歸周保西垂西垂以其故和睦今我復與大駱妻生適子成申駱重婚西戎皆服所以為王王其圖之於是孝王曰昔柏翳為舜主畜畜多息故有土賜姓嬴今其後世亦為朕息馬朕其分土為附庸邑之秦徐廣曰今天水隴西縣秦亭也使復續嬴氏祀號曰秦嬴亦不廢申侯之女子為駱適者以和西戎秦嬴生秦侯秦侯立十年卒生公伯公伯立三年卒生秦仲秦仲立三年周厲王無道諸侯或叛之西戎反王室滅犬丘大駱之族周宣王即位徐廣曰秦仲之十八年也乃以秦仲為大夫誅西戎西戎殺秦仲秦仲立二十三年死於戎毛詩序曰秦仲始大有車馬禮樂侍御之好也有子五人其長者曰莊公周宣王乃召莊公昆弟五人與兵七千人使伐西戎破之於是復予秦仲後及其先大駱地犬丘并有之為西垂大夫莊公居其故西犬丘生子三人其長男世父世父曰戎殺我大父仲非我殺戎王則不敢入邑遂將擊戎讓其弟襄公襄公為太子莊公立四十四年卒太子襄公代立襄公元年以女弟繆嬴為豐王妻襄公二年戎圍犬丘世父世父擊之為戎人所虜歲餘復歸世父七年春周幽王用襃姒廢太子立襃姒子為適數欺諸侯諸侯叛之西戎犬戎與申侯伐周殺幽王酈山下而秦襄公將兵救周戰甚力有功周避犬戎難東徙雒邑襄公以兵送周平王平王封襄公為諸侯賜之岐以西之地曰戎無道侵奪我岐豐之地秦能攻逐戎即有其地與誓封爵之襄公於是始國與諸侯通使聘享之禮乃用駵駒徐廣曰赤馬黒髦曰駵黄牛羝羊各三祠上帝西畤徐廣曰年表云立西畤祠白帝十二年伐戎而至岐卒生文公文公元年居西垂宫三年文公以兵七百人東獵四年至汧渭之會曰昔周邑我先秦嬴於此後卒獲為諸侯乃卜居之占曰吉即營邑之十年初為鄜畤徐廣曰鄜縣屬馮翊用三牢十三年初有史以紀事民多化者十六年文公以兵伐戎戎敗走於是文公遂收周餘民有之地至岐岐以東獻之周十九年得陳寶二十年法初有三族之罪張晏曰父兄兄弟妻子也如淳曰父族母族妻族也二十七年伐南山大梓豐大特徐廣曰今武都故道有怒特祠圓大牛上生樹木有牛從木中出後見於豐水之中四十八年文公太子卒賜諡為竫公徐廣曰文公之四十四年魯隱之元年竫公之長子為太子是文公孫也五十年文公卒葬西山徐廣曰皇甫謐云葬於西山在今隴西之西縣竫公子立是為寧公徐廣曰一作曼寜公二年公徙居平陽徐廣曰郿之平陽亭遣兵伐蕩社徐廣曰蕩音湯社一作杜三年與亳戰亳王奔戎遂滅蕩社皇甫謐云亳王號湯西夷之國也四年魯公子翬弑其君隱公十二年伐蕩氏取之寧公生十歲立立十二年卒葬西山生子三人長男武公為太子武公弟德公同母魯姬子生出子寧公卒大庶長弗忌威壘三父廢太子而立出子為君出子六年三父等復共令人賊殺出子出子生五歲立立六年卒三父等乃復立故太子武公武公元年伐彭戲氏至於華山下居平陽封宫三年誅三父等而夷三族以其殺出子也鄭高渠眯殺其君昭公十年伐邽冀戎初縣之地理志隴西有上邽縣應邵曰即邽戎邑也冀縣屬天水郡十一年初縣杜鄭地理志京兆有鄭縣杜縣也滅小虢班固曰西虢在雍州十三年齊人管至父連稱等殺其君襄公而立公孫無知晉滅霍魏耿齊雍廪殺無知管至父等而立齊桓公齊晉為强國十九年晉曲沃始為諸侯齊桓公伯於鄄二十年武公卒葬雍平陽初以人從死從死者六十六人有子一人名曰白白不立封平陽立其弟德公德公元年初居雍城徐廣曰今縣在扶風大鄭宫以犧三百牢祠鄜畤卜居雍後子孫飲馬於河梁伯芮伯來朝二年初伏孟康曰六月伏日初也周時無至此乃有之以狗禦蠱徐廣曰年表云初作伏祠社磔狗邑四門也德公生三十三歲而立立二年卒生子三人長子宣公中子成公少子穆公長子宣公立宣公元年衛燕伐周出惠王立王子穨三年鄭伯虢叔殺子穨而入惠王四年作密畤與晉戰河陽勝之十二年宣公卒生子九人莫立立其弟成公成公元年梁伯芮伯來朝齊桓公伐山戎次于孤竹成公立四年卒子七人莫立立其弟繆公繆公任好元年自將伐茅津勝之四年迎婦於晉晉太子申生姊也其歲齊桓公伐楚至邵陵五年晉獻公滅虞虢虜虞君與其大夫百里傒以璧馬賂於虞故也既虜百里傒以為秦穆公夫人媵於秦百里傒亡秦走宛地理志南陽有宛縣楚鄙人執之繆公聞百里傒賢欲重贖之恐楚人不與乃使人謂楚曰吾媵臣百里傒在焉請以五羖羊皮贖之楚人遂許與之當是時百里傒年已七十餘繆公釋其囚與語國事謝曰臣亡國之臣何足問繆公曰虞君不用子故亡非子罪也固問語三日繆公大說授之國政號曰五羖大夫百里傒讓曰臣不及臣友蹇叔蹇叔賢而世莫知臣嘗游困於齊而乞食䬹人徐廣曰䬹一作銍蹇叔收臣臣因而欲事齊君無知蹇叔止臣臣得脫齊難遂至周周王子穨好牛臣以養牛干之及穨欲用臣蹇叔止臣臣去得不誅事虞君蹇叔止臣臣知虞君不用臣臣誠私利祿爵且留再用其言得脫一不用及虞君難是以知其賢於是穆公使人厚幣迎蹇叔以為上大夫秋穆公自將伐晉戰於河曲徐廣曰一作西駰案公羊傳曰河千里而一曲也服䖍曰河曲晉地杜預曰河曲在蒲坂南晉驪姬作亂太子申生死新城重耳夷吾出犇九年齊桓公會諸侯於葵丘晉獻公卒立驪姬子奚齊其臣里克殺奚齊荀息立卓子徐廣曰一作倬克又殺卓子及荀息夷吾使人請秦求入晉於是繆公許之使百里傒將兵送夷吾夷吾謂曰誠得立請割晉之河西八城與秦及至已立而使丕鄭謝秦背約不與河西城而殺里克丕鄭聞之恐因與繆公謀曰晉人不欲夷吾實欲重耳今背秦約而殺里克皆吕甥郤芮之計也願君以利急召吕郤吕郤至則更入重耳便繆公許之使人與丕鄭歸召吕郤吕郤等疑丕鄭有間乃言夷吾殺丕鄭丕鄭子丕豹奔秦說繆公曰晉君無道百姓不親可伐也繆公曰百姓茍不便何故能誅其大臣能誅其大臣此其調也不聽而隂用豹十二年齊管仲隰朋死晉旱來請粟丕豹說繆公勿與因其饑而伐之繆公問公孫支服䖍曰秦大夫公孫子桑支曰飢穰更事耳不可不與問百里傒傒曰夷吾得罪於君其百姓何罪於是用百里傒公孫支言卒與之粟以船漕車轉自雍相望至絳賈逵曰雍秦國都絳晉國都也十四年秦饑請粟於晉晉君謀之羣臣虢射曰因其饑伐之可有大功晉君從之十五年興兵將攻秦繆公發兵使丕豹將自往擊之九月壬戌與晉惠公夷吾合戰於韓地晉君棄其軍與秦爭利還而馬鷙繆公與麾下馳追之不能得晉君反為晉軍所圍晉擊繆公繆公傷於是岐下食善馬者三百人馳冒晉軍晉軍解圍遂脫繆公而反生得晉君初繆公亡善馬岐下野人共得而食之者三百餘人吏逐得欲法之繆公曰君子不以畜産害人吾聞食善馬肉不飲酒傷人乃皆賜酒而赦之三百人者聞秦擊晉皆求從從而見繆公窘亦皆推鋒爭死以報食馬之德於是繆公虜晉君以歸令於國齋宿吾將以晉君祠上帝周天子聞之曰晉我同姓為請晉君夷吾姊亦為繆公夫人夫人聞之乃衰絰跣曰妾兄弟不能相救以辱君命繆公曰我得晉君以為功今天子為請夫人是憂乃與晉君盟許歸之更舍上舍而饋之七牢賈逵曰諸侯雍餼七牢者牛一羊一豕一為一牢也十一月歸晉君夷吾夷吾獻其河西地使太子圉為質於秦秦妻子圉以宗女是時秦地東至河十八年齊桓公卒二十年秦滅梁芮二十二年晉公子圉聞晉君病曰梁我母家也而秦滅之我兄弟多即君百歲後秦必留我而晉輕亦更立他子子圉乃亡歸晉二十三年晉惠公卒子圉立為君秦怨圉亡去乃迎晉公子重耳於楚而妻以故子圉妻重耳初謝後乃受繆公益禮厚遇之二十四年春秦使人告晉大臣欲入重耳晉許之於是使人送重耳二月重耳立為晉君是為文公文公使人殺子圉子圉是為懷公其秋周襄王弟帶以翟伐王王出居鄭二十五年周王使人告難於晉秦秦繆公將兵助晉文公入襄王殺王弟帶二十八年晉文公助楚於城濮三十年繆公助晉文公圍鄭鄭使人言繆公曰亡鄭厚晉於晉而得矣而秦未有利晉之强秦之憂也繆公乃罷兵歸晉亦罷三十二年冬晉文公卒鄭人有賣鄭於秦曰我主其城門鄭可襲也繆公問蹇叔百里傒對曰徑數國千里而襲人希有得利者且人賣鄭庸知我國人不有以我情告鄭者乎不可繆公曰子不知也吾已決矣遂發兵使百里傒子孟明視蹇叔子西乞術及白乙丙將兵行日百里傒蹇叔二人哭之繆公聞怒曰孤發兵而子沮哭吾軍何也二老曰臣非敢沮君軍軍行吾子與往臣老遲還恐不相見故哭耳二老退謂其子曰汝軍即敗必於殽阨矣三十三年春秦兵遂東更晉地過周北門周王孫滿曰秦師無禮不敗何待兵至滑鄭販賣賈人弦高持十二牛將賣之周見秦兵恐死虜因獻其牛曰聞大國將誅鄭鄭君謹修守禦備使臣以牛十二勞軍士秦三將軍相謂曰將襲鄭鄭今已覺之往無及已滅滑滑晉之邊邑也當是時晉文公喪尚未葬太子襄公怒曰秦侮我孤因喪破我滑遂墨衰絰發兵遮秦兵於殽擊之大破秦軍無一人得脫者虜秦三將以歸文公夫人秦女也服䖍曰繆公女為秦三囚將請曰繆公之怨此三人入於骨髓願令此三人歸令我君得自快烹之晉君許之歸秦三將三將至繆公素服郊迎嚮三人哭曰孤以不用百里傒蹇叔言以辱三子三子何罪乎子其悉心雪恥毋怠遂復三人官秩如故愈益厚之三十四年楚太子商臣弑其父成王代立繆公於是復使孟明視等將兵伐晉戰于彭衙杜預曰馮翊郃陽縣西北有衙城秦不利引兵歸戎王使由余於秦由余其先晉人也亡入戎能晉言聞繆公賢故使由余觀秦秦繆公示以宫室積聚由余曰使鬼為之則勞神矣使人為之亦苦民矣繆公怪而問之曰中國以詩書禮樂法度為政然尚時亂今戎夷無此何以為治不亦難乎由余笑曰此乃中國所以亂也夫自上聖黃帝作為禮樂法度身以先之僅以小治及其後世日以驕滛阻法度之威以責督於下下罷極則以仁義怨望於上上下交爭怨而相簒弑至於滅宗皆以此類也夫戎夷不然上含淳德以遇其下下懷忠信以事其上一國之政猶一身之治不知所以治此真聖人之治也於是繆公退而問内史廖曰漢書百官表曰内史周官也孤聞鄰國有聖人敵國之憂也今由余賢寡人之害將奈之何内史廖曰戎王處僻匿未聞中國之聲君試遺其女樂以奪其志徐廣曰奪一作徇為由余請以疏其間留而莫遣以失其期戎王怪之必疑由余君臣有間乃可虜也且戎王好樂必怠於政繆公曰善因與由余曲席而坐傳器而食問其地形與其兵勢盡詧而后令内史廖以女樂二八遺戎王戎王受而說之終年不還於是秦乃歸由余由余數諫不聽繆公又數使人間要由余由余遂去降秦繆公以客禮禮之問伐戎之形三十六年繆公復益厚孟明等使將兵伐晉渡河焚船大敗晉人取王官及鄗徐廣曰左傳作郊駰案服䖍曰皆晉地不能有以報殽之役晉人皆城守不敢出於是繆公乃自茅津徐廣曰在太陽渡河封殽中尸賈逵曰封識之為發喪哭之三日乃誓於軍曰嗟士卒聽無譁余誓告汝古之人謀黃髪畨畨則無所過以申思不用蹇叔百里傒之謀故作此誓令後世以記余過君子聞之皆為垂涕曰嗟乎秦繆公之與人周也服䖍曰周備也卒得孟明之慶三十七年秦用由余謀伐戎王益國十二開地千里遂霸西戎天子使召公過賀繆公以金鼓三十九年繆公卒葬雍皇覽曰秦繆公冡在槖泉宫祈年觀下從死者百七十七人秦之良臣子輿氏三人名曰奄息仲行鍼虎亦在從死之中秦人哀之為作歌黃鳥之詩君子曰秦繆公廣地益國東服强晉西覇戎夷然不為諸侯盟主亦宜哉死而棄民收其良臣而從死且先王崩尚猶遺德垂法況奪之善人良姓百姓所哀者乎是以知秦不能復東征也穆公子四十人其太子罃代立是為康公康公元年往歲繆公之卒晉襄公亦卒康公之弟名雍秦出也在秦晉趙盾欲立之使隨會來迎雍秦以兵送至令狐杜預曰在河東晉立襄公子而反擊秦師秦師敗隨會來奔二年秦伐晉於武城報令狐之役四年晉伐秦取少梁六年秦伐晉取羈馬服䖍曰晉邑也戰於河曲大敗晉軍晉人患隨會在秦為亂乃使魏讐餘服䖍曰晉之魏邑大夫詳反合謀會詐而得會會遂歸晉康公立十二年卒子共公立共公二年晉趙穿弑其君靈公三年楚莊王强北兵至雒問周鼎共公立五年卒子桓公立桓公三年晉敗我一將十年楚莊王服鄭北敗晉兵於河上當是之時楚霸為會盟合諸侯二十四年晉厲公初立與晉桓公夾河而盟歸而秦倍盟與翟合謀擊晉二十六年晉率諸侯伐秦秦軍敗走追至涇而還桓公立二十七年卒子景公立徐廣曰世本云景公名后伯車也景公四年晉欒書弑其君厲公十五年救鄭敗晉兵扵櫟杜預曰晉地也是時晉悼公為盟主十八年晉悼公强數會諸侯率以伐秦敗秦軍秦軍走晉兵追之遂渡涇至棫林而還徐廣曰棫音域駰案杜預曰秦地也二十七年景公如晉與平公盟已而背之三十六年楚公子圍弑其君而自立是為靈王景公母弟后子鍼有寵景公母弟富或譖之恐誅乃奔晉車重千乗晉平公曰后子富如此何以自亡對曰秦公無道畏誅欲待其後世乃歸三十九年楚靈王彊會諸侯於申為盟主殺齊慶封景公立四十年卒子哀公立后子復來歸秦哀公八年楚公子棄疾弑靈王而自立是為平王十一年楚平王來求秦女為太子建妻至國女好而自娶之十五年楚平王欲誅建建亡伍子胥奔吳晉公室卑而六卿彊欲内相攻是以久秦晉不相攻三十一年吳王闔閭與伍子胥伐楚楚王亡奔隨吳遂入郢楚大夫申包胥來告急七日不食日夜哭泣於是秦乃發五百乘救楚敗吳師吳師歸楚昭王乃得復入郢哀公立三十六年卒太子夷公夷公蚤死不得立立夷公子是為惠公惠公元年孔子行魯相事五年晉卿中行范氏反晉晉使智氏趙簡子攻之范中行氏亡奔齊惠公立十年卒子悼公立悼公二年齊臣田乞弑其君孺子立其兄陽生為悼公六年吳敗齊師齊人弑悼公立其子簡公九年晉定公與吳王夫差盟爭長於黃池卒先吳徐廣曰外傳云吳王先歃吳彊陵中國十二年齊田常弑簡公立其弟平公常相之十三年楚滅陳秦悼公立十四年卒子厲共公立孔子以悼公十二年卒厲共公二年蜀人來賂十六年壍河旁以兵二萬伐大荔取其王城徐廣曰今之臨晉也臨晉有王城二十一年初縣頻陽地理志馮翊有頻陽縣晉取武城二十四年晉亂殺智伯分其國與趙韓魏二十五年智開與邑人來奔徐廣曰一本二十六年城南鄭也三十三年伐義渠虜其王應劭曰義渠北地也三十四年日食厲共公卒子躁公立躁公二年南鄭反十三年義渠來伐至渭南十四年躁公卒立其弟懷公懷公四年庶長鼂與大臣圍懷公懷公自殺懷公太子曰昭子蚤死大臣乃立太子昭子之子是為靈公靈公懷公孫也靈公六年晉城少梁秦擊之十三年城籍姑靈公卒子獻公不得立立靈公季父悼子是為簡公簡公昭子之弟而懷公子也簡公六年令吏初帶劒壍洛城重泉地理志重泉縣屬馮翊十六年卒徐廣曰表云十五年也子恵公立惠公十二年子出子生十三年伐蜀取南鄭惠公卒出子立出子二年庶長改迎靈公之子獻公于河西而立之殺出子及其母沈之淵旁秦以往者數易君君臣乖亂故晉復彊奪秦河西地獻公元年徐廣曰丁酉止從死二年城櫟陽徐廣曰徙都之今萬年是也四年正月庚寅孝公生十一年周太史儋見獻公曰周故與秦國合而别别五百歲復合合七十七歲而霸王出十六年桃冬花十八年雨金櫟陽二十一年與晉戰于石門斬首六萬天子賀以黼黻周禮曰白與黒謂之黼黒與青謂之黻二十三年與魏晉戰少梁虜其將公孫痤二十四年獻公卒徐廣曰表云二十三年子孝公立年已二十一歲矣孝公元年徐廣曰庚申也河山以東彊國六與齊威楚宣魏惠燕悼韓哀趙成侯竝淮泗之間小國十餘楚魏與秦接界魏築長城自鄭濱洛以北有上郡楚自漢中南有巴黔中周室微諸侯力政爭相併秦僻在雍州不與中國諸侯之會盟夷翟遇之孝公於是布惠振孤寡招戰士明功賞下令國中曰昔我穆公自岐雍之間修德行武東平晉亂以河為界西霸戎翟廣地千里天子致伯諸侯畢賀為後世開業甚光美會往者厲躁簡公出子之不寧國家内憂未遑外事三晉攻奪我先君河西地諸侯卑秦醜莫大焉獻公即位鎮撫邊境徙治櫟陽且欲東伐復穆公之故地修穆公之政令寡人思念先君之意常痛於心賓客羣臣有能出奇計彊秦者吾且尊官與之分土於是乃出兵東圍陜城西斬戎之獂王地理志天水有獂道縣應劭曰獂戎邑音桓衛鞅聞是令下西入秦因景監求見孝公二年天子致胙三年衛鞅說孝公變法修刑内務耕稼外勸戰死之賞罰孝公善之甘龍杜摯等弗然相與爭之卒用鞅法百姓苦之居三年百姓便之乃拜鞅為左庶長其事在商君語中七年與魏惠王會杜平八年與魏戰元里有功十年衛鞅為大良造將兵圍魏安邑降之地理志曰河東有安邑縣十二年作為咸陽築冀闕秦徙都之并諸小鄉聚集為大縣縣一令漢書百官表曰縣令長皆秦官萬户以上為合秩千户至六百石滅萬户為長秩五百石至三百石皆有丞尉四十一縣為田開阡陌東地渡洛十四年初為賦徐廣曰制貢賦之法也十九年天子致伯二十年諸侯畢賀秦使公子少官率師會諸侯逢澤徐廣曰開封東北有逢澤朝天子二十一年齊敗魏馬陵二十二年衛鞅擊魏虜魏公子卭封鞅為列侯號商君二十四年與晉戰鴈門虜其將魏錯孝公卒子惠文君立是歲誅衛鞅鞅之初為秦施法法不行太子犯禁鞅曰法之不行自於貴戚君必欲行法先於太子太子不可黥黥其傅師於是法大用秦人治及孝公卒太子立宗室多怨鞅鞅亡因以為反而卒車裂以徇秦國漢書曰商君為法於秦戰斬一首賜爵一級欲為官者五千石其爵名一為公士二上造三簪褭四不更五大夫六公大夫七官大夫八公乘九五大夫十左庶長十一右庶長十二左更十三中更十四右更十五少上造十六大上造十七十駟車庶長十八大庶長十九闗内侯二徹侯惠文君元年楚韓趙蜀人來朝二年天子賀三年王冠四年天子致文武胙齊魏為王五年陰晉人犀首為大良造犀首官名姓公孫名衍六年魏納陰晉陰晉更名寧秦徐廣曰今之華陰也七年公子卭與魏戰虜其將龍賈斬首八萬八年魏納河西地九年渡河取汾陰皮氏地理志二縣屬河東與魏王會應圍焦降之十年張儀相秦魏納上郡十五縣十一年縣義渠歸魏焦曲沃義渠君為臣更名少梁曰夏陽十二年初臘十三年四月戊午魏君為王韓亦為王使張儀伐取陜出其人與魏十四年更為元年二年張儀與齊楚大臣會齧桑三年韓魏太子來朝張儀相魏五年王游至北河徐廣曰戎地在河上七年樂池相秦韓趙魏燕齊帥匈奴共攻秦秦使庶長疾與戰修魚虜其將申差敗趙公子渴韓太子奐斬首八萬二千八年張儀復相秦九年司馬錯伐蜀滅之伐取趙中都西陽地理志太原有中都縣十年韓太子蒼來質伐取韓石章伐敗趙將泥徐廣曰將一作莊伐取義渠二十五城十一年㯉里疾攻魏焦降之敗韓岸門斬首萬其將犀首走公子通封於蜀徐廣曰是歲王赧元年燕君讓其臣子之十二年王與梁王會臨晉庶長疾攻趙虜趙將莊張儀相楚十三年庶長章擊楚於丹陽虜其將屈匄斬首八萬又攻楚漢中取地六百里置漢中郡楚圍雍氏秦使庶長疾助韓而東攻齊到滿助魏攻燕十四年伐楚取召陵丹犂臣蜀相壯徐廣曰一作狀殺蜀侯來降惠王卒子武王立韓魏齊楚越徐廣曰一作趙皆賓從武王元年與魏惠王會臨晉徐廣曰表云哀王誅蜀相壯張儀魏章皆東出之魏伐義渠丹犂二年初置丞相應劭曰丞者承也相助也樗里疾甘茂為左右丞相張儀死於魏三年與韓襄王會臨晉外南公揭卒樗里疾相韓武王謂甘茂曰寡人欲容車通三川窺周室死不恨矣其秋使甘茂庶長封伐宜陽四年拔宜陽斬首六萬涉河城武遂徐廣曰韓邑也魏太子來朝武王有力好戲力士任鄙烏獲孟說皆至大官王與孟說舉鼎絶臏徐廣曰一作脉八月武王死皇覽曰秦武王冢在扶風安陵縣西北畢陌中大冡是也人以為周文王冡非也周文王冡在杜中族孟說武王取魏女為后無子立異母弟是為昭襄王昭襄母楚人姓芈氏號宣太后武王死時昭襄王為質於燕燕人送歸得立昭襄王元年嚴君疾為相甘茂出之魏二年彗星見庶長壯與大臣諸侯公子為逆皆誅及惠文后皆不得良死徐廣曰逆婦於楚者悼武王后出歸魏三年王冠與楚王會黃棘與楚上庸地理志漢中有上庸縣四年取蒲坂彗星見五年魏王來朝應亭徐廣曰魏世家云會臨晉復與魏蒲坂六年蜀侯煇反司馬錯定蜀庶長奐伐楚斬首二萬涇陽君質於齊日食晝晦七年拔新城樗里子卒八年使將軍芊戎攻楚取新市晉帝記曰江夏有新市縣齊使章子魏使公孫喜韓使暴鳶共攻楚方城取唐昧趙破中山其君亡竟死齊魏公子勁韓公子長為諸侯九年孟嘗君㠔文來相秦奐攻楚取八城殺其將景快十年楚懷王入朝秦秦留之嶭文以金受免樓緩為丞相十一年齊韓魏趙宋中山五國共攻秦至鹽氏而還徐廣曰鹽一作監秦與韓魏河北及封陵以和彗星見楚懷王走之趙趙不受還之秦即死歸葬十二年樓緩免穰侯魏冉為相予楚粟五萬石十三年向壽伐韓取武始地理志魏郡有武始縣左更白起攻新城五大夫禮出亡奔魏任鄙為漢中守漢書百官表曰郡守秦官十四年左更白起攻韓魏於伊闕斬首二十四萬虜公孫喜拔五城十五年大良造白起攻魏取垣復予之攻楚取宛十六年左更錯取軹及鄧地理志河内有軹縣南陽有鄧縣冉免封公子市宛公子悝鄧魏冉陶為諸侯十七年城陽君入朝及東周君來朝秦以垣為蒲坂皮氏王之宜陽十八年錯攻垣河雍決橋取之徐廣曰汲冢紀年云魏哀王二十四年西改宜陽曰河雍改向曰髙平向在軹之十九年王為西帝齊為東帝皆復去之吕禮來自歸齊破宋宋王在魏死温任鄙卒二十年徐廣曰秦地有文馬生駒王之漢中又之上郡北河二十一年徐廣曰有牡馬生牛而死錯攻魏河内魏獻安邑秦出其人募徙河東賜爵赦罪人遷之涇陽君封宛二十二年䝉武伐齊河東為九縣與楚王會宛與趙王會中陽地理志西河有中陽縣二十三年尉斯離與三晉燕伐齊破之濟西王與魏王會宜陽與韓王會新城二十四年與楚王會鄢又會穰秦取魏安城地理志汝南有安城縣至大梁燕趙救之秦軍去魏冉免相二十五年拔趙二城與韓王會新城與魏王㑹新明邑二十六年赦罪人遷之穰侯冉復相二十七年錯攻楚赦罪人遷之南陽白起攻趙取代光狼城又使司馬錯發隴西因蜀攻楚黔中拔之二十八年大良造白起攻楚取鄢鄧赦罪人遷之二十九年大良造白起攻楚取郢為南郡楚王走周君來王與楚王會襄陵地理志河東有襄陵縣白起為武安君三十年蜀守若伐取巫郡及江南為黔中郡三十一年白起伐魏取兩城楚人伐我江南三十二年相穰侯攻魏至大梁破暴鳶斬首四萬鳶走魏入三縣請和三十三年客卿胡傷攻魏卷地理志河南有卷縣蔡陽長社取之地理志潁川有長社縣擊芒卯華陽破之司馬彪曰華陽亭名在密縣斬首十五萬魏入南陽以和徐廣曰河内修武古曰南陽秦始皇更名河内屬魏地荆州之南陽郡本屬韓地三十四年秦與魏韓上庸地為一郡南陽免臣遷居之三十五年佐韓魏楚伐燕初置南陽郡三十六年客卿竈攻齊取剛壽予穰侯三十八年中更胡傷攻趙閼與孟康曰音焉與邑名在上黨湼縣西不能取四十年悼太子死魏歸葬芷陽徐廣曰今霸陵四十一年夏攻魏取邢丘懷徐廣曰邢丘在平臯駰案韓詩外傳武王伐紂到于邢丘勒兵於寗更名邢丘曰懷寗曰修武四十二年安國君為太子十月宣太后薨徐廣曰芊氏葬芷陽酈山九月穰侯出之陶四十三年武安君白起攻韓拔九城斬首五萬四十四年攻韓南郡取之四十五年五大夫賁攻韓取十城葉陽一云華陽悝出之國未至而死四十七年秦攻韓上黨上黨降趙秦因攻趙趙發兵擊秦相距秦使武安君白起擊大破趙於長平四十餘萬盡殺之四十八年十月韓獻垣雍司馬彪曰河南卷縣有垣雍城秦軍分為三軍武安君歸王齕將伐趙武安君攻皮牢拔之司馬梗北定太原盡有韓上黨正月兵罷復守上黨其十月五大夫陵攻趙邯鄲四十九年正月益發卒佐陵陵戰不善免王齕代將其十月將軍張唐攻魏為蔡尉捐弗守還斬之五十年十月武安君白起有罪為士伍遷陰密如淳曰嘗有爵而以罪奪爵皆稱士伍張唐攻鄭拔之十二月益發卒軍汾城旁武安君白起有罪死齕攻邯鄲不拔去還奔汾軍二月餘攻晉軍斬首六千晉楚流死河二萬人徐廣曰楚一作走攻汾城即從唐拔寧徐廣曰作曼此趙邑也新中寧新中更名安陽徐廣曰魏郡有安陽縣初作河橋五十一年將軍摎攻韓取陽城負黍斬首四萬攻趙取二十餘縣首虜九萬西周君背秦與諸侯約從將天下銳兵出伊闕攻秦令秦毋得通陽城於是秦使將軍摎攻西周西周君走來自歸頓首受罪盡獻其邑三十六城口三萬秦王受獻歸其君於周五十二年周民東亡其器九鼎入秦周初亡五十三年天下來賓魏後秦使摎伐魏取吳城徐廣曰在大陽韓王入朝魏委國聼令五十四年王郊見上帝於雍五十六年秋昭襄王卒子孝文王立尊唐八子為唐太后徐廣曰八子者妾媵之號姓唐而合其葬於先王韓王衰絰入弔祠諸侯皆使其將相來弔祠視喪事孝文王元年赦罪人修先王功臣襃厚親戚弛苑囿孝文王除喪十月己亥即位三日辛丑卒子莊襄王立莊襄王元年大赦罪人修先王功臣施德厚骨肉而布惠於民東周君與諸侯謀秦秦使相國吕不韋誅之盡入其國秦不絶其祀以陽人地地理志河南梁縣有陽人聚賜周君奉其祭祀使蒙驁伐韓韓獻成臯鞏秦界至大梁初置三川郡韋昭曰有河洛伊故曰三川駰按地理志漢高祖更曰河南郡二年使䝉驁攻趙定太原三年䝉驁攻魏高都汲徐廣曰一作波波縣亦在河内拔之攻趙榆次新城狼孟取三十七城四月日食四年王齕攻上黨初置太原郡魏將無忌率五國兵擊秦秦却於河外蒙驁敗解而去五月丙午莊襄王卒子政立是為秦始皇帝秦王政立二十六年初并天下為三十六郡號為始皇帝始皇帝五十一年而崩子胡亥立是為二世皇帝三年諸侯竝起叛秦趙高殺二世立子嬰子嬰立月餘諸侯誅之遂滅秦其語在始皇本紀中太史公曰秦之先為嬴姓其後分封以國為姓有徐氏郯氏莒氏終黎氏徐廣曰世本作鍾離應劭曰氏姓注云有姓終黎者是運奄氏莬裘氏將梁氏黃氏江氏脩魚氏白㝠氏蜚亷氏秦氏然秦以其先造父封趙城為趙氏史記集解卷五
