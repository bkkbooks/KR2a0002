body:
  text: 史記集解卷三十四宋裴駰撰史記三十四燕召公世家第四召公奭與周同姓姓姬氏周武王之滅紂封召公於北燕其在成王時召公為三公自陜以西召公主之自陜以東周公主之成王既幼周公攝政當國踐阼召公疑之作君奭君奭不說周公馬融曰召公以周公既攝政致太平功配文武不宜復列在臣位故不說以為周公茍貪寵也周公乃稱湯時有伊尹假于皇天孔安國曰伊摯佐湯功大至天謂致太平也鄭𤣥曰皇天北極天帝也在大戊時則有若伊陟臣扈假于上帝巫咸治王家孔安國曰伊陟臣扈率伊尹之職使其君不隕祖業故至天之功不隕巫咸治王家言其不及二臣馬融曰道至于上帝謂奉天時也鄭𤣥曰上帝太微中其所疏也在祖乙時則有若巫賢孔安國曰時賢臣有如此巫賢也賢咸子巫氏也在武丁時則有若甘般孔安國曰髙宗即位甘般佐之後有傅說率維兹有陳保人有殷徐廣曰一無此九字駰案王肅曰循此數臣有陳列之功安治有殷也於是召公乃說召公之治西方甚得兆民和召公巡行鄉邑有棠樹決獄政事其下自侯伯至庶人各得其所無失職者召公卒而民人思召公之政懷棠樹不敢伐歌詠之作甘棠之詩自召公已下九世至惠侯燕惠侯當周厲王奔彘共和之時惠侯卒子釐侯立是歳周宣王初即位釐侯二十一年鄭桓公初封於鄭三十六年釐侯卒子頃侯立頃侯二十年周幽王滛亂為犬戎所弑秦始列為諸侯二十四年頃侯卒子哀侯立哀侯二年卒子鄭侯立鄭侯三十六年卒子繆侯立繆侯七年而魯𨼆公元年也十八年卒子宣侯立宣侯十三年卒桓侯立徐廣曰古史考曰世家自宣侯已下不說其屬以其難明故也桓侯七年卒子莊公立莊公十二年齊桓公始霸十六年與宋衞共伐周惠王惠王出奔温立惠王弟頽為周王譙周曰案春秋傳燕與子頽逐周惠王者乃南燕姞姓也世家以為北燕失之十七年鄭執燕仲父而内惠王于周二十七年山戎來侵我齊桓公救燕遂北伐山戎而還燕君送齊桓公出境桓公因割燕所至地予燕使燕共貢天子如成周時職使燕復修召公之法三十三年卒襄公立襄公二十六年晉文公為踐土之會稱伯三十一年秦師敗于殽三十七年秦穆公卒四十年襄公卒桓公立桓公十六年卒宣公立宣公十五年卒昭公立昭公十三年卒武公立是歲晉滅三郤大夫武公十九年卒文公立文公六年卒懿公立懿公元年齊崔杼弑其君莊公四年卒子惠公立惠公元年齊髙止來奔六年惠公多寵姬公欲去諸大夫而立寵姬宋大夫共誅姬宋惠公懼奔齊四年齊髙偃如晉請共伐燕入其君晉平公許與齊伐燕入惠公惠公至燕而死燕立悼公悼公七年卒共公立共公五年卒平公立晉公室卑六卿始彊大平公十八年吳王闔閭破楚入郢十九年卒簡公立簡公十二年卒獻公立晉趙鞅圍范中行於朝歌獻公十二年齊田常弑其君簡公十四年孔子卒二十八年獻公卒孝公立孝公十二年韓魏趙滅知伯分其地三晉彊十五年孝公卒成公立成公十六年卒湣公立湣公三十一年卒釐公立是歲三晉列為諸侯釐公三十年伐齊敗于林營釐公卒桓公立桓公十一年卒文公立是歲秦獻公卒秦益彊文公十九年齊威王卒二十八年蘓秦始來見説文公文公予車馬金帛以至趙趙肅侯用之因約六國為從長秦惠王以其女為燕太子婦二十九年文公卒太子立是為易王易王初立齊宣王因燕喪伐我取十城蘓秦説齊使復歸燕十城十年燕君為王蘓秦與燕文公夫人私通懼誅乃説王使齊為反間欲以亂齊孫子兵法曰反問者因敵間而用之者也凡軍之所欲擊城之所欲攻人之所欲殺必先知其守將左右謁者門者舍人之姓名令吾間必索敵間之來問我者因而利導舍之故反間可得用也易王立十二年卒子燕噲立燕噲既立齊人殺蘓秦蘓秦之在燕與其相子之為婚而蘓代與子之交及蘓秦死而齊宣王復用蘓代燕噲三年與楚三晉攻秦不勝而還子之相燕貴重主斷蘓代為齊使於燕燕王問曰齊王奚如對曰必不霸燕王曰何也對曰不信其臣蘓代欲以激燕王以尊子之也於是燕王大信子之子之因遺蘓代百金而聴其所使鹿毛壽徐廣曰一作厝毛又曰甘陵縣本名厝謂燕王不如以國讓相子之人之謂堯賢者以其讓天下於許由許由不受有讓天下之名而實不失天下今王以國讓於子之子之必不敢受是王與堯同行也燕王因屬國於子之子之大重或曰禹薦益已而以啟人為吏及老而以啟為不足任乎天下傳之於益已而啟與交黨攻益奪之天下謂禹名傳天下於益已而實令啟自取之今王言屬國於子之而吏無非太子人者是名屬子之而實太子用事也王因收印自三百石吏已上而效之子之子之南面行王事而噲老不聴政顧為臣國事皆决於子之三年國大亂百姓恫恐將軍市被與太子平謀將攻子之諸將謂齊湣王曰因而赴之破燕必矣齊王因令人謂燕太子平曰寡人聞太子之義將廢私而立公飭君臣之義明父子之位寡人之國小不足以為先後雖然則唯太子所以令之太子因要黨聚衆將軍市被圍公宫攻子之不克將軍市被及百姓反攻太子平將軍市被死以徇因搆難數月死者數萬衆人恫恐百姓離志孟軻謂齊王曰今伐燕此文武之時不可失也王因令章子將五都之兵章子齊人見孟子以因北地之衆以伐燕士卒不戰城門不閉燕君噲死齊大勝燕子之亡徐廣曰年表云君噲及太子相子之皆死駰案汲冢紀年曰齊人禽子之而醢其身二年而燕人共立太子平是為燕昭王徐廣曰噲立七年而死其九年燕人共立太子平燕昭王於破燕之後即位卑身厚幣以招賢者謂郭隗曰齊因孤之國亂而襲破燕孤極知燕小力少不足以報然誠得賢士以共國以雪先王之恥孤之願也先生視可者得身事之郭隗曰王必欲致士先從隗始况賢於隗者豈逺千里哉於是昭王為隗改築宫而師事之樂毅自魏往鄒衍自齊往劇辛自趙往士争趨燕燕王弔死問孤與百姓同甘苦二十八年燕國殷富士卒樂軼輕戰於是遂以樂毅為上將軍與秦楚三晉合謀以代齊齊兵敗湣王出亡於外燕兵獨追北入至臨菑盡取齊寳燒其宫室宗廟齊城之不下者獨唯聊莒即墨其餘皆屬燕六歲昭王三十三年卒子惠王立惠王為太子時與樂毅有隙及即位疑毅使騎刦代將樂毅亡走趙齊田單以即墨擊敗燕軍騎刦死燕兵引歸齊悉復得其故城湣王死于莒乃立其子為襄王惠王七年卒韓魏楚共伐燕燕武成王立武成王七年齊田單伐我拔中陽十三年秦敗趙於長平四十餘萬十四年武成王卒子孝王立孝王元年秦圍邯鄲者解去三年卒子今王喜立今王喜四年秦昭王卒燕王命相栗腹約歡趙以五百金為趙王酒還報燕王曰趙王壯者皆死長平其孤未壯可伐也王召昌國君樂間問之對曰趙四戰之國其民習兵不可伐王曰吾以五而伐一對曰不可燕王怒羣臣皆以為卒起二軍車二千乗栗腹將而攻鄗徐廣曰在常山今曰髙邑卿秦攻代唯獨大夫將渠謂燕王曰與人通闗約交以五百金飲人之王使者報而反攻之不祥兵無成功燕王不聴自將偏軍隨之將渠引燕王綬止之曰王必無自往往無成功王蹵之以足將渠泣曰臣非以自為為王也燕軍至宋子徐廣曰屬鉅鹿趙使廉頗將擊破栗腹於鄗破卿秦樂乗於代樂間奔趙廉頗遂之五百餘里圍其國燕人請和趙人不許必令將渠處和燕相將渠以將渠為相以處和趙聽將渠解燕圍六年秦滅東西周置三川郡七年秦拔趙榆次三十七城秦置太原郡九年秦王政初即位十年趙使亷頗將攻繁陽徐廣曰屬魏郡拔之趙孝成王卒悼襄王立使樂乗代廉頗廉頗不聽攻樂乗樂乗走廉頗奔大梁十二年趙使李牧攻燕拔武遂徐廣曰屬河間方城徐廣曰屬涿有督亢亭劇辛故居趙與龐煖善已而亡走燕燕見趙數困于秦而廉頗去令龎煖將也欲因趙弊攻之問劇辛辛曰龎煖易與耳燕使劇辛將擊趙趙使龎煖擊之取燕軍二萬殺劇辛秦拔魏二十城置東郡十九年秦拔趙之鄴九城趙悼襄王卒二十三年太子丹質於秦亡歸燕二十五年秦虜滅韓王安置潁川郡二十七年秦虜趙王遷滅趙趙公子嘉自立為代王燕見秦且滅六國秦兵臨易水徐廣曰出涿郡故安也禍且至燕太子丹隂養壯士二十人使荆軻獻督亢地圖於秦因襲刺秦王秦王覺殺軻使將軍王翦擊燕二十九年秦攻拔我薊燕王亡徙居遼東斬丹以獻秦三十年秦滅魏三十三年秦拔遼東虜燕王喜卒滅燕是歲秦將王賁亦虜代王嘉太史公曰召公奭可謂仁矣甘棠且思之况其人乎燕北迫蠻貉内措齊晉崎嶇彊國之間最為弱小幾滅者數矣然社稷血食者八九百歲於姬姓獨後亡豈非召公之烈邪史記集解巻三十四
