body:
  text: 史記集解卷九十九宋裴駰撰史記九十九劉敬叔孫通列傳第三十九劉敬者齊人也漢五年戍隴西過洛陽髙帝在焉婁敬脱輓輅蘇林曰一木横鹿車前一人推之孟康曰輅音胡格切輓音晚衣其羊裘見齊虞将軍曰臣願見上言便事虞将軍欲與之鮮衣婁敬曰臣衣帛衣帛見衣褐衣褐見終不敢易衣於是虞将軍入言上上召入見賜食已而問婁敬婁敬説曰陛下都洛陽豈欲與周室比隆哉上曰然婁敬曰陛下取天下與周室異周之先自后稷堯封之邰積徳累善十有餘世公劉避桀居􅃎大王以狄伐故去􅃎杖馬箠居歧張晏曰言馬箠示約國人爭隨之及文王為西伯斷虞芮之訟始受命吕望伯夷自海濵來歸之武王伐紂不期而㑹孟津之上八百諸侯皆曰紂可伐矣遂滅殷成王即位周公之屬𫝊相焉廼營成周洛邑以此為天下之中也諸侯四方納貢職道里均矣有徳則易以王無徳則易以亡凡居此者欲令周務以徳致人不欲依阻險令後世驕奢以虐民也及周之盛時天下和洽四夷鄉風慕義懐徳附離而竝事天子荘子曰附離不以膠漆也不屯一卒不戰一士八夷大國之民莫不賔服効其貢職及周之衰也分而為兩天下莫朝周不能制也非其徳薄也而形勢弱也今陛下起豐沛收卒三千人以之徑往而卷蜀漢定三秦與項羽戰滎陽爭成臯之口大戰七十小戰四十使天下之民肝腦塗地父子暴骨中野不可勝數哭泣之聲未絶傷痍者未起而欲比隆於成康之時臣竊以為不侔矣且夫秦地被山帶河四塞以為固卒然有急百萬之衆可具也因秦之故資甚美膏腴之地此所謂天府者也陛下入闗而都之山東雖亂秦之故地可全而有也夫與人鬭不搤其肮張晏曰肮咽嚨也拊其背未能全其勝也今陛下入闗而都案秦之故地此亦搤天下之肮而拊其背也高帝問羣臣羣臣皆山東人爭言周王數百年秦二世即亡不如都周上疑未能決及留侯明言入闗便即日車駕西都闗中於是上曰本言都秦地者婁敬婁者乃劉也賜姓劉氏拜為郎中號為奉春君漢七年韓王信反高帝自往擊之至晉陽聞信與匃奴欲共擊漢上大怒使人使匃奴匃奴匿其壮士肥牛馬但見老弱及羸畜使者十輩來皆言匃奴可擊上使劉敬復往使匃奴還報曰兩國相撃此宜夸矜見所長韋昭曰夸張矜大也今臣往徒見羸瘠老弱此必欲見短伏竒兵以爭利愚以為匃奴不可擊也是時漢兵已踰句注二十餘萬兵已業行上怒罵劉敬曰齊虜以口舌得官今乃妄言沮吾軍械擊敬廣武遂往至平城匃奴果出竒兵圍高帝白登七日然後得解高帝至廣武赦敬曰吾不用公言以困平城吾皆已斬前使十輩言可擊者矣廼封敬二千户為闗内侯號為建信侯高帝罷平城歸韓主信亡入胡當是時冒頓為單于兵强控弦三十萬應劭曰控引數苦北邊上患之問劉敬劉敬曰天下初定士卒罷於兵未可以武服也冒頓殺父代立妻羣母以力為威未可以仁義説也獨可以計久逺子孫為臣耳然恐陛下不能為上曰誠可何為不能顧為奈何劉敬對曰陛下誠能以適長公主妻之厚奉遺之彼知漢適女送厚蠻夷必慕以為閼氏生子必為太子代單于何者貪漢重幣陛下以嵗時漢所餘彼所鮮數問遺因使辯士風諭以禮節冒頓在固為子壻死則外孫為單于豈嘗聞外孫敢與大父抗禮者哉兵可無戰以漸臣也若陛下不能遣長公主而令宗室及後宫詐稱公主彼亦知不肯貴近無益也高帝曰善欲遣長公主吕后日夜泣曰妾唯太子一女奈何棄之匃奴上竟不能遣長公主而取家人子名為長公主妻單于使劉敬往結和親約劉敬匃奴來因言匃奴河南白羊樓煩王張晏曰白羊匃奴國名去長安近者七百里輕騎一日一夜可以至秦中秦中新破少民地肥饒可益實夫諸侯初起時非齊諸田楚昭屈景莫能興今陛下雖都闗中實少人北近胡冦東有六國之族宗强一日有變陛下亦未得高枕而卧也臣願陛下徙齊諸田楚昭屈景燕趙韓魏後及豪桀名家居闗中無事可以備胡諸侯有變亦足率以東伐此强本弱末之術也上曰善廼使劉敬徙所言闗中十餘萬口叔孫通者晉灼曰楚漢春秋名何薛人也秦時以文學徴待詔博士數嵗陳勝起山東使者以聞二世召博士諸儒生問曰楚戍卒攻蘄入陳於公如何博士諸生三十餘人前曰人臣無将将即反罪死無赦瓉曰將謂逆亂也公羊傳曰君親無将将而必誅願陛下急發兵撃之二世怒作色叔孫通前曰諸生言皆非也夫天下合為一家毁郡縣城鑠其兵示天下不復用且明主在其上法令具於下使人人奉職四方輻輳安敢有反者此特羣盜䑕竊狗盜耳何足置之齒牙間郡守尉今捕論何足憂二世喜曰善盡問諸生諸生或言反或言盜於是二世令御史案諸生反者下吏非所宜言諸生盜者皆罷之廼賜叔孫通帛二十匹衣一襲拜為博士叔孫通已出宫反舍諸生曰先生何言之腴也通曰公不知也我幾不脱於虎口迺亡去之薛薛已降楚矣及項梁之薛叔孫通從之敗於定陶從懐王懐王為義帝徙長沙叔孫通留事項王漢二年漢王從五諸侯入彭城叔孫通降漢王漢王敗而西因竟從漢叔孫通儒服漢王憎之迺變其服服短衣楚製漢王喜叔孫通之降漢從儒生弟子百餘人然通無所言進専言諸故羣盜壮士進之弟子皆竊罵曰事先王數嵗幸得從降漢今不能進臣等専言大猾何也叔孫通聞之迺謂曰漢王方䝉矢石爭天下漢書音義曰謂發石以殺人諸生寧能鬭乎故先言斬将搴旗之士張晏曰搴卷也瓉曰拔取曰搴楚辭曰朝搴阰之木蘭諸生且待我我不忘矣漢王拜叔孫通為博士號稷嗣君徐廣曰蓋言其徳業足以繼蹤齊稷下之風流也駰案漢書音義曰稷嗣邑名漢五年已并天下諸侯共尊漢王為皇帝於定陶叔孫通就其儀號高帝悉去秦苛儀法為簡易羣臣飲酒爭功醉或妄呼拔劍擊柱高帝患之叔孫通知上益厭之也説上曰夫儒者難與進取可與守成臣願徴魯諸生與臣弟子共起朝儀高帝曰得無難乎叔孫通曰五帝異樂三王不同禮禮者因時世人情為之節文者也故夏殷周之禮所因損益可知者謂不相復也臣願頗采古禮與秦儀雜就之上曰可試為之令易知度吾所能行為之於是叔孫通使徴魯諸生三十餘人魯有兩生不肯行曰公所事者且十主皆靣䛕以得親貴今天下初定死者未葬傷者未起又欲起禮樂禮樂所由起積徳百年而後可興也吾不忍為公所為公所為不合古吾不行公往矣無汙我叔孫通笑曰若真鄙儒也不知時變遂與所徴三十三人西及上左右為學者與其弟子百餘人為綿蕞徐廣曰表位標準音子外切駰案如淳日置設綿索為習𨽻處蕞謂以茅翦樹地為纂位春秋傳曰置茅蕝也野外習之月餘叔孫通曰上可試觀上既觀使行禮曰吾能為此迺令羣臣習肄會十月漢七年長樂宫成諸侯羣臣皆朝十月儀先平明謁者治禮引以次入殿門廷中陳車騎步卒衛宫設兵張旗志徐廣曰一作幟傳言趋殿下郎中俠陛陛數百人功臣列侯諸将軍軍吏以次陳西方東鄉文官丞相以下陳東方西鄉大行設九賔臚句傳漢書音義曰傳從上下為臚於是皇帝輦出房百官執職徐廣曰一作幟傳警引諸侯王以下至吏六百石以次奉賀自諸侯王以下莫不振恐肅敬至禮畢復置法酒文穎曰作酒令法也蘇林曰常㑹須天子中起更衣然後入置酒矣諸侍坐殿上皆伏抑首如淳曰抑屈以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輒引去竟朝置酒無敢讙譁失禮者於是高帝曰吾迺今日知為皇帝之貴也廼拜叔孫通為太常賜金五百斤叔孫通因進曰諸弟子儒生隨臣久矣與臣共為儀願陛下官之高帝悉以為郎叔孫通出皆以五百斤金賜諸生諸生迺皆喜曰叔孫生誠聖人也知當世之要務漢九年高帝徙叔孫通為太子太傅漢十二年高祖欲以趙王如意易太子叔孫通諌曰昔者晉獻公以驪姬之故廢太子立奚齊晉國亂者數十年為天下笑秦以不早定扶蘇令趙高得以詐立胡亥自使滅祀此陛下所親見今太子仁孝天下皆聞之吕后與陛下攻苦食啖徐廣曰攻猶今人言擊也啖一作淡駰案如淳曰食無菜茹為啖其可背哉陛下必欲廢適而立少臣願先伏誅以頸血汙地高帝曰公罷矣吾直戲耳叔孫通曰太子天下本本一揺天下振動奈何以天下為戲高帝曰吾聴公言及上置酒見留侯所招客從太子入見上迺遂無易太子志矣高帝崩孝恵即位廼謂叔孫生曰先帝園陵􅆍廟羣臣莫能習徙為太常定宗廟儀法及稍定漢諸儀法漢諸儀法皆叔孫生為太常所論著也孝恵帝為東朝長樂宫闗中記曰長樂宫本秦之興樂宫也漢太后常居之及間往來數蹕煩人迺作複道方築武庫南韋昭曰閣道也如淳曰作複道方始築武庫南叔孫生奏事因請間曰陛下何自築複道高寝衣冠月出游高廟高廟漢太祖奈何令後世子孫乗宗廟道上行哉應劭曰月出高帝衣冠備法駕名曰游衣冠如淳曰三輔黄圖高寝在高廟西高祖衣冠蔵在高寝月出游於高廟其道值所作複道故言乗宗廟道上行孝恵帝大懼曰急壊之叔孫生曰人主無過舉今已作百姓皆知之今壊此則示有過舉願陛下為原廟渭北衣冠月出游之益廣多宗廟大孝之本也上迺詔有司立原廟原廟起以複道故孝恵帝曾春出游離宫叔孫生曰古者有春嘗果方今櫻桃孰可獻願陛下出因取櫻桃獻宗廟上迺許之諸果獻由此興太史公曰語曰千金之裘非一狐之腋也臺榭之榱非一木之枝也三代之際非一士之智也信哉夫高祖起微細定海内謀計用兵可謂盡之矣然而劉敬脱輓輅一説建萬世之安智豈可専邪叔孫通希世度務制禮進退與時變化卒為漢家儒宗大直若詘道固委蛇蓋謂是乎史記集解卷九十九
