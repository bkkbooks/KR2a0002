body:
  text: 史記集解卷一百十四宋裴駰撰史記一百十四東越列傳第五十四閩越王無諸韋昭曰閩音武巾反東越之别名及越東海王揺者其先皆越王句踐之後也姓騶氏徐廣曰騶一作駱秦已并天下皆廢為君長以其地為閎中郡徐廣曰今建安侯官是及諸侯畔秦無諸揺率越歸鄱陽令吴芮所謂鄱君者也從諸侯滅秦當是之時項籍主命弗王漢書音義曰主號令諸侯不王無諸揺等以故不附楚漢擊項籍無諸揺率越人佐漢漢五年復立無諸為閩越王王閩中故地都東冶孝惠三年舉髙帝時越功曰閩君揺功多其民便附乃立揺為東海王應劭曰在吴郡東南濵海云都東甌徐廣曰今之永寧也世俗號為東甌王後數世至孝景三年呉王濞反欲從閩越閩越未肯行獨東甌從吴及吴破東甌受漢購殺吴王丹徒以故皆得不誅歸國吴王子子駒亡走閩越怨東甌殺其父常勸閩越擊東甌至建元三年閩越發兵圍東甌東甌食盡困且降乃使人告急天子天子問大尉田蚡蚡對曰越人相攻撃固其常又數反覆不足以煩中國往救也自秦時棄弗屬於是中大夫莊助詰蚡曰特患力弗能救徳弗能覆誠能何故棄之且秦舉咸陽而棄之何乃越也今小國以窮困來告急天子天子弗振當安所告愬又何以子萬國乎上曰太尉未足與計吾初即位不欲出虎符發兵郡國乃遣莊助以節發兵㑹稽㑹稽太守欲距不為發兵助乃斬一司馬諭意指遂發兵浮海救東甌未至閩越引兵而去東甌請舉國徙中國乃悉舉衆來處江淮之間徐廣曰年表曰東甌王廣武侯望率其衆四萬餘人來降家廬江郡至建元六年閩越撃南越南越守天子約不敢擅發兵擊而以聞上遣大行王恢出豫章大農韓安國出㑹稽皆為将軍兵未踰嶺閩越王郢發兵距險其弟餘善乃與相宗族謀曰王以擅發兵撃南越不請故天子兵來誅今漢兵衆彊今即幸勝之後來益多終滅國而止今殺王以謝天子天子聴罷兵固一國完不聴乃力戰不勝即亡入海皆曰善即鏦殺王使使奉其頭致大行大行曰所謂來者誅王今王頭至謝罪不戰而耘徐廣曰漢書作運耘義當取耘除或言耘音子粉反此楚人聲重耳隕耘當同音但字有假借聲有輕重利莫大焉乃以便宜案兵告大農軍而使使奉王頭馳報天子詔罷兩將兵曰郢等首惡獨無諸孫繇君丑不與謀焉乃使中郎将立丑為越繇王奉閩越先祭祀餘善已殺郢威行於國國民多屬竊自立為王繇王不能矯其衆持正天子聞之為餘善不足復興師曰餘善數與郢謀亂而後首誅郢師得不勞因立餘善為東越王與繇王竝處至元鼎五年南越反東越王餘善上書請以卒八千人從樓船将軍撃吕嘉等兵至掲陽以海風波為解不行持兩端隂使南越及漢破番禺不至是時樓船将軍楊僕使使上書願便引兵撃東越上曰士卒勞倦不許罷兵令諸校屯豫章梅嶺待命徐廣曰在㑹稽界元鼎六年秋餘善聞樓船請誅之漢兵臨境且往乃遂反發兵距漢道號将軍騶力等為吞漢将軍入白沙武林徐廣曰在豫章介梅嶺殺漢三校尉是時漢使大農張成故山川侯齒徐廣曰成陽共王子将屯弗敢擊却就便處皆坐畏懦誅餘善刻武帝璽自立詐其民為妄言天子遣横海将軍韓説出句章浮海從東方往樓船将軍楊僕出武林中尉王温舒出梅嶺越侯為戈船下瀨将軍出若邪白沙元封元年冬咸入東越東越素發兵距險使徇北将軍守武林敗樓船軍數校尉殺長吏樓船将軍率錢唐轅終古斬徇北将軍為禦兒侯漢書音義曰今吴南亭是也自兵未往故越衍侯吴陽前在漢漢使歸諭餘善餘善弗聴及横海將軍先至越衍侯吴陽以其邑七百人反攻越軍於漢陽從建成侯敖徐廣曰亦東越臣與其率從繇王居股謀曰餘善首惡劫守吾屬今漢兵至衆彊計殺餘善自歸諸將儻幸得脱乃遂俱殺餘善以其衆降横海将軍故封繇王居股為東成侯萬户封建成侯敖為開陵侯封越衍侯吴陽為北石侯封横海将軍説為按道侯封横海校尉福為繚嫈侯漢書音義曰音遼縈福者成陽共王子故為海常侯坐法失侯奮從軍無功以宗室故侯諸将皆無成功莫封東越将多軍漢書音義曰多軍名也漢兵至棄其軍降封為無錫侯於是天子曰東越狹多阻閩越悍數反覆詔軍吏皆将其民徙處江淮間東越地遂虚太史公曰越雖蠻夷其先豈嘗有大功徳於民哉何其乆也厯數代常為君王句踐一稱伯然餘善至大逆滅國遷衆其先苗裔繇王居股等猶尚封為萬戸侯由此知越世世為公侯矣葢禹之餘烈也史記集解卷一百十四
