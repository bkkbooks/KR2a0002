body:
  text: 史記集解卷五十四宋裴駰撰史記五十四曹參世家第二十四平陽侯曹參者沛人也張華曰曹參字敬伯秦時為沛獄掾而蕭何為主吏居縣為豪吏矣高祖為沛公而初起也參以中涓從漢書音義曰中涓如中謁者將擊胡陵方與攻秦監公軍漢書音義曰監御史監郡者公名秦一郡置守衛監三人大破之東下薛擊泗水守軍薛郭西復攻胡陵取之徙守方與方與反為魏擊之豐反為魏攻之賜爵七大夫擊秦司馬尼軍碭東破之取碭狐父徐廣曰伍被曰吳濞敗於狐父祁善置文潁曰善置置名也晋灼曰祁音坻孫檢曰漢謂驛曰置善名也又攻下邑以西至虞擊章邯車騎攻爰戚徐廣曰宣帝時有爰戚侯及亢父先登遷為五大夫北救東阿撃章邯軍䧟陳追至濮陽攻定陶取臨濟南救雍丘撃李由軍破之殺李由虜秦候一人秦將章邯破殺項梁也沛公與項羽引而東楚懐王以沛公為碭郡長將碭郡兵於是乃封參為執帛張晏曰孤卿也或曰楚官名號曰建成君遷為戚公屬碭郡其後從攻東郡尉軍破之成武南撃王離軍成陽南復攻之杠里大破之追北西至開封撃趙賁軍破之圍趙賁開封城中西撃秦將楊熊軍於曲遇徐廣曰在中牟破之虜秦司馬及御史各一人遷為執珪張晏曰侯伯執珪以朝位比之如淳曰呂氏春秋得伍員者位執珪古爵名從攻陽武下轘轅緱氏絶河津還撃趙賁軍尸北破之徐廣曰尸在偃師孟康曰尸鄉北從南攻犨與南陽守齮戰陽城郭東應劭曰今赭陽陷陳取宛虜齮盡定南陽郡從西攻武關嶢關取之前攻秦軍藍田南又夜擊其北秦軍大破遂至咸陽滅秦項羽至以沛公為漢王漢王封參為建成侯從至漢中遷為將軍從還定三秦初攻下辯故道雍斄擊章平軍於好畤南破之圍好畤取壤鄉文潁曰地名撃三秦軍壤東及高櫟破之復圍章平章平出好畤走因擊趙賁内史保軍破之東取咸陽更命曰新城參將兵守景陵漢書音義曰縣名也二十日三秦使章平等攻參參出擊大破之賜食邑於寧秦蘇林曰今華陰參以將軍引兵圍章邯於廢丘以中尉從漢王出臨晉關至河内下脩武渡圍津徐廣曰東郡白馬有圍津東撃龍且項他定陶破之東取碭蕭彭城撃項籍軍漢軍大敗走參以中尉圍取雍丘王武反於黃徐廣曰内黃縣有黃澤程處反於燕徐廣曰東郡燕縣駰案漢書音義曰皆漢將徃撃盡破之柱天侯反於衍氏又進破取衍氏擊羽嬰於昆陽追至葉還攻武疆瓚曰武疆城在陽武因至滎陽參自漢中為將軍中尉從撃諸侯及項羽敗還至滎陽凡二歲高祖三年拜為假左丞相入屯兵關中月餘魏王豹反以假左丞相别與韓信東攻魏將軍孫遫軍東張徐廣曰張者地名功臣表有張侯毛澤之駰案蘇林曰屬河東大破之因攻安邑得魏將王襄撃魏王於曲陽追至武垣徐廣曰河東有垣縣生得魏王豹取平陽得魏王母妻子盡定魏地凡五十二城賜食邑平陽因從韓信撃趙相國夏説軍於鄔東徐廣曰鄔縣在太原音烏古反大破之斬夏説韓信與故常山王張耳引兵下井陘撃成安君而令參還圍趙别將戚將軍於鄔城中戚將軍出走追斬之乃引兵詣敖倉漢王之所韓信已破趙為相國東擊齊參以右丞相屬韓信攻破齊歴下軍遂取臨菑還定濟北郡攻著漯隂平原鬲盧已而從韓信撃龍且軍於上假密文潁曰或以為高密大破之斬龍且虜其將軍周蘭定齊凡得七十餘縣得故齊王田廣相田光其守相許章及故齊膠東將軍田既韓信為齊王引兵詣陳與漢王共破項羽而參留平齊未服者項籍已死天下定漢王為皇帝韓信徙為楚王齊為郡參歸漢相印高帝以長子肥為齊王而以參為齊相國以高祖六年賜爵列侯與諸侯剖符世世勿絶食邑平陽萬六百三十戸號曰平陽侯除前所食邑以齊相國撃陳豨將張春軍破之黥布反參以齊相國從悼惠王將兵車騎十二萬人與高祖會撃黥布軍大破之南至蘄還定竹邑相蕭留參功凡下二國縣一百二十二得王二人相三人將軍六人大莫敖漢書音義曰楚之卿號郡守司馬候御史各一人孝惠帝元年除諸侯相國法更以參為齊丞相參之相齊齊七十城天下初定悼惠王富於春秋參盡召長老諸生問所以安集百姓如齊故俗諸儒以百數言人人殊參未知所定聞膠西有蓋公善治黄老言使人厚幣請之既見蓋公蓋公為言治道貴清淨而民自定推此類具言之參於是避正堂舍蓋公焉其治要用黃老術故相齊九年齊國安集大稱賢相惠帝二年蕭何卒參聞之告舍人趣治行吾將入相居無何使者果召參參去屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大於此者乎參曰不然夫獄市者所以并容也今君擾之姦人安所容也吾是以先之漢書音義曰夫獄市兼受善惡若窮極姦人無所容竄久且為亂秦人極刑而天下畔孝武峻法而獄繁此其效也老子曰我無為而民自化我好靜而民自正參欲以道化其本不欲擾其末參始微時與蕭何善及為將相有卻至何且死所推賢唯參參代何為漢相國舉事無所變更一遵蕭何約束擇郡國吏木詘於文辭重厚長者即召除為丞相史吏之言文刻深欲務聲名者輒斥去之日夜飲醇酒卿大夫已下吏及賓客見參不事事如淳曰不事丞相之事來者皆欲有言至者參輒飲以醇酒間之欲有所言復飲之醉而後去終莫得開説如淳曰開謂有所啟白以為常相舍後園近吏舍吏舍日飲歌呼從吏惡之無如之何乃請參游園中聞吏醉歌呼從吏幸相國召案之乃反取酒張坐飲亦歌呼與相應和參見人之有細過專掩匿覆蓋之府中無事參子窋為中大夫惠帝怪相國不治事以為豈少朕與乃謂窋曰若歸試私從容問而父曰高帝新棄羣臣帝富於春秋君為相日飲無所請事何以憂天下乎然無言吾告若也窋旣洗沐歸間侍自從其所諫參參怒而笞窋二百曰趣入侍天下事非若所當言也至朝時惠帝讓參曰與窋何治乎如淳曰猶言用窋為治乃者我使諌君也參免冠謝曰陛下自察聖武孰與高帝上曰朕乃安敢望先帝乎曰陛下觀臣能孰與蕭何賢上曰君似不及也參曰陛下言之是也且高帝與蕭何定天下法令旣明今陛下垂拱參等守職遵而勿失不亦可乎惠帝曰善君休矣參為漢相國出入三年卒諡懿侯子窋代侯百姓歌之曰蕭何為法顜徐廣曰顜音古項反一音較若畫一曹參代之守而勿失載其清淨民以寧一平陽侯窋高后時為御史大夫孝文帝立免為侯立二十九年卒諡為靜侯子竒代侯立七年卒諡為簡侯子時代侯時尚平陽公主生子襄時病癘歸國立二十三年卒諡夷侯子襄代侯襄尚衞長公主生子宗立十六年卒諡為共侯子宗代侯征和二年中宗坐太子死國除太史公曰曹相國參攻城野戰之功所以能多若此者以與淮隂侯俱及信已滅而列侯成功唯獨參擅其名參為漢相國清靜極言合道然百姓離秦之酷後參與休息無為故天下俱稱其美矣史記集解卷五十四
