body:
  text: 史記集解卷五十一宋裴駰撰史記五十一荆燕世家第二十一荆王劉賈諸劉者不知其何屬漢書賈髙帝從父兄初起時漢王元年還定三秦劉賈為將軍定塞地從東擊項籍漢四年漢王之敗成臯北渡河得張耳韓信軍軍脩武深溝髙壘使劉賈將二萬人騎數百渡白馬津入楚地燒其積聚以破其業無以給項王軍食而已楚兵擊劉賈賈輒壁不肯與戰而與彭越相保漢五年漢王追項籍至固陵徐廣曰在陽夏使劉賈南渡淮圍夀春還至使人間招楚大司馬周殷周殷反楚佐劉賈舉九江迎武王黥布兵皆會垓下共擊項籍漢王因使劉賈將九江兵與太尉盧綰西南擊臨江王共尉共尉已死以臨江為南郡漢六年春會諸侯於陳廢楚王信囚之分其地為二國當是時也髙祖子幼昆弟少又不賢欲王同姓以鎭天下乃詔曰將軍劉賈有功及擇子弟可以為王者羣臣皆曰立劉賈為荆王王淮東五十二城髙祖弟交為楚王王淮西三十六城因立子肥為齊王始王昆弟劉氏也髙祖十一年秋淮南王黥布反東擊荆荆王賈與戰不勝走富陵為布軍所殺髙祖自擊破布十二年立沛侯劉濞為吳王王故荆地燕王劉澤者諸劉遠屬也漢書曰澤髙祖從祖昆弟髙帝三年澤為郎中髙帝十一年澤以將軍擊陳狶得王黄為營陵侯髙后時齊人田生晉灼曰楚漢春秋田子春游之資以畫干營陵侯澤服䖍曰以計畫干之也文穎曰以工畫得寵也澤大説之用金二百斤為田生夀田生已得金即歸齊二年澤使人謂田生曰弗與矣孟康曰與黨與言不復與我為與也文穎曰不得與汝相知田生如長安不見澤而假大宅令其子求事吕后所宰大謁者張子卿徐廣曰名澤駰如淳曰閹人也居數月田生子請張卿臨親修具張卿許徃田生盛帷帳共具譬如列侯張卿驚酒酣乃屏人説張卿曰臣觀諸侯王邸第百餘皆髙祖一切功臣今吕氏雅故本推轂髙帝就天下如淳曰吕公知髙祖相貴以女妻之推轂使為長者瓚曰謂諸吕共推轂髙祖征伐成帝業雅正意也功至大又親戚太后之重太后春秋長諸吕弱太后欲立吕産為吕王王代太后又重發之文穎曰欲發之恐太臣不聽鄧展曰重難發事恐大臣不聽今卿最幸大臣所敬何不風大臣以聞太后太后必喜諸吕已王萬户侯亦卿之有太后心欲之而卿為内臣不急發恐禍及身矣張卿大然之乃風大臣語太后太后朝因問大臣大臣請立吕産為吕王太后賜張卿千斤金張卿以其半與田生田生弗受因説之曰吕産王也諸大臣未大服今營陵侯澤諸劉為大將軍獨此尚觖望今卿言太后列十餘縣王之彼得王喜去諸吕王益固矣張卿入言太后然之乃以營陵侯劉澤為琅邪王琅邪王乃與田生之國田生勸澤急行母畱出關太后果使人追止之已出即還及太后崩琅邪王澤乃曰帝少諸吕用事劉氏孤弱乃引兵與齊王合謀西漢書音義曰澤至齊為齊王所劫不得去乃説王求詣京師齊具車送之不為本與齊合謀也欲誅諸吕至梁聞漢遣灌將軍屯滎陽澤還兵備西界遂跳驅至長安漢書音義曰跳驅馳至長安也代王亦從代至諸將相與琅邪王共立代王為天子天子乃徙澤為燕王乃復以琅邪予齊復故地李竒曰本濟地分以王澤今復與齊也澤王燕二年薨諡為敬王傳子嘉為康王至孫定國與父康王姬姧生子男一人奪弟妻為姬與子女三人姧定國有所欲誅殺臣肥如令郢人如淳曰定國自欲有所殺餘臣肥如令郢人以告之郢人等告定國定國使謁者以他法劫捕格殺郢人以滅口至元朔元年郢人昆弟復上書具言定國隂事以此發覺詔下公卿皆議曰定國禽獸行亂人倫逆天當誅上許之定國自殺國除為郡太史公曰荆王王也由漢初定天下未集故劉賈雖屬踈然以策為王塡江淮之間劉澤之王權激吕氏然劉澤卒南面稱孤者三世事發相重豈不為偉乎晉灼曰澤以金與田生以事張卿張卿言之吕后而劉澤得王故曰亊發相重或曰事起於相重也史記集解卷五十一
