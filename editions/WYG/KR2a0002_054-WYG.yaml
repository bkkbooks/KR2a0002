body:
  text: 史記集解卷五十六宋裴駰撰史記五十六陳丞相世家第二十六陳丞相平者陽武戸牖鄉人也徐廣曰陽武屬魏地戸牖今為東昏縣屬陳畱少時家貧好讀書有田三十畆獨與兄伯居伯常耕田縱平使游學平為人長美色人或謂陳平曰貧何食而肥若是其嫆嫉平之不視家生産曰亦食糠覈耳徐廣曰覈音核駰案孟康曰麥糠中不破者也晋灼曰覈音紇京師為麤屑為紇頭有叔如此不如無有伯聞之逐其婦而棄之及平長可娶妻富人莫肯與者貧者平亦恥之久之戸牖富人有張負張負女孫五嫁而夫輒死人莫敢娶平欲得之邑中有喪平貧待喪以先往後罷為助張負既見之喪所獨視偉平平亦以故後去負隨平至其家家乃負郭窮巷以弊席為門然門外多有長者車轍張負歸謂其子仲曰吾欲以女孫予陳平張仲曰平貧不事事一縣中盡笑其所為獨奈何予女乎負曰人固有好美如陳平而長貧賤者乎卒與女為平貧乃假貸幣以聘予酒肉之資以内婦負誡其孫曰毋以貧故事人不謹事兄伯如事父事㛮如母兄伯已逐其婦此㛮疑後娶也平既娶張氏女齎用益饒游道日廣里中杜平為宰分肉食甚均父老曰善陳孺子之為宰平曰嗟乎使平得宰天下亦如是肉矣陳渉起而王陳使周市畧定魏地立魏咎為魏王與秦軍相攻於臨濟陳平固已前謝其兄伯漢書音義曰謝語其兄往事魏從少年往事魏王咎於臨濟魏王以為太僕説魏王不聴人或讒之陳平亡去久之項羽畧地至河上陳平往歸之從入破秦賜平爵卿張晏曰禮秩如卿不治事項羽之東王彭城也漢王還定三秦而東殷王反楚項羽乃以平為信武君將魏王咎客在楚者以往擊降殷王而還項王使項悍拜平為都尉賜金二十鎰居無何漢王攻下殷王項王怒將誅定殷者將吏陳平懼誅乃封其金與印使使歸項王而平身間行杖劒亡渡河船人見其美丈夫獨行疑其亡將要中當有金玉寶器目之欲殺平平恐乃解衣躶而佐刺船船人知其無有乃止平遂至脩武降漢徐廣曰漢二年因魏無知求見漢王漢王召入是時萬石君奮為漢王中涓徐廣曰亦曰涓人受平謁入見平平等七人俱進賜食王曰罷就舎矣平曰臣為事來所言不可以過今日於是漢王與語而説之問曰子之居楚何官曰為都尉是日乃拜平為都尉使為參乘典䕶軍諸將盡讙曰大王一日得楚之亡卒未知其髙下而即與同載反使監䕶軍長者漢王聞之愈益幸平遂與東伐項王至彭城為楚所敗引而還收散兵至滎陽以平為亞將屬於韓王信軍廣武絳侯灌嬰等咸讒陳平曰平雖美丈夫如冠玉耳其中未必有也漢書音義曰飾冠以玉光好外見中非所有臣聞平居家時盜其㛮事魏不容亡歸楚歸楚不中又亡歸漢今曰大王尊官之令䕶軍臣聞平受諸將金金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑之召讓魏無知無知曰臣所言者能也陛下所問者行也今有尾生孝己之行如淳曰孝己髙宗之子有孝行而無益於勝負之數陛下何暇用之乎楚漢相距臣進竒謀之士顧其計誠足以利國家不耳且盜㛮受金又何足疑乎漢王召讓平曰先生事魏不中遂事楚而去今又從吾游信者固多心乎平曰臣事魏王魏王不能用臣説故去事項王項王不能信人其所任愛非諸項即妻之昆弟雖有竒士不能用平乃去楚聞漢王之能用人故歸大王臣躶身來不受金無以為資誠臣計畫有可采者顧大王用之使無可用者金具在請封輸官得請骸骨漢王乃謝厚賜拜為䕶軍中尉盡䕶諸將諸將乃不敢復言其後楚急攻絶漢甬道圍漢王於滎陽城久之漢王患之請割滎陽以西以和項王不聴漢王謂陳平曰天下紛紛何時定乎陳平曰項王為人恭敬愛人士之亷節好禮者多歸之至於行功爵邑重之士亦以此不附今大王慢而少禮士亷節者不來然大王能饒人以爵邑士之頑鈍如淳曰猶無亷隅嗜利無恥者亦多歸漢誠各去其兩短襲其兩長天下指麾則定矣然大王恣侮人不能得廉節之士顧楚有可亂者彼項王骨鯁之臣亞父鍾離昧龍且周殷之屬不過數人耳大王誠能出捐數萬斤金行反間間其君臣以疑其心項王為人意忌信䜛必内相誅漢因舉兵而攻之破楚必矣漢王以為然乃出黃金四萬斤與陳平恣所為不問其出入陳平既多以金縱反間於楚軍宣言諸將鍾離昧等為項王將功多矣然而終不得裂地而王欲與漢為一以滅項氏而分王其地項羽果意不信鍾離昧等項王既疑之使使至漢漢王為太牢具舉進見楚使即詳驚曰吾以為亞父使乃項王使復持去更以惡草具漢書音義曰草粗也進楚使楚使歸具以報項王項王果大疑亞父亞父欲急攻下滎陽城項王不信不肯聽亞父聞項王疑之乃怒曰天下事大定矣君王自為之願請骸骨歸歸未至彭城疽發背而死陳平乃夜出女子二千人滎陽城東門楚因擊之陳平乃與漢王從城西門夜出去遂入關收散兵復東其明年淮隂侯破齊自立為齊王使使言之漢王漢王大怒而罵陳平躡漢王漢書音義曰躡謂躡漢王足漢王亦悟乃厚遇齊使使張子房卒立信為齊王封平以戸牖鄉用其竒計䇿卒滅楚常以䕶軍中尉從定燕王臧荼漢六年人有上書告楚王韓信反髙帝問諸將諸將曰亟發兵坑豎子耳高帝黙然問陳平平固辭謝曰諸將云何上具告之陳平曰人之上書言信反有知之者乎曰未有曰信知之乎曰不知陳平曰陛下精兵孰與楚上曰不能過平曰陛下將用兵有能過韓信者乎上曰莫及也平曰今兵不如楚精而將不能及而舉兵攻之是趣之戰也竊為陛下危之上曰為之奈何平曰古者天子巡狩㑹諸侯南方有雲夢陛下第出偽逰雲夢㑹諸侯於陳陳楚之西界信聞天子以好出游其勢必無事而郊迎謁謁而陛下因禽之此特一力士之事耳髙帝以為然乃發使告諸侯㑹陳吾將南游雲夢上因隨以行行未至陳楚王信果郊迎道中高帝豫具武士見信至即執縳之載後車信呼曰天下已定我固當烹高帝顧謂信曰若毋聲而反明矣武士反接之漢王音義曰反縳兩手遂㑹諸侯於陳盡定楚地還至雒陽赦信以為淮隂侯而與功臣剖符定封於是與平剖符世世勿絶為戸牖侯平辭曰此非臣之功也上曰吾用先生謀計戰勝尅敵非功而何平曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知其明年以䕶軍中尉從攻反者韓王信於代卒至平城為匈奴所圍七日不得食高帝用陳平竒計使單于閼氏蘇林曰閼氏音焉支如漢皇后圍以得開高帝既出其計祕世莫得聞桓譚新論或云陳平為高帝解平城之圍則言其事秘世莫得而聞也此以工妙踔善故藏隠不傳焉子能權知斯事否吾應之曰此䇿乃反薄陋拙惡故隱而不泄高帝見圍七日而陳平徃説閼氏閼氏言於單于而出之以是知其所用説之事矣彼陳平必言漢有好麗美女為道其容貌天下無有今困急已馳使歸迎取欲進與單于單于見此人必大好愛之愛之則閼氏日以逺疎不如及其未到令漢得脱去去亦不持女來矣閼氏婦女有妒媔之性必憎惡而剚去之此説簡而要及得其用則欲使神怪故隠匿不泄也劉子駿聞吾言乃立稱善焉按漢書音義應劭説此事大㫖與桓論略同不知是應全取桓論或别有所聞乎今觀桓論似本無説高帝南過曲逆地理志縣屬中山也上其城望見其屋室甚大曰壯哉縣吾行天下獨見洛陽與是耳顧問御史曰曲逆戸口幾何對曰始秦時三萬餘戸間者兵數起多亡匿今見五千戸於是乃詔御史更以陳平為曲逆侯盡食之除前所食戸牖其後常以䕶軍中尉從攻陳豨及黥布凡出六竒計輒益邑凡六益邑竒計或頗祕世莫能聞也高帝從破布軍還病創徐行至長安燕王盧綰反上使樊噲以相國將兵攻之既行人有短惡噲者髙帝怒曰噲見吾病乃冀我死也用陳平謀而召絳侯周勃受詔牀下曰陳平亟馳傳載勃代噲將平至軍中即斬噲頭二人既受詔馳傳未至軍行計之曰樊噲帝之故人也功多且又乃呂后弟呂媭之夫有親且貴帝以忿怒故欲斬之則恐後悔寧囚而致上上自誅之未至軍為壇以節召樊噲噲受詔即反接載檻車傳詣長安而令絳侯勃代將將兵定燕反縣平行聞高帝崩平恐呂太后及呂􅎐讒怒乃馳傳先去逢使者詔平與灌嬰屯於滎陽平受詔立復馳至宮哭甚哀因奏事喪前吕太后哀之曰君勞出休矣平畏讒之就因固請得宿衞中太后乃以為郎中令曰傅教孝恵如淳曰傅相之𫝊也是後吕􅎐讒乃不得行樊噲至則赦復爵邑孝恵帝六年相國曹參卒以安國侯王陵為右丞相徐廣曰王陵以客從起豐以廄將别守豐上東因從戰不利奉孝恵魯元出雎水中封為雍侯髙帝八年定食安國二十一年卒諡武侯至𤣥孫坐酎金國除陳平為左丞相王陵者故沛人始為縣豪髙祖㣲時兄事陵陵少文任氣好直言及髙祖起沛入至咸陽陵亦自聚黨數千人居南陽不肯從沛公及漢王之還攻項籍陵乃以兵屬漢項羽取陵母置軍中陵使至則東鄉坐陵母欲以招陵陵母既私送使者泣曰為老妾語陵謹事漢王漢王長者也無以老妾故持二心妾以死送使者遂伏劒而死項王怒烹陵母陵卒從漢王定天下以善雍齒雍齒髙帝之仇而陵本無意從髙帝以故晩封為安國侯安國侯既為右丞相二歲孝惠帝崩高后欲立諸呂為王問王陵王陵曰不可問陳平陳平曰可呂太后怒乃詳遷陵為帝太𫝊實不用陵陵怒謝疾免杜門竟不朝請七年而卒陵之免丞相呂太后乃徙平為右丞相以辟陽侯審食其為左丞相左丞相不治常給事於中孟康曰不在治處便止宫中也食其亦沛人漢王之敗彭城西楚取太上皇呂后為質食其以舎人侍呂后其後楚破項籍為侯幸於呂太后及為相居中百官皆因決事呂嬃常以前陳平為高帝謀執樊噲數䜛曰陳平為相非治事日飲醇酒戲婦女陳平聞日益甚呂太后聞之私獨喜面質呂嬃於陳平曰鄙語曰兒婦人口不可用顧君與我何如耳無畏呂嬃之䜛也呂太后立諸吕為王陳平偽聴之及吕太后崩平與太尉勃合謀卒誅諸吕立孝文皇帝陳平本謀也審食其免相徐廣曰審食其初以舍人起侍吕后孝恵帝於沛又從在楚封二十五年文帝三年死子平代代二十二年景帝三年坐謀反國除一本云食其免後二歲為淮南王兩殺文帝令其子平嗣侯菑川王反辟陽近菑川平降之國除孝文帝立以為太尉勃親以兵誅吕氏功多陳平欲讓勃尊位乃謝病孝文帝初立怪平病問之平曰髙祖時勃功不如臣平及誅諸吕臣功亦不如勃願以右丞相讓勃於是孝文帝乃以絳侯勃為右丞相位次第一平徙為左丞相位次第二賜平金千斤益封三千户居頃之孝文皇帝既益明習國家事朝而問右丞相勃曰天下一歲決獄幾何勃謝曰不知問天下一歲錢榖出入幾何勃又謝不知汗出沾背愧不能對於是上亦問左丞相平平曰有主者上曰主者謂誰平曰陛下即問決獄責廷尉問錢榖責治粟内史上曰茍各有主者而君所主者何事也平謝曰主臣張晏曰若今人謝曰惶恐也馬融龍虎賦曰勇怯見之莫不主臣孟康曰主臣主羣臣也若今言人主也韋昭曰言主臣道不敢欺也陛下不知其駑下使待罪宰相宰相者上佐天子理隂陽順四時下育萬物之宜外鎮撫四夷諸侯内親附百姓使卿大夫各得任其職焉孝文帝乃稱善右丞相大慚出而讓陳平曰君獨不素教我對陳平笑曰君居其位不知其任邪且陛下即問長安中盜賊數漢書音義曰頭數也君欲強對邪於是絳侯自知其能不如平逺矣居頃之絳侯謝病請免相陳平専為一丞相孝文帝二年丞相陳平卒諡為獻侯子共侯買代侯二年卒子簡侯恢代侯二十三年卒子何代侯二十一年何坐略人妻棄市國除始陳平曰我多隂謀是道家之所禁吾世即廢亦已矣終不能復起以吾多隂禍也然其後曽孫陳掌以衛氏親貴戚願得續封陳氏然終不得徐廣曰陳掌者衛青之子壻太史公曰陳丞相平少時本好黄帝老子之學方其割肉俎上之時其意固己逺矣傾側擾攘楚魏之間卒歸髙帝常出竒計救紛糾之難振國家之患及吕后時事多故矣然平竟自脱定宗廟以榮名終稱賢相豈不善始善終哉非知謀孰能當此者乎史記集解卷五十六
