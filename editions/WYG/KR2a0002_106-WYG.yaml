body:
  text: 史記集解卷一百八宋裴駰撰史記一百八韓長孺列傳第四十八御史大夫韓安國者梁城安人也徐廣曰在汝潁之間也後徙雒陽嘗受韓子雜家説於騶田生所事梁孝王為中大夫呉楚反時孝王使安國及張羽為將扞呉兵於東界張羽力戰安國持重以故呉不能過梁呉楚已破安國張羽名由此顯梁孝王景帝母弟竇太后愛之令得自請置相二千石出入游戲僭於天子天子聞之心弗善也太后知帝不善乃怒梁使者弗見案責王所為韓安國為梁使見大長公主徐廣曰景帝姑而泣曰何梁王為人子之孝為人臣之忠而太后曾弗省也夫前日呉楚齊趙七國反時自關以東皆合從西鄉惟梁最親為艱難梁王念太后帝在中而諸侯擾亂一言泣數行下跪送臣等六人將兵繫卻呉楚呉楚以故兵不敢西而卒破亡梁王之力也今太后以小節苛禮責望梁王梁王父兄皆帝王所見者大故出稱蹕入言警車旗皆帝所賜也即欲以侘丑亞反誇也鄙縣徐廣曰侘一作絎也驅馳國中以夸諸侯令天下盡知太后帝愛之也今梁使來輒案責之梁王恐日夜涕泣思慕不知所為何梁王之為子孝為臣忠而太后弗恤也大長公主具以告太后太后喜曰為言之帝言之帝心乃解而免冠謝太后曰兄弟不能相教乃為太后遺憂悉見梁使厚賜之其後梁王益親驩太后長公主更賜安國可直千餘金名由此顯結於漢其後安國坐法抵罪䝉䝉縣名獄吏田甲辱安國安國曰死灰獨不復然乎田甲曰然即溺之居無何梁内史缺漢使使者拜安國為梁内史起徒中為二千石田甲亡走安國曰甲不就官我滅而宗甲因肉袒謝安國笑曰可溺矣公等足與治乎卒善遇之梁内史之缺也孝王新得齊人公孫詭説之欲請以為内史竇太后聞乃詔王以安國為内史公孫詭羊勝説孝王求為帝太子及益地事恐漢大臣不聴乃陰使人刺漢用事謀臣及殺故呉相袁盎景帝遂聞詭勝等計畫乃遣使捕詭勝必得漢使十輩至梁相以下舉國大索月餘不得内史安國聞詭勝匿孝王所安國入見王而泣曰主辱臣死大王無良臣故事紛紛至此今詭勝不得請辭賜死王曰何至此安國泣數行下曰大王自度於皇帝孰與太上皇之與髙皇帝及皇帝之與臨江王親孝王曰弗如也安國曰夫太上臨江親父子之間然而高帝曰提三尺劎取天下者朕也故太上皇終不得制事居於櫟陽臨江王適長太子也以一言過廢王臨江如淳曰景帝常屬諸姬太子母栗姬言不遜由是廢太子栗姬憂死用宫垣事卒自殺中尉府何者治天下終不以私亂公語曰雖有親父安知其不為虎雖有親兄安知其不為狼今大王列在諸侯悦一邪臣浮説犯上禁撓明法天子以太后故不忍致法於王太后日夜涕泣幸大王自改而大王終不覺寤有如太后宫車即晏駕大王尚誰攀乎語未卒孝王泣數行下謝安國曰吾今出詭勝詭勝自殺漢使還報梁事皆得釋安國之力也於是景帝太后益重安國孝王卒共王即位安國坐法失官居家建元中武安侯田蚡為漢太尉親貴用事安國以五百金物遺蚡蚡言安國太后天子亦素聞其賢即召以為北地都尉遷為大司農閩越東越相攻安國及大行王恢將兵未至越越殺其王降漢兵亦罷建元六年武安侯為丞相安國為御史大夫匈奴來請和親天子下議大行王恢燕人也數為邊吏習知胡事議曰漢與匈奴和親率不過數歲即復倍約不如勿許興兵擊之安國曰千里而戰兵不獲利今匈奴負戎馬之足懷禽獸之心遷徙鳥舉難得而制也得其地不足以為廣有其衆不足以為彊自上古不屬為人漢數千里爭利則人馬罷彼以全制其敝且彊弩之極矢不能穿魯縞許慎曰魯之縞尤薄衝風之末力不能漂鴻毛非初不勁末力衰也擊之不便不如和親羣臣議者多附安國於是上許和親其明年則元光元年鴈門馬邑豪聶翁壹張晏曰豪猶帥也因大行王恢言上曰匈奴初和親親信邊可誘以利陰使聶翁壹為間亡入匈奴謂單于曰吾能斬馬邑令丞吏以城降財物可盡得單于愛信之以為然許聶翁壹聶翁壹乃還詐斬死罪囚縣其頭馬邑城示單于使者為信曰馬邑長吏已死可急來於是單于穿塞將十餘萬騎入武州塞徐廣曰在鴈門當是時漢伏兵車騎材官三十餘萬匿馬邑旁谷中衛尉李廣為驍騎將軍漢書曰北貉燕人来致驍騎應劭曰驍健也張晏曰曉勇也若六摶之梟也太僕公孫賀為輕車將軍大行王恢為將屯將軍太中大夫李息為材官將軍御史大夫韓安國為䕶軍將軍諸將皆屬䕶軍約單于入馬邑而漢兵縱發王恢李息李廣别從代主撃其輜重於是時單于入漢長城武州塞未至馬邑百餘里行掠鹵徒見畜牧於野不見一人單于怪之攻烽燧得武州尉史欲刺問尉史尉史曰漢兵數十萬伏馬邑下單于顧問左右曰幾為漢所賣乃引兵還出塞曰吾得尉史乃天也命尉史為天王塞下傳言單于己引去漢兵追至塞度弗及即罷王恢等兵三萬聞單于不與漢合度徃擊輜重必與單于精兵戰漢兵勢必敗則以便宜罷兵皆無功天子怒王恢不出擊單于輜重擅引兵罷也恢曰始約敵入馬邑城兵與單于接而臣擊其輜重可得利今單于聞不至而還臣以三萬人衆不敵禔取辱耳徐廣曰禔一作祗也臣固知還而斬然得完陛下士三萬人於是下恢廷尉廷尉當恢逗橈當斬漢書音義曰逗曲行避敵也橈顧望軍法語也恢私行千金丞相蚡蚡不敢言上而言於太后曰王恢首造馬邑事今不成而誅恢是為匈奴報仇也上朝太后太后以丞相言告上上曰首為馬邑事者恢也故發天下兵數十萬從其言為此且縱單于不可得恢所部擊其輜重猶頗可得以尉士大夫心今不誅恢無以謝天下於是恢聞之乃自殺安國為人多大略智足以當世取舍而出於忠厚焉貪嗜於財然所推舉皆亷士賢於已者也於梁舉壺遂臧固郢他皆天下名士士亦以此稱慕之唯天子以為國器安國為御史大夫四歲餘丞相田蚡死安國行丞相事奉引墮車蹇如淳曰為天子導引而墮車跛足天子議置相欲用安國使使視之蹇甚乃更以平棘侯薛澤為丞相安國病免數月蹇愈上復以安國為中尉歲餘徙為衛尉車騎將軍衛青擊匈奴徐廣曰元光六年也出上谷破胡蘢音龍城將軍李廣為匈奴所得復失之公孫敖大亡卒皆當斬贖為庶人明年匈奴大入邊殺遼西太守及入鴈門所殺畧數千人車騎將軍衛青撃之出鴈門衞尉安國材官將軍屯於漁陽安國捕生虜言匈奴逺去即上書言方田作時請且罷軍屯罷軍屯月餘匈奴大入上谷漁陽安國壁乃有七百餘人出與戰不勝復入壁匈奴虜略千餘人及畜産而去天子聞之怒使使責讓安國徙安國益東屯右北平是時匈奴虜言當入東方安國始為御史大夫及䕶軍後稍斥䟽下遷而新幸壯將軍衛青等有功益貴安國既疏逺黙黙也將屯又為匈奴所欺失亡多甚自愧幸得罷歸乃益東徙屯意忽忽不樂數月病歐血死安國以元朔二年中卒太史公曰余與壺遂定律厯觀韓長孺之義壺遂之深中隠厚徐廣曰一云亷正忠厚世之言梁多長者不虚哉壺遂官至詹事天子方倚以為漢相㑹遂卒不然壺遂之内亷行修斯鞠躬君子也史記集解卷一百八
