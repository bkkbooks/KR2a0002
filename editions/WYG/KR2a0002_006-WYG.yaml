body:
  text: 史記集解卷六宋裴駰撰史記六秦始皇本紀第六秦始皇帝者秦莊襄王子也莊襄王為秦質子於趙見吕不韋姬悦而取之生始皇以秦昭王四十八年正月生於邯鄲及生名為政徐廣曰月作正宋忠云以正旦生故名姓趙氏年十三歳莊襄王死政代立為秦王當是之時秦地已并巴蜀漢中越宛有郢置南郡矣北收上郡以東有河東太原上黨郡東至滎陽滅二周置三川郡吕不韋為相封十萬户號曰文信侯招致賔客㳺士欲以并天下李斯為舍人文潁曰主廏内小史官名或曰侍從賔客謂之舍人也䝉驁王齮徐廣曰一作齕麃公等為將軍應劭曰麃秦邑王年少初即位委國事大臣晉陽反元年將軍䝉驁擊定之二年麃公將卒攻卷斬首三萬三年蒙驁攻韓取十三城王齮死十月將軍䝉驁攻魏氏畼有詭徐廣曰畼音場歳大饑四年拔畼有詭三月軍罷秦質子歸自趙趙太子出歸國十月庚寅蝗蟲從東方來蔽天天下疫百姓内粟千石拜爵一級五年將軍驁攻魏定酸棗地理志陳留有酸棗縣燕虚長平徐廣曰一作干駰按地理志汝南有長平縣也雍丘山陽城地理志陳留有雍丘縣河内有山陽縣皆拔之取二十城初置東郡冬雷六年韓魏趙衛楚共擊秦取壽陵秦出兵五國兵罷拔衛迫東郡其君角率其支屬徙居野王阻其山以保魏之河内七年彗星先出東方見北方五月見西方將軍驁死以攻龍孤慶都徐廣曰慶一作麃還兵攻汲彗星復見西方十六日夏太后死八年王弟長安君成蟜將軍擊趙反死屯留軍吏皆斬死遷其民於臨洮將軍壁死卒屯留蒲鶮反戮其屍徐廣曰鶮一作鶡屯留蒲鶡皆地名也壁於此地時士卒死者皆戮其屍河魚大上輕車重徐廣曰一無重字馬東就食嫪毐封為長信侯予之山陽地令毐居之宫室車馬衣服苑囿馳獵恣毐事無大小皆決於毐又以河西徐廣曰河一作汾太原郡更為毐國九年彗星見或竟天攻魏垣蒲陽四月上宿雍蔡邕曰上者尊位所在也司馬遷記事當言帝則依違但言上不敢媟言尊尊之意也己酉王冠帶劒徐廣曰年二十二長信侯毐作亂而覺矯王御璽蔡邕曰御者進也凡衣服加於身飲食入於口妃妾接於寢皆曰御御之親愛者曰幸璽者印信也天子璽白玉螭虎鈕古者尊卑共之月令曰固封璽左傳曰季武子璽書追而與之此諸侯大夫印稱璽也衛宏曰秦以前民皆以金玉為印龍虎鈕唯其所好秦以來天子獨以印稱璽又獨以玉羣臣莫敢用及太后璽以發縣卒及衛卒官騎戎翟君公舎人將欲攻蘄年宫為亂地理志蘄年宫在雍王知之令相國昌平君昌文君發卒攻毐戰咸陽斬首數百皆拜爵及宦者皆在戰中亦拜爵一級毐等敗走即令國中有生得毐賜錢百萬殺之五十萬盡得毐等衛尉竭漢書百官表曰衛尉秦官内史肆佐弋竭漢書百官表曰秦時少府有佐弋漢武帝改為佽飛掌弋射者中大夫令齊等二十人皆梟首縣首於木上曰梟車裂以徇滅其宗及其舎人輕者為鬼薪應劭曰取薪給宗廟為鬼薪也如淳曰律説鬼薪作三歳及奪爵遷蜀四千餘家家房陵四月寒凍有死者楊端和攻衍氏彗星見西方又見北方從斗以南八十日十年徐廣曰甲子相國吕不韋坐嫪毐免桓齮為將軍齊趙來置酒齊人茅焦説秦王曰秦方以天下為事而大王有遷母太后之名恐諸侯聞之由此倍秦也秦王乃迎太后於雍而入咸陽説苑曰始皇帝立茅焦為傅又爵之上卿太后大喜曰天下亢直使敗復成安秦社稷使妾母子復相見者茅君之力也復居甘泉宫徐廣曰表云咸陽南宫也大索逐客李斯上書説乃止逐客令李斯因説秦王請先取韓以恐他國於是使斯下韓韓王患之與韓非謀弱秦大梁人尉繚來説秦王曰以秦之強諸侯譬如郡縣之君臣但恐諸侯合從翕而出不意此乃智伯夫差湣王之所以亡也願大王毋愛財物賂其豪臣以亂其謀不過亡三十萬金則諸侯可盡秦王從其計見尉繚亢禮衣服食飲與繚同繚曰秦王為人蜂準徐廣曰蜂一作隆長目摯鳥膺豺聲少恩而虎狼心居約易出人下得志亦輕食人我布衣然見我常身自下我誠使秦王得志於天下天下皆為虜矣不可與乆游乃亡去秦王覺固止以為秦國尉卒用其計策而李斯用事十一年王翦桓齮楊端和攻鄴取九城王翦攻閼與橑楊徐廣曰橑音老在并州皆并為一軍翦將十八日軍歸斗食以下漢書百官表曰百石以下有斗食佐史之秩什推二人從軍取鄴安陽桓齮將十二年文信侯不韋死竊塟其舍人臨者晉人也逐出之秦人六百石以上奪爵遷五百石以下不臨遷勿奪爵自今以來操國事不道如嫪毐不韋者籍其門徐廣曰一作文視此秋復嫪毐舍人遷蜀者當是之時天下大旱六月至八月乃雨十三年桓齮攻趙平陽殺趙將扈輒斬首十萬王之河南正月彗星見東方十月桓齮攻趙十四年攻趙軍於平陽取宜安破之殺其將軍桓齮定平陽武城韓非使秦秦用李斯謀畱非非死雲陽韓王請為臣十五年大興兵一軍至鄴一軍至太原取狼孟地理志太原有狼孟縣地動十六年九月發卒受地韓南陽假守騰初令男子書年魏獻地於秦秦置麗邑十七年内史騰攻韓得韓王安盡納其地以其地為郡命曰潁川地動華陽太后卒民大飢十八年徐廣曰巴郡出大人長二十五丈六尺大興兵攻趙王翦將上地下井陘服䖍曰山名在常山今為縣音刑端和將河内羌瘣伐趙端和圍邯鄲城十九年王翦羌瘣盡定取趙地東陽得趙王引兵欲攻燕屯中山秦王之邯鄲諸嘗與王生趙時母家有仇怨皆阬之秦王還從太原上郡歸始皇帝母太后崩趙公子嘉率其宗數百人之代自立為代王東與燕合兵軍上谷大饑二十年燕太子丹患秦兵至國恐使荆軻刺秦王秦王覺之體解軻以徇而使王翦辛勝攻燕燕代發兵擊秦軍秦軍破燕易水之西二十一年王賁攻薊乃益發卒詣王翦軍遂破燕太子軍取燕薊城得太子丹之首燕王東收遼東而王之王翦謝病老歸新鄭反昌平軍徙於郢大雨雪深二尺五寸二十二年王賁攻魏引河溝灌大梁大梁城壞其王請降盡取其地二十三年秦王復召王翦強起之使將擊荆取陳以南至平輿地理志汝南有平輿縣虜荆王秦王游至郢陳荆將項燕立昌平君為荆王反秦於淮南徐廣曰淮一作江二十四年王翦䝉武攻荆破荆軍昌平君死項燕遂自殺二十五年大興兵使王賁將攻燕遼東得燕王喜還攻代虜代王嘉王翦遂定荆江南地降越君置會稽郡五月天下大酺服䖍曰酺音蒲文潁曰酺周禮族師掌春秋祭酺為人物災害之神蘇林曰陳留俗三月上已水上飲食為酺二十六年齊王建與其相后勝發兵守其西界不通秦秦使將軍王賁從燕南攻齊得齊王建秦初并天下令丞相御史曰異日韓王納地效璽請為藩臣已而倍約與趙魏合從畔秦故興兵誅之虜其王寡人以為善庶幾息兵革趙王使其相李牧來約盟故歸其質子已而倍盟反我太原故興兵誅之得其王趙公子嘉乃自立為代王故舉兵擊滅之魏王始約服入秦已而與韓趙謀襲秦秦兵吏誅遂破之荆王獻青陽以西漢書鄒陽傳曰越水長沙還舟青陽張晏曰青陽地名蘇林曰靑陽長沙縣是也已而畔約擊我南郡故發兵誅得其王遂定其荆地燕王昏亂其太子丹乃陰令荆軻為賊兵吏誅滅其國齊王用后勝計絶秦使欲為亂兵吏誅虜其王平齊地寡人以眇眇之身興兵誅暴亂賴宗廟之靈六王咸伏其辜天下大定今名號不更無以稱成功傳後世其議帝號丞相綰御史大夫刼漢書百官表曰御史大夫秦官應劭曰侍御史之率故稱大夫也廷尉斯等漢書百官表曰廷尉秦官應劭曰聽獄必質諸朝廷與衆共之兵獄同制故稱朝廷皆曰昔者五帝地方千里其外侯服夷服諸侯或朝或否天子不能制今陛下蔡邕曰陛階也所由升堂也天子必有近臣立於陛側以戒不虞謂之陛下者羣臣與天子言不敢指斥故呼在陛下者與之言因卑達尊之意也上書亦如之興義兵誅殘賊平定天下海内為郡縣法令由一綂自上古已來未嘗有五帝所不及臣等謹與博士議曰漢書百官表曰博士秦官掌通古今古有天皇有地皇有泰皇泰皇最貴臣等昧死上尊號王為泰皇命為制令為詔蔡邕曰制書帝者制度之命也其文曰制詔詔書詔告也天子自稱曰朕蔡邕曰朕我也古者上下共稱之貴賤不嫌則可以同號之義也臯陶與舜言朕言惠可底行屈原曰朕皇考至秦然後天子獨以為稱漢因而不改王曰去泰著皇采上古帝位號號曰皇帝他如議制曰可蔡邕曰羣臣有所奏請尚書令奏之下冇司曰制天子答之曰可追尊莊襄王為太上皇漢髙祖尊父曰太上皇亦倣此也制曰朕聞太古有號毋諡中古有號死而以行為諡如此則子議父臣議君也甚無謂朕弗取焉自今已來除諡法諡法周公所作朕為始皇帝後世以計數二世三世至于萬世傳之無窮始皇推終始五德之傳鄭𤣥曰音亭傳以為周得火德秦代周徳從所不勝方今水徳之始改年始朝賀皆自十月朔衣服旄旌節旗皆上黑數以六為紀符法冠皆六寸而輿六尺六尺為步乘六馬張晏曰水北方黒終數六故以六寸為符六尺為步瓚曰水數六故以六為名譙周曰步以人足為數非獨秦制然更名河曰徳水以為水徳之始剛毅戾深事皆決於法刻削毋仁恩和義然後合五徳之數於是急法乆者不赦丞相綰等言諸侯初破燕齊荆地遠不為置王毋以填之請立諸子唯上幸許始皇下其議於羣臣羣臣皆以為便廷尉李斯議曰周文武所封子弟同姓甚衆然后屬疏遠相攻擊如仇讐諸侯更相誅伐周天子弗能禁止今海内賴陛下神靈一綂皆為郡縣諸子功臣以公賦税重賞賜之甚足易制天下無異意則安寧之術也置諸侯不便始皇曰天下共苦戰鬭不休以有侯王賴宗廟天下初定又復立國是樹兵也而求其寧息豈不難哉廷尉議是分天下以為三十六郡三十六郡謂河南上中地三川河東南陽南郡九江鄣郡會稽潁川碭郡泗水嶭郡東郡琅邪齊郡上谷漁陽右北平遼西遼東代郡鉅鹿邯鄲上黨太原雲中九原鴈門上郡隴西北地漢中巴郡蜀郡黔中長沙凡三十五與内史為三十六郡郡置守尉監漢書百官表曰秦郡守掌治其郡有丞尉掌佐守典武職甲卒監御史掌監郡更名民曰黔首應劭曰黔亦黎黑也大酺收天下兵應劭曰古者以銅為兵聚之咸陽銷以為鐘鐻徐廣曰音巨金人十二重各千石置廷宫中一法度衡石丈尺車同軌書同文字地東至海暨朝鮮西至臨洮羌中南至北嚮户吳都賦曰開北户以向日劉逵曰日南之北户猶日北之南户也北據河為塞竝陰山地理志西河有陰山縣至遼東徙天下豪富於咸陽十二萬户諸廟及章臺上林皆在渭南秦每破諸侯寫放其宫室作之咸陽北阪上徐廣曰在長安西北漢武時别名渭城南臨渭自雍門徐廣曰在髙陸縣以東至涇渭殿屋複道周閣相屬所得諸侯美人鐘鼓以充入之二十七年始皇巡隴西北地出雞頭山過囘中焉應劭曰囘中在安定髙平孟康曰囘中在北地作信宫渭南已更命信宫為極廟象天極自極廟道通酈山作甘泉前殿築甬道應劭曰築垣牆如街巷自咸陽屬之是歲賜爵一級治馳道應劭曰馳道天子道也道若今之中道然漢書賈山傳曰秦為馳道於天下東窮燕齊南極吳楚江湖之上濵海之觀畢至道廣五十步三丈而樹厚築其外隱以金椎樹以青松二十八年始皇東行郡縣上鄒嶧山韋昭曰鄒魯縣山在其北立石與魯諸儒生議刻石頌秦徳議封禪望祭山川之事乃遂上泰山立石封祠祀服䖍曰増天之髙歸功於天張晏曰天髙不可及於泰山上立封禪而祭之冀近神靈也瓚曰積土為封謂負土於泰山上為壇而祭之下風雨暴至休於樹下因封其樹為五大夫禪梁父服䖍曰禪闡廣土地也瓚曰古者聖王封泰山禪亭亭或梁父皆太山下小山除地為墠祭於梁父後改墠曰禪刻所立石其辭曰皇帝臨位作制明法臣下修飭二十有六年初并天下罔不賔服親巡遠方黎民登兹泰山周覽東極從臣思迹本原事業祗誦功徳治道運行諸産得宜皆有法式大義休明垂於後世順承勿革皇帝躬聖既平天下不懈於治夙興夜寐建設長利專隆教誨訓經宣達逺近畢理咸承聖志貴賤分明男女禮順慎遵職事昭隔内外徐廣曰隔一作融靡不清淨施於後嗣化及無窮遵奉遺詔永承重戒於是乃竝勃海以東過黃腄地理志東萊有黄縣腄縣窮成山登之罘地理志之罘山在腄縣立石頌秦徳焉而去南登琅邪大樂之畱三月乃徙黔首三萬户琅邪臺下地理志云越王勾踐嘗治琅邪縣起臺館復十二歳作琅邪臺立石刻頌秦徳明得意曰維二十六年皇帝作始端平法度萬物之紀以明人事合同父子聖智仁義顯白道理東撫東土以省卒士事已大畢乃臨于海皇帝之功勤勞本事上農除末黔首是富暜天之下搏心揖志器械一量同書文字日月所照舟輿所載皆終其命莫不得意應時動亊是維皇帝匡飭異俗陵水經地憂恤黔首朝夕不懈除疑定法咸知所辟方伯分職諸治經易舉錯必當莫不如畫皇帝之明臨察四方尊卑貴賤不踰次行姦邪不容皆務貞良細大盡力莫敢怠荒遠邇辟隱專務肅莊端直敦忠事業有常皇帝之徳存定四極誅亂除害興利致福節事以時諸産繁殖黔首安寧不用兵革六親相保終無寇賊驩欣奉教盡知法式六合之内皇帝之土西涉流沙南盡北户東有東海北過大夏人迹所至無不臣者功葢五帝澤及牛馬莫不受徳各安其宇維秦王兼有天下立名為皇帝乃撫東土至于琅邪列侯張晏曰列侯者見序例武城侯王離列侯通武侯王賁倫侯建成侯趙亥倫侯昌武侯成倫侯武信侯馮母擇丞相隗林丞相王綰卿李斯卿王戊五大夫趙嬰五大夫楊樛從與議於海上曰古之帝者地不過千里諸侯各守其封域或朝或否相侵暴亂殘伐不止猶刻金石以自為紀古之五帝三王知教不同法度不明假威鬼神以欺遠方實不稱名故不乆長其身未殁諸侯倍叛法令不行今皇帝并一海内以為郡縣天下和平昭明宗廟體道行徳尊號大成羣臣相與誦皇帝功徳刻於金石以爲表經既已齊人徐市等上書言海中有三神山名曰蓬萊方丈瀛洲仙人居之請得齋戒與童男女求之於是遣徐市發童男女數千人入海求仙人始皇還過彭城齋戒禱祠欲出周鼎泗水使千人没水求之弗得乃西南渡淮水之衡山南郡浮江至湘山祠逢大風幾不得渡上問博士曰湘君何神博士對曰聞之堯女舜之妻而葬此於是始皇大怒使刑徒三千人皆伐湘山樹赭其山上自南郡由武關歸應劭曰武關秦南關通南陽文潁曰武關在析西百七十里𢎞農界二十九年始皇東游至陽武博浪沙中地理志河南陽武縣有博浪沙為盜所驚求弗得乃令天下大索十日登之罘刻石其辭曰維二十九年時在中春陽和方起皇帝東游巡登之罘臨照于海從臣嘉觀原念休烈追誦本始大聖作治建定法度顯著綱紀外教諸侯光施文惠明以義理六國囘辟貪戾無厭虐殺不已皇帝哀衆遂發討師奮揚武徳義誅信行威燀旁達徐廣曰燀充善反莫不賔服烹滅彊暴振救黔首周定四極普施明法經緯天下永為儀則大矣哉宇縣之中宇宇宙縣赤縣承順聖意羣臣誦功請刻于石表垂于常式其東觀曰維二十九年皇帝春游覽省逺方逮于海隅遂登之罘昭臨朝陽觀望廣麗從臣咸念原道至明聖法初興清理疆内外誅暴彊武威旁暢振動四極禽滅六王闡并天下災害絶息永偃戎兵皇帝明徳經理宇内視聽不怠作立大義昭設備器咸有章旗職臣遵分各知所行事無嫌疑黔首改化逺邇同度臨古絶尤常職既定後嗣循業長承聖治羣臣嘉徳祗誦聖烈請刻之罘旋遂之琅邪道上黨入三十年無事三十一年徐廣曰使黔首自實田也十二月更名臘曰嘉平太原真人茅盈内紀曰始皇三十一年九月庚子盈曾祖父蒙乃於華山之中乘雲駕龍白日升天先是其邑謠歌曰神仙得者茅初成駕龍上升入太清時下𤣥洲戲赤城繼世而徃在我盈帝若學之臘嘉平始皇聞謠歌而問其故父老具對此仙人之謠歌勸帝求長生之術於是始皇欣然乃有尋仙之志因改臘曰嘉平賜黔首里六石米二羊始皇為微行咸陽張晏曰若微賤之所為故曰微行也與武士四人俱夜出逢盜蘭池地理志渭城縣有蘭池宫見窘武士擊殺盜關中大索二十日米石千六百三十二年始皇之碣石使燕人盧生求羨門韋昭曰古仙人髙誓刻碣石門徐廣曰一作盟壞城郭決通隄防其辭曰遂興師旅誅戮無道為逆滅息武殄暴逆文復無罪徐廣曰復一作優庶心咸服惠論功勞賞及牛馬恩肥土域皇帝奮威徳并諸侯初一泰平墮壞城郭決通川防夷去險阻地勢既定黎庶無繇天下咸撫男樂其疇女修其業事各有序惠被諸産乆竝來田徐廣曰乆一作分莫不安所羣臣誦烈請刻此石垂著儀矩因使韓終侯公石生求仙人不死之藥始皇巡北邊從上郡入燕人盧生使入海還以鬼神事因奏録圖書曰亡秦者胡也鄭𤣥曰胡胡亥秦二世名也秦見圖書不知此為人名反備北胡始皇乃使將軍蒙恬發兵三十萬人北擊胡略取河南地三十三年發諸嘗逋亡人贅壻瓚曰贅謂居窮有子使就其婦家為贅壻賈人略取陸梁地為桂林韋昭曰今鬱林是也象郡韋昭曰今日南南海以適遣戍徐廣曰五十萬人守五嶺西北斥逐匈奴自榆中徐廣曰在金城竝河以東服䖍曰竝音傍傍依也屬之陰山徐廣曰在五原北以為三十四縣城河上為塞又使䝉恬渡河取髙闕陶山北假中晉灼曰王莽傳云五原北假膏壤殖穀北假地名也築亭障以逐戎人徙謫實之初縣禁不得祠明星出西方徐廣曰皇甫謐云彗星見三十四年適治獄吏不直者築長城及南越地始皇置酒咸陽宫博士七十人前為夀僕射周青臣漢書百官表曰僕射秦官古者重武官有主射以督課之應劭曰僕主也進頌曰他時秦地不過千里賴陛下神靈明聖平定海内放逐蠻夷日月所照莫不賓服以諸侯為郡縣人人自安樂無戰爭之患傳之萬世自上古不及陛下威徳始皇悦博士齊人淳于越進曰臣聞殷周之王千餘歳封子弟功臣自為枝輔今陛下有海内而子弟為匹夫卒有田常六卿之臣無輔拂何以相救哉事不師古而能長乆者非所聞也今靑臣又面䛕以重陛下之過非忠臣始皇下其議丞相李斯曰五帝不相復三代不相襲各以治非其相反時變異也今陛下創大業建萬世之功固非愚儒所知且越言乃三代之事何足法也異時諸侯竝爭厚招㳺學今天下已定法令出一百姓當家則力農工士則學習法令辟禁今諸生不師今而學古以非當世惑亂黔首丞相臣斯昧死言古者天下散亂莫之能一是以諸侯竝作語皆道古以害今飾虚言以亂實人善其所私學徐廣曰私一作知以非上之所建立今皇帝并有天下别白黒而定一尊私學而相與非法教人聞令下則各以其學議之入則心非出則巷議夸主以為名異取以為尚率羣下以造謗如此弗禁則主勢降乎上黨與成乎下禁之便臣請史官非秦記皆燒之非博士官所職天下敢有藏詩書百家語者悉詣守尉雜燒之有敢偶語詩書棄市應劭曰禁民聚語畏其謗已以古非今者族吏見知不舉者與同罪令下三十日不燒黥為城旦如淳曰律説論決為髠鉗輸邊築長城畫日伺寇虜夜暮築長城城旦四歳也所不去者醫藥卜筮種樹之書若欲有學法令徐廣曰一無法令二字以吏為師制曰可三十五年除道道九原地理志五原郡有九原縣抵雲陽徐廣曰表云道九原通甘泉塹山堙谷直通之於是始皇以為咸陽人多先王之宫廷小吾聞周文王都豐武王都鎬豐鎬之間帝王之都也乃營作朝宫渭南上林苑中先作前殿阿房東西五百步南北五千丈上可以坐萬人下可以建五丈旗周馳為閣道自殿下直抵南山表南山之顛以為闕為復道自阿房渡渭屬之咸陽以象天極閣道絶漢抵營室也阿房宫未成成欲更擇令名名之作宫阿房故天下謂之阿房宫隱宫徒刑者七十餘萬人乃分作阿房宫或作麗山發北山石椁乃寫蜀荆地材皆至關中計宫三百關外四百餘於是立石東海上胊界中以為秦東門因徙三萬家麗邑五萬家雲陽皆復不事十歲盧生説始皇曰臣等求芝竒藥仙者常弗遇類物有害之者方中人主時為微行以辟惡鬼惡鬼辟真人至人主所居而人臣知之則害於神真人者入水不濡入火不爇陵雲氣與天地乆長今上治天下未能恬淡願上所居宫毋令人知然後不死之藥殆可得也於是始皇曰吾慕真人自謂真人不稱朕乃令咸陽之旁二百里内宫觀二百七十復道甬道相連帷帳鐘鼓美人充之各案署不移徙行所幸有言其處者罪死始皇帝幸梁山宫徐廣曰在好畤從山上見丞相車騎衆弗善也中人或告丞相丞相後損車騎始皇怒曰此中人泄吾語案問莫服當是時詔捕諸時在旁者皆殺之自是後莫知行之所在聽事羣臣受決事悉於咸陽宫侯生説苑曰韓客侯生也盧生相與謀曰始皇為人天性剛戾自用起諸侯并天下意得欲從以為自古莫及己專任獄吏獄吏得親幸博士雖七十人特備員弗用丞相諸大臣皆受成事倚辦於上上樂以刑殺為威天下畏罪持禄莫敢盡忠上不聞過而日驕下懾伏謾欺以取容秦法不得兼方徐廣曰一云并力不驗輒死然候星氣者至三百人皆良士畏忌諱䛕不敢端言其過天下之事無小大皆決於上上至以衡石量書石百二十斤日夜有呈不中呈不得休息貪於權勢至如此未可為求仙藥於是乃亡去始皇聞亡乃大怒曰吾前收天下書不中用者盡去之悉召文學方術士甚衆欲以興太平方士欲練以求竒藥徐廣曰一云欲以練求今聞韓衆去不報徐市等費以巨萬計終不得藥徒姦利相告日聞徐廣曰一作間盧生等吾尊賜之甚厚今乃誹謗我以重吾不徳也諸生在咸陽者吾使人㢘問或為訞言以亂黔首於是使御史悉案問諸生諸生傳相告引乃自除犯禁者四百六十餘人皆阬之咸陽使天下知之以懲後益發謫徙邊徐廣曰表云徙於北河榆巾耐徙三處拜爵一級始皇長子扶蘇諫曰天下初定逺方黔首未集諸生皆誦法孔子今上皆重法繩之臣恐天下不安唯上察之始皇怒使扶蘇北監䝉恬於上郡三十六年熒惑守心有墜星下東郡至地為石徐廣曰表云石畫隕黔首或刻其石曰始皇帝死而地分始皇聞之遣御史逐問莫服盡取石旁居人誅之因燔銷其石始皇不樂使博士為仙真人詩及行所游天下傳令樂人謌弦之秋使者從關東夜過華陰平舒道有人持璧遮使者曰為吾遺滈池君服䖍曰水神也張晏曰武王居鎬鎬池君則武王也武王代商故神云始皇荒滛若紂矣今亦可伐也孟康曰長安西南有滈池因言曰今年祖龍死蘇林曰祖始也龍人君象謂始皇也服䖍曰龍人之先象也言王亦人之先也應劭曰祖人之先龍君之象也使者問其故因忽不見置其璧去使者奉璧具以聞始皇黙然良乆曰山鬼固不過知一歲事也退言曰祖龍者人之先也使御府視璧乃二十八年行渡江所沈璧也於是始皇卜之卦得游徙吉遷北河榆中三萬家拜爵一級三十七年十月癸丑始皇出游左丞相斯從右丞相去疾守少子胡亥愛慕請從上許之十一月行至雲夢望祀虞舜於九疑山浮江下觀籍柯渡海渚過丹陽至錢唐臨浙江晉灼曰江水至會稽山陰為浙江音折水波惡乃西百二十里從狹中渡徐廣曰葢在餘杭也顧夷曰餘杭者秦始皇至會稽經此立為縣上會稽祭大禹望于南海而立石刻頌秦徳其文曰皇帝休烈平一宇内徳惠修長三十有七年親巡天下周覽遠方遂登會稽宣省習俗黔首齋莊羣臣誦功本原事跡追首髙明秦聖臨國始定刑名顯陳舊章初平法式審别職任以立恒常六王專倍貪戾慠猛率衆自彊暴虐恣行負力而驕數動甲兵陰通間使以事合從行為辟方内飾詐謀外來侵邊遂起禍殃義威誅之殄熄徐廣曰音息暴悖亂賊滅亡聖徳廣宻六合之中被澤無疆皇帝并宇兼聽萬事逺近畢清運理羣物考驗事實各載其名貴賤竝通善否陳前靡有隱情飾省宣義徐廣曰省一作非有子而嫁倍死不貞防隔内外禁止淫佚男女絜誠夫為寄豭殺之無罪男并義程妻為逃嫁子不得母咸化㢘清大治濯俗天下承風䝉被休經皆遵度軌安和敦勉莫不順令黔首修潔人樂同則嘉保太平後敬奉法常治無極輿舟不傾從臣誦烈請刻此石光垂休銘還過吳從江乘渡地理志丹陽有江乘縣竝海上北至琅邪方士徐市等入海求神藥數歲不得費多恐譴乃詐曰蓬萊藥可得然常為大鮫魚所苦故不得至願請善射與俱見則以連弩射之始皇夢與海神戰如人狀問占夢博士曰水神不可見以大魚蛟龍為候今上禱祠備謹而有此惡神當除去而善神可致乃令入海者齎捕巨魚具而自以連弩候大魚出射之自琅邪北至榮成山弗見至之罘見巨魚射殺一魚遂竝海西至平原津而病徐廣曰渡河而西始皇惡言死羣臣莫敢言死事上病益甚乃為璽書賜公子扶蘇曰與喪會咸陽而塟書已封在中車府令趙髙伏儼曰王乘輿路車行符璽事所未授使者七月丙寅始皇崩於沙丘平臺徐廣曰年五十沙丘去長安二千餘里趙有沙丘宫在鉅鹿武靈王之死處丞相斯為上崩在外恐諸公子及天下有變乃秘之不發喪棺載輼涼車中故幸宦者參乘所至上食百官奏事如故宦者輒從輼涼車中可其奏事獨子胡亥趙髙及所幸宦者五六人知上死趙髙故嘗教胡亥書及獄律令法事胡亥私幸之髙乃與公子胡亥丞相斯陰謀破去始皇所封書賜公子扶蘇者而更詐為丞相斯受始皇遺詔沙丘立子胡亥為太子更為書賜公子扶蘇蒙恬數以罪其賜死語具在李斯傳中行遂從井陘徐廣曰在常山抵九原會暑上輼車臭乃詔從官令車載一石鮑魚以亂其臭行從直道至咸陽發喪太子胡亥襲位為二世皇帝九月塟始皇酈山始皇初即位穿治酈山及并天下天下徒送詣七十餘萬人穿三泉下銅徐廣曰一作錮錮鑄塞而致椁宫觀百官竒器珍怪徙藏滿之令匠作機弩矢有所穿近者輒射之以水銀為百川江河大海機相灌輸上具天文下具地理以人魚膏為燭徐廣曰人魚似鮎四脚度不滅者乆之二世曰先帝後宫非有子者出焉不宜皆令從死死者甚衆塟既已下或言工匠為機藏皆知之藏重即泄大事畢己藏閉中羨下外羨門盡閉工匠藏者無復出者樹草木以象山皇覽曰墳髙五十餘丈周迴五里餘二世皇帝元年年二十一徐廣曰表云十月戊寅大赦罪人趙髙為郎中令漢書百官表曰秦官掌宫殿門户任用事二世下詔增始皇寢廟犧牲及山川百祀之禮令羣臣議尊始皇廟羣臣皆頓首言曰古者天子七廟諸侯五大夫三雖萬世世不軼毁今始皇為極廟四海之内皆獻貢職增犧牲禮咸備毋以加先王廟或在西雍或在咸陽天子儀當獨奉酌祠始皇廟自襄公已下軼毁所置凡七廟羣臣以禮進祠以尊始皇廟為帝者祖廟皇帝復自稱朕二世與趙髙謀曰朕年少初即位黔首未集附先帝巡行郡縣以示彊威服海内今晏然不巡行即見弱毋以臣畜天下春二世東行郡縣李斯從到碣石竝海南至會稽而盡刻始皇所立刻石石旁著大臣從者名以章先帝成功盛徳焉皇帝曰金石刻盡始皇帝所為也今襲號而金石刻辭不稱始皇帝其於乆逺也如後嗣為之者不稱成功盛徳丞相臣斯臣去疾徐廣曰姓馮御史大夫臣徳昧死言臣請具刻詔書刻石因明白矣臣昧死請制曰可遂至遼東而還於是二世乃遵用趙髙申法令乃陰與趙髙謀曰大臣不服官吏尚彊及諸公子必與我争為之奈何髙曰臣固願言而未敢也先帝之大臣皆天下累世名貴人也積功勞世以相傳久矣今髙素小賤陛下幸稱舉令在上位管中事大臣鞅鞅特以貌從臣其心實不服今上出不因此時案郡縣守尉有罪者誅之上以振威天下下以除去上生平所不可者今時不師文而決於武力願陛下遂從時毋疑即羣臣不及謀明主収舉餘民賤者貴之貧者富之逺者近之則上下集而國安矣二世曰善乃行誅大臣及諸公子以罪過連逮少近官三郎無得立者而六公子戮死於杜公子將閭昆弟三人囚於内宫議其罪獨後二世使使令將閭曰公子不臣罪當死吏致法焉將閭曰闕廷之禮吾未嘗敢不從賓贊也廊廟之位吾未嘗敢失節也受命應對吾未嘗敢失辭也何謂不臣願聞罪而死使者曰臣不得與謀奉書從事將閭乃仰天大呼天者三曰天乎吾無罪昆弟三人皆流涕拔劍自殺宗室振恐羣臣諫者以為誹謗大吏持禄取容黔首振恐四月二世還至咸陽曰先帝為咸陽朝廷小故營阿房宫為室堂未就會上崩罷其作者復土酈山酈山事大畢今釋阿房宫弗就則是章先帝舉事過也復作阿房宫外撫四夷如始皇計盡徵其材士五萬人為屯衛咸陽令教射狗馬禽獸當食者多度不足下調郡縣轉輸菽粟芻稾皆令自齎糧食咸陽三百里内不得食其穀用法益刻深七月戍卒陳勝等反故荆地為張楚李竒曰張大楚國也勝自立為楚王居陳遣諸將徇地山東郡縣少年苦秦吏皆殺其守尉令丞反以應陳涉相立為侯王合從西鄉名為伐秦不可勝數也謁者漢書百官表曰謁者秦官掌賔贊受事使東方來以反者聞二世二世怒下吏後使者至上問對曰羣盜郡守尉方逐捕今盡得不足憂上悦武臣自立為趙王魏咎為魏王田儋服䖍曰音負擔為齊王沛公起沛項梁舉兵會稽郡二年冬陳涉所遣周章等將西至戲應劭曰戲𢎞農湖西界也孟康曰水名今戲亭是也蘇林曰邑名在新豐東南二十里兵數十萬二世大驚與羣臣謀曰奈何少府章邯曰漢書百官表曰少府秦官應劭曰掌山澤陂池之税名曰禁錢以給私養自别為藏少者小也故稱少府盜已至衆彊今發近縣不及矣酈山徒多請赦之授兵以擊之二世乃大赦天下使章邯將擊破周章軍而走遂殺章曹陽晉灼曰亭名在𢎞農東十三里魏武帝改曰好陽二世益遣長史司馬欣董翳佐章邯擊盜殺陳勝城父破項梁定陶滅魏咎臨濟楚地盜名將已死章邯乃北渡河擊趙王歇等於鉅鹿趙髙説二世曰先帝臨制天下乆故羣臣不敢為非進邪説今陛下富於春秋初即位奈何與公卿廷決事事即有誤示羣臣短也天子稱朕固不聞聲於是二世常居禁中蔡邕曰禁中者門户有禁非侍御者不得入故曰禁中與髙決諸事其後公卿希得朝見盜賊益多而關中卒發東撃盜者毋已右丞相去疾左丞相斯將軍馮劫進諫曰關東羣盜竝起秦發兵誅擊所殺亡甚衆然猶不止盜多皆以戍漕轉作事苦賦税大也請且止阿房宫作者減省四邊戍轉二世曰吾聞之韓子曰堯舜采椽不刮茅茨不翦飯土㙧徐廣曰吕靜云飯器謂之簋啜土形如淳曰土形飯器之屬瓦器也雖監門之養不觳於此禹鑿龍門通大夏決河亭水放之海身自持築臿脛毋毛臣虜之勞不烈於此矣凡所為貴有天下者得肆意極欲主重明法下不敢為非以制御海内矣夫虞夏之主貴為天子親處窮苦之實以徇百姓尚何於法朕尊萬乘毋其實吾欲造千乘之駕萬乘之屬充吾號名且先帝起諸侯兼天下天下已定外攘四夷以安邊境作宫室以章得意而君觀先帝功業有緒今朕即位二年之間羣盜竝起君不能禁又欲罷先帝之所為是上毋以報先帝次不為朕盡忠力何以在位下去疾斯劫吏案責他罪去疾劫曰將相不辱自殺斯卒囚就五刑三年章邯等將其卒圍鉅鹿楚上將軍項羽將楚卒徃救鉅鹿冬趙髙為丞相竟案李斯殺之夏章邯等戰數却二世使人讓邯邯恐使長史欣請事趙高弗見又弗信欣恐亡去高使人捕追不及欣見邯曰趙高用事於中將軍有功亦誅無功亦誅項羽急擊秦軍虜王離邯等遂以兵降諸侯八月己亥徐廣曰一作卯趙髙欲為亂恐羣臣不聽乃先設驗持鹿獻於二世曰馬也二世笑曰丞相誤邪謂鹿為馬問左右左右或黙或言馬以阿順趙髙或言鹿者髙因陰中諸言鹿者以法後羣臣皆畏髙髙前數言關東盜毋能為也及項羽虜秦將王離等鉅鹿下而前章邯等軍數却上書請益助燕趙齊楚韓魏皆立為王自關以東大氐盡畔秦吏應諸侯諸侯咸率其衆西鄉沛公將數萬人已屠武關使人私於髙髙恐二世怒誅及其身乃謝病不朝見二世夢白虎齧其左驂馬殺之心不樂怪問占夢卜曰涇水為祟二世乃齋於望夷宫張晏曰望夷宫在長陵西北長平觀道東故亭處是也臨涇水作之以望北夷欲祠涇沈四白馬使使責讓髙以盜賊事髙懼乃陰與其壻咸陽令閻樂其弟趙成謀曰上不聽諫今事急欲歸禍於吾宗吾欲易置上更立公子嬰子嬰仁儉百姓皆載其言使郎中令為内應徐廣曰一云郎中令趙成詐為有大賊令樂召吏發卒追刼樂毋置髙舍遣樂將吏卒千餘人至望夷宫殿門縛衛令僕射曰賊入此何不止衛令曰周廬設卒甚謹西京賦曰徼道外周千廬内傅嶭綜曰士傅宫外向為廬舍晝則巡行非常夜則警備不虞安得賊敢入宫樂遂斬衛令直將吏入行射郎宦者大驚或走或格格者輒死死者數十人郎中令與樂俱入射上幄坐幃二世怒召左右左右皆惶擾不鬭旁有宦者一人侍不敢去二世入内謂曰公何不蚤告我乃至於此宦者曰臣不敢言故得全使臣蚤言皆已誅安得至今閻樂前即二世數曰足下驕恣蔡邕曰羣臣士庶相與言曰殿下閣下足下侍者執事皆謙類誅殺無道天下共畔足下足下其自為計二世曰丞相可得見否樂曰不可二世曰吾願得一郡為王弗許又曰願為萬户侯弗許曰願與妻子為黔首比諸公子閻樂曰臣受命於丞相為天下誅足下足下雖多言臣不敢報麾其兵進二世自殺閻樂歸報趙髙趙髙乃悉召諸大臣公子告以誅二世之狀曰秦故王國始皇君天下故稱帝今六國復自立秦地益小乃以空名為帝不可宜為王如故便立二世之兄子公子嬰為秦王以黔首塟二世杜南宜春苑中令子嬰齋當廟見受玉璽齋五日子嬰與其子二人謀曰丞相髙殺二世望夷宫恐羣臣誅之乃詳以義立我我聞趙髙乃與楚約滅秦宗室而王關中今使我齋見廟此欲因廟中殺我我稱病不行丞相必自來來則殺之髙使人請子嬰數輩子嬰不行髙果自徃曰宗廟重事王奈何不行子嬰遂刺殺髙於齋宫三族髙家以徇咸陽子嬰為秦王四十六日楚將沛公破秦軍入武關遂至霸上應劭曰霸水上地名在長安東三十里古者滋水秦穆公更名霸水使人約降子嬰子嬰即係頸以組白馬素車應劭曰組者天子黻也係頸者言欲自殺也素車白馬喪人之服也奉天子璽符降軹道旁徐廣曰在霸陵駰案蘇林曰亭名在長安東十三里沛公遂入咸陽封宫室府庫還軍霸上居月餘諸侯兵至項籍為從長殺子嬰及秦諸公子宗族遂屠咸陽燒其宗室虜其子女收其珍寶貨財諸侯共分之滅秦之後各分其地為三名曰雍王塞王翟王號曰三秦項羽為西楚霸王主命分天下王諸侯秦竟滅矣後五年天下定於漢太史公曰秦之先柏翳嘗有勲於唐虞之際受土賜姓及殷夏之間微散至周之衰秦興邑於西垂自繆公以來稍蠶食諸侯竟成始皇始皇自以為功過五帝地廣三王而羞與之侔善哉乎賈生推言之也曰秦并兼諸侯山東三十餘郡繕津關據險塞修甲兵而守之然陳涉以戍卒散亂之衆數百奮臂大呼不用弓戟之兵鉏耰白梃徐廣曰耰田器音憂望屋而食橫行天下秦人阻險不守關梁不闔長㦸不刺強弩不射楚師深入戰於鴻門曾無藩籬之艱於是山東大擾諸侯竝起豪俊相立駰案鶡冠子曰徳萬人者謂之俊徳千人者謂之豪徳百人者謂之英秦使章邯將而東征章邯因以三軍之衆要市於外以謀其上羣臣之不信可見於此矣子嬰立遂不寤藉使子嬰有庸主之材僅得中佐山東雖亂秦之地可全而有宗廟之事未當絶也秦地被山帶河以為固四塞之國也自繆公以來至於秦王二十餘君常為諸侯雄豈世世賢哉其勢居然也且天下嘗同心并力而攻秦矣當此之世賢智竝列良將行其師賢相通其謀然困於阻險而不能進秦乃延入戰而為之開關百萬之徒逃北而遂壞豈勇力智慧不足哉形不利勢不便也秦小邑并大城徐廣曰大一作小守險塞而軍髙壘毋戰閉關據阨荷㦸而守之諸侯起於匹夫以利合非有素王之行也其交未親其下未附名為亡秦其實利之也彼見秦阻之難犯也必退師安土息民以待其敝收弱扶罷以令大國之君不患不得意於海内貴為天子富有天下而身為禽者其救敗非也秦王足已不問遂過而不變二世受之因而不改暴虐以重禍子嬰孤立無親危弱無輔三主惑而終身不悟亡不亦宜乎當此時也世非無深慮知化之士也然所以不敢盡忠拂過者秦俗多忌諱之禁忠言未卒於口而身為戮没矣故使天下之士傾耳而聽重足而立拑口而不言是以三主失道忠臣不敢諫智士不敢謀天下已亂奸不上聞豈不哀哉先王知雍蔽之傷國也故置公卿大夫士以飾法設刑而天下治其彊也禁暴誅亂而天下服其弱也五伯征而諸侯從其削也内守外附而社稷存故秦之盛也繁法嚴刑而天下振及其衰也百姓怨望而海内畔矣故周五序得其道而千餘歳不絶秦本末竝失故不長乆由此觀之安危之綂相去遠矣野諺曰前事之不忘後事之師也是以君子為國觀之上古驗之當世參以人事察盛衰之理審權勢之宜去就有序變化應時故曠日長乆而社稷安矣秦孝公據殽函之固擁雍州之地君臣固守而窺周室有席卷天下包舉宇内囊括四海之意張晏曰括括囊也言其能包含天下并吞八荒之心當是時商君佐之内立法度務耕織修守戰之備外連衡而鬭諸侯於是秦人拱手而取西河之外孝公既沒惠王武王䝉故業因遺冊南兼漢中西舉巴蜀東割膏腴之地收要害之郡諸侯恐懼會盟而謀弱秦不愛珍器重寶肥美之地以致天下之士合從締交漢書音義曰締結也相與為一當是時齊有孟嘗趙有平原楚有春申魏有信陵此四君者皆明知而忠信寛厚而愛人尊賢重士約從離衡并韓魏燕楚齊趙宋衛中山之衆於是六國之士有寧越徐廣曰越一作經或自别有此人不必寗越也徐尚蘇秦杜赫之屬為之謀齊明周最陳軫昭滑樓緩翟景蘇厲樂毅之徒通其意吳起孫臏帶佗兒良王廖田忌㢘頗趙奢之朋制其兵常以十倍之地百萬之衆叩關而攻秦秦人開闗延敵九國之師逡巡遁逃而不敢進秦無亡矢遺鏃之費而天下諸侯已困矣於是從散約解爭割地而奉秦秦有餘力而制其敝追亡逐北伏尸百萬流血漂鹵徐廣曰鹵楯也因利乘便宰割天下分裂河山彊國請服弱國入朝延及孝文王莊襄王享國日淺國家無事及至秦王續六世之餘烈張晏曰孝公惠文王武王昭王孝文王莊襄王振長策而御宇内吞二周而亡諸侯履至尊而制六合執棰拊徐廣曰拊拍也音府一作槁朴以鞭笞天下威振四海南取百越之地韋昭曰越有百邑以為桂林象郡百越之君俛首係頸委命下吏乃使䝉恬北築長城而守藩籬却匈奴七百餘里胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道焚百家之言以愚黔首墮名城應劭曰壊堅城恐人復阻以害己也殺豪俊收天下之兵聚之咸陽銷鋒鑄鐻以為金人十二以弱黔首之民然後斬華為城徐廣曰斬一作踐駰案服䖍曰斷華山為城因河為津據億丈之城臨不測之谿以為固良將勁弩守要害之處信臣精卒陳利兵而誰何如淳曰何猶問也天下以定秦王之心自以為關中之固金城千里子孫帝王萬世之業也秦王既沒餘威振於殊俗陳涉罋牖繩樞之子服䖍曰以繩係户樞也孟康曰瓦罋為窓也甿𨽻之人如淳曰甿古氓字氓民也而遷徙之徒才能不及中人非有仲尼墨翟之賢陶朱猗頓之富躡足行伍之間而倔起什伯之中漢書音義曰首出十長百長之中如淳曰時皆辟屈在十百之中率罷散之卒將數百之衆而轉攻秦斬木為兵掲竿為旗天下雲集響應贏糧而景從山東豪俊遂竝起而亡秦族矣且夫天下非小弱也雍州之地殽函之固自若也韋昭曰殽謂二殽函函谷關也陳涉之位非尊於齊楚燕趙韓魏宋衛中山之君鉏櫌棘矜服䖍曰以鉏柄及棘作矛槿也如淳曰櫌椎槐椎也非錟於句㦸長鎩也徐廣曰錟一作銛駰案如淳曰長刃矛也又曰矛刃下有鐵橫方上曲勾鎩音所拜反適戍之衆非抗於九國之師深謀逺慮行軍用兵之道非及鄉時之士也然而成敗異變功業相反何也試使山東之國與陳涉度長絜大漢書音義曰絜東之絜比權量力則不可同年而語矣然秦以區區之地千乘之權招八州而朝同列百有餘年矣然後以六合為家殽函為宫一夫作難而七廟墮身死人手為天下笑者何也仁義不施而攻守之埶異也秦并海内兼諸侯南面稱帝徐廣曰一本冇此篇無前者秦孝公已下而又以秦并兼諸侯山東三十餘郡繼此末也以養四海天下之士斐然鄉風若是者何也曰近古之無王者乆矣周室卑微五霸既沒令不行於天下是以諸侯力政彊侵弱衆暴寡兵革不休士民罷敝今秦南面而王天下是上冇天子也既元元之民冀得安其性命莫不虚心而仰上當此之時守威定功安危之本在於此矣秦王懷貪鄙之心行自奮之智不信功臣不親士民廢王道立私權禁文書而酷刑法先詐力而後仁義以暴虐為天下始夫并兼者髙詐力安定者貴順權此言取與守不同術也秦離戰國而王天下其道不易其政不改是其所以取之守之者異也孤獨而有之故其亡可立而待借使秦王計上世之事竝殷周之迹以制御其政後雖有淫驕之主而未有傾危之患也故三王之建天下名號顯美功業長乆今秦二世立天下莫不引領而觀其政夫寒者利裋褐徐廣曰一作短小􅃭也音豎而飢者甘糟糠天下之嗸嗸新主之資也此言勞民之易為仁也鄉使二世有庸主之行而任忠賢臣主一心而憂海内之患縞素而正先帝之過裂地分民以封功臣之後建國立君以禮天下虚囹圉而免刑戮除去收孥汚穢之罪使各反其鄉里發倉廩散財幣以振孤獨窮困之士輕賦少事以佐百姓之急約法省刑以持其後使天下之人皆得自新更節修行各慎其身塞萬民之望而以威徳與天下天下集矣即四海之内皆讙然各自安樂其處唯恐有變雖有狡猾之民無離上之心則不軌之臣無以飾其智而暴亂之姧止矣二世不行此術而重之以無道壞宗廟與民徐廣曰一無此上五字更始作阿房宫繁刑嚴誅吏治刻深賞罰不當賦斂無度天下多事吏弗能紀百姓困窮而主弗收恤然後奸偽竝起而上下相遁蒙罪者衆刑戮相望於道而天下苦之自君卿以下至于衆庶人懷自危之心親處窮苦之實咸不安其位故易動也是以陳涉不用湯武之賢不藉公侯之尊奮臂於大澤而天下響應者其民危也故先王見始終之變知存亡之機是以牧民之道務在安之而已天下雖有逆行之臣必無響應之助矣故曰安民可與行義而危民易與為非此之謂也貴為天子富有天下身不免於戮殺者正傾非也是二世之過也襄公立饗國十二年初為西畤塟西垂生文公文公立居西垂宫五十年死塟西垂生靜公靜公不享國而死生憲公憲公饗國十二年居西新邑死塟衙地理志馮翊冇衙縣生武公徳公出子出子饗國六年居西陵庶長弗忌威累參父三人率賊賊出子鄙衍塟衙武公立武公享國二十年居平陽封宫徐廣曰一云居平封宫塟宣陽聚東南三庶長伏其罪徳公立徳公享國二年居雍大鄭宫生宣公成公繆公塟陽初伏以御蠱宣公享國十二年居陽宫塟陽初志閏月成公享國四年居雍之徐廣曰之一作走宫塟陽齊伐山戎孤竹繆公享國三十九年天子致霸塟雍繆公學著人生康公康公享國十二年居雍髙寢塟竘社生共公共公享國五年居雍高寢塟康公南生桓公桓公享國二十七年居雍太寢塟義里丘北生景公景公享國四十年居雍髙寢塟丘里南生畢公徐廣曰春秋哀公畢公享國三十六年塟車里北生夷公夷公不享國死塟左宫生惠公惠公享國十年塟車里康景生悼公悼公享國十五年塟僖公西城雍生刺龔公刺龔公享國三十四年塟入里徐廣曰一作人生躁公懷公其十年彗星見躁公享國十四年居受寢塟悼公南其元年彗星見徐廣曰年表云星晝見懷公從晉來享國四年塟櫟圉氏生靈公諸臣圍懷公懷公自殺肅靈公昭子子也徐廣曰懷公生昭子昭子生靈公居涇陽享國十年塟悼公西生簡公簡公從晉來享國十五年塟僖公西生惠公其七年百姓初帶劍惠公享國十三年塟陵圉生出公出公享國二年出公自殺塟雍獻公享國二十三年徐廣曰靈公子塟嚻圉生孝公孝公享國二十四年塟弟圉生惠文王其十三年始都咸陽惠文王享國二十七年塟公陵生悼武王悼武王享國四年塟永陵徐廣曰皇甫謐曰塟畢今安陵西畢陌昭襄王享國五十六年塟茝陽生孝文王孝文王享國一年塟夀陵生莊襄王莊襄王享國三年塟茝陽生始皇帝吕不韋相獻公立七年初行為市十年為户籍相伍孝公立十六年時桃李冬華惠文王生十九年而立立二年初行錢有新生嬰兒曰秦且王悼武王生十九年而立立三年渭水赤三日昭襄王生十九年而立立四年初為田開阡陌孝文王生五十三年而立莊襄王生三十二年而立立二年取太原地莊襄王元年大赦修先王功臣施徳厚骨肉布惠於民東周與諸侯謀秦秦使相國不韋誅之盡入其國秦不絶其祀以陽人地賜周君奉其祭祀始皇享國三十七年塟酈邑生二世皇帝始皇生十三年而立二世皇帝享國三年塟宜春趙髙為丞相安武侯二世生十二年而立徐廣曰本紀云二十一右秦襄公至二世六百一十歳孝明皇帝十七年十月十五日乙丑曰周厯已移仁不代母秦直其位吕政殘虐然以諸侯十三始皇初為秦王年十三也并兼天下極情縱欲養育宗親三十七年兵無所不加制作改令施於後皇葢得聖人之威河神授圖據狼狐蹈參伐佐政驅除距之稱始皇始皇既沒胡亥極愚酈山未畢復作阿房以遂前策云凡所為貴有天下者肆意極欲大臣至欲罷先君所為誅斯去疾任用趙髙痛哉言乎人頭畜鳴不威不伐惡不篤不虚亡距之不得畱殘虐以促期雖居形便之國猶不得存子嬰度次得嗣冠玉冠佩華紱車黃屋蔡邕曰黃屋者葢以黃為裏從百司謁七廟小人乘非位莫不怳忽失守偷安日日獨能長念却慮父子作權近取於户牖之間竟誅猾臣為君討賊髙死之後賓婚未得盡相勞餐未及下咽酒未及濡脣楚兵已屠關中真人翔霸上素車嬰組奉其符璽以歸帝者鄭伯茅旌鸞刀嚴王退舍公羊傳曰楚莊王伐鄭鄭伯肉袒左執茅旌右執鸞刀以逆莊王莊王退舍七里何休曰茅旌鸞刀祭祀宗廟所用也執宗廟器者示以宗廟血食自歸河決不可復壅魚爛不可復全賈誼司馬遷曰向使嬰有庸主之才僅得中佐山東雖亂秦之地可全而有宗廟之祀未當絶也秦之積衰天下土崩瓦解雖有周旦之材無所復陳其巧而以責一日之孤誤哉俗傳秦始皇起罪惡胡亥極得其理矣復責小子云秦地可全所謂不通時變者也紀季以酅春秋不名春秋曰紀季以酅入于齊公羊傳曰何以不名賢之也請設五廟以存姑姊妹也吾讀秦紀至於子嬰車裂趙髙未嘗不健其決憐其志嬰死生之義備矣徐廣曰班固典引曰永平十七年詔問臣固太史遷贊語中寧冇非邪臣對賈誼言子嬰得中佐秦未絶也此言非是臣素知之耳史記集解卷六
