body:
  text: 史記集解卷七十三宋裴駰撰史記七十三白起王翦列傳第十三白起者郿人也善用兵事秦昭王昭王十三年而白起為左庶長將而擊韓之新城是歲穰侯相秦舉任鄙以為漢中守其明年白起為左更攻韓魏于伊闕斬首二十四萬又虜其將公孫喜拔五城起遷為國尉涉河取韓安邑以東到乾徐廣曰音干河郭璞曰今河東聞喜縣東北有乾河口因名乾河里但有故溝處無復水也明年白起為大良造攻魏拔之取城小大六十一明年起與客卿錯攻垣城拔之徐廣曰河東垣縣後五年白起攻趙拔光狼城後七年白起攻楚拔鄢鄧五城徐廣曰昭王二十八年其明年攻楚拔郢燒夷陵遂東至竟陵楚王亡去郢東走徙陳秦以郢為南郡白起遷為武安君武安君因取楚定巫黔中郡昭王三十四年白起攻魏拔華陽走芒卯而虜三晉將斬首十三萬與趙將賈偃戰沉其卒二萬人于河中昭王四十三年白起攻韓陘城斬首五萬四十四年白起攻南陽太行道絶之徐廣曰北南陽河内修武是也四十五年伐韓之野王野王降秦上黨道絶其守馮亭與民謀曰鄭道已絶徐廣曰河南新鄭韓之國都是也韓必不可得為民秦兵日進韓不能應不如以上黨歸趙趙若受我秦怒必攻趙趙被兵必親韓韓趙為一則可以當秦因使人報趙趙孝成王與平陽君平原君計之平陽君曰不如勿受受之禍大于所得平原君曰無故得一郡受之便趙受之因封馮亭為華陽君四十六年秦攻韓緱氏藺徐廣曰屬潁川拔之四十七年秦使左庻長王齕音紇攻韓取上黨上黨民走趙趙軍長平徐廣曰在泫氏以按據上黨民四月齕因攻趙趙使廉頗將趙軍士卒犯秦斥兵秦斥兵斬趙裨將茄六月䧟趙軍取二鄣四尉七月趙軍築壘壁而守之秦又攻其壘取二尉敗其障徐廣曰一作乗奪西壘壁亷頗堅壁以待秦秦數挑戰趙兵不出趙王數以為讓而秦相應侯又使人行千金于趙為反間曰秦之所惡獨畏馬服子趙括將耳廉頗易與且降矣趙王既怒廉頗軍多失亡軍數敗又反堅壁不敢戰而又聞秦反間之言因使趙括代廉頗將以擊秦秦聞馬服子將乃隂使武安君白起為上將軍而王齕為尉裨將令軍中有敢泄武安君將者斬趙括至則出兵擊秦軍秦軍詳敗而走張二竒兵以刼之趙軍逐勝追造秦壁壁堅拒不得入而秦竒兵二萬五千人絶趙軍後又一軍五千騎絶趙壁間趙軍分而為二糧道絶而秦出輕兵擊之趙戰不利因築壁堅守以待救至秦王聞趙食道絶王自之河内賜民爵各一級發年十五以上悉詣長平遮絶趙救及糧食至九月趙卒不得食四十六日皆内隂相殺食來攻秦壘欲出為四隊四五復之不能出其將軍趙括出鋭卒自摶戰秦軍射殺趙括括軍敗卒四十萬人降武安君武安君計曰前秦已拔上黨上黨民不樂為秦而歸趙趙卒反覆非盡殺之恐為亂乃挾詐而盡坑殺之遣其小者二百四十人歸趙前後斬首虜四十五萬人趙人大震四十八年十月秦復定上黨郡秦分軍為二王齕攻皮牢拔之司馬梗定太原韓趙恐使蘇代厚幣説秦相應侯曰武安君擒馬服子乎曰然又曰即圍邯鄲乎曰然趙亡則秦王王矣武安君為三公武安君所為秦戰勝攻取者七十餘城南定鄢郢漢中北擒趙括之軍雖周召吕望之功不益于此矣今趙亡秦王王則武安君必為三公君能為之下乎雖無欲為之下固不得已矣秦嘗攻韓圍邢丘徐廣曰平臯有邢丘困上黨上黨之民皆反為趙天下不樂為秦民之日久矣今亡趙北地入燕東地入齊南地入韓魏則君之所得民亡徐廣曰亡言無也㡬何人故不如因而割之無以為武安君功也于是應侯言于秦王曰秦兵勞請許韓趙之割地以和且休士卒王聽之割韓垣雍徐廣曰卷縣有垣雍城趙六城以和正月皆罷兵武安君聞之由是與應侯有隙其九月秦復發兵使五大夫王陵攻趙邯鄲是時武安君病不任行四十九正月陵攻邯鄲少利秦益發兵佐陵陵兵亡五校武安君病愈秦王欲使武安君代陵將武安君言曰邯鄲實未易攻也且諸侯救日至彼諸侯怨秦之日久矣今秦雖破長平軍而秦卒死者過半國内空遠絶山河而爭人國都趙應其内諸侯攻其外破秦軍必矣不可秦王自命不行乃使應侯請之武安君終辭不肯行遂稱病秦王使王齕代陵將八九月圍邯鄲不能拔楚使春申君及魏公子將兵數十萬攻秦軍秦軍多失亡武安君言曰秦不聽臣計今如何矣秦王聞之怒强起武安君武安遂稱病篤應侯請之不起于是免武安君為士伍遷之隂密徐廣曰屬安定武安君病未能行居三月諸侯攻秦軍急秦軍數却使者日至秦王乃使人遣白起不得留咸陽中武安君既行出咸陽西門十里至杜郵秦昭王與應侯羣臣議曰白起之遷其意尚怏怏不服有餘言秦王乃使使者賜之劒自裁武安君引劒將自剄曰我何罪于天而至此哉良久曰我固當死長平之戰趙卒降者數十萬人我詐而盡阬之是足以死遂自殺武安君之死也以秦昭王五十年十一月死而非其罪秦人憐之鄉邑皆祭祀焉何晏曰白起之降趙卒詐而阬其四十萬豈徒酷暴之謂乎後亦難以重得志矣向使衆人皆預知降之必死則張虛拳猶可畏也况于四十萬被堅執鋭哉天下見降秦之將頭顱似山歸秦之衆骸積成丘則後日之戰死當死耳何衆肯服何城肯下乎是為難能裁四十萬之命而適足强天下之戰欲以要一朝之功而乃更堅諸侯之守故兵進而自伐其勢軍勝而還喪其計何者設使趙衆復合馬服更生則後日之戰必非前日之對也况今皆使天下為後日乎其所以終不敢復加兵于邯鄲者非但憂平原之補袒患諸侯之捄至也徒諱之而不言耳若不悟而不諱則母所以逺智也所謂善戰而拙勝長平之事秦民之十五以上者皆荷㦸而向趙矣秦王又親自賜民爵于河内夫以秦之强而十五以上死傷過半者此為破趙之功小傷秦之敗大又何稱竒哉若後之役戍不預其論者則秦衆多矣降者可致也必不可致者本自當戰殺不當受降詐也戰殺雖難降殺雖易然降殺之為患禍大于劇戰也王翦者頻陽東鄉人也少而好兵事秦始皇始皇十一年翦將攻趙閼與破之拔九城十八年翦將攻趙歲餘遂拔趙趙王降盡定趙地為郡明年燕使荆軻為賊于秦秦王使王翦攻燕燕王喜走遼東翦遂定燕薊而還秦使翦子王賁擊荆徐廣曰秦諱楚故云荆也荆兵敗還擊魏魏王降遂定魏地秦始皇既滅三晉走燕王而數破荆師秦將李信者少年壯勇嘗以兵數千逐燕太子丹至于衍水中卒破得丹始皇以為賢勇于是始皇問李信吾欲攻取荆于將軍度用㡬何人而足李信曰不過用二十萬人始皇問王翦王翦曰非六十萬人不可始皇曰王將軍老矣何怯也李將軍果勢壯勇徐廣曰勢一作新其言是也遂使李信及䝉恬將二十萬南伐荆王翦言不用因謝病歸老于頻陽李信攻平與音余䝉恬攻寢徐廣曰今固始寢丘大破荆軍信又攻鄢郢破之于是引兵而西與䝉恬㑹城父荆人因隨之三日三夜不頓舎大破李信軍入兩壁殺七都尉秦軍走始皇聞之大怒自馳如頻陽見謝王翦曰寡人以不用將軍計李信果辱秦軍今聞荆兵日進而西將軍雖病獨忍棄寡人乎王翦謝曰老臣罷病悖亂唯大王更擇賢將始皇謝曰已矣將軍勿復言王翦曰大王必不得已用臣非六十萬人不可始皇曰為聴將軍計耳于是王翦將兵六十萬人始皇送自至㶚上王翦行請羙田宅園池甚衆始皇曰將軍行矣何憂貧乎王翦曰為大王將有功終不得封侯故及大王之嚮臣臣亦及時以請園池為子孫業耳始皇大笑王翦既至關使使還請善田者五輩徐廣曰善一作菑或曰將軍之乞貸亦以甚矣王翦曰不然夫秦王怛而不信人徐廣曰怛一作粗音麤今空秦國甲士而専委于我徐廣曰専亦作摶又作剸我不多請田宅為子孫業以自堅顧令秦王坐而疑我矣王翦果代李信擊荆荆聞王翦益軍而來乃悉國中兵以拒秦王翦至堅壁而守之不肯戰荆兵數出挑戰終不出王翦日休士洗沐而善飲食撫循之親與士卒同食久之王翦使人問軍中戲乎對曰方投石超徐廣曰一作拔距漢書云甘延壽投石拔距絶于等倫張晏曰范蠡兵法飛石重十二斤為機發行三百步延夀有力能以手投之拔距超距也于是王翦曰士卒可用矣荆數挑戰而秦不出乃引而東翦因舉兵追之令壯士撃大破荆軍至蘄南殺其將軍項燕荆兵遂敗走秦因乘勝略定荆地城邑歲餘虜荆王負芻竟平荆地為郡縣因南征百越之君而王翦子王賁與李信破定燕齊地秦始皇二十六年盡并天下王氏䝉氏功為多名施于後世秦二世之時王翦及其子賁皆已死而又滅䝉氏陳勝之反秦秦使王翦之孫王離擊趙圍趙王及張耳鉅鹿城或曰王離秦之名將也今將彊秦之兵攻新造之趙舉之必矣客曰不然夫為將三世者必敗必敗者何也以其所殺伐多矣其後受其不祥今王離已三世將矣居無何項羽救趙擊秦軍果虜王離王離軍遂降諸侯太史公曰鄙語云尺有所短寸有所長白起料敵合變出竒無窮聲震天下然不救患于應侯王翦為秦將夷六國當是時翦為宿將始皇師之不能輔秦建徳固其根本偷合取容以至圽身徐廣曰圽音没及孫王離為項羽所虜不亦宜乎彼各有所短也史記集解卷七十三
