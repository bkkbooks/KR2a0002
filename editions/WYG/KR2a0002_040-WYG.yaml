body:
  text: 史記集解卷四十二宋裴駰撰史記四十二鄭世家第十二鄭桓公友者周厲王少子而宣王庶弟也徐廣曰年表云母弟宣王立二十二年友初封於鄭封三十三嵗百姓皆便之之幽王以為司徒韋昭云幽王八年為司徒和集周民周民皆說河雒之間人便思之為司徒一嵗幽王以襃后故王室治多邪諸侯或叛之於是桓公問太史伯虞翻曰周太史曰王室多故予安逃死乎太史伯對曰獨雒之東土河濟之南可居公曰何也對曰地近虢鄶徐廣曰虢在成臯鄶在宻縣駰案虞翻曰虢姬姓東虢也鄶妘姓虢鄶之君貪而好利百姓不附今公為司徒民皆愛公公誠請居之虢鄶之君見公方用事輕分公地公誠居之虢鄶之民皆公之民也公曰吾欲南之江上何如對曰昔祝融氏高辛氏火正其功大矣而其於周未有興者楚其後也周衰楚必興興非鄭之利也公曰吾欲居西方何如對曰其民貪而好利難久居公曰周衰何國興者對曰齊秦晉楚乎夫齊姜姓伯夷之後也伯夷佐堯典禮秦嬴姓伯翳之後也伯翳佐舜懷柔百物及楚之先皆嘗有功于天下而周武王克紂後成王封叔虞于唐徐廣曰晉世家曰唐叔虞姓姬氏字子于其地阻險以此有德與周衰竝亦必興矣桓公曰善於是卒言王東徙其民雒東而號鄶果獻十邑虞翻曰十邑謂虢鄶鄢蔽補丹依㽥厯莘也竟國之韋昭曰後武公竟取十邑地而居之今河南新鄭也二歲犬戎殺幽王於驪山下并殺桓公鄭人共立其子掘突是為武公武公十年娶申侯女為夫人曰武姜生太子寤生生之難及生夫人弗愛後生少子叔段段生易夫人愛之徐廣曰年表云十四年生寤生十七年生大叔段二十七年武公疾夫人請公欲立段為太子公弗聽是嵗武公卒寤生立是為莊公莊公元年封弟段於京賈逵曰京鄭都邑杜預曰今滎陽京縣號太叔祭仲曰京大於國非所以封庶也莊公曰武姜欲之我弗敢奪也段至京繕治甲兵與其母武姜謀襲鄭二十二年段果襲鄭武姜為内應莊公發兵伐段段走伐京京人畔段段出走鄢鄢潰段出奔共賈逵曰共國名也杜預曰今汲郡共縣也於是莊公遷其母武姜於城潁賈逵曰鄭地誓言曰不至黃泉服䖍曰天𤣥地黃泉在地中故言黄泉毋相見也居嵗餘已悔思母潁谷之考叔賈逵曰潁谷鄭地有獻於公公賜食考叔曰臣有母請君食賜臣母莊公曰我甚思母惡負盟奈何考叔曰穿地至黃泉則相見矣於是遂從之見母二十四年宋繆公卒公子馮奔鄭鄭侵周地取禾二十五年衛州吁弑其君桓公自立與宋伐鄭以馮故也二十七年始朝周桓王桓王怒其取禾弗禮也二十九年莊公怒周弗禮與魯易祊許田三十三年宋殺孔父三十七年莊公不朝周周桓王率陳蔡虢衛伐鄭莊公與祭仲高渠彌發兵自救王師大敗祝瞻射中王臂祝瞻請從之鄭伯止之曰犯長且難之況敢陵天子乎乃止夜令祭仲問王疾三十八年北戎伐齊齊使求救鄭遣太子忽將兵救齊齊釐公欲妻之忽謝曰我小國非齊敵也時祭仲與俱勸使取之曰君多内寵服䖍曰言庶子有寵者多太子無大援將不立三公子皆君也所謂三公子者太子忽其弟􅊳次弟子亹也四十三年鄭莊公卒初祭仲甚有寵于莊公莊公使為卿公使娶鄧女生太子忽故祭仲立之是為昭公莊公又娶宋雍氏女賈逵曰雍氏黃帝之孫姞姓之後為宋大夫生厲公突雍氏有寵於宋服䖍曰為宋正卿故曰有寵宋莊公聞祭仲之立忽乃使人誘召祭仲而執之曰不立突將死亦執突以求賂焉祭仲許宋與宋盟以突歸立之昭公忽聞祭仲以宋要立其弟突九月辛亥忽出奔衛己亥突至鄭立是為厲公厲公四年祭仲專國政厲公患之陰使其壻雍糾欲殺祭仲賈逵曰雍糾鄭大夫糾妻祭仲女也知之謂其母曰父與夫孰親母曰父一而已人盡夫也杜預曰婦人在室則天父出則天夫女以為疑故母以所生為本解之女乃告祭仲祭仲反殺雍糾戮之於市厲公無奈祭仲何怒糾曰謀及婦人死固宜哉夏厲公出居邊邑櫟宋忠曰今潁川陽翟縣祭仲迎昭公忽六月乙亥復入鄭即位秋鄭厲公􅊳因櫟人殺其大夫單伯杜預曰鄭守櫟大夫也遂居之諸侯聞厲公出奔伐鄭弗克而去宋頗予厲公兵自守於櫟鄭以故亦不伐櫟昭公二年自昭公為太子時父莊公欲以高渠彌為卿太子忽惡之莊公弗聽卒用渠彌為卿及昭公即位懼其殺已冬十月辛卯渠彌與昭公出獵射殺昭公於野祭仲與渠彌不敢入厲公乃更立昭公弟子亹為君是為子亹也無諡號子亹元年七月齊襄公會諸侯於首止服䖍曰首止近鄭之地杜預曰首止衛地陳留襄邑縣東南有首鄉鄭子亹往會高渠彌相從祭仲稱疾不行所以然者子亹自齊襄公為太子之時嘗會鬭相仇及會諸侯祭仲請子亹無行子亹曰齊彊而厲公居櫟即不往是率諸侯伐我内厲公我不如往往何遽必辱且又何至是卒行於是祭仲恐齊并殺之故稱疾子亹至不謝齊侯齊侯遂遂伏甲而殺子亹高渠彌亡歸歸與祭仲謀召子亹弟公子嬰於陳而立之是為鄭子是歲齊襄公使彭生醉拉殺魯桓公鄭子八年齊人管至父等作亂弑其君襄公十二年齊人長萬弑其君湣公鄭祭仲死十四年故鄭亡厲公突在櫟者使人誘劫鄭大夫甫瑕要以求入瑕曰舍我我為君殺鄭子而入君厲公與盟乃舍之六月甲子瑕殺鄭子及其二子而迎厲公突突自櫟復入即位初内虵與外虵鬭於鄭南門中内虵死居六年厲公果復入入而讓其伯父原曰我亡國外居伯父無意入我亦甚矣原曰事君無二心人臣之職也原知罪矣遂自殺厲公於是謂甫瑕曰子之事君有二心矣遂誅之瑕曰重德不德誠然哉厲公突後元年齊桓公始霸五年燕衛與周惠王弟頽伐王王出奔温立弟頽為王六年惠王告急鄭厲公發兵擊周王子頽弗勝於是與周惠王歸王居于櫟七年春鄭厲公與虢叔襲殺王子頽而入惠王於周秋厲公卒子文公踕立厲公初立四嵗亡居櫟居櫟十七嵗復入立七嵗與亡凡二十八年文公十七年齊桓公以兵破蔡遂伐楚至召陵二十四年文公之賤妾曰燕姞賈逵曰姞南燕姓夢天與之蘭賈逵曰香草也曰余為伯鯈余爾祖也賈逵曰伯鯈南燕祖以是為而子賈逵曰以是蘭也為汝子之名蘭有國香以夢告文公文公幸之而與之草蘭為符遂生子名曰蘭三十六年晉公子重耳過文公弗禮文公弟叔詹曰重耳賢且又同姓窮而過君不可無禮文公曰諸侯亡公子過者多矣安能盡禮之叔詹曰君如弗禮遂殺之弗殺使即反國為鄭憂矣文公弗聽三十七年春晉公子重耳反國立是為文公秋鄭入滑滑聽命已而反與衛於是鄭伐滑周襄王使伯犕請滑鄭文公怨惠王之亡在櫟而文公父厲公入之而惠王不賜厲公爵祿又怨襄王之與衛滑故不聽襄王請而囚伯犕王怒與翟人伐鄭弗克冬翟攻伐襄王襄王出奔鄭鄭文公居王于氾三十八年晉文公入襄王成周四十一年助楚擊晉自晉文公之過無禮故倍晉助楚四十三年晉文公與秦穆公共圍鄭討其助楚攻晉者及文公過時之無禮也初鄭文公有三夫人寵子五人皆以罪早死公怒溉徐廣曰一作瑕逐羣公子子蘭奔晉從晉文公圍鄭時蘭事晉文公甚謹愛幸之乃私于晉以求入鄭為太子晉於是欲得叔詹為僇鄭文公恐不敢謂叔詹言詹聞言於鄭君曰臣謂君君不聽臣晉卒為患然晉所以圍鄭以詹詹死而赦鄭國詹之願也乃自殺鄭人以詹尸與晉晉文公曰必欲一見鄭君辱之而去鄭人患之乃使人私於秦曰破鄭益晉非秦之利也秦兵罷晉文公欲入蘭為太子以告鄭鄭大夫石癸曰吾聞姞姓乃后稷之元妃杜預曰姞姓之女為后稷妃其後當有興者子蘭母其後也且夫人子盡已死餘庶子無如蘭賢今圍急晉以為請利孰大焉遂許晉與盟卒而立子蘭為太子晉兵乃罷去四十五年文公卒子蘭立是為繆公繆公元年春秦繆公使三將將兵欲襲鄭至滑逢鄭賈人弦高以十二牛勞軍故秦兵不至而還晉敗之於殽初往年鄭文公之卒也鄭司城繒賀以鄭情賣之秦兵故來三年鄭發兵從晉伐秦敗秦兵扵汪往年徐廣曰繆公之二年楚太子商臣弑其父成王代立二十一年與宋華元伐鄭華元殺羊食士不與其御羊斟怒以馳鄭鄭囚華元宋贖華元亦亡去晉使趙穿以兵伐鄭二十二年鄭繆公卒子夷立是為靈公靈公元年春楚獻黿於靈公子家子公將朝靈公賈逵曰二子鄭卿也子公之食指動服䖍曰第二指謂子家曰佗日指動必食異物及入見靈公進黿羮子公笑曰果然靈公問其笑故具告靈公靈公召之獨弗予羮子公怒染其指左傳曰染指於鼎嘗之而出公怒欲殺子公子公與子家謀先夏弑靈公鄭人欲立靈公弟去疾去疾讓曰必以賢則去疾不肖必以順則公子堅長堅者靈公庶弟徐廣曰年表云靈公庶兄去疾之兄也於是乃立子堅是為襄公襄公立將盡去繆氏繆氏者殺靈公子公之族家也去疾曰必去繆氏我將去之乃止皆以為大夫襄公元年楚怒鄭受宋賂縱華元伐鄭鄭背楚與晉親五年楚復伐鄭晉來救之六年子家卒國人復逐其族以其弑靈公也七年鄭與晉盟鄢陵八年楚莊王以鄭與晉盟來伐圍鄭三月鄭以城降楚楚王入自皇門鄭襄公肉袒牽羊以迎曰孤不能事邊邑使君王懷怒以及弊邑孤之罪也敢不唯命是聽君王遷之江南及以賜諸侯亦唯命是聽若君王不忘厲宣王桓武公哀不忍絶其社稷錫不毛之地何休曰墝埆不生五穀曰不毛謙不敢求肥饒使復得改事君王孤之願也然非所敢望也敢布腹心惟命是聽莊王為却三十里而後舍楚羣臣曰自郢至此士大夫亦久勞矣今得國舍之何如莊王曰所為伐伐不服也今已服尚可求乎卒去晉聞楚之伐鄭發兵救鄭其來持兩端故遲比至河楚兵已去晉將率或欲渡或欲還卒渡河莊王聞還擊晉鄭反助楚大破晉軍於河上十年晉來伐鄭以其反晉而親楚也十一年楚莊王伐宋宋告急于晉晉景公欲發兵救宋伯宗諫晉君曰天方開楚未可伐也乃求壯士得霍人解揚字子虎誆楚令宋毋降過鄭鄭與楚親乃執解揚而獻楚楚王厚賜與約使反其言令宋趣降三要乃許於是楚登解揚樓車服䖍曰樓車所以窺望敵軍兵法法所謂雲梯也杜預曰樓車上望櫓也令呼宋遂負楚約而致其晉君命曰晉方悉國兵以救宋宋雖急慎毋降楚晉兵今至矣楚莊王大怒將殺之解揚曰君能制命為義臣能承命為信受吾君命以出有死無隕服䖍曰隕墜也莊王曰若之許我已而背之其信安在解揚曰所以許王欲以成吾君命也將死顧謂楚軍曰為人臣毋忘盡忠得死者楚王諸弟皆諫王赦之於是赦解揚使歸晉爵之為上卿十八年襄公卒子悼公㵒立悼公元年鄦公徐廣曰音許許公靈公也惡鄭於楚悼公使弟睔於楚自訟訟不直楚囚睔於是鄭悼公來與晉平遂親睔私於楚子反子反言歸睔於鄭二年楚伐鄭晉兵來救是嵗悼公卒立其弟睔是為成公成公三年楚共王曰鄭成公孤有德焉使人來與盟成公私與盟秋成公朝晉晉曰鄭私平於楚執之使欒書伐鄭四年春鄭患晉圍公子如乃立成公庶兄繻為君其四月晉聞鄭立君乃歸成公鄭人聞成公立亦殺君繻迎成公晉兵去十年背晉盟盟於楚晉厲公怒發兵伐鄭楚共王救鄭晉楚戰鄢陵楚兵敗晉射傷楚共王目俱罷而去十三年晉悼公伐鄭兵於洧上服䖍曰洧水名鄭城守晉亦去十四年成公卒子惲立是為釐公釐公五年鄭相子駟朝釐公釐公不禮子駟怒使厨人藥殺釐公徐廣曰年表云子駟使賊夜殺釐公赴諸侯曰釐公㬥病卒立釐公子嘉嘉時年五嵗是為簡公簡公元年諸公子謀欲誅相子駟子駟覺之反盡誅諸公子二年晉伐鄭鄭與盟晉去冬又與楚盟子駟畏誅故兩親晉楚三年相子駟欲自立為君公子子孔使尉止殺相子駟而代之子孔又欲自立子産曰子駟為不可誅之今又效之是亂無時息也於是子孔從之而相鄭簡公四年晉怒鄭與楚盟伐鄭鄭與盟楚共王救鄭敗晉兵簡公欲與晉平楚又囚鄭使者十二年簡公怒相子比專國權誅之而以子産為卿十九年簡公如晉請衛君還而封子産以六邑服䖍曰四井為邑子産讓受其三邑二十二年吳使延陵季子於鄭見子產如舊交謂子産曰鄭之執政者侈難將至政將及子子為政必以禮不然鄭將敗子産厚遇季子二十三年諸公子争寵相殺又欲殺子產公子或諫曰子産仁人鄭所以存者子産也勿殺乃止二十五年鄭使子産於晉問平公疾平公曰卜而曰實沉臺駘為祟史官莫知敢問對曰高辛氏有二子長曰閼伯季曰實沉居曠林賈逵曰曠大也不相能也曰操干戈以相征伐后帝弗臧賈逵曰后帝堯也臧善也遷閼伯于商邱主辰賈逵曰商邱在漳南杜預曰商邱宋地服䖍曰辰大火主祀也商人是因故辰為商星服䖍曰商人契之先殷之始祖相土封閼伯之故地因其故國而代之遷實沉于大夏主參服䖍曰大夏在汾澮之間主祀參星杜預曰大夏今晉陽縣唐人是因服事夏商賈逵曰唐人謂陶唐之𦙍劉累事夏孔甲封於大夏因實沉之國子孫服事夏商也其季世曰唐叔虞杜預曰唐人之季世其君曰叔虞當武王邑姜方娠大叔夢帝謂已賈逵曰帝天也已武王也余命而子曰虞杜預曰取唐君之名乃與之唐屬之参而蕃育其子孫及生有文在其掌曰虞遂以命之及成王滅唐而國大叔焉故參為晉星賈逵曰晉主祀參參為晉星由是觀之則實沉參神也昔金天氏有􅒨子曰昧為𤣥冥師服䖍曰金天少皥也𤣥冥水官也師長也昧為水官之長生允格臺駘服䖍曰允格臺駘兄弟也臺駘能業其官服䖍曰修昧之職宣汾洮賈逵曰宣猶通也汾洮二水名障大澤服䖍曰陂障其水也以處太原服䖍曰太原汾水名杜預曰太原晉陽也臺駘之所居者也帝用嘉之國之汾川服䖍曰帝顓頊也沈姒蓐黃實守其祀賈逵曰四國臺駘之後也今晉主汾川而滅之賈逵曰滅四國由是觀之則臺駘汾洮神也然是二者不害君身山川之神則水旱之菑禜之服䖍曰禜為營攅用幣也若有水旱則禜祭山川之神以祈福也日月星辰之神則雪霜風雨不時禜之若君疾飲食哀樂女色所生也平公及叔嚮曰善博物君子也厚為之禮於子産二十七年夏鄭簡公朝晉冬畏楚靈王之强又朝楚子産從二十八年鄭君病使子産會諸侯與楚靈王盟於申誅齊慶封三十六年簡公卒子定公寜立秋定公朝晉昭公定公元年楚公子棄疾弑其君靈王而自立為平王欲行德諸侯歸靈王所侵鄭地于鄭四年晉昭公卒其六卿彊公室卑子産謂韓宣子曰為政必以德毋忘所以立六年鄭火公欲禳之子産曰不如修德八年楚太子建來奔十年太子建與晉謀襲鄭鄭殺建建子勝奔吳十一年定公如晉晉與鄭謀誅周亂臣入敬王于周十三年定公卒子獻公蠆立獻公十三年卒子聲公勝立當是時晉六卿彊侵奪鄭鄭遂弱聲公五年鄭相子産卒鄭人皆哭泣悲之如亡親戚子産者鄭成公少子也為人仁愛人事君忠厚孔子嘗過鄭與子産如兄弟云及聞子産死孔子為泣曰古之遺愛也賈逵曰愛恵也杜預曰子産見愛有古人遺風也兄事子産八年晉范中行氏反晉告急于鄭鄭救之晉伐鄭敗鄭軍於鐵杜預曰戚城南鐵邱十四年宋景公滅曹二十年齊田常弑其君簡公而常相於齊二十二年楚惠王滅陳孔子卒二十六年晉知伯伐鄭取九邑三十七年聲公卒子哀公易立年表云年三十八哀公八年鄭人弑哀公而立聲公弟丑是為共公共公三年晉滅知伯三十年共公卒子幽公已立幽公元年韓武子伐鄭殺幽公鄭人立幽公弟駘是為繻公年表云鄭立幽公子駘繻或作繚繻公十五年韓景侯伐鄭取雍邱鄭城京十六年鄭伐韓敗韓兵於負黍徐廣曰在陽城二十年韓趙魏列為諸侯二十三年鄭圍韓之陽翟二十五年鄭君殺其相子陽二十七年子陽之黨共弑繻君駘而立幽公弟乙為君是為鄭君徐廣曰一本云立幽公弟乙陽為君是為康公六國年表云立幽公子駘又以鄭君陽為鄭康公乙班固云鄭康公乙為韓所滅鄭君乙立二年鄭負黍反復歸韓十一年韓伐鄭取陽城二十一年韓哀侯滅鄭幷其國太史公曰語有之以權利合者權利盡則交疎甫瑕是也甫瑕雖以劫殺鄭子内厲公厲公終背而殺之此與晉之里克何異守節如荀息身死而不能存奚齊變所從來亦多故矣史記集解卷四十二
