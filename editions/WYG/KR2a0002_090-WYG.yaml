body:
  text: 史記集解卷九十二宋裴駰撰史記九十二淮隂侯列傳第三十二淮隂侯韓信者淮隂人也始為布衣時貧無行不得推擇為吏李竒曰無善行可推舉選擇又不能治生商賈常從人寄食飲人多厭之者常數從其下鄉南昌亭長寄食張晏曰下郷縣屬淮陰也數月亭長妻患之乃晨炊蓐食張晏曰未起而牀蓐中食食時信往不為具食信亦知其意怒竟絶去信釣於城下諸母漂韋昭曰以水擊絮為漂故曰漂母有一母見信飢飯信竟漂數十日信喜謂漂母曰吾必有以重報母母怒曰大丈夫不能自食吾哀王孫而進食蘇林曰如言公子也豈望報乎淮隂屠中少年有侮信者曰若雖長大好帶刀劒中情怯耳衆辱之曰信能死刺我不能死出我袴下徐廣曰袴一作胯胯股也音同又云漢書作跨同耳於是信孰視之俛出袴下蒲伏一市人皆笑信以為怯及項梁渡淮信仗劒從之居戲下徐廣曰戲一作麾無所知名項梁敗又屬項羽羽以為郎中數以策干項羽羽不用漢王之入蜀信亡楚歸漢未得知名為連敖徐廣曰典客也坐法當斬其輩十三人皆已斬次至信信乃仰視適見滕公曰上不欲就天下乎何為斬壯士滕公竒其言壯其貎釋而不斬與語大說之言於上上拜以為治粟都尉上未之竒也信數與蕭何語何竒之至南鄭諸將行道亡者數十人信度何等已數言上上不我用即亡何聞信亡不及以聞自追之人有言上曰丞相何亡上大怒如失左右手居一二日何來謁上上且怒且喜罵何曰若亡何也何曰臣不敢亡也臣追亡者上曰若所追者誰何曰韓信也上復罵曰諸將亡者以十數公無所追追信詐也何曰諸將易得耳至如信者國士無雙王必欲長王漢中無所事信文頴曰事猶業也張晏曰無事用信必欲争天下非信無所與計事者顧王策安所決耳王曰吾亦欲柬耳安能鬱鬱久居此乎何曰王計必欲柬能用信信即留不能用信終亡耳王曰吾為公以為將何曰雖為將信必不留王曰以為大將何曰幸甚於是王欲召信拜之何曰王素慢無禮今拜大將如呼小兒耳此乃信所以去也王必欲拜之擇良日齊戒設壇塲具禮乃可耳王許之諸將皆喜人人各自以為得大將至拜大將乃韓信也一軍皆驚信拜禮畢上坐王曰丞相數言將軍將軍何以教寡人計策信謝因問王曰今東鄉爭權天下豈非項王邪漢王曰然曰大王自料勇悍仁彊孰與項王漢王黙然良久曰不如也信再拜賀曰惟信亦為大王不如也然臣嘗事之請言項王之為人也項王喑噁叱咤千人皆廢晉灼曰廢不收也然不能任屬賢將此特匹夫之勇耳項王見人㳟敬慈愛言語嘔嘔音于凶反人有疾病涕泣分食飲至使人有功當封爵者印刓弊忍不能予漢書音義曰不忍授此所謂婦人之仁也項王雖霸天下而臣諸侯不居關中而都彭城有背義帝之約而以親愛王諸侯不平諸侯之見項王遷逐義帝置江南亦皆歸逐其主而自王善地項王所過無不殘滅者天下多怨百姓不親附特刦於威彊耳名雖為霸實失天下心故曰其彊易弱今大王誠能反其道任天下武勇何所不誅以天下城邑封功臣何所不服以義兵從思東歸之士何所不散且三秦王為秦將將秦子弟數歲矣所殺亡不可勝計又欺其衆降諸侯至新安項王誅坑秦降卒二十餘萬唯獨邯欣翳得脫秦父兄怨此三人痛入骨髓今楚彊以威王此三人秦民莫愛也大王之入武關秋毫無所害除秦苛法與秦民約法三章耳秦民無不欲得大王王秦者於諸侯之約大王當王關中關中民咸知之大王失職入漢中秦民無不恨者今大王舉而東三秦可傳檄而定也於是漢王大喜自以為得信晩遂聽信計部署諸將所擊八月漢王舉兵東出陳倉定三秦漢二年出關收魏河南韓殷王皆降合齊趙共擊楚四月至彭城漢兵敗散而還信復收兵與漢王會滎陽復擊破楚京索之間以故楚兵卒不能西漢之敗卻彭城塞王欣翟王翳亡漢降楚齊趙亦反漢與楚和六月魏王豹謁歸視親疾至國即絶河關反漢與楚約和漢王使酈生説豹不下其八月以信為左丞相擊魏魏王盛兵蒲坂塞臨晉信乃益為疑兵漢書音義曰益張旌旗以疑敵者陳舩欲渡臨晉而伏兵從夏陽以木罌缻渡軍徐廣曰缻一作缶服䖍曰以木押縳罌缻以渡韋昭曰以木為器如罌缻以渡軍無船且尚密也襲安邑魏王豹驚引兵迎信信遂虜豹定魏為河東郡漢王遣張耳與信俱引兵東北擊趙代後九月破代兵禽夏說閼與徐廣曰音余駰案李竒曰夏説代相也信之下魏破代漢輒使人收其精兵詣滎陽以距楚信與張耳以兵數萬欲東下井陘擊趙趙王成安君陳餘聞漢且襲之也聚兵井陘口號稱二十萬廣武君季左車説成安君曰聞漢將韓信渉西河虜魏王禽夏説新喋血閼與今乃輔以張耳議欲下趙此乗勝而去國逺鬬其鋒不可當臣聞千里餽糧士有飢色樵蘇後爨漢書音義曰樵取薪也蘇取草也師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在其後願足下假臣竒兵三萬人從間路絶其輜重足下深溝高壘堅營勿與戰彼前不得鬭退不得還吾竒兵絶其後使野無所掠不至十日而兩將之頭可致於戲下願君留意臣之計否必為二子所禽矣成安君儒者也常稱義兵不用詐謀竒計曰吾聞兵法十則圍之倍則戰之今韓信兵號數萬其實不過數千能千里而襲我亦已罷極今如此避而不擊後有大者何以加之則諸侯謂吾怯而輕來伐我不聽廣武君策廣武君策不用韓信使人間視知其不用還報則大喜乃敢引兵遂下未至井陘口三千里止舍夜傳發漢書音義曰傳令軍中使發選輕騎二千人人持一赤幟從問道萆山而望趙軍如淳曰萆音蔽依山自覆蔽誡曰趙見我走必空壁逐我若疾入趙壁拔趙幟立漢赤幟令其裨將傳飱徐廣曰音飡也曰今日破趙會食服䖍曰立駐傳飱食也如淳曰小飯曰飡言破趙後乃當共飽食也諸將皆莫信詳應曰諾謂軍吏曰趙已先據便地為壁且彼未見吾大將旗鼓未肯擊前行恐吾至阻險而還信乃使萬人先行出背水陳趙軍望見而大笑平旦信建大將之旗鼓鼓行出井陘口趙開壁擊之大戰良久於是信張耳詳棄鼓旗走水上軍水上軍開入之復疾戰趙果空壁爭漢鼓旗逐韓信張耳韓信張耳已入水上軍軍皆殊死戰不可敗信所出竒兵二千騎共候趙空壁逐利則馳入趙壁皆拔趙旗立漢赤幟二千趙軍已不勝不能得信等欲還歸壁壁皆漢赤幟而大驚以為漢皆已得趙王將矣兵遂亂遁走趙將雖斬之不能禁也於是漢兵夾擊大破虜趙軍斬成安君泜水上徐廣曰泜音遲禽趙王歇信乃令軍中毋殺廣武君有能生得者購千金於是有縛廣武君而致戲下者信乃解其縳東鄉坐西鄉對師事之諸將効首虜休畢賀因問信曰兵法右倍山陵前左水澤今者將軍令臣等反背水陳曰破趙會食臣等不服然竟以勝此何術也信曰此在兵法顧諸君不察耳兵法不曰䧟之死地而後生置之亡地而後存且信非得素拊循士大夫也此所謂驅市人而戰之其勢非置之死地使人人自為戰今予之生地皆走寧尚可得而用之乎諸將皆服曰善非臣所及也於是信問廣武君曰僕欲北攻燕東伐齊何若而有功廣武君辭謝曰臣聞敗軍之將不可以言勇亡國之大夫不可以圖存今臣敗亡之虜何足以權大事乎信曰僕問之百里奚居虞而虞亡在秦而秦霸非愚於虞而智於秦也用與不用聽與不聽也誠令成安君聽足下計若信者亦已為禽矣以不用足下故信得侍耳因固問曰僕委心歸計願足下勿辭廣武君曰臣聞智者千慮必有一失愚者千慮必有一得故曰狂夫之言聖人擇焉顧恐臣計未必足用願効愚忠夫成安君有百戰百勝之計一旦而失之軍敗鄗下李竒曰鄗音臛今髙邑是身死泜上今將軍渉西河虜魏王禽夏説閼與一舉而下井陘不終朝破趙二十萬衆誅成安君名聞海内威震天下農夫莫不輟耕釋耒褕衣甘食傾耳以待命者如淳曰恐滅亡不久故也若此將軍之所長也然而衆勞卒罷其實難用今將軍欲舉倦弊之兵頓之燕堅城之下欲戰恐久力不能抜情見勢屈曠日糧竭而弱燕不服齊必距竟以自彊也燕齊相持而不下則劉項之權未有所分也若此者將軍所短也臣愚竊以為亦過矣故善用兵者不以短擊長而以長擊短韓信曰然則何由廣武君對曰方今為將軍計莫如案甲休兵鎮趙撫其孤百里之内牛酒日至以饗士大夫醳兵魏都賦曰肴醳順時劉逵曰醳酒也北首燕路而後遣辨士奉咫尺之書暴其所長於燕燕必不敢不聽從燕已從使諠言者東告齊齊必從風而服雖有智者亦不知為齊計矣如是則天下事皆可圖也兵固有先聲而後實者此之謂也韓信曰善從其策發使使燕燕從風而靡乃遣使報漢因請立張耳為趙王以鎮撫其國漢王許之乃立張耳為趙王楚數使竒兵渡河擊趙趙王耳韓信往來救趙因行定趙城邑發兵詣漢楚方急圍漢王於滎陽漢王南出之宛葉間得黥布走入成臯楚又復急圍之六月漢王出成臯東渡河獨與滕公俱從張耳軍修武至宿傳舍晨自稱漢使馳入趙壁張耳韓信未起即其臥内上奪其印符以麾召諸將易置之信耳起乃知漢王來大驚漢王奪兩人軍即令張耳備守趙地拜韓信為相國收趙兵未發者擊齊文頴曰謂趙人未嘗見發者信引兵東未渡平原聞漢王使酈食其已說下齊韓信欲止范陽辯士蒯通説信曰將軍受詔擊齊而漢獨發間使下齊寧有詔止將軍乎何以得毋行也且酈生一士伏軾韋昭曰軾今小車中隆起者掉三寸之舌下齊七十餘城將軍將數萬衆歲餘乃下趙五十餘城為將數歲反不如一豎儒之功乎於是信然之從其計遂渡河齊已聽酈生即留縱酒罷備漢守禦信因襲齊厯下軍徐廣曰濟南厯城縣遂至臨菑齊王田廣以酈生賣已乃亨之而走高密使使之楚請救韓信已定臨菑遂東追廣至高密西楚亦使龍且將號稱二十萬救齊齊王廣龍且并軍與信戰未合人或説龍且曰漢兵逺鬬窮戰其鋒不可當齊楚自居其地戰兵易敗散不如深壁令齊王使其信臣招所亡城亡城聞其王在楚來救必反漢漢兵二千里客居齊城皆反之其勢無所得食可無戰而降也龍且曰吾平生知韓信為人易與耳且夫救齊不戰而降之吾何功今戰而勝之齊之半可得何為止遂戰與信夾濰水陳徐廣曰出東莞而東北流至北海都昌縣入海韓信乃夜令人為萬餘囊滿盛沙壅水上流引軍半渡擊龍且佯不勝還走龍且果喜曰固知信怯也遂追信渡水信使人決壅囊水大至龍且軍大半不得渡即急擊殺龍且龍且水東軍敗走齊王廣亡去信遂追北至城陽皆虜楚卒漢四年遂皆降平齊使人言漢王曰齊偽詐多變反覆之國也南邊楚不為假王以鎮之其勢不定願為假王便當是時楚方急圍漢王於滎陽韓信使者至發書張晏曰發信使者所齎書漢王大怒罵曰吾困於此旦暮望若來佐我乃欲自立為王張良陳平躡漢王足因附耳語曰漢方不利寧能禁信之王乎不如因而立善遇之使自為守不然變生漢王亦悟因復罵曰大丈夫定諸侯即為真王耳何以假為乃遣張良往立信為齊王徐廣曰四年二月徵其兵擊楚楚已亡龍且項王恐使盱眙人武涉張華曰武涉墓在盱眙城東十五里往説齊王信曰天下共苦秦久矣相與戮力擊秦秦已破計功割地分土而王之以休士卒今漢王復興兵而東侵人之分奪人之地已破三秦引兵出關收諸侯之兵以東擊楚其意非盡吞天下者不休其不知厭足如是甚也且漢王不可必身居項王掌握中數矣項王憐而活之然得脱輒倍約復擊項王其不可親信如此今足下雖自以與漢王為厚交為之盡力用兵終為之所禽矣足下所以得須臾至今者以項王尚存也當今二王之事權在足下足下右投則漢王勝左投則項王勝項王今日亡則次取足下足下與項王有故何不反漢與楚連和參分天下王之今釋此時而自必於漢以擊楚且為智者固若此乎韓信謝曰臣事項王官不過郎中位不過執㦸張晏曰郎中宿衛執㦸之人也言不聽畫不用故倍楚而歸漢漢王授我上將軍印與我數萬衆解衣衣我推食食我言聽計用故吾得以至於此夫人深親信我我倍之不祥雖死不易幸為信謝項王武涉已去齊人蒯通知天下權在韓信欲為竒策而感動之以相人說韓信曰僕嘗受相人之術韓信曰先生相人何如對曰貴賤在於骨法憂喜在於容色成敗在於決斷以此參之萬不失一韓信曰善先生相寡人何如對曰願少間信曰左右去矣對曰相君之面不過封侯又危不安相君之背貴乃不可言張晏曰背畔則大貴韓信曰何謂也蒯通曰天下初發難也俊雄豪傑建號壹呼天下之士雲合霧集魚鱗雜遝熛至風起當此之時憂在亡秦而已今楚漢分争使天下無罪之人肝膽塗地父子暴骸骨於中野不可勝數楚人起彭城轉鬭逐北至於滎陽乗利席卷威震天下然兵困於京索之間迫西山而不能進者三年於此矣漢王將數十萬之衆距鞏雒阻山河之險一日數戰無尺寸之功折北不救張晏曰折衂敗也北奔北敗滎陽傷成臯張晏曰於成臯傷胸也臣瓚曰謂軍折傷遂走宛葉之間此所謂智勇俱困者也夫鋭氣挫於險塞而糧食竭於内府百姓罷極怨望容容無所倚以臣料之其勢非天下之賢聖固不能息天下之禍當今兩主之命縣於足下足下為漢則漢勝與楚則楚勝臣願披腹心輸肝膽効愚計恐足下不能用也誠能聽臣之計莫若兩利而俱存之參分天下鼎足而居其勢莫敢先動夫以足下之賢聖有甲兵之衆據彊齊從燕趙出空虛之地而制其後因民之欲西鄉為百姓請命則天下風走而響應矣孰敢不聽割大弱強以立諸侯諸侯已立天下服聽而歸德於齊案齊之故有膠泗之地懷諸侯之德深拱揖讓則天下之君王相率而朝於齊矣葢聞天與弗取反受其咎時至不行反受其殃願足下孰慮之信曰漢王遇我甚厚載我以其車衣我以其衣食我以其食吾聞之乗人之車者載人之患衣人之衣者懷人之憂食人之食者死人之事吾豈可以鄉利倍義乎蒯生曰足下自以為善漢王欲建萬世之業臣竊以為誤矣始常山王成安君為布衣時相與為刎頸之交後爭張黶陳澤之事二人相怨常山王背項王奉項嬰頭而竄逃歸於漢王漢王借兵而東下殺成安君泜水之南頭足異處卒為天下笑此二人相與天下至驩也然而卒相禽者何也患生於多欲而人心難測也今足下欲行忠信以交於漢王必不能固於二君之相與也而事多大於張黶陳澤故臣以為足下必漢王之不危己亦誤矣大夫種范蠡存亡越霸句踐立功成名而身死亡野獸已盡而獵狗亨夫以交友言之則不如張耳之與成安君者也以忠信言之則不過大夫種范蠡之於句踐也此二人者足以觀矣願足下深慮之且臣聞勇略震主者身危而功葢天下者不賞臣請言大王功略足下涉西河虜魏王禽憂說引兵下井陘誅成安君徇趙脅燕定齊南摧楚人之兵二十萬東殺龍且西鄉以報此所謂功無二於天下而略不世出者也今足下戴震主之威挾不賞之功歸楚楚人不信歸漢漢人震恐足下欲持是安歸乎夫勢在人臣之位而有震主之威名高天下竊為足下危之韓信謝曰先生且休矣吾將念之後數日蒯通復説曰夫聽者事之候也計者事之機也聽過計失而能久安者鮮矣聽不失一二者不可亂以言計不失本末者不可紛以辭夫隨厮養之役者失萬乗之權守儋石之禄者晉灼曰楊雄方言海岱之間名罌為儋石石斗也蘇林曰齊人名小罌為儋石如今受鮐魚石罌不過一二石耳一説一儋一斛之餘闕卿相之位故知者決之斷也疑者事之害也審毫釐之小計遺天下之大數智誠知之決弗敢行者百事之禍也故曰猛虎之猶豫不若蜂蠆之致螫騏驥之跼躅徐廣曰跼一作蹢也不如駑馬之安步孟賁之狐疑不如庸夫之必至也雖有舜禹之智吟而不言不如瘖聾之指麾也此言貴能行之夫功者難成而易敗時者難得而易失也時乎時乎不再來願足下詳察之韓信猶豫不忍倍漢又自以為功多漢終不奪我齊遂謝蒯通蒯通説不聽已詳狂為巫徐廣曰一本遂不用蒯通蒯通曰夫迫於細苛者不可與圖大事拘於臣虜者固無君王之意説不聽因去詳狂也漢王之困固陵用張良計召齊王信遂將兵㑹垓下項羽已破高祖襲奪齊王軍徐廣曰以齊為平原千乗東萊齊郡漢五年正月徙齊王信為楚王都下邳信至國召所從食漂母賜千金張華曰漂母家在泗口南岸及下鄉南昌亭長賜百錢曰公小人也為德不卒召辱己之少年令出胯下者以為楚中尉告諸將相曰此壮士也方辱我時我寧不能殺之邪殺之無名故忍而就於此項王亡將鍾離昧家在伊廬徐廣曰東海朐縣有伊廬鄉駰案韋昭曰今中廬縣素與信善項王死後亡歸信漢王怨昧聞其在楚詔楚捕昧信初之國行縣鄉邑陳兵出入漢六年人有上書告楚王信反高帝以陳平計天子巡狩㑹諸侯南方有雲夢發使告諸侯㑹陳吾將游雲夢實欲襲信信弗知高祖且至楚信欲發兵反自度無罪欲謁上恐見禽人或說信曰斬昧謁上上必喜無患信見昧計事昧曰漢所以不擊取楚以昧在公所若欲捕我以自媚於漢吾今日死公亦隨手亡矣乃駡信曰公非長者卒自剄信持其首謁高祖於陳上令武士縳信載後車信曰果若人言狡兔死良狗亨張晏曰狡猶猾高鳥盡良弓藏敵國破謀臣亡天下已定我固當亨上曰人告公反遂械繫信至雒陽赦信罪以為淮陰侯信知漢王畏惡其能常稱病不朝從信由此日怨望居常鞅鞅羞與絳灌等列信常過樊將軍噲噲跪拜送迎言稱臣曰大王乃肯臨臣信出門笑曰生乃與噲等為伍上常從容與信言諸將能不各有差上問曰如我能將幾何信曰陛下不過能將十萬上曰於君何如曰臣多多而益善耳上笑曰多多益善何為為我禽信曰陛下不能將兵而善將將此乃信之所以為陛下禽也且陛下所謂天授非人力也陳豨拜為鉅鹿守徐廣曰表云為趙相國將兵守代也辭於淮陰侯淮陰侯挈其手辟左右與之步於庭仰天歎曰子可與言乎欲與子有言也豨曰唯將軍令之淮陰侯曰公所居天下精兵處也而公陛下之信幸臣也人言公之畔陛下必不信再至陛下乃疑矣三至必怒而自將吾為公從中起天下可圖也陳豨素知其能也信之曰謹奉教漢十一年陳豨果反上自將而往信病不從陰使人至豨所曰第舉兵吾從此助公信乃謀與家臣夜詐詔赦諸官徒奴欲發以襲呂后太子部署已定待豨報其舍人得罪於信信囚欲殺之舍人弟上變告信欲反状於呂后呂后欲召恐其黨不就乃與蕭相國謀詐令人從上所來言豨已得死列侯羣臣皆賀相國紿信曰雖疾彊入賀信入呂后使武士縛信斬之長樂鍾室信方斬曰吾悔不用蒯通之計乃為兒女子所詐豈非天哉遂夷信三族高祖已從豨軍來至見信死且喜且憐之問信死亦何言呂后曰信言恨不用蒯通計高祖曰是齊辯士也乃詔齊捕蒯通蒯通至上曰若敎淮陰侯反乎對曰然臣固敎之豎子不用臣之策故令自夷於此如彼豎子用臣之計陛下安得而夷之乎上怒曰亨之通曰嗟乎寃哉亨也上曰若教韓信反何寃對曰秦之綱絶而維弛山東大擾異姓竝起英俊烏集秦失其鹿天下共逐之張晏曰以鹿喻帝位也於是高材疾足者先得焉跖之狗吠堯堯非不仁狗固吠非其主當是時臣唯獨知韓信非知陛下也且天下銳精持鋒欲為陛下所為者甚衆顧力不能耳又可盡亨之邪高帝曰置之乃釋通之罪太史公曰吾如淮陰淮陰人為余言韓信雖為布衣時其志與衆異其母死貧無以塟然乃行營高敞地令其旁可置萬家余視其母冢良然假令韓信學道謙讓不伐己功不矜其能則庻幾哉於漢家勲可以比周召太公之徒後世血食矣不務出此而天下已集乃謀畔逆夷滅宗族不亦宜乎史記集解卷九十二
