body:
  text: 史記集解卷一百三十宋裴駰撰史記一百三十太史公自序第七十昔在顓頊命南正重以司天北正黎以司地唐虞之際紹重黎之後使復典之至於夏商故重黎氏世序天地其在周程伯休甫其後也應劭曰封為程國伯休甫字也當周宣王時失其守而為司馬氏司馬氏世典周史惠襄之間司馬氏去周適晉張晏曰周惠王襄王有子頽叔帶之難故司馬氏奔晉晉中軍隨會奔秦而司馬氏入少梁自司馬氏去周適晉分散或在衛或在趙或在秦其在衛者相中山徐廣曰名喜也在趙者以傳劒論顯服䖍曰世善傳劒也蘇林曰傳手搏論而釋之晉灼曰史記吳起贊曰非信仁兼勇不能傳劒論兵書也蒯聵其後也在秦者名錯與張儀爭論於是惠王使錯将伐蜀遂拔因而守之蘇林曰守郡守也錯孫靳徐廣曰一作蘄事武安君白起而少梁更名曰夏陽靳與武安君阬趙長平軍文穎曰趙孝成時還而與之俱賜死杜郵塟於華池晉灼曰地名在鄠縣靳孫昌昌為秦主鐵官當始皇之時蒯聵𤣥孫卬為武信君將徐廣曰張耳傳云武臣自號武信君而徇朝歌諸侯之相王王卬於殷漢之伐楚卬歸漢以其地為河内郡昌生無澤無澤為漢市長無澤生喜喜為五大夫卒皆塟高門蘇林曰長安北門也瓚曰長安城無高門喜生談談為太史公如淳曰漢儀注太史公武帝置位在丞相上天下計書先上太史公副上丞相序事如古春秋遷死後宣帝以其官為令行太史公文書而已瓚曰百官表無太史公茂陵中書司馬談以太史丞為太史令太史公學天官於唐都受易於楊何徐廣曰淄川人習道論於黄子徐廣曰儒林傳曰黄生好黄老之術太史公仕於建元元封之間愍學者之不達其意而師悖乃論六家之要指曰易大傳張晏曰謂易繋辭天下一致而百慮同歸而殊塗夫隂陽儒墨名法道德此務為治者也直所從言之異路有省不省耳嘗竊觀隂陽之術大祥徐廣曰一作詳駰案李奇曰月令星官是其枝葉也而衆忌諱使人拘而多所畏然其序四時之大順不可失也儒者博而寡要勞而少功是以其事難盡從然其序君臣父子之禮列夫婦長幼之别不可易也墨者儉而難遵是以其事不可徧循然其彊本節用不可廢也法家嚴而少恩然其正君臣上下之分不可改矣名家使人儉而善尖真然其正名實不可不察也道家使人精神專一動合無形贍足萬物其為術也因隂陽之大順采儒墨之善撮名法之要與時遷移應物變化立俗施事無所不宜指約而易操事少而功多儒者則不然以為人主天下之儀表也主倡而臣和主先而臣隨如此則主勞而臣逸至於大道之要去健羨如淳曰知雄守雌是去健也不見可欲使心不亂是去羨也絀聰明釋此而任術夫神大用則竭形太勞則敝形神騷動欲與天地長久非所聞也夫隂陽四時八位十二度二十四節張晏曰八位八卦位也十二度十二次也二十四節就中氣也各有禁忌謂日月也各有教令順之者昌逆之者不死則亡未必然也故曰使人拘而多畏夫春生夏長秋收冬藏此天道之大經也弗順則無以為天下綱紀故曰四時之大順不可失也夫儒者以六藝為法六藝經傳以千萬數累世不能通其學當年不能究其禮故曰博而寡要勞而少功若夫列君臣父子之禮序夫婦長幼之别雖百家弗能易也墨者亦尚堯舜道言其德行曰堂高三尺土階三等茅茨不翦采椽不刮食土簋徐廣曰一作溜駰案服䖍曰土簋用土作此器啜土刑糲梁之食張晏曰一斛粟七斗米為糲瓚曰五斗粟三斗米為糲音剌韋昭曰糲礲也藜藿之羮夏日葛衣冬日鹿裘其送死桐棺三寸舉音不盡其哀教喪禮必以此為萬民之率使天下法若此則尊卑無别也夫世異時移事業不必同故曰儉而難遵要曰彊本節用則人給家足之道也此墨子之所長雖百家弗能廢也法家不别親疎不殊貴賤一斷於法則親親尊尊之恩絶矣可以行一時之計而不可長用也故曰嚴而少恩若尊主卑臣明分職不得相踰越雖百家弗能改也名家苛察繳繞服䖍曰繳音近叫呼謂煩也如淳曰繳繞猶纒繞不通大體也使人不得反其意專決於名而失人情故曰使人儉而善失真若夫控名責實參伍不失晉灼曰引名責實參錯交互明知事情此不可不察也道家無為又曰無不為其實易行其辭難知其術以虚無為本以因循為用無成勢無常形故能究萬物之情不為物先不為物後韋昭曰因物為制故能為萬物主有法無法因時為業有度無度因物與合故曰聖人不朽時變是守虚者道之常也因者君之綱也羣臣竝至使各自明也其實中其聲者謂之端實不中其聲者謂之窽徐廣曰音欵空也駰案李奇曰聲别名也窽言不聽姦乃不生賢不肖自分白黑乃形在所欲用耳何事不成乃合大道混混㝠㝠光燿天下復反無名凡人所生者神也所託者形也神大用則竭形大勞則敝形神離則死死者不可復生離者不可復反故聖人重之由是觀之人者生之本也形者生之具也韋昭曰聲氣者神也肢體者形也不先定其神而曰我有以治天下何由哉太史公既掌天官不治民有子曰遷遷生龍門徐廣曰在馮翊夏陽縣駰案蘇林曰禹所鑿龍門也耕牧河山之陽年十歲則誦古文二十而南游江淮上會稽探禹穴張晏曰禹巡狩至會稽而崩因葬焉上有孔穴民間云禹入此穴闚九疑浮於沅湘北涉汶泗講業齊魯之都觀孔子之遺風鄉射鄒嶧戹困鄱薛彭城徐廣曰嶧音亦縣名有山也鄱音皮鄒鄱薛三縣屬魯過梁楚以歸於是遷仕為郎中奉使西征巴蜀以南南略邛笮昆明還報命徐廣曰元鼎六年平西南夷以為五郡其明年元封元年是也是歲天子始建漢家之封而太史公留滯周南徐廣曰摯虞曰古之周南今之洛陽不得與從事故發憤且卒而子遷適使反見父於河洛之間太史公執遷手而泣曰余先周室之太史也自上世嘗顯功名於虞夏典天官事後世中衰絶於予乎汝復為太史則續吾祖矣今天子接千歲之統封泰山而余不得從行是命也夫命也夫余死汝必為太史為太史無忘吾所欲論著矣且夫孝始於事親中於事君終於立身揚名於後世以顯父母此孝之大者夫天下稱誦周公言其能論歌文武之德宣周邵之風達太王王季之思慮爰及公劉以尊后稷也幽厲之後王道缺禮樂衰孔子修舊起廢論詩書作春秋則學者至今則之自獲麟以來四百餘歲案年表魯哀公十四年獲麟至漢元封元年三百七十一年而諸侯相兼史記放絶今漢興海内一統明主賢君忠臣死義之士余為太史而弗論載廢天下之史文余甚懼焉汝某念哉遷俯首流涕曰小子不敏請悉論先人所次舊聞弗敢闕卒三歲而遷為太史令紬史記徐廣曰紬音抽石室金匱之書五年而當太初元年李竒曰遷為太史後五年適當於武帝太初元年此時述史記十一月甲子朔旦冬至天厯始改建於明堂諸神受紀徐廣曰封禪序曰封禪則萬靈罔不禋祀駰案韋昭曰告於肖神與天下更始著紀於是太史公曰先人有言自周公卒五百歲而有孔子孔子卒後至於今五百歲有能紹明世正易傳繼春秋本詩書禮樂之際意在斯乎意在斯乎小子何敢讓焉上大夫壺遂曰昔孔子何為而作春秋哉太史公曰余聞董生曰服䖍曰仲舒也周道衰廢孔子為魯司寇諸侯害之大夫壅之孔子知言之不用道之不行也是非二百四十二年之中以為天下儀表貶天子退諸侯討大夫以達王事而已矣子曰我欲載之空言不如見之於行事之深切著明也夫春秋上明三王之道下辨人事之紀别嫌疑明是非定猶豫善善惡惡賢賢賤不肖存亡國繼絶世補敝起廢王道之大者也易著天地隂陽四時五行故長於變禮經紀人倫故長於行書記先王之事故長於政詩記山川谿谷禽獸草木牝牡雌雄故長於風樂樂所以立故長於和春秋是非故長於治人是故禮以節人樂以發和書以道事詩以達意易以道化春秋以道義撥亂世反之正莫近於春秋春秋文成數萬其指數千張晏曰春秋萬八千字當言減而云成數字誤也駰謂太史公此辭是述董生之言董仲舒自治公羊公羊春秋經傳凡有四萬四千餘字故云文成數萬也不得如張議但論經萬八千字便為之誤萬物之散聚皆在春秋春秋之中弑君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數察其所以皆失其本已故易曰失之豪釐徐廣曰一云差以豪釐差以千里餘廣曰一云謬以千里駰案今易無此語易緯有之故曰臣弑君子弑父非一旦一夕之故也其漸久矣故有國者不可以不知春秋前有讒而弗見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權為人君父而不通於春秋之義者必蒙首惡之名為人臣子而不通於春秋之義者必陷簒弑之誅死罪之名其實皆以為善為之不知其義被之空言而不敢辭張晏曰趙盾不知討賊而不敢辭其罪也夫不通禮義之旨至於君不君臣不臣父不父子不子夫君不君則犯臣不臣則誅父不父則無道子不子則不孝此四行者天下之大過也以天下之大過予之則受而弗敢辭故春秋者禮之大宗也夫禮禁未然之前法施已然之後法之所為用者易見而禮之所為禁者難知壺遂曰孔子之時上無明君下不得任用故作春秋垂空文以斷禮義當一王之法今夫子上遇明天子下得守職萬事既具咸各序其宜夫子所論欲以何明太史公曰唯唯否否晉灼曰唯唯謙應也否否不通者也不然余聞之先人曰伏羲至純厚作易八卦堯舜之盛尚書載之禮樂作焉湯武之隆詩人歌之春秋采善貶惡推三代之德褒周室非獨刺譏而已也漢興已來至明天子獲符瑞封禪改正朔易服色受命於穆清如淳曰受天命淸和之氣澤流罔極海外殊俗重譯款塞應劭曰款叩也皆叩塞門來服從也如淳曰款寛也請除守塞者自保不為冦害請來獻見者不可勝道臣下百官力誦聖德猶不能宣盡其意且士賢能而不用有國者之恥主上明聖而德不布聞有司之過也且余嘗掌其官廢明聖盛德不載滅功臣世家賢大夫之業不述墮先人所言罪莫大焉余所謂述故事整齊其世傳非所謂作也而君比之於春秋謬矣於是論次其文七年徐廣曰天漢三年而太史公遭李陵之禍幽於縲紲乃喟然而嘆曰是余之罪也夫是余之罪也夫身毁不用矣退而深惟曰夫詩書隠約者欲遂其志之思也昔西伯拘羑里徐廣曰在湯隂演周易孔子厄陳蔡作春秋屈原放逐著離騷左丘失明厥有國語孫子臏脚而論兵法不韋遷蜀世傳吕覽韓非囚秦説難孤憤詩三百篇大抵聖賢發憤之所為作也此人皆意有所鬱結不得通其道也故述往事思來者於是卒述陶唐以來至於麟止張晏曰武帝獲麟遷以為述事之端上紀黄帝下至麟止猶春秋止於獲麟也自黄帝始維昔黄帝法天則地四聖遵序徐廣曰顓頊帝嚳堯舜各成法度唐堯遜位虞舜不台厥美帝功萬世載之作五帝本紀第一維禹之功九州攸同光唐虞際德流苗裔夏桀淫驕乃放鳴條作夏本紀第二維契作商爰及成湯太甲居桐德盛阿衡武丁得説乃稱高宗帝辛湛湎諸侯不享作殷本紀第三維棄作稷德盛西伯武王牧野實撫天下幽厲昏亂既喪酆鎬陵遲至赧洛邑不祀作周本紀第四維秦之先伯翳佐禹穆公思義悼豪之旅以人為殉詩歌黄鳥昭襄業帝作秦本紀第五始皇既立并兼六國銷鋒鑄鐻徐廣曰嚴安上書銷其兵鑄以為種鐻也維偃干革尊號稱帝矜武任力二世受運子嬰降虜作始皇本紀第六秦失其道豪傑並擾項梁業之子羽接之殺慶救趙徐廣曰宋義為上將號慶子冠軍諸侯立之誅嬰背懐天下非之作項羽本紀第七子羽暴虐漢行功德憤發蜀漢還定三秦誅籍業帝天下惟寧改制易俗作高帝本紀第八惠之早霣諸呂不台徐廣曰無台輔之德也一曰怡懌也不為百姓所悦崇彊祿產諸侯謀之殺隠幽友徐廣曰趙隠王如意趙幽王友大臣洞疑遂及宗禍作呂太后本紀第九漢既初興繼嗣不明迎王踐祚天下歸心蠲除肉刑開通關梁廣恩博施厥稱太宗作孝文本紀第十諸侯驕恣吳首為亂京師行誅七國伏辜天下翕然大安殷富作孝景本紀第十一漢興五世隆在建元外攘夷狄内修法度封禪改正朔易服色作今上本紀第十二維三代尚矣年紀不可考盖取之譜牒舊聞本於兹於是略推作三代世表第一幽厲之後周室衰微諸侯專政春秋有所不紀而譜牒經略五霸更盛衰欲睹周世相先後之意作十二諸侯年表第二春秋之後陪臣秉政彊國相王以至於秦卒并諸夏滅封地擅其號作六國年表第三秦既暴虐楚人發難項氏遂亂漢乃扶義征伐八年之間天下三嬗事繁變衆故詳著秦楚之際月表第四漢興已來至於太初百年諸侯廢立分削譜紀不明有司靡踵彊弱之原云以世徐廣曰一作云已也天漢序曰敞義依敞庶幾云已作漢興以來諸侯年表第五維高祖元功輔臣股肱剖符而爵澤流苗裔忘其昭穆或殺身隕國作高祖功臣侯者年表第六惠景之間維申功臣宗屬爵邑作惠景間侯者年表第七北討强胡南誅勁越征伐夷蠻武功爰列作建元以來侯者年表第八諸侯既彊七國為從子弟衆多無爵封邑推恩行義其勢銷弱德歸京師作王子侯者年表第九國有賢相良將民之師表也維見漢興以來將相名臣年表賢者記其治不賢者彰其事作漢興以來將相名臣年表第十維三代之禮所損益各殊務然要以近情性通王道故禮因人質為之節文略協古今之變作禮書第一樂者所以移風易俗也自雅頌聲興則已好鄭衛之音鄭衛之音所從來久矣人情之所感逺俗則懐徐廣曰樂者所以感和人情人情既感則逺方殊俗莫不懐柔向化也比樂書以述來古作樂書第二非兵不强非德不昌黄帝湯武以興桀紂二世以崩可不愼歟司馬法所從來尚矣太公孫吳王子徐廣曰王子成甫能紹而明之切近世極人變作律書第三律居隂而治陽厯居陽而治隂律厯更相治間不容翲忽五家之文怫異維太初之元論作厯書第四徐廣曰論一作編星氣之書多雜禨祥不經推其文考其應不殊比集論其行事驗於軌度以次作天官書第五受命而王封禪之符罕徐廣曰一云答應用用則萬靈罔不禋祀追本諸神名山大川禮作封禪書第六維禹浚川九州攸寧爰及宣防決瀆通溝作河渠書第七維幣之行以通農商其極則玩巧并兼兹殖爭於機利去本趨末作平凖書以觀事變第八太伯避厯江蠻是適文武攸興古公王跡闔廬弑僚賓服荆楚夫差克齊子胥䲭夷信嚭親越吳國既滅嘉伯之讓作吳世家第一申吕肖矣徐廣曰肖音痟痟猶衰微尚父側微卒歸西伯文武是師功冠羣公繆權於幽徐廣曰繆錯也猶云纒結也權智潛謀幽昧不顯所謂太公隂謀番番黄髪爰饗營丘不背柯盟桓公以昌九合諸侯霸功顯彰田闞爭寵姜姓解亡徐廣曰闞一云監解一作遷嘉父之謀作齊太公世家第二依之違之周公綏之憤發文德天下和之輔翼成王諸侯宗周隠桓之際是獨何哉三桓爭彊魯乃不昌嘉旦金縢作周公世家第三武王克紂天下未協而崩成王既幼管蔡疑之淮夷叛之於是召公率德安集王室以寧東土燕易之禪乃成禍亂嘉甘棠之詩作燕世家第四管蔡相武庚将寧舊商及旦攝政二叔不饗殺鮮放度周公為盟太任十子周以宗强嘉仲悔過作管蔡世家第五王後不絶舜禹是説維德休明苗裔䝉烈百世享祀爰周陳把楚實滅之齊田既起舜何人哉作陳把世家第六收殷餘民叔封始邑申以商亂酒材是告及朔之生衛傾不寧南子惡蒯瞶子父易名周德卑微戰國既强衛以小弱角獨後亡嘉彼康誥作衛世家第七嗟箕子乎嗟箕子乎正言不用乃反為奴武庚既死周封微子襄公傷於泓君子孰稱景公謙德熒惑退行剔成暴虐徐廣曰一云偃宋剔成君生偃宋乃滅亡嘉微子問太師作宋世家第八武王既崩叔虞邑唐君子譏名卒滅武公驪姬之愛亂者五世重耳不得意乃能成霸六卿專權晉國以耗嘉文公錫珪鬯作晉世家第九重黎業之吳囘接之殷之季世粥子牒之周用熊繹熊渠是續莊王之賢乃復國陳既赦鄭伯班師華元懐王客死蘭咎屈原好諛信讒楚并於秦嘉莊王之義作楚世家第十少康之子實賓南海文身斷髪黿鱓與處既守封禺徐廣曰封禺山在武康縣南奉禹之祀句踐困彼乃用種蠡嘉句踐夷蠻能修其德滅彊吳以尊周室作越王句踐世家第十一桓公之東太史是庸及侵周禾王人是議祭仲要盟鄭久不昌子產之仁紹世稱賢三晉侵伐鄭納於韓嘉厲公納惠王作鄭世家第十二維驥騄耳乃章造父趙夙事獻衰續厥緒佐文尊王卒為晉輔襄子困辱乃禽智伯主父生縛餓死探爵王遷辟淫良將是斥嘉鞅討周亂作趙世家第十三畢萬爵魏十人知之及絳戮干戎翟和之文侯慕義子夏師之恵王自矜齊秦攻之既疑信陵諸侯罷之卒亡大梁王假厮之嘉武佐晉文申霸道作魏世家第十四韓厥隂德趙武攸興紹絶立廢晉人宗之昭侯顯列申子庸之疑非不信秦人襲之嘉厥輔晉匡周天子之賦作韓世家第十五完子避難適齊為援隂施五世齊人歌之成子得政田和為侯王建動心乃遷於共嘉威宣能撥濁世而獨宗周作田敬仲完世家第十六周室既衰諸侯恣行仲尼悼禮廢樂崩追修經術以達王道匡亂世反之於正見其文辭為天下制儀法垂六藝之統紀於後世作孔子世家第十七桀紂失其道而湯武作周失其道而春秋作秦失其政而陳涉發迹諸侯作難風起雲蒸卒亡秦族天下之難自涉發難作陳涉世家第十八成皋之臺薄氏始基詘意適代厥崇諸竇栗姬偩貴王氏乃遂陳后太驕卒尊子夫嘉夫德若斯作外戚世家第十九漢既譎謀禽信於陳越荆剽輕乃封弟交為楚王爰都彭城以彊淮泗為漢宗藩戊溺於邪禮復紹之嘉游輔祖作楚元王世家第二十維祖師旅劉賈是與為布所襲喪其荆吳營陵激吕乃王琅邪怵午信齊往而不歸遂西入關遭立孝文獲復王燕天下未集賈澤以族為漢藩輔作荆燕世家第二十一天下已平親屬既寡悼惠先壯實鎮東土哀王擅興發怒諸吕駟鈞暴戾京師弗許厲之内淫禍成主父嘉肥股肱作齊悼惠王世家第二十二楚人圍我滎陽相守三年蕭何填撫山西推計踵兵給糧食不絶使百姓愛漢不樂為楚作蕭相國世家第二十三與信定魏破趙拔齊遂弱楚人續何相國不變不革黎庶攸寧嘉參不伐功矜能作曹相國世家第二十四運籌帷幄之中制勝於無形子房計謀其事無知名無勇功圖難於易為大於細作留侯世家第二十五六竒既用諸侯賓從於漢吕氏之亊平為本謀終安宗廟定社稷作陳丞相世家第二十六諸吕為從謀弱京師而勃反經合於權呉楚之兵亞夫駐於昌邑以戹齊趙而出委以梁作絳侯世家第二十七七國叛逆蕃屏京師唯梁為扞偩愛矜功幾獲於禍嘉其能距吳楚作梁孝王世家第二十八五宗既王親屬洽和諸侯大小為藩爰得其宜僭擬之事稍衰貶矣作五宗世家第二十九三子之王文辭可觀作三王世家第三十末世爭利維彼奔義讓國餓死天下稱之作伯夷列傳第一晏子儉矣夷吾則奢齊桓以霸景公以治作管晏列傳第二李耳無為自化清淨自正韓非揣事情循勢理作老子韓非列傳第三自古王者而有司馬法穰苴能申明之作司馬穰苴列傳第四非信亷仁勇不能傳兵論劒與道同符内可以治身外可以應變君子比德焉作孫子吳起列傳第五維建遇讒爰及子奢尚既匡父伍員奔吳作伍子胥列傳第六孔氏述文弟子興業咸為師傳崇仁厲義作仲尼弟子列傳第七鞅去衛適秦能明其術彊霸孝公後世遵其法作商君列傳第八天下患衡秦毋饜而蘇子能存諸侯約從以抑貪彊作蘇秦列傳第九六國既從親而張儀能明其説復散解諸侯作張儀列傳第十秦所以東攘徐廣曰一作襄雄諸侯樗里甘茂之策作樗里甘茂列傳第十一苞河山徐廣曰苞一作施圍大梁使諸侯斂手而事秦者魏冉之功作穰侯列傳第十二南拔鄢郢北摧長平遂圍邯鄲武安為率破荆滅趙王翦之計作白起王翦列傳第十三獵儒墨之遺文明禮義之統紀絶惠王利端列往世興衰徐廣曰一作壊作孟子荀卿列傳第十四好客喜士士歸於薛為齊捍楚魏作孟嘗君列傳第十五爭馮亭以權徐廣曰以一作反太史公譏平原君利令智昏故云爭馮亭反權如楚以救邯鄲之圍使其君復稱於諸侯作平原君虞卿列傳第十六能以富貴下貧賤賢能詘於不肖唯信陵君為能行之作魏公子列傳第十七以身徇君遂脱彊秦使馳説之士南鄉走楚者黄歇之義作春申君列傳第十八能忍訽於魏齊徐廣曰訽音逅而信威於彊秦推賢讓位二子有之作范雎蔡澤列傳第十九率行其謀連五國兵為弱燕報彊齊之讎雪其先君之恥作樂毅列傳第二十能信意彊秦而屈體亷子用徇其君俱重於諸侯作亷頗藺相如傳第二十一湣王既失臨淄而奔莒唯田單用即墨破走騎劫遂存齊社稷作田單列傳第二十二能設詭説解患於圍城輕爵禄樂肆志作魯仲連鄒陽列傳第二十三作辭以諷諫連類以爭義離騷有之作屈原賈生列傳第二十四結子楚親使諸侯之士斐然爭入事秦作吕不韋列傳第二十五曹子匕首魯獲其田齊明其信豫讓義不為二心作刺客列傳第二十六能明其畫因時推秦遂得意於海内斯為謀首作李斯列傳第二十七為秦開地益衆北靡匈奴據河為塞因山為固建榆中作䝉恬列傳第二十八填趙塞常山以廣河内弱楚權明漢王之信於天下作張耳陳餘列傳第二十九收兩河上黨之兵從至彭城越之侵掠梁地以苦項羽作魏豹彭越列傳第三十以淮南畔楚歸漢漢用得大司馬殷卒破子羽於陔下徐廣曰隄塘之名也作黥布列傳第三十一楚人迫我京索而信拔魏趙定燕齊使漢三分天下有其二以滅項籍作淮隂侯列傳第三十二楚漢相距鞏洛而韓信為填潁川盧綰絶籍糧餉作韓信盧綰列傳第三十三諸侯畔項王唯齊連子羽城陽漢得以間遂入彭城作田儋列傳第三十四攻城野戰獲功歸報噲商有力焉非獨鞭策又與之脱難作樊酈列傳第三十五漢既初定文理未明蒼為主計整齊度量序律厯作張丞相列傳第三十六結言通使約懐諸侯諸侯咸親歸漢為藩輔作酈生陸賈列傳第三十七欲詳知秦楚之事唯周緤常從高祖平定諸侯作𫝊靳蒯成列傳第三十八徙彊族都關中和約匈奴明朝廷禮次宗廟儀法作劉敬叔孫通列傳第三十九能摧剛作柔卒為列臣欒公不劫於勢而倍死作季布欒布列傳第四十敢犯顏色以達主義不顧其身為國家樹長畫作袁盎朝錯列傳第四十一守法不失大理言古賢人增主之明作張釋之馮唐列傳第四十二敦厚慈孝訥於言敏於行務在鞠躬君子長者作萬石張叔列傳第四十三守節切直義足以言亷行足以厲賢任重權不可以非禮撓作田叔列傳第四十四扁鵲言醫為方者宗守數精明後世修序弗能易也而倉公可謂近之矣作扁鵲倉公列傳第四十五維仲之省徐廣曰吳王之王由父省厥濞王吳遭漢初定以填撫江淮之間作吳王濞列傳第四十六吳楚為亂宗屬唯嬰賢而喜士士鄉之率師抗山東滎陽作魏其武安列傳第四十七智足以應近世之變寛足用得人作韓長孺列傳第四十八勇於當敵仁愛士卒號令不順師徒鄉之作李將軍列傳第四十九自三代已來匈奴常為中國患害欲知彊弱之時設備征討作匈奴列傳第五十直曲塞廣河南破神連通西國靡北胡作衛将軍驃騎列傳第五十一大臣宗室以侈靡相高唯𢎞用節衣食為百吏先作平津侯列傳第五十二漢既平中國而佗能集揚越以保南藩納貢職作南越列傳第五十三吳之叛逆甌人斬濞徐廣曰今之永寕是東甌也葆守封禺為臣作東越列傳第五十四燕丹散亂遼間滿収其亡民厥聚海東以集真藩徐廣曰一作莫藩音普寒反葆塞為外臣作朝鮮列傳第五十五唐䝉使畧通夜郎而卭笮之君請為内臣受吏作西南夷列傳第五十六子虚之事大人賦説靡麗多誇然其指風諫歸於無為作司馬相如列傳第五十七黥布叛逆子長國之以填江淮之南安剽楚庶民作淮南衡山列傳第五十八奉法循理之吏不伐功矜能百姓無稱亦無過行作循吏列傳第五十九正衣冠立於朝廷而羣臣莫敢言浮説長孺矜焉好薦人稱長者壯有溉徐廣曰一作慨作汲黯列傳第六十自孔子卒京師莫崇庠序唯建元元狩之間文辭粲如也作儒林列傳第六十一民倍本多巧奸軌弄法善人不能化唯一切嚴削為能齊之作酷吏列傳第六十二漢既通使大夏而西極逺蠻引領内鄉欲親中國作大宛列傳第六十三救人於戹振人不膽仁者有乎不既信徐廣曰一云不慨信不倍言義者有取焉作游俠列傳第六十四夫事人君能説主耳目和主顏色而獲親近非獨色愛能亦各有所長作佞幸列傳第六十五不流世俗不爭勢利上下無所凝滯人莫之害以道之用作滑稽列傳第六十六齊楚秦趙為日者各有俗所用欲循徐廣曰一作總觀其大㫖作日者列傳第六十七三王不同龜四夷各異卜然各以決吉凶略闚其要作龜策列傳第六十八布衣匹夫之人不害於政不妨百姓取與以時而息財富智者有采焉作貨殖列傳第六十九維我漢繼五帝末流接三代統業周道廢秦撥去古文焚滅詩書故明堂石室金匱玉版如淳曰刻玉版以為文字圖籍散亂於是漢興蕭何次律令韓信申軍法張蒼為章程如淳曰章厯數之章術也程者權衡丈尺斛斗之平法也瓚曰茂陵書丞相為工用程數其中言百工用材多少之量及制度之程品者是也叔孫通定禮儀則文學彬彬稍進詩書往往間出矣自曹參薦盖公言黄老而賈生晁錯明申商公孫𢎞以儒顯百年之間天下遺文古事靡不畢集太史公太史公仍父子相續纂其職曰於戲余維先人嘗掌斯事顯於唐虞至於周復典之故司馬氏世掌天官至於余乎欽念哉欽念哉罔羅天下放失舊聞王迹所興原始察終見盛觀衰論考之行事略推三代錄秦漢上記軒轅下至於兹著十二本紀既科條之矣並時異世年差不明作十表禮樂損益律數改易兵權山川鬼神天人之際承敝通變作八書二十八宿環北辰三十輻共一轂漢書音義曰象黄帝已下三十世家老子言車三十輻運行無窮以象王者如此也運行無窮輔拂股肱之臣配焉忠信行道以奉主上作三十世家扶義俶儻不令已失時立功名於天下作七十列傳凡百三十篇五十二萬六千五百字為太史公書序略以拾遺補蓺李奇曰六藝也成一家之言厥協六經異傳整齊百家雜語藏之名山副在京師俟後世聖人君子第七十衛宏漢書舊儀注曰司馬遷作景帝本紀極言其短及武帝過武帝怒而削去之後坐舉李陵陵降匈奴故下遷􅁞室有怨言下獄死太史公曰余述厯黄帝以來至太初而訖百三十篇漢書音義曰十篇闕有錄無書張晏曰遷没之後亡景紀武紀禮書樂書律書漢興已來將相年表日者列傳三王世家龜策列傳傅靳蒯成列傳元成之間禇先生補闕作武帝紀三王世家龜策日者列傳言辭鄙陋非遷本意已史記集解卷一百三十
