body:
  text: 史記集解卷八十二宋裴駰撰史記八十二田單列傳第二十二田單者齊諸田疏屬也湣王時單為臨菑市掾不見知及燕使樂毅伐破齊齊湣王出奔已而保莒城燕師長驅平齊而田單走安平徐廣曰今之東安平也在青州臨菑縣東十九里古紀之酅邑齊改為安平秦滅齊改為東安平縣屬齊郡以定州冇安平故加東字令其宗人盡斷其車軸末而傅鐵籠徐廣曰傅音附已而燕軍攻安平城壞齊人走爭塗以轊折車敗徐廣曰轊車軸頭也音衛為燕所虜唯田單宗人以鐡籠故得脱東保即墨燕旣盡降齊城唯獨莒即墨不下燕軍聞齊王在莒并兵攻之淖齒徐廣曰多作悼齒也旣殺湣王於莒因堅守距燕軍數年不下燕引兵東圍即墨即墨大夫出與戰敗死城中相與推田單曰安平之戰田單宗人以鐵籠得全習兵立以為將軍以即墨距燕頃之燕昭王卒惠王立與樂毅有隙田單聞之乃縱反間於燕宣言曰齊王已死城之不抜者二耳樂毅畏誅而不敢歸以伐齊為名實欲連兵南􅆕而王齊齊人未附故且緩攻即墨以待其事齊人所懼唯恐他將之來即墨殘矣燕王以為然使騎劫代樂毅樂毅因歸趙燕人士卒忿而田單乃令城中人食必祭其先祖於庭飛鳥悉翔舞城中下食燕人怪之田單因宣言曰神來下教我乃令城中人曰當有神人為我師有一卒曰臣可以為師乎因反走田單乃起引還東鄉坐師事之卒曰臣欺君誠無能也田單曰子勿言也因師之每出約束必稱神師乃宣言曰吾唯懼燕軍之劓所得齊卒置之前行與我戰即墨敗矣燕人聞之如其言城中人見齊諸降者盡劓皆怒堅守唯恐見得單又縱反間曰吾懼燕人掘吾城外冢墓僇先人可為寒心燕軍盡掘壟墓燒死人即墨人從城上望見皆涕泣其欲出城怒自十倍田單知士卒之可用乃身操版插與士卒分功妻妾編於行伍之間盡散飲食饗士令甲卒皆伏使老弱女子乗城遣使約降於燕燕軍皆呼萬歲田單又收民金得千鎰令即墨富豪遺燕將曰即墨即降願無虜掠吾族家妻妾令安堵燕將大喜許之燕軍由此益懈田單乃收城中得千餘牛為絳繒衣畫以五彩龍文束兵刃於其角而灌脂束葦於尾燒其端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱怒而奔燕軍燕軍夜大驚牛尾炬火光明炫耀燕軍視之皆龍文所觸盡死傷五千人因銜枚擊之而城中鼓譟從之老弱皆擊銅器為聲聲動天地燕軍大駭敗走齊人遂夷殺其將騎劫燕軍擾亂奔走齊人追亡逐北所過城邑皆畔燕而歸田單兵日益多乗勝燕日敗亡卒至河上而齊七十餘城皆復為齊乃迎襄王於莒入臨菑而聽政襄王封田單號曰安平君太史公曰兵以正合以竒勝魏武帝曰先出合戰為正後出為竒也正者當敵竒兵擊不備善之者出竒無窮竒正還相生如環之無端夫始如處女適徐廣曰音敵人開户後如脫兎適不及距魏武帝曰如女示弱脫兎往疾也其田單之謂邪初淖齒之殺湣王也莒人求湣王子法章得之太史嬓之家為人灌園嬓女憐而善遇之後法章私以情告女女遂與通及莒人共立法章為齊王以莒距燕而太史氏女遂為后所謂君王后也燕之初入齊聞畫邑人劉熈曰齊西南近邑畫音獲王蠋賢令軍中曰環畫邑三十里無入以王蠋之故已而使人謂蠋曰齊人多高子之義吾以子為將封子萬家蠋固謝燕人曰子不聽吾引三軍而屠畫邑王蠋曰忠臣不事二君貞女不更二夫齊王不聽吾諫故退而耕於野國旣破亡吾不能存今又劫之以兵為君將是助桀為㬥也與其生而無義固不如烹遂經其頸於樹枝自奮絶脰而死齊亡大夫聞之曰王蠋布衣也義不北靣於燕況在位食禄者乎乃相聚如莒求諸子立為襄王史記集解卷八十二
