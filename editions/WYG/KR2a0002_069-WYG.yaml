body:
  text: 史記集解卷七十一宋裴駰撰史記七十一樗里子甘茂列傳第十一樗里子者名疾秦惠王之弟也與恵王異母母韓女也樗里子滑稽多智秦人號曰智囊秦恵王八年爵樗里子右更使將而伐曲沃盡出其人取其城地入秦秦惠王二十五年使樗里子為將伐趙虜趙將軍莊豹拔藺明年助魏章攻楚敗楚將屈丐取漢中地秦封樗里子號為嚴君秦惠王卒太子武王立逐張儀魏章而以樗里子甘茂為左右丞相秦使甘茂攻韓拔宜陽使樗里子以車百乗入周周以卒迎之意甚敬楚王怒讓周以其重秦客游騰為周説楚王曰智伯之伐仇猶遺之廣車因隨之以兵仇猶遂亡何則無備故也齊桓公伐蔡號曰誅楚其實襲蔡今秦虎狼之國使樗里子以車百乗入周周以仇猶蔡觀焉故使長㦸居前强弩在後名曰衛疾而實囚之且夫周豈能無憂其社稷哉恐一旦亡國以憂大王楚王乃悦秦武王卒昭王立樗里子又益尊重昭王元年樗里子將伐蒲蒲守恐請胡衍胡衍為蒲謂樗里子曰公之攻蒲為秦乎為魏乎為魏則善矣為秦則不為賴矣夫衛之所以為衛者以蒲也今伐蒲入于魏衛必折而從之魏亡西河之外而無以取者兵弱也今并衛于魏魏必强魏强之日西河之外必危矣且秦王將觀公之事害秦而利魏王必罪公樗里子曰奈何胡衍曰公釋蒲勿攻臣試為公入言之以徳衛君樗里子曰善胡衍入蒲謂其守曰樗里子知蒲之病矣其言曰必拔蒲衍能令釋蒲勿攻蒲守恐因再拜曰願以請因効金三百斤曰秦兵茍退請必言子於衛君使子為南面故胡衍受金于蒲以自貴于衞於是遂解蒲而去還擊皮氏皮氏未䧏又去昭王七年樗里子卒塟于渭南章臺之東曰後百嵗是當有天子之宫夾我墓樗里子疾室在于昭王廟西渭南隂鄉樗里故俗謂之樗里子至漢興長樂宫在其東未央宫在其西武庫正直其墓秦人諺曰力則任鄙智則樗里甘茂者下蔡人也事下蔡史舉先生學百家之説因張儀樗里子而求見秦惠王王見而説之使將而佐魏章略定漢中地惠王卒武王立張儀魏章去東之魏蜀侯煇相壯反秦使甘茂定蜀還而以甘茂為左丞相以樗里子為右丞相秦武王三年謂甘茂曰寡人欲容車通三川以窺周室而寡人死不朽矣甘茂曰請之魏約以伐韓而令向夀輔行甘茂至謂向夀曰子歸言之于王曰魏聴臣矣然願王勿伐事成盡以為子功向夀歸以告王王迎甘茂于息壤甘茂至王問其故對曰宜陽大縣也上黨南陽積之久矣名曰縣其實郡也今王倍數險行千里攻之難昔曾參之處費音祕魯人有與曾參同姓名者殺人人告其母曰曾參殺人其母織自若也頃之一人又告之曰曾參殺人其母尚織自若也頃又一人告之曰曾參殺人其母投杼下機踰牆而走夫以曾參之賢與其母信之也三人疑之其母懼焉今臣之賢不若曾參王之信臣又不如曾參之母信曾參也疑臣者非特三人臣恐大王之投杼也始張儀西并巴蜀之地北開西河之外南取上庸天下不以多張子而以賢先王魏文侯令樂羊將而攻中山三年而拔之樂羊返而論功文侯示之謗書一篋樂羊再拜稽首曰此非臣之功也主君之力也今臣羇旅之臣也樗里子公孫奭二人者挾韓而議之王必聴之是王欺魏王而臣受公仲侈徐廣曰一作馮之怨也王曰寡人不聴也請與子盟卒使丞相甘茂將兵伐宜陽五月而不拔樗里子公孫奭果争之武王召甘茂欲罷兵甘茂曰息壤在彼王曰有之因大悉起兵使甘茂擊之斬首六萬遂拔宜陽韓襄王使公仲侈入謝與秦平武王竟至周而卒于周其弟立為昭王王母宣太后楚女也楚懐王怨前秦敗楚於丹陽而韓不救乃以兵圍韓雍氏韓使公仲侈告急于秦秦昭王新立太后楚人不肯救公仲因甘茂茂為韓言於秦昭王曰公仲方有得秦救故敢扞楚也今雍氏圍秦師不下殽公仲且仰首而不朝公叔且以國南合于楚楚韓為一魏氏不敢不聴然則伐秦之形成矣不識坐而待伐孰與伐人之利秦王曰善乃下師于殽以救韓楚兵去秦使向夀平宜陽而使樗里子甘茂伐魏皮氏向夀者宣太后外族也而與昭王少相長故任用向夀如楚徐廣曰如一作和楚聞秦之貴向夀而厚事向夀向夀為秦守宜陽將以伐韓韓公仲使蘇代謂向夀曰禽困覆車譬禽獸得困急猶能抵觸傾覆人車公破韓辱公仲公仲收國復事秦自以為必可以封今公與楚解口地封小令尹以杜陽秦楚合復攻韓韓必亡韓亡公仲且躬率其私徒以閼音烏曷反于秦願公熟慮之也向夀曰吾合秦楚非以當韓也子為夀謁之公仲曰秦韓之交可合也蘇代對曰願有謁于公人曰貴其所以貴者貴王之愛習公也不如公孫奭其智能公也不如甘茂今二人者皆不得親于秦事而公獨與王主㫁于國者何彼有以失之也公孫奭黨于韓而甘茂黨于魏故王不信也今秦楚争强而公黨于楚是與公孫奭甘茂同道也公何以異之人皆言楚之善變也而公必亡之是自為責也公不如與王謀其變也善韓以備楚如此則無患矣韓氏必先以國從公孫奭而後委國于甘茂韓公之讎也今公言善韓以備楚是外舉不辟讐也向夀曰然吾甚欲韓合對曰甘茂許公仲以武遂徐廣曰秦昭王元年予韓武遂反宜陽之民今公徒收之甚難向夀曰然則奈何武遂終不可得也對曰公奚不以秦為韓求潁川于楚此韓之寄地也公求而得之是令行于楚而以其地徳韓也公求而不得是韓楚之怨不解音已買反而交走秦也秦楚争强而公徐過楚徐廣曰過一作適以收韓此利于秦向夀曰奈何對曰此善事也甘茂欲以魏取齊公孫奭欲以韓取齊今公取宜陽以為功收楚韓以安之而誅齊魏之罪是以公孫奭甘茂無事也甘茂竟言秦昭王以武遂復歸之韓向夀公孫奭争之不能得向夀公孫奭由此怨讒甘茂茂懼輟伐魏蒲阪亡去徐廣曰昭王元年擊魏皮氏未拔去樗里子與魏講罷兵甘茂之亡秦奔齊逢蘇代代為齊使于秦甘茂曰臣得罪于秦懼而遯逃無所容跡臣聞貧人女與富人女㑹績貧人女曰我無以買燭而子之燭光幸有餘子可分我餘光無損子明而得一斯便焉今臣困而君方使秦而當路矣茂之妻子在焉願君以餘光振之蘇代許諾遂致使于秦已因説秦王曰甘茂非常士也其居于秦累世重矣自殽塞及至鬼谷徐廣曰在陽城其地形險易皆明知之彼以齊約韓魏反以圖秦非秦之利也秦王曰然則奈何蘇代曰王不若重其䞇厚其禄以迎之使彼來則置之鬼谷終身勿出秦王曰善即賜之上卿以相印迎之于齊甘茂不往蘇代謂齊湣王曰夫甘茂賢人也今秦賜之上卿以相印迎之甘茂徳王之賜好為王臣故辭而不往今王何以禮之齊王曰善即位之上卿而處之秦因復甘茂之家以市于齊齊使甘茂于楚楚懐王新與秦合婚而驩徐廣曰昭王二年時迎婦于楚而秦聞甘茂在楚使人謂楚王曰願送甘茂于秦楚王問于范蜎徐廣曰一作蠉曰寡人欲置相于秦孰可對曰臣不足以識之楚王曰寡人欲相甘茂可乎對曰不可夫史舉下蔡之監門也大不為事君小不為家室以茍賤不㢘聞于世甘茂事之順焉故惠王之明武王之察張儀之辯而甘茂事之取十官而無罪茂誠賢者也然不可相于秦夫秦之有賢相非楚國之利也且王前嘗用召滑于越徐廣曰滑一作㳙而内行章義之難徐廣曰一云内可章昧之難越國亂故楚南塞厲門徐廣曰一作瀨胡而郡江東計王之功所以能如此者越國亂而楚治也今王知用諸越而忘用諸秦臣以王為鉅過矣然則王若欲置相于秦則莫若向夀者可夫向夀之于秦王親也少與之同衣長與之同車以聴事王必相向夀于秦則楚國之利也於是使使請秦相向夀於秦秦卒相向夀而甘茂竟不得獲入秦卒于魏甘茂有孫曰甘羅甘羅者甘茂孫也茂既死後甘羅年十二事秦相文信侯呂不韋秦始皇帝使剛成君蔡澤于燕三年而燕王喜使太子丹入質于秦秦使張唐往相燕欲與燕共伐趙以廣河間之地張唐謂文信侯曰臣嘗為秦昭王伐趙趙怨臣曰得唐者與百里之地今之燕必經趙臣不可以行文信侯不快未有以强也甘羅曰君侯何不快之甚也文信侯曰吾令剛成君蔡澤事燕三年燕太子丹已入質矣吾自請張卿相燕而不肯行甘羅曰臣請行之文信侯叱曰去我身自請之而不肯汝焉能行之甘羅曰夫項槖生七歲為孔子師今臣生十二歲于兹矣君其試臣何遽叱乎于是甘羅見張卿曰卿之功孰與武安君卿曰武安君南挫强楚北威燕趙戰勝攻取破城墮邑不知其數臣之功不如也甘羅曰應侯之用于秦也孰與文信侯専張卿曰應侯不如文信侯專甘羅曰卿明知其不如文信侯專與曰知之甘羅曰應侯欲攻趙武安君難之去咸陽七里而立死于杜郵今文信侯自請卿相燕而不肯行臣不知卿所死處矣張唐曰請因孺子行令裝治行行有日甘羅謂文信侯曰借臣車五乗請為張唐先報趙文信侯乃入言之于始皇曰昔甘茂之孫甘羅年少耳然名家之子孫諸侯皆聞之今者張唐欲稱疾不肯行甘羅説而行之今願先報趙請許遣之始皇召見使甘羅于趙趙襄王郊迎甘羅甘羅説趙王曰王聞燕太子丹入質秦歟曰聞之曰聞張唐相燕歟曰聞之燕太子丹入秦者燕不欺秦也張唐相燕者秦不欺燕也燕秦不相欺者伐趙危矣燕秦不相欺無異故欲攻趙而廣河間王不如齎臣五城以廣河間請歸燕太子與彊趙攻弱燕趙王立自割五城以廣河間秦歸燕太子趙攻燕得上谷三十城令秦有十一甘羅還報秦乃封甘羅以為上卿復以始甘茂田宅賜之太史公曰樗里子以骨肉重固其理而秦人稱其智故頗采焉甘茂起下蔡閭閻顯名諸侯重强齊楚徐廣曰恐或疑此當云見重强齊誤脱一字甘羅年少然出一竒計聲稱後世雖非篤行之君子然亦戰國之策士也方秦之强時天下尤趨謀詐哉史記集解卷七十一
