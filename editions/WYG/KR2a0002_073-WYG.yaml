body:
  text: 史記集解卷七十五宋裴駰撰史記七十五孟嘗君列傳第十五孟嘗君名文姓田氏文之父曰靖郭君田嬰田嬰者齊威王少子而齊宣王庶弟也田嬰自威王時任職用事與成侯鄒忌及田忌將而救韓伐魏成侯與田忌爭寵成侯賣田忌田忌懼襲齊之邊邑不勝亡走會威王卒宣王立知成侯賣田忌乃復召田忌以為將宣王二年田忌與孫臏田嬰俱伐魏敗之馬陵虜魏太子申而殺魏將龎涓宣王七年田嬰使于韓魏韓魏服于齊嬰與韓昭侯魏恵王會齊宣王東阿南盟而去明年復與梁恵王會甄音絹是歲梁恵王卒宣王九年田嬰相齊齊宣王與魏襄王會徐州而相王也楚威王聞之怒田嬰明年楚伐敗齊師于徐州而使人逐田嬰田嬰使張丑説楚威王威王乃止田嬰相齊十一年宣王卒湣王即位即位三年而封田嬰于辥初田嬰有子四十餘人其賤妾有子名文文以五月五日生嬰告其母曰勿舉也其母竊舉生之及長其母因兄弟而見其子文于田嬰田嬰怒其母曰吾令若去此子而敢生之何也文頓首因曰君所以不舉五月子者何故嬰曰五月子者長與戶齊將不利其父母文曰人生受命于天乎將受命于戶耶嬰黙然文曰必受命于天君何憂焉必受命于戶則可高其戶耳誰能至者嬰曰子休矣久之文承間問其父嬰曰子之子為何曰為孫孫之孫為何曰為𤣥孫𤣥孫之孫為何曰不能知也文曰君用事相齊至今三王矣齊不加廣而君私家富累萬金門下不見一賢者文聞將門必有將相門必有相今君後宫蹈綺縠而士不得裋褐僕妾餘􅆝肉而士不厭糟糠今君又尚厚積餘藏欲以遺所不知何人而忘公家之事日損文竊怪之于是嬰乃禮文使主家待賓客賓客日進名聲聞于諸侯諸侯皆使人請辥公田嬰以文為太子嬰許之嬰卒諡為靖郭君皇覧曰靖郭君冢在魯國辥城中東南陬而文果代立于辥是為孟嘗君孟嘗君在嶭招致諸侯賓客及亡人有罪者皆歸孟嘗君孟嘗君舎業厚遇之以故傾天下之士食客數千人無貴賤一與文等孟嘗君待客坐語而屏風後常有侍史主記君所與客語問親戚居處客去孟嘗君已使使存問獻遺其親戚孟嘗君曾待客夜食有一人蔽火光客怒以飯不等輟食辭去孟嘗君起自持其飯比之客慙自剄士以此多歸孟嘗君孟嘗君客無所擇皆善遇之人人各自以為孟嘗君將親已秦昭王聞其賢乃先使涇陽君為質于齊以求見孟嘗君孟嘗君將入秦賓客莫欲其行諌不聽蘇代謂曰今旦代從外來見木偶人與土偶人相與語木偶人曰天雨子將敗矣土偶人曰我生于土敗則歸土今天雨流子而行未知所止息也今秦虎狼之國也而君欲往如有不得還君得無為土偶人所笑乎孟嘗君乃止齊湣王二十五年復卒使孟嘗君入秦昭王即以孟嘗君為秦相人或説秦昭王曰孟嘗君賢而又齊族也今相秦必先齊而後秦秦其危矣于是秦昭王乃止囚孟嘗君謀欲殺之孟嘗君使人抵昭王幸姬求解幸姬曰妾願得君狐白裘韋昭曰以狐之白毛為裘謂集狐腋之毛言羙而難得者此時孟嘗君有一狐白裘直千金天下無雙入秦獻之昭王更無他裘孟嘗君患之徧問客莫能對最下坐有能為狗盜者曰臣能得狐白裘乃夜為狗以入秦宫藏中取所獻狐白裘至以獻秦王幸姬幸姬為言昭王昭王釋孟嘗君孟嘗君得出即馳去更封傳變名姓以出關夜半至函谷關秦昭王後悔出孟嘗君求之已去即使人馳傳逐之孟嘗君至關關法雞鳴而出客孟嘗君恐追至客之居下坐者有能為雞鳴而雞盡鳴遂發傳出出如食頃秦追果至關已後孟嘗君出乃還始孟嘗君列此二人于賓客賓客盡羞之及孟嘗君有秦難卒此二人拔之自是之後客皆服孟嘗君過趙趙平原君客之趙人聞孟嘗君賢出觀之皆笑曰始以嶭公為魁然也今視之乃眇小丈夫耳孟嘗君聞之怒客與俱者下斫擊殺數百人遂滅一縣以去齊湣王不自得以其遣孟嘗君孟嘗君至則以為齊相任政孟嘗君怨秦將以齊為韓魏攻楚因與韓魏攻秦徐廣曰年表曰韓魏齊共擊秦軍于函谷而借兵食于西周蘇代為西周謂曰君以齊為韓魏攻楚九年取宛葉以北以彊韓魏今復攻秦以益之韓魏南無楚憂西無秦患則齊危矣韓魏必輕齊畏秦臣為君危之君不如令敝邑深合于秦而君無攻又無借兵食君臨凾谷而無攻令弊邑以君之情謂秦昭王曰辥公必不破秦以强韓魏其攻秦也欲王之令楚王割東國以與齊而秦出楚懐王以為和君令弊邑以此恵秦秦得無破而以東國自免也秦必欲之楚王得出必徳齊齊得東國益彊而嶭世世無患矣秦不大弱而處三晉之西三晉必重齊辥公曰善因令韓魏賀秦使三國無攻而不借兵食于西周矣是時楚懐王入秦秦畱之故欲必出之秦不果出楚懐王孟嘗君相齊其舎人魏子為孟嘗君收邑入三反而不致一入孟嘗君問之對曰有賢者竊假與之以故不致入孟嘗君怒而退魏子居數年人或毁孟嘗君于齊湣王曰孟嘗君將為亂及田甲刼湣王湣王意疑孟嘗君孟嘗君乃奔徐廣曰湣王三十四年田甲刼王薛文走魏子所與粟賢者聞之乃上書言孟嘗君不作亂請以身為盟遂自剄宫門以明孟嘗君湣王乃驚而蹤跡驗問孟嘗君果無反謀乃復召孟嘗君孟嘗君因謝病歸老于辥湣王許之其後秦亡將吕禮相齊欲困蘇代代乃謂孟嘗君曰周最于齊至厚也而齊王逐之而聽親弗親弗姓名人相吕禮者欲取秦也齊秦合則親弗與吕禮重矣有用齊秦必輕君君不如急北兵趨趙以和秦魏收周最以厚行且反齊王之信又禁天下之變齊無秦則天下集齊親弗必走則齊王孰與為其國也于是孟嘗君從其計而吕禮嫉害于孟嘗君孟嘗君懼乃遺秦相穰侯魏冉書曰吾聞秦欲以吕禮收齊齊天下之彊國也子必輕矣齊秦相取以臨三晉吕禮必并相矣是子通齊以重吕禮也若齊免于天下之兵其讐子必深矣子不如勸秦王伐齊齊破吾請以所得封子齊破秦畏晉之彊秦必重子以取晉晉國弊於齊而畏秦晉必重子以取秦是子破齊以為功挾晉以為重是子破齊定封秦晉交重子若齊不破吕禮復用子必大窮於是穰侯言於秦昭王伐齊而吕禮亡後齊湣王滅宋益驕欲去孟嘗君孟嘗君恐乃如魏魏昭王以為相西合于秦趙與燕共伐破齊齊湣王亡在莒遂死焉齊襄王立而孟嘗君中立為諸侯無所屬齊襄王新立畏孟嘗君與連和復親辥公文卒諡為孟嘗君皇覧曰孟嘗君冡在魯國辥城中向門東向門出北邊門也詩云居常與許鄭𤣥曰常或作嘗在辥之南孟嘗邑于辥城也諸子爭立而齊魏共滅辥孟嘗絶嗣無後也初馮驩音歡復作煖音許袁反聞孟嘗君好客躡屩而見之孟嘗君曰先生逺辱何以教文也馮驩曰聞君好士以貧身歸于君孟嘗君置傳舎十日孟嘗君問傳舍長曰客何所為答曰馮先生甚貧猶有一劒耳又蒯苦怪反茅之類可為繩言其劒把無物可裝以小繩纒之也緱音侯亦作候謂劍把之處彈其劍而歌曰長鋏歸來乎食無魚孟嘗君遷之幸舎食有魚矣五日又問傳舎長荅曰客復彈劒而歌曰長鋏歸來乎出無輿孟嘗君遷之代舎出入乘輿車矣五日孟嘗君復問傳舎長舎長答曰先生又嘗彈劒而歌曰長鋏歸來乎無以為家孟嘗君不悦居朞年馮驩無所言孟嘗君時相齊封萬户於辥其食客三千人邑入不足以奉客使人出錢于辥歲餘不入貸錢者多不能與其息客奉將不給孟嘗君憂之問左右何人可使收債于辥者傳舎長曰代舎客馮公形容狀貌甚辯長者無他伎亦作技能宜可令收債孟嘗君乃進馮驩而請之曰賓客不知文不肖幸臨文者三千餘人邑入不足以奉賓客故出息錢于辥辥歲不入民頗不與其息今客食恐不給願先生責之馮驩曰諾辭行至辥召取孟嘗君錢者皆會得息錢十萬乃多釀酒買肥牛召諸取錢者能與息者皆來不能與息者亦來皆持取錢之劵書合之齊為會日殺牛置酒酒酣乃持券如前合之能與息者與為期貧不能與息者取其券而燒之曰孟嘗君所以貸錢者為民之無者以為本業也所以求息者為無以奉客也今富給者以要期貧窮者燔券書以捐之諸君强飲食有君如此豈可負哉坐者皆起再拜孟嘗君聞馮驩燒劵書怒而使使召驩驩至孟嘗君曰文食客三千人故貸錢于辥文奉邑少而民尚多不以時與其息客食恐不足故請先生收責之聞先生得錢即以多具牛酒而燒劵書何馮驩曰然不多具牛酒即不能畢會無以知其有餘不足有餘者為要期不足者雖守而責之十年息愈多急即以逃亡自捐之若急終無以償上則為君好利不愛士民下則有離上抵負之名非所以厲士民彰君聲也焚無用虛債之劵捐不可得之虛計令辥民親君而彰君之善聲也君有何疑焉孟嘗君乃拊手而謝之齊王惑于秦楚之毁以為孟嘗君名高其主而擅齊國之權遂廢孟嘗君諸客見孟嘗君廢皆去馮驩曰借臣車一乘可以入秦者必令君重於國而奉邑益廣可乎孟嘗君乃約車幣而遣之馮驩乃西説秦王曰天下之游士馮軾結靷西入秦者無不欲强秦而弱齊馮軾結靷東入齊者無不欲强齊而弱秦此雄雌之國也勢不兩立為雄雄者得天下矣秦王跽而問之曰何以使秦無為雌而可馮驩曰王亦知齊之廢孟嘗君乎秦王曰聞之馮驩曰使齊重于天下者孟嘗君也今齊王以毁廢之其心怨必背齊背齊入秦則齊國之情人事之誠盡委之秦齊地可得也豈直為雄也君急使使載幣隂迎孟嘗君不可失時也如有齊覺悟復用孟嘗君則雌雄之所在未可知也秦王大悦乃遣車十乘黄金百鎰以迎孟嘗君馮驩辭以先行至齊説齊王曰天下之游士馮軾結靷東入齊者無不欲强齊而弱秦者馮軾結靷西入秦者無不欲强秦而弱齊者夫秦齊雄雌之國秦强則齊弱矣此勢不兩雄今臣竊聞秦遣使車十乘載黄金百鎰以迎孟嘗君孟嘗君不西則已西入相秦則天下歸之秦為雄而齊為雌雌則臨淄即墨危矣王何不先秦使之未到復孟嘗君而益與之邑以謝之孟嘗君必喜而受之秦雖强國豈可以請人相而迎之哉折秦之謀而絶其霸强之略齊王曰善乃使人至境候秦使秦使車適入齊境使還馳告之王召孟嘗君而復其相位而與其故邑之地又益以千戶秦之使者聞孟嘗君復相齊還車而去矣自齊王毁廢孟嘗君諸客皆去後召而復之馮驩迎之未到孟嘗君太息歎曰文常好客遇客無所敢失食客三千有餘人先生所知也客見文一日廢皆背文而去莫顧文者今賴先生得復其位客亦有何面目復見文乎如復見文者必唾其面而大辱之馮驩結轡下拜孟嘗君下車接之曰先生為客謝乎馮驩曰非為客謝也為君之言失夫物有必至事有固然君知之乎孟嘗君曰愚不知所謂也曰生者必有死物之必至也富貴多士貧賤寡友事之固然也君獨不見夫朝趨市者乎明旦側肩爭門而入日暮之後過市朝者掉臂而不顧非好朝而惡暮所期物忘其中今君失位賓客皆去不足以怨士而徒絶賓客之路願君遇客如故孟嘗君再拜曰敬從命矣聞先生之言敢不奉教焉太史公曰吾嘗過薛其俗閭里率多暴桀子弟與鄒魯殊問其故曰孟嘗君招致天下任俠姦人入薛中葢六萬餘家矣世之傳孟嘗君好客名不虛矣史記集解卷七十五
