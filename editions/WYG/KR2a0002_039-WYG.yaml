body:
  text: 史記集解卷四十一宋裴駰撰史記四十一越王句踐世家第十一越王句踐其先禹之苗裔而夏后帝少康之庶子也封於會稽以奉守禹之祀文身斷髮披草萊而邑焉後二十餘世至於允常允常之時與吳王闔廬戰而相怨伐允常卒子句踐立是為越王元年吳王闔廬聞允常死乃興師伐越越王句踐使死士挑戰三行至吳陳呼而自剄吴師觀之越因襲擊吴師吴師敗於檇李杜預曰吳郡嘉興縣南有檇李城射傷吳王闔廬闔廬且死告其子夫差曰必毋忘越三年句踐聞吳王夫差日夜勤兵且以報越越欲先吳未發往伐之范蠡諫曰不可臣聞兵者凶器也戰者逆德也爭者事之末也隂謀逆德好用凶器試身於所末上帝禁之行者不利越王曰吾已決之矣遂興師吳王聞之悉發精兵擊越敗之夫椒杜預曰夫椒在吳郡吴縣太湖中椒山是也越王乃以餘兵五千人保棲於會稽杜預曰上會稽山也吳王追而圍之越王謂范蠡曰以不聽子故至於此為之奈何蠡對曰持滿者與天韋昭曰與天法天也天道盈而不溢定傾者與人虞翻曰人道尚謙卑以自牧節事者以地韋昭曰時不至不可彊生事不究不可彊成卑辭厚禮以遺之不許而身與之市韋昭曰市利也謂委管籥属國家以身隨之句踐曰諾乃令大夫種行成於吳膝行頓首曰君王亡臣句踐使陪臣種敢告下執事句踐請為臣妻為妾吳王將許之子胥言於吳王曰天以越賜吳勿許也種還以報句踐句踐欲殺妻子燔寶器觸戰以死種止句踐曰夫吳太宰嚭貪可誘以利請間行言之於是句踐乃以美女寶器令種間獻吳太宰嚭嚭受乃見大夫種於吳王種頓首言曰願大王赦句踐之罪盡入其寶器不幸不赦句踐將盡殺其妻子燔其寶器悉五千人觸戰必有當也嚭因說吳王曰越以服為臣若將赦之此國之利也吳王將許之子胥進諫曰今不滅越後必悔之勾踐賢君種蠡良臣若反國將為亂吳王弗聽卒赦越罷兵而歸句踐之困會稽也喟然嘆曰吾終於此乎種曰湯繫夏臺文王囚羑里晉重耳犇翟齊小白犇莒其卒王霸由是觀之何遽不為福乎吳既赦越越王句踐反國乃苦身焦思置膽於坐坐卧即仰膽飲食亦嘗膽也曰女忘會稽之恥邪身自耕作夫人自織食不加肉衣不重采折節下賢人厚遇賓客振貧弔死徐廣曰弔一作葬與百姓同其勞欲使范蠡治國政蠡對曰兵甲之事種不如蠡鎮撫國家親附百姓蠡不如種於是舉國政屬大夫種而使范蠡與大夫柘稽行成為質於吳二歲而吳歸蠡句踐自會稽歸七年拊循其士民士民欲用以報吳大夫逢同諫曰國新流亡今乃復殷給繕飾備利吳必懼懼則難必至且鷙鳥之擊也必匿其形今夫吳兵加齊晉怨深於楚越名高天下實害周室德少而功多必淫自矜為越計莫若結齊親楚附晉以厚吳吳之志廣必輕戰是我連其權三國伐之越承其弊可克也句踐曰善居二年吳王將伐齊子胥諫曰不可臣聞句踐食不重味與百姓同苦樂此人不死必為國患吳有越腹心之疾齊與吴疥㿅也願王釋齊先越吳王弗聽遂伐齊敗之艾陵虜齊高國以歸讓子胥子胥曰王毋喜王怒子胥欲自殺王聞而止之越大夫種曰臣觀吳王政驕矣請試嘗之貸粟以卜其事請貸吳王欲與子胥諫勿與王遂與之越乃私喜子胥言曰王不聽諫後三年吳其墟乎太宰嚭聞之乃數與子胥爭越議因讒子胥曰伍員貎忠而實忍人其父兄不顧安能顧王王前欲伐齊員彊諫已而有功用是反怨王王不備伍員員必為亂與逢同共謀讒之王王始不從乃使子胥於齊聞其託子於鮑氏王乃大怒曰伍員果欺寡人役反使人賜子胥屬鏤劒以自殺子胥大笑曰我令而父霸我又立若若初欲分吳國半予我我不受已今若反以讒誅我嗟乎嗟乎一人固不能獨立報使者曰必取吾眼置吳東門以觀越兵入也於是吳任嚭政居三年句踐召范蠡曰吳已殺子胥導諛者衆可乎對曰未可至明年春吳王北會諸侯於黃池吳國精兵從王惟獨老弱與太子留守句踐復問范蠡蠡曰可矣乃發習流二千教士四萬人君子六千人韋昭曰君子王所親近有志行者猶吳所謂賢良齊所謂士也虞翻曰言君養之如子諸御千人伐吳吳師敗遂殺吳太子吳告急於王王方㑹諸侯於黃池懼天下聞之乃祕之吳王已盟黃池乃使人厚禮以請成越越自度亦未能滅吳乃與吳平其後四年越復伐吳吳士民罷弊輕銳盡死於齊晉而越大破吳因而留圍之三年吳師敗越遂復棲吳王於姑蘇之山吳王使公孫雄虞翻曰吳大夫肉袒膝行而前請成越王曰孤臣夫差敢布腹心異日嘗得罪於㑹稽夫差不敢逆命得與君王成以歸今君王舉玉趾而誅孤臣孤臣惟命是聽意者亦欲如會稽之赦孤臣之罪乎句踐不忍欲許之范蠡曰會稽之事天以越賜吳吳不取今天以吳賜越越其可逆天乎且夫君王早朝晏罷非為吳邪謀之二十二年一旦而棄之可乎且夫天與弗取反受其咎伐柯者其則不逺君忘會稽之厄乎句踐曰吾欲聽子言吾不忍其使者范蠡乃鼓進兵曰王已屬政於執事虞翻曰執事蠡自謂也使者去不者且得罪虞翻曰我為子得罪吳使者泣而去句踐憐之乃使人謂吳王曰吾置王甬東君百家杜預曰甬東會稽句章縣東海中洲也吳王謝曰吾老矣不能事君王遂自殺乃蔽其面曰吾無面以見子胥也越王乃葬吳王而誅太宰嚭句踐已平吳乃以兵北渡淮與齊晉諸侯會於徐州致貢於周周元王使人賜句踐胙命為伯句踐已去渡淮南以淮上地與楚楚世家曰越滅吳而不能正江淮北楚東侵廣地至泗上歸吳所侵宋地於宋與魯泗東方百里當是時越兵横行於江淮東諸侯畢賀號稱霸王范蠡遂去自齊遺大夫種書曰蜚鳥盡良弓藏狡死走狗烹徐廣曰狡一作郊越王為人長頸烏喙可與共患難不可與共樂子何不去種見書稱病不朝人或讒種且作亂越王乃賜種劒曰子教寡人伐吳七術寡人用其三而敗吳其四在子子為我從先王試之種遂自殺句踐卒子王鼫與立王鼫與卒子王不壽立王不壽卒子王翁立王翁卒子王翳立王翳卒子王之侯立王之侯卒子王無彊立王無彊時越興師北伐齊西伐楚與中國爭彊當楚威王之時越北伐齊齊威王使人說越王曰越不伐楚大不王小不伯圖越之所為不伐楚者為不得晋也韓魏固不攻楚韓之攻楚覆其軍殺其將則葉陽翟危魏亦覆其軍殺其將則陳上蔡不安故二晉之事越也不至於覆軍殺將馬汗之力不效徐廣曰效猶見也所重於得晉者何也越王曰所求於晉者不至頓刄接兵而況於攻城圍邑乎願魏以聚大梁之下願齊之試兵南陽莒地以聚常郯之境則方城之外不南淮泗之間不東商於析酈宋胡之地徐廣曰胡國今之汝隂夏路以左徐廣曰盖謂江夏之夏不足以備秦江南泗上不足以待越矣則齊秦韓魏得志於楚也是二晉不戰而分地不耕而穫之不此之為而頓刄於河山之間以為齊秦用所待者如此其失計奈何其以此王也齊使者曰幸也越之不亡也吾不貴其用智之如目見豪毛而不見其睫也今王知晉之失計而不自知越之過是目論也王所待於晉者非有馬汗之力也又非可與合軍連和也將待之以分楚衆也今楚衆已分何待於晉越王曰奈何曰楚三大夫張九軍北圍曲沃徐廣曰一作北面曲沃於中以至無徐廣曰無一作西假之闗者三千七百里景翠之軍北聚魯齊南陽分有大此者乎且王之所求者鬬晉楚也晉楚不鬭越兵不起是知二五而不知十也此時不攻楚臣以是知越大不王小不伯復讎龎徐廣曰一作寵長沙楚之粟也竟澤陵楚之材也越窺兵通無徐廣曰無一作西假之闗此四邑者不上貢事於郢矣臣聞之圗王不王其敝可以伯然而不伯者王道失也故願大王之轉攻楚也於是越遂釋齊而伐楚楚威王興兵而伐之大敗越殺王無彊盡取故吳地至浙江北破齊於徐州徐廣曰周顯王之四十六年而越以此散諸族子爭立或為王或為君濱於江南海上服朝於楚後七世至閩君揺佐諸侯平秦漢高帝復以揺為越王以奉越後東越閩君皆其後也范蠡太史公素王妙論曰蠡本南陽人列仙傳云蠡徐人事越王句踐既苦身戮力與句踐深謀二十餘年竟滅吳報會稽之恥北渡兵於淮以臨齊晉號令中國以尊周室句踐以霸而范蠡稱上將軍還反國范蠡以為大名之下難以久居且句踐為人可與同患難難與處安為書辭句踐曰臣聞主憂臣勞主辱臣死昔者君王辱於會稽所以不死為此事也今既以雪恥臣請従會稽之誅句踐曰孤將與子分國而有之不然將加誅于子范蠡曰君行令臣行意乃裝其輕寶珠玉自與其私徒屬乘舟浮海以行終不反於是句踐表會稽山以為范蠡奉邑范蠡浮海出齊變姓名自謂䲭夷子皮耕于海畔苦身戮力父子治産居無幾何致産數千萬齊人聞其賢以為相范蠡喟然嘆曰居家則致千金居官則至卿相此布衣之極也久受尊名不祥乃歸相印盡散其財以分與知友鄉黨而懷其重寶間行以去止于陶徐廣曰今之濟隂定陶以為此天下之中交易有無之路通為生可以致富矣於是自謂陶朱公復約要父子耕畜廢居候時轉物逐什一之利居無何則致貲累巨萬徐廣曰萬萬也天下稱陶朱公朱公居陶生少子少子及壯而朱公中男殺人囚於楚朱公曰殺人而死職也然吾聞千金之子不死於市告其少子往視之乃裝黃金千溢置褐器中載以牛車且遣其少子朱公長男固請欲行朱公不聽長男曰家有長子曰家督今弟有罪大人不遣乃遣少弟是吾不肖欲自殺其母為言曰今遣少子未必能生中子也而先空亡長男奈何朱公不得已而遣長子為一封書遺故所善莊生曰至則進千金于莊生所聽其所為慎毋與爭事長男既行亦自私齎數百金至楚莊生家負郭披藜藋到門居甚貧然長男發書進千金如其父言莊生曰可疾去矣慎毋留即弟出勿問所以然長男既去不過莊生而私留以其私齎獻遺楚國貴人用事者莊生雖居窮閻然以亷直聞於國自楚王以下皆師尊之及朱公進金非有意受也欲以成事後復歸之以為信耳故金至謂其婦曰此朱公之金有如病不宿誡後復歸勿動而朱公長男不知其意以為殊無短長也莊生間時入見楚王言某星宿某此則害於楚楚王素信莊生曰今為奈何莊生曰獨以德為可以除之楚王曰生休矣寡人將行之王乃使使者封三錢之府國語曰周景王時將鑄大錢賈逵說云虞夏商周金幣三等或赤或白或黄黄為上幣銅錢為下幣韋昭曰錢者金幣之名所以貿買物通財用也單穆公云古者有母平子子權母而行然而三品之來古而然矣駰謂楚之三錢賈說近之楚貴人驚告朱公長男曰王且赦曰何以也曰每王且赦常封三錢之府昨暮王使使封之或曰王且赦常封三錢之府者錢幣至重慮人或逆知有赦盗竊之所以封錢府備盜竊也漢靈帝時河内張成能候風角知將有赦教子殺人捕得七日放出此其類也朱公長男以為赦弟固當出也重千金虚棄莊生無所為也乃復見莊生莊生驚曰若不去邪長男曰固未也初為事弟弟今議自赦故辭生去莊生知其意欲復得其金曰若自入室取金長男即自入室取金持去獨自歡幸莊生羞為兒子所賣乃入見楚王曰臣前言某星事王言欲以修徳報之今臣出道路皆言陶之富人朱公之子殺人囚楚其家多持金銀賂王左右故王非能恤楚國而赦乃以朱公子故也楚王大怒曰寡人雖不德耳奈何以朱公之子故而施惠乎令論殺朱公子明日遂下赦令朱公長男竟持其弟喪歸至其母及邑人盡哀之唯朱公獨笑曰吾固知必殺其弟也彼非不愛其弟顧有所不能忍者也是少與我俱見苦為生難故重棄財至如少弟者生而見我富乘堅驅良逐狡徐廣曰狡一作郊豈知財所從來故輕棄之非所惜吝前日吾所為欲遣少子固為其能棄財故也而長者不能故卒以殺其弟事之理也無足悲者吾日夜固以望其喪之來也故范蠡三徙成名於天下非茍去而已所止必成名卒老死于陶故世傳曰陶朱公張華曰陶朱公冢在南郡華容縣西樹碑云是越之范蠡也太史公曰禹之功大矣漸九川徐廣曰漸者亦引進通導之意也字亦宜然定九州至于今諸夏艾安及苗裔句踐苦身焦思終滅彊吳北觀兵中國以尊周室號稱霸王徐廣曰一作主句踐可不謂賢哉盖有禹之遺烈焉范蠡三遷皆有榮名名垂後世臣主若此欲毋顯得乎史記集解卷四十一
