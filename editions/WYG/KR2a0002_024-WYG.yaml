body:
  text: 史記集解卷二十六宋裴駰撰史記二十六厯書第四昔自在古厯建正作於孟春於時氷泮發蟄百草奮興秭鳺先滜徐廣曰秭音姊鳺音規子規鳥也一名鷤䳏物迺歲具生於東次順四時卒於冬分時雞三號卒明徐廣曰卒一作平又云卒斯也撫十二節卒於丑日月成故明也明者孟也幽者幼也幽明者雌雄也雌雄代興而順至正之統也日歸於西起明於東月歸於東起明於西正不率天又不由人則凡事易壞而難成矣王者易姓受命必慎始初改正朔易服色推本天元順承厥意太史公曰神農以前尚矣盖黃帝考定星厯建立五行起消息正閏餘漢書音義曰以歲之餘為閏故曰閏餘於是有天地神祇物類之官是謂五官各司其序不相亂也民是以能有信神是以能有明徳民神異業敬而不凟故神降之嘉生徐廣曰嘉穀也民以物享災禍不生所求不匱少皞氏之衰也九黎亂德漢書音義曰少皞時諸侯作亂者民神雜擾不可放物禍菑薦至莫盡其氣顓頊受之乃命南正重司天以屬神命火正黎司地以屬民應劭曰黎隂官也火數二三地數也故火正司地以属萬民使復舊常無相侵瀆其後三苗服九黎之德故二官咸廢所職而閏餘乖次孟陬殄滅攝提無紀厯數失序漢書音義曰次十二次也史推厯失閏則斗建與月名錯正月為孟陬閏餘乖錯不與正嵗相值謂之殄滅攝提星名隨斗杓所指建十二月若厯誤春三月當指辰而指已是謂失序堯復遂重黎之後不忘舊者使復典之而立羲和之官明時正度則隂陽調風雨節茂氣至民無夭疫年耆禪舜申戒文祖云徐廣曰戒一作敇天之厯數在爾躬何晏曰厯數謂列次也舜亦以命禹孔安國曰舜亦以堯命已之辭命禹也由是觀之王者所重也夏正以正月殷正以十二月周正以十一月盖三王之正若循環窮則反本天下有道則不失紀序無道則正朔不行於諸侯幽厲之後周室微陪臣執政史不記時君不告朔鄭𤣥曰禮人君每月告享於廟有祭謂之朝享故疇人子弟分㪚如淳曰家業世世相傳為疇律年二十三𫝊之疇官各從其父學或在諸夏或在夷狄是以其禨祥廢而不統如淳曰吕氏春秋荆人鬼而越人禨今之巫祝禱祀滛祀之比也晉灼曰禨音珠璣之璣周襄王二十六年閏三月而春秋非之先王之正時也履端於始韋昭曰謂正厯必先稱端始也若十一月朔旦冬至也舉正於中韋昭曰氣在望中則時日昬明皆正也歸邪音餘於終韋昭曰餘餘分也終閏月也中氣在晦則後月閏在望是其正中也履端於始序則不愆舉正於中民則不惑歸邪音餘於終事則不悖其後戰國竝爭在於彊國禽敵救急解紛而已豈遑念斯哉是時獨有鄒衍明於五德之𫝊而㪚消息之分以顯諸侯而亦因秦滅六國兵戎極煩又升至尊之日淺未暇遑也而亦頗推五勝漢書音義曰五行相勝秦以周為火用水勝之也而自以為獲水德之瑞更名河曰德水而正以十月色上黑然厯度閏餘未能睹其真也漢興髙祖曰北畤待我而起亦自以為獲水德之瑞雖明習厯及張蒼等咸以為然是時天下初定方綱紀大基高后女主皆未遑故襲秦正朔服色至孝文時魯人公孫臣以終始五德上書言漢德土德宜更元改正朔易服色當有瑞瑞黃龍見事下丞相張蒼張蒼亦學律厯以為非是罷之其後黃龍見成紀張蒼自黜所欲論著不成而新垣平以望氣見頗言正厯服色事貴幸後作亂故孝文帝廢不復問至今上即位招致方士唐都分其天部漢書音義曰謂分部二十八宿為距度而巴落下閎運算轉厯徐廣曰陳術云徵士巴郡落下閎也然後日辰之度與夏正同乃改元更官號封泰山因詔御史曰乃者有司言星度之未定也廣延宣問以理星度未能詹也徐廣曰詹一作售也盖聞昔者黃帝合而不死名察度驗定清濁起五部建氣物分數應劭曰言黄帝造厯得仙名節㑹察寒暑致啓閉分至定清濁起五部五部金木水火土也建氣物分數皆敘厯之意也孟康曰合作也黄帝作厯厯終復始無窮已故曰不死清濁律聲之清濁也五部五行也天有四時分為五行也氣二十四氣物萬物也分厯數之分也瓉曰黄帝聖德與虚合契升龍登仙於天故曰合而不死題名宿度候察進退謂三辰之度吉凶之驗也然盖尚矣書缺樂弛朕甚閔焉朕惟未能循明也紬績日分率應水德之勝徐廣曰盖以為應土德土勝水今日順夏至黃鍾為宫林鍾為徵太蔟為商南吕為羽姑洗為角自是以後氣復正羽聲復清名復正變以至子日當冬至則陰陽離合之道行焉十一月甲子朔旦冬至已詹其更以七年為太初元年年名焉逢攝提格徐廣曰嵗隂在寅左行嵗星在丑右行月名畢聚日得甲子夜半朔旦冬至文穎曰律居隂而治陽厯居陽而治隂更相治間不客期忽五家文悖異推太初之元也厯術甲子篇太初元年嵗名焉逢攝提格月名畢聚日得甲子夜半朔旦冬至正北十二無大餘無小餘無大餘無小餘焉逢攝提格太初元年十二大餘五十四小餘三百四十八大餘五小餘八端䝉單閼徐廣曰單閼一作亶安二年閏十三大餘四十八小餘六百九十六大餘十小餘十六游兆執徐三年十二大餘十二小餘六百三大餘十五小餘二十四彊梧大荒落四年十二大餘七小餘十一大餘二十一無小餘徒維敦牂天漢元年閏十三大餘一小餘三百五十九大餘二十六小餘八祝犁協洽二年十二大餘二十五小餘二百六十六大餘三十一小餘十六商横涒灘三年十二大餘十九小餘六百一十四大餘三十六小餘二十四昭陽作鄂四年閏十三大餘十四小餘二十四大餘四十二無小餘横艾閹茂太始元年十二大餘三十七小餘八百六十九大餘四十七小餘八尙章大淵獻二年閏十三大餘三十二小餘二百七十七大餘五十二小餘十六焉逢困敦三年十二大餘五十六小餘一百八十四