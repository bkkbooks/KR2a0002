body:
  text: 史記集解卷一百九宋裴駰撰史記一百九李將軍列傳第四十九李將軍廣者隴西成紀人也其先曰李信秦時為將逐得燕太子丹者也故槐里徙成紀廣家世世受射孝文帝十四年匈奴大入蕭關而廣以良家子從軍撃胡用善騎射殺首虜多為漢中郎廣從弟李蔡亦為郎皆為武騎常侍秩八百石嘗從行有所衝陷折闗及格猛獸而文帝曰惜乎子不遇時如令子當高帝時萬户侯豈足道哉及孝景初立廣為隴西都尉徙為騎郎將張晏曰為武騎郎將呉楚軍時廣為驍騎都尉從太尉亞夫擊呉楚軍取旗顯功名昌邑下以梁王授廣將軍印還賞不行文頴曰廣為漢將私授梁印故不以賞也徙為上谷太守匈奴日以合戰典屬國公孫昆邪昆音魂為上泣曰李廣才氣天下無䨇自負其能數與匈奴戰恐亡之於是乃徙為上郡太守後廣轉為邊郡太守徙上郡嘗為隴西北地鴈門代郡雲中太守皆以力戰為名匈奴大入上郡天子使中貴人從廣漢書音義曰内官之幸貴者勒習兵擊匈奴中貴人將騎數十縱徐廣曰放縱馳騁見匈奴三人與戰三人還射傷中貴人殺其騎且盡中貴人走廣廣曰是必射雕者也文頴曰雕鳥也故使善射者射也廣乃遂從百騎徃馳三人三人亡馬歩行行數十里廣令其騎張左右翼而廣身自射彼三人者殺其二人生得一人果匈奴射雕者也已縛之上馬望匈奴有數千騎見廣以為誘騎皆驚上山陳廣之百騎皆大恐欲馳還走廣曰吾去大軍數十里今此以百騎走匈奴追射我立盡今我畱匈奴必以我為大軍誘之必不敢擊我廣令諸騎曰前前未到匈奴陳二里所止令曰皆下馬解鞍其騎曰敵多且近即有急奈何廣曰彼將以我為走今且解鞍以示不走用堅其意於是胡騎遂不敢擊有白馬將出䕶其兵李廣上馬與十餘騎犇射殺胡白馬將而復還至其騎中解鞍令士皆縱馬卧是時㑹暮胡兵終怪之不敢撃夜半時胡兵亦以為漢有伏軍於旁欲夜取之胡皆引兵而去平旦李廣乃歸其大軍大軍不知廣所之故弗從居乆之孝景崩武帝立左右以為廣名將也於是廣以上郡太守為未央衛尉而程不識亦為長樂衛尉程不識故與李廣皆以邊太守將軍屯及出撃胡而廣行無部伍行陣就善水草屯舍止人人自便不擊刁斗以自衛孟康曰以銅作鐎器受一斗晝炊飯食夜擊持行名曰刁斗莫府省約文書籍事然亦逺斥候未嘗遇害程不識正部曲行伍營陳擊刁斗士吏治軍簿至明軍不得休息然亦未嘗遇害不識曰李將軍極簡易然敵卒犯之無以禁也而其士卒亦佚樂咸樂為之死我軍雖煩擾然敵亦不得犯我是時漢邊郡李廣程不識皆為名將然匈奴畏李廣之略士卒亦多樂從李廣而苦程不識程不識孝景時以數直諫為太中大夫為人亷謹於文法後漢以馬邑城誘單于使大軍伏馬邑旁谷而廣為驍騎將軍領屬䕶軍將軍是時單于覺之去漢軍皆無功其後四歲廣以衛尉為將軍出鴈門撃匈奴匈奴兵多破敗廣軍生得廣單于素聞廣賢令曰得李廣必生致之胡騎得廣廣時傷病置廣兩馬間絡而盛卧廣行十餘里廣佯死睨其旁有一胡兒騎善馬廣暫騰而上胡兒馬因推墮兒徐廣曰一云抱兒鞭馬南馳也取其弓鞭馬南馳數十里復得其餘軍因引而入塞匈奴捕者騎數百追之廣行取胡兒弓射殺追騎以故得脱於是至漢漢下廣吏吏當廣所失亡多為敵所生得當斬贖為庶人頃之家居數歲廣家與故潁陰侯孫孫灌嬰之孫名强屏野居藍田南山中射獵嘗夜從一騎出從人田間飲還至霸陵亭霸陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何乃故也止廣宿亭下居無何匈奴入殺遼西太守敗韓將軍韓將軍後徙右北平蘇林曰韓安國於是天子乃召拜廣為北平太守廣即請霸陵尉與俱至軍而斬之廣居右北平匈奴聞之號曰漢之飛將軍避之數歲不敢入右北平廣出獵見草中石以為虎而射之中石没鏃徐廣曰一作没羽視之石也因復更射之終不能復入石矣廣所居郡聞有虎常自射之及居右北平射虎虎騰傷廣廣亦竟射殺之廣亷得賞賜輒分其麾下飲食與士共之終廣之身為二千石四十餘年家無餘財終不言家産事廣為人長猨臂如淳曰臂如猨通肩其善射亦天性也雖其子孫他人學者莫能及廣廣訥口少言與人居則畫地為軍陳射闊狹以飲如淳曰射戲求䟽宻持酒以飲不勝者専以射為戲竟死廣之兵將乏絶之處見水士卒不盡飲廣不近水士卒不盡食廣不嘗食寛緩不苛士以此愛樂為用其射見敵急非在數十步之内度不中不發發即應弦而倒用此其將兵數困辱其射猛獸亦為所傷云居頃之石建卒於是上召廣代建為郎中令元朔六年廣復為後將軍從大將軍軍出定襄撃匈奴諸將多中首虜率以功為侯者如淳曰中猶充也本義法得首若干封侯而廣軍無功後三歲廣以郎中令將四千騎出右北平博望侯張騫將萬騎與廣俱異道行可數百里匈奴左賢王將四萬騎圍廣廣軍士皆恐乃使其子敢徃馳之敢獨與數十騎馳直貫胡騎出其左右而還告廣曰匈奴易與耳軍士乃安廣為圓陳外嚮敵急擊之矢下如雨漢兵死者過半漢矢且盡廣乃令士持滿母發而廣身自以大黃射其裨將徐廣曰南郡賦曰黃問機張善弩之名駰案鄭德曰黄肩弩淵中黃朱之孟康曰太公六韜曰䧟堅敗强敵用大黃連弩韋昭曰角弩色黃而體大也殺數人匈奴益解㑹日暮吏士皆無人色而廣意氣自如益治軍軍中自是服其勇也明日復力戰而博望侯軍亦至匈奴軍乃解去漢軍罷弗能追是時廣軍幾没罷歸漢法博望侯留遲後期當死贖為庶人廣軍功自如無賞初廣之從弟李蔡與廣俱事孝文帝景帝時蔡積功勞至二千石孝武帝時至代相以元朔五年為輕車將軍從大將軍擊右賢王有功中率封為樂安侯元狩二年中代公孫𢎞為丞相蔡為人在下中名聲出廣下甚逺然廣不得爵邑官不過九卿而蔡為列侯位至三公諸廣之軍吏及士卒或取封侯廣嘗與望氣王朔燕語曰自漢擊匈奴而廣未嘗不在其中而諸部校尉以下才能不及中人然以擊胡軍功取侯者數十人而廣不為後人然無尺寸之功以得封邑者何也豈吾相不當侯邪且固命也朔曰將軍自念豈嘗有所恨乎廣曰吾嘗為隴西守羌嘗反吾誘而降降者八百餘人吾詐而同日殺之至今大恨獨此耳朔曰禍莫大於殺已降此乃將軍所以不得侯者也後二歳大將軍驃騎將軍大出擊匈奴廣數自請行天子以為老弗許良乆乃許之以為前將軍是歲元狩四年也廣既從大將軍青擊匈奴既出塞青捕虜知單于所居乃自以精兵走之而令廣并於右將軍軍徐廣曰主爵趙食其為右將軍出東道東道少回逺而大軍行水草少其勢不屯行張晏曰以水草少不可羣輩廣自請曰臣部為前將軍今大將軍乃徙令臣出東道且臣結髪而與匈奴戰今乃一得當單于臣願居前先死單于大將軍青亦陰受上誡以為李廣老數竒如淳曰數為匃奴所敗竒為不偶也母令當單于恐不得所欲而是時公孫敖新失侯為中將軍從大將軍大將軍亦欲使敖與俱當單于故徙前將軍廣廣時知之固自辭於大將軍大將軍不聴令長史封書與廣之莫府曰急詣部如書廣不謝大將軍而起行意甚愠怒而就部引兵與右將軍食其合軍出東道軍亡導或失道後大將軍大將軍與單于接戰單于遁走弗能得而還南絶幕遇前將軍右將軍廣已見大將軍還入軍大將軍使長史持糒醪遺廣因問廣食其失道狀青欲上書報天子軍曲折廣未對大將軍使長史急責廣之幕府對簿廣曰諸校尉無罪乃我自失道吾今自上簿至莫府廣謂其麾下曰廣結髪與匈奴大小七十餘戰今幸從大將軍出接單于兵而大將軍又徙廣部行囬逺而又迷失道豈非天哉且廣年六十餘矣終不能復對刀筆之吏遂引刀自剄廣軍士大夫一軍皆哭百姓聞之知與不知無老壯皆為垂涕而右將軍獨下吏當死贖為庶人廣子三人當户椒敢為郎天子與韓嫣戲嫣少不遜當户擊嫣嫣走於是天子以為勇當户早死拜椒為代郡太守皆先廣死當户有遺腹子名陵廣死軍時敢從驃騎將軍廣死明年李蔡以丞相坐侵孝景園壖地當下吏治蔡亦自殺不對獄國除李敢以校尉從驃騎將軍撃胡左賢王力戰奪左賢王鼔旗斬首多賜爵關内侯食邑二百户代廣為郎中令頃之怨大將軍青之恨其父乃擊傷大將軍大將軍匿諱之居無何敢從上雍至甘泉宫獵驃騎將軍去病與青有親射殺敢去病時方貴幸上諱云鹿觸殺之居歳餘去病死徐廣曰兀狩六年而敢有女為太子中人愛幸敢男禹有寵於太子然好利李氏陵遲衰微矣李陵既壯選為建章監監諸騎善射愛士卒天子以為李氏世將而使將八百騎嘗深入匈奴二千餘里過居延徐廣曰屬張掖視地形無所見虜而還拜為騎都尉將丹陽楚人五千人教射酒泉張掖以屯衞胡數歲天漢二年秋貳師將軍李廣利將三萬騎擊匈奴右賢王於祁連天山徐廣曰出燉煌至天山而使陵將其射士步兵五千人出居延北可千餘里欲以分匈奴兵母令專走貳師也陵既至期還而單于以兵八萬圍撃陵軍陵軍五千人兵矢既盡士死者過半而所殺傷匈奴亦萬餘人且引且戰連鬭八日還未到居延百餘里匈奴遮狭絶道陵食乏而救兵不到敵急撃招降陵陵曰無面目報陛下遂降匈奴其兵盡没餘亡散得歸漢者四百餘人單于既得陵素聞其家聲及戰又壯乃以其女妻陵而貴之漢聞族陵母妻子自是之後李氏名敗而隴西之士居門下者皆用為恥焉太史公曰傳曰其身正不令而行其身不正雖令不從其李將軍之謂也余睹李將軍悛悛如鄙人口不能道辭及死之日天下知與不知皆為盡哀彼其忠實心誠信於士大夫也諺曰桃李不言下自成蹊此言雖小可以諭大也史記集解卷一百九
