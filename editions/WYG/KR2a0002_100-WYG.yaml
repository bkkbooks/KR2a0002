body:
  text: 史記集解卷一百二宋裴駰撰史記一百二張釋之馮唐列傳第四十二張廷尉釋之者堵陽人也字季有兄仲同居以訾為騎郎蘇林曰顧錢若出榖也如淳曰漢儀注訾五百萬得為常侍郎事孝文帝十嵗不得調無所知名釋之曰乆宦減仲之産不遂欲自免歸中郎将袁盎知其賢惜其去乃請徙釋之補謁者釋之既朝畢因前言便宜事文帝曰卑之毋甚髙論令今可施行也於是釋之言秦漢之間事秦所以失而漢所以興者乆之文帝稱善乃拜釋之為謁者僕射釋之從行登虎圈上問上林尉諸禽獸簿十餘問尉左右視盡不能對虎圈嗇夫從旁代尉對上所問禽獸簿甚悉欲以觀其能口對響應無窮者文帝曰吏不當若是邪尉無賴張晏曰才無可恃乃詔釋之拜嗇夫為上林令釋之乆之前曰陛下以絳侯周勃何如人也上曰長者也又復問東陽侯張相如何如人也上復曰長者釋之曰夫絳侯東陽侯稱為長者此兩人言事曾不能出口豈斆此嗇夫諜諜晉灼曰音牒利口㨗給哉且秦以任刀筆之吏吏爭以亟疾苛察相髙然其敝徒文具耳無惻隱之實以故不聞其過陵遲而至於二世天下土崩今陛下以嗇夫口辯而超遷之臣恐天下隨風靡靡爭為口辯而無其實且下之化上疾於景響舉錯不可不審也文帝曰善乃止不拜嗇夫上就車召釋之參乘徐行問釋之秦之敝具以質言如淳曰質誠也至宫上拜釋之為宫車令頃之太子與梁王共車入朝不下司馬門如淳曰宫衛令諸出入殿門公車司馬門乘軺傳者皆下不如令罰金四兩於是釋之追止太子梁王無得入殿門遂劾不下公門不敬奏之薄太后聞之文帝免冠謝曰教兒子不謹薄太后乃使使承詔赦太子梁王然後得入文帝由是奇釋之拜為中大夫頃之至中郎將從行至霸陵居北臨厠李奇曰霸陵北頭厠近霸水帝登其上以逺望也如淳曰居髙臨岸邊曰厠也蘇林曰厠邉側也韋昭曰髙岸夾水為厠也是時慎夫人從上指示慎夫人新豐道曰此走邯鄲道也張晏曰慎夫人邯鄲人也如淳曰走音奏趨也使慎夫人鼓瑟上自倚瑟而歌漢書音義曰聲氣依倚瑟也書曰聲依永意慘悽悲懷顧謂羣臣曰嗟乎以北山石為椁用紵絮斮陳蕠漆其間徐廣曰斮一作錯駰案漢書音義曰斮絮以漆著其間也豈可動哉左右皆曰善釋之前進曰使其中有可欲者雖錮南山猶有㕁張晏曰錮鑄也帝北向故云北山廻顧南向故云南山使其中無可欲者雖無石椁又何戚焉文帝稱善其後拜釋之為廷尉頃之上行出中渭橋張晏曰在渭橋中路瓚曰中尉橋兩岸之中有一人從橋下走出乘輿馬驚於是使騎捕屬之廷尉釋之治問曰縣人來如淳曰長安縣人聞蹕匿橋下乆之以為行已過即出見乘輿車騎即走耳廷尉奏當此人犯蹕當罰金如淳曰乙令蹕先至而犯者罰金四兩蹕止行人文帝怒曰此人親驚吾馬吾馬賴柔和令他馬固不敗傷我乎而廷尉乃當之罰金釋之曰法者天子所與天下公共也今法如此而更重之是法不信於民也且方其時上使立誅之則已今既下廷尉廷尉天下之平也一傾而天下用法皆為輕重民安所錯其手足唯陛下察之良乆上曰廷尉當是也其後有人盜髙廟坐前玉環捕得文帝怒下廷尉廷尉治釋之案律盜宗廟服御物者為奏奏當棄市上大怒曰人之無道乃盜先帝廟器吾屬廷尉者欲致族之而君以法奏之非吾所以共承宗廟意也釋之免冠頓首謝曰法如是足也徐廣曰足一作止也且罪等如淳曰俱死罪也盜玉環不若盜長陵土之逆也然以逆順為差今盜宗廟器而族之有如萬分之一假令愚民取長陵一抔土張晏曰不欲指言故以取土譬也陛下何以加其法乎乆之文帝與太后言之乃許廷尉當是時中尉條侯周亞夫與梁相山都侯王恬開徐廣曰一作間漢書作啓啓者景帝諱也故或為開見釋之持議平乃結為親友張廷尉由此天下稱之後文帝崩景帝立釋之恐稱病欲免去懼大誅至欲見謝則未知何如用王生計卒見謝景帝不過也王生者善為黄老言處士也嘗召居廷中三公九卿盡會立王生老人曰吾韈解顧謂張廷尉為我結韈釋之跪而結之既已人或謂王生曰獨奈何延辱張廷尉使跪結韈王生曰吾老且賤自度終無益於張廷尉張廷尉方今天下名臣吾故聊辱廷尉使跪結韈欲以重之諸公聞之賢王生而重張廷尉張廷尉事景帝嵗餘為淮南王相猶尚以前過也乆之釋之卒其子曰張摰字長公官至大夫免以不能取容當世故終身不仕馮唐者其大父趙人父徙代漢興徒安陵唐以孝著為中郎署長應劭曰此云孝子郎也或曰以至孝聞事文帝文帝輦過問唐曰父老何自為郎家安在唐具以實對文帝曰吾居代時吾尚食監髙祛數為我言趙将李齊之賢戰於鉅鹿下今吾每飯意未嘗不在鉅鹿也張晏曰每食念監所説李齊在鉅鹿時父知之乎唐對曰尚不如廉頗李牧之為将也上曰何以唐曰臣大父在趙時為官卒将徐廣曰一云官士将駰案晉灼曰百人為徹行亦皆師将也善李牧臣父故為代相善趙将李齊知其為人也上既聞廉頗李牧為人良説如淳曰良善也而搏髀曰嗟呼吾獨不得廉頗李牧時為吾将吾豈憂匈奴哉唐曰主臣陛下雖得廉頗李牧弗能用也上怒起入禁中良乆召唐讓曰公奈何衆辱我獨無間處乎唐謝曰鄙人不知忌諱當是之時匈奴新大入朝那殺北地都尉昻上以胡宼為意乃卒復問唐曰公何以知吾不能用廉頗李牧也唐對曰臣聞上古王者之遣将也跪而推轂曰閫以内者韋昭曰此郭門之閫也門中橛曰閫寡人制之閫以外者将軍制之軍功爵賞皆決於外歸而奏之此非虚言也臣大父言李牧為趙将居邉軍市之租皆自用饗士賞賜決於外不從中覆也委任而責成功故李牧乃得盡其智能遣選車千三百乘彀騎萬三千百金之士十萬服䖍曰良士直百金也或曰直百金言重是以北逐單于破東胡滅澹林徐廣曰澹一作䄡西抑彊秦南支韓魏當是之時趙㡬霸其後㑹趙王遷立其母倡也王遷立乃用郭開讒卒誅李牧令顔聚代之是以兵破士北為秦所禽滅今臣竊聞魏尚為雲中守漢書曰尚槐里人也其軍市租盡以饗士卒私養錢服䖍曰私廩假錢五日一椎牛饗賓客軍吏舍人是以匈奴逺避不近雲中之塞虜曾一入尚率車騎擊之所殺甚衆夫士卒盡家人子起田中從軍安知尺籍五符如淳曰漢軍法曰吏卒斬首以尺籍書下縣移郡令人故行不行奪勞二嵗伍符亦什伍之符約節度也或曰以尺簡書故曰尺籍也終日力戰斬首捕虜上功幕府一言不相應文吏以法繩之其賞不行而吏奉法必用臣愚以為陛下法太明賞太輕罰太重且雲中守魏尚坐上功首虜差六級陛下下之吏削其爵罰作之由此言之陛下雖得廉頗李牧弗能用也班固稱楊子曰孝文帝親詘帝尊以信亞夫之軍曷為不能用頗牧彼将有激臣誠愚觸忌諱死罪死罪文帝説是日令馮唐持節赦魏尚復以為雲中守而拜唐為車騎都尉主中尉及郡國車士服䖍曰車軍之士七年景帝立以唐為楚相免武帝立求賢良舉馮唐唐時年九十餘不能復為官乃以唐子馮遂為郎遂字王孫亦奇士與余善太史公曰張季之言長者守法不阿意馮公之論将率有味哉有味哉語曰不知其人視其友二君之所稱誦可著廊廟書曰不偏不黨王道蕩蕩不黨不偏王道便便徐廣曰一作辨張季馮公近之矣史記集解卷一百二
