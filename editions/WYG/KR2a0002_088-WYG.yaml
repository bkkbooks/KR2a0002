body:
  text: 史記集解卷九十宋裴駰撰史記九十魏豹彭越列傳第三十魏豹者故魏諸公子也其兄魏咎故魏時封為寗陵君秦滅魏遷咎為家人陳勝之起王也咎往從之陳王使魏人周市徇魏地魏地已下欲相與立周市為魏王周市曰天下昏亂忠臣乃見今天下共畔秦其義必立魏王後乃可齊趙使車各五十乗立周市為魏王市辭不受迎魏咎於陳五反陳王乃遣立咎為魏王徐廣曰元年十二月也章邯已破陳王乃進兵擊魏王於臨濟魏王乃使周市出請救於齊楚齊楚遣項它田巴將兵隨市救魏章邯遂擊破殺周市等軍圍臨濟咎為其民約降約定咎自燒殺魏豹亡走楚徐廣曰二年六月楚懷王予魏豹數千人復徇魏地項羽已破秦降章邯豹下魏二十餘城立豹為魏王豹引精兵從項羽入關漢元年項羽封諸侯欲有梁地乃徙魏王豹於河東都平陽為西魏王漢王還定三秦渡臨晉魏王豹以國屬焉遂從擊楚於彭城漢敗還至滎陽豹請歸視親病至國即絶河津畔漢漢王聞魏豹反方東憂楚未及擊謂酈生曰緩頰往説魏豹能下之吾以萬戸封若酈生説豹豹謝曰人生一世間如白駒過隙耳今漢王慢而侮人罵詈諸侯羣臣如罵奴耳非有上下禮節也吾不忍復見也於是漢王遣韓信擊虜豹於河東徐廣曰二年九月也傳詣滎陽以豹國為郡高祖本紀曰置三郡河東太原上黨漢王令豹守滎陽楚圍之急周苛遂殺魏豹彭越者昌邑人也字仲常漁鉅野澤中為羣盜陳勝項梁之起少年或謂越曰諸豪桀相立畔秦仲可以來亦効之彭越曰兩龍方鬭且待之居歲餘澤間少年相聚百餘人往從彭越曰請仲為長越謝曰臣不願與諸君少年彊請乃許與期旦日日出會後期者斬旦日日出十餘人後後者至日中於是越謝曰臣老諸君彊以為長今期而多後不可盡誅誅最後者一人令校長斬之皆笑曰何至是請後不敢於是越乃引一人斬之設壇祭乃令徒屬徒屬皆大驚畏越莫敢仰視乃行略地收諸侯散卒得千餘人沛公之從碭北擊昌邑彭越助之昌邑未下沛公引兵西彭越亦將其衆居鉅野中收魏散卒項籍入關王諸侯還歸彭越衆萬餘人毋所屬漢元年秋齊王田榮畔項王漢乃使人賜彭越將軍印使下濟隂以擊楚楚命蕭公角將兵擊越越大破楚軍漢王二年春與魏王豹及諸侯東擊楚彭越將其兵三萬餘人歸漢於外黃漢王曰彭將軍收魏地得十餘城欲急立魏後今西魏王豹亦魏王咎從弟也真魏後乃拜彭越為魏相國擅將其兵略定梁地漢王之敗彭城解而西也彭越皆復亡其所下城獨將其兵北居河上漢王三年彭越常往來為漢游兵擊楚絶其後糧於梁地漢四年冬項王與漢王相距滎陽彭越攻下睢陽外黃十七城項王聞之乃使曹咎守城臯自東收彭越所下城邑皆復為楚越將其兵北走穀城漢五年秋項王之南走陽夏彭越復下昌邑旁二十餘城得穀十餘萬斛以給漢王食漢王敗使使召彭越并力擊楚越曰魏地初定尚畏楚未可去漢王追楚為項籍所敗固陵乃謂留侯曰諸侯兵不從為之奈何留侯曰齊王信之立非君王之意信亦不自堅彭越本定梁地功多始君王以魏豹故拜彭越為魏相國今豹死毋後且越亦欲王而君王不蚤定與此兩國約即勝楚雎陽以北至穀城皆以王彭相國從陳以東傅音附海與齊王信齊王信家在楚此其意欲復得故邑君王能出捐此地許二人二人今可致即不能事未可知也於是漢王乃發使使彭越如留侯策使者至彭越乃悉引兵至垓下遂破楚五年項籍已死春立彭越為梁王都定陶六年朝陳九年十年皆來朝長安十年秋陳豨反代地高帝自往擊至邯鄲徵兵梁王梁王稱病使將將兵詣邯鄲高帝怒使人讓梁王梁王恐欲自往謝其將扈輒曰王始不往見讓而往往則為禽矣不如遂發兵反梁王不聽稱病梁王怒其太僕欲斬之太僕亡走漢告梁王與扈輒謀反於是上使使掩梁王梁王不覺捕梁王囚之雒陽有司治反形已具張晏曰扈輒勸越反不聽而云反形已具有司非也瓉曰扈輒勸越反而越不誅輒是反形已具請論如法上赦以為庶人傳處蜀青衣文頴曰青衣縣名在蜀瓉曰今漢嘉是也西至鄭逢呂后從長安來欲之雒陽道見彭王彭王為呂后泣涕自言無罪願處故昌邑呂后許諾與俱東至雒陽呂后白上曰彭王壯士今徙之蜀此自遺患不如遂誅之妾謹與俱來於是呂后乃令其舍人告彭越復謀反廷尉王恬關奏請族之上乃可遂夷越宗族國除太史公曰魏豹彭越雖故賤然已席卷千里南靣稱孤喋血乗勝日有聞矣徐廣曰喋一作唼韓傳亦有喋血語也懷畔逆之意及敗不死而虜囚身被刑戮何哉中材已上且羞其行況王者乎彼無異故智略絶人獨患無身耳得攝尺寸之柄其雲蒸龍變欲有所會其度以故幽囚而不辭云史記集解卷九十
