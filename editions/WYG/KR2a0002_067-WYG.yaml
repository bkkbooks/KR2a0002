body:
  text: 史記集解卷六十九宋裴駰撰史記六十九蘇秦列傳第九蘓秦者東周雒陽人也東事師于齊而習之于鬼谷先生徐廣曰潁川陽城有鬼谷盖是其人所居因為號駰案風俗通義曰鬼谷先生六國時從横家出游數歳大困而歸兄弟嫂妺妻妾竊皆笑之曰周人之俗治産業力工商逐什二以為務今子釋本而事口舌困不亦宜乎蘇秦聞之而慙自傷乃閉室不出出其書徧觀之曰夫士業已屈首受書而不能以取尊榮雖多亦奚以為于是得周書隂符伏而讀之期年以出揣摩曰此可以說當世之君矣求說周顯王顯王左右素習知蘇秦皆少之弗信乃西至秦秦孝公卒說恵王曰秦四塞之國被山帶渭東有闗河西有漢中南有巴蜀北有代馬此天府也以秦士民之衆兵法之教可以吞天下稱帝而治秦王曰毛羽未成不可以髙蜚文理未明不可以并兼方誅商鞅疾辯士弗用乃東之趙趙肅侯令其弟成為相號奉陽君奉陽君弗說之去游燕歳餘而後得見說燕文侯曰燕東有朝鮮遼東北有林胡樓煩西有雲中九原南有嘑沱易水周禮曰正北曰并州其川滹沱鄭𤣥曰滹沱出城城方二千餘里帶甲數十萬車六百乗騎六千匹粟支數年南有碣石鴈門之饒北有棗栗之利民雖不佃作而足于棗栗矣此所謂天府者也夫安樂無事不見覆軍殺將無過燕者大王知其所以然乎夫燕之所以不犯冦被甲兵者以趙之為蔽其南也秦趙五戰秦再勝而趙三勝秦趙相斃而王以全燕制其後此燕之所以不犯冦也且夫秦之攻燕也踰雲中九原過代上谷彌地數千里雖得燕城秦計固不能守也秦之不能害燕亦明矣今趙之攻燕也發號出令不至十日而數十萬之軍軍于東垣矣渡滹沱涉易水不至四五日而距國都矣故曰秦之攻燕也戰于千里之外趙之攻燕也戰于百里之内夫不憂百里之患而重千里之外計無過于此者是故願大王與趙從親天下為一則燕國必無患矣文侯曰子言則可然吾國小西迫强趙南近齊齊趙强國也子必欲合從以安燕寡人請以國從于是資蘇秦車馬金帛以至趙而奉陽君已死即因説趙肅侯曰天下卿相人臣及布衣之士皆髙賢君之行義皆願奉教陳忠于前之日久矣雖然奉陽君妬君而不任事是以賔客游士莫敢自盡于前者今奉陽君捐館舍君乃今復與士民相親也臣故敢進其愚慮竊為君計者莫若安民無事且無庸有事于民也安民之本在于擇交擇交而得則民安擇交而不得則民終身不安請言外患齊秦為兩敵而民不得安倚秦攻齊而民不得安倚齊攻秦而民不得安故夫謀人之主伐人之國常苦出辭㫁絶人之交也願君慎勿出于口請别白黒所以異隂陽而已矣君誠能聴臣燕必致旃裘狗馬之地齊必致魚鹽之海楚必致橘柚之園韓魏中山皆可使致湯沐之奉而貴戚父兄皆可以受封侯夫割地包利五伯之所以覆軍禽將而求也封侯貴戚湯武之所以放弑而争也今君髙拱而兩有之此臣之所以為君願也今大王與秦則秦必弱韓魏與齊則齊必弱楚魏魏弱則割河外韓弱則効宜陽宜陽効則上郡絶河外割則道不通楚弱則無援此三策者不可不孰計也夫秦下軹道則南陽危刧韓包周則趙氏自操兵據衞取淇巷兵權切則齊必入朝秦秦欲已得乎山東則必舉兵而嚮趙矣秦甲渡河踰漳據番吾徐廣曰常山有蒲吾縣則兵必戰于邯鄲之下矣此臣之所為君患也當今之時山東之建國莫强于趙趙地方二千餘里帶甲數十萬車千乗騎萬匹粟支數年西有常山南有河漳東有清河北有燕國燕固弱國不足畏也秦之所害于天下者莫如趙然而秦不敢舉兵伐趙者何也畏韓魏之議其後也然則韓魏趙之南蔽也秦之攻韓魏也無有名山大川之限稍蠶食之傳音附國都而止韓魏不能支秦必入臣于秦秦無韓魏之規則禍必中于趙矣此臣之所為君患也臣聞堯無三夫之分舜無咫尺之地以有天下禹無百人之聚以王諸侯湯武之士不過三千車不過三百乗卒不過三萬立為天子誠得其道也是故明主外料其敵之强弱内度其士卒賢不肖不待兩軍相當而勝敗存亡之機固已形于胸中矣豈揜于衆人之言而以㝠㝠决事哉臣竊以天下之地圖案之諸侯之地五倍于秦料度諸侯之卒十倍于秦六國為一并力西鄉而攻秦秦必破矣今西面而事之見臣于秦夫破人之與見破于人也臣人之與見臣于人也豈可同日而論哉夫衡音横人者皆欲割諸侯之地以予秦秦成則髙臺榭美宫室聴竽瑟之音前有樓闕軒轅後有長姣美人國被秦患而不與其憂是故夫衡人日夜務以秦權恐愒呼曷反諸侯以求割地故願大王孰計之也臣聞明主絶疑去讒屏流言之跡塞朋黨之門故尊主廣地彊兵之計臣得陳忠於前矣故竊為大王計莫如一韓魏齊楚燕趙以從親以畔秦令天下之將相㑹于洹水之上徐廣曰洹水出汲郡林慮縣通質刳白馬而盟要約曰秦攻趙齊魏各出鋭師以佐之韓絶其糧道趙涉河漳燕守常山之北秦攻韓魏則楚絶其後齊出鋭師而佐之趙涉河漳燕守雲中秦攻齊則楚絶其後韓守城皋魏塞其道趙涉河博闗徐廣曰齊威王六年晉伐齊到博陵東郡有博平縣燕出鋭師以佐之秦攻燕則趙守常山楚軍武闗齊涉勃海韓魏皆出鋭師以佐之秦攻趙則韓軍宜陽楚軍武闗魏軍河外齊涉清河燕出鋭師以佐之諸侯有不如約者以五國之兵共伐之六國從親以賔秦則秦甲必不敢出于函谷以害山東矣如此則霸王之業成矣趙王曰寡人年少立國日淺未嘗得聞社稷之長計也今上客有意存天下安諸侯寡人敬以國從乃飾車百乗黄金千鎰白璧百雙錦繡千純純匹端名周禮曰純帛不過五兩以約諸侯是時周天子致文武之胙于秦惠王惠王使犀首攻魏禽將龍賈取魏之雕隂且欲東兵蘇秦恐秦兵之至趙也乃激怒張儀入之於秦于是説韓宣惠王曰韓北有鞏洛成皋之固西有宜陽商阪之塞徐廣曰商一作常東有宛于袁切穰洧于軌反水南有陘山徐廣曰召陵有陘亭密縣有陘山地方九百餘里帶甲數十萬天下之彊弓勁弩皆從韓出谿子許慎云南方谿子蠻夷柘弩皆善材少府時力距來者韓有谿子弩又有少府所造二種之弩案時力者謂作之得時力倍于常故名時力也距来者謂弩勢勁利足以距来敵也皆射六百步之外韓卒超足而射百發不暇止逺者括蔽洞胸近者鏑弇心韓卒之劍㦸皆出于冥山徐廣曰莊子曰南行至郢北面而不見冥山駰案司馬彪曰冥山在朔州北棠谿徐廣曰汝南吳房有棠谿亭墨陽淮南子曰墨陽之莫邪也合賻音附徐廣曰一作伯鄧師宛馮徐廣曰滎陽有馮池龍淵太阿吳越春秋曰楚王召風胡子而告之曰寡人聞吳有干將越有歐冶寡人欲因子請此二人作劒可乎風胡子曰可乃往見二子作劍一曰龍淵二曰太阿皆陸㫁牛馬水截鵠鴈當敵則斬堅甲鐵幕徐廣曰陽城出鐵革抉徐廣曰一作決㕹音伐芮無不畢具以韓卒之勇被堅甲蹠勁弩帶利劒一人當百不足言也夫以韓之勁與大王之賢乃西面事秦交臂而服羞社稷而為天下笑無大於此者矣是故願大王孰計之大王事秦秦必求宜陽成皋今兹効之明年又復求割地與則無地以給之不與則棄前功而受後禍且大王之地有盡而秦之求無已以有盡之地而逆無已之求此所謂市怨結禍者也不戰而地已削矣臣聞鄙諺曰寧為雞口無為牛後今西面交臂而臣事秦何異于牛後乎夫以大王之賢挾彊韓之兵而有牛後之名臣竊為大王羞之于是韓王勃然作色攘臂瞋目按劒仰天太息曰寡人雖不肖必不能事秦今主君詔以趙王之教敬奉社稷以從又説魏襄王曰大王之地南有鴻溝徐廣曰在滎陽陳汝南許郾徐廣曰在潁川于㦥切昆陽召陵舞陽新都新郪地理志潁川有昆陽舞陽縣汝南有新郪縣南陽有新都縣東有淮潁煮棗徐廣曰在宛句無胥西有長城之界北有河外卷衍酸棗徐廣曰滎陽卷縣有長城經陽武到宻衍地名地方千里地名雖小然而田舍廬廡之數曾無所芻牧人民之衆車馬之多日夜行不絶輷輷殷殷若有三軍之衆臣竊量大王之國不下楚然衡人怵王交彊虎狼之秦以侵天下卒有秦患不顧其禍夫挾强秦之勢以内劫其主罪無過此者魏天下之强國也王天下之賢主也今乃有意西面而事秦稱東藩築帝宫受冠帶祠春秋臣竊為大王恥之臣聞越王句踐戰敝卒三千人禽夫差于干遂武王卒三千人革車三百乗制紂于牧野豈其士卒衆哉誠能奮其威也今竊聞大王之國武士二十萬漢書刑法志曰魏氏武卒衣三屬之甲操十二石之弩負矢五十置戈其上冠胄帶劒贏三日之糧日中而趨百里中試則復其户利其田宅蒼頭二十萬奮擊二十萬厮徒十萬車六百乗騎五千匹此其過越王句踐武王逺矣今乃聴於羣臣之説而欲臣事秦夫事秦必割地以効實故兵未用而國已虧矣凡羣臣之言事秦者皆姦人非忠臣也夫為人臣割其主之地以求外交偷取一時之功而不顧其後破公家而成私門外挾彊秦之勢以内劫其主以求割地願大王孰察之周書曰緜緜不絶蔓蔓奈何毫釐不伐將用斧柯前慮不定後有大患將奈之何大王誠能聴臣六國從親專心并力壹意則必無彊秦之患故敝邑趙王使臣効愚計奉明約在大王之詔詔之魏王曰寡人不肖未嘗得聞明教今主君以趙王之詔詔之敬以國従因東説齊宣王曰齊南有泰山東有琅邪西有清河北有勃海此所謂四塞之國也齊地方二千餘里帶甲數十萬粟如邱山三軍之良五家之兵進如鋒矢戰如雷霆解如風雨即有軍役未嘗倍泰山絶清河涉勃海也臨菑之中七萬戸臣竊度之不下戸三男子三七二十一萬不待發于逺縣而臨菑之卒固已二十一萬矣臨菑甚富而實其民無不吹竽鼓瑟彈琴擊筑鬭雞走狗六博蹋徒獵切鞠求六切者劉向别錄曰蹵鞠者傳言黄帝所作或曰起戰國之時蹋鞠兵勢也所之以練武士知有材也皆因嬉戲而講練臨菑之塗車轂擊人肩摩連衽成帷舉袂成幕揮汗成雨家殷人足志高氣揚夫以大王之賢與齊之彊天下莫能當今乃西面而事秦臣竊為大王羞之且夫韓魏之所以重畏秦者為與秦接境壤界也兵出而相當不出十日而戰勝存亡之機决矣韓魏戰而勝秦則兵半折四境不守戰而不勝則國已危亡隨其後是故韓魏之所以重與秦戰而輕為之臣也今秦之攻齊則不然倍韓魏之地過衛陽晉之道徐廣曰魏哀王十六年秦㧞魏蒲阪陽晉封陵徑乎亢父之險車不得方軌騎不得比行百人守險千人不敢過也秦雖欲深入則狼顧恐韓魏之議其後也是故恫疑虚喝呼葛切驕矜而不敢進則秦之不能害齊亦明矣夫不深料秦之無奈齊何而欲西面而事之是羣臣之計過也今無臣事秦之名而有强國之實臣是故願大王少留意計之齊王曰寡人不敏僻逺守海窮道東境之國也未嘗得聞餘教今足下以趙王詔詔之敬以國從乃西南説楚威王曰楚天下之彊國也王天下之賢主也西有黔中徐廣曰今之武陵地巫郡徐廣曰巫郡者南郡之西界東有夏州海陽徐廣曰楚考烈王元年秦取夏川駰案左傳楚莊王伐陳鄉取一人焉以歸謂之夏州而注者不説夏州所在車𦙍撰桓温集云夏口城上數里有州名夏州東有夏州謂此也南有洞庭蒼梧北有陘塞郇陽徐廣曰春秋曰遂伐楚次于陘楚威王十一年魏敗楚陘山析縣有鈞水或者郇陽今之順陽乎一本北有汾陘之塞也地方五千餘里帶甲百萬車千乗騎萬匹粟支十年此霸王之資也夫以楚之强與王之賢天下莫能當也今乃欲西面而事秦則諸侯莫不西面而朝于章臺之下矣秦之所害莫如楚楚彊則秦弱秦彊則楚弱其勢不兩立故為大王計莫如從親以孤秦大王不從秦必起兩軍一軍出武闗一軍下黔中則鄢郢動矣徐廣曰今南郡宜城臣聞治之其未亂也為之其未有也患至而後憂之則無及已故願大王早孰計之大王誠能聴臣臣請令山東之國奉四時之獻以承大王之明詔委社稷奉宗廟練士厲兵在大王之所用之大王誠能用臣之愚計則韓魏齊燕趙衞之妙音美人必充後宫燕代橐駝良馬必實外廐故從合則楚王衡成則秦帝今釋霸王之業而有事人之名臣竊為大王不取也夫秦虎狼之國也有吞天下之心秦天下之仇讎也衡人皆欲割諸侯之地以事秦此所謂養仇而奉讎者也夫為人臣割其主之地以外交强虎狼之秦以侵天下卒有秦患不顧其禍夫外挾彊秦之威以内劫其主以求割地大逆不忠無過此者故從親則諸侯割地以事楚衡合則楚割地以事秦此兩策者相去逺矣二者大王何居焉故敝邑趙王使臣効愚計奉明約在大王詔之楚王曰寡人之國西與秦接境秦有舉巴蜀并漢中之心秦虎狼之國不可親也而韓魏迫于秦患不可與深謀與深謀恐反人以入于秦故謀未發而國以危矣寡人自料以楚當秦不見勝也内與羣臣謀不足恃也寡人臥不安席食不甘味心揺摇然如縣旌而無所終薄曰洛切今主君欲一天下收諸侯存危國寡人謹奉社稷以從于是六國從合而并力焉蘇秦為從約長并相六國北報趙王乃行過雒陽車騎輜重諸侯各發使送之甚衆擬于王者周顯王聞之恐懼除道使人郊勞儀禮曰賔至近郊君使卿朝服用束帛勞蘇秦之昆弟妻嫂側目不敢仰視俯伏侍取食蘇秦笑謂其嫂曰何前倨而後恭也嫂委蛇蒲服以面掩地而謝曰見季子位髙金多也譙周曰蘇秦字季子蘇秦喟然歎曰此一人之身富貴則親戚畏懼之貧賤則輕易之况衆人乎且使我有雒陽負郭田二頃吾豈能佩六國相印乎于是散千金以賜宗族朋友初蘇秦之燕貸百錢為資及得富貴以百金償之徧報諸所嘗見徳者其從者有一人獨未得報乃前自言蘇秦曰我非忘子子之與我至燕再三欲去我易水之上方是時我困故望子深是以後子子今亦得矣蘇秦既約六國從親歸趙趙肅侯封為武安君乃投從約書于秦秦兵不敢闚函谷闗十五年其後秦使犀首欺齊魏與共伐趙欲敗從約齊魏伐趙趙王讓蘇秦蘇秦恐請使燕必報齊蘇秦去趙徐廣曰自初説燕至此三年而從約皆解秦惠王以其女為燕太子婦是歲文侯卒太子立是為燕易王易王初立齊宣王因燕喪伐燕取十城易王謂蘇秦曰往日先生至燕而先王資先生見趙遂約六國從今齊先伐趙次至燕以先生之故為天下笑先生能為燕得侵地乎蘇秦大慙曰請為王取之蘇秦見齊王再拜俯而慶仰而弔齊王曰是何慶弔相隨之速也蘇秦曰臣聞飢人所以飢而不食烏喙者本草經曰烏頭一名烏喙為其愈充腹而與餓死同患也今燕雖弱小即秦王之少婿也大王利其十城而長與强秦為仇今使弱燕為鴈行而彊秦敝其後以招天下之精兵是食烏喙之類也齊王愀然變色曰然則奈何蘇秦曰臣聞古之善制事者轉禍為福因敗為功大王誠能聴臣計即歸燕之十城燕無故而得十城必喜秦王知以已之故而歸燕之十城亦必喜此所謂棄仇讎而得石交者也夫燕秦俱事齊則大王號令天下莫敢不聴是王以虛辭附秦以十城取天下此霸王之業也王曰善于是乃歸燕之十城人有毁蘓秦者曰左右賣國反覆之臣也將作亂蘇秦恐得罪歸而燕王不復官也蘇秦見燕王曰臣東周之鄙人也無有分寸之功而王親拜之于廟而禮之于廷今臣為王却齊之兵而攻得十城宜以益親今来而王不官臣者人必有以不信傷臣于王者臣之不信王之福也臣聞忠信者所以自為也進取者所以為人也且臣之説齊王曽非欺之也臣棄老母于東周固去自為而行進取也今有孝如曾參㢘如伯夷信如尾生得此三人者以事大王何若王曰足矣蘇秦曰孝如曾參義不離其親一宿于外王又安能使之步行千里而事弱燕之危主哉㢘如伯夷義不為孤竹君之嗣不肯為武王臣不受封侯而餓死首陽山下有㢘如此王又安能使之步行千里而行進取于齊哉信如尾生與女子期于梁下女子不来水至不去抱柱而死有信如此王又安能使之步行千里却齊之强兵哉臣所謂以忠信得罪于上者也燕王曰若不忠信耳豈有以忠信而得罪者乎蘇秦曰不然臣聞客有逺為吏而其妻私于人者其夫將来其私者憂之妻曰勿憂吾已作藥酒待之矣居三日其夫果至妻使妾舉藥酒進之妾欲言酒之有藥則恐其逐主母也欲勿言乎則恐其殺主父也于是乎詳僵而棄酒主父大怒笞之五十故妾一僵而覆酒上存主父下存主母然而不免于笞惡在乎忠信之無罪也夫臣之過不幸而類是乎燕王曰先生復就故官益厚遇之易王母文侯夫人也與蘇秦私通燕王知之而事之加厚蘇秦恐誅乃説燕王曰臣居燕不能使燕重而在齊則燕必重燕王曰惟先生之所為于是蘇秦詳為得罪於燕而亡走齊齊宣王以為客卿徐廣曰燕易王之十年時齊宣王卒湣王即位説湣王厚葬以明孝髙宫室大苑囿以明得意欲破敝齊而為燕燕易王卒徐廣曰易王十二年卒燕噲立為王其後齊大夫多與蘇秦爭寵者而使人刺蘇秦不死殊而走風俗通義稱漢令蠻夷戎狄有罪當殊殊者死也與誅同指而此云不死硃而走者蘇秦時雖不即死然是死創故云殊齊王使人求賊不得蘇秦且死乃謂齊王曰臣即死車裂臣以徇于市曰蘇秦為燕作亂于齊如此則臣之賊必得矣于是如其言而殺蘇秦者果自出齊王因而誅之燕聞之曰甚矣齊之為蘇生徐廣曰一作先報仇也蘇秦既死其事大泄齊後聞之乃恨怒燕燕甚恐蘇秦之弟曰代代弟蘇厲見兄遂亦皆學及蘇秦死代乃求見燕王欲襲故事曰臣東周之鄙人也竊聞大王義甚髙鄙人不敏釋鉏耨而于大王至于邯鄲所見者絀于所聞于東周臣竊負其志及至燕廷觀王之羣臣下吏王天下之明王也燕王曰子所謂明王者何如也對曰臣聞明王務聞其過不欲聞其善臣請謁王之過夫齊趙者燕之仇讎也楚魏者燕之援國也今王秦仇讎以伐援國非所以利燕也王自慮之此則計過無以聞者非忠臣也王曰夫齊者固寡人之讎所欲伐也直患國敝力不足也子能以燕伐齊則寡人舉國委子對曰凡天下戰國七燕處弱焉獨戰則不能有所附則無不重南附楚楚重西附秦秦重中附韓魏韓魏重且茍所附之國重此必使王重矣今夫齊長主而自用也南攻楚五年畜聚竭西困秦三年士卒罷敝北與燕人戰覆三軍得二將徐廣曰齊覆三軍而燕失二將然而以其餘兵南面舉五千乗之大宋而包十二諸侯此其君欲得其民力竭惡足取乎且臣聞之數戰則民勞久師則兵敝矣燕王曰吾聞齊有清濟濁河可以為固長城鉅防徐廣曰濟北盧縣有防門又有長城東至海足以為塞誠有之乎對曰天時不與雖有清濟濁河惡足以為固民力罷敝雖有長城鉅防惡足以為塞且異日濟西不師所以備趙也河北不師所以備燕也今濟西河北盡已役矣封内敝矣夫驕君必好利而亡國之臣必貪于財王誠能無羞寵子母弟以為質寳珠玉帛以事左右彼將有徳燕而輕亡宋則齊可亡已燕王曰吾終以子受命于天矣燕乃使一子質于齊而蘇厲因燕質子而求見齊王齊王怨蘇秦欲囚蘇厲燕質子為謝已遂委質為齊臣燕相子之與蘇代㛰而欲得燕權乃使蘇代侍質子于齊齊使代報燕燕王噲問曰齊王其霸乎曰不能曰何也曰不信其臣于是燕主專任子之已而讓位燕大亂齊伐燕殺王噲子之徐廣曰是周赧王之元年時也燕立昭王而蘇代蘇厲遂不敢入燕皆終歸齊齊善待之蘇代過魏魏為燕執代齊使人謂魏王曰齊請以宋地封涇陽君秦必不受秦非不利有齊而得宋地也不信齊王與蘇子也今齊魏不和如此其甚則齊不欺秦秦信齊齊秦合涇陽君有宋地非魏之利也故王不如東蘇子秦必疑齊而不信蘇子矣齊秦不合天下無變伐齊之形成矣于是出蘇代代之宋宋善待之齊伐宋宋急蘇代乃遺燕昭王書曰夫列在萬乗而寄質于齊名卑而權輕奉萬乗助齊伐宋民勞而實費夫破宋殘楚淮北肥大齊讎彊而國害此三者皆國之大敗也然且王行之者將以取信于齊也齊加不信于王而忌燕愈甚是王之計過矣夫以宋加之淮北彊萬乗之國也而齊并之是益一齊也北夷方七百里加之以魯衞彊萬乗之國也而齊并之是益二齊也夫一齊之强燕猶狼顧而不能支今以三齊臨燕其禍必大矣雖然智者舉事因禍為福轉敗為功齊紫敗素也徐廣曰取敗素染以為紫而賈十倍越王句踐棲于會稽復殘彊吳而霸天下此皆因禍為福轉敗為功者也今王若欲因禍為福轉敗為功則莫若挑霸齊而尊之使使盟於周室焚秦符曰其大上計破秦其次必長賔之秦挾賔以待破秦王必患之秦五世伐諸侯今為齊下秦王之志茍得窮齊不憚以國為功然則王何不使辯士以此言説秦王曰燕趙破宋肥齊尊之為之下者燕趙非利之也燕趙不利而勢為之者以不信秦王也然則王何不使可信者接收燕趙令涇陽君髙陵君徐廣曰馮翊髙陵縣先于燕趙秦有變因以為質則燕趙信秦秦為西帝燕為北帝趙為中帝立三帝以令于天下韓魏不聴則秦伐之齊不聴則燕趙伐之天下孰敢不聴天下服聴因驅韓魏以伐齊曰必反宋地歸楚淮北反宋地歸楚淮北趙燕之所利也並立三帝燕趙之所願也夫實得所利尊得所願燕趙棄齊如脱躧矣今不收燕趙齊霸必成諸侯贊齊而王不從是國伐也諸侯贊齊而王從之是名卑也今收燕趙國安而名尊不收燕趙國危而名卑夫去尊安而取危卑智者不為也秦王聞若説必若刺心然則王何不使辯士以此苦言説秦秦必取齊必伐矣夫取秦厚交也伐齊正利也尊厚交務正利聖王之事也燕昭王善其書曰先人嘗有徳蘇氏子之之亂而蘇氏去燕燕欲報仇于齊非蘇氏莫可乃召蘇代復善待之與謀伐齊竟破齊湣王出走久之秦召燕王燕王欲往蘇代約燕王曰楚得枳徐廣曰巴郡有枳縣而國亡徐廣曰燕昭王三十三年秦拔楚鄢齊得宋而國亡齊楚不得以有枳宋而事秦者何也則有功者秦之深讎也秦取天下非行義也暴也秦之行暴正告天下告楚曰蜀地之甲乗舩浮于汶眉貧切乗夏水而下江五日而至郢漢中之甲乗舩出于巴乗夏水而下漢四日而至五渚戰國策曰秦與荆人戰大破荆襲郢取洞庭五渚然則五渚在洞庭寡人積甲宛東下隨智者不及謀勇士不及怒寡人如射隼矣王乃欲待天下之攻函谷不亦逺乎楚王為是故十七年事秦秦正告韓曰我起乎少曲一日而㫁太行我起乎宜陽而觸平陽二日而莫不盡繇我離兩周而觸鄭五日而國舉韓氏以為然故事秦秦正告魏曰我舉安邑塞女㦸韓氏太原卷我下軹道南陽封冀徐廣曰霸陵有軹道亭河東皮氏有冀亭也包兩周徐廣曰張儀曰下河東取城皋也乗夏水浮輕舟强弩在前錟徐廣曰由冉切戈在後決滎口魏無大梁決白馬之口魏無外黄濟陽決宿胥之口徐廣曰紀年曰魏救山塞集胥口魏無虛頓丘徐廣曰秦始皇五年取魏酸棗燕虛長平陸攻則擊河内水攻則滅大梁魏氏以為然故事秦秦欲攻安邑恐齊救之則以宋委于齊曰宋王無道為木人以寫寡人射其面寡人地絶兵逺不能攻也王茍能破宋有之寡人如自得之已得安邑塞女㦸因以破宋為齊罪秦欲攻韓恐天下救之則以齊委于天下曰齊王四與寡人約四欺寡人必率天下以攻寡人者三有齊無秦有秦無齊必伐之必亡之已得宜陽少曲致藺石因以破齊為天下罪秦欲攻魏重楚則以南陽委于楚曰寡人固與韓且絶矣殘均陵塞鄳音肓阨徐廣曰鄳江夏鄳縣均一作灼茍利于楚寡人如自有之魏棄與國而合于秦因以塞鄳阨為楚罪兵困于林中徐廣曰河南苑陵有林鄉重燕趙以膠東委于燕以濟西委于趙趙得講于魏至公子延因犀首屬行而攻趙兵傷于譙石遇敗于陽馬而重魏則以葉蔡委于魏已得講于趙則劫魏不為割困則使太后弟穰侯為和嬴則兼欺舅與母適燕者曰以膠東適趙者曰以濟西適魏者曰以葉蔡適楚者曰以塞鄳阨適齊者曰以宋此必令言如循環用兵如刺蜚母不能制舅不能約龍賈之戰魏襄王五年秦敗我龍賈軍岸門之戰韓宣惠王十九年秦大破我岸門封陵之戰魏哀王十六年秦敗我封陵髙商之戰此戰事不見趙莊之戰趙肅侯二十二年趙莊與秦戰敗秦殺趙莊河西秦之所殺三晉之民數百萬今其生者皆死秦之孤也西河之外上雒之地三川晉國之禍三晉之半秦禍如此其大也而燕趙之秦者皆以争事秦説其主此臣之所大患也燕昭王不行蘇代復重于燕燕使約諸侯從親如蘇秦時或從或不而天下由此宗蘇氏之從約代厲皆以夀死名顯諸侯太史公曰蘇秦兄弟三人皆游説諸侯以顯名其術長於權變而蘇秦被反間以死天下共笑之諱學其術然世言蘇秦多異異時事有類之者皆附之蘇秦夫蘇秦起閭閻連六國從親此其智有過人者吾故列其行事次其時序毋令獨蒙惡聲焉史記集解卷六十九
