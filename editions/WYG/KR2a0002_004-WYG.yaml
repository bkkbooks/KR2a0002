body:
  text: 史記集解卷四宋裴駰撰史記四周本紀第四周后稷名棄其母有邰氏女曰姜原韓詩章句曰姜姓原字或曰姜原諡號也姜原為帝嚳元妃姜原出野見巨人跡心忻然説欲踐之踐之而身動如孕者居期而生子以為不祥棄之隘巷馬牛過者皆辟不踐徙置之林中適㑹山林多人遷之而棄渠中氷上飛鳥以其翼覆薦之姜原以為神遂收養長之初欲棄之因名曰棄棄為兒時忔如巨人之志其㳺戲好種樹麻菽麻菽美及為成人遂好耕農相地之宜宜穀者稼穯焉民皆法則之帝堯聞之舉棄為農師天下得其利有功帝舜曰棄黎民始飢徐廣曰今文尚書云祖飢故此作始飢祖始也爾后稷播時百穀封棄於邰徐廣曰今斄鄉在扶風號曰后稷别姓姬氏禮緯曰祖以履大跡而生后稷之興在陶唐虞夏之際皆有令徳后稷卒山海經大荒經曰黑水青水之間有廣都之野后稷葬焉皇甫謐曰冢去中國三萬里也子不窋立不窋末年夏后氏政衰去稷不務韋昭曰夏大康失國廢稷之官不復務農不窋以失其官而犇戎狄之間不窋卒子鞠立鞠卒子公劉立公劉雖在戎狄之間復修后稷之業務耕種行地宜自漆沮渡渭取材用行者有資居者有畜積民賴其慶百姓懷之多徙而保歸焉周道之興自此始故詩人歌樂思其德公劉卒子慶節立國於􅃎徐廣曰新平漆縣之東北有􅃎亭慶節卒子皇僕立皇僕卒子差弗立差弗卒子毁隃立音踰世本作榆毁隃卒子公非立公非卒子髙圉立宋忠曰高圉能率稷者也周人報之髙圉卒子亞圉立世本云亞圉雲都皇甫謐云雲都亞圉字亞圉卒子公叔祖類立分叔祖類卒子古公亶父立古公亶父復修后稷公劉之業積徳行義國人皆戴之薰育戎狄攻之欲得財物予之已復攻欲得地與民民皆怒欲戰古公曰有民立君將以利之今戎狄所為攻戰以吾地與民民之在我與其在彼何異民欲以我故戰殺人父子而君之予不忍為乃與私屬遂去􅃎渡漆沮徐廣曰水在杜陽岐山杜陽縣在扶風踰梁山止於岐下徐廣曰山在扶風美陽西北其南有周原駰案皇甫謐曰邑於周地故始改國曰周􅃎人舉國扶老攜弱盡復歸古公於岐下及他旁國聞古公仁亦多歸之於是古公乃貶戎狄之俗而營築城郭室屋而邑别居之徐廣曰分别而為邑落也作五官有司禮記曰天子之五官曰司徒司馬司空司士司寇典司五衆鄭𤣥曰此殷時制民皆歌樂之頌其徳古公有長子曰太伯次曰虞仲太姜生少子季厯季厯娶太任列女傳曰太姜有台氏之女太任摯任氏之中女皆賢婦人生昌有聖瑞古公曰我世當有興者其在昌乎長子太伯虞仲知古公欲立季厯以傳昌乃二人亡如荆蠻文身斷髮應劭曰常在水中故斷其髮文其身以象龍子故不見傷害以讓季厯古公卒季厯立是為公季公季修古公遺道篤於行義諸侯順之公季卒皇甫謐曰葬鄠縣之南山子昌立是為西伯西伯曰文王遵后稷公劉之業則古公公季之法篤仁敬老慈少禮下賢者日中不暇食以待士士以此多歸之伯夷叔齊在孤竹應劭曰在遼西令支聞西伯善養老盍徃歸之太顛閎夭散宜生鬻子辛甲大夫之徒皆徃歸之劉向别録曰鬻子名熊封於楚辛甲故殷之臣事紂葢七十五諫而不聽去至周召公與語賢之告文王文王親也自迎之以為公卿封長子長子今上黨所治縣是崇侯虎譖西伯於殷紂曰西伯積善累徳諸侯皆嚮之將不利於帝帝紂乃囚西伯於羑里閎夭之徒患之乃求有莘氏美女驪戎之文馬有熊九駟他竒怪物因殷嬖臣費仲而獻之紂紂大説曰此一物足以釋西伯况其多乎乃赦西伯賜之弓矢斧鉞使西伯得征伐曰譖西伯者崇侯虎也西伯乃獻洛西之地以請紂去炮烙之刑紂許之西伯隂行善諸侯皆來決平於是虞芮之人地理志虞在河東太陽縣芮在馮翊臨晋縣有獄不能決乃如周入界耕者皆讓畔民俗皆讓長虞芮之人未見西伯皆慙相謂曰吾所爭周人所恥何徃為祗取辱耳遂還俱讓而去諸侯聞之曰西伯葢受命之君明年伐犬戎山海經曰有人人面獸身名曰犬戎明年伐宻須應劭曰宻須氏姞姓之國瓉曰安定隂宻縣是明年敗耆國徐廣曰一作􅀈殷之祖伊聞之懼以告帝紂紂曰不有天命乎是何能為明年伐邗徐廣邘城在野王縣西北音于明年伐崇侯虎而作豐邑徐廣曰豐在京兆鄠縣東有靈臺鎬在上林昆明北甫鎬池去豐二十五里皆在長安南數十里自岐下而徙都豐明年西伯崩徐廣曰文王九十七乃崩太子發立是為武王西伯葢即位五十年其囚羑里葢益易之八卦為六十四卦詩人道西伯葢受命之年稱王而斷虞芮之訟後十年而崩諡為文王改法度制正朔矣追尊古公為太王公季為王季葢王瑞自太王興武王即位太公望為師周公旦為輔召公畢公之徒左右王師修文王緒業九年武王上祭於畢馬融曰畢文王墓地名也東觀兵至于盟津徐廣曰譙周云史記武王十一年東觀兵十三年克紂為文王木主載以車中軍武王自稱太子發言奉文王以伐不敢自專乃告司馬司徒司空諸節馬融曰諸受符節冇司也齊栗信哉予無知以先祖有徳臣小子受先功徐廣曰一云子小子受先公功畢力賞罰以定其功遂興師師尚父號曰鄭𤣥曰號今之軍法重者總爾衆庶與爾舟楫後至者斬武王渡河中流白魚躍入王舟中馬融曰魚者介鱗之物兵象也白者殷家之正色言殷之兵衆與周之象也武王俯取以祭既渡有火自上復于下至于王屋流為烏其色赤其聲魄云馬融曰王屋王所居屋流行也魄然安定意也鄭𤣥曰書説云烏有孝名武王卒父大業故烏瑞臻赤者周之正色也是時諸侯不期而會盟津者八百諸侯諸侯皆曰紂可伐矣武王曰女未知天命未可也乃還師歸居二年聞紂昬亂暴虐滋甚殺王子比干囚箕子太師疵少師強抱其樂器而犇周於是武王徧告諸侯曰殷有重罪不可以不畢伐徐廣曰一作滅乃遵文王遂率戎車三百乘虎賁三千人孔安國曰虎賁勇士稱也若虎賁言其猛也甲士四萬五千人以東伐紂十一年十二月戊午師畢渡盟津諸侯咸會曰孳孳無怠武王乃作太誓告于衆庶今殷王紂乃用其婦人之言自絶于天毁壞其三正馬融曰動逆天地人也離逷其王父母弟鄭𤣥曰王父母弟祖父母之族必言母弟舉親者言之也乃斷棄其先祖之樂乃為淫聲用變亂正聲怡説婦人徐廣曰怡一作辭故今予發維共行天罰勉哉夫子鄭𤣥曰夫子丈夫之前不可再不可三二月徐廣曰一作正此建丑之月殷之正月周之二月也甲子昧爽孔安國曰昧㝠也爽明早旦也武王朝至于商郊牧野乃誓孔安國曰癸亥夜陳甲子朝誓之武王左杖黃鉞右秉白旄孔安國曰鉞以黃金飾斧左手杖鉞示无事於誅右手把旄示有事於教令以麾曰遠矣西土之人孔安國曰勞苦之武王曰嗟我有國冢君馬融曰冢大也司徒司馬司空亞旅師氏孔安國曰亞次旅衆大夫也其位次卿師氏大夫官以兵守門千夫長百夫長孔安國曰師率卒率及庸蜀羌髳微纑彭濮人孔安國曰八國皆蠻夷戎狄𦍑在西蜀叟髳微在巴蜀纑彭在西北庸濮在江漢之南馬融曰武王所率將來伐紂也稱爾戈比爾干立爾矛予其誓王曰古人有言牝雞無晨牝雞之晨惟家之索孔安國曰索盡也喻婦人知外事雌代雄鳴則家盡也今殷王紂維婦人言是用自棄其先祖肆祀不答鄭𤣥曰肆祭名答問也昬棄其家國遺其王父母弟不用乃維四方之多罪逋逃是崇是長是信是使孔安國曰言紂棄其賢臣而尊長逃亡罪人信用之也俾暴虐於百姓以姦軌于商國今予發維共行天之罰今日之事不過六步七步乃止齊焉孔安國曰今日戰事不過六步七步乃止相齊言當旅進一心也夫子勉哉不過於四伐五伐六伐七伐乃止齊焉孔安國曰伐謂擊刺也少則四五多則六七以為例也勉哉夫子尚桓桓鄭𤣥曰威武貎如虎如羆如犲如離徐廣曰此訓與螭同于商郊不禦克犇以役西土鄭𤣥曰禦彊禦謂彊暴也克殺也不得暴殺紂師之犇走者當以為周之役也勉哉夫子爾所不勉其于爾身有戮鄭𤣥曰所言且也誓已諸侯兵會者車四千乘陳師牧野帝紂聞武王來亦發兵七十萬人距武王武王使師尚父與百夫致師周禮環人掌致師鄭𤣥曰致師者致其必戰之志也古者將戰先使勇力之士犯敵焉春秋傳曰楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還樂伯曰吾聞致師者左射以菆代御執轡御下掚馬掉鞅而還攝叔曰吾聞致師者右入壘折馘執俘而還皆行其所聞而復以大卒馳帝紂師徐廣曰帝一作商紂師雖衆皆無戰之心心欲武王亟入紂師皆倒兵以戰以開武王武王馳之紂兵皆崩畔紂紂走反入登于鹿臺之上䝉衣其珠玉自燔于火而死武王持大白旗以麾諸侯諸侯畢拜武王武王乃揖諸侯諸侯畢從武王至商國商國百姓咸待於郊於是武王使羣臣告語商百姓曰上天降休商人皆再拜稽首武王亦荅拜遂入至紂死所武王自射之三發而后下車以輕劍擊之以黄鉞斬紂頭縣大白之旗已而至紂之嬖妾二女二女皆經自殺武王又射三發擊以劍斬以𤣥鉞司馬法曰夏執𤣥鉞宋均曰𤣥鉞用鐵不磨礪縣其頭小白之旗武王已乃出復軍其明日除道修社及商紂宫及期百夫荷罕旗以先驅蔡邕獨斷曰前驅有九旒雲罕東京賦曰雲罕九旒薛綜曰旍旗名武王弟叔振鐸奉陳常車周公旦把大鉞畢公把小鉞以夾武王散宜生太顛閎夭皆執劍以衛武王既入立于社南大卒之左右畢從毛叔叔鄭奉明水周禮曰司烜氏以鑑取明水於月鄭𤣥曰鑑鏡屬也取月之水欲得陰陽之絜氣陳眀水以為𤣥酒也衞康叔封布兹徐廣曰兹者籍席之名諸侯病曰負兹召公奭贊采師尚父牽牲尹佚筴祝曰殷之末孫季紂殄廢先王明徳侮蔑神祗不祀昬暴商邑百姓其章顯聞于天皇上帝於是武王再拜稽首曰膺更大命革殷受天明命武王又再拜稽首乃出封商紂子禄父殷之餘民武王為殷初定未集乃使其弟管叔鮮蔡叔度相禄父治殷已而命召公釋箕子之囚徐廣曰釋一作原命畢公釋百姓之囚表商容之閭命南宫括散鹿臺之財發鉅橋之粟以振貧弱萌隸命南宫括史佚展九鼎保玉徐廣曰保一作寳命閎夭封比干之墓命宗祝享祠于軍乃罷兵西歸行狩記政事作武成孔安國曰武功成也封諸侯班賜宗彝作分殷之器物鄭𤣥曰宗彞宗廟樽也作分器著王之命及受物武王追思先聖王乃褒封神農之後於焦地理志𢎞農陜縣有焦城故焦國也黃帝之後於祝帝堯之後於薊地理志燕國有薊縣帝舜之後於陳大禹之後於杞於是封功臣謀士而師尚父為首封封尚父於營丘曰齊爾雅曰水出其前而左曰營丘郭璞曰今齊之營丘淄水過其南乃東封弟周公旦於曲阜曰魯應劭曰曲阜在魯城中委曲長七八里封召公奭於燕封弟叔鮮於管弟叔度於蔡餘各以次受封武王徵九牧之君登􅃎之阜以望商邑武王至于周自夜不寐周公旦即王所曰􅂚為不寐王曰告女維天不享殷自發未生於今六十年麋鹿在牧徐廣曰此事出周書及隨巢子云夷羊在牧牧郊也夷羊怪物也蜚鴻滿野天不享殷今乃冇成維天建殷其登名民三百六十夫不顯亦不賔滅徐廣曰一云不顧亦不賓滅一又云不顧亦不恤也以至今我未定天保何暇寐王曰定天保依天室悉求天惡貶從殷王受日夜勞來徐廣曰一云肯來定我西土我維顯服及徳方明自洛汭延于伊汭居易毋固其有夏之居徐廣曰夏居河南初在陽城後居陽翟我南望三塗北望嶽鄙顧詹有河徐廣曰周書度邑曰武王問太公曰吾將因冇夏之居也南望過于三塗北詹望于冇河粤詹雒伊毋遠天室營周居于雒邑而後去縱馬於華山之陽放牛於桃林之虚孔安國曰桃林在華山東偃干戈振兵釋旅公羊傳曰入曰振旅示天下不復用也武王已克殷後二年問箕子殷所以亡箕子不忍言殷惡以存徐廣曰一作前亡國宜告武王王亦醜故問以天道武王病天下未集羣公懼穆卜孔安國曰穆敬也周公乃祓齋自為質欲代武王武王有瘳後而崩徐廣曰封禪書曰武王克殷二年天下未寧而崩皇甫謐曰武王定位元年歲在乙酉六年庚寅崩駰案皇覽曰文王武王周公冢皆在京兆長安鎬聚東社中也太子誦代立是為成王成王少周初定天下周公恐諸侯畔周公乃攝行政當國管叔蔡叔羣弟疑周公與武庚作亂畔周周公奉成王命伐誅武庚管叔放蔡叔以微子開代殷後國於宋頗收殷餘民以封武王少弟封為衛康叔晉唐叔得嘉穀鄭𤣥曰二苗同為一穗獻之成王成王以歸周公于兵所徐廣曰歸一作餽周公受禾東土魯天子之命徐廣曰尚書序云旅天子之命初管蔡畔周周公討之三年而畢定故初作大誥次作微子之命孔安國曰封命之書次歸禾次嘉禾次康誥酒誥梓材孔安國曰告康叔以為政之道亦如梓人之治材也其事在周公之篇周公行政七年成王長周公反政成王北面就羣臣之位成王在豐使召公復營洛邑如武王之意周公復卜申視卒營築居九鼎焉曰此天下之中四方入貢道里均作召誥洛誥成王既遷殷遺民周公以王命告作多士無佚召公為保周公為師東伐淮夷殘奄鄭𤣥曰奄國在淮夷之北遷其君薄姑馬融曰齊地成王自奄歸在宗周作多方孔安國曰告衆方天下諸侯既絀殷命襲淮夷歸在豐作周官孔安國曰言周家設官分職用人之法古文尚書敘周官書篇名興正禮樂度制於是改而民和睦頌聲興何休曰頌聲者太平歌頌之聲帝王之髙致也成王既伐東夷息慎來賀王賜榮伯作賄息慎之命孔安國曰賄賜也馬融曰榮伯周同姓畿内諸侯為卿大夫也成王將崩懼太子釗之不任乃命召公畢公率諸侯以相太子而立之成王既崩二公率諸侯以太子釗見於先王廟申告以文王武王之所以為王業之不易務在節儉毋多欲以篤信臨之作顧命鄭𤣥曰臨終出命故謂之顧顧將去之意也太子釗遂立是為康王康王即位徧告諸侯宣告以文武之業以申之作康誥故成康之際天下安寧刑錯四十餘年不用應劭曰錯置也民不犯法無所置刑康王命作策畢公分居里成周郊孔安國曰分别民之居里異其善惡也成定東周郊境使有保䕶也作畢命康王卒子昭王瑕立昭王之時王道微缺昭王南廵狩不返卒於江上其卒不赴告諱之也立昭王子滿是為穆王穆王即位春秋已五十矣王道衰微穆王閔文武之道缺乃命伯臩孔安國曰伯冏名也申誡徐廣曰一作部太僕應劭曰太僕周穆王所置葢太御衆僕之長中大夫也國之政作臩命復寧穆王將征犬戎徐廣曰犬一作畎祭公謀父諫韋昭曰祭畿内之國周公之後為王卿士謀父字也曰不可先王耀徳不觀兵夫兵戢而時動動則威觀則玩玩則無震韋昭曰震懼也是故周文公之頌韋昭曰文公周公旦之諡曰載戢干戈載櫜弓矢唐固曰櫜韜也我求懿徳肆于時夏允王保之韋昭曰言武王常求美徳故陳其功於是夏而歌之信哉武王能保此時夏之美樂章大者曰夏先王之於民也茂正其徳而厚其性阜其財求而利其器用明利害之鄉韋昭曰鄉方也以文修之使之務利而辟害懷徳而畏威故能保世以滋大昔我先王世后稷韋昭曰謂棄與不窋也唐固曰父子相繼曰世以服事虞夏及夏之衰也棄稷不務我先王不窋用失其官而自竄於戎狄之間不敢怠業時序其徳遵修其緒徐廣曰遵一作選修其訓典朝夕恪勤守以敦篤奉以忠信奕世載徳不忝前人至于文王武王昭前之光明而加之以慈和事神保民無不欣喜商王帝辛大惡于民庶民不忍訢載武王以致戎于商牧是故先王非務武也勤恤民隱而除其害也夫先王之制邦内甸服邦外侯服侯衛賔服韋昭曰此總言之也侯侯圻衛衛圻也夷蠻要服戎翟荒服甸服者祭韋昭曰供日祭侯服者祀韋昭曰供月祀賔服者享韋眧曰供時享要服者貢韋昭曰供歲貢荒服者王韋昭曰王王事天子也詩云莫敢不來王日祭月祀時享歲貢終王先王之順祀也徐廣曰外傳云先王之訓有不祭則修意韋昭曰先修志意以自責也畿内近知王意也有不祀則修言韋昭曰言號令也有不享則修文韋昭曰文典法也有不貢則修名韋昭曰名謂尊卑職貢之名號也有不王則修徳韋昭曰遠人不服則修文徳以來之序成而有不至則修刑韋昭曰序成謂上五者次序已成有不至則有刑罰也於是有刑不祭伐不祀征不享讓不貢告不王於是有刑罰之辟有攻伐之兵有征討之備有威讓之命有文告之辭布令陳辭而有不至則增修於徳無勤民於遠是以近無不聽遠無不服今自大畢伯士之終也徐廣曰犬戎之君犬戎氏㠯其職來王天子曰予必㠯不享征之且觀之兵無乃廢先王之訓而王幾頓乎吾聞犬戎樹敦徐廣曰樹一作椒駰案韋昭曰樹立也言犬戎立性敦篤也率舊徳而守終純固其有㠯禦我矣王遂征之得四白狼四白鹿㠯歸自是荒服者不至諸侯有不睦者甫侯言於王作修刑辟鄭𤣥曰書説云周穆王以甫侯為相王曰吁來有國有士告汝祥刑孔安國曰告汝善用刑之道也在今爾安百姓何擇非其人王肅曰訓以安百姓之道當何所選擇乎非當選擇賢人乎何敬非其刑何居非共宜與孔安國曰當何所敬非唯五刑乎當何所居非唯及世輕重所宜也兩造具備徐廣曰造一作遭師聽五辭孔安國曰兩謂囚證造至也兩至具備則衆獄官聽其入五刑辭五辭簡信正於五刑孔安國曰五辭簡核信有罪驗則正之於五刑矣五刑不簡正於五罰孔安國曰不簡核謂不贖應五刑當正五罰出金罪也五罰不服正於五過孔安國曰不服不應罰也正於五過從赦免之五過之疵官獄内獄閲實其罪孔安國曰使與罰名相當惟鈞其過馬融曰以此五過出入人罪與犯法者等五刑之疑有赦五罰之疑有赦其審克之孔安國曰刑疑赦從罰罰疑赦從免其當清察能得其理也簡信有衆惟訊有稽孔安國曰簡核誠信有合衆心惟察其貌有所考合重之至也無簡不疑共嚴天威孔安國曰無簡核誠信不聽治其獄當嚴敬天威無輕用刑黥辟疑赦其罰百率徐廣曰率即鍰也音刷孔安國曰六兩曰鍰鍰黄鐵也閲實其罪劓辟疑赦其罰倍灑徐廣曰一作五倍曰蓰孔安國曰倍百為二百鍰也閲實其罪臏辟疑赦其罰倍差馬融曰倍二百為四百鍰也差者又加四百之三分一凡五百三十三三分一也閲實其罪宫辟疑赦其罰五百徐廣曰一作六率閲實其罪大辟疑赦其罰千率閲實其罪罰之屬千劓罰之屬千臏罰之屬五百宫罰之屬三百大辟之罰其屬二百五刑之屬三千命曰甫刑穆王立五十五年崩子共王繄扈立共王㳺於涇上密康公從韋昭曰康公密國之君姬姓也有三女犇之其母曰必致之王列女傳曰康公母姓隗氏夫獸三為羣人三為衆女三為粲王田不取羣公行不下衆王御不參一族韋昭曰御妻宫也參三也一族一父子也故取姪娣以備三不參一族之女也夫粲美之物也衆以美物歸女而何徳以堪之王猶不堪況爾之小醜乎小醜備物終必亡康公不獻一年共王滅密共王崩子懿王囏立懿王之時王室遂衰詩人作刺懿王崩共王弟辟方立是為孝王孝王崩諸侯復立懿王太子燮是為夷王夷王崩子厲王胡立厲王即位三十年好利近榮夷公大夫芮良夫諫厲王曰王室其將卑乎夫榮公好專利而不知大難夫利百物之所生也天地之所載也而有專之其害多矣天地百物皆將取焉何可專也所怒甚多而不備大難以是教王王其能乆乎夫王人者將導利而布之上下者也使神人百物無不得極韋昭曰極中也猶日怵惕懼怨之來也故頌曰思文后稷克配彼天立我蒸民莫匪爾極大雅曰陳錫載周唐固曰言文王布錫施利以載成周道也是不布利而懼難乎故能載周以至於今今王學專利其可乎匹夫專利猶謂之盜王而行之其歸鮮矣榮公若用周必敗也厲王不聽卒以榮公為卿士用事王行暴虐侈傲國人謗王召公諫曰韋昭曰召康公之後穆公虎為王卿士也民不堪命矣王怒得衛巫韋昭曰衛國之巫也使監謗者以告則殺之其謗鮮矣諸侯不朝三十四年王益嚴國人莫敢言道路以目韋昭曰以目相眄而已厲王喜告召公曰吾能弭謗矣乃不敢言召公曰是鄣之也防民之口甚於防水水壅而潰傷人必多民亦如之是故為水者決之使導為民者宣之使言故天子聽政使公卿至於列士獻詩瞽獻典韋昭曰典樂典史獻書師箴瞍賦韋昭曰无眸子曰瞍賦公卿列士所獻詩也矇誦韋昭曰有眸子而無見曰矇周禮矇主絃歌諷誦箴諫之語也百工諫庶人傳語韋昭曰庶人卑賤見時得失不得言傳以語士近臣盡規近臣驂僕之屬親戚補察瞽史教誨瞽樂太師史太史也耆艾修之韋昭曰耆艾師傅也修理瞽史之教以聞於王而后王斟酌焉是以行事而不悖民之有口也猶土之有山川也財用於是乎出猶其有原隰衍沃也唐固曰下平曰衍冇溉曰沃衣食於是乎生口之宣言也善敗於是乎興行善而備敗所以産財用衣食者也夫民慮之於心而宣之於口成而行之若壅其口其與能㡬何王不聽於是國莫敢出言三年乃相與畔襲厲王厲王出犇於彘韋昭曰彘晉地漢為縣屬河東今曰永安厲王太子靜匿召公之家國人聞之乃圍之召公曰昔吾驟諫王王不從以及此難也今殺王太子王其以我為讐而懟怒乎夫事君者險而不讐懟韋昭曰在危險之中怨而不怒況事王乎乃以其子代王太子太子竟得脱召公周公二相行政號曰共和共和十四年厲王死于彘太子靜長於召公家二相乃共立之為王是為宣王宣王即位二相輔之修政法文武成康之遺風諸侯復宗周十二年魯武公來朝宣王不修籍於千畆虢文公諫曰賈逵曰文公文王母弟虢仲之後為王卿士也韋昭曰文公虢叔之後西虢也宣王都鎬在畿内也不可王弗聽三十九年戰于千畆王師敗績于羌氏之戎韋昭曰西夷别種四嶽之後也宣王既亡南國之師乃料民於太原韋昭曰敗於姜戎時所亡也南國漢江之間料數也唐固曰南國南陽也仲山甫諫曰民不可料也宣王不聽卒料民四十六年宣王崩子幽王宫涅立徐廣曰一作生幽王二年西周三川皆震徐廣曰涇渭洛也駰案韋昭曰西周鎬京地震動故三川亦動伯陽甫曰周將亡矣韋昭曰伯陽甫周大夫也唐固曰伯陽甫周柱下史老子也夫天地之氣不失其序若過其序民亂之也韋昭曰過失也言民不敢斥王者也陽伏而不能出隂迫而不能蒸韋昭曰蒸升也陽氣在下隂氣迫之使不能升也於是有地震今三川實震是陽失其所而塡隂也韋昭曰為隂所鎮笮也陽失而在隂韋昭曰在陰下也原必塞原塞國必亡夫水土演而民用也韋昭曰水土氣通為演演猶潤也演則生物民得用之土無所演民乏財用不亡何待昔伊洛竭而夏亡韋昭曰禹都陽城伊洛所近也河竭而商亡韋昭曰商人都衛河水所經也今周徳若二代之季矣其川原又塞塞必竭夫國必依山川山崩川竭亡國之徵也川竭必山崩韋昭曰水泉不潤枯朽而崩也若國亡不過十年數之紀也韋昭曰數起於一終於十十則更故曰紀也天之所棄不過其紀是歳也三川竭岐山崩三年幽王嬖愛褎姒襃姒生子伯服幽王欲廢太子太子母申侯女而為后後幽王得襃姒愛之欲廢申后并去太子宜臼以襃姒為后以伯服為太子周太史伯陽讀史記曰周亡矣昔夏后氏之衰也有二神龍止於夏帝庭而言曰余襃之二君虞翻曰龍自號襃之二先君也夏帝卜殺之與去之與止之莫吉卜請其漦而藏之乃吉韋昭曰漦龍所吐沬沬龍之精氣也於是布幣而策告之韋昭曰以簡策之書告龍而請其漦也龍亡而漦在櫝而去之韋昭曰櫝匱也夏亡傳此器殷殷亡又傳此器周比三代莫敢發之至厲王之末虞翻曰末年王流彘之歲發而顴之漦流于庭不可除厲王使婦人裸而譟之章昭曰譟讙呼也唐固曰羣呼曰譟漦化為𤣥黿以入王後宫後宫之童妾既齓而遭之韋昭曰毁齒曰齓女七歲而毁也既笄而孕無夫而生子懼而棄之宣王之時童女謡曰檿弧箕服實亡周國韋昭曰山桑曰檿弧弓也箕木名服矢房也於是宣王間之有夫婦賣是器者宣王使執而戮之逃於道而見鄉者後宫童妾所棄妖子徐廣曰妖一作夭夭幼少也出於路者聞其夜啼哀而收之夫婦遂亡犇於襃襃人有罪請入童妾所棄女子者於王以贖罪棄女子出於襃是為襃姒當幽王三年王之後宫見而愛之生子伯服竟廢申后及太子以襃姒為后伯服為太子太史伯陽曰禍成矣無可奈何襃姒不好笑幽王欲其笑萬方故不笑幽王為㷭㸂大鼓有寇至則舉烽火諸侯悉至至而無寇襃姒乃大笑幽王説之為數舉烽火其後不信諸侯益亦不至幽王以虢石父為卿用事國人皆怨石父為人佞巧徐廣曰佞一作諂善䛕好利王用之又廢申后去太子也申侯怒與繒西夷犬戎攻幽王幽王舉烽火徴兵兵莫至遂殺幽王驪山下虜襃姒盡取周賂而去汲冢紀年曰自武王滅殷以至幽王凡二百五十七年也於是諸侯乃即申侯而共立故幽王太子宜臼是為平王以奉周祀平王立東遷於雒邑辟戎寇平王之時周室衰微諸侯強并弱齊楚秦晉始大政由方伯周禮曰九命作伯鄭衆云諸侯為方伯四十九年魯隱公即位五十一年平王崩太子洩父蚤死立其子林是為桓王桓王平王孫也桓王三年鄭莊公朝桓王不禮五年鄭怨與魯易許田許田天子之用事太山田也八年魯殺隱公立桓公十三年伐鄭鄭射傷桓王桓王去歸二十三年桓王崩子莊王佗立莊王四年周公黑肩欲殺莊王而立王子克賈逵曰莊王弟子儀也辛伯告王賈逵曰辛伯周大夫也王殺周公王子克犇燕十五年莊王崩子釐王胡齊立釐王三年齊桓公始霸五年釐王崩子惠王閬立惠王二年初莊王嬖姬姚生子穨穨有寵及惠王即位奪其大臣園以為囿左傳曰大臣蒍國也故大夫邊伯等五人作亂左傳曰五人者蒍國邊伯詹父子禽祝跪也謀召燕衛師伐惠王惠王犇温已居鄭之櫟服䖍曰櫟鄭大都立釐王弟穨為王樂及徧舞賈逵曰徧舞皆舞六代之樂也鄭虢君怒四年鄭與虢君伐殺王穨復入惠王惠王十年賜齊桓公為伯二十五年惠王崩子襄王鄭立襄王母早死後母曰惠后左傳曰陳媯歸于京師實惠后也惠后生叔帶有寵於惠王襄王畏之三年叔帶與戎翟謀伐襄王襄王欲誅叔帶叔帶犇齊齊桓公使管仲平戎于周使隰朋平戎于晉服䖍曰戎伐周晉伐戎救周故和也王以上卿禮管仲管仲辭曰臣賤有司也有天子之二守國髙在杜預曰國子髙子天子所命為齊守臣皆上卿也若節春秋來承王命何以禮焉賈逵曰節時也王肅曰春秋聘享之節也陪臣敢辭服䖍曰陪重也諸侯之臣於天子故曰陪臣王曰舅氏余嘉乃勲賈逵曰舅氏言伯舅之使也毋逆朕命管仲卒受下卿之禮而還九年齊桓公卒十二年叔帶復歸于周左傳曰王召之十三年鄭伐滑賈逵曰滑姬姓之國駰案左傳曰滑人叛鄭而服於衛也王使游孫伯服請滑賈逵曰二子周大夫鄭人囚之鄭文公怨惠王之入不與厲公爵服䖍曰惠王以后之鞶鍳與之厲公而獨與虢公王爵又怨襄王之與衛滑服䖍曰滑小國近鄭世世服從而更違叛鄭師伐之聼命後自愬於王王以與衛故囚伯服王怒將以翟伐鄭富辰諫服䖍曰富辰周大夫曰凡我周之東徙晉鄭焉依子穨之亂又鄭之由定今以小怨棄之王不聽十五年王降翟師以伐鄭王德翟人將以其女為后富辰諫曰平桓莊惠皆受鄭勞王棄親親翟不可從王不聽十六年王絀翟后翟人來誅殺譚伯唐固曰譚伯周大夫原伯毛伯也富辰曰吾數諫不從如是不出王以我為懟乎乃以其屬死之初惠后欲立王子帶故以黨開翟人翟人遂入周襄王出犇鄭鄭居王於汜杜預曰鄭南汜在襄城縣南子帶立為王取襄王所絀翟后與居温十七年襄王告急于晉晉文公納王而誅叔帶襄王乃賜晉文公珪鬯弓矢為伯以河内地與晉二十年晉文公召襄王襄王會之河陽踐土賈逵曰河陽晉之温也踐土鄭地名在河内諸侯畢朝書諱曰天王狩于河陽左傳曰仲尼曰以臣召君不可以訓故書曰狩二十四年晉文公卒三十一年秦穆公卒三十二年襄王崩子項王壬臣立頃王六年崩子匡王班立匡王六年崩弟瑜立是為定王定王元年楚莊王伐陸渾之戎地理志陸渾縣屬宏農郡次洛使人問九鼎王使王孫滿應設以辭賈逵曰王孫滿周大夫也楚兵乃去十年楚莊王圍鄭鄭伯降已而復之十六年楚莊王卒二十一年定王崩子簡王夷立簡王十三年晉殺其君厲公迎子周於周立為悼公十四年簡王崩子靈王泄心立靈王二十四年齊崔杼弑其君莊公二十七年靈王崩皇覽曰靈王冢在河南城西南栢亭西周山上葢以靈王生而有髭而神故諡靈王共冡民祀之不絶子景王貴立景王十八年后太子聖而早卒二十年景王愛子朝賈逵曰景王之長庶子欲立之㑹崩皇覽曰景王冢在洛陽太倉中秦封吕不韋洛陽十萬户故大其城并圍景王冢也子丏之黨與爭立國人立長子猛為王子朝攻殺猛猛為悼王晉人攻子朝而立丏是為敬王賈逵曰敬王猛母弟敬王元年晉人入敬王子朝自立敬王不得入居澤賈逵曰澤邑周地也四年晉率諸侯入敬王于周子朝為臣春秋曰子朝犇楚皇覽曰子朝冡在南陽西鄂縣今西鄂晁氏自謂子晁後也諸侯城周十六年子朝之徒復作亂敬王犇于晉十七年晉定公遂入敬王于周三十九年齊田常殺其君簡公四十一年楚滅陳孔子卒四十二年敬王崩徐廣曰皇甫謐曰敬王四十四年元己卯崩壬戌也子元王仁立徐廣曰世本云貞王介也元王八年崩子定王介立徐廣曰世本云元王赤也皇甫謐曰元王十一年癸未三晉滅智伯二十八年崩王子爭立立應為貞王定王十六年三晉滅智伯分有其地二十八年定王崩徐廣曰皇甫謐曰貞定王十年元癸亥崩壬申長子去疾立是為哀王哀王立三月弟叔襲殺哀王而自立是為思王思王立五月少弟嵬攻殺思王而自立是為考王此三王皆定王之子考王十五年崩徐廣曰皇甫謐曰考悊王元辛丑崩乙卯子威烈王午立考王封其弟于河南是為桓公以續周公之官職桓公卒子威公代立威公卒子惠公代立乃封其少子于鞏徐廣曰惠公之子也以奉王號東周惠公威烈王二十三年九鼎震命韓魏趙為諸侯二十四年崩徐廣曰皇甫謐曰元丙辰崩己卯駰案宋忠曰威烈王葬洛陽城中東北隅也子安王驕立是歲盜殺楚聲王安王立二十六年崩皇甫謐曰安王元庚辰崩乙巳子烈王喜立烈王二年周太史儋見秦獻公曰始周與秦國合而别别五百載復合應劭曰周孝王封伯翳之後為侯伯與周别五百載至昭王時西周君臣自歸受罪獻其邑三十六城合也韋昭曰周封秦為始别謂秦仲也五百歲謂從秦仲至孝公強大顯王致伯與之親合也合十七歲而霸王者出焉徐廣曰從此後十七年而秦昭王立駰案韋昭曰武王昭王皆伯至始皇而王天下十年烈王崩弟扁立是為顯王顯王五年賀秦獻公獻公稱伯九年致文武胙於秦孝公胙膰肉也左傳曰王使宰孔賜齊侯胙曰天子冇事于文武二十五年秦會諸侯於周二十六年周致伯於秦孝公三十三年賀秦惠王三十五年致文武胙於秦惠王四十四年秦惠王稱王其後諸侯皆為王四十八年顯王崩子慎靚王定立愼靚王立六年崩子赧王延立王赧時東西周分治王赧徙都西周西周武公徐廣曰惠公之長子之共太子死有五庶子母適立司馬翦謂楚王曰不如以地資公子咎為請太子左成曰不可周不聽是公之知困而交疏於周也不如請周君孰欲立以微告翦翦請令楚賀之以地果立公子咎為太子八年秦攻宜陽楚救之而楚以周為秦故將伐之蘇代為周説楚王曰何以周為秦之禍也言周之為秦甚於楚者欲令周入秦也故謂周秦也周知其不可解必入於秦此為秦取周之精者也為王計者周於秦因善之不於秦亦言善之以疏之於秦周絶於秦必入於郢矣秦借道兩周之間將以伐韓周恐借之畏於韓不借畏於秦史厭謂周君曰何不令人謂韓徐廣曰一作可應劭曰氏姓注云以何姓為韓後公叔曰秦之敢絶周而伐韓者信東周也公何不與周地發質使之楚秦必疑楚不信周是韓不伐也又謂秦曰韓強與周地將以疑周於秦也周不敢不受秦必無辭而令周不受是受地於韓而聽於秦秦召西周君西周君惡往故令人謂韓王曰秦召西周君將以使攻王之南陽也王何不出兵於南陽周君將以為辭於秦周君不入秦秦必不敢踰河而攻南陽矣東周與西周戰韓救西周或為東周説韓王曰西周故天子之國多名器重寶王案兵毋出可以德東周而西周之寶必可以盡矣王赧謂成君楚圍雍氏徐廣曰陽翟雍氏城也戰國䇿曰韓兵入西周西周令成辯説秦求救當是説此亊而脱誤也韓徵甲與粟於東周東周君恐召蘇代而告之代曰君何患於是臣能使韓毋徴甲與粟於周又能為君得髙都徐廣曰今河南新城縣髙都城也周君曰子茍能請以國聽子代見韓相國曰漢書百官表曰相國秦官駰謂韓亦冇相國然則諸國共攻秦也楚圍雍氏期三月也今五月不能拔是楚病也今相國乃徵甲與粟於周是告楚病也韓相國曰善使者己行矣代曰何不與周髙都韓相國大怒曰吾毋徵甲與粟於周亦已多矣何故與周髙都也代曰與周髙都是周折而入於韓也秦聞之必大怒忿周即不通周使是以弊髙都得完周也曷為不與相國曰善果與周髙都三十四年蘇厲謂周君曰秦破韓魏扑師武徐廣曰扑一作仆戰國䇿曰秦敗魏將犀武於伊闕北取趙藺離石者地理志曰西河有趙藺離石二縣皆白起也是善用兵又有天命今又將兵出塞攻梁梁破則周危矣君何不令人説白起乎曰楚有養由基者善射者也去柳葉百步而射之百發而百中之左右觀者數千人皆曰善射有一夫立其旁曰善可教射矣養由基怒釋弓搤劍曰客安能教我射乎客曰非吾能教子支左絀右也夫去栁葉百步而射之百發而百中之不以善息少焉氣衰力倦弓撥矢鉤一發不中者百發盡息今破韓魏扑師武北取趙藺離石者公之功多矣今又將兵出塞過兩周倍韓攻梁一舉不得前功盡棄公不如稱病而無出四十二年秦破華陽約徐廣曰一作厄馬犯謂周君曰請令梁城周乃謂梁王曰周王病若死則犯必死矣犯請以九鼎自入于王王受九鼎而圖犯梁王曰善遂與之卒言戍周因謂秦王曰梁非戍周也將伐周也王試出兵境以觀之秦果出兵又謂梁王曰周王病甚矣犯請後可而復之今王使卒之周諸侯皆生心後舉事且不信不若令卒為周城以匿事端梁王曰善遂使城周四十五年周君之秦客謂周最曰公不若譽秦王之孝因以應為太后養地徐廣曰地理志云應今潁川父城縣應鄉是也秦王必喜是公有秦交交善周君必以為公功交惡勸周君入秦者必有罪矣秦攻周而周最謂秦王曰為王計者不攻周攻周實不足以利聲畏天下天下以聲畏秦必東合於齊兵弊於周合天下於齊則秦不王矣天下欲弊秦勸王攻周秦與天下弊則令不行矣五十八年三晉距秦周令其相國之秦以秦之輕也還其行客謂相國曰秦之輕重未可知也秦欲知三國之情公不如急見秦王曰請為王聽東方之變秦王必重公重公是秦重周周以取秦也齊重則固有周聚徐廣曰一作最最亦古之聚字以收齊是周常不失重國之交也秦信周發兵攻三晉五十九年秦取韓陽城負黍徐廣曰陽城有負黍聚西周恐倍秦與諸侯約文穎曰關東為從關西為横孟康曰南北為從東西為横瓚曰以利合曰從以威勢相脅曰横將天下鋭師出伊闕攻秦令秦無得通陽城秦昭王怒使將軍摎漢書百官表曰前後左右將軍皆周末官也攻西周西周君犇秦頓首受罪盡獻其邑三十六口三萬秦受其獻歸其君於周周君王赧卒宋忠曰諡曰西周武公周民遂東亡秦取九鼎寶器而遷西周公於􅓆狐徐廣曰􅓆音憚􅓆狐聚與陽人聚相近在洛陽南百五十里梁新城之間後七歳秦莊襄王滅東西周徐廣曰周比亡之時凡七縣河南洛陽穀城平隂偃師蛩緱氏東西周皆入于秦周既不祀皇甫謐曰周凡三十七王八百六十七年太史公曰學者皆稱周伐紂居洛邑綜其實不然武王營之成王使召公卜居居九鼎焉而周復都豐鎬至犬戎敗幽王周乃東徙于洛邑所謂周公葬我畢畢在鎬東南杜中徐廣曰一作社秦滅周漢興九十有餘載天子將封泰山東巡狩至河南求周苗裔封其後嘉三十里地號曰周子南君瓚曰汲冢古文謂衛將軍文子為子南彌牟其後冇子南勁朝于魏後惠成王如衛命子南為侯秦并六國衛最為後疑嘉是衛後故氏子南而稱君也比列侯以奉其先祭祀徐廣曰自周亡乙巳至元鼎四年戊辰一百四十四年漢之九十四年也漢武元鼎四年封周後也史記集解卷四
