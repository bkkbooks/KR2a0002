body:
  text: 史記集解卷一百十七宋裴駰撰史記一百十七司馬相如列傳第五十七司馬相如者蜀郡成都人也字長卿少時好讀書學擊劒故其親名之曰犬子相如既學慕藺相如之為人更名相如以貲為郎事孝景帝為武騎常侍非其好也㑹景帝不好辭賦是時梁孝王來朝從游說之士齊人鄒陽淮隂枚乘呉莊忌夫子之徒徐廣曰名忌字夫子相如見而說之因病免客遊梁梁孝王令與諸生同舍相如得與諸生游士居數嵗乃著子虛之賦㑹梁孝王卒相如歸而家貧無以自業素與臨卭令王吉相善吉曰長卿乆宦游不遂而來過我於是相如乃舍都亭臨卭令繆為恭敬日往朝相如相如初尚見之後稱病使從者謝吉吉愈益謹肅臨卭中多富人而卓王孫家僮八百人程鄭亦數百人二人乃相謂曰令有貴客為具召之并召令令既至卓氏客以百數至日中謁司馬長卿長卿謝病不能往臨卭令不敢嘗食自往迎相如相如不得已強往一坐盡傾酒酣臨卭令前奏琴曰竊聞長卿好之願以自娯相如辭謝為鼓一再行是時卓王孫有女文君新寡好音故相如繆與令相重而以琴心挑之郭璞曰以琴中音挑動之相如之臨卭從車騎雍容閒雅甚都韋昭曰閒讀曰閑甚得都邑之容也郭璞曰都猶姣也詩曰洵羙且都及飲卓氏弄琴文君竊從户窺之心悅而好之恐不得當也既罷相如乃使人重賜文君侍者通殷勤文君夜亡奔相如相如乃與馳歸成都家居徒四壁立郭璞曰言貧窮也卓王孫大怒曰女至不材我不忍殺不分一錢也人或謂王孫王孫終不聽文君乆之不樂曰長卿第俱如臨卭從昆弟假貸猶足為生何至自苦如此相如與俱之臨卭盡賣其車騎買一酒舍酤酒而令文君當鑪韋昭曰鑪酒肆也以土為墮邉髙似鑪相如身自著犢鼻褌韋昭曰今三尺布作形如犢鼻矣稱此者言其無恥也今銅印言犢鈕此其類矣與保庸雜作方言曰保庸調之南方奴婢賤稱也滌器於市中韋昭曰瓦器也每食必滌溉者卓王孫聞而恥之為杜門不出昆弟諸公郭璞曰諸公父行也更謂王孫曰有一男兩女所不足者非財也今文君已失身於司馬長卿長卿故倦游郭璞曰厭游宦也雖貧其人材足依也且又令客獨奈何相辱如此卓王孫不得已分予文君僮百人錢百萬及其嫁時衣被財物文君及與相如歸成都買田宅為富人居乆之蜀人楊得意為狗監侍上郭璞曰主獵犬也上讀子虚賦而善之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如自言為此賦上驚乃召問相如相如曰有是然此乃諸侯之事未足觀也請為天子游獵賦賦成奏之上許令尚書給筆札相如以子虚虛言也為楚稱郭璞曰稱說楚之美烏有先生者徐廣曰烏一作惡烏有此事也為齊難郭璞曰詰難楚事也無是公者無是人也明天子之義郭璞曰以為折中之談也故空藉此三人為辭以推天子諸侯之苑囿其卒章歸之於節儉因以風諫奏之天子天子大說其辭曰楚使子虚使於齊齊王悉發境内之士備車騎之衆與使者出田田罷子虛過詫烏有先生郭璞曰詫誇也音詫夏反而無是公在焉坐定烏有先生問曰今日田樂乎子虛曰樂獲多乎曰少然則何樂曰僕樂齊王之欲夸僕以車騎之衆而僕對以雲夢之事也曰可得聞乎子虛曰可王駕車千乘選徒萬騎田於海濱列卒滿澤罘罔彌山郭璞曰罘罝也音浮揜轔鹿射麋脚鱗徐廣曰轔音吝駰案郭璞曰脚掎足轔車轢騖於鹽浦割鮮染輪郭璞曰鹽浦海邊地多鹽鹵鮮生肉也染擩也音而㳂反又音而兌反擩之於輪鹽而食之騖馳也音務射中獲多矜而自功顧謂僕曰楚亦有平原廣澤遊獵之地饒樂若此者乎楚王之獵何與寡人郭璞曰與猶如也僕下車對曰臣楚國之鄙人也幸得宿衛十有餘年時從出遊遊於後園覽於有無然猶未能遍覩也又惡足以言其外澤者乎齊王曰雖然畧以子之所聞見而言之僕對曰唯唯臣聞楚有七澤嘗見其一未覩其餘也臣之所見葢特其小小者耳名曰雲夢雲夢者方九百里其中有山焉其山則盤紆茀鬱隆崇嵂崒岑巖參差日月蔽虧漢書音義曰髙山壅蔽日月虧􅆙半見交錯糾紛上干青雲罷池陂陁下屬江河其土則丹青赭堊徐廣曰一作瑕雌黄白坿徐廣曰音符駰案漢書音義曰白符白石英也錫碧金銀衆色炫燿照爛龍鱗郭璞曰如龍之鱗采其石則赤玉玟瑰郭璞曰赤瑾也見楚辭玟瑰石珠也琳瑉琨珸漢書音義曰琳球也瑉石次玉者琨珸山名也出善金尸子曰昆吾之金者瑊玏𤣥厲徐廣曰瑊音古咸反玏音勒皆次玉者駰案漢書音義曰𤣥厲黒石可用磨者瑌石武夫徐廣曰石似玉駰案漢書音義曰瑌石出雁門武夫出長沙也其東則有蕙圃衡蘭芷若射干穹窮昌蒲漢書音義曰衡杜衡也其狀若葵其臰若糜蕪芷白芷若杜若江離麋蕪諸蔗猼且徐廣曰猼音匹沃反駰案漢書音義曰江離香草麋蕪蘄芷也似蛇牀而香諸蔗甘柘也猼且蘘荷也其南則有平原廣澤登降陁靡音移糜案衍壇曼縁以大江限以巫山郭璞曰巫山今在建平巫縣也其髙燥則生葴䔮苞荔徐廣曰葴音針馬監也䔮或曰草生水中華可食荔音力詣反草似蒲駰案漢書音義曰苞藨也薛莎青薠徐廣曰薛音先結反駰案漢書音義曰薛頼蒿也莎鎬侯也青薠似莎而大也音煩其卑溼則生藏莨蒹葭東薔雕胡徐廣曰烏桓國有薔似蓬草實如葵子十月熟駰案漢書音義曰藏似薍而葉大莨莨尾草也蒹薕也葭蘆也蓮藕菰蘆徐廣曰生水中奄閭軒芊漢書音義曰奄閭蒿也軒芊蕕草也衆物居之不可勝圗郭璞曰圗畫也其西則有涌泉清池激水推移外發芙蓉菱華内𨼆巨石白沙其中則有神龜蛟鼉瑇瑁鼈黿其北則有隂林巨樹郭璞曰林在山北隂地楩柟豫章郭璞曰楩把也似梓柟葉似桑豫章大木也生七年乃可知也桂椒木蘭檗離朱楊徐廣曰檗音扶戾反駰案郭璞曰木蘭樹皮辛香可食漢書音義曰離山梨朱楊赤楊也樝梸梬栗橘柚芬芳徐廣曰梬音郢駰案漢書音義曰梬梬棗也其上則有赤猨蠼蝚徐廣曰音劬柔鴛鶵孔鸞騰逺射干郭璞曰鴛鶵鳯屬也孔孔雀鸞鸞鳥也漢書音義曰騰逺鳥名射干似狐能縁木其下則有白虎𤣥豹蟃蜒貙豻郭璞曰蟃蜒大獸長百尋貙似貍而大漢書音義曰豻胡地野犬似狐而小也兕象野犀窮竒獌狿於是乃使専諸之倫手格此獸楚王乃駕馴駁之駟漢書音義曰馴擾也駁如馬白身黒尾一角鋸牙食虎而駕之以當駟馬也乘雕玉之輿靡魚須之橈旃郭璞曰以海魚須為旒旌言橈弱也通帛為旃也曳明月之珠旗漢書音義曰以明月珠綴飾旗建干將之雄㦸漢書音義曰干將韓王劒師雄㦸胡中有􅟉干將所造也左烏嘷之雕弓右夏服之勁箭徐廣曰韋昭曰夏夏屏也矢室名曰服吕静曰歩义謂之服也陽子驂乘纎阿為御漢書音義曰陽子僊人陽陵子纎阿月御也韋昭曰陽子古賢也按節未舒即陵狡獸轔卭卭蹵距虚郭璞曰卭卭似馬而青距虚即卭卭變文互言之穆天子傳曰卭卭距虚日走五百里也軼野馬而􅗗騊駼徐廣曰􅗗音鋭駰案郭璞曰野馬如馬而小騊駼似馬􅗗車軸頭乘遺風而射游騏漢書音義曰遺風千里馬爾雅曰巂如馬一角不角者騏也儵眒淒浰徐廣曰淒音七見反浰音力詣反駰案漢書音義曰皆疾也靁動熛至星流霆擊弓不虚發中必決眥韋昭曰在目所指中必決于眼眥也洞胸逹腋絶乎心繫獲若雨獸掩草蔽地於是楚王乃弭節裵回郭璞曰或云節今之所杖信節也翺翔容與覽乎隂林觀壯士之暴怒與猛獸之恐懼徼􅚏受詘徐廣曰􅚏音劇駰案郭璞曰􅚏疲極也詘盡也言獸有倦游者則徼而取之殫睹衆物之變態於是鄭女曼姬郭璞曰曼姬謂鄧曼姬婦人之總稱被阿錫漢書音義曰阿細繒也錫布也揄紵縞徐廣曰揄音臾雜纎羅垂露縠郭璞曰言細如露垂以覆頭襞積褰縐紆徐委曲鬱撓谿谷漢書音義曰襞積簡齰也褰縮也縐裁也其縐中文理茀鬱囬曲有似於谿谷也衯衯裶裶楊袘䘏削徐廣曰袘音迤衣袖也駰案漢書音義曰䘏削裁制貎也蜚纎巫髾徐廣曰纎音芟駰案郭璞曰纎袿衣飾髾髻髾也扶與猗靡郭璞曰淮南所謂曽折磨地扶與猗委也噏呷萃蔡漢書音義曰噏呷衣裳張起也萃蔡衣聲也下摩蘭蕙上拂羽葢錯翡翠之威蕤徐廣曰錯音措或作錯紛翠蕤繆繞玉綏郭璞曰綏所執以登車縹乎忽忽若神僊之彷彿於是乃相與獠於蕙圃郭璞曰獠獵也音遼媻珊勃窣上金堤掩翡翠射鵕䴊漢書音義曰鵕䴊鳥似鳯也㣲矰出纎繳施徐廣曰繳音斫弋白鵠連駕鵞郭璞曰野鵞也駕音加雙鶬下𤣥鶴加郭璞曰詩云弋言加之是也怠而後發游於清池浮文鷁漢書音義曰鷁水鳥也畫其象於船首淮南子曰龍舟鷁首天子之乘也楊桂枻徐廣曰音曳駰案韋昭曰枻檝也張翠帷建羽葢罔瑇瑁釣紫貝郭璞曰紫貝黒文也樅金鼓吹鳴􅄜漢書音義曰樅撞也􅄜簫也榜人歌郭璞曰唱櫂歌也榜船也音謗聲流喝徐廣曰烏邁反水蟲駭波鴻沸涌泉起奔揚㑹礧石相擊硠硠􅐀􅐀若靁霆之聲聞乎數百里之外將息獠者擊靈鼓郭璞曰靈鼓六面也起烽燧車案行騎就隊纚乎淫淫班乎裔裔郭璞曰皆羣行貎也於是楚王乃登陽雲之臺徐廣曰宋玉云楚王游於陽雲之臺駰案郭璞曰在雲夢之中泊乎無為澹乎自持勺藥之和具而後御之郭璞曰勺藥五味也不若大王終日馳騁而不下輿脟割輪淬自以為娯徐廣曰淬千内反駰案郭璞曰脟􅈩淬染也脟音臠也臣竊觀之齊殆不如於是王黙然無以應僕也烏有先生曰是何言之過也足下不逺千里來况齊國郭璞曰言有恵況也王悉發境内之士而備車騎之衆以出田乃欲戮力致獲以娯左右也何名為夸哉問楚地之有無者願聞大國之風烈先王之餘論也今足下不稱楚王之徳厚而盛推雲夢以為髙奢言淫樂而顯侈靡竊為足下不取也必若所言固非楚國之美也有而言之是章君之惡無而言之是害足下之信章君之惡而傷私義二者無一可而先生行之必且輕於齊而累於楚矣且齊東有巨海南有琅琊郭璞曰山名在琅邪縣界觀乎成山徐廣曰在東萊不夜縣射乎之罘漢書音義曰之罘山在牟平縣射獵其上也浮渤澥漢書音義曰海别枝名也游孟諸郭璞曰宋之藪澤名邪與肅慎為鄰右以湯谷為界秋田乎青丘傍偟乎海外郭璞曰青丘山名亦有田出九尾狐在海外矣吞若雲夢者八九其於胸中曽不蔕芥乃俶儻瑰偉異方殊類珍怪鳥獸萬端鱗萃充仭其中者不可勝記禹不能名契不能計然在諸侯之位不敢言游戱之樂苑囿之大先生又見客是以王辭而不能復何為無用應哉無是公听然而笑郭璞曰听然笑貌也曰楚則失矣齊亦未為得也夫使諸侯納貢者非為財幣所以述職也郭璞曰諸侯朝於天子曰述職言述所職見孟子封疆畫界者非為守禦所以禁淫也郭璞曰禁絶淫放也今齊列為東藩而外私肅慎捐國踰限越海而田其於義固未可也且二君之論不務明君臣之義而正諸侯之禮徒事争游獵之樂苑囿之大欲以奢侈相勝荒淫相越此不可以揚名發譽而適足以貶君自損也且夫齊楚之事又焉足道邪君未睹夫巨麗也獨不聞天子之上林乎左蒼梧右西極郭璞曰西極國也見爾雅丹水更其南漢書音義曰丹水出上洛冡領山紫淵徑其北郭璞曰紫淵所未詳終始霸滻出入徑渭酆鄗潦潏郭璞曰皆水流貎音決紆餘委蛇經營乎其内蕩蕩乎八川分流相背而異態郭璞曰八川名在上東西南北馳騖往來出乎椒丘之闕行乎洲淤之浦郭璞曰椒丘丘名言有巖闕也見楚辭淤亦洲名蜀人云見方言徑乎桂林之中郭璞曰桂林林名也見南海經過乎泱莾之野漢書音義曰山海經所謂大荒之野汨乎渾流順阿而下郭璞曰阿大陵赴隘陜之口觸穹石激堆埼郭璞曰穹隆伏石貎堆沙堆埼曲岸頭音祈沸乎暴怒洶許勇反涌音勇滂浦横反㵒浦拜反滭浡滵汨湢測泌瀄郭璞曰逼側筆櫛四音横流逆折轉騰潎洌澎濞沆瀣穹隆雲橈蜿灗膠戾踰波趨浥徐廣曰烏狹反莅莅下瀬批巖衝壅犇揚滯沛臨坁注壑瀺灂霣墜湛湛徐廣曰湛音沈𨼆𨼆砰磅訇􅐀潏潏淈淈湁潗鼎沸郭璞曰湁音敕立反潗音緝馳波跳沬徐廣曰一云吸呷汨濦漂疾悠逺長懐寂漻無聲肆乎永歸然後灝溔潢漾安翔徐􅆦翯乎滈滈東注太湖衍溢陂池於是乎蛟龍赤螭䱎䲛螹離徐廣曰螹音漸駰案郭璞曰䱎䲛鮪也音亘瞢螹離未聞鰅鱅鰬魠徐廣曰鰅音娯皮有文出樂浪鰬音䖍魠音託多口魚駰案郭璞曰鱅似鰱而黒漢書音義曰鰬似鯉而大也禺禺鱋魶徐廣曰禺禺魚牛也鱋一作魼音榻魶音納一作􅀈駰案漢書音義曰魼比目魚也魶鯷魚揵鰭擢尾搌鱗奮翼濳處於深巖魚鼈歡聲萬物衆夥明月珠子玓瓅江靡郭璞曰靡崖也蜀石黄碝郭璞曰碝石黄色也水玉磊砢郭璞曰水玉水精也磷磷爛爛采色澔旰叢積乎其中鴻鵠鷫鴇􅀈䳘鸀鳿郭璞曰鷫鷫霜鸀鳿似鴨而大長頸赤目紫紺色也􅀈􅪦䴋目徐廣曰䴋環煩鶩鷛􅀈徐廣曰煩鶩一作番䴌鷛音容駰案漢書音義曰煩鶩鳬也鷛􅀈似鶩灰色而雞足􅀈䳄鵁鸕徐廣曰􅀈音斟水鳥也䳄音斯鵁音火交反駰案漢書音義曰􅀈䳄蒼黒色郭璞曰鵁魚鵁也脚近尾鸕鸕鷀也羣浮乎其上汎淫泛濫隨風澹淡與波揺蕩掩薄草渚唼喋菁藻郭璞曰菁水草吕氏春秋曰太湖之精也咀嚼蔆藕於是乎崇山巃嵸崔巍嵳峩深林鉅木嶄巖嵾嵳九嵏嶻嶭南山峩峩漢書音義曰九嵏山在左馮翊谷口縣西嶻嶭山在池陽縣北巖陁音遲甗錡嶊崣崫崎郭璞曰陁崖際甗音魚晩反錡音蟻嶊音作罪反振谿通谷蹇産溝瀆漢書音義曰蹇産屈折也谽呀豁閜郭璞曰皆澗谷之形容也谽音呼含反呀音呼加反閜音呼下反􅎧陵别島崴磈嵔瘣丘墟崫藟𨼆轔鬱􅕲登降施靡陂池貏豸郭璞曰貏音衣被豸音蟲豸也沇溶淫鬻散渙夷陸亭臯千里靡不被築郭璞曰言為亭候於臯隰皆築地令平賈山所謂𨼆以金椎也掩以緑蕙被以江離糅以蘪蕪雜以流夷漢書音義曰流夷新夷也専結縷徐廣曰専古布字一作怖駰案漢書音義曰結縷似白茅蔓聨而生布種之者攢戾莎徐廣曰草可染紫揭車衡蘭槀本射干徐廣曰揭音桀駰案郭璞曰揭車一名乞與槀本槀苃射干十月生皆香草茈薑蘘荷葴橙若蓀郭璞曰葴未詳橙柚若蓀皆香草也鮮枝黄礫郭璞曰皆未詳蔣芧青薠徐廣曰芧音佇駰案漢書音義曰蔣菰也芧三稜布濩閎澤延曼大原麗靡廣衍應風披靡吐芳揚烈郭璞曰香酷烈也郁郁斐斐衆香發越􅆄蠁布寫䁆瞹苾勃於是乎周覽泛觀瞋盼軋沕徐廣曰瞋音丑人反盼一作緡駰案郭璞曰皆不可分貎芒芒恍忽視之無端察之無崖日出東沼入於西陂其南則隆冬生長踊水躍波獸則􅥠旄獏犛徐廣曰􅥠音容獸類也犛音狸一音茅駰案郭璞曰旄旄牛獏似熊痺脚銳頭犛牛黒色出西南徼外也沈牛麈麋漢書音義曰沈牛水牛也赤首圜題郭璞曰題額也所未詳窮竒象犀漢書音義曰窮竒狀如牛而蝟毛其音如嘷狗食人也其北則盛夏含凍裂地渉氷揭河郭璞曰言水漫凍不解地拆裂也揭蹇衣獸則騏驎角􅗧郭璞曰角􅗧音端似豬角在鼻上堪作弓李陵嘗以此弓十張遺蘇武也騊駼橐駞蛩蛩驒騱駃騠驢騾於是乎離宫别館彌山跨谷髙廊四注重坐曲閣郭璞曰重坐重軒也曲閣閣道曲也華榱璧璫輦道纚屬歩櫩周流長途中宿郭璞曰途樓閣間陛道中宿言長逺也夷嵏築堂纍臺増成巖突洞房郭璞曰嵏山名平之以安堂其上成亦重也周禮曰為壇三成在岩穴底為室潜通臺上者俛杳眇而無見仰攀橑而捫天奔星更於閨闥宛虹拖於楯軒徐廣曰楯音食尹反青虯蚴蟉於東箱象輿婉蟬於西清漢書音義曰山出象輿瑞應車也郭璞曰西清西箱清凈地也靈圉燕於間觀郭璞曰靈圉淳圉僊人名也偓佺之倫暴於南榮漢書音義曰偓佺僊人名也醴泉涌於清室通川過乎中庭槃石祳崖徐廣曰祳音脣嶔巖倚傾嵳峩磼礏徐廣曰峩一作池磼音雜礏音五合反刻削峥嶸玟瑰碧琳珊瑚叢生瑉玉旁唐璸斒文鱗徐廣曰璸音彬斒音斑赤瑕駁犖雜臿其間徐廣曰雜一云插插一云遝垂綏琬琰和氏出焉徐廣曰垂綏一作朝采駰案郭璞曰汲冡竹書曰桀伐岷山得女二人曰琬曰琰桀愛二女斲其名于苕華之玉苕是琬華是琰也於是乎盧橘夏孰郭璞曰今蜀中有給客橙似橘而非若抽而芬香冬夏華實相繼或如彈丸或如拳通嵗食之即盧橘也黄甘橙楱徐廣曰音湊橘屬枇杷橪柿徐廣曰橪音而善反果也楟㮈厚朴徐廣曰楟音亭山梨梬棗楊梅徐廣曰梬音弋井反梬枣似柿櫻桃蒲陶郭璞曰蒲陶似燕薁可作酒也𨼆夫鬱棣榙􅭭荔枝徐廣曰鬱一作薁榙音荅駰案郭璞曰鬱車下李也棣實似櫻桃荅􅭭似李棣音逮􅭭音㳫𨼆夫未聞羅乎後宫列乎北園䝯丘陵郭璞曰䝯猶延也音施下平原揚翠葉杌紫莖郭璞曰杌揺也發紅華秀朱榮煌煌扈扈照曜鉅野沙棠櫟櫧漢書音義曰沙棠似棠黄華赤實其味如李吕氏春秋曰果之美者沙棠之實櫟果名櫧似樜葉冬不落也華汜檘櫨徐廣曰汜一作楓駰案漢書音義曰華木皮可以為索也留落胥餘仁頻并閭徐廣曰頻一作賔駰案郭璞曰落穫也胥餘一似并閭并閭㯶也皮可作索餘未詳欃檀木蘭豫章女貞漢書音義曰欃檀檀别名也女貞木葉冬不落長千仭大連抱夸條直暢實葉葰茂攢立叢倚連卷累佹崔錯癹骩古委字阬衡閜砢徐廣曰癹音拔駰案郭璞曰骩音委閜音惡可反砢音魯可反垂條扶於落英幡纚郭璞曰扶於猶扶踈也幡纚偏幡也音灑紛容蕭蔘旖旎從風瀏莅芔吸徐廣曰莅音栗葢象金石之聲管籥之音柴池茈虒徐廣曰柴音差虒音彖旋轘後宫雜遝累輯徐廣曰雜一作插被山縁谷循阪下隰視之無端究之無窮於是𤣥猿素雌蜼玃飛鸓徐廣曰蜼音于季反駰案漢書音義曰蜼似獼猴仰鼻而長尾玃似獼猴而大飛鸓飛䑕也其狀如而䑕首以其􅐖飛也蛭蜩蠗蝚徐廣曰蛭音質駰案漢書音義曰山海經曰不咸之山有飛蛭四翼郭璞曰蠗蝚似獼猴而黄蜩未聞螹胡豰蛫徐廣曰螹音在㢘反似猿黒身豰音呼谷反蛫音詭駰案漢書音義曰豰白狐子也棲息乎其間長嘯哀鳴翩幡互經夭矯枝格偃蹇杪顛於是乎隃絶梁騰殊榛捷垂條踔稀間郭璞曰踔縣蹢也記釣反牢落陸離爛漫逺遷若此軰者數千百處嬉游往來宫宿館客庖厨不徙後宫不移百官備具於是乎背秋渉冬天子挍獵乘鏤象六玉虯徐廣曰以玉為飾駰案郭璞曰鏤象山所出輿言有雕鏤虯龍屬也韓子曰黄帝駕象車六交龍是也拖蜺旌靡雲旗前皮軒後道游郭璞曰皮軒革車也或曰即曲禮前有士師則載虎皮者也道道車游游車皆見周禮也孫叔奉轡衛公驂乗漢書音義曰孫叔者太僕公孫賀也衛公者衞青也太僕御大將軍驂乘也扈從横行出乎四挍之中郭璞曰言跋扈縱恣不安鹵簿矣鼓嚴簿縱獠者漢書音義曰鼓嚴嚴鼔也簿鹵簿也駰謂鼔嚴於林薄之中然後縱獠也江河為阹泰山為櫓郭璞曰櫓望樓也因山谷遮禽獸為阹音去車反車騎靁起𨼆天動地先後陸離離散别追淫淫裔裔縁陵流澤雲布雨施生貔豹郭璞曰貔執夷虎屬也音毗搏豺狼手熊羆足野羊郭璞曰野羊如羊千斤手足謂拍蹹殺人蒙鶡蘇徐廣曰蘇尾也絝白虎徐廣曰絝音袴駰案郭璞曰絝謂絆絡之被􅃎文郭璞曰著斑衣跨野馬陵三嵏之危漢書音義曰三嵏三成之山下磧歴之坻郭璞曰磧歴阪名也俓陵赴險越壑厲水推蜚㢘郭璞曰飛㢘龍雀也鳥身鹿頭者弄解豸漢書音義曰解豸似鹿而一角人君刑罰得中則生於朝廷主觸不直者可得而弄也格瑕蛤鋌猛氏漢書音義曰瑕蛤猛氏皆獸名罥騕褭射封豕郭璞曰騕褭神馬日行萬里封豕大豬兩音窈嫋箭不苟害解脰䧟腦弓不虚發應聲而倒於是乎乘輿彌節裴囬翺翔往來睨部曲之進退覽將率之變態然後浸潭促節儵夐逺去郭璞曰夐音詡盛反流離輕禽蹵履狡獸轊白鹿捷狡徐廣曰轊音鋭一作惠也軼赤電遺光耀徐廣曰超陵赤電電光不及言去速也追怪物出宇宙彎繁弱滿白羽射游梟櫟蜚虡郭璞曰梟梟羊也似人長脣及踵被髪食人飛虡鹿頭龍身神獸櫟梢也擇肉後發先中命處弦矢分藝殪仆徐廣曰射準的曰藝仆音赴然後揚節而上浮陵驚風歴駭飈乘虚無與神俱轔𤣥鶴亂昆鷄徐廣曰轔音躪遒孔鸞促鵔鸃拂鷖鳥捎鳯皇漢書音義曰山海經云九疑之山有五采之鳥名曰鷖鳥也捷鴛鶵掩焦明焦明似鳯道盡塗殫逥車而還招揺乎襄羊降集乎北紘郭璞曰紘維也北方之紘曰委羽率乎直指闇乎反鄉蹷石闕歴封巒過䧴鵲望露寒徐廣曰䧴音支駰案漢書音義曰皆甘泉左右觀名也下棠梨漢書音義曰宫名也在雲陽縣東南三十里息宜春西馳宣曲濯鷁牛首漢書音義曰宣曲宫名在昆明池西牛首池名在上林苑西頭登龍臺漢書音義曰觀名在豐水西北近渭掩細栁觀士大夫之勤畧鈞獵者之所得獲徐廣曰鈞一作診也觀徒車之所轔轢乗騎之所蹂若徐廣曰蹂音人久反人民之所蹈躤與其窮極倦谻徐廣曰音劇驚憚慴伏不被創刃而死者佗佗籍籍填坑滿谷掩平彌澤於是乎游戱懈怠置酒乎昊天之臺張樂乎轇輵之宇徐廣曰輵音葛撞千石之鐘立萬石之鉅建翠華之旗樹靈鼉之鼓郭璞曰木貫鼔中加羽葆其上所謂樹鼓奏陶唐氏之舞聽葛天氏之歌漢書音義曰葛天氏古帝王之號也吕氏春秋曰葛天氏之樂三人操牛尾投足以歌千人唱萬人和山陵為之震動徐廣曰一作勲川谷為之蕩波巴俞宋蔡淮南于遮郭璞曰巴西閬中有俞水獠人居其上皆剛勇好舞漢髙募以平三秦後使樂府習之因名巴俞舞也駰案漢書音義曰于遮歌曲名文成顛歌郭璞曰未聞也族舉逓奏徐廣曰舉一作居金鼓迭起鏗鏘鐺䶀洞心駭耳郭璞曰鐺䶀鼓名荆呉鄭衛之聲韶䕶武象之樂隂淫案衍之音鄢郢繽紛激楚結風郭璞曰激楚歌曲也列女傳曰聽激楚之遺風也俳優侏儒狄鞮之倡徐廣曰韋昭曰狄鞮地名也在河内出善倡者所以娛耳目而樂心意者麗靡爛漫於前靡曼美色於後若夫青琴宓妃之徒漢書音義曰皆古神女也絶殊離俗妖冶嫻都靚莊刻飾便嬛綽約郭璞曰靘莊粉白黛黒也柔橈嬛嬛徐廣曰音娟娬媚姌嫋徐廣曰姌音乃丹反嫋音弱抴獨繭之褕袘徐廣曰抴音曳襜褕眇閻易以戌削徐廣曰閻易衣長貎戍削言如刻畫作之媥姺徶㣯郭璞曰衣服婆娑貎與世殊服芬香漚鬱酷烈淑郁皓齒粲爛宜笑的皪長眉連娟㣲睇緜藐色授魂與心愉於側於是酒中樂酣天子芒然而思似若有亡曰嗟乎此泰奢侈朕以覽聽餘閒無事棄日順天道以殺伐時休息於此恐後世靡麗遂往而不返非所以為繼嗣創業垂統也於是乃解酒罷獵而命有司曰地可以墾辟悉為農郊以贍萌隸隤牆填􅢾使山澤之民得至焉實陂池而勿禁虚宫觀而勿仭發倉廩以賑貧窮補不足恤鰥寡存孤獨出徳號省刑罰改制度易服色更正朔與天下為始於是厯吉日以齋戒襲朝衣乗法駕建華旗鳴玉鸞游乎六藝之囿鶩乎仁義之途覽觀春秋之林郭璞曰春秋所以觀成敗明善惡者射狸首兼騶虞禮射義曰天子以騶虞為節諸侯以貍首為節騶虞者樂官備也狸首者樂㑹時也弋𤣥鶴建干戚載雲䍐掩羣雅漢書音義曰大雅小雅也悲伐檀樂樂胥修容乎禮園翺翔于書圃述易道放怪獸登明堂坐清廟恣羣臣奏得失四海之内靡不受獲於斯之時天下大說嚮風而聽隨流而化喟然興道而遷義刑錯而不用徳隆乎三皇功美於五帝若此故獵乃可喜也若夫終日暴露馳騁勞神苦形罷車馬之用抗士卒之精費府庫之財而無徳厚之恩務在獨樂不顧衆庶忘國家之政而貪雉之獲則仁者不由也從此觀之齊楚之事豈不哀哉地方不過千里而囿居九百是草木不得墾辟而民無所食也夫以諸侯之細而樂萬乗之所侈僕恐百姓之被其尤也於是二子愀然改容超若自失逡巡避席曰鄙人固陋不知忌諱乃今日見教謹聞命矣賦奏天子以為郎無是公言天子上林廣大山谷水泉萬物及子虚言楚雲夢所有甚衆侈靡過其實且非義理所尚故刪取其要歸正道而論之相如為郎數嵗㑹唐蒙使畧通夜郎西僰中徐廣曰羌之别種也音扶逼反發巴蜀吏卒千人郡又多為發轉漕萬餘人用興法漢書曰用軍興法也誅其渠帥巴蜀民大驚恐上聞之乃使相如責唐蒙等因諭告巴蜀民以非上意檄曰告巴蜀太守蠻夷自擅不討之日乆矣時侵犯邉境勞士大夫陛下即位存撫天下輯安中國然後興師出兵北征匈奴單于怖駭交臂受事詘膝請和康居西域重譯請朝稽首來享移師東指閩越相誅右弔番禺太子入朝南夷之君西僰之長常效貢職不敢怠墮延頸舉踵喁喁然皆争歸義欲為臣妾道里遼逺山川阻深不能自致夫不順者已誅而為善者未賞故遣中郎將往賔之發巴蜀士民各五百人以奉幣帛衛使者不然靡有兵革之事戰鬬之患今聞其乃發軍興制驚懼子弟憂患長老却又擅為轉粟運輸皆非陛下之意也當行者或亡逃自賊殺亦非人臣之節也夫邉郡之士聞烽舉燧燔漢書音義曰烽如覆米䉛縣著桔橰頭有冦則舉之燧積薪有冦則燔然之皆攝弓而馳荷兵而走流汗相屬唯恐居後觸白刃冐流矢義不反顧計不旋踵人懐怒心如報私讐彼豈樂死惡生非編列之民而與巴蜀異主哉計深慮逺急國家之難而樂盡人臣之道也故有剖符之封析珪而爵位為通侯居列東第終則遺顯號於後世傳土地於子孫行事甚忠敬居位甚安佚名聲施於無窮功烈著而不滅是以賢人君子肝腦塗中原膏液潤野草而不辭也今奉幣役至南夷即自賊殺或亡逃抵誅身死無名諡為至愚恥及父母為天下笑人之度量相越豈不逺哉然此非獨行者之罪也父兄之教不先子弟之率不謹也寡㢘鮮恥而俗不長厚也其被刑戮不亦宜乎陛下患使者有司之若彼悼不肖愚民之如此故遣信使喻曉百姓以發卒之事因數之以不忠死亡之罪讓三老孝弟以不教誨之過方今田時重煩百姓己親見近縣恐逺所谿谷山澤之民不徧聞檄到亟下縣道漢書百官表曰縣有蠻夷曰道使咸知陛下之意唯無忽也相如還報唐蒙已畧通夜郎因通西南夷道發巴蜀廣漢卒作者數萬人治道二嵗道不成士卒多物故費以巨萬計蜀民及漢用事者多言其不便是時卭筰之君長聞南夷與漢通得賞賜多多欲願為内臣妾請吏比南夷天子問相如相如曰卭筰冉駹者近蜀道亦易通秦時嘗通為郡縣至漢興而罷今誠復通為置郡縣愈於南夷天子以為然乃拜相如為中郎將建節往使副使王然于壺充國吕越人馳四乘之傳因巴蜀吏幣物以賂四夷至蜀蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵於是卓王孫臨卭諸公皆因門下獻牛酒以交驩卓王孫喟然而嘆自以得使女尚司馬長卿晩而厚分與其女財與男等同司馬長卿便畧定西夷卭筰冉駹斯榆之君皆請為内臣除邉闗闗益斥西至沬若水南至䍧牱為檄通零闗道徐廣曰越雋有零闗縣橋孫水韋昭曰為孫水作橋以通卭都還報天子天子大說相如使時蜀長老多言通西南夷不為用唯大臣亦以為然相如欲諫業已建之不敢乃著書籍以蜀父老為辭而已詰難之以風天子且因宣其使指令百姓知天子之意其辭曰漢興七十有八載徐廣曰元光六年也徳茂存乎六世威武紛紜湛恩汪濊羣生澍濡洋溢乎方外於是乃命使西征隨流而攘風之所被罔不披靡因朝冉從駹定筰存卭畧斯榆舉苞滿結􅁤還轅東鄉將報至於蜀都耆老大夫薦紳先生之徒二十有七人儼然造焉辭畢因進曰葢聞天子之於夷狄也其義羈縻勿絶而已今罷三軍之士通夜郎之途三年於兹而功不竟士卒勞倦萬民不贍今又接以西夷百姓力屈恐不能卒業此亦使者之累也竊為左右患之且夫卭筰西僰之與中國並也厯年兹多不可記已仁者不以徳來彊者不以力並意者其殆不可乎今割齊民以附夷狄弊所恃以事無用鄙人固陋不識所謂使者曰烏謂此耶必若所云則是蜀不變服而巴不化俗也余尚惡聞若說然斯事體大固非觀者之所覯也余之行急其詳不可得聞已且為大夫麄陳其畧葢世必有非常之人然後有非常之事有非常之事然後有非常之功非常者固常人之所異也故曰非常之原黎民懼焉及臻厥成天下晏如也昔者洪水浡出汜濫衍溢民人登降移徙陭䧢而不安夏后氏戚之乃堙鴻水決江疏河漉沉贍菑徐廣曰漉一作灑東歸之於海而天下永寧當斯之勤豈唯民哉心煩於慮而身親其勞躬胝無胈膚不生毛徐廣曰胝音竹移反胈踵也一作腠音凑膚理也胈音魃故休烈顯乎無窮聲稱浹乎于兹且夫賢君之踐位也豈特委瑣握􅐅拘文牽俗循誦習傳當世取說云爾哉必將崇論閎議創業垂統為萬世規故馳騖乎兼容並包而勤思乎參天兩地且詩不云乎普天之下莫非王土率土之濱莫非王臣毛詩傳曰濱涯也是以六合之内八方之外浸潯衍溢懐生之物有不浸潤於澤者賢君恥之今封疆之内冠帶之倫咸獲嘉祉靡有闕遺矣而夷狄殊俗之國遼逺異黨之地舟輿不通人迹罕至政教未加流風猶㣲内之則犯義侵禮於邉境外之則邪行横作放弑其上君臣易位尊卑失序父兄不辜幼孤為奴係累號泣内嚮而怨曰葢聞中國有至仁焉徳洋而恩普物靡不得其所今獨曷為遺已舉踵思慕若枯旱之望雨盭夫為之垂涕徐廣曰盭音戾况乎上聖又惡能已故比出師以討彊胡南馳使以誚勁越四面風徳二方之君鱗集仰流願得受號者以億計故乃闗沬若漢書音義曰以沬若水為闗徼䍧牱鏤零山梁孫原創道徳之塗垂仁義之統將博恩廣施逺撫長駕使疏逖不閉阻深闇昧得耀乎光明以偃甲兵於此而息誅伐於彼遐邇一體中外提福徐廣曰提作禔音支不亦康乎夫拯民於沉溺奉至尊之休徳反衰世之陵遲繼周氏之絶業斯乃天子之急務也百姓雖勞又惡可以已哉且夫王事固未有不始於憂勤而終於佚樂者也然則受命之符合在於此矣方將増泰山之封加梁父之事鳴和鸞揚樂頌上咸五下登三徐廣曰咸一作函駰案韋昭曰咸同於五帝登三王之上觀者未睹指徳者未聞音猶鷦明已翔乎寥廓而羅者猶視乎藪澤悲夫於是諸大夫芒然喪其所懐來而失厥所以進喟竝稱曰允哉漢徳此鄙人之所願聞也百姓雖怠請以身先之敞罔靡徙因遷延而辭避其後人有上書言相如使時受金失官居嵗餘復召為郎相如口吃而善著書常有消渴疾與卓氏婚饒於財其進仕宦未常肯與公卿國家之事常稱病閒居不慕官爵常從上至長楊獵是時天子方好自擊熊彘馳逐野獸相如上書諌之其詞曰臣聞物有同類而殊能者故力稱烏獲㨗言慶忌勇期賁育臣之愚竊以為人誠有之獸亦宜然今陛下好陵阻險射猛獸卒然遇軼材之獸駭不存之地犯屬車之清塵蔡邕曰古者諸侯貳車九乘秦滅九國兼其車服故大駕屬車八十一乗輿不及還轅人不暇施巧雖有烏獲逢蒙之技力不得用吴越春秋曰羿傳射於逢蒙枯木朽株盡為害矣是胡越起於轂下而羌夷接軫也豈不殆哉雖萬全無患然本非天子之所宜近也且夫清道而後行中路而後馳猶時有銜橛之變徐廣曰橛音巨月反鉤逆者謂之撅矣而况渉乎蓬蒿馳乎丘墳前有利獸之樂内無存變之意其為禍也不亦難矣夫輕萬乗之重不以為安而樂出於萬有一危之塗以為娱臣竊為陛下不取也葢明者逺見於未萌而智者避危於無形禍固多藏於𨼆㣲而發於人之所忽者也故鄙諺曰家累千金者坐不垂堂此言雖小可以喻大臣願陛下之留意幸察上善之還過宜春宫相如奏賦以哀二世行失也其辭曰登陂阤之長阪兮坌入曽宫之嵳峩漢書音義曰坌竝也臨曲江之隑州兮漢書音義曰隑長也苑中有曲江之象泉中有長洲也望南山之參差巖巖深山之谾谾兮徐廣曰谾力工反通谷谾兮谽􅹼汨淢噏習以永逝兮注平臯之廣衍觀衆樹之蓊薆兮覽竹林之榛榛東馳土山兮北揭石瀬彌節容與兮厯弔二世持身不謹兮亡國失埶信䜛不寤兮宗廟滅絶嗚呼哀哉操行之不得兮墳墓蕪穢而不修兮魂無歸而不食夐邈絶而不齊兮彌久逺而愈佅精罔閬而飛揚兮拾九天而永逝嗚呼哀哉相如拜為孝文園令天子既美子虚之事相如見上好仙道因曰上林之事未足美也尚有靡者臣嘗為大人賦未就請具而奏之相如以為列僊之傳居山澤間形容甚臞徐廣曰臞痩也此非帝王之僊意也乃遂就大人賦其辭曰世有大人兮在於中州宅彌萬里兮曽不足以少留悲世俗之廹隘兮朅輕舉而逺游垂絳幡之素蜺兮載雲氣而上浮建格澤之長竿兮總光耀之采旄漢書音義曰格澤之氣如炎火狀黄白色起地上至天以此氣為竿旄葆也總係也係光耀之氣於長竿以為葆者垂旬始以為幓兮抴彗星而為髾漢書音義曰旬始氣如雄鷄縣於葆下以為旒也髾燕尾也抴彗星綴著旒以為燕尾掉指橋以偃蹇兮又旖旎以招揺漢書音義曰指橋隨風指靡攬欃槍以為旌兮靡屈虹而為綢漢書音義曰綢韜也以斷虹為旌旂之韜紅杳𣺌以眩湣兮猋風涌而雲浮漢書音義曰旬始屈虹氣色紅杳𣺌眩湣闇冥無光也駕應龍象輿之蠖畧逶麗兮驂赤螭青虯之幽蟉蜿蜒低卬蟜据以驕驁兮詘折隆窮躩以連卷沛艾赳螑仡以佁儗兮漢書音義曰赳螑申頭低卬也佁儗不前也放散畔㟁驤以孱顔跮踱輵轄容以委麗兮綢繆偃蹇怵㚟以梁倚徐廣曰跮踱乍前乍郤也跮音丑栗反踱音敕畧反輵烏葛反輵音曷綢一作雕㚟音他畧反駰案漢書音義曰怵㚟走也梁倚相著也糾蓼叶奡蹋以艐路兮徐廣曰音介至也蔑蒙踊躍騰而狂趡漢書音義曰蔑蒙飛揚也趡走莅颯卉翕熛至電過兮煥然霧除霍然雲消邪絶少陽而登太隂兮與真人乎相求漢書音義曰少陽東極太隂北極邪度東極而升北極者也互折窈窕以右轉兮横厲飛泉以正東悉徴靈圉而選之兮部乗衆神於瑶光漢書音義曰瑶光北斗杓頭第一星使五帝先導兮反太一而從陵陽漢書音義曰仙人陵陽子明也左𤣥㝠而右含靁兮漢書音義曰含雷黔嬴也天上造化神名也或曰水神前陸離而後潏湟漢書音義曰皆神名斯征北僑徐廣曰燕人也形解而僊也而役羡門兮屬岐伯使尚方徐廣曰岐伯黄帝臣駰案漢書音義曰尚主也岐伯黄帝太醫屬使主方藥祝融驚而蹕御兮清雰氣而後行屯余車其萬乘兮綷雲葢而樹華旗使勾芒其將行兮吾欲往乎南嬉歴唐堯於崇山兮過虞舜於九疑紛湛湛其差錯兮雜遝膠葛以方馳騷擾衝蓯其相紛挐兮滂濞泱軋灑以林離鑽羅列聚叢以蘢茸兮衍曼流爛壇以陸離徑入靁室之砰磷鬱律兮洞出鬼谷之崫礨嵬䃶漢書音義曰鬼谷在北辰下衆鬼之所聚也楚詞有曰贅鬼谷于北辰也徧覽八紘而觀四荒兮朅渡九江而越五河經營炎火而浮弱水兮杭絶浮渚而渉流沙漢書音義曰抗船也絶度也浮渚流沙中渚也奄息總極汜濫水嬉兮漢書音義曰總極葱領山也在西域中也使靈媧鼓瑟而舞馮夷徐廣曰媧一作貽駰案漢書音義曰靈媧女媧也馮夷河伯字也淮南子曰馮夷得道以潜大川時若薆薆將混濁兮召屏翳誅風伯而刑雨師西望崑崙之軋沕洸忽兮直徑馳乎三危三危山名也排閶闔而入帝宫兮載玉女而與之歸舒閬風而揺集兮亢烏騰而一止漢書音義曰亢然髙飛如烏之騰也􅊠囬隂山翔以紆曲兮吾乃今日睹西王母皬然白首徐廣曰皬音下沃反載勝而穴處兮郭璞曰勝玉勝也亦幸有三足烏為之使必長生若此而不死兮雖濟萬世不足以喜囬車朅來兮絶道不周漢書音義曰不周山在崑崙東南㑹食幽都呼吸沆飱朝霞兮噍咀芝英兮嘰瓊華徐廣曰嘰音祈小食也駰案韋昭曰瓊華玉英嬐侵潯而髙縱兮紛鴻涌而上厲徐廣曰嬐音纎貫列缺之倒景兮渉豐隆之滂沛漢書音義曰列缺天閃也倒景日在下馳游道而循降兮騖遺霧而逺逝廹區中之隘陜兮舒節出乎北垠遺屯騎於𤣥闕兮軼先驅於寒門漢書音義曰𤣥闕北極之山寒門天北門下峥嶸而無地兮上寥廓而無天視眩眠而無見兮聽惝恍而無聞乗虚無而上假兮超無友而獨存徐廣曰假音古下反至也相如既奏大人之頌天子大說飄飄有凌雲之氣似游天地之間意相如既病免家居茂陵天子曰司馬相如病甚可往從悉取其書若不然後失之矣使所忠往而相如已死家無書問其妻對曰長卿固未甞有書也時時著書人又取去即空居長卿未死時為一卷書曰有使者來求書奏之無他書其遺扎書言封禪事奏所忠忠奏其書天子異之其書曰伊上古之初肇自昊穹兮生民歴撰列辟以迄于秦徐廣曰撰一作選率邇者踵武徐廣曰率循也邇近也武迹也循省世近之遺迹逖聽者風聲徐廣曰逖逺也聽察逺古之風聲紛綸葳蕤堙滅而不稱者不可勝數也續韶夏崇號諡畧可道者七十有二君漢書音義曰昭明也夏大也徳明大相繼封禪於泰山者有七十二人罔若淑而不昌疇逆失而能存徐廣曰若順也駰案韋昭曰疇諸也言順善必昌逆失必亡軒轅之前遐哉邈乎其詳不可得聞也五三六經載籍之傳維見可觀也書曰元首明哉股肱良哉因斯以談君莫盛於唐堯臣莫賢於后稷后稷創業於唐公劉發迹於西戎文王改制爰周郅隆徐廣曰郅葢字誤皇甫謐曰王季徙程故漢書曰維王季宅程孟子稱文王生於畢程或者郅字其為程乎或為胵北地有郁郅縣胵大也音質駰案漢書音義曰郅至也大行越成漢書音義曰行道也文王始開王業改正朔易服色太平之道於是成矣而後陵夷衰㣲千載無聲徐廣曰周之王四海千載之後聲教乃絶駰案韋昭曰無惡聲豈不善始善終哉然無異端慎所由於前謹遺教於後耳故軌於夷易易遵也湛恩濛涌易豐也憲度著明易則也垂統理順易繼也是以業隆於繈褓而崇冠于二后漢書音義曰繈褓謂成王也二后謂文武也周公負成王致太平功徳冠於文武者道成法易故也揆厥所元終都攸卒漢書音義曰都於卒終也未有殊尤絶迹可考于今者也然猶躡梁父登泰山建顯號施尊名大漢之徳㷭涌原泉韋昭曰漢徳㷭涌如泉原也沕潏漫衍旁魄四塞雲専霧散徐廣曰専音布上暢九􅀈下泝八埏徐廣曰音衍駰案漢書音義曰暢逹垓重也泝流也埏若八埏地之際也言其徳上逹於九重之天下流於地之八際也懐生之類霑濡浸潤協氣横流武節飄逝邇陜游原迥濶泳沬漢書音義曰邇近原本也迥逺濶廣也泳浮也恩徳比之於水近者游其原逺者浮其沬首惡湮没闇昧昭晢漢書音義曰始為惡者皆湮滅闇昧喻夷狄皆化昆蟲凱澤囬首面内韋昭曰面向也然後囿騶虞之珍羣徼糜鹿之怪獸漢書音義曰徼遮也麋鹿得其竒怪者謂獲白麟也䆃一莖六穗於庖徐廣曰䆃瑞禾也駰案漢書音義曰謂嘉禾之米於庖厨以供祭祀犧雙觡共扺之獸徐廣曰扺音底駰案漢書音義曰犧牲也觡角也底本也武帝獲白麟兩角共一本因以為牲也獲周餘珍牧龜于岐徐廣曰一作放龜駰案漢書音義曰餘珍得周鼎也岐水名也招翠黄乘龍於沼漢書音義曰翠黄乗黄也龍翼馬身黄帝乘之而登仙言見乘黄而招呼之禮樂志曰紫黄湛河不下來余吾渥洼水中出神馬故曰乗龍於沼鬼神接靈圉賓於閒館徐廣曰言至徳與神明通接故靈圉為賓旅于間館矣郭璞曰靈圉仙人名也竒物譎詭俶儻窮變欽哉符瑞臻兹猶以為薄不敢道封禪葢周躍魚隕杭休之以燎㣲夫斯之為符也以登介丘不亦恧乎漢書音義曰介大丘山也言周以白魚為瑞登泰山封禪不亦慙乎進讓之道其何爽與徐廣曰爽差異也駰案漢書音義曰進周也讓漢也言周未可封禪而封禪為進漢可封禪而不封禪為讓也於是大司馬進曰陛下仁育羣生義征不憓漢書音義曰大司馬上公也故先進議憓音惠順也諸夏樂貢百蠻執贄徳侔往初功無與二休烈浹洽符瑞衆變期應紹至不特創見徐廣曰不但初顯符瑞而已葢將終以封禪之事意者泰山梁父設壇場望幸葢號以況榮徐廣曰以況受上天之榮為名號上帝垂恩儲祉將以薦成徐廣曰以衆瑞物初至封禪處薦之上天告成功也陛下謙讓而弗發也挈三神之驩徐廣曰挈猶言垂也駰案韋昭曰挈缺也三神上帝泰山梁父也缺王道之儀羣臣恧焉或謂且天為質闇珍符固不可辭漢書音義曰言天道質昧以符瑞見意不可辭讓也若然辭之是泰山靡記而梁父靡㡬也漢書音義曰泰山之上無所表記梁山壇場無所庶㡬亦各竝時而榮咸濟世而屈漢書音義曰屈絶之也言古帝王但作一時之榮畢代而絶也說者尚何稱於後徐廣曰若無封禪之遺迹則榮盡於當時至於歴世之後人何所述而云七十二君乎夫修徳以錫符奉符以行事不為進越故聖王弗替而修禮地祇謁欵天神漢書音義曰欵誠也謁告之報誠也勒功中嶽以彰至尊舒盛徳發號榮受厚福以浸黎民也皇皇哉斯事天下之壯觀王者之丕業不可貶也願陛下全之而後因雜薦紳先生之畧術使獲燿日月之末光絶炎以展采錯事徐廣曰錯音厝駰案漢書音義曰采官也使諸儒記功著業得覩日月末光殊絶之用而以展其官職設厝其事業者也猶兼正列其義挍飭厥文作春秋一藝徐廣曰挍一作祓祓猶拂也音廢也駰案漢書音義曰春秋者正天時列人事諸儒既得展事業因兼正天時列人事叙述大義為一經將襲舊六為七韋昭曰今漢時増一仍舊六為七也攄之無窮徐廣曰攄一作臚臚叙也俾萬世得激清流揚㣲波蜚英聲騰茂實前聖之所以永保鴻名而常為稱首者用此宜命掌故悉奏其義而覽焉漢書音義曰掌故太史官屬王故事也於是天子沛然改容曰愉乎朕其試哉乃遷思囬慮總公卿之議詢封禪之事詩大澤之博廣符瑞之富漢書音義曰詩歌詠功徳也下四章之頌也犬澤之博謂自我天覆雲之油油廣符符大富謂班斑之獸以下三章言符瑞廣大富饒也乃作頌曰自我天覆雲之油油漢書音義曰油油雲行貎孟子曰油然作雲沛然下雨甘露時雨厥壤可游滋液滲漉何生不育徐廣曰滲音色隂反嘉榖六穗我穡曷蓄徐廣曰何所蓄邪畜嘉榖非惟雨之又潤澤之非為濡之汜旉濩之徐廣曰古布字作旉萬物熙熙懐而慕思名山顯位望君之來韋昭曰名山大山也顯位封禪也君乎君乎侯不邁哉般般之獸樂我君囿白質黒章其儀可嘉旼旼睦睦君子之能徐廣曰旼音旻和貌也能一作態駰案漢書音義曰旻和穆敬言和且敬有似君子葢聞其聲今觀其來厥塗靡蹤天瑞之徴徐廣曰其所來路非有迹葢自天降瑞不行而至也兹亦於舜虞氏以興濯濯之麟游彼靈畤漢書音義曰武帝祠五畤獲白麟故言游靈時孟冬十月君徂郊祀馳我君輿帝以享祉三代之前葢未嘗有宛宛黄龍興徳而升采色炫燿熿炳煇煌徐廣曰熿音晃煇音魂正陽顯見覺寤黎烝於傳載之云受命所乗厥之有章不必諄諄徐廣曰諄止純反告之丁寧駰案漢書音義曰天之所命表以符瑞章明其德不必諄諄然有語言也依類記寓諭以封巒漢書音義曰寓寄也巒山也言依事類託寄以喻封禪者披藝觀之天人之際已交上下相發允答聖王之徳兢兢翼翼故曰興必慮衰安必思危是以湯武至尊嚴不失肅祇舜在假典顧省厥遺此之謂也徐廣曰假大也司馬相如既卒徐廣曰元狩五年也五嵗天子始祭后土八年而遂先禮中嶽封于泰山至梁父禪肅然徐廣曰小山在泰山下趾東北相如他所著若遺平陵侯書徐廣曰蘇建也與五公子相難草木書篇不采采其尤著公卿者云太史公曰春秋推見至𨼆韋昭曰推見争至於𨼆諱謂若晉文召天子經言狩河陽之屬易本𨼆之以顯韋昭曰易本𨼆㣲妙出為人事乃顯著也大雅言王公大人而徳逮黎庶韋昭曰先言王公大人之徳乃後及衆庶也小雅譏小己之得失其流及上韋昭曰小雅云人志狹小先道已之憂苦其流乃及上政之得失者所以言雖外殊其合徳一也相如雖多虚辭濫說然其要歸引之節儉此與詩之風諫何異揚雄以為靡麗之賦勸百風一猶馳騁鄭衛之聲曲終而奏雅不已虧乎余采其語可論者者于篇史記集解卷一百十七
