body:
  text: 史記集解卷一百五宋裴駰撰史記一百五扁鵲倉公列傳第四十五扁鵲者勃海郡鄭人也徐廣曰鄚當為鄚鄚縣名今屬河間姓秦氏名越人少時為人舍長舍客長桑君過扁鵲獨竒之常謹遇之長桑君亦知扁鵲非常人也岀入十餘年乃呼扁鵲私坐間與語曰我有禁方年老欲傳與公公毋泄扁鵲曰敬諾乃出其懐中藥予扁鵲飲是以上池之水三十日當知物矣乃悉取其禁方書盡與扁鵲忽然不見殆非人也扁鵲以其言飲藥三十日視見垣一方人以此視病盡見五藏癥結特以診脈為名耳為醫或在齊或在趙在趙者名扁鵲當晉昭公時諸大夫强而公族弱趙簡子為大夫専國事簡子疾五日不知人大夫皆懼於是召扁鵲扁鵲入視病出董安于問扁鵲扁鵲曰血脈治也而何怪昔秦穆公嘗如此七日而寤寤之日告公孫支與子輿曰我之帝所甚樂吾所以久者適有所學也帝告我晉國且大亂五世不安其後將霸未老而死霸者之子且令而國男女無别公孫支書而藏之秦䇿於是出夫獻公之亂文公之霸而襄公敗秦師於殽而歸縱淫此子之所聞今主君之病與之同不出三日必間間必有言也居二日半簡子寤語諸大夫曰我之帝所甚樂與百神遊於鈞天廣樂九奏萬舞不類三代之樂其聲動心有一熊欲援我帝命我射之中熊熊死有羆來我又射之中羆羆死帝甚喜賜我二笥皆有副吾見兒在帝側帝屬我一翟犬曰及而子之壯也以賜之帝告我晉國且世衰七世而亡嬴姓將大敗周人於范魁之西而亦不能有也董安于受言書而藏之以扁鵲言告簡子簡子賜扁鵲田四萬畆其後扁鵲過虢虢太子死扁鵲至虢宫門下問中庶子喜方者曰太子何病國中治穰過於衆事中庶子曰太子病血氣不時交錯而不得泄暴發於外則為中害精神不能止邪氣邪氣積畜而不得泄是以陽緩而隂急故暴蹷而死扁鵲曰其死何如時曰鷄鳴至今曰收乎曰未也收謂棺歛其死未能半日也言臣齊勃海秦越人也家在於鄭未嘗得望精光侍謁於前也聞太子不幸而死臣能生之中庶子曰先生得無誕之乎何以言太子可生也臣聞上古之時醫有俞跗治病不以湯液醴灑鑱石撟引案杭毒熨一撥見病之應因五藏之輸乃割皮解肌訣脈結筋搦髓腦揲荒徐廣曰揲音舌𤓰幕湔浣腸胃潄滌五藏練精易形先生之方能若是則太子可生也不能若是而欲生之曽不可以告咳嬰之兒終日扁鵲仰天嘆曰夫子之為方也若以管窺天以郄視文越人之為方也不待切脈望色聴聲寫形言病之所在聞病之陽論得其陰聞病之陰論得其陽病應見於大表不出千里決者至衆不可曲止也子以吾言為不誠試入診太子當聞其耳嗚而鼻張循其兩股以至於陰當尚温也中庶子聞扁鵲言目眩然而不瞚舌撟然而不下乃以扁鵲言入報虢君虢君聞之大驚出見扁鵲於中闕曰竊聞高義之日乆矣然未嘗得拜謁於前也先生過小國幸而舉之偏國寡臣幸甚有先生則活無先生則棄捐填溝壑長終而不得反言未卒因噓唏服臆䰟精泄橫流涕長澘徐廣曰一云言未卒因涕泣交流嘘唏不能自止也忽忽承䀹悲不能自止容貎變更扁鵲曰若太子病所謂尸蹷者也夫以陽入陰中動胃繵縁中經維絡徐廣曰維一作結别下於三焦膀胱是以陽脈下遂徐廣曰一作隊陰脈上爭㑹氣閉而不通陰上而陽内行下内鼓而不起上外絶而不為使上有絶陽之絡下有破陰之紐破陰絶陽之色已廢徐廣曰一作發脈亂故形靜如死狀太子未死也夫以陽入陰支蘭藏者生以陰入陽支蘭藏者死凡此數事皆五藏蹷中之時暴作也良工取之拙者疑殆扁鵲乃使弟子子陽厲鍼砥石以取外三陽五㑹有間太子蘇乃使子豹為五分之熨以八減之齊和煑之以更熨兩脅下太子起坐更適陰陽但服湯二旬而復故故天下盡以扁鵲為能生死人扁鵲曰越人非能生死人也此自當生者越人能使之起耳傅𤣥曰虢自晉獻公時先是百二十餘年滅矣是時焉得有虢扁鵲過齊齊桓侯客之入朝見曰君有疾在腠理不治將深桓侯曰寡人無疾扁鵲出桓侯謂左右曰醫之好利也欲以不疾者為功後五日扁鵲復見曰君有疾在血脈不治恐深桓侯曰寡人無疾扁鵲出桓侯不悦後五日扁鵲復見曰君有疾在腸胃間不治将深桓侯不應扁鵲出桓侯不悦後五日扁鵲復見望見桓侯而退走桓侯使人問其故扁鵲曰疾之居腠理也湯熨之所及也在血脈鍼石之所及也其在腸胃酒醪之所及也其在骨髓雖司命無奈之何今在骨髓臣是以無請也後五日桓侯體病使人召扁鵲扁鵲已逃去桓侯遂死傅𤣥曰是時齊旡桓侯駰謂是齊侯田和之子桓公午也使聖人預知微能使良醫得蚤從事則疾可已身可活也人之所病病疾多而醫之所病病道少徐廣曰所病猶療病也故病有六不治驕恣不論於理一不治也輕身重財二不治也衣食不能適三不治也隂陽并藏氣不定四不治也形羸不能服藥五不治也信巫不信醫六不治也有此一者則重難治也扁鵲名聞天下過邯鄲聞貴婦人即為帶下醫過雒陽聞周人愛老人即為耳目痺醫来入咸陽聞秦人愛小兒即為小兒醫隨俗為變秦太醫令李䤈自知伎不如扁鵲也使人刺殺之至今天下言脈者由扁鵲也太倉公者齊太倉長臨菑人也姓淳于氏名意少而喜醫方術高后八年更受師同郡元里公乗陽慶慶年七十餘無子使意盡去其故方更悉以禁方予之傳黄帝扁鵲之脈書五色診病知人死生決嫌疑定可治及藥論甚精受之三年為人治病決死生多驗然左右行游諸侯不以家為家或不為人治病病家多怨之者文帝四年中人上書言意以刑罪當傳西之長安意有五女隨而泣意怒駡曰生子不生男緩急無可使者於是少女緹縈傷父之言乃隨父西上書曰妾父為吏齊中稱其亷平今坐法當刑妾切痛死者不可復生而刑者不可復續徐廣曰一作贖雖欲改過自新其道莫由終不可得妾願入身為官婢以贖父刑罪使得改行自新也書聞上悲其意此歲中亦除肉刑法徐廣曰案年表孝文十二年除肉刑意家居詔召問所為治病死生驗者幾何人主名為誰詔問故太倉長臣意方伎所長及所能治病者徐廣曰一作為為亦治有其書無有皆安受學受學幾何歲嘗有所驗何縣里人也何病醫藥已其病之狀皆何如具悉而對臣意對曰自意少時喜醫藥醫藥方試之多不驗者至高后八年徐廣曰意年二十六得見師臨菑元里公乗陽慶慶年七十餘意得見事之謂意曰盡去而方書非是也慶有古先道遺傳黃帝扁鵲之脈書五色診病知人生死決嫌疑定可治及藥論書甚精我家給冨心愛公欲盡以我禁方書悉教公臣意即曰幸甚非意之所敢望也臣意即避席再拜謁受其脈書上下經五色診奇音羇咳音該術揆度陰陽外變藥論石神接陰陽禁書受讀解驗之可一年所明歲即騐之有騐然尚未精也要事之三年所即嘗已為人治診脈決死生有騐精良今慶已死十年所臣意年盡三年年三十九歲也齊侍御史成自言病頭痛臣意診其脈告曰君之病惡不可言也即出獨告成弟昌曰此病疽也七如反内發於腸胃之間後五日當􅢝腫後八日嘔膿死成之病得之飲酒且内成即如期死所以知成之病者臣意切其脈得肝氣肝氣濁徐廣曰一作黽而靜徐廣曰一作清此内闗之病也脈法曰脈長而弦不得代四時者其病主在於肝和即經主病也代則絡脈有過經主病和者其病得之筋髓裏其代絶而脈賁者病得之酒且内所以知其後五日而􅢝腫八日嘔膿死者切其脈時少陽初代代者經病病去過人人則去絡脈主病當其時少陽初闗一分故中熱而膿未發也及五分則至少陽之界徐廣曰一作分下章曰肝與心相去五分故曰五日盡也及八日則嘔膿死故上二分而膿發至界而􅢝腫盡泄而死熱上則熏陽明爛流絡流絡動則脈結發脈結發則爛解故絡交熱氣已上行至頭而動故頭痛齊王中子諸嬰兒小子病召臣意診切其脈告曰氣鬲病病使人煩懣食不下時嘔沫病得之少憂數忔食飲臣意即為之作下氣湯以飲之一日氣下二日能食三日即病愈所以知小子之病者診其脈心氣也濁徐廣曰一作黽又作猛躁而經也此絡陽病也脈法曰脈來數病去難而不一者病主在心周身熱脈盛者為重陽重陽者逷心主徐廣曰逷音唐逷者盪也謂病盪心者猶刺其心故煩懣食不下則絡脈有過絡脈有過則血上出血上出者死此悲心所生也病得之憂也齊郎中令循病衆醫皆以為蹷人中而刺之臣意診之曰湧疝也令人不得前後溲循曰不得前後溲三日矣臣意飲以火齊湯一飲得前溲再飲大溲三飲而病愈病得之内所以知循病者切其脈時右口氣急徐廣曰右一作有脈無五藏氣右口脈大而數數者中下熱而湧左為下右為上皆無五藏應故曰湧疝中熱故溺赤也齊中御府長信病臣意入診其脈告曰熱病氣也然暑汗脈少衰不死曰此病得之當浴流水而寒甚已則熱信曰唯然徃冬時為王使於楚至莒縣陽周水而莒橋梁頗壊信則擥車轅未欲渡也馬驚即墮信身入水中幾死吏即来救信出之水中衣盡濡有間而身寒已熱如火至今不可以見寒臣意即為之液湯火齊逐熱一飲汗盡再飲熱去三飲病已即使服藥出入二十日身無病者所以知信之病者切其脈時并陰脈法曰熱病陰陽交者死切之不交并陰并陰者脈順清而愈其熱雖未盡猶活也腎氣有時間濁徐廣曰一作黽在太陰脈口而希是水氣也腎固主水故以此知之失治一時即轉為寒熱齊王太后病召臣意入診脈曰風癉客脬難於大小溲溺赤臣意飲以火齊湯一飲即前後溲再飲病已溺如故病得之流汗出而滫滫者去衣而汗晞也所以知齊王太后病者臣意診其脈切其太陰之口溼然風氣也脈法曰沈之而大堅浮之而大𦂳者病主在腎腎切之而相反也脈大而躁大者膀胱氣也躁者中有熱而溺赤齊章武里曹山跗病臣意診其脈曰肺消癉也加以寒熱即告其人曰死不治適其共養此不當醫治法曰後三日而當狂妄起行欲走後五日死即如期死山跗病得之盛怒而以接内所以知山跗之病者臣意切其脈肺氣熱也脈法曰不平不鼓形弊徐廣曰一作散此五藏高之逺數以經病也故切之時不平而代不平者血不居其處代者時參擊並至乍躁乍大也此兩絡脈絶故死不治所以加寒熱者言其人尸奪尸奪者形弊形弊者不當闗灸鑱石及飲毒藥也臣意未徃診時齊太醫先診山跗病灸其足少陽脈口而飲之半夏丸病者即泄注腹中虚又灸其少隂脈是壊肝剛絶深如是重損病者氣以故加寒熱所以後三日而當狂者肝一絡連屬結絶乳下陽明故絡絶開陽明脈陽明脈傷即當狂走後五日死者肝與心相去五分故曰五日盡盡即死矣齊中尉潘滿如病少腹痛臣意診其脈曰遺積瘕也臣意即謂齊太僕臣饒内史臣繇曰中尉不復自止於内則三十日死後二十餘日溲血死病得之酒且内所以潘滿如病者臣意切其脈深小弱其卒然合徐廣曰一云來然合合也是脾氣也右脈口氣至𦂳小見瘕氣也以次相乗故三十日死三陰俱搏者如法不俱搏者決在急期一搏一代者近也故其三陰搏溲血如前止徐廣曰前一作筋也陽虚侯相趙章病召臣意衆醫皆以為寒中臣意診其脈曰迵風音洞言洞徹入四肢迵風者飲食下嗌音益謂喉下也而輙出不留法曰五日死而後十日乃死病得之酒所以知趙章之病者臣意切其脈脈來滑是内風氣也飲食下嗌而輙出不留者法五日死皆為前分界法後十日乃死所以過期者其人嗜粥故中藏實中藏實故過期師言曰安穀者過期不安榖者不及期濟北王病召臣意診其脈曰風蹶胸滿即為藥酒盡三日病已得之汗出伏地所以知濟北王病者臣意切其脈時風氣也心脈濁徐廣曰一作黽病法過入其陽陽氣盡而陰氣入陰氣入張則寒氣上而熱氣下故胸滿汗出伏地者切其脈氣陰陰氣者病必入中出及瀺水也齊北宫司空命婦出於病徐廣曰一作奴奴葢女奴衆醫皆以為風入中病主在肺徐廣曰一作肝刺其足少陽脈臣意診其脈曰病氣疝客於膀胱難於前後溲而溺赤病見寒氣則遺溺使人腹腫出於病得之欲溺不得因以接内所以知出於病者切其脈大而實其来難是蹷陰之動也脈来難者疝氣之客於膀胱也腹之所以腫者言蹷陰之絡結小腹也蹷陰有過則脈結動動則腹腫臣意即灸其足蹷陰之脈左右各一所即不遺溺而溲清小腹痛止即更為火齊湯以飲之三日而疝氣散即愈故濟王阿母徐廣曰濟一作齊王自言足熱而懣臣意告曰熱蹷也則刺其足心各三所案之無出血病旋已病得之飲酒大醉濟北王召臣意診脈諸女子侍者至女子豎豎無病臣意告永巷長曰豎傷脾不可勞法當春嘔血死臣意言王曰才人女子豎何能王曰是好為方多技能為所是案法新徐廣曰所一作取徃年市之民所四百七十萬曹偶四人王曰得毋有病乎臣意對曰豎病重在死法中王召視之其顔色不變以為不然不賣諸侯所至春豎奉劒從王之厠王去豎後王令人召之即仆於厠嘔血死病得之流汗流汗者同法病内重毛髪而色澤脈不衰此亦闗内之病也齊中大夫病齲齒臣意灸其左太陽明脈即為苦参湯日潄三升出入五六日病已得之風及卧開口食而不嗽菑川王羙人懐子而不乳来召臣意臣意徃飲以莨􅖎藥一撮以酒飲之旋乳臣意復診其脈而脈躁躁者有餘病即飲以消石一齊出血血如豆比五六枚齊丞相舍人奴從朝入宫臣意見之食閨門外望其色有病氣臣意即告宦者平平好為脈學臣意所臣意即示之舍人奴病告之曰此傷脾氣也當至春鬲塞不通不能食飲法至夏泄血死宦者平即徃告相曰君之舍人奴有病病重死期有日相君曰卿何以知之曰君朝時入宫君之舍人奴盡食閨門外平與倉公立即示平曰病如是者死相即召舍人奴而謂之曰公奴有病不舍人曰奴無病身無痛者至春果病至四月泄血死所以知奴病者脾氣周乗五藏傷部而交故傷脾之色也望之殺然黃徐廣曰殺音蘇葛反察之如死青之兹衆醫不知以為大蟲不知傷脾所以至春死病者胃氣黃黃者土氣也土不勝木故至春死所以至夏死者脈法曰病重而脈順清者曰内關内關之病人不知其所痛心急然無苦若加以一病死中春一愈順及一時其所以四月死者診其人時愈順愈順者人尚肥也奴之病得之汗流數出灸於火而以出見大風也菑川王病召臣意診脈曰蹶上為重頭痛身熱使人煩懣臣意即以寒水拊其頭刺足陽明脈左右各三所病旋已病得之沐髪未乾而卧診如前所以蹶頭熱至肩齊王黃姬兄黃長卿家有酒召客召臣意諸客坐未上食臣意望見王后弟宋建告曰君有病徃四五日君要脅痛不可俛仰又不得小溲不急治病即入濡腎及其未舍五藏急治之病方今客腎濡此所謂腎痺也宋建曰然建故有要瘠痛徃四五日天雨黃氏諸倩徐廣曰倩者女婿也駰案方言曰東齊之間壻謂之倩郭璞曰言可假倩也見建家京下方石徐廣曰京者倉廩之屬也即弄之建亦欲効之効之不能起即復置之暮要脊痛不得溺至今不愈建病得之好持重所以知建病者臣意見其色太陽色乾腎部上及界要以下者枯四分所故以徃四五日知其發也臣意即為柔湯使服之十八日所而病愈濟北王侍者韓女病要背痛寒熱衆醫皆以為寒熱也臣意診脈曰内寒月事不下也即竄以藥旋下病已病得之欲男子而不可得也所以知韓女之病者診其脈時切之腎脈也嗇而不屬嗇而不屬者其來難堅故曰月不下肝脈弦出左口故曰欲男子不可得也臨菑汜里女子薄吾病甚衆醫皆以為寒熱篤當死不治臣意診其脈曰蟯瘕徐廣曰蟯音饒蟯瘕為病腹大上膚黃麤循之戚戚然臣意飲以芫華一撮即出蟯可數升病已三十日如故病蟯得之於寒溼寒溼氣宛音鬱篤不發化為蟲臣意所以知薄吾病者切其脈循其尺其尺索刺麤而毛美奉髪徐廣曰奉一作奏又作秦是蟲氣也其色澤者中藏無邪氣及重病齊淳于司馬病臣意切其脈告曰當病迵風迵風之狀飲食下嗌輙後之徐廣曰如厠病得之飽食而疾走淳于司馬曰我之王家食馬肝食飽甚見酒来即走去驅疾至舍即泄數十出臣意告曰為火齊米汁飲之七八日而當愈時醫秦信在旁臣意去信謂左右閣都尉曰意以淳于司馬病為何曰以為迵風可治信即笑曰是不知也淳于司馬病法當後九日死即後九日不死其家復召臣意臣意徃問之盡如意診臣即為三火齊米汁使服之七八日病已所以知之者診其脈時切之盡如法其病順故不死齊中郎破石病臣意診其脈告曰肺傷不治當後十日丁亥溲血死即後十一日溲血而死破石之病得之墮馬僵石上所以知破石之病者切其脈得肺陰氣其来散數道至而不一也色又乗之所以知其墮馬者切之得番陰脈番陰入虚裏乗肺脈肺脈散者固色變也乗之所以不中期死者師言曰病者安榖則過期不安榖則不及期其人嗜黍黍主肝故過期所以溲血者診脈法曰病養喜陰處者順死喜養陽處者逆死其人喜自静不躁又乆安坐伏几而寐故血下泄齊王侍醫遂病自練五石服之臣意徃過之遂謂意曰不肖有病幸診遂也臣意即診之告曰公病中熱論曰中熱不溲者不可服五石石之為藥精悍公服之不得數溲亟勿服色將發臃遂曰扁鵲曰陰石以治陰病陽石以治陽病夫藥石者有陰陽水火之齊故中熱即為陰石柔齊治之中寒即為陽石剛齊治之臣意曰公所論逺矣扁鵲雖言若是然必審診起度量立規矩稱權衡合色脈徐廣曰合一作占表裏有餘不足順逆之法参其人動靜與息相應乃可以論論曰陽疾處内陰形應外者不加悍藥及鑱石夫悍藥入中則邪氣辟矣而宛氣愈深診法曰二陰應外一陽接内者不可以剛藥剛藥入則動陽陰病益衰陽病益著邪氣流行為重困於俞徐廣口音始喻反忿發為疽意告之後百餘日果為疽發乳上入缺盆死此謂論之大體也必有經紀拙工有一不習文理陰陽失矣齊王故為陽虚侯時病甚徐廣曰齊悼恵王子也名將廬以文帝十六年為齊王即位十一年卒諡孝王衆醫皆以為蹷臣意診脈以為痺根在右脅下大如覆杯令人喘逆氣不能食臣意即以火齊粥且飲六日氣下即令更服丸藥出入六日病已病得之内診之時不能識其經解大識其病所在臣意常診安陽武都里成開方開方自言以為不病臣意謂之病苦㳫風三歲四支不能自用使人瘖徐廣曰一作脊音才亦反瘖即死今聞其四支不能用瘖而未死也病得之數飲酒以見大風氣所以知成開方病者診之其脈法竒咳言曰藏氣相反徐廣曰反一作及者死切之得腎反徐廣曰反一作及肺法曰三歲死也安陵阪里公乗項處病臣意診脈曰牡疝牡疝在鬲下上連肺病得之内臣意謂之慎毋為勞力事為勞力事則必嘔血死處後蹴踘徐廣曰一作蹹要蹷寒汗出多即嘔血臣意復診之曰當旦日日夕死即死病得之内所以知項處病者切其脈得番陽番陽入虚裏處旦日死一番一絡者牡疝也臣意曰他所診期決死生及所治已病衆多乆頗忘之不能盡識不敢以對問臣意所診治病病名多同而診異或死或不死何也對曰病名多相類不可知故古聖人為之脈法以起度量立規矩縣權衡案繩墨調陰陽别人之脈各名之與天地相應參合於人故乃别百病以異之有數者皆異之無數者同之然脈法不可勝騐診疾人以度異之乃可别同名命病主在所居今臣意所診者皆有診籍所以别之者臣意所受師方適成師死以故表籍所診期決死生觀所失所得者合脈法以故至今知之問臣意曰所期病決死生或不應期何故對曰此皆飲食喜怒不節或不當飲藥或不當針灸以故不中期死也問臣意意方能知病死生論藥用所宜諸侯王大臣有嘗問意者不及文王病時徐廣曰齊文王也文以文十五年卒不求意診治何故對曰趙王膠西王濟南王呉王皆使人来召臣意臣意不敢徃文王病時臣意家貧欲為人治病誠恐吏以除拘臣意也徐廣曰時諸侯得自拜除吏故移名數左右不修家生出行游國中問善為方數者事之乆矣見事數師悉受其要事盡其方書意及解論之身居陽虚侯國因事侯侯入朝臣意從之長安以故得診安陵項處等病也問臣意知文王所以得病不起之狀臣意對曰不見文王病然竊聞文王病喘頭痛目不明臣意心論之以為非病也以為肥而蓄精身體不得揺骨肉不相任故喘不當醫治脈法曰年二十脈氣當趍年三十當疾歩年四十當安坐年五十當安卧年六十已上氣當大董徐廣曰董謂深藏一作堇文王年未滿二十方脈氣之趨也而徐之不應天道四時後聞醫灸之即篤此論病之過也臣意論之以為神氣爭而邪氣入非年少所能復之也以故死所謂氣者當調飲食擇晏日車歩廣志以適筋骨肉血脈以瀉氣故年二十是謂易􅐙徐廣曰一作賀又作質法不當砭灸砭灸至氣逐問臣意師慶安受之聞於齊諸侯不對曰不知慶所師受慶家冨善為醫不肯為人治病當以此故不聞慶又告臣意曰慎勿令我子孫知若學我方也問臣意師慶何見於意而愛意欲悉教意方對曰臣意不聞師慶為方善也意所以知慶者意少時好諸方事臣意試其方皆多騐精良臣意聞菑川唐里公孫光善為古傳方臣意即徃謁之得見事之受方化陰陽及傳語法徐廣曰法一作五臣意悉受書之臣意欲盡受他精方公孫光曰吾方盡矣不為愛公所吾身已衰無所復事之是吾年少所受妙方也悉與公毋以教人臣意曰得見事侍公前悉得禁方幸甚意死不敢妄傳人居有間公孫光間處臣意深論方見言百世為之精也師光喜曰公必為國工吾有所善者皆疏同産處臨菑善為方吾不若其方甚竒非世之所聞也吾年中時嘗欲受其方楊中情不肯曰若非其人也胥徐廣曰胥猶言須也與公徃見之當知公喜方也其人亦老矣其家給富時者未徃㑹慶子男殷来獻馬因師光奏馬王所意以故得與殷善光又屬意於殷曰意好數公必謹遇之其人聖儒即為書以意屬楊慶以故知慶臣意事慶謹以故愛意也問臣意曰吏民嘗有事學意方及畢盡得意方不何縣里人對曰臨菑人宋邑徐廣曰一作昆邑學臣意教以五診歲餘濟北王遣太醫高期王禹徐廣曰一作齲學臣意教以經脈高下及竒絡結當論俞所居及氣當上下出入邪逆順以宜鑱石定砭灸處歲餘菑川王時遣太倉馬長馮信正方臣意敎以案法逆順論藥法定五味及和齊湯法高永侯家丞杜信喜脈来學臣意教以上下經脈五診二歲餘臨菑召里唐安来學臣意教以五診上下經脈竒咳四時應陰陽重未成除為齊王侍醫問臣意診脈決死生能全無失乎臣意對曰意治病人必先切其脈乃治之敗逆者不可治其順者乃治之心不精脈所期死生視可治時時失之臣意不能全也太史公曰女無美惡居宫見妬士無賢不肖入朝見疑故扁鵲以其伎見殃倉公乃匿迹自隠而當刑緹縈通尺牘父得以後寧故老子曰美好者不祥之器豈謂扁鵲等邪若倉公者可謂近之矣史記集解卷一百五
