body:
  text: 史記集解卷五十七宋裴駰撰史記五十七絳侯周勃世家第二十七絳侯周勃者沛人也其先卷人徐廣曰卷縣在滎陽徙沛勃以織薄曲為生蘇林曰薄一名曲月令曰具曲植常為人吹簫給喪事如淳曰以樂䘮家若俳優瓚曰吹簫以樂喪賓若樂人也材官引强漢書音義曰能引强弓官如今挽强司馬也高祖之為沛公初起勃以中涓從攻胡陵下方與方與反與戰却適適漢書作敵攻豐擊秦軍碭東還軍留及蕭復攻碭破之下下邑先登賜爵五大夫攻蒙虞取之擊章邯車騎殿服䖍曰畧得殿兵也如淳曰殿不進也瓚曰在軍後曰殿孫撿曰一説上功曰最下功曰殿戰功曰多周勃事中有此三品與諸將俱計功則曰殿最獨捷則曰多多義見周禮故此云擊章邯車騎殿又云先至城下為多又云攻槐里好畤最是也定魏地攻爰戚東緡徐廣曰屬山陽以往至栗取之攻齧桑先登擊秦軍阿下破之追至濮陽下甄城攻都關定陶襲取宛朐得單父令夜襲取臨濟攻張漢書音義曰攻壽張以前至卷破之擊李由軍雍丘下攻開封先至城下為多文潁曰勃士卒至者多如淳曰周禮戰功曰多後章邯破殺項梁沛公與項羽引兵東如碭自初起沛還至碭一歲二月楚懐王封沛公號安武侯為碭郡長沛公拜勃為虎賁令徐廣曰一云句盾令以令從沛公定魏地攻東郡尉於城武破之擊王離軍破之攻長社先登攻潁陽緱氏絶河津擊趙賁軍尸北南攻南陽守齮破武關嶢關破秦軍於藍田至咸陽滅秦項羽至以沛公為漢王漢王賜勃爵為威武侯從入漢中拜為將軍還定三秦至秦賜食邑懐德攻槐里好畤最如淳曰於將率之中功為最擊趙賁内史保於咸陽最北攻漆擊章平姚卬軍西定汧還下郿頻陽圍章邯廢丘破西丞徐廣曰天水有西縣擊盜巴軍破之如淳曰章邯將攻上邽東守嶢關轉擊項籍攻曲逆最還守敖倉追項籍籍已死因東定楚地泗川東海郡凡得二十二縣還守雒陽櫟陽賜與潁陽侯共食鍾離以將軍從高帝擊反者燕王臧荼破之易下所將卒當馳道為多賜爵列侯剖符世世勿絶食絳八千一百八十戸號絳侯以將軍從高帝擊反韓王信於代降下霍人以前至武泉徐廣曰屬雲中擊胡騎破之武泉北轉攻韓信軍銅鞮破之還降太原六城擊韓信胡騎晉陽下破之下晉陽後擊韓信軍於硰石應劭曰硰音沙或曰地名破之追北八十里還攻樓煩三城因擊胡騎平城下所將卒當馳道為多勃遷為太尉擊陳豨屠馬邑所將卒斬豨將軍乗馬絺徐廣曰姓乗馬擊韓信陳豨趙利軍於樓煩破之得豨將宋最鴈門守圂内轉攻得雲中守遫丞相箕肆將勳徐廣曰箕一作奠勳一作専一作轉定鴈門郡十七縣雲中郡十二縣因復擊豨靈丘破之斬豨得豨丞相程縱將軍陳武都尉高肆定代郡九縣燕王盧綰反勃以相國代樊噲將擊下薊得綰大將抵丞相偃守陘張晏曰盧綰郡守陘其名太尉弱御史大夫施屠渾都徐廣曰在上谷破綰軍上蘭復擊破綰軍沮陽徐廣曰在上谷駰案服䖍曰沮音阻追至長城定上谷十二縣右北平十六縣遼西遼東二十九縣漁陽二十二縣最從高帝得相國一人丞相二人將軍二千石各三人别破軍二下城三定郡五縣七十九得丞相大將各一人勃為人木强敦厚高帝以為可屬大事勃不好文學每召諸生説士東鄉坐而責之如淳曰勃自東向坐責諸生説士不以賔主之禮趣為我語其椎少文如此瓚曰令直言勿稱經書也韋昭曰椎不撓曲直至如椎勃既定燕而歸高祖已崩矣以列侯事孝恵帝孝恵帝六年置太尉官徐廣曰功臣表及將相表皆高后四年始置太尉以勃為太尉十歲高后崩吕禄以趙王為漢上將軍吕産以吕王為漢相國秉漢權欲危劉氏勃為太尉不得入軍門陳平為丞相不得任事於是勃與平謀卒誅諸吕而立孝文皇帝其語在呂后孝文事中文帝既立以勃為右丞相賜金五千斤食邑萬户居月餘人或説勃曰君既誅諸吕立代王威震天下而君受厚賞處尊位以寵久之即禍及身矣勃懼亦自危乃謝請歸相印上許之歲餘丞相平卒上復以勃為丞相十餘月上曰前日吾詔列侯就國或未能行丞相吾所重其率先之乃免相就國歲餘每河東守尉行縣至絳絳侯勃自畏恐誅常被甲令家人持兵以見之其後人有上書告勃欲反徐廣曰文帝四年時下廷尉廷尉下其事長安逮捕勃治之勃恐不知置辭吏稍侵辱之勃以千金與獄吏獄吏乃書牘背示之李竒曰吏所執簿韋昭曰牘版曰以公主為證公主者孝文帝女也勃太子勝之尚之韋昭曰尚奉也不敢言娶故獄吏敎引為證勃之益封受賜盡以子薄昭及繫急薄昭為言薄太后太后亦以為無反事文帝朝太后以冒絮提徐廣曰提音弟文帝應劭曰陌額絮也如淳曰太后恚怒遭得左右物提之也晉灼曰巴蜀異物志謂頭上巾為冒絮曰絳侯綰皇帝璽應劭曰言勃誅諸吕廢少帝手貫璽時尚不反况今更有異乎將兵於北軍不以此時反今居一小縣顧欲反邪文帝既見絳侯獄辭乃謝曰吏事方驗而出之於是使使持節赦絳侯復爵邑絳侯既出曰吾嘗將百萬軍然安知獄吏之貴乎絳侯復就國孝文帝十一年卒諡為武侯子勝之代侯六歲尚公主不相中如淳曰猶言不相合當坐殺人國除絶一歲文帝乃擇絳侯勃子賢者河内守亞夫封為條侯徐廣曰表皆作蓨字駰案服䖍曰蓨音條續絳侯後條侯亞夫自未侯為河内守時許負相之曰君後三歲而侯侯八歲為將相持國秉貴重矣於人臣無兩其後九歲而君餓死亞夫笑曰臣之兄已代父侯矣有如卒子當代亞夫何説侯乎然既已貴如負言又何説餓死指示我許負指其口曰有從理入口此餓死法也居三歲其兄絳侯勝之有罪孝文帝擇絳侯子賢者皆推亞夫乃封亞夫為條侯續絳侯後文帝之後六年匈奴大入邊乃以宗正劉禮為將軍軍霸上祝兹侯徐厲為將軍軍棘門以河内守亞夫為將軍軍細栁以備胡上自勞軍至霸上及棘門軍直馳入將以下騎送迎已而之細栁軍軍士吏披甲鋭兵刃彀弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰將軍令曰軍中聞將軍令不聞天子之詔居無何上至又不得入於是上乃使使持節詔將軍吾欲入勞軍亞夫乃傳言開壁門壁門士吏謂從屬車騎曰將軍約軍中不得驅馳於是天子乃按轡徐行至營將軍亞夫持兵揖曰介胄之士不拜請以軍禮見應劭曰禮介者不拜天子為動改容式車使人稱謝皇帝敬勞將軍成禮而去既出軍門羣臣皆驚文帝曰嗟乎此真將軍矣曩者霸上棘門軍若兒戲耳其將固可襲而虜也至於亞夫可得而犯邪稱善者久之月餘三軍皆罷乃拜亞夫為中尉孝文且崩時誡太子曰即有緩急周亞夫真可任將兵文帝崩拜亞夫為車騎將軍孝景三年吳楚反亞夫以中尉為太尉東擊吳楚因自請上曰楚兵剽輕難與争鋒願以梁委之絶其糧道乃可制上許之太尉既㑹兵滎陽吳方攻梁梁急請救太尉引兵東北走昌邑深壁而守梁日使使請太尉太尉守便宜不肯往梁上書言景帝景帝使使詔救梁太尉不奉詔堅壁不出而使輕騎弓兵高侯等絶吳楚兵後食道吳兵之糧飢數欲挑戰終不出夜軍中驚内相攻擊擾亂至於太尉帳下太尉終卧不起頃之復定後吳奔壁東南陬如淳曰陬隅也太尉使備西北已而其精兵果奔西北不得入吳兵既餓乃引而去太尉出精兵追擊大破之吴王濞棄其軍而與壯士數千人亡走保於江南丹徒漢兵因乗勝遂盡虜之降其兵購吳王千金月餘越人斬吳王頭以告凡相攻守三月而吳楚破平於是諸將乃以太尉計謀為是由此梁孝王與太尉有郤歸復置太尉官五歲遷為丞相景帝甚重之景帝廢栗太子丞相固爭之不得景帝由此疏之而梁孝王每朝常與太后言條侯之短竇太后曰皇后兄王信可侯也景帝讓曰始南皮章武侯瓚曰南皮竇彭祖太后兄子章武侯太后弟廣國先帝不侯及臣即位乃侯之信未得封也竇太后曰人主各以時行耳自竇長君在時竟不得侯死後乃封其子彭祖顧得侯吾甚恨之帝趣侯信也景帝曰請得與丞相議之丞相議之亞夫曰高皇帝約非劉氏不得王非有功不得侯不如約天下共擊之今信雖皇后兄無功侯之非約也景帝黙然而止其後匈奴王徐盧等五人降景帝欲侯之以勸後丞相亞夫曰彼背其主降陛下陛下侯之則何以責人臣不守節者乎景帝曰丞相議不可用乃悉封徐盧等為列侯亞夫因謝病景帝中三年以病免相頃之景帝居禁中召條侯賜食獨置大胾韋昭曰大臠也胾音側吏反無切肉又不置櫡條侯心不平顧謂尚席取櫡應劭曰向席主席者景帝視而笑曰此非不足君所乎孟康曰設胾無筋者此非不足滿於君所乎嫌恨之如淳曰非故不足君之食具也偶失之條侯免冠謝上起條侯因趨出景帝以目送之曰此怏怏者非少主臣也居無何條侯子為父買工官尚方徐廣曰一作西甲楯五百被徐廣曰音披駰案如淳曰工官官名也張晏曰被具也五百具甲楯可以葬者取庸苦之不予錢庸知其盜買縣官器怒而上變告子事連汙條侯書既聞上上下吏吏簿責條侯如淳曰簿問責其情條侯不對景帝罵之曰吾不用也孟康曰不用汝對欲殺之也如淳曰恐獄吏畏其復用事不敢折衷召詣廷尉廷尉責曰君侯欲反邪亞夫曰臣所買器乃葬器也何謂反邪吏曰君侯縱不反地上即欲反地下耳吏侵之益急初吏捕條侯條侯欲自殺夫人止之以故不得死遂入廷尉因不食五日嘔血而死國除絶一歲景帝乃更封絳侯勃他子堅為平曲侯續絳侯後十九年卒諡為共侯子建德代侯十三年為太子太傅坐酎金不善元鼎五年有罪國除徐廣曰諸列侯坐酎金失侯者皆在元鼎五年但此辭句如有顛倒條侯果餓死死後景帝乃封王信為葢侯太史公曰絳侯周勃始為布衣時鄙樸人也才能不過凡庸及從高祖定天下在將相位諸吕欲作亂勃匡國家難復之乎正雖伊尹周公何以加哉亞夫之用兵持威重執堅刃穰苴曷有加焉足已而不學守節不遜終以窮困悲夫史記集解卷五十七
