body:
  text: 史記集解卷七十七宋裴駰撰史記七十七魏公子列傳第十七魏公子無忌者魏昭王少子而魏安釐王異母弟也昭王薨安釐王即封公子為信陵君是時范雎亡魏相秦以怨魏齊故秦兵圍大梁破魏華陽下軍走芒卯魏王及公子患之公子為人仁而下士士無賢不肖皆謙而禮交之不敢以其富貴驕士士以此方數千里爭往歸之致食客三千人當是時諸侯以公子賢多客不敢加兵謀魏十餘年公子與魏王博而北境傳舉烽言趙冦至且入界文穎曰作高木櫓櫓上作桔橰桔橰頭兜零以薪置其中謂之烽常視之有冦即火燃舉之以相告魏王釋博欲召大臣謀公子止王曰趙王田獵耳非為冦也復博如故王恐心不在博居頃復從北方來傳言曰趙王獵耳非為冦也魏王大驚曰公子何以知之公子曰臣之客有能探得趙王隂事者趙王所為客輒以報臣臣以此知之是後魏王畏公子之賢能不敢任公子以國政魏有隱士曰侯嬴年七十家貧為大梁夷門監者公子聞之往請欲厚遺之不肯受曰臣修身潔行數十年終不以監門困故而受公子財公子于是乃置酒大會賓客坐定公子從車騎虛左自迎夷門侯生侯生攝弊衣冠直上載公子上坐不讓欲以觀公子公子執轡愈恭侯生又謂公子曰臣有客在市屠中願枉車騎過之公子引車入市侯生下見其客朱亥俾倪故久立與其客語微察公子公子顔色愈和當是時魏將相宗室賓客滿堂待公子舉酒市人皆觀公子執轡從騎皆竊罵侯生侯生視公子色終不變乃謝客就車至家公子引侯生坐上坐偏贊賓客賓客皆驚酒酣公子起為壽侯生前侯生因謂公子曰今日嬴之為公子亦足矣徐廣曰為一作羞嬴乃夷門抱關者也而公子親往車騎自迎嬴于衆人廣坐之中不宜有所過今公子故過之然嬴欲就公子之名故久立公子車騎市中過客以觀公子公子愈恭市人皆以嬴為小人而以公子為長者能下士也于是罷酒侯生遂為上客侯生謂公子曰臣所過屠者朱亥此子賢者世莫能知故隱屠間耳公子往數請之朱亥故不復謝公子怪之魏安釐王二十年秦昭王已破趙長平軍又進兵圍邯鄲公子姊為趙惠文王弟平原君夫人數遺魏王及公子書請救于魏魏王使將軍晉鄙將十萬衆救趙秦王使使者告魏王曰吾攻趙旦暮且下而諸侯敢救者已拔趙必移兵先擊之魏王恐使人止晉鄙留軍壁鄴名為救趙實持兩端以觀望平原君使者冠蓋相屬于魏讓魏公子曰勝所以自附為婚姻者以公子之高義為能急人之困今邯鄲旦暮降秦而魏救不至安在公子能急人之困也且公子縱輕勝棄之降秦獨不憐公子姊邪公子患之數請魏王及賓客辨士說王萬端魏王畏秦終不聽公子公子自度終不能得之于王計不獨生而令趙亡乃請賓客約車騎百餘乘欲以客往赴秦軍與趙俱死行過夷門見侯生具告所以欲死秦軍狀辭決而行侯生曰公子勉之矣老臣不能從公子行數里心不快曰吾所以待侯生者備矣天下莫不聞今吾且死而侯生曾無一言半辭送我我豈有所失哉復引車還問侯生侯生笑曰臣固知公子之還也曰公子喜士名聞天下今有難無他端而欲赴秦軍譬若以肉投餒虎何功之有哉尚安事客然公子遇臣厚公子往而臣不送以是知公子恨之復返也公子再拜因問侯生乃屏人間語曰嬴聞晉鄙之兵符常在王卧內而如姬最幸出入王卧內力能竊之嬴聞如姬父為人所殺如姬資之三年自王以下欲求報其父仇莫能得如姬為公子泣公子使客斬其仇頭敬進如姬如姬之欲為公子死無所辭顧未有路耳公子誠一開口請如姬如姬必許諾則得虎符奪晉鄙軍北救趙而西却秦此五霸之伐也公子從其計請如姬如姬果盜晉鄙兵符與公子公子行侯生曰將在外主令有所不受以便國家公子即合符而晉鄙不授公子兵而復請之事必危矣臣客屠者朱亥可與俱此人力士晉鄙聽大善不聽可使擊之于是公子泣侯生曰公子畏死耶何泣也公子曰晉鄙嚄唶上音烏百反下音莊白反宿將往恐不聽必當殺之是以泣耳豈畏死哉于是公子請朱亥朱亥笑曰臣乃市井鼓刀屠者而公子親數存之所以不報謝者以為小禮無所用今公子有急此乃臣效命之秋也遂與公子俱公子過謝侯生侯生曰臣宜從老不能請數公子行日以至晉鄙軍之日北鄉自剄以送公子公子遂行至鄴矯魏王令代晉鄙晉鄙合符疑之舉手視公子曰今吾擁十萬之衆屯于境上國之重任今單車來代之何如哉欲無聽朱亥袖四十斤鐵錐錐殺晉鄙公子遂將晉鄙軍勒兵下令軍中曰父子俱在軍中父歸兄弟俱在軍中兄歸獨子無兄弟歸養得選兵八萬人進兵擊秦軍秦軍解去遂救邯鄲存趙趙王及平原君自迎公子于界平原君負韊矢吕忱曰韊盛弩矢為公子先引趙王再拜曰自古賢人未有及公子者也當此之時平原君不敢自比于人公子與侯生決至軍侯生果北鄉自剄魏王怒公子之盜其兵符矯殺晉鄙公子亦自知也已却秦存趙使將將其軍歸魏而公子獨與客留趙趙孝成王德公子之矯奪晉鄙兵而存趙乃與平原君計以五城封公子公子聞之意驕矜而有自功之色客有說公子曰物有不可忘或有不可不忘夫人有德于公子公子不可忘也公子有德于人願公子忘之也且矯魏王令奪晉鄙兵以救趙于趙則有功矣于魏則未為忠臣也公子乃自驕而功之竊為公子不取也于是公子立自責似若無所容者趙王掃除自迎執主人之禮引公子就西階公子側行辭讓從東階上禮記曰主人就東階客就西階客若降等則就主人之階自言罪過以負于魏無功于趙趙王侍酒至暮口不忍獻五城以公子退讓也公子竟留趙趙王以鄗為公子湯沐邑魏亦復以信陵奉公子公子留趙公子聞趙有處士毛公藏于博徒辥公藏于賣漿家徐廣曰漿或作醪公子欲見兩人兩人自匿不肯見公子公子聞所在乃閒步往從此兩人游甚歡平原君聞之謂其夫人曰始吾聞夫人弟公子天下無雙今吾聞之乃妄從博徒賣漿者游公子妄人耳夫人以告公子公子乃謝夫人去曰始吾聞平原君賢故負魏王而救趙以稱平原君平原君之游徒豪舉耳不求士也無忌自在大梁時常聞此兩人賢至趙恐不得見以無忌從之游尚恐其不我欲也今平原君乃以為羞其不足從游乃裝為去夫人具以語平原君平原君乃免冠謝固留公子平原君門下聞之半去平原君歸公子天下士復往歸公子公子傾平原君客公子留趙十年不歸秦聞公子在趙日夜出兵東伐魏魏王患之使使往請公子公子恐其怒之乃誡門下有敢為魏王使通者死賓客皆背魏之趙莫敢勸公子歸毛公辥公兩人往見公子曰公子所以重于趙名聞諸侯者徒以有魏也今秦攻魏魏急而公子不恤使秦破大梁而夷先生之宗廟公子當何面目立天下乎語未及卒公子立變色告車趣駕歸救魏魏王見公子相與泣而以上將軍印授公子公子遂將魏安釐王三十年公子使使遍告諸侯諸侯聞公子將各遣將將兵救魏公子率五國之兵破秦軍于河外走䝉驁遂乘勝逐秦軍至函谷關抑秦兵秦兵不敢出當是時公子威振天下諸侯之客進兵法公子皆名之故世俗稱魏公子兵法劉歆七略有魏公子兵法二十一篇圖七卷秦王患之乃行金萬斤于魏求晉鄙客令毁公子于魏王曰公子亡在外十年矣今為魏將諸侯將皆屬諸侯徒聞魏公子不聞魏王公子亦欲因此時定南面而王諸侯畏公子之威方欲共立之秦數使反間僞賀公子得立為魏王未也魏王日聞其毁不能不信後果使人代公子將公子自知再以毁廢乃謝病不朝與賓客為長夜飲飲醇酒多近婦女日夜為樂飲者四歲竟病酒而卒其歲魏安釐王亦薨秦聞公子死使䝉驁攻魏拔二十城初置東郡其後秦稍蠶食魏十八嵗而虜魏王屠大梁高祖始微少時數聞公子賢及即天子位每過大梁常祠公子高祖十二年從擊黥布還為公子置守冢五家世世歲以四時奉祠公子太史公曰吾過大梁之墟求問其所謂夷門夷門者城之東門也天下諸公子亦有喜士者矣然信陵君之接巖穴隱者不恥下交有以也名冠諸侯不虛耳高祖每過之而令民奉祠不絶也史記集解卷七十七
