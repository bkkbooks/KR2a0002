body:
  text: 史記集解卷一百二十四宋裴駰撰史記一百二十四遊俠列傳第六十四荀悅曰立氣齊作威福結私交以立強於世者謂之遊俠韓子曰儒以文亂法而俠以武犯禁二者皆譏而學士多稱於世云至如以術取宰相卿大夫輔翼其世主功名俱著於春秋固無可言者及若季次原憲閭巷人也徐廣曰仲尼弟子傳曰公晳哀字季次未嘗仕孔子稱之讀書懷獨行君子之德義不茍合當世當世亦笑之故季次原憲終身空室蓬戶褐衣疏食不厭死而已四百餘年而弟子志之不倦今遊俠其行雖不軌於正義然其言必信其行必果已諾必誠不愛其軀赴士之厄困既已存亡死生矣而不矜其能羞伐其德蓋亦有足多者焉且緩急人之所時有也大史公曰昔者虞舜窘於井廩伊尹負於鼎俎傅説匿於傅險吕尚困於棘津徐廣曰在廣川夷吾桎梏百里飯牛仲尼畏匡菜色陳蔡此皆學士所謂有道仁人也猶然遭此災况以中材而涉亂世之末流乎其遇害何可勝道哉鄙人有言曰何知仁義已嚮其利者為有德故伯夷醜周餓死首陽山而文武不以其故貶王跖蹻暴利其徒誦義無窮由比觀之竊鉤者誅竊國者侯侯之門仁義存非虛言也今拘學或抱咫尺之義久孤於世豈若卑論儕俗與世沈浮而取榮名哉而布衣之徒設取豫然諾千里誦義為死不顧世此亦有所長非茍而已也故士窮窘而得委命此豈非人之所謂賢豪間者邪誠使鄉曲之俠豫季次原憲比權量力效功於當世不同日而論矣要以功見言信俠客之義又曷可少哉古布衣之俠靡得而聞己近世延陵徐廣曰代郡亦有延陵縣駰案韓子云趙襄子召延陵生令車騎先至晉陽襄子時趙已并代可有延陵之號但未詳是此人非耳孟嘗春申平原信陵之徒皆因王者親屬藉於有土卿相之富厚招天下賢者顯名諸侯不可謂不賢者矣比如順風而呼聲非加疾其勢激也至如閭巷之俠修行砥名聲施於天下莫不稱賢是為難耳然儒墨皆排擯不載自秦以前匹夫之俠湮滅不見余甚恨之以余所聞漢興有朱家田仲王公劇孟郭解之徒雖時扞當世之文罔然其私義廉潔退讓有足稱者名不虛立士不虛附至如朋黨宗強比周設財役貧豪暴侵凌孤弱恣欲自快遊俠亦醜之余悲世俗不察其意而猥以朱家郭解等令與暴豪之徒同類而共笑之也魯朱家者與髙祖同時魯人皆以儒教而朱家用俠聞所藏活豪士以百數其餘庸人不可勝言然終不伐其能歆其德諸所常施唯恐見之振人不贍先從貧賤始家無餘財衣不完采食不重味乘不過軥牛徐廣曰音雊駰案漢書音義曰小牛專趨人之急甚己之私既陰脫季布將軍之厄及布尊貴終身不見也自關以東莫不延頸願交焉楚田仲以俠聞喜劒父事朱家自以為行弗及田仲已死而雒陽有劇孟周人以商賈為資而劇孟以任俠顯諸侯吳楚反時條侯為大尉乘傳車將至河南得劇孟喜曰吳楚舉大事而不求孟吾知其無能為己矣天下騷動宰相得之若得一敵國云劇孟行大類朱家而好博多少年之戲然劇孟母死自逺方送喪蓋千乘及劇孟死家無餘十金之財而符離人王孟亦以俠稱江淮之間是時濟南瞷氏陳周庸亦以豪聞景帝聞之使使盡誅此屬其後代諸白梁韓無辟陽翟薛况陜韓孺紛紛復出焉徐廣曰陜疑當作郟字潁川有郟郟縣南傳曰郟壯士韓千秋也郭解軹人也字翁伯善相人者許負外孫也解父以任俠孝文時誅死解為人短小精悍不飲酒少時陰賊慨不快意身所殺甚衆以軀借交報仇藏命作姦剽攻不休及鑄錢掘冢固不可勝數適有天幸窘急常得脫若遇赦及解年長更折節為儉以德報怨厚施而薄望然其自喜為俠益甚既已振人之命不矜其功其陰賊著於心卒發於睚眥如故云而少年慕其行亦輒為報仇不使知也解姊子負解之勢與人飲使之嚼徐廣曰音子妙反盡酒也非其任強必灌之人怒拔刀刺殺解姊子亡去解姊怒曰以翁伯之義人殺吾子賊不得棄其尸於道弗葬欲以辱解解使人微知賊處賊窘自歸具以實告解解曰公殺之固當吾兒不直遂去其賊徐廣曰遣使去罪其姊子乃收而葬之諸公聞之皆多解之義益附焉解出入人皆避之有一人獨箕踞視之解遣人問其名姓客欲殺之解曰居邑屋至不見敬是吾德不修也彼何罪乃陰屬尉史曰是人吾所急也至踐更時脫之每至踐更數過吏弗求如淳曰更有三品有卒更有踐更有過更古有正卒無常人皆當迭為之一月一更是為卒更也貧者欲得是為踐更也律説更踐者次直者出錢顧之月二千更踐更者居縣中五月乃更也後從尉律卒踐更一月休十一月也怪之問其故乃解使脫之箕踞者乃肉袒謝罪少年聞之愈益慕解之行雒陽人有相仇者邑中賢豪居間者以十數終不聽客乃見郭解解夜見仇家仇家曲聽解解乃謂仇家曰吾聞雒陽諸公在此間多不聽者今子幸而聽解解奈何乃從他縣奪人邑中賢大夫權乎乃夜去不使人知曰且無用待我待我去令雒陽豪居其間乃聽之解執恭敬不敢乘車入其縣廷之旁郡國為人請求事事可出出之不可者各厭其意然後乃敢嘗酒食諸公以故嚴重之爭為用邑中少年及旁近縣賢豪夜半過門常十餘車請得解客舍養之及徙豪富茂陵也解家貧不中訾吏恐不敢不徙衛將軍為言郭解家貧不中徙上曰布衣權至使將軍為言此其家不貧解家遂徙諸公送者出千餘萬軹人楊季主子為縣掾舉徙解解兄子斷楊掾頭由此楊氏與郭氏為仇解入關關中賢豪知與不知聞其聲爭交歡解解為人短小不飲酒出未嘗有騎已又殺楊季主楊季主家上書人又殺之闕下上聞乃下吏捕解解亡置其母家室夏陽徐廣曰屬馮翊身至臨晉臨晉籍少公素不知解解冒因求出關籍少公已出解解轉入太原所過輒告主人家吏逐之迹至籍少公少公自殺口絶久之乃得解窮治所犯為解所殺皆在赦前軹有儒生侍使者坐客譽郭解生曰郭解專以姦犯公法何謂賢解客聞殺此生斷其舌吏以此責解解實不知殺者殺者亦竟絶莫知為誰吏奏解無罪御史大夫公孫𢎞議曰解布衣為任俠行權以睚眥殺人解雖弗知此罪甚於解殺之當大逆無道逐族郭解翁伯自是之後為俠者極衆敖而無足數者徐廣曰敖倨也然關中長安樊仲子槐里趙王孫長陵髙公子西河郭翁仲太原鹵公孺徐廣曰雁門有鹵城也臨淮兒長卿東陽田君孺雖為俠而逡巡有退讓君子之風至若北道姚氏西道諸杜南道仇景東道趙他羽公子南陽趙調之徒此盜跖居民間者耳曷足道哉此乃鄉者朱家之羞也太史公曰吾視郭解狀貌不及中人言語不足採者然天下無賢與不肖知與不知皆慕其聲言俠者皆引以為名諺曰人貌榮名豈有既乎徐廣曰人以二狀為貌者則色冇衰落矣唯用榮名為飾表則稱譽無極也既盡也於戲惜哉史記集解卷一百二十四
