body:
  text: 史記集解卷六十五宋裴駰撰史記六十五孫子吳起列傳第五孫子武者齊人也以兵法見於吳王闔廬闔廬曰子之十三篇吾盡觀之矣可以小試勒兵乎對曰可闔廬曰可試以婦人乎曰可於是許之出宫中美人得百八十人孫子分為二隊以王之寵姬二人各為隊長皆令持㦸令之曰汝知而心與左右手背乎婦人曰知之孫子曰前則視心左視左手右視右手後即視背婦人曰諾約束既布乃設鈇鉞即三令五申之於是鼓之右婦人大笑孫子曰約束不明申令不熟將之罪也復三令五申而鼓之左婦人復大笑孫子曰約束不明申令不熟將之罪也既已明而不如法者吏士之罪也乃欲斬左右隊長吳王從臺上觀見且斬愛姬大駭趣使使下令曰寡人已知將軍能用兵矣寡人非此二姬食不甘味願勿斬也孫子曰臣既已受命為將將在軍君命有所不受遂斬隊長二人以徇用其次為隊長於是復鼓之婦人左右前後跪起皆中規矩繩墨無敢出聲于是孫子使使報王曰兵既整齊王可試下觀之惟王所欲用之雖赴水火猶可也吳王曰將軍罷休就舍寡人不願下觀孫子曰王徒好其言不能用其實于是闔廬知孫子能用兵卒以為將西破彊楚入郢北威齊晉顯名諸侯孫子與有力焉孫武既死後百餘歲有孫臏臏生阿鄄之間臏亦孫武之後世子孫也孫臏嘗與龎㳙俱學兵法龎㳙既事魏得為惠王將軍而自以為能不及孫臏乃隂使召孫臏臏至龎㳙恐其賢于已疾之則以法刑斷其兩足而黥之欲隱勿見齊使者如梁孫臏以刑徒隂見說齊使齊使以為竒竊載與之齊齊將田忌善而客待之忌數與齊諸公子馳逐重射孫子見其馬足不甚相逺馬有上中下輩于是孫子謂田忌曰君弟重射臣能令君勝田忌信然之與王及諸公子逐射千金及臨質孫子曰今以君之下駟與彼上駟取君上駟與彼中駟取君中駟與彼下駟既馳三輩畢而田忌一不勝而再勝卒得王千金于是忌進孫子于威王威王問兵法遂以為師其後魏伐趙趙急請救于齊齊威王欲將孫臏臏辭謝曰刑餘之人不可于是乃以田忌為將而孫子為師居輜車中坐為計謀田忌欲引兵之趙孫子曰夫解雜亂紛糾者不控捲救鬭者不摶撠批亢搗虛形格勢禁則自為解耳今梁趙相攻輕兵鋭卒必竭于外老弱罷于內君不若引兵疾走大梁據其街路衝其方虛彼必釋趙而自救是我一舉解趙之圍而收弊于魏也田忌從之魏果去邯鄲與齊戰于桂陵大破梁軍後十五年魏與趙攻韓韓告急于齊齊使田忌將而往直走大梁魏將龎涓聞之去韓而歸齊軍既已過而西矣孫子謂田忌曰彼三晉之兵素悍勇而輕齊齊號為怯善戰者因其勢而利導之兵法百里而趣利者蹶上將魏武帝曰蹶猶挫也五十里而趣利者軍半至使齊軍入魏地為十萬竈明日為五萬竈又明日為三萬竈龎涓行三日大喜曰我固知齊軍怯入吾地三日士卒亡者過半矣乃棄其步軍與其輕鋭倍日并行逐之孫子度其行暮當至馬陵馬陵道狹而旁多阻隘可伏兵乃斫大樹白而書之曰龎涓死于此樹之下于是令齊軍善射者萬弩夾道而伏期日暮見火舉而俱發龎涓果夜至斫木下見白書乃鑽火燭之讀其書未畢齊軍萬弩俱發魏軍大亂相失龎涓自知智窮兵敗乃自剄曰遂成豎子之名齊因乘勝盡破其軍虜魏太子申以歸孫臏以此名顯天下世傳其兵法吳起者衛人也好用兵嘗學于曾子事魯君齊人攻魯魯欲將吳起吳起取齊女為妻而魯疑之吳起于是欲就名遂殺其妻以明不與齊也魯卒以為將將而攻齊大破之魯人或惡吳起曰起之為人猜忍人也其少時家纍千金游仕不遂遂破其家鄉黨笑之吳起殺其謗已者三十餘人而東出衛郭門與其母訣齧臂而盟曰起不為卿相不復入衛遂事曾子居頃之其母死起終不歸曾子薄之而與起絶起乃之魯學兵法以事魯君魯君疑之起殺妻以求將夫魯小國而有戰勝之名則諸侯圖魯矣且魯衛兄弟之國也而君用起則是棄衛魯君疑之謝吳起吳起于是聞魏文侯賢欲事之文侯問李克曰吳起何如人哉李克曰起貪而好色然用兵司馬穰苴不能過也于是魏文侯以為將擊秦拔五城起之為將與士卒最下者同衣食卧不設席行不乘騎親裹贏糧與士卒分勞苦卒有病疽者起為吮之卒母聞而哭之人曰子卒也而將軍自吮其疽何哭為母曰非然也往年吳公吮其父其父戰不旋踵遂死于敵吳公今又吮其子妾不知其死所矣是以哭之文侯以吳起善用兵廉平盡能得士心乃以為西河守以拒秦韓魏文侯既卒起事其子武侯武侯浮西河而下中流顧而謂吳起曰美哉乎山河之固此魏國之寶也起對曰在德不在險昔三苗氏左洞庭右彭蠡德義不修禹滅之夏桀之居左河濟右泰華伊闕在其南羊腸在其北瓉曰今河南城為直之皇甫謐曰壺關有羊腸阪在大原晉陽西北九十里修政不仁湯放之殷紂之國左孟門右太行常山在其北大河經其南修政不德武王殺之由此觀之在德不在險若君不修德舟中之人盡為敵國也楊子法言曰美哉言乎使起之用兵每若斯則太公何以加諸武侯曰善即封吳起為西河守甚有聲名魏置相相田文吳起不悅謂田文曰請與子論功可乎田文曰可起曰將三軍使士卒樂死敵國不敢謀子孰與起文曰不如子起曰治百官親萬民實府庫子孰與起文曰不如子起曰守西河而秦兵不敢東鄉韓趙賔從子孰與起文曰不如子起曰此子三者皆出吾下而位加吾上何也文曰主少國疑大臣未附百姓不信方是之時屬之於子乎屬之於我乎起默然良久曰屬之子矣文曰此乃吾所以居子之上也吳起乃自知弗如田文田文既死公叔為相尚魏公主而害吳起公叔之僕曰起易去也公叔曰奈何其僕曰吳起為人節廉而自喜名也君因先與武侯言曰夫吳起賢人也而侯之國小又與强秦壤界臣竊恐起之無留心也武侯即曰奈何君因謂武侯曰試延以公主起有留心則必受之無留心則必辭矣以此卜之君因召吳起而與歸即令公主怒而輕君吳起見公主之賤君也則必辭于是吳起見公主之賤魏相果辭魏武侯武侯疑之而弗信也吳起懼得罪遂去即之楚楚悼王素聞起賢至則相楚明法審令捐不急之官廢公族疏逺者以撫養戰鬭之士要在强兵破馳說之言從橫者于是南平百越北并陳蔡却三晉西伐秦諸侯患楚之强故楚之貴戚盡欲害吳起及悼王死宗室大臣作亂而攻吳起吳起走之王尸而伏之擊起之徒因射刺吳起并中悼王悼王既葬太子立乃使令尹盡誅射吳起而并中王尸者坐射起而夷宗死者七十餘家太史公曰世俗所稱師旅皆道孫子十三篇吳起兵法世多有故弗論論其行事所施設者語曰能行之者未必能言能言之者未必能行孫子籌策龎涓明矣然不能蚤救患于被刑吳起說武侯以形勢不如德然行之於楚以刻暴少恩亡其軀悲夫史記集解卷六十五
