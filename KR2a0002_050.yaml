body:
  text: 史記集解卷五十二宋裴駰撰史記五十二齊悼惠王世家第二十二齊悼惠王劉肥者高祖長庻男也其母外婦也曰曹氏高祖六年立肥為齊王食七十城諸民能齊言者皆予齊王齊王孝惠帝兄也孝惠帝二年齊王入朝惠帝與齊王燕飲亢禮如家人吕太后怒且誅齊王齊王懼不得脫乃用其内史勲計獻城陽郡以為魯元公主湯沭邑吕太后喜乃得辭就國悼惠王即位十三年以惠帝六年卒子襄立是為哀王哀王元年孝惠帝崩吕太后稱制天下事皆決於高后二年高后立其兄子酈侯徐廣曰一作鄜吕台為吕王割齊之濟南郡為吕王奉邑哀王三年其弟章入宿衛於漢吕太后封為朱虚侯以吕禄女妻之後四年封章弟興居為東牟侯皆宿衞長安中哀王八年高后割齊琅邪郡立營陵侯劉澤為琅邪王其明年趙王友入朝幽死于邸三趙王皆廢高后立諸吕為三王徐廣曰燕趙梁擅權用事朱虚侯年二十有氣力忿劉氏不得職嘗入侍高后燕飲高后令朱虚侯劉章為酒吏章自請曰臣將種也請得以軍法行酒高后曰可酒酣章進飲歌舞已而曰請為太后言耕田歌高后兒子畜之笑曰顧而父知田耳若生而為王子安知田乎章曰臣知之太后曰試為我言田章曰深耕穊種立苗欲疏非其種者鋤而去之吕后默然頃之諸吕有一人醉亡酒章追抜劒斬之而還報曰有亡酒一人臣謹行法斬之太后左右皆大驚業已許其軍法無以罪也因罷自是之後諸吕憚朱虚侯雖大臣皆依朱虚侯劉氏為益彊其明年高后崩趙王吕禄為上將軍吕王産為相國皆居長安中聚兵以威大臣欲為亂朱虚侯章以吕禄女為婦知其謀乃使人隂出告其兄齊王欲令發兵西朱虚侯東牟侯為内應以誅諸吕因立齊王為帝齊王既聞此計乃與其舅父駟鈞郎中令祝午中尉魏勃隂謀發兵齊相召平聞之乃發卒衞王宫魏勃紿召平曰王欲發兵非有漢虎符驗也而相君圍王固善勃請為君將兵衞衞王召平信之乃使魏勃將兵圍王宫勃既將兵使圍相府召平曰嗟乎道家之言當斷不斷反受其亂乃是也遂自殺於是齊王以駟鈞為相魏勃為將軍祝午為内史悉發國中兵使祝午東詐琅邪王曰吕氏作亂齊王發兵欲西誅之齊王自以兒子年少不習兵革之亊願舉國委大王大王自高帝將也習戰事齊王不敢離兵使臣請大王幸之臨菑見齊王計事并將齊兵以西平闗中之亂琅邪王信之以為然西馳見齊王齊王與魏勃等因㽞琅邪王而使祝午盡發琅邪國而并將其兵琅邪王劉澤既見欺不得反國乃説齊王曰齊悼惠王高皇帝長子推本言之而大王高皇帝適長孫也當立今諸大臣狐疑未有所定而澤於劉氏最為長年大臣固待澤決計今大王㽞臣無為也不如使我入闗計事齊王以為然乃益具車送琅邪王既行齊遂舉兵西攻吕國之濟南於是齊哀王遺諸侯王書曰高帝平定天下王諸子弟悼惠王於齊悼惠王薨惠帝使㽞侯張良立臣為齊王惠帝崩高后用事春秋高聽諸吕擅廢高帝所立又殺三趙王滅梁燕趙以王諸吕分齊國為四忠臣進諫上惑亂不聽今高后崩皇帝春秋富未能治天下固恃大臣諸將今諸吕又擅自尊官聚兵嚴威劫列侯忠臣矯制以令天下宗廟所以危今寡人率兵入誅不當為王者漢聞齊發兵而西相國吕産乃遣大將軍灌嬰東撃之灌嬰至滎陽乃謀曰諸吕將兵居闗中欲危劉氏而自立我今破齊還報是益吕氏資也乃㽞兵屯滎陽使使喻齊王及諸侯與連和以待吕氏之變而共誅之齊王聞之乃西取其故濟南郡亦屯兵於齊西界以待約吕禄吕産欲作亂闗中諸虚侯與太尉勃丞相平等誅之朱虚侯首先斬吕産於是太尉勃等乃得盡誅諸吕而琅邪王亦從齊至長安大臣議欲立齊王而琅邪王及大臣曰齊王母家駟鈞惡戾虎而冠者也張晏曰言鈞惡戾如虎而著冠方以吕氏故幾亂天下今又立齊王是欲復為吕氏也代王母家薄氏君子長者且代王又親高帝子於今見在且最為長以子則順以善人則大臣安於是大臣乃謀迎立代王而遣朱虚侯以誅吕氏事告齊王令罷兵灌嬰在滎陽聞魏勃本敎齊王反既誅吕氏罷齊兵使使召責問魏勃勃曰失火之家豈暇先言大人而後救火乎因退立股戰而栗恐不能言者終無他語灌將軍熟視笑曰人謂魏勃勇妄庸人耳何能為乎乃罷魏勃魏勃父以善鼔琴見秦皇帝及魏勃少時欲求見齊相曹參家貧無以自通乃常獨早夜掃齊相舍人門外相舍人怪之以為物而伺之得勃勃曰願見相君無因故為子掃欲以求見於是舎人見勃曹參因以為舎人一為參御言事參以為賢言之齊悼惠王悼惠王召見則拜為内史始悼惠王得自置二千石及悼惠王卒而哀王立勃用事重於齊相王既罷兵歸而代王來立是為孝文帝元年盡以高后時所割齊之城陽琅邪濟南郡復與齊而徙琅邪王王燕益封朱虚侯東牟侯各二千户是歲齊哀王卒太子側立是為文王齊文王元年漢以齊之城陽郡立朱虚侯為城陽王以齊濟北郡立東牟侯為濟北王二年濟北王反漢誅殺之地入于漢後二年孝文帝盡封齊悼惠王子罷軍等七人皆為列侯齊文王立十四年卒無子國除地入于漢後一歲孝文帝以所封悼惠王子分齊為王齊孝王將閭以悼惠王子揚虚侯為齊王故齊别郡盡以王悼惠王子子志為濟北王子辟光為濟南王子賢為菑川王子卬為膠西王子雄渠為膠東王與城陽齊凡七王齊孝王十一年呉王濞楚王戊反興兵西告諸侯曰將誅漢賊臣鼂錯以安宗廟膠西膠東菑川濟南皆擅發兵應呉楚欲與齊齊孝王狐疑城守不聽三國兵共圍齊張晏曰膠西菑川濟南也齊王使路中大夫張晏曰姓路為中大夫告於天子天子復令路中大夫還告齊王善堅守吾兵今破呉楚矣路中大夫至三國兵圍臨菑數重無從入三國將劫與路中大夫盟曰若反言漢已破矣楚趣下三國不且見屠路中大夫既許之至城下望見齊王曰漢已發兵百萬使大尉周亞夫擊破呉楚方引兵救齊齊必堅守無下三國將誅路中大夫齊初圍急陰與三國通謀約未定會聞路中大夫從漢來喜及其大臣乃復勸王母下三國居無何漢將欒布平陽侯等兵至齊撃破三國兵解齊圍已而復聞齊初與三國有謀將欲移兵伐齊齊孝王懼乃飲藥自殺景帝聞之以為齊首善以迫劫有謀非其罪也乃立孝王太子壽為齊王是為懿王續齊後而膠西膠東濟南菑川王咸誅滅地入于漢徙濟北王王菑川齊懿王立二十二年卒子次景立是為厲王齊厲王其母曰紀太后太后取其弟紀氏女為厲王后王不愛紀氏女太后欲其家重寵令其長女紀翁主入王宫正其後宫毋令得近王欲令愛紀氏女王因與其姊翁主姧齊有宦者徐甲入事漢皇太后皇太后有愛女曰修成君修成君非劉氏張晏曰皇太后前嫁金氏所生太后憐之修成君有女名娥太后欲嫁之於諸侯宦者甲乃請使齊必令王上書請娥皇太后喜使甲之齊是時齊人主父偃知甲之使齊以取后事亦因謂甲即事成幸言偃女願得充王後宫甲既至齊風以此事紀太后大怒曰王有后後宫具備且甲齊貧人急徐廣曰一作反乃為宦者入事漢無補益乃欲亂吾王家且主父偃何為者乃欲以女充後宫徐甲大窮還報皇太后曰王已願尚娥然有一害恐如燕王燕王者與其子昆弟姦新坐以死亡國故以燕感太后太后曰無復言嫁女齊事事浸潯不得聞於天子主父偃由此亦與齊有郤主父偃方幸於天子用事因言齊臨菑十萬户市租千金人衆殷富巨於長安此非天子親弟愛子不得王此今齊王於親屬益疎乃從容言吕太后時齊欲反呉楚時孝王幾為亂今聞齊王與其姊亂於是天子乃拜主父偃為齊相且正其事主父偃既至齊乃急治王後宫宦者為王通於姊翁主所者令其辭證皆引王玉年少懼大罪為吏所執誅乃飲藥自殺絶無後是時趙王懼主父偃一出廢齊恐其漸疎骨肉乃上書言偃受金及輕重之短天子亦既囚偃公孫𢎞言齊王以憂死毋後國入漢非誅偃無以塞天下之望遂誅偃齊厲王立五年死毋後國入于漢齊悼惠王後尚有二國城陽及菑川菑川地比齊天子憐齊為悼惠王冢園在郡割臨菑東環悼惠王冢園邑盡以予菑川以奉悼惠王祭祀城陽景王章齊悼惠王子以朱虚侯與大臣共誅諸吕而章身首先斬相國吕王産於朱央宫孝文帝既立益封章二千戸賜金千斤孝文二年以齊之城陽郡立章為城陽王立二年卒子喜立是為共王共王八年徙王淮南四年復還王城陽凡三十三年卒子建延立是為頃王項王二十八年卒子義立是為敬王敬王九年卒子武立是為惠王惠王十一年卒子順立是為荒王荒王四十六年卒子恢立徐廣曰甘露二年是為戴王戴王八年卒子景立至建始三年十五歲卒濟北王興居齊悼惠王子以東牟侯助大臣誅諸吕功少及文帝從代來興居曰請與大僕嬰入清宫廢少帝共與大臣尊立孝文帝孝文帝二年以齊之濟北郡立興居為濟北王與城陽王俱立立二年反始大臣誅吕氏時朱虚侯功尤大許盡以趙地王朱虚侯盡以梁地王東牟侯及孝文帝立聞朱虚東牟之初欲立齊王故絀其功及二年王諸子乃割齊二郡以王章興居章興居自以失職奪功章死而興居聞匈奴大入漢漢多發兵使丞相灌嬰擊之文帝親幸太原以為天子自擊胡遂發兵反於濟北天子聞之罷丞相及行兵皆歸長安使棘蒲侯柴將軍張晏曰柴武擊破虜濟北王王自殺地入于漢為郡後十二年文帝十六年復以齊悼惠王子安都侯志為濟北王十一年呉楚反時志堅守不與諸侯合謀呉楚已平徙志王菑川濟南王辟光齊悼惠王子以勒侯孝文十六年為濟南王十一年與呉楚反漢擊破殺辟光以濟南為郡地入于漢菑川王賢齊悼惠王子以武城侯文帝十六年為菑川王十一年與呉楚反漢擊破殺賢天子因徙濟北王志王菑川志亦齊悼惠王子以安都侯王濟北菑川王反毋後乃徙濟北王王菑川凡立三十五年卒諡為懿王子建代立是為靖王二十年卒子遺代立是為頃王三十六年卒子終古立是為思王二十八年卒子尚立是為孝王五年卒子横立至建始三年十一歲卒膠西王卬齊悼惠王子以昌平侯文帝十六年為膠西王十一年與呉楚反漢擊破殺卬地入于漢為膠西郡膠東王雄渠齊悼惠王子以白石侯文帝十六年為膠東王十一年與呉楚反漢擊破殺雄渠地入于漢為膠東郡太史公曰諸侯大國無過齊悼惠王以海内初定子弟少激秦之無尺土封故大封同姓以填萬民之心及後分裂固其理也史記集解卷五十二
