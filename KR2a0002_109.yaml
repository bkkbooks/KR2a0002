body:
  text: 史記集解卷一百十一宋裴駰撰史記一百十一衛將軍驃騎列傳第五十一大将軍衛青者平陽人也其父鄭季為吏給事平陽侯家與侯妾衛媪通生青青同母兄衛長子而姊衛子夫自平陽公主家得幸天子徐廣曰曹參曽孫平陽夷侯時尚武帝姊平陽公主主子襄故冒姓為衛氏字仲卿長子更字長君長君母號為衛媪媪長女衛孺次女少兒次女即子夫後子夫男弟歩廣徐廣曰歩一作少皆冒衛氏青為侯家人少時歸其父其父使牧羊先母之子服䖍曰先母適妻也青之適母皆奴畜之不以為兄弟數青嘗從人至甘泉居室有一鉗徒張晏曰甘泉中徒所居也相青曰貴人也官至封侯青笑曰人奴之生得母笞罵即足矣安得封侯事乎青壯為侯家騎從平陽主建元二年春青姊子夫得入宫幸上皇后堂邑大長公主女也徐廣曰堂邑安侯陳嬰之孫夷侯午尚景帝姊長公主生子季須元鼎年季須坐姧自殺無子妒大長公主聞衛子夫幸有身妒之乃使人捕青青時給事建章未知名大長公主執囚青欲殺之其友騎郎公孫敖敖與壯士簒取之以故得不死上聞乃召青為建章監侍中及同母昆弟貴賞賜數日間累千金孺為太僕公孫賀妻少兒故與陳掌通徐廣曰陳平曽孫名掌也上召貴掌公孫敖由此益貴子夫為夫人青為太中大夫元光五年青為車騎将軍擊匈奴出上谷太僕公孫賀為輕車將軍出雲中太中大夫公孫敖為騎將軍出代郡衛尉李廣為驍騎将軍出鴈門軍各萬騎青至籠城斬首虜數百騎將軍敖亡七千騎衛尉李廣為虜所得得脱歸皆當斬贖為庶人賀亦無功元朔元年春衛夫人有男立為皇后其秋青為車騎將軍出鴈門三萬騎擊匈奴斬首虜數千人明年匈奴入殺遼西太守虜畧漁陽二千餘人敗韓將軍軍漢令將軍李息撃之出代令車騎将軍青出雲中以西至髙闕遂畧河南地至於隴西捕首虜數千畜數十萬走白羊樓煩王遂以河南地為朔方郡以三千八百户封青為長平侯青校尉蘇建有功以千一百户封建為平陵侯使建築朔方城青校尉張次公有功封為岸頭侯天子曰匈奴逆天理亂人倫暴長虐老以盜竊為務行詐諸蠻夷造謀藉兵數為邉害張晏曰從蠻夷借兵鈔邉也故興師遣將以征厥罪詩不云乎薄伐玁狁至於太原出車彭彭城彼朔方今車騎將軍青度西河至髙闕𫉬首虜二千三百級車輜畜產畢收為鹵已封為列侯遂西定河南地按榆谿舊塞如淳曰按行也榆谿舊塞名或曰按尋也絶梓領梁北河如淳曰絶度也為北河作橋梁討蒲泥破符離晉灼曰二王號斬輕鋭之卒捕服聴者三千七十一級張晏曰伏於隠處聴軍虚實執訊𫉬醜驅馬牛羊百有餘萬全甲兵而還益封青三千户其明年匈奴入殺代郡太守友徐廣曰友者太守名也姓共也入畧雁門千餘人其明年匈奴大入代定襄上郡殺畧漢數千人其明年元朔之五年春漢令車騎將軍青將三萬騎出髙闕衛尉蘇建為游擊將軍左内史李沮文潁曰音俎為彊弩將軍太僕公孫賀為騎將軍代相李蔡為輕車將軍皆領屬車騎將單俱出朔方大行李息岸頭侯張次公為將軍出右北平咸擊匈奴匈奴右賢王當衛青等兵以為漢兵不能至此飲醉漢兵夜至圍右賢王右賢王驚夜逃獨與其愛妾一人壯騎數百馳潰圍北去漢輕騎校尉郭成等逐數百里不及得右賢裨王十餘人衆男女萬五千餘人畜數千百萬於是引兵而還至塞天子使使者持大將軍印因軍中拜車騎將軍青為大將軍諸將皆以兵屬大將軍大將軍立號而歸天子曰大將軍青躬率戎士師大㨗𫉬匈奴王十有餘人益封青六千户而封青子伉為宜春侯青子不疑為隂安侯青子登為發干侯青固辭曰臣幸得待罪行間賴陛下神靈軍大㨗皆諸校尉力戰之功也陛下幸已益封臣青臣青子在繦緥中未有勤勞上幸列地封為三侯非臣待罪行間所以勸士力戰之意也伉等三人何敢受封天子曰我非忘諸校尉功也今固且圖之乃詔御史曰䕶軍都尉公孫敖三從大將軍擊匈奴常䕶軍傅校獲王以千五百戸封敖為合騎侯都尉韓説從大將軍出窳渾徐廣曰窳渾在朔方音瘐至匈奴右賢王庭為麾下搏戰獲王以千三百戸封說為龍額侯騎將軍公孫賀從大將軍獲王以千三百戸封賀為南窌侯徐廣曰窌宜作奅音匹孝反輕車將軍李蔡再從大将軍獲王以千六百戸封蔡為樂安侯校尉李朔校尉趙不虞校尉公孫戎奴各三從大将軍獲王以千三百戸封朔為渉軹侯以千三百户封不虞為隨成侯以千三百戸封戎奴為從平侯将軍李沮李息及校尉豆如意有功賜爵闗内侯食邑各三百户其秋匈奴入代殺都尉朱英其明年春大將軍青出定襄合騎侯敖為中将軍太僕賀為左将軍翕侯趙信為前将軍衛尉蘇建為右将軍郎中令李廣為後将軍右内史李沮為彊弩将軍咸屬大將軍斬首數千級而還月餘悉復出定襄擊匈奴斬首虜萬餘人右将軍建前将軍信并軍三千餘騎獨逢單于兵與戰一日餘漢兵且盡前将軍故胡人降為翕侯見急匈奴誘之遂将其餘騎可八百犇降單于石将軍蘇建盡亡其軍獨以身得亡去自歸大將軍大将軍問其罪正閎張晏曰正軍正也閎名也長史安議郎周霸等徐廣曰儒生建當云何霸曰自大将軍出未甞斬禆將今建棄軍可斬以明将軍之威閎安曰不然兵法小敵之堅大敵之禽也今建以數千當單于數萬力戰一日餘士盡不敢有二心自歸自歸而斬之是示後無反意也不當斬大将軍曰青幸得以肺腑待罪行間不患無威而霸説我以明威甚失臣意且使臣職雖當斬将以臣之尊寵而不敢自擅専誅於境外而具歸天子天子自裁之於是以見為人臣不敢専權不亦可乎軍吏皆曰善遂囚建詣行在所蔡邕曰天子自謂所居曰行在所言今雖在京師行所至耳巡狩天下所奏事處皆為宫在長安則曰奏長安宫在泰山則曰奉髙宫唯當時所在入塞罷兵是嵗也大將軍姊子霍去病徐廣曰姊即少兒也年十八幸為天子侍中善騎射再從大將軍大将軍受詔與壯士為剽姚校尉與輕勇騎八百直棄大軍數百里赴利斬捕首虜過當於是天子曰剽姚校尉去病斬首虜二千二十八級及相國當户斬單于大父行藉若侯產張晏曰藉若胡侯生捕季父羅姑比再冠軍以千六百戸封去病為冠軍侯上谷太守郝賢四從大將軍捕斬首虜二千餘人以千一百户封賢為衆利侯是嵗失兩将軍軍亡翕侯軍功不多故大将軍不益封右将軍建至天子不誅赦其罪贖為庶人大将軍既還賜千金是時王夫人方幸於上寗乗説大将軍曰将軍所以功未甚多身食萬户三子皆為侯者徒以皇后故也今王夫人幸而宗族未富貴願将軍奉所賜千金為王夫人親夀大将軍乃以五百金為壽天子聞之問大将軍大将軍以實言上乃拜寗乗為東海都尉校尉張騫從大将軍以甞使大夏留匈奴中乆導軍知善水草處軍得以無飢渇因前使絶國功封騫博望侯冠軍侯去病既侯三嵗元狩二年春以冠軍侯去病為驃騎將軍徐廣曰驃一亦作剽将萬騎出隴西有功天子曰驃騎将軍率戎士踰烏盭漢書音義曰音戾山名也討遫濮渉狐奴晉灼曰水名也歴五王國輜重人衆懾慴者弗取文頴曰恐懼也冀獲單于子徐廣曰一作與轉戰六日過焉支山千有餘里合短兵殺折蘭王斬盧胡王張晏曰折蘭盧胡國名也殺者殺之而已斬者獲其首誅全甲徐廣曰全一作金執渾邪王子及相國都尉首虜八千餘級收休屠祭天金人如淳曰祭天為主益封去病二千户其夏驃騎将軍與合騎侯敖俱出北地異道博望侯張騫郎中令李廣俱出右北平異道皆撃匈奴郎中令将四千騎先至博望侯將萬騎在後至匈奴左賢王将數萬騎圍郎中令郎中令與戰二日死者過半所殺亦過當博望侯至匈奴兵引去博望侯坐行留當斬贖為庶人而驃騎将軍出北地已遂深入與合騎侯失道不相得驃騎将軍踰居延至祁連山捕首虜甚多天子曰驃騎将軍踰居延張晏曰水名也遂過小月氏攻祁連山得酋涂王張晏曰胡王也以衆降者二千五百人斬首虜三萬二百級獲五王五王母單于閼氏王子五十九人相國将軍當户都尉六十三人師大率減什三益封去病五千戸賜校尉從至小月氏爵左庶長鷹擊司馬破奴再從驃騎将軍斬遬濮王捕稽且王千騎将得王王母各一人王子以下四十一人捕虜三千三百三十人前行捕虜千四百人以千五百戸封破奴為從驃侯張晏曰從驃騎将軍有功因以為號校尉句王徐廣曰句音鉤匈奴以為號髙不識從驃騎将軍捕呼于屠王王子以下十一人捕虜千七百六十八人以千一百户封不識為宜冠侯校尉僕多有功封為煇渠侯合騎侯敖坐行留不與驃騎㑹當斬贖為庶人諸宿将所将士馬兵亦不如驃騎驃騎所将常選然亦敢深入常與壯騎先其大将軍軍亦有天幸未甞困絶也然而諸宿将常坐留落不遇由此驃騎日以親貴比大将軍其秋單于怒渾邪王居西方數為漢所破亡數萬人以驃騎之兵也單于怒欲召誅渾邪王渾邪王與休屠王等謀欲降漢使人先遣使向邉境要遮漢人令報天子要邉是時大行李息将城河上得渾邪王使即馳傳以聞天子聞之於是恐其以詐降而襲邉乃令驃騎将軍将兵往迎之驃騎既渡河與渾邪王衆相望渾邪王裨将見漢軍而多欲不降者頗遁去驃騎乃馳入與渾邪王相見斬其欲亡者八千人遂獨遣渾邪王乗傳先詣行在所盡将其衆渡河降者數萬號稱十萬既至長安天子所以賞賜者數十巨萬封渾邪王萬尸為漯隂侯封其裨王呼毒尼文頴曰胡王名為下麾侯鷹庇徐廣曰一云篇訾為煇渠侯禽棃為河綦侯徐廣曰禽一作鳥大當户銅離徐廣曰一作稠離也為常樂侯於是天子嘉驃騎之功曰驃騎將軍去病率師攻匈奴西域王渾邪王及厥衆萌咸相犇率以軍糧接食并將控弦萬有餘人誅獟駻晉灼曰獟音欺譙反獲首虜八千餘級降異國之王三十二人戰士不離傷十萬之衆咸懷集服仍與之勞爰及河塞庶㡬無患幸既永綏矣以千七百户益封驃騎将軍減隴西北地上郡戍卒之半以寛天下之繇居頃之乃分徙降者邉五郡故塞外而皆在河南因其故俗為屬國其明年匈奴入右北平定襄殺畧漢千餘人其明年天子與諸將議曰翕侯趙信為單于畫計常以為漢兵不能度幕輕留今大發士卒其勢必得所欲是嵗元狩四年也元狩四年春上令大将軍青驃騎将軍去病將各五萬騎歩兵轉者踵軍數十萬而敢力戰深入之士皆屬驃騎驃騎始為出定襄當單于捕虜言單于東乃更令驃騎出代郡令大将軍出定襄郎中令為前将軍太僕為左將軍主爵趙食其為右将軍平陽侯襄為後将軍皆屬大將軍兵即度幕軍人馬凡五萬騎與驃騎等咸擊匈奴單于趙信為單于謀曰漢兵既度幕人馬罷匈奴可坐收虜耳乃悉逺北其輜重皆以精兵待幕北而適值大将軍軍出塞千餘里見單于兵陳而待於是大將軍令武剛車孫吴兵法曰有巾有葢謂之武剛車也自環為營而縱五千騎往當匈奴匈奴亦縱可萬騎㑹日且入大風起砂礫擊面兩軍不相見漢益縱左右翼繞單于單于視漢兵多而士馬尚彊戰而匈奴不利薄萛單于遂乗六驘壯騎可數百直冒漢圍西北馳去時已昏漢匈奴相紛拏殺傷大當漢軍左校捕虜言單于未昏而去漢軍因發輕騎夜追之大将軍軍因隨其後匈奴兵亦散走遲明行二百餘里徐廣曰遲一作黎不得單于頗獲斬首虜萬餘級遂至窴顔山趙信城徐廣曰窴音田得匈奴積粟食軍軍留一日而還悉燒其城餘粟以歸大將軍之與單于㑹也而前將軍廣右将軍食其軍别從東道或失道後擊單于大將軍引還過幕南乃得前将軍右將軍大将軍欲使使歸報令長史簿責前將軍廣廣自殺右将軍至下吏贖為庶人大將軍軍入塞凡斬捕首虜萬九千級是時匈奴衆失單于十餘日右谷蠡王聞之自立為單于單于後得其衆右王乃去單于之號驃騎将軍亦將五萬騎車重與大将軍軍等而無裨将悉以李敢等為大校當裨將出代右北平千餘里直左方兵所斬捕功已多大將軍軍既還天子曰驃騎將軍去病率師躬将所獲葷粥之士徐廣曰粥一作允駰案應劭曰所降士有材力者約輕齎絶大幕渉獲章渠徐廣曰獲一作䕶以誅比車耆晉灼曰王號也轉撃左大将斬獲旗鼔厯涉離侯濟弓閭晉灼曰水名也獲屯頭王漢書音義曰胡王號也韓王等三人徐廣曰王一作藉将軍相國當户都尉八十三人封狼居胥山禪於姑衍登臨翰海張晏曰登海邉山以望海也執鹵獲醜七萬有四百四十三級師率減什三取食於敵逴行殊逺而粮不絶以五千八百户益封驃騎将軍右北平太守路博徳屬驃騎將軍㑹與城不失期從至檮余山斬首捕虜二千七百級以千六百户封博徳為符離侯北地都尉邢山徐廣曰一作衛山從驃騎将軍獲王以千二百户封山為義陽侯故歸義因淳王復陸支樓専王伊即靬皆從驃騎将軍有功以千三百户封陸支為壯侯以千八百户封伊即靬為衆利侯從驃侯破奴昌武侯安稽徐廣曰姓趙故匈奴王從驃騎有功益封各三百户校尉敢得旗鼓為闗内侯食邑二百户校尉自為爵大庶長軍吏卒為官賞賜甚多而大将軍不得益封軍吏卒皆無封侯者兩軍之出塞塞閱官及私馬凡十四萬匹而復入塞者不滿三萬匹乃益置大司馬位大将軍驃騎将軍皆為大司馬如淳曰大将軍驃騎将軍皆有大司馬之號也定令今驃騎将軍秩禄與大将軍等自是之後大将軍青日退而驃騎将軍日益貴舉大将軍故人門下多去事驃騎輒得官爵唯任安不肯驃騎将軍為人少言不泄有氣敢任天子常欲教之孫吴兵法對曰顧方畧何如耳不至學古兵法天子為治第令驃騎視之對曰匈奴未滅無以家為也由此上益重愛之然少而侍中貴不省士其從軍天子為遣太官齎數十乗既還重車餘棄粱肉而士有飢者其在塞外卒乏糧或不能自振而驃騎尚穿域蹋鞠徐廣曰穿地為營域事多此類大將軍為人仁善退讓以和柔自媚於上然天下未有稱也驃騎將軍自四年軍後三年元狩六年而卒天子悼之發屬國𤣥甲軍陳自長安至茂陵為冢像祁連山謚之并武與廣地曰景桓侯蘇林曰景武諡也桓廣地諡也張晏曰諡法布義行剛曰景闢土服逺曰桓子嬗代侯嬗少字子侯上愛之幸其壯而將之居六嵗元封元年嬗卒諡哀侯無子絶國除自驃騎将軍死後大将軍長子宜春侯伉坐法失侯後五嵗伉弟二人隂安侯不疑及發干侯登皆坐酎金失侯失侯後二嵗冠軍侯國除其後四年大将軍青卒徐廣曰元封五年諡為烈侯子伉代為長平侯自大将軍圍單于之後十四年而卒竟不復擊匈奴者以漢馬少而方南誅兩越東伐朝鮮擊羌西南夷以故乆不伐胡大将軍以其得尚平陽長公主故長平侯伉代侯六嵗坐法失侯左方兩大将軍及諸禆將名最大將軍青凡七出擊匈奴斬捕首虜五萬餘級一與單于戰収河南地遂置朔方郡再益封凡萬一千八百户封三子為侯二千三百户并之萬五千七百户其校尉裨将以從大将軍侯者九人其裨将及校尉已為将者十四人為裨將者曰李廣自有傳無傳者曰将軍公孫賀賀義渠人其先胡種賀父渾邪景帝時為平曲侯徐廣曰為隴西太守坐法失侯賀武帝為太子時舍人武帝立八嵗以太僕為輕車将軍軍馬邑後四嵗以輕車将軍出雲中後五嵗以騎将軍從大将軍有功封為南窌侯後一嵗以左将軍再從大将軍出定襄無功後四嵗以坐酎金失侯後八嵗徐廣曰元鼎六年以浮沮将軍出五原二千餘里無功後八嵗徐廣曰大初二年以太僕為丞相封葛繹侯賀七為将軍出擊匈奴無大功而再侯為丞相坐子敬聲與陽石公主姧徐廣曰陽石一云徳邑為巫蠱族滅無後将軍李息郁郅人服䖍曰郅音窒事景帝至武帝立八嵗為材官将軍軍馬邑後六嵗為将軍出代從三嵗為将軍從大将軍出朔方皆無功凡三為将軍其後常為大行将軍公孫敖義渠人以郎事武帝武帝立十二嵗為驃騎将軍出代亡卒七千人當斬贖為庶人後五嵗以校尉從大将軍有功封為合騎侯後一嵗以中将軍從大将軍再出定襄無功後二嵗以将軍出北地後驃騎期當斬贖為庶人後二嵗以校尉從大将軍無功後十四嵗以因杆将軍築受降城七嵗復以因杆将軍再出擊匈奴至余吾亡士卒多下吏當斬詐死亡居民間五六嵗後發覺復繫坐妻為巫蠱族凡四為将軍出撃匈奴一侯将軍李沮雲中人事景帝武帝立十七嵗以左内史為彊弩将軍後一嵗復為彊弩将軍将軍李蔡成紀人也事孝文帝景帝武帝以輕車将軍從大将軍有功封為樂安侯已為丞相坐法死将軍張次公河東人以校尉從衛将軍青有功封為岸頭侯其後大后崩為将軍軍北軍後一嵗為将軍從大将軍再為將軍坐法失侯次公父隆輕車武射也以善射景帝幸近之也将軍蘇建杜陵人以校尉從衛将軍青有功為平陵侯以将軍築朔方後四嵗為游擊将軍從大将軍出朔方後一嵗以右将軍再從大将軍出定襄亡翕侯失軍當斬贖為庶人其後為代郡太守卒冢在大猶鄉将軍趙信以匈奴相國降為翕侯武帝立十七嵗為前将軍與單于戰敗降匈奴将軍張騫以使通大夏還為校尉從大将軍有功封為博望侯後三嵗為将軍出右北平失期當斬贖為庶人其後使通烏孫為大行而卒冢在漢中将軍趙食其祋祤人也武帝立二十二嵗以主爵為右将軍從大将軍出定襄迷失道當斬贖為庶人將軍曹襄以平陽侯為後将軍從大将軍出定襄襄曹參孫也将軍韓説弓髙侯庶孫也以校尉從大将軍有功為龍頟侯坐酎金失侯元鼎六年以待詔為横海将軍撃東越有功為按道侯以太初三年為游撃将軍屯於五原外列城為光禄勲掘蠱太子宫衛太子殺之将軍郭昌雲中人也以校尉從大将軍元封四年以太中大夫為拔胡将軍屯朔方還撃昆明母功奪印将軍荀彘太原廣武人以御見侍中為校尉數從大将軍以元封三年為左将軍撃朝鮮無功以捕樓船将軍坐法死最驃騎将軍去病凡六出擊匈奴其四出以将軍徐廣曰再出以剽姚校尉也斬捕首虜十一萬餘級及渾邪王以衆降數萬遂開河西酒泉之地西方益少胡宼四益封凡萬五千一百户其校吏有功為侯者凡六人而後為将軍二人将軍路博徳平州人以右北平太守從驃騎将軍有功為符離侯驃騎死後博徳以衛尉為伏波将軍伐破南越益封其後坐法失侯為彊弩都尉屯居延卒将軍趙破奴故九原人甞亡入匈奴已而歸漢為驃騎将軍司馬出北地時有功封為從驃侯坐酎金失侯後一嵗為匈河将軍攻胡至匈河水無功後二嵗徐廣曰元封二年擊虜樓蘭王復封為浞野侯後六嵗徐廣曰太初二年為浚稽将軍将二萬騎擊匈奴左賢王左賢王與戰兵八萬騎圍破奴破奴生為虜所得遂沒其軍居匈奴中十嵗復與其太子安國亡入漢徐廣曰以太初二年入匈奴天漢元年亡歸涉四年後坐巫蠱族自衛氏興大将軍青首封其後枝屬為五侯凡二十四嵗而五侯盡奪衛氏無為侯者太史公曰蘇建語余曰吾甞責大将軍至尊重而天下之賢大夫毋稱焉願將軍觀古名将所招選擇賢者勉之哉大将軍謝曰自魏其武安之厚賔客天子常切齒彼親附士大夫招賢絀不肖者人主之柄也人臣奉法遵職而已何與招士驃騎亦放此意其為将如此史記集解卷一百十一
