body:
  text: 史記集解卷一百十六宋裴駰撰史記一百十六西南夷列傳第五十六西南夷君長以什數夜郎最大其西靡莫之屬以什數滇最大如淳曰滇音顛顛馬出其國也自滇以北君長以什數卭都最大此皆魋結耕田有邑聚其外西自同師以東韋昭曰邑名也北至楪榆韋昭曰在益州楪音葉名為嶲昆明徐廣曰永昌有嶲唐縣皆編髮隨畜遷徙毋常處毋君長地方可數千里自嶲以東北君長以什數徙筰都最大徐廣曰徙在漢嘉筰音昨在越嶲自筰以東北君長以什數冉駹最大其俗或土著或移徙在蜀之西自冉駹以東北君長以什數白馬最大皆氐類也此皆巴蜀西南外蠻夷也始楚威王時使將軍莊蹻將兵循江上略巴蜀黔中以西莊蹻者故楚莊王苖裔也蹻至滇池地方三百里旁平地肥饒數千里以兵威定屬楚欲歸報會秦擊奪楚巴黔中郡道塞不通因還以其衆王滇變服從其俗以長之秦時常頞音案略通五尺道諸此國頗置吏焉十餘嵗秦滅及漢興皆棄此國而開蜀故檄巴蜀民或竊出商賈取其筰馬僰僮髦牛以此巴蜀殷富建元六年大行王恢擊東越東越殺王郢以報恢因兵威使番陽令唐蒙風指曉南越南越食蒙蜀枸醬徐廣曰枸一作茍音窶駰案漢書音義曰枸木似榖樹其葉如桑葉用其葉作醬酢美蜀人以為珍味蒙問所從來曰道西北牂牱牂牱江廣數里出番禺城下蒙歸至長安問蜀賈人賈人曰獨蜀出枸醬多持竊出市夜郎夜郎者臨牂牱江江廣百餘步足以行船南越以財物役屬夜郎西至同師然亦不能臣使也蒙乃上書説上曰南越王黃屋左纛地東西萬餘里名為外臣實一州主也今以長沙豫章往水道多絶難行竊聞夜郎所有精兵可得十餘萬浮船牂牱江出其不意此制越一竒也誠以漢之強巴蜀之饒通夜郎道為置吏易甚上許之乃拜蒙為郎中將將千人食重萬餘人從巴蜀筰關入遂見夜郎侯多同蒙厚賜喻以威德約為置吏使其子為令夜郎旁小邑皆貪漢繒帛以為漢道險終不能有也乃且聽蒙約還報乃以為犍為郡發巴蜀卒治道自僰道指牂牱江蜀人司馬相如亦言西夷卭筰可置郡使相如以郎中將往喻皆如南夷為置一都尉十餘縣屬蜀當是時巴蜀四郡徐廣曰漢中巴郡廣漢蜀郡通西南夷道戍轉相餉數嵗道不通士罷飢離溼死者甚衆西南夷又數反發兵興擊耗費無功上患之使公孫宏往視問焉還對言其不便及宏為御史大夫是時方築朔方以據河逐胡宏因數言西南夷害可且罷專力事胸奴上罷西夷獨置南夷夜郎兩縣一都尉徐廣曰元光六年南夷始置郵亭稍令犍為自葆就及元狩元年博望侯張騫使大夏來言居大夏時見蜀布卭竹杖韋昭曰卭縣之竹屬蜀瓚曰卭山名此竹節髙實中可作杖使問所從來曰從東南身毒國徐廣曰字或作竺漢書直云身毒史記一本作乾毒駰案漢書音義曰一名天竺則浮屠胡是也可數千里得蜀賈人市或聞卭西可二千里有身毒國騫因盛言大夏在漢西南慕中國患胸奴隔其道誠通蜀身毒國道便近有利無害於是天子乃令王然于柏始昌呂越人等使間出西夷西指求身毒國至滇滇王嘗羌徐廣曰嘗一作賞乃留為求道西十餘輩嵗餘皆閉昆明如淳曰為昆明所閉道莫能通身毒國滇王與漢使者言曰漢孰與我大及夜郎侯亦然以道不通故各自以為一州主不知漢廣大使者還因盛言滇大國足事親附天子注意焉及至南越反上使馳義侯因犍為發南夷兵且蘭君恐逺行旁國虜其老弱乃與其衆反殺使者及犍為太守漢乃發巴蜀罪人嘗擊南越者八校尉擊破之會越已破漢八校尉不下即引兵還行誅頭蘭頭蘭常隔滇道者也已平頭蘭遂平南夷為牂牱郡夜郎侯始倚南越南越已滅會還誅反者夜郎遂入朝上以為夜郎王南越破後及漢誅且蘭卭君并殺筰侯冉駹皆震恐請臣置吏乃以卭都為越嶲郡筰都為沈犁郡冉駹為汶山郡應劭曰今蜀郡岷江廣漢西白馬為武都郡上使王然于以越破及誅南夷兵威風喻滇王入朝滇王者其衆數萬人其旁東北有勞􅒓靡莫皆同姓相扶未肯聽勞􅒓靡莫數侵犯使者吏卒元封二年天子發巴蜀兵擊滅勞􅒓靡莫以兵臨滇滇王始首善以故弗誅滇王離難西南夷舉國降請置吏入朝於是以為益州郡賜滇王王印復長其民西南夷君長以百數獨夜郎滇受王印滇小邑最寵焉太史公曰楚之先豈有天祿哉在周為文王師封楚及周之衰地稱五千里秦滅諸侯唯楚苖裔尚有滇王漢誅西南夷國多滅矣唯滇復為寵王然南夷之端見枸醬番禺大夏杖卭竹西夷後揃剽分二方史記音義曰音翦卒為七郡徐廣曰犍為牂牱越巂益州武都沈犂汶山地也史記集解卷一百十六
