body:
  text: 史記集解卷一百宋裴駰撰史記一百季布欒布列傳第四十季布者楚人也為氣任俠孟康曰信交道曰任如淳曰相與信為任同是非為俠所謂權行州里力折公侯者也或曰任氣力也俠俜也有名於楚項籍使將兵數窘漢王如淳曰窘困也及項羽滅髙祖購求布千金敢有舍匿罪及三族季布匿濮陽周氏周氏曰漢購將軍急迹且至臣家將軍能聽臣臣敢獻計即不能願先自剄季布許之乃髠鉗季布衣褐衣置廣栁車中服虔曰東郡謂廣轍車為栁鄧展曰皆棺飾也載以喪車欲人不知也李竒曰大牛車也車上覆為栁瓚曰茂陵書中有廣栁車每縣數百乘足今運轉大車是也并與其家僮數十人之魯朱家所賣之朱家心知是季布乃買而置之田誡其子曰田事聽此奴必與同食朱家乃乘軺車徐廣曰馬車也之洛陽見汝隂侯滕公滕公留朱家飲數日因謂滕公曰季布何大罪而上求之急也滕公曰布數為項羽窘上上怨之故必欲得之朱家曰君視季布何如人也曰賢者也朱家曰臣各為其主用季布為項籍用職耳項氏臣可盡誅邪今上始得天下獨以己之私怨求一人何示天下之不廣也且以季布之賢而漢求之急如此此不北走胡即南走越耳夫忌壯士以資敵國此伍子胥所以鞭荆平王之墓也君何不從容為上言邪汝隂侯滕公心知朱家大俠意季布匿其所乃許曰諾待間果言如朱家指上乃赦季布當是時諸公皆多季布能摧剛為柔朱家亦以此名聞當世季布召見謝上拜為郎中孝惠時為中郎將單于嘗為書嫚呂后不遜呂后大怒召諸將議之上將軍樊噲曰臣願得十萬衆橫行胸奴中諸將皆阿呂后意曰然季布曰樊噲可斬也夫髙帝將兵四十餘萬衆困於平城今噲奈何以十萬衆橫行胸奴中面欺且秦以事於胡陳勝等起于今創痍未瘳噲又面諛欲搖動天下是時殿上皆恐太后罷朝遂不復議擊胸奴事季布為河東守孝文時人有言其賢者孝文召欲以為御史大夫復有言其勇使酒難近至留邸一月見罷季布因進曰臣無功竊寵待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有以毁臣者夫陛下以一人之譽而召臣以一人之毁而去臣臣恐天下有識聞之有以窺陛下也韋昭曰窺見陛下深淺也上默慙良久曰河東吾股肱郡故時召君耳布辭之官楚人曹丘生辨士數招權顧金錢孟康曰招來也以金錢事權貴而求得其形勢以自炫耀也文頴曰事權貴也與通勢以其所有辜較請託金錢以自顧事貴人趙同等徐廣曰漢書作趙談司馬遷以父名談故改之與竇長君善季布聞之寄書諫竇長君曰吾聞曹丘生非長者勿與通及曹丘生歸欲得書請季布張晏曰欲使竇長君為介於布請見竇長君曰季將軍不説足下足下無往固請書遂行使人先發書季布果大怒待曹丘曹丘至即揖季布曰楚人諺曰得黃金百斤不如得季布一諾足下何以得此聲於梁楚間哉且僕楚人足下亦楚人也僕遊揚足下之名於天下顧不重邪何足下距僕之深也季布乃大説引入留數月為上客厚送之季布名所以益聞者曹丘揚之也季布弟季心徐廣曰一作子氣蓋關中遇人恭謹為任俠方數千里士皆爭為之死嘗殺人亡之吳從袁絲匿長事袁絲弟畜灌夫籍福之屬嘗為中司馬如淳曰中尉之司馬中尉郅都不敢不加禮少年多時時竊籍其名以行當是時季心以勇布以諾著聞關中季布母弟丁公晉灼曰楚漢春秋云薛人名固為楚將丁公為項羽逐窘髙祖彭城西短兵接髙祖急顧丁公曰兩賢豈相厄哉於是丁公引兵而還漢王遂解去及項王滅丁公謁見髙祖以丁公徇軍中曰丁公為項王臣不忠使項王失天下者乃丁公也遂斬丁公曰使後世為人臣者無效丁公欒布者梁人也始梁王彭越為家人時嘗與布遊窮困賃傭於齊為酒人保漢書音義曰酒家作保傭也可保信故謂之保數嵗彭越去之巨野中為盜而布為人所略賣為奴於燕為其家主報仇燕將臧荼舉以為都尉臧荼後為燕王以布為將及臧荼反漢擊燕虜布梁王彭越聞之乃言上請贖布以為梁大夫使於齊未還漢召彭越責以謀反夷三族已而梟彭越頭於雒陽下詔曰有敢收視者輒捕之布從齊還奏事彭越頭下祠而哭之吏捕布以聞上召布罵曰若與彭越反邪吾禁人勿收若獨祠而哭之與越反明矣趣亨之方提趣湯徐廣曰趣一作走布顧曰願一言而死上曰何言布曰方上之困於彭城敗滎陽成臯間項王所以遂不能西徒以彭王居梁地與漢合從苦楚也當是之時彭王一顧與楚則漢破與漢而楚破且垓下之會微彭王項氏不亡天下已定彭王剖符受封亦欲傳之萬世今陛下一徴兵於梁彭王病不行而陛下疑以為反反形未見以苛小徐廣曰小一作峭案誅滅之臣恐功臣人人自危也今彭王已死臣生不如死請就亨於是上乃釋布罪拜為都尉孝文時為燕相至將軍布乃稱曰窮困不能辱身下志非人也富貴不能快意非賢也於是嘗有德者厚報之有怨者必以法滅之吳軍反時以軍功封俞侯徐廣曰擊齊有功也復為燕相燕濟之間皆為欒布立社號曰欒公社景帝中五年薨子賁嗣為太常犧牲不如令國除太史公曰以項羽之氣而季布以勇顯於楚身屨典軍徐廣曰屨一作屢一曰覆駰案孟康曰屨履蹈之也黃曰屢數也搴旗者數矣可謂壯士然至被刑戮為人奴而不死何其下也彼必自負其材故受辱而不羞欲有所用其未足也故終為漢名將賢者誠重其死夫婢妾賤人感慨而自殺者徐廣曰或作概字音義同非能勇也其計畫無復之耳徐廣曰復一作兾欒布哭彭越趣湯如歸者彼誠知所處如淳曰非死者難處死者難不自重其死雖往古烈士何以加哉史記集解卷一百
