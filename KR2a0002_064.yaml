body:
  text: 史記集解卷六十六宋裴駰撰史記六十六伍子胥列傳第六伍子胥者楚人也名員員父曰伍奢員兄曰伍尚其先曰伍舉以直諫事楚莊王有顯故其後世有名於楚楚平王有太子名曰建使伍奢為太傅費無忌為少傅無忌不忠于太子建平王使無忌為太子取婦于秦秦女好無忌馳歸報平王曰秦女絶美王可自取而更為太子取婦平王遂自取秦女而絶愛幸之生子軫更為太子取婦無忌既以秦女自媚于平王因去太子而事平王恐一旦平王卒而太子立殺已乃因讒太子建建母蔡女也無寵于平王平王稍益疏建使建守城父備邊兵頃之無忌又日夜言太子短于王曰太子以秦女之故不能無怨望願王少自備也自太子居城父將兵外交諸侯且欲入為亂矣平王乃召其太傅伍奢考問之伍奢知無忌讒太子于平王因曰王獨奈何以讒賊小臣疏骨肉之親乎無忌曰王今不制其事成矣王且見禽于是平王怒囚伍奢而使城父司馬奮揚往殺太子行未至奮揚使人先告太子太子急去不然將誅太子建亡奔宋無忌言于平王曰伍奢有二子皆賢不誅且為楚憂可以其父質而召之不然且為楚患王使使謂伍奢曰能致汝二子則生不能則死伍奢曰尚為人仁呼必來員為人剛戾忍詬火候反能成大事彼見來之并禽其勢必不來王不聽使人召二子曰來吾生汝父不來今殺奢也伍尚欲往員曰楚之召我兄弟非欲以生我父也恐有脫者後生患故以父為質詐召二子二子去則父子俱死何益父之死往而令讎不得報耳不如奔他國借力以雪父之恥俱滅無為也伍尚曰我知往終不能全父命然恨父召我以求生而不往後不能雪恥終為天下笑耳謂員可去矣汝能報殺父之讎我將歸死尚既就執使者捕伍胥伍胥貫烏遝反弓執矢嚮使者使者不敢進伍胥遂亡聞太子建之在宋往從之奢聞子胥之亡也曰楚國君臣且苦兵矣伍尚至楚楚并殺奢與尚也伍胥既至宋宋有華氏之亂乃與太子建俱奔于鄭鄭人甚善之太子建又適晉晉頃公曰太子既善鄭鄭信太子太子能為我內應而我攻其外滅鄭必矣滅鄭而封太子太子乃還鄭事未會會自私欲殺其從者從者知其謀乃告之於鄭鄭定公與子産誅殺太子建建有子名勝伍胥懼乃與勝俱奔吳到昭關昭關欲執之伍胥遂與勝獨身步走幾不得脫追者在後至江江上有一漁父乘船知伍胥之急乃渡伍胥伍胥既渡解其劍曰此劍直百金以與父父曰楚國之法得伍胥者賜粟五萬石爵執圭豈徒百金劍邪不受伍胥未至吳而疾止中道乞食張勃曰子胥乞食處在丹陽溧陽縣至于吳吳王僚方用事公子光為將伍胥乃因公子光以求見吳王久之楚平王以其邉邑鍾離與吳邉邑卑梁氏俱蠶兩女子爭桑相攻乃大怒至于兩國舉兵相伐吳使公子光伐楚拔其鍾離居巢而歸伍子胥説吳王僚曰楚可破也願復遣公子光公子光謂吳王曰彼伍胥父兄為戮于楚而勸王伐楚者欲以自報其讎耳伐楚未可破也伍胥知公子光有內志欲殺王而自立未可説以外事乃進專諸于公子光退而與太子建之子勝耕于野五年而楚平王卒初平王所奪太子建秦女生子軫及平王卒軫竟立為後是為昭王吳王僚因楚喪使二公子將兵往襲楚楚發兵絶吳兵之後不得歸吳國內空而公子光乃令專諸襲刺吳王僚而自立是為吳王闔廬闔廬既立得志乃召伍貟以為行人而與謀國事楚誅其大臣郤宛伯州犁伯州犁之孫伯嚭亡奔吳徐廣曰伯州犂者晉伯宗之子也伯州犂之子曰郤宛卻宛之子曰伯嚭宛亦姓伯又别氏卻楚世家云殺卻宛宛之宗姓伯氏子曰嚭吳世家云楚誅伯州犂其孫伯嚭奔吳也吳亦以嚭為大夫前王僚所遣二公子將兵伐楚者道絶不得歸後聞闔廬弒王僚自立遂以其兵降楚楚封之于舒闔廬立三年乃興師與伍胥伯嚭伐楚拔舒遂禽故吳反二將軍因欲至郢將軍孫武曰民勞未可且待之乃歸四年吳伐楚取六與潛六古國皋陶之後所封潛縣冇天柱山五年伐越敗之六年楚昭王使公子囊瓦案左傳楚公子貞字子囊其孫名瓦字子常此言公子又兼稱囊瓦誤也將兵伐吳吳使伍貟迎擊大破楚軍于豫章豫章在江南取楚之居巢九年吳王闔廬謂子胥孫武曰始子言郢未可入今果何如二子對曰楚將囊瓦貪而唐蔡皆怨之王必欲大伐之必先得唐蔡乃可闔廬聽之悉興師與唐蔡伐楚與楚夾漢水而陳吳王之弟夫概將兵請從王不聽遂以其屬五千人擊楚將子常子常公孫瓦子常敗走奔鄭于是吳乘勝而前五戰遂至郢郢楚都己卯楚昭王出奔庚辰吳王入郢昭王出亡入雲夢盜擊王王走鄖音云國名鄖公弟懷曰平王殺我父我殺其子不亦可乎鄖公恐其弟殺王與王奔隨吳兵圍隨謂隨人曰周之子孫在漢川者楚盡滅之隨人欲殺王王子綦匿王已自為王以當之隨人卜與王于吳不吉乃謝吳不與王始伍貟與申包胥為交貟之亡也謂包胥曰我必覆楚包胥曰我必存之及吳兵入郢伍子胥求昭王既不得乃掘楚平王墓出其尸鞭之三百然後己申包胥亡于山中使人謂子胥曰子之報讎其以甚乎吾聞之人衆者勝天天定亦能破人今子故平王之臣親北面而事之今至于僇死人此豈其無天道之極乎伍子胥曰為我謝申包胥曰吾日暮塗逺吾故倒行而逆施之于是申包胥走秦告急求救于秦秦不許包胥立於秦廷晝夜哭七日七夜不絶其聲秦哀公憐之曰楚雖無道有臣若是可無存乎乃遣車五百乘救楚擊吳六月敗吳兵于稷稷丘地名在郊外會吳王久留楚求昭王而闔廬弟夫概乃亡歸自立為王闔廬聞之乃釋楚而歸擊其弟夫概夫概敗走遂奔楚楚昭王見吳有內亂乃復入郢封夫概于堂溪徐廣曰在慎縣駰案地理志汝南有吳房縣應劭曰夫概奔楚封于堂溪本房子國以封吳故曰吳房然則不得在慎縣也為堂溪氏楚復與吳戰敗吳吳王乃歸後二歲闔廬使太子夫差將兵伐楚取番普寒反又音婆楚懼吳復大來乃去郢徙於鄀楚地音若當是時吳以伍子胥孫武之謀西破強楚北威齊晉南服越人其後四年孔子相魯後五年伐越越王句踐迎擊敗吳於姑蘇傷闔廬指軍卻闔廬病創楚良反將死謂太子夫差曰爾忘句踐殺爾父乎夫差對曰不敢忘是夕闔廬死夫差既立為王以伯嚭為太宰習戰射二年後伐越敗越于夫湫音椒越王句踐乃以餘兵五千人棲于會稽之上使大夫種厚幣遺吳太宰嚭以請和求委國為臣妾吳王將許之伍子胥諫曰越王為人能辛苦今王不滅後必悔之吳王不聽用太宰嚭計與越平其後五年而吳王聞齊景公死而大臣爭寵新君弱乃興師北伐齊伍子胥諫曰句踐食不重味弔死問疾且欲有所用之也此人不死必為吳患今吳之有越猶人之有腹心疾也而王不先越而乃務齊不亦謬乎吳王不聽伐齊大敗齊師于艾陵遂滅鄒魯之君以歸益疏子胥之謀其後四年吳王將北伐齊越王句踐用子貢之謀乃率其衆以助吳而重寶以獻遺太宰嚭太宰嚭既數受越賂其愛信越殊甚日夜為言於吳王吳王信用嚭之計伍子胥諫曰夫越腹心之病今信其浮辭詐偽而貪齊破齊譬猶石田無所用之且盤庚之誥曰有顛越不恭劓殄滅之俾無遺育無使易種于兹邑此商之所以興願王釋齊而先越若不然後將悔之無及而吳王不聽使子胥于齊子胥臨行謂其子曰吾數諫王王不用吾今見吳之亡矣汝與吳俱亡無益也乃屬其子于齊鮑牧而還報吳吳太宰嚭既與子胥有隙因讒曰子胥為人剛暴少恩猜賊其怨望恐為深禍也前日王欲伐齊子胥以為不可王卒伐之而有大功子胥恥其計謀不用乃反怨望而今王又復伐齊子胥專愎強諫沮自吕反毁用事徒幸吳之敗以自勝其計謀耳今王自行悉國中武力以伐齊而子胥諫不用因輟謝詳病不行王不可不備此起禍不難且嚭使人微伺之其使于齊也乃屬其子于齊之鮑氏夫為人臣內不得意外倚諸侯自以為先王之謀臣今不見用常鞅鞅怨望願王早圖之吳王曰微子之言吾亦疑之乃使使賜伍子胥屬鏤録子反之劍曰子以此死伍子胥仰天歎曰嗟乎讒臣嚭為亂矣王乃反誅我我令若父霸自若未立時諸公子爭立我以死爭之於先王幾不得立若既得立欲分吳國豫我我顧不敢望也然今若聽諛臣言以殺長者乃告其舍人曰必樹吾墓上以梓令可以為器而抉吾眼縣吳東門之上以觀越冦之入滅吳也乃自剄死吳王聞之大怒乃取子胥尸盛以鴟夷革應劭曰取馬革為鴟夷鴟夷榼形浮之江中徐廣曰魯年哀公十一吳人憐之為立祠于江上因命曰胥山張晏曰胥山在太湖邉去江不逺百里故云江上吳王既誅伍子胥遂伐齊齊鮑氏殺其君悼公而立陽生吳王欲討其賊不勝而去其後二年吳王召魯衛之君會之橐皋其明年因北大會諸侯于黃池以令周室越王句踐襲殺吳太子破吳兵吳王聞之乃歸使使厚幣與越平後九年越王句踐遂滅吳殺王夫差而誅太宰嚭以不忠于其君而外受重賂與已比周也伍子胥初所與俱亡故楚太子建之子勝者在于吳吳王夫差之時楚惠王欲召勝歸楚葉公諫曰勝好勇而隂求死士殆有私乎惠王不聽遂召勝使居楚之邉邑鄢徐廣曰潁川鄢陵是號為白公徐廣曰汝南裦信縣有白亭白公歸楚三年而吳誅子胥白公勝既歸楚怨鄭之殺其父乃隂養死士求報鄭歸楚五年請伐鄭楚令尹子西許之兵未發而晉伐鄭鄭請救于楚楚使子西往救與盟而還白公勝怒曰非鄭之仇乃子西也勝自礪劍人問曰何以為勝曰欲以殺子西子西聞之笑曰勝如卵耳何能為也其後四歲白公勝與石乞襲殺楚令尹子西司馬子綦於朝石乞曰不殺王不可乃劫之王如髙府石乞從者屈固徐廣曰一作惠王從者屈固楚世家亦云王從者負楚惠王亡走昭夫人之宫葉公聞白公為亂率其國人攻白公白公之徒敗亡走山中自殺而虜石乞而問白公尸處不言將亨石乞曰事成為卿不成而亨固其職也終不肯告其尸處遂亨石乞而求惠王復立之太史公曰怨毒之于人甚矣哉王者尚不能行之於臣下況同列乎向令伍子胥從奢俱死何異螻蟻棄小義雪大恥名垂于後世悲夫方子胥窘于江上道乞食志豈嘗須臾忘郢邪故隱忍就功名非烈丈夫孰能致此哉白公如不自立為君者其功謀亦不勝道者哉史記集解卷六十六
